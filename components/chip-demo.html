<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline' 'unsafe-eval'; style-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;">
  <title>ease-chip-group Demo — EaseMotion CSS</title>
  <link rel="stylesheet" href="chip.css">
</head>
<body style="padding: 2rem; background: #0f0f0f; font-family: sans-serif;">

  <h2 style="color: white; margin-bottom: 1rem;">ease-chip-group Demo</h2>

  <div class="ease-chip-group">
    <input type="checkbox" id="chip1">
    <label class="ease-chip" for="chip1">Design</label>

    <input type="checkbox" id="chip2">
    <label class="ease-chip" for="chip2">Development</label>

    <input type="checkbox" id="chip3" checked>
    <label class="ease-chip" for="chip3">CSS</label>

    <input type="checkbox" id="chip4">
    <label class="ease-chip" for="chip4">Animation</label>

    <input type="checkbox" id="chip5" disabled>
    <label class="ease-chip" for="chip5">Disabled</label>
  </div>

</body>
</html>
