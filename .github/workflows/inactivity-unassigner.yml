name: Inactivity Unassigner

on:
  schedule:
    - cron: '0 */12 * * *' # Runs every 12 hours
  workflow_dispatch: # Allows manual sweep

permissions:
  issues: write
  pull-requests: read

jobs:
  unassign-inactive:
    name: Unassign Inactive Claims
    runs-on: ubuntu-latest
    steps:
      - name: Scan and Clean Inactive Issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const INACTIVITY_DAYS = 5;
            
            console.log('Fetching all open issues...');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', per_page: 100
            });
            
            console.log(`Found ${issues.length} open issues. Scanning for assignments...`);
            
            for (const issue of issues) {
              if (issue.pull_request) continue; // Skip Pull Requests
              if (!issue.assignees || issue.assignees.length === 0) continue; // Skip unassigned issues
              
              const updatedAt = new Date(issue.updated_at);
              const now = new Date();
              const diffTime = Math.abs(now - updatedAt);
              const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
              
              if (diffDays < INACTIVITY_DAYS) {
                console.log(`Scanning Issue #${issue.number}: Skipped (recently active, last updated ${diffDays} days ago)`);
                continue;
              }
              
              console.log(`Scanning Issue #${issue.number}: "${issue.title}"`);
              
              // Fetch timeline events to find when each assignee was assigned
              const { data: events } = await github.rest.issues.listEvents({
                owner, repo, issue_number: issue.number, per_page: 100
              });
              
              for (const assignee of issue.assignees) {
                const user = assignee.login;
                
                // Find the latest assignment event for this user
                const assignEvents = events.filter(e => e.event === 'assigned' && e.assignee.login === user);
                if (assignEvents.length === 0) {
                  console.log(`  No assign event found for user @${user}. Skipping.`);
                  continue;
                }
                
                const lastAssignEvent = assignEvents[assignEvents.length - 1];
                const assignedAt = new Date(lastAssignEvent.created_at);
                const now = new Date();
                const diffTime = Math.abs(now - assignedAt);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                console.log(`  User @${user} assigned at ${lastAssignEvent.created_at} (${diffDays} days ago)`);
                
                if (diffDays >= INACTIVITY_DAYS) {
                  console.log(`  Inactivity threshold reached for @${user}. Checking for active pull requests...`);
                  
                  // Check if this user has any open PRs in the repository
                  const { data: prs } = await github.rest.pulls.list({
                    owner, repo, state: 'open', creator: user
                  });
                  
                  const hasActivePR = prs.length > 0;
                  
                  if (hasActivePR) {
                    console.log(`  Keep assignment: User @${user} has an active open PR. Skipping unassignment.`);
                  } else {
                    console.log(`  Unassigning @${user} from Issue #${issue.number} due to 5 days inactivity...`);
                    
                    // Unassign the user
                    await github.rest.issues.removeAssignees({
                      owner, repo, issue_number: issue.number, assignees: [user]
                    });
                    
                    // Comment on the issue
                    await github.rest.issues.createComment({
                      owner, repo, issue_number: issue.number,
                      body: `⚠️ **Inactivity Cleanup:** @${user}, it has been ${INACTIVITY_DAYS} days since you were assigned to this issue and no pull request has been opened. To keep the project moving, you have been unassigned.\n\n> 🔓 **Status:** This issue is now open and available for anyone to claim by commenting \`/claim\`. 🚀`
                    });
                    
                    console.log(`  Successfully unassigned and commented.`);
                  }
                }
              }
            }
            console.log('Cleanup scan complete!');
