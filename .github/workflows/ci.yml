name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  lint:
    name: Lint HTML & CSS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.html
            **/*.css

      - name: Setup Node.js
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run HTMLHint on Changed HTML Files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          changed_html=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep '\.html$' || true)
          if [ -n "$changed_html" ]; then
            echo "Linting HTML files:"
            echo "$changed_html"
            npx -y htmlhint $changed_html --config .github/workflows/htmlhint.config.json
          else
            echo "No HTML files changed."
          fi

      - name: Run Stylelint on Changed CSS Files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          changed_css=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep '\.css$' || true)
          if [ -n "$changed_css" ]; then
            echo "Linting CSS files:"
            echo "$changed_css"
            npx -y stylelint $changed_css --config .github/workflows/stylelint.config.json --allow-empty-input
          else
            echo "No CSS files changed."
          fi
