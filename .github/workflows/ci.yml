name: CI

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.css'
      - '**/*.html'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
      - 'stylelint.config.json'
      - 'htmlhint.config.json'
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.css'
      - '**/*.html'
      - 'scripts/**'
      - '.github/workflows/ci.yml'
      - 'stylelint.config.json'
      - 'htmlhint.config.json'

permissions:
  contents: read

jobs:
  lint:
    name: Lint HTML & CSS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.html
            **/*.css

      - name: Setup Node.js
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run HTMLHint on Changed HTML Files
        if: steps.changed-files.outputs.any_changed == 'true'
        continue-on-error: true
        run: |
          changed_html=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep '\.html$' || true)
          existing_html=""
          for file in $changed_html; do
            if [ -f "$file" ]; then
              existing_html="$existing_html $file"
            fi
          done
          if [ -n "$existing_html" ]; then
            echo "Linting HTML files:"
            echo "$existing_html"
            npx -y htmlhint@1.0.0 $existing_html --config .github/workflows/htmlhint.config.json
          else
            echo "No HTML files to lint."
          fi

      - name: Run Stylelint on Changed CSS Files
        if: steps.changed-files.outputs.any_changed == 'true'
        continue-on-error: true
        run: |
          changed_css=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep '\.css$' || true)
          existing_css=""
          for file in $changed_css; do
            if [ -f "$file" ]; then
              existing_css="$existing_css $file"
            fi
          done
          if [ -n "$existing_css" ]; then
            echo "Linting CSS files:"
            echo "$existing_css"
            npx -y stylelint@17.12.0 $existing_css --config .github/workflows/stylelint.config.json --allow-empty-input
          else
            echo "No CSS files to lint."
          fi
