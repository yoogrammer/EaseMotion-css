name: Release Minified CSS

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-minified-css:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate easemotion.min.css
        run: node scripts/build-minified-css.mjs

      - name: Upload minified stylesheet to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: easemotion.min.css
          fail_on_unmatched_files: true
