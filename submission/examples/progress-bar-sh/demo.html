<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Progress Bar Showcase</title>
  <!-- Link to your component styles -->
  <link rel="stylesheet" href="style.css">
  
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 2rem;
      background-color: #fafafa;
      max-width: 600px;
      margin: 0 auto;
    }
    .card {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      margin-bottom: 1.5rem;
    }
    h3 { margin-top: 0; color: #1f2937; }
    .label { font-size: 0.875rem; color: #6b7280; margin-bottom: 0.5rem; display: block; }
  </style>
</head>
<body>

  <h2>⚡ EaseMotion CSS - Progress Bars Components</h2>
  <p>Self-contained animated progress bars with customizable percentages.</p>

  <!-- Example 1: Standard Smooth Fill -->
  <div class="card">
    <h3>Standard Smooth Progress Bar</h3>
    <span class="label">Loading Data (85%)</span>
    <!-- Change --progress-value-sh to adjust the final percentage -->
    <div class="ease-progress-wrapper-sh" style="--progress-value-sh: 85%;">
      <div class="ease-progress-bar-sh"></div>
    </div>
  </div>

  <!-- Example 2: Animated Striped Fill -->
  <div class="card">
    <h3>Animated Striped Progress Bar</h3>
    <span class="label">Uploading Assets (45%)</span>
    <div class="ease-progress-wrapper-sh" style="--progress-value-sh: 45%;">
      <div class="ease-progress-bar-sh ease-progress-striped-sh"></div>
    </div>
  </div>

</body>
</html>
