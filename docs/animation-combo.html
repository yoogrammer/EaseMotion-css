<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Favicon and App Icons -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="assets/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/favicon-16x16.png"
    />
    <link rel="manifest" href="assets/site.webmanifest" />
    <link rel="shortcut icon" href="assets/favicon.ico" />
    <title>EaseMotion CSS — Animation Combination Builder</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="docs.css" />
    <script>
      (function () {
        var t = localStorage.getItem("em-theme") || "dark";
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
    <link rel="stylesheet" href="animation-combo.css" />
  </head>
  <body>
    <!-- Header (reuse from docs) -->
    <header class="docs-header">
      <a href="index.html" class="docs-logo">
        <img src="assets/logo.svg" alt="EaseMotion CSS" class="docs-logo-img" />
      </a>
      <ul class="docs-header-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="animations-preview.html">Animation Preview</a></li>
        <li>
          <a href="animation-combo.html" class="ease-btn ease-nav-button active"
            >Animation Builder</a
          >
        </li>
      </ul>
      <button
        id="theme-toggle"
        class="theme-toggle-btn"
        aria-label="Toggle dark/light theme"
        title="Toggle theme"
      >
        <svg
          class="sun-icon"
          viewBox="0 0 24 24"
          width="18"
          height="18"
          stroke="currentColor"
          stroke-width="2"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.72" x2="5.64" y2="18.3"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg
          class="moon-icon"
          viewBox="0 0 24 24"
          width="18"
          height="18"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      </button>
    </header>

    <main class="docs-content">
      <section class="docs-section" id="animation-builder">
        <h1 class="docs-h1">Animation Combination Builder</h1>
        <p class="docs-p">
          Select multiple animation utilities, adjust duration and delay,
          preview the result and copy the generated class string.
        </p>

        <div
          class="animation-combo-controls"
          style="
            display: flex;
            flex-wrap: wrap;
            gap: var(--ease-space-4);
            margin-bottom: var(--ease-space-6);
          "
        >
          <div style="flex: 1; min-width: 200px">
            <label for="animSearch" class="ease-label">Search</label>
            <input
              type="text"
              id="animSearch"
              placeholder="Search animations..."
              class="ease-input"
              style="width: 100%"
            />
          </div>
          <div style="flex: 1; min-width: 150px">
            <label for="duration" class="ease-label">Duration (ms)</label>
            <input
              type="number"
              id="duration"
              min="100"
              value="400"
              class="ease-input"
              style="width: 100%"
            />
          </div>
          <div style="flex: 1; min-width: 150px">
            <label for="delay" class="ease-label">Delay (ms)</label>
            <input
              type="number"
              id="delay"
              min="0"
              value="0"
              class="ease-input"
              style="width: 100%"
            />
          </div>
        </div>

        <div
          id="animationList"
          class="animation-list"
          style="
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: var(--ease-space-4);
            margin-bottom: var(--ease-space-6);
          "
        ></div>

        <div
          class="animation-preview"
          style="margin-bottom: var(--ease-space-6)"
        >
          <div
            id="previewBox"
            class="animation-preview-box"
            style="
              height: 100px;
              display: flex;
              align-items: center;
              justify-content: center;
              border: 1px solid var(--border-color);
              border-radius: var(--ease-radius-md);
              background: var(--card-bg);
              color: var(--page-text);
            "
          >
            Preview
          </div>
        </div>

        <div
          class="generated-code"
          style="display: flex; align-items: center; gap: var(--ease-space-2)"
        >
          <code
            id="generatedClass"
            style="
              background: var(--code-bg);
              padding: var(--ease-space-1) var(--ease-space-2);
              border-radius: var(--ease-radius-sm);
              flex-grow: 1;
              word-break: break-all;
            "
            >ease-</code
          >
          <button id="copyBtn" class="ease-btn ease-btn-primary">Copy</button>
        </div>
      </section>
    </main>

    <script>
      const animations = [
        { name: "ease-fade-in", category: "fade", description: "Fade in" },
        { name: "ease-fade-out", category: "fade", description: "Fade out" },
        { name: "ease-slide-up", category: "slide", description: "Slide up" },
        {
          name: "ease-slide-down",
          category: "slide",
          description: "Slide down",
        },
        {
          name: "ease-slide-in-left",
          category: "slide",
          description: "Slide in left",
        },
        {
          name: "ease-slide-in-right",
          category: "slide",
          description: "Slide in right",
        },
        { name: "ease-bounce", category: "bounce", description: "Bounce" },
        { name: "ease-rotate", category: "rotate", description: "Rotate" },
      ];

      const listContainer = document.getElementById("animationList");
      const searchInput = document.getElementById("animSearch");
      const durationInput = document.getElementById("duration");
      const delayInput = document.getElementById("delay");
      const previewBox = document.getElementById("previewBox");
      const generatedCodeEl = document.getElementById("generatedClass");
      const copyBtn = document.getElementById("copyBtn");

      function renderList() {
        const filter = searchInput.value.toLowerCase();
        listContainer.innerHTML = "";
        animations
          .filter((a) => a.name.includes(filter))
          .forEach((anim) => {
            const card = document.createElement("div");
            card.className = "animation-card";
            card.style.border = "1px solid var(--border-color)";
            card.style.borderRadius = "var(--ease-radius-sm)";
            card.style.padding = "var(--ease-space-2)";
            card.style.background = "var(--card-bg)";
            const label = document.createElement("label");
            label.style.display = "flex";
            label.style.alignItems = "center";
            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.value = anim.name;
            checkbox.style.marginRight = "var(--ease-space-2)";
            checkbox.addEventListener("change", updateGenerated);
            const nameSpan = document.createElement("span");
            nameSpan.textContent = anim.name;
            label.appendChild(checkbox);
            label.appendChild(nameSpan);
            card.appendChild(label);
            listContainer.appendChild(card);
          });
      }

      function updateGenerated() {
        const selected = Array.from(
          listContainer.querySelectorAll("input[type=checkbox]:checked")
        ).map((cb) => cb.value);
        const duration = durationInput.value;
        const delay = delayInput.value;
        // Build class string: combine selected classes and utility classes for duration/delay if needed.
        // Easemotion uses custom properties for speed, but for simplicity we add inline style.
        let classStr = selected.join(" ");
        previewBox.className = "animation-preview-box " + classStr;
        previewBox.style.animationDuration = duration + "ms";
        previewBox.style.animationDelay = delay + "ms";
        generatedCodeEl.textContent = classStr;
      }

      let debounceTimer;
      function performSearch() {
        renderList();
      }
      searchInput.addEventListener("input", () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(performSearch, 250);
      });
      durationInput.addEventListener("input", updateGenerated);
      delayInput.addEventListener("input", updateGenerated);
      copyBtn.addEventListener("click", () => {
        navigator.clipboard.writeText(generatedCodeEl.textContent);
        copyBtn.textContent = "Copied!";
        setTimeout(() => (copyBtn.textContent = "Copy"), 1500);
      });

      // Initial render
      renderList();
      updateGenerated();
      const themeBtn = document.getElementById("theme-toggle");
      const html = document.documentElement;

      if (themeBtn) {
        themeBtn.addEventListener("click", () => {
          const currentTheme = html.getAttribute("data-theme") || "dark";
          const targetTheme = currentTheme === "light" ? "dark" : "light";

          // Calculate switch coordinate position for circular mask origin
          const rect = themeBtn.getBoundingClientRect();
          const x = rect.left + rect.width / 2;
          const y = rect.top + rect.height / 2;

          html.style.setProperty("--clip-x", `${x}px`);
          html.style.setProperty("--clip-y", `${y}px`);

          if (document.startViewTransition) {
            html.setAttribute("data-transition-theme", targetTheme);

            const transition = document.startViewTransition(() => {
              html.setAttribute("data-theme", targetTheme);
              localStorage.setItem("em-theme", targetTheme);
            });

            transition.finished.finally(() => {
              html.removeAttribute("data-transition-theme");
            });
          } else {
            html.setAttribute("data-theme", targetTheme);
            localStorage.setItem("em-theme", targetTheme);
          }
        });
      }
    </script>
  </body>
</html>
