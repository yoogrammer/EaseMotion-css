<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EaseMotion CSS — Class Reference Cheatsheet</title>
    <link rel="stylesheet" href="../easemotion.css" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #1e293b;
        min-height: 100vh;
      }
      header {
        background: #0f172a;
        color: #fff;
        padding: 2rem;
        text-align: center;
      }
      header h1 {
        font-size: 2rem;
        font-weight: 800;
      }
      header p {
        color: #94a3b8;
        margin-top: 0.4rem;
        font-size: 0.95rem;
      }
      .search-bar {
        display: flex;
        justify-content: center;
        padding: 1.25rem 1rem;
        background: #fff;
        border-bottom: 1px solid #e2e8f0;
        position: sticky;
        top: 0;
        z-index: 10;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      .search-bar input {
        padding: 0.6rem 1rem;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 0.9rem;
        width: 300px;
        outline: none;
      }
      .search-bar input:focus {
        border-color: #6366f1;
      }
      .filter-btns {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      .filter-btn {
        padding: 0.4rem 0.9rem;
        border-radius: 99px;
        border: 1px solid #e2e8f0;
        background: #fff;
        font-size: 0.8rem;
        cursor: pointer;
        font-weight: 500;
        transition: all 150ms;
      }
      .filter-btn:hover,
      .filter-btn.active {
        background: #6366f1;
        color: #fff;
        border-color: #6366f1;
      }
      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 2rem 1rem;
      }
      .section-title {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #94a3b8;
        margin: 2rem 0 0.75rem;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 0.75rem;
      }
      .card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        transition: box-shadow 150ms;
      }
      .card:hover {
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      }
      .card-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }
      .class-name {
        font-family: monospace;
        font-size: 0.85rem;
        font-weight: 700;
        color: #6366f1;
        background: #eef2ff;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
      }
      .badge {
        font-size: 0.65rem;
        font-weight: 600;
        padding: 0.2rem 0.5rem;
        border-radius: 99px;
        white-space: nowrap;
      }
      .badge-layout {
        background: #dbeafe;
        color: #1d4ed8;
      }
      .badge-entrance {
        background: #dcfce7;
        color: #15803d;
      }
      .badge-hover {
        background: #fce7f3;
        color: #be185d;
      }
      .badge-button {
        background: #fef3c7;
        color: #b45309;
      }
      .badge-card {
        background: #f3e8ff;
        color: #7e22ce;
      }
      .badge-animation {
        background: #e0f2fe;
        color: #0369a1;
      }
      .badge-utility {
        background: #f1f5f9;
        color: #475569;
      }
      .desc {
        font-size: 0.82rem;
        color: #64748b;
        line-height: 1.4;
      }
      .copy-btn {
        align-self: flex-end;
        padding: 0.25rem 0.6rem;
        font-size: 0.72rem;
        border-radius: 5px;
        border: 1px solid #e2e8f0;
        background: #f8fafc;
        cursor: pointer;
        color: #64748b;
        transition: all 150ms;
      }
      .copy-btn:hover {
        background: #6366f1;
        color: #fff;
        border-color: #6366f1;
      }
      .no-results {
        text-align: center;
        color: #94a3b8;
        padding: 3rem;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>EaseMotion CSS</h1>
      <p>Class Reference Cheatsheet — every ease-* class in one place</p>
    </header>
    <div class="search-bar">
      <input
        type="text"
        id="search"
        placeholder="Search classes e.g. fade, hover, btn"
      />
      <div class="filter-btns" id="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="layout">Layout</button>
        <button class="filter-btn" data-filter="entrance">Entrance</button>
        <button class="filter-btn" data-filter="hover">Hover</button>
        <button class="filter-btn" data-filter="button">Button</button>
        <button class="filter-btn" data-filter="card">Card</button>
        <button class="filter-btn" data-filter="animation">Animation</button>
        <button class="filter-btn" data-filter="utility">Utility</button>
      </div>
    </div>
    <main id="main"></main>
    <script>

        },
        {

        {

        {

        {

        },
        {

        },
        {

        },
        {

        {
          name: "ease-hover-dim",

        },
        {

        },
        {

        },
        {

        },
        {

        },
        {
          name: "ease-card-header",
          cat: "card",

        },
        {

        },
        {

        {

        {

        },
        {

          cat: "animation",
          desc: "Looping scale and opacity pulse effect",
        },
        {
          name: "ease-bounce",

        },
        {

        },
        {

        {

        },
        {
          name: "ease-float",

        },
        {
          name: "ease-float-shadow",
          cat: "animation",
          desc: "Float with animated drop shadow depth",
        },
        {
          name: "ease-neon",

          desc: "Pulsing neon text glow using text-shadow",
        },
        {
          name: "ease-neon-border",
          cat: "animation",
          desc: "Pulsing neon border glow using box-shadow",
        },
        {
          name: "ease-neon-pink",

        },
        {

        },
        {
          name: "ease-neon-green",

          desc: "Green neon color variant",
        },
        {
          name: "ease-neon-purple",

        {
          name: "ease-glitch",

        {

        {

        },
        {

        {

        },
        {

        },
        {
          name: "ease-spotlight",
          cat: "animation",
          desc: "Radial gradient spotlight on hover",
        },
        {
          name: "ease-spotlight-blue",
          cat: "animation",
          desc: "Blue spotlight color variant",
        },
        {
          name: "ease-spotlight-purple",
          cat: "animation",
          desc: "Purple spotlight color variant",
        },
        {
          name: "ease-spotlight-warm",
          cat: "animation",
          desc: "Warm orange spotlight color variant",
        },
        {
          name: "ease-tilt-container",
          cat: "utility",
          desc: "Required perspective wrapper for ease-tilt",
        },
        {

        },
        {

        },
        {
          name: "ease-tilt-right",
          cat: "utility",
          desc: "Tilt to the right on hover",
        },
        { name: "ease-tilt-up", cat: "utility", desc: "Tilt upward on hover" },
        {
          name: "ease-tilt-down",

          desc: "Tilt downward on hover",
        },
        {
          name: "ease-tilt-subtle",
          cat: "utility",
          desc: "6 degree tilt intensity variant",
        },
        {
          name: "ease-tilt-hard",
          cat: "utility",
          desc: "20 degree tilt intensity variant",
        },
        {
          name: "ease-cursor-pointer",
          cat: "utility",
          desc: "Sets cursor pointer",
        },
        {
          name: "ease-cursor-default",
          cat: "utility",
          desc: "Sets cursor default",
        },
        {
          name: "ease-cursor-not-allowed",
          cat: "utility",
          desc: "Sets cursor not-allowed",
        },
        {
          name: "ease-progress",
          cat: "utility",
          desc: "Animated progress bar track",
        },
        {
          name: "ease-progress-fill",
          cat: "utility",
          desc: "Fills from 0 to --ease-progress-value on load",
        },
        {
          name: "ease-progress-striped",
          cat: "utility",
          desc: "Animated diagonal stripes on fill",
        },
        {
          name: "ease-accordion",
          cat: "utility",
          desc: "Smooth expand/collapse via details and summary elements",
        },
        {
          name: "ease-accordion-bordered",
          cat: "utility",
          desc: "Bordered rounded accordion variant",
        },
        {
          name: "ease-accordion-flush",
          cat: "utility",
          desc: "Bottom-line only accordion variant",
        },
      ];
      const labels = {
        layout: "Layout",
        entrance: "Entrance Animations",
        hover: "Hover Effects",
        button: "Buttons",
        card: "Cards",
        animation: "Animations",
        utility: "Utilities",
      };
      const order = [
        "layout",
        "entrance",
        "hover",
        "button",
        "card",
        "animation",
        "utility",
      ];
      let currentFilter = "all";
      function render(query = "", filter = "all") {
        const main = document.getElementById("main");
        const q = query.toLowerCase();
        const filtered = classes.filter(
          (c) =>
            (filter === "all" || c.cat === filter) &&
            (c.name.includes(q) ||
              c.desc.toLowerCase().includes(q) ||
              c.cat.includes(q))
        );
        if (!filtered.length) {
          main.innerHTML =
            '<div class="no-results">No classes found. Try a different search!</div>';
          return;
        }
        const grouped = {};
        filtered.forEach((c) => {
          if (!grouped[c.cat]) grouped[c.cat] = [];
          grouped[c.cat].push(c);
        });
        main.innerHTML = order
          .filter((k) => grouped[k])
          .map(
            (k) => `
    <div class="section-title">${labels[k]} (${grouped[k].length})</div>
    <div class="grid">${grouped[k]
      .map(
        (c) => `
      <div class="card">
        <div class="card-top">
          <span class="class-name">.${c.name}</span>
          <span class="badge badge-${c.cat}">${labels[c.cat]}</span>
        </div>
        <div class="desc">${c.desc}</div>
        <button class="copy-btn" onclick="copyClass('.${c.name}',this)">Copy</button>
      </div>`
      )
      .join("")}
    </div>`
          )
          .join("");
      }
      function copyClass(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
          btn.textContent = "Copied!";
          setTimeout(() => (btn.textContent = "Copy"), 1200);
        });
      }
      let debounceTimer;
      function performSearch(query) {
        render(query, currentFilter);
      }
      document.getElementById("search").addEventListener("input", (e) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          performSearch(e.target.value);
        }, 250);
      });
      document.getElementById("filters").addEventListener("click", (e) => {
        if (!e.target.classList.contains("filter-btn")) return;
        document
          .querySelectorAll(".filter-btn")
          .forEach((b) => b.classList.remove("active"));
        e.target.classList.add("active");
        currentFilter = e.target.dataset.filter;
        render(document.getElementById("search").value, currentFilter);
      });
      render();
    </script>
  </body>
</html>
