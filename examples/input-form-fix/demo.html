<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Non-Shifting Form Fields</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2rem; text-align: center; max-width: 420px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem;">Pixel-Perfect Form Ground</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem;">Click into fields. Box-shadow projection mapping isolates the focus states, eliminating layout jumps entirely.</p>
  </header>

  <form class="alm-form-container" onsubmit="event.preventDefault();">
    
    <div class="alm-form-row">
      <label class="alm-form-label" for="field-user">Account Identity</label>
      <input type="text" id="field-user" class="alm-stabilized-input" placeholder="Enter username...">
      <p class="alm-form-hint">🔒 Focus trigger introduces zero structural height shifts.</p>
    </div>

    <div class="alm-form-row">
      <label class="alm-form-label" for="field-pass">Access Security Token</label>
      <input type="password" id="field-pass" class="alm-stabilized-input" placeholder="Enter password...">
      <p class="alm-form-hint">💡 Downstream metadata blocks remain locked perfectly in place.</p>
    </div>

    <button style="margin-top: 0.5rem; background: var(--ease-color-primary, #6c63ff); border: none; color: white; padding: 0.75rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; box-shadow: var(--ease-glow-primary, 0 0 10px rgba(108, 99, 255, 0.15));">
      Authenticate Profile
    </button>

  </form>

</body>
</html>
