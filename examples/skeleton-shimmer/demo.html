<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Skeleton Shimmer Showcase</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 2rem;
      gap: 2rem;
    }
  </style>
</head>
<body>

  <header style="text-align: center; max-width: 500px; margin-bottom: 1rem;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem;">Content-Aware Shimmer Interface</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem;">GPU-bound gradient sweeping loop masks data fetching transitions smoothly at 60fps.</p>
  </header>

  <div class="alm-skeleton-card">
    <div class="alm-skeleton-profile-row">
      <div class="alm-skeleton-avatar ease-skeleton-shimmer"></div>
      <div style="flex-grow: 1; display: flex; flex-direction: column; gap: 0.5rem;">
        <div class="alm-skeleton-line alm-w-heading ease-skeleton-shimmer"></div>
        <div class="alm-skeleton-line alm-w-sub ease-skeleton-shimmer"></div>
      </div>
    </div>
    
    <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem;">
      <div class="alm-skeleton-line ease-skeleton-shimmer"></div>
      <div class="alm-skeleton-line alm-w-body-75 ease-skeleton-shimmer"></div>
      <div class="alm-skeleton-line alm-w-body-50 ease-skeleton-shimmer"></div>
    </div>
  </div>

  <div class="alm-skeleton-card">
    <div class="ease-skeleton-shimmer" style="width: 100%; aspect-ratio: 16 / 9; border-radius: 0.5rem;"></div>
    <div class="alm-skeleton-line alm-w-heading ease-skeleton-shimmer" style="margin-top: 0.25rem;"></div>
    <div class="alm-skeleton-line ease-skeleton-shimmer"></div>
  </div>

</body>
</html>
