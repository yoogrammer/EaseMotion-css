<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Contextual Tooltips</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1rem;
    }
    .panel-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 1rem;
      padding: 2rem;
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }
    .action-btn {
      background: var(--ease-color-primary, #6c63ff);
      border: none;
      color: white;
      padding: 0.75rem 1.25rem;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>

  <header style="text-align: center; max-width: 440px; margin-bottom: 2.5rem;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Pure CSS Contextual Hints</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem;">Hover over actions. Custom pseudo-element maps extract copy directly out of data-attributes with 0 dynamic script dependencies.</p>
  </header>

  <div class="panel-box">
    
    <button class="action-btn" data-tooltip="Saves configuration parameters immediately">
      💾 Commit Core
    </button>

    <button class="action-btn" style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);" data-tooltip="Launches optimization script analytics">
      📈 Benchmark
    </button>

    <button class="action-btn" style="background: #ef4444;" data-tooltip="Warning: Purges active workspace states permanently">
      🗑️ Flush Storage
    </button>

  </div>

</body>
</html>
