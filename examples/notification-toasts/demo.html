<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Notification Toasts</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 2rem;
    }
    .demo-trigger {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      padding: 0.75rem 1.25rem;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      transition: all 150ms ease;
    }
    .demo-trigger:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

  <header style="text-align: center; max-width: 460px; margin-bottom: 2.5rem;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Elastic Notification Stack</h1>
    <p style="color: #64748b; margin: 6px 0 0 0; font-size: 0.875rem;">Trigger banners below. Custom cubic-bezier transition paths simulate mechanical spring inertia on entry lines.</p>
  </header>

  <div style="display: flex; flex-wrap: wrap; gap: 1rem; max-width: 500px; justify-content: center;">
    <button class="demo-trigger" onclick="showToast('success')">🟢 Success Banner</button>
    <button class="demo-trigger" onclick="showToast('warning')">🟡 Warning Alert</button>
    <button class="demo-trigger" onclick="showToast('info')">🔵 System Info</button>
    <button class="demo-trigger" onclick="showToast('danger')">🔴 Critical Danger</button>
  </div>

  <div class="alm-toast-stack" id="sandbox-toast-stack">
    <div class="alm-toast-banner alm-toast-success">
      <span>🎉 System initialization successful. Ready for tracking commands.</span>
      <button class="alm-toast-dismiss" onclick="this.parentElement.remove()">✕</button>
    </div>
  </div>

  <script>
    const messages = {
      success: "⚡ Compilation cycle completed cleanly in 148ms.",
      warning: "⚠️ Pipeline throttling detected on edge streaming nodes.",
      info: "ℹ️ Allocation changes deployed over regional clusters.",
      danger: "🛑 Connection exception thrown while pulling configuration vectors."
    };

    function showToast(type) {
      const stack = document.getElementById('sandbox-toast-stack');
      const banner = document.createElement('div');
      banner.className = `alm-toast-banner alm-toast-${type}`;
      banner.innerHTML = `<span>${messages[type]}</span><button class="alm-toast-dismiss" onclick="this.parentElement.remove()">✕</button>`;
      
      // Prepend to place newest incoming messages on top of the list stack
      stack.insertBefore(banner, stack.firstChild);
      
      // Auto-expire items after 6 seconds to prevent screen space clutter
      setTimeout(() => { if(banner.parentNode) banner.remove(); }, 6000);
    }
  </script>
</body>
</html>
