<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bottom Navigation — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="font-family:system-ui,sans-serif;max-width:400px;margin:0 auto;padding:2rem 1rem 5rem;background:var(--bg,#fff);color:var(--text,#1a1a2e);min-height:100vh;box-sizing:border-box;position:relative;">
  <h1>Bottom Navigation</h1>
  <p style="color:#666;margin-bottom:2rem;">Mobile bottom nav bar — pure CSS.</p>
  <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;margin-bottom:2rem;"><input type="checkbox" id="darkModeToggle"> Dark mode</label>

  <section style="margin-bottom:3rem;">
    <h2>Default</h2>
    <p style="color:#999;font-size:0.85rem;">The bottom nav is fixed at the bottom of the viewport ↓</p>
  </section>

  <nav class="bottom-nav">
    <a href="#" class="bn-item bn-active">
      <span class="bn-icon">🏠</span>
      <span class="bn-label">Home</span>
    </a>
    <a href="#" class="bn-item">
      <span class="bn-icon">🔍</span>
      <span class="bn-label">Search</span>
    </a>
    <a href="#" class="bn-item">
      <span class="bn-icon">❤</span>
      <span class="bn-label">Favorites</span>
    </a>
    <a href="#" class="bn-item">
      <span class="bn-icon">👤</span>
      <span class="bn-label">Profile</span>
    </a>
  </nav>

  <style>
    body { padding-bottom: 5rem; }
  </style>

  <script>
    document.getElementById('darkModeToggle').addEventListener('change', function() {
      document.body.style.setProperty('--bg', this.checked ? '#1a1a2e' : '#fff');
      document.body.style.setProperty('--text', this.checked ? '#e0e0e0' : '#1a1a2e');
    });
  </script>
</body>
</html>
