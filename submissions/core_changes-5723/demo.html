<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo: Dynamic reveal.js support (#5723)</title>
  <link rel="stylesheet" href="../../easemotion.min.css" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; padding: 2rem; background: var(--ease-color-bg); text-align: center; }
    .reveal-box { max-width: 400px; margin: 2rem auto; padding: 3rem; background: var(--ease-color-primary); color: #fff; border-radius: var(--ease-radius-lg); }
    .note { color: var(--ease-color-muted); font-size: var(--ease-text-sm); margin-top: 2rem; }
    button { margin: 1rem; }
  </style>
</head>
<body>
  <h1>Dynamic Reveal Support</h1>
  <button class="ease-btn ease-btn-primary" onclick="addReveal()">Add Dynamic Reveal Element</button>
  <div id="container"></div>
  <p class="note"><code>reveal.js</code> only observes elements present at load. Dynamically-added ones need a public <code>EaseMotionReveal.observe(el)</code> API.</p>
  <script>
    function addReveal() {
      var el = document.createElement('div');
      el.className = 'ease-reveal reveal-box';
      el.textContent = 'Dynamically added — currently invisible without the API fix';
      document.getElementById('container').appendChild(el);
      // With the fix: EaseMotionReveal.observe(el);
    }
  </script>
</body>
</html>
