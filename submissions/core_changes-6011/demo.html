<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo: ease-slide-left/right animations (#6011)</title>
  <link rel="stylesheet" href="../../easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; padding: 2rem; background: var(--ease-color-bg); display: flex; flex-direction: column; align-items: center; }
    .grid { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; margin: 2rem 0; }
    .card { width: 250px; padding: 2rem; border-radius: var(--ease-radius-lg); background: var(--ease-color-surface); box-shadow: var(--ease-shadow-md); text-align: center; }
    .pill { display: inline-block; padding: 0.5rem 1.5rem; border-radius: var(--ease-radius-full); background: var(--ease-color-primary); color: #fff; margin: 0.5rem; }
    .note { color: var(--ease-color-muted); font-size: var(--ease-text-sm); max-width: 500px; text-align: center; }
  </style>
</head>
<body>
  <h1>Horizontal Slide Entrance Animations</h1>
  <div class="grid">
    <div class="card ease-slide-left"><h3>ease-slide-left</h3><p>Slides in from the right</p></div>
    <div class="card ease-slide-right"><h3>ease-slide-right</h3><p>Slides in from the left</p></div>
  </div>
  <div>
    <span class="pill ease-slide-left">Left</span>
    <span class="pill ease-slide-right">Right</span>
  </div>
  <p class="note"><code>ease-slide-left</code> and <code>ease-slide-right</code> — horizontal counterparts to the existing <code>ease-slide-up</code>/<code>ease-slide-down</code>.</p>
</body>
</html>
