<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo — ease-zoom-out fix (#5710)</title>
  <link rel="stylesheet" href="../../easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: Inter, system-ui, sans-serif;
      background: var(--ease-color-bg, #f8fafc);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
    }
    .demo-card {
      background: var(--ease-color-surface, #fff);
      padding: 2rem 3rem;
      border-radius: var(--ease-radius-lg, 1rem);
      box-shadow: var(--ease-shadow-lg);
      text-align: center;
    }
    h2 { margin-top: 0; }
  </style>
</head>
<body>
  <div class="demo-card">
    <h2>ease-zoom-out Demo</h2>
    <p class="ease-text-muted">The box below should zoom out on page load:</p>
    <div class="ease-zoom-out" style="display:inline-block; padding:2rem 4rem; background:var(--ease-color-primary,#6c63ff); color:#fff; border-radius:1rem; font-size:1.25rem;">
      Zoom Out
    </div>
    <p style="margin-top:2rem; font-size:0.875rem; color:var(--ease-color-muted);">
      Without the fix, this animation silently fails. <br/>
      The keyframe <code>ease-kf-zoom-out</code> is provided by <code>style.css</code>
      and should be integrated into <code>core/animations.css</code>.
    </p>
  </div>
</body>
</html>
