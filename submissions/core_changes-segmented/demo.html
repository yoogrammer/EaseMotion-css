<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Segmented Control — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="font-family: system-ui, -apple-system, sans-serif; max-width: 600px; margin: 0 auto; padding: 2rem 1rem; background: var(--bg, #fff); color: var(--text, #1a1a2e);">

  <h1>Segmented Control</h1>
  <p style="color: #666; margin-bottom: 2rem;">CSS-only segmented control using hidden radio inputs — no JavaScript.</p>

  <label style="display: flex; align-items: center; gap: .5rem; cursor: pointer; margin-bottom: 2rem;">
    <input type="checkbox" id="darkModeToggle"> Dark mode
  </label>

  <!-- Default -->
  <section style="margin-bottom: 3rem;">
    <h2>Default</h2>
    <div class="segmented" role="radiogroup" aria-label="View mode">
      <input type="radio" name="view" id="view-days" checked>
      <label class="segmented-item" for="view-days">Days</label>
      <input type="radio" name="view" id="view-weeks">
      <label class="segmented-item" for="view-weeks">Weeks</label>
      <input type="radio" name="view" id="view-months">
      <label class="segmented-item" for="view-months">Months</label>
    </div>
  </section>

  <!-- Sizes -->
  <section style="margin-bottom: 3rem;">
    <h2>Size Variants</h2>
    <h3>Small</h3>
    <div class="segmented segmented-sm" role="radiogroup" aria-label="Size sm">
      <input type="radio" name="size-sm" id="size-sm-a" checked>
      <label class="segmented-item" for="size-sm-a">XS</label>
      <input type="radio" name="size-sm" id="size-sm-b">
      <label class="segmented-item" for="size-sm-b">S</label>
      <input type="radio" name="size-sm" id="size-sm-c">
      <label class="segmented-item" for="size-sm-c">M</label>
      <input type="radio" name="size-sm" id="size-sm-d">
      <label class="segmented-item" for="size-sm-d">L</label>
      <input type="radio" name="size-sm" id="size-sm-e">
      <label class="segmented-item" for="size-sm-e">XL</label>
    </div>

    <h3>Default</h3>
    <div class="segmented" role="radiogroup" aria-label="Size base">
      <input type="radio" name="size-base" id="size-base-a" checked>
      <label class="segmented-item" for="size-base-a">Day</label>
      <input type="radio" name="size-base" id="size-base-b">
      <label class="segmented-item" for="size-base-b">Week</label>
      <input type="radio" name="size-base" id="size-base-c">
      <label class="segmented-item" for="size-base-c">Month</label>
    </div>

    <h3>Large</h3>
    <div class="segmented segmented-lg" role="radiogroup" aria-label="Size lg">
      <input type="radio" name="size-lg" id="size-lg-a" checked>
      <label class="segmented-item" for="size-lg-a">Daily</label>
      <input type="radio" name="size-lg" id="size-lg-b">
      <label class="segmented-item" for="size-lg-b">Weekly</label>
      <input type="radio" name="size-lg" id="size-lg-c">
      <label class="segmented-item" for="size-lg-c">Monthly</label>
    </div>
  </section>

  <!-- Color variants -->
  <section style="margin-bottom: 3rem;">
    <h2>Color Variants</h2>
    <h3>Primary (default)</h3>
    <div class="segmented" role="radiogroup" aria-label="Color primary">
      <input type="radio" name="color-p" id="color-p-1" checked>
      <label class="segmented-item" for="color-p-1">Tab 1</label>
      <input type="radio" name="color-p" id="color-p-2">
      <label class="segmented-item" for="color-p-2">Tab 2</label>
      <input type="radio" name="color-p" id="color-p-3">
      <label class="segmented-item" for="color-p-3">Tab 3</label>
    </div>

    <h3>Success</h3>
    <div class="segmented segmented-success" role="radiogroup" aria-label="Color success">
      <input type="radio" name="color-s" id="color-s-1" checked>
      <label class="segmented-item" for="color-s-1">Tab 1</label>
      <input type="radio" name="color-s" id="color-s-2">
      <label class="segmented-item" for="color-s-2">Tab 2</label>
      <input type="radio" name="color-s" id="color-s-3">
      <label class="segmented-item" for="color-s-3">Tab 3</label>
    </div>
  </section>

  <!-- Full width -->
  <section style="margin-bottom: 3rem;">
    <h2>Full Width</h2>
    <div class="segmented segmented-full" role="radiogroup" aria-label="Full width">
      <input type="radio" name="full" id="full-a" checked>
      <label class="segmented-item" for="full-a">Option A</label>
      <input type="radio" name="full" id="full-b">
      <label class="segmented-item" for="full-b">Option B</label>
      <input type="radio" name="full" id="full-c">
      <label class="segmented-item" for="full-c">Option C</label>
    </div>
  </section>

  <!-- Disabled -->
  <section style="margin-bottom: 3rem;">
    <h2>Disabled Item</h2>
    <div class="segmented" role="radiogroup" aria-label="Disabled demo">
      <input type="radio" name="disabled" id="disabled-a" checked>
      <label class="segmented-item" for="disabled-a">Enabled</label>
      <input type="radio" name="disabled" id="disabled-b">
      <label class="segmented-item" for="disabled-b">Enabled</label>
      <input type="radio" name="disabled" id="disabled-c" disabled>
      <label class="segmented-item segmented-disabled" for="disabled-c">Disabled</label>
    </div>
  </section>

  <script>
    document.getElementById('darkModeToggle').addEventListener('change', function() {
      document.body.style.setProperty('--bg', this.checked ? '#1a1a2e' : '#fff');
      document.body.style.setProperty('--text', this.checked ? '#e0e0e0' : '#1a1a2e');
    });
  </script>
</body>
</html>
