<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo: ease-spin rotation (#6010)</title>
  <link rel="stylesheet" href="../../easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; padding: 2rem; background: var(--ease-color-bg); display: flex; flex-direction: column; align-items: center; gap: 2rem; }
    .grid { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
    .icon { width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    .box { width: 100px; height: 100px; background: var(--ease-color-primary); border-radius: var(--ease-radius-lg); display: flex; align-items: center; justify-content: center; color: #fff; }
    .note { color: var(--ease-color-muted); font-size: var(--ease-text-sm); text-align: center; max-width: 500px; }
  </style>
</head>
<body>
  <h1>ease-spin Animation</h1>
  <div class="grid">
    <div class="icon ease-spin">&#x2699;</div>
    <div class="box ease-spin">SPIN</div>
    <span class="ease-spin" style="font-size:3rem;">&#x1F300;</span>
  </div>
  <p class="note"><code>ease-spin</code> applies a continuous rotation animation (1s linear infinite). Works on any element.</p>
</body>
</html>
