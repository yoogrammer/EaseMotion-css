<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro 3D Flip Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <input type="checkbox" id="theme-toggle" class="theme-checkbox" />

  <div class="app-container">
    
    <div class="controls">
      <label for="theme-toggle" class="theme-label">
        <span class="sun-icon">☀️ Light</span>
        <span class="moon-icon">🌙 Dark</span>
        <div class="toggle-ball"></div>
      </label>
    </div>

    <div class="card-perspective">
      <div class="card-inner">
        
        <div class="card-face card-front">
          <div class="card-glow"></div>
          <div class="card-header">
            <span class="brand">NEXUS // ID</span>
            <span class="status-badge">Active</span>
          </div>
          <div class="card-body">
            <div class="avatar-wrapper">
              <div class="avatar-placeholder">JD</div>
            </div>
            <h2 class="user-name">Alex Morgan</h2>
            <p class="user-title">Senior Frontend Architect</p>
          </div>
          <div class="card-footer">
            <span class="hint">Hover to inspect system data</span>
          </div>
        </div>

        <div class="card-face card-back">
          <div class="card-header">
            <span class="brand">CORE STACK</span>
            <span class="serial">#8842-X</span>
          </div>
          <div class="card-body specs">
            <div class="spec-group">
              <span class="spec-label">Primary Core</span>
              <div class="pill-container">
                <span class="pill">TypeScript</span>
                <span class="pill">CSS Engine</span>
                <span class="pill">Next.js</span>
              </div>
            </div>
            <div class="spec-group">
              <span class="spec-label">System Performance</span>
              <div class="progress-bar"><div class="progress-fill" style="width: 94%;"></div></div>
            </div>
          </div>
          <div class="card-footer">
            <a href="#" class="action-btn" onclick="event.stopPropagation();">Access Terminal</a>
          </div>
        </div>

      </div>
    </div>

  </div>

</body>
</html>
