<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-flex-grow-shrink Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { margin: 0; font-family: sans-serif; padding: 2rem; }
    .container { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    .box { background: #6366f1; color: white; padding: 1rem; border-radius: 8px; min-width: 80px; text-align: center; }
  </style>
</head>
<body>
  <h2>ease-flex-grow</h2>
  <div class="container">
    <div class="box ease-flex-grow-1">grow-1 (expands)</div>
    <div class="box ease-flex-grow-0">grow-0 (fixed)</div>
  </div>

  <h2>ease-flex-shrink</h2>
  <div class="container">
    <div class="box ease-flex-shrink-1" style="width:300px">shrink-1 (shrinks)</div>
    <div class="box ease-flex-shrink-0" style="width:300px">shrink-0 (no shrink)</div>
  </div>

  <h2>ease-flex-1 shorthand</h2>
  <div class="container">
    <div class="box ease-flex-1">flex-1</div>
    <div class="box ease-flex-1">flex-1</div>
    <div class="box ease-flex-1">flex-1</div>
  </div>
</body>
</html>
