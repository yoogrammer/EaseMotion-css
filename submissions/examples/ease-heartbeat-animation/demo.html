<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heartbeat Animation Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css@latest/dist/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #fdf2f8;
      margin: 0;
    }
    .container {
      text-align: center;
      background: white;
      padding: 3rem 4rem;
      border-radius: 16px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
    .heart-icon {
      font-size: 5rem;
      color: #e11d48;
      margin: 2rem auto;
      display: inline-block;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>EaseMotion Heartbeat Animation</h2>
    
    <div id="target" class="heart-icon ease-heartbeat">
      ❤️
    </div>
    
    <p style="color: #64748b; margin-top: 2rem;">A perfect double-pulse for "Like" actions or health metrics.</p>
  </div>

</body>
</html>
