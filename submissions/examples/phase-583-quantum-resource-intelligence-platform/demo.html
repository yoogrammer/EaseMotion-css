<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[Phase 583] Quantum Resource Intelligence Platform</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header"><div class="logo"><span class="logo-text">SysDash</span></div></div>
      <nav class="sidebar-nav">
        <a href="#hero" class="nav-item active">Overview</a>
        <a href="#sections" class="nav-item">Operations</a>
      </nav>
      <div class="sidebar-footer"><button class="btn-theme" id="theme-btn">🌓 Toggle Theme</button></div>
    </aside>
    <main class="main-content">
      <header class="top-bar">
        <div class="top-bar-left">
          <span class="badge-tag">Issue #26936</span>
          <h1>Quantum Resource Intelligence Platform</h1>
        </div>
        <div class="top-bar-right"><span class="live-clock" id="live-clock">--:--:--</span></div>
      </header>
      <section class="hero-section" id="hero">
        <div class="hero-grid">
          <div class="hero-card"><h3>Network Integrity</h3><div class="hero-val">NOMINAL</div></div>
          <div class="hero-card"><h3>Performance</h3><div class="hero-val">99.8%</div></div>
        </div>
      </section>
      <section class="sections-area" id="sections">
        <h2 class="section-title">🖥️ Telemetry & Analytics</h2>
        <div class="sections-grid">
          <div class="section-card"><h4>Overview Panel</h4><div class="section-content">Real-time data stream active</div></div>
          <div class="section-card"><h4>Configuration</h4><div class="section-content">Security protocols aligned</div></div>
        </div>
      </section>
    </main>
  </div>
  <script>
    function updateClock() { document.getElementById('live-clock').textContent = new Date().toISOString().replace('T',' ').substring(0,19) + ' UTC'; }
    setInterval(updateClock, 1000); updateClock();
    document.getElementById('theme-btn').addEventListener('click', () => document.body.classList.toggle('light-theme'));
  </script>
</body>
</html>
