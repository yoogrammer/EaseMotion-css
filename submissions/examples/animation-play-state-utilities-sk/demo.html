<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Play State — EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--ease-color-bg, #f8fafc);
            margin: 0;
            padding: 0;
            font-family: var(--ease-font-sans, system-ui, sans-serif);
        }
        .header {
            text-align: center;
            padding: 5rem 1rem 2rem;
        }
        /* Required for bounce demo */
        .ease-bounce {
            animation: ease-kf-bounce 1s infinite alternate;
        }
        @keyframes ease-kf-bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-40px); }
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>Animation Play State</h1>
        <p style="color: var(--ease-color-muted);">Interactive control for playing and pausing animations.</p>
    </header>

    <main class="demo-stage">
        
        <!-- Hover to Pause -->
        <div class="demo-card">
            <div class="demo-ball ease-bounce ease-hover-paused"></div>
            <span class="demo-label">Hover to Pause</span>
            <span class="demo-code">.ease-hover-paused</span>
        </div>

        <!-- Start Paused -->
        <div class="demo-card">
            <div id="controlled-ball" class="demo-ball ease-bounce ease-paused"></div>
            <span class="demo-label">JS Toggle</span>
            <button class="ease-btn ease-btn-sm ease-btn-primary" onclick="togglePlay()">Play / Pause</button>
            <span class="demo-code">.ease-paused</span>
        </div>

        <!-- Always Paused -->
        <div class="demo-card">
            <div class="demo-ball ease-bounce ease-paused"></div>
            <span class="demo-label">Always Paused</span>
            <span class="demo-code">.ease-paused</span>
        </div>

    </main>

    <script>
        function togglePlay() {
            const ball = document.getElementById('controlled-ball');
            ball.classList.toggle('ease-paused');
            ball.classList.toggle('ease-running');
        }
    </script>
</body>
</html>
