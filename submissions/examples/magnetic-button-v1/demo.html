<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnetic Button</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button class="magnetic-btn" id="magBtn">Hover Me</button>

  <script>
    const btn = document.getElementById('magBtn');
    btn.addEventListener('mousemove', (e) => {
      const rect = btn.getBoundingClientRect();
      const x = e.clientX - rect.left - rect.width / 2;
      const y = e.clientY - rect.top - rect.height / 2;
      const dist = Math.min(1, Math.sqrt(x*x + y*y) / 60);
      btn.style.setProperty('--mx', (x * dist * 0.3).toFixed(1) + 'px');
      btn.style.setProperty('--my', (y * dist * 0.3).toFixed(1) + 'px');
    });
    btn.addEventListener('mouseleave', () => {
      btn.style.setProperty('--mx', '0px');
      btn.style.setProperty('--my', '0px');
    });
  </script>
</body>
</html>
