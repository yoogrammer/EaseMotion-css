<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Button Accessibility Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo">
    <button class="ease-btn ease-btn-primary ease-btn-hover">
      Primary Button
    </button>

    <button class="ease-btn ease-btn-success ease-btn-hover">
      Success Button
    </button>

    <button class="ease-btn ease-btn-outline ease-btn-hover">
      Outline Button
    </button>

    <button class="ease-btn ease-btn" disabled>
      Disabled Button
    </button>
  </div>

</body>
</html>
