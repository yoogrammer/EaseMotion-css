<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reveal on Scroll Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">
    <section class="hero">
      <p class="tag">SCROLL ANIMATION</p>
      <h1 class="em-reveal-scroll">Reveal on Scroll</h1>
      <p class="subtitle">
        A lightweight CSS utility that smoothly reveals content with a fade
        and upward motion effect.
      </p>
    </section>

    <div class="card em-reveal-scroll" style="animation-delay: 0.2s;">
      🚀 First Card
    </div>

    <div class="card em-reveal-scroll" style="animation-delay: 0.4s;">
      ✨ Second Card
    </div>

    <div class="card em-reveal-scroll" style="animation-delay: 0.6s;">
      🎯 Third Card
    </div>
  </main>

</body>
</html>
