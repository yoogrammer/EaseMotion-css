<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Climate Weather Widget Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="weather-dashboard">

  <div class="weather-card sunny">

    <div class="weather-header">

      <div>
        <h2>Vijayawada</h2>
        <p>Andhra Pradesh, India</p>
      </div>

      <div class="weather-icon">
        ☀️
      </div>

    </div>

    <div class="temperature-section">

      <h1>32°</h1>

      <span class="condition">
        Sunny
      </span>

    </div>

    <div class="weather-stats">

      <div class="stat-card">
        <h3>65%</h3>
        <p>Humidity</p>
      </div>

      <div class="stat-card">
        <h3>12 km/h</h3>
        <p>Wind</p>
      </div>

      <div class="stat-card">
        <h3>1014</h3>
        <p>Pressure</p>
      </div>

    </div>

    <div class="forecast-section">

      <h3>5-Day Forecast</h3>

      <div class="forecast-grid">

        <div class="forecast-day">
          <span>Mon</span>
          <div>☀️</div>
          <strong>33°</strong>
        </div>

        <div class="forecast-day">
          <span>Tue</span>
          <div>⛅</div>
          <strong>31°</strong>
        </div>

        <div class="forecast-day">
          <span>Wed</span>
          <div>🌦️</div>
          <strong>29°</strong>
        </div>

        <div class="forecast-day">
          <span>Thu</span>
          <div>🌧️</div>
          <strong>28°</strong>
        </div>

        <div class="forecast-day">
          <span>Fri</span>
          <div>☀️</div>
          <strong>34°</strong>
        </div>

      </div>

    </div>

  </div>

</div>

</body>
</html>
