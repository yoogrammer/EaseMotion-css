<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Data Capture Pipeline</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Change Data Capture Pipeline</h1>

    <p class="subtitle">
        Real-time synchronization of database changes across modern data platforms.
    </p>

    <div class="pipeline">

        <div class="sources">

            <div class="node database">
                🗄️ MySQL
            </div>

            <div class="node database">
                🐘 PostgreSQL
            </div>

            <div class="node database">
                🍃 MongoDB
            </div>

        </div>

        <div class="connector"></div>

        <div class="node cdc">
            🔄 CDC Engine
        </div>

        <div class="connector"></div>

        <div class="node broker">
            📡 Event Broker (Kafka)
        </div>

        <div class="connector"></div>

        <div class="node warehouse">
            🏢 Data Warehouse
        </div>

        <div class="connector"></div>

        <div class="outputs">

            <div class="node analytics">
                📊 Analytics
            </div>

            <div class="node dashboard">
                📈 Dashboards
            </div>

            <div class="node reporting">
                📋 Reporting
            </div>

        </div>

    </div>

</div>

</body>
</html>
