<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favorite Animations Feature</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Favorite Animations</h1>

<div class="animation-grid">

  <div class="card" data-animation="Fade In">
    <h3>Fade In</h3>
    <button class="favorite-btn">☆</button>
  </div>

  <div class="card" data-animation="Slide Up">
    <h3>Slide Up</h3>
    <button class="favorite-btn">☆</button>
  </div>

  <div class="card" data-animation="Bounce">
    <h3>Bounce</h3>
    <button class="favorite-btn">☆</button>
  </div>

  <div class="card" data-animation="Zoom In">
    <h3>Zoom In</h3>
    <button class="favorite-btn">☆</button>
  </div>

</div>

<section class="favorites-section">
  <h2>Your Favorites</h2>
  <ul id="favoritesList"></ul>
</section>

<script>
const buttons = document.querySelectorAll(".favorite-btn");
const favoritesList = document.getElementById("favoritesList");

let favorites =
  JSON.parse(localStorage.getItem("favoriteAnimations")) || [];

function renderFavorites() {
  favoritesList.innerHTML = "";

  favorites.forEach(animation => {
    const li = document.createElement("li");
    li.textContent = animation;
    favoritesList.appendChild(li);
  });

  buttons.forEach(btn => {
    const animation =
      btn.parentElement.dataset.animation;

    btn.textContent =
      favorites.includes(animation) ? "★" : "☆";
  });
}

buttons.forEach(btn => {
  btn.addEventListener("click", () => {
    const animation =
      btn.parentElement.dataset.animation;

    if (favorites.includes(animation)) {
      favorites = favorites.filter(
        item => item !== animation
      );
    } else {
      favorites.push(animation);
    }

    localStorage.setItem(
      "favoriteAnimations",
      JSON.stringify(favorites)
    );

    renderFavorites();
  });
});

renderFavorites();
</script>

</body>
</html>
