<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-contract-shadow-emphasis — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif; display: flex; flex-direction: column;
      align-items: center; justify-content: center; min-height: 100vh;
      background: #0f0f0f; gap: 2.5rem; padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; }
    .label { font-size:0.75rem; color:#555; text-align:center; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.75rem; }
    .section { display:flex; flex-direction:column; align-items:center; }
    .row { display:flex; gap:1.5rem; flex-wrap:wrap; justify-content:center; }
    .card {
      width: 180px; height: 120px; border-radius: 12px;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 500; font-size: 0.9rem;
    }
    .reload {
      margin-top:1rem; padding:8px 20px; border-radius:8px;
      border:1px solid #333; background:transparent; color:#888;
      cursor:pointer; font-size:0.8rem;
    }
    .reload:hover { border-color:#666; color:#fff; }
  </style>
</head>
<body>
  <h1>ease-contract-shadow-emphasis</h1>
  <div class="section">
    <div class="label">Entrance variants</div>
    <div class="row">
      <div class="card ease-contract-shadow-emphasis">On load</div>
      <div class="card ease-contract-shadow-emphasis ease-contract-shadow-fast">Fast</div>
      <div class="card ease-contract-shadow-emphasis ease-contract-shadow-slow">Slow</div>
    </div>
  </div>
  <div class="section">
    <div class="label">Looping animations</div>
    <div class="row">
      <div class="card ease-contract-shadow-loop">Loop</div>
      <div class="card ease-contract-shadow-glow">Glow loop</div>
    </div>
  </div>
  <div class="section">
    <div class="label">On cards with content</div>
    <div class="row">
      <div class="ease-card ease-contract-shadow-loop" style="width:220px;text-align:center;">
        <h3 style="margin:0;color:#fff;">Pulse Card</h3>
        <p style="margin:0.5rem 0 0;font-size:0.85rem;color:#888;">Attention-grabbing loop</p>
      </div>
      <div class="ease-card ease-card-shadow ease-contract-shadow-emphasis" style="width:220px;text-align:center;">
        <h3 style="margin:0;color:#fff;">Entrance Card</h3>
        <p style="margin:0.5rem 0 0;font-size:0.85rem;color:#888;">Plays once on load</p>
      </div>
    </div>
  </div>
  <button class="reload" onclick="location.reload()">↺ Replay</button>
</body>
</html>
