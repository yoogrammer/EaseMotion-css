<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coupon Peel Card Effect</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo-wrapper">
    <section class="intro">
      <h1>Coupon Peel Card</h1>
      <p>A CSS-only hover effect where the coupon corner peels smoothly.</p>
    </section>

    <section class="coupon-card">
      <span class="badge">LIMITED OFFER</span>
      <h2>50% OFF</h2>
      <p>Use code <strong>EASE50</strong> and save on your next purchase.</p>
      <button>Claim Offer</button>
    </section>
  </main>
</body>
</html>
