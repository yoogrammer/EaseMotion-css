<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Widget</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="widget">
    <div class="widget-header">
      <h1 class="city-name" id="cityName">San Francisco</h1>
      <button class="refresh-btn" id="refreshBtn">&#x21bb; Refresh</button>
    </div>
    <div class="weather-main">
      <span class="weather-icon" id="weatherIcon">☀️</span>
      <span class="temperature" id="temperature">72°F</span>
    </div>
    <div class="weather-condition" id="condition">Sunny</div>
    <div class="weather-details">
      <div class="detail-item">
        <span class="detail-label">Humidity</span>
        <span class="detail-value" id="humidity">45%</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Wind</span>
        <span class="detail-value" id="windSpeed">12 mph</span>
      </div>
    </div>
  </div>
  <script>
    const conditions = [
      { icon: '☀️', label: 'Sunny' },
      { icon: '⛅', label: 'Partly Cloudy' },
      { icon: '☁️', label: 'Cloudy' },
      { icon: '🌧️', label: 'Rainy' },
      { icon: '🌩️', label: 'Thunderstorms' },
      { icon: '🌨️', label: 'Snowy' },
      { icon: '🌫️', label: 'Foggy' },
    ];

    function randomRange(min, max) {
      return Math.round(min + Math.random() * (max - min));
    }

    function updateWeather() {
      const temp = randomRange(40, 100);
      document.getElementById('temperature').textContent = temp + '°F';
      const humidity = randomRange(20, 90);
      document.getElementById('humidity').textContent = humidity + '%';
      const wind = randomRange(0, 30);
      document.getElementById('windSpeed').textContent = wind + ' mph';
      const idx = Math.floor(Math.random() * conditions.length);
      document.getElementById('weatherIcon').textContent = conditions[idx].icon;
      document.getElementById('condition').textContent = conditions[idx].label;
    }

    document.getElementById('refreshBtn').addEventListener('click', updateWeather);
  </script>
</body>
</html>
