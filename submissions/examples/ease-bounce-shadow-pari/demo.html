<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bounce Shadow Entrance</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>Bounce Shadow Entrance</h2>
    <div id="box1" class="bounce-shadow-entrance" style="
      background: white;
      border-radius: 12px;
      padding: 24px 32px;
      font-size: 15px;
      font-weight: 600;
      color: #6c63ff;
      border: 1px solid #ede9ff;
    ">
      ✦ I bounced in!
    </div>
    <button class="replay-btn" onclick="replay('box1','bounce-shadow-entrance')">↺ Replay</button>
  </div>

  <div class="card">
    <h2>Slow Bounce Entrance</h2>
    <div id="box2" class="bounce-shadow-slow" style="
      background: white;
      border-radius: 12px;
      padding: 24px 32px;
      font-size: 15px;
      font-weight: 600;
      color: #10b981;
      border: 1px solid #e6faf3;
    ">
      ✦ Slow and smooth!
    </div>
    <button class="replay-btn green" onclick="replay('box2','bounce-shadow-slow')">↺ Replay</button>
  </div>

  <script>
    function replay(id, cls) {
      const el = document.getElementById(id);
      el.classList.remove(cls);
      void el.offsetWidth;
      el.classList.add(cls);
    }
  </script>

</body>
</html>
