<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typewriter Text Animation</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', monospace;
      background: #0f0f0f;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px;
    }

    .section-label {
      font-size: 0.75rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 8px;
    }

    .demo-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }

    /* Example 1 */
    .demo-hero {
      font-size: 2rem;
      font-weight: bold;
      color: #6c63ff;
    }

    /* Example 2 */
    .demo-subtitle {
      font-size: 1.2rem;
      color: #f59e0b;
    }

    /* Example 3 */
    .demo-small {
      font-size: 0.95rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <!-- Example 1: Hero heading — types once -->
  <div class="demo-block">
    <p class="section-label">Hero Heading — types once</p>
    <h1 class="demo-hero typewriter-text">
      Hello, I am a Developer.
    </h1>
  </div>

  <!-- Example 2: Looping typewriter -->
  <div class="demo-block">
    <p class="section-label">Loop variant — types back and forth</p>
    <h2 class="demo-subtitle typewriter-loop">
      Building beautiful UIs.
    </h2>
  </div>

  <!-- Example 3: Fast variant -->
  <div class="demo-block">
    <p class="section-label">Fast variant</p>
    <p class="demo-small typewriter-loop typewriter-fast">
      Animation-first CSS framework.
    </p>
  </div>

  <!-- Example 4: Slow variant -->
  <div class="demo-block">
    <p class="section-label">Slow variant</p>
    <p class="demo-small typewriter-loop typewriter-slow">
      Zero dependencies. Pure CSS.
    </p>
  </div>

</body>
</html>
