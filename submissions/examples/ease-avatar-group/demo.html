<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Group — EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--ease-color-bg, #f8fafc);
            margin: 0;
            color: var(--ease-color-text, #1e293b);
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        .header {
            margin-bottom: 4rem;
            padding-top: 4rem;
        }
        .demo-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-bottom: 4rem;
        }
        .label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--ease-color-muted, #64748b);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem;">Avatar Group</h1>
            <p style="color: var(--ease-color-muted); max-width: 500px; margin: 0 auto;">Overlapping avatar stacks with smooth hover reveals and overflow states.</p>
        </header>

        <main class="ease-avatar-group-section">
            
            <!-- Default Size -->
            <div class="demo-row">
                <span class="label">Default (Medium)</span>
                <div class="ease-avatar-group">
                    <img class="ease-avatar-group-item" src="https://i.pravatar.cc/150?u=1" alt="User 1">
                    <img class="ease-avatar-group-item" src="https://i.pravatar.cc/150?u=2" alt="User 2">
                    <img class="ease-avatar-group-item" src="https://i.pravatar.cc/150?u=3" alt="User 3">
                    <img class="ease-avatar-group-item" src="https://i.pravatar.cc/150?u=4" alt="User 4">
                    <div class="ease-avatar-group-count">+5</div>
                </div>
            </div>

            <!-- Small Size -->
            <div class="demo-row">
                <span class="label">Small</span>
                <div class="ease-avatar-group ease-avatar-group--sm">
                    <img class="ease-avatar-group-item" src="https://i.pravatar.cc/150?u=5" alt="User 5">
                    <img class="ease-avatar-group-item" src="https://i.pravatar.cc/150?u=6" alt="User 6">
                    <img class="ease-avatar-group-item" src="https://i.pravatar.cc/150?u=7" alt="User 7">
                    <div class="ease-avatar-group-count">+2</div>
                </div>
            </div>

            <!-- Large Size -->
            <div class="demo-row">
                <span class="label">Large</span>
                <div class="ease-avatar-group ease-avatar-group--lg">
                    <img class="ease-avatar-group-item" src="https://i.pravatar.cc/150?u=10" alt="User 10">
                    <img class="ease-avatar-group-item" src="https://i.pravatar.cc/150?u=11" alt="User 11">
                    <img class="ease-avatar-group-item" src="https://i.pravatar.cc/150?u=12" alt="User 12">
                    <img class="ease-avatar-group-item" src="https://i.pravatar.cc/150?u=13" alt="User 13">
                    <div class="ease-avatar-group-count">+12</div>
                </div>
            </div>

            <!-- Custom Overlap -->
            <div class="demo-row">
                <span class="label">Increased Overlap</span>
                <div class="ease-avatar-group" style="--ease-avatar-overlap: -1.25rem;">
                    <img class="ease-avatar-group-item" src="https://i.pravatar.cc/150?u=20" alt="User 20">
                    <img class="ease-avatar-group-item" src="https://i.pravatar.cc/150?u=21" alt="User 21">
                    <img class="ease-avatar-group-item" src="https://i.pravatar.cc/150?u=22" alt="User 22">
                    <div class="ease-avatar-group-count">+1</div>
                </div>
            </div>

        </main>
    </div>

</body>
</html>
