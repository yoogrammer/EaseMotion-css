<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Badge Components · CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Badge Components</h1>
  <p class="subtitle">Dot badges, counter badges, icon badges — all pure CSS.</p>

  <section>
    <h2>Dot Badges</h2>
    <div class="demo-row">
      <span class="badge-dot"></span>
      <span class="badge-dot badge-success"></span>
      <span class="badge-dot badge-warning"></span>
      <span class="badge-dot badge-error"></span>
      <span class="badge-dot badge-pulse"></span>
    </div>
  </section>

  <section>
    <h2>Counter Badges</h2>
    <div class="demo-row">
      <div class="badge-container">
        <span class="badge-counter">3</span>
        <span class="badge-base">Notifications</span>
      </div>
      <div class="badge-container">
        <span class="badge-counter badge-top-left">9</span>
        <span class="badge-base">Inbox</span>
      </div>
      <div class="badge-container">
        <span class="badge-counter badge-error">42</span>
        <span class="badge-base">Alerts</span>
      </div>
      <div class="badge-container">
        <span class="badge-counter badge-success badge-bottom-right">7</span>
        <span class="badge-base">Done</span>
      </div>
    </div>
  </section>

  <section>
    <h2>Icon Badges</h2>
    <div class="demo-row">
      <span class="badge-icon">🔔</span>
      <span class="badge-icon badge-error">⚙</span>
      <span class="badge-icon badge-success">✓</span>
      <span class="badge-icon badge-warning">⚠</span>
    </div>
  </section>

  <section>
    <h2>Position Variants</h2>
    <div class="demo-row">
      <div class="badge-container badge-pos-demo">
        <span class="badge-counter badge-top-right">+99</span>
        <span class="badge-base">Top Right</span>
      </div>
      <div class="badge-container badge-pos-demo">
        <span class="badge-counter badge-top-left">5</span>
        <span class="badge-base">Top Left</span>
      </div>
      <div class="badge-container badge-pos-demo">
        <span class="badge-counter badge-bottom-right">12</span>
        <span class="badge-base">Bottom Right</span>
      </div>
      <div class="badge-container badge-pos-demo">
        <span class="badge-counter badge-bottom-left">3</span>
        <span class="badge-base">Bottom Left</span>
      </div>
    </div>
  </section>

  <footer>
    <p>Built with <a href="https://github.com/anomalyco/EaseMotion-css">EaseMotion CSS</a></p>
  </footer>
</body>
</html>
