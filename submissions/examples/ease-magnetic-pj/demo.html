<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Magnetic Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>ease-magnetic</h1>

    <p class="subtitle">
        A cursor-aware hover interaction that gently attracts elements toward the mouse position.
    </p>

    <div class="container">

        <button class="magnetic btn">
            Hover Me
        </button>

        <div class="magnetic card">
            <h3>Magnetic Card</h3>
            <p>
                Smooth attraction towards cursor movement.
            </p>
        </div>

        <a href="#" class="magnetic link">
            Get Started →
        </a>

    </div>

    <script>
        const magneticElements =
            document.querySelectorAll(".magnetic");

        magneticElements.forEach((element) => {

            element.addEventListener("mousemove", (e) => {

                const rect =
                    element.getBoundingClientRect();

                const strength =
                    parseFloat(
                        getComputedStyle(element)
                        .getPropertyValue("--magnetic-strength")
                    );

                const x =
                    (e.clientX -
                    rect.left -
                    rect.width / 2)
                    * strength;

                const y =
                    (e.clientY -
                    rect.top -
                    rect.height / 2)
                    * strength;

                element.style.transform =
                    `translate(${x}px, ${y}px) scale(1.05)`;
            });

            element.addEventListener("mouseleave", () => {

                element.style.transform =
                    "translate(0px, 0px) scale(1)";
            });

        });
    </script>

</body>
</html>
