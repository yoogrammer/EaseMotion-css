<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Before After Slider — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0f172a; }
  </style>
</head>
<body>
  <div class="comparison-slider" id="slider">
    <img src="https://picsum.photos/seed/before/600/400" alt="Before" />
    <div class="after-image" id="afterImage">
      <img src="https://picsum.photos/seed/after/600/400" alt="After" />
    </div>
    <div class="slider-handle" id="handle"></div>
  </div>

  <script>
    const slider = document.getElementById('slider');
    const afterImage = document.getElementById('afterImage');
    const handle = document.getElementById('handle');
    let dragging = false;

    slider.addEventListener('mousedown', () => dragging = true);
    window.addEventListener('mouseup', () => dragging = false);
    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const rect = slider.getBoundingClientRect();
      let x = e.clientX - rect.left;
      x = Math.max(0, Math.min(x, rect.width));
      const pct = (x / rect.width) * 100;
      afterImage.style.width = pct + '%';
      handle.style.left = pct + '%';
    });
  </script>
</body>
</html>
