<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Interactive OTP Input</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="otp-container">
        <h2>Enter Verification Code</h2>
        <p>We've sent a 6-digit code to your account.</p>
        
        <div class="otp-input-group" id="otpGroup">
            <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-8]*">
            <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-8]*">
            <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-8]*">
            <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-8]*">
            <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-8]*">
            <input type="text" class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-8]*">
        </div>

        <div class="button-group">
            <button class="btn btn-verify" id="verifyBtn">Verify Code</button>
            <button class="btn btn-clear" id="clearBtn">Clear</button>
        </div>
    </div>

    <script>
        const inputs = document.querySelectorAll('.otp-box');
        const otpGroup = document.getElementById('otpGroup');
        const verifyBtn = document.getElementById('verifyBtn');
        const clearBtn = document.getElementById('clearBtn');

        // 1. Auto-Advance & Backspace Logic
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                const value = e.target.value;
                // Allow only numbers
                if (isNaN(value)) {
                    e.target.value = '';
                    return;
                }
                
                if (value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                checkCompletion();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // 2. Paste Support Handling
        otpGroup.addEventListener('paste', (e) => {
            e.preventDefault();
            const pasteData = (e.clipboardData || window.clipboardData).getData('text').trim();
            
            if (/^\d+$/.test(pasteData)) { // check if string is numeric
                const numbers = pasteData.split('');
                inputs.forEach((input, index) => {
                    if (numbers[index]) {
                        input.value = numbers[index];
                    }
                });
                // Focus the last box or the next unfilled box
                const focusIndex = Math.min(numbers.length, inputs.length - 1);
                inputs[focusIndex].focus();
                checkCompletion();
            }
        });

        // 3. Add Filled (Success Check Animation) Trigger
        function checkCompletion() {
            const isFull = Array.from(inputs).every(input => input.value !== '');
            if (isFull) {
                inputs.forEach(input => input.classList.add('filled'));
            } else {
                inputs.forEach(input => input.classList.remove('filled'));
            }
        }

        // 4. Trigger Shake Animation on "Wrong Code" Click
        verifyBtn.addEventListener('click', () => {
            // Simulate validation check
            otpGroup.classList.add('shake');
            
            // Remove class after animation ends so it can be re-triggered
            setTimeout(() => {
                otpGroup.classList.remove('shake');
            }, 500);
        });

        // Clear button reset
        clearBtn.addEventListener('click', () => {
            inputs.forEach(input => {
                input.value = '';
                input.classList.remove('filled');
            });
            inputs[0].focus();
        });
    </script>
</body>
</html>
