<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart City Intelligence Dashboard Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      padding: 2rem;
      display: flex;
      justify-content: center;
    }

    .wrapper {
      max-width: 780px;
      width: 100%;
    }

    h2 {
      color: #444;
      text-align: center;
      margin-bottom: 1.25rem;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <h2>Smart City Intelligence Dashboard</h2>

    <div class="ease-city-dashboard">

      <!-- Transit Monitor -->
      <div class="ease-city-panel">
        <h4>Transit Monitor</h4>
        <p class="ease-city-value">142 active</p>
        <div class="ease-transit-track">
          <div class="ease-transit-dot"></div>
          <div class="ease-transit-dot"></div>
          <div class="ease-transit-dot"></div>
        </div>
      </div>

      <!-- Air Quality Gauge -->
      <div class="ease-city-panel" style="text-align: center;">
        <h4>Air Quality</h4>
        <div class="ease-gauge" style="--ease-gauge-pct: 72;">
          <div class="ease-gauge-inner">72</div>
        </div>
        <p class="ease-city-value" style="font-size: 0.85rem; margin-top: 0.5rem;">Good</p>
      </div>

      <!-- Dispatch Controls -->
      <div class="ease-city-panel">
        <h4>Dispatch Control</h4>
        <p class="ease-city-value">3 units</p>
        <div class="ease-dispatch-toggle">
          <span class="ease-dispatch-light"></span> Standby
        </div>
        <div class="ease-dispatch-toggle">
          <span class="ease-dispatch-light alert"></span> Priority Response
        </div>
      </div>

      <!-- Incident Stream -->
      <div class="ease-incident-stream">
        <div class="ease-incident-line">&gt; transit: line 4 delayed near Central Station</div>
        <div class="ease-incident-line">&gt; air quality: sensor grid 12 reporting moderate AQI</div>
        <div class="ease-incident-line">&gt; dispatch: unit 7 rerouted to priority incident</div>
      </div>

    </div>
  </div>

</body>
</html>
