<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Label Input - EaseMotion CSS</title>
  
  <!-- Link to EaseMotion CSS core -->
  <link rel="stylesheet" href="../../../easemotion.css">
  <!-- Link to local styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">
    <header>
      <h1>Floating Label Input</h1>
      <p>A pure CSS form input pattern featuring smooth label float animations upon focus or value insertion. Zero dependencies, zero JavaScript.</p>
    </header>

    <main class="form-card">
      <h2 class="form-title">Create Account</h2>
      
      <form onsubmit="event.preventDefault(); alert('Form submitted!');">
        <!-- Input 1: Full Name -->
        <div class="input-wrapper">
          <input class="input-field" type="text" placeholder=" " id="fullname" required autocomplete="off" />
          <label class="input-label" for="fullname">Full Name</label>
        </div>

        <!-- Input 2: Email -->
        <div class="input-wrapper">
          <input class="input-field" type="email" placeholder=" " id="email" required autocomplete="off" />
          <label class="input-label" for="email">Email Address</label>
        </div>

        <!-- Input 3: Password -->
        <div class="input-wrapper">
          <input class="input-field" type="password" placeholder=" " id="password" required />
          <label class="input-label" for="password">Password</label>
        </div>

        <button type="submit" class="submit-btn">Register</button>
      </form>
    </main>
  </div>

</body>
</html>
