<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Period Tracker - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tracker-wrapper">
    <h1>Period Tracker</h1>
    <div class="calendar-controls">
      <button id="prevMonth" class="nav-btn">←</button>
      <span id="monthYear" class="month-label">June 2026</span>
      <button id="nextMonth" class="nav-btn">→</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
    <div class="info-cards">
      <div class="info-card">
        <span class="info-label">Cycle Length</span>
        <span class="info-value" id="cycleLength">--</span>
      </div>
      <div class="info-card">
        <span class="info-label">Period Duration</span>
        <span class="info-value" id="periodDuration">--</span>
      </div>
      <div class="info-card">
        <span class="info-label">Next Period</span>
        <span class="info-value" id="nextPeriod">--</span>
      </div>
    </div>
    <div class="notes-section">
      <h3>Symptom Notes</h3>
      <div class="notes-list" id="notesList">
        <div class="note-item">
          <input type="text" class="note-input" placeholder="Add a symptom note...">
          <button class="note-add">Add</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    let currentDate = new Date();
    let currentMonth = currentDate.getMonth();
    let currentYear = currentDate.getFullYear();

    let periodDays = [];
    let notes = [];
    let cycleHistory = [];

    const monthYear = document.getElementById('monthYear');
    const calendarGrid = document.getElementById('calendarGrid');
    const cycleLength = document.getElementById('cycleLength');
    const periodDuration = document.getElementById('periodDuration');
    const nextPeriod = document.getElementById('nextPeriod');
    const notesList = document.getElementById('notesList');

    function renderCalendar() {
      monthYear.textContent = new Date(currentYear, currentMonth).toLocaleString('en-US', { month: 'long', year: 'numeric' });
      calendarGrid.innerHTML = '';

      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      days.forEach(d => {
        const h = document.createElement('div');
        h.className = 'cal-header';
        h.textContent = d;
        calendarGrid.appendChild(h);
      });

      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        const e = document.createElement('div');
        e.className = 'cal-day empty';
        calendarGrid.appendChild(e);
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const dayEl = document.createElement('div');
        dayEl.className = 'cal-day';
        dayEl.textContent = d;
        const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        if (periodDays.includes(dateStr)) {
          dayEl.classList.add('period');
        }
        if (dateStr === new Date().toISOString().split('T')[0]) {
          dayEl.classList.add('today');
        }
        dayEl.addEventListener('click', () => {
          const idx = periodDays.indexOf(dateStr);
          if (idx > -1) {
            periodDays.splice(idx, 1);
          } else {
            periodDays.push(dateStr);
          }
          renderCalendar();
          updateStats();
        });
        calendarGrid.appendChild(dayEl);
      }
    }

    function updateStats() {
      if (periodDays.length === 0) {
        cycleLength.textContent = '--';
        periodDuration.textContent = '--';
        nextPeriod.textContent = '--';
        return;
      }

      const sorted = [...periodDays].sort();
      const first = new Date(sorted[0]);
      const last = new Date(sorted[sorted.length - 1]);
      const dur = Math.round((last - first) / (1000 * 60 * 60 * 24)) + 1;
      periodDuration.textContent = dur + ' days';

      const recentSorted = sorted.filter(d => new Date(d) <= new Date());
      if (recentSorted.length >= 2) {
        const lastTwo = recentSorted.slice(-2);
        const d1 = new Date(lastTwo[0]);
        const d2 = new Date(lastTwo[lastTwo.length - 1]);
        const cycle = Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
        cycleLength.textContent = cycle + ' days';

        const next = new Date(lastTwo[lastTwo.length - 1]);
        next.setDate(next.getDate() + cycle);
        nextPeriod.textContent = next.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      } else {
        cycleLength.textContent = 'Need more data';
        const next = new Date(sorted[sorted.length - 1]);
        next.setDate(next.getDate() + 28);
        nextPeriod.textContent = next.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      }
    }

    notesList.querySelector('.note-add').addEventListener('click', () => {
      const input = notesList.querySelector('.note-input');
      const text = input.value.trim();
      if (text) {
        notes.push({ text, date: new Date().toISOString().split('T')[0] });
        input.value = '';
        renderNotes();
      }
    });

    function renderNotes() {
      const items = notesList.querySelectorAll('.note-item:not(:first-child)');
      items.forEach(el => el.remove());
      notes.forEach((n, i) => {
        const el = document.createElement('div');
        el.className = 'note-item';
        el.innerHTML = `<span class="note-text">${n.text} <small>(${n.date})</small></span><button class="note-del" data-idx="${i}">×</button>`;
        notesList.appendChild(el);
      });
      notesList.querySelectorAll('.note-del').forEach(btn => {
        btn.addEventListener('click', () => {
          notes.splice(parseInt(btn.dataset.idx), 1);
          renderNotes();
        });
      });
    }

    document.getElementById('prevMonth').addEventListener('click', () => {
      currentMonth--;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      renderCalendar();
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
      currentMonth++;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      renderCalendar();
    });

    renderCalendar();
    updateStats();
  </script>
</body>
</html>
