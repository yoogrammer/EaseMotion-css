<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-shadow Box-Shadow Utilities – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
      background: #f0f4f8;
      padding: 2rem;
    }

    h1 {
      color: #333;
      font-size: 1.4rem;
      margin-bottom: 0;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 800px;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 1.5rem 1rem;
      text-align: center;
      cursor: pointer;
    }

    .card h3 {
      font-size: 0.85rem;
      color: #888;
      margin: 0 0 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card code {
      font-size: 0.8rem;
      color: #555;
      background: #f5f5f5;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .hint {
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <h1>ease-shadow — Box Shadow Utilities</h1>
  <p class="hint">Hover over each card to see the shadow effect</p>

  <div class="demo-grid">

    <div class="card ease-shadow-none">
      <h3>No Shadow</h3>
      <code>.ease-shadow-none</code>
    </div>

    <div class="card ease-shadow-sm">
      <h3>Small</h3>
      <code>.ease-shadow-sm</code>
    </div>

    <div class="card ease-shadow">
      <h3>Default</h3>
      <code>.ease-shadow</code>
    </div>

    <div class="card ease-shadow-lg">
      <h3>Large</h3>
      <code>.ease-shadow-lg</code>
    </div>

    <div class="card ease-shadow-xl">
      <h3>Extra Large</h3>
      <code>.ease-shadow-xl</code>
    </div>

    <div class="card ease-shadow-inner">
      <h3>Inner</h3>
      <code>.ease-shadow-inner</code>
    </div>

  </div>

</body>
</html>
