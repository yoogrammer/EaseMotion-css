<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-divider — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: #0f0e17;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 3rem 2rem;
      min-height: 100vh;
    }
    h1 { font-size: 2rem; margin-bottom: 0.25rem; }
    .subtitle { color: rgba(255,255,255,0.5); margin-bottom: 2.5rem; }
    .section { max-width: 420px; margin-bottom: 2rem; }
    p.label { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-bottom: 0.5rem; }
    code {
      font-size: 12px;
      background: rgba(108,99,255,0.15);
      color: #a78bfa;
      border: 1px solid rgba(108,99,255,0.3);
      padding: 0.15em 0.6em;
      border-radius: 999px;
    }
    .mock-text { color: rgba(255,255,255,0.3); font-size: 0.9rem; }
    .inline-row { display: flex; align-items: center; }
    /* dark theme overrides */
    .ease-divider,
    .ease-divider-text::before,
    .ease-divider-text::after { background: rgba(255,255,255,0.12); }
    .ease-divider-vertical { background: rgba(255,255,255,0.2); }
    .ease-divider-text { color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <h1>ease-divider</h1>
  <p class="subtitle">Divider utilities — Issue #261</p>

  <div class="section">
    <p class="label"><code>ease-divider</code> — horizontal rule</p>
    <span class="mock-text">Section above</span>
    <hr class="ease-divider" />
    <span class="mock-text">Section below</span>
  </div>

  <div class="section">
    <p class="label"><code>ease-divider-text</code> — with center text</p>
    <div class="ease-divider-text">or</div>
    <div class="ease-divider-text">continue with</div>
  </div>

  <div class="section">
    <p class="label"><code>ease-divider-vertical</code> — inline separator</p>
    <div class="inline-row">
      <span class="mock-text">Privacy</span>
      <span class="ease-divider-vertical"></span>
      <span class="mock-text">Terms</span>
      <span class="ease-divider-vertical"></span>
      <span class="mock-text">Contact</span>
    </div>
  </div>
</body>
</html>
