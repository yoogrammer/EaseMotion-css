<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drag and Drop List</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f1f5f9;">
    <div class="dd-card">
      <h2 class="dd-h2">Task List</h2>
      <ul class="dd-list" id="ddList">
        <li class="dd-item" draggable="true">Design homepage mockup</li>
        <li class="dd-item" draggable="true">Write API documentation</li>
        <li class="dd-item" draggable="true">Set up CI/CD pipeline</li>
        <li class="dd-item" draggable="true">Review pull requests</li>
        <li class="dd-item" draggable="true">Update dependencies</li>
      </ul>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
