<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spin Centered Compatibility Fix Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>Loading Button Spinner — Centered Without translate in Keyframes</h2>

  <button class="ease-btn ease-btn-primary ease-btn-loading">Submitting...</button>

  <p>The spinner uses absolute positioning with negative margins instead of <code>translate</code> inside keyframes, ensuring it stays centered across all browsers, including older Safari and Firefox.</p>

</body>
</html>
