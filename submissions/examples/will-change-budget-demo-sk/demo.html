<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>will-change Animation Budget Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>will-change Animation Budget</h1>

    <div class="controls">
        <label>
            <input type="checkbox" id="optimise" />
            Enable <code>will-change: transform</code> on right panel
        </label>
    </div>

    <div class="panel-labels">
        <div class="panel-label">
            Left — <span class="badge badge-bad">margin-top</span> (layout recalc every frame)
        </div>
        <div class="panel-label" id="right-label">
            Right — <span class="badge badge-bad" id="right-badge">margin-top</span> (toggle above to compare)
        </div>
    </div>

    <div class="panels">
        <div class="ease-panel ease-panel-layout" id="left-panel">
            <!-- 25 balls generated by JS -->
        </div>
        <div class="ease-panel ease-panel-compare" id="right-panel">
            <!-- 25 balls generated by JS -->
        </div>
    </div>

    <div class="legend">
        <span><span class="badge badge-bad">margin-top</span> triggers layout → paint → composite</span>
        <span><span class="badge badge-good">transform</span> skips layout and paint — compositor only</span>
    </div>

    <script>
        const count = 25;
        const leftPanel  = document.getElementById('left-panel');
        const rightPanel = document.getElementById('right-panel');

        for (let i = 0; i < count; i++) {
            const delay = ((i * 0.055) % 1.4).toFixed(3);
            const hue   = 200 + (i * 6);
            const color = `oklch(60% 0.18 ${hue}deg)`;
            const styles = `--delay:-${delay}s; background:${color}`;

            leftPanel.insertAdjacentHTML('beforeend',  `<div class="ease-ball" style="${styles}"></div>`);
            rightPanel.insertAdjacentHTML('beforeend', `<div class="ease-ball" style="${styles}"></div>`);
        }

        document.getElementById('optimise').addEventListener('change', function () {
            const label = document.getElementById('right-label');
            const badge = document.getElementById('right-badge');
            if (this.checked) {
                badge.textContent = 'transform + will-change';
                badge.className = 'badge badge-good';
                label.innerHTML = `Right — <span class="badge badge-good" id="right-badge">transform + will-change</span> (compositor only)`;
            } else {
                label.innerHTML = `Right — <span class="badge badge-bad" id="right-badge">margin-top</span> (toggle above to compare)`;
            }
        });
    </script>

</body>
</html>
