<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-reveal — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 800;
      color: #333;
    }
    .section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 4rem 2rem;
    }
    .label { font-size: 0.75rem; color: #888; text-align: center; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem 3rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      font-weight: 600;
      font-size: 1.1rem;
      text-align: center;
      width: 280px;
    }
    .row { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>

  <div class="hero">👇 Scroll down to see reveals</div>

  <div class="section">
    <div class="label">Direction variants</div>
    <div class="card ease-reveal ease-reveal-up">Slide Up ↑</div>
    <div class="card ease-reveal ease-reveal-down">Slide Down ↓</div>
    <div class="card ease-reveal ease-reveal-left">Slide Left ←</div>
    <div class="card ease-reveal ease-reveal-right">Slide Right →</div>
    <div class="card ease-reveal ease-reveal-fade">Fade Only</div>
  </div>

  <div class="section">
    <div class="label">Staggered delay variants</div>
    <div class="row">
      <div class="card ease-reveal ease-reveal-up ease-delay-100">Delay 100ms</div>
      <div class="card ease-reveal ease-reveal-up ease-delay-200">Delay 200ms</div>
      <div class="card ease-reveal ease-reveal-up ease-delay-300">Delay 300ms</div>
      <div class="card ease-reveal ease-reveal-up ease-delay-500">Delay 500ms</div>
    </div>
  </div>

  <div class="section">
    <div class="label">Speed variants</div>
    <div class="row">
      <div class="card ease-reveal ease-reveal-up ease-reveal-fast">Fast</div>
      <div class="card ease-reveal ease-reveal-up">Default</div>
      <div class="card ease-reveal ease-reveal-up ease-reveal-slow">Slow</div>
    </div>
  </div>

</body>
</html>
