<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Threat Flow</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Security Threat Flow Visualization</h1>
    <p class="subtitle">
        Visual representation of request validation and protection layers.
    </p>

    <div class="flow">

        <div class="step threat">
            <span class="icon">⚠</span>
            <h3>External Request</h3>
            <p>Incoming traffic</p>
        </div>

        <div class="connector"></div>

        <div class="step firewall">
            <span class="icon">🛡</span>
            <h3>Firewall</h3>
            <p>Threat filtering</p>
        </div>

        <div class="connector"></div>

        <div class="step auth">
            <span class="icon">🔐</span>
            <h3>Authentication</h3>
            <p>User verification</p>
        </div>

        <div class="connector"></div>

        <div class="step authorization">
            <span class="icon">✅</span>
            <h3>Authorization</h3>
            <p>Permission checks</p>
        </div>

        <div class="connector"></div>

        <div class="step resource">
            <span class="icon">💾</span>
            <h3>Protected Resource</h3>
            <p>Secure access</p>
        </div>

    </div>

</div>

</body>
</html>
