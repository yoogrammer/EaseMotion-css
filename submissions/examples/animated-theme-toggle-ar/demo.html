<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sun to Moon Theme Toggle Example</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f8fafc;
      color: #334155;
      gap: 3rem;
      transition: background-color 0.5s ease, color 0.5s ease;
    }
    body.dark {
      background-color: #0f172a;
      color: #e2e8f0;
    }
    .container {
      text-align: center;
      max-width: 500px;
      padding: 2rem;
    }
    .label {
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: #64748b;
      transition: color 0.5s ease;
    }
    body.dark .label {
      color: #94a3b8;
    }
  </style>
</head>
<body id="page">
  <div class="container">
    <h1>Sun ↔ Moon Toggle</h1>
    <p>A pure CSS icon animation morphing a Sun into a crescent Moon. Click the button to toggle.</p>

    <button
      class="theme-toggle-btn"
      id="toggleBtn"
      aria-label="Toggle light/dark theme"
      onclick="
        this.classList.toggle('is-dark');
        document.getElementById('page').classList.toggle('dark');
        document.getElementById('stateLabel').textContent =
          this.classList.contains('is-dark') ? '🌙 Dark Mode' : '☀️ Light Mode';
      "
    ></button>

    <p class="label" id="stateLabel">☀️ Light Mode</p>
  </div>
</body>
</html>
