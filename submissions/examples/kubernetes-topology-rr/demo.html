<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kubernetes Cluster Topology</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Kubernetes Cluster Topology</h1>
    <p class="subtitle">
        Visual representation of traffic flow and cluster resources.
    </p>

    <div class="topology">

        <div class="node ingress">Ingress</div>

        <div class="v-line line1"></div>

        <div class="node service">Service</div>

        <div class="v-line line2"></div>

        <div class="pods">

            <div class="node pod">Pod A</div>
            <div class="node pod">Pod B</div>
            <div class="node pod">Pod C</div>

        </div>

        <div class="v-line line3"></div>

        <div class="bottom">

            <div class="node database">Database</div>
            <div class="node cache">Redis Cache</div>

        </div>

    </div>

</div>

</body>
</html>
