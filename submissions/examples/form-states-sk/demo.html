<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form States — EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--ease-color-bg, #f8fafc);
            margin: 0;
            padding: 4rem 1.5rem;
            font-family: var(--ease-font-sans, system-ui, sans-serif);
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--ease-color-text, #1e293b);
        }
        .demo-card {
            background: var(--ease-color-surface, #fff);
            padding: 2.5rem;
            border-radius: var(--ease-radius-lg, 1rem);
            box-shadow: var(--ease-shadow-md);
            margin-bottom: 3rem;
        }
        .state-label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--ease-color-muted, #64748b);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="margin-bottom: 1rem;">Form Input States</h1>
        <p style="color: var(--ease-color-muted); margin-bottom: 3rem;">Testing :disabled and [readonly] visual feedback.</p>

        <!-- Inputs -->
        <div class="demo-card">
            <h2 class="section-title">Standard Inputs</h2>
            
            <div class="ease-field">
                <span class="state-label">Enabled (Default)</span>
                <input type="text" class="ease-input" placeholder="Editable field...">
            </div>

            <div class="ease-field">
                <span class="state-label">Disabled</span>
                <input type="text" class="ease-input" disabled value="This field is disabled">
            </div>

            <div class="ease-field">
                <span class="state-label">Read-only</span>
                <input type="text" class="ease-input" readonly value="This field is read-only (selectable but not editable)">
            </div>
        </div>

        <!-- Textareas -->
        <div class="demo-card">
            <h2 class="section-title">Textareas</h2>
            
            <div class="ease-field">
                <span class="state-label">Enabled</span>
                <textarea class="ease-textarea" placeholder="Type something..."></textarea>
            </div>

            <div class="ease-field">
                <span class="state-label">Disabled</span>
                <textarea class="ease-textarea" disabled>This textarea is disabled.</textarea>
            </div>

            <div class="ease-field">
                <span class="state-label">Read-only</span>
                <textarea class="ease-textarea" readonly>This textarea is read-only. You can still select and copy this text, but you cannot change it.</textarea>
            </div>
        </div>

        <!-- Selects -->
        <div class="demo-card">
            <h2 class="section-title">Select Menus</h2>
            
            <div class="ease-field">
                <span class="state-label">Enabled</span>
                <select class="ease-select">
                    <option>Option 1</option>
                    <option>Option 2</option>
                </select>
            </div>

            <div class="ease-field">
                <span class="state-label">Disabled</span>
                <select class="ease-select" disabled>
                    <option>Option 1</option>
                    <option>Option 2</option>
                </select>
            </div>
        </div>
    </div>

</body>
</html>
