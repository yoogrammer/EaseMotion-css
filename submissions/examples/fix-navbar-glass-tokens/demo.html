<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fix: Navbar Glass Tokens — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      padding: 2rem;
      font-family: var(--ease-font-sans);
      transition: background 0.3s;
    }
    .bg-gradient {
      background: linear-gradient(135deg, #6c63ff 0%, #3b82f6 100%);
      padding: 2rem;
      border-radius: var(--ease-radius-lg);
      margin-bottom: 2rem;
    }
    .controls {
      margin-bottom: 1.5rem;
      display: flex;
      gap: 1rem;
    }
    h2 { margin-bottom: 1rem; }
    p { color: var(--ease-color-muted); margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <h2>Navbar Glass Token Fix</h2>
  <p>Toggle dark mode to see the navbar adapt using <code>--ease-glass-bg</code> and <code>--ease-glass-border</code> tokens.</p>

  <div class="controls">
    <button class="ease-btn ease-btn-primary" onclick="document.documentElement.setAttribute('data-theme','dark')">Dark Mode</button>
    <button class="ease-btn ease-btn-outline" onclick="document.documentElement.removeAttribute('data-theme')">Light Mode</button>
  </div>

  <div class="bg-gradient">
    <nav class="ease-navbar-glass">
      <span style="font-weight:700;">EaseMotion</span>
      <div style="display:flex;gap:1rem;">
        <a href="#">Home</a>
        <a href="#">Docs</a>
        <a href="#">GitHub</a>
      </div>
    </nav>
  </div>

  <div class="bg-gradient">
    <nav class="ease-navbar-glass ease-navbar-glass-blur">
      <span style="font-weight:700;">Glass Blur Variant</span>
      <div style="display:flex;gap:1rem;">
        <a href="#">Home</a>
        <a href="#">Docs</a>
      </div>
    </nav>
  </div>
</body>
</html>
