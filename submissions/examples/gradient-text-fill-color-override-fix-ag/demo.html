<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gradient Text Fill Color Override Fix</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-container">
    <h1>Gradient Text Inheritance Fix</h1>
    <p>Applying the class to a wrapper should not make child white/colored text invisible.</p>
    <div class="gradient-text-wrapper ease-gradient-text-fixed">
      Gradient Heading
      <span class="normal-text">This child text is white and visible!</span>
    </div>
  </main>
</body>
</html>
