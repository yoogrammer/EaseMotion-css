<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-input-floating — EaseMotion CSS Demo</title>

  <!-- Component stylesheet (would be part of the library bundle) -->
  <link rel="stylesheet" href="ease-input-floating.css" />

  <style>
    /* ── Page chrome only — not part of the component ── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f9;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 2rem 1rem;
    }

    .demo-card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 40px rgba(90, 106, 238, 0.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 460px;
    }

    .demo-card h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1e2233;
      margin: 0 0 0.25rem;
    }
    .demo-card p {
      font-size: 0.85rem;
      color: #8892a4;
      margin: 0 0 2rem;
    }

    .field-stack {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* Override max-width for the demo so fields stretch to the card */
    .ease-input-group {
      max-width: 100%;
    }

    .demo-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #b0b8cc;
      margin-bottom: 0.35rem;
      display: block;
    }

    /* Dark mode page */
    @media (prefers-color-scheme: dark) {
      body        { background: #0f1120; }
      .demo-card  { background: #1a1d2e; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
      .demo-card h1 { color: #e8ecf5; }
    }
  </style>
</head>
<body>

<div class="demo-card">
  <h1>ease-input-floating</h1>
  <p>Pure CSS floating label — zero JavaScript. Try typing in each field.</p>

  <div class="field-stack">

    <!-- ── 1. Basic text ── -->
    <div>
      <span class="demo-label">Basic</span>
      <div class="ease-input-group">
        <input
          type="text"
          id="username"
          class="ease-input-floating"
          placeholder=" "
          autocomplete="username"
        />
        <label for="username" class="ease-label-floating">Username</label>
      </div>
    </div>

    <!-- ── 2. Email with native validation ── -->
    <div>
      <span class="demo-label">Email (with validation)</span>
      <div class="ease-input-group">
        <input
          type="email"
          id="email"
          class="ease-input-floating"
          placeholder=" "
          required
          autocomplete="email"
        />
        <label for="email" class="ease-label-floating">Email address</label>
      </div>
    </div>

    <!-- ── 3. Password ── -->
    <div>
      <span class="demo-label">Password</span>
      <div class="ease-input-group">
        <input
          type="password"
          id="password"
          class="ease-input-floating"
          placeholder=" "
          required
          minlength="8"
          autocomplete="new-password"
        />
        <label for="password" class="ease-label-floating">Password</label>
      </div>
    </div>

    <!-- ── 4. Pre-filled (label should already be floating) ── -->
    <div>
      <span class="demo-label">Pre-filled value</span>
      <div class="ease-input-group">
        <input
          type="text"
          id="city"
          class="ease-input-floating"
          placeholder=" "
          value="Vijayawada"
          autocomplete="address-level2"
        />
        <label for="city" class="ease-label-floating">City</label>
      </div>
    </div>

    <!-- ── 5. Disabled ── -->
    <div>
      <span class="demo-label">Disabled</span>
      <div class="ease-input-group">
        <input
          type="text"
          id="disabled-field"
          class="ease-input-floating"
          placeholder=" "
          value="Cannot edit this"
          disabled
        />
        <label for="disabled-field" class="ease-label-floating">Read-only plan</label>
      </div>
    </div>

  </div><!-- /.field-stack -->
</div><!-- /.demo-card -->

</body>
</html>
