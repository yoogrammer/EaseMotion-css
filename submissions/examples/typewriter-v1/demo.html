<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-typewriter — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 2.5rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-size: 1rem; opacity: 0.5; }
    .row {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1.5rem;
    }
    .item {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .label {
      font-size: 0.7rem;
      color: #555;
    }
    .heading {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
    }
    .sub {
      font-size: 1.2rem;
      font-weight: 500;
      color: #ccc;
    }
    .mono {
      font-size: 1rem;
      color: #4ade80;
    }
  </style>
</head>
<body>

  <h1>ease-typewriter Demo</h1>

  <div class="row">
    <div class="item">
      <div class="label">Default</div>
      <p class="heading ease-typewriter" style="--ease-type-chars: 14;">Hello, World!</p>
    </div>

    <div class="item">
      <div class="label">No cursor</div>
      <p class="sub ease-typewriter ease-typewriter-no-cursor" style="--ease-type-chars: 20;">No blinking cursor here</p>
    </div>

    <div class="item">
      <div class="label">Fast speed</div>
      <p class="sub ease-typewriter ease-typewriter-fast" style="--ease-type-chars: 12;">Fast typing!</p>
    </div>

    <div class="item">
      <div class="label">Slow speed</div>
      <p class="sub ease-typewriter ease-typewriter-slow" style="--ease-type-chars: 16;">Slow and steady...</p>
    </div>

    <div class="item">
      <div class="label">Terminal style (mono + delay)</div>
      <p class="mono ease-typewriter ease-typewriter-mono ease-delay-300" style="--ease-type-chars: 22;">$ npm install easemotion</p>
    </div>

    <div class="item">
      <div class="label">Staggered delay</div>
      <p class="sub ease-typewriter ease-delay-500" style="--ease-type-chars: 18;">Delayed reveal...</p>
    </div>
  </div>

</body>
</html>
