<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elastic Range Slider – EaseMotion CSS</title>
  <meta name="description" content="Range slider with elastic bounce thumb animation on release." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Elastic Range Slider</h1>
  <p>Drag and release — the thumb bounces elastically</p>

  <div class="slider-wrap">
    <label for="volume">Volume</label>
    <div class="slider-track">
      <div class="slider-fill" id="fill"></div>
      <input type="range" id="volume" min="0" max="100" value="65" class="slider-input" />
      <div class="slider-thumb-visual" id="thumbVisual"></div>
    </div>
    <output id="valueOut">65</output>
  </div>

  <script>
    const input = document.getElementById('volume');
    const fill = document.getElementById('fill');
    const thumb = document.getElementById('thumbVisual');
    const out = document.getElementById('valueOut');

    function update() {
      const v = input.value;
      const pct = v + '%';
      fill.style.width = pct;
      thumb.style.left = pct;
      out.textContent = v;
    }

    input.addEventListener('input', update);
    input.addEventListener('change', () => {
      thumb.classList.add('bounce');
      thumb.addEventListener('animationend', () => thumb.classList.remove('bounce'), { once: true });
    });
    update();
  </script>
</body>
</html>
