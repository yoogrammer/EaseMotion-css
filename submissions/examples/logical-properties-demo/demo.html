<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logical Properties Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="logo">Logo</div>
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Services</a>
    </nav>
    <button class="btn">Get Started</button>
  </header>

  <main>
    <h1>Logical Properties</h1>
    <p class="subtitle">Click the button to toggle between LTR and RTL layouts.</p>

    <button id="dir-toggle" class="btn dir-btn">Switch to RTL</button>

    <div class="card-grid">
      <div class="card">
        <h2>Inline Start</h2>
        <p>This card uses <code>border-inline-start</code> for its accent — it flips automatically.</p>
      </div>
      <div class="card">
        <h2>Block Padding</h2>
        <p><code>padding-block</code> and <code>margin-inline</code> keep spacing logical.</p>
      </div>
    </div>
  </main>

  <script>
    const toggle = document.getElementById('dir-toggle');
    const html = document.documentElement;

    toggle.addEventListener('click', () => {
      const isLtr = html.dir === 'ltr';
      html.dir = isLtr ? 'rtl' : 'ltr';
      toggle.textContent = isLtr ? 'Switch to LTR' : 'Switch to RTL';
    });
  </script>
</body>
</html>
