<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Interactive Multi-Select Filter Cloud</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 460px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Filter Cloud Cascade Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Click the option pills below. Cross-matrix sibling combinators evaluate form parameters to animate output tags at 60fps with 0 script layers.</p>
  </header>

  <div class="alm-filter-cloud-workspace">
    
    <input type="checkbox" id="filter-opt-1" class="alm-filter-checkbox">
    <input type="checkbox" id="filter-opt-2" class="alm-filter-checkbox">
    <input type="checkbox" id="filter-opt-3" class="alm-filter-checkbox">
    
    <div class="alm-selected-pills-output-plate">
      
      <span class="alm-cloud-placeholder-text">No filters selected. Click choices below to query clusters.</span>
      
      <span class="alm-cloud-tag-pill" id="tag-pill-1">Cluster_Alpha <span class="alm-pill-dismiss-cross">✕</span></span>
      <span class="alm-cloud-tag-pill" id="tag-pill-2">Socket_Beta <span class="alm-pill-dismiss-cross">✕</span></span>
      <span class="alm-cloud-tag-pill" id="tag-pill-3">Database_Gamma <span class="alm-pill-dismiss-cross">✕</span></span>
      
    </div>

    <div class="alm-filter-options-deck">
      <label for="filter-opt-1" class="alm-filter-clickable-trigger">Cluster: Alpha</label>
      <label for="filter-opt-2" class="alm-filter-clickable-trigger">Socket: Beta</label>
      <label for="filter-opt-3" class="alm-filter-clickable-trigger">Database: Gamma</label>
    </div>

  </div>

</body>
</html>
