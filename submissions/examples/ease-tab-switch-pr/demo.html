<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Tab Switch PR</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>Ease Tab Switch</h1>
    <section class="tabs">
      <input checked id="tab-one" name="tabs" type="radio" />
      <input id="tab-two" name="tabs" type="radio" />
      <div class="tab-list">
        <label for="tab-one">Overview</label>
        <label for="tab-two">Details</label>
      </div>
      <article class="panel panel-one"><h2>Overview</h2><p>Crossfade between panels using only CSS radio state.</p></article>
      <article class="panel panel-two"><h2>Details</h2><p>The active panel fades in and shifts up for a polished transition.</p></article>
    </section>
  </main>
</body>
</html>
