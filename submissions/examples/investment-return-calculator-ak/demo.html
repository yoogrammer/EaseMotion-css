<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investment Return Calculator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator-wrapper">
    <h1>Investment Calculator</h1>
    <div class="form-grid">
      <div class="field">
        <label for="principal">Principal ($)</label>
        <input type="number" id="principal" class="input" value="10000" min="0">
      </div>
      <div class="field">
        <label for="monthlyAdd">Monthly Contribution ($)</label>
        <input type="number" id="monthlyAdd" class="input" value="500" min="0">
      </div>
      <div class="field">
        <label for="annualReturn">Annual Return (%)</label>
        <input type="number" id="annualReturn" class="input" value="7" min="0" max="100" step="0.1">
      </div>
      <div class="field">
        <label for="years">Investment Period (Years)</label>
        <input type="number" id="years" class="input" value="10" min="1" max="50">
      </div>
      <div class="field">
        <label for="compoundFreq">Compound Frequency</label>
        <select id="compoundFreq" class="input">
          <option value="1">Annually</option>
          <option value="4">Quarterly</option>
          <option value="12" selected>Monthly</option>
          <option value="365">Daily</option>
        </select>
      </div>
    </div>
    <div class="results-grid">
      <div class="result-card">
        <span class="result-label">Total Value</span>
        <span class="result-value accent" id="totalValue">$0</span>
      </div>
      <div class="result-card">
        <span class="result-label">Total Contributions</span>
        <span class="result-value" id="totalContributions">$0</span>
      </div>
      <div class="result-card">
        <span class="result-label">Total Earnings</span>
        <span class="result-value green" id="totalEarnings">$0</span>
      </div>
    </div>
    <div class="chart-section">
      <h2>Growth Chart</h2>
      <div class="bar-chart" id="barChart"></div>
      <div class="chart-legend">
        <span><span class="dot principal-dot"></span> Principal</span>
        <span><span class="dot earnings-dot"></span> Earnings</span>
      </div>
    </div>
  </div>
  <script>
    const principal = document.getElementById('principal');
    const monthlyAdd = document.getElementById('monthlyAdd');
    const annualReturn = document.getElementById('annualReturn');
    const years = document.getElementById('years');
    const compoundFreq = document.getElementById('compoundFreq');
    const totalValue = document.getElementById('totalValue');
    const totalContributions = document.getElementById('totalContributions');
    const totalEarnings = document.getElementById('totalEarnings');
    const barChart = document.getElementById('barChart');

    function fmt(n) {
      return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function calculate() {
      const P = parseFloat(principal.value) || 0;
      const M = parseFloat(monthlyAdd.value) || 0;
      const r = (parseFloat(annualReturn.value) || 0) / 100;
      const n = parseFloat(years.value) || 1;
      const freq = parseInt(compoundFreq.value);

      let totalContrib = P;
      let totalWithInterest = P;
      const periods = n * freq;
      const ratePerPeriod = r / freq;

      if (r === 0) {
        totalWithInterest = P + M * 12 * n;
        totalContrib = P + M * 12 * n;
      } else {
        for (let i = 0; i < periods; i++) {
          totalWithInterest *= (1 + ratePerPeriod);
          if (i < periods - 1 || true) {
            totalWithInterest += M * (12 / freq);
            totalContrib += M * (12 / freq);
          }
        }
      }

      const earnings = totalWithInterest - totalContrib;

      totalValue.textContent = fmt(totalWithInterest);
      totalContributions.textContent = fmt(totalContrib);
      totalEarnings.textContent = fmt(Math.max(0, earnings));

      barChart.innerHTML = '';
      const numBars = Math.min(n, 20);
      for (let i = 1; i <= numBars; i++) {
        const frac = i / numBars;
        const yearContrib = P + M * 12 * n * frac;
        const yearVal = totalWithInterest * frac;
        const yearEarnings = Math.max(0, yearVal - yearContrib);

        const bar = document.createElement('div');
        bar.className = 'chart-bar';

        const barTotal = document.createElement('div');
        barTotal.className = 'bar-stack';
        const pct = totalWithInterest > 0 ? (yearVal / totalWithInterest) * 100 : 0;

        const principalPortion = document.createElement('div');
        principalPortion.className = 'bar-principal';
        const principalPct = totalWithInterest > 0 ? (yearContrib / totalWithInterest) * 100 : 0;
        principalPortion.style.height = Math.min(principalPct, 100) + '%';

        const earningsPortion = document.createElement('div');
        earningsPortion.className = 'bar-earnings';
        const earningsPct = totalWithInterest > 0 ? (yearEarnings / totalWithInterest) * 100 : 0;
        earningsPortion.style.height = Math.min(earningsPct, 100) + '%';

        barTotal.appendChild(principalPortion);
        barTotal.appendChild(earningsPortion);
        bar.appendChild(barTotal);

        const label = document.createElement('div');
        label.className = 'bar-label';
        label.textContent = 'Yr ' + (i * Math.ceil(n / numBars));
        bar.appendChild(label);

        barChart.appendChild(bar);
      }
    }

    [principal, monthlyAdd, annualReturn, years, compoundFreq].forEach(el => {
      el.addEventListener('input', calculate);
    });
    calculate();
  </script>
</body>
</html>
