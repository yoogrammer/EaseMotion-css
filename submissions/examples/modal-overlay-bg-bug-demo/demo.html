<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modal Overlay – Hardcoded bg</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Bug: hardcoded overlay background</h1>
  <p>The overlay backdrop uses <code>rgba(15, 23, 42, 0.6)</code> directly instead of a CSS variable.</p>

  <p><a href="#modal-demo" class="open-btn">Open Modal</a></p>

  <div class="ease-modal-overlay" id="modal-demo">
    <div class="ease-modal">
      <div class="ease-modal-header">
        <h3>Modal Title</h3>
        <a href="#" class="ease-modal-close">&times;</a>
      </div>
      <div class="ease-modal-body">
        <p>The overlay background is hardcoded as <code>rgba(15, 23, 42, 0.6)</code>.</p>
      </div>
    </div>
  </div>

  <hr />
  <h2>Fix</h2>
  <pre>
background: var(--ease-modal-overlay, rgba(15, 23, 42, 0.6));
  </pre>
</body>
</html>
