<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flip Animation Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>3D Flip Entrance Animation</h1>

    <div class="cards-container">

        <!-- Flip X -->
        <div class="animation-card">

            <button
                class="copy-btn"
                data-copy="ease-flip-x">
                Copy
            </button>

            <div
                class="preview-box"
                id="flipXPreview"
                onclick="playAnimation('flipXPreview','flip-x')">

                Preview
            </div>

            <h3>ease-flip-x</h3>

        </div>

        <!-- Flip Y -->
        <div class="animation-card">

            <button
                class="copy-btn"
                data-copy="ease-flip-y">
                Copy
            </button>

            <div
                class="preview-box"
                id="flipYPreview"
                onclick="playAnimation('flipYPreview','flip-y')">

                Preview
            </div>

            <h3>ease-flip-y</h3>

        </div>

    </div>

    <script>

        function playAnimation(id, cls) {

            const el = document.getElementById(id);

            el.classList.remove(cls);

            void el.offsetWidth;

            el.classList.add(cls);
        }

        document
            .querySelectorAll(".copy-btn")
            .forEach(btn => {

                btn.addEventListener("click", () => {

                    navigator.clipboard.writeText(
                        btn.dataset.copy
                    );

                    const original =
                        btn.textContent;

                    btn.textContent =
                        "Copied!";

                    btn.disabled = true;

                    setTimeout(() => {

                        btn.textContent =
                            original;

                        btn.disabled = false;

                    }, 1500);
                });

            });

    </script>

</body>
</html>
