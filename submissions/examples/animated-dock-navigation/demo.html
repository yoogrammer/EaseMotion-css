<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="EaseMotion CSS — Premium Animated Dock Navigation. A macOS-inspired floating dock built with pure HTML & CSS." />
  <title>Animated Dock Navigation — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- =====================================================
       Page content
       ===================================================== -->
  <main class="page-wrapper">
    <header class="hero">
      <span class="hero__eyebrow">EaseMotion CSS</span>
      <h1 class="hero__title">Dock navigation<br>with a macOS feel</h1>
      <p class="hero__subtitle">
        A minimal floating dock with a soft glass finish,
        restrained motion, and clean Apple-style spacing.
      </p>
    </header>
  </main>

  <!-- =====================================================
       Dock Navigation
       ===================================================== -->
  <nav
    class="dock"
    role="navigation"
    aria-label="Main navigation dock"
  >

    <!-- Home -->
    <a
      href="#home"
      class="dock__item dock__item--active"
      data-label="Home"
      aria-label="Home"
    >
      <span class="dock__icon dock__icon--home" role="img" aria-hidden="true">🏠</span>
      <span class="dock__dot" aria-hidden="true"></span>
    </a>

    <!-- Search -->
    <a
      href="#search"
      class="dock__item"
      data-label="Search"
      aria-label="Search"
    >
      <span class="dock__icon dock__icon--search" role="img" aria-hidden="true">🔍</span>
      <span class="dock__dot" aria-hidden="true"></span>
    </a>

    <!-- Files -->
    <a
      href="#files"
      class="dock__item"
      data-label="Files"
      aria-label="Files"
    >
      <span class="dock__icon dock__icon--files" role="img" aria-hidden="true">📁</span>
      <span class="dock__dot" aria-hidden="true"></span>
    </a>

    <!-- Visual separator -->
    <div class="dock__separator" role="separator" aria-hidden="true"></div>

    <!-- Favorites -->
    <a
      href="#favorites"
      class="dock__item"
      data-label="Favorites"
      aria-label="Favorites"
    >
      <span class="dock__icon dock__icon--favorites" role="img" aria-hidden="true">❤️</span>
      <span class="dock__dot" aria-hidden="true"></span>
    </a>

    <!-- Messages -->
    <a
      href="#messages"
      class="dock__item"
      data-label="Messages"
      aria-label="Messages"
    >
      <span class="dock__icon dock__icon--messages" role="img" aria-hidden="true">💬</span>
      <span class="dock__dot" aria-hidden="true"></span>
    </a>

    <!-- Settings -->
    <a
      href="#settings"
      class="dock__item"
      data-label="Settings"
      aria-label="Settings"
    >
      <span class="dock__icon dock__icon--settings" role="img" aria-hidden="true">⚙️</span>
      <span class="dock__dot" aria-hidden="true"></span>
    </a>

  </nav>

</body>
</html>
