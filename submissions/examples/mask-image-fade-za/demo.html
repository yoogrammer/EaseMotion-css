<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mask Image Fade</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <h1>CSS Mask Fade</h1>
    <div class="mask-demo">
      <div class="mask-card horizontal-fade">
        <div class="mask-swatch"></div>
        <span class="mask-label">Horizontal fade</span>
      </div>
      <div class="mask-card vertical-fade">
        <div class="mask-swatch"></div>
        <span class="mask-label">Vertical fade</span>
      </div>
      <div class="mask-card radial-fade">
        <div class="mask-swatch"></div>
        <span class="mask-label">Radial fade</span>
      </div>
    </div>
  </div>
</body>
</html>
