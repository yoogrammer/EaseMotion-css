<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typewriter Reveal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <span class="typewriter-static-ak">CSS Typewriter</span>
  <p class="typewriter-ak" style="--typewriter-width-ak: 22ch; --typewriter-steps-ak: 22;">
    Pure CSS Typewriter Effect
  </p>
  <p class="typewriter-ak typewriter-ak-delayed" style="--typewriter-width-ak: 18ch; --typewriter-steps-ak: 18;">
    No JavaScript Required
  </p>
</body>
</html>
