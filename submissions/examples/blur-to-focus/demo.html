<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-blur-to-focus — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; letter-spacing: 0.05em; }
    .row { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .card {
      width: 200px; height: 120px; border-radius: 12px;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 500; font-size: 0.9rem;
    }
    .card-img {
      width: 200px; height: 120px; border-radius: 12px;
      object-fit: cover; display: block;
    }
    .reload {
      margin-top: 1rem; padding: 8px 20px; border-radius: 8px;
      border: 1px solid #333; background: transparent;
      color: #888; cursor: pointer; font-size: 0.8rem;
    }
    .reload:hover { border-color: #666; color: #fff; }
  </style>
</head>
<body>
  <h1>ease-blur-to-focus</h1>
  <div class="section">
    <div class="label">Intensity variants</div>
    <div class="row">
      <div class="card ease-blur-to-focus-sm">Light blur</div>
      <div class="card ease-blur-to-focus">Default</div>
      <div class="card ease-blur-to-focus-lg">Heavy blur</div>
    </div>
  </div>
  <div class="section">
    <div class="label">Speed variants</div>
    <div class="row">
      <div class="card ease-blur-to-focus ease-blur-fast">Fast</div>
      <div class="card ease-blur-to-focus">Normal</div>
      <div class="card ease-blur-to-focus ease-blur-slow">Slow</div>
    </div>
  </div>
  <div class="section">
    <div class="label">With stagger delay</div>
    <div class="row">
      <div class="card ease-blur-to-focus ease-delay-100">100ms</div>
      <div class="card ease-blur-to-focus ease-delay-200">200ms</div>
      <div class="card ease-blur-to-focus ease-delay-400">400ms</div>
    </div>
  </div>
  <div class="section">
    <div class="label">Looping pulse variant</div>
    <div class="row">
      <div class="card ease-blur-pulse-loop" style="color:#6366f1;">∞ Pulse</div>
    </div>
  </div>
  <button class="reload" onclick="location.reload()">↺ Replay</button>
</body>
</html>
