<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-text-nowrap Utility Demo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Inter, sans-serif;
        max-width: 500px;
        margin: 0 auto;
        padding: 2rem;
        background: #f8fafc;
      }
      h2 {
        color: #6366f1;
      }
      .group {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 1rem 1.5rem;
        margin-bottom: 1rem;
      }
      .group h3 {
        margin: 0 0 0.75rem;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #64748b;
      }
      .narrow {
        width: 180px;
        border: 1px dashed #cbd5e1;
        padding: 0.5rem;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h2>ease-text-nowrap Utility</h2>

    <div class="group">
      <h3>Text wraps normally</h3>
      <p class="narrow">
        This is a long text that will wrap to the next line inside a narrow
        container.
      </p>
    </div>

    <div class="group">
      <h3>ease-text-nowrap applied</h3>
      <p class="narrow ease-text-nowrap">
        This long text stays on one line and overflows.
      </p>
    </div>

    <div class="group">
      <h3>Table cells</h3>
      <table style="width: 100%; border-collapse: collapse">
        <tr>
          <th style="border: 1px solid #e2e8f0; padding: 0.5rem">Name</th>
          <th style="border: 1px solid #e2e8f0; padding: 0.5rem">Status</th>
          <th style="border: 1px solid #e2e8f0; padding: 0.5rem">
            Actions (long label here)
          </th>
        </tr>
        <tr>
          <td style="border: 1px solid #e2e8f0; padding: 0.5rem">Item</td>
          <td style="border: 1px solid #e2e8f0; padding: 0.5rem">
            <span
              class="ease-bg-success ease-text-white"
              style="
                padding: 0.15rem 0.5rem;
                border-radius: 4px;
                font-size: 0.85rem;
              "
              >Active</span
            >
          </td>
          <td
            class="ease-text-nowrap"
            style="border: 1px solid #e2e8f0; padding: 0.5rem"
          >
            Edit | Delete | Duplicate
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
