<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Color Palette Generator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>🎨 Color Palette Generator</h1>
        <p>Explore beautiful color combinations and gradients.</p>
    </header>

    <section class="palette-grid">

        <div class="color-card purple">
            <span>#7C3AED</span>
        </div>

        <div class="color-card blue">
            <span>#2563EB</span>
        </div>

        <div class="color-card green">
            <span>#16A34A</span>
        </div>

        <div class="color-card orange">
            <span>#F97316</span>
        </div>

        <div class="color-card pink">
            <span>#EC4899</span>
        </div>

        <div class="color-card red">
            <span>#DC2626</span>
        </div>

    </section>

    <section class="gradient-section">

        <h2>🌈 Gradient Preview</h2>

        <div class="gradient-card">
            <p>Purple → Blue → Cyan</p>
        </div>

    </section>

    <section class="actions">

        <button>Copy Palette</button>
        <button>Save Colors</button>

    </section>

</div>

</body>
</html>
