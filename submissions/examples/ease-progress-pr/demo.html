<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-progress-pr Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 4rem 2rem;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }
    
    .demo-section {
      width: 100%;
      max-width: 500px;
    }
    
    .demo-section h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #1e293b;
    }
    
    .progress-group {
      margin-bottom: 1.5rem;
    }
    
    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: #475569;
    }
  </style>
</head>
<body>

  <div class="demo-section">
    <h2>Color Variants</h2>
    
    <div class="progress-group">
      <div class="progress-label">
        <span>Uploading files</span>
        <span>75%</span>
      </div>
      <div class="progress-pr progress-pr-primary">
        <div class="progress-pr-bar" style="width: 75%;">
          <span class="progress-pr-label">75%</span>
        </div>
      </div>
    </div>

    <div class="progress-group">
      <div class="progress-label">
        <span>Processing complete</span>
        <span>100%</span>
      </div>
      <div class="progress-pr progress-pr-success">
        <div class="progress-pr-bar" style="width: 100%;">
          <span class="progress-pr-label">100%</span>
        </div>
      </div>
    </div>

    <div class="progress-group">
      <div class="progress-label">
        <span>Syncing data</span>
        <span>45%</span>
      </div>
      <div class="progress-pr progress-pr-warning">
        <div class="progress-pr-bar" style="width: 45%;">
          <span class="progress-pr-label">45%</span>
        </div>
      </div>
    </div>

    <div class="progress-group">
      <div class="progress-label">
        <span>Upload failed</span>
        <span>30%</span>
      </div>
      <div class="progress-pr progress-pr-danger">
        <div class="progress-pr-bar" style="width: 30%;">
          <span class="progress-pr-label">30%</span>
        </div>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <h2>Size Variants</h2>
    
    <div class="progress-group">
      <div class="progress-label">
        <span>Small</span>
        <span>60%</span>
      </div>
      <div class="progress-pr progress-pr-primary progress-pr-sm">
        <div class="progress-pr-bar" style="width: 60%;"></div>
      </div>
    </div>

    <div class="progress-group">
      <div class="progress-label">
        <span>Default</span>
        <span>60%</span>
      </div>
      <div class="progress-pr progress-pr-primary">
        <div class="progress-pr-bar" style="width: 60%;">
          <span class="progress-pr-label">60%</span>
        </div>
      </div>
    </div>

    <div class="progress-group">
      <div class="progress-label">
        <span>Large</span>
        <span>60%</span>
      </div>
      <div class="progress-pr progress-pr-primary progress-pr-lg">
        <div class="progress-pr-bar" style="width: 60%;">
          <span class="progress-pr-label">60%</span>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
