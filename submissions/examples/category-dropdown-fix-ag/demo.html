<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category Dropdown Theme Fix - EaseMotion CSS</title>
  
  <!-- Link to EaseMotion CSS core -->
  <link rel="stylesheet" href="../../../core/animations.css">
  <!-- Link to your CSS file - do not change this path -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-container">
    <div class="theme-switch-wrapper">
      <button id="themeToggle" class="theme-btn" aria-label="Toggle light/dark theme">
        <span class="theme-btn-text">Light Mode</span>
      </button>
    </div>

    <h1 class="demo-title">Category Dropdown</h1>
    <p class="demo-description">
      An elegant, theme-adaptive category select dropdown. It ensures option lists are fully styled and legible (preventing white-on-white text issues in Chromium browsers) under both dark and light modes.
    </p>

    <div class="category-dropdown-container">
      <label for="categorySelect" class="category-dropdown-label">Filter animations</label>
      <select id="categorySelect" class="category-dropdown">
        <option value="all">All Categories</option>
        <option value="fades">Fades</option>
        <option value="slides">Slides</option>
        <option value="zooms">Zooms</option>
      </select>
    </div>

    <div class="items-grid" id="itemsGrid">
      <div class="item-card ease-fade-in" data-category="fades">Fade In</div>
      <div class="item-card ease-fade-in" data-category="fades">Fade Out</div>
      <div class="item-card ease-fade-in" data-category="slides">Slide Up</div>
      <div class="item-card ease-fade-in" data-category="slides">Slide Down</div>
      <div class="item-card ease-fade-in" data-category="zooms">Zoom In</div>
      <div class="item-card ease-fade-in" data-category="zooms">Zoom Out</div>
    </div>
  </div>

  <script>
    // Theme toggle logic
    const themeToggle = document.getElementById('themeToggle');
    const htmlEl = document.documentElement;

    themeToggle.addEventListener('click', () => {
      const currentTheme = htmlEl.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      htmlEl.setAttribute('data-theme', newTheme);
      themeToggle.querySelector('.theme-btn-text').textContent = newTheme === 'dark' ? 'Light Mode' : 'Dark Mode';
    });

    // Filtering logic
    const categorySelect = document.getElementById('categorySelect');
    const items = document.querySelectorAll('.item-card');

    categorySelect.addEventListener('change', (e) => {
      const selectedCategory = e.target.value;

      items.forEach(item => {
        const itemCategory = item.getAttribute('data-category');
        
        // Remove animation class to re-trigger it
        item.classList.remove('ease-fade-in');
        void item.offsetWidth; // force reflow

        if (selectedCategory === 'all' || itemCategory === selectedCategory) {
          item.classList.remove('hidden');
          item.classList.add('ease-fade-in');
        } else {
          item.classList.add('hidden');
        }
      });
    });
  </script>
</body>
</html>
