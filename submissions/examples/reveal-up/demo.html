<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-reveal-up — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; letter-spacing: 0.05em; }
    .row { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .card {
      width: 160px; padding: 2rem 1rem;
      border-radius: 12px;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 500; font-size: 0.85rem;
      text-align: center;
    }
    .toggle-btn {
      margin-top: 1rem; padding: 8px 20px; border-radius: 8px;
      border: 1px solid #333; background: transparent;
      color: #888; cursor: pointer; font-size: 0.8rem;
    }
    .toggle-btn:hover { border-color: #666; color: #fff; }
  </style>
</head>
<body>
  <h1>ease-reveal-up</h1>
  <div class="section">
    <div class="label">Direction variants (click to reveal)</div>
    <div class="row" id="revealRow">
      <div class="card ease-reveal-up">Up</div>
      <div class="card ease-reveal-down">Down</div>
      <div class="card ease-reveal-left">Left</div>
      <div class="card ease-reveal-right">Right</div>
      <div class="card ease-reveal-scale">Scale</div>
    </div>
    <button class="toggle-btn" onclick="document.querySelectorAll('#revealRow > div').forEach(d => d.classList.toggle('ease-reveal-active'))">Toggle Reveal</button>
  </div>
</body>
</html>
