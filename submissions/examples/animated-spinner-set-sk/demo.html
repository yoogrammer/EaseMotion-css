<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Spinner Set</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="spinner-set">
  <h1>Loading Spinners</h1>
  <p>Select a spinner below to activate it</p>

  <div class="spinner-grid">

    <input type="radio" name="spinner" id="spinner-1" checked hidden>
    <label class="spinner-card" for="spinner-1">
      <span class="spinner spinner--pulse"></span>
      <span class="spinner-label">Circle Pulse</span>
    </label>

    <input type="radio" name="spinner" id="spinner-2" hidden>
    <label class="spinner-card" for="spinner-2">
      <span class="spinner spinner--dots"></span>
      <span class="spinner-label">Dots Wave</span>
    </label>

    <input type="radio" name="spinner" id="spinner-3" hidden>
    <label class="spinner-card" for="spinner-3">
      <span class="spinner spinner--ring"></span>
      <span class="spinner-label">Ring Spin</span>
    </label>

    <input type="radio" name="spinner" id="spinner-4" hidden>
    <label class="spinner-card" for="spinner-4">
      <span class="spinner spinner--hourglass"></span>
      <span class="spinner-label">Hourglass</span>
    </label>

    <input type="radio" name="spinner" id="spinner-5" hidden>
    <label class="spinner-card" for="spinner-5">
      <span class="spinner spinner--bars"></span>
      <span class="spinner-label">Bars</span>
    </label>

  </div>
</div>

</body>
</html>
