<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Display Utilities</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 500px;
        margin: 2rem auto;
        padding: 1rem;
        background: #f8fafc;
        color: #1e293b;
      }
      h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
      p { color: #64748b; margin-bottom: 1.5rem; }
      .demo-card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      .demo-card code {
        font-family: monospace;
        font-size: 0.8rem;
        background: #f1f5f9;
        padding: 0.15em 0.4em;
        border-radius: 3px;
        color: #6c63ff;
      }
      .display-table { border: 1px solid #cbd5e1; border-radius: 4px; }
      .display-table-cell {
        padding: 0.75rem;
        border: 1px dashed #6c63ff;
        border-radius: 4px;
        background: rgba(108,99,255,0.06);
      }
      .display-table-row {
        border: 1px dashed #f59e0b;
        border-radius: 4px;
        margin-bottom: 4px;
      }
      .display-table-caption {
        padding: 0.5rem;
        text-align: center;
        font-weight: 600;
        color: #6c63ff;
        border: 1px dashed #6c63ff;
        border-radius: 4px;
        background: rgba(108,99,255,0.06);
      }
    </style>
  </head>
  <body>
    <h1>Table Display Utilities</h1>
    <p>Force elements to behave as table elements for layout.</p>
    <div class="demo-card">
      <h3 style="margin:0 0 0.5rem">Vertical centering with <code>.display-table</code> + <code>.display-table-cell</code></h3>
      <div class="display-table" style="width:100%;height:120px">
        <div class="display-table-cell" style="vertical-align:middle;text-align:center">
          Vertically centered content
        </div>
      </div>
    </div>
    <div class="demo-card">
      <h3 style="margin:0 0 0.5rem">Classes</h3>
      <ul style="font-family:monospace;list-style:none;padding:0">
        <li style="margin-bottom:0.5rem">.display-table</li>
        <li style="margin-bottom:0.5rem">.display-table-cell</li>
        <li style="margin-bottom:0.5rem">.display-table-row</li>
        <li style="margin-bottom:0.5rem">.display-table-caption</li>
      </ul>
    </div>
  </body>
</html>
