<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuel Cost Calculator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator-wrapper">
    <h1>Fuel Cost Calculator</h1>
    <div class="input-section">
      <div class="field">
        <label for="distance">Distance</label>
        <input type="number" id="distance" class="input" value="300" min="0" step="1">
      </div>
      <div class="field">
        <label for="distUnit">Distance Unit</label>
        <select id="distUnit" class="input">
          <option value="km">Kilometers (km)</option>
          <option value="mi">Miles (mi)</option>
        </select>
      </div>
      <div class="field">
        <label for="eff">Fuel Efficiency</label>
        <input type="number" id="eff" class="input" value="25" min="0" step="0.1">
      </div>
      <div class="field">
        <label for="effMode">Efficiency Mode</label>
        <select id="effMode" class="input">
          <option value="mpg">MPG</option>
          <option value="lp100k">L/100km</option>
        </select>
      </div>
      <div class="field">
        <label for="fuelPrice">Fuel Price per Unit ($)</label>
        <input type="number" id="fuelPrice" class="input" value="3.50" min="0" step="0.01">
      </div>
      <div class="toggle-comparison">
        <label><input type="checkbox" id="comparisonToggle"> Two-Vehicle Comparison</label>
      </div>
      <div class="comparison-fields" id="comparisonFields" style="display:none">
        <div class="field">
          <label for="eff2">Vehicle 2 Efficiency</label>
          <input type="number" id="eff2" class="input" value="35" min="0" step="0.1">
        </div>
      </div>
    </div>
    <div class="results">
      <div class="result-row">
        <span>Fuel Needed</span>
        <span id="fuelNeeded">0 gal</span>
      </div>
      <div class="result-row">
        <span>Total Trip Cost</span>
        <span id="totalCost">$0.00</span>
      </div>
      <div class="result-row">
        <span>Cost per km/mi</span>
        <span id="costPerUnit">$0.00</span>
      </div>
    </div>
    <div class="comparison-section" id="comparisonResults" style="display:none">
      <div class="comparison-header">Vehicle Comparison</div>
      <div class="carrier-row" id="v1Row">
        <span>Vehicle 1 (<span id="v1EffLabel">25 MPG</span>)</span>
        <span class="carrier-price" id="v1Cost">$0.00</span>
      </div>
      <div class="carrier-row" id="v2Row">
        <span>Vehicle 2 (<span id="v2EffLabel">35 MPG</span>)</span>
        <span class="carrier-price" id="v2Cost">$0.00</span>
      </div>
      <div class="savings-row" id="savingsRow">
        <span>Savings with V2</span>
        <span id="savingsAmount" class="savings-positive">$0.00</span>
      </div>
    </div>
  </div>
  <script>
    const distance = document.getElementById('distance');
    const distUnit = document.getElementById('distUnit');
    const eff = document.getElementById('eff');
    const effMode = document.getElementById('effMode');
    const fuelPrice = document.getElementById('fuelPrice');
    const fuelNeeded = document.getElementById('fuelNeeded');
    const totalCost = document.getElementById('totalCost');
    const costPerUnit = document.getElementById('costPerUnit');
    const comparisonToggle = document.getElementById('comparisonToggle');
    const comparisonFields = document.getElementById('comparisonFields');
    const comparisonResults = document.getElementById('comparisonResults');
    const eff2 = document.getElementById('eff2');
    const v1Cost = document.getElementById('v1Cost');
    const v2Cost = document.getElementById('v2Cost');
    const v1EffLabel = document.getElementById('v1EffLabel');
    const v2EffLabel = document.getElementById('v2EffLabel');
    const savingsAmount = document.getElementById('savingsAmount');
    const savingsRow = document.getElementById('savingsRow');

    function fmt(n) {
      return '$' + n.toFixed(2);
    }

    function calculateFuel(km, effVal, isMpg) {
      if (isMpg) {
        const gal = km / 1.60934 / effVal;
        return gal;
      } else {
        const liters = (effVal / 100) * km;
        const gal = liters / 3.78541;
        return gal;
      }
    }

    function calculate() {
      const dist = parseFloat(distance.value) || 0;
      const dUnit = distUnit.value;
      const effVal = parseFloat(eff.value) || 0;
      const eMode = effMode.value;
      const price = parseFloat(fuelPrice.value) || 0;
      const km = dUnit === 'mi' ? dist * 1.60934 : dist;

      const isMpg = eMode === 'mpg';
      const showComparison = comparisonToggle.checked;

      comparisonFields.style.display = showComparison ? 'block' : 'none';
      comparisonResults.style.display = showComparison ? 'block' : 'none';

      const gal = calculateFuel(km, effVal, isMpg);
      const cost = gal * price;
      const costPer = dist > 0 ? cost / dist : 0;

      const unit = dUnit === 'km' ? 'km' : 'mi';
      const fuelUnit = isMpg ? 'gal' : 'L';
      const fuelQty = isMpg ? gal : gal * 3.78541;

      fuelNeeded.textContent = fuelQty.toFixed(2) + ' ' + fuelUnit;
      totalCost.textContent = fmt(cost);
      costPerUnit.textContent = fmt(costPer) + '/' + unit;

      const effLabel = effVal + (isMpg ? ' MPG' : ' L/100km');
      v1EffLabel.textContent = effLabel;
      v1Cost.textContent = fmt(cost);

      if (showComparison) {
        const effVal2 = parseFloat(eff2.value) || 0;
        const gal2 = calculateFuel(km, effVal2, isMpg);
        const cost2 = gal2 * price;
        const effLabel2 = effVal2 + (isMpg ? ' MPG' : ' L/100km');
        v2EffLabel.textContent = effLabel2;
        v2Cost.textContent = fmt(cost2);

        const savings = cost - cost2;
        if (savings > 0) {
          savingsAmount.textContent = fmt(savings);
          savingsAmount.className = 'savings-positive';
        } else {
          savingsAmount.textContent = fmt(-savings);
          savingsAmount.className = 'savings-negative';
        }
      }
    }

    distance.addEventListener('input', calculate);
    distUnit.addEventListener('change', calculate);
    eff.addEventListener('input', calculate);
    effMode.addEventListener('change', calculate);
    fuelPrice.addEventListener('input', calculate);
    comparisonToggle.addEventListener('change', calculate);
    eff2.addEventListener('input', calculate);
    calculate();
  </script>
</body>
</html>
