<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Cursor Bug Fix Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="showcase-container">
        <header class="section-title">
            <h2>Components / Cards</h2>
        </header>

        <div class="cards-layout-grid">
            <div class="feature-card variant-interactive">
                <span class="card-tag tag-new">New</span>
                <h3>Animation First</h3>
                <p>Hover this card to feel the difference in micro-interactions.</p>
                <a href="#" class="card-link">Explore</a>
            </div>

            <div class="feature-card variant-static">
                <span class="card-tag tag-mvp">MVP</span>
                <h3>Zero Config</h3>
                <p>Link one stylesheet. No build steps, no dependencies, no configuration.</p>
                <span class="card-action-text">Get Started</span>
            </div>
        </div>
    </main>

</body>
</html>
