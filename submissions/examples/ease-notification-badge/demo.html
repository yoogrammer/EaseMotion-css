<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ease Notification Badge Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      gap: 40px;
      padding: 60px;
      align-items: center;
    }
    .ease-icon {
      font-size: 28px;
    }
  </style>
</head>
<body>

  <!-- Count badge - danger -->
  <div class="ease-badge-wrapper">
    <span class="ease-icon">🔔</span>
    <span class="ease-badge ease-badge--danger">3</span>
  </div>

  <!-- Count badge - warning -->
  <div class="ease-badge-wrapper">
    <span class="ease-icon">🛒</span>
    <span class="ease-badge ease-badge--warning">99+</span>
  </div>

  <!-- Dot badge - success (pulsing) -->
  <div class="ease-badge-wrapper">
    <span class="ease-icon">👤</span>
    <span class="ease-badge ease-badge--dot ease-badge--success"></span>
  </div>

  <!-- Info count badge -->
  <div class="ease-badge-wrapper">
    <span class="ease-icon">✉️</span>
    <span class="ease-badge ease-badge--info">12</span>
  </div>

</body>
</html>
