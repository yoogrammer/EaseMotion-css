<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbital Ring Loader - Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="panel-header">
    <h1>Orbital Ring Loader</h1>
    <p>
      Multi-layer orbital motion system simulating an active AI processing core.
    </p>
  </div>

  <div class="ease-orbit-loader ease-orbit-multi">

    <div class="ease-orbit-core">
      <span>AI</span>
    </div>

    <!-- Outer Ring -->
    <div class="ease-orbit-ring outer ease-orbit-slow ease-orbit-glow">
      <div class="orbit-node node-indigo"></div>
      <div class="orbit-node node-indigo"></div>
      <div class="orbit-node node-indigo"></div>
    </div>

    <!-- Middle Ring -->
    <div class="ease-orbit-ring middle ease-orbit-reverse ease-orbit-glow">
      <div class="orbit-node node-pink"></div>
      <div class="orbit-node node-pink"></div>
    </div>

    <!-- Inner Ring -->
    <div class="ease-orbit-ring inner ease-orbit-fast ease-orbit-glow">
      <div class="orbit-node node-cyan"></div>
    </div>

  </div>

  <div class="loading-status">
    <span class="loading-dot"></span>
    Synchronizing Neural Network
  </div>

</body>
</html>
