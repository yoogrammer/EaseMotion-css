<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinematic Parallax Movie Poster – EaseMotion CSS</title>
  <meta name="description" content="A multi-layer CSS parallax movie poster with depth effect on mouse hover." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Cinematic Parallax Poster</h1>
  <p>Move your mouse over the poster to feel the depth</p>

  <div class="poster-scene" id="posterScene">
    <div class="poster" id="poster" role="img" aria-label="The Last Wanderer - cinematic movie poster">

      <!-- Layer 1: Background gradient sky -->
      <div class="layer layer-bg" data-depth="0.05"></div>

      <!-- Layer 2: Stars -->
      <div class="layer layer-stars" data-depth="0.08" id="starsLayer"></div>

      <!-- Layer 3: Moon -->
      <div class="layer layer-moon" data-depth="0.12">
        <div class="moon"></div>
      </div>

      <!-- Layer 4: Far mountains -->
      <div class="layer layer-mountains-far" data-depth="0.18">
        <div class="mtn-far"></div>
      </div>

      <!-- Layer 5: Near mountains -->
      <div class="layer layer-mountains-near" data-depth="0.28">
        <div class="mtn-near"></div>
      </div>

      <!-- Layer 6: Forest -->
      <div class="layer layer-forest" data-depth="0.38" id="forestLayer"></div>

      <!-- Layer 7: Subject figure -->
      <div class="layer layer-subject" data-depth="0.55">
        <div class="figure" aria-hidden="true">
          <div class="fig-head"></div>
          <div class="fig-body">
            <div class="lantern"></div>
          </div>
          <div class="fig-legs">
            <div class="fig-leg"></div>
            <div class="fig-leg"></div>
          </div>
        </div>
      </div>

      <!-- Layer 8: Ground -->
      <div class="layer layer-ground" data-depth="0.65">
        <div class="ground"></div>
      </div>

      <!-- Layer 9: Fog -->
      <div class="layer layer-fog" data-depth="0.45">
        <div class="fog-strip"></div>
        <div class="fog-strip"></div>
      </div>

      <!-- Layer 10: Title overlay (moves least – feels painted on) -->
      <div class="layer layer-title" data-depth="0.02">
        <div class="poster-title">
          <h2>The Last<br>Wanderer</h2>
          <p>A Film by EaseMotion Studios</p>
        </div>
        <div class="poster-tagline">Some paths are meant to be walked alone</div>
      </div>

      <!-- Vignette & shine -->
      <div class="vignette"></div>
      <div class="shine" id="posterShine"></div>
    </div>
  </div>

  <script>
    // Generate stars
    const starsLayer = document.getElementById('starsLayer');
    for (let i = 0; i < 120; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2.5 + 0.5;
      s.style.cssText = `
        left:${Math.random()*100}%;
        top:${Math.random()*65}%;
        width:${size}px; height:${size}px;
        --dur:${(Math.random()*2+1.5).toFixed(1)}s;
        --del:${(Math.random()*3).toFixed(1)}s;
        --lo:${(Math.random()*0.2+0.05).toFixed(2)};
        --hi:${(Math.random()*0.6+0.4).toFixed(2)};
      `;
      starsLayer.appendChild(s);
    }

    // Generate trees
    const forestLayer = document.getElementById('forestLayer');
    for (let i = 0; i < 18; i++) {
      const t = document.createElement('div');
      t.className = 'tree';
      const h = Math.random() * 40 + 30;
      const l = (i / 18) * 110 - 5;
      t.style.cssText = `left:${l}%;height:${h}px;width:20px;`;
      const crown = document.createElement('div');
      crown.className = 'tree-crown';
      t.appendChild(crown);
      const trunk = document.createElement('div');
      trunk.style.cssText = `position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:4px;height:${h*0.3}px;background:#020408;`;
      t.appendChild(trunk);
      forestLayer.appendChild(t);
    }

    // Parallax on mouse move
    const poster = document.getElementById('poster');
    const shine = document.getElementById('posterShine');
    const layers = poster.querySelectorAll('.layer[data-depth]');

    poster.addEventListener('mousemove', e => {
      const rect = poster.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const mx = (e.clientX - cx) / (rect.width / 2);  // -1 to 1
      const my = (e.clientY - cy) / (rect.height / 2);

      // Tilt the card
      poster.style.transform = `rotateX(${-my * 10}deg) rotateY(${mx * 10}deg)`;

      // Move each layer based on depth
      layers.forEach(layer => {
        const depth = parseFloat(layer.dataset.depth);
        const tx = mx * depth * 28;
        const ty = my * depth * 20;
        layer.style.transform = `translate(${tx}px, ${ty}px)`;
      });

      // Move shine
      const sx = (e.clientX - rect.left) / rect.width * 100;
      const sy = (e.clientY - rect.top) / rect.height * 100;
      shine.style.background = `radial-gradient(circle 180px at ${sx}% ${sy}%, rgba(255,255,255,0.07), transparent 70%)`;
    });

    poster.addEventListener('mouseleave', () => {
      poster.style.transform = '';
      layers.forEach(layer => { layer.style.transform = ''; });
    });
  </script>
</body>
</html>
