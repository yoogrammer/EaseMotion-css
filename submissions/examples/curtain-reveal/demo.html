<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Curtain Reveal Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      justify-content: center;
      padding: 60px;
      background: #f5f5f5;
    }
    .box {
      width: 200px;
      height: 120px;
      background: #4f46e5;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
    }
    label {
      display: block;
      text-align: center;
      margin-top: 8px;
      font-size: 14px;
      color: #555;
    }
    .card { text-align: center; }
  </style>
</head>
<body>

  <div class="card">
    <div class="curtain curtain-left">
      <div class="box">Hover me</div>
    </div>
    <label>curtain-left</label>
  </div>

  <div class="card">
    <div class="curtain curtain-right">
      <div class="box">Hover me</div>
    </div>
    <label>curtain-right</label>
  </div>

  <div class="card">
    <div class="curtain curtain-top">
      <div class="box">Hover me</div>
    </div>
    <label>curtain-top</label>
  </div>

  <div class="card">
    <div class="curtain curtain-bottom">
      <div class="box">Hover me</div>
    </div>
    <label>curtain-bottom</label>
  </div>

</body>
</html>
