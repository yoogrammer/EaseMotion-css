<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Morphing Floating Action Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Morphing Floating Action Menu</h1>
    <p>Click the floating button to reveal the menu.</p>
</div>

<div class="fab-container">
    <input type="checkbox" id="fab-toggle">

    <label for="fab-toggle" class="fab">
        <span></span>
    </label>

    <div class="fab-menu">
        <a href="#" title="Home">🏠</a>
        <a href="#" title="Search">🔍</a>
        <a href="#" title="Mail">✉️</a>
        <a href="#" title="Settings">⚙️</a>
    </div>
</div>

</body>
</html>
