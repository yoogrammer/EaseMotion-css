<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-otp-input – EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      background: #1e1e2e;
      color: #f5f5f5;
      padding: 3rem 2rem;
    }
    h1 { font-size: 1.3rem; margin: 0; }
    h3 { font-size: 0.75rem; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 0.75rem; }
    .col { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
  </style>
</head>
<body>

  <h1>ease-otp-input — Verification Code Boxes</h1>

  <div class="col">
    <h3>Default — auto-advance + auto-focus first box</h3>
    <div class="ease-otp-group" id="otp-group">
      <input class="ease-otp-input" type="text" inputmode="numeric" maxlength="1" />
      <input class="ease-otp-input" type="text" inputmode="numeric" maxlength="1" />
      <input class="ease-otp-input" type="text" inputmode="numeric" maxlength="1" />
      <input class="ease-otp-input" type="text" inputmode="numeric" maxlength="1" />
      <input class="ease-otp-input" type="text" inputmode="numeric" maxlength="1" />
      <input class="ease-otp-input" type="text" inputmode="numeric" maxlength="1" />
    </div>
  </div>

  <div class="col">
    <h3>Small size</h3>
    <div class="ease-otp-group ease-otp-group-sm">
      <input class="ease-otp-input" type="text" inputmode="numeric" maxlength="1" />
      <input class="ease-otp-input" type="text" inputmode="numeric" maxlength="1" />
      <input class="ease-otp-input" type="text" inputmode="numeric" maxlength="1" />
      <input class="ease-otp-input" type="text" inputmode="numeric" maxlength="1" />
    </div>
  </div>

  <div class="col">
    <h3>Large + error state</h3>
    <div class="ease-otp-group ease-otp-group-lg">
      <input class="ease-otp-input ease-otp-error" type="text" inputmode="numeric" maxlength="1" value="4" />
      <input class="ease-otp-input ease-otp-error" type="text" inputmode="numeric" maxlength="1" value="2" />
      <input class="ease-otp-input ease-otp-error" type="text" inputmode="numeric" maxlength="1" value="1" />
      <input class="ease-otp-input ease-otp-error" type="text" inputmode="numeric" maxlength="1" value="9" />
    </div>
  </div>

  <script>
    // Minimal JS: auto-advance to next box, backspace to previous,
    // mark filled boxes, and support paste of a full code.
    const inputs = document.querySelectorAll('#otp-group .ease-otp-input');

    inputs.forEach((input, index) => {
      input.addEventListener('input', () => {
        input.value = input.value.replace(/[^0-9]/g, '');
        input.classList.toggle('ease-otp-filled', input.value.length > 0);
        if (input.value && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) {
          inputs[index - 1].focus();
        }
      });

      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const digits = (e.clipboardData.getData('text') || '').replace(/[^0-9]/g, '').split('');
        digits.forEach((digit, i) => {
          if (inputs[index + i]) {
            inputs[index + i].value = digit;
            inputs[index + i].classList.add('ease-otp-filled');
          }
        });
        const next = inputs[Math.min(index + digits.length, inputs.length - 1)];
        next.focus();
      });
    });

    inputs[0].focus();
  </script>

</body>
</html>
