<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XP Reward Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">XP Reward System</h1>

  <div class="xp-card ease-slide-up">

    <h2>Level <span id="level">1</span></h2>

    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>

    <p><span id="xp">0</span> / 100 XP</p>

    <button onclick="gainXP()" class="xp-btn">Gain XP</button>

  </div>

  <!-- LEVEL UP TEXT -->
  <div id="reward" class="reward-text">LEVEL UP 🎉</div>

</section>

<script>
let xp = 0;
let level = 1;

function gainXP() {
  xp += 25;

  if (xp >= 100) {
    xp = 0;
    level++;

    document.getElementById("level").textContent = level;

    // SHOW REWARD
    const reward = document.getElementById("reward");
    reward.classList.add("show");

    setTimeout(() => {
      reward.classList.remove("show");
    }, 1200);
  }

  document.getElementById("xp").textContent = xp;
  document.getElementById("progress").style.width = xp + "%";
}
</script>

</body>
</html>
