<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Color Picker Palette</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="palette">
  <h2>Pick a Color</h2>
  <input type="radio" name="c" id="c1" hidden><input type="radio" name="c" id="c2" hidden>
  <input type="radio" name="c" id="c3" hidden><input type="radio" name="c" id="c4" hidden>
  <input type="radio" name="c" id="c5" hidden><input type="radio" name="c" id="c6" hidden>
  <input type="radio" name="c" id="c7" hidden><input type="radio" name="c" id="c8" hidden>
  <input type="radio" name="c" id="c9" hidden><input type="radio" name="c" id="c10" hidden>
  <input type="radio" name="c" id="c11" hidden><input type="radio" name="c" id="c12" hidden>
  <div class="grid">
    <label for="c1" class="swatch" style="background:#FF6B6B"></label>
    <label for="c2" class="swatch" style="background:#4ECDC4"></label>
    <label for="c3" class="swatch" style="background:#45B7D1"></label>
    <label for="c4" class="swatch" style="background:#96CEB4"></label>
    <label for="c5" class="swatch" style="background:#FFEAA7"></label>
    <label for="c6" class="swatch" style="background:#DDA0DD"></label>
    <label for="c7" class="swatch" style="background:#98D8C8"></label>
    <label for="c8" class="swatch" style="background:#F7DC6F"></label>
    <label for="c9" class="swatch" style="background:#BB8FCE"></label>
    <label for="c10" class="swatch" style="background:#85C1E9"></label>
    <label for="c11" class="swatch" style="background:#F8C471"></label>
    <label for="c12" class="swatch" style="background:#82E0AA"></label>
  </div>
  <div class="hex-display"></div>
</div>
</body>
</html>
