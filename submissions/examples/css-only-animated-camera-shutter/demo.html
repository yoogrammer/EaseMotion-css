<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-only Animated Camera Shutter Component</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ease-camera-container">
    <div class="ease-camera-body">
      <!-- Camera Button -->
      <div class="ease-camera-button"></div>
      
      <!-- Camera Flash -->
      <div class="ease-camera-flash"></div>
      
      <!-- Camera Lens Outer -->
      <div class="ease-lens-outer">
        <!-- Camera Lens Inner -->
        <div class="ease-lens-inner">
          <div class="ease-shutter-container">
            <div class="ease-shutter-blade ease-blade-1"></div>
            <div class="ease-shutter-blade ease-blade-2"></div>
            <div class="ease-shutter-blade ease-blade-3"></div>
            <div class="ease-shutter-blade ease-blade-4"></div>
            <div class="ease-shutter-blade ease-blade-5"></div>
            <div class="ease-shutter-blade ease-blade-6"></div>
          </div>
          <!-- Camera Sensor / Center -->
          <div class="ease-camera-sensor">
            <div class="ease-sensor-glass"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
