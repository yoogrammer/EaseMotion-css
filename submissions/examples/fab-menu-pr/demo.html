<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FAB Menu Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      background: #f0f0f0;
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    h1 { color: #333; }
  </style>
</head>
<body>

  <h1>Click the purple button ↘</h1>

  <div class="fab-container" id="fabContainer">
    <button class="fab-main" id="fabToggle" aria-expanded="false" aria-label="Open menu">
      ➕
    </button>
    <div class="fab-menu">
      <button class="fab-item" data-label="Delete" aria-label="Delete">🗑️</button>
      <button class="fab-item" data-label="Edit" aria-label="Edit">✏️</button>
      <button class="fab-item" data-label="Share" aria-label="Share">📤</button>
    </div>
  </div>

  <script>
    const fabToggle = document.getElementById('fabToggle');
    const fabContainer = document.getElementById('fabContainer');

    fabToggle.addEventListener('click', () => {
      const isOpen = fabContainer.classList.toggle('open');
      fabToggle.classList.toggle('open', isOpen);
      fabToggle.setAttribute('aria-expanded', String(isOpen));
    });
  </script>

</body>
</html>
