<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KPI / Stats Cards Dashboard - EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../easemotion.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="dashboard-wrapper">
      <div class="dashboard-header">
        <h1>Business Overview</h1>
        <p>Key Performance Indicators for this month</p>
      </div>

      <div class="kpi-grid">
        <!-- Card 1: Positive Trend (Revenue) -->
        <div class="kpi-card">
          <div class="kpi-header">
            <span class="kpi-title">Total Revenue</span>
            <div class="kpi-icon-container">
              <svg
                class="kpi-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="12" y1="1" x2="12" y2="23"></line>
                <path
                  d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"
                ></path>
              </svg>
            </div>
          </div>
          <div class="kpi-body">
            <h2 class="kpi-value">$84,592.00</h2>
          </div>
          <div class="kpi-footer">
            <div class="kpi-trend trend-positive">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                <polyline points="17 6 23 6 23 12"></polyline>
              </svg>
              <span class="trend-value">12.5%</span>
            </div>
            <span class="kpi-desc">vs last month</span>
          </div>
        </div>

        <!-- Card 2: Negative Trend (Customer Churn) -->
        <div class="kpi-card">
          <div class="kpi-header">
            <span class="kpi-title">Customer Churn</span>
            <div class="kpi-icon-container icon-danger">
              <svg
                class="kpi-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M16 21v-2a4 4 0 0 0-4-4H5c-1.1 0-2 .9-2 2v2"></path>
                <circle cx="8.5" cy="7" r="4"></circle>
                <line x1="23" y1="11" x2="17" y2="11"></line>
              </svg>
            </div>
          </div>
          <div class="kpi-body">
            <h2 class="kpi-value">2.4%</h2>
          </div>
          <div class="kpi-footer">
            <div class="kpi-trend trend-negative">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline>
                <polyline points="17 18 23 18 23 12"></polyline>
              </svg>
              <span class="trend-value">0.8%</span>
            </div>
            <span class="kpi-desc">vs last month</span>
          </div>
        </div>

        <!-- Card 3: Neutral Trend (Active Sessions) -->
        <div class="kpi-card">
          <div class="kpi-header">
            <span class="kpi-title">Active Sessions</span>
            <div class="kpi-icon-container icon-warning">
              <svg
                class="kpi-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M2 12h4l3-9 5 18 3-9h5"></path>
              </svg>
            </div>
          </div>
          <div class="kpi-body">
            <h2 class="kpi-value">1,492</h2>
          </div>
          <div class="kpi-footer">
            <div class="kpi-trend trend-neutral">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              <span class="trend-value">0.0%</span>
            </div>
            <span class="kpi-desc">vs last month</span>
          </div>
        </div>

        <!-- Card 4: High Positive Trend (New Users) -->
        <div class="kpi-card">
          <div class="kpi-header">
            <span class="kpi-title">New Users</span>
            <div class="kpi-icon-container icon-success">
              <svg
                class="kpi-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M16 21v-2a4 4 0 0 0-4-4H5c-1.1 0-2 .9-2 2v2"></path>
                <circle cx="8.5" cy="7" r="4"></circle>
                <line x1="20" y1="8" x2="20" y2="14"></line>
                <line x1="23" y1="11" x2="17" y2="11"></line>
              </svg>
            </div>
          </div>
          <div class="kpi-body">
            <h2 class="kpi-value">3,205</h2>
          </div>
          <div class="kpi-footer">
            <div class="kpi-trend trend-positive">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                <polyline points="17 6 23 6 23 12"></polyline>
              </svg>
              <span class="trend-value">28.4%</span>
            </div>
            <span class="kpi-desc">vs last month</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
