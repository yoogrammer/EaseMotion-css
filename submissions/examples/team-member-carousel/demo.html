<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Member Card Carousel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="team-section">
    <h1>Meet Our Team</h1>

    <div class="team-container">

        <div class="card">
            <img src="https://via.placeholder.com/120" alt="Member">
            <h2>John Smith</h2>
            <p>Frontend Developer</p>

            <div class="socials">
                <span>🌐</span>
                <span>💼</span>
                <span>📧</span>
            </div>
        </div>

        <div class="card featured">
            <img src="https://via.placeholder.com/120" alt="Member">
            <h2>Sarah Wilson</h2>
            <p>UI/UX Designer</p>

            <div class="socials">
                <span>🌐</span>
                <span>💼</span>
                <span>📧</span>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/120" alt="Member">
            <h2>David Brown</h2>
            <p>Backend Engineer</p>

            <div class="socials">
                <span>🌐</span>
                <span>💼</span>
                <span>📧</span>
            </div>
        </div>

    </div>
</section>

</body>
</html>
