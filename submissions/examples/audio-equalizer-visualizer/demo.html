<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Equalizer Visualizer – EaseMotion CSS</title>
  <meta name="description" content="Pure CSS audio equalizer visualizer with staggered bar animations." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Audio Equalizer Visualizer</h1>
  <p>Hit play to watch the bars dance</p>

  <div class="player-card" id="playerCard">
    <div class="album-art" aria-hidden="true"></div>
    <div class="track-info">
      <div class="track-name">Neon Dreams</div>
      <div class="track-artist">EaseMotion Collective</div>
    </div>

    <div class="equalizer" aria-label="Audio equalizer visualization" aria-hidden="true">
      <div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="35">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="time-labels">
        <span>1:12</span>
        <span>3:24</span>
      </div>
    </div>

    <div class="controls">
      <button class="btn-control" aria-label="Previous track">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="btn-play" id="btnPlay" aria-label="Play" aria-pressed="false">
        <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="btn-control" aria-label="Next track">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 4V8l-5.5 4zm7.5 6h2V6h-2v12z"/></svg>
      </button>
    </div>

    <div class="volume-wrap">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      <div class="volume-slider"><div class="volume-fill"></div></div>
    </div>
  </div>

  <script>
    const card = document.getElementById('playerCard');
    const btn = document.getElementById('btnPlay');
    const play = document.getElementById('iconPlay');
    const pause = document.getElementById('iconPause');
    let playing = false;

    btn.addEventListener('click', () => {
      playing = !playing;
      card.classList.toggle('playing', playing);
      btn.setAttribute('aria-pressed', playing);
      btn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
      play.style.display = playing ? 'none' : 'block';
      pause.style.display = playing ? 'block' : 'none';
    });
  </script>
</body>
</html>
