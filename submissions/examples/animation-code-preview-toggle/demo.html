<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Code Preview Toggle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Animation Code Preview Toggle</h1>

  <div class="toggle-group">
    <button id="previewBtn" class="active">Preview</button>
    <button id="codeBtn">Code</button>
  </div>

  <div id="previewSection">
    <div class="demo-box">
      Hover over me
    </div>
  </div>

  <div id="codeSection" class="hidden">
<pre>
.demo-box {
  transition: transform 0.3s ease;
}

.demo-box:hover {
  transform: scale(1.1);
}
</pre>
  </div>
</div>

<script>
const previewBtn = document.getElementById("previewBtn");
const codeBtn = document.getElementById("codeBtn");
const previewSection = document.getElementById("previewSection");
const codeSection = document.getElementById("codeSection");

const savedView = localStorage.getItem("viewMode") || "preview";

function setView(mode) {
  if (mode === "code") {
    codeSection.classList.remove("hidden");
    previewSection.classList.add("hidden");

    codeBtn.classList.add("active");
    previewBtn.classList.remove("active");
  } else {
    previewSection.classList.remove("hidden");
    codeSection.classList.add("hidden");

    previewBtn.classList.add("active");
    codeBtn.classList.remove("active");
  }

  localStorage.setItem("viewMode", mode);
}

previewBtn.addEventListener("click", () => setView("preview"));
codeBtn.addEventListener("click", () => setView("code"));

setView(savedView);
</script>

</body>
</html>
