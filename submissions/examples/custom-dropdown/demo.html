<!DOCTYPE html>
<html>
<head>
  <title>Custom Dropdown</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dropdown">
  <div class="selected" onclick="toggle()">Select Option</div>
  <div class="options" id="options">
    <div onclick="select(this)">Option 1</div>
    <div onclick="select(this)">Option 2</div>
    <div onclick="select(this)">Option 3</div>
  </div>
</div>

<script>
function toggle() {
  const opt = document.getElementById("options");
  opt.style.display = opt.style.display === "block" ? "none" : "block";
}

function select(el) {
  document.querySelector(".selected").textContent = el.textContent;
  document.getElementById("options").style.display = "none";
}
</script>

</body>
</html>
