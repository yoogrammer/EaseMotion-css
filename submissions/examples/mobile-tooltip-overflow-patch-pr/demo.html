<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Tooltip Overflow Patch</title>
  <link rel="stylesheet" href="../../../core/base.css">
  <link rel="stylesheet" href="../../../core/utilities.css">
  <link rel="stylesheet" href="../../../components/tooltips.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 2rem;
      background-color: #f1f5f9;
      color: #1e293b;
      /* Simulating a mobile device width for the demo */
      max-width: 400px;
      margin: 0 auto;
      border: 2px dashed #94a3b8;
      border-radius: 12px;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <h2>Mobile Viewport Fix</h2>
  <p style="margin-bottom: 2rem; color: #64748b;">
    Resize your browser window so it is very narrow (like a phone). Thanks to the patch, the tooltips below will gracefully snap to the top/bottom instead of overflowing the screen horizontally!
  </p>

  <div style="display: flex; justify-content: space-between; margin-top: 4rem;">
    <!-- Normally, this would overflow the left edge of the screen -->
    <span class="ease-tooltip" data-tooltip="No more left overflow!" data-position="left" style="padding: 0.5rem 1rem; background: #cbd5e1; border-radius: 4px; font-weight: 600;">
      Left Edge
    </span>

    <!-- Normally, this would overflow the right edge and cause horizontal scrolling -->
    <span class="ease-tooltip" data-tooltip="No more right overflow!" data-position="right" style="padding: 0.5rem 1rem; background: #cbd5e1; border-radius: 4px; font-weight: 600;">
      Right Edge
    </span>
  </div>

</body>
</html>
