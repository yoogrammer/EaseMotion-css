<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Overlapping Avatars</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc; flex-direction: column; gap: 2rem;">
    <div class="oa-stack" style="--count: 5;">
      <div class="oa-avatar" style="--i: 0; background: #6366f1;">A</div>
      <div class="oa-avatar" style="--i: 1; background: #ec4899;">B</div>
      <div class="oa-avatar" style="--i: 2; background: #f59e0b;">C</div>
      <div class="oa-avatar" style="--i: 3; background: #22c55e;">D</div>
      <div class="oa-avatar" style="--i: 4; background: #3b82f6;">E</div>
      <div class="oa-avatar oa-more" style="--i: 5;">+3</div>
    </div>
    <p class="oa-label">5 active collaborators</p>
  </div>
</body>
</html>
