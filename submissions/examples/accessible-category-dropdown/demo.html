<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Category Dropdown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Accessible Category Dropdown</h1>
    <p>
        Improved dropdown menu with visible text, hover states,
        focus styles and dark theme support.
    </p>

    <div class="dropdown-wrapper">
        <label for="category">Animation Category</label>

        <select id="category" class="custom-dropdown">
            <option>All Categories</option>
            <option>Fade</option>
            <option>Slide</option>
            <option>Scale</option>
            <option>Rotate</option>
            <option>Bounce</option>
            <option>Flip</option>
            <option>Zoom</option>
        </select>
    </div>

    <div class="preview-card">
        <h2>Problem Solved</h2>
        <ul>
            <li>Visible option text</li>
            <li>High contrast colors</li>
            <li>Keyboard accessible</li>
            <li>Dark theme friendly</li>
            <li>Clear hover & focus state</li>
        </ul>
    </div>
</div>

</body>
</html>
