<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Motion Animation Utility</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Orbital Motion Animation Utility</h1>

<div class="cards">

    <!-- Orbit Spin -->
    <div class="card">
        <button class="copy-btn" onclick="copyClass(this,'ease-orbit-spin')">Copy</button>

        <div class="preview-area">
            <div class="orbit-demo orbit-spin">
                <div class="center-dot"></div>
                <div class="orbiter"></div>
            </div>
        </div>

        <button class="preview-btn" onclick="triggerPreview(this,'orbit-spin')">
            Preview
        </button>

        <h2>ease-orbit-spin</h2>
    </div>

    <!-- Orbit Reverse -->
    <div class="card">
        <button class="copy-btn" onclick="copyClass(this,'ease-orbit-reverse')">Copy</button>

        <div class="preview-area">
            <div class="orbit-demo orbit-reverse">
                <div class="center-dot"></div>
                <div class="orbiter"></div>
            </div>
        </div>

        <button class="preview-btn" onclick="triggerPreview(this,'orbit-reverse')">
            Preview
        </button>

        <h2>ease-orbit-reverse</h2>
    </div>

    <!-- Orbit Fast -->
    <div class="card">
        <button class="copy-btn" onclick="copyClass(this,'ease-orbit-fast')">Copy</button>

        <div class="preview-area">
            <div class="orbit-demo orbit-fast">
                <div class="center-dot"></div>
                <div class="orbiter"></div>
            </div>
        </div>

        <button class="preview-btn" onclick="triggerPreview(this,'orbit-fast')">
            Preview
        </button>

        <h2>ease-orbit-fast</h2>
    </div>

</div>

<script>
function copyClass(button, className) {
    navigator.clipboard.writeText(className);

    const original = button.textContent;
    button.textContent = "Copied!";

    setTimeout(() => {
        button.textContent = original;
    }, 2000);
}

function triggerPreview(button, className) {
    const demo = button.parentElement.querySelector("." + className);

    demo.classList.remove("play");
    void demo.offsetWidth;
    demo.classList.add("play");
}
</script>

</body>
</html>
