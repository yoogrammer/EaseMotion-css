<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-only Animated Solar System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-solar-system-container">
    <div class="ease-solar-system">
      <!-- Sun -->
      <div class="ease-sun"></div>

      <!-- Mercury Orbit & Planet -->
      <div class="ease-orbit ease-orbit-mercury">
        <div class="ease-planet ease-mercury"></div>
      </div>

      <!-- Venus Orbit & Planet -->
      <div class="ease-orbit ease-orbit-venus">
        <div class="ease-planet ease-venus"></div>
      </div>

      <!-- Earth Orbit & Planet -->
      <div class="ease-orbit ease-orbit-earth">
        <div class="ease-planet ease-earth">
          <!-- Moon -->
          <div class="ease-orbit-moon">
            <div class="ease-moon"></div>
          </div>
        </div>
      </div>

      <!-- Mars Orbit & Planet -->
      <div class="ease-orbit ease-orbit-mars">
        <div class="ease-planet ease-mars"></div>
      </div>
      
      <!-- Jupiter Orbit & Planet -->
      <div class="ease-orbit ease-orbit-jupiter">
        <div class="ease-planet ease-jupiter"></div>
      </div>
      
      <!-- Saturn Orbit & Planet -->
      <div class="ease-orbit ease-orbit-saturn">
        <div class="ease-planet ease-saturn">
          <!-- Saturn Rings -->
          <div class="ease-saturn-rings"></div>
        </div>
      </div>
    </div>
    
    <div class="ease-instruction">Hover to pause orbits</div>
  </div>
</body>
</html>
