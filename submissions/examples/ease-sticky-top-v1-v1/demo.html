<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-sticky-top Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { margin: 0; font-family: sans-serif; }
    .content { height: 200vh; padding: 2rem; }
  </style>
</head>
<body>
  <nav class="ease-sticky-top" style="background:#6366f1; color:white; padding:1rem 2rem;">
    Sticky Navigation Bar
  </nav>
  <div class="content">
    <p>Scroll down — the nav stays at the top.</p>
  </div>
</body>
</html>
