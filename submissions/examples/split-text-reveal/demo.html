<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Split Text Reveal - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Split Text Reveal</h1>
    <div class="split-reveal-wrapper">
      <span class="split-char" style="--i:0">H</span>
      <span class="split-char" style="--i:1">e</span>
      <span class="split-char" style="--i:2">l</span>
      <span class="split-char" style="--i:3">l</span>
      <span class="split-char" style="--i:4">o</span>
      <span class="split-char" style="--i:5">&nbsp;</span>
      <span class="split-char" style="--i:6">W</span>
      <span class="split-char" style="--i:7">o</span>
      <span class="split-char" style="--i:8">r</span>
      <span class="split-char" style="--i:9">l</span>
      <span class="split-char" style="--i:10">d</span>
    </div>
    <p class="description">Characters animate in sequence from bottom, fading up into place.</p>
  </div>
</body>
</html>
