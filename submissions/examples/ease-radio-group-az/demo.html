<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Group Component Demo</title>

  <link rel="stylesheet" href="../../../core/variables.css" />
  <link rel="stylesheet" href="../../../core/base.css" />
  <link rel="stylesheet" href="../../../core/utilities.css" />
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      padding: var(--ease-space-8);
      background: var(--ease-color-surface);
      color: var(--ease-color-neutral-900);
      font-family: var(--ease-font-sans);
    }
    .demo-section {
      margin-bottom: var(--ease-space-8);
    }
    h1 { font-size: 1.75rem; margin-bottom: var(--ease-space-2); }
    h2 { font-size: 1.125rem; margin-bottom: var(--ease-space-3); margin-top: var(--ease-space-6); }
    .demo-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--ease-space-6);
      align-items: flex-start;
    }
    legend.ease-radio-group-az {
      font-weight: 600;
      font-size: 0.875rem;
      color: var(--ease-color-neutral-700);
      margin-bottom: var(--ease-space-1);
    }
  </style>
</head>
<body>

  <h1>EaseMotion: <code class="ease-text-primary">ease-radio-group-az</code></h1>
  <p class="ease-text-muted ease-mb-8">An accessible CSS-only radio group with animated dot, card style, inline layout, and size variants.</p>

  <div class="demo-section">
    <h2>Default (Vertical)</h2>
    <fieldset class="ease-radio-group-az">
      <legend style="font-weight: 600; font-size: 0.875rem; color: var(--ease-color-neutral-600); margin-bottom: var(--ease-space-1);">Plan Selection</legend>
      <label class="ease-radio-option-az">
        <input type="radio" name="plan" value="free" checked>
        <span class="ease-radio-dot-az"></span>
        <span class="ease-radio-label-az">Free — up to 3 projects</span>
      </label>
      <label class="ease-radio-option-az">
        <input type="radio" name="plan" value="pro">
        <span class="ease-radio-dot-az"></span>
        <span class="ease-radio-label-az">Pro — unlimited projects</span>
      </label>
      <label class="ease-radio-option-az">
        <input type="radio" name="plan" value="enterprise">
        <span class="ease-radio-dot-az"></span>
        <span class="ease-radio-label-az">Enterprise — custom solutions</span>
      </label>
    </fieldset>
  </div>

  <div class="demo-section">
    <h2>Inline (Horizontal)</h2>
    <fieldset class="ease-radio-group-az inline">
      <legend style="font-weight: 600; font-size: 0.875rem; color: var(--ease-color-neutral-600); width: 100%; margin-bottom: var(--ease-space-1);">Sort By</legend>
      <label class="ease-radio-option-az">
        <input type="radio" name="sort" value="name" checked>
        <span class="ease-radio-dot-az"></span>
        <span class="ease-radio-label-az">Name</span>
      </label>
      <label class="ease-radio-option-az">
        <input type="radio" name="sort" value="date">
        <span class="ease-radio-dot-az"></span>
        <span class="ease-radio-label-az">Date</span>
      </label>
      <label class="ease-radio-option-az">
        <input type="radio" name="sort" value="size">
        <span class="ease-radio-dot-az"></span>
        <span class="ease-radio-label-az">Size</span>
      </label>
      <label class="ease-radio-option-az">
        <input type="radio" name="sort" value="type">
        <span class="ease-radio-dot-az"></span>
        <span class="ease-radio-label-az">Type</span>
      </label>
    </fieldset>
  </div>

  <div class="demo-section">
    <h2>Card Style</h2>
    <fieldset class="ease-radio-group-az inline">
      <legend style="font-weight: 600; font-size: 0.875rem; color: var(--ease-color-neutral-600); width: 100%; margin-bottom: var(--ease-space-1);">Billing</legend>
      <label class="ease-radio-option-az card">
        <input type="radio" name="billing" value="monthly" checked>
        <span class="ease-radio-dot-az"></span>
        <span>
          <div style="font-weight: 600;">Monthly</div>
          <div style="font-size: 0.75rem; color: var(--ease-color-neutral-500);">$29/mo</div>
        </span>
      </label>
      <label class="ease-radio-option-az card">
        <input type="radio" name="billing" value="yearly">
        <span class="ease-radio-dot-az"></span>
        <span>
          <div style="font-weight: 600;">Yearly</div>
          <div style="font-size: 0.75rem; color: var(--ease-color-neutral-500);">$290/yr</div>
        </span>
      </label>
      <label class="ease-radio-option-az card">
        <input type="radio" name="billing" value="lifetime">
        <span class="ease-radio-dot-az"></span>
        <span>
          <div style="font-weight: 600;">Lifetime</div>
          <div style="font-size: 0.75rem; color: var(--ease-color-neutral-500);">$999</div>
        </span>
      </label>
    </fieldset>
  </div>

  <div class="demo-section">
    <h2>Size Variants</h2>
    <div class="demo-row">
      <fieldset class="ease-radio-group-az sm">
        <legend style="font-weight: 600; font-size: 0.75rem; color: var(--ease-color-neutral-600); margin-bottom: var(--ease-space-1);">Small</legend>
        <label class="ease-radio-option-az">
          <input type="radio" name="size-sm" value="a" checked>
          <span class="ease-radio-dot-az"></span>
          <span class="ease-radio-label-az">Option A</span>
        </label>
        <label class="ease-radio-option-az">
          <input type="radio" name="size-sm" value="b">
          <span class="ease-radio-dot-az"></span>
          <span class="ease-radio-label-az">Option B</span>
        </label>
      </fieldset>
      <fieldset class="ease-radio-group-az">
        <legend style="font-weight: 600; font-size: 0.875rem; color: var(--ease-color-neutral-600); margin-bottom: var(--ease-space-1);">Default</legend>
        <label class="ease-radio-option-az">
          <input type="radio" name="size-md" value="a" checked>
          <span class="ease-radio-dot-az"></span>
          <span class="ease-radio-label-az">Option A</span>
        </label>
        <label class="ease-radio-option-az">
          <input type="radio" name="size-md" value="b">
          <span class="ease-radio-dot-az"></span>
          <span class="ease-radio-label-az">Option B</span>
        </label>
      </fieldset>
      <fieldset class="ease-radio-group-az lg">
        <legend style="font-weight: 600; font-size: 1rem; color: var(--ease-color-neutral-600); margin-bottom: var(--ease-space-1);">Large</legend>
        <label class="ease-radio-option-az">
          <input type="radio" name="size-lg" value="a" checked>
          <span class="ease-radio-dot-az"></span>
          <span class="ease-radio-label-az">Option A</span>
        </label>
        <label class="ease-radio-option-az">
          <input type="radio" name="size-lg" value="b">
          <span class="ease-radio-dot-az"></span>
          <span class="ease-radio-label-az">Option B</span>
        </label>
      </fieldset>
    </div>
  </div>

  <div class="demo-section">
    <h2>Disabled State</h2>
    <fieldset class="ease-radio-group-az">
      <legend style="font-weight: 600; font-size: 0.875rem; color: var(--ease-color-neutral-600); margin-bottom: var(--ease-space-1);">Notifications</legend>
      <label class="ease-radio-option-az">
        <input type="radio" name="notif" value="all" checked>
        <span class="ease-radio-dot-az"></span>
        <span class="ease-radio-label-az">All notifications</span>
      </label>
      <label class="ease-radio-option-az">
        <input type="radio" name="notif" value="mention">
        <span class="ease-radio-dot-az"></span>
        <span class="ease-radio-label-az">Mentions only</span>
      </label>
      <label class="ease-radio-option-az">
        <input type="radio" name="notif" value="none" disabled>
        <span class="ease-radio-dot-az"></span>
        <span class="ease-radio-label-az">None (disabled)</span>
      </label>
    </fieldset>
  </div>

</body>
</html>
