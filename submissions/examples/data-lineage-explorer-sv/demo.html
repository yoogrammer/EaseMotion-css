<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Lineage Explorer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="lineage-container">

<h2>Data Lineage Explorer</h2>

<div class="pipeline">

<div class="node source">
    <span class="status online"></span>
    <h3>CRM Database</h3>
    <p>Source System</p>
</div>

<div class="connector"></div>

<div class="node transform">
    <span class="status online"></span>
    <h3>ETL Pipeline</h3>
    <p>Transformation</p>
</div>

<div class="connector"></div>

<div class="node warehouse">
    <span class="status warning"></span>
    <h3>Data Warehouse</h3>
    <p>Storage Layer</p>
</div>

<div class="connector"></div>

<div class="node feature">
    <span class="status online"></span>
    <h3>Feature Store</h3>
    <p>ML Features</p>
</div>

<div class="connector"></div>

<div class="node analytics">
    <span class="status online"></span>
    <h3>Analytics</h3>
    <p>BI Dashboard</p>
</div>

</div>

</div>

</body>
</html>
