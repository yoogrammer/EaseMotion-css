<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Animated Morphing Button</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0d0d14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 2rem;
        }
        .container {
            text-align: center;
            max-width: 1000px;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #6c63ff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 2rem;
        }
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 3rem;
            margin: 3rem 0;
            justify-items: center;
        }
        .demo-item {
            text-align: center;
        }
        .demo-item p {
            color: #a1a1aa;
            margin-top: 1rem;
            font-size: 0.875rem;
        }
        .note {
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            color: #a1a1aa;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔄 Animated Morphing Button</h1>
    
    <div class="demo-grid">
        <div class="demo-item">
            <button class="ease-morph-btn">Hover Me</button>
            <p>Default morphing</p>
        </div>

        <div class="demo-item">
            <button class="ease-morph-btn ease-morph-fast">Fast Morph</button>
            <p>0.2s transition</p>
        </div>

        <div class="demo-item">
            <button class="ease-morph-btn ease-morph-slow">Slow Morph</button>
            <p>0.8s transition</p>
        </div>

        <div class="demo-item">
            <button class="ease-morph-btn ease-morph-pill">Pill Shape</button>
            <p>Morphs to pill on hover</p>
        </div>

        <div class="demo-item">
            <button class="ease-morph-btn ease-morph-square">Square Morph</button>
            <p>Morphs to square on hover</p>
        </div>

        <div class="demo-item">
            <button class="ease-morph-btn ease-morph-glow">Glow Morph</button>
            <p>With neon glow effect</p>
        </div>
    </div>

    <div class="note">
        💡 Buttons morph into different shapes on hover with smooth border-radius animation!
    </div>
</div>
</body>
</html>
