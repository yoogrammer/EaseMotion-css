<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Scramble Reveal - Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="header">
    <h1>Text Scramble Reveal</h1>
    <p>Terminal-style decryption animation.</p>
  </div>

  <div class="card">
    <h2
      class="ease-scramble-reveal"
      data-text="INITIALIZING..."
    >
      INITIALIZING...
    </h2>
  </div>

  <script>
    const letters =
      "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";

    const targets = document.querySelectorAll(
      ".ease-scramble-reveal"
    );

    targets.forEach((target) => {
      const finalText = target.dataset.text;
      let iteration = 0;

      const scramble = () => {
        const interval = setInterval(() => {
          target.textContent = finalText
            .split("")
            .map((char, index) => {
              if (index < iteration) return finalText[index];

              return letters[
                Math.floor(Math.random() * letters.length)
              ];
            })
            .join("");

          iteration += 0.25;

          if (iteration >= finalText.length) {
            target.textContent = finalText;
            clearInterval(interval);
          }
        }, 60);
      };

      scramble();
    });
  </script>

</body>
</html>
