<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification Center Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="notification-panel">


<h2>Notifications</h2>

<div class="notification unread">
  <div class="indicator"></div>
  <div class="content">
    <h4>New Message</h4>
    <p>You received a message from Alice.</p>
    <span>2 minutes ago</span>
  </div>
</div>

<div class="notification unread">
  <div class="indicator"></div>
  <div class="content">
    <h4>Project Update</h4>
    <p>Your dashboard redesign has been approved.</p>
    <span>15 minutes ago</span>
  </div>
</div>

<div class="notification">
  <div class="content">
    <h4>System Alert</h4>
    <p>Scheduled maintenance completed successfully.</p>
    <span>1 hour ago</span>
  </div>
</div>

<div class="notification">
  <div class="content">
    <h4>Task Completed</h4>
    <p>Brian marked a task as completed.</p>
    <span>Yesterday</span>
  </div>
</div>


  </div>

</body>
</html>
