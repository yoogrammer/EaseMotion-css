<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CSS Animation Variables</title>
<link rel="stylesheet" href="style.css" />
<style>
body { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; height:100vh; margin:0; background:#f9fafb; font-family:sans-serif; }
label { font-size:14px; color:#555; }
</style>
</head>
<body>
<label>Fast (0.3s)</label>
<div class="demo-box animate-fast"></div>
<label>Normal (0.6s)</label>
<div class="demo-box animate-normal"></div>
<label>Slow (1s)</label>
<div class="demo-box animate-slow"></div>
<label>Bounce</label>
<div class="demo-box animate-bounce"></div>
</body>
</html>
