<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Breadcrumb Animated Separator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>Chevron › rotate + scale</h2>
    <ol class="breadcrumb">
      <li><a href="#">Home</a><span class="separator">›</span></li>
      <li><a href="#">Products</a><span class="separator">›</span></li>
      <li><a href="#">Laptops</a></li>
    </ol>
  </div>

  <div class="card">
    <h2>Slash / skew + scale</h2>
    <ol class="breadcrumb slash">
      <li><a href="#">Dashboard</a><span class="separator">/</span></li>
      <li><a href="#">Settings</a><span class="separator">/</span></li>
      <li><a href="#">Profile</a></li>
    </ol>
  </div>

  <div class="card">
    <h2>Dot · bounce scale</h2>
    <ol class="breadcrumb dot">
      <li><a href="#">Docs</a><span class="separator">·</span></li>
      <li><a href="#">Components</a><span class="separator">·</span></li>
      <li><a href="#">Breadcrumb</a></li>
    </ol>
  </div>

</body>
</html>
