<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analog Clock</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h2 class="demo-title">Analog Clock</h2>
    <p class="demo-subtitle">Pure CSS rotating hands</p>

    <div class="clock">
      <!-- Tick marks -->
      <div class="clock-ticks">
        <span class="tick tick-hour" style="--i:1"></span>
        <span class="tick tick-hour" style="--i:2"></span>
        <span class="tick tick-hour" style="--i:3"></span>
        <span class="tick tick-hour" style="--i:4"></span>
        <span class="tick tick-hour" style="--i:5"></span>
        <span class="tick tick-hour" style="--i:6"></span>
        <span class="tick tick-hour" style="--i:7"></span>
        <span class="tick tick-hour" style="--i:8"></span>
        <span class="tick tick-hour" style="--i:9"></span>
        <span class="tick tick-hour" style="--i:10"></span>
        <span class="tick tick-hour" style="--i:11"></span>
        <span class="tick tick-hour" style="--i:12"></span>
      </div>

      <!-- Hour numbers -->
      <span class="clock-number" style="--n:1">1</span>
      <span class="clock-number" style="--n:2">2</span>
      <span class="clock-number" style="--n:3">3</span>
      <span class="clock-number" style="--n:4">4</span>
      <span class="clock-number" style="--n:5">5</span>
      <span class="clock-number" style="--n:6">6</span>
      <span class="clock-number" style="--n:7">7</span>
      <span class="clock-number" style="--n:8">8</span>
      <span class="clock-number" style="--n:9">9</span>
      <span class="clock-number" style="--n:10">10</span>
      <span class="clock-number" style="--n:11">11</span>
      <span class="clock-number" style="--n:12">12</span>

      <!-- Hands -->
      <div class="clock-hand clock-hand--hour"   id="hand-hour"></div>
      <div class="clock-hand clock-hand--minute" id="hand-minute"></div>
      <div class="clock-hand clock-hand--second" id="hand-second"></div>

      <!-- Center cap -->
      <div class="clock-center"></div>
    </div>

    <!-- Digital readout -->
    <p class="clock-digital" id="digital-readout"></p>
  </div>

  <script>
    function updateClock() {
      const now    = new Date();
      const h      = now.getHours() % 12;
      const m      = now.getMinutes();
      const s      = now.getSeconds();
      const ms     = now.getMilliseconds();

      // Smooth second hand (no tick)
      const sDeg   = (s + ms / 1000) * 6;
      const mDeg   = (m + s / 60)    * 6;
      const hDeg   = (h + m / 60)    * 30;

      document.getElementById('hand-second').style.transform =
        `translateX(-50%) rotate(${sDeg}deg)`;
      document.getElementById('hand-minute').style.transform =
        `translateX(-50%) rotate(${mDeg}deg)`;
      document.getElementById('hand-hour').style.transform =
        `translateX(-50%) rotate(${hDeg}deg)`;

      // Digital readout
      const hh  = String(now.getHours()).padStart(2, '0');
      const mm  = String(m).padStart(2, '0');
      const ss  = String(s).padStart(2, '0');
      document.getElementById('digital-readout').textContent =
        `${hh}:${mm}:${ss}`;
    }

    // Run at ~60fps for smooth second hand
    function loop() {
      updateClock();
      requestAnimationFrame(loop);
    }
    loop();
  </script>

</body>
</html>
