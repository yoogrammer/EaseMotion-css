<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Glow Border Card - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div
      class="demo-wrapper"
      style="
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
      "
    >
      <div style="text-align: center; max-width: 450px">
        <h1
          style="
            font-size: 2rem;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(135deg, #ffffff, #a0aec0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
          "
        >
          Animated Glow Card
        </h1>
        <p
          style="
            color: var(--ease-text-sub);
            font-size: 0.95rem;
            margin: 0;
            line-height: 1.5;
          "
        >
          Hover over the card to experience the GPU-accelerated gradient glow
          expansion.
        </p>
      </div>

      <!-- The Glow Card component -->
      <div class="ease-glow-wrapper">
        <div class="ease-glow-card-inner">
          <h3>Creative Motion</h3>
          <p>
            A GPU-accelerated neon border glow card built using pure CSS custom
            properties and multiple layered background gradients.
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
