<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Word Scrambler Showcase</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #0a0a0c;
            color: #f1f5f9;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container { text-align: center; max-width: 700px; }
        h1 { font-size: 2rem; margin-bottom: 5px; color: #94a3b8; letter-spacing: 1px; }
        .hint { color: #475569; font-size: 0.9rem; margin-bottom: 40px; }
        .card { background: #111115; border: 1px solid #1e1e24; border-radius: 12px; padding: 30px; margin-bottom: 25px; }
        .label { font-size: 0.75rem; color: #475569; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        .display-text { font-size: 2.5rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Cyberpunk Word Scrambler</h1>
        <p class="hint">Hover your mouse cursor over the words below to trigger decoding sequence matrices.</p>

        <div class="card">
            <div class="label">Standard Decode (Matrix Green Theme)</div>
            <div class="display-text">
                <span class="ease-scrambler-text theme-matrix" data-speed="40">EASEMOTION</span>
            </div>
        </div>

        <div class="card">
            <div class="label">Fast Speed Decode (Neon Overdrive Theme)</div>
            <div class="display-text">
                <span class="ease-scrambler-text theme-neon" data-speed="20">CYBERPUNK</span>
            </div>
        </div>

        <div class="card">
            <div class="label">Slow Speed Progressive Reveal (Amber Terminal Theme)</div>
            <div class="display-text">
                <span class="ease-scrambler-text theme-amber" data-speed="80">INTERFACE</span>
            </div>
        </div>
    </div>

    <script>
        function scrambleWord(element, targetText, speedInterval) {
            const chars = '!@#$%^&*()_+~`|}{[]\:;?><,./-=0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let iteration = 0;
            clearInterval(element.scrambleInterval);

            element.scrambleInterval = setInterval(() => {
                element.innerText = targetText
                    .split("")
                    .map((letter, index) => {
                        if (index < iteration) {
                            return targetText[index];
                        }
                        return chars[Math.floor(Math.random() * chars.length)];
                    })
                    .join("");

                if (iteration >= targetText.length) {
                    clearInterval(element.scrambleInterval);
                }
                iteration += 1 / 3;
            }, speedInterval);
        }

        document.querySelectorAll('.ease-scrambler-text').forEach(el => {
            const originalText = el.innerText;
            const speed = parseInt(el.getAttribute('data-speed')) || 40;

            el.addEventListener('mouseenter', () => {
                scrambleWord(el, originalText, speed);
            });
        });
    </script>
</body>
</html>
