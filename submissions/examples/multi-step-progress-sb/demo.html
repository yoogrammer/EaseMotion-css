<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS-only Multi-step Progress Component - EaseMotion CSS</title>
    <!-- Link to EaseMotion CSS core -->
    <link rel="stylesheet" href="../../../core/animations.css" />
    <!-- Link to your CSS file - do not change this path -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-wrapper">
      <h1>CSS-only Multi-step Progress</h1>
      <p class="demo-subtitle">
        A responsive stepper component built entirely with CSS.
      </p>

      <section class="demo-section">
        <h2>Checkout Flow Example</h2>
        <div class="stepper">
          <div class="step completed">
            <div class="step-circle" aria-label="Step 1 completed">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
            <span>Account</span>
          </div>

          <div class="step completed">
            <div class="step-circle" aria-label="Step 2 completed">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
            <span>Profile</span>
          </div>

          <div class="step active" aria-current="step">
            <div class="step-circle" aria-label="Step 3 active">3</div>
            <span>Verification</span>
          </div>

          <div class="step">
            <div class="step-circle" aria-label="Step 4 pending">4</div>
            <span>Finish</span>
          </div>
        </div>
      </section>

      <section class="demo-section" style="margin-top: 5rem">
        <h2>Simple Onboarding Example</h2>
        <div class="stepper">
          <div class="step completed">
            <div class="step-circle" aria-label="Step 1 completed">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
            <span>Welcome</span>
          </div>

          <div class="step active" aria-current="step">
            <div class="step-circle" aria-label="Step 2 active">2</div>
            <span>Preferences</span>
          </div>

          <div class="step">
            <div class="step-circle" aria-label="Step 3 pending">3</div>
            <span>Explore</span>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
