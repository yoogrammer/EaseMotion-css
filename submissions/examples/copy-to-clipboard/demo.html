<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copy to Clipboard — EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      max-width: 720px;
      margin: 60px auto;
      padding: 0 24px;
      background: #0f172a;
      color: #f8fafc;
    }
    h1 { margin-bottom: 8px; }
    p { color: #94a3b8; margin-bottom: 32px; }
    pre {
      background: #1e293b;
      border-radius: 8px;
      padding: 20px;
      overflow-x: auto;
      margin-bottom: 24px;
    }
    code { background: #f2f2f2; font-size: 0.88rem; color: #842a51; }
  </style>
</head>
<body>

  <h1>Copy to Clipboard</h1>
  <p>Hover over any code block and click <strong>Copy</strong> to copy it to your clipboard.</p>

  <div class="ease-code-wrapper">
    <pre><code>&lt;button class="ease-btn ease-btn-primary"&gt;Primary&lt;/button&gt;</code></pre>
    <button class="ease-copy-btn" aria-label="Copy code">Copy</button>
  </div>

  <div class="ease-code-wrapper">
    <pre><code>npm install easemotion-css</code></pre>
    <button class="ease-copy-btn" aria-label="Copy code">Copy</button>
  </div>

  <div class="ease-code-wrapper">
    <pre><code>&lt;div class="ease-fade-in ease-slide-up"&gt;Hello&lt;/div&gt;</code></pre>
    <button class="ease-copy-btn" aria-label="Copy code">Copy</button>
  </div>

  <script>
document.querySelectorAll('.ease-copy-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const code = btn.closest('.ease-code-wrapper').querySelector('code').innerText;

    // Fallback for file:// protocol
    const fallback = (text) => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    };

    const confirm = (btn) => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2000);
    };

    if (navigator.clipboard && location.protocol !== 'file:') {
      navigator.clipboard.writeText(code).then(() => confirm(btn));
    } else {
      fallback(code);
      confirm(btn);
    }
  });
});    document.querySelectorAll('.ease-copy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const code = btn.closest('.ease-code-wrapper').querySelector('code').innerText;
        navigator.clipboard.writeText(code).then(() => {
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = 'Copy';
            btn.classList.remove('copied');
          }, 2000);
        });
      });
    });
  </script>

</body>
</html>
