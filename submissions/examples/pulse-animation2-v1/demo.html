<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Animation Effect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Pulse Animation</h1>
    <p class="subtitle">Rhythmic scaling animation for notifications and CTAs</p>

    <!-- Default Pulse -->
    <div class="variant">
      <h3>Default</h3>
      <div class="pulse"></div>
    </div>

    <!-- Pulse Button -->
    <div class="variant">
      <h3>Pulse Button</h3>
      <button class="btn btn--pulse">
        <span class="pulse pulse--inline"></span>
        Live
      </button>
    </div>

    <!-- Pulse Badge -->
    <div class="variant">
      <h3>Pulse Badge</h3>
      <div class="badge-wrapper">
        <span class="badge">Messages</span>
        <span class="pulse pulse--badge">3</span>
      </div>
    </div>

    <!-- Pulse Ring -->
    <div class="variant">
      <h3>Pulse Ring</h3>
      <div class="pulse pulse--ring"></div>
    </div>

    <!-- Pulse Dot -->
    <div class="variant">
      <h3>Pulse Dot</h3>
      <div class="pulse pulse--dot"></div>
    </div>

    <!-- Pulse Avatar -->
    <div class="variant">
      <h3>Pulse Avatar</h3>
      <div class="avatar-wrapper">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar" class="avatar">
        <span class="pulse pulse--avatar"></span>
      </div>
    </div>

    <!-- Speed Variants -->
    <div class="variant">
      <h3>Speed Variants</h3>
      <div class="speed-row">
        <div class="pulse pulse--slow"></div>
        <span class="speed-label">Slow</span>
        <div class="pulse pulse--fast"></div>
        <span class="speed-label">Fast</span>
      </div>
    </div>

    <!-- Color Variants -->
    <div class="variant">
      <h3>Color Variants</h3>
      <div class="color-row">
        <div class="pulse pulse--success"></div>
        <div class="pulse pulse--warning"></div>
        <div class="pulse pulse--error"></div>
        <div class="pulse pulse--info"></div>
      </div>
    </div>

    <!-- Double Pulse -->
    <div class="variant">
      <h3>Double Pulse</h3>
      <div class="pulse pulse--double"></div>
    </div>

    <!-- Ripple Effect -->
    <div class="variant">
      <h3>Ripple Effect</h3>
      <div class="pulse pulse--ripple"></div>
    </div>

    <!-- Pulse Card -->
    <div class="variant">
      <h3>Pulse Card</h3>
      <div class="card">
        <div class="pulse pulse--card"></div>
        <h4>Status</h4>
        <p>System is online</p>
      </div>
    </div>
  </div>
</body>
</html>
