<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Wave Button - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Liquid Wave Button</h1>
    <div class="button-group">
      <button class="liquid-btn liquid-primary">Submit</button>
      <button class="liquid-btn liquid-secondary">Download</button>
      <button class="liquid-btn liquid-accent">Explore</button>
    </div>
    <p class="description">Hover over any button to see the liquid wave fill animation. The button fills from below like rising water using a pseudo-element wave effect. Supports light and dark mode.</p>
  </div>
</body>
</html>
