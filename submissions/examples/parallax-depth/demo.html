<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parallax Depth Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="parallax-card" id="parallaxCard">
    <div class="parallax-layer layer-bg" data-speed="0.1"></div>
    <div class="parallax-layer layer-accent" data-speed="0.3"></div>
    <div class="parallax-layer layer-content">
      <h2>Parallax Depth</h2>
      <p>Move your mouse over this card.</p>
    </div>
  </div>

  <script>
    const card = document.getElementById('parallaxCard');
    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width - 0.5) * 2;
      const y = ((e.clientY - rect.top) / rect.height - 0.5) * 2;
      card.querySelectorAll('.parallax-layer').forEach(layer => {
        const speed = parseFloat(layer.dataset.speed);
        layer.style.setProperty('--px', (x * speed * 30).toFixed(1) + 'px');
        layer.style.setProperty('--py', (y * speed * 30).toFixed(1) + 'px');
      });
    });
    card.addEventListener('mouseleave', () => {
      card.querySelectorAll('.parallax-layer').forEach(layer => {
        layer.style.setProperty('--px', '0px');
        layer.style.setProperty('--py', '0px');
      });
    });
  </script>
</body>
</html>
