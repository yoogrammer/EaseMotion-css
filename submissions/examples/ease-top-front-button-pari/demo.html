<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Top Front Button Animation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>Top Front Button — Hover & Click</h2>
    <div>
      <button class="ease-top-front-btn purple">
        ⚡ Get Started
      </button>
      <button class="ease-top-front-btn green">
        ✓ Confirm
      </button>
      <button class="ease-top-front-btn orange">
        🔥 Explore
      </button>
      <button class="ease-top-front-btn pink">
        💜 Subscribe
      </button>
    </div>
  </div>

  <div class="card">
    <h2>Press & Release to feel the depth</h2>
    <button class="ease-top-front-btn purple" style="font-size:17px; padding:16px 48px;">
      🚀 Launch Now
    </button>
  </div>

</body>
</html>
