<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Banner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Base Banner -->
    <div class="ease-banner">
        🚀 Welcome to EaseMotion CSS! Explore smooth and modern UI components.
    </div>

    <!-- Dismissible Banner -->
    <input type="checkbox" id="dismiss-banner" hidden>

    <div class="ease-banner ease-banner-dismissible">
        <span>
            🎉 New component released! Check out the latest updates.
        </span>

        <label for="dismiss-banner" class="close-btn">&times;</label>
    </div>

</body>
</html>
