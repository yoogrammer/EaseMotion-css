<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ease Toast – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
      background: #f5f5f5;
    }
    button {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      color: white;
    }
    .btn-success { background: #22c55e; }
    .btn-error   { background: #ef4444; }
    .btn-info    { background: #3b82f6; }
  </style>
</head>
<body>

  <h2>Ease Toast Demo</h2>
  <button class="btn-success" onclick="showToast('success')">Show Success</button>
  <button class="btn-error"   onclick="showToast('error')">Show Error</button>
  <button class="btn-info"    onclick="showToast('info')">Show Info</button>

  <div id="toast-container"
       class="ease-toast-container ease-position-top-right">
  </div>

  <script>
    function showToast(type) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      const messages = {
        success: '✅ Action completed successfully!',
        error:   '❌ Something went wrong!',
        info:    'ℹ️ Here is some information.'
      };
      toast.className = `ease-toast ease-toast-${type}`;
      toast.textContent = messages[type];
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('hide');
        setTimeout(() => toast.remove(), 400);
      }, 3000);
    }
  </script>

</body>
</html>
