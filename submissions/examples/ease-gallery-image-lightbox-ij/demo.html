<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Gallery Image Lightbox</title>
</head>
<body>
  <h1>Gallery Image Lightbox</h1>
  <div class="lightbox-grid" id="lightboxGrid">
    <div class="lb-item" data-index="0"><img src="https://picsum.photos/id/1015/400/300" alt="Mountain valley" loading="lazy"></div>
    <div class="lb-item" data-index="1"><img src="https://picsum.photos/id/1016/400/300" alt="Winding road" loading="lazy"></div>
    <div class="lb-item" data-index="2"><img src="https://picsum.photos/id/1018/400/300" alt="Mountain peak" loading="lazy"></div>
    <div class="lb-item" data-index="3"><img src="https://picsum.photos/id/1020/400/300" alt="Black dog" loading="lazy"></div>
    <div class="lb-item" data-index="4"><img src="https://picsum.photos/id/1024/400/300" alt="Bird on branch" loading="lazy"></div>
    <div class="lb-item" data-index="5"><img src="https://picsum.photos/id/1035/400/300" alt="Nature stream" loading="lazy"></div>
  </div>

  <div class="lightbox-overlay" id="lightboxOverlay">
    <button class="lightbox-close" id="lbClose" aria-label="Close">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lbPrev" aria-label="Previous">&#10094;</button>
    <button class="lightbox-nav lightbox-next" id="lbNext" aria-label="Next">&#10095;</button>
    <div class="lightbox-image-wrap">
      <img class="lightbox-image" id="lbImage" alt="">
      <p class="lightbox-counter" id="lbCounter"></p>
    </div>
    <div class="lightbox-thumbs" id="lbThumbs"></div>
  </div>
  <script>
    const grid = document.getElementById('lightboxGrid');
    const overlay = document.getElementById('lightboxOverlay');
    const lbImage = document.getElementById('lbImage');
    const lbCounter = document.getElementById('lbCounter');
    const lbThumbs = document.getElementById('lbThumbs');
    const lbClose = document.getElementById('lbClose');
    const lbPrev = document.getElementById('lbPrev');
    const lbNext = document.getElementById('lbNext');

    const images = [
      { src: 'https://picsum.photos/id/1015/800/600', thumb: 'https://picsum.photos/id/1015/400/300', alt: 'Mountain valley' },
      { src: 'https://picsum.photos/id/1016/800/600', thumb: 'https://picsum.photos/id/1016/400/300', alt: 'Winding road' },
      { src: 'https://picsum.photos/id/1018/800/600', thumb: 'https://picsum.photos/id/1018/400/300', alt: 'Mountain peak' },
      { src: 'https://picsum.photos/id/1020/800/600', thumb: 'https://picsum.photos/id/1020/400/300', alt: 'Black dog' },
      { src: 'https://picsum.photos/id/1024/800/600', thumb: 'https://picsum.photos/id/1024/400/300', alt: 'Bird on branch' },
      { src: 'https://picsum.photos/id/1035/800/600', thumb: 'https://picsum.photos/id/1035/400/300', alt: 'Nature stream' },
    ];

    let currentIndex = 0;
    let isOpen = false;

    document.querySelectorAll('.lb-item').forEach((item, i) => {
      item.addEventListener('click', () => openLightbox(i));
    });

    function openLightbox(index) {
      if (isOpen) return;
      isOpen = true;
      currentIndex = index;
      overlay.classList.add('active');
      updateImage();
      renderThumbs();
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      if (!isOpen) return;
      isOpen = false;
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    }

    function updateImage() {
      const item = images[currentIndex];
      lbImage.classList.remove('fade-in');
      void lbImage.offsetWidth;
      lbImage.src = item.src;
      lbImage.alt = item.alt;
      lbCounter.textContent = `${currentIndex + 1} / ${images.length}`;
      requestAnimationFrame(() => {
        lbImage.classList.add('fade-in');
      });
      updateThumbActive();
    }

    function goPrev() {
      if (!isOpen) return;
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      updateImage();
    }

    function goNext() {
      if (!isOpen) return;
      currentIndex = (currentIndex + 1) % images.length;
      updateImage();
    }

    function renderThumbs() {
      lbThumbs.innerHTML = '';
      images.forEach((item, i) => {
        const thumb = document.createElement('img');
        thumb.src = item.thumb;
        thumb.alt = item.alt;
        thumb.className = 'lb-thumb' + (i === currentIndex ? ' active' : '');
        thumb.addEventListener('click', () => {
          if (isOpen) { currentIndex = i; updateImage(); }
        });
        lbThumbs.appendChild(thumb);
      });
    }

    function updateThumbActive() {
      const thumbs = lbThumbs.querySelectorAll('.lb-thumb');
      thumbs.forEach((t, i) => t.classList.toggle('active', i === currentIndex));
    }

    lbClose.addEventListener('click', closeLightbox);
    lbPrev.addEventListener('click', goPrev);
    lbNext.addEventListener('click', goNext);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeLightbox();
    });
    document.addEventListener('keydown', (e) => {
      if (!isOpen) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') goPrev();
      if (e.key === 'ArrowRight') goNext();
    });
  </script>
</body>
</html>
