<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particle Orbit Loader – EaseMotion CSS</title>
  <meta name="description" content="Loading spinner with particles orbiting a central core using CSS rotate animation." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Particle Orbit Loader</h1>
  <p>CSS-only orbiting particle spinner</p>

  <div class="orbit-loader" role="status" aria-label="Loading">
    <div class="orbit-core"></div>
    <div class="orbit-ring orbit-ring--1">
      <span class="particle"></span>
      <span class="particle"></span>
      <span class="particle"></span>
    </div>
    <div class="orbit-ring orbit-ring--2">
      <span class="particle particle--sm"></span>
      <span class="particle particle--sm"></span>
    </div>
    <span class="sr-only">Loading…</span>
  </div>
</body>
</html>
