<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List Style Utilities — Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
      max-width: 960px;
      width: 100%;
    }
    .demo-card {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .demo-card h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 0.75rem;
    }
    .demo-card ul, .demo-card ol {
      padding-left: 1.5rem;
    }
    .demo-card li {
      line-height: 1.6;
      color: #333;
    }
    .class-name {
      display: inline-block;
      margin-top: 0.75rem;
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 0.8rem;
      color: #666;
      background: #f0f0f0;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="demo-grid">
    <div class="demo-card">
      <h3>None</h3>
      <ul class="list-none">
        <li>Home</li>
        <li>About</li>
        <li>Services</li>
        <li>Contact</li>
      </ul>
      <span class="class-name">.list-none</span>
    </div>
    <div class="demo-card">
      <h3>Disc</h3>
      <ul class="list-disc">
        <li>Apples</li>
        <li>Bananas</li>
        <li>Cherries</li>
        <li>Dates</li>
      </ul>
      <span class="class-name">.list-disc</span>
    </div>
    <div class="demo-card">
      <h3>Decimal</h3>
      <ol class="list-decimal">
        <li>First step</li>
        <li>Second step</li>
        <li>Third step</li>
        <li>Fourth step</li>
      </ol>
      <span class="class-name">.list-decimal</span>
    </div>
    <div class="demo-card">
      <h3>Square</h3>
      <ul class="list-square">
        <li>Item one</li>
        <li>Item two</li>
        <li>Item three</li>
        <li>Item four</li>
      </ul>
      <span class="class-name">.list-square</span>
    </div>
  </div>
</body>
</html>
