<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-bounce — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; letter-spacing: 0.05em; }
    .row { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; align-items: center; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .icon { font-size: 3rem; display: inline-block; }
    .card {
      padding: 1rem 2rem; border-radius: 12px;
      background: #6366f1; color: #fff; font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>ease-bounce</h1>
  <div class="section">
    <div class="label">Bounce animation examples</div>
    <div class="row">
      <span class="icon ease-bounce">🔔</span>
      <div class="card ease-bounce">Click me</div>
      <span class="icon ease-bounce">⭐</span>
    </div>
  </div>
</body>
</html>
