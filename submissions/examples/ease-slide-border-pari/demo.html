<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Slide Border Utility</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>Border slides from left & right</h2>
    <div class="slide-border-box slide-border-left"
      style="background:#f5f3ff; color:#6c63ff;">
      ← Slide from Left
    </div>
    <div class="slide-border-box slide-border-right"
      style="background:#fff7ed; color:#f97316;">
      Slide from Right →
    </div>
  </div>

  <div class="card">
    <h2>Border expands from center</h2>
    <div class="slide-border-center"
      style="background:#f0fdf4; color:#10b981;">
      Expand from Center
    </div>
  </div>

  <div class="card">
    <h2>Full border outline on hover</h2>
    <div class="slide-border-outline"
      style="background:#fdf2f8; color:#ec4899;">
      Outline on Hover
    </div>
  </div>

</body>
</html>
