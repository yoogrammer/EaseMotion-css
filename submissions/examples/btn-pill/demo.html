<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-btn-pill — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 2.5rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; }
    .label { font-size: 0.75rem; color: #555; text-align: center; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .row { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; align-items: center; }
    .card {
      padding: 1.5rem 2rem; border-radius: 10px;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      text-align: center;
    }
    .card p { margin: 0.5rem 0 0; color: #888; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>ease-btn-pill</h1>
  <div class="section">
    <div class="label">Button variants</div>
    <div class="row">
      <button class="ease-btn ease-btn-primary ease-btn-pill">Primary</button>
      <button class="ease-btn ease-btn-success ease-btn-pill">Success</button>
      <button class="ease-btn ease-btn-danger ease-btn-pill">Danger</button>
      <button class="ease-btn ease-btn-outline ease-btn-pill">Outline</button>
      <button class="ease-btn ease-btn-ghost ease-btn-pill">Ghost</button>
    </div>
  </div>
  <div class="section">
    <div class="label">Size variants</div>
    <div class="row">
      <button class="ease-btn ease-btn-primary ease-btn-pill ease-btn-sm">Small</button>
      <button class="ease-btn ease-btn-primary ease-btn-pill">Default</button>
      <button class="ease-btn ease-btn-primary ease-btn-pill ease-btn-lg">Large</button>
      <button class="ease-btn ease-btn-primary ease-btn-pill ease-btn-xl">XL</button>
    </div>
  </div>
  <div class="section">
    <div class="label">With hover lift</div>
    <div class="row">
      <button class="ease-btn ease-btn-primary ease-btn-pill ease-btn-hover">Hover me</button>
      <button class="ease-btn ease-btn-outline ease-btn-pill ease-btn-hover">Outline + Hover</button>
    </div>
  </div>
  <div class="section">
    <div class="label">Full width block</div>
    <div class="row" style="width: 100%; max-width: 400px;">
      <button class="ease-btn ease-btn-primary ease-btn-pill ease-btn-block">Full Width Pill</button>
    </div>
  </div>
  <div class="section">
    <div class="label">Icon-only pill</div>
    <div class="row">
      <button class="ease-btn ease-btn-primary ease-btn-pill-icon" aria-label="Search">🔍</button>
      <button class="ease-btn ease-btn-outline ease-btn-pill-icon" aria-label="Settings">⚙️</button>
      <button class="ease-btn ease-btn-ghost ease-btn-pill-icon" aria-label="Close">✕</button>
    </div>
  </div>
</body>
</html>
