<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism Animated Toast</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="font-family: system-ui, sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0;">
  
  <div style="text-align: center; margin-bottom: 2rem;">
    <h1>Glassmorphism Toast Notifications</h1>
    <p style="color: #94a3b8;">Click the buttons below to trigger the pure CSS toast notifications.</p>
  </div>

  <div style="display: flex; gap: 1rem;">
    <!-- Hidden checkbox triggers -->
    <input type="checkbox" id="toast-success-toggle" class="toast-trigger-aemi" />
    <label class="ease-btn-demo" for="toast-success-toggle" style="background: #10b981;">✅ Show Success</label>

    <input type="checkbox" id="toast-error-toggle" class="toast-trigger-aemi" />
    <label class="ease-btn-demo" for="toast-error-toggle" style="background: #ef4444;">❌ Show Error</label>
  </div>

  <!-- Toast Container -->
  <div class="ease-toast-container-aemi">
    <!-- Success Toast -->
    <div class="ease-toast-aemi ease-toast-success-aemi" id="toast-success">
      <div class="toast-icon-aemi">✅</div>
      <div class="toast-content-aemi">
        <strong>Success!</strong>
        <span>Your changes have been saved successfully.</span>
      </div>
      <label class="toast-close-aemi" for="toast-success-toggle">✕</label>
    </div>

    <!-- Error Toast -->
    <div class="ease-toast-aemi ease-toast-error-aemi" id="toast-error">
      <div class="toast-icon-aemi">❌</div>
      <div class="toast-content-aemi">
        <strong>Error!</strong>
        <span>Failed to save changes. Please try again.</span>
      </div>
      <label class="toast-close-aemi" for="toast-error-toggle">✕</label>
    </div>
  </div>

</body>
</html>
