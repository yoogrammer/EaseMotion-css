<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Date Duration Calculator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator-wrapper">
    <h1>Date Duration Calculator</h1>
    <div class="date-inputs">
      <div class="field">
        <label for="startDate">Start Date</label>
        <input type="date" id="startDate" class="input">
      </div>
      <div class="field">
        <label for="endDate">End Date</label>
        <input type="date" id="endDate" class="input">
      </div>
    </div>
    <div class="presets">
      <button class="preset-btn" data-preset="week">This Week</button>
      <button class="preset-btn" data-preset="month">This Month</button>
      <button class="preset-btn" data-preset="year">This Year</button>
      <button class="preset-btn" data-preset="30days">Last 30 Days</button>
    </div>
    <div class="duration-grid">
      <div class="duration-item">
        <span class="duration-value" id="years">0</span>
        <span class="duration-label">Years</span>
      </div>
      <div class="duration-item">
        <span class="duration-value" id="months">0</span>
        <span class="duration-label">Months</span>
      </div>
      <div class="duration-item">
        <span class="duration-value" id="days">0</span>
        <span class="duration-label">Days</span>
      </div>
      <div class="duration-item">
        <span class="duration-value" id="hours">0</span>
        <span class="duration-label">Hours</span>
      </div>
      <div class="duration-item">
        <span class="duration-value" id="minutes">0</span>
        <span class="duration-label">Minutes</span>
      </div>
      <div class="duration-item">
        <span class="duration-value" id="seconds">0</span>
        <span class="duration-label">Seconds</span>
      </div>
    </div>
    <div class="total-days">
      <span>Total Days: <strong id="totalDays">0</strong></span>
    </div>
  </div>
  <script>
    const startDate = document.getElementById('startDate');
    const endDate = document.getElementById('endDate');
    const years = document.getElementById('years');
    const months = document.getElementById('months');
    const days = document.getElementById('days');
    const hours = document.getElementById('hours');
    const minutes = document.getElementById('minutes');
    const seconds = document.getElementById('seconds');
    const totalDays = document.getElementById('totalDays');

    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    startDate.value = yyyy + '-' + mm + '-01';
    endDate.value = yyyy + '-' + mm + '-' + dd;

    function animate(el, target) {
      const current = parseInt(el.textContent) || 0;
      const diff = target - current;
      if (diff === 0) return;
      const duration = 500;
      const start = performance.now();
      function step(time) {
        const progress = Math.min((time - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(current + diff * eased);
        if (progress < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function calculate() {
      const start = new Date(startDate.value);
      const end = new Date(endDate.value);
      if (isNaN(start.getTime()) || isNaN(end.getTime())) return;

      const diffMs = end - start;
      const diffSeconds = Math.floor(diffMs / 1000);
      const diffMinutes = Math.floor(diffSeconds / 60);
      const diffHours = Math.floor(diffMinutes / 60);
      const diffDays = Math.floor(diffHours / 24);

      let y = end.getFullYear() - start.getFullYear();
      let m = end.getMonth() - start.getMonth();
      let d = end.getDate() - start.getDate();
      if (d < 0) { m--; const prevMonth = new Date(end.getFullYear(), end.getMonth(), 0); d += prevMonth.getDate(); }
      if (m < 0) { y--; m += 12; }

      animate(years, y);
      animate(months, m);
      animate(days, d);
      animate(hours, diffHours);
      animate(minutes, diffMinutes);
      animate(seconds, diffSeconds);
      totalDays.textContent = diffDays;
    }

    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const preset = btn.dataset.preset;
        const now = new Date();
        let start, end;
        switch (preset) {
          case 'week': {
            const dayOfWeek = now.getDay();
            start = new Date(now);
            start.setDate(now.getDate() - dayOfWeek);
            end = now;
            break;
          }
          case 'month':
            start = new Date(now.getFullYear(), now.getMonth(), 1);
            end = now;
            break;
          case 'year':
            start = new Date(now.getFullYear(), 0, 1);
            end = now;
            break;
          case '30days':
            start = new Date(now);
            start.setDate(now.getDate() - 30);
            end = now;
            break;
        }
        startDate.value = start.toISOString().split('T')[0];
        endDate.value = end.toISOString().split('T')[0];
        calculate();
      });
    });

    startDate.addEventListener('change', calculate);
    endDate.addEventListener('change', calculate);
    calculate();
  </script>
</body>
</html>
