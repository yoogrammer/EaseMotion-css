<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Speed Controller</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Animation Speed Controller</h1>

  <div class="preview animate" id="box">
    EaseMotion
  </div>

  <label for="speed">
    Animation Duration:
    <span id="speedValue">1s</span>
  </label>

  <input
    type="range"
    id="speed"
    min="0.5"
    max="3"
    step="0.5"
    value="1"
  >
</div>

<script>
const slider = document.getElementById("speed");
const box = document.getElementById("box");
const speedValue = document.getElementById("speedValue");

slider.addEventListener("input", () => {
  const duration = slider.value + "s";

  speedValue.textContent = duration;

  box.style.animation = "none";
  void box.offsetWidth;

  box.style.animation = `fadeSlide ${duration} ease`;
});
</script>

</body>
</html>
