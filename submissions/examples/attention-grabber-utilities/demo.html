<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attention-Grabber Utilities - EaseMotion-css</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      text-align: center;
      background: #1e293b;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }
    h1 { margin-bottom: 8px; color: #38bdf8; }
    p { color: #94a3b8; margin-bottom: 40px; }
    
    .demo-zone {
      display: flex;
      gap: 40px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }
    
    .action-btn {
      background-color: #2563eb;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
    }
    
    .badge-wrapper {
      position: relative;
      display: inline-block;
    }
    .badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background-color: #ef4444;
      color: white;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 999px;
      font-weight: bold;
    }
    
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0f172a;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
    }
    .dot {
      width: 10px;
      height: 10px;
      background-color: #22c55e;
      border-radius: 50%;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Attention-Grabber Utilities</h1>
    <p>Semantic micro-interactions designed to subtly direct user focus to interactive layers.</p>
    
    <div class="demo-zone">
      <!-- Showcase 1: Pulsing Ring on CTA Button -->
      <button class="action-btn attention-ring">Checkout Now</button>
      
      <!-- Showcase 2: Scale Pulse on a Notification Badge -->
      <div class="badge-wrapper">
        <button class="action-btn" style="background: #475569;">Inbox</button>
        <span class="badge attention-pulse">NEW</span>
      </div>
      
      <!-- Showcase 3: Continuous Live Status Dot Indicator -->
      <div class="status-indicator">
        <span class="dot attention-pulse"></span>
        <span>Live Server</span>
      </div>
    </div>
  </div>

</body>
</html>
