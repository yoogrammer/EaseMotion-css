<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-list-style-type Utilities Demo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Inter, sans-serif;
        max-width: 500px;
        margin: 0 auto;
        padding: 2rem;
        background: #f8fafc;
      }
      h2 {
        color: #6366f1;
      }
      .group {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 0.5rem 1.5rem;
        margin-bottom: 1rem;
      }
      .group h3 {
        margin: 0.75rem 0 0.5rem;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <h2>list-style-type Utilities</h2>
    <div class="group">
      <h3>ease-list-disc</h3>
      <ul class="ease-list-disc">
        <li>Apples</li>
        <li>Bananas</li>
        <li>Cherries</li>
      </ul>
    </div>
    <div class="group">
      <h3>ease-list-decimal</h3>
      <ol class="ease-list-decimal">
        <li>First step</li>
        <li>Second step</li>
        <li>Third step</li>
      </ol>
    </div>
    <div class="group">
      <h3>ease-list-square</h3>
      <ul class="ease-list-square">
        <li>Item one</li>
        <li>Item two</li>
        <li>Item three</li>
      </ul>
    </div>
    <div class="group">
      <h3>ease-list-none</h3>
      <ul class="ease-list-none">
        <li>No bullet</li>
        <li>Clean list</li>
        <li>Custom marker area</li>
      </ul>
    </div>
  </body>
</html>
