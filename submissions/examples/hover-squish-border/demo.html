<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-hover-squish-border — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif; display: flex; flex-direction: column;
      align-items: center; justify-content: center; min-height: 100vh;
      background: #0f0f0f; gap: 2.5rem; padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; }
    .label { font-size:0.75rem; color:#555; text-align:center; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.75rem; }
    .section { display:flex; flex-direction:column; align-items:center; }
    .row { display:flex; gap:1.5rem; flex-wrap:wrap; justify-content:center; align-items:center; }
    .squish-btn {
      padding: 0.75rem 2rem; border: 2px solid #6366f1; border-radius: 12px;
      background: transparent; color: #6366f1; font-size: 1rem; font-weight: 600;
      cursor: pointer; display: inline-block;
    }
    .squish-card {
      width: 180px; height: 120px; border-radius: 12px;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 500; font-size: 0.9rem;
    }
    .hint { color: #555; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>ease-hover-squish-border</h1>
  <p class="hint">Hover over any element below</p>
  <div class="section">
    <div class="label">Speed variants</div>
    <div class="row">
      <button class="squish-btn ease-hover-squish-border ease-squish-fast">Fast</button>
      <button class="squish-btn ease-hover-squish-border">Default</button>
      <button class="squish-btn ease-hover-squish-border ease-squish-slow">Slow</button>
    </div>
  </div>
  <div class="section">
    <div class="label">On different elements</div>
    <div class="row">
      <div class="squish-card ease-hover-squish-border">Card</div>
      <span class="ease-hover-squish-border" style="color:#fff;font-size:1.3rem;font-weight:700;padding:0.5rem 1rem;border:2px solid #6366f1;border-radius:12px;">Inline text</span>
      <div class="ease-chip ease-hover-squish-border">Chip</div>
    </div>
  </div>
  <div class="section">
    <div class="label">With button variants</div>
    <div class="row">
      <button class="ease-btn ease-btn-primary ease-hover-squish-border">Primary</button>
      <button class="ease-btn ease-btn-outline ease-hover-squish-border">Outline</button>
      <button class="ease-btn ease-btn-success ease-hover-squish-border">Success</button>
    </div>
  </div>
</body>
</html>
