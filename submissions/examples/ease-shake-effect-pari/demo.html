<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shake Effect</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>Shake — Error State</h2>
    <input id="inp1" class="input-box input-error" 
      value="Wrong password!" readonly />
    <br/>
    <button class="btn btn-red" onclick="triggerShake('inp1','shake')">
      ▶ Shake
    </button>
  </div>

  <div class="card">
    <h2>Shake Fast — Critical Error</h2>
    <div id="box2" class="alert-box"
      style="background:#fff5f5; color:#ef4444; border:1px solid #fca5a5;">
      ⚠️ Invalid credentials!
    </div>
    <button class="btn btn-orange" onclick="triggerShake('box2','shake-fast')">
      ▶ Shake Fast
    </button>
  </div>

  <div class="card">
    <h2>Shake Soft — Attention</h2>
    <div id="box3" class="alert-box"
      style="background:#fffbeb; color:#f97316; border:1px solid #fcd34d;">
      💡 Don't forget to save!
    </div>
    <button class="btn btn-purple" onclick="triggerShake('box3','shake-soft')">
      ▶ Shake Soft
    </button>
  </div>

  <div class="card">
    <h2>Shake Vertical — Notification</h2>
    <div id="box4" class="alert-box"
      style="background:#eff6ff; color:#3b82f6; border:1px solid #93c5fd;">
      🔔 New message received!
    </div>
    <button class="btn btn-blue" onclick="triggerShake('box4','shake-vertical')">
      ▶ Shake Vertical
    </button>
  </div>

  <script>
    function triggerShake(id, cls) {
      const el = document.getElementById(id);
      el.classList.remove('shake','shake-fast','shake-soft','shake-vertical');
      void el.offsetWidth;
      el.classList.add(cls);
    }
  </script>

</body>
</html>
