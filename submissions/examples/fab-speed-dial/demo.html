<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — FAB Speed Dial Wheel</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
    }
  </style>
</head>
<body>

  <header style="max-width: 440px; margin-top: 2rem;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Speed-Dial Overlay Rails</h1>
    <p style="color: #64748b; margin: 6px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Click the floating action trigger button in the bottom-right corner. Staggered transition arrays expand secondary nodes at 60fps with 0 JavaScript lines.</p>
  </header>

  <div class="alm-fab-container">
    <input type="checkbox" id="fabMenuState" class="alm-fab-state-checkbox">
    
    <label for="fabMenuState" class="alm-fab-trigger" title="Toggle Utilities Menu">
      <span class="alm-fab-icon">+</span>
    </label>

    <ul class="alm-speed-dial-list">
      <li>
        <a href="#" class="alm-dial-node" title="System Logs Analytics">📊</a>
      </li>
      <li>
        <a href="#" class="alm-dial-node" title="Database Sync Configuration">⚙️</a>
      </li>
      <li>
        <a href="#" class="alm-dial-node" title="Cluster Cloud Deployments">📦</a>
      </li>
    </ul>
  </div>

</body>
</html>
