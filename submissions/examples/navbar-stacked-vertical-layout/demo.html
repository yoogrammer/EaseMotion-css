<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar Stacked Vertical Layout</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

    <aside class="sidebar">

        <div class="logo">
            EaseMotion
        </div>

        <nav class="nav-menu">

            <a href="#" class="nav-item active">
                <span>🏠</span>
                <span>Dashboard</span>
            </a>

            <a href="#" class="nav-item">
                <span>📊</span>
                <span>Analytics</span>
            </a>

            <a href="#" class="nav-item">
                <span>📁</span>
                <span>Projects</span>
            </a>

            <a href="#" class="nav-item">
                <span>👥</span>
                <span>Team</span>
            </a>

            <a href="#" class="nav-item">
                <span>⚙️</span>
                <span>Settings</span>
            </a>

            <a href="#" class="nav-item">
                <span>❓</span>
                <span>Support</span>
            </a>

        </nav>

    </aside>

    <main class="content">

        <div class="hero-card">

            <h1>Navbar Stacked Vertical Layout</h1>

            <p>
                A reusable sidebar navigation pattern with
                stacked menu items, active states, hover
                animations, and dashboard-ready layouts.
            </p>

        </div>

        <div class="cards">

            <div class="card">
                <h3>Total Users</h3>
                <span>12,458</span>
            </div>

            <div class="card">
                <h3>Revenue</h3>
                <span>$48,250</span>
            </div>

            <div class="card">
                <h3>Projects</h3>
                <span>124</span>
            </div>

        </div>

    </main>

</div>

</body>
</html>
