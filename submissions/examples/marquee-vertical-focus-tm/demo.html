<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Marquee Vertical and Pause-on-Focus - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Marquee — Vertical and Pause-on-Focus</h1>
    <p class="description">
      Self-contained demo. Tab into the second marquee to see
      pause-on-focus.
    </p>

    <h2>Vertical</h2>
    <div class="ease-marquee ease-marquee-vertical demo-vertical">
      <div class="ease-marquee-track">
        <div class="ease-marquee-item">AAPL +1.2%</div>
        <div class="ease-marquee-item">GOOGL -0.4%</div>
        <div class="ease-marquee-item">MSFT +0.8%</div>
        <div class="ease-marquee-item">TSLA +3.1%</div>
        <div class="ease-marquee-item">AMZN -0.2%</div>
        <!-- duplicate for seamless loop -->
        <div class="ease-marquee-item">AAPL +1.2%</div>
        <div class="ease-marquee-item">GOOGL -0.4%</div>
        <div class="ease-marquee-item">MSFT +0.8%</div>
      </div>
    </div>

    <h2>Pause on focus</h2>
    <div class="ease-marquee ease-marquee-pause-on-focus demo-horizontal" tabindex="0">
      <div class="ease-marquee-track">
        <div class="ease-marquee-item">Tab into me</div>
        <div class="ease-marquee-item">to pause</div>
        <div class="ease-marquee-item">the animation</div>
        <div class="ease-marquee-item">Tab into me</div>
        <div class="ease-marquee-item">to pause</div>
        <div class="ease-marquee-item">the animation</div>
      </div>
    </div>

  </div>

</body>
</html>
