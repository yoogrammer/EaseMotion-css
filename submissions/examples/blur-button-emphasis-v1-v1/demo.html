<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blur Button Emphasis — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Blur Button Emphasis</h1>
    <p class="subtitle">
      Click any button to trigger a blur emphasis animation —<br />
      the button blurs, brightens, and scales before snapping back sharp.
    </p>

    <div class="button-grid">
      <button class="blur-btn" data-btn="primary">
        Submit &rarr;
      </button>
      <button class="blur-btn btn-cyan" data-btn="cyan">
        Download &downarrow;
      </button>
      <button class="blur-btn btn-emerald" data-btn="emerald">
        Confirm &checkmark;
      </button>
      <button class="blur-btn btn-rose" data-btn="rose">
        Delete &times;
      </button>
    </div>

    <button id="resetAll" class="reset-btn hidden">Reset All &crarr;</button>
  </div>

  <script>
    const btns = document.querySelectorAll('.blur-btn');
    const resetBtn = document.getElementById('resetAll');

    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        btn.classList.add('emphasis-active');
        setTimeout(() => {
          resetBtn.classList.remove('hidden');
        }, 450);
      });
    });

    resetBtn.addEventListener('click', () => {
      btns.forEach(b => b.classList.remove('emphasis-active'));
      resetBtn.classList.add('hidden');
    });
  </script>
</body>
</html>
