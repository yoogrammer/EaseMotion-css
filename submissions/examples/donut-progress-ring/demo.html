<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donut Progress Ring Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      font-family: sans-serif;
      background: #f4f5f7;
      padding: 3rem 2rem;
    }

    h3 {
      margin: 0 0 1.25rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      text-align: center;
    }

    section {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .dark-bg {
      background: #1f2937;
      padding: 2rem;
      border-radius: 16px;
    }
  </style>
</head>
<body>

  <!-- Color variants -->
  <section>
    <h3>Color Variants</h3>
    <div class="row">

      <div class="donut-ring donut-ring-animate" style="--donut-percent: 75;">
        <div class="donut-label">75%<span>Default</span></div>
      </div>

      <div class="donut-ring donut-success donut-ring-animate" style="--donut-percent: 90;">
        <div class="donut-label">90%<span>Success</span></div>
      </div>

      <div class="donut-ring donut-danger donut-ring-animate" style="--donut-percent: 35;">
        <div class="donut-label">35%<span>Danger</span></div>
      </div>

      <div class="donut-ring donut-warning donut-ring-animate" style="--donut-percent: 60;">
        <div class="donut-label">60%<span>Warning</span></div>
      </div>

      <div class="donut-ring donut-info donut-ring-animate" style="--donut-percent: 50;">
        <div class="donut-label">50%<span>Info</span></div>
      </div>

    </div>
  </section>

  <!-- Size variants -->
  <section>
    <h3>Size Variants</h3>
    <div class="row">

      <div class="donut-ring donut-ring-sm donut-ring-animate" style="--donut-percent: 65;">
        <div class="donut-label">65%</div>
      </div>

      <div class="donut-ring donut-ring-animate" style="--donut-percent: 80;">
        <div class="donut-label">80%</div>
      </div>

      <div class="donut-ring donut-ring-lg donut-ring-animate" style="--donut-percent: 45;">
        <div class="donut-label">45%<span>Storage</span></div>
      </div>

    </div>
  </section>

  <!-- Dark background -->
  <section>
    <h3>On Dark Background</h3>
    <div class="row dark-bg">

      <div class="donut-ring donut-ring-dark donut-ring-animate" style="--donut-percent: 72;">
        <div class="donut-label">72%<span>CPU</span></div>
      </div>

      <div class="donut-ring donut-success donut-ring-dark donut-ring-animate" style="--donut-percent: 88;">
        <div class="donut-label">88%<span>Health</span></div>
      </div>

      <div class="donut-ring donut-danger donut-ring-dark donut-ring-animate" style="--donut-percent: 22;">
        <div class="donut-label">22%<span>Battery</span></div>
      </div>

    </div>
  </section>

</body>
</html>
