<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-modal-pr Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 4rem 2rem;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }
    
    .demo-section h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #1e293b;
    }
    
    .trigger-btn {
      padding: 0.75rem 1.5rem;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
  </style>
</head>
<body>

  <div class="demo-section">
    <h2>CSS-Only Modal</h2>
    <a href="#modal-demo" class="trigger-btn">Open Modal</a>
  </div>

  <!-- Modal -->
  <div id="modal-demo" class="modal-pr-overlay">
    <div class="modal-pr">
      <div class="modal-pr-header">
        <h3 class="modal-pr-title">Confirm Action</h3>
        <a href="#" class="modal-pr-close" aria-label="Close modal">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </a>
      </div>
      <div class="modal-pr-body">
        <p>Are you sure you want to proceed? This action cannot be undone. All associated data will be permanently removed from the system.</p>
      </div>
      <div class="modal-pr-footer">
        <a href="#" class="modal-pr-btn modal-pr-btn-secondary">Cancel</a>
        <a href="#" class="modal-pr-btn modal-pr-btn-primary">Confirm</a>
      </div>
    </div>
  </div>

</body>
</html>
