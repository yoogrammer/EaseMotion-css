<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Digital Clock</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="clock">
    <div class="clock-display">
      <span class="clock-digits" id="time">00:00:00</span>
      <span class="clock-ampm" id="ampm">AM</span>
    </div>
    <div class="clock-date" id="date">Loading...</div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      let h = now.getHours();
      const m = String(now.getMinutes()).padStart(2, "0");
      const s = String(now.getSeconds()).padStart(2, "0");
      const ampm = h >= 12 ? "PM" : "AM";
      h = h % 12 || 12;
      document.getElementById("time").textContent = `${String(h).padStart(2, "0")}:${m}:${s}`;
      document.getElementById("ampm").textContent = ampm;
      const opts = { weekday: "long", month: "long", day: "numeric", year: "numeric" };
      document.getElementById("date").textContent = now.toLocaleDateString("en-US", opts);
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
