<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grade Calculator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator-wrapper">
    <h1>Grade Calculator</h1>
    <div class="categories" id="categories"></div>
    <div class="results">
      <div class="result-row">
        <span>Current Overall Grade</span>
        <span id="overallGrade" class="grade-value">0.0%</span>
      </div>
      <div class="result-row">
        <span>Letter Grade</span>
        <span id="letterGrade" class="grade-badge">F</span>
      </div>
    </div>
    <div class="what-if">
      <h3>What-If Scenario</h3>
      <div class="field">
        <label for="whatIfScore">Projected Score on Next Assignment (%)</label>
        <input type="number" id="whatIfScore" class="input" value="90" min="0" max="100">
      </div>
      <div class="field">
        <label for="whatIfWeight">Weight of Next Assignment (%)</label>
        <input type="number" id="whatIfWeight" class="input" value="10" min="1" max="100">
      </div>
      <div class="result-row">
        <span>Projected Grade</span>
        <span id="projectedGrade" class="grade-value">0.0%</span>
      </div>
    </div>
  </div>
  <script>
    const categoriesContainer = document.getElementById('categories');
    const overallGrade = document.getElementById('overallGrade');
    const letterGrade = document.getElementById('letterGrade');
    const whatIfScore = document.getElementById('whatIfScore');
    const whatIfWeight = document.getElementById('whatIfWeight');
    const projectedGrade = document.getElementById('projectedGrade');

    const categories = [
      { name: 'Homework', weight: 20, assignments: [{ name: 'HW 1', score: 88 }, { name: 'HW 2', score: 92 }, { name: 'HW 3', score: 85 }, { name: 'HW 4', score: 90 }] },
      { name: 'Exams', weight: 50, assignments: [{ name: 'Midterm', score: 78 }, { name: 'Final', score: 82 }] },
      { name: 'Participation', weight: 10, assignments: [{ name: 'Class Participation', score: 95 }] },
      { name: 'Projects', weight: 20, assignments: [{ name: 'Project 1', score: 88 }, { name: 'Project 2', score: 91 }] }
    ];

    function getGradeColor(grade) {
      if (grade >= 90) return '#22c55e';
      if (grade >= 80) return '#3b82f6';
      if (grade >= 70) return '#eab308';
      if (grade >= 60) return '#f97316';
      return '#ef4444';
    }

    function getLetter(grade) {
      if (grade >= 93) return 'A';
      if (grade >= 90) return 'A-';
      if (grade >= 87) return 'B+';
      if (grade >= 83) return 'B';
      if (grade >= 80) return 'B-';
      if (grade >= 77) return 'C+';
      if (grade >= 73) return 'C';
      if (grade >= 70) return 'C-';
      if (grade >= 67) return 'D+';
      if (grade >= 60) return 'D';
      return 'F';
    }

    function render() {
      categoriesContainer.innerHTML = '';
      categories.forEach((cat, ci) => {
        const catDiv = document.createElement('div');
        catDiv.className = 'category';
        catDiv.innerHTML = `<div class="category-header"><span>${cat.name}</span><span class="category-weight">${cat.weight}%</span></div>`;
        const list = document.createElement('div');
        list.className = 'assignment-list';
        cat.assignments.forEach((a, ai) => {
          const row = document.createElement('div');
          row.className = 'assignment-row';
          row.innerHTML = `
            <span>${a.name}</span>
            <input type="number" class="input score-input" value="${a.score}" min="0" max="100" data-ci="${ci}" data-ai="${ai}">
          `;
          list.appendChild(row);
        });
        const addBtn = document.createElement('button');
        addBtn.className = 'add-btn';
        addBtn.textContent = '+ Add Assignment';
        addBtn.addEventListener('click', () => {
          cat.assignments.push({ name: 'New', score: 0 });
          render();
          calculate();
        });
        catDiv.appendChild(list);
        catDiv.appendChild(addBtn);
        categoriesContainer.appendChild(catDiv);
      });
    }

    function calculate() {
      document.querySelectorAll('.score-input').forEach(inp => {
        const ci = parseInt(inp.dataset.ci);
        const ai = parseInt(inp.dataset.ai);
        categories[ci].assignments[ai].score = parseFloat(inp.value) || 0;
      });

      let weightedSum = 0;
      let totalWeight = 0;

      categories.forEach(cat => {
        if (cat.assignments.length === 0) return;
        const avg = cat.assignments.reduce((s, a) => s + a.score, 0) / cat.assignments.length;
        weightedSum += avg * (cat.weight / 100);
        totalWeight += cat.weight;
      });

      const currentGrade = totalWeight > 0 ? (weightedSum / totalWeight) * 100 : 0;
      overallGrade.textContent = currentGrade.toFixed(1) + '%';
      overallGrade.style.color = getGradeColor(currentGrade);
      const letter = getLetter(currentGrade);
      letterGrade.textContent = letter;
      letterGrade.style.background = getGradeColor(currentGrade);

      const projScore = parseFloat(whatIfScore.value) || 0;
      const projWeight = parseFloat(whatIfWeight.value) || 0;
      const remainingWeight = 100 - totalWeight;
      const effectiveProjWeight = Math.min(projWeight, remainingWeight);
      const projected = remainingWeight > 0
        ? ((weightedSum * 100) + projScore * effectiveProjWeight) / (totalWeight + effectiveProjWeight)
        : currentGrade;
      projectedGrade.textContent = projected.toFixed(1) + '%';
      projectedGrade.style.color = getGradeColor(projected);
    }

    document.addEventListener('input', (e) => {
      if (e.target.classList.contains('score-input') || e.target.id === 'whatIfScore' || e.target.id === 'whatIfWeight') {
        calculate();
      }
    });

    render();
    calculate();
  </script>
</body>
</html>
