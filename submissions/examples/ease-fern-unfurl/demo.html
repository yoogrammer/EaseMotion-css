<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Fern Unfurl Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Fern Unfurl Animation</h1>
        <div class="fern-container">
            <svg class="fern" viewBox="0 0 100 100">
                <path class="stem" d="M50,90 Q50,40 50,20 Q50,10 60,15" />
                <circle class="frond" cx="60" cy="15" r="5" />
            </svg>
        </div>
        <button onclick="document.location.reload()">Replay Animation</button>
    </div>
</body>
</html>
