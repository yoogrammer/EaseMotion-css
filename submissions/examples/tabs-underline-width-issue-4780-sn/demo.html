<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabs Underline Width Demo</title>
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../components/tabs.css">
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 3rem;
      max-width: 600px;
      margin: 0 auto;
      background: #f8fafc;
      color: #0f172a;
    }
    .demo-container {
      margin-top: 2rem;
      padding: 2rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .tab-panel-content {
      padding: 1rem 0;
    }
  </style>
</head>
<body>
  <h1>Tabs Underline Width Demo</h1>
  <p>Verify that the sliding underline works perfectly and matches the 25% tab width on this 4-tab group when using the <code>.ease-tabs-4</code> modifier class.</p>

  <div class="demo-container">
    <div class="ease-tabs ease-tabs-4">
      <!-- Inputs -->
      <input type="radio" id="tab-1" name="demo-tabs" class="ease-tab-input" checked>
      <input type="radio" id="tab-2" name="demo-tabs" class="ease-tab-input">
      <input type="radio" id="tab-3" name="demo-tabs" class="ease-tab-input">
      <input type="radio" id="tab-4" name="demo-tabs" class="ease-tab-input">

      <!-- Navigation -->
      <div class="ease-tabs-nav">
        <label for="tab-1" class="ease-tab-label">Overview</label>
        <label for="tab-2" class="ease-tab-label">Features</label>
        <label for="tab-3" class="ease-tab-label">Pricing</label>
        <label for="tab-4" class="ease-tab-label">Reviews</label>
        <div class="ease-tab-underline"></div>
      </div>

      <!-- Content -->
      <div class="ease-tabs-content">
        <div class="ease-tab-panel">
          <div class="tab-panel-content">This is the Overview section.</div>
        </div>
        <div class="ease-tab-panel">
          <div class="tab-panel-content">This is the Features section.</div>
        </div>
        <div class="ease-tab-panel">
          <div class="tab-panel-content">This is the Pricing section.</div>
        </div>
        <div class="ease-tab-panel">
          <div class="tab-panel-content">This is the Reviews section.</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
