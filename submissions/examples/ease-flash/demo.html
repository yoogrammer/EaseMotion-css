<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ease-flash Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="demo-container">
        <h1>ease-flash</h1>
        <p class="subtitle">
            Rapid visibility flicker animation for alerts and notifications.
        </p>

        <div class="alert-card ease-flash">
            ⚠ Warning: Connection Lost
        </div>

        <div class="notification-card ease-flash">
            🔔 New Notification Received
        </div>

        <div class="status-card ease-flash">
            🚨 Emergency System Alert
        </div>
    </div>

</body>
</html>
