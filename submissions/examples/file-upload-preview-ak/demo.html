<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Upload Preview</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>File Upload Preview</h1>
    <p>Drag & drop an image or click to browse.</p>
    <div id="drop-zone" class="dropzone">
      <span class="dropzone-icon">+</span>
      <span class="dropzone-text">Drop image here or click to select</span>
      <input type="file" id="file-input" accept="image/*" hidden />
    </div>
    <div id="preview" class="preview hidden">
      <img id="preview-img" alt="Preview" />
      <div class="meta">
        <span id="file-name"></span>
        <span id="file-size"></span>
      </div>
      <button id="remove-btn" class="remove-btn">Remove</button>
    </div>
  </div>
  <script>
    const dropZone = document.getElementById("drop-zone");
    const fileInput = document.getElementById("file-input");
    const preview = document.getElementById("preview");
    const previewImg = document.getElementById("preview-img");
    const fileName = document.getElementById("file-name");
    const fileSize = document.getElementById("file-size");
    const removeBtn = document.getElementById("remove-btn");

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / 1048576).toFixed(1) + " MB";
    }

    function showFile(file) {
      if (!file.type.startsWith("image/")) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        previewImg.src = e.target.result;
        fileName.textContent = file.name;
        fileSize.textContent = formatSize(file.size);
        dropZone.classList.add("hidden");
        preview.classList.remove("hidden");
      };
      reader.readAsDataURL(file);
    }

    dropZone.addEventListener("click", function() { fileInput.click(); });
    fileInput.addEventListener("change", function() {
      if (fileInput.files.length) showFile(fileInput.files[0]);
    });
    dropZone.addEventListener("dragover", function(e) {
      e.preventDefault();
      dropZone.classList.add("dragover");
    });
    dropZone.addEventListener("dragleave", function() {
      dropZone.classList.remove("dragover");
    });
    dropZone.addEventListener("drop", function(e) {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      if (e.dataTransfer.files.length) showFile(e.dataTransfer.files[0]);
    });
    removeBtn.addEventListener("click", function() {
      preview.classList.add("hidden");
      dropZone.classList.remove("hidden");
      fileInput.value = "";
      previewImg.src = "";
    });
  </script>
</body>
</html>
