<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skeleton – Missing var() fallbacks</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Bug: var() fallbacks missing</h1>
  <p>Skeleton backgrounds resolve to <code>initial</code> (transparent) without the base layer.</p>

  <div class="ease-skeleton-block ease-skeleton-shimmer" style="width:300px;height:20px;margin-bottom:12px"></div>
  <div class="ease-skeleton-block ease-skeleton-pulse" style="width:200px;height:20px;margin-bottom:12px"></div>
  <div class="ease-skeleton-block ease-skeleton-shimmer" style="width:100%;height:60px;border-radius:8px"></div>

  <hr />
  <h2>Fix</h2>
  <pre>
/* Before */
background: var(--ease-color-neutral-100);
/* After */
background: var(--ease-color-neutral-100, #f1f5f9);
  </pre>
</body>
</html>
