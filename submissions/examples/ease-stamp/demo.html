<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-stamp | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      gap: 3rem;
    }

    h1 {
      color: #ffffff;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      opacity: 0.4;
      text-transform: uppercase;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
    }

    /* --- Document Card --- */
    .doc-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      cursor: pointer;
      transition: border-color 0.3s;
      min-width: 220px;
    }

    .doc-card:hover { border-color: #7c6ef7; }

    .doc-title {
      color: #a0a0c0;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .doc-lines {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .doc-line {
      height: 8px;
      background: #2a2a4a;
      border-radius: 4px;
    }

    .doc-line.short { width: 60%; }

    /* --- Stamp Labels --- */
    .stamp-label {
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.5rem 1.2rem;
      border: 4px solid currentColor;
      border-radius: 8px;
      color: var(--stamp-color);
      text-shadow: 0 0 12px var(--stamp-color);
      box-shadow: 0 0 16px -4px var(--stamp-color),
                  inset 0 0 12px -6px var(--stamp-color);
      background: transparent;
      font-family: 'Courier New', monospace;
      transform: rotate(-6deg);
    }

    /* --- Badge Stamp --- */
    .badge-stamp {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: conic-gradient(
        var(--stamp-color) 0deg,
        transparent 0deg
      );
      border: 4px solid var(--stamp-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 0 20px -4px var(--stamp-color);
    }

    /* --- Image Stamp --- */
    .img-stamp {
      width: 90px;
      height: 90px;
      border-radius: 12px;
      object-fit: cover;
      border: 3px solid var(--stamp-color);
      box-shadow: 0 0 20px -4px var(--stamp-color);
      background: linear-gradient(135deg, #1e1e2e, #2a1a3e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    .hint {
      color: #ffffff25;
      font-size: 0.75rem;
      margin-top: -1rem;
    }

    .card-label {
      color: #ffffff30;
      font-size: 0.7rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>ease-stamp — Click anything to replay</h1>

  <div class="demo-grid">

    <!-- Approved -->
    <div class="doc-card" onclick="replayStamp(this.querySelector('.stamp'))">
      <span class="doc-title">Contract Review</span>
      <div class="doc-lines">
        <div class="doc-line"></div>
        <div class="doc-line"></div>
        <div class="doc-line short"></div>
      </div>
      <div class="stamp stamp-green">
        <span class="stamp-label" style="--stamp-color:#16a34a">✓ Approved</span>
      </div>
      <span class="card-label">click to replay</span>
    </div>

    <!-- Rejected -->
    <div class="doc-card" onclick="replayStamp(this.querySelector('.stamp'))">
      <span class="doc-title">Access Request</span>
      <div class="doc-lines">
        <div class="doc-line"></div>
        <div class="doc-line short"></div>
        <div class="doc-line"></div>
      </div>
      <div class="stamp">
        <span class="stamp-label" style="--stamp-color:#dc2626">✗ Rejected</span>
      </div>
      <span class="card-label">click to replay</span>
    </div>

    <!-- Badge -->
    <div class="doc-card" onclick="replayStamp(this.querySelector('.stamp'))">
      <span class="doc-title">Achievement Badge</span>
      <div class="stamp stamp-gold">
        <div class="badge-stamp" style="--stamp-color:#d97706">🏆</div>
      </div>
      <span class="card-label">click to replay</span>
    </div>

    <!-- New Label -->
    <div class="doc-card" onclick="replayStamp(this.querySelector('.stamp'))">
      <span class="doc-title">Product Tag</span>
      <div class="stamp stamp-purple">
        <span class="stamp-label" style="--stamp-color:#7c3aed">★ New</span>
      </div>
      <span class="card-label">click to replay</span>
    </div>

  </div>

  <p class="hint">↑ click any card to replay the stamp</p>

  <script>
    function replayStamp(el) {
      el.classList.remove('stamp');
      void el.offsetWidth;
      el.classList.add('stamp');
      // also replay the ::after ink ring
      el.style.animation = 'none';
      void el.offsetWidth;
      el.style.animation = '';
    }

    // auto-stamp all on load with staggered delay
    document.querySelectorAll('.stamp').forEach((el, i) => {
      el.style.animationDelay = `${i * 0.15}s`;
    });
  </script>

</body>
</html>
