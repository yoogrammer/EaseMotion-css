<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toggle Switch — Submission Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px 20px;
    }

    h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin: 0 0 16px 0;
    }

    .demo-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .demo-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }

    span.label {
      font-size: 14px;
      color: #475569;
    }
  </style>
</head>
<body>

  <!-- Default -->
  <div class="demo-group">
    <h2>Default</h2>
    <div class="demo-row">
      <label class="toggle">
        <input type="checkbox">
        <span class="toggle-track">
          <span class="toggle-knob"></span>
        </span>
      </label>
      <span class="label">Off</span>
    </div>
    <div class="demo-row">
      <label class="toggle">
        <input type="checkbox" checked>
        <span class="toggle-track">
          <span class="toggle-knob"></span>
        </span>
      </label>
      <span class="label">On</span>
    </div>
  </div>

  <!-- Sizes -->
  <div class="demo-group">
    <h2>Sizes</h2>
    <div class="demo-row">
      <label class="toggle toggle-sm">
        <input type="checkbox" checked>
        <span class="toggle-track">
          <span class="toggle-knob"></span>
        </span>
      </label>
      <span class="label">Small</span>
    </div>
    <div class="demo-row">
      <label class="toggle">
        <input type="checkbox" checked>
        <span class="toggle-track">
          <span class="toggle-knob"></span>
        </span>
      </label>
      <span class="label">Default</span>
    </div>
    <div class="demo-row">
      <label class="toggle toggle-lg">
        <input type="checkbox" checked>
        <span class="toggle-track">
          <span class="toggle-knob"></span>
        </span>
      </label>
      <span class="label">Large</span>
    </div>
  </div>

  <!-- Disabled -->
  <div class="demo-group">
    <h2>Disabled</h2>
    <div class="demo-row">
      <label class="toggle">
        <input type="checkbox" disabled>
        <span class="toggle-track">
          <span class="toggle-knob"></span>
        </span>
      </label>
      <span class="label">Disabled off</span>
    </div>
    <div class="demo-row">
      <label class="toggle">
        <input type="checkbox" checked disabled>
        <span class="toggle-track">
          <span class="toggle-knob"></span>
        </span>
      </label>
      <span class="label">Disabled on</span>
    </div>
  </div>

</body>
</html>
