<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS animation-composition – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1 class="title"><code>animation-composition</code></h1>
  <p class="subtitle">How <code>replace</code>, <code>add</code>, and <code>accumulate</code> merge overlapping animations.</p>

  <div class="demo-grid">
    <div class="demo-card">
      <div class="card-label">replace</div>
      <div class="box replace"></div>
    </div>
    <div class="demo-card">
      <div class="card-label">add</div>
      <div class="box add"></div>
    </div>
    <div class="demo-card">
      <div class="card-label">accumulate</div>
      <div class="box accumulate"></div>
    </div>
  </div>

  <div class="legend">
    <p>All three run a <code>scale(1 → 1.5)</code> and <code>rotate(0 → 180deg)</code> animation simultaneously.</p>
  </div>
</div>

</body>
</html>
