<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  </head>
<body>

<div id="wrap">
  <div id="title-row">
    <svg viewBox="0 0 98 96" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path fill-rule="evenodd" clip-rule="evenodd" d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z" fill="currentColor"/>
    </svg>
    <span id="title-text">Star History</span>
  </div>

  <div id="legend-row">
    <div id="legend-pill">
      <div id="legend-swatch"></div>
      <span>Swishy/create</span>
    </div>
  </div>

  <div id="chart-wrap">
    <svg id="chart-svg" viewBox="0 0 420 340" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>
</body>
<script>
(function() {
  const PAD = { top: 12, right: 16, bottom: 52, left: 60 };
  const VW = 420, VH = 340;
  const CW = VW - PAD.left - PAD.right;
  const CH = VH - PAD.top - PAD.bottom;

  const xLabels = ['06 PM', 'Thu 29', '06 AM', '12 PM', '06 PM', 'Fri 30', '06 AM'];
  const yTicks = [0, 5500, 11000, 16500, 22000, 27500];
  const yAxisLabel = 'GitHub Stars';
  const xAxisLabel = 'Date';

  const rawData = [
    [0, 0],[0.03,20],[0.08,60],[0.15,150],[0.2,250],[0.25,400],[0.3,600],[0.35,900],
    [0.38,1100],[0.4,1400],[0.42,1800],[0.44,2400],[0.46,3000],[0.48,3600],[0.5,4500],
    [0.52,5300],[0.54,6100],[0.56,7200],[0.58,8500],[0.6,10000],[0.62,11800],[0.64,13500],
    [0.66,15300],[0.68,17200],[0.7,19100],[0.72,20800],[0.74,22400],[0.76,23900],[0.78,25100],
    [0.82,26200],[0.87,26900],[0.92,27300],[0.97,27450],[1.0,27500]
  ];

  const yMax = 27500;
  const svg = document.getElementById('chart-svg');
  const ns = 'http://www.w3.org/2000/svg';

  function el(tag, attrs, parent) {
    const e = document.createElementNS(ns, tag);
    for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
    if (parent) parent.appendChild(e);
    return e;
  }

  function xPos(t) { return PAD.left + t * CW; }
  function yPos(v) { return PAD.top + CH - (v / yMax) * CH; }

  const g = el('g', {}, svg);

  el('rect', { x: PAD.left, y: PAD.top, width: CW, height: CH,
    fill: 'none', stroke: '#e8e8e8', 'stroke-width': '0.8', class: 'chart-border' }, g);

  for (const tick of yTicks) {
    const y = yPos(tick);
    el('line', { x1: PAD.left, y1: y, x2: PAD.left + CW, y2: y,
      stroke: '#ebebeb', 'stroke-width': '0.8',
      'stroke-dasharray': tick > 0 ? '3 3' : 'none', class: 'grid-line' }, g);
    const t = el('text', { x: PAD.left - 6, y: y + 4,
      'text-anchor': 'end', 'font-size': '10', fill: '#888', class: 'axis-label' }, g);
    t.textContent = tick === 0 ? '0' : (tick / 1000).toFixed(0) + (tick >= 1000 ? '' : '');
    t.textContent = tick.toLocaleString();
  }

  const xCount = xLabels.length;
  for (let i = 0; i < xCount; i++) {
    const x = xPos(i / (xCount - 1));
    const t = el('text', { x, y: PAD.top + CH + 18,
      'text-anchor': 'middle', 'font-size': '10', fill: '#888', class: 'axis-label' }, g);
    t.textContent = xLabels[i];
  }

  const yLabelEl = el('text', {
    x: -(PAD.top + CH / 2), y: 14,
    transform: 'rotate(-90)',
    'text-anchor': 'middle', 'font-size': '10', fill: '#888', class: 'axis-label'
  }, g);
  yLabelEl.textContent = yAxisLabel;

  const xLabelEl = el('text', {
    x: PAD.left + CW / 2, y: VH - 6,
    'text-anchor': 'middle', 'font-size': '10', fill: '#888', class: 'axis-label'
  }, g);
  xLabelEl.textContent = xAxisLabel;

  const pts = rawData.map(([t, v]) => [xPos(t), yPos(v)]);

  function buildPath(pts) {
    let d = `M ${pts[0][0]} ${pts[0][1]}`;
    for (let i = 1; i < pts.length; i++) {
      const [x0,y0] = pts[i-1], [x1,y1] = pts[i];
      const cx = (x0+x1)/2;
      d += ` C ${cx} ${y0} ${cx} ${y1} ${x1} ${y1}`;
    }
    return d;
  }

  const pathD = buildPath(pts);

  const pathEl = el('path', {
    d: pathD, fill: 'none',
    stroke: '#E35D41', 'stroke-width': '2.2',
    'stroke-linecap': 'round', 'stroke-linejoin': 'round'
  }, g);

  const totalLen = pathEl.getTotalLength ? pathEl.getTotalLength() : 1000;
  pathEl.setAttribute('stroke-dasharray', totalLen);
  pathEl.setAttribute('stroke-dashoffset', totalLen);

  const dot = el('circle', { cx: pts[0][0], cy: pts[0][1], r: '5',
    fill: '#E35D41', opacity: '0' }, g);

  setTimeout(() => {
    const titleRow = document.getElementById('title-row');
    titleRow.classList.add('visible');
  }, 120);

  setTimeout(() => {
    document.getElementById('legend-row').classList.add('visible');
    document.getElementById('chart-wrap').classList.add('visible');
  }, 520);

  const DRAW_DURATION = 2600;
  const DRAW_START = 900;

  let startTime = null;

  function easeInOut(t) {
    return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
  }

  function animate(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    const progress = Math.min(elapsed / DRAW_DURATION, 1);
    const eased = easeInOut(progress);

    const offset = totalLen * (1 - eased);
    pathEl.setAttribute('stroke-dashoffset', offset);

    const pos = pathEl.getPointAtLength ? pathEl.getPointAtLength(eased * totalLen) : { x: pts[0][0], y: pts[0][1] };
    dot.setAttribute('cx', pos.x);
    dot.setAttribute('cy', pos.y);
    dot.setAttribute('opacity', '1');

    if (progress < 1) {
      requestAnimationFrame(animate);
    }
  }

  setTimeout(() => {
    requestAnimationFrame(animate);
  }, DRAW_START);

})();
</script>

</html>
