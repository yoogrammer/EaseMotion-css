<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursor Orb Effect — EaseMotion CSS Submission</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="cursor-orb">

  <!-- Orb & trail injected by JS -->
  <div class="orb" id="orb"></div>
  <div class="orb-dot" id="orbDot"></div>

  <div class="page">

    <header class="hero">
      <p class="hero-tag">// cursor-orb · move your mouse</p>
      <h1 class="hero-title">Feel<br/>The<br/>Motion.</h1>
      <p class="hero-sub">EaseMotion CSS — animation-first, human-readable.</p>
    </header>

    <div class="card-row">
      <div class="demo-card">
        <span class="card-chip">Hover me</span>
        <h3>Zero Config</h3>
        <p>Link one file. Done.</p>
      </div>
      <div class="demo-card">
        <span class="card-chip">Hover me</span>
        <h3>Human Readable</h3>
        <p>Class names speak for themselves.</p>
      </div>
      <div class="demo-card">
        <span class="card-chip">Hover me</span>
        <h3>Animation First</h3>
        <p>Motion is not an afterthought.</p>
      </div>
    </div>

  </div>

  <script>
    const orb    = document.getElementById('orb');
    const orbDot = document.getElementById('orbDot');

    let mouseX = window.innerWidth  / 2;
    let mouseY = window.innerHeight / 2;
    let orbX   = mouseX;
    let orbY   = mouseY;

    // track mouse
    document.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;

      // dot snaps instantly
      orbDot.style.transform = `translate(${mouseX}px, ${mouseY}px) translate(-50%, -50%)`;

      // spawn glitter particle
      spawnParticle(mouseX, mouseY);
    });

    // orb follows with lag (lerp)
    function lerp(a, b, t) { return a + (b - a) * t; }

    function animateOrb() {
      orbX = lerp(orbX, mouseX, 0.08);
      orbY = lerp(orbY, mouseY, 0.08);
      orb.style.transform = `translate(${orbX}px, ${orbY}px) translate(-50%, -50%)`;
      requestAnimationFrame(animateOrb);
    }
    animateOrb();

    // glitter particles
    const COLORS = ['#ffe566', '#fff8c0', '#ffffff', '#ffd700', '#fffbe0'];

    function spawnParticle(x, y) {
      if (Math.random() > 0.4) return; // throttle density

      const p    = document.createElement('div');
      const size = 3 + Math.random() * 5;
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      const angle = Math.random() * 360;
      const dist  = 18 + Math.random() * 28;
      const dur   = 480 + Math.random() * 400;

      p.className = 'orb-particle';
      p.style.cssText = `
        left: ${x}px;
        top:  ${y}px;
        width:  ${size}px;
        height: ${size}px;
        background: ${color};
        box-shadow: 0 0 ${size * 2}px ${color};
        --dx: ${Math.cos(angle * Math.PI / 180) * dist}px;
        --dy: ${Math.sin(angle * Math.PI / 180) * dist}px;
        animation: particle-fly ${dur}ms ease-out forwards;
      `;

      document.body.appendChild(p);
      setTimeout(() => p.remove(), dur);
    }

    // expand orb on hover over interactive elements
    document.querySelectorAll('.demo-card, button, a').forEach(el => {
      el.addEventListener('mouseenter', () => orb.classList.add('orb--expand'));
      el.addEventListener('mouseleave', () => orb.classList.remove('orb--expand'));
    });

    // click burst
    document.addEventListener('mousedown', () => orb.classList.add('orb--click'));
    document.addEventListener('mouseup',   () => orb.classList.remove('orb--click'));
  </script>

</body>
</html>
