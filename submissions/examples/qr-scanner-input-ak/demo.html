<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Scanner Input Simulator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator-wrapper">
    <h1>QR Scanner Input</h1>
    <p class="subtitle">Simulated QR Scanning & Manual Entry</p>
    <div class="scan-area" id="scanArea">
      <div class="scan-corner scan-corner-tl"></div>
      <div class="scan-corner scan-corner-tr"></div>
      <div class="scan-corner scan-corner-bl"></div>
      <div class="scan-corner scan-corner-br"></div>
      <div class="scan-line" id="scanLine"></div>
      <div class="scan-placeholder">Waiting for QR code...</div>
    </div>
    <div class="input-section">
      <div class="field">
        <label for="qrInput">Or Paste QR Content Manually</label>
        <textarea id="qrInput" class="input textarea" rows="2" placeholder="Paste QR code content here...">https://github.com/SAPTARSHI-coder/EaseMotion-css</textarea>
      </div>
      <button id="decodeBtn" class="decode-btn">Decode</button>
    </div>
    <div class="card-section" id="decodedCard">
      <div class="comparison-header">Decoded Content</div>
      <div class="decoded-content" id="decodedContent">—</div>
      <button id="copyBtn" class="copy-btn">Copy to Clipboard</button>
    </div>
    <div class="history-section">
      <div class="comparison-header">Scan History</div>
      <div id="historyList">
        <div class="step-line">No scans yet.</div>
      </div>
      <button id="clearHistoryBtn" class="clear-btn">Clear History</button>
    </div>
  </div>
  <script>
    const qrInput = document.getElementById('qrInput');
    const decodeBtn = document.getElementById('decodeBtn');
    const decodedContent = document.getElementById('decodedContent');
    const decodedCard = document.getElementById('decodedCard');
    const copyBtn = document.getElementById('copyBtn');
    const historyList = document.getElementById('historyList');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const scanLine = document.getElementById('scanLine');
    const scanArea = document.getElementById('scanArea');

    let history = [];
    let scanInterval;

    function startScanAnimation() {
      let pos = 0;
      let dir = 1;
      if (scanInterval) clearInterval(scanInterval);
      scanInterval = setInterval(() => {
        pos += dir * 1.5;
        if (pos >= 90 || pos <= 0) dir *= -1;
        scanLine.style.top = pos + '%';
      }, 20);
    }

    startScanAnimation();

    function addToHistory(content) {
      history.push({ content, time: new Date().toLocaleTimeString() });
      renderHistory();
    }

    function renderHistory() {
      if (history.length === 0) {
        historyList.innerHTML = '<div class="step-line">No scans yet.</div>';
        return;
      }
      historyList.innerHTML = '';
      const items = [...history].reverse();
      items.forEach(item => {
        const row = document.createElement('div');
        row.className = 'history-row';
        row.innerHTML = '<span class="history-time">' + item.time + '</span><span class="history-content">' + escapeHtml(item.content) + '</span>';
        historyList.appendChild(row);
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function simulateScan() {
      const samples = [
        'https://github.com/SAPTARSHI-coder/EaseMotion-css',
        'WIFI:S:GuestNetwork;T:WPA;P:welcome123;;',
        'BEGIN:VCARD\nVERSION:3.0\nFN:John Doe\nTEL:+1234567890\nEND:VCARD',
        'Upcoming Event: Team Standup @ 10am',
        'Product SKU: EM-CSS-2024-X42'
      ];
      const content = samples[Math.floor(Math.random() * samples.length)];
      qrInput.value = content;
      decodedContent.textContent = content;
      addToHistory(content);
      decodedCard.style.display = 'block';

      scanArea.classList.add('scan-flash');
      setTimeout(() => scanArea.classList.remove('scan-flash'), 400);
    }

    scanArea.addEventListener('click', simulateScan);

    function decode() {
      const text = qrInput.value.trim();
      if (!text) {
        decodedContent.textContent = 'No content entered.';
        return;
      }
      decodedContent.textContent = text;
      addToHistory(text);
      decodedCard.style.display = 'block';
      scanArea.classList.add('scan-flash');
      setTimeout(() => scanArea.classList.remove('scan-flash'), 400);
    }

    decodeBtn.addEventListener('click', decode);
    qrInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        decode();
      }
    });

    copyBtn.addEventListener('click', async function() {
      const text = decodedContent.textContent;
      if (text && text !== '—') {
        try {
          await navigator.clipboard.writeText(text);
          copyBtn.textContent = 'Copied!';
          setTimeout(() => { copyBtn.textContent = 'Copy to Clipboard'; }, 2000);
        } catch {
          copyBtn.textContent = 'Failed to copy';
          setTimeout(() => { copyBtn.textContent = 'Copy to Clipboard'; }, 2000);
        }
      }
    });

    clearHistoryBtn.addEventListener('click', function() {
      history = [];
      renderHistory();
    });

    decodedCard.style.display = 'none';
  </script>
</body>
</html>
