<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsletter Subscribe — EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css@1.4.5/dist/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="display:flex;flex-direction:column;align-items:center;gap:var(--ease-space-8,32px);padding:var(--ease-space-6,24px);font-family:var(--ease-font-sans,system-ui,sans-serif);background:var(--ease-color-neutral-50,#f9fafb);">

  <h1 style="font-size:1.5rem;font-weight:700;color:var(--ease-color-neutral-900,#111827);margin:0;">
    Newsletter Subscribe
  </h1>

  <!-- Default -->
  <div class="ease-newsletter-az">
    <div class="ease-newsletter-header-az">
      <h2 class="ease-newsletter-title-az">Stay in the loop</h2>
      <p class="ease-newsletter-desc-az">Get the latest updates delivered to your inbox.</p>
    </div>
    <div class="ease-newsletter-form-az">
      <input class="ease-newsletter-input-az" type="email" placeholder="Enter your email" />
      <button class="ease-newsletter-btn-az">Subscribe</button>
    </div>
    <p class="ease-newsletter-incentive-az">No spam. Unsubscribe anytime.</p>
  </div>

  <!-- Card variant -->
  <div class="ease-newsletter-az --card">
    <div class="ease-newsletter-header-az">
      <h2 class="ease-newsletter-title-az">Monthly newsletter</h2>
      <p class="ease-newsletter-desc-az">Tips, tricks, and tools each month.</p>
    </div>
    <div class="ease-newsletter-form-az">
      <input class="ease-newsletter-input-az" type="email" placeholder="your@email.com" />
      <button class="ease-newsletter-btn-az">Sign up</button>
    </div>
  </div>

  <!-- Stacked variant with success feedback -->
  <div class="ease-newsletter-az --card --stacked">
    <div class="ease-newsletter-header-az">
      <h2 class="ease-newsletter-title-az">Get started free</h2>
      <p class="ease-newsletter-desc-az">Join 10,000+ subscribers.</p>
    </div>
    <div class="ease-newsletter-form-az">
      <input class="ease-newsletter-input-az" type="email" placeholder="your@email.com" />
      <button class="ease-newsletter-btn-az --subscribed">Subscribed!</button>
    </div>
    <p class="ease-newsletter-feedback-az --success">Thanks for subscribing!</p>
  </div>

  <!-- Inline variant with error -->
  <div class="ease-newsletter-az --inline">
    <div class="ease-newsletter-header-az">
      <h2 class="ease-newsletter-title-az" style="font-size:0.875rem;">Newsletter</h2>
    </div>
    <div class="ease-newsletter-form-az">
      <input class="ease-newsletter-input-az --error" type="email" placeholder="your@email.com" value="invalid" />
      <button class="ease-newsletter-btn-az">Subscribe</button>
    </div>
    <p class="ease-newsletter-feedback-az --error">Please enter a valid email address.</p>
  </div>

</body>
</html>
