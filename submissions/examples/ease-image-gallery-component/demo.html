<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Image Gallery Component — EaseMotion CSS</title>
  <meta name="description" content="A premium pure HTML & CSS responsive image gallery with gradient placeholders, hover overlays, and staggered entrance animations." />
  <meta name="author" content="EaseMotion Contributor" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="ease-gallery-page" aria-label="Image Gallery Demo">

    <!-- ──── Hero Header ──────────────────────────────────────────────── -->
    <header class="ease-gallery-header">
      <span class="ease-gallery-eyebrow">EaseMotion CSS — Gallery Component</span>
      <h1 class="ease-gallery-title">Creative <span>Portfolio</span></h1>
      <p class="ease-gallery-subtitle">
        A responsive CSS grid gallery with smooth hover overlays and gradient art cards. Zero JavaScript — pure HTML &amp; CSS.
      </p>
    </header>

    <!-- ──── Filter Tabs (decorative — no JS) ────────────────────────── -->
    <nav class="ease-gallery-filters" aria-label="Gallery filters">
      <span class="ease-filter-tab ease-filter-tab--active">All</span>
      <span class="ease-filter-tab">Photography</span>
      <span class="ease-filter-tab">Illustration</span>
      <span class="ease-filter-tab">3D Art</span>
      <span class="ease-filter-tab">UI Design</span>
      <span class="ease-filter-tab">Branding</span>
    </nav>

    <!-- ──── Gallery Grid ─────────────────────────────────────────────── -->
    <section class="ease-gallery" aria-label="Gallery items">

      <!-- ═══════════════════════════════════════════════════════════════
           ITEM 1 — Featured (spans 2 × 2) · Nebula Indigo / Violet
           ═══════════════════════════════════════════════════════════════ -->
      <figure class="ease-gallery-item ease-gallery-item--featured"
        role="img"
        aria-label="Stellar Drift — Photography"
        style="--art-gradient: linear-gradient(135deg, #0f0c2a 0%, #1a0f3a 20%, #312378 45%, #6c4ac5 70%, #a78bfa 100%);">

        <div class="ease-gallery-art"></div>

        <div class="ease-gallery-badge" aria-hidden="true">⭐</div>
        <div class="ease-gallery-overlay" aria-hidden="true"></div>

        <figcaption class="ease-gallery-caption">
          <span class="ease-gallery-chip"
            style="--chip-color:#a78bfa; --chip-rgb:167,139,250;">Featured</span>
          <div class="ease-gallery-name">Stellar Drift</div>
          <div class="ease-gallery-meta">Deep-space long exposure · Photography</div>
        </figcaption>
      </figure>

      <!-- ═══════════════════════════════════════════════════════════════
           ITEM 2 — Aurora Teal / Cyan
           ═══════════════════════════════════════════════════════════════ -->
      <figure class="ease-gallery-item"
        role="img"
        aria-label="Aurora Horizon — 3D Art"
        style="--art-gradient: linear-gradient(135deg, #042830 0%, #064e5a 35%, #0891b2 70%, #67e8f9 100%);">

        <div class="ease-gallery-art"></div>
        <div class="ease-gallery-badge" aria-hidden="true">🎨</div>
        <div class="ease-gallery-overlay" aria-hidden="true"></div>

        <figcaption class="ease-gallery-caption">
          <span class="ease-gallery-chip"
            style="--chip-color:#06b6d4; --chip-rgb:6,182,212;">3D Art</span>
          <div class="ease-gallery-name">Aurora Horizon</div>
          <div class="ease-gallery-meta">Rendered with Blender 4.0</div>
        </figcaption>
      </figure>

      <!-- ═══════════════════════════════════════════════════════════════
           ITEM 3 — Ember Amber / Rose
           ═══════════════════════════════════════════════════════════════ -->
      <figure class="ease-gallery-item"
        role="img"
        aria-label="Ember Study — Photography"
        style="--art-gradient: linear-gradient(135deg, #1c0800 0%, #7c1d06 35%, #dc2626 65%, #f59e0b 100%);">

        <div class="ease-gallery-art"></div>
        <div class="ease-gallery-badge" aria-hidden="true">📸</div>
        <div class="ease-gallery-overlay" aria-hidden="true"></div>

        <figcaption class="ease-gallery-caption">
          <span class="ease-gallery-chip"
            style="--chip-color:#f59e0b; --chip-rgb:245,158,11;">Photography</span>
          <div class="ease-gallery-name">Ember Study</div>
          <div class="ease-gallery-meta">Macro lens · Natural light</div>
        </figcaption>
      </figure>

      <!-- ═══════════════════════════════════════════════════════════════
           ITEM 4 — Forest Emerald / Lime
           ═══════════════════════════════════════════════════════════════ -->
      <figure class="ease-gallery-item"
        role="img"
        aria-label="Canopy Light — Illustration"
        style="--art-gradient: linear-gradient(135deg, #022c1a 0%, #065f3a 35%, #059669 65%, #6ee7b7 100%);">

        <div class="ease-gallery-art"></div>
        <div class="ease-gallery-badge" aria-hidden="true">🌿</div>
        <div class="ease-gallery-overlay" aria-hidden="true"></div>

        <figcaption class="ease-gallery-caption">
          <span class="ease-gallery-chip"
            style="--chip-color:#10b981; --chip-rgb:16,185,129;">Illustration</span>
          <div class="ease-gallery-name">Canopy Light</div>
          <div class="ease-gallery-meta">Procreate · Digital painting</div>
        </figcaption>
      </figure>

      <!-- ═══════════════════════════════════════════════════════════════
           ITEM 5 — Ocean Blue / Purple
           ═══════════════════════════════════════════════════════════════ -->
      <figure class="ease-gallery-item"
        role="img"
        aria-label="Abyssal Blue — UI Design"
        style="--art-gradient: linear-gradient(135deg, #0a0520 0%, #1e1b4b 35%, #3730a3 65%, #818cf8 100%);">

        <div class="ease-gallery-art"></div>
        <div class="ease-gallery-badge" aria-hidden="true">💠</div>
        <div class="ease-gallery-overlay" aria-hidden="true"></div>

        <figcaption class="ease-gallery-caption">
          <span class="ease-gallery-chip"
            style="--chip-color:#818cf8; --chip-rgb:129,140,248;">UI Design</span>
          <div class="ease-gallery-name">Abyssal Blue</div>
          <div class="ease-gallery-meta">Figma dashboard concept</div>
        </figcaption>
      </figure>

      <!-- ═══════════════════════════════════════════════════════════════
           ITEM 6 — Sunset Rose / Coral
           ═══════════════════════════════════════════════════════════════ -->
      <figure class="ease-gallery-item"
        role="img"
        aria-label="Horizon Blush — Photography"
        style="--art-gradient: linear-gradient(135deg, #1f0515 0%, #7f1d4c 30%, #db2777 60%, #fb923c 100%);">

        <div class="ease-gallery-art"></div>
        <div class="ease-gallery-badge" aria-hidden="true">🌅</div>
        <div class="ease-gallery-overlay" aria-hidden="true"></div>

        <figcaption class="ease-gallery-caption">
          <span class="ease-gallery-chip"
            style="--chip-color:#f43f5e; --chip-rgb:244,63,94;">Photography</span>
          <div class="ease-gallery-name">Horizon Blush</div>
          <div class="ease-gallery-meta">Golden hour · Coastal series</div>
        </figcaption>
      </figure>

      <!-- ═══════════════════════════════════════════════════════════════
           ITEM 7 — Midnight Slate / Silver
           ═══════════════════════════════════════════════════════════════ -->
      <figure class="ease-gallery-item"
        role="img"
        aria-label="Monolith — Branding"
        style="--art-gradient: linear-gradient(135deg, #0a0a0f 0%, #1e2030 35%, #334155 65%, #94a3b8 100%);">

        <div class="ease-gallery-art"></div>
        <div class="ease-gallery-badge" aria-hidden="true">🏛️</div>
        <div class="ease-gallery-overlay" aria-hidden="true"></div>

        <figcaption class="ease-gallery-caption">
          <span class="ease-gallery-chip"
            style="--chip-color:#94a3b8; --chip-rgb:148,163,184;">Branding</span>
          <div class="ease-gallery-name">Monolith</div>
          <div class="ease-gallery-meta">Brand identity system · 2025</div>
        </figcaption>
      </figure>

      <!-- ═══════════════════════════════════════════════════════════════
           ITEM 8 — Electric Lime / Yellow
           ═══════════════════════════════════════════════════════════════ -->
      <figure class="ease-gallery-item"
        role="img"
        aria-label="Volt — 3D Art"
        style="--art-gradient: linear-gradient(135deg, #0f1800 0%, #365314 35%, #65a30d 65%, #d9f99d 100%);">

        <div class="ease-gallery-art"></div>
        <div class="ease-gallery-badge" aria-hidden="true">⚡</div>
        <div class="ease-gallery-overlay" aria-hidden="true"></div>

        <figcaption class="ease-gallery-caption">
          <span class="ease-gallery-chip"
            style="--chip-color:#a3e635; --chip-rgb:163,230,53;">3D Art</span>
          <div class="ease-gallery-name">Volt</div>
          <div class="ease-gallery-meta">Cinema 4D · Neon shader study</div>
        </figcaption>
      </figure>

      <!-- ═══════════════════════════════════════════════════════════════
           ITEM 9 — Orchid Fuchsia / Magenta
           ═══════════════════════════════════════════════════════════════ -->
      <figure class="ease-gallery-item"
        role="img"
        aria-label="Orchid Depths — Illustration"
        style="--art-gradient: linear-gradient(135deg, #1a0520 0%, #6b21a8 35%, #c026d3 65%, #f0abfc 100%);">

        <div class="ease-gallery-art"></div>
        <div class="ease-gallery-badge" aria-hidden="true">🌸</div>
        <div class="ease-gallery-overlay" aria-hidden="true"></div>

        <figcaption class="ease-gallery-caption">
          <span class="ease-gallery-chip"
            style="--chip-color:#e879f9; --chip-rgb:232,121,249;">Illustration</span>
          <div class="ease-gallery-name">Orchid Depths</div>
          <div class="ease-gallery-meta">Digital watercolor · Adobe Fresco</div>
        </figcaption>
      </figure>

      <!-- ═══════════════════════════════════════════════════════════════
           ITEM 10 — Ice Blue / Arctic White
           ═══════════════════════════════════════════════════════════════ -->
      <figure class="ease-gallery-item"
        role="img"
        aria-label="Arctic Prism — UI Design"
        style="--art-gradient: linear-gradient(135deg, #071428 0%, #0c2a50 35%, #1d4ed8 65%, #bfdbfe 100%);">

        <div class="ease-gallery-art"></div>
        <div class="ease-gallery-badge" aria-hidden="true">🔷</div>
        <div class="ease-gallery-overlay" aria-hidden="true"></div>

        <figcaption class="ease-gallery-caption">
          <span class="ease-gallery-chip"
            style="--chip-color:#60a5fa; --chip-rgb:96,165,250;">UI Design</span>
          <div class="ease-gallery-name">Arctic Prism</div>
          <div class="ease-gallery-meta">Glass morphism design system</div>
        </figcaption>
      </figure>

    </section><!-- /.ease-gallery -->

  </main>

</body>
</html>
