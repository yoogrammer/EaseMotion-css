<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-modal Accessible Close Button Fix</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      background: #0f0f17;
    }
  </style>
</head>
<body>

  <!-- Trigger -->
  <button
    class="ease-btn ease-btn-primary"
    onclick="document.getElementById('demo-modal-backdrop').removeAttribute('hidden')"
  >
    Open Modal
  </button>

  <!-- Modal backdrop -->
  <!-- role="dialog" tells screen readers this is a dialog -->
  <!-- aria-modal="true" prevents SR from reading background content -->
  <!-- aria-labelledby points to the visible heading -->
  <div
    id="demo-modal-backdrop"
    class="ease-modal-backdrop"
    hidden
    onclick="if(event.target===this) closeModal()"
  >
    <div
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      class="ease-modal"
    >
      <div class="ease-modal-header">
        <h2 class="ease-modal-title" id="modal-title">Confirm Action</h2>
      </div>

      <div class="ease-modal-body">
        <p>Are you sure you want to proceed? This action cannot be undone.</p>
      </div>

      <div class="ease-modal-footer">
        <button class="ease-btn ease-btn-outline" onclick="closeModal()">Cancel</button>
        <button class="ease-btn ease-btn-danger">Confirm</button>
      </div>

      <!--
        REQUIRED a11y fix:
        aria-label="Close dialog" gives the icon-only button an accessible name.
        Without it, screen readers announce only "button" with no context.
      -->
      <button
        class="ease-modal-close"
        aria-label="Close dialog"
        onclick="closeModal()"
      >×</button>
    </div>
  </div>

  <script>
    function closeModal() {
      document.getElementById('demo-modal-backdrop').setAttribute('hidden', '');
    }
    // Close on Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });
  </script>

</body>
</html>
