<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Accordion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="padding: 50px; font-family: sans-serif;">
  <div class="ease-css-accordion-ai">
    <div class="ease-acc-item">
      <input type="radio" name="acc" id="a1" checked>
      <label for="a1">Section 1</label>
      <div class="ease-acc-content"><div class="inner">Dynamic height content here...</div></div>
    </div>
    <div class="ease-acc-item">
      <input type="radio" name="acc" id="a2">
      <label for="a2">Section 2</label>
      <div class="ease-acc-content"><div class="inner">More content here...</div></div>
    </div>
  </div>
</body>
</html>
