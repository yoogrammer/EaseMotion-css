<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Gap Utilities</title>
  <link rel="stylesheet" href="../../../core/base.css">
  <link rel="stylesheet" href="../../../core/utilities.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 2rem;
      background-color: #f8fafc;
    }
    .demo-box {
      background-color: #6c63ff;
      color: white;
      padding: 2rem;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
    }
    .info {
      margin-bottom: 2rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <h1>Responsive Gap Utilities Demo</h1>
  <p class="info">Resize your browser window to see the gap between the boxes increase as the screen gets wider!</p>

  <!-- Notice the responsive gap classes: ease-gap-2 on mobile, ease-md-gap-6 on tablet, ease-lg-gap-10 on desktop -->
  <div class="ease-flex ease-flex-wrap ease-gap-2 ease-md-gap-6 ease-lg-gap-10">
    <div class="ease-flex-1 demo-box">Box 1</div>
    <div class="ease-flex-1 demo-box">Box 2</div>
    <div class="ease-flex-1 demo-box">Box 3</div>
  </div>

</body>
</html>
