<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Toggle Switch Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div style="padding: 2rem; max-width: 600px; margin: 0 auto; font-family: system-ui, -apple-system, sans-serif;">
    <h1>Animated Toggle Switch</h1>
    <p style="margin-bottom: 2rem; color: #666;">A pure CSS animated toggle switch built for accessibility and respects reduced motion preferences.</p>

    <div style="display: flex; flex-direction: column; gap: 1.5rem;">
      <!-- Default Toggle -->
      <label class="ease-toggle-container">
        <div class="ease-toggle-switch">
          <input type="checkbox" aria-label="Enable notifications">
          <span class="ease-toggle-slider"></span>
        </div>
        <span>Enable Notifications</span>
      </label>

      <!-- Pre-checked Toggle -->
      <label class="ease-toggle-container">
        <div class="ease-toggle-switch">
          <input type="checkbox" aria-label="Dark mode" checked>
          <span class="ease-toggle-slider"></span>
        </div>
        <span>Dark Mode Enabled</span>
      </label>
    </div>
  </div>
</body>
</html>
