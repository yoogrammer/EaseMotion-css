<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skeleton Shimmer Loader – EaseMotion CSS</title>
  <meta name="description" content="Skeleton loading placeholders with animated shimmer sweep effect." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Skeleton Shimmer Loader</h1>
  <p>Loading placeholder with sweeping highlight</p>

  <div class="skeleton-card" aria-busy="true" aria-label="Loading content">
    <div class="skeleton skeleton--avatar"></div>
    <div class="skeleton-body">
      <div class="skeleton skeleton--title"></div>
      <div class="skeleton skeleton--line"></div>
      <div class="skeleton skeleton--line skeleton--short"></div>
    </div>
  </div>

  <div class="skeleton-grid" aria-hidden="true">
    <div class="skeleton skeleton--block"></div>
    <div class="skeleton skeleton--block"></div>
    <div class="skeleton skeleton--block"></div>
  </div>

  <button class="toggle-loaded" id="toggleBtn">Toggle Loaded State</button>

  <script>
    document.getElementById('toggleBtn').addEventListener('click', () => {
      document.querySelector('.skeleton-card').classList.toggle('is-loaded');
    });
  </script>
</body>
</html>
