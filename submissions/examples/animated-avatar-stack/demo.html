<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Team Member Avatar Stack — Submission Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body style="margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; background:#0b1220; color:#e2e8f0;">

  <div style="max-width: 980px; margin: 0 auto; padding: 40px 18px;">
    <h1 style="margin:0 0 12px; font-size: 1.25rem;">Animated Team Member Avatar Stack</h1>
    <p style="margin:0 0 22px; color:#94a3b8;">
      Hover an avatar (or tab to it) to see the smooth lift/scale interaction. The “+N” item
      behaves like an avatar for visual consistency.
    </p>

    <div
      style="background: rgba(255,255,255,0.04); border:1px solid rgba(148,163,184,0.25); border-radius: 16px; padding: 22px;">

      <div class="avatar-stack" aria-label="Team members" role="group">
        <button class="avatar" type="button" aria-label="User 1" title="User 1">
          <img src="https://i.pravatar.cc/120?img=1" alt="" />
        </button>

        <button class="avatar" type="button" aria-label="User 2" title="User 2">
          <img src="https://i.pravatar.cc/120?img=2" alt="" />
        </button>

        <button class="avatar" type="button" aria-label="User 3" title="User 3">
          <img src="https://i.pravatar.cc/120?img=3" alt="" />
        </button>

        <button class="avatar" type="button" aria-label="User 4" title="User 4">
          <img src="https://i.pravatar.cc/120?img=4" alt="" />
        </button>

        <div class="avatar more-members" aria-hidden="true" title="More members">+8</div>
      </div>

      <div style="margin-top: 18px; color:#94a3b8; font-size: 0.92rem; line-height: 1.4;">
        Tip: Use <kbd style="padding:2px 7px; border-radius:10px; background: rgba(99,102,241,0.18); border:1px solid rgba(99,102,241,0.35);">Tab</kbd>
        to focus avatars.
      </div>

    </div>
  </div>
</body>
</html>
