<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-outline-za — outline utilities</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div data-ease-demo-za>
      <h1>ease-outline utilities</h1>
      <p>Control outline style, width, color, and offset.</p>

      <h2>Outline style</h2>
      <div class="row-za">
        <div class="outline-box-za ease-outline-solid-za">solid</div>
        <div class="outline-box-za ease-outline-dashed-za">dashed</div>
        <div class="outline-box-za ease-outline-dotted-za">dotted</div>
        <div class="outline-box-za ease-outline-double-za">double</div>
        <div class="outline-box-za ease-outline-none-za">none</div>
      </div>

      <h2>Outline width</h2>
      <div class="row-za">
        <div class="outline-box-za ease-outline-1-za ease-outline-solid-za">
          1px
        </div>
        <div class="outline-box-za ease-outline-2-za ease-outline-solid-za">
          2px
        </div>
        <div class="outline-box-za ease-outline-4-za ease-outline-solid-za">
          4px
        </div>
      </div>

      <h2>Outline color</h2>
      <div class="row-za">
        <div
          class="outline-box-za ease-outline-2-za ease-outline-solid-za ease-outline-primary-za"
        >
          primary
        </div>
        <div
          class="outline-box-za ease-outline-2-za ease-outline-solid-za ease-outline-current-za"
        >
          current
        </div>
      </div>

      <h2>Outline offset</h2>
      <div class="row-za">
        <div
          class="outline-box-za ease-outline-2-za ease-outline-solid-za ease-outline-offset-0-za"
        >
          offset-0
        </div>
        <div
          class="outline-box-za ease-outline-2-za ease-outline-solid-za ease-outline-offset-2-za"
        >
          offset-2
        </div>
        <div
          class="outline-box-za ease-outline-2-za ease-outline-solid-za ease-outline-offset-4-za"
        >
          offset-4
        </div>
      </div>
    </div>
  </body>
</html>
