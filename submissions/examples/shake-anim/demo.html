<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shake Animation Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f5f5f5;
      margin: 0;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 320px;
    }
    h2 {
      margin-top: 0;
      color: #333;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #4f46e5;
    }
    .error-msg {
      color: #ef4444;
      font-size: 14px;
      margin-top: 8px;
      display: none;
    }
    .error-msg.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Login Form</h2>
    <input type="email" id="email" placeholder="Enter your email">
    <input type="password" id="password" placeholder="Enter your password">
    <button onclick="validate()">Submit</button>
    <p class="error-msg" id="error">Invalid credentials!</p>
  </div>

  <script>
    function validate() {
      const email = document.getElementById('email');
      const password = document.getElementById('password');
      const error = document.getElementById('error');
      
      // Remove existing shake class
      email.classList.remove('shake-anim');
      password.classList.remove('shake-anim');
      
      // Trigger reflow to restart animation
      void email.offsetWidth;
      
      if (!email.value || !password.value) {
        email.classList.add('shake-anim');
        password.classList.add('shake-anim');
        error.classList.add('show');
      } else {
        error.classList.remove('show');
        alert('Login successful!');
      }
    }
  </script>
</body>
</html>
