<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masonry Reduced Motion Demo</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="demo">
        <h2>Masonry Grid</h2>
        <p>Items animate in on load. Disable motion in OS settings to test.</p>
        <div class="masonry">
            <div class="masonry-item" style="height:120px">Item 1</div>
            <div class="masonry-item" style="height:180px">Item 2</div>
            <div class="masonry-item" style="height:100px">Item 3</div>
            <div class="masonry-item" style="height:220px">Item 4</div>
            <div class="masonry-item" style="height:140px">Item 5</div>
            <div class="masonry-item" style="height:160px">Item 6</div>
            <div class="masonry-item" style="height:90px">Item 7</div>
            <div class="masonry-item" style="height:200px">Item 8</div>
            <div class="masonry-item" style="height:130px">Item 9</div>
        </div>
    </div>
</body>
</html>
