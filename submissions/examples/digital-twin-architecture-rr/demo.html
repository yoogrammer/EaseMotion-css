<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Twin System Architecture</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Digital Twin System Architecture</h1>

    <p class="subtitle">
        Real-time synchronization between physical assets and virtual models.
    </p>

    <div class="architecture">

        <div class="node physical">
            🏭 Physical Asset
        </div>

        <div class="connector"></div>

        <div class="node sensors">
            📡 IoT Sensors & Telemetry
        </div>

        <div class="connector"></div>

        <div class="node twin">
            🔷 Digital Twin Model
        </div>

        <div class="connector"></div>

        <div class="outputs">

            <div class="node simulation">
                ⚙️ Simulation Engine
            </div>

            <div class="node analytics">
                📊 Analytics Platform
            </div>

        </div>

        <div class="connector"></div>

        <div class="node dashboard">
            📈 Operations Dashboard
        </div>

    </div>

</div>

</body>
</html>
