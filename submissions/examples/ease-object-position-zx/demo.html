<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Object Position Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 800px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1rem 0 0.25rem;
      }
      .grid {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
      }
      .grid > div {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1>Object Position</h1>
    <p>
      Controls alignment of replaced elements (images/videos) within their box
      when using <code>object-fit</code>.
    </p>
    <div class="grid">
      <div>
        <div class="label">top</div>
        <img
          class="demo-img obj-top"
          src="https://picsum.photos/400/300?random=1"
          alt="demo"
        />
      </div>
      <div>
        <div class="label">bottom</div>
        <img
          class="demo-img obj-bottom"
          src="https://picsum.photos/400/300?random=2"
          alt="demo"
        />
      </div>
      <div>
        <div class="label">left</div>
        <img
          class="demo-img obj-left"
          src="https://picsum.photos/400/300?random=3"
          alt="demo"
        />
      </div>
      <div>
        <div class="label">right</div>
        <img
          class="demo-img obj-right"
          src="https://picsum.photos/400/300?random=4"
          alt="demo"
        />
      </div>
      <div>
        <div class="label">center</div>
        <img
          class="demo-img obj-center"
          src="https://picsum.photos/400/300?random=5"
          alt="demo"
        />
      </div>
      <div>
        <div class="label">top left</div>
        <img
          class="demo-img obj-tl"
          src="https://picsum.photos/400/300?random=6"
          alt="demo"
        />
      </div>
      <div>
        <div class="label">bottom right</div>
        <img
          class="demo-img obj-br"
          src="https://picsum.photos/400/300?random=7"
          alt="demo"
        />
      </div>
    </div>
  </body>
</html>
