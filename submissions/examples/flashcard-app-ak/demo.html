<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcard App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Flashcards</h1>
    <div class="progress">Card <span id="current">1</span> of <span id="total">3</span></div>
    <div class="card" id="card">
      <div class="card-inner" id="cardInner">
        <div class="card-front" id="cardFront">Front</div>
        <div class="card-back" id="cardBack">Back</div>
      </div>
    </div>
    <div class="controls">
      <button id="prevBtn">Previous</button>
      <button id="flipBtn">Flip</button>
      <button id="nextBtn">Next</button>
    </div>
  </div>

  <script>
    const flashcards = [
      { front: 'What is CSS?', back: 'Cascading Style Sheets — a language for styling web pages.' },
      { front: 'What is HTML?', back: 'HyperText Markup Language — the standard markup language for web documents.' },
      { front: 'What is JavaScript?', back: 'A programming language that enables dynamic, interactive content on web pages.' },
    ];

    let current = 0;
    const cardInner = document.getElementById('cardInner');
    const cardFront = document.getElementById('cardFront');
    const cardBack = document.getElementById('cardBack');
    const currentEl = document.getElementById('current');
    const totalEl = document.getElementById('total');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const flipBtn = document.getElementById('flipBtn');

    totalEl.textContent = flashcards.length;

    function showCard(index) {
      cardInner.classList.remove('flipped');
      cardFront.textContent = flashcards[index].front;
      cardBack.textContent = flashcards[index].back;
      currentEl.textContent = index + 1;
    }

    flipBtn.addEventListener('click', () => {
      cardInner.classList.toggle('flipped');
    });

    prevBtn.addEventListener('click', () => {
      if (current > 0) {
        current--;
        showCard(current);
      }
    });

    nextBtn.addEventListener('click', () => {
      if (current < flashcards.length - 1) {
        current++;
        showCard(current);
      }
    });
  </script>
</body>
</html>
