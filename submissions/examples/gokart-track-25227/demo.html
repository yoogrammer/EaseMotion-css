<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Go-Kart Track</title>
</head>
<body>
  <header class="hero-kart">
    <h1>Feel the Adrenaline.</h1>
    <p>Professional grade circuit | Electric Karts | Night Racing</p>
  </header>
  <section class="track-grid">
    <div class="kart-card">
        <h3>Junior Circuit</h3>
        <div class="speed-meter"><div class="speed-fill" style="width: 40%;"></div></div>
        <p>Safety-first training for aspiring racers.</p>
    </div>
    <div class="kart-card">
        <h3>Grand Prix Pro</h3>
        <div class="speed-meter"><div class="speed-fill" style="width: 95%;"></div></div>
        <p>Full-speed racing for competitive lap times.</p>
    </div>
  </section>
</body>
</html>
