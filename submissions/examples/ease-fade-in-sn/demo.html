<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-fade-in-sn — Smooth Fade In Animation</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>ease-fade-in-sn</h1>
        <p>Smooth fade-in animation utilities with configurable speed</p>

        <div class="demo-grid">
            <div class="demo-item fade-in-fast">
                <span>.fade-in-fast</span>
                <div class="box">0.3s</div>
            </div>
            <div class="demo-item fade-in">
                <span>.fade-in</span>
                <div class="box">0.6s</div>
            </div>
            <div class="demo-item fade-in-slow">
                <span>.fade-in-slow</span>
                <div class="box">1.2s</div>
            </div>
            <div class="demo-item fade-in" style="--fade-duration: 2s">
                <span>.fade-in (--fade-duration: 2s)</span>
                <div class="box">2.0s</div>
            </div>
        </div>

        <div class="demo-row">
            <h2>Hover to fade</h2>
            <div class="hover-fade box">Hover me → fade out</div>
        </div>

        <p class="note">All animations trigger on page load. Reload to replay. Hover fade works on mouse enter.</p>
    </div>
</body>
</html>
