<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Hamburger to Cross Menu Icon</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Animated Hamburger to Cross Menu Icon</h1>

    <div class="icon-grid">

        <!-- Default -->

        <label class="menu-card">

            <input type="checkbox">

            <span class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </span>

            <p>Default</p>

        </label>

        <!-- Neon -->

        <label class="menu-card neon-card">

            <input type="checkbox">

            <span class="hamburger neon">
                <span></span>
                <span></span>
                <span></span>
            </span>

            <p>Neon</p>

        </label>

        <!-- Gradient -->

        <label class="menu-card gradient-card">

            <input type="checkbox">

            <span class="hamburger gradient">
                <span></span>
                <span></span>
                <span></span>
            </span>

            <p>Gradient</p>

        </label>

        <!-- Glass -->

        <label class="menu-card glass-card">

            <input type="checkbox">

            <span class="hamburger glass">
                <span></span>
                <span></span>
                <span></span>
            </span>

            <p>Glass</p>

        </label>

    </div>

</div>

</body>
</html>
