<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Compositing Acceleration Utility Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-container">
        <header class="demo-header">
            <h1>GPU Compositing Acceleration</h1>
            <p>Demonstrating 60fps stable execution profiles utilizing the <code>will-change</code> property hints on continuous infinite framework loops.</p>
        </header>

        <main class="demo-grid">
            <div class="demo-card">
                <h3>ease-float</h3>
                <div class="demo-box ease-float">🎈</div>
            </div>
            <div class="demo-card">
                <h3>ease-rotate (spin)</h3>
                <div class="demo-box ease-rotate">🌀</div>
            </div>
            <div class="demo-card">
                <h3>ease-pulse</h3>
                <div class="demo-box ease-pulse">❤️</div>
            </div>
            <div class="demo-card">
                <h3>ease-ping</h3>
                <div class="demo-box ease-ping">🔔</div>
            </div>
        </main>
    </div>
</body>
</html>
