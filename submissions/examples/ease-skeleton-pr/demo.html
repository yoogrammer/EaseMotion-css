<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-skeleton-pr Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 4rem 2rem;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }
    
    .demo-section h2 {
      text-align: center;
      margin-bottom: 2rem;
      color: #1e293b;
    }
    
    .shapes-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      align-items: flex-end;
    }
    
    .shape-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    
    .shape-label {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="demo-section">
    <h2>Skeleton Shapes</h2>
    <div class="shapes-row">
      <div class="shape-group">
        <span class="shape-label">Circle</span>
        <div class="skeleton-pr skeleton-pr-circle"></div>
      </div>
      <div class="shape-group">
        <span class="shape-label">Text</span>
        <div class="skeleton-pr skeleton-pr-text" style="width: 200px;"></div>
      </div>
      <div class="shape-group">
        <span class="shape-label">Title</span>
        <div class="skeleton-pr skeleton-pr-title" style="width: 200px;"></div>
      </div>
      <div class="shape-group">
        <span class="shape-label">Image</span>
        <div class="skeleton-pr skeleton-pr-image" style="width: 200px;"></div>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <h2>Skeleton Card</h2>
    <div class="skeleton-pr-card">
      <div class="skeleton-pr-header">
        <div class="skeleton-pr skeleton-pr-circle" style="width: 3rem; height: 3rem;"></div>
        <div style="flex: 1; display: flex; flex-direction: column; gap: 0.5rem;">
          <div class="skeleton-pr skeleton-pr-title" style="width: 60%;"></div>
          <div class="skeleton-pr skeleton-pr-text-sm" style="width: 40%;"></div>
        </div>
      </div>
      <div class="skeleton-pr-body">
        <div class="skeleton-pr skeleton-pr-text"></div>
        <div class="skeleton-pr skeleton-pr-text" style="width: 90%;"></div>
        <div class="skeleton-pr skeleton-pr-text" style="width: 75%;"></div>
      </div>
    </div>
  </div>

</body>
</html>
