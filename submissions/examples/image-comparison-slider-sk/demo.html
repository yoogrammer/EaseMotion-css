<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Comparison Slider - EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container fade-in-up">
    <h1>Before & After Comparison</h1>
    <p>A reusable, accessible image comparison slider built with EaseMotion CSS utilities.</p>
    
    <div class="comparison-slider" role="slider" tabindex="0" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100" aria-label="Image comparison slider">
      <div class="comparison-image comparison-before">
        <!-- Placeholder image (black and white / dull) -->
        <img src="https://images.unsplash.com/photo-1552084117-56a987666449?q=80&w=800&auto=format&fit=crop&sat=-100" alt="Before restoration">
        <div class="comparison-label">Before</div>
      </div>
      
      <div class="comparison-image comparison-after">
        <!-- Placeholder image (color / bright) -->
        <img src="https://images.unsplash.com/photo-1552084117-56a987666449?q=80&w=800&auto=format&fit=crop" alt="After restoration">
        <div class="comparison-label">After</div>
      </div>
      
      <div class="comparison-handle">
        <div class="comparison-handle-line"></div>
        <div class="comparison-handle-button pulse-hover">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m15 18-6-6 6-6"/>
            <path d="m9 18 6-6-6-6"/>
          </svg>
        </div>
      </div>
    </div>
  </main>
  
  <script src="script.js"></script>
</body>
</html>
