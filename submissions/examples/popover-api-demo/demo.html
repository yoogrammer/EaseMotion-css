<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popover API Demo - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Popover API Demo</h1>
    <div class="popover-showcase">
      <button popovertarget="popover-info" class="popover-trigger">Info Popover</button>
      <button popovertarget="popover-tip" class="popover-trigger">Tip</button>
    </div>
    <div id="popover-info" popover class="popover-content">
      <h3>Information</h3>
      <p>This popover uses the native Popover API with smooth open/close.</p>
      <button popovertarget="popover-info" popovertargetaction="hide" class="popover-close">Close</button>
    </div>
    <div id="popover-tip" popover class="popover-content popover-tip">
      <h3>Pro Tip</h3>
      <p>Press Escape to close any popover.</p>
      <button popovertarget="popover-tip" popovertargetaction="hide" class="popover-close">Got it</button>
    </div>
    <p class="description">Native HTML Popover API with animated open/close using CSS transitions.</p>
  </div>
</body>
</html>
