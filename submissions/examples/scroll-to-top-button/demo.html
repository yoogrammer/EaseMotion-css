<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scroll To Top Button Demo</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-content">
    <h1>Scroll To Top Button Demo</h1>
    <p>Scroll down to see the button appear.</p>

    <div class="demo-spacer"></div>
  </div>

  <!-- Scroll-to-top button -->
  <button
    class="ease-scroll-top ease-scroll-top--primary"
    id="scrollTopBtn"
    aria-label="Scroll to top"
    title="Back to top"
  >
    <svg class="ease-scroll-top__ring" viewBox="0 0 44 44">
      <circle cx="22" cy="22" r="20" />
    </svg>

    <svg
      class="ease-scroll-top__icon"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
    >
      <polyline points="18 15 12 9 6 15" />
    </svg>
  </button>

  <script>
    (() => {
      const btn = document.getElementById("scrollTopBtn");
      if (!btn) return;

      const ring = btn.querySelector(".ease-scroll-top__ring circle");
      const THRESHOLD = 300;
      const CIRCUMFERENCE = 126;

      function updateProgress() {
        const scrolled = window.scrollY;
        const total =
          document.body.scrollHeight - window.innerHeight;

        if (scrolled > THRESHOLD) {
          btn.classList.add("is-visible");
        } else {
          btn.classList.remove("is-visible");
        }

        if (ring) {
          const pct = Math.min(scrolled / total, 1);
          ring.style.strokeDashoffset =
            CIRCUMFERENCE - pct * CIRCUMFERENCE;
        }
      }

      window.addEventListener("scroll", updateProgress, {
        passive: true,
      });

      btn.addEventListener("click", () => {
        window.scrollTo({
          top: 0,
          behavior: "smooth",
        });
      });
    })();
  </script>

</body>
</html>
