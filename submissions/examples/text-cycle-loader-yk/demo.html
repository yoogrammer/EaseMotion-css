<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Text Cycling Loader — Holographic Terminal | EaseMotion CSS</title>

  <!-- No external fonts. Using pure system monospace stack defined in CSS. -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ==========================================
       DEMO 1 — Main Holographic Panel
       ========================================== -->
  <div class="holo-panel" role="status" aria-live="polite" aria-label="System status loading">

    <!-- THE LOADER COMPONENT -->
    <div class="text-loader">
      <span class="loader-label">System</span>

      <div class="word-stack">
        <!-- The last word is repeated so the loop lands back visually on item 1 -->
        <span class="word">initializing</span>
        <span class="word">authenticating</span>
        <span class="word">decrypting</span>
        <span class="word">loading_data</span>
        <span class="word">initializing</span>
      </div>
    </div>

  </div>


  <!-- ==========================================
       DEMO 2 — Smaller variant panel
       ========================================== -->
  <div class="holo-panel variant-panel">
    
    <div class="variant-title">Connection_Established</div>

    <div class="text-loader text-loader--sm">
      <span class="loader-label">Status</span>

      <div class="word-stack">
        <span class="word">online</span>
        <span class="word">syncing</span>
        <span class="word">secure</span>
        <span class="word">active</span>
        <span class="word">online</span>
      </div>
    </div>

  </div>

</body>
</html>
