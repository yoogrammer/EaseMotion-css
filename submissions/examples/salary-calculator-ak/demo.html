<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salary Calculator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator-wrapper">
    <h1>Salary Calculator</h1>
    <div class="input-group">
      <label for="annualSalary">Annual Salary ($)</label>
      <input type="number" id="annualSalary" class="input" value="75000" min="0" max="999999999" step="1000">
    </div>
    <div class="breakdown-grid" id="breakdownGrid">
      <div class="breakdown-card">
        <span class="label">Monthly</span>
        <span class="value" id="monthly">$6,250.00</span>
      </div>
      <div class="breakdown-card">
        <span class="label">Bi-Weekly</span>
        <span class="value" id="biweekly">$2,884.62</span>
      </div>
      <div class="breakdown-card">
        <span class="label">Weekly</span>
        <span class="value" id="weekly">$1,442.31</span>
      </div>
      <div class="breakdown-card">
        <span class="label">Hourly</span>
        <span class="value" id="hourly">$36.06</span>
      </div>
    </div>
    <div class="tax-section">
      <h2>Tax Bracket Visualization</h2>
      <div class="bracket-chart" id="bracketChart"></div>
      <div class="tax-summary">
        <div class="summary-row">
          <span>Estimated Tax</span>
          <span id="estimatedTax">$0</span>
        </div>
        <div class="summary-row">
          <span>Take-Home Pay</span>
          <span id="takeHome">$0</span>
        </div>
        <div class="summary-row">
          <span>Effective Rate</span>
          <span id="effectiveRate">0%</span>
        </div>
      </div>
    </div>
  </div>
  <script>
    const annualInput = document.getElementById('annualSalary');
    const monthlyEl = document.getElementById('monthly');
    const biweeklyEl = document.getElementById('biweekly');
    const weeklyEl = document.getElementById('weekly');
    const hourlyEl = document.getElementById('hourly');
    const estimatedTax = document.getElementById('estimatedTax');
    const takeHome = document.getElementById('takeHome');
    const effectiveRate = document.getElementById('effectiveRate');
    const bracketChart = document.getElementById('bracketChart');

    const brackets = [
      { min: 0, max: 11600, rate: 0.10, label: '10%' },
      { min: 11600, max: 47150, rate: 0.12, label: '12%' },
      { min: 47150, max: 100525, rate: 0.22, label: '22%' },
      { min: 100525, max: 191950, rate: 0.24, label: '24%' },
      { min: 191950, max: 243725, rate: 0.32, label: '32%' },
      { min: 243725, max: 609350, rate: 0.35, label: '35%' },
      { min: 609350, max: Infinity, rate: 0.37, label: '37%' }
    ];

    function fmt(n) {
      return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function calculate() {
      const annual = parseFloat(annualInput.value) || 0;
      monthlyEl.textContent = fmt(annual / 12);
      biweeklyEl.textContent = fmt(annual / 26);
      weeklyEl.textContent = fmt(annual / 52);
      hourlyEl.textContent = fmt(annual / 2080);

      let totalTax = 0;
      let remaining = annual;
      bracketChart.innerHTML = '';
      brackets.forEach(b => {
        if (remaining <= 0) return;
        const taxableInBracket = Math.min(remaining, b.max - b.min);
        const taxForBracket = taxableInBracket * b.rate;
        if (taxableInBracket > 0) {
          totalTax += taxForBracket;
          const pct = (taxableInBracket / annual) * 100;
          const bar = document.createElement('div');
          bar.className = 'bracket-bar';
          bar.style.width = Math.max(pct, 2) + '%';
          bar.title = `${b.label} bracket: ${fmt(taxableInBracket)} taxed = ${fmt(taxForBracket)}`;
          bar.innerHTML = `<span class="bracket-label">${b.label}</span>`;
          bracketChart.appendChild(bar);
        }
        remaining -= taxableInBracket;
      });

      const takeHomeVal = annual - totalTax;
      const effRate = annual > 0 ? (totalTax / annual) * 100 : 0;
      estimatedTax.textContent = fmt(totalTax);
      takeHome.textContent = fmt(takeHomeVal);
      effectiveRate.textContent = effRate.toFixed(1) + '%';
    }

    annualInput.addEventListener('input', calculate);
    calculate();
  </script>
</body>
</html>
