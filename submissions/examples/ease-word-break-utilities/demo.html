<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ease Word Break Utilities</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <div class="card">
      <div class="title">ease-break-word</div>

      <p class="ease-break-word">
        ThisIsAnExtremelyLongWordThatWillBreakNicelyInsideTheContainerWithoutOverflowing
      </p>
    </div>

    <div class="card">
      <div class="title">ease-break-all</div>

      <p class="ease-break-all">
        ThisIsAnExtremelyLongWordThatWillBreakAtAnyCharacterInsideTheContainer
      </p>
    </div>

    <div class="card">
      <div class="title">ease-break-keep</div>

      <p class="ease-break-keep">
        This text keeps words together and avoids breaking them unnecessarily.
      </p>
    </div>

  </div>

</body>
</html>
