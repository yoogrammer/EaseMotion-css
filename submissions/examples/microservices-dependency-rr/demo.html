<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microservices Dependency Visualization</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Microservices Dependency Visualization</h1>
    <p class="subtitle">
        Visualizing service dependencies across a microservices architecture.
    </p>

    <div class="graph">

        <div class="node frontend">
            Frontend
        </div>

        <div class="connector"></div>

        <div class="node gateway">
            API Gateway
        </div>

        <div class="connector"></div>

        <div class="services">

            <div class="column">

                <div class="node auth">
                    Auth Service
                </div>

                <div class="connector small"></div>

                <div class="node cache">
                    Redis Cache
                </div>

            </div>

            <div class="column">

                <div class="node user">
                    User Service
                </div>

                <div class="connector small"></div>

                <div class="node database">
                    Database
                </div>

            </div>

            <div class="column">

                <div class="node billing">
                    Billing Service
                </div>

                <div class="connector small"></div>

                <div class="node email">
                    Email Service
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
