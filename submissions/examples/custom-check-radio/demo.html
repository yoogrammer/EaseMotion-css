<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Checkboxes & Radios - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Custom Checkboxes & Radios</h1>
        <p>Pure CSS, accessible, and theme-aware form controls.</p>

        <!-- Checkboxes -->
        <h2>Checkboxes</h2>
        <div class="ease-check-group">
            <label class="ease-check-row">
                <input type="checkbox" class="ease-check-input" checked>
                <span class="ease-check-box">
                    <svg class="ease-check-icon checkmark" viewBox="0 0 24 24">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </span>
                <span>Accept Terms of Service</span>
            </label>

            <label class="ease-check-row">
                <input type="checkbox" class="ease-check-input">
                <span class="ease-check-box">
                    <svg class="ease-check-icon checkmark" viewBox="0 0 24 24">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </span>
                <span>Subscribe to newsletter</span>
            </label>

            <label class="ease-check-row" aria-disabled="true">
                <input type="checkbox" class="ease-check-input" disabled>
                <span class="ease-check-box">
                    <svg class="ease-check-icon checkmark" viewBox="0 0 24 24">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </span>
                <span>Disabled Option</span>
            </label>
        </div>
        <p class="note">Try tabbing to focus on the inputs to see the focus ring.</p>

        <!-- Radios -->
        <h2>Radio Buttons</h2>
        <div class="ease-check-group">
            <label class="ease-check-row" data-type="radio">
                <input type="radio" name="plan" class="ease-check-input" checked>
                <span class="ease-check-box">
                    <span class="ease-check-icon dot"></span>
                </span>
                <span>Free Plan</span>
            </label>

            <label class="ease-check-row" data-type="radio">
                <input type="radio" name="plan" class="ease-check-input">
                <span class="ease-check-box">
                    <span class="ease-check-icon dot"></span>
                </span>
                <span>Pro Plan ($10/mo)</span>
            </label>

            <label class="ease-check-row" data-type="radio">
                <input type="radio" name="plan" class="ease-check-input">
                <span class="ease-check-box">
                    <span class="ease-check-icon dot"></span>
                </span>
                <span>Enterprise Plan</span>
            </label>
        </div>

        <!-- Indeterminate (Requires JS to set state, styled here) -->
        <h2>Indeterminate State</h2>
        <p class="note">This state is usually set via JavaScript (e.g., "Select All").</p>
        <div class="ease-check-group">
            <label class="ease-check-row">
                <input type="checkbox" class="ease-check-input" id="indeterminate-demo">
                <span class="ease-check-box">
                    <svg class="ease-check-icon checkmark" viewBox="0 0 24 24">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    <span class="ease-check-icon dash"></span>
                </span>
                <span>Select All Items</span>
            </label>
        </div>
        <script>
            // Tiny script just to demonstrate the indeterminate visual in the demo
            document.getElementById('indeterminate-demo').indeterminate = true;
        </script>
    </div>
</body>

</html>
