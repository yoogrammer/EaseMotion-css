<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Morphing Blob - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load clean Google Font for premium visual look -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="demo-wrapper">
        <h1 class="demo-title">Organic Morphing Blob</h1>
        
        <!-- The Morphing Blob Element -->
        <div class="blob-container">
            <div class="organic-morphing-blob">
                <div class="blob-glow"></div>
                <div class="blob-inner">
                    <span class="blob-text">Fluid Motion</span>
                </div>
            </div>
        </div>

        <p class="description">
            A premium, pure CSS fluid organic morphing blob animation utilizing complex keyframed <code>border-radius</code> transformations coupled with a rotating background gradient and inner glassmorphic text layer.
        </p>

        <div class="controls-info">
            <span>Hover to speed up morphing frequency</span>
        </div>
    </div>
</body>
</html>
