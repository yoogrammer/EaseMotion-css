<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-ripple — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      gap: 2rem;
      padding: 2rem;
    }
    h1 { color: #333; }
    .label { font-size: 0.75rem; color: #888; margin-bottom: 0.5rem; text-align: center; }
    .row { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .btn-dark { background: #1f2937; color: white; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-success { background: #22c55e; color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-outline {
      background: transparent;
      border: 2px solid #6366f1;
      color: #6366f1;
    }
    .demo-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      cursor: pointer;
      width: 200px;
      text-align: center;
      font-weight: 600;
      color: #333;
    }
  </style>
</head>
<body>

  <h1>ease-ripple Demo</h1>

  <div>
    <div class="label">Default ripple</div>
    <div class="row">
      <button class="btn-dark ease-ripple ease-ripple-light">Light Ripple</button>
      <button class="btn-primary ease-ripple ease-ripple-light">Primary</button>
      <button class="btn-outline ease-ripple ease-ripple-primary">Outline</button>
    </div>
  </div>

  <div>
    <div class="label">Color variants</div>
    <div class="row">
      <button class="btn-primary ease-ripple ease-ripple-primary">Indigo</button>
      <button class="btn-success ease-ripple ease-ripple-success">Success</button>
      <button class="btn-danger ease-ripple ease-ripple-danger">Danger</button>
      <button class="btn-dark ease-ripple ease-ripple-dark">Dark</button>
    </div>
  </div>

  <div>
    <div class="label">Speed variants</div>
    <div class="row">
      <button class="btn-primary ease-ripple ease-ripple-light ease-ripple-fast">Fast</button>
      <button class="btn-primary ease-ripple ease-ripple-light">Default</button>
      <button class="btn-primary ease-ripple ease-ripple-light ease-ripple-slow">Slow</button>
    </div>
  </div>

  <div>
    <div class="label">On a card element</div>
    <div class="row">
      <div class="demo-card ease-ripple ease-ripple-dark">Click me</div>
      <div class="demo-card ease-ripple ease-ripple-primary">Click me</div>
    </div>
  </div>

</body>
</html>
