<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EaseMotion — Tada Celebration Animation</title>
  <link rel="stylesheet" href="style.css" />
  <!--
    No external fonts, no JavaScript, no dependencies.
    All styles live in style.css. Open this file directly in any browser.
  -->
</head>
<body>

  <!-- =========================================================
       SUCCESS CARD
       The main demo component showcasing all tada variants.
       ========================================================= -->
  <article class="success-card">

    <!-- Decorative confetti corner dots (CSS-only) -->
    <span class="confetti-dot" aria-hidden="true"></span>
    <span class="confetti-dot" aria-hidden="true"></span>
    <span class="confetti-dot" aria-hidden="true"></span>
    <span class="confetti-dot" aria-hidden="true"></span>

    <!-- -------------------------------------------------------
         CELEBRATION ICON
         Uses .tada-effect (1.1 s) — plays once on page load.
         This is the primary showcase of the animation.
         ------------------------------------------------------- -->
    <div
      class="celebration-icon tada-effect"
      role="img"
      aria-label="Trophy — achievement unlocked"
    >
      🏆
    </div>

    <!-- -------------------------------------------------------
         ACHIEVEMENT UNLOCKED BANNER
         ------------------------------------------------------- -->
    <p class="achievement-banner" aria-label="Achievement unlocked">
      <span class="achievement-star" aria-hidden="true">★</span>
      Achievement Unlocked
      <span class="achievement-star" aria-hidden="true">★</span>
    </p>

    <!-- -------------------------------------------------------
         HEADLINE + SUBTITLE
         ------------------------------------------------------- -->
    <h1>Milestone Reached!</h1>

    <p class="success-subtitle">
      You've completed all required tasks for this sprint.
      Your contribution has been recorded and celebrated.
    </p>

    <!-- -------------------------------------------------------
         REWARD BADGE
         Uses .reward-badge which carries its own tada animation
         with a 0.5 s delay — plays after the icon finishes.
         ------------------------------------------------------- -->
    <span class="reward-badge" aria-label="All tasks complete">
      <span class="badge-dot" aria-hidden="true"></span>
      All tasks complete · +250 XP awarded
    </span>

    <hr class="card-divider" />

    <!-- -------------------------------------------------------
         STAT ROW
         Contextual numbers to fill the card with meaning.
         ------------------------------------------------------- -->
    <div class="stat-row" aria-label="Summary statistics">
      <div class="stat-item">
        <span class="stat-value">12</span>
        <span class="stat-label">Tasks Done</span>
      </div>
      <div class="stat-item">
        <span class="stat-value">3</span>
        <span class="stat-label">Days Early</span>
      </div>
      <div class="stat-item">
        <span class="stat-value">100%</span>
        <span class="stat-label">Accuracy</span>
      </div>
    </div>

    <!-- -------------------------------------------------------
         CONFIRM BUTTON
         Uses .tada-effect--hover — animates only on mouse hover.
         Demonstrates the hover-trigger variant.
         ------------------------------------------------------- -->
    <button
      class="confirm-button tada-effect--hover"
      type="button"
      aria-label="Claim your reward — hover to see tada effect"
    >
      ✦ &nbsp;Claim Your Reward
    </button>

  </article>

</body>
</html>
