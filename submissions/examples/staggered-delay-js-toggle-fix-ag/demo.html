<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staggered Animation Delay Reset Fix</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-container">
    <h1>Staggered Animation Reset</h1>
    <p>Click "Replay Animation" to trigger the fade-in cascade. The delays are perfectly timed on every iteration and do not stack or lag.</p>
    
    <button class="btn" id="replay-btn">Replay Animation</button>

    <div class="list" id="anim-list">
      <div class="item" style="--i: 0;">Item 1</div>
      <div class="item" style="--i: 1;">Item 2</div>
      <div class="item" style="--i: 2;">Item 3</div>
      <div class="item" style="--i: 3;">Item 4</div>
    </div>
  </main>

  <script>
    const list = document.getElementById('anim-list');
    const btn = document.getElementById('replay-btn');
    
    btn.addEventListener('click', () => {
      // THE FIX: Remove active animation class, trigger reflow to reset layout, then apply back
      list.classList.remove('active');
      void list.offsetWidth; // Force reflow
      list.classList.add('active');
    });
    
    // Auto-trigger on page load
    setTimeout(() => list.classList.add('active'), 200);
  </script>
</body>
</html>
