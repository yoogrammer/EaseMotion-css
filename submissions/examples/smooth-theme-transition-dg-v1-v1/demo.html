<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smooth Theme Transition - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-wrapper">
      <h1>Smooth Theme Transition</h1>

      <!-- Theme Switcher Toggle Button -->
      <button
        class="theme-toggle-btn"
        id="themeToggle"
        aria-label="Toggle Theme"
      >
        <!-- Sun Icon -->
        <svg class="sun-icon" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>

        <!-- Moon Icon -->
        <svg class="moon-icon" viewBox="0 0 24 24">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>

      <p class="description">
        Click the toggle button above. The theme transitions with an expanding
        circular sweep to Light Mode (Sun) and contracts back to Moon Mode
        (Dark).
      </p>
    </div>

    <script>
      const themeToggle = document.getElementById("themeToggle");
      const html = document.documentElement;

      // Load saved preferences
      const savedTheme = localStorage.getItem("ease-theme") || "light";
      html.setAttribute("data-theme", savedTheme);

      // Theme Switch Logic
      themeToggle.addEventListener("click", (event) => {
        const currentTheme = html.getAttribute("data-theme") || "light";
        const targetTheme = currentTheme === "light" ? "dark" : "light";

        // 1. Calculate switch coordinate position for circular mask origin
        const rect = themeToggle.getBoundingClientRect();
        const x = rect.left + rect.width / 2;
        const y = rect.top + rect.height / 2;

        html.style.setProperty("--clip-x", `${x}px`);
        html.style.setProperty("--clip-y", `${y}px`);

        // 2. Perform native view transition if browser supports it
        if (document.startViewTransition) {
          html.setAttribute("data-transition-theme", targetTheme);

          const transition = document.startViewTransition(() => {
            html.setAttribute("data-theme", targetTheme);
            localStorage.setItem("ease-theme", targetTheme);
          });

          transition.finished.finally(() => {
            html.removeAttribute("data-transition-theme");
          });
        } else {
          // Fallback for browsers that don't support View Transitions API
          html.setAttribute("data-theme", targetTheme);
          localStorage.setItem("ease-theme", targetTheme);
        }
      });
    </script>
  </body>
</html>
