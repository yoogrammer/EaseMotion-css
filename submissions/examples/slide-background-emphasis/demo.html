<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Background Emphasis - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container">
    <h1>Slide Background Emphasis</h1>
    <p class="subtitle">A smooth gradient slide animation that sweeps horizontally across a button during emphasis interactions.</p>
    
    <div class="button-container">
      <!-- Default: Purple-Blue Gradient Slide -->
      <button class="slide-bg-btn slide-bg-emphasis target-btn">
        Purple-Blue Slide
      </button>
      
      <!-- Variant 2: Cyan-Teal Gradient -->
      <button class="slide-bg-btn slide-bg-emphasis-cyan target-btn">
        Cyan-Teal Slide
      </button>
      
      <!-- Variant 3: Pink-Orange Gradient -->
      <button class="slide-bg-btn slide-bg-emphasis-pink target-btn">
        Pink-Orange Slide
      </button>
    </div>

    <!-- Toggle Loop Button -->
    <div style="margin-top: 20px;">
      <button id="toggleBtn" class="toggle-btn">Toggle Emphasis Loop</button>
      <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 10px;">
        Or hover over the buttons above to trigger the slide effect dynamically!
      </p>
    </div>
  </div>

  <script>
    const toggleBtn = document.getElementById('toggleBtn');
    const targetBtns = document.querySelectorAll('.target-btn');

    toggleBtn.addEventListener('click', () => {
      let isActive = false;
      targetBtns.forEach(btn => {
        isActive = btn.classList.toggle('emphasis-active');
      });

      if (isActive) {
        toggleBtn.textContent = 'Disable Emphasis Loop';
        toggleBtn.classList.add('btn-active');
      } else {
        toggleBtn.textContent = 'Toggle Emphasis Loop';
        toggleBtn.classList.remove('btn-active');
      }
    });
  </script>
</body>
</html>
