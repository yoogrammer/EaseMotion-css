<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Theme Customizer Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="theme-panel">

    <h1>🎨 Theme Customizer</h1>
    <p>Customize appearance and accent styles.</p>

    <div class="section">
        <h3>Appearance</h3>

        <div class="toggle-group">
            <button class="active">🌙 Dark</button>
            <button>☀️ Light</button>
        </div>
    </div>

    <div class="section">
        <h3>Accent Colors</h3>

        <div class="colors">
            <span class="color purple"></span>
            <span class="color blue"></span>
            <span class="color green"></span>
            <span class="color orange"></span>
            <span class="color red"></span>
        </div>
    </div>

    <div class="section">
        <h3>Preferences</h3>

        <label><input type="checkbox" checked> Enable Animations</label>
        <label><input type="checkbox" checked> Enable Shadows</label>
        <label><input type="checkbox"> Compact Layout</label>
    </div>

    <button class="apply-btn">
        Apply Theme
    </button>

</div>

</body>
</html>
