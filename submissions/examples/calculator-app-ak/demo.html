<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="calculator">
      <div class="display" id="display">0</div>
      <div class="buttons">
        <button class="btn clear" data-value="C">C</button>
        <button class="btn op" data-value="±">±</button>
        <button class="btn op" data-value="%">%</button>
        <button class="btn op" data-value="/">÷</button>
        <button class="btn num" data-value="7">7</button>
        <button class="btn num" data-value="8">8</button>
        <button class="btn num" data-value="9">9</button>
        <button class="btn op" data-value="*">×</button>
        <button class="btn num" data-value="4">4</button>
        <button class="btn num" data-value="5">5</button>
        <button class="btn num" data-value="6">6</button>
        <button class="btn op" data-value="-">−</button>
        <button class="btn num" data-value="1">1</button>
        <button class="btn num" data-value="2">2</button>
        <button class="btn num" data-value="3">3</button>
        <button class="btn op" data-value="+">+</button>
        <button class="btn num zero" data-value="0">0</button>
        <button class="btn num" data-value=".">.</button>
        <button class="btn equals" data-value="=">=</button>
      </div>
    </div>
  </div>
  <script>
    const display = document.getElementById('display');
    let current = '0';
    let previous = null;
    let operator = null;
    let shouldReset = false;

    function updateDisplay() {
      display.textContent = current.length > 15 ? parseFloat(current).toExponential(6) : current;
    }

    function inputNumber(value) {
      if (shouldReset) {
        current = value;
        shouldReset = false;
      } else {
        current = current === '0' && value !== '.' ? value : current + value;
      }
    }

    function inputDecimal() {
      if (shouldReset) {
        current = '0.';
        shouldReset = false;
        return;
      }
      if (!current.includes('.')) current += '.';
    }

    function handleOperator(op) {
      if (op === '±') {
        current = (parseFloat(current) * -1).toString();
        return;
      }
      if (op === '%') {
        current = (parseFloat(current) / 100).toString();
        return;
      }
      if (operator && !shouldReset) calculate();
      previous = current;
      operator = op;
      shouldReset = true;
    }

    function calculate() {
      if (!operator || previous === null) return;
      const a = parseFloat(previous);
      const b = parseFloat(current);
      let result;
      switch (operator) {
        case '+': result = a + b; break;
        case '-': result = a - b; break;
        case '*': result = a * b; break;
        case '/': result = b === 0 ? 'Error' : a / b; break;
        default: return;
      }
      current = typeof result === 'number' ? parseFloat(result.toFixed(10)).toString() : result;
      operator = null;
      previous = null;
      shouldReset = true;
    }

    function clear() {
      current = '0';
      previous = null;
      operator = null;
      shouldReset = false;
    }

    document.querySelector('.buttons').addEventListener('click', e => {
      const btn = e.target.closest('.btn');
      if (!btn) return;
      const val = btn.dataset.value;
      if (btn.classList.contains('num')) {
        if (val === '.') inputDecimal();
        else inputNumber(val);
      } else if (btn.classList.contains('clear')) {
        clear();
      } else if (btn.classList.contains('equals')) {
        calculate();
      } else {
        handleOperator(val);
      }
      updateDisplay();
    });
  </script>
</body>
</html>
