<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Pulse Animation Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Glow Pulse Animation</h1>
        <p>A simple animation utility for highlighting important elements.</p>

        <div class="demo-box">
            <button class="glow-pulse btn">Subscribe Now</button>
        </div>

        <div class="demo-box">
            <span class="glow-pulse badge">NEW</span>
        </div>

        <div class="demo-box">
            <div class="glow-pulse icon">⭐</div>
        </div>
    </div>

</body>
</html>
