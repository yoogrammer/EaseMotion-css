<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-tooltip-pr Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 4rem 2rem;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4rem;
    }
    
    .demo-section h2 {
      text-align: center;
      margin-bottom: 2rem;
      color: #1e293b;
    }
    
    .tooltips-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 3rem;
      max-width: 500px;
      justify-items: center;
    }
    
    .demo-button {
      padding: 0.75rem 1.5rem;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="demo-section">
    <h2>Tooltip Positions</h2>
    <div class="tooltips-grid">
      
      <button class="demo-button tooltip-pr" data-tooltip="Top tooltip" data-tooltip-pos="top">
        Top
      </button>

      <button class="demo-button tooltip-pr" data-tooltip="Bottom tooltip" data-tooltip-pos="bottom">
        Bottom
      </button>

      <button class="demo-button tooltip-pr" data-tooltip="Left tooltip" data-tooltip-pos="left">
        Left
      </button>

      <button class="demo-button tooltip-pr" data-tooltip="Right tooltip" data-tooltip-pos="right">
        Right
      </button>

    </div>
  </div>

  <div class="demo-section">
    <h2>Default Position (Top)</h2>
    <button class="demo-button tooltip-pr" data-tooltip="This is the default tooltip">
      Hover Me
    </button>
  </div>

</body>
</html>
