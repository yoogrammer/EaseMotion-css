<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Absolute Layer Bleed Fix</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 460px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Spatial Depth Mapping Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Click the trigger button below. Explicit 3D preservation parameters paired with <code>translateZ</code> axis buffers prevent absolute text layers from bleeding or flickering.</p>
  </header>

  <div class="alm-spatial-animation-stage">
    <input type="checkbox" id="spatialBleedToggle" class="alm-matrix-loop-checkbox">
    
    <div class="alm-stabilized-spatial-card">
      
      <div class="alm-spatial-face-pane alm-is-front">
        <div>
          <span class="alm-extruded-badge">Secure Vector</span>
          <h2 class="alm-extruded-title" style="margin-top: 1.5rem;">Matrix Core Telemetry Pipeline</h2>
        </div>
        
        <label for="spatialBleedToggle" class="alm-spatial-action-trigger">
          Rotate Space View
        </label>
      </div>

      <div class="alm-spatial-face-pane alm-is-reverse" style="background: rgba(108,99,255,0.03);">
        <div>
          <span class="alm-extruded-badge" style="background: rgba(34,197,94,0.1); color: #22c55e;">System Ledger</span>
          <h2 class="alm-extruded-title" style="margin-top: 1.5rem; color: #cbd5e1;">Computational Node Quota Records</h2>
        </div>
        
        <label for="spatialBleedToggle" class="alm-spatial-action-trigger" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: white;">
          ◀ Return to Vector
        </label>
      </div>

    </div>
  </div>

</body>
</html>
