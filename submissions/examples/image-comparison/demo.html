<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Comparison — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="ease-image-comparison" role="slider" aria-valuenow="50" tabindex="0">
    <img class="ease-image-comparison-after"
         src="https://picsum.photos/seed/after/640/400"
         alt="After" draggable="false" />
    <div class="ease-image-comparison-before">
      <img src="https://picsum.photos/seed/before/640/400"
           alt="Before" draggable="false" />
    </div>
    <div class="ease-image-comparison-handle" tabindex="-1"></div>
    <span class="ease-image-comparison-label ease-image-comparison-label--before">Before</span>
    <span class="ease-image-comparison-label ease-image-comparison-label--after">After</span>
  </div>

  <script>
    const container = document.querySelector('.ease-image-comparison');
    const before = container.querySelector('.ease-image-comparison-before');
    const handle = container.querySelector('.ease-image-comparison-handle');
    let isDragging = false;

    function updateSplit(clientX) {
      const rect = container.getBoundingClientRect();
      const x = Math.max(0, Math.min(clientX - rect.left, rect.width));
      const pct = (x / rect.width) * 100;
      before.style.width = pct + '%';
      handle.style.left = pct + '%';
      container.setAttribute('aria-valuenow', Math.round(pct));
    }

    container.addEventListener('mousedown', (e) => {
      isDragging = true;
      updateSplit(e.clientX);
    });

    document.addEventListener('mousemove', (e) => {
      if (isDragging) updateSplit(e.clientX);
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
    });

    container.addEventListener('touchstart', (e) => {
      isDragging = true;
      updateSplit(e.touches[0].clientX);
    });

    document.addEventListener('touchmove', (e) => {
      if (isDragging) updateSplit(e.touches[0].clientX);
    });

    document.addEventListener('touchend', () => {
      isDragging = false;
    });

    container.addEventListener('keydown', (e) => {
      const step = e.shiftKey ? 10 : 2;
      const rect = container.getBoundingClientRect();
      const currentPx = (parseFloat(before.style.width) || 50) / 100 * rect.width;
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        updateSplit(rect.left + currentPx - step);
      }
      if (e.key === 'ArrowRight') {
        e.preventDefault();
        updateSplit(rect.left + currentPx + step);
      }
    });
  </script>

</body>
</html>
