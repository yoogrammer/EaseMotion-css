<!DOCTYPE html>
<html lang="en">

<head>
  <!--
    THEME PERSISTENCE FIX — demo.html
    ===================================
    This IIFE must be the very first script in <head> — before any
    stylesheet — so the correct theme is applied before a single pixel
    renders. This eliminates the "Flash of Incorrect Theme" (FOIT).
  -->
  <script>
    (function () {
      var saved = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Theme Persistence Fix — EaseMotion CSS Submission</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="demo-card">
    <h1 class="demo-title">Theme Persistence Fix</h1>
    <p class="demo-subtitle">
      Toggle the theme, then refresh the page (<kbd>F5</kbd>).<br>
      Your choice is saved to <code>localStorage</code> and restored
      instantly — no flash, no reset.
    </p>

    <button id="theme-toggle" class="toggle-btn" aria-label="Toggle dark/light theme">
      <!-- Sun icon — shown in dark mode -->
      <svg class="icon-sun" viewBox="0 0 24 24" width="16" height="16"
           stroke="currentColor" stroke-width="2" fill="none"
           stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1"    x2="12" y2="3"></line>
        <line x1="12" y1="21"   x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22"   x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1"  y1="12" x2="3"  y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.72" x2="5.64" y2="18.3"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <!-- Moon icon — shown in light mode -->
      <svg class="icon-moon" viewBox="0 0 24 24" width="16" height="16"
           stroke="currentColor" stroke-width="2" fill="none"
           stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
      Switch Theme
    </button>

    <div class="status-badge" id="status-badge" aria-live="polite">
      <span class="status-dot"></span>
      <span id="status-text">Loading…</span>
    </div>
  </div>

  <script>
    // ── Toggle + Persist ─────────────────────────────────────────
    // The page-load restore is handled by the <head> IIFE above.
    // This script only handles clicks and writes to localStorage.

    var themeBtn  = document.getElementById('theme-toggle');
    var statusTxt = document.getElementById('status-text');

    // Update the status badge to reflect current state
    function updateStatus() {
      var theme = document.documentElement.getAttribute('data-theme') || 'dark';
      var stored = localStorage.getItem('theme');
      statusTxt.textContent =
        'Current theme: ' + theme +
        (stored ? ' — saved to localStorage' : ' — using default');
    }

    // Run once on load to show correct initial state
    updateStatus();

    themeBtn.addEventListener('click', function () {
      var current  = document.documentElement.getAttribute('data-theme');
      var newTheme = current === 'light' ? 'dark' : 'light';

      // 1. Apply immediately
      document.documentElement.setAttribute('data-theme', newTheme);

      // 2. Persist for next page load
      localStorage.setItem('theme', newTheme);

      // 3. Update the status indicator
      updateStatus();
    });
  </script>

</body>
</html>
