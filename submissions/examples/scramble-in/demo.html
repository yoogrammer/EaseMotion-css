<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-scramble-in — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f172a;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #f1f5f9; font-family: sans-serif; font-size: 1.5rem; }
    .section { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    h2 { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #475569; font-family: sans-serif; }
    .word {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    .sublabel { font-size: 0.7rem; color: #475569; font-family: sans-serif; }
    button {
      padding: 8px 20px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: transparent;
      color: #64748b;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: sans-serif;
    }
    button:hover { border-color: #6366f1; color: #a5b4fc; }
  </style>
</head>
<body>

  <h1>ease-scramble-in Demo</h1>

  <div class="section">
    <h2>Default speed</h2>
    <div class="word ease-scramble-in" style="color:#6366f1;">
      <span>L</span><span>O</span><span>A</span><span>D</span><span>I</span><span>N</span><span>G</span>
    </div>
    <div class="sublabel">60ms per letter</div>
  </div>

  <div class="section">
    <h2>Fast variant</h2>
    <div class="word ease-scramble-in ease-scramble-in-fast" style="color:#22c55e;">
      <span>S</span><span>P</span><span>E</span><span>E</span><span>D</span>
    </div>
    <div class="sublabel">30ms per letter</div>
  </div>

  <div class="section">
    <h2>Slow variant</h2>
    <div class="word ease-scramble-in ease-scramble-in-slow" style="color:#f59e0b;">
      <span>S</span><span>L</span><span>O</span><span>W</span>
    </div>
    <div class="sublabel">120ms per letter</div>
  </div>

  <div class="section">
    <h2>Loop variant</h2>
    <div class="word ease-scramble-in ease-scramble-in-loop" style="color:#ec4899;">
      <span>L</span><span>O</span><span>O</span><span>P</span>
    </div>
    <div class="sublabel">Infinite cycle</div>
  </div>

  <div class="section">
    <h2>Long word</h2>
    <div class="word ease-scramble-in" style="color:#a78bfa; font-size:2rem; letter-spacing:2px;">
      <span>E</span><span>A</span><span>S</span><span>E</span><span>M</span><span>O</span><span>T</span><span>I</span><span>O</span><span>N</span>
    </div>
  </div>

  <button onclick="location.reload()">↺ Replay animations</button>

</body>
</html>
