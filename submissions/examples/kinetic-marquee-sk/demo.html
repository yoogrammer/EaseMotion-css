<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinetic Typography Marquee | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- The main overflow wrapper -->
  <div class="kinetic-marquee">
    <!-- The moving track -->
    <div class="marquee-track">
      <!-- 
        The content MUST be duplicated exactly once for the 50% translation trick to work flawlessly. 
        It acts as a seamless loop.
      -->
      <span>BREAKING NEWS 🚀 NEW COMPONENTS ADDED</span>
      <span>BREAKING NEWS 🚀 NEW COMPONENTS ADDED</span>
      <span>BREAKING NEWS 🚀 NEW COMPONENTS ADDED</span>
      
      <!-- Duplicate set -->
      <span>BREAKING NEWS 🚀 NEW COMPONENTS ADDED</span>
      <span>BREAKING NEWS 🚀 NEW COMPONENTS ADDED</span>
      <span>BREAKING NEWS 🚀 NEW COMPONENTS ADDED</span>
    </div>
  </div>

</body>
</html>
