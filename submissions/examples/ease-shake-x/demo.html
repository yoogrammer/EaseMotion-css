<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-shake-x - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>ease-shake-x</h1>

  <div class="demo-input-wrapper">
    <input
      id="demo-input"
      class="demo-input"
      type="text"
      placeholder="Leave empty and click Submit"
    >
    <button class="demo-btn" onclick="triggerShake()">Submit</button>
  </div>

  <p class="description">
    Submit the empty field to see the horizontal shake animation.<br>
    Add <code>.ease-shake-x</code> to any element to trigger the effect.<br>
    The class can be re-applied via JavaScript to replay it on demand.
  </p>

  <script>
    function triggerShake() {
      const input = document.getElementById('demo-input');
      if (input.value.trim() === '') {
        input.classList.remove('ease-shake-x', 'is-invalid');
        // Force reflow to allow re-triggering the animation
        void input.offsetWidth;
        input.classList.add('ease-shake-x', 'is-invalid');
        input.addEventListener('animationend', () => {
          input.classList.remove('ease-shake-x');
        }, { once: true });
      }
    }
  </script>

</body>
</html>
