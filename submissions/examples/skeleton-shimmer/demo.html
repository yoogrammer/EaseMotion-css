<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pure CSS Skeleton Shimmer Loading Demo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div
      style="
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2.5rem;
        padding: 2rem;
        text-align: center;
      "
    >
      <header style="max-width: 500px">
        <span
          style="
            color: #6c63ff;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
          "
          >Async Layout States</span
        >
        <h1
          style="
            font-size: 2.25rem;
            margin: 0.5rem 0 0.75rem 0;
            letter-spacing: -0.5px;
            color: #fff;
          "
        >
          Skeleton Screen Loader
        </h1>
        <p style="color: #a0aec0; font-size: 0.95rem; line-height: 1.5">
          An elegant UX placeholder utility powered entirely by smooth
          background linear-gradient shifts.
        </p>
      </header>
      <div class="ease-skeleton-card">
        <div class="ease-skeleton-media ease-shimmer"></div>
        <div class="ease-skeleton-title ease-shimmer"></div>
        <div class="ease-skeleton-text ease-shimmer"></div>
        <div class="ease-skeleton-text short ease-shimmer"></div>
        <div class="ease-skeleton-button ease-shimmer"></div>
      </div>
    </div>
  </body>
</html>
