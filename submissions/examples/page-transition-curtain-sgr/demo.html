<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Transition Curtain Animation Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #f5f5f7;
      color: #1d1d1f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    .content {
      text-align: center;
      max-width: 600px;
      padding: 2rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      z-index: 1;
    }
    
    h1 {
      margin-top: 0;
      color: #111;
    }
    
    p {
      line-height: 1.6;
      color: #555;
    }
    
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 2rem;
    }
    
    button {
      padding: 10px 20px;
      background-color: #007aff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    button:hover {
      background-color: #005bb5;
    }
    
    /* Pages mockup */
    .page {
      display: none;
    }
    .page.active {
      display: block;
    }
  </style>
</head>
<body>

  <div id="curtain" class="curtain"></div>

  <div class="content page active" id="page1">
    <h1>Home Page</h1>
    <p>Welcome to the page transition demo. Choose an effect below to navigate to the "next page".</p>
    
    <div class="controls">
      <button onclick="navigate('curtain')">Default Sweep</button>
      <button onclick="navigate('curtain-split')">Split Close</button>
      <button onclick="navigate('curtain-diagonal')">Diagonal Sweep</button>
      <button onclick="navigate('curtain-fade')">Opacity Fade</button>
      <button onclick="navigate('curtain-blur')">Backdrop Blur</button>
    </div>
  </div>

  <div class="content page" id="page2">
    <h1>About Page</h1>
    <p>You have successfully navigated to another page with a beautiful transition effect.</p>
    
    <div class="controls">
      <button onclick="navigateBack('curtain')">Go Back</button>
    </div>
  </div>

  <script>
    const curtainEl = document.getElementById('curtain');
    let isAnimating = false;

    function navigate(variant) {
      if (isAnimating) return;
      isAnimating = true;

      // Reset classes
      curtainEl.className = `curtain ${variant} is-leaving`;

      // Wait for leave animation to finish
      setTimeout(() => {
        // Swap pages (simulate navigation)
        document.getElementById('page1').classList.remove('active');
        document.getElementById('page2').classList.add('active');

        // Play enter animation
        curtainEl.classList.remove('is-leaving');
        curtainEl.classList.add('is-entering');

        setTimeout(() => {
          isAnimating = false;
        }, 800); // Wait for enter animation to finish (0.8s)
      }, 800); // Wait for leave animation to finish (0.8s)
    }

    function navigateBack(variant) {
      if (isAnimating) return;
      isAnimating = true;

      // Use a consistent back animation if wanted, or the same
      curtainEl.className = `curtain ${variant} is-leaving`;

      setTimeout(() => {
        document.getElementById('page2').classList.remove('active');
        document.getElementById('page1').classList.add('active');

        curtainEl.classList.remove('is-leaving');
        curtainEl.classList.add('is-entering');

        setTimeout(() => {
          isAnimating = false;
        }, 800);
      }, 800);
    }
  </script>
</body>
</html>
