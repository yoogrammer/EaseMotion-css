<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Text Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>Default Typing</h2>
  <div class="typing-cursor">
    <span
      class="typing-text"
      style="--typing-chars:18;"
    >
      Hello EaseMotion!
    </span>
  </div>

  <br><br>

  <h2>Fast Typing</h2>
  <div class="typing-cursor">
    <span
      class="typing-text"
      style="--typing-speed:0.05s; --typing-chars:12;"
    >
      Fast Typing
    </span>
  </div>

  <br><br>

  <h2>Slow Typing</h2>
  <div class="typing-cursor">
    <span
      class="typing-text"
      style="--typing-speed:0.2s; --typing-chars:12;"
    >
      Slow Typing
    </span>
  </div>

  <br><br>

  <h2>RTL Example</h2>
  <div dir="rtl" class="typing-cursor">
    <span
      class="typing-text"
      style="--typing-chars:13;"
    >
      مرحبا بالعالم
    </span>
  </div>

</body>
</html>
