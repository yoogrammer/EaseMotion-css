<!DOCTYPE html>
<html lang="en">
<head>

    <title>Button gradient & soft color variant</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>

    <button class="btn-gradient-purple">Gradient Purple</button>
    <button class="btn-gradient-green">Gradient Green</button>
