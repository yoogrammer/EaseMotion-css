<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dropdown Navigation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">EaseMotion</div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li class="nav-dropdown">
        <a href="#" class="nav-dropdown-toggle">Products &#9662;</a>
        <ul class="nav-submenu">
          <li><a href="#">Animations</a></li>
          <li><a href="#">Transitions</a></li>
          <li class="nav-dropdown">
            <a href="#" class="nav-dropdown-toggle">Utilities &#9662;</a>
            <ul class="nav-submenu">
              <li><a href="#">Spacing</a></li>
              <li><a href="#">Typography</a></li>
              <li><a href="#">Colors</a></li>
            </ul>
          </li>
        </ul>
      </li>
      <li class="nav-dropdown">
        <a href="#" class="nav-dropdown-toggle">Docs &#9662;</a>
        <ul class="nav-submenu">
          <li><a href="#">Getting Started</a></li>
          <li><a href="#">API Reference</a></li>
          <li><a href="#">Examples</a></li>
        </ul>
      </li>
      <li><a href="#">Pricing</a></li>
    </ul>
  </nav>
  <div class="hero">
    <h1>Dropdown Navigation</h1>
    <p>Hover over the menu items to see dropdowns in action.</p>
  </div>
  <script>
    document.querySelectorAll('.nav-dropdown-toggle').forEach(toggle => {
      toggle.addEventListener('click', e => {
        e.preventDefault();
        const parent = toggle.parentElement;
        parent.classList.toggle('open');
      });
    });
    document.addEventListener('click', e => {
      if (!e.target.closest('.nav-dropdown')) {
        document.querySelectorAll('.nav-dropdown.open').forEach(el => el.classList.remove('open'));
      }
    });
  </script>
</body>
</html>
