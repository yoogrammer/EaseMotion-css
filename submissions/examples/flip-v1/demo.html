<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-flip — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #333; }
    .label { font-size: 0.75rem; color: #888; text-align: center; margin-bottom: 0.75rem; }
    .row { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
    .card {
      width: 200px;
      height: 250px;
      border-radius: 16px;
    }
    .card-sm {
      width: 160px;
      height: 160px;
      border-radius: 16px;
    }
    .front {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      font-weight: 700;
      font-size: 1.1rem;
    }
    .back {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      font-weight: 700;
      font-size: 1rem;
      padding: 1rem;
      text-align: center;
    }
    .f1 { background: #6366f1; color: white; }
    .b1 { background: #4338ca; color: white; }
    .f2 { background: #22c55e; color: white; }
    .b2 { background: #15803d; color: white; }
    .f3 { background: #f97316; color: white; }
    .b3 { background: #c2410c; color: white; }
  </style>
</head>
<body>

  <h1>ease-flip Demo</h1>

  <div>
    <div class="label">Hover to flip (Y axis)</div>
    <div class="row">
      <div class="ease-flip card">
        <div class="ease-flip-inner">
          <div class="ease-flip-front front f1">Flash Card</div>
          <div class="ease-flip-back back b1">The answer is on this side! 🎉</div>
        </div>
      </div>

      <div class="ease-flip card">
        <div class="ease-flip-inner">
          <div class="ease-flip-front front f2">Pricing</div>
          <div class="ease-flip-back back b2">$9/mo — Unlimited access ✓</div>
        </div>
      </div>

      <div class="ease-flip card">
        <div class="ease-flip-inner">
          <div class="ease-flip-front front f3">Profile</div>
          <div class="ease-flip-back back b3">John Doe — Designer 🎨</div>
        </div>
      </div>
    </div>
  </div>

  <div>
    <div class="label">X axis flip</div>
    <div class="row">
      <div class="ease-flip ease-flip-x card-sm">
        <div class="ease-flip-inner">
          <div class="ease-flip-front front f1">Flip X</div>
          <div class="ease-flip-back back b1">Flipped! ↕</div>
        </div>
      </div>
    </div>
  </div>

  <div>
    <div class="label">Speed variants</div>
    <div class="row">
      <div class="ease-flip ease-flip-fast card-sm">
        <div class="ease-flip-inner">
          <div class="ease-flip-front front f2">Fast</div>
          <div class="ease-flip-back back b2">300ms ⚡</div>
        </div>
      </div>
      <div class="ease-flip ease-flip-slow card-sm">
        <div class="ease-flip-inner">
          <div class="ease-flip-front front f3">Slow</div>
          <div class="ease-flip-back back b3">1000ms 🐢</div>
        </div>
      </div>
    </div>
  </div>

  <div>
    <div class="label">Click to flip</div>
    <div class="row">
      <label class="ease-flip ease-flip-click card-sm">
        <input type="checkbox" />
        <div class="ease-flip-inner">
          <div class="ease-flip-front front f1">Click me</div>
          <div class="ease-flip-back back b1">Clicked! ✓</div>
        </div>
      </label>
    </div>
  </div>

</body>
</html>
