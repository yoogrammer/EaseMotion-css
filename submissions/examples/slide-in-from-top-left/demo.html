<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-slide-in-from-top-left — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; letter-spacing: 0.05em; }

    .card {

      background: #1a1a1a; border: 1px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 500; font-size: 0.8rem;
      text-align: center;

  </style>
</head>
<body>
  <h1>ease-slide-in-from-top-left</h1>
  <div class="section">
    <div class="label">Corner entrance variants</div>
    <div class="row">
      <div class="card ease-slide-in-from-top-left">Top Left</div>
      <div class="card ease-slide-in-from-top-right">Top Right</div>
      <div class="card ease-slide-in-from-bottom-left">Bottom Left</div>
