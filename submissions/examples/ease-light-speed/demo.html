<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-light-speed -- EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 3rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
      overflow-x: hidden;
    }

    h1 {
      font-size: 1rem;
      color: #475569;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 640px;
    }

    .label {
      font-size: 0.68rem;
      color: #475569;
      text-align: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      width: 100%;
      overflow: hidden;
    }

    .btn {
      padding: 0.65rem 1.5rem;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-primary { background: #4f46e5; border-color: #4f46e5; color: #fff; }
    .btn-green   { background: #16a34a; border-color: #16a34a; color: #fff; }
    .btn-red     { background: #dc2626; border-color: #dc2626; color: #fff; }
    .btn-amber   { background: #d97706; border-color: #d97706; color: #fff; }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 1rem 1.5rem;
      text-align: center;
      min-width: 130px;
    }

    .card-title { font-size: 0.85rem; font-weight: 600; }
    .card-sub   { font-size: 0.68rem; color: #64748b; margin-top: 0.25rem; }

    .icon { font-size: 2.5rem; display: inline-block; }

    .replay-btn {
      padding: 0.4rem 1rem;
      border-radius: 6px;
      border: 1px solid #334155;
      background: transparent;
      color: #64748b;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .replay-btn:hover { color: #e2e8f0; border-color: #475569; }
  </style>
</head>
<body>

  <h1>ease-light-speed Demo</h1>

  <!-- Direction variants -->
  <div class="section">
    <div class="label">Direction variants</div>
    <div class="row" id="demo-direction">
      <button class="btn btn-primary ease-light-speed">From Right</button>
      <button class="btn ease-light-speed-left">From Left</button>
    </div>
    <button class="replay-btn" onclick="replay('demo-direction', ['ease-light-speed','ease-light-speed-left'])">Replay ↺</button>
  </div>

  <!-- Speed variants -->
  <div class="section">
    <div class="label">Speed variants</div>
    <div class="row" id="demo-speed">
      <button class="btn ease-light-speed ease-light-speed-fast">Fast (0.25s)</button>
      <button class="btn btn-primary ease-light-speed ease-delay-100">Default (0.5s)</button>
      <button class="btn ease-light-speed ease-light-speed-slow ease-delay-200">Slow (0.9s)</button>
    </div>
    <button class="replay-btn" onclick="replay('demo-speed', ['ease-light-speed'])">Replay ↺</button>
  </div>

  <!-- Staggered entrance -->
  <div class="section">
    <div class="label">Staggered entrance</div>
    <div class="row" id="demo-stagger">
      <div class="card ease-light-speed">
        <div class="card-title">First</div>
        <div class="card-sub">no delay</div>
      </div>
      <div class="card ease-light-speed ease-delay-200">
        <div class="card-title">Second</div>
        <div class="card-sub">200ms</div>
      </div>
      <div class="card ease-light-speed ease-delay-400">
        <div class="card-title">Third</div>
        <div class="card-sub">400ms</div>
      </div>
    </div>
    <button class="replay-btn" onclick="replay('demo-stagger', ['ease-light-speed'])">Replay ↺</button>
  </div>

  <!-- Exit variants -->
  <div class="section">
    <div class="label">Exit variants (play on load)</div>
    <div class="row" id="demo-exit">
      <button class="btn btn-red ease-light-speed-out">Exit Right</button>
      <button class="btn btn-amber ease-light-speed-out-left">Exit Left</button>
    </div>
    <button class="replay-btn" onclick="replay('demo-exit', ['ease-light-speed-out','ease-light-speed-out-left'])">Replay ↺</button>
  </div>

  <!-- On icons -->
  <div class="section">
    <div class="label">On icons and emoji</div>
    <div class="row" id="demo-icons">
      <span class="icon ease-light-speed">⚡</span>
      <span class="icon ease-light-speed ease-delay-100">🚀</span>
      <span class="icon ease-light-speed-left ease-delay-200">💨</span>
    </div>
    <button class="replay-btn" onclick="replay('demo-icons', ['ease-light-speed','ease-light-speed-left'])">Replay ↺</button>
  </div>

  <script>
    function replay(sectionId, classes) {
      const section = document.getElementById(sectionId);
      const allClasses = classes.concat([
        'ease-light-speed-fast', 'ease-light-speed-slow',
        'ease-delay-100', 'ease-delay-200', 'ease-delay-300',
        'ease-delay-400', 'ease-delay-500'
      ]);
      section.querySelectorAll('*').forEach(el => {
        const hasAnim = classes.some(c => el.classList.contains(c));
        if (!hasAnim) return;
        allClasses.forEach(c => el.classList.remove(c));
        void el.offsetWidth;
        allClasses.forEach(c => {
          if ([...el.className.split(' ')].includes(c) || el.dataset['orig' + c]) {
            el.classList.add(c);
          }
        });
      });
      // Simpler approach: remove and re-add animation classes
      section.querySelectorAll('*').forEach(el => {
        const matched = classes.filter(c => el.classList.contains(c));
        if (!matched.length) return;
        matched.forEach(c => el.classList.remove(c));
        void el.offsetWidth;
        matched.forEach(c => el.classList.add(c));
      });
    }
  </script>

</body>
</html>
