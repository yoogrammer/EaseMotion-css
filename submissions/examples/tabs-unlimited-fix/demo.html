<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-tabs — Unlimited Count Fix</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      max-width: 700px;
      margin: 3rem auto;
      padding: 0 1.5rem;
      font-family: sans-serif;
      background: #0f0f17;
      color: #cdd6f4;
    }
    h1 { margin-bottom: 2rem; }
  </style>
</head>
<body>
  <h1>ease-tabs — 8 tabs (was broken at 7+)</h1>

  <div class="ease-tabs">
    <!-- Tab list — any number of buttons, no CSS limit -->
    <div class="ease-tab-list">
      <button class="ease-tab-btn" data-tab="tab-1">Tab 1</button>
      <button class="ease-tab-btn" data-tab="tab-2">Tab 2</button>
      <button class="ease-tab-btn" data-tab="tab-3">Tab 3</button>
      <button class="ease-tab-btn" data-tab="tab-4">Tab 4</button>
      <button class="ease-tab-btn" data-tab="tab-5">Tab 5</button>
      <button class="ease-tab-btn" data-tab="tab-6">Tab 6</button>
      <button class="ease-tab-btn" data-tab="tab-7">Tab 7 ✅ fixed</button>
      <button class="ease-tab-btn" data-tab="tab-8">Tab 8 ✅ fixed</button>
    </div>

    <!-- Panels — id matches data-tab value -->
    <div class="ease-tab-panel" id="tab-1"><p>Panel 1 content.</p></div>
    <div class="ease-tab-panel" id="tab-2"><p>Panel 2 content.</p></div>
    <div class="ease-tab-panel" id="tab-3"><p>Panel 3 content.</p></div>
    <div class="ease-tab-panel" id="tab-4"><p>Panel 4 content.</p></div>
    <div class="ease-tab-panel" id="tab-5"><p>Panel 5 content.</p></div>
    <div class="ease-tab-panel" id="tab-6"><p>Panel 6 content.</p></div>
    <div class="ease-tab-panel" id="tab-7"><p>Panel 7 — previously broken, now works!</p></div>
    <div class="ease-tab-panel" id="tab-8"><p>Panel 8 — previously broken, now works!</p></div>
  </div>

  <script src="tabs.js"></script>
</body>
</html>
