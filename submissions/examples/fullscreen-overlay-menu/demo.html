<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Full-Screen Overlay Menu</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
      overflow: hidden; /* Prevents background page scrolling while testing overlay */
    }
  </style>
</head>
<body>

  <main style="text-align: center; max-width: 440px;">
    <h1 style="color: white; margin: 0; font-size: 1.75rem; font-weight: 800; letter-spacing: -0.02em;">Premium Agency Canvas</h1>
    <p style="color: #64748b; margin: 8px 0 0 0; font-size: 0.925rem; line-height: 1.6;">Click the floating circle icon in the upper right corner. General sibling combinators handle the modal expansion state and link cascade effects instantly without loading external scripts.</p>
  </main>

  <input type="checkbox" id="fullscreenNavToggle" class="alm-menu-toggle-input">
  
  <label for="fullscreenNavToggle" class="alm-hamburger-trigger">
    <span></span>
    <span></span>
    <span></span>
  </label>

  <div class="alm-fullscreen-overlay">
    <nav class="alm-overlay-nav">
      <a href="#" class="alm-overlay-link">Overview Core</a>
      <a href="#" class="alm-overlay-link">Matrix Clusters</a>
      <a href="#" class="alm-overlay-link">Security Sockets</a>
      <a href="#" class="alm-overlay-link">System Ledger</a>
    </nav>
  </div>

</body>
</html>
