<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Messaging Interface</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="chat">
      <div class="chat-header">
        <div class="chat-user">
          <div class="chat-avatar">S</div>
          <div><strong>Sarah</strong><span class="chat-status">Online</span></div>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="msg received">Hey! How's it going?<span class="msg-time">10:02 AM</span></div>
        <div class="msg sent">Hi! I'm doing great, thanks!<span class="msg-time">10:03 AM</span></div>
        <div class="msg received">Want to grab coffee later?<span class="msg-time">10:04 AM</span></div>
      </div>
      <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="Type a message..." maxlength="200">
        <button class="chat-send" id="sendBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
  <script>
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(text, type) {
      const now = new Date();
      const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const el = document.createElement('div');
      el.className = 'msg ' + type;
      el.innerHTML = text + '<span class="msg-time">' + time + '</span>';
      chatMessages.appendChild(el);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;
      addMessage(text, 'sent');
      chatInput.value = '';
      setTimeout(() => {
        const replies = ['That sounds great!', 'Tell me more!', 'Awesome!', 'Sure thing!', 'I agree!', 'Interesting...'];
        addMessage(replies[Math.floor(Math.random() * replies.length)], 'received');
      }, 800 + Math.random() * 1200);
    }

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
    chatMessages.scrollTop = chatMessages.scrollHeight;
  </script>
</body>
</html>
