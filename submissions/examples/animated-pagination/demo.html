<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Pagination Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <header class="hero">
    <h1>Animated Pagination Component</h1>
    <p>
      Smooth page navigation with animated transitions and active indicators.
    </p>
  </header>

  <!-- Standard Pagination -->

  <section class="card">

    <h2>Standard Pagination</h2>

    <nav class="ease-pagination">

      <button class="nav-btn">
        ←
      </button>

      <button class="page-btn active">
        1
      </button>

      <button class="page-btn">
        2
      </button>

      <button class="page-btn">
        3
      </button>

      <button class="page-btn">
        4
      </button>

      <button class="page-btn">
        5
      </button>

      <button class="nav-btn">
        →
      </button>

    </nav>

  </section>

  <!-- Gradient Pagination -->

  <section class="card">

    <h2>Gradient Style</h2>

    <nav class="ease-pagination gradient">

      <button class="nav-btn">
        ←
      </button>

      <button class="page-btn">
        8
      </button>

      <button class="page-btn active">
        9
      </button>

      <button class="page-btn">
        10
      </button>

      <button class="page-btn">
        11
      </button>

      <button class="nav-btn">
        →
      </button>

    </nav>

  </section>

  <!-- Compact Pagination -->

  <section class="card">

    <h2>Compact Pagination</h2>

    <nav class="ease-pagination compact">

      <button class="nav-btn">
        ←
      </button>

      <span class="compact-text">
        Page 4 of 25
      </span>

      <button class="nav-btn">
        →
      </button>

    </nav>

  </section>

  <!-- Dashboard Example -->

  <section class="dashboard-card">

    <div>
      Showing 21 - 30 of 250 entries
    </div>

    <nav class="ease-pagination">

      <button class="nav-btn">
        ←
      </button>

      <button class="page-btn">
        1
      </button>

      <button class="page-btn">
        2
      </button>

      <button class="page-btn active">
        3
      </button>

      <button class="page-btn">
        4
      </button>

      <button class="page-btn">
        5
      </button>

      <button class="nav-btn">
        →
      </button>

    </nav>

  </section>

</div>

</body>
</html>
