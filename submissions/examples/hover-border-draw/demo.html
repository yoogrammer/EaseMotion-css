<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Border Draw on Hover — EaseMotion CSS Submission</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 2rem;
    }

    .label {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 0.5rem;
    }

    .demo-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .box {
      padding: 1.5rem 2.5rem;
      font-size: 1.1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Example 1: Default -->
  <div class="demo-block">
    <p class="label">Default (hover me)</p>
    <div class="ease-hover-border-draw box">Hover me</div>
  </div>

  <!-- Example 2: Custom color -->
  <div class="demo-block">
    <p class="label">Custom border color</p>
    <div class="ease-hover-border-draw box"
         style="--ease-border-color: #f97316;">
      Orange border
    </div>
  </div>

  <!-- Example 3: Custom speed -->
  <div class="demo-block">
    <p class="label">Slower speed</p>
    <div class="ease-hover-border-draw box"
         style="--ease-border-color: #10b981; --ease-border-speed: 0.6s;">
      Slow green border
    </div>
  </div>

</body>
</html>
