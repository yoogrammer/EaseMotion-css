<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EaseMotion - Toast Notifications Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ease-page">
    <h1>🍞 Toast Notifications</h1>
    <p>Click the buttons to trigger different toast notifications.</p>

    <div class="ease-section">
      <h2>By Type</h2>
      <div class="ease-btn-group">
        <button class="ease-btn ease-btn-success" onclick="showToast('success', 'Action completed successfully!')">✅ Success</button>
        <button class="ease-btn ease-btn-error" onclick="showToast('error', 'Something went wrong!')">❌ Error</button>
        <button class="ease-btn ease-btn-warning" onclick="showToast('warning', 'Please double-check your input.')">⚠️ Warning</button>
        <button class="ease-btn ease-btn-info" onclick="showToast('info', 'New update available!')">ℹ️ Info</button>
      </div>
    </div>

    <div class="ease-section">
      <h2>By Position</h2>
      <div class="ease-btn-group">
        <button class="ease-btn" onclick="showToast('info', 'Top Left toast!', 'top-left')">↖️ Top Left</button>
        <button class="ease-btn" onclick="showToast('info', 'Top Right toast!', 'top-right')">↗️ Top Right</button>
        <button class="ease-btn" onclick="showToast('info', 'Bottom Left toast!', 'bottom-left')">↙️ Bottom Left</button>
        <button class="ease-btn" onclick="showToast('info', 'Bottom Right toast!', 'bottom-right')">↘️ Bottom Right</button>
      </div>
    </div>

    <div class="ease-section">
      <h2>By Animation</h2>
      <div class="ease-btn-group">
        <button class="ease-btn" onclick="showToast('success', 'Slide animation!', 'top-right', 'slide')">➡️ Slide</button>
        <button class="ease-btn" onclick="showToast('success', 'Fade animation!', 'top-right', 'fade')">✨ Fade</button>
        <button class="ease-btn" onclick="showToast('success', 'Bounce animation!', 'top-right', 'bounce')">🎯 Bounce</button>
        <button class="ease-btn" onclick="showToast('success', 'Pop animation!', 'top-right', 'pop')">💥 Pop</button>
      </div>
    </div>
  </div>

  <!-- Toast Containers (one per position) -->
  <div class="ease-toast-container ease-pos-top-left" id="container-top-left"></div>
  <div class="ease-toast-container ease-pos-top-right" id="container-top-right"></div>
  <div class="ease-toast-container ease-pos-bottom-left" id="container-bottom-left"></div>
  <div class="ease-toast-container ease-pos-bottom-right" id="container-bottom-right"></div>

  <script>
    function showToast(type = 'info', message = 'Hello!', position = 'top-right', animation = 'slide') {
      const container = document.getElementById(`container-${position}`);
      const toast = document.createElement('div');
      toast.className = `ease-toast ease-toast-${type} ease-anim-${animation}`;
      
      const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
      toast.innerHTML = `
        <span class="ease-toast-icon">${icons[type]}</span>
        <span class="ease-toast-msg">${message}</span>
        <button class="ease-toast-close" onclick="this.parentElement.remove()">×</button>
      `;
      
      container.appendChild(toast);
      
      // Auto-dismiss after 4 seconds
      setTimeout(() => {
        toast.classList.add('ease-toast-out');
        setTimeout(() => toast.remove(), 400);
      }, 4000);
    }
  </script>
</body>
</html>
