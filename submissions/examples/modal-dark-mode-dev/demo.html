<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Dark Mode Fix Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ease-modal" style="max-width: 500px; margin: 50px auto; border: 1px solid #334155; padding: 20px;">
        <div class="ease-modal-header">
            <h3>Modal Header</h3>
            <button class="ease-modal-close">&times;</button>
        </div>
        <div class="ease-modal-body">
            <p>This is a preview of the modal component displaying the dark mode theme fix.</p>
        </div>
        <div class="ease-modal-footer">
            <button>Close</button>
        </div>
    </div>
</body>
</html>
