<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Badge Pill and Square - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Badge — Pill and Square</h1>
    <p class="description">
      Self-contained demo of the proposed
      <code>.ease-badge-pill</code> and
      <code>.ease-badge-square</code> shape variants.
    </p>

    <section class="demo-section">
      <h2>Default</h2>
      <span class="ease-badge">12</span>
      <code>.ease-badge</code>
    </section>

    <section class="demo-section">
      <h2>Pill</h2>
      <span class="ease-badge ease-badge-pill">NEW</span>
      <code>.ease-badge.ease-badge-pill</code>
    </section>

    <section class="demo-section">
      <h2>Square</h2>
      <span class="ease-badge ease-badge-square">ON</span>
      <code>.ease-badge.ease-badge-square</code>
    </section>

  </div>

</body>
</html>
