<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-hover-bounce-text — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 2.5rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; }
    .label { font-size: 0.75rem; color: #555; text-align: center; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .row { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; align-items: center; }
    .nav { display: flex; gap: 1.5rem; }
    .nav a {
      color: #aaa; text-decoration: none; font-size: 1.1rem;
      padding: 0.5rem 0.75rem; border-radius: 6px;
      transition: color 0.2s;
    }
    .nav a:hover { color: #fff; }
    .card {
      padding: 1.5rem 2rem; border-radius: 10px;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      text-align: center; min-width: 150px;
    }
    .card p { margin: 0.5rem 0 0; color: #888; font-size: 0.8rem; }
    .cta {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: var(--ease-color-primary, #6366f1);
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
    }
    .hint { color: #555; font-size: 0.8rem; }
    .big-text { font-size: 2rem; font-weight: 700; }
  </style>
</head>
<body>
  <h1>ease-hover-bounce-text</h1>
  <p class="hint">Hover over any text element below</p>
  <div class="section">
    <div class="label">Navigation links</div>
    <nav class="nav">
      <a href="#" class="ease-hover-bounce-text">Home</a>
      <a href="#" class="ease-hover-bounce-text">Features</a>
      <a href="#" class="ease-hover-bounce-text">Pricing</a>
      <a href="#" class="ease-hover-bounce-text">Contact</a>
    </nav>
  </div>
  <div class="section">
    <div class="label">Speed variants</div>
    <div class="row">
      <div class="card">
        <span class="ease-hover-bounce-text ease-bounce-fast" style="font-size:1.5rem;font-weight:700;color:#fff;">Fast</span>
        <p>0.25s</p>
      </div>
      <div class="card">
        <span class="ease-hover-bounce-text" style="font-size:1.5rem;font-weight:700;color:#fff;">Normal</span>
        <p>0.5s</p>
      </div>
      <div class="card">
        <span class="ease-hover-bounce-text ease-bounce-slow" style="font-size:1.5rem;font-weight:700;color:#fff;">Slow</span>
        <p>0.8s</p>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="label">Intensity variants</div>
    <div class="row">
      <div class="card">
        <span class="ease-hover-bounce-text" style="font-size:1.5rem;font-weight:700;color:#fff;">Default</span>
        <p>6px bounce</p>
      </div>
      <div class="card">
        <span class="ease-hover-bounce-text ease-bounce-lg" style="font-size:1.5rem;font-weight:700;color:#fff;">Big bounce</span>
        <p>12px bounce</p>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="label">Call to action</div>
    <a href="#" class="ease-btn ease-btn-primary ease-hover-bounce-text">Get Started</a>
  </div>
</body>
</html>
