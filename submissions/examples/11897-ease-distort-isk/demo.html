<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-distort-isk</title>
  <meta name="description" content="A demonstration of the ease-distort-isk animation showing elements warping/distorting in wave-like oscillations (infinite or once).">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-distort-isk</h1>
      <p class="subtitle" id="main-desc">A wave-like warp distortion combining skew and scale oscillations</p>
    </header>

    <div class="display-area">
      <!-- Infinite distort target -->
      <div class="demo-box ease-distort-isk" id="infinite-target">
        Infinite
      </div>

      <!-- Single distort target -->
      <div class="demo-box secondary" id="once-target">
        Click Trigger
      </div>

      <button class="btn-trigger" onclick="triggerDistortOnce()">Trigger Once</button>
    </div>
  </main>

  <script>
    function triggerDistortOnce() {
      const target = document.getElementById('once-target');
      target.classList.remove('ease-distort-once-isk');
      void target.offsetWidth; // Force reflow
      target.classList.add('ease-distort-once-isk');
    }
  </script>

</body>
</html>
