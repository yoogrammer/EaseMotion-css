<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word Break Utilities</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body { font-family: system-ui, sans-serif; max-width: 500px; margin: 2rem auto; padding: 1rem; background: #f8fafc; color: #1e293b; }
      h1 { font-size: 1.5rem; }
      p.intro { color: #64748b; margin-bottom: 1.5rem; }
      .demo-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; width: 200px; }
      .demo-card code { font-size: 0.75rem; color: #6c63ff; font-family: monospace; display: block; margin-bottom: 0.25rem; }
      .demo-card p { margin: 0; border: 1px dashed #cbd5e1; padding: 0.5rem; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>Word Break Utilities</h1>
    <p class="intro">How text wraps in a 200px container.</p>
    <div class="demo-card"><code>.break-normal</code><p class="break-normal">Normal text wraps naturally at word boundaries.</p></div>
    <div class="demo-card"><code>.break-all</code><p class="break-all">Supercalifragilisticexpialidocious breaks at any character.</p></div>
    <div class="demo-card"><code>.break-word</code><p class="break-word">Supercalifragilisticexpialidocious wraps at word boundaries.</p></div>
  </body>
</html>
