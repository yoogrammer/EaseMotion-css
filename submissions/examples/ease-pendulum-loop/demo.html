<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hypnotic Pendulum Loop - Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="stage-header">
    <h1>Hypnotic Pendulum Swing Loop</h1>
    <p>Continuous loop animations featuring precise top-anchor gravity dampening models.</p>
  </div>

  <main class="showcase-grid">
    
    <div class="showcase-column">
      <div class="ease-pendulum">⏰</div>
      <span>Default</span>
    </div>

    <div class="showcase-column">
      <div class="ease-pendulum pendulum-slow">🔔</div>
      <span>Slow</span>
    </div>

    <div class="showcase-column">
      <div class="ease-pendulum pendulum-wide">🧸</div>
      <span>Wide</span>
    </div>

    <div class="showcase-column">
      <div class="ease-pendulum pendulum-fast pendulum-narrow">🔮</div>
      <span>Fast/Narrow</span>
    </div>

  </main>

</body>
</html>
