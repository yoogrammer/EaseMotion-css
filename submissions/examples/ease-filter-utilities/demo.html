<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ease Filter Utilities</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <div class="card">
      <h3>Blur Small</h3>
      <img
        src="https://images.unsplash.com/photo-1506744038136-46273834b3fb"
        class="ease-blur-sm"
        alt="Blur Small"
      />
    </div>

    <div class="card">
      <h3>Blur</h3>
      <img
        src="https://images.unsplash.com/photo-1506744038136-46273834b3fb"
        class="ease-blur"
        alt="Blur"
      />
    </div>

    <div class="card">
      <h3>Blur Large</h3>
      <img
        src="https://images.unsplash.com/photo-1506744038136-46273834b3fb"
        class="ease-blur-lg"
        alt="Blur Large"
      />
    </div>

    <div class="card">
      <h3>Brightness 50</h3>
      <img
        src="https://images.unsplash.com/photo-1506744038136-46273834b3fb"
        class="ease-brightness-50"
        alt="Brightness 50"
      />
    </div>

    <div class="card">
      <h3>Brightness 150</h3>
      <img
        src="https://images.unsplash.com/photo-1506744038136-46273834b3fb"
        class="ease-brightness-150"
        alt="Brightness 150"
      />
    </div>

    <div class="card">
      <h3>Grayscale</h3>
      <img
        src="https://images.unsplash.com/photo-1506744038136-46273834b3fb"
        class="ease-grayscale"
        alt="Grayscale"
      />
    </div>

    <div class="card">
      <h3>Sepia</h3>
      <img
        src="https://images.unsplash.com/photo-1506744038136-46273834b3fb"
        class="ease-sepia"
        alt="Sepia"
      />
    </div>

  </div>

</body>
</html>
