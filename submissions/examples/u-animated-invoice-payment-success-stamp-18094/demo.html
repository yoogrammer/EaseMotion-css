<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Invoice Payment Success Stamp</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Animated Invoice Payment Success Stamp</h1>

  <p class="intro">
    A reusable payment confirmation animation for invoicing platforms,
    billing systems, and finance dashboards.
  </p>

  <div class="demo-grid">

    <div class="card">
      <div class="invoice-paid">
        <span class="invoice">📄</span>
        <span class="paid-stamp">PAID</span>
      </div>
      <h3>Invoice Settled</h3>
    </div>

    <div class="card">
      <div class="invoice-paid">
        <span class="invoice large">📄</span>
        <span class="paid-stamp">PAID</span>
      </div>
      <p>Payment Successful</p>
    </div>

    <div class="card">
      <div class="invoice-paid">
        <span class="invoice">📄</span>
        <span class="paid-stamp">PAID</span>
      </div>
      <button>View Invoice</button>
    </div>

  </div>

</div>

</body>
</html>
