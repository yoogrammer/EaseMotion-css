<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fade Button Hover Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding: 40px; font-family: sans-serif;">
    <h2>Fade Button Hover</h2>
    <p>Hover over the buttons below:</p>
    <button class="fade-button-hover"
      style="padding: 12px 24px; background: #6c63ff;
      color: white; border: none; border-radius: 6px;
      cursor: pointer; font-size: 16px; margin-right: 8px;">
      Primary Button
    </button>
    <button class="fade-button-hover"
      style="padding: 12px 24px; background: #333;
      color: white; border: none; border-radius: 6px;
      cursor: pointer; font-size: 16px; margin: 8px;">
      Dark Button
    </button>
</body>
</html>
