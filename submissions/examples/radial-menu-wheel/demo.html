<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Circular Radial Menu Wheel</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 440px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Trigonometric Rotation Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Click the outer orbit menu circles. General sibling combinators shift scoped angle parameters to spin the backplane chart at 60fps with 0 scripts.</p>
  </header>

  <div class="alm-radial-stage-container">
    
    <input type="radio" id="radial-opt-1" name="radialSystem" class="alm-radial-input" checked>
    <input type="radio" id="radial-opt-2" name="radialSystem" class="alm-radial-input">
    <input type="radio" id="radial-opt-3" name="radialSystem" class="alm-radial-input">
    <input type="radio" id="radial-opt-4" name="radialSystem" class="alm-radial-input">
    
    <div class="alm-radial-hud-center">
      <span class="alm-hud-value" style="color: #6c63ff;">SYS_MODE</span>
      <span style="font-size: 0.65rem; color: #94a3b8; font-family: monospace; margin-top: 2px;">ACTIVE_OK</span>
    </div>

    <div class="alm-radial-rotator-wheel">
      
      <label for="radial-opt-1" class="alm-radial-sector-trigger alm-sector-node-1" title="Activate Channel A">A</label>
      <label for="radial-opt-2" class="alm-radial-sector-trigger alm-sector-node-2" title="Activate Channel B">B</label>
      <label for="radial-opt-3" class="alm-radial-sector-trigger alm-sector-node-3" title="Activate Channel C">C</label>
      <label for="radial-opt-4" class="alm-radial-sector-trigger alm-sector-node-4" title="Activate Channel D">D</label>
      
    </div>

  </div>

</body>
</html>
