<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 3D Transform Carousel | EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="carousel-container">
    <h1 style="font-size: var(--ease-text-3xl); margin-bottom: 3rem;">3D Carousel</h1>
    
    <div class="scene">
      <div class="carousel" id="carousel">
        <!-- 6 Items for a hexagonal prism -->
        <div class="carousel-item">1</div>
        <div class="carousel-item">2</div>
        <div class="carousel-item">3</div>
        <div class="carousel-item">4</div>
        <div class="carousel-item">5</div>
        <div class="carousel-item">6</div>
      </div>
    </div>

    <div class="controls">
      <button class="ease-btn ease-btn-outline" id="prevBtn" style="color: white; border-color: rgba(255,255,255,0.2);">Previous</button>
      <button class="ease-btn ease-btn-primary" id="nextBtn">Next</button>
    </div>
  </div>

  <script>
    const carousel = document.getElementById('carousel');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    
    let currentAngle = 0;
    const angleStep = 60; // 360 degrees / 6 items

    function rotateCarousel() {
      carousel.style.transform = `rotateY(${currentAngle}deg)`;
    }

    prevBtn.addEventListener('click', () => {
      currentAngle += angleStep;
      rotateCarousel();
    });

    nextBtn.addEventListener('click', () => {
      currentAngle -= angleStep;
      rotateCarousel();
    });
  </script>
</body>
</html>
