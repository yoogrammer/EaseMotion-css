<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ease-rating Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="demo-section">
        <h2>Star Rating</h2>

        <div class="ease-rating">
            <input type="radio" id="star5" name="rating">
            <label for="star5">★</label>

            <input type="radio" id="star4" name="rating">
            <label for="star4">★</label>

            <input type="radio" id="star3" name="rating">
            <label for="star3">★</label>

            <input type="radio" id="star2" name="rating">
            <label for="star2">★</label>

            <input type="radio" id="star1" name="rating">
            <label for="star1">★</label>
        </div>

        <h2>Half-Star Variant</h2>

        <div class="ease-rating half-star">
            <input type="radio" id="star10" name="rating-half">
            <label for="star10">★</label>

            <input type="radio" id="star9" name="rating-half">
            <label for="star9">★</label>

            <input type="radio" id="star8" name="rating-half">
            <label for="star8">★</label>

            <input type="radio" id="star7" name="rating-half">
            <label for="star7">★</label>

            <input type="radio" id="star6" name="rating-half">
            <label for="star6">★</label>
        </div>
    </div>

</body>
</html>
