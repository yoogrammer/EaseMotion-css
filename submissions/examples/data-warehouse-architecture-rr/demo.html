<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Warehouse Architecture</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Data Warehouse Architecture</h1>
    <p class="subtitle">
        Visualizing data movement from sources to business insights.
    </p>

    <div class="architecture">

        <div class="sources">

            <div class="node source">
                CRM System
            </div>

            <div class="node source">
                Website
            </div>

            <div class="node source">
                Mobile App
            </div>

        </div>

        <div class="connector"></div>

        <div class="node etl">
            ETL Pipeline
        </div>

        <div class="connector"></div>

        <div class="node warehouse">
            Data Warehouse
        </div>

        <div class="connector"></div>

        <div class="outputs">

            <div class="node dashboard">
                BI Dashboard
            </div>

            <div class="node analytics">
                Analytics
            </div>

            <div class="node reporting">
                Reporting
            </div>

        </div>

    </div>

</div>

</body>
</html>
