<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimonial Grid</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="testimonials">
  <h1>What Our Customers Say</h1>

  <div class="testimonial-grid">

<div class="testimonial-card">
  <div class="avatar">A</div>
  <h3>Alice Johnson</h3>
  <div class="rating">★★★★★</div>
  <p>
    This product has completely transformed the way our team works.
    Highly recommended.
  </p>
</div>

<div class="testimonial-card">
  <div class="avatar">B</div>
  <h3>Brian Smith</h3>
  <div class="rating">★★★★★</div>
  <p>
    Clean design, excellent usability, and great support.
  </p>
</div>

<div class="testimonial-card">
  <div class="avatar">C</div>
  <h3>Clara Wilson</h3>
  <div class="rating">★★★★★</div>
  <p>
    One of the best solutions we have implemented this year.
  </p>
</div>


  </div>
</section>

</body>
</html>
