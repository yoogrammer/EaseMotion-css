<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Stack Swipe – EaseMotion CSS</title>
  <meta name="description" content="Tinder-style swipeable card stack with CSS transform transitions." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Card Stack Swipe</h1>
  <p>Drag cards or use the buttons below</p>

  <div class="stack-container" id="stack">
    <article class="swipe-card" data-index="0" style="--i:0">
      <div class="card-photo" style="background: linear-gradient(135deg,#6366f1,#8b5cf6)"></div>
      <h3>Alex, 28</h3>
      <p>Designer · Loves CSS animations</p>
    </article>
    <article class="swipe-card" data-index="1" style="--i:1">
      <div class="card-photo" style="background: linear-gradient(135deg,#ec4899,#f43f5e)"></div>
      <h3>Jordan, 25</h3>
      <p>Developer · Open source enthusiast</p>
    </article>
    <article class="swipe-card" data-index="2" style="--i:2">
      <div class="card-photo" style="background: linear-gradient(135deg,#06b6d4,#3b82f6)"></div>
      <h3>Sam, 30</h3>
      <p>UX Researcher · Motion design fan</p>
    </article>
  </div>

  <div class="actions">
    <button class="action-btn action-btn--nope" id="nopeBtn" aria-label="Pass">✕</button>
    <button class="action-btn action-btn--like" id="likeBtn" aria-label="Like">♥</button>
  </div>

  <script>
    const stack = document.getElementById('stack');
    let cards = [...stack.querySelectorAll('.swipe-card')];

    function swipe(direction) {
      if (!cards.length) return;
      const top = cards[cards.length - 1];
      top.classList.add(direction === 'right' ? 'swipe-right' : 'swipe-left');
      top.addEventListener('transitionend', () => {
        top.remove();
        cards.pop();
        cards.forEach((c, i) => c.style.setProperty('--i', i));
      }, { once: true });
    }

    document.getElementById('likeBtn').addEventListener('click', () => swipe('right'));
    document.getElementById('nopeBtn').addEventListener('click', () => swipe('left'));

    let startX = 0;
    stack.addEventListener('pointerdown', e => { startX = e.clientX; });
    stack.addEventListener('pointerup', e => {
      const diff = e.clientX - startX;
      if (Math.abs(diff) > 80) swipe(diff > 0 ? 'right' : 'left');
    });
  </script>
</body>
</html>
