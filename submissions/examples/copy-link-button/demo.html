<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copy Link Button Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h2 id="philosophy">
      Design Philosophy
      <button class="copy-link-btn" data-section="philosophy" title="Copy link">
        🔗
      </button>
    </h2>

    <p>
      Click the link icon to copy a direct URL to this section.
    </p>
  </div>

  <script>
    document.querySelector(".copy-link-btn").addEventListener("click", async () => {
      const sectionId = document.querySelector(".copy-link-btn").dataset.section;

      const url =
        window.location.href.split("#")[0] + "#" + sectionId;

      try {
        await navigator.clipboard.writeText(url);

        const btn = document.querySelector(".copy-link-btn");
        const original = btn.textContent;

        btn.textContent = "✓";

        setTimeout(() => {
          btn.textContent = original;
        }, 1500);
      } catch (err) {
        console.error("Failed to copy:", err);
      }
    });
  </script>

</body>
</html>
