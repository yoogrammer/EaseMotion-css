<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphic Credit Card Demo</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="card-wrapper">
    <div class="card-container">
      <input type="checkbox" id="card-flip" class="flip-checkbox">
      <label for="card-flip" class="credit-card">
        <div class="card-face card-front">
          <div class="card-header">
            <span class="chip-icon"></span>
            <span class="card-type">PREMIUM</span>
          </div>
          <div class="card-number">•••• •••• •••• 8846</div>
          <div class="card-footer">
            <div class="card-holder">
              <span class="label">CARD HOLDER</span>
              <span class="name">DEBASMITA BOSE</span>
            </div>
            <div class="card-expires">
              <span class="label">EXPIRES</span>
              <span class="date">08/30</span>
            </div>
            <div class="logo-circles">
              <span class="circle red"></span>
              <span class="circle orange"></span>
            </div>
          </div>
        </div>
        <div class="card-face card-back">
          <div class="magnetic-strip"></div>
          <div class="signature-bar">
            <span class="cvv">123</span>
          </div>
          <p class="card-disclaimer">This card is a self-contained CSS showcase for EaseMotion CSS. Do not use for actual transactions.</p>
        </div>
      </label>
    </div>
    <div class="instructions">
      <p>Hover to see 3D tilt effect, or click the card to flip it!</p>
    </div>
  </div>
</body>
</html>
