<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animated Stepper Progress — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>Animated Stepper Progress</h1>
    <p>Multi-step workflow visualization — pure HTML and CSS</p>
  </header>

  <main class="demo-wrapper">

    <!-- Horizontal Stepper -->
    <section class="stepper-section">
      <h2 class="section-title">Onboarding Flow</h2>
      <div class="stepper">

        <div class="step completed">
          <div class="step-circle">&#10003;</div>
          <div class="step-info">
            <span class="step-label">Step 1</span>
            <span class="step-title">Account</span>
          </div>
        </div>

        <div class="step-connector completed-line"></div>

        <div class="step completed">
          <div class="step-circle">&#10003;</div>
          <div class="step-info">
            <span class="step-label">Step 2</span>
            <span class="step-title">Profile</span>
          </div>
        </div>

        <div class="step-connector completed-line"></div>

        <div class="step active">
          <div class="step-circle">3</div>
          <div class="step-info">
            <span class="step-label">Step 3</span>
            <span class="step-title">Preferences</span>
          </div>
        </div>

        <div class="step-connector"></div>

        <div class="step">
          <div class="step-circle">4</div>
          <div class="step-info">
            <span class="step-label">Step 4</span>
            <span class="step-title">Launch</span>
          </div>
        </div>

      </div>
    </section>

    <!-- Checkout Stepper -->
    <section class="stepper-section">
      <h2 class="section-title">Checkout Flow</h2>
      <div class="stepper">

        <div class="step completed">
          <div class="step-circle">&#10003;</div>
          <div class="step-info">
            <span class="step-label">Step 1</span>
            <span class="step-title">Cart</span>
          </div>
        </div>

        <div class="step-connector completed-line"></div>

        <div class="step active">
          <div class="step-circle">2</div>
          <div class="step-info">
            <span class="step-label">Step 2</span>
            <span class="step-title">Shipping</span>
          </div>
        </div>

        <div class="step-connector"></div>

        <div class="step">
          <div class="step-circle">3</div>
          <div class="step-info">
            <span class="step-label">Step 3</span>
            <span class="step-title">Payment</span>
          </div>
        </div>

        <div class="step-connector"></div>

        <div class="step">
          <div class="step-circle">4</div>
          <div class="step-info">
            <span class="step-label">Step 4</span>
            <span class="step-title">Confirm</span>
          </div>
        </div>

      </div>
    </section>

  </main>

</body>
</html>
