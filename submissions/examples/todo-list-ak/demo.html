<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Todo List</h1>
    <div class="add-todo">
      <input type="text" id="todoInput" placeholder="Add a new todo...">
      <button id="addBtn">Add</button>
    </div>
    <div class="filters">
      <button class="filter active" data-filter="all">All</button>
      <button class="filter" data-filter="active">Active</button>
      <button class="filter" data-filter="completed">Completed</button>
    </div>
    <div class="todos" id="todosList"></div>
    <p class="count" id="count">0 items left</p>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos')) || [];
    let filter = 'all';

    const todoInput = document.getElementById('todoInput');
    const addBtn = document.getElementById('addBtn');
    const todosList = document.getElementById('todosList');
    const countEl = document.getElementById('count');

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function render() {
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'completed') return t.done;
        return true;
      });

      todosList.innerHTML = filtered.map(t => `
        <div class="todo${t.done ? ' done' : ''}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo('${t.id}')">
          <span class="todo-text">${t.text}</span>
          <button class="delete" onclick="deleteTodo('${t.id}')">✕</button>
        </div>
      `).join('');

      const left = todos.filter(t => !t.done).length;
      countEl.textContent = `${left} item${left !== 1 ? 's' : ''} left`;

      document.querySelectorAll('.filter').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === filter);
      });
    }

    function addTodo() {
      const text = todoInput.value.trim();
      if (!text) return;
      todos.push({ id: Date.now().toString(), text, done: false });
      todoInput.value = '';
      save();
      render();
    }

    function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) { todo.done = !todo.done; save(); render(); }
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    addBtn.addEventListener('click', addTodo);
    todoInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addTodo(); });

    document.querySelectorAll('.filter').forEach(btn => {
      btn.addEventListener('click', () => {
        filter = btn.dataset.filter;
        render();
      });
    });

    render();
  </script>
</body>
</html>
