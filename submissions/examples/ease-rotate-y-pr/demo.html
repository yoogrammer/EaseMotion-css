<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ease Rotate-Y Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
    }

    .demo-card {
      width: 200px;
      height: 140px;
      border-radius: 12px;
      background: #6366f1;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      backface-visibility: hidden;
    }

    p {
      color: #888;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <div class="demo-card ease-rotate-y">Hover to Flip</div>
  <p>Rotates 180° around the Y-axis on hover</p>

</body>
</html>
