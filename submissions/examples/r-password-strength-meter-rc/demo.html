<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Meter</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Secure Password Setup</h1>
        <p>Create a strong password to protect your account.</p>

        <div class="password-box">
            <input
                type="password"
                placeholder="Enter password"
                value="MyStrongPassword123!"
                readonly
            >
        </div>

        <div class="strength-meter">
            <div class="strength-fill"></div>
        </div>

        <div class="strength-label">
            Strong Password
        </div>

        <ul class="requirements">
            <li class="passed">✓ At least 8 characters</li>
            <li class="passed">✓ Uppercase letter</li>
            <li class="passed">✓ Number included</li>
            <li class="passed">✓ Special character</li>
        </ul>

    </div>

</div>

</body>
</html>
