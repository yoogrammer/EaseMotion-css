<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon — EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css@1.4.5/dist/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:var(--ease-font-sans,system-ui,sans-serif);background:linear-gradient(135deg,var(--ease-color-neutral-50,#f9fafb) 0%,#eef2ff 100%);margin:0;">

  <div class="ease-coming-soon-az">
    <div class="ease-coming-soon-icon-az">&#x1f680;</div>

    <span class="ease-coming-soon-badge-az">&#x1f514; Launching soon</span>

    <h1 class="ease-coming-soon-title-az">Something amazing is on the way</h1>

    <p class="ease-coming-soon-desc-az">
      We're putting the finishing touches on our new platform. Be the first to know when we go live.
    </p>

    <div class="ease-coming-soon-countdown-az">
      <div class="ease-coming-soon-countdown-item-az">
        <span class="ease-coming-soon-countdown-value-az">14</span>
        <span class="ease-coming-soon-countdown-label-az">Days</span>
      </div>
      <span class="ease-coming-soon-countdown-sep-az">:</span>
      <div class="ease-coming-soon-countdown-item-az">
        <span class="ease-coming-soon-countdown-value-az">08</span>
        <span class="ease-coming-soon-countdown-label-az">Hours</span>
      </div>
      <span class="ease-coming-soon-countdown-sep-az">:</span>
      <div class="ease-coming-soon-countdown-item-az">
        <span class="ease-coming-soon-countdown-value-az">42</span>
        <span class="ease-coming-soon-countdown-label-az">Minutes</span>
      </div>
      <span class="ease-coming-soon-countdown-sep-az">:</span>
      <div class="ease-coming-soon-countdown-item-az">
        <span class="ease-coming-soon-countdown-value-az">19</span>
        <span class="ease-coming-soon-countdown-label-az">Seconds</span>
      </div>
    </div>

    <div class="ease-coming-soon-form-az">
      <input class="ease-coming-soon-input-az" type="email" placeholder="Enter your email" />
      <button class="ease-coming-soon-btn-az">Notify Me</button>
    </div>

    <div class="ease-coming-soon-social-az">
      <a class="ease-coming-soon-social-link-az" href="#" aria-label="Twitter">&#x1d54f;</a>
      <a class="ease-coming-soon-social-link-az" href="#" aria-label="GitHub">&#x1f4bb;</a>
      <a class="ease-coming-soon-social-link-az" href="#" aria-label="LinkedIn">&#x1f4e1;</a>
      <a class="ease-coming-soon-social-link-az" href="#" aria-label="Instagram">&#x1f4f8;</a>
    </div>
  </div>

</body>
</html>
