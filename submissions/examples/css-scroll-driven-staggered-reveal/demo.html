<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Scroll-Driven Staggered Reveal – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1 class="title">Staggered Scroll Reveal</h1>
  <p class="subtitle">Cards fade and slide up one by one as you scroll — pure CSS, no JS.</p>

  <div class="card-list">
    <div class="reveal-card" style="--i:1">Item 1</div>
    <div class="reveal-card" style="--i:2">Item 2</div>
    <div class="reveal-card" style="--i:3">Item 3</div>
    <div class="reveal-card" style="--i:4">Item 4</div>
    <div class="reveal-card" style="--i:5">Item 5</div>
    <div class="reveal-card" style="--i:6">Item 6</div>
    <div class="reveal-card" style="--i:7">Item 7</div>
    <div class="reveal-card" style="--i:8">Item 8</div>
  </div>
</div>

</body>
</html>
