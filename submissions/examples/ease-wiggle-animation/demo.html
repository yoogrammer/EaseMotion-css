<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiggle Animation Demo</title>
  <!-- Load EaseMotion CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css@latest/dist/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f8fafc;
      margin: 0;
    }
    .container {
      text-align: center;
      background: white;
      padding: 3rem 4rem;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
    .app-icon {
      width: 80px;
      height: 80px;
      margin: 2rem auto;
      background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
      color: white;
      font-size: 2.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 18px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      cursor: pointer;
      position: relative;
    }
    .delete-badge {
      position: absolute;
      top: -5px;
      left: -5px;
      width: 24px;
      height: 24px;
      background: #94a3b8;
      color: white;
      border-radius: 50%;
      font-size: 0.8rem;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .app-icon.ease-wiggle .delete-badge {
      opacity: 1;
    }
    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 6px;
      background: #475569;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #334155;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>EaseMotion Wiggle Animation</h2>
    
    <div id="target" class="app-icon">
      <div class="delete-badge">✕</div>
      📱
    </div>

    <div class="controls">
      <button onclick="toggleAnimation()">Toggle "Edit Mode" (Wiggle)</button>
    </div>
  </div>

  <script>
    function toggleAnimation() {
      const target = document.getElementById('target');
      target.classList.toggle('ease-wiggle');
    }
  </script>
</body>
</html>
