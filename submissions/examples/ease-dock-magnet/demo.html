<!DOCTYPE html>
<!-- submissions/examples/ease-dock-magnet/demo.html -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dock Magnet Proximity Preview - Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-h: 100vh;
      min-height: 100vh;
      background-color: #0b0f19;
      background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #070913 80%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    .preview-header {
      text-align: center;
      margin-bottom: 60px;
      color: #f8fafc;
    }
    .preview-header h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin: 0;
    }
    .preview-header p {
      color: #94a3b8;
      font-size: 0.95rem;
      margin-top: 8px;
    }
    .dock-container {
      position: relative;
      padding: 20px;
    }
    .icon-svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: #f8fafc;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 200ms ease;
    }
    .ease-magnet-item:hover .icon-svg {
      stroke: #6366f1;
    }
  </style>
</head>
<body>

  <div class="preview-header">
    <h1>Dock Magnet Effect</h1>
    <p>macOS proximity scale map built with pure structural CSS selectors.</p>
  </div>

  <div class="dock-container">
    <!-- Core Magnification Selection Matrix -->
    <ul class="ease-dock-magnet" role="menu" aria-label="Proximity Navigation Menu">

      <li class="ease-magnet-item" role="menuitem" tabindex="0">
        <span class="ease-dock-tooltip">Finder</span>
        <svg class="icon-svg" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </li>

      <li class="ease-magnet-item" role="menuitem" tabindex="0">
        <span class="ease-dock-tooltip">Launchpad</span>
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M4 4h4v4H4zm12 0h4v4h-4zM4 16h4v4H4zm12 0h4v4h-4zM10 4h4v4h-4zm0 12h4v4h-4zM4 10h4v4H4zm12 0h4v4h-4zm-6 0h4v4h-4z"/></svg>
      </li>

      <li class="ease-magnet-item" role="menuitem" tabindex="0">
        <span class="ease-dock-tooltip">Preferences</span>
        <svg class="icon-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </li>

      <li class="ease-magnet-item" role="menuitem" tabindex="0">
        <span class="ease-dock-tooltip">Terminal</span>
        <svg class="icon-svg" viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      </li>

      <li class="ease-magnet-item" role="menuitem" tabindex="0">
        <span class="ease-dock-tooltip">App Store</span>
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      </li>

    </ul>
  </div>

</body>
</html>
