<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day Night Theme Toggle – EaseMotion CSS</title>
  <meta name="description" content="Animated sun-to-moon theme toggle with sliding background transition." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Day / Night Theme Toggle</h1>
  <p>Click the toggle to switch themes</p>

  <label class="theme-toggle" aria-label="Toggle dark mode">
    <input type="checkbox" id="themeCheck" />
    <span class="toggle-track">
      <span class="toggle-thumb">
        <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </span>
    </span>
  </label>

  <div class="preview-card">
    <h2>Preview Card</h2>
    <p>The entire page transitions between light and dark themes.</p>
  </div>

  <script>
    const check = document.getElementById('themeCheck');
    check.addEventListener('change', () => {
      document.body.classList.toggle('dark', check.checked);
    });
  </script>
</body>
</html>
