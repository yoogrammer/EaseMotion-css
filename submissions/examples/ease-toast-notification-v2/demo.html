<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion Toast Notification v2</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f9fafb;
      color: #111827;
      margin: 0;
      padding: 2rem;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    .hero {
      text-align: center;
      margin-bottom: 3rem;
    }
    .hero h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    .hero p {
      color: #4b5563;
      font-size: 1.125rem;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 2rem;
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .control-group h3 {
      margin: 0;
      font-size: 1.125rem;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 0.5rem;
    }
    .btn {
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      background: #f3f4f6;
      color: #1f2937;
      transition: all 0.2s;
    }
    .btn:hover { background: #e5e7eb; }
    .btn.success { background: #ecfdf5; color: #047857; border: 1px solid #10b981; }
    .btn.error { background: #fef2f2; color: #b91c1c; border: 1px solid #ef4444; }
    .btn.warning { background: #fffbeb; color: #b45309; border: 1px solid #f59e0b; }
    .btn.info { background: #eff6ff; color: #1d4ed8; border: 1px solid #3b82f6; }
    .btn.loading { background: #eef2ff; color: #4338ca; border: 1px solid #6366f1; }
    .btn.action { background: #1f2937; color: white; }
    
    .select-input {
      padding: 0.75rem;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <!-- Toast Container instances (usually generated dynamically, but placed here for demo) -->
  <div id="toast-container" class="ease-toast-container top-right"></div>

  <div class="container">
    <div class="hero">
      <h1>EaseMotion Toast v2</h1>
      <p>A modern, stacked, and animated notification system.</p>
    </div>

    <div class="controls">
      <div class="control-group">
        <h3>1. Notification Types</h3>
        <button class="btn success" onclick="showToast('success')">Show Success</button>
        <button class="btn error" onclick="showToast('error')">Show Error</button>
        <button class="btn warning" onclick="showToast('warning')">Show Warning</button>
        <button class="btn info" onclick="showToast('info')">Show Info</button>
        <button class="btn loading" onclick="showToast('loading')">Show Loading</button>
        <button class="btn action" onclick="showToast('action')">Show Action Toast</button>
      </div>

      <div class="control-group">
        <h3>2. Positioning</h3>
        <select class="select-input" id="position-select" onchange="changePosition(this.value)">
          <option value="top-right">Top Right (Default)</option>
          <option value="top-left">Top Left</option>
          <option value="bottom-right">Bottom Right</option>
          <option value="bottom-left">Bottom Left</option>
          <option value="center">Center Stacked</option>
        </select>

        <h3>3. Styles</h3>
        <label style="display:flex; gap: 0.5rem; align-items:center; cursor:pointer;">
          <input type="checkbox" id="glass-toggle"> Enable Glassmorphism
        </label>
        <label style="display:flex; gap: 0.5rem; align-items:center; cursor:pointer;">
          <input type="checkbox" id="dark-toggle"> Dark Mode
        </label>
      </div>
    </div>
  </div>

  <script>
    const container = document.getElementById('toast-container');
    
    const icons = {
      success: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`,
      error: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`,
      warning: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`,
      info: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`,
      loading: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>`
    };

    function changePosition(pos) {
      container.className = `ease-toast-container ${pos}`;
    }

    function createToastElement(type) {
      const isGlass = document.getElementById('glass-toggle').checked;
      const isDark = document.getElementById('dark-toggle').checked;
      
      const toast = document.createElement('div');
      toast.className = `ease-toast ease-toast-${type === 'action' ? 'info' : type} ${isGlass ? 'glass' : ''} ${isDark ? 'dark' : ''}`;
      
      let title = type.charAt(0).toUpperCase() + type.slice(1);
      let desc = "This is a notification message.";
      let duration = 5000;
      let icon = icons[type] || icons.info;

      if(type === 'success') desc = "Your changes have been saved successfully.";
      if(type === 'error') desc = "There was a problem processing your request.";
      if(type === 'warning') desc = "Please review your information before continuing.";
      if(type === 'loading') { title = "Processing..."; desc = "Please wait while we process your data."; icon = icons.loading; }
      if(type === 'action') {
        title = "Update Available";
        desc = "A new version of EaseMotion is available.";
      }

      toast.innerHTML = \`
        <div class="ease-toast-content">
          <div class="ease-toast-icon">\${icon}</div>
          <div class="ease-toast-text">
            <span class="ease-toast-title">\${title}</span>
            <span class="ease-toast-desc">\${desc}</span>
            \${type === 'action' ? \`
              <div class="ease-toast-actions">
                <button class="ease-toast-btn primary" onclick="this.closest('.ease-toast').remove()">Update Now</button>
                <button class="ease-toast-btn" onclick="this.closest('.ease-toast').remove()">Later</button>
              </div>
            \` : ''}
          </div>
          <button class="ease-toast-close" onclick="removeToast(this.closest('.ease-toast'))">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        </div>
        \${type !== 'loading' && type !== 'action' ? \`<div class="ease-toast-progress-bar"><div class="ease-toast-progress" style="animation-duration: \${duration}ms;"></div></div>\` : ''}
      \`;

      if (type !== 'loading' && type !== 'action') {
        setTimeout(() => removeToast(toast), duration);
      }

      return toast;
    }

    function removeToast(toast) {
      if(!toast) return;
      toast.style.animation = 'toastSlideOut 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards';
      setTimeout(() => {
        if(toast.parentElement) toast.remove();
      }, 300);
    }

    function showToast(type) {
      const toast = createToastElement(type);
      container.prepend(toast);
    }
  </script>
</body>
</html>
