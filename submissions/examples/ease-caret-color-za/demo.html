<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-caret-color-za — caret-color utilities</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div data-ease-demo-za>
      <h1>ease-caret-color utilities</h1>
      <p>Customize the text cursor color in input fields.</p>

      <div class="card-za">
        <h2>ease-caret-primary-za</h2>
        <input
          class="demo-input-za ease-caret-primary-za"
          value="Primary color caret"
        />
      </div>

      <div class="card-za">
        <h2>ease-caret-success-za</h2>
        <input
          class="demo-input-za ease-caret-success-za"
          value="Success color caret"
        />
      </div>

      <div class="card-za">
        <h2>ease-caret-danger-za</h2>
        <input
          class="demo-input-za ease-caret-danger-za"
          value="Danger color caret"
        />
      </div>

      <div class="card-za">
        <h2>ease-caret-auto-za (default)</h2>
        <input
          class="demo-input-za ease-caret-auto-za"
          value="Default browser caret"
        />
      </div>

      <div class="card-za">
        <h2>Textarea with ease-caret-primary-za</h2>
        <textarea class="demo-textarea-za ease-caret-primary-za">
Edit this text — the blinking cursor will be in the primary color.</textarea
        >
      </div>
    </div>
  </body>
</html>
