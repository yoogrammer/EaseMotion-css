<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Zoom Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Fractal Zoom Animation</h1>

    <div class="cards-container">

        <!-- Fractal Zoom -->
        <div class="animation-card">

            <button
                class="copy-btn"
                data-copy="ease-fractal-zoom">
                Copy
            </button>

            <div
                class="preview-box"
                id="fractalPreview"
                onclick="playAnimation('fractalPreview','fractal')">

                Preview
            </div>

            <h3>ease-fractal-zoom</h3>

        </div>

        <!-- Fractal Zoom Soft -->
        <div class="animation-card">

            <button
                class="copy-btn"
                data-copy="ease-fractal-zoom-soft">
                Copy
            </button>

            <div
                class="preview-box"
                id="fractalSoftPreview"
                onclick="playAnimation('fractalSoftPreview','fractal-soft')">

                Preview
            </div>

            <h3>ease-fractal-zoom-soft</h3>

        </div>

        <!-- Fractal Zoom Fast -->
        <div class="animation-card">

            <button
                class="copy-btn"
                data-copy="ease-fractal-zoom-fast">
                Copy
            </button>

            <div
                class="preview-box"
                id="fractalFastPreview"
                onclick="playAnimation('fractalFastPreview','fractal-fast')">

                Preview
            </div>

            <h3>ease-fractal-zoom-fast</h3>

        </div>

    </div>

    <script>

        function playAnimation(id, cls){

            const el =
                document.getElementById(id);

            el.classList.remove(cls);

            void el.offsetWidth;

            el.classList.add(cls);
        }

        document
            .querySelectorAll(".copy-btn")
            .forEach(btn => {

                btn.addEventListener("click", () => {

                    navigator.clipboard.writeText(
                        btn.dataset.copy
                    );

                    const original =
                        btn.textContent;

                    btn.textContent =
                        "Copied!";

                    btn.disabled = true;

                    setTimeout(() => {

                        btn.textContent =
                            original;

                        btn.disabled = false;

                    },1500);

                });

            });

    </script>

</body>
</html>
