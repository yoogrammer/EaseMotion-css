<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Cursor Effects - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Custom Cursor Effects</h1>
    <div class="cursor-demo-area">
      <div class="cursor-target" data-effect="glow">Glow</div>
      <div class="cursor-target" data-effect="trail">Trail</div>
      <div class="cursor-target" data-effect="expand">Expand</div>
    </div>
    <div class="cursor-follower"></div>
    <p class="description">Move your mouse over the boxes to see custom cursor follower effects.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
