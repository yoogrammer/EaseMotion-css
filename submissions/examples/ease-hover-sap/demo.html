<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-hover-sap Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 4rem 2rem;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }
    
    .demo-section {
      text-align: center;
      max-width: 600px;
    }
    
    .demo-section h2 {
      margin-bottom: 1.5rem;
      color: #1e293b;
    }
    
    .demo-button {
      padding: 0.75rem 2rem;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
    }
    
    .demo-card {
      width: 280px;
      padding: 1.5rem;
      background: white;
      border-radius: 1rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    
    .demo-card h3 {
      margin-bottom: 0.5rem;
      color: #1e293b;
    }
    
    .demo-card p {
      color: #64748b;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>

  <div class="demo-section">
    <h2>Button with hover-sap</h2>
    <button class="demo-button hover-sap">
      Click Me
    </button>
  </div>

  <div class="demo-section">
    <h2>Card with hover-sap</h2>
    <div class="demo-card hover-sap">
      <h3>Profile Card</h3>
      <p>Hover over this card to see the subtle press effect.</p>
    </div>
  </div>

</body>
</html>
