<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workflow Builder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>AI Workflow Builder</h1>
        <p>Visualize intelligent workflows from prompt to final output.</p>
    </div>

    <div class="workflow">

        <div class="node">
            <div class="icon">📝</div>
            <h3>Prompt</h3>
            <p>User Input</p>
        </div>

        <div class="connector"></div>

        <div class="node">
            <div class="icon">🤖</div>
            <h3>AI Model</h3>
            <p>Process Request</p>
        </div>

        <div class="connector"></div>

        <div class="node">
            <div class="icon">📚</div>
            <h3>Knowledge Base</h3>
            <p>Retrieve Context</p>
        </div>

        <div class="connector"></div>

        <div class="node">
            <div class="icon">⚙️</div>
            <h3>Tools</h3>
            <p>Execute Actions</p>
        </div>

        <div class="connector"></div>

        <div class="node output">
            <div class="icon">✅</div>
            <h3>Output</h3>
            <p>Final Response</p>
        </div>

    </div>

</div>

</body>
</html>
