<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blend Mode Duotone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Duotone Blend Modes</h1>
    <p class="subtitle">Hover over each card to reveal the original beneath the blend overlay.</p>

    <div class="gallery">
      <div class="card">
        <div class="image-wrapper">
          <div class="base" style="background:#ff6b6b;"></div>
          <div class="overlay multiply">Multiply</div>
        </div>
        <p class="label">Sunset</p>
      </div>

      <div class="card">
        <div class="image-wrapper">
          <div class="base" style="background:#4ecdc4;"></div>
          <div class="overlay screen">Screen</div>
        </div>
        <p class="label">Ocean</p>
      </div>

      <div class="card">
        <div class="image-wrapper">
          <div class="base" style="background:#ffe66d;"></div>
          <div class="overlay overlay">Overlay</div>
        </div>
        <p class="label">Sunrise</p>
      </div>

      <div class="card">
        <div class="image-wrapper">
          <div class="base" style="background:#a855f7;"></div>
          <div class="overlay difference">Difference</div>
        </div>
        <p class="label">Dusk</p>
      </div>
    </div>
  </main>
</body>
</html>
