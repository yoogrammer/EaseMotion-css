<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursor Trail / Particle Follow Effect - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="demo-header">
    <h1>Cursor Trail Showcase</h1>
    <p>A stream of hardware-accelerated CSS particles spawning reactively at the cursor vector coordinates.</p>
  </header>

  <main class="playground-container">
    
    <!-- Active Mode Selector Buttons -->
    <div class="mode-selector">
      <button class="mode-btn active" data-type="default">Default Dots</button>
      <button class="mode-btn" data-type="stars">Sparkle Stars</button>
      <button class="mode-btn" data-type="bubbles">Floating Bubbles</button>
      <button class="mode-btn" data-type="fire">Fire Embers</button>
      <button class="mode-btn" data-type="snow">Falling Snow</button>
    </div>

    <!-- Active Trail Interaction Area -->
    <div class="trail-area">
      Move your cursor inside this zone to generate trails
    </div>

    <span class="card-desc">Move cursor quickly to see full spark expansion. Particles automatically clean themselves via animationend events.</span>

  </main>

  <!-- Trail Coordinate Tracker & Spawner Script -->
  <script>
    const trailArea = document.querySelector('.trail-area');
    const modeBtns = document.querySelectorAll('.mode-btn');
    
    let activeType = 'default'; // default, stars, bubbles, fire, snow
    let lastSpawn = 0;
    const throttleMs = 20; // 20ms throttling for high-density silky trails

    // Toggle active type states
    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        modeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeType = btn.getAttribute('data-type');
      });
    });

    // Particle Spawner
    trailArea.addEventListener('mousemove', e => {
      // Respect user reduced-motion setting
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        return;
      }

      const now = Date.now();
      if (now - lastSpawn < throttleMs) return;
      lastSpawn = now;

      // Create particle element
      const particle = document.createElement('div');
      particle.className = 'trail-particle';

      // Apply type variants
      if (activeType !== 'default') {
        particle.classList.add(`trail-${activeType}`);
      }

      // Position particle at fixed client mouse position
      particle.style.left = `${e.clientX}px`;
      particle.style.top = `${e.clientY}px`;

      // Inject to body
      document.body.appendChild(particle);

      // Remove after animation completes
      particle.addEventListener('animationend', () => {
        particle.remove();
      });
    });
  </script>

</body>
</html>
