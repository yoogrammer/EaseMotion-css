<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-accent-* Color Utilities Demo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Inter, sans-serif;
        max-width: 600px;
        margin: 0 auto;
        padding: 2rem;
        background: #f8fafc;
      }
      h2 {
        color: #6366f1;
      }
      .group {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      .group h3 {
        margin: 0 0 0.75rem;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #64748b;
      }
      .group label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.4rem;
        cursor: pointer;
      }
      input[type="range"] {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <h2>ease-accent-* Color Utilities</h2>

    <div class="group">
      <h3>Checkboxes</h3>
      <label
        ><input type="checkbox" class="ease-accent-primary" checked />
        Primary</label
      >
      <label
        ><input type="checkbox" class="ease-accent-success" checked />
        Success</label
      >
      <label
        ><input type="checkbox" class="ease-accent-danger" checked />
        Danger</label
      >
      <label
        ><input type="checkbox" class="ease-accent-warning" checked />
        Warning</label
      >
      <label
        ><input type="checkbox" class="ease-accent-info" checked /> Info</label
      >
    </div>

    <div class="group">
      <h3>Radio Buttons</h3>
      <label
        ><input type="radio" name="r" class="ease-accent-primary" checked />
        Primary</label
      >
      <label
        ><input type="radio" name="r" class="ease-accent-success" />
        Success</label
      >
      <label
        ><input type="radio" name="r" class="ease-accent-danger" />
        Danger</label
      >
      <label
        ><input type="radio" name="r" class="ease-accent-warning" />
        Warning</label
      >
      <label
        ><input type="radio" name="r" class="ease-accent-info" /> Info</label
      >
    </div>

    <div class="group">
      <h3>Range Sliders</h3>
      <label>Primary <input type="range" class="ease-accent-primary" /></label>
      <label>Warning <input type="range" class="ease-accent-warning" /></label>
    </div>
  </body>
</html>
