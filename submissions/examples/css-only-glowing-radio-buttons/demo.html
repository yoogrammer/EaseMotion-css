<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-Only Glowing Radio Buttons</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="radio-container">
        <h2>Select an Option</h2>
        <div class="radio-group">
            <label class="radio-wrapper">
                <input type="radio" name="neon-radio" checked>
                <span class="radio-custom"></span>
                <span class="radio-label">Option Alpha</span>
            </label>
            <label class="radio-wrapper">
                <input type="radio" name="neon-radio">
                <span class="radio-custom"></span>
                <span class="radio-label">Option Beta</span>
            </label>
            <label class="radio-wrapper">
                <input type="radio" name="neon-radio">
                <span class="radio-custom"></span>
                <span class="radio-label">Option Gamma</span>
            </label>
            <label class="radio-wrapper">
                <input type="radio" name="neon-radio">
                <span class="radio-custom"></span>
                <span class="radio-label">Option Delta</span>
            </label>
        </div>
    </div>
</body>
</html>
