<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Pill Navigation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <h1>Ease Pill Navigation</h1>
    <p class="subtitle">Pure CSS pill navigation using radio inputs and labels.</p>

    <section class="demo-section">
      <h2>Horizontal Variant</h2>

      <div class="pill-nav horizontal">
        <input type="radio" id="home" name="horizontal-nav" checked />
        <label for="home">Home</label>

        <input type="radio" id="about" name="horizontal-nav" />
        <label for="about">About</label>

        <input type="radio" id="projects" name="horizontal-nav" />
        <label for="projects">Projects</label>

        <input type="radio" id="contact" name="horizontal-nav" />
        <label for="contact">Contact</label>
      </div>
    </section>

    <section class="demo-section">
      <h2>Vertical Variant</h2>

      <div class="pill-nav vertical">
        <input type="radio" id="dashboard" name="vertical-nav" checked />
        <label for="dashboard">Dashboard</label>

        <input type="radio" id="profile" name="vertical-nav" />
        <label for="profile">Profile</label>

        <input type="radio" id="messages" name="vertical-nav" />
        <label for="messages">Messages</label>

        <input type="radio" id="settings" name="vertical-nav" />
        <label for="settings">Settings</label>
      </div>
    </section>
  </main>
</body>
</html>
