<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Toggle Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Ease Toggle Component</h1>

    <div class="demo-section">

        <div class="toggle-row">
            <h3>Default</h3>
            <div class="toggle-field">
                <input type="checkbox" id="toggle-default" class="ease-toggle" role="switch" aria-label="Default toggle switch">
                <label for="toggle-default"><span style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;">Default toggle switch</span></label>
            </div>
        </div>

        <div class="toggle-row">
            <h3>Success</h3>
            <div class="toggle-field">
                <input type="checkbox" id="toggle-success" class="ease-toggle success" role="switch" aria-label="Success toggle switch">
                <label for="toggle-success"><span style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;">Success toggle switch</span></label>
            </div>
        </div>

        <div class="toggle-row">
            <h3>Danger</h3>
            <div class="toggle-field">
                <input type="checkbox" id="toggle-danger" class="ease-toggle danger" role="switch" aria-label="Danger toggle switch">
                <label for="toggle-danger"><span style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;">Danger toggle switch</span></label>
            </div>
        </div>

        <div class="toggle-row">
            <h3>Warning</h3>
            <div class="toggle-field">
                <input type="checkbox" id="toggle-warning" class="ease-toggle warning" role="switch" aria-label="Warning toggle switch">
                <label for="toggle-warning"><span style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;">Warning toggle switch</span></label>
            </div>
        </div>

    </div>

    <script>
    document.querySelectorAll('input.ease-toggle[role="switch"]').forEach(function(toggle) {
      toggle.setAttribute('aria-checked', toggle.checked ? 'true' : 'false');
      toggle.addEventListener('change', function() {
        this.setAttribute('aria-checked', this.checked ? 'true' : 'false');
      });
    });
    </script>

</body>
</html>
