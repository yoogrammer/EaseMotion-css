<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sortable Data Table</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Sortable Data Table</h1>
    <table>
      <thead>
        <tr>
          <th data-key="name" class="sortable asc">Name<span class="arrow"></span></th>
          <th data-key="age" class="sortable">Age<span class="arrow"></span></th>
          <th data-key="role" class="sortable">Role<span class="arrow"></span></th>
          <th data-key="salary" class="sortable">Salary<span class="arrow"></span></th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
  <script>
    const data = [
      { name: "Alice Johnson", age: 29, role: "Engineer", salary: "$85,000" },
      { name: "Bob Smith", age: 34, role: "Designer", salary: "$72,000" },
      { name: "Charlie Brown", age: 42, role: "Manager", salary: "$95,000" },
      { name: "Diana Prince", age: 27, role: "Analyst", salary: "$68,000" },
      { name: "Eve Adams", age: 31, role: "Developer", salary: "$78,000" },
      { name: "Frank Castle", age: 45, role: "Director", salary: "$120,000" },
    ];
    const tbody = document.getElementById("table-body");
    function render(rows) {
      tbody.innerHTML = rows.map(r => `<tr><td>${r.name}</td><td>${r.age}</td><td>${r.role}</td><td>${r.salary}</td></tr>`).join("");
    }
    render(data);
    let currentKey = "name", currentDir = "asc";
    document.querySelectorAll(".sortable").forEach(th => {
      th.addEventListener("click", () => {
        const key = th.dataset.key;
        const dir = currentKey === key && currentDir === "asc" ? "desc" : "asc";
        currentKey = key;
        currentDir = dir;
        document.querySelectorAll(".sortable").forEach(h => h.classList.remove("asc", "desc"));
        th.classList.add(dir);
        const sorted = [...data].sort((a, b) => {
          const va = a[key], vb = b[key];
          const numeric = !isNaN(va) && !isNaN(vb) ? parseFloat(va) - parseFloat(vb) : String(va).localeCompare(String(vb));
          return dir === "asc" ? numeric : -numeric;
        });
        render(sorted);
      });
    });
  </script>
</body>
</html>
