<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ease Tooltip Reveal Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background:#f3f4f6; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">
    <div class="ease-tooltip-container" style="position:relative; cursor:pointer;">
        <strong>Hover this tag</strong>
        <div class="ease-tooltip-reveal-pr" style="position:absolute; bottom:130%; left:50%; transform:translateX(-50%); background:#1f2937; color:white; padding:8px 12px; border-radius:4px; font-size:12px; white-space:nowrap; z-index:100;">
            Helpful tooltip contextual info
        </div>
    </div>
</body>
</html>
