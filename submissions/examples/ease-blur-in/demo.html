<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blur In & Out Animation Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #0f172a;
      font-family: system-ui, sans-serif;
      color: #f8fafc;
      gap: 24px;
      margin: 0;
    }
    .card {
      background: #1e293b;
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      width: 300px;
    }
    .btn-container {
      display: flex;
      gap: 12px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background-color: #3b82f6;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background-color: #2563eb;
    }
  </style>
</head>
<body>

  <!-- Element starting with the blur-in entrance class -->
  <div id="target-box" class="card ease-blur-in">
    <h2>Blur in and out</h2>
    <p>Transitions smoothly from blurry to sharp and back!</p>
  </div>

  <div class="btn-container">
    <button onclick="triggerEntrance()">Trigger Blur In</button>
    <button onclick="triggerExit()">Trigger Blur Out</button>
  </div>

  <script>
    const box = document.getElementById('target-box');

    function triggerEntrance() {
      box.classList.remove('ease-blur-out');
      void box.offsetWidth; // Restarts the animation lifecycle cleanly
      box.classList.add('ease-blur-in');
    }

    function triggerExit() {
      box.classList.remove('ease-blur-in');
      void box.offsetWidth; // Restarts the animation lifecycle cleanly
      box.classList.add('ease-blur-out');
    }
  </script>

</body>
</html>
