<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Orbit Modal - Marketing Landing Page</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page">

    <h1>Marketing Landing Page</h1>
    <p>Pure CSS Floating Orbit Modal Example</p>

    <input type="checkbox" id="modal-toggle">

    <label for="modal-toggle" class="open-btn">
        Launch Demo
    </label>

    <label class="overlay" for="modal-toggle">

        <div class="orbit-modal" tabindex="0">

            <h2>🚀 Grow Faster</h2>

            <p>
                Convert more visitors with a beautifully animated
                CSS-only floating orbit modal.
            </p>

            <button>
                Start Free Trial
            </button>

            <label for="modal-toggle" class="close-btn">
                ✕
            </label>

        </div>

    </label>

</div>

</body>
</html>
