<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clip Path Transitions - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Clip Path Transitions</h1>
    <div class="clip-gallery">
      <div class="clip-card clip-circle"><span>Circle</span></div>
      <div class="clip-card clip-diamond"><span>Diamond</span></div>
      <div class="clip-card clip-wedge"><span>Wedge</span></div>
    </div>
    <p class="description">Cards reveal content on hover using CSS clip-path transitions between shapes.</p>
  </div>
</body>
</html>
