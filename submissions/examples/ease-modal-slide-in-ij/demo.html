<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-modal-slide-in</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Modal Slide In</h1>
    <p class="subtitle">Click to open a modal that slides in from the top</p>
    <button class="trigger" id="trigger">Open Modal</button>
    <div class="backdrop" id="backdrop"></div>
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2>Notification</h2>
        <button class="close" id="closeBtn">&times;</button>
      </div>
      <div class="modal-body">
        <p>Your changes have been saved successfully. All team members will be notified.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="dismissBtn">Dismiss</button>
        <button class="btn btn-primary">View Details</button>
      </div>
    </div>
  </div>
  <script>
    const trigger = document.getElementById('trigger');
    const modal = document.getElementById('modal');
    const backdrop = document.getElementById('backdrop');
    function openModal() {
      modal.classList.add('open');
      backdrop.classList.add('visible');
    }
    function closeModal() {
      modal.classList.remove('open');
      backdrop.classList.remove('visible');
    }
    trigger.addEventListener('click', openModal);
    backdrop.addEventListener('click', closeModal);
    document.getElementById('closeBtn').addEventListener('click', closeModal);
    document.getElementById('dismissBtn').addEventListener('click', closeModal);
  </script>
</body>
</html>
