<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Scale Icon Emphasis</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>Hover over each icon</h2>

    <button class="icon-btn scale-up"
      style="background:#ede9ff;"
      title="Scale Up">
      🚀
    </button>

    <button class="icon-btn scale-down"
      style="background:#fff3e8;"
      title="Scale Down">
      🔥
    </button>

    <button class="icon-btn scale-pop"
      style="background:#e6faf3;"
      title="Scale Pop">
      ⭐
    </button>

    <button class="icon-btn scale-pulse"
      style="background:#fce7f3;"
      title="Scale Pulse">
      💡
    </button>
  </div>

  <div class="card">
    <h2>What each does</h2>
    <table class="desc-table">
      <tr>
        <td style="font-size:22px;">🚀</td>
        <td style="color:#6c63ff; font-weight:600;">scale-up</td>
        <td style="color:#888;">Grows larger on hover</td>
      </tr>
      <tr>
        <td style="font-size:22px;">🔥</td>
        <td style="color:#f97316; font-weight:600;">scale-down</td>
        <td style="color:#888;">Shrinks on hover</td>
      </tr>
      <tr>
        <td style="font-size:22px;">⭐</td>
        <td style="color:#10b981; font-weight:600;">scale-pop</td>
        <td style="color:#888;">Bouncy pop on hover</td>
      </tr>
      <tr>
        <td style="font-size:22px;">💡</td>
        <td style="color:#ec4899; font-weight:600;">scale-pulse</td>
        <td style="color:#888;">Continuous pulse</td>
      </tr>
    </table>
  </div>

</body>
</html>
