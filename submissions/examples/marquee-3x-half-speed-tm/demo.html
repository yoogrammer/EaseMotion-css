<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Marquee 3x and Half Speed - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Marquee — 3x and Half Speed</h1>
    <p class="description">
      Self-contained demo. The 3x variant loops in ~7s; the half
      variant loops in 40s.
    </p>

    <h2>3x speed</h2>
    <div class="ease-marquee ease-marquee-3x demo-row">
      <div class="ease-marquee-track">
        <div class="ease-marquee-item">Fast</div>
        <div class="ease-marquee-item">Fast</div>
        <div class="ease-marquee-item">Fast</div>
        <div class="ease-marquee-item">Fast</div>
      </div>
    </div>

    <h2>Half speed</h2>
    <div class="ease-marquee ease-marquee-half demo-row">
      <div class="ease-marquee-track">
        <div class="ease-marquee-item">Slow</div>
        <div class="ease-marquee-item">Slow</div>
        <div class="ease-marquee-item">Slow</div>
        <div class="ease-marquee-item">Slow</div>
      </div>
    </div>

  </div>

</body>
</html>
