<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Gradient Pill Badge</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Animated Gradient Pill Badge</h1>

    <div class="badge-showcase">

        <span class="gradient-pill">
            New Feature
        </span>

        <span class="gradient-pill success">
            Active
        </span>

        <span class="gradient-pill warning">
            Premium
        </span>

        <span class="gradient-pill danger">
            Trending
        </span>

        <span class="gradient-pill notification">
            12 Notifications
        </span>

    </div>

</div>

</body>
</html>
