<!DOCTYPE html>
<html>
<head>
  <title>Tabs Memory Leak Fix Demo</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="tabs-patched.js" defer></script>
</head>
<body>
  <div style="padding: 2rem;">
    <h1>Tabs Memory Leak Fix</h1>
    <p>This demo resolves the issue where a MutationObserver duplicates event listeners on dynamic DOM updates.</p>
    
    <div class="ease-tabs">
      <input type="radio" id="tab1" name="group" class="ease-tab-input" checked>
      <label for="tab1" class="ease-tab-label">Tab 1</label>
      <input type="radio" id="tab2" name="group" class="ease-tab-input">
      <label for="tab2" class="ease-tab-label">Tab 2</label>
      <div class="ease-tabs-nav"><div class="ease-tab-underline"></div></div>
    </div>

    <br>
    <button onclick="document.body.appendChild(document.createElement('div'))" class="ease-btn">Trigger Mutation</button>
    <p>Click this button repeatedly. The number of event listeners attached to the window and tab inputs will not multiply!</p>
  </div>
</body>
</html>
