<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cursor Follower Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Cursor Elements -->
  <div class="ease-cursor-dot" id="cursorDot"></div>
  <div class="ease-cursor-ring" id="cursorRing"></div>

  <div class="content">
    <h1>Custom Cursor Demo</h1>
    <p>Move your mouse around to see the custom cursor effect!</p>

    <a href="#" class="ease-cursor-grow">Hover over me — ring grows!</a>

    <div class="demo-box">
      <p>Hover anywhere on this page to see the cursor follower in action.</p>
    </div>
  </div>

  <script>
    const dot = document.getElementById('cursorDot');
    const ring = document.getElementById('cursorRing');

    let mouseX = 0, mouseY = 0;
    let ringX = 0, ringY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      dot.style.left = mouseX + 'px';
      dot.style.top = mouseY + 'px';
    });

    function animateRing() {
      ringX += (mouseX - ringX) * 0.15;
      ringY += (mouseY - ringY) * 0.15;
      ring.style.left = ringX + 'px';
      ring.style.top = ringY + 'px';
      requestAnimationFrame(animateRing);
    }
    animateRing();

    document.querySelectorAll('a, button, .ease-cursor-grow').forEach(el => {
      el.addEventListener('mouseenter', () => ring.classList.add('grow'));
      el.addEventListener('mouseleave', () => ring.classList.remove('grow'));
    });
  </script>

</body>
</html>
