<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Tooltip</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="tooltip-demo">
    <button class="tooltip-btn tooltip-top" data-tooltip="Tooltip on top">Top</button>
    <button class="tooltip-btn tooltip-bottom" data-tooltip="Tooltip on bottom">Bottom</button>
    <button class="tooltip-btn tooltip-left" data-tooltip="Tooltip on left">Left</button>
    <button class="tooltip-btn tooltip-right" data-tooltip="Tooltip on right">Right</button>
  </div>
</body>
</html>
