<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ease Modal Zoom Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background:#1e293b; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">
    <div class="ease-modal-overlay" style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.65); display:flex; justify-content:center; align-items:center; z-index:999;">
        <div class="ease-modal-zoom-pr" style="background:white; border-radius:12px; width:360px; padding:30px; box-shadow:0 20px 25px rgba(0,0,0,0.2); text-align:center;">
            <h2 style="margin-top:0;">Access Panel</h2>
            <p style="color:#6b7280; margin-bottom:25px;">Enter credentials to view your database updates.</p>
            <button style="padding:10px 20px; background:#ef4444; color:white; border:none; border-radius:6px; cursor:pointer;">Dismiss Modal</button>
        </div>
    </div>
</body>
</html>
