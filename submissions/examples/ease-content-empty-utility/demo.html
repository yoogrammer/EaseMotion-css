<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-content-empty Utility Demo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Inter, sans-serif;
        max-width: 500px;
        margin: 0 auto;
        padding: 2rem;
        background: #f8fafc;
      }
      h2 {
        color: #6366f1;
      }
      .group {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 1rem 1.5rem;
        margin-bottom: 1rem;
      }
      .group h3 {
        margin: 0 0 0.75rem;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #64748b;
      }
      .with-content::before {
        content: "PREFIX: ";
        font-weight: 700;
        color: #6366f1;
      }
      .with-content::after {
        content: " :SUFFIX";
        font-weight: 700;
        color: #f59e0b;
      }
    </style>
  </head>
  <body>
    <h2>ease-content-empty Utility</h2>

    <div class="group">
      <h3>With pseudo-element content</h3>
      <p class="with-content">
        This has prefix and suffix via ::before/::after
      </p>
    </div>

    <div class="group">
      <h3>ease-content-empty applied</h3>
      <p class="with-content ease-content-empty">
        All pseudo-element content is cleared
      </p>
    </div>
  </body>
</html>
