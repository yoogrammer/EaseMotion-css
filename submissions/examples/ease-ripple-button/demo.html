<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Ripple Button</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1>Ease Ripple Button</h1>

    <div class="button-grid">

      <button class="ease-ripple-button ease-ripple-basic">
        Basic Button
      </button>

      <button class="ease-ripple-button ease-ripple-outline">
        Outline Button
      </button>

      <button class="ease-ripple-button ease-ripple-filled">
        Filled Button
      </button>

      <button class="ease-ripple-button ease-ripple-icon">
        ⚡
      </button>

    </div>
  </div>

  <script>
    const buttons = document.querySelectorAll(".ease-ripple-button");

    buttons.forEach(button => {
      button.addEventListener("click", function (e) {

        const ripple = document.createElement("span");
        ripple.classList.add("ripple");

        const rect = button.getBoundingClientRect();

        const size = Math.max(rect.width, rect.height);

        ripple.style.width = size + "px";
        ripple.style.height = size + "px";

        ripple.style.left =
          e.clientX - rect.left - size / 2 + "px";

        ripple.style.top =
          e.clientY - rect.top - size / 2 + "px";

        button.appendChild(ripple);

        ripple.addEventListener("animationend", () => {
          ripple.remove();
        });
      });
    });
  </script>

</body>

</html>
