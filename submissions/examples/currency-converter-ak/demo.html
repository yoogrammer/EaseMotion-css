<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Converter - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="cx-wrapper">

    <h1>Currency Converter</h1>

    <div class="converter-row">
      <input type="number" id="amount" class="amount-input" value="100" min="0" step="0.01">
      <select id="fromCurrency" class="currency-select"></select>
    </div>

    <div class="swap-btn" id="swapBtn">&#x2195;</div>

    <div class="converter-row">
      <input type="text" id="result" class="result-input" readonly value="--">
      <select id="toCurrency" class="currency-select"></select>
    </div>

    <div class="rate-display" id="rateDisplay">1 USD = --</div>

  </div>

  <script>
    const rates = {
      USD: 1, EUR: 0.92, GBP: 0.79, JPY: 157.28, INR: 83.45, CAD: 1.37, AUD: 1.52, CHF: 0.88, CNY: 7.24, BRL: 5.05,
      KRW: 1320.50, MXN: 17.15, SGD: 1.34, NZD: 1.63, SEK: 10.45, NOK: 10.72, DKK: 6.89, TRY: 30.25, ZAR: 18.50, AED: 3.67
    };
    const symbols = { USD: '$', EUR: '\u20AC', GBP: '\u00A3', JPY: '\u00A5', INR: '\u20B9', CAD: 'C$', AUD: 'A$', CHF: 'CHF', CNY: '\u00A5', BRL: 'R$', KRW: '\u20A9', MXN: 'MX$', SGD: 'S$', NZD: 'NZ$', SEK: 'kr', NOK: 'kr', DKK: 'kr', TRY: '\u20BA', ZAR: 'R', AED: 'DH' };

    const fromSelect = document.getElementById('fromCurrency');
    const toSelect = document.getElementById('toCurrency');
    const amount = document.getElementById('amount');
    const result = document.getElementById('result');
    const rateDisplay = document.getElementById('rateDisplay');
    const swapBtn = document.getElementById('swapBtn');

    const currencies = Object.keys(rates);

    currencies.forEach(c => {
      fromSelect.appendChild(new Option(c, c));
      toSelect.appendChild(new Option(c, c));
    });

    fromSelect.value = 'USD';
    toSelect.value = 'INR';

    function convert() {
      const amt = parseFloat(amount.value) || 0;
      const from = fromSelect.value;
      const to = toSelect.value;
      const inUsd = amt / rates[from];
      const converted = inUsd * rates[to];

      const sym = symbols[to] || '';
      result.value = sym + ' ' + converted.toFixed(2);

      const rate = (rates[to] / rates[from]).toFixed(4);
      rateDisplay.textContent = '1 ' + from + ' = ' + rate + ' ' + to;
    }

    swapBtn.addEventListener('click', () => {
      const tmp = fromSelect.value;
      fromSelect.value = toSelect.value;
      toSelect.value = tmp;
      convert();
    });

    amount.addEventListener('input', convert);
    fromSelect.addEventListener('change', convert);
    toSelect.addEventListener('change', convert);

    convert();
  </script>

</body>
</html>
