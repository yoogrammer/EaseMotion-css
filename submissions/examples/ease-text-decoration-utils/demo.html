<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-decoration Utilities Demo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Inter, sans-serif;
        max-width: 500px;
        margin: 0 auto;
        padding: 2rem;
        background: #f8fafc;
      }
      h2 {
        color: #6366f1;
      }
      p {
        font-size: 1.25rem;
        padding: 0.75rem 1rem;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        margin-bottom: 0.75rem;
      }
    </style>
  </head>
  <body>
    <h2>text-decoration Utilities</h2>

    <p class="ease-decoration-none">
      Link without underline:
      <a href="#" class="ease-decoration-none">Click here</a>
    </p>
    <p class="ease-decoration-underline">This text has underline.</p>
    <p class="ease-decoration-line-through">This text has strikethrough.</p>
    <p>
      Normal paragraph with
      <span class="ease-decoration-line-through">strikethrough span</span>
      and
      <span class="ease-decoration-underline">underlined span</span>.
    </p>
  </body>
</html>
