<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-bounce-button-exit — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; letter-spacing: 0.05em; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .section { display: flex; flex-direction: column; align-items: center; }
    button {
      padding: 12px 28px; border-radius: 8px;
      border: none; background: #6366f1;
      color: #fff; font-size: 1rem; cursor: pointer;
    }
    .reload {
      margin-top: 2rem; padding: 8px 20px; border-radius: 8px;
      border: 1px solid #333; background: transparent;
      color: #888; cursor: pointer; font-size: 0.8rem;
    }
    .reload:hover { border-color: #666; color: #fff; }
  </style>
</head>
<body>
  <h1>ease-bounce-button-exit</h1>
  <div class="section">
    <div class="label">Exit animation (plays on load)</div>
    <button class="ease-bounce-button-exit">Bounce out</button>
  </div>
  <button class="reload" onclick="location.reload()">↺ Replay</button>
</body>
</html>
