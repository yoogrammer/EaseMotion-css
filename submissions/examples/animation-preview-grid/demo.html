<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EaseMotion CSS — Animation Preview</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="docs.css" />
  <link rel="stylesheet" href="animations-preview.css" />
</head>
<body>
  <!-- Header (reuse from docs) -->
  <header class="docs-header">
    <a href="index.html" class="docs-logo">EaseMotion CSS</a>
    <ul class="docs-header-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="animations-preview.html" class="active">Animation Preview</a></li>
    </ul>
    <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark/light theme" title="Toggle theme">
      <svg class="sun-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/></svg>
      <svg class="moon-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </header>
  <main class="docs-content">
    <section class="docs-section" id="animation-preview">
      <h1 class="docs-h1">Animation Preview</h1>
      <p class="docs-p">Browse all available animation utility classes, see live previews, and copy class names with a single click.</p>

      <div class="animation-controls" style="margin-bottom: var(--ease-space-6); display:flex; gap:var(--ease-space-4); flex-wrap:wrap; align-items:center;">
        <input type="text" id="searchInput" placeholder="Search animations..." class="ease-input" style="flex:1; min-width:200px; padding: var(--ease-space-2) var(--ease-space-3); border:1px solid var(--border-color); border-radius:var(--ease-radius-sm); background:var(--code-bg); color:var(--page-text);" />
        <select id="categoryFilter" class="ease-input" style="padding: var(--ease-space-2) var(--ease-space-3); border:1px solid var(--border-color); border-radius:var(--ease-radius-sm); background:var(--code-bg); color:var(--page-text);">
          <option value="all">All Categories</option>
          <option value="fade">Fade</option>
          <option value="slide">Slide</option>
          <option value="bounce">Bounce</option>
          <option value="rotate">Rotate</option>
        </select>
      </div>

      <div class="animation-grid" id="animationGrid">
        <!-- Cards will be injected by script -->
      </div>
    </section>
  </main>
  <script>
    // List of animation utilities with name, category, and a short description
    const animations = [
      { name: 'ease-fade-in', category: 'fade', description: 'Fade in from 0 → 1 opacity' },
      { name: 'ease-fade-out', category: 'fade', description: 'Fade out from 1 → 0 opacity' },
      { name: 'ease-slide-up', category: 'slide', description: 'Slide up while fading in' },
      { name: 'ease-slide-down', category: 'slide', description: 'Slide down while fading in' },
      { name: 'ease-slide-in-left', category: 'slide', description: 'Slide in from left' },
      { name: 'ease-slide-in-right', category: 'slide', description: 'Slide in from right' },
      { name: 'ease-bounce', category: 'bounce', description: 'Infinite vertical bounce' },
      { name: 'ease-rotate', category: 'rotate', description: 'Continuous rotation' },
    ];

    const grid = document.getElementById('animationGrid');
    const searchInput = document.getElementById('searchInput');
    const categoryFilter = document.getElementById('categoryFilter');

    function createCard(anim) {
      const card = document.createElement('div');
      card.className = 'animation-card';
      card.dataset.name = anim.name;
      card.dataset.category = anim.category;

      // preview element
      const preview = document.createElement('div');
      preview.className = `animation-preview-box ${anim.name}`;
      preview.textContent = 'Preview';
      preview.style.display = 'flex';
      preview.style.alignItems = 'center';
      preview.style.justifyContent = 'center';
      preview.style.height = '80px';
      preview.style.border = '1px solid var(--border-color)';
      preview.style.borderRadius = 'var(--ease-radius-md)';
      preview.style.background = 'var(--card-bg)';
      preview.style.color = 'var(--page-text)';
      preview.style.fontSize = 'var(--ease-text-sm)';

      const title = document.createElement('div');
      title.className = 'animation-title';
      title.textContent = anim.name;
      title.style.marginTop = 'var(--ease-space-2)';
      title.style.fontWeight = '600';
      title.style.fontSize = 'var(--ease-text-sm)';

      const copyBtn = document.createElement('button');
      copyBtn.className = 'animation-copy-btn';
      copyBtn.textContent = 'Copy';
      copyBtn.title = 'Copy class name';
      copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(anim.name);
        copyBtn.textContent = 'Copied!';
        setTimeout(() => (copyBtn.textContent = 'Copy'), 1500);
      });

      card.appendChild(preview);
      card.appendChild(title);
      card.appendChild(copyBtn);
      return card;
    }

    function renderGrid() {
      grid.innerHTML = '';
      const filterText = searchInput.value.toLowerCase();
      const selectedCat = categoryFilter.value;
      const filtered = animations.filter(a =>
        a.name.includes(filterText) && (selectedCat === 'all' || a.category === selectedCat)
      );
      filtered.forEach(a => grid.appendChild(createCard(a)));
    }

    searchInput.addEventListener('input', renderGrid);
    categoryFilter.addEventListener('change', renderGrid);
    // Initial render
    renderGrid();
  </script>
</body>
</html>
