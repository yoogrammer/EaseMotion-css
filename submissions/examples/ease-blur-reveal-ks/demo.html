<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Blur Reveal Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        background-color: #0f0e17;
        color: #fffffe;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .demo-container {
        text-align: center;
        padding: 3rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        background-color: rgba(255, 255, 255, 0.02);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        max-width: 480px;
        width: 100%;
      }
      h1 {
        font-size: 2rem;
        margin-bottom: 1.5rem;
        color: #fffffe;
      }
      p {
        color: rgba(255, 255, 255, 0.5);
        margin-bottom: 2.5rem;
      }
      .reveal-box {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        align-items: center;
      }
      .interactive-text {
        font-size: 1.3rem;
        font-weight: 500;
        color: #ff8906; /* High-contrast orange accent */
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="demo-container">
      <h1>Focus Reveal</h1>
      <p>Hover over the blurred items below to bring them into focus:</p>
      <div class="reveal-box">
        <div class="interactive-text blur-reveal-text">
          🔍 Reveal Hidden Insight
        </div>
        <div class="interactive-text blur-reveal-text">
          💡 Unlock Creative Idea
        </div>
        <div class="interactive-text blur-reveal-text">
          🚀 Launch Future Project
        </div>
      </div>
    </div>
  </body>
</html>
