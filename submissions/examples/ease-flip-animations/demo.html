<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Animations Demo</title>
  <!-- Load EaseMotion CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css@latest/dist/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f1f5f9;
      margin: 0;
    }
    .container {
      text-align: center;
      background: white;
      padding: 3rem 4rem;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
    .card {
      width: 200px;
      height: 200px;
      margin: 2rem auto;
      background: linear-gradient(135deg, #6c63ff 0%, #a78bfa 100%);
      color: white;
      font-weight: bold;
      font-size: 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      cursor: pointer;
    }
    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 6px;
      background: #334155;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #0f172a;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>EaseMotion Flip Animations</h2>
    
    <div id="target" class="card">
      Flip Me!
    </div>

    <div class="controls">
      <button onclick="triggerAnimation('ease-flip-x')">Flip X (Horizontal Axis)</button>
      <button onclick="triggerAnimation('ease-flip-y')">Flip Y (Vertical Axis)</button>
    </div>
  </div>

  <script>
    function triggerAnimation(animationClass) {
      const target = document.getElementById('target');
      
      // Remove classes to reset
      target.classList.remove('ease-flip-x', 'ease-flip-y');
      
      // Force reflow
      void target.offsetWidth;
      
      // Apply requested flip animation class
      target.classList.add(animationClass);
    }
  </script>
</body>
</html>
