<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPA Calculator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator-wrapper">
    <h1>GPA Calculator</h1>
    <div class="semesters" id="semesters"></div>
    <div class="results">
      <div class="result-row">
        <span>Current Semester GPA</span>
        <span id="semesterGpa">0.00</span>
      </div>
      <div class="result-row">
        <span>Cumulative GPA</span>
        <span id="cumulativeGpa">0.00</span>
      </div>
    </div>
    <div class="trend">
      <h3>GPA Trend</h3>
      <div class="trend-bars" id="trendBars"></div>
    </div>
  </div>
  <script>
    const gradePoints = { 'A': 4.0, 'A-': 3.7, 'B+': 3.3, 'B': 3.0, 'B-': 2.7, 'C+': 2.3, 'C': 2.0, 'C-': 1.7, 'D+': 1.3, 'D': 1.0, 'F': 0.0 };
    const grades = Object.keys(gradePoints);

    const semestersContainer = document.getElementById('semesters');
    const semesterGpa = document.getElementById('semesterGpa');
    const cumulativeGpa = document.getElementById('cumulativeGpa');
    const trendBars = document.getElementById('trendBars');

    let semData = [
      { name: 'Fall 2024', courses: [{ name: 'Calculus I', credits: 4, grade: 'A' }, { name: 'English 101', credits: 3, grade: 'B+' }, { name: 'History 101', credits: 3, grade: 'A-' }, { name: 'CS 101', credits: 4, grade: 'B' }] },
      { name: 'Spring 2025', courses: [{ name: 'Calculus II', credits: 4, grade: 'B+' }, { name: 'Physics I', credits: 4, grade: 'B' }, { name: 'CS 201', credits: 3, grade: 'A-' }, { name: 'Art Elective', credits: 3, grade: 'A' }] }
    ];

    function getGpaColor(gpa) {
      if (gpa >= 3.7) return '#22c55e';
      if (gpa >= 3.3) return '#3b82f6';
      if (gpa >= 3.0) return '#eab308';
      if (gpa >= 2.0) return '#f97316';
      return '#ef4444';
    }

    function render() {
      semestersContainer.innerHTML = '';
      semData.forEach((sem, si) => {
        const semDiv = document.createElement('div');
        semDiv.className = 'semester';
        semDiv.innerHTML = `<div class="sem-header"><span>${sem.name}</span><button class="add-course-btn" data-si="${si}">+ Course</button></div>`;
        const list = document.createElement('div');
        list.className = 'course-list';
        sem.courses.forEach((c, ci) => {
          const row = document.createElement('div');
          row.className = 'course-row';
          row.innerHTML = `
            <input type="text" class="input course-name" value="${c.name}" data-si="${si}" data-ci="${ci}">
            <input type="number" class="input course-credits" value="${c.credits}" min="1" max="6" data-si="${si}" data-ci="${ci}">
            <select class="input course-grade" data-si="${si}" data-ci="${ci}">${grades.map(g => `<option value="${g}" ${g === c.grade ? 'selected' : ''}>${g}</option>`).join('')}</select>
          `;
          list.appendChild(row);
        });
        semDiv.appendChild(list);
        semestersContainer.appendChild(semDiv);
      });

      document.querySelectorAll('.add-course-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const si = parseInt(btn.dataset.si);
          semData[si].courses.push({ name: 'New Course', credits: 3, grade: 'B' });
          render();
          calculate();
        });
      });

      document.querySelectorAll('.course-name').forEach(inp => {
        inp.addEventListener('input', (e) => {
          const si = parseInt(e.target.dataset.si);
          const ci = parseInt(e.target.dataset.ci);
          semData[si].courses[ci].name = e.target.value;
        });
      });
      document.querySelectorAll('.course-credits').forEach(inp => {
        inp.addEventListener('input', (e) => {
          const si = parseInt(e.target.dataset.si);
          const ci = parseInt(e.target.dataset.ci);
          semData[si].courses[ci].credits = parseInt(e.target.value) || 1;
          calculate();
        });
      });
      document.querySelectorAll('.course-grade').forEach(sel => {
        sel.addEventListener('change', (e) => {
          const si = parseInt(e.target.dataset.si);
          const ci = parseInt(e.target.dataset.ci);
          semData[si].courses[ci].grade = e.target.value;
          calculate();
        });
      });

      calculate();
    }

    function calculate() {
      let cumPoints = 0;
      let cumCredits = 0;
      const gpas = [];

      semData.forEach((sem, si) => {
        let semPoints = 0;
        let semCredits = 0;
        sem.courses.forEach(c => {
          const pts = gradePoints[c.grade] || 0;
          semPoints += pts * c.credits;
          semCredits += c.credits;
        });
        const sgpa = semCredits > 0 ? semPoints / semCredits : 0;
        gpas.push({ name: sem.name, gpa: sgpa });
        cumPoints += semPoints;
        cumCredits += semCredits;
      });

      const currSem = gpas[gpas.length - 1];
      semesterGpa.textContent = currSem ? currSem.gpa.toFixed(2) : '0.00';
      semesterGpa.style.color = getGpaColor(currSem ? currSem.gpa : 0);
      const cumGpa = cumCredits > 0 ? cumPoints / cumCredits : 0;
      cumulativeGpa.textContent = cumGpa.toFixed(2);
      cumulativeGpa.style.color = getGpaColor(cumGpa);

      trendBars.innerHTML = '';
      gpas.forEach(s => {
        const bar = document.createElement('div');
        bar.className = 'trend-item';
        const pct = Math.min(100, (s.gpa / 4.0) * 100);
        bar.innerHTML = `<span class="trend-label">${s.name}</span><div class="trend-bar"><div class="trend-fill" style="width:${pct}%;background:${getGpaColor(s.gpa)}"></div></div><span class="trend-val">${s.gpa.toFixed(2)}</span>`;
        trendBars.appendChild(bar);
      });
    }

    render();
  </script>
</body>
</html>
