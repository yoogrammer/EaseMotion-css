<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Corner Ribbon</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            background: #0d0d14;
            color: #e4e4e7;
        }
        .demo-header { text-align: center; margin-bottom: 3rem; }
        .demo-header h1 { font-size: 2.5rem; background: linear-gradient(135deg, #6c63ff, #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .demo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
        .card { background: #1a1a2e; border-radius: 1rem; padding: 2rem; text-align: center; position: relative; overflow: hidden; min-height: 200px; display: flex; align-items: center; justify-content: center; }
        .card p { margin: 0; color: #a1a1aa; }
        .note { background: #1a1a2e; padding: 1rem; border-radius: 12px; border-left: 3px solid #6c63ff; margin: 2rem 0; font-size: 0.875rem; text-align: center; }
        code { background: #1e1e2e; padding: 0.2rem 0.4rem; border-radius: 6px; }
    </style>
</head>
<body>

<div class="demo-header">
    <h1>Corner Ribbon</h1>
    <p>Animated ribbon badge for cards and containers</p>
</div>

<div class="demo-grid">
    <div class="card">
        <div class="ease-corner-ribbon">NEW</div>
        <p>Featured Product</p>
    </div>

    <div class="card">
        <div class="ease-corner-ribbon ease-ribbon-sale">SALE</div>
        <p>50% Off</p>
    </div>

    <div class="card">
        <div class="ease-corner-ribbon ease-ribbon-popular">POPULAR</div>
        <p>Best Seller</p>
    </div>

    <div class="card">
        <div class="ease-corner-ribbon ease-ribbon-limited">LIMITED</div>
        <p>Edition</p>
    </div>

    <div class="card">
        <div class="ease-corner-ribbon ease-ribbon-glow">GLOW</div>
        <p>Premium</p>
    </div>

    <div class="card">
        <div class="ease-corner-ribbon ease-ribbon-pulse">HOT</div>
        <p>Trending Now</p>
    </div>
</div>

<div class="note">
    💡 Add class="ease-corner-ribbon" to any div inside a card with position: relative.
</div>

</body>
</html>
