<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>ease-font-style Demo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Inter, sans-serif;
        padding: 2rem;
        background: #f8fafc;
      }
      h2 {
        color: #6366f1;
      }
      p {
        font-size: 1.25rem;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 0.75rem 1rem;
        margin-bottom: 0.75rem;
      }
    </style>
  </head>
  <body>
    <h2>font-style Utilities</h2>
    <p class="ease-italic">This text is italic (ease-italic).</p>
    <p class="ease-not-italic">This text is normal (ease-not-italic).</p>
    <p>
      <em class="ease-not-italic">This em tag</em> has italic forced to normal.
    </p>
  </body>
</html>
