<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fix Tooltip Mobile Fallback Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f9fafb;
    }
  </style>
</head>
<body>
  <!-- Use devtools or resize viewport below 640px to see the fallback behavior -->
  <span class="ease-tooltip" data-position="top" data-tooltip="This is a tooltip that falls back to bottom on mobile">
    Hover me on mobile
  </span>
</body>
</html>
