<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card with Gradient Image Overlay</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f1f5f9; gap: 1.5rem; flex-wrap: wrap; padding: 2rem;">
    <div class="overlay-card">
      <div class="overlay-card-img" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></div>
      <div class="overlay-card-gradient"></div>
      <div class="overlay-card-body">
        <span class="overlay-card-tag">Design</span>
        <h3 class="overlay-card-title">Modern UI Patterns</h3>
        <p class="overlay-card-text">Explore the latest trends in user interface design and interaction patterns.</p>
      </div>
    </div>
    <div class="overlay-card">
      <div class="overlay-card-img" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);"></div>
      <div class="overlay-card-gradient"></div>
      <div class="overlay-card-body">
        <span class="overlay-card-tag">Dev</span>
        <h3 class="overlay-card-title">CSS Architecture</h3>
        <p class="overlay-card-text">Best practices for scalable and maintainable CSS in large projects.</p>
      </div>
    </div>
  </div>
</body>
</html>
