<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Border Style Utilities</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 600px;
        margin: 2rem auto;
        padding: 1rem;
        background: #f8fafc;
        color: #1e293b;
      }
      h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
      p { color: #64748b; margin-bottom: 1.5rem; }
      .demo-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      @media (max-width: 480px) { .demo-grid { grid-template-columns: 1fr; } }
      .demo-card {
        background: #fff;
        border: 3px solid #6c63ff;
        border-radius: 8px;
        padding: 1.5rem;
        text-align: center;
        font-weight: 600;
        color: #334155;
      }
      .demo-card span {
        display: block;
        margin-top: 0.5rem;
        font-size: 0.75rem;
        font-weight: 400;
        font-family: monospace;
        color: #6c63ff;
      }
    </style>
  </head>
  <body>
    <h1>Border Style Utilities</h1>
    <p>Classes to control the visual style of element borders.</p>
    <div class="demo-grid">
      <div class="demo-card border-solid">Solid<span>.border-solid</span></div>
      <div class="demo-card border-dashed">Dashed<span>.border-dashed</span></div>
      <div class="demo-card border-dotted">Dotted<span>.border-dotted</span></div>
      <div class="demo-card border-double">Double<span>.border-double</span></div>
      <div class="demo-card border-none-style">None<span>.border-none-style</span></div>
    </div>
  </body>
</html>
