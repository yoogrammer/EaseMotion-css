<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fix: :focus-visible on Form Inputs — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { padding: 2rem; max-width: 600px; margin: 0 auto; }
    h1 { margin-bottom: 0.5rem; }
    p { margin-bottom: 1.5rem; color: var(--ease-color-muted); }
    .demo-section { margin-bottom: 2rem; }
    .label { font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; display: block; }
    .hint { font-size: 0.75rem; color: var(--ease-color-muted); margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>:focus-visible Fix for Form Inputs</h1>
  <p>
    Click the inputs with a mouse — no focus ring appears (correct).<br />
    Tab to the inputs using keyboard — focus ring appears (correct).
  </p>

  <div class="demo-section">
    <span class="label">Default Input</span>
    <div class="ease-field">
      <input class="ease-input" type="text" placeholder="Click me, then Tab to me" />
    </div>
    <p class="hint">Mouse click: no ring. Keyboard Tab: ring appears.</p>
  </div>

  <div class="demo-section">
    <span class="label">Textarea</span>
    <div class="ease-field">
      <textarea class="ease-textarea" rows="3" placeholder="Click me, then Tab to me"></textarea>
    </div>
  </div>

  <div class="demo-section">
    <span class="label">Select</span>
    <div class="ease-field">
      <select class="ease-select">
        <option>Option A</option>
        <option>Option B</option>
      </select>
    </div>
  </div>

  <div class="demo-section">
    <span class="label">Validation States</span>
    <div class="ease-field">
      <input class="ease-input ease-input-success" type="text" value="Valid input" />
    </div>
    <div class="ease-field">
      <input class="ease-input ease-input-danger" type="text" value="Error input" />
    </div>
    <div class="ease-field">
      <input class="ease-input ease-input-warning" type="text" value="Warning input" />
    </div>
  </div>
</body>
</html>
