<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-hover-grow — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; letter-spacing: 0.05em; }
    .row { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .section { display: flex; flex-direction: column; align-items: center; }
    button {
      padding: 12px 28px; border-radius: 8px;
      border: none; font-size: 1rem; cursor: pointer;
    }
    .card {
      width: 180px; height: 100px; border-radius: 12px;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 500;
    }
  </style>
</head>
<body>
  <h1>ease-hover-grow</h1>
  <div class="section">
    <div class="label">Hover over elements</div>
    <div class="row">
      <button class="ease-hover-grow-sm" style="background:#6366f1;color:#fff;">Subtle</button>
      <button class="ease-hover-grow" style="background:#6366f1;color:#fff;">Default</button>
      <button class="ease-hover-grow-lg" style="background:#6366f1;color:#fff;">Strong</button>
    </div>
  </div>
  <div class="section">
    <div class="label">On cards</div>
    <div class="row">
      <div class="card ease-hover-grow">Hover me</div>
      <div class="card ease-hover-grow-lg">Hover me</div>
    </div>
  </div>
</body>
</html>
