<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Multi-select Chips Demo</title>
</head>
<body>
  <h1>Multi-select Chips</h1>
  
  <div class="chips-container">
    <label>
      <input type="checkbox" class="chip-input">
      <span class="chip">Option 1</span>
    </label>
    <label>
      <input type="checkbox" class="chip-input">
      <span class="chip">Option 2</span>
    </label>
    <label>
      <input type="checkbox" class="chip-input">
      <span class="chip">Option 3</span>
    </label>
  </div>
</body>
</html>
