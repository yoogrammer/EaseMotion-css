<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Camera Shutter – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1 class="title">Camera Shutter</h1>
  <p class="subtitle">Pure CSS animated aperture blades.</p>

  <div class="shutter" id="shutter">
    <div class="blade" style="--r:0deg"></div>
    <div class="blade" style="--r:60deg"></div>
    <div class="blade" style="--r:120deg"></div>
    <div class="blade" style="--r:180deg"></div>
    <div class="blade" style="--r:240deg"></div>
    <div class="blade" style="--r:300deg"></div>
    <div class="center-dot"></div>
  </div>

  <button class="shutter-btn" onclick="document.getElementById('shutter').classList.toggle('open')">Toggle Shutter</button>
</div>

</body>
</html>
