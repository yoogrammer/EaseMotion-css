<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perspective Origin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Perspective &amp; Perspective-Origin</h1>
    <p class="subtitle">How perspective-origin changes the vanishing point for 3D transforms.</p>

    <section class="demo-section">
      <h2>3D Cube</h2>
      <div class="cube-wrapper">
        <div class="perspective-box" id="perspectiveBox">
          <div class="cube">
            <div class="cube-face front">F</div>
            <div class="cube-face back">B</div>
            <div class="cube-face right">R</div>
            <div class="cube-face left">L</div>
            <div class="cube-face top">T</div>
            <div class="cube-face bottom">D</div>
          </div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h2>Perspective-Origin Controls</h2>
      <div class="origin-grid">
        <button class="origin-btn" data-x="left" data-y="top">Top-Left</button>
        <button class="origin-btn" data-x="center" data-y="top">Top-Center</button>
        <button class="origin-btn" data-x="right" data-y="top">Top-Right</button>
        <button class="origin-btn" data-x="left" data-y="center">Center-Left</button>
        <button class="origin-btn active" data-x="center" data-y="center">Center</button>
        <button class="origin-btn" data-x="right" data-y="center">Center-Right</button>
        <button class="origin-btn" data-x="left" data-y="bottom">Bottom-Left</button>
        <button class="origin-btn" data-x="center" data-y="bottom">Bottom-Center</button>
        <button class="origin-btn" data-x="right" data-y="bottom">Bottom-Right</button>
      </div>
    </section>

    <section class="demo-section">
      <h2>Perspective Value Comparison</h2>
      <div class="persp-values">
        <div class="persp-card">
          <span class="persp-label">perspective: 200px</span>
          <div class="persp-stage" style="perspective: 200px;"><div class="persp-tile"></div></div>
        </div>
        <div class="persp-card">
          <span class="persp-label">perspective: 500px</span>
          <div class="persp-stage" style="perspective: 500px;"><div class="persp-tile"></div></div>
        </div>
        <div class="persp-card">
          <span class="persp-label">perspective: 1000px</span>
          <div class="persp-stage" style="perspective: 1000px;"><div class="persp-tile"></div></div>
        </div>
        <div class="persp-card">
          <span class="persp-label">perspective: none</span>
          <div class="persp-stage" style="perspective: none;"><div class="persp-tile"></div></div>
        </div>
      </div>
    </section>
  </main>
  <script>
    const box = document.getElementById('perspectiveBox');
    document.querySelectorAll('.origin-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.origin-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        box.style.perspectiveOrigin = btn.dataset.x + ' ' + btn.dataset.y;
      });
    });
  </script>
</body>
</html>
