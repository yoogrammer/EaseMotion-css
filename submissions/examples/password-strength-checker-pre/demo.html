<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Password Strength Checker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card ease-fade-in">
    <h2 class="card-title">🔐 Password Strength</h2>
    <p class="card-sub">Type a password to check its strength</p>

    <div class="input-wrap">
      <input
        class="pwd-input"
        type="password"
        id="pwdInput"
        placeholder="Enter your password..."
      />
    </div>

    <div class="strength-bar-wrap">
      <div class="strength-segment"></div>
      <div class="strength-segment"></div>
      <div class="strength-segment"></div>
      <div class="strength-segment"></div>
    </div>

    <div class="strength-label" id="strengthLabel"></div>

    <p class="criteria-title">Requirements</p>
    <div class="criteria-list">

      <div class="criteria-item" id="c-length">
        <div class="ease-badge">✗</div>
        <span>At least 8 characters</span>
      </div>

      <div class="criteria-item" id="c-upper">
        <div class="ease-badge">✗</div>
        <span>One uppercase letter</span>
      </div>

      <div class="criteria-item" id="c-number">
        <div class="ease-badge">✗</div>
        <span>One number</span>
      </div>

      <div class="criteria-item" id="c-special">
        <div class="ease-badge">✗</div>
        <span>One special character (!@#$...)</span>
      </div>

    </div>
  </div>

  <script>
    const input = document.getElementById('pwdInput');
    const segments = document.querySelectorAll('.strength-segment');
    const label = document.getElementById('strengthLabel');
    const criteria = {
      length:    document.getElementById('c-length'),
      uppercase: document.getElementById('c-upper'),
      number:    document.getElementById('c-number'),
      special:   document.getElementById('c-special'),
    };

    const colors = ['', '#ef4444', '#f97316', '#eab308', '#10b981'];
    const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];

    function evaluate(pwd) {
      const checks = {
        length:    pwd.length >= 8,
        uppercase: /[A-Z]/.test(pwd),
        number:    /[0-9]/.test(pwd),
        special:   /[^A-Za-z0-9]/.test(pwd),
      };

      let score = Object.values(checks).filter(Boolean).length;

      Object.entries(checks).forEach(([key, met]) => {
        const el = criteria[key];
        const icon = el.querySelector('.ease-badge');
        el.classList.toggle('met', met);
        icon.textContent = met ? '✓' : '✗';
      });

      segments.forEach((seg, i) => {
        seg.style.background = i < score ? colors[score] : '#e8e8e8';
      });

      if (!pwd) {
        label.textContent = '';
        label.style.color = '';
      } else {
        label.textContent = labels[score] || 'Weak';
        label.style.color = colors[score] || '#ef4444';
      }
    }

    input.addEventListener('input', () => evaluate(input.value));
  </script>

</body>
</html>
