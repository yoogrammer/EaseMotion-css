<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staggered Dropdown Menu Demo | EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    style="
      font-family:
        system-ui,
        -apple-system,
        sans-serif;
      display: flex;
      justify-content: center;
      align-items: start;
      min-height: 100vh;
      padding-top: 100px;
      background: #f8fafc;
      margin: 0;
    "
  >
    <!-- Staggered Dropdown Example -->
    <div class="dropdown">
      <button
        class="dropdown-toggle"
        aria-haspopup="true"
        aria-expanded="false"
      >
        Explore Solutions ▾
      </button>
      <ul class="dropdown-menu">
        <li>
          <a href="#" class="dropdown-item stagger-1">
            <span class="icon">🚀</span>
            <div>
              <div class="title">Product Growth</div>
              <div class="desc">
                Scale your business with real-time insights.
              </div>
            </div>
          </a>
        </li>
        <li>
          <a href="#" class="dropdown-item stagger-2">
            <span class="icon">📈</span>
            <div>
              <div class="title">Data Analytics</div>
              <div class="desc">Deep dive into user behavior patterns.</div>
            </div>
          </a>
        </li>
        <li>
          <a href="#" class="dropdown-item stagger-3">
            <span class="icon">🛠️</span>
            <div>
              <div class="title">Developer Tools</div>
              <div class="desc">Powerful APIs for seamless integration.</div>
            </div>
          </a>
        </li>
        <li>
          <a href="#" class="dropdown-item stagger-4">
            <span class="icon">💬</span>
            <div>
              <div class="title">Support Hub</div>
              <div class="desc">24/7 expert help for your global team.</div>
            </div>
          </a>
        </li>
      </ul>
    </div>
  </body>
</html>
