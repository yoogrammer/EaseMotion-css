<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Mask Reveal - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Image Mask Reveal</h1>
    <div class="mask-gallery">
      <div class="mask-card">
        <div class="mask-image" style="background: linear-gradient(135deg, #6366f1, #8b5cf6)"></div>
        <span>Circle</span>
      </div>
      <div class="mask-card">
        <div class="mask-image mask-star" style="background: linear-gradient(135deg, #ec4899, #f43f5e)"></div>
        <span>Star</span>
      </div>
      <div class="mask-card">
        <div class="mask-image mask-wipe" style="background: linear-gradient(135deg, #10b981, #34d399)"></div>
        <span>Wipe</span>
      </div>
    </div>
    <p class="description">Images reveal on hover using CSS mask-image with animated masks.</p>
  </div>
</body>
</html>
