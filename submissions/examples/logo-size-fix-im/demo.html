<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logo Size Fix — EaseMotion CSS</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #0f0e17; color: #fff; }

    header {
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      gap: 2rem;
    }

    .docs-logo { display: flex; align-items: center; text-decoration: none; }

    nav { display: flex; gap: 1.5rem; margin-left: auto; }
    nav a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.9rem; }

    .btn {
      background: #6c63ff;
      color: #fff;
      padding: 0.5rem 1.2rem;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
    }

    /* ── Before / After comparison ── */
    .comparison {
      display: flex;
      gap: 2rem;
      padding: 3rem 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .box {
      flex: 1;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
    }

    .box-label {
      padding: 0.5rem 1rem;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .box-label.before { color: #f87171; }
    .box-label.after  { color: #4ade80; }

    .mock-header {
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1rem;
      background: rgba(15,14,23,0.9);
    }

    .mock-logo-before { height: 36px; width: auto; background: #6c63ff; border-radius: 4px; aspect-ratio: 3/1; opacity: 0.8; }
    .mock-logo-after  { height: 52px; width: auto; background: #6c63ff; border-radius: 4px; aspect-ratio: 3/1; }

    .mock-nav { display: flex; gap: 1rem; margin-left: auto; }
    .mock-link { height: 10px; width: 60px; background: rgba(255,255,255,0.15); border-radius: 4px; }
    .mock-btn  { height: 28px; width: 80px; background: #6c63ff; border-radius: 999px; opacity: 0.7; }
  </style>
</head>
<body>

  <div class="comparison">
    <div class="box">
      <div class="box-label before">Before — 36px</div>
      <div class="mock-header">
        <div class="mock-logo-before"></div>
        <div class="mock-nav">
          <div class="mock-link"></div>
          <div class="mock-link"></div>
          <div class="mock-link"></div>
          <div class="mock-btn"></div>
        </div>
      </div>
    </div>
    <div class="box">
      <div class="box-label after">After — 52px</div>
      <div class="mock-header">
        <div class="mock-logo-after"></div>
        <div class="mock-nav">
          <div class="mock-link"></div>
          <div class="mock-link"></div>
          <div class="mock-link"></div>
          <div class="mock-btn"></div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
