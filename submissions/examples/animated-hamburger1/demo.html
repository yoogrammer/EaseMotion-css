<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Hamburger Menu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="logo">BrandLogo</div>

    <!-- Pure CSS Toggle Mechanism (Checkbox Hack) -->
    <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">
    
    <!-- Hamburger Icon -->
    <label for="nav-toggle" class="hamburger" aria-label="Toggle navigation menu" aria-expanded="false">
      <span class="hamburger__line"></span>
      <span class="hamburger__line"></span>
      <span class="hamburger__line"></span>
    </label>

    <!-- Navigation Menu -->
    <nav class="nav-menu">
      <ul class="nav-list">
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#services">Services</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="hero">
    <h1>Pure CSS Animated Hamburger</h1>
    <p>Click the icon in the top right to see the smooth, JavaScript-free animation.</p>
  </main>

</body>
</html>
