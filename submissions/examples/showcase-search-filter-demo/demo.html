<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animation Search & Filter Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Animation Showcase Search</h1>

<input
  id="search"
  type="text"
  placeholder="Search animations..."
>

<div class="filters">

  <button data-filter="all">All</button>
  <button data-filter="fade">Fade</button>
  <button data-filter="slide">Slide</button>
  <button data-filter="scale">Scale</button>
  <button data-filter="rotation">Rotation</button>
  <button data-filter="entrance">Entrance</button>
  <button data-filter="exit">Exit</button>

</div>

<div class="grid" id="cards">

  <div class="card fade entrance">
    <h3>Fade In</h3>
    <p>Fade entrance animation.</p>
  </div>

  <div class="card fade exit">
    <h3>Fade Out</h3>
    <p>Fade exit animation.</p>
  </div>

  <div class="card slide entrance">
    <h3>Slide Up</h3>
    <p>Slide entrance animation.</p>
  </div>

  <div class="card slide exit">
    <h3>Slide Down</h3>
    <p>Slide exit animation.</p>
  </div>

  <div class="card scale entrance">
    <h3>Scale In</h3>
    <p>Scale entrance animation.</p>
  </div>

  <div class="card rotation entrance">
    <h3>Rotate In</h3>
    <p>Rotation entrance animation.</p>
  </div>

</div>

<script>
const search = document.getElementById("search");
const cards = document.querySelectorAll(".card");

search.addEventListener("input", () => {
  const value = search.value.toLowerCase();

  cards.forEach(card => {
    card.style.display =
      card.innerText.toLowerCase().includes(value)
      ? "block"
      : "none";
  });
});

document.querySelectorAll("[data-filter]").forEach(btn => {
  btn.addEventListener("click", () => {

    const filter = btn.dataset.filter;

    cards.forEach(card => {

      if (filter === "all") {
        card.style.display = "block";
      } else {
        card.style.display =
          card.classList.contains(filter)
          ? "block"
          : "none";
      }

    });

  });
});
</script>

</body>
</html>
