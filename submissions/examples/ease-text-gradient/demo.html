<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ease-text-gradient Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { margin: 0; font-family: sans-serif; padding: 2rem; }
    h1 { font-size: 3rem; font-weight: 800; }
    h2 { font-size: 2rem; font-weight: 700; }
  </style>
</head>
<body>
  <h2>ease-text-gradient — default</h2>
  <h1 class="ease-text-gradient">
    Beautiful Gradient Text
  </h1>

  <h2>ease-text-gradient — custom colors via CSS variables</h2>
  <h1 class="ease-text-gradient" style="--ease-gradient-from: #f97316; --ease-gradient-to: #eab308;">
    Custom Orange to Yellow
  </h1>

  <h2>ease-text-gradient — green to teal</h2>
  <h1 class="ease-text-gradient" style="--ease-gradient-from: #10b981; --ease-gradient-to: #06b6d4;">
    Green to Teal
  </h1>
</body>
</html>
