<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analog Clock</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="clock">
      <div class="clock-face">
        <div class="marker m12">12</div>
        <div class="marker m1">1</div>
        <div class="marker m2">2</div>
        <div class="marker m3">3</div>
        <div class="marker m4">4</div>
        <div class="marker m5">5</div>
        <div class="marker m6">6</div>
        <div class="marker m7">7</div>
        <div class="marker m8">8</div>
        <div class="marker m9">9</div>
        <div class="marker m10">10</div>
        <div class="marker m11">11</div>
        <div class="hand hour-hand" id="hourHand"></div>
        <div class="hand minute-hand" id="minuteHand"></div>
        <div class="hand second-hand" id="secondHand"></div>
        <div class="center-dot"></div>
      </div>
    </div>
    <div class="digital-time" id="digitalTime">00:00:00</div>
  </div>
  <script>
    const hourHand = document.getElementById('hourHand');
    const minuteHand = document.getElementById('minuteHand');
    const secondHand = document.getElementById('secondHand');
    const digitalTime = document.getElementById('digitalTime');

    function updateClock() {
      const now = new Date();
      const hours = now.getHours();
      const minutes = now.getMinutes();
      const seconds = now.getSeconds();

      const hourDeg = ((hours % 12) * 30) + (minutes * 0.5);
      const minuteDeg = (minutes * 6) + (seconds * 0.1);
      const secondDeg = seconds * 6;

      hourHand.style.transform = `rotate(${hourDeg}deg)`;
      minuteHand.style.transform = `rotate(${minuteDeg}deg)`;
      secondHand.style.transform = `rotate(${secondDeg}deg)`;

      digitalTime.textContent = 
        String(hours).padStart(2, '0') + ':' +
        String(minutes).padStart(2, '0') + ':' +
        String(seconds).padStart(2, '0');
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
