<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Like Heart Button Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      font-family: sans-serif;
      background: #f9f9f9;
    }
    p { color: #666; font-size: 0.9rem; margin: 0; }
  </style>
</head>
<body>

  <p>Click the heart to like</p>

  <label class="like-btn">
    <input type="checkbox" />
    <span class="heart">&#9829;</span>
  </label>

  <p>Works on cards too</p>

  <div style="background:#fff;border-radius:12px;padding:1.5rem 2rem;
              box-shadow:0 2px 12px rgba(0,0,0,0.1);
              display:flex;align-items:center;gap:1rem;">
    <span style="font-size:1rem;color:#333;">Beautiful sunset photo</span>
    <label class="like-btn">
      <input type="checkbox" />
      <span class="heart">&#9829;</span>
    </label>
  </div>

</body>
</html>
