<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Font Style Utilities</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 500px;
        margin: 2rem auto;
        padding: 1rem;
        background: #f8fafc;
        color: #1e293b;
      }
      h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
      p { color: #64748b; margin-bottom: 1.5rem; }
      .demo-grid { display: flex; gap: 1rem; flex-wrap: wrap; }
      .demo-card {
        flex: 1;
        min-width: 130px;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 1.5rem;
        text-align: center;
        font-size: 1.25rem;
      }
      .demo-card .class-name {
        display: block;
        margin-top: 0.5rem;
        font-size: 0.75rem;
        color: #6c63ff;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <h1>Font Style Utilities</h1>
    <p>Control the italicization of text.</p>
    <div class="demo-grid">
      <div class="demo-card font-italic">
        Italic<span class="class-name">.font-italic</span>
      </div>
      <div class="demo-card font-normal">
        Normal<span class="class-name">.font-normal</span>
      </div>
      <div class="demo-card font-oblique">
        Oblique<span class="class-name">.font-oblique</span>
      </div>
    </div>
  </body>
</html>
