<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-cursor — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      gap: 2.5rem;
      padding: 2rem;
    }
    h1 { color: #333; }
    .row { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .label { font-size: 0.75rem; color: #888; text-align: center; margin-bottom: 0.5rem; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .card {
      width: 160px;
      height: 90px;
      border-radius: 12px;
      background: white;
      border: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.85rem;
      color: #374151;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .chip {
      padding: 10px 20px;
      border-radius: 99px;
      background: #6366f1;
      color: #fff;
      font-weight: 600;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <h1>ease-cursor Demo</h1>

  <div class="section">
    <div class="label">Cursor type variants (hover each)</div>
    <div class="row">
      <div class="card ease-cursor-pointer">Pointer</div>
      <div class="card ease-cursor-crosshair">Crosshair</div>
      <div class="card ease-cursor-zoom-in">Zoom In</div>
      <div class="card ease-cursor-zoom-out">Zoom Out</div>
      <div class="card ease-cursor-grab">Grab</div>
      <div class="card ease-cursor-not-allowed">Not Allowed</div>
      <div class="card ease-cursor-wait">Wait</div>
      <div class="card ease-cursor-text">Text</div>
      <div class="card ease-cursor-none">None</div>
    </div>
  </div>

  <div class="section">
    <div class="label">Hover effect variants</div>
    <div class="row">
      <div class="card ease-cursor-grow">Grow</div>
      <div class="card ease-cursor-shrink">Shrink</div>
      <div class="card ease-cursor-grow-rotate">Grow + Rotate</div>
      <div class="card ease-cursor-lift">Lift</div>
    </div>
  </div>

  <div class="section">
    <div class="label">Press & drag effects</div>
    <div class="row">
      <div class="chip ease-cursor-press">Press me</div>
      <div class="card ease-cursor-drag">Drag me</div>
    </div>
  </div>

</body>
</html>
