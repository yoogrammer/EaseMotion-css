<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Timeline Component Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>EaseMotion Timeline</h1>

  <div class="ease-timeline">

    <div class="ease-timeline-item">
      <div class="ease-timeline-dot"></div>
      <div class="ease-timeline-line"></div>
      <div class="ease-timeline-card">
        <h3>v1.0 Released</h3>
        <p>Initial launch of EaseMotion CSS</p>
        <time>Jan 2025</time>
      </div>
    </div>

    <div class="ease-timeline-item">
      <div class="ease-timeline-dot"></div>
      <div class="ease-timeline-line"></div>
      <div class="ease-timeline-card">
        <h3>v2.0 Released</h3>
        <p>Added dark mode and new components</p>
        <time>Jun 2025</time>
      </div>
    </div>

    <div class="ease-timeline-item">
      <div class="ease-timeline-dot"></div>
      <div class="ease-timeline-line"></div>
      <div class="ease-timeline-card">
        <h3>GSSoC 2026</h3>
        <p>Open source contributions begin</p>
        <time>May 2026</time>
      </div>
    </div>

    <div class="ease-timeline-item">
      <div class="ease-timeline-dot"></div>
      <div class="ease-timeline-card">
        <h3>v3.0 Coming Soon</h3>
        <p>New animation utilities and components</p>
        <time>Aug 2026</time>
      </div>
    </div>

  </div>

</body>
</html>
