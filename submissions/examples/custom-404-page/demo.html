<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Custom 404 Page</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container ease-fade-in">

        <h1 class="ease-slide-up ease-delay-100">
            404
        </h1>

        <p class="ease-slide-up ease-delay-200">
            Page not found.
        </p>

        <p class="subtext ease-slide-up ease-delay-300">
            Oops! The page you're looking for doesn't exist
            or has been moved.
        </p>

        <a href="/EaseMotion-css/"
           class="ease-slide-up ease-delay-400">
            ← Back to Docs
        </a>

    </div>

</body>
</html>
