<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modal Slide Initial Opacity Fix</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-container">
    <h1>Modal Slide Entrance Fix</h1>
    <p>Hover/Focus or toggle active state. The slide transition starts fully transparent, removing sudden visual flashes.</p>
    <div class="modal-wrapper">
      <div class="modal-slide ease-modal-slide-fixed">
        <h3>Slide Modal</h3>
        <p>This modal slides in with a smooth opacity fade.</p>
      </div>
    </div>
  </main>
</body>
</html>
