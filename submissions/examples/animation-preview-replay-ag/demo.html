<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Animation Preview Replay - EaseMotion CSS</title>

    <!-- Link to EaseMotion CSS core -->
    <link rel="stylesheet" href="../../../core/animations.css" />
    <!-- Link to your CSS file -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Theme Toggle Button -->
    <button
      id="theme-toggle-btn"
      class="theme-toggle"
      aria-label="Toggle light or dark theme"
    >
      ☀️ <span>Light Mode</span>
    </button>

    <div class="dashboard">
      <div class="header">
        <h1>Animation Preview Replay</h1>
        <p>
          Click on any of the preview cards below to re-trigger and replay their
          animations
        </p>
      </div>

      <div class="preview-grid">
        <!-- Card 1: Fade In -->
        <div
          class="preview-card"
          data-anim="animate-fade"
          aria-label="Fade In Animation Card"
        >
          <div class="preview-box animate-fade">Fade In</div>
          <div class="card-title">Fade In</div>
          <div class="card-tip">Click to replay</div>
        </div>

        <!-- Card 2: Slide Up -->
        <div
          class="preview-card"
          data-anim="animate-slide"
          aria-label="Slide Up Animation Card"
        >
          <div class="preview-box animate-slide">Slide Up</div>
          <div class="card-title">Slide Up</div>
          <div class="card-tip">Click to replay</div>
        </div>

        <!-- Card 3: Scale Up -->
        <div
          class="preview-card"
          data-anim="animate-scale"
          aria-label="Scale Up Animation Card"
        >
          <div class="preview-box animate-scale">Scale Up</div>
          <div class="card-title">Scale Up</div>
          <div class="card-tip">Click to replay</div>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const cards = document.querySelectorAll(".preview-card");
        const themeToggleBtn = document.getElementById("theme-toggle-btn");

        // Click handler on the cards to trigger reflow & replay animations
        cards.forEach((card) => {
          card.addEventListener("click", () => {
            const previewBox = card.querySelector(".preview-box");
            const animClass = card.dataset.anim;

            // Remove the animation class
            previewBox.classList.remove(animClass);

            // Force layout reflow (recalculates elements offsets)
            void previewBox.offsetWidth;

            // Add the animation class back to start the animation again
            previewBox.classList.add(animClass);
          });
        });

        // Theme toggle listener (sets data-theme on root <html> tag)
        themeToggleBtn.addEventListener("click", () => {
          const currentTheme =
            document.documentElement.getAttribute("data-theme");
          const newTheme = currentTheme === "dark" ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", newTheme);

          if (newTheme === "dark") {
            themeToggleBtn.innerHTML = "☀️ <span>Light Mode</span>";
          } else {
            themeToggleBtn.innerHTML = "🌙 <span>Dark Mode</span>";
          }
        });
      });
    </script>
  </body>
</html>
