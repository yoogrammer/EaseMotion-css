
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compact Toolbar Search Box</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Compact Toolbar Search Box</h1>

  <div>
    <h2>Default Example</h2>

    <form class="csb-tool" role="search">
      <span class="csb-tool-chip" role="button" tabindex="0">
        All
      </span>

      <label class="csb-sr" for="csb-tool-i">
        Search
      </label>

      <input
        id="csb-tool-i"
        type="search"
        name="q"
        placeholder="Search..."
      />

      <button
        type="button"
        class="csb-tool-action"
        aria-label="Filters"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 6h18M7 12h10M11 18h2" />
        </svg>
      </button>
    </form>

  </div>

</body>
</html>
