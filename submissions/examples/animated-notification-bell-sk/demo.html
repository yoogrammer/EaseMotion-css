<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification Bell</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bell-container" id="bell">
    <a href="#bell" class="bell-link">
      <div class="bell-icon">
        <div class="bell-body"></div>
        <div class="bell-clapper"></div>
      </div>
      <span class="bell-badge">3</span>
    </a>
    <div class="bell-dropdown" id="notifications">
      <a href="#" class="close-btn">&times;</a>
      <div class="notif-item">
        <div class="notif-dot"></div>
        <div class="notif-text"><strong>Sarah</strong> liked your post</div>
      </div>
      <div class="notif-item">
        <div class="notif-dot"></div>
        <div class="notif-text"><strong>Mark</strong> commented on your photo</div>
      </div>
      <div class="notif-item">
        <div class="notif-dot"></div>
        <div class="notif-text"><strong>New</strong> follower: Alex K.</div>
      </div>
    </div>
  </div>
</body>
</html>
