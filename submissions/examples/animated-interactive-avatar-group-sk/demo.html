<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Interactive Avatar Group</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="avatar-group">
  <div class="avatar" style="--hue: 260; --delay: 0s;">
    <div class="avatar__circle">SK</div>
    <span class="avatar__name">Sarah Kim</span>
  </div>
  <div class="avatar" style="--hue: 190; --delay: 0.08s;">
    <div class="avatar__circle">AL</div>
    <span class="avatar__name">Alex Liu</span>
  </div>
  <div class="avatar" style="--hue: 330; --delay: 0.16s;">
    <div class="avatar__circle">MC</div>
    <span class="avatar__name">Maya Cruz</span>
  </div>
  <div class="avatar" style="--hue: 45; --delay: 0.24s;">
    <div class="avatar__circle">JO</div>
    <span class="avatar__name">Jordan Okafor</span>
  </div>
  <div class="avatar" style="--hue: 160; --delay: 0.32s;">
    <div class="avatar__circle">RP</div>
    <span class="avatar__name">Riley Park</span>
  </div>
</div>
</body>
</html>
