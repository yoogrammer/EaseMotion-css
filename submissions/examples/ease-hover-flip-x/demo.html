<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-hover-flip-x — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding: 2rem; background: #0f0f0f; color: #d1d5db; font-family: system-ui, sans-serif; max-width: 700px; margin: 0 auto; }
    h1 { color: #ffffff; font-size: 1.75rem; margin-bottom: 0.25rem; }
    p.subtitle { line-height: 1.7; margin-bottom: 2rem; color: #9ca3af; }
    section { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    h2 { color: #ffffff; font-size: 1.1rem; margin: 0 0 0.5rem; }
    .sec-desc { font-size: 0.85rem; color: #9ca3af; margin: 0 0 1rem; font-family: monospace; }
    code { background: #2a2a2a; padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>ease-hover-flip-x</h1>
  <p class="subtitle">Element flips over horizontal X axis on hover — pure CSS, no JavaScript.</p>

  <section>
    <h2>Flip Cards</h2>
    <p class="sec-desc">Hover to see the card flip on its X axis</p>
    <div class="flip-grid">
      <div class="flip-scene">
        <div class="flip-card flip-x">
          <div class="flip-front">Front</div>
          <div class="flip-back">Back</div>
        </div>
      </div>
      <div class="flip-scene">
        <div class="flip-card flip-x" style="--ease-flip-duration: 0.6s;">
          <div class="flip-front">Slower</div>
          <div class="flip-back flip-back-alt">Back</div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
