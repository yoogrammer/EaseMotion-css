<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Button Variant Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; background-color: #0f172a;">

    <div style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        
        <button class="ease-btn-magnetic-pn" data-strength="0.35">
            Hover Near Me ✨
        </button>

    </div>

    <script>
        document.querySelectorAll(".ease-btn-magnetic-pn").forEach((btn) => {
            
            btn.addEventListener("mousemove", (e) => {
                // Respect user's system settings for reduced motion
                if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;

                const rect = btn.getBoundingClientRect();
                
                // Find where the cursor is relative to the center of the button
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                
                // Pull power configuration
                const strength = btn.dataset.strength || 0.35;
                
                // Shift the button toward the cursor
                btn.style.transform = `translate(${x * strength}px, ${y * strength}px)`;
            });

            // Snap the button cleanly back to center when the cursor departs
            btn.addEventListener("mouseleave", () => {
                btn.style.transform = "translate(0px, 0px)";
            });
        });
    </script>
</body>
</html>
