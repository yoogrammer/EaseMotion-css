<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shimmer Skeleton Loading</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Shimmer Skeleton Loading</h1>
    <p class="subtitle">Animated gradient placeholders for content loading states</p>

    <!-- Text Lines Skeleton -->
    <div class="variant">
      <h3>Text Lines</h3>
      <div class="skeleton-card">
        <div class="skeleton skeleton--text skeleton--title"></div>
        <div class="skeleton skeleton--text"></div>
        <div class="skeleton skeleton--text"></div>
        <div class="skeleton skeleton--text skeleton--short"></div>
      </div>
    </div>

    <!-- Avatar + Text Skeleton -->
    <div class="variant">
      <h3>Avatar + Text</h3>
      <div class="skeleton-card">
        <div class="skeleton-row">
          <div class="skeleton skeleton--avatar"></div>
          <div class="skeleton-column">
            <div class="skeleton skeleton--text skeleton--title"></div>
            <div class="skeleton skeleton--text skeleton--short"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Card Skeleton -->
    <div class="variant">
      <h3>Content Card</h3>
      <div class="skeleton-card skeleton-card--fixed">
        <div class="skeleton skeleton--image"></div>
        <div class="skeleton-card__body">
          <div class="skeleton skeleton--text skeleton--title"></div>
          <div class="skeleton skeleton--text"></div>
          <div class="skeleton skeleton--text skeleton--short"></div>
        </div>
      </div>
    </div>

    <!-- Article Skeleton -->
    <div class="variant">
      <h3>Article Layout</h3>
      <div class="skeleton-article">
        <div class="skeleton skeleton--text skeleton--headline"></div>
        <div class="skeleton skeleton--image skeleton--banner"></div>
        <div class="skeleton skeleton--text"></div>
        <div class="skeleton skeleton--text"></div>
        <div class="skeleton skeleton--text"></div>
        <div class="skeleton skeleton--text skeleton--short"></div>
      </div>
    </div>

    <!-- Table Skeleton -->
    <div class="variant">
      <h3>Table Rows</h3>
      <div class="skeleton-table">
        <div class="skeleton-row skeleton-row--header">
          <div class="skeleton skeleton--cell"></div>
          <div class="skeleton skeleton--cell"></div>
          <div class="skeleton skeleton--cell"></div>
          <div class="skeleton skeleton--cell"></div>
        </div>
        <div class="skeleton-row">
          <div class="skeleton skeleton--cell"></div>
          <div class="skeleton skeleton--cell"></div>
          <div class="skeleton skeleton--cell"></div>
          <div class="skeleton skeleton--cell"></div>
        </div>
        <div class="skeleton-row">
          <div class="skeleton skeleton--cell"></div>
          <div class="skeleton skeleton--cell"></div>
          <div class="skeleton skeleton--cell"></div>
          <div class="skeleton skeleton--cell"></div>
        </div>
        <div class="skeleton-row">
          <div class="skeleton skeleton--cell"></div>
          <div class="skeleton skeleton--cell"></div>
          <div class="skeleton skeleton--cell"></div>
          <div class="skeleton skeleton--cell"></div>
        </div>
      </div>
    </div>

    <!-- Circle Variants -->
    <div class="variant">
      <h3>Circle Shapes</h3>
      <div class="skeleton-shapes">
        <div class="skeleton skeleton--circle skeleton--small"></div>
        <div class="skeleton skeleton--circle"></div>
        <div class="skeleton skeleton--circle skeleton--large"></div>
      </div>
    </div>
  </div>
</body>
</html>
