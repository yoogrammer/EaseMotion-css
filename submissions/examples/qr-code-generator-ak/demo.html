<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>QR Code Generator</h1>
    <div class="controls">
      <input type="text" id="textInput" placeholder="Enter text or URL..." value="https://opencode.ai">
      <select id="sizeSelect">
        <option value="11">Small</option>
        <option value="17" selected>Medium</option>
        <option value="23">Large</option>
      </select>
      <button id="generateBtn">Generate</button>
    </div>
    <canvas id="qrCanvas"></canvas>
  </div>

  <script>
    function generateQR(text, size) {
      const canvas = document.getElementById('qrCanvas');
      const ctx = canvas.getContext('2d');
      const cellSize = 12;
      const padding = 20;
      const dim = size * cellSize + padding * 2;
      canvas.width = dim;
      canvas.height = dim;

      ctx.fillStyle = '#0f0f0f';
      ctx.fillRect(0, 0, dim, dim);

      // Hash text into a deterministic binary matrix
      const matrix = [];
      let hash = 0;
      for (let i = 0; i < size; i++) {
        matrix[i] = [];
        for (let j = 0; j < size; j++) {
          const char = text[(i * size + j) % text.length];
          hash = ((hash << 5) - hash) + char.charCodeAt(0);
          hash = hash & hash;
          // Add position-based noise for uniqueness
          const val = (hash + i * 7 + j * 13 + text.length * 3) % 3 !== 0 ? 1 : 0;
          matrix[i][j] = val;
        }
      }

      // Draw finder patterns (top-left, top-right, bottom-left)
      function drawFinder(ox, oy) {
        ctx.fillStyle = '#fff';
        ctx.fillRect(ox - 1, oy - 1, cellSize * 7 + 2, cellSize * 7 + 2);
        ctx.fillStyle = '#6366f1';
        // Outer 7x7
        for (let r = 0; r < 7; r++) {
          for (let c = 0; c < 7; c++) {
            if (r === 0 || r === 6 || c === 0 || c === 6 ||
                (r >= 2 && r <= 4 && c >= 2 && c <= 4)) {
              ctx.fillRect(ox + c * cellSize, oy + r * cellSize, cellSize, cellSize);
            }
          }
        }
      }

      drawFinder(padding, padding);
      drawFinder(padding + (size - 7) * cellSize, padding);
      drawFinder(padding, padding + (size - 7) * cellSize);

      // Draw data cells
      for (let i = 0; i < size; i++) {
        for (let j = 0; j < size; j++) {
          // Skip finder pattern areas
          if ((i < 7 && j < 7) || (i < 7 && j >= size - 7) || (i >= size - 7 && j < 7)) continue;
          ctx.fillStyle = matrix[i][j] ? '#fff' : 'transparent';
          if (matrix[i][j]) {
            ctx.fillRect(padding + j * cellSize, padding + i * cellSize, cellSize - 1, cellSize - 1);
          }
        }
      }
    }

    document.getElementById('generateBtn').addEventListener('click', () => {
      const text = document.getElementById('textInput').value.trim();
      const size = parseInt(document.getElementById('sizeSelect').value);
      if (!text) return;
      generateQR(text, size);
    });

    // Initial generate
    document.getElementById('generateBtn').click();
  </script>
</body>
</html>
