<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Hero Split Layout</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="hero">
  <div class="hero__content">
    <h1 class="hero__heading">Craft experiences that <span>move</span></h1>
    <p class="hero__text">
      EaseMotion is a curated collection of pure-CSS animation patterns
      designed to bring elegance and delight to the modern web.
    </p>
    <a href="#" class="hero__cta">Explore patterns</a>
  </div>
  <div class="hero__art">
    <div class="hero__shape hero__shape--1"></div>
    <div class="hero__shape hero__shape--2"></div>
    <div class="hero__shape hero__shape--3"></div>
  </div>
</main>
</body>
</html>
