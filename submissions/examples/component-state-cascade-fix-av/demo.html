<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cascade State Fix Proposal</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; background: #f8fafc; color: #0f172a; }
    .container { margin-bottom: 2rem; padding: 2rem; background: white; border: 1px solid #e2e8f0; border-radius: 8px; }
    .custom-dark-theme .container { background: #1e293b; border-color: #334155; color: white; }
  </style>
</head>
<body class="custom-dark-theme">
  <div style="max-width: 800px; margin: 0 auto;">
    <h1>Cascade Refactor: Removing <code>!important</code></h1>
    <p>Because the toxic <code>!important</code> tags were completely ripped out from the framework's disabled state, the <code>.custom-dark-theme</code> wrapper correctly and cleanly overrides the button's disabled colors using natural CSS specificity.</p>

    <div class="container">
      <h2>Naturally Overridden Disabled Button</h2>
      <button class="ease-btn-demo" disabled>I am cleanly overridden by the dark theme!</button>
    </div>
  </div>
</body>
</html>
