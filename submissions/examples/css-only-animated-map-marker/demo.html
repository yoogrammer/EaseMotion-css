<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-only Animated Map Marker</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ease-marker-container">
    <div class="ease-marker-wrapper">
      <!-- Ground Shadow / Ripple -->
      <div class="ease-marker-shadow"></div>
      <div class="ease-marker-ripple"></div>
      
      <!-- Map Pin -->
      <div class="ease-marker-pin">
        <div class="ease-marker-dot"></div>
      </div>
      
      <!-- Tooltip -->
      <div class="ease-marker-tooltip">
        <h3>Eiffel Tower</h3>
        <p>Champ de Mars, Paris</p>
      </div>
    </div>
  </div>
</body>
</html>
