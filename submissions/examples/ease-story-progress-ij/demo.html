<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story Progress | EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sp-root">
    <h1>Story Progress</h1>
    <p class="sp-subtitle">Instagram-style progress bars with auto-advance</p>
    <div class="sp-story-card" id="storyCard">
      <div class="sp-bars" id="bars">
        <div class="sp-bar" data-index="0"><div class="sp-fill" id="fill0"></div></div>
        <div class="sp-bar" data-index="1"><div class="sp-fill" id="fill1"></div></div>
        <div class="sp-bar" data-index="2"><div class="sp-fill" id="fill2"></div></div>
        <div class="sp-bar" data-index="3"><div class="sp-fill" id="fill3"></div></div>
        <div class="sp-bar" data-index="4"><div class="sp-fill" id="fill4"></div></div>
      </div>
      <div class="sp-content" id="storyContent">
        <div class="sp-story-text" id="storyText">Exploring new horizons</div>
        <div class="sp-story-nav">
          <button id="prevStory" class="sp-nav-btn">&#8592;</button>
          <button id="nextStory" class="sp-nav-btn">&#8594;</button>
        </div>
      </div>
      <div class="sp-hint">Hover to pause &bull; Click arrows to skip</div>
    </div>
  </div>
  <script>
    const stories = [
      'Exploring new horizons',
      'Building awesome things',
      'Meeting amazing people',
      'Learning every day',
      'Making a difference'
    ];

    const fills = [
      document.getElementById('fill0'),
      document.getElementById('fill1'),
      document.getElementById('fill2'),
      document.getElementById('fill3'),
      document.getElementById('fill4')
    ];
    const bars = document.querySelectorAll('.sp-bar');
    const storyText = document.getElementById('storyText');
    const storyCard = document.getElementById('storyCard');
    const prevBtn = document.getElementById('prevStory');
    const nextBtn = document.getElementById('nextStory');

    let currentStory = 0;
    let active = true;
    let progress = 0;
    let animFrame = null;
    const DURATION = 3000;
    let lastTick = 0;

    function resetFills() {
      fills.forEach(f => { f.style.transition = 'none'; f.style.width = '0'; });
    }

    function resetActiveBar() {
      bars.forEach(b => b.classList.remove('sp-bar-active'));
      if (fills[currentStory]) {
        bars[currentStory].classList.add('sp-bar-active');
      }
    }

    function fillBar(index, instant) {
      const fill = fills[index];
      if (!fill) return;
      if (instant) {
        fill.style.transition = 'none';
        fill.style.width = '100%';
        return;
      }
      fill.style.transition = `width ${DURATION}ms linear`;
      fill.style.width = '100%';
    }

    function startAutoAdvance() {
      if (animFrame) cancelAnimationFrame(animFrame);
      progress = 0;
      lastTick = performance.now();
      const fill = fills[currentStory];
      if (fill) {
        fill.style.transition = 'none';
        fill.style.width = '0';
        fill.style.transition = `width ${DURATION}ms linear`;
        fill.style.width = '100%';
      }
      tick();
    }

    function tick() {
      if (!active) {
        animFrame = requestAnimationFrame(tick);
        return;
      }
      const now = performance.now();
      const dt = now - lastTick;
      lastTick = now;
      progress += dt;
      if (progress >= DURATION) {
        nextStoryFn();
        return;
      }
      animFrame = requestAnimationFrame(tick);
    }

    function nextStoryFn() {
      if (animFrame) cancelAnimationFrame(animFrame);
      currentStory = (currentStory + 1) % stories.length;
      showStory();
    }

    function prevStoryFn() {
      if (animFrame) cancelAnimationFrame(animFrame);
      currentStory = (currentStory - 1 + stories.length) % stories.length;
      showStory();
    }

    function showStory() {
      storyText.textContent = stories[currentStory];
      resetFills();
      resetActiveBar();
      startAutoAdvance();
    }

    storyCard.addEventListener('mouseenter', () => { active = false; });
    storyCard.addEventListener('mouseleave', () => {
      active = true;
      lastTick = performance.now();
    });

    prevBtn.addEventListener('click', (e) => { e.stopPropagation(); prevStoryFn(); });
    nextBtn.addEventListener('click', (e) => { e.stopPropagation(); nextStoryFn(); });

    resetActiveBar();
    showStory();
  </script>
</body>
</html>
