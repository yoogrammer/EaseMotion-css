<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-swing - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>ease-swing</h1>

  <div class="demo-row">
    <!-- One-shot swing (auto on load) -->
    <div class="demo-item">
      <span class="demo-label">ease-swing</span>
      <span id="bell-once" class="ease-swing demo-bell" title="Click to replay">&#128276;</span>
    </div>

    <!-- Looping swing -->
    <div class="demo-item">
      <span class="demo-label">ease-swing-loop</span>
      <span class="ease-swing-loop demo-bell">&#128276;</span>
    </div>

    <!-- Hover-triggered swing -->
    <div class="demo-item">
      <span class="demo-label">ease-hover-swing</span>
      <span class="ease-hover-swing demo-badge">Hover me</span>
    </div>
  </div>

  <p class="description">
    Three variants available: one-shot (<code>.ease-swing</code>), looping
    (<code>.ease-swing-loop</code>), and hover-triggered (<code>.ease-hover-swing</code>).<br>
    Set <code>transform-origin: top center</code> to simulate a hanging pivot point.
  </p>

  <script>
    // Allow replaying the one-shot swing on click
    const bellOnce = document.getElementById('bell-once');
    bellOnce.addEventListener('click', () => {
      bellOnce.classList.remove('ease-swing');
      void bellOnce.offsetWidth;
      bellOnce.classList.add('ease-swing');
    });
  </script>

</body>
</html>
