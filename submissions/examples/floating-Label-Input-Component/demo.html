<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float Label Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Float Label Input</h1>

    <div class="float-field">
        <input
            type="text"
            id="name"
            placeholder=" "
            required
        >
        <label for="name">Full Name</label>
    </div>

    <div class="float-field">
        <input
            type="email"
            id="email"
            placeholder=" "
            required
        >
        <label for="email">Email Address</label>
    </div>

</div>

</body>
</html>
