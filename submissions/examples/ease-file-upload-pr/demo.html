<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-file-upload-pr Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 4rem 2rem;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }
    
    .demo-section h2 {
      text-align: center;
      margin-bottom: 2rem;
      color: #1e293b;
    }
  </style>
</head>
<body>

  <div class="demo-section">
    <h2>Default Upload Zone</h2>
    <div class="upload-pr" id="uploadZone1" ondragover="handleDragOver(event, this)" ondragleave="handleDragLeave(event, this)" ondrop="handleDrop(event, this)">
      <svg class="upload-pr-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
      </svg>
      <div class="upload-pr-title">Drop files here</div>
      <div class="upload-pr-subtitle">or click to browse from your computer</div>
      <span class="upload-pr-btn">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
        </svg>
        Choose Files
      </span>
    </div>
  </div>

  <div class="demo-section">
    <h2>With File List</h2>
    <div class="upload-pr" id="uploadZone2" ondragover="handleDragOver(event, this)" ondragleave="handleDragLeave(event, this)" ondrop="handleDrop(event, this)">
      <svg class="upload-pr-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
      </svg>
      <div class="upload-pr-title">Upload Documents</div>
      <div class="upload-pr-subtitle">PDF, PNG, JPG up to 10MB each</div>
      <span class="upload-pr-btn">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
        </svg>
        Add Files
      </span>
      
      <div class="upload-pr-list">
        <div class="upload-pr-file">
          <div class="upload-pr-file-icon">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
          </div>
          <div class="upload-pr-file-info">
            <div class="upload-pr-file-name">project-proposal.pdf</div>
            <div class="upload-pr-file-size">2.4 MB</div>
            <div class="upload-pr-file-progress">
              <div class="upload-pr-file-progress-bar" style="width: 75%;"></div>
            </div>
          </div>
          <button class="upload-pr-file-remove" aria-label="Remove file">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
        
        <div class="upload-pr-file">
          <div class="upload-pr-file-icon" style="background: #dcfce7; color: #22c55e;">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
          </div>
          <div class="upload-pr-file-info">
            <div class="upload-pr-file-name">design-mockup.png</div>
            <div class="upload-pr-file-size">4.8 MB</div>
            <div class="upload-pr-file-progress">
              <div class="upload-pr-file-progress-bar" style="width: 100%;"></div>
            </div>
          </div>
          <button class="upload-pr-file-remove" aria-label="Remove file">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <h2>Compact Variant</h2>
    <div class="upload-pr upload-pr-compact" id="uploadZone3" ondragover="handleDragOver(event, this)" ondragleave="handleDragLeave(event, this)" ondrop="handleDrop(event, this)">
      <svg class="upload-pr-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
      </svg>
      <div class="upload-pr-title">Quick Upload</div>
      <div class="upload-pr-subtitle">Drag files or click to browse</div>
    </div>
  </div>

  <script>
    function handleDragOver(e, element) {
      e.preventDefault();
      element.classList.add('upload-pr-dragover');
    }
    
    function handleDragLeave(e, element) {
      e.preventDefault();
      element.classList.remove('upload-pr-dragover');
    }
    
    function handleDrop(e, element) {
      e.preventDefault();
      element.classList.remove('upload-pr-dragover');
    }
  </script>

</body>
</html>
