<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shimmer Scan Effect</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="shimmer-card">
    <div class="shimmer-card-image shimmer-loading"></div>
    <div class="shimmer-card-body">
      <div class="shimmer-line shimmer-loading" style="width: 70%"></div>
      <div class="shimmer-line shimmer-loading" style="width: 100%"></div>
      <div class="shimmer-line shimmer-loading" style="width: 45%"></div>
    </div>
  </div>

  <div class="shimmer-card shimmer-dark">
    <div class="shimmer-card-image shimmer-loading"></div>
    <div class="shimmer-card-body">
      <div class="shimmer-line shimmer-loading" style="width: 80%"></div>
      <div class="shimmer-line shimmer-loading" style="width: 100%"></div>
      <div class="shimmer-line shimmer-loading" style="width: 60%"></div>
    </div>
  </div>
</body>
</html>
