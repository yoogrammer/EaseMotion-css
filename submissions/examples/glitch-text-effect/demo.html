<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Glitch Text Effect</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            background: #0d0d14;
            color: #e4e4e7;
        }
        .demo-header { text-align: center; margin-bottom: 3rem; }
        .demo-header h1 { font-size: 2.5rem; background: linear-gradient(135deg, #6c63ff, #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .demo-section { background: #1a1a2e; border-radius: 1rem; padding: 2rem; margin-bottom: 2rem; text-align: center; }
        .demo-section h3 { color: #c4b5fd; margin-top: 0; }
        .note { background: #1a1a2e; padding: 1rem; border-radius: 12px; border-left: 3px solid #6c63ff; margin: 2rem 0; font-size: 0.875rem; text-align: center; }
        code { background: #1e1e2e; padding: 0.2rem 0.4rem; border-radius: 6px; }
        .demo-row { margin: 2rem 0; }
    </style>
</head>
<body>

<div class="demo-header">
    <h1>Glitch Text Effect</h1>
    <p>Cyberpunk-style glitching text animation</p>
</div>

<div class="demo-section">
    <h3>Default Glitch</h3>
    <h1 class="ease-glitch-text">GLITCH</h1>
</div>

<div class="demo-section">
    <h3>Fast Glitch</h3>
    <h1 class="ease-glitch-text ease-glitch-fast">FAST</h1>
</div>

<div class="demo-section">
    <h3>Slow Glitch</h3>
    <h1 class="ease-glitch-text ease-glitch-slow">SLOW</h1>
</div>

<div class="demo-section">
    <h3>Intense Glitch</h3>
    <h1 class="ease-glitch-text ease-glitch-intense">INTENSE</h1>
</div>

<div class="demo-section">
    <h3>Subtle Glitch</h3>
    <h1 class="ease-glitch-text ease-glitch-subtle">SUBTLE</h1>
</div>

<div class="demo-section">
    <h3>Neon Glitch</h3>
    <h1 class="ease-glitch-text ease-glitch-neon">NEON</h1>
</div>

<div class="demo-section">
    <h3>Hover Glitch</h3>
    <h1 class="ease-glitch-hover">HOVER ME</h1>
</div>

<div class="note">
    💡 The text creates a glitch effect using pseudo-elements with offset positioning.
</div>

</body>
</html>
