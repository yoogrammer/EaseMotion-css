<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Confetti Rain Burst Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="demo-canvas">
        <button class="trigger-action-btn" onclick="executeConfettiBurst()">🎉 Celebrate!</button>
    </div>

    <div id="confetti-render-viewport" class="confetti-viewport-shield"></div>

    <script>
        function executeConfettiBurst() {
            const frame = document.getElementById('confetti-render-viewport');
            const structuralVariants = ['variant-square', 'variant-rectangle', 'variant-circle', 'variant-ribbon'];
            const colorPalette = ['#f472b6', '#38bdf8', '#34d399', '#fbbf24', '#a78bfa', '#f87171'];
            
            for (let i = 0; i < 70; i++) {
                const element = document.createElement('div');
                
                const shape = structuralVariants[Math.floor(Math.random() * structuralVariants.length)];
                element.className = `particle-node ${shape}`;
                
                const scale = Math.floor(Math.random() * 12) + 8 + 'px';
                const xOrigin = Math.random() * 100 + 'vw';
                const xTravel = (Math.random() * 40 - 20) + 'vw';
                const timeSpan = (Math.random() * 2.2) + 1.8 + 's';
                const timeDelay = (Math.random() * 0.35) + 's';
                const hexColor = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                const degStart = Math.random() * 360 + 'deg';
                const degEnd = (Math.random() * 720 + 360) + 'deg';
                const opacityWeight = (Math.random() * 0.35) + 0.65;

                element.style.setProperty('--particle-size', scale);
                element.style.setProperty('--x-start', xOrigin);
                element.style.setProperty('--x-drift', xTravel);
                element.style.setProperty('--duration', timeSpan);
                element.style.setProperty('--delay', timeDelay);
                element.style.setProperty('--color-hex', hexColor);
                element.style.setProperty('--angle-start', degStart);
                element.style.setProperty('--angle-end', degEnd);
                element.style.setProperty('--alpha-weight', opacityWeight);

                frame.appendChild(element);

                setTimeout(() => { element.remove(); }, 4000);
            }
        }
    </script>
</body>
</html>
