<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery Lightbox Overlay</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc; gap: 1rem; flex-wrap: wrap; padding: 1rem;">
    <div class="gallery-thumb" style="background: linear-gradient(135deg, #6366f1, #a855f7);" data-img="0">Image 1</div>
    <div class="gallery-thumb" style="background: linear-gradient(135deg, #f59e0b, #f97316);" data-img="1">Image 2</div>
    <div class="gallery-thumb" style="background: linear-gradient(135deg, #22c55e, #14b8a6);" data-img="2">Image 3</div>
    <div class="gallery-thumb" style="background: linear-gradient(135deg, #ec4899, #8b5cf6);" data-img="3">Image 4</div>
  </div>
  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lightboxClose">✕</span>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">‹</button>
    <div class="lightbox-img" id="lightboxImg"></div>
    <button class="lightbox-nav lightbox-next" id="lightboxNext">›</button>
    <p class="lightbox-caption" id="lightboxCaption"></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
