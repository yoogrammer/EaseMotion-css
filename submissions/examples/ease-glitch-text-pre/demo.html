<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Glitch Text Hover Effect</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="section">
    <h2>Glitch Heading — Hover me</h2>
    <h1 class="glitch-heading" data-text="GLITCH">
      GLITCH
    </h1>
  </div>

  <div class="section">
    <h2>Glitch Buttons</h2>
    <button class="glitch-btn" data-text="LAUNCH">
      LAUNCH
    </button>
    <button class="glitch-btn" data-text="EXPLORE"
      style="border-color:#10b981; color:#10b981;">
      EXPLORE
    </button>
    <button class="glitch-btn" data-text="CONNECT"
      style="border-color:#ec4899; color:#ec4899;">
      CONNECT
    </button>
  </div>

  <div class="section">
    <h2>Glitch Links</h2>
    <a class="glitch-link" data-text="Portfolio" href="#">Portfolio</a>
    <a class="glitch-link" data-text="Projects" href="#">Projects</a>
    <a class="glitch-link" data-text="Contact" href="#">Contact</a>
  </div>

  <div class="section">
    <h2>Base Usage (from issue)</h2>
    <h1 class="glitch-text"
      style="font-size:36px; color:#f0f0f0; letter-spacing:3px;"
      data-text="GLITCH">
      GLITCH
    </h1>
  </div>

</body>
</html>
