<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Accordion Slide PR</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <p class="eyebrow">CSS menu motion</p>
    <h1>Ease Accordion Slide</h1>
    <section class="accordion" aria-label="Accordion slide demo">
      <details open>
        <summary>Project setup</summary>
        <p>Slide content open with grid-row animation and no JavaScript.</p>
      </details>
      <details>
        <summary>Motion tokens</summary>
        <p>Use a smooth ease curve and clipped content for stable height changes.</p>
      </details>
      <details>
        <summary>Accessibility</summary>
        <p>Native details keeps keyboard interaction and semantics intact.</p>
      </details>
    </section>
  </main>
</body>
</html>
