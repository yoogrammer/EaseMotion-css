<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-accent-color-za — accent-color utilities</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div data-ease-demo-za>
      <h1>ease-accent-color utilities</h1>
      <p>Theme form controls with brand accent colors.</p>

      <div class="card-za">
        <h2>ease-accent-primary-za</h2>
        <label
          ><input type="checkbox" class="ease-accent-primary-za" checked />
          Checkbox</label
        >
        <label
          ><input
            type="radio"
            name="a"
            class="ease-accent-primary-za"
            checked
          />
          Radio</label
        >
        <input type="range" class="ease-accent-primary-za" />
      </div>

      <div class="card-za">
        <h2>ease-accent-success-za</h2>
        <label
          ><input type="checkbox" class="ease-accent-success-za" checked />
          Checkbox</label
        >
        <label
          ><input
            type="radio"
            name="b"
            class="ease-accent-success-za"
            checked
          />
          Radio</label
        >
        <input type="range" class="ease-accent-success-za" />
      </div>

      <div class="card-za">
        <h2>ease-accent-danger-za</h2>
        <label
          ><input type="checkbox" class="ease-accent-danger-za" checked />
          Checkbox</label
        >
        <label
          ><input type="radio" name="c" class="ease-accent-danger-za" checked />
          Radio</label
        >
        <input type="range" class="ease-accent-danger-za" />
      </div>

      <div class="card-za">
        <h2>ease-accent-auto-za</h2>
        <label
          ><input type="checkbox" class="ease-accent-auto-za" checked />
          Checkbox</label
        >
        <label
          ><input type="radio" name="d" class="ease-accent-auto-za" checked />
          Radio</label
        >
        <input type="range" class="ease-accent-auto-za" />
      </div>
    </div>
  </body>
</html>
