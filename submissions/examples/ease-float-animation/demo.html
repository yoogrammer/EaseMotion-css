<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Float Animation Demo</title>
  <!-- Load EaseMotion CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css@latest/dist/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      margin: 0;
      color: white;
    }
    .container {
      text-align: center;
    }
    .floating-badge {
      display: inline-block;
      padding: 1rem 2rem;
      font-size: 1.5rem;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 9999px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.3);
      cursor: default;
    }
    .description {
      margin-top: 3rem;
      font-size: 1.1rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="floating-badge ease-float">
      ☁️ I'm floating gently...
    </div>
    
    <div class="description">
      The <code>ease-float</code> animation is perfect for hero images, badges, and call-to-actions.
    </div>
  </div>

</body>
</html>
