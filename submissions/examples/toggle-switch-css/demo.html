<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>toggle-switch-css</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Pure CSS Toggle Switches</h1>
    <p>Checkbox-driven &mdash; zero JavaScript</p>
  </header>

  <main>
    <section class="toggle-group">
      <h2>Color variants</h2>

      <label class="toggle" style="--toggle-color: #3b82f6">
        <input type="checkbox" checked>
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
        <span class="toggle-label">Blue (default)</span>
      </label>

      <label class="toggle" style="--toggle-color: #22c55e">
        <input type="checkbox">
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
        <span class="toggle-label">Green</span>
      </label>

      <label class="toggle" style="--toggle-color: #ef4444">
        <input type="checkbox" checked>
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
        <span class="toggle-label">Red</span>
      </label>

      <label class="toggle" style="--toggle-color: #a855f7">
        <input type="checkbox">
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
        <span class="toggle-label">Purple</span>
      </label>

      <label class="toggle" style="--toggle-color: #eab308">
        <input type="checkbox" checked>
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
        <span class="toggle-label">Amber</span>
      </label>
    </section>

    <section class="toggle-group sizes">
      <h2>Sizes</h2>

      <label class="toggle toggle-sm" style="--toggle-color: #3b82f6">
        <input type="checkbox" checked>
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
        <span class="toggle-label">Small</span>
      </label>

      <label class="toggle toggle-lg" style="--toggle-color: #3b82f6">
        <input type="checkbox">
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
        <span class="toggle-label">Large</span>
      </label>
    </section>
  </main>

  <footer>
    <p>CSS toggle-switch-css example &mdash; EaseMotion</p>
  </footer>
</body>
</html>
