<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Magnetic Feedback Buttons - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-container">
    <header class="demo-header">
      <h1>Magnetic Interaction</h1>
      <p>Premium, hardware-accelerated micro-interactions using pure CSS layouts.</p>
    </header>

    <main class="demo-grid">
      <div class="ease-magnetic-wrapper">
        <button class="ease-magnetic-btn ease-btn-primary">
          <span class="ease-btn-text">Explore Motion</span>
          <span class="ease-btn-glow"></span>
        </button>
      </div>

      <div class="ease-magnetic-wrapper">
        <button class="ease-magnetic-btn ease-btn-secondary">
          <span class="ease-btn-text">View Documentation</span>
          <span class="ease-btn-glow"></span>
        </button>
      </div>

      <div class="ease-magnetic-wrapper">
        <button class="ease-magnetic-btn ease-btn-outline">
          <span class="ease-btn-text">Get Started →</span>
          <span class="ease-btn-glow"></span>
        </button>
      </div>
    </main>
  </div>

</body>
</html>
