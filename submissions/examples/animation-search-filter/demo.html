<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Search & Filter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="container">

    <h1>EaseMotion Animation Library</h1>

    <!-- Search Bar -->
    <input type="text" id="searchInput" placeholder="Search animations..." />

    <!-- Filter Buttons -->
    <div class="filters">
      <button onclick="filterAnimations('all')">All</button>
      <button onclick="filterAnimations('fade')">Fade</button>
      <button onclick="filterAnimations('slide')">Slide</button>
      <button onclick="filterAnimations('scale')">Scale</button>
      <button onclick="filterAnimations('rotate')">Rotate</button>
      <button onclick="filterAnimations('entrance')">Entrance</button>
      <button onclick="filterAnimations('exit')">Exit</button>
    </div>

    <!-- Animation Grid -->
    <div class="grid">

      <div class="card fade">Fade In</div>
      <div class="card slide">Slide Left</div>
      <div class="card scale">Scale Up</div>
      <div class="card rotate">Rotate</div>
      <div class="card entrance">Entrance</div>
      <div class="card exit">Exit</div>

    </div>

  </section>

<script>
const searchInput = document.getElementById("searchInput");
const cards = document.querySelectorAll(".card");

// Search functionality
searchInput.addEventListener("input", function () {
  const value = this.value.toLowerCase();

  cards.forEach(card => {
    card.style.display =
      card.textContent.toLowerCase().includes(value)
        ? "block"
        : "none";
  });
});

// Filter functionality
function filterAnimations(type) {
  cards.forEach(card => {
    if (type === "all") {
      card.style.display = "block";
    } else {
      card.style.display = card.classList.contains(type)
        ? "block"
        : "none";
    }
  });
}
</script>

</body>
</html>
