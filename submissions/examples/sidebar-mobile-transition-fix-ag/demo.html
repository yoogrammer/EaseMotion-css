<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sidebar Mobile Transition Fix</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-sidebar-layout-fixed" id="layout">
    <aside class="sidebar ease-sidebar-fixed" id="sidebar">
      <h2>Sidebar</h2>
      <button onclick="toggleSidebar()">Close Menu</button>
    </aside>
    <main class="main">
      <h1>Sidebar Mobile Transition Fix</h1>
      <button onclick="toggleSidebar()">Toggle Mobile Sidebar</button>
    </main>
  </div>
  <script>
    function toggleSidebar() {
      document.getElementById('layout').classList.toggle('open');
    }
  </script>
</body>
</html>
