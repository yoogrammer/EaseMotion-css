<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Content Visibility Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CSS Content Visibility Lazy Render Example</h1>

    <div class="section">
        <h2>Section 1</h2>
        <p>This section loads normally.</p>
    </div>

    <div class="lazy-section">
        <h2>Section 2</h2>
        <p>This section uses content-visibility for lazy rendering.</p>
    </div>

    <div class="lazy-section">
        <h2>Section 3</h2>
        <p>Scroll down to trigger rendering.</p>
    </div>

    <div class="lazy-section">
        <h2>Section 4</h2>
        <p>Improves performance for large pages.</p>
    </div>

</body>
</html>
