<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero CTA Button | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>🚀 Hero CTA Button</h1>
    <p class="subtitle">A call-to-action button with a pulsing attract ring</p>

    <div class="demo-area">
      <a href="#" class="cta-button"
         style="--btn-bg: #8b5cf6; --btn-color: #ffffff; --pulse-color: rgba(139, 92, 246, 0.5); --pulse-duration: 2s;">
        <span class="btn-text">Get Started</span>
        <span class="btn-arrow">→</span>
      </a>
    </div>

    <div class="controls">
      <label>Button Color <input type="color" id="bgPicker" value="#8b5cf6"></label>
      <label>Text Color <input type="color" id="textPicker" value="#ffffff"></label>
      <label>Pulse Color <input type="color" id="pulsePicker" value="#8b5cf6"></label>
      <label>Pulse Duration <input type="range" id="durationRange" min="0.5" max="4" step="0.25" value="2"></label>
    </div>
  </div>

  <script>
    const btn = document.querySelector('.cta-button');
    const bg = document.getElementById('bgPicker');
    const text = document.getElementById('textPicker');
    const pulse = document.getElementById('pulsePicker');
    const duration = document.getElementById('durationRange');

    function update() {
      btn.style.setProperty('--btn-bg', bg.value);
      btn.style.setProperty('--btn-color', text.value);
      btn.style.setProperty('--pulse-color', hexToRgba(pulse.value, 0.5));
      btn.style.setProperty('--pulse-duration', duration.value + 's');
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    bg.addEventListener('input', update);
    text.addEventListener('input', update);
    pulse.addEventListener('input', update);
    duration.addEventListener('input', update);
  </script>
</body>
</html>
