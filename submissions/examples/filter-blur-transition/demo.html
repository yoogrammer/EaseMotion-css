<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filter Blur Transition - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Filter Blur Transition</h1>
    <div class="blur-gallery">
      <div class="filter-card">
        <div class="filter-image" style="background: linear-gradient(135deg, #6366f1, #8b5cf6)"></div>
        <span>Hover to unblur</span>
      </div>
      <div class="filter-card">
        <div class="filter-image filter-blur-heavy" style="background: linear-gradient(135deg, #ec4899, #f43f5e)"></div>
        <span>Heavy blur</span>
      </div>
      <div class="filter-card">
        <div class="filter-image filter-blur-load" style="background: linear-gradient(135deg, #10b981, #34d399)"></div>
        <span>Loading style</span>
      </div>
    </div>
    <p class="description">Images transition between blurred and clear states using CSS filter: blur().</p>
  </div>
</body>
</html>
