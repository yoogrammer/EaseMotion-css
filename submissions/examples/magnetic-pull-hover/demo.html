<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Pull Hover Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-container">
    <header class="demo-header">
      <h1>Magnetic Pull Hover Interaction</h1>
      <p>Move your cursor near the elements below to experience the subtle magnetic attraction.</p>
    </header>

    <div class="interactive-grid">
      <!-- Standard Strength Magnetic Box -->
      <div class="magnetic-wrapper">
        <div class="magnetic-target" style="--ease-magnetic-strength: 0.35;">
          <span class="target-content">Pull Me</span>
        </div>
      </div>

      <!-- High Strength Magnetic Box -->
      <div class="magnetic-wrapper">
        <div class="magnetic-target" style="--ease-magnetic-strength: 0.65;">
          <span class="target-content">Strong Pull</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Set up a proximity range threshold in pixels (e.g., 250px around the element)
    const PROXIMITY_RANGE = 250;

    document.querySelectorAll('.magnetic-target').forEach(element => {
      // Track globally or on a parent container to catch the cursor when "nearby"
      window.addEventListener('mousemove', (e) => {
        const rect = element.getBoundingClientRect();

        // Find the absolute static center of the item on screen
        // We calculate this relative to the window scroll to keep coordinates pure
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        // Calculate raw geometric distances from cursor to object center
        const deltaX = e.clientX - centerX;
        const deltaY = e.clientY - centerY;

        // Pythagorean theorem to find absolute distance vector line length
        const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

        // If the cursor is within our nearby range threshold aura
        if (distance < PROXIMITY_RANGE) {
          // Calculate an easing fade-off multiplier so the pull gets stronger the closer the mouse gets
          const proximityIntensity = (1 - distance / PROXIMITY_RANGE); 

          // Inject variables with proximity intensity mapped cleanly
          element.style.setProperty('--ease-mx', `${deltaX * proximityIntensity}px`);
          element.style.setProperty('--ease-my', `${deltaY * proximityIntensity}px`);
        } else {
          // Out of range? Smoothly snap back to center positions
          element.style.setProperty('--ease-mx', '0px');
          element.style.setProperty('--ease-my', '0px');
        }
      });

      // Clear layout vectors safely if the user changes tabs or leaves the window focus area
      document.addEventListener('mouseleave', () => {
        element.style.setProperty('--ease-mx', '0px');
        element.style.setProperty('--ease-my', '0px');
      });
    });
  </script>
</body>
</html>
