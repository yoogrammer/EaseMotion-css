<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Wave Divider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero">
        <h1>Animated Wave Divider</h1>
        <p>A CSS-only section transition effect for modern websites.</p>
    </section>

    <div class="wave-divider">
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
    </div>

    <section class="content">
        <h2>Next Section</h2>
        <p>
            This demonstrates how the animated wave divider creates a smooth
            transition between two sections without using JavaScript.
        </p>
    </section>

</body>
</html>
