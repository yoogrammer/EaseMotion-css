<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Progress Bar Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>Determinate Progress Bars</h2>

  <div class="ease-progress" role="progressbar" aria-valuenow="30" aria-valuemin="0" aria-valuemax="100">
    <div class="ease-progress-bar" style="width: 30%;"></div>
  </div>

  <div class="ease-progress" role="progressbar" aria-valuenow="65" aria-valuemin="0" aria-valuemax="100">
    <div class="ease-progress-bar ease-progress-bar-success" style="width: 65%;"></div>
  </div>

  <div class="ease-progress" role="progressbar" aria-valuenow="90" aria-valuemin="0" aria-valuemax="100">
    <div class="ease-progress-bar ease-progress-bar-danger" style="width: 90%;"></div>
  </div>

  <h2>Indeterminate (Loading)</h2>

  <div class="ease-progress" role="progressbar">
    <div class="ease-progress-bar ease-progress-indeterminate"></div>
  </div>

</body>
</html>
