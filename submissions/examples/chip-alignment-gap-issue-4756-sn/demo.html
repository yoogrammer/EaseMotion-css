<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chip Alignment and Spacing Demo</title>
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../components/chip.css">
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      font-family: sans-serif;
      padding: 3rem;
      max-width: 600px;
      margin: 0 auto;
    }
    .demo-container {
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <h1>Chip Alignment and Spacing Demo</h1>
  <p>This demo verifies that unchecked chips have perfectly centered text (without extra padding offset on the left). Clicking a chip should display the checkmark icon and shift the text right by exactly the specified margin.</p>

  <div class="demo-container">
    <div class="ease-chip-group">
      <input type="checkbox" id="chip1">
      <label for="chip1" class="ease-chip">Design</label>

      <input type="checkbox" id="chip2">
      <label for="chip2" class="ease-chip">Development</label>

      <input type="checkbox" id="chip3">
      <label for="chip3" class="ease-chip">Marketing</label>
    </div>
  </div>
</body>
</html>
