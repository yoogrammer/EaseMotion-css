<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Radio Button Set</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<form class="radio-group">
  <h2>Choose a plan</h2>

  <label class="radio-option">
    <input type="radio" name="plan" value="basic" checked>
    <span class="radio-indicator"></span>
    <span class="radio-label">Basic</span>
    <span class="radio-desc">Essential features for personal projects</span>
  </label>

  <label class="radio-option">
    <input type="radio" name="plan" value="pro">
    <span class="radio-indicator"></span>
    <span class="radio-label">Pro</span>
    <span class="radio-desc">Advanced tools for professionals</span>
  </label>

  <label class="radio-option">
    <input type="radio" name="plan" value="team">
    <span class="radio-indicator"></span>
    <span class="radio-label">Team</span>
    <span class="radio-desc">Collaboration features for groups</span>
  </label>

  <label class="radio-option">
    <input type="radio" name="plan" value="enterprise">
    <span class="radio-indicator"></span>
    <span class="radio-label">Enterprise</span>
    <span class="radio-desc">Custom solutions for organizations</span>
  </label>
</form>

</body>
</html>
