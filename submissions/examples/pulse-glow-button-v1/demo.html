<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora Pulse Glow Button</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <header class="hero">
      <h1>Aurora Pulse Glow Button</h1>
      <p>
        Lightweight pulse glow hover effects built with pure CSS.
      </p>
    </header>

    <section class="section">

      <h2>Color Variants</h2>

      <div class="button-grid">

        <button class="ease-hover-pulse-glow">
          Primary Glow
        </button>

        <button class="ease-hover-pulse-glow glow-purple">
          Purple Glow
        </button>

        <button class="ease-hover-pulse-glow glow-green">
          Success Glow
        </button>

        <button class="ease-hover-pulse-glow glow-pink">
          Pink Glow
        </button>

      </div>

    </section>

    <section class="section">

      <h2>Size Variants</h2>

      <div class="button-grid">

        <button class="ease-hover-pulse-glow btn-small">
          Small
        </button>

        <button class="ease-hover-pulse-glow">
          Default
        </button>

        <button class="ease-hover-pulse-glow btn-large">
          Large Button
        </button>

      </div>

    </section>

    <section class="section">

      <h2>CTA Showcase</h2>

      <div class="cta-card">

        <h3>Launch Your Next Project</h3>

        <p>
          Build beautiful interfaces using reusable animation-first components.
        </p>

        <button class="ease-hover-pulse-glow glow-purple btn-large">
          Get Started
        </button>

      </div>

    </section>

  </main>

</body>
</html>
