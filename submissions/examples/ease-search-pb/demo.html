<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Search Input Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">
    <div class="demo-section">
      <h3>Example 1: Navbar Layout (Compact & Expandable)</h3>
      <nav class="mock-navbar">
        <div class="logo">Brand</div>
        <div class="ease-search-wrapper compact">
          <span class="search-icon">🔍</span>
          <input type="text" class="ease-search-input" placeholder="Search tabs..." required>
          <button type="reset" class="clear-btn">✕</button>
        </div>
      </nav>
    </div>

    <div class="demo-section">
      <h3>Example 2: Page Content Layout (Default Variant)</h3>
      <div class="ease-search-wrapper default">
        <span class="search-icon">🔍</span>
        <input type="text" class="ease-search-input" placeholder="Search articles, documentation, tutorials..." required>
        <button type="reset" class="clear-btn">✕</button>
      </div>
    </div>
  </div>

</body>
</html>
