<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subgrid Layout Demo - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Subgrid Layout Demo</h1>
    <div class="parent-grid">
      <div class="grid-card">
        <div class="card-header">Feature A</div>
        <div class="card-body">Description with varying content that aligns via subgrid.</div>
        <div class="card-footer">Read more</div>
      </div>
      <div class="grid-card">
        <div class="card-header">Feature B</div>
        <div class="card-body">Short.</div>
        <div class="card-footer">Read more</div>
      </div>
      <div class="grid-card">
        <div class="card-header">Feature C</div>
        <div class="card-body">Longer description that would break alignment without subgrid.</div>
        <div class="card-footer">Read more</div>
      </div>
    </div>
    <p class="description">CSS subgrid aligns header/body/footer across cards with different content lengths.</p>
  </div>
</body>
</html>
