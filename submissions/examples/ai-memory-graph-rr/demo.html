<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Memory Graph Explorer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>AI Memory Graph Explorer</h1>
        <p>Visualize relationships between stored memories and contextual knowledge.</p>
    </div>

    <div class="graph">

        <div class="memory-node center">
            AI Memory
        </div>

        <div class="memory-node top">
            Preferences
        </div>

        <div class="memory-node right">
            Knowledge Base
        </div>

        <div class="memory-node bottom">
            Previous Tasks
        </div>

        <div class="memory-node left">
            Conversations
        </div>

        <div class="memory-node top-right">
            Saved Context
        </div>

        <div class="memory-node bottom-left">
            Retrieved Facts
        </div>

        <div class="line vertical"></div>
        <div class="line horizontal"></div>
        <div class="line diagonal-one"></div>
        <div class="line diagonal-two"></div>

    </div>

</div>

</body>
</html>
