<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Nunito Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="oauth-stack">
      <button class="oauth-btn google">
        <i class="fa-brands fa-google"></i>
        <span>Continue with Google</span>
      </button>

      <button class="oauth-btn github">
        <i class="fa-brands fa-github"></i>
        <span>Continue with GitHub</span>
      </button>

      <button class="oauth-btn microsoft">
        <i class="fa-brands fa-microsoft"></i>
        <span>Continue with Microsoft</span>
      </button>

      <button class="oauth-btn discord">
        <i class="fa-brands fa-discord"></i>
        <span>Continue with Discord</span>
      </button>

      <button class="oauth-btn apple">
        <i class="fa-brands fa-apple"></i>
        <span>Continue with Apple</span>
      </button>

      <button class="oauth-btn linkedin">
        <i class="fa-brands fa-linkedin"></i>
        <span>Continue with LinkedIn</span>
      </button>

      <button class="oauth-btn twitter">
        <i class="fa-brands fa-x-twitter"></i>
        <span>Continue with X</span>
      </button>
    </div>
  </body>
</html>
