<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-Only Animated Typing Indicator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="message received">
            <p>Hey, are you still working on those CSS components?</p>
        </div>
        <div class="message sent">
            <p>Yes, almost done with the next one!</p>
        </div>
        
        <div class="typing-indicator-wrapper">
            <div class="avatar"></div>
            <div class="typing-indicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>
</body>
</html>
