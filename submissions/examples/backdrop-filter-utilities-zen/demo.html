<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backdrop Filter — Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;justify-content:center;align-items:center;min-height:100vh}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem;padding:2rem;max-width:900px;width:100%}
    .card{background:rgba(255,255,255,.15);border-radius:12px;padding:2rem 1.5rem;text-align:center;color:#fff;border:1px solid rgba(255,255,255,.2)}
    .card h3{font-size:.8rem;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem;opacity:.8}
    .tag{display:inline-block;margin-top:.75rem;font-family:monospace;font-size:.75rem;background:rgba(0,0,0,.3);padding:.25rem .5rem;border-radius:4px}
  </style>
</head>
<body>
  <div class="grid">
    <div class="card backdrop-blur-sm"><h3>Blur Sm</h3><span class="tag">.backdrop-blur-sm</span></div>
    <div class="card backdrop-blur-md"><h3>Blur Md</h3><span class="tag">.backdrop-blur-md</span></div>
    <div class="card backdrop-blur-lg"><h3>Blur Lg</h3><span class="tag">.backdrop-blur-lg</span></div>
    <div class="card backdrop-none"><h3>None</h3><span class="tag">.backdrop-none</span></div>
  </div>
</body>
</html>
