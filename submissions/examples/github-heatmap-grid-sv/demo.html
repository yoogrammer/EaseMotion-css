<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Contribution Heatmap</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="heatmap-card">

  <h2>Contribution Activity</h2>

  <div class="contribution-grid">

    <div class="cell level-0"></div>
    <div class="cell level-1"></div>
    <div class="cell level-2"></div>
    <div class="cell level-3"></div>
    <div class="cell level-4"></div>

    <div class="cell level-2"></div>
    <div class="cell level-3"></div>
    <div class="cell level-1"></div>
    <div class="cell level-4"></div>
    <div class="cell level-2"></div>

    <div class="cell level-1"></div>
    <div class="cell level-4"></div>
    <div class="cell level-2"></div>
    <div class="cell level-3"></div>
    <div class="cell level-0"></div>

    <div class="cell level-4"></div>
    <div class="cell level-3"></div>
    <div class="cell level-2"></div>
    <div class="cell level-1"></div>
    <div class="cell level-0"></div>

    <div class="cell level-2"></div>
    <div class="cell level-3"></div>
    <div class="cell level-4"></div>
    <div class="cell level-2"></div>
    <div class="cell level-1"></div>

  </div>

  <div class="legend">
    <span>Less</span>

    <div class="mini level-0"></div>
    <div class="mini level-1"></div>
    <div class="mini level-2"></div>
    <div class="mini level-3"></div>
    <div class="mini level-4"></div>

    <span>More</span>
  </div>

</div>

</body>
</html>
