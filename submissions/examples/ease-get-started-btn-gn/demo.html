<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-get-started-btn-gn Demo</title>
  <link rel="stylesheet" href="./style.css"/>
</head>
<body>

  <!-- Hero section with Get Started button -->
  <div class="hero">
    <h1 class="hero-title">Animate with ease.<br/>No build step needed.</h1>
    <p class="hero-subtitle">EaseMotion CSS gives you smooth, human-readable animations you can drop into any project instantly.</p>
    <div class="btn-group">
      <a href="#quickstart" class="get-started-btn">
        <span>Get Started</span>
        <span class="btn-arrow">→</span>
      </a>
      <a href="#docs" class="btn-outline">View Docs</a>
    </div>
  </div>

  <!-- Quickstart section it links to -->
  <div id="quickstart" style="text-align:center">
    <p class="section-label">Quickstart</p>
    <p class="section-title">You scrolled here — the button works! 🎉</p>
    <a href="#top" class="get-started-btn">
      <span>Back to Top</span>
      <span class="btn-arrow">↑</span>
    </a>
  </div>

</body>
</html>
