<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Safe Scroll Alignment</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }

    /* Testing frame to scale parent tracks dynamically */
    .stress-test-stage {
      width: 100%;
      max-width: 540px;
      transition: max-width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 480px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Defensive Scroll Alignment Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Scale the carousel width bounds using the toggles. <code>justify-content: safe center</code> defaults to a standard left alignment during overflow conditions, blocking data loss.</p>
  </header>

  <div style="margin-bottom: 2rem; display: flex; gap: 0.5rem;">
    <button onclick="resizeCarousel('320px')" style="background: #ef4444; border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: 600;">Compress Viewport (320px)</button>
    <button onclick="resizeCarousel('540px')" style="background: #6c63ff; border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: 600;">Expand Viewport (540px)</button>
  </div>

  <div class="stress-test-stage" id="carouselWrapperShell">
    <div class="alm-carousel-stage">
      
      <div class="alm-safe-scroll-track">
        
        <div class="alm-carousel-card-node">
          <span class="alm-node-index">Node 01</span>
          <h3 class="alm-node-title">Vector Delta</h3>
        </div>

        <div class="alm-carousel-card-node">
          <span class="alm-node-index">Node 02</span>
          <h3 class="alm-node-title">Matrix Core</h3>
        </div>

        <div class="alm-carousel-card-node">
          <span class="alm-node-index">Node 03</span>
          <h3 class="alm-node-title">Sync Socket</h3>
        </div>

      </div>
      
    </div>
  </div>

  <script>
    function resizeCarousel(targetSize) {
      document.getElementById('carouselWrapperShell').style.maxWidth = targetSize;
    }
  </script>
</body>
</html>
