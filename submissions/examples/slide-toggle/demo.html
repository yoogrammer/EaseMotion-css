<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-slide-toggle — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      gap: 2rem;
      padding: 2rem;
    }
    h1 { color: #333; }
    .label { font-size: 0.75rem; color: #888; margin-bottom: 0.5rem; text-align: center; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .row { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; align-items: center; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-width: 220px;
    }
    .card-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-label { font-size: 0.9rem; color: #374151; }
  </style>
</head>
<body>

  <h1>ease-slide-toggle Demo</h1>

  <div class="section">
    <div class="label">Default</div>
    <div class="row">
      <label class="ease-toggle">
        <input type="checkbox" />
        <div class="ease-toggle-track"><div class="ease-toggle-thumb"></div></div>
        <span class="ease-toggle-label">Toggle me</span>
      </label>
      <label class="ease-toggle">
        <input type="checkbox" checked />
        <div class="ease-toggle-track"><div class="ease-toggle-thumb"></div></div>
        <span class="ease-toggle-label">Checked</span>
      </label>
    </div>
  </div>

  <div class="section">
    <div class="label">Color variants</div>
    <div class="row">
      <label class="ease-toggle ease-toggle-success">
        <input type="checkbox" checked />
        <div class="ease-toggle-track"><div class="ease-toggle-thumb"></div></div>
        <span class="ease-toggle-label">Success</span>
      </label>
      <label class="ease-toggle ease-toggle-danger">
        <input type="checkbox" checked />
        <div class="ease-toggle-track"><div class="ease-toggle-thumb"></div></div>
        <span class="ease-toggle-label">Danger</span>
      </label>
      <label class="ease-toggle ease-toggle-warning">
        <input type="checkbox" checked />
        <div class="ease-toggle-track"><div class="ease-toggle-thumb"></div></div>
        <span class="ease-toggle-label">Warning</span>
      </label>
      <label class="ease-toggle ease-toggle-dark">
        <input type="checkbox" checked />
        <div class="ease-toggle-track"><div class="ease-toggle-thumb"></div></div>
        <span class="ease-toggle-label">Dark</span>
      </label>
    </div>
  </div>

  <div class="section">
    <div class="label">Size variants</div>
    <div class="row">
      <label class="ease-toggle ease-toggle-sm">
        <input type="checkbox" checked />
        <div class="ease-toggle-track"><div class="ease-toggle-thumb"></div></div>
        <span class="ease-toggle-label">Small</span>
      </label>
      <label class="ease-toggle">
        <input type="checkbox" checked />
        <div class="ease-toggle-track"><div class="ease-toggle-thumb"></div></div>
        <span class="ease-toggle-label">Default</span>
      </label>
      <label class="ease-toggle ease-toggle-lg">
        <input type="checkbox" checked />
        <div class="ease-toggle-track"><div class="ease-toggle-thumb"></div></div>
        <span class="ease-toggle-label">Large</span>
      </label>
    </div>
  </div>

  <div class="section">
    <div class="label">Settings card example</div>
    <div class="card">
      <div class="card-row">
        <span class="card-label">Notifications</span>
        <label class="ease-toggle ease-toggle-success">
          <input type="checkbox" checked />
          <div class="ease-toggle-track"><div class="ease-toggle-thumb"></div></div>
        </label>
      </div>
      <div class="card-row">
        <span class="card-label">Dark Mode</span>
        <label class="ease-toggle ease-toggle-dark">
          <input type="checkbox" />
          <div class="ease-toggle-track"><div class="ease-toggle-thumb"></div></div>
        </label>
      </div>
      <div class="card-row">
        <span class="card-label">Auto Update</span>
        <label class="ease-toggle ease-toggle-disabled">
          <input type="checkbox" checked />
          <div class="ease-toggle-track"><div class="ease-toggle-thumb"></div></div>
        </label>
      </div>
    </div>
  </div>

</body>
</html>
