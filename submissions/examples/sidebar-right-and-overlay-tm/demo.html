<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sidebar Right and Overlay - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Sidebar — Right and Overlay</h1>
    <p class="description">
      Self-contained demo of the proposed
      <code>.ease-sidebar-right</code> and
      <code>.ease-sidebar-overlay</code> positioning variants.
    </p>

    <h2>Right</h2>
    <div class="ease-sidebar-layout ease-sidebar-right demo-layout">
      <main class="ease-sidebar-main">Main content</main>
      <aside class="ease-sidebar">Right sidebar</aside>
    </div>

    <h2>Overlay</h2>
    <div class="ease-sidebar-layout ease-sidebar-overlay demo-layout">
      <aside class="ease-sidebar">Floating sidebar</aside>
      <main class="ease-sidebar-main">Main content with floating panel</main>
    </div>

  </div>

</body>
</html>
