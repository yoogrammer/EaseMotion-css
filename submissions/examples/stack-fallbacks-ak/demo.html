<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stack Fallbacks Demo</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="demo">
        <h2>Stack Layout with Fallback</h2>
        <div class="stack">
            <div class="card">Item 1</div>
            <div class="card">Item 2</div>
            <div class="card">Item 3</div>
            <div class="card">Item 4</div>
            <div class="card">Item 5</div>
        </div>
        <p class="note">Items use <code>gap</code> with owl selector fallback for maximum browser support.</p>
    </div>
</body>
</html>
