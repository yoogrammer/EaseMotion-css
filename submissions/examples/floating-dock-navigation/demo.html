<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Floating Dock Navigation — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; justify-content: center; align-items: flex-end; min-height: 100vh; background: #0f172a; padding-bottom: 40px; }
  </style>
</head>
<body>
  <nav class="floating-dock">
    <button class="dock-item">🏠</button>
    <button class="dock-item">🔍</button>
    <button class="dock-item">❤️</button>
    <button class="dock-item">⚙️</button>
  </nav>
</body>
</html>
