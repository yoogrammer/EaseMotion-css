<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fix: Badge Deprecation — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { padding: 2rem; font-family: var(--ease-font-sans); }
    h2 { margin-bottom: 0.5rem; }
    p { color: var(--ease-color-muted); margin-bottom: 1.5rem; }
    .row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .section { margin-bottom: 2rem; }
    h3 { font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--ease-color-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <h2>Badge Deprecation Fix</h2>
  <p>Use <code>.ease-badge</code> (canonical). The <code>.em-badge</code> prefix is deprecated and will be removed in v2.0.</p>

  <div class="section">
    <h3>Canonical — use these</h3>
    <div class="row">
      <span class="ease-badge">Default</span>
      <span class="ease-badge ease-badge-danger">Danger</span>
      <span class="ease-badge ease-badge-success">Success</span>
      <span class="ease-badge ease-badge-sm">Small</span>
      <span class="ease-badge ease-badge-lg">Large</span>
    </div>
  </div>

  <div class="section">
    <h3>Deprecated aliases — still work but avoid in new code</h3>
    <div class="row">
      <span class="em-badge">Default</span>
      <span class="em-badge em-badge-danger">Danger</span>
      <span class="em-badge em-badge-success">Success</span>
      <span class="em-badge em-badge-sm">Small</span>
      <span class="em-badge em-badge-lg">Large</span>
    </div>
  </div>
</body>
</html>
