<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Focus Outline Clipping Fix</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 480px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Accessibility Verification Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Press the <code>TAB</code> key on your keyboard to focus the buttons below. Enforcing <code>outline-offset</code> renders focus rings flawlessly across tight grids with 0 scripts.</p>
  </header>

  <div class="alm-tight-flex-grid">
    
    <div class="alm-flex-meta-info">
      <h3 class="alm-meta-header-title">Auth Sockets Delta</h3>
      <p class="alm-meta-body-desc">Pipeline status: active_sync</p>
    </div>

    <div style="display: flex; gap: 8px;">
      <button class="alm-accessible-btn" type="button">Audit Log</button>
      <button class="alm-accessible-btn" type="button" style="border-color: rgba(108,99,255,0.15); color: #6c63ff;">Deploy</button>
    </div>

  </div>

</body>
</html>
