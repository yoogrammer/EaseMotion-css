<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Triggered Counter - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Scroll Triggered Counter</h1>
    <div class="counter-grid">
      <div class="counter-item">
        <span class="counter-value" data-target="1500">0</span>
        <span class="counter-label">Downloads</span>
      </div>
      <div class="counter-item">
        <span class="counter-value" data-target="342">0</span>
        <span class="counter-label">Contributors</span>
      </div>
      <div class="counter-item">
        <span class="counter-value" data-target="89">0</span>
        <span class="counter-label">Features</span>
      </div>
    </div>
    <p class="description">Counters animate from zero to their target when scrolled into view (JS detects intersection).</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
