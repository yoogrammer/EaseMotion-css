<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Driven Architecture</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Event-Driven Architecture</h1>
    <p class="subtitle">
        Visualizing asynchronous communication between services.
    </p>

    <div class="architecture">

        <div class="producer-section">
            <div class="node producer">User Service</div>
            <div class="node producer">Order Service</div>
            <div class="node producer">Payment Service</div>
        </div>

        <div class="event-lines"></div>

        <div class="bus">
            <h2>Event Bus</h2>
            <span>Kafka / RabbitMQ</span>
        </div>

        <div class="event-lines"></div>

        <div class="consumer-section">

            <div class="node consumer">
                Email Service
            </div>

            <div class="node consumer">
                Analytics Service
            </div>

            <div class="node consumer">
                Notification Service
            </div>

            <div class="node consumer">
                Billing Service
            </div>

        </div>

    </div>

</div>

</body>
</html>
