<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-color-cycle — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 2.5rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-size: 1rem; opacity: 0.5; }
    .label { font-size: 0.7rem; color: #555; text-align: center; margin-bottom: 0.5rem; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .row { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .big-text {
      font-size: 3rem;
      font-weight: 800;
    }
    .med-text {
      font-size: 1.5rem;
      font-weight: 700;
    }
    .box {
      width: 100px;
      height: 100px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 0.8rem;
    }
    .outline-box {
      width: 120px;
      height: 60px;
      border-radius: 8px;
      border: 3px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <h1>ease-color-cycle Demo</h1>

  <div class="section">
    <div class="label">Text color cycling (default)</div>
    <p class="big-text ease-color-cycle">Color Cycle</p>
  </div>

  <div class="section">
    <div class="label">Neon theme</div>
    <p class="big-text ease-color-cycle ease-color-cycle-neon">Neon Glow</p>
  </div>

  <div class="section">
    <div class="label">Pastel theme</div>
    <p class="big-text ease-color-cycle ease-color-cycle-pastel">Soft Pastel</p>
  </div>

  <div class="section">
    <div class="label">Background color cycling</div>
    <div class="row">
      <div class="box ease-color-cycle-bg">Default</div>
      <div class="box ease-color-cycle-bg ease-color-cycle-neon">Neon</div>
      <div class="box ease-color-cycle-bg ease-color-cycle-pastel" style="color:#333;">Pastel</div>
    </div>
  </div>

  <div class="section">
    <div class="label">Border color cycling</div>
    <div class="row">
      <div class="outline-box ease-color-cycle-border" style="color:#fff;">Default</div>
      <div class="outline-box ease-color-cycle-border ease-color-cycle-neon" style="color:#fff;">Neon</div>
    </div>
  </div>

  <div class="section">
    <div class="label">Speed variants</div>
    <div class="row">
      <p class="med-text ease-color-cycle ease-color-cycle-fast">Fast</p>
      <p class="med-text ease-color-cycle">Default</p>
      <p class="med-text ease-color-cycle ease-color-cycle-slow">Slow</p>
    </div>
  </div>

  <div class="section">
    <div class="label">Pause on hover</div>
    <p class="med-text ease-color-cycle ease-color-cycle-pause">Hover to Pause</p>
  </div>

</body>
</html>
