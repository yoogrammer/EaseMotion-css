<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-flip-card - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>ease-flip-card</h1>

  <!-- Single card demo -->
  <div class="ease-flip-card demo-card">
    <div class="ease-flip-card-inner">
      <div class="ease-flip-card-front">
        <div class="card-face card-front-content">
          Hover to Flip
        </div>
      </div>
      <div class="ease-flip-card-back">
        <div class="card-face card-back-content">
          Back Side Content
        </div>
      </div>
    </div>
  </div>

  <p class="description">
    Hover over the card to see a smooth 3D flip animation.<br>
    Uses <code>perspective</code> and <code>rotateY</code> for a realistic depth effect.<br>
    Fully accessible — respects <code>prefers-reduced-motion</code>.
  </p>

</body>
</html>
