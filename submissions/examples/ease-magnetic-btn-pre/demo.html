<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Magnetic Button Hover Effect</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>Hover to feel the magnetic pull</h2>
    <div>
      <button class="magnetic-btn purple">⚡ Get Started</button>
      <button class="magnetic-btn green">✓ Confirm</button>
      <button class="magnetic-btn orange">🔥 Explore</button>
      <button class="magnetic-btn outline">Learn More</button>
    </div>
  </div>

  <div class="card">
    <h2>Sizes</h2>
    <div style="display:flex; align-items:center; justify-content:center; gap:12px; flex-wrap:wrap;">
      <button class="magnetic-btn purple sm">Small</button>
      <button class="magnetic-btn purple">Default</button>
      <button class="magnetic-btn purple lg">Large</button>
    </div>
  </div>

  <div class="card">
    <h2>Pill Shape + Magnetic</h2>
    <div>
      <button class="magnetic-btn purple pill">⚡ Launch</button>
      <button class="magnetic-btn green pill">✓ Subscribe</button>
      <button class="magnetic-btn orange pill">🔥 Try Now</button>
    </div>
  </div>

  <!-- Enhanced magnetic JS tracking -->
  <script>
    document.querySelectorAll('.magnetic-btn').forEach(btn => {
      btn.addEventListener('mousemove', e => {
        const r = btn.getBoundingClientRect();
        const x = (e.clientX - r.left - r.width / 2) * 0.25;
        const y = (e.clientY - r.top - r.height / 2) * 0.25;
        btn.style.transform =
          `translate(${x}px, ${y}px) scale(1.08)`;
      });

      btn.addEventListener('mouseleave', () => {
        btn.style.transform = 'translate(0, 0) scale(1)';
      });
    });
  </script>

</body>
</html>
