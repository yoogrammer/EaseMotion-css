<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pure CSS Pagination Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
      padding: 2rem;
    }

    .demo-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h3 {
      margin: 0 0 1rem;
      font-size: 0.85rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="demo-card">
    <h3>Pagination</h3>
    <nav aria-label="Pagination">
      <ul class="ease-pagination-list">
        <li><a href="#" class="ease-page-link">Previous</a></li>
        <li><a href="#" class="ease-page-link">1</a></li>
        <li><a href="#" class="ease-page-link ease-page-active" aria-current="page">2</a></li>
        <li><a href="#" class="ease-page-link">3</a></li>
        <li><a href="#" class="ease-page-link">Next</a></li>
      </ul>
    </nav>
  </div>

  <div class="demo-card">
    <h3>First Page (Previous disabled)</h3>
    <nav aria-label="Pagination">
      <ul class="ease-pagination-list">
        <li><a href="#" class="ease-page-link is-disabled">Previous</a></li>
        <li><a href="#" class="ease-page-link ease-page-active" aria-current="page">1</a></li>
        <li><a href="#" class="ease-page-link">2</a></li>
        <li><a href="#" class="ease-page-link">3</a></li>
        <li><a href="#" class="ease-page-link">Next</a></li>
      </ul>
    </nav>
  </div>

</body>
</html>
