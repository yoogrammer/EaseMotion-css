<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Circular Countdown Loop</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 480px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Vector Path Draining Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Observe the countdown ring below. CSS keyframes iterate vector stroke dash offsets directly inside the browser's hardware painter path with 0 lines of script.</p>
  </header>

  <div class="alm-countdown-stage-card">
    
    <div class="alm-radial-clock-wrapper">
      
      <svg class="alm-radial-countdown-canvas" viewBox="0 0 100 100">
        <circle class="alm-clock-track-bg" cx="50" cy="50" r="45" />
        
        <circle class="alm-clock-progress-arc" cx="50" cy="50" r="45" />
      </svg>

      <div class="alm-clock-center-digits">
        <span class="alm-digit-counter">10s</span>
        <span class="alm-digit-label">Loop</span>
      </div>

    </div>

    <div class="alm-countdown-meta-block">
      <h3 class="alm-countdown-meta-title">Data Stream Sync Quota</h3>
      <p class="alm-countdown-meta-desc">Evaluating telemetry transit ports inside decentralized cluster nodes.</p>
    </div>

  </div>

</body>
</html>
