<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Reveal on Scroll</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="reveal-section">
    <p class="reveal-intro">Scroll down to reveal images</p>
  </section>

  <section class="reveal-section">
    <div class="reveal-image" data-reveal>
      <div class="reveal-placeholder" style="background: linear-gradient(135deg, #6c63ff, #a09af8)">Image 1</div>
    </div>
  </section>

  <section class="reveal-section">
    <div class="reveal-image" data-reveal>
      <div class="reveal-placeholder" style="background: linear-gradient(135deg, #ff6b9d, #feca57)">Image 2</div>
    </div>
  </section>

  <section class="reveal-section">
    <div class="reveal-image" data-reveal>
      <div class="reveal-placeholder" style="background: linear-gradient(135deg, #0ea5e9, #22c55e)">Image 3</div>
    </div>
  </section>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.2 });

    document.querySelectorAll('[data-reveal]').forEach(el => observer.observe(el));
  </script>
</body>
</html>
