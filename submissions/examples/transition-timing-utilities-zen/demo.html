<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transition Timing — Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,sans-serif;background:#f5f5f5;display:flex;justify-content:center;align-items:center;min-height:100vh}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem;padding:2rem;max-width:900px;width:100%}
    .card{background:#fff;border-radius:12px;padding:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.08);text-align:center}
    .card h3{font-size:.8rem;text-transform:uppercase;color:#888;margin-bottom:1rem}
    .ball{width:50px;height:50px;border-radius:50%;background:#6c63ff;margin:0 auto;transition:transform .6s}
    .card:hover .ball{transform:translateX(60px)}
    .card:active .ball{transform:translateX(60px)}
    .tag{display:inline-block;margin-top:1rem;font-family:monospace;font-size:.8rem;color:#666;background:#f0f0f0;padding:.25rem .5rem;border-radius:4px}
  </style>
</head>
<body>
  <div class="grid">
    <div class="card"><h3>Linear</h3><div class="ball ease-linear"></div><span class="tag">.ease-linear</span></div>
    <div class="card"><h3>Ease In</h3><div class="ball ease-in"></div><span class="tag">.ease-in</span></div>
    <div class="card"><h3>Ease Out</h3><div class="ball ease-out"></div><span class="tag">.ease-out</span></div>
    <div class="card"><h3>Ease In Out</h3><div class="ball ease-in-out"></div><span class="tag">.ease-in-out</span></div>
  </div>
</body>
</html>
