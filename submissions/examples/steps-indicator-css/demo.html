<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steps Indicator – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div>
    <h1 class="page-title">Steps Indicator</h1>
  </div>

  <div class="section">
    <div class="stepper" id="stepper">
      <div class="step active" data-step="1">
        <div class="step-circle"><span>1</span></div>
        <div class="step-label">Cart <span class="step-sub">Review items</span></div>
        <div class="step-connector"></div>
      </div>
      <div class="step" data-step="2">
        <div class="step-circle"><span>2</span></div>
        <div class="step-label">Shipping <span class="step-sub">Enter address</span></div>
        <div class="step-connector"></div>
      </div>
      <div class="step" data-step="3">
        <div class="step-circle"><span>3</span></div>
        <div class="step-label">Payment <span class="step-sub">Choose method</span></div>
        <div class="step-connector"></div>
      </div>
      <div class="step" data-step="4">
        <div class="step-circle"><span>4</span></div>
        <div class="step-label">Confirm <span class="step-sub">Place order</span></div>
        <div class="step-connector"></div>
      </div>
      <div class="step" data-step="5">
        <div class="step-circle"><span>5</span></div>
        <div class="step-label">Done <span class="step-sub">Order placed</span></div>
      </div>
    </div>

    <div class="stepper-nav">
      <button class="btn-prev" id="prevBtn" disabled>Previous</button>
      <button class="btn-next" id="nextBtn">Next</button>
      <button class="btn-reset" id="resetBtn">Reset</button>
    </div>
  </div>

<script>
const steps = document.querySelectorAll('.step');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const resetBtn = document.getElementById('resetBtn');
let current = 1;

function updateStepper() {
  steps.forEach((step, i) => {
    const num = i + 1;
    step.classList.remove('active', 'completed');
    if (num < current) step.classList.add('completed');
    if (num === current) step.classList.add('active');
  });
  prevBtn.disabled = current === 1;
  nextBtn.disabled = current === steps.length;
}

nextBtn.addEventListener('click', () => {
  if (current < steps.length) { current++; updateStepper(); }
});

prevBtn.addEventListener('click', () => {
  if (current > 1) { current--; updateStepper(); }
});

resetBtn.addEventListener('click', () => {
  current = 1;
  updateStepper();
});
</script>
</body>
</html>
