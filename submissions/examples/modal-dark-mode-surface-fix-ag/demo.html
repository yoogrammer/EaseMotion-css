<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modal Dark Mode Surface Fix</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-container">
    <h1>Modal Dark Mode Background Fix</h1>
    <p>The modal uses a surface token, providing elevation and contrast against the darker page background.</p>
    <div class="modal-backdrop">
      <div class="ease-modal-fixed">
        <div class="modal-header">Modal Surface (Contrast Pass)</div>
        <div class="modal-body">This modal utilizes the correct surface token, preventing it from disappearing into the backdrop.</div>
      </div>
    </div>
  </main>
</body>
</html>
