<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Egg Timer – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="egg-wrapper">
    <div class="egg-timer" role="timer" aria-label="Egg-shaped sand timer animating">
      <div class="egg-body">
        <div class="sand-upper">
          <div class="sand-upper-fill"></div>
        </div>
        <div class="neck-stream"></div>
        <div class="sand-lower">
          <div class="sand-lower-fill"></div>
        </div>
      </div>
    </div>
    <span class="egg-title">Egg Timer</span>
  </div>
</body>
</html>
