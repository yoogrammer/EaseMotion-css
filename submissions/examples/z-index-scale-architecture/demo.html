<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Z-Index Architecture Demo</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-container ease-padding-8">
    <h1 class="ease-text-2xl ease-font-bold ease-margin-bottom-2">Semantic Z-Index Scale Architecture</h1>
    <p class="ease-text-neutral-500 ease-margin-bottom-8" style="max-width: 600px;">
      This demonstration proves how mathematically mapping stacking contexts to CSS variable tokens completely eradicates <code>z-index: 9999</code> overlapping collisions.
    </p>

    <!-- Visual Container -->
    <div class="ease-z-demo-container">
      
      <!-- Sticky Element (Lower Z) -->
      <div class="demo-element demo-sticky">
        Navigation (z-sticky)
      </div>

      <!-- Overlay (Higher Z) -->
      <div class="demo-element demo-overlay">
        <!-- Modal (Even Higher Z) -->
        <div class="demo-element demo-modal" style="position: relative;">
          Modal Window (z-modal)
          
          <!-- Tooltip (Highest Z) -->
          <div class="demo-element demo-tooltip" style="position: absolute;">
            Tooltip (z-tooltip)
          </div>
        </div>
      </div>

      <!-- Toast (Very High Z, sits above overlay) -->
      <div class="demo-element demo-toast">
        Toast Notification (z-toast)
      </div>

    </div>
  </div>
</body>
</html>
