<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smooth Strikethrough Hover Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        background-color: #0f0e17;
        color: #fffffe;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .demo-container {
        text-align: center;
        padding: 3rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        background-color: rgba(255, 255, 255, 0.02);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        max-width: 440px;
        width: 100%;
      }
      h1 {
        font-size: 1.8rem;
        margin-bottom: 1rem;
        background: linear-gradient(135deg, #6c63ff, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      p {
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 2.5rem;
      }
      .list-container {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="demo-container">
      <h1>Strikethrough Reveal</h1>
      <p>Hover over the interactive list items below to strike them out:</p>
      <div class="list-container">
        <div><a href="#" class="strike-hover-link">Complete EaseMotion Task</a></div>
        <div><a href="#" class="strike-hover-link">Review Code Contributions</a></div>
        <div><a href="#" class="strike-hover-link">Deploy Production Bundle</a></div>
      </div>
    </div>
  </body>
</html>
