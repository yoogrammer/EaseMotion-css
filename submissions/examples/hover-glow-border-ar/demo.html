<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Glow Border Example</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #0f172a; /* Dark background to see the glow */
      color: #f8fafc;
      gap: 3rem;
    }
    .container {
      text-align: center;
      max-width: 600px;
      padding: 2rem;
    }
    .card-grid {
      display: flex;
      justify-content: center;
      margin-top: 2rem;
    }
    .card-title {
      font-size: 1.5rem;
      margin-top: 0;
      color: #ffffff;
    }
    .card-text {
      color: #94a3b8;
      line-height: 1.6;
    }
    .card-price {
      font-size: 2.5rem;
      font-weight: bold;
      color: #6c63ff;
      margin: 1.5rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Animated Glow Border</h1>
    <p style="color: #cbd5e1;">A rotating gradient border effect that highlights cards on hover. Perfect for premium tiers and pricing tables.</p>
    
    <div class="card-grid">
      <!-- Glow Border Card -->
      <div class="hover-glow-border" style="width: 300px;">
        <div class="hover-glow-border-content">
          <h3 class="card-title">Pro Plan</h3>
          <p class="card-text">Everything you need to build incredible user interfaces and animations.</p>
          <div class="card-price">$29<span style="font-size: 1rem; color: #94a3b8;">/mo</span></div>
          <button style="width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: none; background: #6c63ff; color: white; font-weight: bold; cursor: pointer;">Upgrade Now</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
