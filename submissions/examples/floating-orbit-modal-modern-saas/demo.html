<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Orbit Modal - Modern SaaS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn">
    Launch Dashboard
</label>

<label for="modal-toggle" class="overlay"></label>

<div class="modal" role="dialog" aria-modal="true">

    <span class="orbit orbit1"></span>
    <span class="orbit orbit2"></span>
    <span class="orbit orbit3"></span>

    <label for="modal-toggle" class="close">&times;</label>

    <div class="icon">
        🚀
    </div>

    <h2>Welcome to SaaS Pro</h2>

    <p>
        Manage projects, collaborate with your team, monitor analytics,
        and automate workflows from one modern dashboard.
    </p>

    <div class="actions">
        <button class="primary">Get Started</button>
        <button class="secondary">Learn More</button>
    </div>

</div>

</body>
</html>
