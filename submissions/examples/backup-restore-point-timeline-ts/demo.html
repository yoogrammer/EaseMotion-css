<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backup Restore Point Timeline</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="restore-timeline">
    <article class="point verified"><span>09:00</span><h1>Verified backup</h1><p>Automatic snapshot</p></article>
    <article class="point manual"><span>12:30</span><h2>Manual restore point</h2><p>Before migration</p></article>
    <article class="point failed"><span>15:45</span><h2>Failed backup</h2><p>Storage timeout</p></article>
  </main>
</body>
</html>
