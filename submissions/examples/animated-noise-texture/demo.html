<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Animated Noise Texture</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0d0d14, #1a1a2e);
        }
        .content {
            position: relative;
            z-index: 2;
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 2rem;
            text-align: center;
            color: white;
        }
        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #6c63ff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card h3 {
            color: #c4b5fd;
            margin-top: 0;
        }
        .card p {
            font-size: 0.875rem;
            opacity: 0.8;
        }
        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
        }
        button {
            background: #2a2a3e;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #6c63ff;
        }
        .note {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 1rem;
            border-radius: 12px;
            margin-top: 2rem;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <canvas id="noiseCanvas" class="ease-noise-canvas"></canvas>
    
    <div class="content">
        <h1>📺 Animated Noise Texture</h1>
        <p>Film grain / static noise overlay effect</p>
        
        <div class="demo-grid">
            <div class="card">
                <h3>Film Grain Effect</h3>
                <p>Authentic analog film texture</p>
            </div>
            <div class="card">
                <h3>TV Static</h3>
                <p>Retro television noise</p>
            </div>
            <div class="card">
                <h3>VHS Aesthetic</h3>
                <p>Vintage video texture</p>
            </div>
        </div>
        
        <div class="controls">
            <button id="intensityLow">Low Noise</button>
            <button id="intensityMedium">Medium</button>
            <button id="intensityHigh">High Noise</button>
            <button id="toggleNoise">Toggle Effect</button>
        </div>
        
        <div class="note">
            💡 Real-time noise texture overlay. Creates authentic analog film grain or TV static effect.
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
