<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Blur Shadow Exit</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>Blur Shadow Exit</h2>
    <div id="box1" class="box" style="
      background: white;
      border: 1px solid #ede9ff;
      color: #6c63ff;
    ">
      ✦ Watch me exit!
    </div>
    <button class="btn btn-purple" onclick="triggerExit('box1', 'blur-shadow-exit')">
      ▶ Exit
    </button>
  </div>

  <div class="card">
    <h2>Blur Shadow Exit — Slow</h2>
    <div id="box2" class="box" style="
      background: white;
      border: 1px solid #e6faf3;
      color: #10b981;
    ">
      ✦ Slow fade out!
    </div>
    <button class="btn btn-green" onclick="triggerExit('box2', 'blur-shadow-exit-slow')">
      ▶ Exit
    </button>
  </div>

  <script>
    function triggerExit(id, cls) {
      const el = document.getElementById(id);
      el.classList.remove('blur-shadow-exit', 'blur-shadow-exit-slow');
      void el.offsetWidth;
      el.classList.add(cls);
      setTimeout(() => {
        el.classList.remove(cls);
      }, 1500);
    }
  </script>

</body>
</html>
