<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip-Out Calculator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator-wrapper">
    <h1>Tip-Out Calculator</h1>
    <div class="input-section">
      <div class="field">
        <label for="totalTips">Total Tips for Shift ($)</label>
        <input type="number" id="totalTips" class="input" value="500" min="0" step="1">
      </div>
      <div class="staff-section">
        <div class="comparison-header">Staff Roles & Tip-Out %</div>
        <div id="staffList"></div>
        <button id="addStaffBtn" class="add-btn">+ Add Staff Role</button>
      </div>
    </div>
    <div class="validation-warning" id="validationWarning" style="display:none">
      <span id="warningMsg">Total percentage must equal 100%</span>
    </div>
    <div class="results" id="resultsSection">
      <div class="result-row">
        <span>Total Tips</span>
        <span id="displayTotalTips">$500.00</span>
      </div>
      <div class="result-row">
        <span>Distributed</span>
        <span id="displayDistributed">$500.00</span>
      </div>
    </div>
    <div class="staff-payout-section" id="payoutSection">
      <div class="comparison-header">Per-Person Payout</div>
      <div id="payoutList"></div>
    </div>
  </div>
  <script>
    const totalTips = document.getElementById('totalTips');
    const staffList = document.getElementById('staffList');
    const payoutList = document.getElementById('payoutList');
    const addStaffBtn = document.getElementById('addStaffBtn');
    const validationWarning = document.getElementById('validationWarning');
    const warningMsg = document.getElementById('warningMsg');
    const displayTotalTips = document.getElementById('displayTotalTips');
    const displayDistributed = document.getElementById('displayDistributed');

    const defaultRoles = [
      { name: 'Bartender', pct: 30 },
      { name: 'Server', pct: 40 },
      { name: 'Busser', pct: 15 },
      { name: 'Runner', pct: 10 },
      { name: 'Host', pct: 5 }
    ];

    let staff = [];

    function fmt(n) {
      return '$' + n.toFixed(2);
    }

    function renderStaff() {
      staffList.innerHTML = '';
      staff.forEach((s, i) => {
        const row = document.createElement('div');
        row.className = 'staff-row';
        row.innerHTML = `
          <input type="text" class="staff-name input" value="${s.name}" data-idx="${i}" placeholder="Role">
          <div class="staff-pct-wrapper">
            <input type="number" class="staff-pct input" value="${s.pct}" min="0" max="100" step="0.5" data-idx="${i}">
            <span class="pct-sign">%</span>
          </div>
          <button class="remove-btn" data-idx="${i}">✕</button>
        `;
        staffList.appendChild(row);
      });

      document.querySelectorAll('.staff-name').forEach(inp => {
        inp.addEventListener('input', function() { staff[this.dataset.idx].name = this.value; calculate(); });
      });
      document.querySelectorAll('.staff-pct').forEach(inp => {
        inp.addEventListener('input', function() { staff[this.dataset.idx].pct = parseFloat(this.value) || 0; calculate(); });
      });
      document.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', function() { staff.splice(parseInt(this.dataset.idx), 1); renderStaff(); calculate(); });
      });
    }

    function calculate() {
      const tips = parseFloat(totalTips.value) || 0;
      displayTotalTips.textContent = fmt(tips);

      const totalPct = staff.reduce((sum, s) => sum + s.pct, 0);
      const valid = Math.abs(totalPct - 100) < 0.01 && staff.length > 0;

      if (!valid) {
        validationWarning.style.display = 'block';
        warningMsg.textContent = 'Total percentage: ' + totalPct.toFixed(1) + '%. Must equal 100%.';
        displayDistributed.textContent = fmt(0);
        payoutList.innerHTML = '<div class="step-line">Adjust percentages to equal 100%.</div>';
        return;
      }

      validationWarning.style.display = 'none';
      let distributed = 0;
      payoutList.innerHTML = '';
      staff.forEach(s => {
        const amount = tips * (s.pct / 100);
        distributed += amount;
        const row = document.createElement('div');
        row.className = 'payout-row';
        row.innerHTML = '<span>' + s.name + '</span><span class="payout-amount">' + fmt(amount) + ' (' + s.pct + '%)</span>';
        payoutList.appendChild(row);
      });

      displayDistributed.textContent = fmt(distributed);
    }

    addStaffBtn.addEventListener('click', function() {
      staff.push({ name: 'New Role', pct: 0 });
      renderStaff();
      calculate();
    });

    staff = defaultRoles.map(r => ({ ...r }));
    renderStaff();
    totalTips.addEventListener('input', calculate);
    calculate();
  </script>
</body>
</html>
