<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-polaroid | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      gap: 3rem;
      padding: 2rem;
    }

    h1 {
      color: #ffffff;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      opacity: 0.4;
      text-transform: uppercase;
    }

    .demo-row {
      display: flex;
      gap: 2.5rem;
      align-items: flex-end;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* --- Polaroid Card Style --- */
    .photo-card {
      background: #ffffff;
      padding: 12px 12px 40px 12px;
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }

    .photo-card .photo {
      width: 160px;
      height: 160px;
      object-fit: cover;
      display: block;
      border-radius: 1px;
    }

    /* emoji placeholder instead of real image */
    .photo-emoji {
      width: 160px;
      height: 160px;
      background: linear-gradient(135deg, #1e1e3e, #2a1a4e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      border-radius: 1px;
    }

    .photo-caption {
      position: absolute;
      bottom: 10px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 0.05em;
    }

    /* --- Profile Card --- */
    .profile-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      width: 160px;
      cursor: pointer;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c6ef7, #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .profile-name {
      color: #ffffff;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .profile-role {
      color: #a0a0c0;
      font-size: 0.72rem;
    }

    /* --- Achievement Card --- */
    .achievement-card {
      background: linear-gradient(135deg, #1a1a2e, #2a1a3e);
      border: 2px solid #d97706;
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      width: 160px;
      cursor: pointer;
      box-shadow: 0 0 20px -6px #d97706;
    }

    .achievement-icon { font-size: 2.5rem; }

    .achievement-title {
      color: #d97706;
      font-size: 0.8rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.05em;
    }

    .achievement-desc {
      color: #a0a0c0;
      font-size: 0.68rem;
      text-align: center;
    }

    .hint {
      color: #ffffff25;
      font-size: 0.75rem;
      margin-top: -1rem;
    }
  </style>
</head>
<body>

  <h1>ease-polaroid — Click anything to replay</h1>

  <div class="demo-row">

    <!-- Polaroid Photo 1 -->
    <div class="photo-card polaroid polaroid-left polaroid-delay-1"
         onclick="replay(this)">
      <div class="photo-emoji">🌊</div>
      <span class="photo-caption">Summer 2024</span>
    </div>

    <!-- Polaroid Photo 2 -->
    <div class="photo-card polaroid polaroid-straight polaroid-delay-2"
         onclick="replay(this)">
      <div class="photo-emoji">🏔️</div>
      <span class="photo-caption">Adventure</span>
    </div>

    <!-- Polaroid Photo 3 -->
    <div class="photo-card polaroid polaroid-right polaroid-delay-3"
         onclick="replay(this)">
      <div class="photo-emoji">🌸</div>
      <span class="photo-caption">Spring Trip</span>
    </div>

    <!-- Profile Card -->
    <div class="profile-card polaroid polaroid-left polaroid-delay-2"
         onclick="replay(this)">
      <div class="avatar">👩‍💻</div>
      <span class="profile-name">Bhakti S.</span>
      <span class="profile-role">Frontend Dev</span>
    </div>

    <!-- Achievement Card -->
    <div class="achievement-card polaroid polaroid-right polaroid-delay-3"
         onclick="replay(this)">
      <div class="achievement-icon">🏆</div>
      <span class="achievement-title">First Merge!</span>
      <span class="achievement-desc">Open Source Contributor</span>
    </div>

  </div>

  <p class="hint">↑ click any card to replay</p>

  <script>
    function replay(el) {
      el.classList.remove('polaroid');
      void el.offsetWidth;
      el.classList.add('polaroid');
    }
  </script>

</body>
</html>
