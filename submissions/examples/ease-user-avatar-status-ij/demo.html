<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion — User Avatar Status</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>User Avatar Status</h1>
    <p>Click an avatar to cycle through status states</p>
  </header>

  <div class="uas-grid">
    <div class="uas-card" data-status="online">
      <div class="uas-avatar" style="background: #6c63ff">SJ</div>
      <div class="uas-status-dot"></div>
      <span class="uas-name">Sarah Kim</span>
      <span class="uas-status-label">Online</span>
    </div>

    <div class="uas-card" data-status="offline">
      <div class="uas-avatar" style="background: #ff6584">MJ</div>
      <div class="uas-status-dot"></div>
      <span class="uas-name">Mike Jones</span>
      <span class="uas-status-label">Offline</span>
    </div>

    <div class="uas-card" data-status="busy">
      <div class="uas-avatar" style="background: #f59e0b">AL</div>
      <div class="uas-status-dot"></div>
      <span class="uas-name">Aria Liu</span>
      <span class="uas-status-label">Busy</span>
    </div>

    <div class="uas-card" data-status="away">
      <div class="uas-avatar" style="background: #43e97b">TR</div>
      <div class="uas-status-dot"></div>
      <span class="uas-name">Tom Rivera</span>
      <span class="uas-status-label">Away</span>
    </div>
  </div>

  <script>
    var statuses = ['online', 'away', 'busy', 'offline'];

    document.querySelectorAll('.uas-card').forEach(function (card) {
      card.addEventListener('click', function () {
        var current = card.getAttribute('data-status');
        var idx = statuses.indexOf(current);
        var next = statuses[(idx + 1) % statuses.length];
        card.setAttribute('data-status', next);
        card.querySelector('.uas-status-label').textContent =
          next.charAt(0).toUpperCase() + next.slice(1);
      });
    });
  </script>
</body>
</html>
