<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Flip Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scene">
    <div class="flip-card">
      <div class="card-front">
        <div class="chip"></div>
        <div class="card-number">•••• •••• •••• 4829</div>
        <div class="card-holder">
          <span class="label">Card Holder</span>
          <span class="value">Alex Rivera</span>
        </div>
        <div class="card-expiry">
          <span class="label">Expires</span>
          <span class="value">12/28</span>
        </div>
        <div class="card-network">Premium</div>
      </div>
      <div class="card-back">
        <div class="magnetic-strip"></div>
        <div class="cvv-area">
          <span class="cvv-label">CVV</span>
          <span class="cvv-value">•••</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
