<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Message Bubble</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="chat-container">


<div class="message received">
  <p>Hi! How is the project going?</p>
  <span>10:15 AM</span>
</div>

<div class="message sent">
  <p>Everything is on track. We should finish this week.</p>
  <span>10:16 AM</span>
</div>

<div class="message received">
  <p>Great! Let me know if you need any help.</p>
  <span>10:17 AM</span>
</div>

<div class="message sent">
  <p>Sure, thank you!</p>
  <span>10:18 AM</span>
</div>


  </div>

</body>
</html>
