<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-focus-ring - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>ease-focus-ring</h1>

  <p class="demo-hint">Use Tab to navigate between elements and see the focus ring</p>

  <div class="demo-grid">
    <!-- Default (primary) -->
    <button class="demo-btn ease-focus-ring">Primary Ring</button>

    <!-- Success variant -->
    <button class="demo-btn ease-focus-ring ease-focus-ring-success">Success Ring</button>

    <!-- Danger variant -->
    <button class="demo-btn ease-focus-ring ease-focus-ring-danger">Danger Ring</button>

    <!-- Info variant -->
    <button class="demo-btn ease-focus-ring ease-focus-ring-info">Info Ring</button>

    <!-- Thick variant -->
    <button class="demo-btn ease-focus-ring ease-focus-ring-thick">Thick Ring</button>

    <!-- Works on inputs too -->
    <input
      class="demo-input ease-focus-ring"
      type="text"
      placeholder="Focus me"
    >
  </div>

  <p class="description">
    Tab through the elements above to see each focus ring variant.<br>
    <code>.ease-focus-ring</code> uses <code>box-shadow</code> instead of <code>outline</code>,
    so it respects <code>border-radius</code> and works on any element.
  </p>

</body>
</html>
