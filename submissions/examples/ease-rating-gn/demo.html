<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-rating Star Rating – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2.5rem;
      background: #f9fafb;
      padding: 2rem;
    }
    h1 { color: #333; font-size: 1.3rem; margin: 0; }
    h3 { color: #555; font-size: 0.9rem; margin: 0 0 0.5rem; text-align: center; }
    .hint { font-size: 0.8rem; color: #aaa; margin: 0; }
    .demo { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
  </style>
</head>
<body>

  <h1>ease-rating Star Rating Component</h1>
  <p class="hint">Click stars to select — CSS only, no JavaScript</p>

  <!-- 5-star rating -->
  <div class="demo">
    <h3>5-Star Rating</h3>
    <div class="ease-rating">
      <input type="radio" name="rating" id="star5" value="5"/>
      <label for="star5">&#9733;</label>
      <input type="radio" name="rating" id="star4" value="4"/>
      <label for="star4">&#9733;</label>
      <input type="radio" name="rating" id="star3" value="3"/>
      <label for="star3">&#9733;</label>
      <input type="radio" name="rating" id="star2" value="2"/>
      <label for="star2">&#9733;</label>
      <input type="radio" name="rating" id="star1" value="1"/>
      <label for="star1">&#9733;</label>
    </div>
  </div>

  <!-- Pre-selected rating -->
  <div class="demo">
    <h3>Pre-selected (3 stars)</h3>
    <div class="ease-rating">
      <input type="radio" name="rating2" id="s5" value="5"/>
      <label for="s5">&#9733;</label>
      <input type="radio" name="rating2" id="s4" value="4"/>
      <label for="s4">&#9733;</label>
      <input type="radio" name="rating2" id="s3" value="3" checked/>
      <label for="s3">&#9733;</label>
      <input type="radio" name="rating2" id="s2" value="2"/>
      <label for="s2">&#9733;</label>
      <input type="radio" name="rating2" id="s1" value="1"/>
      <label for="s1">&#9733;</label>
    </div>
  </div>

  <!-- Half-star rating -->
  <div class="demo">
    <h3>Half-Star Variant</h3>
    <div class="ease-rating-half">
      <input type="radio" name="rating3" id="h5f" value="5"/>
      <label for="h5f" class="full">&#9733;</label>
      <input type="radio" name="rating3" id="h5h" value="4.5"/>
      <label for="h5h" class="half">&#9733;</label>
      <input type="radio" name="rating3" id="h4f" value="4"/>
      <label for="h4f" class="full">&#9733;</label>
      <input type="radio" name="rating3" id="h4h" value="3.5"/>
      <label for="h4h" class="half">&#9733;</label>
      <input type="radio" name="rating3" id="h3f" value="3"/>
      <label for="h3f" class="full">&#9733;</label>
      <input type="radio" name="rating3" id="h3h" value="2.5"/>
      <label for="h3h" class="half">&#9733;</label>
      <input type="radio" name="rating3" id="h2f" value="2"/>
      <label for="h2f" class="full">&#9733;</label>
      <input type="radio" name="rating3" id="h2h" value="1.5"/>
      <label for="h2h" class="half">&#9733;</label>
      <input type="radio" name="rating3" id="h1f" value="1"/>
      <label for="h1f" class="full">&#9733;</label>
      <input type="radio" name="rating3" id="h1h" value="0.5"/>
      <label for="h1h" class="half">&#9733;</label>
    </div>
  </div>

</body>
</html>
