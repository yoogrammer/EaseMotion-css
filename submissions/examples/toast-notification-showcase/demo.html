<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast Notification Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Toast Notification Showcase</h1>

<div class="controls">
  <button onclick="showToast('success')">Success</button>
  <button onclick="showToast('error')">Error</button>
  <button onclick="showToast('warning')">Warning</button>
  <button onclick="showToast('info')">Info</button>
</div>

<div id="toastContainer"></div>

<h2>Implementation Example</h2>

<pre>
showToast("success");
showToast("error");
showToast("warning");
showToast("info");
</pre>

<script>
function showToast(type) {
  const container =
    document.getElementById("toastContainer");

  const toast = document.createElement("div");

  toast.className = `toast ${type}`;

  const messages = {
    success: "Operation completed successfully.",
    error: "Something went wrong.",
    warning: "Please review your input.",
    info: "New update available."
  };

  toast.textContent = messages[type];

  container.appendChild(toast);

  setTimeout(() => {
    toast.classList.add("hide");

    setTimeout(() => {
      toast.remove();
    }, 300);
  }, 2500);
}
</script>

</body>
</html>
