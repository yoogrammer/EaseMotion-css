<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Hover Reveal Text</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h2>Product Card</h2>

        <p class="ease-reveal-text">
            This description slides up on hover.
        </p>
    </div>
    <div class="card">
        <h2>Product Card</h2>

        <p class="ease-reveal-text-bottom">
            This description slides down on hover.
        </p>
    </div>
    <div class="card">
        <h2>Product Card</h2>

        <p class="ease-reveal-text-left">
            This description slides left on hover.
        </p>
    </div>
    <div class="card">
        <h2>Product Card</h2>

        <p class="ease-reveal-text-right">
            This description slides left on hover.
        </p>
    </div>
</body>
</html>
