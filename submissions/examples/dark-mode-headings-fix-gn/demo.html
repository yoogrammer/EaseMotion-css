<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dark Mode Headings Fix – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body {
      font-family: sans-serif;
      padding: 40px;
      background: var(--ease-color-bg);
      transition: background 0.3s ease, color 0.3s ease;
    }
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
    }
    button {
      padding: 8px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .btn-light { background: #e2e8f0; color: #0f172a; }
    .btn-dark  { background: #1e293b; color: #f1f5f9; }
    .section {
      padding: 24px;
      border-radius: 12px;
      background: var(--ease-color-bg);
      border: 1px solid #e2e8f0;
      max-width: 600px;
    }
    [data-theme="dark"] .section {
      border-color: #334155;
    }
  </style>
</head>
<body>

  <div class="controls">
    <button class="btn-light" onclick="setTheme('light')">☀️ Light Mode</button>
    <button class="btn-dark"  onclick="setTheme('dark')">🌙 Dark Mode</button>
  </div>

  <div class="section">
    <h1 class="ease-h1">Heading H1</h1>
    <h2 class="ease-h2">Heading H2</h2>
    <h3 class="ease-h3">Heading H3</h3>
    <h4 class="ease-h4">Heading H4</h4>
    <h5 class="ease-h5">Heading H5</h5>
    <h6 class="ease-h6">Heading H6</h6>
  </div>

  <script>
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.body.style.background = 
        theme === 'dark' ? '#0f172a' : '#ffffff';
    }
  </script>

</body>
</html>
