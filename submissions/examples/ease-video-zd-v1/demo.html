<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Player — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #0b0f1a; color: #e8edf5; padding: 2.5rem 1.5rem; display: flex; flex-direction: column; align-items: center; }
    .wrap { width: 100%; max-width: 700px; }
    h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
    .sub { font-size: 0.82rem; color: #8892a8; margin-bottom: 28px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Video Player UI</h1>
    <p class="sub">Pure CSS video player skin with controls</p>
    <div class="vp-card">
      <div class="vp-preview">
        <div class="vp-preview-bg" style="background-image: url('https://images.unsplash.com/photo-1536240478700-b869070f9279?w=600&q=80');"></div>
        <div class="vp-thumbnail" style="background-image: url('https://images.unsplash.com/photo-1536240478700-b869070f9279?w=600&q=80');"></div>
        <button class="vp-play-btn" aria-label="Play video">▶</button>
        <span class="vp-time-badge">12:34</span>
      </div>
      <div class="vp-controls">
        <div class="vp-progress" aria-label="Video progress">
          <div class="vp-progress-fill"></div>
        </div>
        <div class="vp-row">
          <div class="vp-left">
            <button class="vp-btn" aria-label="Play">▶</button>
            <span class="vp-time">4:22 / 12:34</span>
          </div>
          <div class="vp-label">Getting Started Guide</div>
          <div class="vp-right">
            <div class="vp-volume">
              <button class="vp-btn" aria-label="Volume">🔊</button>
              <div class="vp-volume-bar" aria-label="Volume level">
                <div class="vp-volume-fill"></div>
              </div>
            </div>
            <button class="vp-btn" aria-label="Settings">⚙</button>
            <button class="vp-btn" aria-label="Fullscreen">⛶</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
