<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Interactive Sparkline Widget</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 480px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Sparkline Vector Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Move your cursor horizontally across the graph plane below. Decoupled vertical trigger rows coordinate point scaling and text illumination matrices with 0 scripts.</p>
  </header>

  <div class="alm-sparkline-analytics-card">
    
    <div class="alm-sparkline-title-well">
      <h3 class="alm-sparkline-header-title">Socket Sync Voltages</h3>
      <span class="alm-sparkline-meta-tag">Vector_Sync</span>
    </div>

    <div class="alm-sparkline-trigger-row">
      <div class="alm-sparkline-coord-handle" id="zone-1" title="Node Alpha Coordinates"></div>
      <div class="alm-sparkline-coord-handle" id="zone-2" title="Node Beta Coordinates"></div>
      <div class="alm-sparkline-coord-handle" id="zone-3" title="Node Delta Coordinates"></div>
      <div class="alm-sparkline-coord-handle" id="zone-4" title="Node Omega Coordinates"></div>
    </div>

    <svg class="alm-sparkline-svg-canvas" viewBox="0 0 370 100" xmlns="http://www.w3.org/2000/svg">
      <line class="alm-svg-trend-wire" x1="0" y1="15" x2="370" y2="15" />
      <line class="alm-svg-trend-wire" x1="0" y1="50" x2="370" y2="50" />
      <line class="alm-svg-trend-wire" x1="0" y1="80" x2="370" y2="80" />
      
      <path class="alm-svg-core-path" d="M 10 80 L 126 30 L 243 65 L 360 15" />
      
      <circle class="alm-chart-point" id="pt-1" cx="10" cy="80" r="5" />
      <circle class="alm-chart-point" id="pt-2" cx="126" cy="30" r="5" />
      <circle class="alm-chart-point" id="pt-3" cx="243" cy="65" r="5" />
      <circle class="alm-chart-point" id="pt-4" cx="360" cy="15" r="5" />
    </svg>

    <div class="alm-sparkline-tooltip-well">
      <span class="alm-tooltip-data-string" id="txt-node-1">S1: <span class="alm-tooltip-value-highlight">20%</span></span>
      <span class="alm-tooltip-data-string" id="txt-node-2">S2: <span class="alm-tooltip-value-highlight">70%</span></span>
      <span class="alm-tooltip-data-string" id="txt-node-3">S3: <span class="alm-tooltip-value-highlight">35%</span></span>
      <span class="alm-tooltip-data-string" id="txt-node-4">S4: <span class="alm-tooltip-value-highlight">85%</span></span>
    </div>

  </div>

</body>
</html>
