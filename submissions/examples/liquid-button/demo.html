<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Button Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a0a0a;
      margin: 0;
      color: #e0e0e0;
    }
    .container {
      padding: 40px;
      text-align: center;
    }
    h2 {
      color: #555;
      margin-bottom: 50px;
      font-weight: 300;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    .demo-row {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    .demo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .demo-label {
      font-size: 12px;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Liquid Button Effect</h2>
    
    <div class="demo-row">
      <!-- Default Liquid -->
      <div class="demo-item">
        <button class="liquid-btn">
          <span class="liquid-text">Hover Me</span>
          <span class="liquid-fill"></span>
        </button>
        <span class="demo-label">Default</span>
      </div>
      
      <!-- Liquid with Color -->
      <div class="demo-item">
        <button class="liquid-btn liquid-blue">
          <span class="liquid-text">Blue Wave</span>
          <span class="liquid-fill"></span>
        </button>
        <span class="demo-label">Blue</span>
      </div>
      
      <!-- Liquid with Glow -->
      <div class="demo-item">
        <button class="liquid-btn liquid-glow">
          <span class="liquid-text">Neon Glow</span>
          <span class="liquid-fill"></span>
        </button>
        <span class="demo-label">Glow</span>
      </div>
    </div>
    
    <div class="demo-row">
      <!-- Liquid Large -->
      <div class="demo-item">
        <button class="liquid-btn liquid-large">
          <span class="liquid-text">Large Button</span>
          <span class="liquid-fill"></span>
        </button>
        <span class="demo-label">Large</span>
      </div>
      
      <!-- Liquid Outline -->
      <div class="demo-item">
        <button class="liquid-btn liquid-outline">
          <span class="liquid-text">Outline</span>
          <span class="liquid-fill"></span>
        </button>
        <span class="demo-label">Outline</span>
      </div>
      
      <!-- Liquid Rounded -->
      <div class="demo-item">
        <button class="liquid-btn liquid-rounded">
          <span class="liquid-text">Rounded</span>
          <span class="liquid-fill"></span>
        </button>
        <span class="demo-label">Rounded</span>
      </div>
    </div>
  </div>
</body>
</html>
