<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-badge — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f8fafc;
      gap: 2rem;
      padding: 2rem;
    }
    h1 { color: #1e293b; font-size: 1.4rem; }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 520px;
    }
    .card h2 {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 1.25rem;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    .row:last-child { margin-bottom: 0; }
    /* Fake button for positioning demo */
    .demo-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      font-size: 0.85rem;
      font-weight: 500;
      color: #374151;
      cursor: default;
    }
    .demo-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <h1>ease-badge</h1>

  <!-- Color variants -->
  <div class="card">
    <h2>Color Variants</h2>
    <div class="row">
      <span class="ease-badge ease-badge-danger">3</span>
      <span class="ease-badge ease-badge-success">✓</span>
      <span class="ease-badge ease-badge-warning">!</span>
      <span class="ease-badge ease-badge-info">12</span>
    </div>
  </div>

  <!-- Dot variant -->
  <div class="card">
    <h2>Dot Variant (no number)</h2>
    <div class="row">
      <span class="ease-badge ease-badge-dot ease-badge-danger"></span>
      <span class="ease-badge ease-badge-dot ease-badge-success"></span>
      <span class="ease-badge ease-badge-dot ease-badge-warning"></span>
      <span class="ease-badge ease-badge-dot ease-badge-info"></span>
    </div>
  </div>

  <!-- Pulse ring -->
  <div class="card">
    <h2>Pulse Ring Variant</h2>
    <div class="row">
      <span class="ease-badge ease-badge-danger ease-badge-pulse">3</span>
      <span class="ease-badge ease-badge-success ease-badge-pulse">✓</span>
      <span class="ease-badge ease-badge-dot ease-badge-danger ease-badge-pulse"></span>
      <span class="ease-badge ease-badge-dot ease-badge-info ease-badge-pulse"></span>
    </div>
  </div>

  <!-- Positioning -->
  <div class="card">
    <h2>Positioning Helpers</h2>
    <div class="row">

      <div style="display:flex;flex-direction:column;align-items:center;gap:0.4rem;">
        <span style="font-size:0.65rem;color:#94a3b8;">top-right (default)</span>
        <span class="ease-badge-wrapper">
          <span class="demo-icon">✉️</span>
          <span class="ease-badge ease-badge-danger ease-badge-pulse">5</span>
        </span>
      </div>

      <div style="display:flex;flex-direction:column;align-items:center;gap:0.4rem;">
        <span style="font-size:0.65rem;color:#94a3b8;">top-left</span>
        <span class="ease-badge-wrapper ease-badge-top-left">
          <span class="demo-icon">🔔</span>
          <span class="ease-badge ease-badge-info">2</span>
        </span>
      </div>

      <div style="display:flex;flex-direction:column;align-items:center;gap:0.4rem;">
        <span style="font-size:0.65rem;color:#94a3b8;">bottom-right</span>
        <span class="ease-badge-wrapper ease-badge-bottom-right">
          <span class="demo-icon">👤</span>
          <span class="ease-badge ease-badge-dot ease-badge-success ease-badge-pulse"></span>
        </span>
      </div>

      <div style="display:flex;flex-direction:column;align-items:center;gap:0.4rem;">
        <span style="font-size:0.65rem;color:#94a3b8;">on button</span>
        <span class="ease-badge-wrapper">
          <button class="demo-btn">Inbox</button>
          <span class="ease-badge ease-badge-danger">9</span>
        </span>
      </div>

    </div>
  </div>

  <!-- Size variants -->
  <div class="card">
    <h2>Size Variants</h2>
    <div class="row">
      <span class="ease-badge ease-badge-danger ease-badge-sm">3</span>
      <span class="ease-badge ease-badge-danger">3</span>
      <span class="ease-badge ease-badge-danger ease-badge-lg">3</span>
    </div>
  </div>

</body>
</html>
