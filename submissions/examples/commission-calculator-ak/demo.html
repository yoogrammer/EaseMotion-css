<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commission Calculator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator-wrapper">
    <h1>Commission Calculator</h1>
    <div class="input-section">
      <div class="field">
        <label for="saleAmount">Sale Amount ($)</label>
        <input type="number" id="saleAmount" class="input" value="25000" min="0" step="100">
      </div>
      <div class="field">
        <label for="tier">Commission Tier</label>
        <select id="tier" class="input">
          <option value="5_10000,8_50000,10">Standard: 5% up to $10k, 8% up to $50k, 10% above</option>
          <option value="3_20000,5_100000,7">Real Estate: 3% up to $20k, 5% up to $100k, 7% above</option>
          <option value="10_5000,15_25000,20">High-Ticket: 10% up to $5k, 15% up to $25k, 20% above</option>
        </select>
      </div>
      <div class="field toggle-field">
        <label>
          <input type="checkbox" id="baseSalaryToggle">
          <span>Include Base Salary ($2,000/month)</span>
        </label>
      </div>
    </div>
    <div class="results">
      <div class="result-row">
        <span>Commission Earned</span>
        <span id="commissionEarned">$0.00</span>
      </div>
      <div class="result-row">
        <span>Base Salary</span>
        <span id="baseSalaryAmt">$0.00</span>
      </div>
      <div class="result-row total">
        <span>Total Earnings</span>
        <span id="totalEarnings">$0.00</span>
      </div>
    </div>
    <div class="targets">
      <h3>Sales Targets</h3>
      <div class="target" data-target="10000">
        <div class="target-header">
          <span>Tier 1 (5%)</span>
          <span id="tier1Amt">$0 / $10,000</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="tier1Fill" style="width:0%"></div></div>
      </div>
      <div class="target" data-target="50000">
        <div class="target-header">
          <span>Tier 2 (8%)</span>
          <span id="tier2Amt">$0 / $50,000</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="tier2Fill" style="width:0%"></div></div>
      </div>
      <div class="target" data-target="Infinity">
        <div class="target-header">
          <span>Tier 3 (10%)</span>
          <span id="tier3Amt">$0 / Unlimited</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="tier3Fill" style="width:0%"></div></div>
      </div>
    </div>
  </div>
  <script>
    const saleAmount = document.getElementById('saleAmount');
    const tier = document.getElementById('tier');
    const baseSalaryToggle = document.getElementById('baseSalaryToggle');
    const commissionEarned = document.getElementById('commissionEarned');
    const baseSalaryAmt = document.getElementById('baseSalaryAmt');
    const totalEarnings = document.getElementById('totalEarnings');
    const tier1Amt = document.getElementById('tier1Amt');
    const tier2Amt = document.getElementById('tier2Amt');
    const tier3Amt = document.getElementById('tier3Amt');
    const tier1Fill = document.getElementById('tier1Fill');
    const tier2Fill = document.getElementById('tier2Fill');
    const tier3Fill = document.getElementById('tier3Fill');

    function fmt(n) {
      return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function parseTier(val) {
      const parts = val.split(',').map(p => {
        const [r, m] = p.split('_');
        return { rate: parseFloat(r) / 100, max: m ? parseFloat(m) : Infinity };
      });
      return parts;
    }

    function calculate() {
      const amount = parseFloat(saleAmount.value) || 0;
      const tiers = parseTier(tier.value);
      const hasBase = baseSalaryToggle.checked;
      const baseSalary = hasBase ? 2000 : 0;

      let remaining = amount;
      let totalCommission = 0;
      const tierAmounts = [];

      tiers.forEach(t => {
        if (remaining <= 0) {
          tierAmounts.push(0);
          return;
        }
        const taxable = Math.min(remaining, t.max === Infinity ? remaining : t.max);
        const commission = taxable * t.rate;
        totalCommission += commission;
        tierAmounts.push(taxable);
        remaining -= taxable;
      });

      commissionEarned.textContent = fmt(totalCommission);
      baseSalaryAmt.textContent = fmt(baseSalary);
      totalEarnings.textContent = fmt(totalCommission + baseSalary);

      tier1Amt.textContent = fmt(tierAmounts[0]) + ' / $10,000';
      tier2Amt.textContent = fmt(tierAmounts[1] + (tierAmounts[0] >= 10000 ? Math.min(tierAmounts[0], 10000) : 0)) + ' / $50,000';
      tier3Amt.textContent = fmt(amount > 50000 ? amount - 50000 : 0) + ' / Unlimited';

      tier1Fill.style.width = Math.min(100, (Math.min(amount, 10000) / 10000) * 100) + '%';
      tier2Fill.style.width = Math.min(100, (Math.max(0, Math.min(amount, 50000) - 10000) / 40000) * 100) + '%';
      tier3Fill.style.width = Math.min(100, (Math.max(0, amount - 50000) / 50000) * 100) + '%';
    }

    saleAmount.addEventListener('input', calculate);
    tier.addEventListener('change', calculate);
    baseSalaryToggle.addEventListener('change', calculate);
    calculate();
  </script>
</body>
</html>
