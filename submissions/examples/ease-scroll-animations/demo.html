<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Scroll Animations Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <h1>Scroll Animation Demo</h1>

  <div class="ease-on-scroll">Fade Up Box</div>
  <div class="ease-fade-scroll">Fade Box</div>
  <div class="ease-slide-scroll">Slide Box</div>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add("is-visible");
        }
      });
    }, {
      threshold: 0.2
    });

    document.querySelectorAll(
      ".ease-on-scroll, .ease-fade-scroll, .ease-slide-scroll"
    ).forEach(el => observer.observe(el));
  </script>

</body>
</html>
