<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Animated Toggle Switch</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0d0d14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 2rem;
        }
        .container {
            text-align: center;
            max-width: 800px;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #6c63ff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 2rem;
        }
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }
        .toggle-card {
            background: #1a1a2e;
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
        }
        .toggle-card h3 {
            color: #c4b5fd;
            margin-bottom: 1.5rem;
        }
        .note {
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            color: #a1a1aa;
            margin-top: 2rem;
        }
        .status {
            margin-top: 1rem;
            font-size: 0.875rem;
            color: #a1a1aa;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎚️ Animated Toggle Switches</h1>
    
    <div class="demo-grid">
        <div class="toggle-card">
            <h3>Default Toggle</h3>
            <label class="ease-toggle">
                <input type="checkbox">
                <span class="ease-toggle-slider"></span>
            </label>
            <div class="status">Click to toggle</div>
        </div>

        <div class="toggle-card">
            <h3>Large Toggle</h3>
            <label class="ease-toggle ease-toggle-large">
                <input type="checkbox">
                <span class="ease-toggle-slider"></span>
            </label>
        </div>

        <div class="toggle-card">
            <h3>Small Toggle</h3>
            <label class="ease-toggle ease-toggle-small">
                <input type="checkbox">
                <span class="ease-toggle-slider"></span>
            </label>
        </div>

        <div class="toggle-card">
            <h3>Pink Theme</h3>
            <label class="ease-toggle ease-toggle-pink">
                <input type="checkbox">
                <span class="ease-toggle-slider"></span>
            </label>
        </div>

        <div class="toggle-card">
            <h3>Green Theme</h3>
            <label class="ease-toggle ease-toggle-green">
                <input type="checkbox">
                <span class="ease-toggle-slider"></span>
            </label>
        </div>

        <div class="toggle-card">
            <h3>Glow Effect</h3>
            <label class="ease-toggle ease-toggle-glow">
                <input type="checkbox">
                <span class="ease-toggle-slider"></span>
            </label>
        </div>
    </div>

    <div class="note">
        💡 CSS-only toggle switches with 3D slider animation. Works without JavaScript!
    </div>
</div>
</body>
</html>
