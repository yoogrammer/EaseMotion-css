<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ease-text-decoder demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #0d1117; color: #39d353; gap: 1.5rem; font-size: 1.5rem; }
  </style>
</head>
<body>
  <span class="ease-decoder">INITIALIZING</span>
  <span class="ease-decoder">ACCESS GRANTED</span>
  <span class="ease-decoder">SYSTEM ONLINE</span>
  <script>
    const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&';
    function decode(el) {
      const target = el.dataset.text || el.textContent;
      let frame = 0, total = 18;
      const id = setInterval(() => {
        el.textContent = target.split('').map((ch, i) => {
          if (ch === ' ') return ' ';
          if (frame / total > i / target.length) return ch;
          return CHARS[Math.floor(Math.random() * CHARS.length)];
        }).join('');
        if (++frame > total) { el.textContent = target; clearInterval(id); }
      }, 35);
    }
    document.querySelectorAll('.ease-decoder').forEach(el => {
      el.dataset.text = el.textContent;
      el.addEventListener('mouseenter', () => decode(el));
    });
  </script>
</body>
</html>
