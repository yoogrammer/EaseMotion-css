<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Stat Counter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stats-grid">
  <div class="stat">
    <div class="stat-number" style="--target: 500;"></div>
    <span class="stat-label">Projects Completed</span>
    <div class="stat-underline"></div>
  </div>
  <div class="stat">
    <div class="stat-number" style="--target: 200;"></div>
    <span class="stat-label">Happy Clients</span>
    <div class="stat-underline"></div>
  </div>
  <div class="stat">
    <div class="stat-number" style="--target: 50;"></div>
    <span class="stat-label">Team Members</span>
    <div class="stat-underline"></div>
  </div>
  <div class="stat">
    <div class="stat-number" style="--target: 99;"></div>
    <span class="stat-label">Satisfaction %</span>
    <div class="stat-underline"></div>
  </div>
</div>

</body>
</html>
