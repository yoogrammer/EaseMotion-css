<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Tooltips — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tooltip-wrap">
    <button>Top Tooltip</button>
    <span class="tooltip top fade dark">
      Hello from top
    </span>
  </div>

  <div class="tooltip-wrap">
    <button>Right Tooltip</button>
    <span class="tooltip right pop primary">
      Helpful tip
    </span>
  </div>

  <div class="tooltip-wrap">
    <button>Bottom Tooltip</button>
    <span class="tooltip bottom slide success">
      Success message
    </span>
  </div>

  <div class="tooltip-wrap">
    <button>Left Tooltip</button>
    <span class="tooltip left scale error">
      Error message
    </span>
  </div>

</body>
</html>
