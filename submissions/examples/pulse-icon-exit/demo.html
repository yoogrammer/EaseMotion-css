<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse Icon Exit — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Pulse Icon Exit</h1>
    <p class="subtitle">
      Click any icon to trigger a satisfying pulse exit animation —<br />
      scales up, then shrinks and fades away.
    </p>

    <div class="icon-grid">
      <div class="icon-card">
        <button class="pulse-icon" data-icon="trash" aria-label="Delete">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            <line x1="10" y1="11" x2="10" y2="17" />
            <line x1="14" y1="11" x2="14" y2="17" />
          </svg>
        </button>
        <span class="icon-card-label">Delete</span>
      </div>

      <div class="icon-card">
        <button class="pulse-icon pulse-teal" data-icon="close" aria-label="Close">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
        <span class="icon-card-label">Close</span>
      </div>

      <div class="icon-card">
        <button class="pulse-icon pulse-amber" data-icon="logout" aria-label="Logout">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
        <span class="icon-card-label">Logout</span>
      </div>

      <div class="icon-card">
        <button class="pulse-icon pulse-blue" data-icon="ban" aria-label="Ban">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <line x1="4.93" y1="4.93" x2="19.07" y2="19.07" />
          </svg>
        </button>
        <span class="icon-card-label">Ban</span>
      </div>
    </div>

    <button id="resetAll" class="reset-btn hidden">Reset All &crarr;</button>
  </div>

  <script>
    const icons = document.querySelectorAll('.pulse-icon');
    const resetBtn = document.getElementById('resetAll');

    icons.forEach(icon => {
      icon.addEventListener('click', () => {
        icon.classList.add('exit-active');
        setTimeout(() => {
          resetBtn.classList.remove('hidden');
        }, 450);
      });
    });

    resetBtn.addEventListener('click', () => {
      icons.forEach(icon => icon.classList.remove('exit-active'));
      resetBtn.classList.add('hidden');
    });
  </script>
</body>
</html>
