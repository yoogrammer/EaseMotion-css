<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-progress-circle — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f8fafc;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #333; }
    .label { font-size: 0.75rem; color: #888; text-align: center; margin-bottom: 0.75rem; }
    .row { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; align-items: center; }
    .dark-bg {
      background: #0f172a;
      padding: 2rem;
      border-radius: 16px;
    }
  </style>
</head>
<body>

  <h1>ease-progress-circle Demo</h1>

  <div>
    <div class="label">Color variants (75%)</div>
    <div class="row">

      <div class="ease-progress-circle ease-progress-circle-primary"
           style="--ease-circle-circumference: 283; --ease-circle-offset: 71;">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle class="ease-progress-circle__track" cx="50" cy="50" r="45"/>
          <circle class="ease-progress-circle__fill" cx="50" cy="50" r="45"/>
        </svg>
        <span class="ease-progress-circle__label">75%</span>
      </div>

      <div class="ease-progress-circle ease-progress-circle-success"
           style="--ease-circle-circumference: 283; --ease-circle-offset: 71;">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle class="ease-progress-circle__track" cx="50" cy="50" r="45"/>
          <circle class="ease-progress-circle__fill" cx="50" cy="50" r="45"/>
        </svg>
        <span class="ease-progress-circle__label">75%</span>
      </div>

      <div class="ease-progress-circle ease-progress-circle-danger"
           style="--ease-circle-circumference: 283; --ease-circle-offset: 212;">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle class="ease-progress-circle__track" cx="50" cy="50" r="45"/>
          <circle class="ease-progress-circle__fill" cx="50" cy="50" r="45"/>
        </svg>
        <span class="ease-progress-circle__label">25%</span>
      </div>

      <div class="ease-progress-circle ease-progress-circle-warning"
           style="--ease-circle-circumference: 283; --ease-circle-offset: 141;">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle class="ease-progress-circle__track" cx="50" cy="50" r="45"/>
          <circle class="ease-progress-circle__fill" cx="50" cy="50" r="45"/>
        </svg>
        <span class="ease-progress-circle__label">50%</span>
      </div>

    </div>
  </div>

  <div>
    <div class="label">Size variants</div>
    <div class="row">

      <div class="ease-progress-circle ease-progress-circle-primary ease-progress-circle-sm"
           style="--ease-circle-circumference: 283; --ease-circle-offset: 71;">
        <svg width="60" height="60" viewBox="0 0 100 100">
          <circle class="ease-progress-circle__track" cx="50" cy="50" r="45"/>
          <circle class="ease-progress-circle__fill" cx="50" cy="50" r="45"/>
        </svg>
        <span class="ease-progress-circle__label">75%</span>
      </div>

      <div class="ease-progress-circle ease-progress-circle-primary"
           style="--ease-circle-circumference: 283; --ease-circle-offset: 71;">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle class="ease-progress-circle__track" cx="50" cy="50" r="45"/>
          <circle class="ease-progress-circle__fill" cx="50" cy="50" r="45"/>
        </svg>
        <span class="ease-progress-circle__label">75%</span>
      </div>

      <div class="ease-progress-circle ease-progress-circle-primary ease-progress-circle-lg"
           style="--ease-circle-circumference: 283; --ease-circle-offset: 71;">
        <svg width="140" height="140" viewBox="0 0 100 100">
          <circle class="ease-progress-circle__track" cx="50" cy="50" r="45"/>
          <circle class="ease-progress-circle__fill" cx="50" cy="50" r="45"/>
        </svg>
        <span class="ease-progress-circle__label">75%</span>
      </div>

    </div>
  </div>

  <div class="dark-bg">
    <div class="label" style="color:#94a3b8;">Dark background variant</div>
    <div class="row">
      <div class="ease-progress-circle ease-progress-circle-info ease-progress-circle-dark"
           style="--ease-circle-circumference: 283; --ease-circle-offset: 28;">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle class="ease-progress-circle__track" cx="50" cy="50" r="45"/>
          <circle class="ease-progress-circle__fill" cx="50" cy="50" r="45"/>
        </svg>
        <span class="ease-progress-circle__label">90%</span>
      </div>
      <div class="ease-progress-circle ease-progress-circle-success ease-progress-circle-dark"
           style="--ease-circle-circumference: 283; --ease-circle-offset: 71;">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle class="ease-progress-circle__track" cx="50" cy="50" r="45"/>
          <circle class="ease-progress-circle__fill" cx="50" cy="50" r="45"/>
        </svg>
        <span class="ease-progress-circle__label">75%</span>
      </div>
    </div>
  </div>

</body>
</html>
