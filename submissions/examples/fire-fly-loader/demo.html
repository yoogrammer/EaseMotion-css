<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dotted Ring Animation</title>
<link href="style.css" rel="stylesheet">
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const DOT_COUNT = 40;
const FPS = 30;
const TOTAL_FRAMES = 330;

let W, H, ringRadius, dots = [];

const baseRadii = Array.from({length: DOT_COUNT}, (_, i) => {
  const x = Math.sin(i * 127.1 + 42) * 43758.5453;
  return 0.7 + (x - Math.floor(x)) * 0.6;
});

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  ringRadius = Math.min(W, H) * 0.28;
  initDots();
}

function rng(i) {
  const x = Math.sin(i * 127.1 + 42) * 43758.5453;
  return x - Math.floor(x);
}

function initDots() {
  dots = [];
  const scatter = Math.min(W, H) * 0.48;
  for (let i = 0; i < DOT_COUNT; i++) {
    const angle = (i / DOT_COUNT) * Math.PI * 2;
    dots.push({
      startX: W/2 + (rng(i*2)   - 0.5) * scatter * 2,
      startY: H/2 + (rng(i*2+1) - 0.5) * scatter * 2,
      targetX: W/2 + Math.cos(angle) * ringRadius,
      targetY: H/2 + Math.sin(angle) * ringRadius,
      angle
    });
  }
}

function easeInOut(t) {
  return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
}

function lerpColor(c1, c2, t) {
  const p = (s, o) => parseInt(s.slice(o, o+2), 16);
  const r = Math.round(p(c1,1) + (p(c2,1) - p(c1,1)) * t);
  const g = Math.round(p(c1,3) + (p(c2,3) - p(c1,3)) * t);
  const b = Math.round(p(c1,5) + (p(c2,5) - p(c1,5)) * t);
  return `rgb(${r},${g},${b})`;
}

const ROT_SPEED  = (2.9 / 360) * Math.PI * 2 / 30;
const SCATTER_END  = 50;
const COLOR_START  = 170;
const COLOR_END    = 210;

let startTime = null;

function render(ts) {
  if (!startTime) startTime = ts;
  let f = Math.floor((ts - startTime) / (1000 / FPS));
  if (f > TOTAL_FRAMES) { startTime = ts; f = 0; }

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  if (f < 10) { requestAnimationFrame(render); return; }

  const dotScale = Math.min(W, H) / 600;

  for (let i = 0; i < DOT_COUNT; i++) {
    const d = dots[i];
    let x, y;

    if (f <= SCATTER_END) {
      const et = easeInOut(Math.max(0, Math.min(1, (f - 10) / 40)));
      x = d.startX + (d.targetX - d.startX) * et;
      y = d.startY + (d.targetY - d.startY) * et;
    } else {
      const rot = (f - SCATTER_END) * ROT_SPEED;
      x = W/2 + Math.cos(d.angle + rot) * ringRadius;
      y = H/2 + Math.sin(d.angle + rot) * ringRadius;
    }

    let color;
    if (f < COLOR_START) {
      color = '#E4E4E4';
    } else if (f < COLOR_END) {
      color = lerpColor('#E4E4E4', '#24B057', (f - COLOR_START) / 40);
    } else {
      color = '#24B057';
    }

    let r = baseRadii[i] * 5 * dotScale;
    if (f >= COLOR_END) {
      r *= 1 + 0.05 * Math.sin(((f - COLOR_END) / FPS) * (2 * Math.PI / 3));
    }

    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  }

  requestAnimationFrame(render);
}

window.addEventListener('resize', resize);
resize();
requestAnimationFrame(render);
</script>
</body>
</html>
