<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filter Chips — EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css@1.4.5/dist/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="display:flex;flex-direction:column;align-items:center;gap:var(--ease-space-8,32px);padding:var(--ease-space-6,24px);font-family:var(--ease-font-sans,system-ui,sans-serif);background:var(--ease-color-neutral-50,#f9fafb);margin:0;">

  <h1 style="font-size:1.5rem;font-weight:700;color:var(--ease-color-neutral-900,#111827);margin:0;">
    Filter Chips
  </h1>

  <!-- Default chips -->
  <div style="width:100%;max-width:600px;">
    <h2 style="font-size:0.875rem;font-weight:600;color:var(--ease-color-neutral-700,#374151);margin:0 0 var(--ease-space-3,12px);">
      Category
    </h2>
    <div class="ease-filter-chips-az">
      <button class="ease-filter-chip-az">All</button>
      <button class="ease-filter-chip-az --active">Design</button>
      <button class="ease-filter-chip-az">Development</button>
      <button class="ease-filter-chip-az">Marketing</button>
      <button class="ease-filter-chip-az">Product</button>
    </div>
  </div>

  <!-- With counts -->
  <div style="width:100%;max-width:600px;">
    <h2 style="font-size:0.875rem;font-weight:600;color:var(--ease-color-neutral-700,#374151);margin:0 0 var(--ease-space-3,12px);">
      Tags
    </h2>
    <div class="ease-filter-chips-az">
      <button class="ease-filter-chip-az --active">
        CSS
        <span class="ease-filter-chip-count-az">42</span>
      </button>
      <button class="ease-filter-chip-az">
        JavaScript
        <span class="ease-filter-chip-count-az">28</span>
      </button>
      <button class="ease-filter-chip-az">
        React
        <span class="ease-filter-chip-count-az">15</span>
      </button>
      <button class="ease-filter-chip-az">
        Design
        <span class="ease-filter-chip-count-az">22</span>
      </button>
    </div>
  </div>

  <!-- Outline variant with close -->
  <div style="width:100%;max-width:600px;">
    <h2 style="font-size:0.875rem;font-weight:600;color:var(--ease-color-neutral-700,#374151);margin:0 0 var(--ease-space-3,12px);">
      Active filters
    </h2>
    <div class="ease-filter-chips-az">
      <button class="ease-filter-chip-az --outline --active" style="padding-right:var(--ease-space-2,8px);">
        Category: Design
        <span class="ease-filter-chip-close-az">&#x2715;</span>
      </button>
      <button class="ease-filter-chip-az --outline --active" style="padding-right:var(--ease-space-2,8px);">
        Price: Low to High
        <span class="ease-filter-chip-close-az">&#x2715;</span>
      </button>
      <button class="ease-filter-chip-az --outline">Clear all</button>
    </div>
  </div>

  <!-- Size variants -->
  <div style="width:100%;max-width:600px;">
    <h2 style="font-size:0.875rem;font-weight:600;color:var(--ease-color-neutral-700,#374151);margin:0 0 var(--ease-space-3,12px);">
      Sizes: sm / default / lg
    </h2>
    <div style="display:flex;flex-direction:column;gap:var(--ease-space-3,12px);">
      <div class="ease-filter-chips-az --sm">
        <button class="ease-filter-chip-az">Small</button>
        <button class="ease-filter-chip-az --active">Chips</button>
      </div>
      <div class="ease-filter-chips-az">
        <button class="ease-filter-chip-az">Default</button>
        <button class="ease-filter-chip-az --active">Chips</button>
      </div>
      <div class="ease-filter-chips-az --lg">
        <button class="ease-filter-chip-az">Large</button>
        <button class="ease-filter-chip-az --active">Chips</button>
      </div>
    </div>
  </div>

</body>
</html>
