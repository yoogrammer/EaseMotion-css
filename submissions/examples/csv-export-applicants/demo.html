<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin CSV Export — applicant data table with one-click CSV download built with vanilla JS.">
  <title>CSV Export Applicants | EaseMotion CSS</title>
  <link rel="stylesheet" href="../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ce-demo">

    <!-- Header -->
    <div class="ce-header">
      <div class="ce-header-left">
        <h1>Applicants</h1>
        <p>
          <span class="ce-job-badge">📋 Software Engineer Intern</span>
          &nbsp;Review and export applicant data for the above job listing.
        </p>
      </div>
      <button class="ce-export-btn" id="export-btn" type="button">📥 Export as CSV</button>
    </div>

    <!-- Summary stats -->
    <div class="ce-summary">
      <div class="ce-stat">Total <strong id="total-count">0</strong></div>
      <div class="ce-stat">✅ Approved <strong id="approved-count">0</strong></div>
      <div class="ce-stat">⏳ Pending <strong id="pending-count">0</strong></div>
      <div class="ce-stat">❌ Rejected <strong id="rejected-count">0</strong></div>
    </div>

    <!-- Table -->
    <div class="ce-table-wrap">
      <table class="ce-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Branch</th>
            <th>CGPA</th>
            <th>Skills</th>
            <th>Status</th>
            <th>Applied</th>
          </tr>
        </thead>
        <tbody id="applicants-body">
          <!-- Injected by JS -->
        </tbody>
      </table>
    </div>

  </div>

  <script>
    (function () {
      'use strict';

      // ── Mock data ─────────────────────────────────────────────
      var applicants = [
        { name: 'Ananya Sharma', email: 'ananya.sharma@example.com', branch: 'CSE', cgpa: 8.9, skills: ['React', 'Node.js', 'Python'], status: 'Approved', applied: '2026-05-20' },
        { name: 'Rohit Verma', email: 'rohit.v@example.com', branch: 'ECE', cgpa: 7.8, skills: ['C++', 'Embedded', 'Linux'], status: 'Pending', applied: '2026-05-21' },
        { name: 'Priya Patel', email: 'priya.p@example.com', branch: 'CSE', cgpa: 9.2, skills: ['Java', 'Spring', 'SQL', 'AWS'], status: 'Approved', applied: '2026-05-19' },
        { name: 'Amit Singh', email: 'amit.s@example.com', branch: 'IT', cgpa: 7.5, skills: ['JavaScript', 'CSS', 'HTML'], status: 'Rejected', applied: '2026-05-22' },
        { name: 'Sneha Reddy', email: 'sneha.r@example.com', branch: 'CSE', cgpa: 8.7, skills: ['Python', 'Django', 'PostgreSQL'], status: 'Approved', applied: '2026-05-20' },
        { name: 'Vikram Joshi', email: 'vikram.j@example.com', branch: 'EEE', cgpa: 8.1, skills: ['MATLAB', 'Verilog', 'Python'], status: 'Pending', applied: '2026-05-23' },
        { name: 'Neha Gupta', email: 'neha.g@example.com', branch: 'CSE', cgpa: 9.0, skills: ['React', 'TypeScript', 'GraphQL'], status: 'Approved', applied: '2026-05-18' },
        { name: 'Arjun Nair', email: 'arjun.n@example.com', branch: 'ME', cgpa: 7.2, skills: ['AutoCAD', 'SolidWorks'], status: 'Rejected', applied: '2026-05-24' },
        { name: 'Kavita Das', email: 'kavita.d@example.com', branch: 'CSE', cgpa: 8.5, skills: ['Go', 'Docker', 'Kubernetes'], status: 'Pending', applied: '2026-05-21' },
        { name: 'Rahul Kumar', email: 'rahul.k@example.com', branch: 'IT', cgpa: 7.9, skills: ['Java', 'Spring Boot', 'MySQL'], status: 'Approved', applied: '2026-05-19' }
      ];

      // ── Render table ──────────────────────────────────────────
      var tbody = document.getElementById('applicants-body');

      function renderTable() {
        var html = '';
        applicants.forEach(function (a) {
          var statusClass = 'ce-status-' + a.status.toLowerCase();
          var initials = a.name.split(' ').map(function (s) { return s[0]; }).join('');
          var skillsHtml = a.skills.map(function (s) {
            return '<span class="ce-skill-tag">' + s + '</span>';
          }).join('');

          html +=
            '<tr>' +
              '<td><div class="ce-name"><span class="ce-avatar">' + initials + '</span>' + a.name + '</div></td>' +
              '<td>' + a.email + '</td>' +
              '<td>' + a.branch + '</td>' +
              '<td>' + a.cgpa + '</td>' +
              '<td><div class="ce-skills">' + skillsHtml + '</div></td>' +
              '<td><span class="ce-status ' + statusClass + '">' + a.status + '</span></td>' +
              '<td>' + a.applied + '</td>' +
            '</tr>';
        });
        tbody.innerHTML = html;
        updateStats();
      }

      // ── Stats ─────────────────────────────────────────────────
      function updateStats() {
        var total = applicants.length;
        var approved = applicants.filter(function (a) { return a.status === 'Approved'; }).length;
        var pending = applicants.filter(function (a) { return a.status === 'Pending'; }).length;
        var rejected = applicants.filter(function (a) { return a.status === 'Rejected'; }).length;
        document.getElementById('total-count').textContent = total;
        document.getElementById('approved-count').textContent = approved;
        document.getElementById('pending-count').textContent = pending;
        document.getElementById('rejected-count').textContent = rejected;
      }

      // ── CSV export ────────────────────────────────────────────
      function exportCSV() {
        var btn = document.getElementById('export-btn');
        btn.disabled = true;
        btn.classList.add('exporting');
        btn.innerHTML = '⏳ Generating...';

        setTimeout(function () {
          // Build CSV
          var rows = [
            ['Name', 'Email', 'Branch', 'CGPA', 'Skills', 'Status', 'Applied Date']
          ];

          applicants.forEach(function (a) {
            rows.push([
              a.name,
              a.email,
              a.branch,
              a.cgpa.toString(),
              '"' + a.skills.join(', ') + '"',
              a.status,
              a.applied
            ]);
          });

          var csvContent = rows.map(function (row) {
            return row.join(',');
          }).join('\n');

          var blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
          var url = URL.createObjectURL(blob);
          var link = document.createElement('a');
          link.href = url;
          link.download = 'applicants-software-engineer-intern.csv';
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(url);

          btn.classList.remove('exporting');
          btn.classList.add('done');
          btn.innerHTML = '✅ Exported!';
          btn.disabled = false;

          showToast('applicants-software-engineer-intern.csv downloaded (' + applicants.length + ' rows)');

          setTimeout(function () {
            btn.classList.remove('done');
            btn.innerHTML = '📥 Export as CSV';
          }, 2500);
        }, 800);
      }

      // ── Toast ─────────────────────────────────────────────────
      function showToast(msg) {
        var existing = document.querySelector('.ce-toast');
        if (existing) existing.remove();

        var toast = document.createElement('div');
        toast.className = 'ce-toast';
        toast.textContent = msg;
        document.body.appendChild(toast);

        setTimeout(function () {
          toast.classList.add('fade-out');
          setTimeout(function () { toast.remove(); }, 350);
        }, 3000);
      }

      // ── Init ──────────────────────────────────────────────────
      renderTable();
      document.getElementById('export-btn').addEventListener('click', exportCSV);

    })();
  </script>

</body>
</html>
