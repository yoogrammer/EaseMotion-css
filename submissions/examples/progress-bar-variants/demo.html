<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress Bar · Variants</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Progress Bar Variants</h1>
  <p class="subtitle">Animated fill, stripes, labels, sizes, and more.</p>

  <section>
    <h2>Basic Filled (with percentage label)</h2>
    <div class="progress">
      <div class="progress-bar" style="width: 65%;">65%</div>
    </div>
    <div class="progress progress-success">
      <div class="progress-bar" style="width: 42%;">42%</div>
    </div>
    <div class="progress progress-warning">
      <div class="progress-bar" style="width: 88%;">88%</div>
    </div>
    <div class="progress progress-error">
      <div class="progress-bar" style="width: 23%;">23%</div>
    </div>
  </section>

  <section>
    <h2>Animated Fill</h2>
    <div class="progress progress-animated">
      <div class="progress-bar" style="width: 70%;"></div>
    </div>
  </section>

  <section>
    <h2>Striped Pattern</h2>
    <div class="progress progress-striped">
      <div class="progress-bar" style="width: 55%;"></div>
    </div>
    <div class="progress progress-striped progress-success">
      <div class="progress-bar" style="width: 80%;"></div>
    </div>
  </section>

  <section>
    <h2>Rounded vs Flat</h2>
    <div class="progress progress-rounded">
      <div class="progress-bar" style="width: 50%;">50%</div>
    </div>
    <div class="progress progress-flat">
      <div class="progress-bar" style="width: 50%;">50%</div>
    </div>
  </section>

  <section>
    <h2>Indeterminate (animated)</h2>
    <div class="progress progress-indeterminate">
      <div class="progress-bar"></div>
    </div>
  </section>

  <section>
    <h2>Size Variants</h2>
    <div class="progress progress-xs">
      <div class="progress-bar" style="width: 30%;"></div>
    </div>
    <div class="progress progress-sm">
      <div class="progress-bar" style="width: 55%;"></div>
    </div>
    <div class="progress progress-md">
      <div class="progress-bar" style="width: 75%;">75%</div>
    </div>
    <div class="progress progress-lg">
      <div class="progress-bar" style="width: 90%;">90%</div>
    </div>
  </section>

  <footer>
    <p>Built with <a href="https://github.com/anomalyco/EaseMotion-css">EaseMotion CSS</a></p>
  </footer>
</body>
</html>
