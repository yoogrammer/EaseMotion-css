<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Dropdown — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Animated Dropdown</h1>
  <p class="subtitle">CSS-only dropdown using <code>:focus-within</code> — three variants</p>

  <div class="demo-grid">
    <!-- Variant 1: Button Dropdown -->
    <div class="demo-section">
      <h2>Button Dropdown</h2>
      <div class="ease-dropdown" tabindex="0">
        <button class="ease-dropdown-trigger">
          Actions
          <span class="arrow">▾</span>
        </button>
        <div class="ease-dropdown-menu">
          <button class="ease-dropdown-item">
            <span class="item-icon">📝</span> Edit
          </button>
          <button class="ease-dropdown-item">
            <span class="item-icon">📋</span> Copy
          </button>
          <button class="ease-dropdown-item">
            <span class="item-icon">🗑️</span> Delete
          </button>
          <div class="ease-dropdown-divider"></div>
          <button class="ease-dropdown-item">
            <span class="item-icon">⚙️</span> Settings
          </button>
        </div>
      </div>
    </div>

    <!-- Variant 2: Right-aligned Dropdown -->
    <div class="demo-section">
      <h2>Right-Aligned</h2>
      <div class="ease-dropdown ease-dropdown-right" tabindex="0">
        <button class="ease-dropdown-trigger">
          Profile
          <span class="arrow">▾</span>
        </button>
        <div class="ease-dropdown-menu">
          <button class="ease-dropdown-item">
            <span class="item-icon">👤</span> My Account
          </button>
          <button class="ease-dropdown-item">
            <span class="item-icon">⭐</span> Favorites
          </button>
          <div class="ease-dropdown-divider"></div>
          <button class="ease-dropdown-item">
            <span class="item-icon">🚪</span> Sign Out
          </button>
        </div>
      </div>
    </div>

    <!-- Variant 3: Navbar-style Dropdown -->
    <div class="demo-section">
      <h2>Navbar Item</h2>
      <div class="ease-dropdown ease-nav-dropdown" tabindex="0">
        <button class="ease-dropdown-trigger">
          Resources
          <span class="arrow">▾</span>
        </button>
        <div class="ease-dropdown-menu">
          <a href="#" class="ease-dropdown-item">Documentation</a>
          <a href="#" class="ease-dropdown-item">API Reference</a>
          <a href="#" class="ease-dropdown-item">Examples</a>
          <div class="ease-dropdown-divider"></div>
          <a href="#" class="ease-dropdown-item">Community</a>
        </div>
      </div>
    </div>
  </div>

  <div class="legend">
    <strong>Keyboard Controls:</strong><br>
    <kbd>Tab</kbd> Focus the trigger &nbsp;·&nbsp;
    <kbd>Enter</kbd> / <kbd>Space</kbd> Toggle &nbsp;·&nbsp;
    <kbd>Escape</kbd> Close
  </div>
</body>
</html>
