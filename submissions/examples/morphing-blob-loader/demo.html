<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morphing Blob Loader – EaseMotion CSS</title>
  <meta name="description" content="Organic morphing blob loading animation using CSS border-radius keyframes." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Morphing Blob Loader</h1>
  <p>Organic shape-shifting loading indicator</p>

  <div class="loader-scene">
    <div class="blob blob--1" aria-hidden="true"></div>
    <div class="blob blob--2" aria-hidden="true"></div>
    <div class="blob blob--3" aria-hidden="true"></div>
    <span class="sr-only" role="status">Loading…</span>
  </div>

  <div class="size-variants">
    <div class="loader-scene loader-scene--sm" aria-hidden="true">
      <div class="blob blob--1"></div>
    </div>
    <div class="loader-scene loader-scene--lg" aria-hidden="true">
      <div class="blob blob--1"></div>
      <div class="blob blob--2"></div>
    </div>
  </div>
</body>
</html>
