<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Confetti Burst Button – EaseMotion CSS</title>
  <meta name="description" content="A celebration button that bursts confetti particles using pure CSS keyframe animations on click." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Confetti Burst Button</h1>
  <p>Click the button to celebrate!</p>

  <div class="confetti-wrapper">
    <button class="btn-confetti" id="confettiBtn">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <span class="label-normal">🎉 Celebrate!</span>
      <span class="label-success">✓ Woohoo!</span>
    </button>
  </div>

  <div class="variants">
    <div class="confetti-wrapper">
      <button class="btn-confetti" id="confettiBtn2" style="background:linear-gradient(135deg,#f43f5e,#fb923c); box-shadow: 0 8px 32px rgba(244,63,94,0.45);">
        <div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div>
        <span class="label-normal">Submit</span>
        <span class="label-success">✓ Sent!</span>
      </button>
    </div>
    <div class="confetti-wrapper">
      <button class="btn-confetti" id="confettiBtn3" style="background:linear-gradient(135deg,#0891b2,#22d3ee); box-shadow: 0 8px 32px rgba(34,211,238,0.45);">
        <div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div>
        <span class="label-normal">Purchase</span>
        <span class="label-success">✓ Done!</span>
      </button>
    </div>
  </div>

  <script>
    document.querySelectorAll('.btn-confetti').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.classList.contains('burst')) return;
        btn.classList.add('burst');
        setTimeout(() => {
          btn.classList.add('success');
        }, 300);
        setTimeout(() => {
          btn.classList.remove('burst', 'success');
        }, 2200);
      });
    });
  </script>
</body>
</html>
