<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hover Jiggle Effect</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>Hover over each button</h2>

    <button class="btn hover-pulse"
      style="background:#ede9ff; color:#6c63ff;">
      💜 Pulse
    </button>

    <button class="btn hover-jiggle"
      style="background:#fff3e8; color:#f97316;">
      🔔 Jiggle
    </button>

    <button class="btn hover-bounce"
      style="background:#e6faf3; color:#10b981;">
      ⬆️ Bounce
    </button>

    <button class="btn hover-shake"
      style="background:#fce7f3; color:#ec4899;">
      ↔️ Shake
    </button>
  </div>

  <div class="card">
    <h2>Works on any element</h2>

    <div class="hover-pulse" style="display:inline-block; margin:10px;">
      <div style="background:#6c63ff; color:white; border-radius:12px;
                  padding:20px 24px; font-weight:600;">
        Subscribe Now
      </div>
    </div>

    <div class="hover-jiggle" style="display:inline-block; margin:10px;">
      <div style="background:#f97316; color:white; border-radius:12px;
                  padding:20px 24px; font-weight:600;">
        🔔 Notification
      </div>
    </div>

  </div>

</body>
</html>
