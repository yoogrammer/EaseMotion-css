<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer — New Year 2027</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>New Year 2027</h1>
    <div class="timer">
      <div class="timer-unit"><span id="days">00</span><small>Days</small></div>
      <div class="timer-unit"><span id="hours">00</span><small>Hours</small></div>
      <div class="timer-unit"><span id="minutes">00</span><small>Minutes</small></div>
      <div class="timer-unit"><span id="seconds">00</span><small>Seconds</small></div>
    </div>
    <p id="message"></p>
  </div>

  <script>
    function updateTimer() {
      const target = new Date('January 1, 2027 00:00:00').getTime();
      const now = new Date().getTime();
      const diff = target - now;

      if (diff <= 0) {
        document.getElementById('days').textContent = '00';
        document.getElementById('hours').textContent = '00';
        document.getElementById('minutes').textContent = '00';
        document.getElementById('seconds').textContent = '00';
        document.getElementById('message').textContent = 'Happy New Year 2027!';
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('days').textContent = String(days).padStart(2, '0');
      document.getElementById('hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }

    updateTimer();
    setInterval(updateTimer, 1000);
  </script>
</body>
</html>
