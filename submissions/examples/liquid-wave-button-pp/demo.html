<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Glass Button with Liquid Wave Fill</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Header Section -->
    <header class="demo-header">
      <h1>Interactive Liquid Wave Buttons</h1>
      <p>
        A collection of premium glassmorphic buttons featuring dynamic liquid
        wave loading transitions. Hover over the buttons to see the liquid rise
        and fill the glass capsule with horizontal undulating wave motions.
      </p>
    </header>

    <!-- Showcase Grid -->
    <main class="button-showcase-grid">
      <!-- Card 1: Cyan Ocean Theme -->
      <div class="button-card">
        <span class="button-card-title">Ocean Surge</span>
        <button class="liquid-wave-btn theme-cyan">
          <span class="btn-text">Explore Ocean</span>
          <div class="liquid-container">
            <svg
              class="svg-wave"
              viewBox="0 0 480 28"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                class="wave-path-1"
                d="M 0 15 C 30 15, 30 5, 60 5 C 90 5, 90 15, 120 15 C 150 15, 150 5, 180 5 C 210 5, 210 15, 240 15 C 270 15, 270 5, 300 5 C 330 5, 330 15, 360 15 C 390 15, 390 5, 420 5 C 450 5, 450 15, 480 15 L 480 28 L 0 28 Z"
              />
              <path
                class="wave-path-2"
                d="M 0 15 C 30 15, 30 5, 60 5 C 90 5, 90 15, 120 15 C 150 15, 150 5, 180 5 C 210 5, 210 15, 240 15 C 270 15, 270 5, 300 5 C 330 5, 330 15, 360 15 C 390 15, 390 5, 420 5 C 450 5, 450 15, 480 15 L 480 28 L 0 28 Z"
              />
            </svg>
            <div class="liquid-base"></div>
          </div>
        </button>
      </div>

      <!-- Card 2: Purple Plasma Theme -->
      <div class="button-card">
        <span class="button-card-title">Neon Plasma</span>
        <button class="liquid-wave-btn theme-purple">
          <span class="btn-text">Activate Grid</span>
          <div class="liquid-container">
            <svg
              class="svg-wave"
              viewBox="0 0 480 28"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                class="wave-path-1"
                d="M 0 15 C 30 15, 30 5, 60 5 C 90 5, 90 15, 120 15 C 150 15, 150 5, 180 5 C 210 5, 210 15, 240 15 C 270 15, 270 5, 300 5 C 330 5, 330 15, 360 15 C 390 15, 390 5, 420 5 C 450 5, 450 15, 480 15 L 480 28 L 0 28 Z"
              />
              <path
                class="wave-path-2"
                d="M 0 15 C 30 15, 30 5, 60 5 C 90 5, 90 15, 120 15 C 150 15, 150 5, 180 5 C 210 5, 210 15, 240 15 C 270 15, 270 5, 300 5 C 330 5, 330 15, 360 15 C 390 15, 390 5, 420 5 C 450 5, 450 15, 480 15 L 480 28 L 0 28 Z"
              />
            </svg>
            <div class="liquid-base"></div>
          </div>
        </button>
      </div>

      <!-- Card 3: Green Bio Acid Theme -->
      <div class="button-card">
        <span class="button-card-title">Bio Acid</span>
        <button class="liquid-wave-btn theme-green">
          <span class="btn-text">Initiate Core</span>
          <div class="liquid-container">
            <svg
              class="svg-wave"
              viewBox="0 0 480 28"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                class="wave-path-1"
                d="M 0 15 C 30 15, 30 5, 60 5 C 90 5, 90 15, 120 15 C 150 15, 150 5, 180 5 C 210 5, 210 15, 240 15 C 270 15, 270 5, 300 5 C 330 5, 330 15, 360 15 C 390 15, 390 5, 420 5 C 450 5, 450 15, 480 15 L 480 28 L 0 28 Z"
              />
              <path
                class="wave-path-2"
                d="M 0 15 C 30 15, 30 5, 60 5 C 90 5, 90 15, 120 15 C 150 15, 150 5, 180 5 C 210 5, 210 15, 240 15 C 270 15, 270 5, 300 5 C 330 5, 330 15, 360 15 C 390 15, 390 5, 420 5 C 450 5, 450 15, 480 15 L 480 28 L 0 28 Z"
              />
            </svg>
            <div class="liquid-base"></div>
          </div>
        </button>
      </div>

      <!-- Card 4: Orange Solar Flare Theme -->
      <div class="button-card">
        <span class="button-card-title">Solar Flare</span>
        <button class="liquid-wave-btn theme-orange">
          <span class="btn-text">Ignite Drive</span>
          <div class="liquid-container">
            <svg
              class="svg-wave"
              viewBox="0 0 480 28"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                class="wave-path-1"
                d="M 0 15 C 30 15, 30 5, 60 5 C 90 5, 90 15, 120 15 C 150 15, 150 5, 180 5 C 210 5, 210 15, 240 15 C 270 15, 270 5, 300 5 C 330 5, 330 15, 360 15 C 390 15, 390 5, 420 5 C 450 5, 450 15, 480 15 L 480 28 L 0 28 Z"
              />
              <path
                class="wave-path-2"
                d="M 0 15 C 30 15, 30 5, 60 5 C 90 5, 90 15, 120 15 C 150 15, 150 5, 180 5 C 210 5, 210 15, 240 15 C 270 15, 270 5, 300 5 C 330 5, 330 15, 360 15 C 390 15, 390 5, 420 5 C 450 5, 450 15, 480 15 L 480 28 L 0 28 Z"
              />
            </svg>
            <div class="liquid-base"></div>
          </div>
        </button>
      </div>
    </main>
  </body>
</html>
