<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expanding Search Input</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <label class="search-wrapper">
    <span class="sr-only">Search</span>
    <input
      type="search"
      class="search-input"
      placeholder="Search..."
      aria-label="Search"
    >
  </label>

</body>
</html>
