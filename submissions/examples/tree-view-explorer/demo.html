<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Tree-View File Explorer</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 440px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Recursive State Matrix Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Click folder branch handles below. Sibling combinators disclose deeply nested repository directories recursively at 60fps with 0 script lines.</p>
  </header>

  <aside class="alm-explorer-sidebar">
    <ul class="alm-tree-branch alm-is-root">
      
      <li class="alm-tree-node">
        <input type="checkbox" id="dir-submissions" class="alm-tree-toggle">
        
        <label for="dir-submissions" class="alm-node-row-handle">
          <span class="alm-node-icon alm-is-chevron">▶</span>
          <span class="alm-node-icon">📁</span>
          <span>submissions</span>
        </label>
        
        <ul class="alm-tree-branch">
          
          <li class="alm-tree-node">
            <input type="checkbox" id="dir-examples" class="alm-tree-toggle">
            
            <label for="dir-examples" class="alm-node-row-handle">
              <span class="alm-node-icon alm-is-chevron">▶</span>
              <span class="alm-node-icon">📁</span>
              <span>examples</span>
            </label>
            
            <ul class="alm-tree-branch">
              <li>
                <a href="#" class="alm-tree-leaf">
                  <span class="alm-node-icon">📄</span>
                  <span>style.css</span>
                </a>
              </li>
              <li>
                <a href="#" class="alm-tree-leaf">
                  <span class="alm-node-icon">🌐</span>
                  <span>demo.html</span>
                </a>
              </li>
            </ul>
          </li>
          
          <li>
            <a href="#" class="alm-tree-leaf">
              <span class="alm-node-icon">📝</span>
              <span>CONTRIBUTING.md</span>
            </a>
          </li>

        </ul>
      </li>

      <li>
        <a href="#" class="alm-tree-leaf">
          <span class="alm-node-icon">📦</span>
          <span>package.json</span>
        </a>
      </li>

    </ul>
  </aside>

</body>
</html>
