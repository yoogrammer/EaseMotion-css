<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scale Card Entrance Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      width: 280px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card h2 { margin: 0 0 0.5rem; font-size: 1.2rem; }
    .card p  { margin: 0; color: #666; font-size: 0.9rem; }

    button {
      padding: 0.6rem 1.4rem;
      border: none;
      border-radius: 8px;
      background: #6366f1;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <button onclick="replay()">▶ Replay Animation</button>

  <div class="card scale-card-entrance" id="card">
    <h2>Scale Card Entrance</h2>
    <p>This card animates in with a smooth scale effect on page load.</p>
  </div>

  <script>
    function replay() {
      const card = document.getElementById('card');
      card.classList.remove('scale-card-entrance');
      void card.offsetWidth; // force reflow
      card.classList.add('scale-card-entrance');
    }
  </script>
</body>
</html>
