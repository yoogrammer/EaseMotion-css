<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ease Spin — EaseMotion CSS Submission</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 2rem;
    }

    .label {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 0.5rem;
    }

    .demo-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #333;
      border-top-color: #6366f1;
      border-radius: 50%;
    }

    .icon {
      font-size: 2rem;
    }
  </style>
</head>
<body>

  <div class="demo-block">
    <p class="label">Loading spinner (default speed)</p>
    <div class="ease-spin spinner"></div>
  </div>

  <div class="demo-block">
    <p class="label">Decorative icon</p>
    <span class="ease-spin icon">⚙️</span>
  </div>

  <div class="demo-block">
    <p class="label">Fast spin</p>
    <div class="ease-spin spinner"
         style="--ease-spin-speed: 0.4s; border-top-color: #f97316;"></div>
  </div>

  <div class="demo-block">
    <p class="label">Slow spin</p>
    <div class="ease-spin spinner"
         style="--ease-spin-speed: 3s; border-top-color: #10b981;"></div>
  </div>

  <div class="demo-block">
    <p class="label">Reverse direction</p>
    <div class="ease-spin spinner"
         style="--ease-spin-direction: reverse; border-top-color: #ec4899;"></div>
  </div>

</body>
</html>
