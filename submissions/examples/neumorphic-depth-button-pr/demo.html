<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neumorphic Depth Button Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #e8edf3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
    }

    p {
      color: #94a3b8;
      font-size: 0.85rem;
      margin: 0;
    }
  </style>
</head>
<body>

  <button class="ease-neumorphic-btn">Press Me</button>
  <p>Hover to lift, click and hold to sink</p>

  <button class="ease-neumorphic-btn is-pressed">Toggled (Pressed)</button>
  <p>Static example of .is-pressed state</p>

</body>
</html>
