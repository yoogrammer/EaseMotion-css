<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Form Components</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="form-container">
    <h1>Animated Form</h1>
    <form class="form">

      <div class="field-group">
        <label class="field-label" for="name">Full Name</label>
        <input class="field-input" type="text" id="name" placeholder="e.g. Jane Doe">
      </div>

      <div class="field-group">
        <label class="field-label" for="email">Email Address</label>
        <input class="field-input" type="email" id="email" placeholder="e.g. jane@example.com">
      </div>

      <div class="field-group">
        <label class="field-label" for="role">Role</label>
        <div class="select-wrapper">
          <select class="field-select" id="role">
            <option value="" disabled selected>Choose a role</option>
            <option value="dev">Developer</option>
            <option value="design">Designer</option>
            <option value="pm">Product Manager</option>
          </select>
        </div>
      </div>

      <fieldset class="fieldset">
        <legend class="field-label">Preferences</legend>
        <label class="checkbox-label">
          <input class="field-checkbox" type="checkbox" name="prefs" value="newsletter">
          <span class="checkbox-custom"></span>
          Subscribe to newsletter
        </label>
        <label class="checkbox-label">
          <input class="field-checkbox" type="checkbox" name="prefs" value="updates">
          <span class="checkbox-custom"></span>
          Product updates
        </label>
      </fieldset>

      <fieldset class="fieldset">
        <legend class="field-label">Experience Level</legend>
        <label class="radio-label">
          <input class="field-radio" type="radio" name="experience" value="beginner">
          <span class="radio-custom"></span>
          Beginner
        </label>
        <label class="radio-label">
          <input class="field-radio" type="radio" name="experience" value="intermediate">
          <span class="radio-custom"></span>
          Intermediate
        </label>
        <label class="radio-label">
          <input class="field-radio" type="radio" name="experience" value="advanced">
          <span class="radio-custom"></span>
          Advanced
        </label>
      </fieldset>

      <div class="field-group">
        <label class="field-label" for="bio">Bio</label>
        <textarea class="field-textarea" id="bio" rows="4" placeholder="Tell us about yourself..."></textarea>
      </div>

      <button class="form-submit" type="submit">Submit</button>
    </form>
  </div>
</body>
</html>
