<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tooltip Layer Vars Demo</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="demo">
        <h2>Tooltip Layer System</h2>
        <p>Hover the buttons to see tooltips with consistent layering.</p>
        <div class="btn-group">
            <div class="tooltip-wrapper">
                <button class="trigger">Hover me</button>
                <div class="tooltip tooltip--top">Top tooltip</div>
            </div>
            <div class="tooltip-wrapper">
                <button class="trigger">Hover me</button>
                <div class="tooltip tooltip--bottom">Bottom tooltip</div>
            </div>
            <div class="tooltip-wrapper">
                <button class="trigger">Hover me</button>
                <div class="tooltip tooltip--left">Left tooltip</div>
            </div>
            <div class="tooltip-wrapper">
                <button class="trigger">Hover me</button>
                <div class="tooltip tooltip--right">Right tooltip</div>
            </div>
        </div>
    </div>
</body>
</html>
