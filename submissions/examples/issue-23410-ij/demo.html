<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinyl Record Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="turntable">
    <div class="tt-base"></div>
    <div class="platter"></div>
    <div class="vinyl">
      <div class="vinyl-label">
        <div class="label-hole"></div>
      </div>
      <div class="groove" style="--i:0"></div>
      <div class="groove" style="--i:1"></div>
      <div class="groove" style="--i:2"></div>
      <div class="groove" style="--i:3"></div>
      <div class="groove" style="--i:4"></div>
    </div>
    <div class="tonearm">
      <div class="tonearm-base"></div>
      <div class="tonearm-bar"></div>
      <div class="tonearm-head">
        <div class="stylus"></div>
      </div>
    </div>
    <div class="speed-dot"></div>
  </div>
</body>
</html>
