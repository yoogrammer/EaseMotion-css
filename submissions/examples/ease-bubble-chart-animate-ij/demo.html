<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bubble Chart Animate</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #e2e8f0;
    }
    .demo-container {
      background: #1e293b;
      border-radius: 16px;
      padding: 48px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      max-width: 900px;
      width: 100%;
      margin: 24px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p.desc { color: #94a3b8; margin-bottom: 32px; font-size: 0.9rem; }
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .controls button {
      padding: 8px 20px;
      border: 2px solid #334155;
      border-radius: 8px;
      background: #1e293b;
      color: #e2e8f0;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .controls button:hover { border-color: #38bdf8; color: #38bdf8; }
    .controls button.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; }
    .demo-box {
      background: #0f172a;
      border-radius: 12px;
      padding: 40px 32px;
      border: 1px solid #1e293b;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      min-height: 360px;
    }
    .slider-group {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }
    .slider-group label { font-size: 0.8rem; color: #94a3b8; }
    .slider-group input { accent-color: #38bdf8; }
  </style>
</head>
<body>
  <div class="demo-container">
    <h1>Bubble Chart Animate</h1>
    <p class="desc">Animated bubble chart with growing and shrinking data bubbles</p>

    <div class="controls">
      <button class="active" id="playAnim">Play</button>
      <button id="pauseAnim">Pause</button>
      <button id="resetAnim">Reset</button>
      <div class="slider-group">
        <label for="speed">Speed:</label>
        <input type="range" id="speed" min="2" max="12" value="6" step="1">
      </div>
    </div>

    <div class="demo-box">
      <div class="ease-bubble-chart-animate">
        <div class="bubble" style="--bubble-delay: 0s;" data-value="85">Sales</div>
        <div class="bubble" style="--bubble-delay: 0.15s;" data-value="62">Growth</div>
        <div class="bubble" style="--bubble-delay: 0.3s;" data-value="94">Users</div>
        <div class="bubble" style="--bubble-delay: 0.45s;" data-value="48">Revenue</div>
        <div class="bubble" style="--bubble-delay: 0.6s;" data-value="77">Engage</div>
      </div>
    </div>
  </div>

  <script>
    const chart = document.querySelector('.ease-bubble-chart-animate');
    const speedSlider = document.getElementById('speed');

    document.getElementById('playAnim').addEventListener('click', () => {
      chart.classList.remove('paused');
      chart.classList.add('playing');
      document.querySelectorAll('[data-crumbs]').forEach(b => b.classList.remove('active'));
    });

    document.getElementById('pauseAnim').addEventListener('click', () => {
      chart.classList.add('paused');
    });

    document.getElementById('resetAnim').addEventListener('click', () => {
      chart.classList.remove('playing', 'paused');
      void chart.offsetHeight;
      chart.classList.add('playing');
    });

    speedSlider.addEventListener('input', () => {
      chart.style.setProperty('--anim-duration', `${12 - parseInt(speedSlider.value) + 2}s`);
    });
  </script>
</body>
</html>
