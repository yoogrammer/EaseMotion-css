<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tooltip Arrow Positioning - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Tooltip — Arrow Positioning</h1>
    <p class="description">
      Hover each button to see how the arrow anchors to the start,
      center, or end of the trigger.
    </p>

    <div class="tooltip-row">
      <span class="ease-tooltip demo-btn" data-tooltip="Arrow at start" data-position="top" data-arrow="start">Start</span>
      <span class="ease-tooltip demo-btn" data-tooltip="Arrow at center (default)" data-position="top" data-arrow="center">Center</span>
      <span class="ease-tooltip demo-btn" data-tooltip="Arrow at end" data-position="top" data-arrow="end">End</span>
    </div>

  </div>

</body>
</html>
