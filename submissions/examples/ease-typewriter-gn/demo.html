<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-typewriter – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2.5rem;
      background: #1e1e2e;
      color: #f5f5f5;
      padding: 2rem;
    }
    h1 { font-family: sans-serif; color: #f5f5f5; font-size: 1.3rem; margin: 0; }
    h3 { font-family: sans-serif; color: #999; font-size: 0.8rem; margin: 0 0 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .demo { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
    p { font-size: 1.2rem; margin: 0; }
  </style>
</head>
<body>

  <h1>ease-typewriter Text Animation</h1>

  <div class="demo">
    <h3>Default (3s)</h3>
    <p class="ease-typewriter">Welcome to EaseMotion CSS</p>
  </div>

  <div class="demo">
    <h3>Slow (6s)</h3>
    <p class="ease-typewriter-slow">Building beautiful animations</p>
  </div>

  <div class="demo">
    <h3>Fast (1.5s)</h3>
    <p class="ease-typewriter-fast">Quick typing effect</p>
  </div>

  <div class="demo">
    <h3>Looping</h3>
    <p class="ease-typewriter-loop">This text types and retypes...</p>
  </div>

  <div class="demo">
    <h3>No Cursor</h3>
    <p class="ease-typewriter-no-cursor">Plain typewriter without blink</p>
  </div>

</body>
</html>
