<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Star Rating Display — Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <p class="label">EaseMotion CSS — contribution demo</p>
    <h1>Star Rating Display</h1>
  </header>

  <section class="demo-section">
    <p class="section-label">Example 01 — Default (hover and click)</p>
    <div class="card">
      <p class="demo-desc">Hover to preview, click to select</p>
      <div class="star-rating">
        <input type="radio" name="rating1" id="s5" value="5">
        <label for="s5">★</label>
        <input type="radio" name="rating1" id="s4" value="4">
        <label for="s4">★</label>
        <input type="radio" name="rating1" id="s3" value="3">
        <label for="s3">★</label>
        <input type="radio" name="rating1" id="s2" value="2">
        <label for="s2">★</label>
        <input type="radio" name="rating1" id="s1" value="1">
        <label for="s1">★</label>
      </div>
    </div>
  </section>

  <section class="demo-section">
    <p class="section-label">Example 02 — Large size</p>
    <div class="card">
      <div class="star-rating star-rating--lg">
        <input type="radio" name="rating2" id="l5" value="5">
        <label for="l5">★</label>
        <input type="radio" name="rating2" id="l4" value="4">
        <label for="l4">★</label>
        <input type="radio" name="rating2" id="l3" value="3">
        <label for="l3">★</label>
        <input type="radio" name="rating2" id="l2" value="2">
        <label for="l2">★</label>
        <input type="radio" name="rating2" id="l1" value="1">
        <label for="l1">★</label>
      </div>
    </div>
  </section>

  <section class="demo-section">
    <p class="section-label">Example 03 — Read-only pre-selected at 4 stars</p>
    <div class="card">
      <div class="star-rating star-rating--readonly">
        <input type="radio" name="rating3" id="r5" value="5">
        <label for="r5">★</label>
        <input type="radio" name="rating3" id="r4" value="4" checked>
        <label for="r4">★</label>
        <input type="radio" name="rating3" id="r3" value="3">
        <label for="r3">★</label>
        <input type="radio" name="rating3" id="r2" value="2">
        <label for="r2">★</label>
        <input type="radio" name="rating3" id="r1" value="1">
        <label for="r1">★</label>
      </div>
    </div>
  </section>

  <footer class="page-footer">
    Pure CSS · No JavaScript · EaseMotion contribution
  </footer>

</body>
</html>
