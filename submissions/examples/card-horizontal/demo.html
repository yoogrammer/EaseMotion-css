<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-card-horizontal — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 2rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; letter-spacing: 0.05em; }
    .row { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .ease-card-horizontal {
      width: 400px; max-width: 100%;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 12px; color: #fff;
    }
    .ease-card-body h3 { margin: 0 0 0.25rem; font-size: 1.1rem; }
    .ease-card-body p { margin: 0; color: #888; font-size: 0.85rem; line-height: 1.4; }
    .ease-card-media {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 2rem;
    }
  </style>
</head>
<body>
  <h1>ease-card-horizontal</h1>
  <div class="section">
    <div class="label">Horizontal card layout</div>
    <div class="row">
      <div class="ease-card ease-card-horizontal">
        <div class="ease-card-media">🖼</div>
        <div class="ease-card-body">
          <h3>Card Title</h3>
          <p>Description text that sits beside the image. Resize to see stack on mobile.</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
