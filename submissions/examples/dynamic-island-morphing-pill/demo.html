<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Island (Morphing Pill) Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Demo environment styling */
    body {
      margin: 0;
      padding: 0;
      background-color: #f3f4f6;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    .demo-container {
      max-width: 600px;
      margin: 40px auto;
      text-align: center;
    }

    .instructions {
      color: #6b7280;
      margin-top: 100px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="demo-container">
    <h2>Dynamic Island Animation</h2>
    
    <!-- Dynamic Island Component -->
    <div class="ease-dynamic-island">
      <!-- Hidden checkbox controls the state without JS -->
      <input type="checkbox" id="island-toggle" class="island-toggle-hack" />
      
      <!-- The morphing container acts as a label to trigger the checkbox -->
      <label for="island-toggle" class="island-morph-container">
        
        <!-- Compact State -->
        <div class="island-compact-state">
          <span>🔔</span>
        </div>
        
        <!-- Expanded State -->
        <div class="island-expanded-state">
          <div class="island-icon-placeholder"></div>
          <div class="island-text">
            <h4>New Notification</h4>
            <p>Pure CSS Morphing active!</p>
          </div>
        </div>
        
      </label>
    </div>

    <p class="instructions">Click the black pill to morph into the expanded state.</p>
  </div>

</body>
</html>
