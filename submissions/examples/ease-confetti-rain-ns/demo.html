<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confetti Rain</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">

    <div class="confetti-container" id="confetti-box">
      <!-- Confetti pieces injected by JS -->
    </div>

    <div class="demo-content">
      <h2 class="demo-title">🎉 Congratulations!</h2>
      <p class="demo-subtitle">You just unlocked a new achievement</p>
      <button class="demo-btn" id="trigger-btn">Launch Confetti</button>
    </div>

  </div>

  <script>
    const COLORS = [
      '#e63946', '#f4a261', '#2a9d8f',
      '#457b9d', '#e9c46a', '#a8dadc',
      '#ff6b6b', '#c77dff', '#06d6a0',
    ];

    const SHAPES = ['square', 'rectangle', 'circle', 'ribbon'];

    function randomBetween(a, b) {
      return a + Math.random() * (b - a);
    }

    function createPiece(container) {
      const piece = document.createElement('div');
      const shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];

      piece.classList.add('confetti-piece', `confetti-${shape}`);

      // Random horizontal start position
      piece.style.setProperty('--x-start', `${randomBetween(0, 100)}vw`);

      // Random horizontal drift during fall
      piece.style.setProperty('--x-drift', `${randomBetween(-120, 120)}px`);

      // Random color
      piece.style.setProperty('--color', COLORS[Math.floor(Math.random() * COLORS.length)]);

      // Random fall duration between 2.5s and 5s
      piece.style.setProperty('--duration', `${randomBetween(2.5, 5)}s`);

      // Random delay so they don't all start at once
      piece.style.setProperty('--delay', `${randomBetween(0, 1.5)}s`);

      // Random size between 7px and 16px
      const size = randomBetween(7, 16);
      piece.style.setProperty('--size', `${size}px`);

      // Random initial rotation
      piece.style.setProperty('--rotate-start', `${randomBetween(0, 360)}deg`);

      // Random spin amount during fall
      piece.style.setProperty('--rotate-end', `${randomBetween(360, 1080)}deg`);

      // Random opacity for depth effect
      piece.style.setProperty('--opacity', `${randomBetween(0.7, 1)}`);

      container.appendChild(piece);

      // Remove piece after animation ends to keep DOM clean
      const totalTime =
        (parseFloat(piece.style.getPropertyValue('--duration')) +
         parseFloat(piece.style.getPropertyValue('--delay'))) * 1000;

      setTimeout(() => piece.remove(), totalTime + 200);
    }

    function launchConfetti(count = 120) {
      const container = document.getElementById('confetti-box');

      // Clear any leftover pieces from a previous burst
      container.innerHTML = '';

      for (let i = 0; i < count; i++) {
        createPiece(container);
      }
    }

    // Auto-launch on page load
    launchConfetti();

    // Re-launch on button click
    document.getElementById('trigger-btn').addEventListener('click', () => {
      launchConfetti();
    });
  </script>

</body>
</html>
