<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #0b0f1a; color: #e8edf5; padding: 2.5rem 1.5rem; display: flex; flex-direction: column; align-items: center; }
    .wrap { width: 100%; max-width: 540px; }
    h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; text-align: center; }
    .sub { font-size: 0.82rem; color: #8892a8; margin-bottom: 28px; text-align: center; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Get in Touch</h1>
    <p class="sub">Animated contact form with focus effects</p>
    <div class="cf-card">
      <form class="cf-form" action="#" method="post">
        <div class="cf-group">
          <label class="cf-label" for="cf-name">Full Name</label>
          <input class="cf-input" id="cf-name" type="text" placeholder="John Doe" required>
        </div>
        <div class="cf-group">
          <label class="cf-label" for="cf-email">Email Address</label>
          <input class="cf-input" id="cf-email" type="email" placeholder="john@example.com" required>
        </div>
        <div class="cf-group">
          <label class="cf-label" for="cf-subject">Subject</label>
          <input class="cf-input" id="cf-subject" type="text" placeholder="How can we help?">
        </div>
        <div class="cf-group">
          <label class="cf-label" for="cf-message">Message</label>
          <textarea class="cf-textarea" id="cf-message" placeholder="Tell us more about your inquiry..." required></textarea>
        </div>
        <button class="cf-btn" type="button">Send Message</button>
      </form>
      <div class="cf-success">
        <span class="cf-success-icon" aria-hidden="true">✓</span>
        <div class="cf-success-title">Message Sent!</div>
        <div class="cf-success-desc">We'll get back to you within 24 hours.</div>
      </div>
    </div>
  </div>
</body>
</html>
