<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Hotspot — EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css@1.4.5/dist/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:var(--ease-space-6,24px);padding:var(--ease-space-6,24px);font-family:var(--ease-font-sans,system-ui,sans-serif);background:var(--ease-color-neutral-50,#f9fafb);">

  <h1 style="font-size:1.5rem;font-weight:700;color:var(--ease-color-neutral-900,#111827);margin:0;">
    Image Hotspot
  </h1>
  <p style="font-size:0.875rem;color:var(--ease-color-neutral-500,#6b7280);margin:0 0 var(--ease-space-4,16px);">
    Hover the markers to explore features
  </p>

  <div class="ease-image-hotspot-az">
    <img src="https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?w=800&q=80" alt="Modern workspace" />

    <!-- Hotspot 1: top-left -->
    <div class="ease-hotspot-marker-az" style="top:25%;left:20%;">
      <span class="ease-hotspot-icon-az">+</span>
      <div class="ease-hotspot-tooltip-az">
        <div class="ease-hotspot-title-az">Ergonomic Chair</div>
        <div class="ease-hotspot-desc-az">Adjustable lumbar support</div>
      </div>
    </div>

    <!-- Hotspot 2: center -->
    <div class="ease-hotspot-marker-az" style="top:45%;left:50%;">
      <span class="ease-hotspot-icon-az">+</span>
      <div class="ease-hotspot-tooltip-az --light">
        <div class="ease-hotspot-title-az">Dual Monitors</div>
        <div class="ease-hotspot-desc-az">27-inch 4K displays</div>
      </div>
    </div>

    <!-- Hotspot 3: top-right -->
    <div class="ease-hotspot-marker-az" style="top:18%;right:15%;left:auto;">
      <span class="ease-hotspot-icon-az">+</span>
      <div class="ease-hotspot-tooltip-az --right">
        <div class="ease-hotspot-title-az">LED Desk Lamp</div>
        <div class="ease-hotspot-desc-az">Warm/cool adjustable light</div>
      </div>
    </div>

    <!-- Hotspot 4: bottom area, above tooltip -->
    <div class="ease-hotspot-marker-az" style="top:75%;left:30%;">
      <span class="ease-hotspot-icon-az">+</span>
      <div class="ease-hotspot-tooltip-az --above">
        <div class="ease-hotspot-title-az">Mechanical Keyboard</div>
        <div class="ease-hotspot-desc-az">Cherry MX Blue switches</div>
      </div>
    </div>

    <!-- Hotspot 5: bottom-right, left tooltip -->
    <div class="ease-hotspot-marker-az" style="top:65%;right:18%;left:auto;">
      <span class="ease-hotspot-icon-az">+</span>
      <div class="ease-hotspot-tooltip-az --left">
        <div class="ease-hotspot-title-az">Notebook &amp; Pen</div>
        <div class="ease-hotspot-desc-az">Quick sketches &amp; notes</div>
      </div>
    </div>
  </div>

</body>
</html>
