<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-border-beam — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 2.5rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-size: 1rem; opacity: 0.5; }
    .row { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.5rem; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .card {
      padding: 1.5rem 2rem;
      text-align: center;
      width: 160px;
      background: #1a1a1a;
      border-radius: 12px;
    }
    .card-title { font-size: 0.9rem; font-weight: 600; color: #fff; margin-bottom: 0.25rem; }
    .card-sub { font-size: 0.75rem; color: #666; }
  </style>
</head>
<body>

  <h1>ease-border-beam Demo</h1>

  <div class="section">
    <div class="label">Color variants</div>
    <div class="row">
      <div class="card ease-border-beam">
        <div class="card-title">Default</div>
        <div class="card-sub">Purple → Pink</div>
      </div>
      <div class="card ease-border-beam ease-border-beam-blue">
        <div class="card-title">Blue</div>
        <div class="card-sub">Cyan → Blue</div>
      </div>
      <div class="card ease-border-beam ease-border-beam-green">
        <div class="card-title">Green</div>
        <div class="card-sub">Green → Teal</div>
      </div>
      <div class="card ease-border-beam ease-border-beam-gold">
        <div class="card-title">Gold</div>
        <div class="card-sub">Amber → Yellow</div>
      </div>
      <div class="card ease-border-beam ease-border-beam-pink">
        <div class="card-title">Pink</div>
        <div class="card-sub">Rose → Pink</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="label">Speed variants</div>
    <div class="row">
      <div class="card ease-border-beam ease-border-beam-fast">
        <div class="card-title">Fast</div>
        <div class="card-sub">1.5s</div>
      </div>
      <div class="card ease-border-beam">
        <div class="card-title">Default</div>
        <div class="card-sub">3s</div>
      </div>
      <div class="card ease-border-beam ease-border-beam-slow">
        <div class="card-title">Slow</div>
        <div class="card-sub">6s</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="label">Hover to activate</div>
    <div class="row">
      <div class="card ease-border-beam ease-border-beam-blue ease-border-beam-hover">
        <div class="card-title">Hover me</div>
        <div class="card-sub">Beam on hover</div>
      </div>
      <div class="card ease-border-beam ease-border-beam-pink ease-border-beam-thick">
        <div class="card-title">Thick beam</div>
        <div class="card-sub">3px border</div>
      </div>
    </div>
  </div>

</body>
</html>
