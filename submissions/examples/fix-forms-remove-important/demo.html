<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fix: Remove !important from Validation States — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { padding: 2rem; max-width: 600px; margin: 0 auto; font-family: var(--ease-font-sans); }
    h2 { margin-bottom: 0.5rem; }
    p { color: var(--ease-color-muted); margin-bottom: 1.5rem; }
    h3 { font-size: 0.875rem; font-weight: 600; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ease-color-muted); }
    .section { margin-bottom: 2rem; }

    /* Custom override — now works without needing !important */
    .my-custom-form .ease-input-danger {
      border-color: #ff6b6b;
      box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.15);
    }
  </style>
</head>
<body>
  <h2>Remove !important from Validation States</h2>
  <p>Validation state styles no longer use <code>!important</code> — user overrides work cleanly via the <code>@layer</code> cascade.</p>

  <div class="section">
    <h3>Success State</h3>
    <div class="ease-field ease-field-success">
      <label class="ease-field-label">Email</label>
      <input class="ease-input ease-input-success" type="email" value="user@example.com" />
    </div>
  </div>

  <div class="section">
    <h3>Danger State</h3>
    <div class="ease-field ease-field-danger">
      <label class="ease-field-label">Password</label>
      <input class="ease-input ease-input-danger" type="password" value="weak" />
    </div>
  </div>

  <div class="section">
    <h3>Warning State</h3>
    <div class="ease-field ease-field-warning">
      <label class="ease-field-label">Username</label>
      <input class="ease-input ease-input-warning" type="text" value="taken_name" />
    </div>
  </div>

  <div class="section my-custom-form">
    <h3>Custom Override (works without !important)</h3>
    <div class="ease-field ease-field-danger">
      <label class="ease-field-label">Custom danger colour</label>
      <input class="ease-input ease-input-danger" type="text" value="Custom #ff6b6b border" />
    </div>
  </div>
</body>
</html>
