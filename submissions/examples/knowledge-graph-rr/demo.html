<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Graph Visualization</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Knowledge Graph</h1>
        <p>Visualizing relationships between technologies and concepts.</p>
    </div>

    <div class="graph">

        <div class="node center">JavaScript</div>

        <div class="node react">React</div>
        <div class="node nodejs">Node.js</div>
        <div class="node ts">TypeScript</div>
        <div class="node api">REST API</div>
        <div class="node db">Database</div>
        <div class="node next">Next.js</div>

        <div class="line l1"></div>
        <div class="line l2"></div>
        <div class="line l3"></div>
        <div class="line l4"></div>
        <div class="line l5"></div>
        <div class="line l6"></div>

    </div>

</div>

</body>
</html>
