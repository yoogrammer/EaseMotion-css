<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS contain: paint Isolation Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>CSS contain: paint Example</h1>
    <p>The red box is coded to sit outside the border, but <code>contain: paint</code> clips it entirely and optimizes browser paint cycles.</p>

    <div class="isolation-container">
        <p style="padding: 10px;">Container bounds</p>
        <div class="box-out-of-bounds"></div>
    </div>
</body>
</html>
