<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expand Text Hover – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
      background: #f5f5f5;
    }
    h3 { color: #555; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <h3>Letter Spacing Expand</h3>
  <p class="expand-text">Hover over this text</p>

  <h3>Scale Expand</h3>
  <p class="expand-text-scale">Hover over this text</p>

  <h3>Word Spacing Expand</h3>
  <p class="expand-text-words">Hover over this text</p>
</body>
</html>
