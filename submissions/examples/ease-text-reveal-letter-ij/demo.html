<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Text Reveal Letter</title>
</head>
<body>
  <div class="container">
    <div class="reveal-text" id="revealText">
      <span style="--i:0">H</span>
      <span style="--i:1">e</span>
      <span style="--i:2">l</span>
      <span style="--i:3">l</span>
      <span style="--i:4">o</span>
      <span style="--i:5">&nbsp;</span>
      <span style="--i:6">W</span>
      <span style="--i:7">o</span>
      <span style="--i:8">r</span>
      <span style="--i:9">l</span>
      <span style="--i:10">d</span>
    </div>
    <button class="toggle" id="toggleReveal">Toggle Reveal</button>
  </div>
  <script>
    const el = document.querySelector('.reveal-text');
    document.getElementById('toggleReveal').addEventListener('click', () => {
      const current = el.style.getPropertyValue('--reveal').trim() || '0';
      el.style.setProperty('--reveal', current === '1' ? '0' : '1');
    });
  </script>
</body>
</html>
