<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Skeleton Card Loader</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 2rem;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 1rem;
            padding: 2rem;
        }
        h1 {
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        .code-section {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 0.5rem;
        }
        pre {
            background: #1e293b;
            color: white;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦴 ease-skeleton-card</h1>
        <p style="text-align: center">Skeleton loader cards with shimmer animation</p>

        <div class="demo-grid">
            <div class="ease-skeleton-card">
                <div class="ease-skeleton-avatar"></div>
                <div class="ease-skeleton-title"></div>
                <div class="ease-skeleton-text"></div>
                <div class="ease-skeleton-text" style="width: 80%;"></div>
            </div>
            <div class="ease-skeleton-card">
                <div class="ease-skeleton-avatar"></div>
                <div class="ease-skeleton-title"></div>
                <div class="ease-skeleton-text"></div>
                <div class="ease-skeleton-text" style="width: 60%;"></div>
            </div>
            <div class="ease-skeleton-card">
                <div class="ease-skeleton-title"></div>
                <div class="ease-skeleton-text"></div>
                <div class="ease-skeleton-text" style="width: 90%;"></div>
                <div class="ease-skeleton-text" style="width: 70%;"></div>
            </div>
        </div>

        <div class="code-section">
            <h2>Usage</h2>
            <pre>&lt;div class="ease-skeleton-card"&gt;
    &lt;div class="ease-skeleton-avatar"&gt;&lt;/div&gt;
    &lt;div class="ease-skeleton-title"&gt;&lt;/div&gt;
    &lt;div class="ease-skeleton-text"&gt;&lt;/div&gt;
&lt;/div&gt;</pre>
        </div>
    </div>
</body>
</html>
