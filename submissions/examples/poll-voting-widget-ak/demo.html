<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poll Voting Widget</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Poll</h1>
    <p class="question">What is your favorite programming language?</p>
    <div class="options" id="options"></div>
    <p class="total" id="total">Total votes: 0</p>
    <button id="resetBtn">Reset Poll</button>
  </div>

  <script>
    const poll = {
      question: 'What is your favorite programming language?',
      options: [
        { label: 'JavaScript', votes: 24 },
        { label: 'Python', votes: 31 },
        { label: 'TypeScript', votes: 18 },
        { label: 'Rust', votes: 12 },
      ]
    };

    let voted = false;
    const optionsEl = document.getElementById('options');
    const totalEl = document.getElementById('total');

    function render() {
      const total = poll.options.reduce((s, o) => s + o.votes, 0);
      totalEl.textContent = `Total votes: ${total}`;

      optionsEl.innerHTML = poll.options.map((opt, i) => {
        const pct = total === 0 ? 0 : Math.round((opt.votes / total) * 100);
        return `
          <div class="option${voted ? ' voted' : ''}">
            <div class="option-label">${opt.label}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${pct}%"></div>
            </div>
            <div class="option-pct">${pct}% (${opt.votes})</div>
            ${!voted ? `<button onclick="vote(${i})">Vote</button>` : ''}
          </div>
        `;
      }).join('');
    }

    function vote(index) {
      if (voted) return;
      poll.options[index].votes++;
      voted = true;
      render();
    }

    document.getElementById('resetBtn').addEventListener('click', () => {
      voted = false;
      render();
    });

    render();
  </script>
</body>
</html>
