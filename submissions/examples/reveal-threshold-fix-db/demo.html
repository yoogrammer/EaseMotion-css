<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Low Threshold Scroll Reveal Demo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="tall-spacer">Scroll Down</div>
  <div class="large-card reveal-target">
    Large Component (Will reveal even if height exceeds screen height)
  </div>

  <script>
    (function() {
      const targets = document.querySelectorAll('.reveal-target');
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('reveal-active');
          }
        });
      }, { threshold: 0.05 });
      targets.forEach(el => observer.observe(el));
    })();
  </script>
</body>
</html>
