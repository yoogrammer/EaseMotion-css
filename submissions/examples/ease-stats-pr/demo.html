<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-stats-pr Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 4rem 2rem;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }
    
    .demo-section h2 {
      text-align: center;
      margin-bottom: 2rem;
      color: #1e293b;
    }
  </style>
</head>
<body>

  <div class="demo-section">
    <h2>Dashboard Metrics</h2>
    <div class="stats-pr-grid">
      
      <div class="stats-pr-card">
        <div class="stats-pr-header">
          <span class="stats-pr-label">Total Revenue</span>
          <div class="stats-pr-icon stats-pr-icon-blue">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
          </div>
        </div>
        <div class="stats-pr-value">$45,231</div>
        <div class="stats-pr-trend stats-pr-trend-up">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 17l9.2-9.2M17 8v9"></path>
          </svg>
          +12.5%
          <span class="stats-pr-trend-text">vs last month</span>
        </div>
      </div>

      <div class="stats-pr-card">
        <div class="stats-pr-header">
          <span class="stats-pr-label">Active Users</span>
          <div class="stats-pr-icon stats-pr-icon-green">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
            </svg>
          </div>
        </div>
        <div class="stats-pr-value">2,345</div>
        <div class="stats-pr-trend stats-pr-trend-up">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 17l9.2-9.2M17 8v9"></path>
          </svg>
          +8.2%
          <span class="stats-pr-trend-text">vs last month</span>
        </div>
      </div>

      <div class="stats-pr-card">
        <div class="stats-pr-header">
          <span class="stats-pr-label">Total Orders</span>
          <div class="stats-pr-icon stats-pr-icon-yellow">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
            </svg>
          </div>
        </div>
        <div class="stats-pr-value">1,234</div>
        <div class="stats-pr-trend stats-pr-trend-down">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 7l-9.2 9.2M7 16V7"></path>
          </svg>
          -3.1%
          <span class="stats-pr-trend-text">vs last month</span>
        </div>
      </div>

      <div class="stats-pr-card">
        <div class="stats-pr-header">
          <span class="stats-pr-label">Bounce Rate</span>
          <div class="stats-pr-icon stats-pr-icon-red">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
            </svg>
          </div>
        </div>
        <div class="stats-pr-value">42.3%</div>
        <div class="stats-pr-trend stats-pr-trend-down">
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 17l9.2-9.2M17 8v9"></path>
          </svg>
          -2.4%
          <span class="stats-pr-trend-text">vs last month</span>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
