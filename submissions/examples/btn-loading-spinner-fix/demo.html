<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-btn-loading Spinner Fix</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
      font-family: sans-serif;
      background: #0f0f17;
      color: #fff;
    }
    h2 { margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <h2>ease-btn-loading — Spinner Centering Fix</h2>
  <p>Spinner must be perfectly centred in all browsers including Safari 14.0</p>

  <button class="ease-btn ease-btn-primary ease-btn-loading">Loading</button>
  <button class="ease-btn ease-btn-success ease-btn-loading ease-btn-lg">Saving…</button>
  <button class="ease-btn ease-btn-danger ease-btn-loading ease-btn-sm">Deleting</button>
</body>
</html>
