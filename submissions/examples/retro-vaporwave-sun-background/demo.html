<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Vaporwave Sun Background</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="scene">

    <div class="stars"></div>

    <div class="sun">
        <div class="sun-stripes"></div>
    </div>

    <div class="grid"></div>

    <div class="content">

        <span class="badge">
            SYNTHWAVE • 1984
        </span>

        <h1>
            RETRO VAPORWAVE
        </h1>

        <p>
            A nostalgic synthwave inspired background featuring a glowing
            sunset, neon horizon grid, vibrant gradients, and retro-futuristic aesthetics.
        </p>

        <button class="hero-btn">
            Explore The Future
        </button>

    </div>

</div>

</body>
</html>
