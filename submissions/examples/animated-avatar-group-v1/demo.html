<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Avatar Group - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="avatar-page">
    <h1>Team Members</h1>
    <div class="avatar-group">
      <div class="avatar-item" style="--avatar-bg: #6366f1; --avatar-delay: 0s;">
        <div class="avatar-circle">A</div>
        <span class="avatar-name">Alice</span>
      </div>
      <div class="avatar-item" style="--avatar-bg: #f59e0b; --avatar-delay: 0.05s;">
        <div class="avatar-circle">B</div>
        <span class="avatar-name">Bob</span>
      </div>
      <div class="avatar-item" style="--avatar-bg: #10b981; --avatar-delay: 0.1s;">
        <div class="avatar-circle">C</div>
        <span class="avatar-name">Carol</span>
      </div>
      <div class="avatar-item" style="--avatar-bg: #ec4899; --avatar-delay: 0.15s;">
        <div class="avatar-circle">D</div>
        <span class="avatar-name">David</span>
      </div>
      <div class="avatar-item" style="--avatar-bg: #8b5cf6; --avatar-delay: 0.2s;">
        <div class="avatar-circle">E</div>
        <span class="avatar-name">Eve</span>
      </div>
      <div class="avatar-item" style="--avatar-bg: #6366f1; --avatar-delay: 0.25s;">
        <div class="avatar-circle">+3</div>
        <span class="avatar-name">More</span>
      </div>
    </div>
    <p class="avatar-hint">Hover over avatars to reveal names</p>
  </div>
</body>
</html>
