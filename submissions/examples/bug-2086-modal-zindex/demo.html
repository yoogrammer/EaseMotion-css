<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bug Fix #2086 - Modal Z-Index Variable</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Bug Fix #2086: Modal Z-Index Variable Typo</h1>
  <p class="info">
    <code>components/modals.css</code> now uses the correct token
    <code>var(--ease-z-modal)</code> instead of the misspelled
    <code>var(--ease-z-index-modal)</code>.
    Customizing <code>--ease-z-modal</code> now correctly affects the modal.
  </p>
  <button id="openBtn" onclick="document.getElementById('demoModal').classList.add('open')">
    Open Modal
  </button>
  <div id="demoModal" class="ease-modal-overlay">
    <div class="ease-modal">
      <h2>Modal Content</h2>
      <p>z-index is now correctly set to <code>var(--ease-z-modal, 1000)</code></p>
      <button onclick="document.getElementById('demoModal').classList.remove('open')">Close</button>
    </div>
  </div>
</body>
</html>
