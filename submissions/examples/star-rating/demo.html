<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Star Rating Component</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 460px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Pure CSS Feedback System</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem;">Hover and rank. Combining <code>row-reverse</code> layouts with <code>~</code> operators yields dynamic rating feedback tracks with 0 script lines.</p>
  </header>

  <form class="alm-rating-card" onsubmit="event.preventDefault();">
    <fieldset style="border: none; margin: 0; padding: 0; display: contents;">
      <legend class="alm-rating-title">Rate Core Runtime Delivery</legend>

      <div class="alm-rating-stars-track">

        <input type="radio" id="star-5" name="alm_metric_score" value="5" class="alm-rating-input">
        <label for="star-5" class="alm-rating-label">
          <span class="alm-sr-only">5 stars</span>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        </label>

        <input type="radio" id="star-4" name="alm_metric_score" value="4" class="alm-rating-input">
        <label for="star-4" class="alm-rating-label">
          <span class="alm-sr-only">4 stars</span>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        </label>

        <input type="radio" id="star-3" name="alm_metric_score" value="3" class="alm-rating-input">
        <label for="star-3" class="alm-rating-label">
          <span class="alm-sr-only">3 stars</span>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        </label>

        <input type="radio" id="star-2" name="alm_metric_score" value="2" class="alm-rating-input">
        <label for="star-2" class="alm-rating-label">
          <span class="alm-sr-only">2 stars</span>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        </label>

        <input type="radio" id="star-1" name="alm_metric_score" value="1" class="alm-rating-input" checked>
        <label for="star-1" class="alm-rating-label">
          <span class="alm-sr-only">1 star</span>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        </label>

      </div>
    </fieldset>

    <button type="submit" style="margin-top: 0.5rem; background: var(--ease-color-primary, #6c63ff); border: none; color: white; padding: 0.5rem 1.25rem; border-radius: 0.5rem; font-weight: 600; font-size: 0.875rem; cursor: pointer;">
      Submit Rating
    </button>
  </form>

</body>
</html>
