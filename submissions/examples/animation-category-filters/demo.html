<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Category Filters</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Animation Category Filters</h1>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="entrance">Entrance</button>
  <button class="filter-btn" data-filter="exit">Exit</button>
  <button class="filter-btn" data-filter="attention">Attention</button>
</div>

<div class="animation-grid">

  <div class="card" data-category="entrance">
    <h3>Fade In</h3>
    <span>Entrance</span>
  </div>

  <div class="card" data-category="entrance">
    <h3>Slide Up</h3>
    <span>Entrance</span>
  </div>

  <div class="card" data-category="exit">
    <h3>Fade Out</h3>
    <span>Exit</span>
  </div>

  <div class="card" data-category="exit">
    <h3>Slide Down</h3>
    <span>Exit</span>
  </div>

  <div class="card" data-category="attention">
    <h3>Bounce</h3>
    <span>Attention</span>
  </div>

  <div class="card" data-category="attention">
    <h3>Shake</h3>
    <span>Attention</span>
  </div>

</div>

<script>
const buttons = document.querySelectorAll(".filter-btn");
const cards = document.querySelectorAll(".card");

buttons.forEach(button => {
  button.addEventListener("click", () => {

    buttons.forEach(btn =>
      btn.classList.remove("active")
    );

    button.classList.add("active");

    const filter = button.dataset.filter;

    cards.forEach(card => {
      if (
        filter === "all" ||
        card.dataset.category === filter
      ) {
        card.style.display = "block";
      } else {
        card.style.display = "none";
      }
    });
  });
});
</script>

</body>
</html>
