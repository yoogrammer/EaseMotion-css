<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #f8fafc; padding: 2rem; font-family: sans-serif; }
    .card-wrapper { height: 400px; max-width: 350px; }
  </style>
</head>
<body>
  <div class="card-wrapper">
    <div class="ease-card" style="height: 100%;">
      <div class="ease-card-header">
        <h3 class="ease-card-title">Fixed Core Card</h3>
        <p class="ease-card-subtitle">Flexbox Layout Test</p>
      </div>
      <div class="ease-card-body">
        <p>Because the container now handles layout constraints, the body element stretches cleanly, pushing the actions downwards.</p>
      </div>
      <div class="ease-card-footer">
        <button style="background: #6c63ff; color: white; padding: 0.5rem; border: none; border-radius: 4px;">Sticky Action</button>
      </div>
    </div>
  </div>
</body>
</html>
