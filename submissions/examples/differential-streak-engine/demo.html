<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Differential Streak Engine — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: #0f172a; font-family: sans-serif; color: #e2e8f0; padding: 2rem; }
    h2 { margin-top: 2rem; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: #94a3b8; }
    .demo-row { display: flex; align-items: flex-end; gap: 4px; height: 120px; margin: 1rem 0 2rem; }
    .streak-tower { width: 14px; border-radius: 3px 3px 0 0; }
    label { font-size: 0.75rem; color: #64748b; }
    button { padding: 6px 12px; cursor: pointer; }
  </style>
</head>
<body>
<h1>Differential Streak Engine</h1>
<p>Velocity glow tiers and momentum decay — visual reference for EaseMotion CSS</p>

<h2>Velocity Glow Tiers</h2>
<div class="demo-row">
  <div class="streak-tower streak-tower--velocity-high" style="height:100px"></div>
  <div class="streak-tower streak-tower--velocity-high" style="height:80px"></div>
  <div class="streak-tower streak-tower--velocity-mid"  style="height:60px"></div>
  <div class="streak-tower streak-tower--velocity-mid"  style="height:50px"></div>
  <div class="streak-tower streak-tower--velocity-low"  style="height:30px"></div>
  <div class="streak-tower streak-tower--velocity-low"  style="height:20px"></div>
</div>
<label>High (accelerating) → Mid (cruising) → Low (decelerating)</label>

<h2>Momentum Decay</h2>
<div class="demo-row">
  <div class="streak-tower streak-tower--velocity-high streak-tower--momentum-full" style="height:100px"></div>
  <div class="streak-tower streak-tower--velocity-high streak-tower--momentum-high" style="height:100px"></div>
  <div class="streak-tower streak-tower--velocity-high streak-tower--momentum-mid"  style="height:100px"></div>
  <div class="streak-tower streak-tower--velocity-high streak-tower--momentum-low"  style="height:100px"></div>
</div>
<label>momentum: 1.0 → 0.74 → 0.41 → 0.12</label>

<h2>Themes</h2>
<div style="display:flex;gap:1rem;margin-bottom:1rem">
  <button onclick="document.body.dataset.theme=''">Default</button>
  <button onclick="document.body.dataset.theme='neon'">Neon</button>
  <button onclick="document.body.dataset.theme='dracula'">Dracula</button>
  <button onclick="document.body.dataset.theme='dark'">Dark</button>
</div>
<div class="demo-row">
  <div class="streak-tower streak-tower--velocity-high" style="height:100px"></div>
  <div class="streak-tower streak-tower--velocity-mid"  style="height:70px"></div>
  <div class="streak-tower streak-tower--velocity-low"  style="height:40px"></div>
</div>
</body>
</html>
