<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark/Light Toggle Fix</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <button id="theme-toggle">🌙 Toggle Theme</button>
  <h1>EaseMotion CSS — Theme Toggle</h1>
  <p>Click the button above. The theme now switches! Bug is fixed.</p>

  <script>
    const toggle = document.getElementById('theme-toggle');
    const html = document.documentElement;

    // Load saved theme if user visited before
    const saved = localStorage.getItem('ease-theme');
    if (saved) {
      html.setAttribute('data-theme', saved);
      toggle.textContent = saved === 'dark' ? '🌙 Toggle Theme' : '☀️ Toggle Theme';
    }

    // Switch theme on click
    toggle.addEventListener('click', () => {
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('ease-theme', next);
      toggle.textContent = next === 'dark' ? '🌙 Toggle Theme' : '☀️ Toggle Theme';
    });
  </script>

</body>
</html>
