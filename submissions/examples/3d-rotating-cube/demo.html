<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - 3D Rotating Cube</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, sans-serif;
            min-height: 100vh;
            background: #0d0d14;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 2rem;
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #6c63ff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 2rem;
        }
        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            background: #2a2a3e;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: #6c63ff;
            transform: scale(1.05);
        }
        .note {
            margin-top: 2rem;
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            color: #a1a1aa;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎲 3D Rotating Cube</h1>
    
    <div class="ease-cube-container">
        <div class="ease-cube">
            <div class="ease-cube-face ease-cube-front">Front</div>
            <div class="ease-cube-face ease-cube-back">Back</div>
            <div class="ease-cube-face ease-cube-right">Right</div>
            <div class="ease-cube-face ease-cube-left">Left</div>
            <div class="ease-cube-face ease-cube-top">Top</div>
            <div class="ease-cube-face ease-cube-bottom">Bottom</div>
        </div>
    </div>

    <div class="controls">
        <button id="stopRotate">Pause</button>
        <button id="startRotate">Play</button>
        <button id="resetRotate">Reset</button>
    </div>

    <div class="note">
        💡 Pure CSS 3D cube with smooth rotation animation. Click Pause/Play to control.
    </div>
</div>

<script>
    const cube = document.querySelector('.ease-cube');
    let isRotating = true;
    
    document.getElementById('stopRotate').addEventListener('click', () => {
        cube.style.animationPlayState = 'paused';
        isRotating = false;
    });
    
    document.getElementById('startRotate').addEventListener('click', () => {
        cube.style.animationPlayState = 'running';
        isRotating = true;
    });
    
    document.getElementById('resetRotate').addEventListener('click', () => {
        cube.style.animation = 'none';
        cube.offsetHeight;
        cube.style.animation = '';
        cube.style.animationPlayState = isRotating ? 'running' : 'paused';
    });
</script>
</body>
</html>
