<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EaseMotion CSS — Cinematic Aurora Hero</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ════════════════════════════════════════════
       AURORA BACKGROUND LAYER
  ════════════════════════════════════════════ -->
  <div class="aurora-stage" aria-hidden="true">
    <div class="aurora-blob aurora-blob--1"></div>
    <div class="aurora-blob aurora-blob--2"></div>
    <div class="aurora-blob aurora-blob--3"></div>
    <div class="aurora-blob aurora-blob--4"></div>
    <div class="aurora-blob aurora-blob--5"></div>
    <div class="aurora-noise"></div>
  </div>

  <!-- ════════════════════════════════════════════
       HERO SECTION
  ════════════════════════════════════════════ -->
  <main>
    <section class="hero">

      <!-- Grid lines decoration -->
      <div class="hero__grid" aria-hidden="true"></div>

      <!-- Content card -->
      <div class="hero__card">

        <!-- Badge -->
        <div class="hero__badge animate-fade-up" style="--delay: 0s">
          <span class="hero__badge-dot" aria-hidden="true"></span>
          Motion system
        </div>

        <!-- Heading -->
        <h1 class="hero__heading animate-fade-up" style="--delay: 0.12s">
          <span class="hero__heading-line">Create Interfaces</span>
          <span class="hero__heading-line hero__heading-line--accent">People Remember</span>
        </h1>

        <!-- Description -->
        <p class="hero__description animate-fade-up" style="--delay: 0.24s">
          Layer glow, depth, and motion into landing pages that feel premium,
          not templated.
        </p>

        <!-- CTA Buttons -->
        <div class="hero__actions animate-fade-up" style="--delay: 0.36s">
          <a href="#" class="btn btn--primary">
            <span class="btn__text">Start Building</span>
            <span class="btn__glow" aria-hidden="true"></span>
            <svg class="btn__arrow" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
          <a href="#" class="btn btn--ghost">
            <span class="btn__text">See Live Details</span>
            <span class="btn__border" aria-hidden="true"></span>
          </a>
        </div>

        <!-- Metrics strip -->
        <div class="hero__metrics animate-fade-up" style="--delay: 0.48s">
          <div class="hero__metric">
            <span class="hero__metric-value">0<span class="hero__metric-unit">kb</span></span>
            <span class="hero__metric-label">JS dependencies</span>
          </div>
          <div class="hero__metric-divider" aria-hidden="true"></div>
          <div class="hero__metric">
            <span class="hero__metric-value">60<span class="hero__metric-unit">+</span></span>
            <span class="hero__metric-label">Ready animations</span>
          </div>
          <div class="hero__metric-divider" aria-hidden="true"></div>
          <div class="hero__metric">
            <span class="hero__metric-value">A11y</span>
            <span class="hero__metric-label">Motion-safe</span>
          </div>
        </div>

      </div><!-- /hero__card -->

      <!-- Floating decoration orbs -->
      <div class="hero__orb hero__orb--tl" aria-hidden="true"></div>
      <div class="hero__orb hero__orb--br" aria-hidden="true"></div>

    </section>
  </main>

</body>
</html>
