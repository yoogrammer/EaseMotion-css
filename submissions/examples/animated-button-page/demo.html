<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buttons Enhanced — EaseMotion CSS Submission</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <!-- GSAP + ScrollTrigger CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ambient grid background -->
  <div class="bg-grid" aria-hidden="true"></div>

  <div class="page">

    <!-- ── HERO ─────────────────────────────────── -->
    <header class="hero">
      <p class="hero-eyebrow">
        <span class="eyebrow-line"></span>
        COMPONENTS
      </p>
      <h1 class="hero-title">
        <span class="char-wrap" data-split>Buttons</span>
      </h1>
      <p class="hero-desc">
        Compose buttons by stacking modifier classes.<br/>
        Every style is human-readable.
      </p>
    </header>

    <!-- ── VARIANTS ──────────────────────────────── -->
    <section class="btn-section" data-scroll-section>
      <p class="section-tag">// Variants</p>
      <div class="btn-row" data-btn-row>
        <button class="em-btn em-btn-primary"  data-magnetic data-3d>Primary</button>
        <button class="em-btn em-btn-success"  data-magnetic data-3d>Success</button>
        <button class="em-btn em-btn-danger"   data-magnetic data-3d>Danger</button>
        <button class="em-btn em-btn-outline"  data-magnetic data-3d>Outline</button>
        <button class="em-btn em-btn-ghost"    data-magnetic data-3d>Ghost</button>
      </div>
    </section>

    <!-- ── HOVER EFFECTS ─────────────────────────── -->
    <section class="btn-section" data-scroll-section>
      <p class="section-tag">// With ease-btn-hover</p>
      <div class="btn-row" data-btn-row>
        <button class="em-btn em-btn-primary em-btn-hover em-hover-shimmer" data-magnetic data-3d>Hover me ✦</button>
        <button class="em-btn em-btn-success em-btn-hover em-hover-glow"    data-magnetic data-3d>Hover me 🚀</button>
        <button class="em-btn em-btn-danger  em-btn-hover em-hover-lift"    data-magnetic data-3d>Hover me 🌿</button>
      </div>
    </section>

    <!-- ── SIZES ─────────────────────────────────── -->
    <section class="btn-section" data-scroll-section>
      <p class="section-tag">// Sizes</p>
      <div class="btn-row btn-row--align-center" data-btn-row>
        <button class="em-btn em-btn-primary em-btn-sm"  data-magnetic data-3d>Small</button>
        <button class="em-btn em-btn-primary"            data-magnetic data-3d>Default</button>
        <button class="em-btn em-btn-primary em-btn-lg"  data-magnetic data-3d>Large</button>
        <button class="em-btn em-btn-primary em-btn-xl"  data-magnetic data-3d>X-Large</button>
      </div>
    </section>

    <!-- ── SQUISH ─────────────────────────────────── -->
    <section class="btn-section" data-scroll-section>
      <p class="section-tag">// Squish Button Utility</p>
      <div class="btn-row" data-btn-row>
        <button class="em-btn em-btn-primary em-squish" data-magnetic data-3d>Squish Me</button>
      </div>
    </section>

    <!-- ── PILL · DISABLED · LOADING ─────────────── -->
    <section class="btn-section" data-scroll-section>
      <p class="section-tag">// Pill · Disabled · Loading</p>
      <div class="btn-row" data-btn-row>
        <button class="em-btn em-btn-primary em-btn-pill"    data-magnetic data-3d>Pill Shape</button>
        <button class="em-btn em-btn-primary" disabled>Disabled</button>
        <button class="em-btn em-btn-primary em-btn-loading" data-magnetic data-3d>
          <span class="spinner"></span> Loading
        </button>
      </div>
    </section>

  </div><!-- /page -->

  <script>
    gsap.registerPlugin(ScrollTrigger);

    /* ── 1. HERO ENTRANCE ── */
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    tl.from('.bg-grid',      { opacity: 0, duration: 1.2 })
      .from('.eyebrow-line', { scaleX: 0, duration: 0.7, transformOrigin: 'left' }, '-=0.8')
      .from('.hero-eyebrow', { opacity: 0, x: -18, duration: 0.6 }, '-=0.4')
      .from('.hero-title',   { opacity: 0, y: 48, duration: 0.9, ease: 'expo.out' }, '-=0.3')
      .from('.hero-desc',    { opacity: 0, y: 20, duration: 0.6 }, '-=0.4');

    /* ── 2. SCROLLTRIGGER — section tags ── */
    gsap.utils.toArray('[data-scroll-section]').forEach((section, i) => {
      const tag = section.querySelector('.section-tag');
      const row = section.querySelector('[data-btn-row]');
      const btns = row ? row.querySelectorAll('.em-btn') : [];

      const stl = gsap.timeline({
        scrollTrigger: {
          trigger: section,
          start: 'top 82%',
          toggleActions: 'play none none none',
        }
      });

      if (tag) {
        stl.from(tag, {
          opacity: 0,
          x: -30,
          duration: 0.55,
          ease: 'power2.out',
          clipPath: 'inset(0 100% 0 0)',
        });
      }

      if (btns.length) {
        stl.from(btns, {
          opacity: 0,
          y: 32,
          scale: 0.88,
          duration: 0.55,
          stagger: 0.08,
          ease: 'back.out(1.4)',
        }, tag ? '-=0.25' : 0);
      }
    });

    /* ── 3. 3D TILT on hover ── */
    document.querySelectorAll('[data-3d]').forEach(btn => {
      btn.addEventListener('mousemove', e => {
        const r   = btn.getBoundingClientRect();
        const cx  = r.left + r.width  / 2;
        const cy  = r.top  + r.height / 2;
        const dx  = (e.clientX - cx) / (r.width  / 2);
        const dy  = (e.clientY - cy) / (r.height / 2);
        gsap.to(btn, {
          rotateY:     dx * 18,
          rotateX:    -dy * 18,
          scale:       1.08,
          duration:    0.25,
          ease:        'power2.out',
          transformPerspective: 600,
        });
      });
      btn.addEventListener('mouseleave', () => {
        gsap.to(btn, {
          rotateY: 0, rotateX: 0, scale: 1,
          duration: 0.55, ease: 'elastic.out(1, 0.5)',
        });
      });
      btn.addEventListener('mousedown', () => {
        gsap.to(btn, { scale: 0.93, duration: 0.12, ease: 'power2.in' });
      });
      btn.addEventListener('mouseup', () => {
        gsap.to(btn, { scale: 1.08, duration: 0.2, ease: 'back.out(2)' });
      });
    });

    /* ── 4. MAGNETIC PULL ── */
    document.querySelectorAll('[data-magnetic]').forEach(btn => {
      btn.addEventListener('mousemove', e => {
        const r    = btn.getBoundingClientRect();
        const cx   = r.left + r.width  / 2;
        const cy   = r.top  + r.height / 2;
        const pull = 0.28;
        gsap.to(btn, {
          x: (e.clientX - cx) * pull,
          y: (e.clientY - cy) * pull,
          duration: 0.4,
          ease: 'power2.out',
        });
      });
      btn.addEventListener('mouseleave', () => {
        gsap.to(btn, { x: 0, y: 0, duration: 0.6, ease: 'elastic.out(1, 0.4)' });
      });
    });

    /* ── 5. SQUISH click ── */
    document.querySelectorAll('.em-squish').forEach(btn => {
      btn.addEventListener('click', () => {
        gsap.timeline()
          .to(btn, { scaleX: 1.25, scaleY: 0.75, duration: 0.12, ease: 'power2.in' })
          .to(btn, { scaleX: 0.85, scaleY: 1.15, duration: 0.12, ease: 'power2.out' })
          .to(btn, { scaleX: 1,    scaleY: 1,    duration: 0.35, ease: 'elastic.out(1, 0.4)' });
      });
    });
  </script>

</body>
</html>
