<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Retro Terminal Card – a classic command-line status card built with EaseMotion CSS.">
  <title>Retro Terminal Card | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="card-term-preview">
    <div class="card-term">
      <!-- Terminal header bar -->
      <div class="card-term-bar" role="presentation">
        <span class="card-term-dot red" aria-hidden="true"></span>
        <span class="card-term-dot yellow" aria-hidden="true"></span>
        <span class="card-term-dot green" aria-hidden="true"></span>
      </div>

      <!-- Terminal body -->
      <div class="card-term-body">
        <p class="card-term-line">
          <span class="card-term-prompt" aria-hidden="true">$</span>
          <span class="card-term-cmd">npm install codefronts</span>
        </p>
        <p class="card-term-line card-term-success">
          <span aria-hidden="true">✓</span> Packages installed
        </p>

        <p class="card-term-line">
          <span class="card-term-prompt" aria-hidden="true">$</span>
          <span class="card-term-cmd">npm run build</span>
        </p>
        <p class="card-term-line card-term-success">
          <span aria-hidden="true">✓</span> Built in 0.4s
        </p>

        <p class="card-term-line">
          <span class="card-term-prompt" aria-hidden="true">$</span>
          <span class="card-term-cursor" aria-label="Terminal cursor"></span>
        </p>
      </div>
    </div>
  </main>

</body>
</html>
