<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Confetti Cannon Showcase</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .content { text-align: center; max-width: 600px; z-index: 10; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(to right, #38bdf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #94a3b8; margin-bottom: 40px; }
    </style>
</head>
<body>

    <canvas id="confettiCanvas"></canvas>

    <div class="content">
        <h1>Confetti Cannon System</h1>
        <p>A pure high-performance custom HTML5 Canvas interactive celebration emitter.</p>
        
        <button class="confetti-btn" id="mainTrigger">Celebrate! 🎉</button>

        <div class="controls-panel">
            <button class="sub-btn" id="rainbowTrigger">🌈 Rainbow Burst</button>
            <button class="sub-btn" id="goldTrigger">✨ Luxury Gold</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('confettiCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class ConfettiParticle {
            constructor(x, y, themeColors) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 8 + 6;
                this.color = themeColors[Math.floor(Math.random() * themeColors.length)];
                
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 12 + 5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - (Math.random() * 8 + 4); 
                
                this.gravity = 0.25;
                this.drag = 0.97;
                this.opacity = 1;
                this.fadeSpeed = Math.random() * 0.015 + 0.01;
                
                const shapes = ['square', 'circle', 'triangle'];
                this.shape = shapes[Math.floor(Math.random() * shapes.length)];
                
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 10 - 5;
            }

            update() {
                this.vx *= this.drag;
                this.vy *= this.drag;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;
                this.opacity -= this.fadeSpeed;
            }

            draw() {
                if (this.opacity <= 0) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate((this.rotation * Math.PI) / 180);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;

                ctx.beginPath();
                if (this.shape === 'circle') {
                    ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.shape === 'triangle') {
                    ctx.moveTo(0, -this.size / 2);
                    ctx.lineTo(this.size / 2, this.size / 2);
                    ctx.lineTo(-this.size / 2, this.size / 2);
                    ctx.closePath();
                    ctx.fill();
                } else { // square
                    ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                }
                ctx.restore();
            }
        }

        function fireConfetti(x, y, colors, count = 150) {
            for (let i = 0; i < count; i++) {
                particles.push(new ConfettiParticle(x, y, colors));
            }
        }

        function animationLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.opacity > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animationLoop);
        }
        animationLoop();

        const palettes = {
            default: ['#ff007f', '#7f00ff', '#38bdf8', '#00ffcc', '#ffea00'],
            rainbow: ['#ff0000', '#ff7f00', '#ffff00', '#00ff00', '#0000ff', '#4b0082', '#8b00ff'],
            gold: ['#d4af37', '#f3e5ab', '#aa7c11', '#fffdd0', '#efd334']
        };

        document.getElementById('mainTrigger').addEventListener('click', (e) => {
            fireConfetti(e.clientX, e.clientY, palettes.default, 150);
        });

        document.getElementById('rainbowTrigger').addEventListener('click', () => {
            fireConfetti(canvas.width / 2, canvas.height / 2, palettes.rainbow, 150);
        });

        document.getElementById('goldTrigger').addEventListener('click', () => {
            fireConfetti(canvas.width / 2, canvas.height / 2, palettes.gold, 150);
        });
    </script>
</body>
</html>
