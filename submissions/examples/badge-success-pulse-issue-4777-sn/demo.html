<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Success Badge Pulse Demo</title>
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../components/badges.css">
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 3rem;
      max-width: 600px;
      margin: 0 auto;
      background: #f8fafc;
      color: #0f172a;
    }
    .demo-container {
      display: flex;
      gap: 1.5rem;
      margin-top: 2rem;
      align-items: center;
      padding: 2rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .badge-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
  </style>
</head>
<body>
  <h1>Success Badge Pulse Demo</h1>
  <p>Verify that the success badge (green) now pulses with a green shadow glow, matching its theme instead of defaulting to the primary purple color.</p>

  <div class="demo-container">
    <div class="badge-wrap">
      <span class="ease-badge ease-badge-success ease-badge-pulse">Success</span>
      <span>Success (Pulsing)</span>
    </div>
    <div class="badge-wrap">
      <span class="ease-badge ease-badge-danger ease-badge-pulse">Danger</span>
      <span>Danger (Pulsing)</span>
    </div>
    <div class="badge-wrap">
      <span class="ease-badge ease-badge-pulse">Primary</span>
      <span>Primary (Pulsing)</span>
    </div>
  </div>
</body>
</html>
