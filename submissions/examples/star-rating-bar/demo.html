<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Interactive Star Rating Bar</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 460px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Directional Rating Tracker Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Pass your cursor over the star tracks below. <code>row-reverse</code> alignments combined with sibling lookup vectors light up nodes at 60fps with 0 scripts.</p>
  </header>

  <div class="alm-review-rating-workspace">
    
    <h3 class="alm-review-panel-title">Cluster Performance Audit</h3>
    <p class="alm-review-panel-desc">Rate the execution velocity of the current telemetry stream node.</p>

    <div class="alm-star-flex-deck">
      
      <input type="radio" id="star-rank-5" name="clusterRating" value="5" class="alm-star-radio-input">
      <label for="star-rank-5" class="alm-star-vector-label" title="Excellent (5 Stars)">★</label>

      <input type="radio" id="star-rank-4" name="clusterRating" value="4" class="alm-star-radio-input">
      <label for="star-rank-4" class="alm-star-vector-label" title="Good (4 Stars)">★</label>

      <input type="radio" id="star-rank-3" name="clusterRating" value="3" class="alm-star-radio-input">
      <label for="star-rank-3" class="alm-star-vector-label" title="Average (3 Stars)">★</label>

      <input type="radio" id="star-rank-2" name="clusterRating" value="2" class="alm-star-radio-input">
      <label for="star-rank-2" class="alm-star-vector-label" title="Fair (2 Stars)">★</label>

      <input type="radio" id="star-rank-1" name="clusterRating" value="1" class="alm-star-radio-input" checked>
      <label for="star-rank-1" class="alm-star-vector-label" title="Poor (1 Star)">★</label>

    </div>

  </div>

</body>
</html>
