<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Island FAB - EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f172a; /* Dark sleek background */
      color: white;
    }
    .demo-container {
      position: relative;
      width: 340px;
      height: 680px;
      max-height: 85vh;
      background: #1e293b;
      border-radius: 48px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      overflow: hidden;
      border: 14px solid #000000; /* Realistic phone bezel */
    }
    /* Animated live wallpaper background */
    .mock-bg {
      width: 100%; height: 100%;
      background: linear-gradient(45deg, #1e293b, #0f172a, #3b82f6, #0f172a);
      background-size: 300% 300%;
      animation: bg-pan 12s ease-in-out infinite;
      opacity: 0.6;
    }
    @keyframes bg-pan {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <div class="mock-bg"></div>

    <!-- The Shape-Shifting Dynamic FAB -->
    <div class="dynamic-fab-wrapper">
      <div class="dynamic-fab">
        
        <!-- Default State: Just the plus icon -->
        <div class="fab-default-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </div>

        <!-- Expanded State: Action Items -->
        <div class="fab-actions">
          <button class="fab-action-btn" aria-label="Camera" style="--item-index: 1;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
          </button>
          
          <button class="fab-action-btn" aria-label="Video" style="--item-index: 2;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
          </button>
          
          <button class="fab-action-btn" aria-label="Mic" style="--item-index: 3;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
          </button>
          
          <button class="fab-action-btn close-btn" aria-label="Close" style="--item-index: 4;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
