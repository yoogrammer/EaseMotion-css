<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentation Component Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Documentation Search</h1>

  <input
    type="text"
    id="searchInput"
    placeholder="Search components..."
  >

  <div id="results">

    <div class="card" data-name="Button Component">
      Button Component
    </div>

    <div class="card" data-name="Toast Notification">
      Toast Notification
    </div>

    <div class="card" data-name="Animation Replay Button">
      Animation Replay Button
    </div>

    <div class="card" data-name="Code Preview Toggle">
      Code Preview Toggle
    </div>

    <div class="card" data-name="Scroll To Top Button">
      Scroll To Top Button
    </div>

  </div>

  <p id="emptyState" class="hidden">
    No matching results found.
  </p>

</div>

<script>
const searchInput =
  document.getElementById("searchInput");

const cards =
  document.querySelectorAll(".card");

const emptyState =
  document.getElementById("emptyState");

searchInput.addEventListener("input", () => {
  const query =
    searchInput.value.toLowerCase().trim();

  let visibleCount = 0;

  cards.forEach(card => {
    const text =
      card.dataset.name;

    if (
      text.toLowerCase().includes(query)
    ) {
      visibleCount++;

      card.style.display = "block";

      if (query.length > 0) {
        const regex =
          new RegExp(`(${query})`, "ig");

        card.innerHTML =
          text.replace(
            regex,
            "<mark>$1</mark>"
          );
      } else {
        card.textContent = text;
      }

    } else {
      card.style.display = "none";
    }
  });

  emptyState.classList.toggle(
    "hidden",
    visibleCount !== 0
  );
});
</script>

</body>
</html>
