<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookie Consent</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="cookie-bar" id="cookie-bar">
    <a href="#dismiss" class="cookie-dismiss">&times;</a>
    <div class="cookie-icon"></div>
    <div class="cookie-content">
      <p class="cookie-text">This site uses cookies to improve your experience.</p>
      <div class="cookie-actions">
        <a href="#dismiss" class="cookie-btn cookie-btn-accept">Accept</a>
        <a href="#dismiss" class="cookie-btn cookie-btn-decline">Decline</a>
      </div>
    </div>
  </div>
</body>
</html>
