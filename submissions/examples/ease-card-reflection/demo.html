<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ease-card-reflection demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #1a1a2e; gap: 2.5rem; }
    .card {
      width: 200px; height: 140px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 600; color: #fff;
    }
  </style>
</head>
<body>
  <div class="ease-card-reflection">
    <div class="card" style="background:linear-gradient(135deg,#6366f1,#8b5cf6)">Glare effect</div>
    <div class="cr-glare"></div>
  </div>
  <div class="ease-card-reflection">
    <div class="card" style="background:linear-gradient(135deg,#0ea5e9,#06b6d4)">Move cursor</div>
    <div class="cr-glare"></div>
  </div>
  <script>
    document.querySelectorAll('.ease-card-reflection').forEach(el => {
      const glare = el.querySelector('.cr-glare');
      el.addEventListener('mousemove', e => {
        const r = el.getBoundingClientRect();
        glare.style.setProperty('--cx', ((e.clientX - r.left) / r.width * 100) + '%');
        glare.style.setProperty('--cy', ((e.clientY - r.top)  / r.height * 100) + '%');
      });
    });
  </script>
</body>
</html>
