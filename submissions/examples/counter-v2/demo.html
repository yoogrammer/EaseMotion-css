<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-counter — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    /* Hero section — on-load counters */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { font-size: 1rem; color: #475569; letter-spacing: 0.1em; text-transform: uppercase; }

    .stats {
      display: flex;
      gap: 3rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat {
      text-align: center;
    }
    .stat-number {
      font-size: 4rem;
      font-weight: 800;
      color: #fff;
      line-height: 1;
    }
    .stat-label {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Scroll section */
    .scroll-section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 2rem;
      background: #1e293b;
    }
    .scroll-hint {
      font-size: 0.85rem;
      color: #475569;
      text-align: center;
    }

    /* Speed demo */
    .speed-section {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }
    .speed-row {
      display: flex;
      gap: 3rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .speed-label {
      font-size: 0.7rem;
      color: #475569;
      text-align: center;
      margin-top: 0.4rem;
    }
  </style>
</head>
<body>

  <!-- On-load counters -->
  <section class="hero">
    <h1>ease-counter — On Load</h1>
    <div class="stats">

      <div class="stat">
        <div class="stat-number ease-counter" style="--ease-counter-to: 98;"></div>
        <div class="stat-label">Satisfaction %</div>
      </div>

      <div class="stat">
        <div class="stat-number ease-counter ease-delay-200" style="--ease-counter-to: 4200;"></div>
        <div class="stat-label">Users</div>
      </div>

      <div class="stat">
        <div class="stat-number ease-counter ease-delay-400" style="--ease-counter-to: 12;"></div>
        <div class="stat-label">Years</div>
      </div>

    </div>
  </section>

  <!-- Scroll-triggered counters -->
  <section class="scroll-section">
    <h1>ease-counter-scroll — Scroll Triggered</h1>
    <p class="scroll-hint">Numbers count up as you scroll into view</p>
    <div class="stats">

      <div class="stat">
        <div class="stat-number ease-counter-scroll" style="--ease-counter-to: 500;"></div>
        <div class="stat-label">Projects</div>
      </div>

      <div class="stat">
        <div class="stat-number ease-counter-scroll" style="--ease-counter-to: 99;"></div>
        <div class="stat-label">Uptime %</div>
      </div>

      <div class="stat">
        <div class="stat-number ease-counter-scroll" style="--ease-counter-to: 30;"></div>
        <div class="stat-label">Countries</div>
      </div>

    </div>
  </section>

  <!-- Speed variants -->
  <section class="speed-section">
    <h1 style="color:#475569;font-size:0.85rem;letter-spacing:0.1em;text-transform:uppercase;">Speed Variants</h1>
    <div class="speed-row">

      <div class="stat">
        <div class="stat-number ease-counter-scroll ease-counter-fast" style="--ease-counter-to: 100;"></div>
        <div class="speed-label">Fast (0.8s)</div>
      </div>

      <div class="stat">
        <div class="stat-number ease-counter-scroll" style="--ease-counter-to: 100;"></div>
        <div class="speed-label">Default (2s)</div>
      </div>

      <div class="stat">
        <div class="stat-number ease-counter-scroll ease-counter-slow" style="--ease-counter-to: 100;"></div>
        <div class="speed-label">Slow (3.5s)</div>
      </div>

    </div>
  </section>

</body>
</html>
