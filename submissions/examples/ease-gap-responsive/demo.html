<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ease-gap-responsive Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { margin: 0; font-family: sans-serif; padding: 2rem; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); }
    
    .box { background: #6366f1; color: white; padding: 1rem; border-radius: 8px; text-align: center; }
  </style>
</head>
<body>
  <h2>ease-gap-responsive</h2>
  <p>Resize the browser — the gap between boxes adjusts automatically.</p>
  <div class="grid ease-gap-responsive">
    <div class="box">Box 1</div>
    <div class="box">Box 2</div>
    <div class="box">Box 3</div>
    <div class="box">Box 4</div>
    <div class="box">Box 5</div>
    <div class="box">Box 6</div>
  </div>
</body>
</html>
