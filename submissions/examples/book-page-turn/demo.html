<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Page Turn Pagination – EaseMotion CSS</title>
  <meta name="description" content="A realistic 3D CSS book page-turn pagination component using transform-style preserve-3d." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Book Page Turn Pagination</h1>
  <p>Click Next / Prev to turn the page like a real book</p>

  <div class="book-wrap">
    <div class="book" aria-label="Book reader" role="region">
      <!-- Left static page -->
      <div class="page-left" aria-hidden="true">
        <div class="page-title" id="leftTitle">Chapter 1</div>
        <div class="page-line"></div><div class="page-line"></div>
        <div class="page-line"></div><div class="page-line"></div>
        <div class="page-line"></div>
        <span class="page-number left" id="leftNum">1</span>
      </div>

      <!-- Right turning page -->
      <div class="page-turn" id="pageTurn" aria-hidden="true">
        <div class="page-turn-front">
          <div class="page-title" id="rightTitle">Chapter 1</div>
          <div class="page-line"></div><div class="page-line"></div>
          <div class="page-line"></div><div class="page-line"></div>
          <div class="page-line"></div>
          <span class="page-number right" id="rightNum">2</span>
        </div>
        <div class="page-turn-back">
          <div class="page-title" id="backTitle">Chapter 2</div>
          <div class="page-line"></div><div class="page-line"></div>
          <div class="page-line"></div><div class="page-line"></div>
          <span class="page-number left" id="backNum">3</span>
        </div>
      </div>
    </div>

    <div class="pagination">
      <button class="btn-page" id="btnPrev" aria-label="Previous page" disabled>
        ← Prev
      </button>
      <span class="page-indicator" id="pageIndicator" aria-live="polite">Page 1–2</span>
      <button class="btn-page" id="btnNext" aria-label="Next page">
        Next →
      </button>
    </div>
  </div>

  <script>
    const chapters = [
      'Prologue','Chapter 1','Chapter 2','Chapter 3','Chapter 4','Chapter 5','Epilogue'
    ];

    let currentSpread = 0; // each spread = 2 pages
    const totalSpreads = Math.ceil(chapters.length / 2) - 1;
    const pageTurn = document.getElementById('pageTurn');
    const btnPrev = document.getElementById('btnPrev');
    const btnNext = document.getElementById('btnNext');
    const indicator = document.getElementById('pageIndicator');
    let isAnimating = false;

    function updateDisplay() {
      const p = currentSpread * 2;
      document.getElementById('leftTitle').textContent  = chapters[p]   || '';
      document.getElementById('rightTitle').textContent = chapters[p+1] || '';
      document.getElementById('backTitle').textContent  = chapters[p+2] || '';
      document.getElementById('leftNum').textContent    = p + 1;
      document.getElementById('rightNum').textContent   = p + 2;
      document.getElementById('backNum').textContent    = p + 3;
      indicator.textContent = `Page ${p+1}–${p+2}`;
      btnPrev.disabled = currentSpread === 0;
      btnNext.disabled = currentSpread >= totalSpreads;
    }

    function turnNext() {
      if (isAnimating || currentSpread >= totalSpreads) return;
      isAnimating = true;
      pageTurn.classList.add('turning');
      setTimeout(() => {
        currentSpread++;
        pageTurn.classList.remove('turning');
        updateDisplay();
        isAnimating = false;
      }, 900);
    }

    function turnPrev() {
      if (isAnimating || currentSpread <= 0) return;
      isAnimating = true;
      currentSpread--;
      updateDisplay();
      // reverse: show turned state briefly then animate back
      pageTurn.classList.add('turning');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          pageTurn.style.transition = 'none';
          pageTurn.classList.add('turning');
          requestAnimationFrame(() => {
            pageTurn.style.transition = '';
            pageTurn.classList.remove('turning');
            setTimeout(() => { isAnimating = false; }, 900);
          });
        });
      });
    }

    btnNext.addEventListener('click', turnNext);
    btnPrev.addEventListener('click', turnPrev);
    updateDisplay();
  </script>
</body>
</html>
