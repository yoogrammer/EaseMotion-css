<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Speed Test - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="test-wrapper">
    <h1>Typing Speed Test</h1>
    <div class="controls">
      <label>Duration:</label>
      <select id="duration" class="input select">
        <option value="30">30 seconds</option>
        <option value="60" selected>60 seconds</option>
        <option value="120">120 seconds</option>
      </select>
    </div>
    <div class="stats-bar">
      <div class="stat"><span class="stat-label">WPM</span><span class="stat-value" id="wpm">0</span></div>
      <div class="stat"><span class="stat-label">Accuracy</span><span class="stat-value" id="accuracy">100%</span></div>
      <div class="stat"><span class="stat-label">Time</span><span class="stat-value" id="timer">60s</span></div>
    </div>
    <div class="word-display" id="wordDisplay"></div>
    <input type="text" id="userInput" class="input typing-input" placeholder="Start typing here..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="startBtn" class="start-btn">Start Test</button>
    <div class="results-panel" id="resultsPanel" style="display:none">
      <h3>Results</h3>
      <div class="result-row"><span>Words Per Minute</span><span id="finalWpm">0</span></div>
      <div class="result-row"><span>Accuracy</span><span id="finalAccuracy">0%</span></div>
      <div class="result-row"><span>Characters Typed</span><span id="finalChars">0</span></div>
      <div class="result-row"><span>Correct Characters</span><span id="finalCorrect">0</span></div>
    </div>
  </div>
  <script>
    const wordPool = ['the', 'quick', 'brown', 'fox', 'jumps', 'over', 'lazy', 'dog', 'hello', 'world', 'typing', 'speed', 'test', 'random', 'words', 'practice', 'keyboard', 'fingers', 'accuracy', 'wpm', 'letter', 'coding', 'developer', 'javascript', 'html', 'css', 'programming', 'open', 'source', 'project', 'github', 'repository', 'branch', 'commit', 'merge', 'pull', 'request', 'feature', 'fix', 'docs', 'style', 'refactor', 'test', 'chore', 'build', 'ci', 'perf'];
    const wordDisplay = document.getElementById('wordDisplay');
    const userInput = document.getElementById('userInput');
    const startBtn = document.getElementById('startBtn');
    const wpm = document.getElementById('wpm');
    const accuracy = document.getElementById('accuracy');
    const timer = document.getElementById('timer');
    const duration = document.getElementById('duration');
    const resultsPanel = document.getElementById('resultsPanel');
    const finalWpm = document.getElementById('finalWpm');
    const finalAccuracy = document.getElementById('finalAccuracy');
    const finalChars = document.getElementById('finalChars');
    const finalCorrect = document.getElementById('finalCorrect');

    let words = [];
    let currentWordIndex = 0;
    let startTime = null;
    let timeLeft = 60;
    let totalChars = 0;
    let correctChars = 0;
    let timerInterval = null;
    let isRunning = false;

    function getWords(count) {
      const shuffled = [...wordPool].sort(() => Math.random() - 0.5);
      const result = [];
      for (let i = 0; i < count; i++) {
        result.push(shuffled[i % shuffled.length]);
      }
      return result;
    }

    function renderWords() {
      wordDisplay.innerHTML = '';
      let wordCount = Math.max(20, Math.ceil(timeLeft / 3));
      words = getWords(wordCount);
      words.forEach((w, i) => {
        const span = document.createElement('span');
        span.className = 'word' + (i === 0 ? ' active' : '');
        span.dataset.index = i;
        w.split('').forEach(ch => {
          const c = document.createElement('span');
          c.className = 'char';
          c.textContent = ch;
          span.appendChild(c);
        });
        wordDisplay.appendChild(span);
      });
    }

    function updateDisplay() {
      const input = userInput.value;
      const currentWord = words[currentWordIndex];
      if (!currentWord) return;

      const wordSpans = wordDisplay.querySelectorAll('.word');
      wordSpans.forEach((ws, i) => {
        ws.classList.toggle('active', i === currentWordIndex);
      });

      if (!currentWord) return;
      const chars = wordSpans[currentWordIndex].querySelectorAll('.char');
      chars.forEach((c, i) => {
        c.className = 'char';
        if (i < input.length) {
          c.classList.add(input[i] === currentWord[i] ? 'correct' : 'incorrect');
        }
      });
    }

    function endTest() {
      isRunning = false;
      clearInterval(timerInterval);
      userInput.disabled = true;
      startBtn.textContent = 'Restart Test';
      resultsPanel.style.display = 'block';

      const elapsed = (parseInt(duration.value) - timeLeft) / 60;
      const finalWpmVal = elapsed > 0 ? Math.round((totalChars / 5) / elapsed) : 0;
      const acc = totalChars > 0 ? Math.round((correctChars / totalChars) * 100) : 100;

      finalWpm.textContent = finalWpmVal;
      finalAccuracy.textContent = acc + '%';
      finalChars.textContent = totalChars;
      finalCorrect.textContent = correctChars;
    }

    function startTest() {
      timeLeft = parseInt(duration.value);
      totalChars = 0;
      correctChars = 0;
      currentWordIndex = 0;
      isRunning = true;
      userInput.value = '';
      userInput.disabled = false;
      userInput.focus();
      resultsPanel.style.display = 'none';
      startBtn.textContent = 'Running...';
      wpm.textContent = '0';
      accuracy.textContent = '100%';
      timer.textContent = timeLeft + 's';

      renderWords();

      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        timer.textContent = timeLeft + 's';
        if (timeLeft <= 0) {
          endTest();
        }
      }, 1000);
    }

    userInput.addEventListener('input', () => {
      if (!isRunning) return;
      const val = userInput.value;
      const currentWord = words[currentWordIndex];

      if (val.endsWith(' ')) {
        const typed = val.trim();
        totalChars += typed.length;
        for (let i = 0; i < typed.length; i++) {
          if (typed[i] === (currentWord[i] || '')) correctChars++;
        }
        currentWordIndex++;
        userInput.value = '';
        if (currentWordIndex >= words.length) {
          renderWords();
        }
        updateDisplay();
      } else {
        updateDisplay();
      }

      const elapsed = (parseInt(duration.value) - timeLeft) / 60;
      const wpmVal = elapsed > 0 ? Math.round((totalChars / 5) / elapsed) : 0;
      wpm.textContent = wpmVal;
      const acc = totalChars > 0 ? Math.round((correctChars / totalChars) * 100) : 100;
      accuracy.textContent = acc + '%';
    });

    startBtn.addEventListener('click', () => {
      clearInterval(timerInterval);
      startTest();
    });

    renderWords();
  </script>
</body>
</html>
