<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Portal Interface</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Jura:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background layers -->
    <div class="space-background"></div>
    <div class="dimensional-distortion"></div>

    <div class="portal-container">
        
        <!-- Main portal interaction area (Entrance Animation) -->
        <div class="portal-wrapper entrance-anim">
            
            <!-- Quantum energy field (glow base) -->
            <div class="quantum-field"></div>
            
            <!-- Expanding energy pulses -->
            <div class="energy-pulse pulse-1"></div>
            <div class="energy-pulse pulse-2"></div>
            
            <!-- Floating fragments outside the rings -->
            <div class="fragment fragment-1"></div>
            <div class="fragment fragment-2"></div>
            <div class="fragment fragment-3"></div>

            <!-- Multi-layer orbiting energy rings -->
            <div class="energy-ring ring-outer"></div>
            <div class="energy-ring ring-middle"></div>
            <div class="energy-ring ring-inner"></div>

            <!-- Rotating inner vortex -->
            <div class="vortex-container">
                <div class="vortex"></div>
            </div>

            <!-- Pulsing energy core -->
            <div class="energy-core"></div>

            <!-- Quantum flicker sparks -->
            <div class="flicker-spark spark-1"><div class="spark-inner"></div></div>
            <div class="flicker-spark spark-2"><div class="spark-inner"></div></div>
            <div class="flicker-spark spark-3"><div class="spark-inner"></div></div>
            <div class="flicker-spark spark-4"><div class="spark-inner"></div></div>
            
            <!-- Interactive Information Panel -->
            <div class="info-panel">
                <div class="panel-header">QUANTUM GATEWAY</div>
                <div class="panel-content">
                    <div class="data-row"><span>Portal Status:</span> <span class="active">Active</span></div>
                    <div class="data-row"><span>Energy Level:</span> <span>98%</span></div>
                    <div class="data-row"><span>Stability:</span> <span class="secure">Secure</span></div>
                    <div class="data-row"><span>Destination:</span> <span class="unknown">Unknown Dimension</span></div>
                </div>
            </div>
            
        </div>

        <!-- Particles pulled into the portal (placed after wrapper to react to hover) -->
        <div class="particles-container">
            <div class="particle p1"></div>
            <div class="particle p2"></div>
            <div class="particle p3"></div>
            <div class="particle p4"></div>
            <div class="particle p5"></div>
            <div class="particle p6"></div>
            <div class="particle p7"></div>
            <div class="particle p8"></div>
        </div>

    </div>
</body>
</html>
