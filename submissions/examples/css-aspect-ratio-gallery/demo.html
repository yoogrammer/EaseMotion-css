<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aspect Ratio Gallery – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="gallery">
  <h1 class="title">Aspect Ratio Gallery</h1>
  <p class="subtitle">Every card maintains <code>aspect-ratio: 3/4</code> automatically.</p>

  <div class="gallery-grid">
    <div class="gallery-card"><span class="card-num">1</span></div>
    <div class="gallery-card"><span class="card-num">2</span></div>
    <div class="gallery-card"><span class="card-num">3</span></div>
    <div class="gallery-card"><span class="card-num">4</span></div>
    <div class="gallery-card"><span class="card-num">5</span></div>
    <div class="gallery-card"><span class="card-num">6</span></div>
    <div class="gallery-card"><span class="card-num">7</span></div>
    <div class="gallery-card"><span class="card-num">8</span></div>
    <div class="gallery-card"><span class="card-num">9</span></div>
  </div>
</div>

</body>
</html>
