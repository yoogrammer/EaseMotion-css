<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Scheme — Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,sans-serif;background:#f5f5f5;display:flex;justify-content:center;align-items:center;min-height:100vh}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1.5rem;padding:2rem;max-width:800px;width:100%}
    .card{background:#fff;border-radius:12px;padding:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.08);text-align:center}
    .card h3{font-size:.8rem;text-transform:uppercase;color:#888;margin-bottom:1rem}
    select,input{padding:.4rem;font-size:.9rem;border:2px solid #ddd;border-radius:6px;width:100%;margin-bottom:.5rem}
    .tag{display:inline-block;margin-top:.5rem;font-family:monospace;font-size:.8rem;color:#666;background:#f0f0f0;padding:.25rem .5rem;border-radius:4px}
  </style>
</head>
<body>
  <div class="grid">
    <div class="card color-scheme-normal"><h3>Normal</h3><select><option>Default dropdown</option></select><span class="tag">.color-scheme-normal</span></div>
    <div class="card color-scheme-light"><h3>Light</h3><select><option>Light mode</option></select><span class="tag">.color-scheme-light</span></div>
    <div class="card color-scheme-dark"><h3>Dark</h3><select><option>Dark mode</option></select><span class="tag">.color-scheme-dark</span></div>
  </div>
</body>
</html>
