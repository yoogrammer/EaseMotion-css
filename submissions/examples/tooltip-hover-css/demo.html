<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tooltip Hover · CSS Only</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>CSS‑Only Tooltips</h1>
  <p class="subtitle">Hover the buttons below</p>

  <div class="grid">
    <div class="tooltip-trigger" data-tip="Hello from the top!">
      <button class="btn">Top</button>
    </div>
    <div class="tooltip-trigger tooltip-bottom" data-tip="I appear below.">
      <button class="btn">Bottom</button>
    </div>
    <div class="tooltip-trigger tooltip-left" data-tip="Left side!">
      <button class="btn">Left</button>
    </div>
    <div class="tooltip-trigger tooltip-right" data-tip="Right side!">
      <button class="btn">Right</button>
    </div>
  </div>

  <h2>Color Variants</h2>
  <div class="grid">
    <div class="tooltip-trigger tooltip-primary" data-tip="Primary">
      <button class="btn">Primary</button>
    </div>
    <div class="tooltip-trigger tooltip-success" data-tip="Success!">
      <button class="btn">Success</button>
    </div>
    <div class="tooltip-trigger tooltip-warning" data-tip="Caution!">
      <button class="btn">Warning</button>
    </div>
    <div class="tooltip-trigger tooltip-error" data-tip="Error!">
      <button class="btn">Error</button>
    </div>
  </div>

  <h2>Long Text / Rich Tooltips</h2>
  <div class="grid">
    <div class="tooltip-trigger" data-tip="This is a longer tooltip that wraps nicely and shows you can have plenty of text.">
      <button class="btn">Long Tip</button>
    </div>
  </div>

  <footer>
    <p>Built with <a href="https://github.com/anomalyco/EaseMotion-css">EaseMotion CSS</a></p>
  </footer>
</body>
</html>
