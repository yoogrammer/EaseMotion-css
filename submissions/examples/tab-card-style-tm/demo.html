<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tab Card Style - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Tab — Card Style</h1>
    <p class="description">
      Self-contained demo of the proposed
      <code>.ease-tabs-card</code> surface variant.
    </p>

    <div class="ease-tabs ease-tabs-card">
      <input class="ease-tab-input" type="radio" name="ctabs" id="c1" checked>
      <input class="ease-tab-input" type="radio" name="ctabs" id="c2">
      <input class="ease-tab-input" type="radio" name="ctabs" id="c3">

      <div class="ease-tabs-nav">
        <label class="ease-tab-label" for="c1">Profile</label>
        <label class="ease-tab-label" for="c2">Notifications</label>
        <label class="ease-tab-label" for="c3">Security</label>
      </div>

      <div class="ease-tabs-content">
        <div class="ease-tab-panel">Profile content</div>
        <div class="ease-tab-panel">Notifications content</div>
        <div class="ease-tab-panel">Security content</div>
      </div>
    </div>

  </div>

</body>
</html>
