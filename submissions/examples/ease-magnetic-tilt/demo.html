<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Tilt Card - Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="tilt-header">
    <h1>Magnetic 3D Tilt Card</h1>
    <p>Move your cursor across different quadrants of the card to witness high-fidelity physical 3D panning pivots.</p>
  </div>

  <div class="ease-tilt-stage">
    
    <div class="tilt-trigger trigger-top-left"></div>
    <div class="tilt-trigger trigger-top-right"></div>
    <div class="tilt-trigger trigger-bottom-left"></div>
    <div class="tilt-trigger trigger-bottom-right"></div>
    
    <article class="ease-magnetic-card">
      <div class="card-body-wrapper">
        <h3>Spatial Node</h3>
        <p>Pure CSS directional matrix interpolation mapping realistic kinetic physical weight on compositor steps.</p>
      </div>
    </article>

  </div>

</body>
</html>
