<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Morph Tooltip - Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="demo-header">
    <h1>Magnetic Morphing Tooltip Matrix</h1>
    <p>
        A single liquid tooltip capsule that magnetically snaps between
        navigation items while dynamically morphing its size.
    </p>
</div>

<nav class="ease-nav">

  <button class="ease-nav-item"
    data-tooltip="Go to homepage">
    Home
  </button>

  <button class="ease-nav-item"
    data-tooltip="View your analytics dashboard">
    Dashboard
  </button>

  <button class="ease-nav-item"
    data-tooltip="Real-time telemetry monitoring">
    Telemetry
  </button>

  <button class="ease-nav-item"
    data-tooltip="Inspect application logs">
    Logs
  </button>

  <div class="ease-tooltip">
    <span class="ease-tooltip-text"></span>
  </div>

</nav>

<script>
    const items = document.querySelectorAll(".ease-nav-item");
const tooltip = document.querySelector(".ease-tooltip");
const text = document.querySelector(".ease-tooltip-text");

items.forEach(item => {

  item.addEventListener("mouseenter", () => {

    text.textContent = item.dataset.tooltip;

    const itemRect = item.getBoundingClientRect();
    const navRect = item.parentElement.getBoundingClientRect();

    tooltip.classList.add("active");

    requestAnimationFrame(() => {

      const tooltipWidth = tooltip.offsetWidth;

      const x =
        itemRect.left -
        navRect.left +
        itemRect.width / 2 -
        tooltipWidth / 2;

      tooltip.style.transform = `translateX(${x}px)`;
    });
  });

  item.addEventListener("mouseleave", () => {

    if (!document.querySelector(".ease-nav-item:hover")) {
      tooltip.classList.remove("active");
    }
  });
});

document.querySelector(".ease-nav")
  .addEventListener("mouseleave", () => {
    tooltip.classList.remove("active");
  });
</script>

</body>
</html>
