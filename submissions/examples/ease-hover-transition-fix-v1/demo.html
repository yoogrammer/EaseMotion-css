<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-hover-transition-fix Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      gap: 20px;
    }
    .box {
      padding: 20px 40px;
      background: #6c63ff;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }
    h2 {
      margin-top: 30px;
      color: #333;
    }
  </style>
</head>
<body>

  <h1>ease-hover-* Transition Fix Demo</h1>
  <p>Hover over each box to see specific transitions (no transition: all)</p>

  <h2>Grow</h2>
  <div class="box ease-hover-grow">Hover me — Grow</div>

  <h2>Shrink</h2>
  <div class="box ease-hover-shrink">Hover me — Shrink</div>

  <h2>Fade</h2>
  <div class="box ease-hover-fade">Hover me — Fade</div>

  <h2>Brighten</h2>
  <div class="box ease-hover-brighten">Hover me — Brighten</div>

  <h2>Dim</h2>
  <div class="box ease-hover-dim">Hover me — Dim</div>

  <h2>Color</h2>
  <div class="box ease-hover-color">Hover me — Color</div>

</body>
</html>
