<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cookie Consent Banner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Cookie Consent Banner</h1>
    <p>This page demonstrates a cookie consent banner. Click <strong>Accept</strong> or <strong>Reject</strong> to dismiss it. Your choice is remembered for the session.</p>
    <button id="reset-btn" class="reset">Reset Banner</button>
  </div>
  <div id="cookie-banner" class="banner">
    <div class="banner-text">
      <p>We use cookies to improve your experience. By continuing, you agree to our use of cookies.</p>
    </div>
    <div class="banner-actions">
      <button id="accept-btn" class="btn btn-accept">Accept</button>
      <button id="reject-btn" class="btn btn-reject">Reject</button>
    </div>
  </div>
  <script>
    (function() {
      const banner = document.getElementById("cookie-banner");
      const accept = document.getElementById("accept-btn");
      const reject = document.getElementById("reject-btn");
      const reset = document.getElementById("reset-btn");
      if (sessionStorage.getItem("cookieChoice")) {
        banner.classList.add("hidden");
      }
      accept.addEventListener("click", function() {
        sessionStorage.setItem("cookieChoice", "accepted");
        banner.classList.add("hidden");
      });
      reject.addEventListener("click", function() {
        sessionStorage.setItem("cookieChoice", "rejected");
        banner.classList.add("hidden");
      });
      reset.addEventListener("click", function() {
        sessionStorage.removeItem("cookieChoice");
        banner.classList.remove("hidden");
      });
    })();
  </script>
</body>
</html>
