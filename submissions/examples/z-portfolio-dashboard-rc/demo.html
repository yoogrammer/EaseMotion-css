<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Developer Portfolio Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<header class="hero">
    <h1>Alex Developer</h1>
    <p>Frontend Developer • UI Designer • Open Source Contributor</p>
</header>

<section class="skills">
    <h2>Skills</h2>
    <div class="grid">
        <div class="card">HTML</div>
        <div class="card">CSS</div>
        <div class="card">JavaScript</div>
        <div class="card">React</div>
    </div>
</section>

<section class="projects">
    <h2>Projects</h2>
    <div class="grid">
        <div class="card">Portfolio Website</div>
        <div class="card">Task Manager</div>
        <div class="card">Analytics Dashboard</div>
    </div>
</section>

<section class="experience">
    <h2>Experience</h2>
    <div class="timeline">
        <div class="item">Frontend Intern - 2024</div>
        <div class="item">Open Source Contributor - 2025</div>
        <div class="item">Freelance Developer - 2026</div>
    </div>
</section>

<section class="contact">
    <h2>Contact</h2>
    <p>alex@example.com</p>
</section>

</div>

</body>
</html>
