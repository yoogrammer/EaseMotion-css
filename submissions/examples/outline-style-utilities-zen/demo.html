<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outline Style Utilities</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body { font-family: system-ui, sans-serif; max-width: 500px; margin: 2rem auto; padding: 1rem; background: #f8fafc; color: #1e293b; }
      h1 { font-size: 1.5rem; }
      p { color: #64748b; margin-bottom: 1.5rem; }
      .demo-grid { display: flex; gap: 1rem; flex-wrap: wrap; }
      .demo-card { flex: 1; min-width: 130px; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 1.5rem; text-align: center; }
      .demo-card code { display: block; margin-top: 0.5rem; font-size: 0.75rem; color: #6c63ff; font-family: monospace; }
      .outline-solid, .outline-dashed, .outline-dotted { outline: 2px solid #6c63ff; }
      .outline-dashed { outline-style: dashed; }
      .outline-dotted { outline-style: dotted; }
      .outline-none { outline: none; }
    </style>
  </head>
  <body>
    <h1>Outline Style Utilities</h1>
    <p>Outline styles for focus indicators and decorative borders.</p>
    <div class="demo-grid">
      <div class="demo-card outline-none"><strong>None</strong><code>.outline-none</code></div>
      <div class="demo-card outline-solid"><strong>Solid</strong><code>.outline-solid</code></div>
      <div class="demo-card outline-dashed"><strong>Dashed</strong><code>.outline-dashed</code></div>
      <div class="demo-card outline-dotted"><strong>Dotted</strong><code>.outline-dotted</code></div>
    </div>
  </body>
</html>
