<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elastic Toggle Switch - EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
  <style>
    /* Demo presentation layout - NOT part of the core component */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
      color: #1f2937;
    }
    .demo-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05),
                  0 1px 3px rgba(0,0,0,0.05);
      width: 320px;
    }
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .setting-row:last-child {
      border-bottom: none;
    }
    .setting-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .setting-title {
      font-size: 16px;
      font-weight: 600;
      color: #111827;
      margin: 0;
    }
    .setting-desc {
      font-size: 13px;
      color: #6b7280;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="demo-card">
    <div style="margin-bottom: 24px;">
      <h2 style="margin: 0; font-size: 20px; font-weight: 600;">Settings</h2>
      <p style="margin: 4px 0 0; font-size: 14px; color: #6b7280;">Manage your preferences</p>
    </div>
    
    <div class="setting-row">
      <div class="setting-info">
        <p class="setting-title">Push Notifications</p>
        <p class="setting-desc">Receive daily updates</p>
      </div>
      <label class="elastic-toggle" aria-label="Toggle Push Notifications">
        <input type="checkbox" class="elastic-toggle-input" checked>
        <div class="elastic-toggle-track">
          <div class="elastic-toggle-knob"></div>
        </div>
      </label>
    </div>

    <div class="setting-row">
      <div class="setting-info">
        <p class="setting-title">Location Services</p>
        <p class="setting-desc">Allow app tracking</p>
      </div>
      <label class="elastic-toggle" aria-label="Toggle Location Services">
        <input type="checkbox" class="elastic-toggle-input">
        <div class="elastic-toggle-track">
          <div class="elastic-toggle-knob"></div>
        </div>
      </label>
    </div>
  </div>
</body>
</html>
