<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mask-Image Transitions</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Mask-Image Transitions</h1>
    <p>Creative image transitions using CSS mask-image with gradient masks</p>
  </header>

  <main class="gallery">
    <article class="mask-card">
      <h2>Linear Mask</h2>
      <div class="mask-container linear-mask">
        <img src="https://picsum.photos/seed/sunset/600/400" alt="Sunset" loading="lazy" width="600" height="400">
        <img class="mask-top" src="https://picsum.photos/seed/aurora/600/400" alt="Aurora" loading="lazy" width="600" height="400">
      </div>
      <p>Wipe transition via linear-gradient mask</p>
    </article>

    <article class="mask-card">
      <h2>Radial Mask</h2>
      <div class="mask-container radial-mask">
        <img src="https://picsum.photos/seed/desert/600/400" alt="Desert" loading="lazy" width="600" height="400">
        <img class="mask-top" src="https://picsum.photos/seed/canyon/600/400" alt="Canyon" loading="lazy" width="600" height="400">
      </div>
      <p>Radial wipe from center</p>
    </article>

    <article class="mask-card">
      <h2>Alpha Mask</h2>
      <div class="mask-container alpha-mask">
        <img src="https://picsum.photos/seed/lake/600/400" alt="Lake" loading="lazy" width="600" height="400">
        <img class="mask-top" src="https://picsum.photos/seed/waterfall/600/400" alt="Waterfall" loading="lazy" width="600" height="400">
      </div>
      <p>Alpha-channel gradient fade</p>
    </article>
  </main>
</body>
</html>
