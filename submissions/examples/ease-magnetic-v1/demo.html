<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-magnetic | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      gap: 3rem;
      padding: 2rem;
    }

    h1 {
      color: #ffffff;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      opacity: 0.4;
      text-transform: uppercase;
    }

    .section-label {
      color: #ffffff20;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      align-self: flex-start;
      margin-left: 2rem;
      margin-bottom: -1.5rem;
    }

    .demo-row {
      display: flex;
      gap: 2rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* --- Buttons --- */
    .btn {
      padding: 0.85rem 2rem;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      color: white;
      letter-spacing: 0.03em;
    }

    .btn-purple { background: linear-gradient(135deg, #7c6ef7, #a78bfa); }
    .btn-pink   { background: linear-gradient(135deg, #ec4899, #f472b6); }
    .btn-green  { background: linear-gradient(135deg, #22c55e, #4ade80); }
    .btn-gold   { background: linear-gradient(135deg, #d97706, #fbbf24); }

    /* --- Icon Buttons --- */
    .icon-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      cursor: pointer;
      border: 2px solid;
    }

    .icon-purple { background: #1e1e3e; border-color: #7c6ef7; }
    .icon-pink   { background: #2e1a2e; border-color: #ec4899; }
    .icon-green  { background: #0f2e1a; border-color: #22c55e; }
    .icon-gold   { background: #2e1a0f; border-color: #d97706; }

    /* --- Nav Links --- */
    .nav-link {
      color: #a0a0c0;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      transition: color 0.3s;
    }

    .nav-link:hover { color: #ffffff; }

    /* --- Card --- */
    .feature-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      width: 160px;
      cursor: pointer;
      text-align: center;
    }

    .card-icon { font-size: 2.5rem; }
    .card-title { color: #ffffff; font-size: 0.9rem; font-weight: 600; }
    .card-desc  { color: #a0a0c0; font-size: 0.72rem; }

    /* --- Strength Demo --- */
    .strength-row {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    .strength-btn {
      padding: 0.65rem 1.4rem;
      background: #1e1e2e;
      border: 2px solid #7c6ef7;
      border-radius: 10px;
      color: #a78bfa;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    .hint {
      color: #ffffff15;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

  <h1>ease-magnetic — Move cursor over elements</h1>

  <span class="section-label">Buttons</span>
  <div class="demo-row">
    <button class="btn btn-purple magnetic magnetic-purple">✨ Get Started</button>
    <button class="btn btn-pink magnetic magnetic-pink">💖 Subscribe</button>
    <button class="btn btn-green magnetic magnetic-green">🚀 Launch</button>
    <button class="btn btn-gold magnetic magnetic-gold">⚡ Try Free</button>
  </div>

  <span class="section-label">Icons</span>
  <div class="demo-row">
    <div class="icon-btn icon-purple magnetic magnetic-purple">🔔</div>
    <div class="icon-btn icon-pink   magnetic magnetic-pink">💌</div>
    <div class="icon-btn icon-green  magnetic magnetic-green">🎯</div>
    <div class="icon-btn icon-gold   magnetic magnetic-gold">🏆</div>
  </div>

  <span class="section-label">Cards</span>
  <div class="demo-row">
    <div class="feature-card magnetic magnetic-purple">
      <div class="card-icon">⚡</div>
      <span class="card-title">Fast Setup</span>
      <span class="card-desc">Zero config needed</span>
    </div>
    <div class="feature-card magnetic magnetic-pink">
      <div class="card-icon">🎨</div>
      <span class="card-title">Customizable</span>
      <span class="card-desc">CSS variables</span>
    </div>
    <div class="feature-card magnetic magnetic-green">
      <div class="card-icon">♿</div>
      <span class="card-title">Accessible</span>
      <span class="card-desc">Reduced motion</span>
    </div>
  </div>

  <span class="section-label">Strength Variants</span>
  <div class="strength-row">
    <button class="strength-btn magnetic magnetic-weak magnetic-purple">🪶 Weak</button>
    <button class="strength-btn magnetic magnetic-purple">🧲 Normal</button>
    <button class="strength-btn magnetic magnetic-strong magnetic-purple">⚡ Strong</button>
  </div>

  <p class="hint">↑ move your cursor over any element to feel the magnetic pull</p>

  <script>
    const magnets = document.querySelectorAll('.magnetic');

    magnets.forEach(el => {
      el.addEventListener('mousemove', (e) => {
        const rect = el.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const deltaX = e.clientX - centerX;
        const deltaY = e.clientY - centerY;
        const strength = parseFloat(
          getComputedStyle(el).getPropertyValue('--magnetic-strength') || 0.3
        );

        el.classList.add('is-active');
        el.classList.remove('is-leaving');
        el.style.transform = `translate(${deltaX * strength}px, ${deltaY * strength}px)`;
      });

      el.addEventListener('mouseleave', () => {
        el.classList.remove('is-active');
        el.classList.add('is-leaving');
        el.style.transform = 'translate(0px, 0px)';
      });
    });
  </script>

</body>
</html>
