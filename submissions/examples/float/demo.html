<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-float — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f0f4ff;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #333; }
    .row { display: flex; gap: 3rem; flex-wrap: wrap; justify-content: center; align-items: flex-end; }
    .label { font-size: 0.75rem; color: #888; text-align: center; margin-bottom: 0.5rem; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .box {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    .card {
      width: 120px;
      height: 80px;
      border-radius: 12px;
      background: white;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      color: #374151;
    }
    .sublabel { font-size: 0.7rem; color: #aaa; text-align: center; margin-top: 0.5rem; }
  </style>
</head>
<body>

  <h1>ease-float Demo</h1>

  <div class="section">
    <div class="label">Basic float variants</div>
    <div class="row">
      <div style="text-align:center;">
        <div class="box ease-float" style="background:#6366f1;">🚀</div>
        <div class="sublabel">Default</div>
      </div>
      <div style="text-align:center;">
        <div class="box ease-float ease-float-shadow" style="background:#ec4899;">💎</div>
        <div class="sublabel">Shadow</div>
      </div>
      <div style="text-align:center;">
        <div class="box ease-float ease-float-rotate" style="background:#22c55e;">🌿</div>
        <div class="sublabel">Rotate</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="label">Distance variants</div>
    <div class="row">
      <div style="text-align:center;">
        <div class="box ease-float ease-float-sm" style="background:#f59e0b;">🔔</div>
        <div class="sublabel">Small (6px)</div>
      </div>
      <div style="text-align:center;">
        <div class="box ease-float" style="background:#6366f1;">⭐</div>
        <div class="sublabel">Default (12px)</div>
      </div>
      <div style="text-align:center;">
        <div class="box ease-float ease-float-lg" style="background:#ef4444;">🎈</div>
        <div class="sublabel">Large (24px)</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="label">Speed variants</div>
    <div class="row">
      <div style="text-align:center;">
        <div class="box ease-float ease-float-fast" style="background:#3b82f6;">⚡</div>
        <div class="sublabel">Fast (1.5s)</div>
      </div>
      <div style="text-align:center;">
        <div class="box ease-float" style="background:#8b5cf6;">🎯</div>
        <div class="sublabel">Default (3s)</div>
      </div>
      <div style="text-align:center;">
        <div class="box ease-float ease-float-slow" style="background:#14b8a6;">🐢</div>
        <div class="sublabel">Slow (5s)</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="label">Staggered delay group</div>
    <div class="row">
      <div class="card ease-float ease-delay-100">100ms</div>
      <div class="card ease-float ease-delay-200">200ms</div>
      <div class="card ease-float ease-delay-300">300ms</div>
      <div class="card ease-float ease-delay-500">500ms</div>
    </div>
  </div>

</body>
</html>
