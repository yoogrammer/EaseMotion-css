<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typewriter Cursor Glow – EaseMotion CSS</title>
  <meta name="description" content="Typewriter text reveal with glowing blinking cursor using CSS animations." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="terminal">
    <div class="terminal-bar">
      <span class="dot dot--red"></span>
      <span class="dot dot--yellow"></span>
      <span class="dot dot--green"></span>
      <span class="terminal-title">ease-motion ~ demo</span>
    </div>
    <div class="terminal-body">
      <p class="prompt"><span class="prompt-symbol">$</span> cat intro.txt</p>
      <p class="typewriter" aria-label="Building animations with pure CSS">
        <span class="typewriter-text">Building animations with pure CSS</span>
        <span class="cursor-glow" aria-hidden="true"></span>
      </p>
    </div>
  </div>
</body>
</html>
