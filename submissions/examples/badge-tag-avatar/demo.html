<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Badge, Tag, and Avatar Group - EaseMotion CSS</title>
  
  <!-- Link to EaseMotion CSS core -->
  <link rel="stylesheet" href="../../../core/animations.css">
  <!-- Link to your CSS file - do not change this path -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

   <div class="demo-wrapper"> 

    <h1>Badge, Tag, and Avatar Group</h1>

    <div class="demo-section">
      <div class="badge-demo demo-box" style="width: auto; height: auto; background: none; margin: 1rem auto;">
        <span class="badge badge-success">Success</span>
        <span class="badge badge-warning">Warning</span>
        <span class="badge badge-error">Error</span>
        <span class="badge badge-info">Info</span>
      </div>

      <div class="tag-demo demo-box" style="width: auto; height: auto; background: none; margin: 1rem auto;">
        <span class="tag">Animation</span>
        <span class="tag">CSS Utility</span>
        <span class="tag">Component</span>
      </div>

      <div class="avatar-group demo-box" aria-label="Project contributors" style="width: auto; height: auto; background: none; margin: 1rem auto; justify-content: center;">
        <img class="avatar" src="https://i.pravatar.cc/80?img=1" alt="Contributor 1">
        <img class="avatar" src="https://i.pravatar.cc/80?img=2" alt="Contributor 2">
        <img class="avatar" src="https://i.pravatar.cc/80?img=3" alt="Contributor 3">
        <span class="avatar avatar-more">+3</span>
      </div>
    </div>

    <p class="description" style="margin-top: 2rem;">
        This demo shows lightweight badge, tag, and stacked avatar group components built with pure HTML and CSS.
    </p>

  </div>

</body>
</html>
