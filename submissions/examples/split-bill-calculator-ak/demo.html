<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Split Bill Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Split Bill</h1>
    <div class="form">
      <label>Total Bill ($)
        <input type="number" id="totalInput" value="100" min="0" step="0.01">
      </label>
      <label>Number of People
        <input type="number" id="peopleInput" value="4" min="1">
      </label>
      <label>Tip (%)
        <input type="number" id="tipInput" value="15" min="0" step="0.5">
      </label>
    </div>
    <div class="result">
      <div class="result-item">
        <span>Total with Tip</span>
        <span id="totalWithTip">$115.00</span>
      </div>
      <div class="result-item">
        <span>Tip Amount</span>
        <span id="tipAmount">$15.00</span>
      </div>
      <div class="result-item highlight">
        <span>Per Person</span>
        <span id="perPerson">$28.75</span>
      </div>
    </div>
  </div>

  <script>
    const totalInput = document.getElementById('totalInput');
    const peopleInput = document.getElementById('peopleInput');
    const tipInput = document.getElementById('tipInput');
    const totalWithTipEl = document.getElementById('totalWithTip');
    const tipAmountEl = document.getElementById('tipAmount');
    const perPersonEl = document.getElementById('perPerson');

    function calculate() {
      const total = parseFloat(totalInput.value) || 0;
      const people = parseInt(peopleInput.value) || 1;
      const tipPct = parseFloat(tipInput.value) || 0;

      const tipAmount = total * (tipPct / 100);
      const totalWithTip = total + tipAmount;
      const perPerson = totalWithTip / people;

      tipAmountEl.textContent = `$${tipAmount.toFixed(2)}`;
      totalWithTipEl.textContent = `$${totalWithTip.toFixed(2)}`;
      perPersonEl.textContent = `$${perPerson.toFixed(2)}`;
    }

    [totalInput, peopleInput, tipInput].forEach(el => {
      el.addEventListener('input', calculate);
    });

    calculate();
  </script>
</body>
</html>
