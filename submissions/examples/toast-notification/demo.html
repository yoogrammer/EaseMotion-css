<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast Notification Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f5f5f5;
      margin: 0;
    }
    .container {
      padding: 40px;
      text-align: center;
    }
    h2 {
      margin-bottom: 40px;
      color: #333;
      font-weight: 400;
    }
    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .trigger-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      color: white;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .trigger-btn:hover {
      opacity: 0.9;
    }
    .btn-success { background: #10b981; }
    .btn-error { background: #ef4444; }
    .btn-warning { background: #f59e0b; }
    .btn-info { background: #3b82f6; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Toast Notification Component</h2>
    
    <div class="btn-group">
      <button class="trigger-btn btn-success" onclick="showToast('success')">Success</button>
      <button class="trigger-btn btn-error" onclick="showToast('error')">Error</button>
      <button class="trigger-btn btn-warning" onclick="showToast('warning')">Warning</button>
      <button class="trigger-btn btn-info" onclick="showToast('info')">Info</button>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    function showToast(type) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      
      const icons = {
        success: '✓',
        error: '✕',
        warning: '!',
        info: 'ℹ'
      };
      
      const titles = {
        success: 'Success',
        error: 'Error',
        warning: 'Warning',
        info: 'Info'
      };
      
      const messages = {
        success: 'Your changes have been saved successfully.',
        error: 'Something went wrong. Please try again.',
        warning: 'Please review your input before continuing.',
        info: 'New updates are available for download.'
      };
      
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `
        <div class="toast-icon">${icons[type]}</div>
        <div class="toast-content">
          <div class="toast-title">${titles[type]}</div>
          <div class="toast-message">${messages[type]}</div>
        </div>
        <button class="toast-close" onclick="this.parentElement.remove()">✕</button>
      `;
      
      container.appendChild(toast);
      
      // Auto remove after 4 seconds
      setTimeout(() => {
        toast.classList.add('toast-exit');
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }
  </script>
</body>
</html>
