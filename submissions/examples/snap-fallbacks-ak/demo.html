<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snap Fallbacks Demo</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="demo">
        <h2>Scroll Snap Fallback</h2>
        <p>Horizontal scroll with snap points. Falls back to smooth scrolling on unsupported browsers.</p>
        <div class="snap-container">
            <div class="snap-item">1</div>
            <div class="snap-item">2</div>
            <div class="snap-item">3</div>
            <div class="snap-item">4</div>
            <div class="snap-item">5</div>
        </div>
    </div>
</body>
</html>
