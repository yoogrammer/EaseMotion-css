<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-Only Animated Camera Shutter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="camera-container">
        <div class="shutter-lens">
            <div class="blade b1"></div>
            <div class="blade b2"></div>
            <div class="blade b3"></div>
            <div class="blade b4"></div>
            <div class="blade b5"></div>
            <div class="blade b6"></div>
            <div class="center-aperture"></div>
        </div>
        <p class="instruction">Hover over the lens to open the shutter</p>
    </div>
</body>
</html>
