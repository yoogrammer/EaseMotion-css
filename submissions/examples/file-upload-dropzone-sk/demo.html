<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload Dropzone — EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--ease-color-bg, #f8fafc);
            margin: 0;
            font-family: var(--ease-font-sans, system-ui, sans-serif);
        }
        .demo-header {
            text-align: center;
            padding: 4rem 1rem 0;
        }
        .demo-header h1 {
            font-size: var(--ease-text-4xl);
            font-weight: 800;
            color: var(--ease-color-text);
            margin-bottom: 1rem;
        }
        .demo-header p {
            color: var(--ease-color-muted);
            max-width: 500px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <header class="demo-header">
        <h1>Smart File Upload</h1>
        <p>A highly interactive dropzone with animated feedback and progress simulation.</p>
    </header>

    <div class="ease-upload-container">
        <!-- Dropzone Area -->
        <div class="ease-dropzone" id="dropzone">
            <input type="file" id="fileInput" class="ease-dropzone-input" aria-label="Upload files">
            
            <div class="ease-dropzone-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            </div>
            
            <h3 class="ease-dropzone-title">Drag & Drop Files</h3>
            <p class="ease-dropzone-text">or click to browse from your computer</p>
            
            <button class="ease-btn ease-btn-primary ease-btn-sm ease-btn-hover">Select Files</button>
        </div>

        <!-- Progress Container -->
        <div class="ease-upload-progress-container" id="progressContainer">
            <div class="ease-progress-info">
                <span id="fileName">document-scan.pdf</span>
                <span id="progressPercent">45%</span>
            </div>
            <div class="ease-progress-bar-bg">
                <div class="ease-progress-bar-fill" id="progressBar"></div>
            </div>
        </div>

        <!-- Feedback Messages -->
        <div id="feedbackSuccess" class="ease-upload-feedback success">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            <span>File uploaded successfully!</span>
        </div>

        <div id="feedbackError" class="ease-upload-feedback error">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            <span>Invalid file type. Please try again.</span>
        </div>
    </div>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');
        const fileNameLabel = document.getElementById('fileName');
        const feedbackSuccess = document.getElementById('feedbackSuccess');
        const feedbackError = document.getElementById('feedbackError');

        // Drag & Drop Listeners
        ['dragenter', 'dragover'].forEach(eventName => {
            dropzone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropzone.classList.add('drag-over');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropzone.classList.remove('drag-over');
            }, false);
        });

        dropzone.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            handleFiles(files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            if (files.length === 0) return;

            const file = files[0];
            
            // Validation Example (simple check)
            if (file.size > 10 * 1024 * 1024) { // 10MB Limit
                showFeedback('error');
                return;
            }

            simulateUpload(file.name);
        }

        function simulateUpload(name) {
            // Reset states
            feedbackSuccess.style.display = 'none';
            feedbackError.style.display = 'none';
            progressContainer.classList.add('active');
            fileNameLabel.textContent = name;
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        progressContainer.classList.remove('active');
                        showFeedback('success');
                    }, 500);
                }
                progressBar.style.width = progress + '%';
                progressPercent.textContent = Math.round(progress) + '%';
            }, 200);
        }

        function showFeedback(type) {
            if (type === 'success') {
                feedbackSuccess.style.display = 'flex';
            } else {
                feedbackError.style.display = 'flex';
            }
        }
    </script>
</body>
</html>
