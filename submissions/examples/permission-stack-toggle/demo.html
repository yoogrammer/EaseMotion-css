<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Permission Stack Toggle – a mobile-inspired settings panel built with EaseMotion CSS.">
  <title>Permission Stack Toggle | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="tg-perm-preview">
    <div class="tg-perm" role="group" aria-label="App Permissions">

      <!-- Location — enabled by default -->
      <label class="tg-perm-row">
        <input type="checkbox" class="tg-perm-input" checked>
        <span class="tg-perm-icon" aria-hidden="true">
          <!-- pin / location -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
            <circle cx="12" cy="9" r="2.5"/>
          </svg>
        </span>
        <span class="tg-perm-info">
          <span class="tg-perm-title">Location</span>
          <span class="tg-perm-desc">While using the app</span>
        </span>
        <span class="tg-perm-toggle" aria-hidden="true">
          <span class="tg-perm-thumb"></span>
        </span>
      </label>

      <!-- Camera — disabled by default -->
      <label class="tg-perm-row">
        <input type="checkbox" class="tg-perm-input">
        <span class="tg-perm-icon" aria-hidden="true">
          <!-- camera -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </span>
        <span class="tg-perm-info">
          <span class="tg-perm-title">Camera</span>
          <span class="tg-perm-desc">Photos and video</span>
        </span>
        <span class="tg-perm-toggle" aria-hidden="true">
          <span class="tg-perm-thumb"></span>
        </span>
      </label>

      <!-- Microphone — enabled by default -->
      <label class="tg-perm-row">
        <input type="checkbox" class="tg-perm-input" checked>
        <span class="tg-perm-icon" aria-hidden="true">
          <!-- microphone -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="1" width="6" height="12" rx="3"/>
            <path d="M19 10v1a7 7 0 01-14 0v-1"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </span>
        <span class="tg-perm-info">
          <span class="tg-perm-title">Microphone</span>
          <span class="tg-perm-desc">Voice input</span>
        </span>
        <span class="tg-perm-toggle" aria-hidden="true">
          <span class="tg-perm-thumb"></span>
        </span>
      </label>

      <!-- Contacts — disabled by default -->
      <label class="tg-perm-row">
        <input type="checkbox" class="tg-perm-input">
        <span class="tg-perm-icon" aria-hidden="true">
          <!-- contacts / person -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87"/>
            <path d="M16 3.13a4 4 0 010 7.75"/>
          </svg>
        </span>
        <span class="tg-perm-info">
          <span class="tg-perm-title">Contacts</span>
          <span class="tg-perm-desc">Read access only</span>
        </span>
        <span class="tg-perm-toggle" aria-hidden="true">
          <span class="tg-perm-thumb"></span>
        </span>
      </label>

    </div>
  </main>

</body>
</html>
