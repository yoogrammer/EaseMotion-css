<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora Shimmer Loader Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <header class="hero">
      <h1>Aurora Shimmer Loader</h1>
      <p>
        Responsive skeleton loading cards built with pure CSS.
      </p>
    </header>

    <section class="loader-grid">

      <article class="skeleton-card">
        <div class="skeleton-image ease-loader-shimmer"></div>

        <div class="skeleton-content">
          <div class="skeleton-line large ease-loader-shimmer"></div>
          <div class="skeleton-line ease-loader-shimmer"></div>
          <div class="skeleton-line short ease-loader-shimmer"></div>
        </div>
      </article>

      <article class="skeleton-card">
        <div class="skeleton-image ease-loader-shimmer"></div>

        <div class="skeleton-content">
          <div class="skeleton-line large ease-loader-shimmer"></div>
          <div class="skeleton-line ease-loader-shimmer"></div>
          <div class="skeleton-line short ease-loader-shimmer"></div>
        </div>
      </article>

      <article class="skeleton-card">
        <div class="skeleton-image ease-loader-shimmer"></div>

        <div class="skeleton-content">
          <div class="skeleton-line large ease-loader-shimmer"></div>
          <div class="skeleton-line ease-loader-shimmer"></div>
          <div class="skeleton-line short ease-loader-shimmer"></div>
        </div>
      </article>

    </section>

    <section class="profile-section">

      <h2>Profile Skeleton</h2>

      <div class="profile-loader">

        <div class="avatar ease-loader-shimmer"></div>

        <div class="profile-content">
          <div class="skeleton-line medium ease-loader-shimmer"></div>
          <div class="skeleton-line short ease-loader-shimmer"></div>
        </div>

      </div>

    </section>

  </main>

</body>
</html>
