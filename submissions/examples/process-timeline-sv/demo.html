<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Process Timeline</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="timeline-container">

  <h2>Project Development Journey</h2>

  <div class="timeline">

    <div class="step">
      <div class="circle">1</div>
      <h3>Research</h3>
      <p>Gather requirements and ideas.</p>
    </div>

    <div class="step">
      <div class="circle">2</div>
      <h3>Design</h3>
      <p>Create wireframes and UI concepts.</p>
    </div>

    <div class="step">
      <div class="circle">3</div>
      <h3>Development</h3>
      <p>Build core functionality.</p>
    </div>

    <div class="step">
      <div class="circle">4</div>
      <h3>Launch</h3>
      <p>Deploy and monitor performance.</p>
    </div>

  </div>

</div>

</body>
</html>
