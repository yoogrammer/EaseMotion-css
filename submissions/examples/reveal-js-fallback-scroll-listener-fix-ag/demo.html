<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reveal JS Fallback Scroll Listener Fix</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="scroll-container">
    <div class="spacer">Scroll down to view fallback behavior...</div>
    <div class="reveal-item" id="reveal-el">Visible on scroll fallback!</div>
    <div class="spacer">End of page</div>
  </main>
  <script>
    // Mocking IntersectionObserver absence
    window.IntersectionObserver = null;
    
    const el = document.getElementById('reveal-el');
    function checkScroll() {
      const rect = el.getBoundingClientRect();
      if (rect.top < window.innerHeight - 50) {
        el.classList.add('active');
      }
    }
    window.addEventListener('scroll', checkScroll);
    checkScroll(); // initial check
  </script>
</body>
</html>
