<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARIA Labels Demo</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="ease-bg-surface ease-text-primary ease-padding-4">
  <div class="ease-container ease-stack">
    <h2>Accessible Interactive Elements</h2>
    
    <div class="ease-card ease-padding-6 ease-border ease-rounded-lg">
      <button class="ease-btn ease-btn-primary accessible-button" aria-label="Close dialog">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
      <p class="ease-margin-t-4">The button above has an aria-label="Close dialog" for screen readers.</p>
    </div>

    <div class="ease-card ease-padding-6 ease-border ease-rounded-lg">
      <div role="switch" aria-checked="true" aria-label="Enable notifications" class="ease-btn ease-btn-success accessible-button" tabindex="0">
        Notifications On
      </div>
      <p class="ease-margin-t-4">The toggle above uses role="switch" and aria-checked="true".</p>
    </div>
  </div>
</body>
</html>
