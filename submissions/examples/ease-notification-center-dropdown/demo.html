<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Notification Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ease-notification-center">

    <button class="ease-notification-bell" id="notificationBell">
        🔔
        <span class="ease-badge" id="notificationCount">3</span>
    </button>

    <div class="ease-notification-dropdown" id="notificationDropdown">

        <div class="ease-notification-header">
            <h3>Notifications</h3>
            <button id="markAllRead">Mark all as read</button>
        </div>

        <div class="ease-notification-list">

            <div class="ease-notification-item is-unread">
                <h4>New Comment</h4>
                <p>Someone commented on your post.</p>
            </div>

            <div class="ease-notification-item is-unread">
                <h4>Profile Updated</h4>
                <p>Your profile was successfully updated.</p>
            </div>

            <div class="ease-notification-item is-unread">
                <h4>Welcome</h4>
                <p>Thanks for joining EaseMotion.</p>
            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
