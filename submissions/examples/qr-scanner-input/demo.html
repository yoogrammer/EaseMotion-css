<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Scanner Input</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>QR Scanner Input</h1>

    <div class="scanner-box">
      <div class="scan-line"></div>
      <div class="scanner-frame"></div>
    </div>

    <div class="input-section">
      <label>Decoded QR Content</label>

      <input type="text" id="decodedInput" placeholder="Scan a QR code..." readonly>

      <div class="actions">
        <button id="scanBtn">Scan QR</button>
        <button id="copyBtn">Copy</button>
      </div>
    </div>

    <div class="history">
      <h2>Scan History</h2>
      <ul id="historyList"></ul>
    </div>

  </div>

  <script>

    const sampleCodes = [
      "https://easemotion.dev",
      "EVENT-2026-ENTRY",
      "USER-45982",
      "https://github.com/SAPTARSHI-coder",
      "PAYMENT-QR-12345"
    ];

    const scanBtn = document.getElementById("scanBtn");
    const copyBtn = document.getElementById("copyBtn");
    const decodedInput = document.getElementById("decodedInput");
    const historyList = document.getElementById("historyList");

    scanBtn.addEventListener("click", () => {

      const randomCode =
        sampleCodes[
        Math.floor(Math.random() * sampleCodes.length)
        ];

      decodedInput.value = randomCode;

      const item = document.createElement("li");
      item.textContent = randomCode;

      historyList.prepend(item);

    });

    copyBtn.addEventListener("click", () => {

      if (!decodedInput.value) return;

      navigator.clipboard.writeText(decodedInput.value);

      copyBtn.textContent = "Copied!";

      setTimeout(() => {
        copyBtn.textContent = "Copy";
      }, 1500);

    });

  </script>

</body>

</html>
