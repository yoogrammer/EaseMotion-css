<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Margin Utilities</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Ease Margin Utilities</h1>
  <p>Examples of auto and directional margin utility classes.</p>

  <section>
    <h2>Auto Margin Utilities</h2>

    <div class="container">
      <div class="box ease-m-auto">ease-m-auto</div>
    </div>

    <div class="container">
      <div class="box ease-mx-auto">ease-mx-auto</div>
    </div>
  </section>

  <section>
    <h2>Directional Margin Utilities</h2>

    <div class="wrapper">
      <div class="box ease-mt-4">ease-mt-4</div>
    </div>

    <div class="wrapper">
      <div class="box ease-mb-4">ease-mb-4</div>
    </div>

    <div class="wrapper">
      <div class="box ease-ml-4">ease-ml-4</div>
    </div>

    <div class="wrapper">
      <div class="box ease-mr-4">ease-mr-4</div>
    </div>

    <div class="wrapper">
      <div class="box ease-mt-5">ease-mt-5</div>
    </div>

    <div class="wrapper">
      <div class="box ease-ml-5">ease-ml-5</div>
    </div>

    <div class="container" style="height:150px;">
      <div class="box ease-my-auto">ease-my-auto</div>
    </div>
  </section>

</body>

</html>
