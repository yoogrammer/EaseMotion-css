<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Tada-Click Tooltip - Glassmorphism UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ambient-glow glow-1"></div>
  <div class="ambient-glow glow-2"></div>

  <main class="glass-container">
    <header class="glass-header">
      <span class="glass-badge">Vivid System OS</span>
      <h1>Glassmorphism Core</h1>
      <p>Hover over the crystal system nodes below, then click to trigger the native CSS Tada micro-interaction.</p>
    </header>

    <div class="glass-grid">
      <article class="glass-card">
        <div class="card-meta">NODE // 01</div>
        <h3>Neural Processing</h3>
        <button class="glass-btn tooltip-container" aria-describedby="tip-neural">
          Analyze Core
          <span id="tip-neural" class="tooltip" role="tooltip">
            🔮 Synaptic weight matrices calculated instantly.
          </span>
        </button>
      </article>

      <article class="glass-card">
        <div class="card-meta">NODE // 02</div>
        <h3>Memory Stream</h3>
        <button class="glass-btn tooltip-container" aria-describedby="tip-stream">
          Sync Buffer
          <span id="tip-stream" class="tooltip" role="tooltip">
            ❄️ Cache frozen and optimized across glass nodes.
          </span>
        </button>
      </article>
    </div>
  </main>

</body>
</html>
