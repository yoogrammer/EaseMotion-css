<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Current Color Variables Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f1f5f9; padding: 60px 20px; margin: 0;">

  <div class="theme-sandbox-canvas">
    <div style="border-bottom: 1px solid #e2e8f0; padding-bottom: 1.25rem; margin-bottom: 1.5rem;">
      <h4 style="margin: 0 0 6px 0; color: #0f172a; font-size: 1.4rem;">Dynamic Contextual Inheritance Matrix</h4>
      <p style="margin: 0; color: #64748b; font-size: 0.85rem; line-height: 1.5;">
        Demonstrates how children components can automatically bind borders, SVG fills, and decoration layers to the element's active text color using <code>currentColor</code> tokens.
      </p>
    </div>

    <div class="variant-showcase-grid">

      <div class="theme-scope-card theme-indigo">
        <div class="adaptive-icon-box">
          <svg class="ease-fill-current" width="20" height="20" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
          </svg>
          <span>Indigo Theme</span>
        </div>
        <div class="ease-bg-current adaptive-badge-line"></div>
        <button type="button" class="ease-border-current adaptive-button">
          Outline Action
        </button>
      </div>

      <div class="theme-scope-card theme-emerald">
        <div class="adaptive-icon-box">
          <svg class="ease-fill-current" width="20" height="20" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
          </svg>
          <span>Emerald Theme</span>
        </div>
        <div class="ease-bg-current adaptive-badge-line"></div>
        <button type="button" class="ease-border-current adaptive-button">
          Outline Action
        </button>
      </div>

      <div class="theme-scope-card theme-rose">
        <div class="adaptive-icon-box">
          <svg class="ease-fill-current" width="20" height="20" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
          </svg>
          <span>Rose Theme</span>
        </div>
        <div class="ease-bg-current adaptive-badge-line"></div>
        <button type="button" class="ease-border-current adaptive-button">
          Outline Action
        </button>
      </div>

    </div>
  </div>

</body>
</html>
