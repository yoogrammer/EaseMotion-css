<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinematic Reveal Card</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="card-container">
    <div class="cinematic-card">
      <div class="image-wrapper">
        <div class="gradient-layer"></div>
        <div class="mock-image"></div>
      </div>
      <div class="card-content">
        <span class="badge">ADVENTURE</span>
        <h2 class="title">Lost in Deep Space</h2>
        <p class="description">Embark on a visual journey through distant nebulas and forgotten star systems.</p>
        <button class="action-btn">Explore Now</button>
      </div>
    </div>
  </div>
</body>
</html>
