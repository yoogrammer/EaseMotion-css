<!DOCTYPE html>
<html>
<head>
  <title>Magnetic Button Hover Effect</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <div style="padding: 4rem; display: flex; flex-direction: column; gap: 2rem; align-items: center; justify-content: center; min-height: 50vh;">
    
    <div style="text-align: center;">
      <h1>Magnetic Button Hover Effect</h1>
      <p>A smooth, premium interactive hover effect.</p>
    </div>

    <div style="display: flex; gap: 2rem;">
      <!-- Standard Button with Magnetic Effect -->
      <button class="ease-btn btn-magnetic">
        Hover me!
      </button>

      <!-- Outlined Button with Magnetic Effect -->
      <button class="ease-btn btn-outline btn-magnetic">
        I'm magnetic too!
      </button>
    </div>

  </div>
</body>
</html>
