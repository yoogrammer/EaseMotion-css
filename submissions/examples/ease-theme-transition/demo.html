<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smooth Theme Transition Fix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <input type="checkbox" id="theme-switch-control" class="theme-checkbox-gate">

    <main class="page-container">
        <header class="site-header">
            <h1>EaseMotion CSS</h1>
            <label for="theme-switch-control" class="theme-toggle-label">
                <span class="mode-icon-light">☀️ Light</span>
                <span class="mode-icon-dark">🌙 Dark</span>
            </label>
        </header>

        <article class="content-panel">
            <h2>Theme Transition Test Canvas</h2>
            <p>Toggle the controller in the top right. The background elements, borders, and typography layers change value via an explicit CSS interpolation property to avoid instant color snaps.</p>
        </article>
    </main>

</body>
</html>
