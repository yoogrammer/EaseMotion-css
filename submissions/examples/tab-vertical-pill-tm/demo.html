<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tab Vertical and Pill - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Tab — Vertical and Pill</h1>
    <p class="description">
      Self-contained demo of the proposed
      <code>.ease-tabs-vertical</code> and
      <code>.ease-tabs-pill</code> orientation variants.
    </p>

    <h2>Vertical</h2>
    <div class="ease-tabs ease-tabs-vertical">
      <input class="ease-tab-input" type="radio" name="vtabs" id="v1" checked>
      <input class="ease-tab-input" type="radio" name="vtabs" id="v2">
      <input class="ease-tab-input" type="radio" name="vtabs" id="v3">

      <div class="ease-tabs-nav">
        <label class="ease-tab-label" for="v1">Overview</label>
        <label class="ease-tab-label" for="v2">Settings</label>
        <label class="ease-tab-label" for="v3">Activity</label>
      </div>

      <div class="ease-tabs-content">
        <div class="ease-tab-panel">Overview content</div>
        <div class="ease-tab-panel">Settings content</div>
        <div class="ease-tab-panel">Activity content</div>
      </div>
    </div>

    <h2>Pill</h2>
    <div class="ease-tabs ease-tabs-pill">
      <input class="ease-tab-input" type="radio" name="ptabs" id="p1" checked>
      <input class="ease-tab-input" type="radio" name="ptabs" id="p2">
      <input class="ease-tab-input" type="radio" name="ptabs" id="p3">

      <div class="ease-tabs-nav">
        <label class="ease-tab-label" for="p1">All</label>
        <label class="ease-tab-label" for="p2">Active</label>
        <label class="ease-tab-label" for="p3">Archived</label>
      </div>

      <div class="ease-tabs-content">
        <div class="ease-tab-panel">All items</div>
        <div class="ease-tab-panel">Active items</div>
        <div class="ease-tab-panel">Archived items</div>
      </div>
    </div>

  </div>

</body>
</html>
