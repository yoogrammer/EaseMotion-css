<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Password Gauge Validation</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 460px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Zero-Script Validation Rails</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem;">Type in the field below. Native HTML <code>pattern</code> tests combine with advanced general sibling selectors to drive layout updates with 0 script lines.</p>
  </header>

  <form class="alm-auth-card" onsubmit="event.preventDefault();">
    <div class="alm-form-group">
      <label for="usr-pass" class="alm-form-label">Create System Password</label>
      
      <input type="password" 
             id="usr-pass" 
             class="alm-password-input" 
             placeholder=" " 
             pattern="(?=.*\d).{8,}" 
             required>
      
      <div class="alm-gauge-track">
        <div class="alm-gauge-bar"></div>
      </div>
      
      <span class="alm-gauge-label"></span>
    </div>
  </form>

</body>
</html>
