<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Popover Dropdown – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">
  <h1 class="title">CSS Popover Dropdown Menu</h1>
  <p class="subtitle">Using the <code>popover</code> API — no JavaScript needed.</p>

  <div class="demo-area">
    <button class="popover-btn" popovertarget="menu" popovertargetaction="toggle">Open Menu ▼</button>
    <div id="menu" class="popover-menu" popover>
      <a class="menu-item" href="#">Profile</a>
      <a class="menu-item" href="#">Settings</a>
      <a class="menu-item" href="#">Analytics</a>
      <hr class="menu-divider">
      <a class="menu-item menu-danger" href="#">Logout</a>
    </div>
  </div>

  <p class="hint">Click the button to toggle. Click outside to close — all native popover behavior.</p>
</div>

</body>
</html>
