<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fix Demo — masonry break-inside #4238</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #0f0f0f; color: #fff; }
    .ease-masonry { column-count: 3; column-gap: 1rem; }
    .ease-masonry > * {
      background: #1e1e2e;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>

  <h2>Masonry Layout — break-inside fix</h2>
  <p style="color:#aaa">
    Items should not split across columns.<br>
    The container itself no longer has the incorrect
    <code>break-inside: avoid-column</code>.
  </p>

  <div class="ease-masonry">
    <div style="height:80px">Card 1 — short</div>
    <div style="height:160px">Card 2 — tall</div>
    <div style="height:100px">Card 3 — medium</div>
    <div style="height:60px">Card 4 — short</div>
    <div style="height:200px">Card 5 — very tall</div>
    <div style="height:90px">Card 6 — medium</div>
  </div>

</body>
</html>
