<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-avatar-pr Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 4rem 2rem;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }
    
    .demo-section h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #1e293b;
    }
    
    .avatars-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      align-items: flex-end;
    }
    
    .avatar-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    
    .avatar-label {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .users-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-width: 280px;
    }
  </style>
</head>
<body>

  <div class="demo-section">
    <h2>Avatar Sizes</h2>
    <div class="avatars-row">
      <div class="avatar-group">
        <span class="avatar-label">Small</span>
        <div class="avatar-pr avatar-pr-sm">
          JD
          <span class="avatar-pr-status avatar-pr-online"></span>
        </div>
      </div>
      <div class="avatar-group">
        <span class="avatar-label">Medium</span>
        <div class="avatar-pr avatar-pr-md">
          JD
          <span class="avatar-pr-status avatar-pr-online"></span>
        </div>
      </div>
      <div class="avatar-group">
        <span class="avatar-label">Large</span>
        <div class="avatar-pr avatar-pr-lg">
          JD
          <span class="avatar-pr-status avatar-pr-online"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <h2>Status Variants</h2>
    <div class="avatars-row">
      <div class="avatar-group">
        <span class="avatar-label">Online</span>
        <div class="avatar-pr avatar-pr-md">
          AS
          <span class="avatar-pr-status avatar-pr-online"></span>
        </div>
      </div>
      <div class="avatar-group">
        <span class="avatar-label">Offline</span>
        <div class="avatar-pr avatar-pr-md">
          MK
          <span class="avatar-pr-status avatar-pr-offline"></span>
        </div>
      </div>
      <div class="avatar-group">
        <span class="avatar-label">Busy</span>
        <div class="avatar-pr avatar-pr-md">
          RL
          <span class="avatar-pr-status avatar-pr-busy"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <h2>With User Info</h2>
    <div class="users-list">
      
      <div class="avatar-pr-wrapper">
        <div class="avatar-pr avatar-pr-md">
          JD
          <span class="avatar-pr-status avatar-pr-online"></span>
        </div>
        <div class="avatar-pr-info">
          <span class="avatar-pr-name">John Doe</span>
          <span class="avatar-pr-role">Frontend Developer</span>
        </div>
      </div>

      <div class="avatar-pr-wrapper">
        <div class="avatar-pr avatar-pr-md">
          AS
          <span class="avatar-pr-status avatar-pr-busy"></span>
        </div>
        <div class="avatar-pr-info">
          <span class="avatar-pr-name">Alice Smith</span>
          <span class="avatar-pr-role">UI/UX Designer</span>
        </div>
      </div>

      <div class="avatar-pr-wrapper">
        <div class="avatar-pr avatar-pr-md">
          MK
          <span class="avatar-pr-status avatar-pr-offline"></span>
        </div>
        <div class="avatar-pr-info">
          <span class="avatar-pr-name">Mike King</span>
          <span class="avatar-pr-role">Backend Engineer</span>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
