<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bounce Animations Demo</title>
  <!-- Load EaseMotion CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css@latest/dist/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f3f4f6;
      margin: 0;
    }
    .container {
      text-align: center;
      background: white;
      padding: 3rem 4rem;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
      position: relative;
    }
    .modal {
      width: 250px;
      padding: 2rem;
      margin: 2rem auto;
      background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
      color: white;
      font-weight: bold;
      font-size: 1.25rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 2rem;
    }
    button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 6px;
      background: #1f2937;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #111827;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>EaseMotion Bounce Animations</h2>
    
    <div id="target" class="modal ease-bounce-in">
      🎉 Surprise!
    </div>

    <div class="controls">
      <button onclick="triggerAnimation('ease-bounce-in')">Bounce In</button>
      <button onclick="triggerAnimation('ease-bounce-out')">Bounce Out</button>
    </div>
  </div>

  <script>
    function triggerAnimation(animationClass) {
      const target = document.getElementById('target');
      
      // Remove classes to reset
      target.classList.remove('ease-bounce-in', 'ease-bounce-out');
      
      // Force reflow
      void target.offsetWidth;
      
      // Apply requested animation class
      target.classList.add(animationClass);
    }
  </script>
</body>
</html>
