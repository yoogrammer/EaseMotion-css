<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-breadcrumb — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: #0f0e17;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 3rem 2rem;
      min-height: 100vh;
    }
    h1 { font-size: 2rem; margin-bottom: 0.25rem; }
    .subtitle { color: rgba(255,255,255,0.5); margin-bottom: 2.5rem; }
    .section { margin-bottom: 2rem; }
    p.label { font-size: 0.85rem; color: rgba(255,255,255,0.4); margin-bottom: 0.5rem; }
    /* dark overrides */
    .ease-breadcrumb-item { color: rgba(255,255,255,0.45); }
    .ease-breadcrumb-item:last-child { color: #fff; }
    .ease-breadcrumb-item + .ease-breadcrumb-item::before { color: rgba(255,255,255,0.25); }
  </style>
</head>
<body>
  <h1>ease-breadcrumb</h1>
  <p class="subtitle">Breadcrumb navigation — Issue #259</p>

  <div class="section">
    <p class="label">Default separator ( / )</p>
    <nav aria-label="breadcrumb">
      <ol class="ease-breadcrumb">
        <li class="ease-breadcrumb-item"><a href="#">Home</a></li>
        <li class="ease-breadcrumb-item"><a href="#">Products</a></li>
        <li class="ease-breadcrumb-item">Detail Page</li>
      </ol>
    </nav>
  </div>

  <div class="section">
    <p class="label">Custom separator ( › ) via CSS variable</p>
    <nav aria-label="breadcrumb">
      <ol class="ease-breadcrumb" style="--_breadcrumb-sep: '›'">
        <li class="ease-breadcrumb-item"><a href="#">Dashboard</a></li>
        <li class="ease-breadcrumb-item"><a href="#">Settings</a></li>
        <li class="ease-breadcrumb-item">Profile</li>
      </ol>
    </nav>
  </div>

  <div class="section">
    <p class="label">Custom separator ( · )</p>
    <nav aria-label="breadcrumb">
      <ol class="ease-breadcrumb" style="--_breadcrumb-sep: '·'">
        <li class="ease-breadcrumb-item"><a href="#">Docs</a></li>
        <li class="ease-breadcrumb-item"><a href="#">Components</a></li>
        <li class="ease-breadcrumb-item">Breadcrumb</li>
      </ol>
    </nav>
  </div>
</body>
</html>
