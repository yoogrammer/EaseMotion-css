<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard Key Styling Component</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-wrapper">
        <header class="demo-header">
            <h1>Keyboard Key Styling Component</h1>
            <p>A CSS-only mechanical keycap component featuring a fluid pressed downward motion layout.</p>
        </header>

        <main class="demo-main">
            <!-- Light Context / Inline Flow -->
            <section class="demo-section">
                <h2>Light Theme (Inline Flow)</h2>
                <p class="demo-text">
                    Press <kbd class="ease-kbd">Ctrl</kbd> + <kbd class="ease-kbd">Shift</kbd> + <kbd class="ease-kbd">P</kbd> to open the command palette.
                </p>
            </section>

            <!-- Dark Context -->
            <section class="demo-section dark-context">
                <h2>Dark Theme Context</h2>
                <p class="demo-text">
                    Use <kbd class="ease-kbd ease-kbd-dark">W</kbd> <kbd class="ease-kbd ease-kbd-dark">A</kbd> <kbd class="ease-kbd ease-kbd-dark">S</kbd> <kbd class="ease-kbd ease-kbd-dark">D</kbd> or the <kbd class="ease-kbd ease-kbd-dark">↑</kbd> arrow keys to steer navigation characters.
                </p>
            </section>
        </main>
    </div>
</body>
</html>
