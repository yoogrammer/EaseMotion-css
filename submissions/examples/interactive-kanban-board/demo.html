<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Kanban Board</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Interactive Kanban Board</h1>

    <p class="subtitle">
        Hover over cards to explore task states.
    </p>

    <div class="board">

        <div class="column">

            <h2>Todo</h2>

            <div class="task">
                Design landing page
            </div>

            <div class="task">
                Create documentation
            </div>

        </div>

        <div class="column">

            <h2>In Progress</h2>

            <div class="task">
                Build animations
            </div>

            <div class="task">
                Create examples
            </div>

        </div>

        <div class="column">

            <h2>Done</h2>

            <div class="task">
                Setup repository
            </div>

            <div class="task">
                Publish release
            </div>

        </div>

    </div>

</div>

</body>
</html>
