<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fix Chip Overflow Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f9fafb;
    }
    .container {
      width: 200px;
      border: 1px dashed #ccc;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <p style="margin: 0; font-size: 0.875rem; color: #666;">Max width: 200px</p>
    <span class="ease-chip">ThisIsAVeryLongStringWithoutAnySpacesThatWillOverflow</span>
    <span class="ease-badge ease-badge-primary">AnotherVeryLongStringHereThatNeedsTruncation</span>
  </div>
</body>
</html>
