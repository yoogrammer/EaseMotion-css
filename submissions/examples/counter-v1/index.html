<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-counter — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      gap: 2rem;
    }
    .demo-card {
      background: white;
      border-radius: 12px;
      padding: 2rem 3rem;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .label {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 0.5rem;
    }
    .count-display {
      font-size: 3rem;
      font-weight: 700;
      color: #333;
    }
    .row {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>

  <h1>ease-counter Demo</h1>

  <div class="row">
    <div class="demo-card">
      <div class="label">Default (0 → 100)</div>
      <div class="count-display ease-counter" style="--ease-counter-to: 100;"></div>
    </div>

    <div class="demo-card">
      <div class="label">Fast (0 → 500)</div>
      <div class="count-display ease-counter ease-counter-fast" style="--ease-counter-to: 500;"></div>
    </div>

    <div class="demo-card">
      <div class="label">Slow + Delay (0 → 250)</div>
      <div class="count-display ease-counter ease-counter-slow ease-delay-300" style="--ease-counter-to: 250;"></div>
    </div>

    <div class="demo-card">
      <div class="label">Staggered (0 → 99)</div>
      <div class="count-display ease-counter ease-delay-500" style="--ease-counter-to: 99;"></div>
    </div>
  </div>

</body>
</html>
