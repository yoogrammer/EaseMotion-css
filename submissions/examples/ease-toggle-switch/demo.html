<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ease Toggle Switch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>Ease Toggle Switch</h2>

  <!-- Small Toggle -->
  <div>
    <p>Small</p>
    <input type="checkbox" id="toggle-sm" class="ease-toggle sm">
    <label for="toggle-sm"></label>
  </div>

  <!-- Medium Toggle -->
  <div>
    <p>Medium</p>
    <input type="checkbox" id="toggle-md" class="ease-toggle md">
    <label for="toggle-md"></label>
  </div>

  <!-- Large Toggle -->
  <div>
    <p>Large</p>
    <input type="checkbox" id="toggle-lg" class="ease-toggle lg">
    <label for="toggle-lg"></label>
  </div>

</body>
</html>
