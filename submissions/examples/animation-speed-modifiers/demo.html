<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Animation Speed Modifiers Demo</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f4f4f4; }
    .box { padding: 1rem 2rem; margin: 0.5rem 0; background: #6c63ff;
           color: white; border-radius: 8px; display: inline-block; }
  </style>
</head>
<body>
  <h2>Duration Modifiers</h2>
  <div class="box ease-fade-in em-duration-fastest">fastest (100ms)</div><br>
  <div class="box ease-fade-in em-duration-fast">fast (300ms)</div><br>
  <div class="box ease-fade-in em-duration-normal">normal (500ms)</div><br>
  <div class="box ease-fade-in em-duration-slow">slow (800ms)</div><br>
  <div class="box ease-fade-in em-duration-slowest">slowest (1200ms)</div>

  <h2>Delay Modifiers</h2>
  <div class="box ease-slide-up em-delay-0">no delay</div><br>
  <div class="box ease-slide-up em-delay-200">200ms delay</div><br>
  <div class="box ease-slide-up em-delay-500">500ms delay</div><br>
  <div class="box ease-slide-up em-delay-1000">1000ms delay</div>
</body>
</html>
