<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Card 3D Hover</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f1f5f9; gap: 2rem; flex-wrap: wrap;">
    <div class="flip-card">
      <div class="flip-inner">
        <div class="flip-front"><h3>Front Side</h3><p>Hover or focus me</p></div>
        <div class="flip-back"><h3>Back Side</h3><p>Hidden content revealed!</p><button class="flip-btn">Action</button></div>
      </div>
    </div>
  </div>
</body>
</html>
