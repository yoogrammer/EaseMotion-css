<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billing Toggle — EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css@1.4.5/dist/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="display:flex;flex-direction:column;align-items:center;gap:var(--ease-space-8,32px);padding:var(--ease-space-6,24px);font-family:var(--ease-font-sans,system-ui,sans-serif);background:var(--ease-color-neutral-50,#f9fafb);margin:0;">

  <h1 style="font-size:1.5rem;font-weight:700;color:var(--ease-color-neutral-900,#111827);margin:0;">
    Billing Toggle
  </h1>

  <!-- Default -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:var(--ease-space-6,24px);padding:var(--ease-space-6,24px);background:#fff;border:1px solid var(--ease-color-neutral-200,#e5e7eb);border-radius:var(--ease-radius-lg,12px);">

    <div class="ease-billing-toggle-az">
      <span class="ease-billing-label-az --active">Monthly</span>
      <label class="ease-billing-switch-az">
        <input class="ease-billing-switch-input-az" type="checkbox" />
        <span class="ease-billing-switch-track-az"></span>
        <span class="ease-billing-switch-thumb-az"></span>
      </label>
      <span class="ease-billing-label-az">Yearly</span>
      <span class="ease-billing-savings-az">Save 20%</span>
    </div>

    <!-- Sample pricing cards -->
    <div style="display:flex;gap:var(--ease-space-3,12px);flex-wrap:wrap;justify-content:center;">
      <div style="padding:var(--ease-space-4,16px);background:var(--ease-color-neutral-50,#f9fafb);border-radius:var(--ease-radius-md,8px);text-align:center;min-width:140px;">
        <div style="font-size:0.75rem;font-weight:600;color:var(--ease-color-neutral-500,#6b7280);margin-bottom:var(--ease-space-1,4px);">Basic</div>
        <div style="font-size:1.5rem;font-weight:800;color:var(--ease-color-neutral-900,#111827);">$19<span style="font-size:0.75rem;font-weight:500;color:var(--ease-color-neutral-400,#9ca3af);">/mo</span></div>
      </div>
      <div style="padding:var(--ease-space-4,16px);background:rgba(99,102,241,0.06);border:2px solid var(--ease-color-primary,#6366f1);border-radius:var(--ease-radius-md,8px);text-align:center;min-width:140px;">
        <div style="font-size:0.75rem;font-weight:600;color:var(--ease-color-primary,#6366f1);margin-bottom:var(--ease-space-1,4px);">Pro</div>
        <div style="font-size:1.5rem;font-weight:800;color:var(--ease-color-neutral-900,#111827);">$49<span style="font-size:0.75rem;font-weight:500;color:var(--ease-color-neutral-400,#9ca3af);">/mo</span></div>
      </div>
    </div>
  </div>

  <!-- Yearly selected -->
  <div style="display:flex;flex-direction:column;align-items:center;gap:var(--ease-space-4,16px);padding:var(--ease-space-6,24px);background:#fff;border:1px solid var(--ease-color-neutral-200,#e5e7eb);border-radius:var(--ease-radius-lg,12px);">
    <div class="ease-billing-toggle-az">
      <span class="ease-billing-label-az">Monthly</span>
      <label class="ease-billing-switch-az">
        <input class="ease-billing-switch-input-az" type="checkbox" checked />
        <span class="ease-billing-switch-track-az"></span>
        <span class="ease-billing-switch-thumb-az"></span>
      </label>
      <span class="ease-billing-label-az --active">Yearly</span>
      <span class="ease-billing-savings-az">Save 20%</span>
    </div>
    <div style="font-size:0.75rem;color:var(--ease-color-neutral-400,#9ca3af);">
      2 months free compared to monthly billing
    </div>
  </div>

</body>
</html>
