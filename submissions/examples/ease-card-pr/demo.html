<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-card-pr Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 4rem 2rem;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }
    
    .demo-section h2 {
      text-align: center;
      margin-bottom: 2rem;
      color: #1e293b;
    }
    
    .cards-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
    }
  </style>
</head>
<body>

  <div class="demo-section">
    <h2>Profile Cards</h2>
    <div class="cards-row">
      
      <!-- Card 1 -->
      <div class="card-pr">
        <div class="card-pr-avatar">JD</div>
        <div class="card-pr-name">John Doe</div>
        <div class="card-pr-title">Frontend Developer</div>
        <div class="card-pr-social">
          <a href="#" aria-label="Twitter">𝕏</a>
          <a href="#" aria-label="GitHub">Ⓖ</a>
          <a href="#" aria-label="LinkedIn">Ⓛ</a>
        </div>
      </div>

      <!-- Card 2 -->
      <div class="card-pr">
        <div class="card-pr-avatar" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">AS</div>
        <div class="card-pr-name">Alice Smith</div>
        <div class="card-pr-title">UI/UX Designer</div>
        <div class="card-pr-social">
          <a href="#" aria-label="Twitter">𝕏</a>
          <a href="#" aria-label="Dribbble">Ⓓ</a>
          <a href="#" aria-label="LinkedIn">Ⓛ</a>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
