<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Outline Border Effects – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">
  <h1 class="title">CSS Outline Border Effects</h1>
  <p class="subtitle">Creative <code>outline</code> and <code>outline-offset</code> techniques.</p>

  <div class="demo-grid">
    <div class="effect-card effect-double">
      <h2 class="effect-label">Double Outline</h2>
      <p class="effect-desc"><code>outline</code> + <code>border</code> stacked</p>
    </div>
    <div class="effect-card effect-glow">
      <h2 class="effect-label">Offset Glow</h2>
      <p class="effect-desc"><code>outline-offset</code> with glow</p>
    </div>
    <div class="effect-card effect-dashed">
      <h2 class="effect-label">Dashed Reveal</h2>
      <p class="effect-desc">Animated dash on hover</p>
    </div>
    <div class="effect-card effect-bracket">
      <h2 class="effect-label">Corner Brackets</h2>
      <p class="effect-desc">Pseudo-element brackets</p>
    </div>
  </div>
</div>

</body>
</html>
