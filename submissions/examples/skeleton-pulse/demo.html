<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-skeleton-pulse — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; letter-spacing: 0.05em; }
    .row { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 500px; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .section { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 500px; }
    .skeleton-card {
      width: 100%; padding: 1.5rem;
      background: #1a1a1a; border-radius: 12px;
      border: 1px solid #2a2a2a;
    }
    .skeleton-avatar {
      width: 48px; height: 48px; border-radius: 50%;
    }
    .skeleton-line {
      height: 12px; margin-top: 0.75rem;
    }
    .skeleton-line-sm { width: 60%; }
    .skeleton-line-md { width: 80%; }
  </style>
</head>
<body>
  <h1>ease-skeleton-pulse</h1>
  <div class="section">
    <div class="label">Speed variants</div>
    <div class="row">
      <div class="skeleton-card">
        <div class="ease-skeleton-pulse skeleton-avatar" style="margin-bottom:1rem;"></div>
        <div class="ease-skeleton-pulse skeleton-line skeleton-line-md"></div>
        <div class="ease-skeleton-pulse skeleton-line skeleton-line-sm"></div>
        <div class="ease-skeleton-pulse skeleton-line skeleton-line-md" style="width:40%;"></div>
      </div>
      <div class="skeleton-card">
        <div class="ease-skeleton-pulse-fast skeleton-avatar" style="margin-bottom:1rem;"></div>
        <div class="ease-skeleton-pulse-fast skeleton-line skeleton-line-md"></div>
        <div class="ease-skeleton-pulse-fast skeleton-line skeleton-line-sm"></div>
        <div class="ease-skeleton-pulse-fast skeleton-line skeleton-line-md" style="width:40%;"></div>
      </div>
    </div>
  </div>
</body>
</html>
