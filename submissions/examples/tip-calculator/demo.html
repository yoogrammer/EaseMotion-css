<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>💵 Tip Calculator</h1>
        
        <div class="calculator">
            <div class="input-group">
                <label for="bill">Bill Amount ($)</label>
                <div class="input-with-icon">
                    <span class="currency">$</span>
                    <input type="number" id="bill" placeholder="0.00" min="0" step="0.01" value="50.00" />
                </div>
            </div>

            <div class="input-group">
                <label for="tip">Tip Percentage: <span id="tipValue">15</span>%</label>
                <input type="range" id="tip" min="0" max="30" value="15" step="1" />
                <div class="range-labels">
                    <span>0%</span>
                    <span>30%</span>
                </div>
            </div>

            <div class="input-group">
                <label for="people">Number of People</label>
                <div class="input-with-icon">
                    <span class="icon">👤</span>
                    <input type="number" id="people" placeholder="1" min="1" value="2" step="1" />
                </div>
            </div>

            <button id="calculateBtn">Calculate Tip</button>
        </div>

        <div class="results show" id="results">
            <div class="result-item">
                <span class="result-label">Tip Amount</span>
                <span class="result-value" id="tipAmount">$7.50</span>
            </div>
            <div class="result-item">
                <span class="result-label">Total Bill</span>
                <span class="result-value" id="totalBill">$57.50</span>
            </div>
            <div class="result-item highlight">
                <span class="result-label">Per Person</span>
                <span class="result-value" id="perPerson">$28.75</span>
            </div>
            <div class="result-item">
                <span class="result-label">Tip Per Person</span>
                <span class="result-value" id="tipPerPerson">$3.75</span>
            </div>
        </div>
    </div>

    <script>
        const billInput = document.getElementById('bill');
        const tipSlider = document.getElementById('tip');
        const tipValue = document.getElementById('tipValue');
        const peopleInput = document.getElementById('people');
        const calculateBtn = document.getElementById('calculateBtn');
        
        const tipAmountDisplay = document.getElementById('tipAmount');
        const totalBillDisplay = document.getElementById('totalBill');
        const perPersonDisplay = document.getElementById('perPerson');
        const tipPerPersonDisplay = document.getElementById('tipPerPerson');

        function calculateTip() {
            // Get values
            const bill = parseFloat(billInput.value) || 0;
            const tipPercent = parseFloat(tipSlider.value) || 0;
            const people = parseInt(peopleInput.value) || 1;

            // Calculate
            const tipAmount = bill * (tipPercent / 100);
            const totalBill = bill + tipAmount;
            const perPerson = totalBill / people;
            const tipPerPerson = tipAmount / people;

            // Display results
            tipAmountDisplay.textContent = `$${tipAmount.toFixed(2)}`;
            totalBillDisplay.textContent = `$${totalBill.toFixed(2)}`;
            perPersonDisplay.textContent = `$${perPerson.toFixed(2)}`;
            tipPerPersonDisplay.textContent = `$${tipPerPerson.toFixed(2)}`;

            // Show results with animation
            document.getElementById('results').classList.add('show');
        }

        // Update tip percentage display
        tipSlider.addEventListener('input', () => {
            tipValue.textContent = tipSlider.value;
            calculateTip();
        });

        // Calculate on input change
        billInput.addEventListener('input', calculateTip);
        peopleInput.addEventListener('input', calculateTip);
        
        // Calculate on button click
        calculateBtn.addEventListener('click', calculateTip);

        // Calculate on page load
        window.addEventListener('load', calculateTip);
    </script>
</body>
</html>
