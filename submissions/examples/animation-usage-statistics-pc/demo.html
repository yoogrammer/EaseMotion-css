<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Usage Statistics Dashboard - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard-container">

  <h1 class="dashboard-title">Animation Usage Statistics Dashboard</h1>

  <p class="dashboard-subtitle">
    Visual representation of the most commonly used animation styles.
  </p>

  <div class="stats-grid">

    <div class="stat-card fade-in">
      <h2>Fade In</h2>
      <div class="progress">
        <div class="progress-fill fade-bar"></div>
      </div>
      <span>82%</span>
    </div>

    <div class="stat-card slide-up">
      <h2>Slide Up</h2>
      <div class="progress">
        <div class="progress-fill slide-bar"></div>
      </div>
      <span>76%</span>
    </div>

    <div class="stat-card bounce-card">
      <h2>Bounce</h2>
      <div class="progress">
        <div class="progress-fill bounce-bar"></div>
      </div>
      <span>63%</span>
    </div>

    <div class="stat-card zoom-card">
      <h2>Zoom In</h2>
      <div class="progress">
        <div class="progress-fill zoom-bar"></div>
      </div>
      <span>58%</span>
    </div>

  </div>

</div>

</body>
</html>
