<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expandable File Explorer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Expandable File Explorer</h1>

    <p class="subtitle">
        VS Code inspired file tree navigation.
    </p>

    <div class="explorer">

        <details open>
            <summary>📁 Components</summary>

            <div class="file">📄 buttons.css</div>
            <div class="file">📄 cards.css</div>
            <div class="file">📄 navbar.css</div>
        </details>

        <details>
            <summary>📁 Utilities</summary>

            <div class="file">📄 flex.css</div>
            <div class="file">📄 spacing.css</div>
            <div class="file">📄 grid.css</div>
        </details>

        <details>
            <summary>📁 Animations</summary>

            <div class="file">📄 fade.css</div>
            <div class="file">📄 slide.css</div>
            <div class="file">📄 zoom.css</div>
        </details>

    </div>

</div>

</body>
</html>
