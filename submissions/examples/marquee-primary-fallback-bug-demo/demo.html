<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marquee – Wrong primary fallback (#6366f1)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Bug: wrong primary fallback</h1>
  <p>The marquee <code>:focus-visible</code> outline uses <code>#6366f1</code> instead of <code>#6c63ff</code>.</p>

  <div class="ease-marquee" tabindex="0">
    <div class="ease-marquee-track">
      <span>Item 1</span><span>Item 2</span><span>Item 3</span>
      <span>Item 4</span><span>Item 5</span><span>Item 6</span>
    </div>
  </div>

  <p><small>Tab to the marquee to see the focus-visible outline color.</small></p>

  <hr />
  <h2>Fix</h2>
  <pre>var(--ease-color-primary, #6c63ff)  /* was #6366f1 */</pre>
</body>
</html>
