<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timezone Converter - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="converter-wrapper">
    <h1>Timezone Converter</h1>
    <div class="convert-section">
      <div class="convert-row">
        <div class="convert-field">
          <label for="sourceTz">Source Timezone</label>
          <select id="sourceTz" class="select"></select>
        </div>
        <div class="convert-field">
          <label for="targetTz">Target Timezone</label>
          <select id="targetTz" class="select"></select>
        </div>
      </div>
      <div class="convert-row">
        <div class="convert-field">
          <label for="convertTime">Time to Convert</label>
          <input type="time" id="convertTime" class="input" value="12:00">
        </div>
        <div class="convert-field">
          <label>Converted Time</label>
          <div class="converted-display" id="convertedDisplay">12:00 PM</div>
        </div>
      </div>
    </div>
    <div class="city-list" id="cityList">
      <h2>World Clocks</h2>
      <div class="city-cards" id="cityCards"></div>
    </div>
  </div>
  <script>
    const timezones = [
      { name: 'New York', tz: 'America/New_York' },
      { name: 'London', tz: 'Europe/London' },
      { name: 'Paris', tz: 'Europe/Paris' },
      { name: 'Dubai', tz: 'Asia/Dubai' },
      { name: 'Tokyo', tz: 'Asia/Tokyo' },
      { name: 'Sydney', tz: 'Australia/Sydney' },
      { name: 'Los Angeles', tz: 'America/Los_Angeles' },
      { name: 'Berlin', tz: 'Europe/Berlin' },
      { name: 'Mumbai', tz: 'Asia/Kolkata' },
      { name: 'Singapore', tz: 'Asia/Singapore' }
    ];

    const sourceTz = document.getElementById('sourceTz');
    const targetTz = document.getElementById('targetTz');
    const convertTime = document.getElementById('convertTime');
    const convertedDisplay = document.getElementById('convertedDisplay');
    const cityCards = document.getElementById('cityCards');

    function populateSelects() {
      timezones.forEach(tz => {
        const o1 = document.createElement('option');
        o1.value = tz.tz;
        o1.textContent = tz.name;
        sourceTz.appendChild(o1);
        const o2 = document.createElement('option');
        o2.value = tz.tz;
        o2.textContent = tz.name;
        targetTz.appendChild(o2);
      });
      sourceTz.value = 'America/New_York';
      targetTz.value = 'Europe/London';
    }

    function fmtTime(date, tz) {
      return date.toLocaleTimeString('en-US', { timeZone: tz, hour: 'numeric', minute: '2-digit', hour12: true });
    }

    function isDST(date, tz) {
      const jan = new Date(date.getFullYear(), 0, 1).toLocaleString('en-US', { timeZone: tz, timeZoneName: 'short' });
      const jul = new Date(date.getFullYear(), 6, 1).toLocaleString('en-US', { timeZone: tz, timeZoneName: 'short' });
      const janAbbr = jan.split(' ').pop();
      const julAbbr = jul.split(' ').pop();
      return janAbbr !== julAbbr;
    }

    function updateCityClocks() {
      const now = new Date();
      cityCards.innerHTML = '';
      timezones.forEach(tz => {
        const card = document.createElement('div');
        card.className = 'city-card';
        const dst = isDST(now, tz.tz);
        card.innerHTML = `
          <div class="city-name">${tz.name}</div>
          <div class="city-time">${fmtTime(now, tz.tz)}</div>
          <div class="city-dst">DST ${dst ? 'Active' : 'Inactive'}</div>
        `;
        cityCards.appendChild(card);
      });
    }

    function doConvert() {
      const now = new Date();
      const [h, m] = convertTime.value.split(':').map(Number);
      const sourceDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m);
      const sourceOffset = -new Date(sourceDate.toLocaleString('en-US', { timeZone: sourceTz.value })).getTimezoneOffset();
      const targetOffset = -new Date(sourceDate.toLocaleString('en-US', { timeZone: targetTz.value })).getTimezoneOffset();
      const diff = (targetOffset - sourceOffset) / 60;
      const targetDate = new Date(sourceDate.getTime() + diff * 3600000);
      convertedDisplay.textContent = targetDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    }

    populateSelects();
    updateCityClocks();
    doConvert();
    setInterval(updateCityClocks, 1000);

    sourceTz.addEventListener('change', doConvert);
    targetTz.addEventListener('change', doConvert);
    convertTime.addEventListener('change', doConvert);
  </script>
</body>
</html>
