<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Tabs</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="tabs" id="tabs">
    <div class="tabs-header">
      <button class="tab-btn active" data-tab="tab1">Dashboard</button>
      <button class="tab-btn" data-tab="tab2">Analytics</button>
      <button class="tab-btn" data-tab="tab3">Settings</button>
      <div class="tab-indicator"></div>
    </div>
    <div class="tab-panel active" id="tab1">
      <h2>Dashboard</h2>
      <p>Welcome to your dashboard. Here you find an overview of your activity.</p>
    </div>
    <div class="tab-panel" id="tab2">
      <h2>Analytics</h2>
      <p>View detailed analytics and reports for your projects.</p>
    </div>
    <div class="tab-panel" id="tab3">
      <h2>Settings</h2>
      <p>Configure your preferences and account settings.</p>
    </div>
  </div>

  <script>
    const tabsEl = document.getElementById('tabs');
    const indicator = tabsEl.querySelector('.tab-indicator');
    const moveIndicator = (btn) => {
      indicator.style.width = btn.offsetWidth + 'px';
      indicator.style.left = btn.offsetLeft + 'px';
    };
    tabsEl.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        tabsEl.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        moveIndicator(btn);
        tabsEl.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });
    moveIndicator(tabsEl.querySelector('.tab-btn.active'));
  </script>
</body>
</html>
