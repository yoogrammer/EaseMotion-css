<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Inline-Flex Baseline Alignment Fix</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 460px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Typographic Baseline Sizing Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Verify alignment parameters inside Chromium browsers. <code>vertical-align: middle</code> paired with explicit line constraints blocks 1px text slipping glitches completely.</p>
  </header>

  <div class="alm-badge-alignment-row">
    
    <div class="alm-stabilized-status-pill">
      <svg class="alm-pill-vector-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z" />
      </svg>
      <span class="alm-pill-text-render-node">Active Node Sync</span>
    </div>

    <div class="alm-stabilized-status-pill alm-is-success">
      <svg class="alm-pill-vector-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span class="alm-pill-text-render-node">Operational 100%</span>
    </div>

    <div class="alm-stabilized-status-pill alm-is-danger">
      <svg class="alm-pill-vector-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
      </svg>
      <span class="alm-pill-text-render-node">Fatal Delta Err</span>
    </div>

  </div>

</body>
</html>
