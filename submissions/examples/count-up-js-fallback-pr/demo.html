<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS Fallback Count Up</title>
  <link rel="stylesheet" href="../../../core/base.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="count-container">
    <h2>Count Up Fallback Demo</h2>
    <p>This component provides a JavaScript fallback for older browsers that don't support the CSS <code>@property</code> animation.</p>
    
    <div class="stat-card">
      <div class="js-count-up" data-target="2026" data-duration="2000">0</div>
      <div class="stat-label">Active Users</div>
    </div>
  </div>

  <script src="ease-count.js"></script>
</body>
</html>
