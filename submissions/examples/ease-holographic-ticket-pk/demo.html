<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Holographic Ticket - EaseMotion CSS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="holographic-ticket-container">
    <div class="holographic-ticket" id="holoTicket">
      <div class="ticket-foil"></div>
      <div class="ticket-content">
        <div class="ticket-header">
          <span class="ticket-type">VIP ACCESS</span>
          <span class="ticket-date">OCT 24</span>
        </div>
        <h2 class="ticket-title">EaseMotion Summit</h2>
        <div class="ticket-footer">
          <div class="ticket-seat">
            <span class="label">SECTION</span>
            <span class="value">A1</span>
          </div>
          <div class="ticket-barcode">
            || |||| | ||| || ||| || ||
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const ticket = document.getElementById('holoTicket');
    
    document.addEventListener('mousemove', (e) => {
      // Calculate mouse position relative to the center of the screen
      const x = (window.innerWidth / 2 - e.clientX) / 25;
      const y = (window.innerHeight / 2 - e.clientY) / 25;
      
      // Apply 3D rotation based on mouse position
      ticket.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
      
      // Update foil gradient angle to simulate dynamic lighting
      const foil = ticket.querySelector('.ticket-foil');
      const angle = Math.atan2(e.clientY - window.innerHeight/2, e.clientX - window.innerWidth/2) * 180 / Math.PI;
      foil.style.background = `linear-gradient(${angle}deg, transparent 20%, rgba(255, 0, 255, 0.4) 40%, rgba(0, 255, 255, 0.4) 60%, transparent 80%)`;
    });
    
    // Reset transforms on mouse leave to return to rest state
    document.addEventListener('mouseleave', () => {
      ticket.style.transform = `rotateY(0deg) rotateX(0deg)`;
      const foil = ticket.querySelector('.ticket-foil');
      foil.style.background = `linear-gradient(135deg, transparent 20%, rgba(255, 0, 255, 0.2) 40%, rgba(0, 255, 255, 0.2) 60%, transparent 80%)`;
    });
  </script>
</body>
</html>
