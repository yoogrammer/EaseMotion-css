<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blur In / Out Animations Demo</title>
  <!-- Load EaseMotion CSS from CDN (or local) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css@latest/dist/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f3f4f6;
      margin: 0;
    }
    .container {
      text-align: center;
      background: white;
      padding: 2rem 4rem;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
    .box {
      margin: 2rem auto;
      padding: 1.5rem;
      background: #6c63ff;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      font-size: 1.25rem;
      display: inline-block;
    }
    .controls {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 4px;
      background: #374151;
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }
    button:hover {
      background: #1f2937;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>EaseMotion Blur Animations</h2>
    
    <div id="target" class="box ease-blur-in">
      Animated Element
    </div>

    <div class="controls">
      <button onclick="triggerAnimation('ease-blur-in')">Trigger Blur In</button>
      <button onclick="triggerAnimation('ease-blur-out')">Trigger Blur Out</button>
    </div>
  </div>

  <script>
    function triggerAnimation(animationClass) {
      const target = document.getElementById('target');
      
      // Remove all animation classes to reset
      target.classList.remove('ease-blur-in', 'ease-blur-out');
      
      // Force reflow to restart animation
      void target.offsetWidth;
      
      // Add requested animation class
      target.classList.add(animationClass);
    }
  </script>
</body>
</html>
