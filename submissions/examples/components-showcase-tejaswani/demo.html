<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Components Showcase</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Components Showcase</h1>

  <section class="showcase-section">
    <h2>Buttons</h2>

    <button class="ease-btn ease-btn-primary">Primary</button>
    <button class="ease-btn ease-btn-success">Success</button>
    <button class="ease-btn ease-btn-danger">Danger</button>
    <button class="ease-btn ease-btn-outline">Outline</button>
  </section>

  <section class="showcase-section">
    <h2>Cards</h2>

    <div class="ease-card">
      <h3>Basic Card</h3>
      <p>Simple card example using EaseMotion CSS.</p>
    </div>

    <div class="ease-card ease-card-shadow">
      <h3>Shadow Card</h3>
      <p>Card with shadow styling.</p>
    </div>

    <div class="ease-card ease-card-accent">
      <h3>Accent Card</h3>
      <p>Highlighted card variant.</p>
    </div>
  </section>

</body>
</html>
