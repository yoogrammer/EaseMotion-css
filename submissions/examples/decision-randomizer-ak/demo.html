<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decision Randomizer - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="randomizer-wrapper">
    <h1>Decision Randomizer</h1>
    <div class="input-section">
      <div class="field">
        <label>Enter Choices (one per line)</label>
        <textarea id="choicesInput" class="input textarea" rows="5">Eat out
Order delivery
Cook at home
Go to the gym
Watch a movie
Read a book</textarea>
      </div>
      <div class="mode-select">
        <button class="mode-btn active" data-mode="wheel">Spin Wheel</button>
        <button class="mode-btn" data-mode="card">Card Flip</button>
      </div>
      <button id="randomizeBtn" class="randomize-btn">Randomize!</button>
    </div>
    <div class="result-display" id="resultDisplay">
      <div class="wheel-container" id="wheelContainer">
        <canvas id="wheelCanvas" width="300" height="300"></canvas>
        <div class="wheel-pointer">▼</div>
      </div>
      <div class="card-container" id="cardContainer" style="display:none">
        <div class="card" id="card">
          <div class="card-face card-back">?</div>
          <div class="card-face card-front" id="cardFront">Ready</div>
        </div>
      </div>
      <div class="result-text" id="resultText">Press Randomize!</div>
    </div>
    <div class="history">
      <h3>History</h3>
      <div id="historyList" class="history-list"></div>
    </div>
  </div>
  <script>
    const choicesInput = document.getElementById('choicesInput');
    const randomizeBtn = document.getElementById('randomizeBtn');
    const wheelCanvas = document.getElementById('wheelCanvas');
    const wheelContainer = document.getElementById('wheelContainer');
    const cardContainer = document.getElementById('cardContainer');
    const card = document.getElementById('card');
    const cardFront = document.getElementById('cardFront');
    const resultText = document.getElementById('resultText');
    const historyList = document.getElementById('historyList');
    const modeBtns = document.querySelectorAll('.mode-btn');

    let currentMode = 'wheel';
    let spinning = false;
    let history = [];

    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        modeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = btn.dataset.mode;
        wheelContainer.style.display = currentMode === 'wheel' ? 'block' : 'none';
        cardContainer.style.display = currentMode === 'card' ? 'block' : 'none';
        resultText.textContent = 'Press Randomize!';
      });
    });

    function getChoices() {
      return choicesInput.value.split('\n').map(s => s.trim()).filter(s => s.length > 0);
    }

    function drawWheel(choices, rotation) {
      const ctx = wheelCanvas.getContext('2d');
      const w = wheelCanvas.width;
      const h = wheelCanvas.height;
      const cx = w / 2;
      const cy = h / 2;
      const r = Math.min(cx, cy) - 10;
      const n = choices.length;
      const sliceAngle = (2 * Math.PI) / n;

      ctx.clearRect(0, 0, w, h);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotation);

      const colors = ['#6366f1', '#22c55e', '#f59e0b', '#ef4444', '#3b82f6', '#ec4899', '#14b8a6', '#a855f7'];
      choices.forEach((choice, i) => {
        const startAngle = i * sliceAngle;
        const endAngle = startAngle + sliceAngle;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, r, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();
        ctx.strokeStyle = '#0f0f0f';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.save();
        ctx.rotate(startAngle + sliceAngle / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#fff';
        ctx.font = '11px Segoe UI';
        ctx.fillText(choice.length > 12 ? choice.substring(0, 12) + '…' : choice, r - 10, 4);
        ctx.restore();
      });

      ctx.restore();
    }

    function spinWheel() {
      if (spinning) return;
      const choices = getChoices();
      if (choices.length < 2) { resultText.textContent = 'Enter at least 2 choices'; return; }

      spinning = true;
      randomizeBtn.disabled = true;
      const spins = 5 + Math.random() * 5;
      const targetAngle = spins * 2 * Math.PI + Math.random() * 2 * Math.PI;
      const totalRotation = targetAngle;
      const duration = 3000;
      const startTime = performance.now();

      function animate(time) {
        const elapsed = time - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const currentRotation = eased * totalRotation;
        drawWheel(choices, currentRotation);

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          const n = choices.length;
          const sliceAngle = (2 * Math.PI) / n;
          const normalizedRotation = totalRotation % (2 * Math.PI);
          const pointerAngle = (3 * Math.PI / 2 - normalizedRotation + 2 * Math.PI) % (2 * Math.PI);
          const idx = Math.floor(pointerAngle / sliceAngle) % n;
          const result = choices[idx];
          resultText.textContent = result;
          addHistory(result);
          spinning = false;
          randomizeBtn.disabled = false;
        }
      }

      requestAnimationFrame(animate);
    }

    function flipCard() {
      const choices = getChoices();
      if (choices.length < 2) { resultText.textContent = 'Enter at least 2 choices'; return; }

      const result = choices[Math.floor(Math.random() * choices.length)];
      cardFront.textContent = result;
      card.classList.add('flipped');
      setTimeout(() => {
        resultText.textContent = result;
        addHistory(result);
      }, 600);
    }

    randomizeBtn.addEventListener('click', () => {
      if (currentMode === 'wheel') spinWheel();
      else {
        card.classList.remove('flipped');
        setTimeout(() => flipCard(), 100);
      }
    });

    function addHistory(result) {
      history.push(result);
      const item = document.createElement('div');
      item.className = 'history-item';
      item.textContent = result;
      historyList.insertBefore(item, historyList.firstChild);
      if (historyList.children.length > 10) historyList.removeChild(historyList.lastChild);
    }

    drawWheel(getChoices(), 0);
  </script>
</body>
</html>
