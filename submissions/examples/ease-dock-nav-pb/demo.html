<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>macOS-inspired Animated Dock Navigation Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="mock-desktop">
    <div class="desktop-content">
      <h1>Premium macOS Dock Navigation</h1>
      <p>Hover over the navigation elements below to experience fluid magnification and bounce micro-interactions.</p>
    </div>

    <div class="dock-wrapper">
      <nav class="dock">
        <div class="dock-item" data-tooltip="Home">🏠</div>
        <div class="dock-item" data-tooltip="Search">🔍</div>
        <div class="dock-item" data-tooltip="Files">📁</div>
        <div class="dock-item" data-tooltip="Favorites">❤️</div>
        <div class="dock-item" data-tooltip="Settings">⚙️</div>
      </nav>
    </div>
  </div>

</body>
</html>
