<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Notification Center</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="notification-center">

    <div class="header">
        <h1>🔔 Notifications</h1>
        <span class="badge">12 New</span>
    </div>

    <div class="notification unread">
        <div class="dot"></div>
        <div class="content">
            <h3>You were mentioned in Project Alpha</h3>
            <p>2 minutes ago</p>
        </div>
    </div>

    <div class="notification">
        <div class="content">
            <h3>Payment processed successfully</h3>
            <p>15 minutes ago</p>
        </div>
    </div>

    <div class="notification unread">
        <div class="dot"></div>
        <div class="content">
            <h3>New comment on task #204</h3>
            <p>1 hour ago</p>
        </div>
    </div>

    <div class="notification">
        <div class="content">
            <h3>Weekly analytics report is ready</h3>
            <p>3 hours ago</p>
        </div>
    </div>

    <button class="action-btn">
        Mark All as Read
    </button>

</div>

</body>
</html>
