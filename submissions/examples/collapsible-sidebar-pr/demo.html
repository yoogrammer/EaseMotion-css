<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Collapsible Sidebar Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      background: #f0f0f5;
      font-family: sans-serif;
    }
    .main-content {
      flex: 1;
      padding: 2rem;
      color: #333;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #666; }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-logo">📘 EaseMotion Docs</div>

    <!-- Section 1 -->
    <div class="sidebar-section open">
      <div class="sidebar-section-header">
        <span>Getting Started</span>
        <span class="sidebar-arrow">▶</span>
      </div>
      <div class="sidebar-items">
        <a href="#" class="active">Introduction</a>
        <a href="#">Installation</a>
        <a href="#">Quick Start</a>
      </div>
    </div>

    <!-- Section 2 -->
    <div class="sidebar-section">
      <div class="sidebar-section-header">
        <span>Components</span>
        <span class="sidebar-arrow">▶</span>
      </div>
      <div class="sidebar-items">
        <a href="#">Buttons</a>
        <a href="#">Cards</a>
        <a href="#">Modals</a>
        <a href="#">Tooltips</a>
      </div>
    </div>

    <!-- Section 3 -->
    <div class="sidebar-section">
      <div class="sidebar-section-header">
        <span>Animations</span>
        <span class="sidebar-arrow">▶</span>
      </div>
      <div class="sidebar-items">
        <a href="#">Fade</a>
        <a href="#">Slide</a>
        <a href="#">Bounce</a>
        <a href="#">Keyframes</a>
      </div>
    </div>

    <!-- Section 4 -->
    <div class="sidebar-section">
      <div class="sidebar-section-header">
        <span>Advanced</span>
        <span class="sidebar-arrow">▶</span>
      </div>
      <div class="sidebar-items">
        <a href="#">Custom Easing</a>
        <a href="#">Performance Tips</a>
        <a href="#">Contributing</a>
      </div>
    </div>

  </div>

  <div class="main-content">
    <h1>Documentation</h1>
    <p>Click the sidebar sections to expand or collapse them.</p>
  </div>

  <script>
    document.querySelectorAll('.sidebar-section-header').forEach(header => {
      header.addEventListener('click', () => {
        const section = header.parentElement;
        section.classList.toggle('open');
      });
    });
  </script>

</body>
</html>
