<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drag Handle Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      font-family: sans-serif;
      background: #f4f5f7;
      padding: 2rem;
    }

    h3 {
      margin: 0 0 0.75rem;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
    }

    section {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      width: 100%;
      max-width: 360px;
    }

    .item-label {
      font-size: 0.95rem;
      color: #374151;
      flex: 1;
    }

    .size-row {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
  </style>
</head>
<body>

  <!-- Sortable list demo -->
  <section>
    <h3>Draggable List Items</h3>

    <div class="drag-list-item">
      <div class="drag-handle">
        <div class="drag-handle-dots">
          <span></span><span></span>
          <span></span><span></span>
          <span></span><span></span>
        </div>
      </div>
      <span class="item-label">Design system tokens</span>
    </div>

    <div class="drag-list-item">
      <div class="drag-handle">
        <div class="drag-handle-dots">
          <span></span><span></span>
          <span></span><span></span>
          <span></span><span></span>
        </div>
      </div>
      <span class="item-label">Animation library</span>
    </div>

    <div class="drag-list-item">
      <div class="drag-handle">
        <div class="drag-handle-dots">
          <span></span><span></span>
          <span></span><span></span>
          <span></span><span></span>
        </div>
      </div>
      <span class="item-label">Component documentation</span>
    </div>
  </section>

  <!-- Size variants -->
  <section>
    <h3>Size Variants</h3>
    <div class="size-row">

      <div class="drag-handle drag-handle-sm">
        <div class="drag-handle-dots">
          <span></span><span></span>
          <span></span><span></span>
          <span></span><span></span>
        </div>
      </div>

      <div class="drag-handle">
        <div class="drag-handle-dots">
          <span></span><span></span>
          <span></span><span></span>
          <span></span><span></span>
        </div>
      </div>

      <div class="drag-handle drag-handle-lg">
        <div class="drag-handle-dots">
          <span></span><span></span>
          <span></span><span></span>
          <span></span><span></span>
        </div>
      </div>

    </div>
  </section>

</body>
</html>
