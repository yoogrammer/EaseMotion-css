<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Pricing Toggle — EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ease-pricing-container">
        <header style="margin-bottom: 3rem;">
            <h1 style="color: var(--ease-color-text); font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem;">Choose Your Plan</h1>
            <p style="color: var(--ease-color-muted);">Scale your business with our flexible pricing options.</p>
        </header>

        <div class="ease-pricing-toggle">
            <span id="label-monthly" class="active">Monthly</span>
          
            <label class="ease-toggle-switch">
              <input type="checkbox" id="billing-toggle">
              <span class="slider"></span>
            </label>
          
            <span id="label-yearly">
              Yearly
              <span class="ease-savings-badge">Save 20%</span>
            </span>
        </div>

        <div class="ease-pricing-grid">
            <!-- Starter -->
            <div class="ease-pricing-card">
                <h3 style="margin: 0; font-size: 1.25rem;">Starter</h3>
                <div class="ease-price-box">
                    <span class="ease-price-currency">$</span>
                    <div class="ease-price" data-monthly="29" data-yearly="232">29</div>
                    <span class="ease-price-period" id="period-text">/mo</span>
                </div>
                <p style="color: var(--ease-color-muted); font-size: 0.875rem; margin-bottom: 2rem;">Essential features for small teams.</p>
                <button class="ease-btn ease-btn-outline ease-btn-block ease-btn-hover">Get Started</button>
            </div>

            <!-- Pro -->
            <div class="ease-pricing-card" style="border-color: var(--ease-color-primary);">
                <h3 style="margin: 0; font-size: 1.25rem;">Pro</h3>
                <div class="ease-price-box">
                    <span class="ease-price-currency">$</span>
                    <div class="ease-price" data-monthly="79" data-yearly="632">79</div>
                    <span class="ease-price-period">/mo</span>
                </div>
                <p style="color: var(--ease-color-muted); font-size: 0.875rem; margin-bottom: 2rem;">Advanced tools for growing startups.</p>
                <button class="ease-btn ease-btn-primary ease-btn-block ease-btn-hover">Try for Free</button>
            </div>
        </div>
    </div>

    <script>
        const billingToggle = document.getElementById('billing-toggle');
        const labelMonthly = document.getElementById('label-monthly');
        const labelYearly = document.getElementById('label-yearly');
        const prices = document.querySelectorAll('.ease-price');
        const periods = document.querySelectorAll('.ease-price-period');

        billingToggle.addEventListener('change', function() {
            const isYearly = this.checked;
            
            // Update Labels
            if (isYearly) {
                labelYearly.classList.add('active');
                labelMonthly.classList.remove('active');
            } else {
                labelMonthly.classList.add('active');
                labelYearly.classList.remove('active');
            }

            // Animate Price Changes
            prices.forEach(price => {
                price.classList.add('switching');
                
                setTimeout(() => {
                    const newValue = isYearly ? price.getAttribute('data-yearly') : price.getAttribute('data-monthly');
                    price.textContent = newValue;
                    price.classList.remove('switching');
                }, 150);
            });

            // Update Periods
            periods.forEach(period => {
                period.textContent = isYearly ? '/yr' : '/mo';
            });
        });

        // Click label to toggle
        labelMonthly.onclick = () => { if(billingToggle.checked) billingToggle.click(); };
        labelYearly.onclick = () => { if(!billingToggle.checked) billingToggle.click(); };
    </script>
</body>
</html>
