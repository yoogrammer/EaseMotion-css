<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calorie Counter - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="counter-wrapper">
    <h1>Calorie Counter</h1>
    <div class="goal-section">
      <div class="field">
        <label for="dailyGoal">Daily Goal (calories)</label>
        <input type="number" id="dailyGoal" class="input" value="2000" min="0">
      </div>
    </div>
    <div class="progress-section">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text">
        <span id="totalCalories">0</span> / <span id="goalDisplay">2000</span> cal
      </div>
    </div>
    <div class="meals-section" id="mealsSection">
      <div class="meal" data-meal="breakfast">
        <h3>Breakfast</h3>
        <div class="food-list" id="breakfastList"></div>
        <div class="add-food">
          <input type="text" class="food-input" placeholder="Food name">
          <input type="number" class="cal-input" placeholder="Cal" min="0">
          <button class="add-btn">Add</button>
        </div>
      </div>
      <div class="meal" data-meal="lunch">
        <h3>Lunch</h3>
        <div class="food-list" id="lunchList"></div>
        <div class="add-food">
          <input type="text" class="food-input" placeholder="Food name">
          <input type="number" class="cal-input" placeholder="Cal" min="0">
          <button class="add-btn">Add</button>
        </div>
      </div>
      <div class="meal" data-meal="dinner">
        <h3>Dinner</h3>
        <div class="food-list" id="dinnerList"></div>
        <div class="add-food">
          <input type="text" class="food-input" placeholder="Food name">
          <input type="number" class="cal-input" placeholder="Cal" min="0">
          <button class="add-btn">Add</button>
        </div>
      </div>
      <div class="meal" data-meal="snacks">
        <h3>Snacks</h3>
        <div class="food-list" id="snacksList"></div>
        <div class="add-food">
          <input type="text" class="food-input" placeholder="Food name">
          <input type="number" class="cal-input" placeholder="Cal" min="0">
          <button class="add-btn">Add</button>
        </div>
      </div>
    </div>
    <div class="macro-section">
      <h3>Macronutrient Breakdown</h3>
      <div class="macro-sliders">
        <div class="macro">
          <label>Carbs <span id="carbsPct">50</span>%</label>
          <input type="range" class="macro-slider" data-macro="carbs" value="50" min="0" max="100">
        </div>
        <div class="macro">
          <label>Protein <span id="proteinPct">25</span>%</label>
          <input type="range" class="macro-slider" data-macro="protein" value="25" min="0" max="100">
        </div>
        <div class="macro">
          <label>Fat <span id="fatPct">25</span>%</label>
          <input type="range" class="macro-slider" data-macro="fat" value="25" min="0" max="100">
        </div>
      </div>
      <div class="macro-g-bar">
        <div class="macro-g-fill carbs-fill" id="carbsFill" style="width:50%"></div>
        <div class="macro-g-fill protein-fill" id="proteinFill" style="width:25%"></div>
        <div class="macro-g-fill fat-fill" id="fatFill" style="width:25%"></div>
      </div>
    </div>
    <div class="weekly-section">
      <h3>Weekly Summary</h3>
      <div class="weekly-chart" id="weeklyChart"></div>
    </div>
  </div>
  <script>
    const dailyGoal = document.getElementById('dailyGoal');
    const progressFill = document.getElementById('progressFill');
    const totalCalories = document.getElementById('totalCalories');
    const goalDisplay = document.getElementById('goalDisplay');
    const weeklyChart = document.getElementById('weeklyChart');

    let foods = { breakfast: [], lunch: [], dinner: [], snacks: [] };

    function renderMeal(meal) {
      const list = document.getElementById(meal + 'List');
      list.innerHTML = '';
      foods[meal].forEach((f, i) => {
        const el = document.createElement('div');
        el.className = 'food-item';
        el.innerHTML = `<span>${f.name}</span><span>${f.cal} cal</span><button class="remove-btn" data-meal="${meal}" data-idx="${i}">×</button>`;
        list.appendChild(el);
      });
      list.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const m = btn.dataset.meal;
          const idx = parseInt(btn.dataset.idx);
          foods[m].splice(idx, 1);
          renderMeal(m);
          updateTotal();
        });
      });
    }

    document.querySelectorAll('.add-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const meal = btn.closest('.meal');
        const mealName = meal.dataset.meal;
        const foodInput = meal.querySelector('.food-input');
        const calInput = meal.querySelector('.cal-input');
        const name = foodInput.value.trim();
        const cal = parseInt(calInput.value) || 0;
        if (name && cal > 0) {
          foods[mealName].push({ name, cal });
          foodInput.value = '';
          calInput.value = '';
          renderMeal(mealName);
          updateTotal();
        }
      });
    });

    function updateTotal() {
      let total = 0;
      Object.values(foods).forEach(arr => arr.forEach(f => total += f.cal));
      const goal = parseInt(dailyGoal.value) || 2000;
      const pct = goal > 0 ? Math.min(100, (total / goal) * 100) : 0;
      totalCalories.textContent = total;
      goalDisplay.textContent = goal;
      progressFill.style.width = pct + '%';
      if (pct >= 100) progressFill.style.background = '#ef4444';
      else progressFill.style.background = '#6366f1';
      updateWeekly();
    }

    function updateWeekly() {
      const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      const goal = parseInt(dailyGoal.value) || 2000;
      weeklyChart.innerHTML = '';
      days.forEach((d, i) => {
        const val = Math.floor(Math.random() * goal * 0.4 + goal * 0.6);
        const bar = document.createElement('div');
        bar.className = 'weekly-bar';
        const fill = document.createElement('div');
        fill.className = 'weekly-fill';
        fill.style.height = Math.min(100, (val / goal) * 100) + '%';
        bar.appendChild(fill);
        const label = document.createElement('span');
        label.className = 'weekly-label';
        label.textContent = d;
        bar.appendChild(label);
        weeklyChart.appendChild(bar);
      });
    }

    function updateMacros() {
      const carbs = parseInt(document.getElementById('carbsPct').textContent);
      const protein = parseInt(document.getElementById('proteinPct').textContent);
      const fat = parseInt(document.getElementById('fatPct').textContent);
      document.getElementById('carbsFill').style.width = carbs + '%';
      document.getElementById('proteinFill').style.width = protein + '%';
      document.getElementById('fatFill').style.width = fat + '%';
    }

    document.querySelectorAll('.macro-slider').forEach(slider => {
      slider.addEventListener('input', () => {
        const macro = slider.dataset.macro;
        const val = parseInt(slider.value);
        document.getElementById(macro + 'Pct').textContent = val;
        const all = document.querySelectorAll('.macro-slider');
        const others = Array.from(all).filter(s => s.dataset.macro !== macro);
        const remaining = 100 - val;
        const otherTotal = others.reduce((sum, s) => sum + parseInt(s.value), 0);
        if (otherTotal > 0) {
          others.forEach(s => {
            const old = parseInt(s.value);
            const pct = old / otherTotal;
            const newVal = Math.round(remaining * pct);
            s.value = newVal;
            document.getElementById(s.dataset.macro + 'Pct').textContent = newVal;
          });
        } else {
          others.forEach(s => {
            s.value = Math.floor(remaining / others.length);
            document.getElementById(s.dataset.macro + 'Pct').textContent = s.value;
          });
        }
        updateMacros();
      });
    });

    dailyGoal.addEventListener('input', updateTotal);
    updateTotal();
    updateMacros();
    updateWeekly();
  </script>
</body>
</html>
