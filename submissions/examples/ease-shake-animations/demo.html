<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shake Animations Demo</title>
  <!-- Load EaseMotion CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css@latest/dist/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f8fafc;
      margin: 0;
    }
    .container {
      text-align: center;
      background: white;
      padding: 3rem;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
    .input-group {
      margin: 2rem 0;
    }
    input {
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #6c63ff;
    }
    input.error {
      border-color: #ef4444;
      color: #ef4444;
    }
    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 6px;
      background: #3b82f6;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #2563eb;
    }
    button.vertical {
      background: #8b5cf6;
    }
    button.vertical:hover {
      background: #7c3aed;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>EaseMotion Shake Animations</h2>
    <p style="color: #64748b; margin-bottom: 2rem;">Great for invalid form inputs!</p>
    
    <div class="input-group">
      <input type="password" id="target" placeholder="Enter password...">
    </div>

    <div class="controls">
      <button onclick="triggerAnimation('ease-shake-x')">Shake X (Horizontal)</button>
      <button class="vertical" onclick="triggerAnimation('ease-shake-y')">Shake Y (Vertical)</button>
    </div>
  </div>

  <script>
    function triggerAnimation(animationClass) {
      const target = document.getElementById('target');
      
      // Reset state
      target.classList.remove('ease-shake-x', 'ease-shake-y', 'error');
      
      // Force reflow
      void target.offsetWidth;
      
      // Apply error state and shake animation
      target.classList.add('error', animationClass);
      
      // Remove classes after animation completes (approx 400ms)
      setTimeout(() => {
        target.classList.remove(animationClass, 'error');
      }, 500);
    }
  </script>
</body>
</html>
