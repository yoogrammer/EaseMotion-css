<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-bg-repeat Utilities Demo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Inter, sans-serif;
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem;
        background: #f8fafc;
      }
      h2 {
        color: #6366f1;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1.5rem;
      }
      .box {
        height: 140px;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        background-image: radial-gradient(circle, #6366f1 4px, transparent 4px);
        background-size: 20px 20px;
      }
      .label {
        margin-top: 0.5rem;
        font-size: 0.85rem;
        font-weight: 600;
        color: #334155;
      }
    </style>
  </head>
  <body>
    <h2>background-repeat Utilities</h2>

    <div class="grid">
      <div>
        <div class="box ease-bg-repeat"></div>
        <div class="label">ease-bg-repeat</div>
      </div>
      <div>
        <div class="box ease-bg-no-repeat"></div>
        <div class="label">ease-bg-no-repeat</div>
      </div>
      <div>
        <div class="box ease-bg-repeat-x"></div>
        <div class="label">ease-bg-repeat-x</div>
      </div>
      <div>
        <div class="box ease-bg-repeat-y"></div>
        <div class="label">ease-bg-repeat-y</div>
      </div>
    </div>
  </body>
</html>
