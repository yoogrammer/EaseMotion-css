<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Loader Inline Text - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Loader — Inline Text</h1>
    <p class="description">
      Self-contained demo. Loader and text aligned on the same
      baseline.
    </p>

    <div class="ease-loader-inline demo-row" role="status" aria-busy="true" aria-label="Loading">
      <span class="ease-loader ease-loader-spin"></span>
      <span>Loading your content...</span>
    </div>

    <div class="ease-loader-inline demo-row" role="status" aria-busy="true" aria-label="Loading">
      <span class="ease-loader ease-loader-dots">
        <span class="ease-loader-dot"></span>
        <span class="ease-loader-dot"></span>
        <span class="ease-loader-dot"></span>
      </span>
      <span>Fetching results</span>
    </div>

  </div>

</body>
</html>
