<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ease Wave Animation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>Wave Text</h2>
    <div style="font-size: 28px; font-weight: 700; color: #6c63ff;">
      <span class="ease-wave">
        <span>E</span><span>a</span><span>s</span><span>e</span>
        <span>&nbsp;</span>
        <span>W</span><span>a</span><span>v</span><span>e</span>
      </span>
    </div>
  </div>

  <div class="card">
    <h2>Wave Fade Text</h2>
    <div style="font-size: 24px; font-weight: 700; color: #f97316;">
      <span class="ease-wave-fade">
        <span>L</span><span>o</span><span>a</span><span>d</span>
        <span>i</span><span>n</span><span>g</span><span>…</span>
      </span>
    </div>
  </div>

  <div class="card">
    <h2>Wave Icons</h2>
    <div class="ease-wave-icons">
      <span>⭐</span>
      <span>🚀</span>
      <span>🔥</span>
      <span>💡</span>
      <span>🎉</span>
    </div>
  </div>

</body>
</html>
