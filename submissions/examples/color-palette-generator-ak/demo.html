<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Palette Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Color Palette Generator</h1>
    <div class="palette" id="palette"></div>
    <div class="controls">
      <button class="ctrl-btn" id="generateBtn">Generate</button>
      <button class="ctrl-btn secondary" id="lockAllBtn">Lock All</button>
      <button class="ctrl-btn secondary" id="unlockAllBtn">Unlock All</button>
    </div>
  </div>
  <script>
    const palette = document.getElementById('palette');
    const generateBtn = document.getElementById('generateBtn');
    const lockAllBtn = document.getElementById('lockAllBtn');
    const unlockAllBtn = document.getElementById('unlockAllBtn');

    let colors = [];
    let locked = [];

    function randomColor() {
      return '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
    }

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return { r, g, b };
    }

    function luminance(r, g, b) {
      const a = [r, g, b].map(v => { v /= 255; return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4); });
      return a[0] * 0.2126 + a[1] * 0.7152 + a[2] * 0.0722;
    }

    function generatePalette() {
      colors = colors.length === 0 ? Array.from({ length: 5 }, () => randomColor()) : colors;
      render();
    }

    function render() {
      palette.innerHTML = colors.map((c, i) => {
        const { r, g, b } = hexToRgb(c);
        const lum = luminance(r, g, b);
        const textColor = lum > 0.5 ? '#000' : '#fff';
        return `<div class="palette-color" style="background: ${c}; color: ${textColor}">
          <div class="palette-info">
            <span class="palette-hex">${c}</span>
            <span class="palette-rgb">${r}, ${g}, ${b}</span>
          </div>
          <button class="lock-btn" data-idx="${i}">${locked[i] ? '🔒' : '🔓'}</button>
        </div>`;
      }).join('');
      document.querySelectorAll('.lock-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.idx);
          locked[idx] = !locked[idx];
          render();
        });
      });
    }

    generateBtn.addEventListener('click', () => {
      colors = colors.map((c, i) => locked[i] ? c : randomColor());
      render();
    });
    lockAllBtn.addEventListener('click', () => { locked = locked.map(() => true); render(); });
    unlockAllBtn.addEventListener('click', () => { locked = locked.map(() => false); render(); });

    generatePalette();
  </script>
</body>
</html>
