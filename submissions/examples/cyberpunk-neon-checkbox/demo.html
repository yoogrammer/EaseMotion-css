<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyberpunk Neon Checkbox</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <h1>Cyberpunk Neon Checkbox</h1>
    <p class="subtitle">
        Futuristic neon checkboxes with glowing cyberpunk aesthetics.
    </p>

    <div class="settings-card">

        <label class="cyber-checkbox">
            <input type="checkbox" checked>
            <span class="checkmark"></span>
            Enable Neural Interface
        </label>

        <label class="cyber-checkbox cyan">
            <input type="checkbox">
            <span class="checkmark"></span>
            Activate Quantum Sync
        </label>

        <label class="cyber-checkbox purple">
            <input type="checkbox" checked>
            <span class="checkmark"></span>
            Security Firewall Online
        </label>

        <label class="cyber-checkbox pink">
            <input type="checkbox">
            <span class="checkmark"></span>
            Hyperdrive Monitoring
        </label>

        <label class="cyber-checkbox orange">
            <input type="checkbox" checked>
            <span class="checkmark"></span>
            Threat Detection Active
        </label>

    </div>

</div>

</body>
</html>
