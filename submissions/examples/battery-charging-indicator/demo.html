<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Battery Charging Indicator – EaseMotion CSS</title>
  <meta name="description" content="Beautiful animated battery indicators with liquid wave fill using pure CSS keyframes." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Battery Charging Indicator</h1>
  <p>Liquid wave fills rise with level — drag the slider to control the interactive battery</p>

  <div class="battery-grid">

    <!-- Battery 1: High -->
    <div class="battery-widget high" aria-label="Battery at 87 percent, high">
      <div class="battery" role="progressbar" aria-valuenow="87" aria-valuemin="0" aria-valuemax="100" aria-label="87 percent charge">
        <div class="battery-fill" style="height:87%">
          <div class="fill-body"></div>
        </div>
        <div class="bolt" aria-hidden="true">⚡</div>
      </div>
      <div class="battery-pct">87%</div>
      <div class="battery-label">Charging</div>
    </div>

    <!-- Battery 2: Mid -->
    <div class="battery-widget mid" aria-label="Battery at 45 percent, medium">
      <div class="battery" role="progressbar" aria-valuenow="45" aria-valuemin="0" aria-valuemax="100" aria-label="45 percent charge">
        <div class="battery-fill" style="height:45%">
          <div class="fill-body"></div>
        </div>
        <div class="bolt" aria-hidden="true">⚡</div>
      </div>
      <div class="battery-pct">45%</div>
      <div class="battery-label">Charging</div>
    </div>

    <!-- Battery 3: Low -->
    <div class="battery-widget low" aria-label="Battery at 12 percent, low">
      <div class="battery" role="progressbar" aria-valuenow="12" aria-valuemin="0" aria-valuemax="100" aria-label="12 percent charge">
        <div class="battery-fill" style="height:12%">
          <div class="fill-body"></div>
        </div>
        <div class="bolt" aria-hidden="true">⚡</div>
      </div>
      <div class="battery-pct">12%</div>
      <div class="battery-label">Low Battery</div>
    </div>

  </div>

  <!-- Interactive battery -->
  <div class="demo-controls">
    <div class="controls-label">Interactive Demo — Drag to charge</div>

    <div class="battery-widget high" id="demoBattery" aria-label="Interactive battery">
      <div class="battery" id="demoBatteryEl" role="progressbar" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100" aria-label="Interactive battery charge level">
        <div class="battery-fill" id="demoFill" style="height:60%">
          <div class="fill-body"></div>
        </div>
        <div class="bolt" aria-hidden="true">⚡</div>
      </div>
      <div class="battery-pct" id="demoPct">60%</div>
      <div class="battery-label" id="demoLabel">Charging</div>
    </div>

    <input type="range" class="pct-slider" id="pctSlider"
      min="0" max="100" value="60"
      aria-label="Battery level slider" />
    <div class="controls-value" id="sliderDisplay">60%</div>
  </div>

  <script>
    const slider = document.getElementById('pctSlider');
    const fill   = document.getElementById('demoFill');
    const pct    = document.getElementById('demoPct');
    const label  = document.getElementById('demoLabel');
    const widget = document.getElementById('demoBattery');
    const battEl = document.getElementById('demoBatteryEl');
    const display= document.getElementById('sliderDisplay');

    function update(val) {
      fill.style.height = val + '%';
      pct.textContent   = val + '%';
      display.textContent = val + '%';
      battEl.setAttribute('aria-valuenow', val);

      widget.classList.remove('high','mid','low');
      if (val >= 50) {
        widget.classList.add('high');
        label.textContent = 'Charging';
      } else if (val >= 20) {
        widget.classList.add('mid');
        label.textContent = 'Charging';
      } else {
        widget.classList.add('low');
        label.textContent = 'Low Battery';
      }
    }

    slider.addEventListener('input', () => update(parseInt(slider.value)));
    update(60);
  </script>
</body>
</html>
