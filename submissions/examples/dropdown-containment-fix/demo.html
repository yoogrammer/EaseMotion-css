<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Dropdown Containment Patch</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 460px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Isolated Reflow Containment</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem;">Open the menu and toggle settings. The <code>contain: layout style</code> property blocks rendering updates from shaking the neighbor input block below.</p>
  </header>

  <form class="alm-form-stage" onsubmit="event.preventDefault();">
    
    <div class="alm-isolated-dropdown-box">
      <input type="checkbox" id="menuToggle" class="alm-dropdown-toggle">
      
      <label for="menuToggle" class="alm-dropdown-trigger">
        <span>Select Target Vectors</span>
        <span class="alm-chevron">▼</span>
      </label>

      <div class="alm-absolute-menu">
        <label class="alm-option-row">
          <input type="checkbox" checked> Fastapi Runtime
        </label>
        <label class="alm-option-row">
          <input type="checkbox"> Pytorch Matrix Engine
        </label>
        <label class="alm-option-row">
          <input type="checkbox"> TensorFlow Pipeline
        </label>
      </div>
    </div>

    <div class="alm-adjacent-input-block">
      <label for="adj-field">Adjacent Infrastructure Token</label>
      <input type="text" id="adj-field" class="alm-adjacent-field" value="SECURE_CLUSTER_NODE_DELTA_A" readonly>
    </div>

  </form>

</body>
</html>
