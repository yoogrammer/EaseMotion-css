<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automation Workflow Container - EaseMotion CSS</title>
  <style>
    body { background-color: #070b12; color: #f1f5f9; font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .automation-card { padding: 32px; background: #0e131f; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; text-align: center; max-width: 440px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    h1 { font-size: 20px; color: #7c3aed; margin-top: 0; }
    p { font-size: 14px; color: #94a3b8; line-height: 1.5; }
    .badge-sb { display: inline-block; padding: 4px 10px; background: rgba(124, 58, 237, 0.1); color: #7c3aed; border-radius: 6px; font-size: 12px; font-weight: bold; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="automation-card">
    <span class="badge-sb">GitHub Actions Patch #2574</span>
    <h1>Native Issue Assigner</h1>
    <p>This directory holds the self-contained container patch mapping a 24/7 automated issue assignment system utilizing token permissions and standard native REST API actions.</p>
  </div>
</body>
</html>
