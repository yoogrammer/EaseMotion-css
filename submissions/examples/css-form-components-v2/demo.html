<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Form Components</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="ease-form-demo">
      <h2 class="ease-form-title">EaseMotion Simple Css Form Components</h2>

      <div class="ease-field">
        <label for="name" class="ease-label">Full Name</label>
        <input
          id="name"
          type="text"
          class="ease-input"
          placeholder="Enter your name"
        />
      </div>

      <div class="ease-field">
        <label class="ease-checkbox-wrapper">
          <input type="checkbox" class="ease-checkbox-input" />
          <span class="ease-checkbox-box"></span>
          <span class="ease-label-text">Remember me</span>
        </label>
      </div>

      <div class="ease-field">
        <span class="ease-label">Select Plan</span>
        <div class="ease-radio-group">
          <label class="ease-radio-wrapper">
            <input type="radio" name="plan" class="ease-radio-input" checked />
            <span class="ease-radio-circle"></span>
            <span class="ease-label-text">Basic</span>
          </label>

          <label class="ease-radio-wrapper">
            <input type="radio" name="plan" class="ease-radio-input" />
            <span class="ease-radio-circle"></span>
            <span class="ease-label-text">Premium</span>
          </label>
        </div>
      </div>
    </div>
  </body>
</html>
