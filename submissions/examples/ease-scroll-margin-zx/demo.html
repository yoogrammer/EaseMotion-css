<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scroll Margin Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1.5rem 0 0.25rem;
      }
      .note {
        background: #f1f5f9;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
      }
      .nav {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }
      .nav a {
        padding: 0.4rem 0.8rem;
        background: #f1f5f9;
        border-radius: 6px;
        text-decoration: none;
        color: #475569;
        font-size: 0.85rem;
      }
      .nav a:hover {
        background: #e2e8f0;
      }
    </style>
  </head>
  <body>
    <h1>Scroll Margin</h1>
    <p class="note">
      Adds offset to scroll targets so content isn't hidden under sticky
      headers. Click links below to test.
    </p>

    <div class="nav">
      <a href="#s1">Section 1</a>
      <a href="#s2">Section 2</a>
      <a href="#s3">Section 3 (2rem top)</a>
      <a href="#s4">Section 4</a>
      <a href="#s5">Section 5 (1rem bottom)</a>
    </div>

    <div id="s1" class="section scroll-mt-1">Section 1</div>
    <div id="s2" class="section scroll-mt-1">Section 2</div>
    <div id="s3" class="section scroll-mt-2">Section 3 (scroll-mt-2)</div>
    <div id="s4" class="section scroll-mt-1">Section 4</div>
    <div id="s5" class="section scroll-mb-1">Section 5 (scroll-mb-1)</div>
  </body>
</html>
