<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Truncate Max-Width Fix Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>Without max-width (overflows)</h2>
  <div class="flex-row broken">
    <div class="card">
      <span class="ease-truncate-broken">This is a very long piece of text that should be truncated but overflows the container instead</span>
    </div>
    <div class="sidebar">Sidebar</div>
  </div>

  <h2>With max-width: 100% (fixed)</h2>
  <div class="flex-row">
    <div class="card">
      <span class="ease-truncate">This is a very long piece of text that should be truncated and now stays within the container properly</span>
    </div>
    <div class="sidebar">Sidebar</div>
  </div>

</body>
</html>
