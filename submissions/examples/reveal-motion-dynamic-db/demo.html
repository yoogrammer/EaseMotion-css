<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Motion Preferences Observer Demo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="content-box reveal-target">
    Dynamic Scroll Reveal Card
  </div>

  <script>
    (function() {
      const targets = document.querySelectorAll('.reveal-target');
      let observer;
      const motionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');

      function setupObserver() {
        if (motionQuery.matches) {
          targets.forEach(el => el.classList.add('reveal-active'));
          return;
        }
        observer = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('reveal-active');
            }
          });
        }, { threshold: 0.1 });
        targets.forEach(el => observer.observe(el));
      }

      setupObserver();
      motionQuery.addEventListener('change', (e) => {
        if (observer) observer.disconnect();
        if (e.matches) {
          targets.forEach(el => el.classList.add('reveal-active'));
        } else {
          setupObserver();
        }
      });
    })();
  </script>
</body>
</html>
