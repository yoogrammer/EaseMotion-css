<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexbox Visual Playground</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>📦 Flexbox Visual Playground</h1>
        <p>Explore how different Flexbox properties affect layout behavior.</p>
    </header>

    <div class="playground">

        <div class="example-card">
            <h3>flex-direction: row</h3>
            <div class="demo row">
                <span>A</span>
                <span>B</span>
                <span>C</span>
            </div>
        </div>

        <div class="example-card">
            <h3>flex-direction: column</h3>
            <div class="demo column">
                <span>A</span>
                <span>B</span>
                <span>C</span>
            </div>
        </div>

        <div class="example-card">
            <h3>justify-content: center</h3>
            <div class="demo center">
                <span>A</span>
                <span>B</span>
                <span>C</span>
            </div>
        </div>

        <div class="example-card">
            <h3>justify-content: space-between</h3>
            <div class="demo space-between">
                <span>A</span>
                <span>B</span>
                <span>C</span>
            </div>
        </div>

        <div class="example-card">
            <h3>flex-wrap: wrap</h3>
            <div class="demo wrap">
                <span>1</span>
                <span>2</span>
                <span>3</span>
                <span>4</span>
                <span>5</span>
                <span>6</span>
            </div>
        </div>

        <div class="example-card">
            <h3>gap: 24px</h3>
            <div class="demo gap-demo">
                <span>A</span>
                <span>B</span>
                <span>C</span>
            </div>
        </div>

    </div>

</div>

</body>
</html>
