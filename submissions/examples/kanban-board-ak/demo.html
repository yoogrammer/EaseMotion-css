<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Kanban Board</h1>
    <div class="add-task">
      <input type="text" id="taskInput" placeholder="New task...">
      <button id="addBtn">Add Task</button>
    </div>
    <div class="board">
      <div class="column" data-col="todo">
        <h2>To Do</h2>
        <div class="tasks" id="todoList"></div>
      </div>
      <div class="column" data-col="progress">
        <h2>In Progress</h2>
        <div class="tasks" id="progressList"></div>
      </div>
      <div class="column" data-col="done">
        <h2>Done</h2>
        <div class="tasks" id="doneList"></div>
      </div>
    </div>
  </div>

  <script>
    const columns = { todo: [], progress: [], done: [] };
    let taskId = 0;

    const todoList = document.getElementById('todoList');
    const progressList = document.getElementById('progressList');
    const doneList = document.getElementById('doneList');
    const taskInput = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');

    function moveTask(id, from, to) {
      const idx = columns[from].findIndex(t => t.id === id);
      if (idx === -1) return;
      const task = columns[from].splice(idx, 1)[0];
      columns[to].push(task);
      render();
    }

    function deleteTask(id, col) {
      columns[col] = columns[col].filter(t => t.id !== id);
      render();
    }

    function render() {
      todoList.innerHTML = columns.todo.map(t => renderTask(t, 'todo')).join('');
      progressList.innerHTML = columns.progress.map(t => renderTask(t, 'progress')).join('');
      doneList.innerHTML = columns.done.map(t => renderTask(t, 'done')).join('');
    }

    function renderTask(task, col) {
      let btns = '';
      if (col === 'todo') btns = `<button onclick="moveTask(${task.id},'todo','progress')">→ In Progress</button>`;
      else if (col === 'progress') btns = `<button onclick="moveTask(${task.id},'progress','todo')">← To Do</button> <button onclick="moveTask(${task.id},'progress','done')">→ Done</button>`;
      else if (col === 'done') btns = `<button onclick="moveTask(${task.id},'done','progress')">← In Progress</button>`;
      btns += ` <button class="delete" onclick="deleteTask(${task.id},'${col}')">✕</button>`;
      return `<div class="task">${task.text}<div class="task-actions">${btns}</div></div>`;
    }

    addBtn.addEventListener('click', () => {
      const text = taskInput.value.trim();
      if (!text) return;
      columns.todo.push({ id: ++taskId, text });
      taskInput.value = '';
      render();
    });

    taskInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addBtn.click();
    });
  </script>
</body>
</html>
