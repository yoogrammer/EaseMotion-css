<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Software Architecture Blueprint</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Software Architecture Blueprint</h1>
    <p class="subtitle">
        High-level visualization of application architecture.
    </p>

    <div class="architecture">

        <div class="layer">
            <div class="block frontend">Frontend</div>
        </div>

        <div class="connector"></div>

        <div class="layer">
            <div class="block gateway">API Gateway</div>
        </div>

        <div class="connector"></div>

        <div class="layer services">
            <div class="block service">Auth Service</div>
            <div class="block service">User Service</div>
            <div class="block service">Payment Service</div>
        </div>

        <div class="connector"></div>

        <div class="layer infrastructure">
            <div class="block cache">Redis Cache</div>
            <div class="block queue">Message Queue</div>
        </div>

        <div class="connector"></div>

        <div class="layer storage">
            <div class="block database">Database</div>
            <div class="block external">External APIs</div>
        </div>

    </div>

</div>

</body>
</html>
