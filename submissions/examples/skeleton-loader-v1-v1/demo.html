<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-skeleton Demo — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      width: 320px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .card-lines {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .short { width: 60%; }
  </style>
</head>
<body>
  <div class="card">
    <!-- Avatar -->
    <div class="card-header">
      <div class="ease-skeleton ease-skeleton-circle"></div>
      <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
        <div class="ease-skeleton ease-skeleton-text"></div>
        <div class="ease-skeleton ease-skeleton-text short"></div>
      </div>
    </div>

    <!-- Text lines -->
    <div class="card-lines">
      <div class="ease-skeleton ease-skeleton-text"></div>
      <div class="ease-skeleton ease-skeleton-text"></div>
      <div class="ease-skeleton ease-skeleton-text short"></div>
    </div>
  </div>
</body>
</html>
