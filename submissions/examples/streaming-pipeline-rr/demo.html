<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real-Time Data Streaming Pipeline</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Real-Time Data Streaming Pipeline</h1>

    <p class="subtitle">
        Visualizing event-driven data movement from producers to analytics systems.
    </p>

    <div class="pipeline">

        <div class="sources">

            <div class="node producer">
                🌐 Website
            </div>

            <div class="node producer">
                📱 Mobile App
            </div>

            <div class="node producer">
                📡 IoT Devices
            </div>

        </div>

        <div class="connector"></div>

        <div class="node broker">
            Kafka Event Broker
        </div>

        <div class="connector"></div>

        <div class="node processor">
            Stream Processing Engine
        </div>

        <div class="connector"></div>

        <div class="outputs">

            <div class="node storage">
                Data Lake
            </div>

            <div class="node analytics">
                Analytics Dashboard
            </div>

            <div class="node monitoring">
                Real-Time Monitoring
            </div>

        </div>

    </div>

</div>

</body>
</html>
