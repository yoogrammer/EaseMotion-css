<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marquee Scrolling Text Banner</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #0f172a; flex-direction: column; gap: 2rem;">
    <div class="marquee">
      <div class="marquee-track">
        <span>✦ Announcement: EaseMotion v2.0 is here! ✦ Check out the new components ✦ Star us on GitHub ✦</span>
      </div>
    </div>
    <div class="marquee marquee-reverse">
      <div class="marquee-track">
        <span>✦ Limited time offer ✦ 50% off annual plans ✦ Use code: EASE50 ✦</span>
      </div>
    </div>
  </div>
</body>
</html>
