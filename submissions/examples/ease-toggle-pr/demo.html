<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-toggle-pr Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 4rem 2rem;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }
    
    .demo-section h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #1e293b;
    }
    
    .toggles-list {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      min-width: 280px;
    }
  </style>
</head>
<body>

  <div class="demo-section">
    <h2>Toggle Switches</h2>
    <div class="toggles-list">
      
      <!-- Toggle OFF -->
      <label class="toggle-pr">
        <input type="checkbox" class="toggle-pr-input">
        <span class="toggle-pr-track">
          <span class="toggle-pr-thumb"></span>
        </span>
        <span class="toggle-pr-label">Notifications</span>
      </label>

      <!-- Toggle ON -->
      <label class="toggle-pr">
        <input type="checkbox" class="toggle-pr-input" checked>
        <span class="toggle-pr-track">
          <span class="toggle-pr-thumb"></span>
        </span>
        <span class="toggle-pr-label">Dark Mode</span>
      </label>

      <!-- Toggle Disabled -->
      <label class="toggle-pr">
        <input type="checkbox" class="toggle-pr-input" disabled>
        <span class="toggle-pr-track">
          <span class="toggle-pr-thumb"></span>
        </span>
        <span class="toggle-pr-label">Auto-save (Disabled)</span>
      </label>

    </div>
  </div>

</body>
</html>
