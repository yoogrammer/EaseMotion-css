<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Documentation Fix Demo</title>

  <meta http-equiv="Content-Security-Policy" content="style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com;">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.min.css" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/components/buttons.css" 
        integrity="sha384-H5bIG5QdU3kEinK/DekP85FpkWVi39X1u9XmyfqyhdHr9nqlfOPPJDyeUMMY7CkM" 
        crossorigin="anonymous" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="ease-navbar-glass">
    <div class="ease-navbar-brand">EaseMotion CSS Fix</div>
    <div class="ease-navbar-menu">
      <a class="ease-navbar-item" href="#">Home</a>
      <a class="ease-navbar-item" href="#">Docs Debugged</a>
    </div>
  </nav>

  <main class="ease-center" style="padding: 2rem; flex-direction: column; min-height: 80vh;">
    <h1 class="ease-fade-in" style="color: var(--ease-color-primary, #6c63ff); font-family: 'Inter', sans-serif; font-size: 2.5rem; margin-bottom: 1rem;">
      Documentation Layout Restored!
    </h1>
    <p class="ease-slide-up ease-delay-200" style="max-w: 600px; text-align: center; color: #555; line-height: 1.6; margin-bottom: 2rem;">
      This sandbox successfully patches the cross-origin security headers, updates the Subresource Integrity hashes, and loads components cleanly without browser intervention.
    </p>
    
    <div class="ease-flex ease-gap-4 ease-slide-up ease-delay-300">
      <button class="ease-btn ease-btn-primary ease-hover-grow">Primary Button Loaded</button>
      <button class="ease-btn ease-btn-success ease-hover-lift">Success Asset Secure</button>
    </div>
  </main>

</body>
</html>
