<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Star Rating Demo | EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    style="
      font-family:
        system-ui,
        -apple-system,
        sans-serif;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      gap: 40px;
    "
  >
    <!-- Standard 5-Star Rating -->
    <div class="rating-container">
      <h3 style="margin: 0; color: #1e293b; font-size: 1.1rem">
        Rate your experience
      </h3>
      <div class="rating-group">
        <!-- Stars are listed in reverse order in HTML for the ~ selector to work with row-reverse -->
        <input
          type="radio"
          id="star-5"
          name="experience"
          value="5"
          class="rating-input"
        />
        <label for="star-5" class="rating-label">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"
            />
          </svg>
        </label>

        <input
          type="radio"
          id="star-4"
          name="experience"
          value="4"
          class="rating-input"
        />
        <label for="star-4" class="rating-label">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"
            />
          </svg>
        </label>

        <input
          type="radio"
          id="star-3"
          name="experience"
          value="3"
          class="rating-input"
        />
        <label for="star-3" class="rating-label">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"
            />
          </svg>
        </label>

        <input
          type="radio"
          id="star-2"
          name="experience"
          value="2"
          class="rating-input"
        />
        <label for="star-2" class="rating-label">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"
            />
          </svg>
        </label>

        <input
          type="radio"
          id="star-1"
          name="experience"
          value="1"
          class="rating-input"
        />
        <label for="star-1" class="rating-label">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"
            />
          </svg>
        </label>
      </div>
    </div>

    <!-- Large Variant -->
    <div class="rating-container">
      <h3 style="margin: 0; color: #1e293b; font-size: 1.1rem">
        Product Quality
      </h3>
      <div class="rating-group rating-lg">
        <input
          type="radio"
          id="lg-star-5"
          name="quality"
          value="5"
          class="rating-input"
        />
        <label for="lg-star-5" class="rating-label">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"
            />
          </svg>
        </label>
        <input
          type="radio"

        />

            />
          </svg>
        </label>
        <input
          type="radio"
          id="lg-star-3"
          name="quality"
          value="3"
          class="rating-input"
        />
        <label for="lg-star-3" class="rating-label">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"
            />
          </svg>
        </label>
        <input
          type="radio"
          id="lg-star-2"

        <input

        <label for="lg-star-1" class="rating-label">

            />
          </svg>
        </label>
      </div>
    </div>
  </body>
</html>
