<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass Navbar Dark Mode Demo</title>
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../components/navbar.css">
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      padding: 2rem;
      background-color: #f1f5f9;
      color: #0f172a;
      transition: background-color 0.3s, color 0.3s;
    }
    body.dark-mode-preview {
      background-color: #0f172a;
      color: #f1f5f9;
    }
    .demo-content {
      max-width: 800px;
      margin: 4rem auto;
    }
    .toggle-theme-btn {
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
      color: black;
    }
    .dark-mode-preview .toggle-theme-btn {
      background: #334155;
      color: white;
      border-color: #475569;
    }
  </style>
</head>
<body>
  <!-- Glass Blur Navbar -->
  <header class="ease-navbar-glass ease-navbar-glass-sticky ease-navbar-glass-blur">
    <div class="ease-navbar-brand">BrandName</div>
    <nav class="ease-navbar-menu">
      <a href="#" class="ease-navbar-item">Home</a>
      <a href="#" class="ease-navbar-item">Features</a>
      <a href="#" class="ease-navbar-item">Contact</a>
    </nav>
  </header>

  <div class="demo-content">
    <h1>Glass Navbar Dark Mode Contrast Demo</h1>
    <p>Toggle the dark mode preview button below to check contrast. When active, the navbar should adapt and render with a dark translucent background and light text, remaining fully readable.</p>
    
    <button id="themeToggle" class="toggle-theme-btn">Toggle Dark Mode Simulation</button>
  </div>

  <script>
    const toggleBtn = document.getElementById('themeToggle');
    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode-preview');
    });

    // Also match system preferences by default
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.body.classList.add('dark-mode-preview');
    }
  </script>
</body>
</html>
