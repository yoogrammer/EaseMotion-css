<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible Focus Ring</title>
  <link rel="stylesheet" href="../../../easemotion/easemotion.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; background: #f8fafc; color: #0f172a; }
    .demo-section { margin-bottom: 2rem; padding: 1.5rem; border: 1px solid #e2e8f0; border-radius: 8px; background: white; }
    input, a { padding: 0.5rem; border-radius: 4px; border: 1px solid #cbd5e1; text-decoration: none; color: #6c63ff; }
  </style>
</head>
<body>
  <h1>Unified Focus Ring Architecture</h1>
  <p>Press <strong>TAB</strong> to navigate through the interactive elements below and observe the highly-visible, consistent focus ring.</p>
  
  <div class="demo-section">
    <h3>Button Component</h3>
    <button class="ease-btn-demo">Standard Button</button>
  </div>

  <div class="demo-section">
    <h3>Input Element (Utility Class)</h3>
    <input type="text" placeholder="Type here..." class="ease-focus-visible">
  </div>

  <div class="demo-section">
    <h3>Link Element (Outline Utility)</h3>
    <a href="#" class="ease-focus-outline">Clickable Link</a>
  </div>
</body>
</html>
