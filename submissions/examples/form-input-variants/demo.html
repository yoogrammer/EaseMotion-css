<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Input Variants</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Form Input Variants</h1>
    <p class="subtitle">Floating labels, states, sizes &amp; border styles</p>

    <div class="variant-group">
      <h2>Default</h2>
      <div class="input-grid">
        <div class="input-group">
          <input type="text" id="default-name" placeholder=" ">
          <label for="default-name">Full Name</label>
        </div>
        <div class="input-group">
          <input type="email" id="default-email" placeholder=" ">
          <label for="default-email">Email Address</label>
        </div>
      </div>
    </div>

    <div class="variant-group">
      <h2>Sizes</h2>
      <div class="input-grid">
        <div class="input-group sm">
          <input type="text" id="size-sm" placeholder=" ">
          <label for="size-sm">Small Input</label>
        </div>
        <div class="input-group lg">
          <input type="text" id="size-lg" placeholder=" ">
          <label for="size-lg">Large Input</label>
        </div>
      </div>
    </div>

    <div class="variant-group">
      <h2>Success &amp; Error</h2>
      <div class="input-grid">
        <div class="input-group success">
          <input type="text" id="success-input" placeholder=" " value="username@example.com">
          <label for="success-input">Email</label>
          <span class="hint">Valid email address</span>
        </div>
        <div class="input-group error">
          <input type="text" id="error-input" placeholder=" " value="invalid-email">
          <label for="error-input">Email</label>
          <span class="hint">Please enter a valid email</span>
        </div>
      </div>
    </div>

    <div class="variant-group">
      <h2>Disabled &amp; Readonly</h2>
      <div class="input-grid">
        <div class="input-group disabled">
          <input type="text" id="disabled-input" placeholder=" " value="user@example.com" disabled>
          <label for="disabled-input">Email (disabled)</label>
        </div>
        <div class="input-group readonly">
          <input type="text" id="readonly-input" placeholder=" " value="readonly value" readonly>
          <label for="readonly-input">Readonly Field</label>
        </div>
      </div>
    </div>

    <div class="variant-group">
      <h2>With Icon</h2>
      <div class="input-grid">
        <div class="input-with-icon">
          <span class="icon">🔍</span>
          <input type="text" id="icon-input" placeholder=" ">
          <label for="icon-input">Search</label>
        </div>
        <div class="input-with-icon">
          <span class="icon">📧</span>
          <input type="email" id="icon-input2" placeholder=" ">
          <label for="icon-input2">Email</label>
        </div>
      </div>
    </div>

    <div class="variant-group">
      <h2>Border Styles</h2>
      <div class="input-grid">
        <div class="input-group border-bottom">
          <input type="text" id="border-bottom" placeholder=" ">
          <label for="border-bottom">Bottom Border</label>
        </div>
        <div class="input-group border-dashed">
          <input type="text" id="border-dashed" placeholder=" ">
          <label for="border-dashed">Dashed Border</label>
        </div>
        <div class="input-group border-thick">
          <input type="text" id="border-thick" placeholder=" ">
          <label for="border-thick">Thick Border</label>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
