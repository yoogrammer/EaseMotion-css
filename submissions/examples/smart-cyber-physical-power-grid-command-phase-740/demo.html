<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Power Grid Command — Phase #740</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="command-header fade-in">
    <div class="brand">
      <div class="brand-icon"></div>
      AEGIS GRID COMMAND
    </div>
    <div class="header-stat">
      <div class="stat-box">
        <span class="stat-val">102.4 GW</span>
        <span class="stat-lbl">National Output</span>
      </div>
      <div class="stat-box">
        <span class="stat-val" style="color: var(--clr-blue); text-shadow: var(--glow-blue)">59.98 Hz</span>
        <span class="stat-lbl">Grid Frequency</span>
      </div>
    </div>
  </header>

  <!-- Main Workspace -->
  <main class="app-main">
    
    <!-- Left Sidebar: Power Generation -->
    <aside class="panel fade-up">
      <div class="panel-title">GENERATION SOURCES</div>
      
      <div class="gen-list">
        
        <div class="gen-item">
          <div class="g-hdr">
            <span class="g-name"><div class="g-icon">✇</div> Offshore Wind</span>
            <span class="g-val">34.2 GW</span>
          </div>
          <div class="g-bar"><div class="g-fill" style="width: 75%;"></div></div>
        </div>

        <div class="gen-item">
          <div class="g-hdr">
            <span class="g-name"><div class="g-icon">☀</div> Solar Array Alpha</span>
            <span class="g-val">42.8 GW</span>
          </div>
          <div class="g-bar"><div class="g-fill" style="width: 90%;"></div></div>
        </div>

        <div class="gen-item">
          <div class="g-hdr">
            <span class="g-name"><div class="g-icon">☢</div> Fission Reactor 4</span>
            <span class="g-val" style="color: var(--clr-orange)">25.4 GW</span>
          </div>
          <div class="g-bar"><div class="g-fill" style="width: 100%;"></div></div>
        </div>

      </div>
    </aside>

    <!-- Center: Cyber-Physical Grid Map -->
    <section class="panel map-panel fade-in delay-1" style="padding: 0; border: none; box-shadow: none;">
      <div class="map-view">
        
        <!-- SVG for power lines -->
        <svg class="power-lines" viewBox="0 0 100 100" preserveAspectRatio="none">
          <!-- Static lines -->
          <line x1="50" y1="50" x2="30" y2="20" class="p-line" />
          <line x1="50" y1="50" x2="70" y2="30" class="p-line" />
          <line x1="50" y1="50" x2="25" y2="75" class="p-line" />
          <line x1="50" y1="50" x2="80" y2="60" class="p-line" />
          
          <!-- Animated flow lines -->
          <line x1="50" y1="50" x2="30" y2="20" class="p-flow" />
          <line x1="50" y1="50" x2="70" y2="30" class="p-flow" style="animation-duration: 0.8s" />
          <line x1="50" y1="50" x2="25" y2="75" class="p-flow" style="animation-duration: 1.2s" />
          <line x1="50" y1="50" x2="80" y2="60" class="p-flow" style="animation-duration: 0.9s; stroke: var(--clr-orange)" />
        </svg>

        <!-- Nodes -->
        <div class="node n-core"></div>
        <div class="node n1"></div>
        <div class="node n2"></div>
        <div class="node n3"></div>
        <div class="node n4" style="border-color: var(--clr-orange); box-shadow: 0 0 10px rgba(249,115,22,0.5)"></div>

      </div>
    </section>

    <!-- Right Sidebar: Load & Security -->
    <aside class="panel fade-up delay-2">
      
      <div class="load-card">
        <div class="lc-val">98%</div>
        <div class="lc-lbl">National Grid Load</div>
      </div>

      <div class="panel-title">SECURITY MONITORS</div>
      
      <div class="sec-list">
        
        <div class="sec-item">
          <span class="si-name">Firewall Node Alpha</span>
          <span class="si-stat">SECURE</span>
        </div>

        <div class="sec-item alert">
          <span class="si-name">Substation 42 Comm</span>
          <span class="si-stat">ANOMALY DETECTED</span>
        </div>

        <div class="sec-item">
          <span class="si-name">Physical Perimeter B</span>
          <span class="si-stat">SECURE</span>
        </div>

      </div>

    </aside>

  </main>

</body>
</html>
