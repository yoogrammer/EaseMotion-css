<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible Modal Focus Trap Demo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="page-container">
    <a href="#demo-modal" class="btn-open">Open Trap Modal</a>
    
    <div id="demo-modal" class="modal-overlay">
      <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <h2 id="modal-title">Accessible Dialog</h2>
        <p>This modal correctly skips disabled elements during Tab loops.</p>
        
        <input type="text" placeholder="Active input 1">
        <button disabled class="btn-disabled">Disabled Action (Skipped)</button>
        <input type="text" placeholder="Active input 2">
        <a href="#" class="modal-close-btn">Close Modal</a>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const modal = document.querySelector('#demo-modal');
      modal.addEventListener('keydown', function(e) {
        if (e.key !== 'Tab') return;
        const rawElements = modal.querySelectorAll('a[href], button, input, textarea, select');
        const focusables = Array.from(rawElements).filter(el => {
          return !el.disabled && el.getAttribute('tabindex') !== '-1' && el.offsetWidth > 0;
        });
        if (focusables.length === 0) return;
        const first = focusables[0];
        const last = focusables[focusables.length - 1];
        if (e.shiftKey && document.activeElement === first) {
          e.preventDefault();
          last.focus();
        } else if (!e.shiftKey && document.activeElement === last) {
          e.preventDefault();
          first.focus();
        }
      });
    })();
  </script>
</body>
</html>
