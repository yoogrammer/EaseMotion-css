<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neumorphic Depth Button</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Neumorphic Depth Buttons</h1>
    <div class="button-group">
      <button class="neu-btn neu-btn--primary">Primary</button>
      <button class="neu-btn neu-btn--secondary">Secondary</button>
      <button class="neu-btn neu-btn--accent">Accent</button>
    </div>
    <div class="button-group">
      <button class="neu-btn neu-btn--primary neu-btn--sm">Small</button>
      <button class="neu-btn neu-btn--primary neu-btn--lg">Large</button>
      <button class="neu-btn neu-btn--primary" disabled>Disabled</button>
    </div>
    <p class="hint">Click or press any button to see the depth change</p>
  </div>
</body>
</html>
