<!DOCTYPE html>

<head>

  <title>Dog-Ear Folded Corner Card - EaseMotion CSS</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">
    <h1>Dog-Ear Corner Card</h1>

    <div class="dog-ear-card">
      <h3>Top-Right Fold</h3>
