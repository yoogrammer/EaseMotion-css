<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Driven Animations - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Scroll Driven Animations</h1>
    <div class="scroll-stage">
      <div class="progress-track">
        <div class="progress-bar"></div>
      </div>
      <p class="scroll-hint">Scroll down to drive the animation</p>
      <div class="scroll-spacer"></div>
      <div class="animated-reveal">Revealed by scroll!</div>
    </div>
    <p class="description">The progress bar animates based on scroll position using animation-timeline.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
