<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Card - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="qz-header"><h1>CSS Quiz Card</h1><p>Question cards with option selection, progress, and score display</p></header>
<section class="qz-section"><h2>Multiple Choice</h2><div class="qz-card"><div class="qz-progress"><div class="qz-progress-bar" style="width:60%"></div><span class="qz-progress-text">3 of 5</span></div><div class="qz-question"><h3>What does CSS stand for?</h3></div><div class="qz-options"><label class="qz-option"><input type="radio" name="q1" class="qz-radio"><span class="qz-letter">A</span>Cascading Style Sheets</label><label class="qz-option"><input type="radio" name="q1" class="qz-radio"><span class="qz-letter">B</span>Creative Style System</label><label class="qz-option qz-correct"><input type="radio" name="q1" class="qz-radio" checked><span class="qz-letter">C</span>Computer Style Sheets</label><label class="qz-option qz-wrong"><input type="radio" name="q1" class="qz-radio"><span class="qz-letter">D</span>Colorful Style Syntax</label></div><div class="qz-feedback qz-correct-fb">&#10003; Correct! CSS stands for Cascading Style Sheets.</div><div class="qz-actions"><button class="qz-btn">Previous</button><button class="qz-btn qz-btn-primary">Next</button></div></div></section>
<section class="qz-section"><h2>Question Types</h2><div class="qz-row"><div class="qz-type qz-mcq">MCQ</div><div class="qz-type qz-tf">True/False</div><div class="qz-type qz-fill">Fill Blank</div><div class="qz-type qz-match">Matching</div></div></section>
<footer class="ftr"><p>EaseMotion CSS - Quiz Card | GSSoC 2026</p></footer>
</body>
</html>
