<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Notification Toast Stack</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="demo-bg">
      <h1 class="demo-title">Toast Notifications</h1>
      <p class="demo-subtitle">Click to trigger different toast types</p>

      <div class="trigger-grid" role="group" aria-label="Toast type triggers">
        <button class="trigger-btn trigger-success" onclick="showToast('success','Changes saved!','Your changes have been saved successfully.')">
          ✅ Success
        </button>
        <button class="trigger-btn trigger-error" onclick="showToast('error','Upload failed','File size exceeds the 10 MB limit.')">
          ❌ Error
        </button>
        <button class="trigger-btn trigger-warning" onclick="showToast('warning','Session expiring','You will be logged out in 5 minutes.')">
          ⚠️ Warning
        </button>
        <button class="trigger-btn trigger-info" onclick="showToast('info','New update available','Version 2.1.0 is ready to install.')">
          ℹ️ Info
        </button>
        <button class="trigger-btn trigger-loading" onclick="showToast('loading','Uploading file…','Please wait while your file is being uploaded.')">
          ⏳ Loading
        </button>
      </div>

      <!-- Toast container -->
      <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="false" role="region" aria-label="Notifications"></div>
    </div>

    <script>
      const icons = {
        success: '✅',
        error: '❌',
        warning: '⚠️',
        info: 'ℹ️',
        loading: '⏳'
      };

      let toastId = 0;

      function showToast(type, title, message, duration = 4000) {
        const container = document.getElementById('toast-container');
        const id = ++toastId;

        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.setAttribute('role', 'alert');
        toast.setAttribute('aria-live', 'assertive');
        toast.innerHTML = `
          <div class="toast-icon" aria-hidden="true">${icons[type]}</div>
          <div class="toast-body">
            <div class="toast-title">${title}</div>
            <div class="toast-message">${message}</div>
            ${type === 'loading' ? '<div class="toast-progress-bar loading-bar"></div>' : ''}
          </div>
          <button class="toast-close" onclick="dismissToast(this.closest('.toast'))" aria-label="Dismiss notification">✕</button>
          ${type !== 'loading' ? `<div class="toast-timer-bar" style="animation-duration: ${duration}ms;"></div>` : ''}
        `;

        container.appendChild(toast);
        // Force reflow for animation
        toast.getBoundingClientRect();
        toast.classList.add('toast-enter');

        if (type !== 'loading') {
          setTimeout(() => dismissToast(toast), duration);
        }
      }

      function dismissToast(toast) {
        if (!toast || toast.classList.contains('toast-exit')) return;
        toast.classList.remove('toast-enter');
        toast.classList.add('toast-exit');
        toast.addEventListener('animationend', () => toast.remove(), { once: true });
      }

      // Dismiss on click body of toast
      document.addEventListener('click', (e) => {
        if (e.target.closest('.toast') && !e.target.closest('.toast-close')) {
          dismissToast(e.target.closest('.toast'));
        }
      });
    </script>
  </body>
</html>
