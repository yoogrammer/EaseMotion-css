<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-backface-visibility-za</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      [data-ease-demo-za] {
        font-family: system-ui, sans-serif;
        max-width: 500px;
        margin: 2rem auto;
        padding: 1.5rem;
        text-align: center;
      }
      .card {
        width: 150px;
        height: 150px;
        margin: 1rem auto;
        position: relative;
        perspective: 600px;
      }
      .card-inner {
        width: 100%;
        height: 100%;
        transition: transform 0.6s;
        transform-style: preserve-3d;
      }
      .card:hover .card-inner {
        transform: rotateY(180deg);
      }
      .card-front,
      .card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        font-weight: 600;
      }
      .card-front {
        background: #6c63ff;
        color: #fff;
      }
      .card-back {
        background: #f59e0b;
        color: #fff;
        transform: rotateY(180deg);
      }
    </style>
  </head>
  <body>
    <div data-ease-demo-za>
      <h1>ease-backface-visibility-za</h1>
      <p>
        Hover the card — backface is hidden, so the reverse side is invisible
        until flipped.
      </p>
      <div class="card">
        <div class="card-inner">
          <div class="card-front ease-backface-hidden-za">Front</div>
          <div class="card-back ease-backface-hidden-za">Back</div>
        </div>
      </div>
    </div>
  </body>
</html>
