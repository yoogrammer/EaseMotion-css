<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification Dropdown Panel</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc;">
    <div class="notif">
      <button class="notif-bell" id="notifBell">
        🔔
        <span class="notif-badge">3</span>
      </button>
      <div class="notif-dropdown" id="notifDropdown">
        <div class="notif-header">
          <span>Notifications</span>
          <button class="notif-mark" id="notifMark">Mark all read</button>
        </div>
        <div class="notif-item"><span class="notif-dot"></span><span>Alex commented on your PR</span><span class="notif-time">2m</span></div>
        <div class="notif-item"><span class="notif-dot"></span><span>Deploy to production succeeded</span><span class="notif-time">1h</span></div>
        <div class="notif-item"><span class="notif-dot"></span><span>New teammate joined your project</span><span class="notif-time">3h</span></div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
