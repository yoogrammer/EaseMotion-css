<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neumorphic Range Slider Input</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Neumorphic Range Slider Input</h1>

    <div class="control-panel">

        <div class="slider-card">

            <h2>Volume</h2>

            <input
                type="range"
                min="0"
                max="100"
                value="75"
                class="neo-slider blue"
            >

            <span>75%</span>

        </div>

        <div class="slider-card">

            <h2>Brightness</h2>

            <input
                type="range"
                min="0"
                max="100"
                value="60"
                class="neo-slider yellow"
            >

            <span>60%</span>

        </div>

        <div class="slider-card">

            <h2>Performance</h2>

            <input
                type="range"
                min="0"
                max="100"
                value="90"
                class="neo-slider green"
            >

            <span>90%</span>

        </div>

    </div>

</div>

</body>
</html>
