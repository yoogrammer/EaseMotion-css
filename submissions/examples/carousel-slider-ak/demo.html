<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel Slider</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="carousel" id="carousel">
    <div class="carousel-viewport">
      <div class="carousel-slides" id="carouselSlides">
        <div class="carousel-slide" style="background:#6366f1">Slide 1</div>
        <div class="carousel-slide" style="background:#22c55e">Slide 2</div>
        <div class="carousel-slide" style="background:#f59e0b">Slide 3</div>
        <div class="carousel-slide" style="background:#ec4899">Slide 4</div>
        <div class="carousel-slide" style="background:#14b8a6">Slide 5</div>
      </div>
    </div>
    <button class="carousel-btn prev" id="prevBtn">&#10094;</button>
    <button class="carousel-btn next" id="nextBtn">&#10095;</button>
    <div class="carousel-dots" id="carouselDots"></div>
  </div>
  <script>
    const slides = document.querySelectorAll('.carousel-slide');
    const container = document.getElementById('carouselSlides');
    const dotsContainer = document.getElementById('carouselDots');
    let current = 0;
    let autoTimer;

    slides.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => goTo(i));
      dotsContainer.appendChild(dot);
    });

    function goTo(idx) {
      current = idx;
      container.style.transform = 'translateX(-' + (idx * 100) + '%)';
      dotsContainer.querySelectorAll('.carousel-dot').forEach((d, i) => {
        d.classList.toggle('active', i === idx);
      });
    }

    function next() { goTo((current + 1) % slides.length); }
    function prev() { goTo((current - 1 + slides.length) % slides.length); }

    function startAuto() { autoTimer = setInterval(next, 3000); }
    function stopAuto() { clearInterval(autoTimer); }

    document.getElementById('nextBtn').addEventListener('click', () => { stopAuto(); next(); startAuto(); });
    document.getElementById('prevBtn').addEventListener('click', () => { stopAuto(); prev(); startAuto(); });
    container.addEventListener('mouseenter', stopAuto);
    container.addEventListener('mouseleave', startAuto);

    startAuto();
  </script>
</body>
</html>
