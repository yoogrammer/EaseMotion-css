<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Grid Placement Utilities Demo</title>

<link rel="stylesheet" href="style.css" />

<style>
body 
    {
        font-family: Arial, sans-serif;
        padding: 2rem;
        background: #f5f7fb;
        color: #111827;
        max-width: 1200px;
        margin: 0 auto;
    }

h1 
    {
        text-align: center;
        margin-bottom: 0.5rem;
    }

.intro 
    {
        text-align: center;
        margin-bottom: 2rem;
        color: #4b5563;
    }

h2  {
        margin-top: 2rem;
    }

.placement-demo 
    {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
    }

.demo-card 
    {
        flex: 1;
        min-width: 240px;
    }

.demo-box 
    {
        display: grid;
        height: 160px;
        border: 2px dashed #888;
        background: white;
        border-radius: 8px;
    }

.item 
    {
        background: #4f46e5;
        color: white;
        padding: 10px 14px;
        border-radius: 6px;
        width: fit-content;
        height: fit-content;
    }

.grid-demo 
    {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-top: 1rem;
    }

.card 
    {
        background: #2563eb;
        color: white;
        padding: 15px;
        text-align: center;
        border-radius: 6px;
    }
</style>
</head>

<body>
<h1>Grid Placement Utilities</h1>

<p class="intro">
      Demonstrates utility classes for CSS Grid item placement and column
      spanning.
</p>

<h2>Place Items Utilities</h2>

<div class="placement-demo">
    <div class="demo-card">
    <p><strong> place-center </strong></p>
    <div class="demo-box place-center">
    <div class="item">Center</div>
    </div>
</div>

<div class="demo-card">
    <p><strong> place-start </strong></p>
    <div class="demo-box place-start">
    <div class="item">Start</div>
    </div>
</div>

<div class="demo-card">
    <p><strong> place-end </strong></p>
    <div class="demo-box place-end">
    <div class="item">End</div>
    </div>
    </div>
</div>

<h2>Column Span Utilities</h2>

<div class="grid-demo">
    <div class="card col-span-full">Full Row</div>

    <div class="card col-span-2">Span 2</div>
    <div class="card col-span-2">Span 2</div>

    <div class="card col-span-3">Span 3</div>

    <div class="card col-span-1">Span 1</div>

    <div class="card col-span-4">Span 4</div>
</div>
</body>
</html>
