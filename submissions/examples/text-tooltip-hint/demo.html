<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Micro-Interaction Text Tooltip Banner</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 3.5rem; text-align: center; max-width: 460px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Data-Attribute Tooltip Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Hover over or keyboard-tab onto the control buttons below. Native <code>attr()</code> mappings parse string keys into vector labels at 60fps with 0 scripts.</p>
  </header>

  <div class="alm-tooltip-sandbox-stage">
    
    <div class="alm-hint-host-wrapper" data-hint="Deploys live cluster updates">
      <button class="alm-tooltip-trigger-btn" type="button">Push Code</button>
    </div>

    <div class="alm-hint-host-wrapper" data-hint="Clears dynamic memory pools instantly">
      <button class="alm-tooltip-trigger-btn" type="button" style="border-color: rgba(239,68,68,0.2);">Flush Logs</button>
    </div>

  </div>

</body>
</html>
