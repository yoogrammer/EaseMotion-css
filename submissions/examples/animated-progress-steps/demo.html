<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Animated Progress Steps</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0d0d14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 2rem;
        }
        .container {
            text-align: center;
            max-width: 900px;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #6c63ff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 2rem;
        }
        .demo-section {
            background: #1a1a2e;
            border-radius: 1rem;
            padding: 2rem;
            margin: 2rem 0;
        }
        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }
        button {
            background: #6c63ff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }
        button:disabled {
            background: #2a2a3e;
            cursor: not-allowed;
        }
        .note {
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            color: #a1a1aa;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 Animated Progress Steps</h1>
    
    <div class="demo-section">
        <div class="ease-progress-steps" id="progressSteps">
            <div class="ease-step active">
                <div class="ease-step-number">1</div>
                <div class="ease-step-label">Account</div>
            </div>
            <div class="ease-step">
                <div class="ease-step-number">2</div>
                <div class="ease-step-label">Details</div>
            </div>
            <div class="ease-step">
                <div class="ease-step-number">3</div>
                <div class="ease-step-label">Payment</div>
            </div>
            <div class="ease-step">
                <div class="ease-step-number">4</div>
                <div class="ease-step-label">Confirm</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="prevBtn" disabled>← Previous</button>
        <button id="nextBtn">Next →</button>
        <button id="resetBtn">Reset</button>
    </div>

    <div class="note">
        💡 Click Next to see steps animate and complete with checkmarks!
    </div>
</div>

<script>
    const steps = document.querySelectorAll('.ease-step');
    let currentStep = 0;
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');

    function updateSteps() {
        steps.forEach((step, index) => {
            if (index < currentStep) {
                step.classList.add('completed');
                step.classList.remove('active');
            } else if (index === currentStep) {
                step.classList.add('active');
                step.classList.remove('completed');
            } else {
                step.classList.remove('active', 'completed');
            }
        });
        
        prevBtn.disabled = currentStep === 0;
        nextBtn.textContent = currentStep === steps.length - 1 ? 'Finish' : 'Next →';
    }

    nextBtn.addEventListener('click', () => {
        if (currentStep < steps.length - 1) {
            currentStep++;
            updateSteps();
        } else if (currentStep === steps.length - 1) {
            alert('Wizard completed!');
        }
    });

    prevBtn.addEventListener('click', () => {
        if (currentStep > 0) {
            currentStep--;
            updateSteps();
        }
    });

    resetBtn.addEventListener('click', () => {
        currentStep = 0;
        updateSteps();
    });

    updateSteps();
</script>
</body>
</html>
