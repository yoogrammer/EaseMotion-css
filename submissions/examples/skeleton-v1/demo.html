<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-skeleton — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      gap: 2rem;
      padding: 2rem;
    }
    h1 { color: #333; }
    .label { font-size: 0.75rem; color: #888; margin-bottom: 0.5rem; }
    .section { width: 100%; max-width: 400px; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .card-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .card-lines {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .dark-card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
  </style>
</head>
<body>

  <h1>ease-skeleton Demo</h1>

  <div class="section">
    <div class="label">Card skeleton (light)</div>
    <div class="card">
      <div class="card-row">
        <div class="ease-skeleton ease-skeleton-avatar"></div>
        <div class="card-lines">
          <div class="ease-skeleton ease-skeleton-text"></div>
          <div class="ease-skeleton ease-skeleton-text ease-skeleton-w-3\/4"></div>
        </div>
      </div>
      <div class="ease-skeleton ease-skeleton-rect"></div>
      <div class="ease-skeleton ease-skeleton-text"></div>
      <div class="ease-skeleton ease-skeleton-text ease-skeleton-w-1\/2"></div>
    </div>
  </div>

  <div class="section">
    <div class="label">Card skeleton (dark)</div>
    <div class="dark-card">
      <div class="card-row">
        <div class="ease-skeleton ease-skeleton-avatar ease-skeleton-dark"></div>
        <div class="card-lines">
          <div class="ease-skeleton ease-skeleton-text ease-skeleton-dark"></div>
          <div class="ease-skeleton ease-skeleton-text ease-skeleton-w-3\/4 ease-skeleton-dark"></div>
        </div>
      </div>
      <div class="ease-skeleton ease-skeleton-rect ease-skeleton-dark"></div>
      <div class="ease-skeleton ease-skeleton-text ease-skeleton-dark"></div>
      <div class="ease-skeleton ease-skeleton-text ease-skeleton-w-1\/2 ease-skeleton-dark"></div>
    </div>
  </div>

  <div class="section">
    <div class="label">Shape variants</div>
    <div class="card">
      <div class="card-row">
        <div class="ease-skeleton ease-skeleton-circle"></div>
        <div class="ease-skeleton ease-skeleton-circle"></div>
        <div class="ease-skeleton ease-skeleton-circle"></div>
      </div>
      <div class="ease-skeleton ease-skeleton-text ease-skeleton-w-1\/3"></div>
      <div class="ease-skeleton ease-skeleton-rect"></div>
    </div>
  </div>

</body>
</html>
