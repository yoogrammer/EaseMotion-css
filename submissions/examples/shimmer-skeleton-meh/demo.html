<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shimmer Skeleton Loader</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 48px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    h2 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #999;
      margin-bottom: 16px;
    }

    .demo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 900px;
    }

    .demo-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Dark section background */
    .dark-bg {
      background: #1a1a2e;
      padding: 32px;
      border-radius: 16px;
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .dark-bg h2 {
      color: #555;
    }

    .skeleton-card.dark-bg-card {
      background: #16213e;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

  <!-- Example 1: Social media post skeleton -->
  <div class="demo-section">
    <h2>Social Post Skeleton — avatar + text</h2>
    <div class="demo-row">

      <div class="skeleton-card">
        <div class="skeleton-row">
          <div class="skeleton-avatar"></div>
          <div class="skeleton-lines">
            <div class="skeleton-box skeleton-line-full"></div>
            <div class="skeleton-box skeleton-line-half"></div>
          </div>
        </div>
      </div>

      <div class="skeleton-card">
        <div class="skeleton-row">
          <div class="skeleton-avatar skeleton-avatar-lg"></div>
          <div class="skeleton-lines">
            <div class="skeleton-box skeleton-line-full"></div>
            <div class="skeleton-box skeleton-line-three-quarter"></div>
            <div class="skeleton-box skeleton-line-half"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Example 2: Product card skeleton -->
  <div class="demo-section">
    <h2>Product / Blog Card Skeleton — image + text</h2>
    <div class="demo-row">

      <div class="skeleton-card">
        <div class="skeleton-box skeleton-image"></div>
        <div class="skeleton-box skeleton-line-full"></div>
        <div class="skeleton-box skeleton-line-three-quarter"></div>
        <div class="skeleton-box skeleton-line-half"></div>
      </div>

      <div class="skeleton-card">
        <div class="skeleton-box skeleton-image"></div>
        <div class="skeleton-box skeleton-line-full"></div>
        <div class="skeleton-box skeleton-line-half"></div>
      </div>

      <div class="skeleton-card">
        <div class="skeleton-box skeleton-image"></div>
        <div class="skeleton-box skeleton-line-full"></div>
        <div class="skeleton-box skeleton-line-three-quarter"></div>
        <div class="skeleton-box skeleton-line-half"></div>
      </div>

    </div>
  </div>

  <!-- Example 3: Speed variants -->
  <div class="demo-section">
    <h2>Speed Variants — slow / normal / fast</h2>
    <div class="demo-row">

      <div class="skeleton-card">
        <h2 style="margin-bottom:12px">Slow</h2>
        <div class="skeleton-box skeleton-line-full skeleton-slow"></div>
        <div class="skeleton-box skeleton-line-half skeleton-slow"></div>
      </div>

      <div class="skeleton-card">
        <h2 style="margin-bottom:12px">Normal</h2>
        <div class="skeleton-box skeleton-line-full"></div>
        <div class="skeleton-box skeleton-line-half"></div>
      </div>

      <div class="skeleton-card">
        <h2 style="margin-bottom:12px">Fast</h2>
        <div class="skeleton-box skeleton-line-full skeleton-fast"></div>
        <div class="skeleton-box skeleton-line-half skeleton-fast"></div>
      </div>

    </div>
  </div>

  <!-- Example 4: Dark variant -->
  <div class="dark-bg">
    <h2>Dark Variant</h2>
    <div class="demo-row">

      <div class="skeleton-card skeleton-dark dark-bg-card">
        <div class="skeleton-row">
          <div class="skeleton-avatar"></div>
          <div class="skeleton-lines">
            <div class="skeleton-box skeleton-line-full"></div>
            <div class="skeleton-box skeleton-line-half"></div>
          </div>
        </div>
      </div>

      <div class="skeleton-card skeleton-dark dark-bg-card">
        <div class="skeleton-box skeleton-image"></div>
        <div class="skeleton-box skeleton-line-full"></div>
        <div class="skeleton-box skeleton-line-half"></div>
      </div>

    </div>
  </div>

</body>
</html>
