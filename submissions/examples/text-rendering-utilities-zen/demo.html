<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Rendering — Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:sans-serif;background:#f5f5f5;display:flex;justify-content:center;align-items:center;min-height:100vh}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1.5rem;padding:2rem;max-width:960px;width:100%}
    .card{background:#fff;border-radius:12px;padding:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .card h3{font-size:.8rem;text-transform:uppercase;color:#888;margin-bottom:.5rem}
    .sample{font-size:1.2rem;line-height:1.6;margin-top:.5rem}
    .sample strong{font-size:.85rem;display:block;color:#666;margin-bottom:.25rem}
    .tag{display:inline-block;margin-top:.75rem;font-family:monospace;font-size:.8rem;color:#666;background:#f0f0f0;padding:.25rem .5rem;border-radius:4px}
  </style>
</head>
<body>
  <div class="grid">
    <div class="card"><h3>Auto</h3><div class="sample text-render-auto"><strong>AV Wa ff fi fl</strong>AV Wa ff fi fl</div><span class="tag">.text-render-auto</span></div>
    <div class="card"><h3>Speed</h3><div class="sample text-render-speed"><strong>AV Wa ff fi fl</strong>AV Wa ff fi fl</div><span class="tag">.text-render-speed</span></div>
    <div class="card"><h3>Legibility</h3><div class="sample text-render-legibility"><strong>AV Wa ff fi fl</strong>AV Wa ff fi fl</div><span class="tag">.text-render-legibility</span></div>
    <div class="card"><h3>Geometric Precision</h3><div class="sample text-render-geometric-precision"><strong>AV Wa ff fi fl</strong>AV Wa ff fi fl</div><span class="tag">.text-render-geometric-precision</span></div>
  </div>
</body>
</html>
