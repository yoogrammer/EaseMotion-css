<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Consent Banner — EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: var(--ease-color-bg, #f8fafc);
            font-family: var(--ease-font-sans, system-ui, sans-serif);
            min-height: 200vh; /* Allow scrolling */
        }
        .hero {
            padding: 8rem 2rem;
            text-align: center;
        }
        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--ease-color-text);
        }
        .hero p {
            font-size: 1.25rem;
            color: var(--ease-color-muted);
            max-width: 600px;
            margin: 0 auto 3rem;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="ease-badge">New Component</div>
        <h1>Cookie Consent</h1>
        <p>A reusable, animated bottom banner for privacy notices and GDPR compliance.</p>
        <button class="ease-btn ease-btn-outline" onclick="resetBanner()">Reset Banner Visibility</button>
    </section>

    <!-- Cookie Banner -->
    <div class="ease-cookie-banner" id="cookie-banner">
        <div class="ease-cookie-banner-content">
            <p class="ease-cookie-banner-text">
                🍪 We use cookies to improve your experience and analyze our traffic. 
                By clicking "Accept All", you consent to our use of cookies. <a href="#" style="color: var(--ease-color-primary);">Learn More</a>
            </p>
            <div class="ease-cookie-banner-actions">
                <button class="ease-btn ease-btn-primary ease-btn-sm" onclick="dismissBanner()">Accept All</button>
                <button class="ease-btn ease-btn-ghost ease-btn-sm" onclick="dismissBanner()">Decline</button>
            </div>
        </div>
    </div>

    <script>
        function dismissBanner() {
            const banner = document.getElementById('cookie-banner');
            banner.classList.add('is-dismissed');
        }

        function resetBanner() {
            const banner = document.getElementById('cookie-banner');
            banner.classList.remove('is-dismissed');
            
            // Force re-animation
            banner.style.animation = 'none';
            banner.offsetHeight; /* trigger reflow */
            banner.style.animation = null;
        }
    </script>
</body>
</html>
