<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animated Chip Dismiss Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
      padding: 2rem;
    }

    .demo-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 320px;
    }

    h3 {
      margin: 0 0 0.75rem;
      font-size: 0.85rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="demo-card">
    <h3>Default Chips</h3>
    <div class="ease-chip-row">
      <span class="ease-chip">Design <button class="ease-chip-close" onclick="this.closest('.ease-chip').classList.add('is-dismissed')">×</button></span>
      <span class="ease-chip">Frontend <button class="ease-chip-close" onclick="this.closest('.ease-chip').classList.add('is-dismissed')">×</button></span>
    </div>
  </div>

  <div class="demo-card">
    <h3>Variants</h3>
    <div class="ease-chip-row">
      <span class="ease-chip ease-chip-gradient">Gradient <button class="ease-chip-close" onclick="this.closest('.ease-chip').classList.add('is-dismissed')">×</button></span>
      <span class="ease-chip ease-chip-neon">Neon <button class="ease-chip-close" onclick="this.closest('.ease-chip').classList.add('is-dismissed')">×</button></span>
      <span class="ease-chip ease-chip-success">Success <button class="ease-chip-close" onclick="this.closest('.ease-chip').classList.add('is-dismissed')">×</button></span>
      <span class="ease-chip ease-chip-danger">Danger <button class="ease-chip-close" onclick="this.closest('.ease-chip').classList.add('is-dismissed')">×</button></span>
    </div>
  </div>

</body>
</html>
