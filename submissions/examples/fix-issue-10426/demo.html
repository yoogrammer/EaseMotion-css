<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix #10426: Dynamic Loader Staggering</title>
    <link rel="stylesheet" href="../../css/easemotion.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 2rem; background: #0f0f18; color: #fff; }
        .controls { margin-top: 2rem; }
    </style>
</head>
<body>
    <h1>Dynamic Staggered Dots Loader</h1>
    <p>Demonstrating the new <code>--ease-loader-stagger</code> token.</p>

    <div class="ease-loader-dots" style="--ease-color-primary: #0ff;">
        <div class="ease-loader-dot"></div>
        <div class="ease-loader-dot"></div>
        <div class="ease-loader-dot"></div>
    </div>

    <div class="controls">
        <label for="staggerInput">Change Stagger Time (s):</label>
        <input type="number" id="staggerInput" value="0.2" step="0.1" min="0">
    </div>

    <script>
        document.getElementById('staggerInput').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--ease-loader-stagger', e.target.value + 's');
        });
    </script>
</body>
</html>
