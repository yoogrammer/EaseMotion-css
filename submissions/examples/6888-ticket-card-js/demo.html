<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Support Ticket Status Card Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard-canvas-js">
    <h1 class="dashboard-title-js">Helpdesk Ticket Board</h1>

    <div class="ticket-grid-js">

      <!-- Ticket 1: Open / Critical -->
      <div class="ticket-card-js priority-critical-js">
        <div class="ticket-header-js">
          <span class="ticket-id-js">#SUP-4821</span>
          <span class="status-badge-js status-open-js">Open</span>
        </div>
        <h3 class="ticket-title-js">Database Connection Timeout on Production Servers</h3>
        <div class="ticket-meta-js">
          <div class="meta-item-js"><strong>Priority:</strong> Critical</div>
          <div class="meta-item-js"><strong>Agent:</strong> Sarah Johnson</div>
        </div>
        <div class="progress-container-js">
          <div class="progress-bar-js" style="width: 25%"></div>
        </div>
        <div class="ticket-footer-js">
          <span>Updated 5m ago</span>
        </div>
      </div>

      <!-- Ticket 2: Resolved / Low -->
      <div class="ticket-card-js priority-low-js">
        <div class="ticket-header-js">
          <span class="ticket-id-js">#SUP-0985</span>
          <span class="status-badge-js status-resolved-js">Resolved</span>
        </div>
        <h3 class="ticket-title-js">Typography Alignment Error in Sidebar Menu Layout</h3>
        <div class="ticket-meta-js">
          <div class="meta-item-js"><strong>Priority:</strong> Low</div>
          <div class="meta-item-js"><strong>Agent:</strong> Emily Chen</div>
        </div>
        <div class="progress-container-js">
          <div class="progress-bar-js" style="width: 100%"></div>
        </div>
        <div class="ticket-footer-js">
          <span>Updated 1d ago</span>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
