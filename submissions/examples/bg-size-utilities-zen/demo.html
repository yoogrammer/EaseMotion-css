<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BG Size Utilities</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body { font-family: system-ui, sans-serif; max-width: 500px; margin: 2rem auto; padding: 1rem; background: #f8fafc; color: #1e293b; }
      h1 { font-size: 1.5rem; }
      p { color: #64748b; margin-bottom: 1.5rem; }
      .demo-grid { display: flex; gap: 1rem; flex-wrap: wrap; }
      .demo-card { flex: 1; min-width: 140px; }
      .demo-card code { display: block; margin-top: 0.25rem; font-size: 0.75rem; color: #6c63ff; font-family: monospace; text-align: center; }
      .box { width: 100%; height: 120px; border-radius: 8px; border: 1px solid #e2e8f0; background-image: linear-gradient(135deg, #6c63ff 25%, #a09af8 50%, #6c63ff 75%); background-repeat: no-repeat; }
    </style>
  </head>
  <body>
    <h1>BG Size Utilities</h1>
    <p>Control how background images fill their container.</p>
    <div class="demo-grid">
      <div><div class="box bg-cover"></div><code>.bg-cover</code></div>
      <div><div class="box bg-contain"></div><code>.bg-contain</code></div>
      <div><div class="box bg-auto"></div><code>.bg-auto</code></div>
    </div>
  </body>
</html>
