<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Typing Indicator Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="phone-frame">
    <div class="chat-header">
      <div class="avatar">👩</div>
      <div class="header-info">
        <div class="name">Sarah</div>
        <div class="status"><span class="online-dot"></span>Online</div>
      </div>
      <span style="font-size:1.3rem; opacity:0.8;">📞</span>
    </div>

    <div class="chat-body">
      <div class="timestamp">Today, 1:20 PM</div>
      <div class="chat-message sent">Hey! Are you there? 👋</div>
      <div class="chat-message">Yeah! Just a sec, typing my reply...</div>
      <div class="chat-message sent">Take your time 😊</div>
      <div class="chat-message">Sure! Let me think about it...</div>

      <!-- Typing Indicator -->
      <div class="typing-wrapper" id="typingWrapper">
        <div class="typing-avatar">S</div>
        <div class="chat-bubble">
          <div class="typing-indicator">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </div>

    <div class="toggle-bar">
      <input class="chat-input" type="text" placeholder="Type a message..." />
      <button class="send-btn">➤</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
