<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Code Block Demo (Pure CSS)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="ease-code-wrapper">
            <button class="ease-copy-btn" aria-label="Copy code">
                <span class="ease-copy-idle">Copy</span>
                <span class="ease-copy-active">Copied!</span>
            </button>
            <pre class="ease-code-block"><code>/* EaseMotion — Pure CSS State Example */
.ease-copy-btn:focus .ease-copy-idle {
  display: none;
}

.ease-copy-btn:focus .ease-copy-active {
  display: inline-block;
}</code></pre>
        </div>
    </div>
</body>
</html>
