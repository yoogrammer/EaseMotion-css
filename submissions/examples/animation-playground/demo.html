<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Playground</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>EaseMotion Animation Playground</h1>

  <div class="controls">
    <label>
      Animation
      <select id="animation">
        <option value="bounce">Bounce</option>
        <option value="fade">Fade</option>
        <option value="slide">Slide</option>
      </select>
    </label>

    <label>
      Duration
      <input id="duration" type="range" min="0.5" max="5" step="0.5" value="2">
    </label>

    <button id="restart">Restart Animation</button>
    <button id="copy">Copy Class</button>
  </div>

  <div id="preview" class="box bounce">
    Preview
  </div>

  <p id="output">ease-bounce duration-2</p>

  <script>
    const preview = document.getElementById('preview');
    const animation = document.getElementById('animation');
    const duration = document.getElementById('duration');
    const output = document.getElementById('output');

    function update() {
      preview.className = `box ${animation.value}`;
      preview.style.animationDuration = `${duration.value}s`;
      output.textContent =
        `ease-${animation.value} duration-${duration.value}`;
    }

    animation.addEventListener('change', update);
    duration.addEventListener('input', update);

    document.getElementById('restart').onclick = () => {
      preview.classList.remove(animation.value);
      void preview.offsetWidth;
      preview.classList.add(animation.value);
    };

    document.getElementById('copy').onclick = () => {
      navigator.clipboard.writeText(output.textContent);
    };

    update();
  </script>

</body>
</html>
