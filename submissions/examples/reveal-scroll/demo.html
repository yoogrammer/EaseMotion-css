<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-reveal — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      background: #6366f1;
      color: #fff;
    }
    .hero h1 { font-size: 2.5rem; font-weight: 800; }
    .hero p  { font-size: 1rem; opacity: 0.8; }
    .section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 4rem 2rem;
    }
    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem 3rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      font-weight: 600;
      font-size: 1rem;
      text-align: center;
      width: 260px;
    }
    .row { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>

  <div class="hero">
    <h1>ease-reveal</h1>
    <p>👇 Scroll down to see animations trigger</p>
  </div>

  <div class="section">
    <div class="section-title">Direction variants</div>
    <div class="card ease-reveal ease-reveal-up">Slide Up ↑</div>
    <div class="card ease-reveal ease-reveal-down">Slide Down ↓</div>
    <div class="card ease-reveal ease-reveal-left">Slide Left ←</div>
    <div class="card ease-reveal ease-reveal-right">Slide Right →</div>
    <div class="card ease-reveal ease-reveal-fade">Fade Only</div>
    <div class="card ease-reveal ease-reveal-zoom">Zoom In</div>
  </div>

  <div class="section">
    <div class="section-title">Speed variants</div>
    <div class="row">
      <div class="card ease-reveal ease-reveal-up ease-reveal-fast">Fast</div>
      <div class="card ease-reveal ease-reveal-up">Default</div>
      <div class="card ease-reveal ease-reveal-up ease-reveal-slow">Slow</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Staggered delay group</div>
    <div class="row">
      <div class="card ease-reveal ease-reveal-up ease-delay-100">100ms</div>
      <div class="card ease-reveal ease-reveal-up ease-delay-200">200ms</div>
      <div class="card ease-reveal ease-reveal-up ease-delay-300">300ms</div>
      <div class="card ease-reveal ease-reveal-up ease-delay-500">500ms</div>
    </div>
  </div>

</body>
</html>
