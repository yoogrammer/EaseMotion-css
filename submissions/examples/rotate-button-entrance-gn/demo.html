<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rotate Button Entrance – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
      background: #f5f5f5;
    }
    button {
      padding: 12px 28px;
      font-size: 1rem;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    h3 { color: #555; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <h3>Rotate Left Entrance</h3>
  <button class="rotate-entrance">Click Me</button>

  <h3>Rotate Right Entrance</h3>
  <button class="rotate-entrance-right">Click Me</button>

  <h3>Rotate Bounce Entrance</h3>
  <button class="rotate-entrance-bounce">Click Me</button>
</body>
</html>
