<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zero Trust Security Architecture</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Zero Trust Security Architecture</h1>
    <p class="subtitle">
        Never Trust • Always Verify
    </p>

    <div class="architecture">

        <div class="layer user">
            <span>👤</span>
            <h3>User Request</h3>
        </div>

        <div class="connector"></div>

        <div class="layer identity">
            <span>🪪</span>
            <h3>Identity Verification</h3>
        </div>

        <div class="connector"></div>

        <div class="layer device">
            <span>💻</span>
            <h3>Device Validation</h3>
        </div>

        <div class="connector"></div>

        <div class="layer policy">
            <span>📋</span>
            <h3>Policy Engine</h3>
        </div>

        <div class="connector"></div>

        <div class="layer access">
            <span>🔑</span>
            <h3>Access Decision</h3>
        </div>

        <div class="connector"></div>

        <div class="layer resource">
            <span>🛡️</span>
            <h3>Protected Resource</h3>
        </div>

    </div>

</div>

</body>
</html>
