<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-Only Animated Compass</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="compass-container">
        <div class="compass-body">
            <div class="compass-inner">
                <span class="direction north">N</span>
                <span class="direction east">E</span>
                <span class="direction south">S</span>
                <span class="direction west">W</span>
                
                <div class="needle-container">
                    <div class="needle"></div>
                    <div class="needle-center"></div>
                </div>
            </div>
        </div>
        <p class="finding-text">Finding North...</p>
    </div>
</body>
</html>
