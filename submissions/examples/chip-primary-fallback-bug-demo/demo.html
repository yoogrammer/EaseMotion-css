<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chip – Wrong primary fallback (#6366f1)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Bug: wrong primary fallback</h1>
  <p>Fallback is <code>#6366f1</code> (indigo-500) instead of <code>#6c63ff</code> (framework purple).</p>

  <div class="ease-chip-group">
    <input type="checkbox" id="ch1" checked />
    <label for="ch1" class="ease-chip">React</label>
    <input type="checkbox" id="ch2" />
    <label for="ch2" class="ease-chip">Vue</label>
    <input type="checkbox" id="ch3" />
    <label for="ch3" class="ease-chip">Svelte</label>
  </div>

  <hr />
  <h2>Fix</h2>
  <pre>var(--ease-color-primary, #6c63ff)  /* was #6366f1 */</pre>
</body>
</html>
