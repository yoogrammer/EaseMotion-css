<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logo Cloud — EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css@1.4.5/dist/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="display:flex;flex-direction:column;align-items:center;gap:var(--ease-space-10,40px);padding:var(--ease-space-8,32px);font-family:var(--ease-font-sans,system-ui,sans-serif);background:var(--ease-color-neutral-50,#f9fafb);margin:0;">

  <h1 style="font-size:1.5rem;font-weight:700;color:var(--ease-color-neutral-900,#111827);margin:0;">
    Logo Cloud
  </h1>

  <!-- Default -->
  <div style="width:100%;max-width:800px;">
    <div class="ease-logo-cloud-az --with-divider">
      <div class="ease-logo-cloud-label-az">Trusted by leading teams</div>
      <span class="ease-logo-item-az">AcmeCorp</span>
      <span class="ease-logo-item-az">TechFlow</span>
      <span class="ease-logo-item-az">DesignLab</span>
      <span class="ease-logo-item-az">CodeCraft</span>
      <span class="ease-logo-item-az">PixelGrid</span>
      <span class="ease-logo-item-az">NovaSystems</span>
    </div>
  </div>

  <!-- Compact with images -->
  <div style="width:100%;max-width:800px;">
    <div class="ease-logo-cloud-az --compact --with-divider">
      <div class="ease-logo-cloud-label-az">Our partners</div>
      <span class="ease-logo-item-az">
        <img class="ease-logo-img-az" src="https://via.placeholder.com/120x32/6b7280/ffffff?text=Acme" alt="Acme" />
      </span>
      <span class="ease-logo-item-az">
        <img class="ease-logo-img-az" src="https://via.placeholder.com/120x32/6b7280/ffffff?text=TechFlow" alt="TechFlow" />
      </span>
      <span class="ease-logo-item-az">
        <img class="ease-logo-img-az" src="https://via.placeholder.com/120x32/6b7280/ffffff?text=DesignLab" alt="DesignLab" />
      </span>
      <span class="ease-logo-item-az">
        <img class="ease-logo-img-az" src="https://via.placeholder.com/120x32/6b7280/ffffff?text=PixelGrid" alt="PixelGrid" />
      </span>
      <span class="ease-logo-item-az">
        <img class="ease-logo-img-az" src="https://via.placeholder.com/120x32/6b7280/ffffff?text=CodeCraft" alt="CodeCraft" />
      </span>
    </div>
  </div>

</body>
</html>
