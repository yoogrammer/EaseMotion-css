<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-hyphens-za</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      [data-ease-demo-za] {
        font-family: system-ui, sans-serif;
        max-width: 500px;
        margin: 2rem auto;
        padding: 1.5rem;
      }
      p {
        width: 180px;
        text-align: justify;
        border: 1px solid #e2e8f0;
        padding: 0.75rem;
        border-radius: 6px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div data-ease-demo-za>
      <h1>ease-hyphens-za</h1>
      <p><strong>ease-hyphens-auto-za:</strong></p>
      <p class="ease-hyphens-auto-za" lang="en">
        This is a very long paragraph that demonstrates automatic hyphenation in
        a narrow container to improve text flow and readability.
      </p>
      <p><strong>ease-hyphens-none-za:</strong></p>
      <p class="ease-hyphens-none-za" lang="en">
        This paragraph has no hyphenation so words may overflow or wrap
        awkwardly in narrow spaces.
      </p>
    </div>
  </body>
</html>
