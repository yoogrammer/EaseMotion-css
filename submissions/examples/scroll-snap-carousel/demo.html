<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll-Snap Carousel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Scroll-Snap Carousel</h1>
    <p>Horizontal scroll-snap carousel with dot indicators and arrow navigation</p>
  </header>

  <main>
    <div class="carousel-wrapper">
      <button class="arrow arrow-left" aria-label="Previous slide">&#8249;</button>

      <div class="carousel" id="carousel" role="listbox" aria-label="Image carousel" tabindex="0">
        <figure class="slide" role="option" aria-selected="true" data-index="0">
          <img src="https://picsum.photos/seed/slide1/800/500" alt="Mountain landscape" loading="lazy" width="800" height="500">
          <figcaption>Mountain Vista</figcaption>
        </figure>
        <figure class="slide" role="option" aria-selected="false" data-index="1">
          <img src="https://picsum.photos/seed/slide2/800/500" alt="Ocean sunset" loading="lazy" width="800" height="500">
          <figcaption>Ocean Sunset</figcaption>
        </figure>
        <figure class="slide" role="option" aria-selected="false" data-index="2">
          <img src="https://picsum.photos/seed/slide3/800/500" alt="Forest path" loading="lazy" width="800" height="500">
          <figcaption>Forest Path</figcaption>
        </figure>
        <figure class="slide" role="option" aria-selected="false" data-index="3">
          <img src="https://picsum.photos/seed/slide4/800/500" alt="City skyline" loading="lazy" width="800" height="500">
          <figcaption>City Skyline</figcaption>
        </figure>
        <figure class="slide" role="option" aria-selected="false" data-index="4">
          <img src="https://picsum.photos/seed/slide5/800/500" alt="Northern lights" loading="lazy" width="800" height="500">
          <figcaption>Northern Lights</figcaption>
        </figure>
      </div>

      <button class="arrow arrow-right" aria-label="Next slide">&#8250;</button>
    </div>

    <div class="dots" id="dots" role="tablist" aria-label="Slide indicators"></div>
  </main>

  <script>
    (function() {
      const carousel = document.getElementById('carousel');
      const slides = carousel.querySelectorAll('.slide');
      const dotsContainer = document.getElementById('dots');
      const leftBtn = document.querySelector('.arrow-left');
      const rightBtn = document.querySelector('.arrow-right');
      let currentIndex = 0;

      slides.forEach((_, i) => {
        const dot = document.createElement('button');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.setAttribute('role', 'tab');
        dot.setAttribute('aria-label', 'Slide ' + (i + 1));
        dot.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
        dot.addEventListener('click', () => goTo(i));
        dotsContainer.appendChild(dot);
      });

      function updateDots() {
        dotsContainer.querySelectorAll('.dot').forEach((dot, i) => {
          dot.classList.toggle('active', i === currentIndex);
          dot.setAttribute('aria-selected', i === currentIndex ? 'true' : 'false');
        });
        slides.forEach((slide, i) => {
          slide.setAttribute('aria-selected', i === currentIndex ? 'true' : 'false');
        });
      }

      function goTo(index) {
        const slide = slides[index];
        if (slide) {
          slide.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
          currentIndex = index;
          updateDots();
        }
      }

      function getVisibleIndex() {
        const containerRect = carousel.getBoundingClientRect();
        let closest = 0;
        let closestDist = Infinity;
        slides.forEach((slide, i) => {
          const rect = slide.getBoundingClientRect();
          const dist = Math.abs(rect.left - containerRect.left);
          if (dist < closestDist) {
            closestDist = dist;
            closest = i;
          }
        });
        return closest;
      }

      function onScroll() {
        const idx = getVisibleIndex();
        if (idx !== currentIndex) {
          currentIndex = idx;
          updateDots();
        }
      }

      carousel.addEventListener('scroll', onScroll, { passive: true });

      leftBtn.addEventListener('click', () => {
        const prev = Math.max(0, currentIndex - 1);
        goTo(prev);
      });

      rightBtn.addEventListener('click', () => {
        const next = Math.min(slides.length - 1, currentIndex + 1);
        goTo(next);
      });

      document.addEventListener('keydown', (e) => {
        if (document.activeElement === carousel || carousel.contains(document.activeElement)) {
          if (e.key === 'ArrowLeft') { e.preventDefault(); leftBtn.click(); }
          if (e.key === 'ArrowRight') { e.preventDefault(); rightBtn.click(); }
        }
      });
    })();
  </script>
</body>
</html>
