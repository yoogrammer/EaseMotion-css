<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Floating Label Input Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: Inter, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      min-height: 100vh;
      background: #f8fafc;
      padding: 2rem;
    }
    h2 { color: #7c3aed; }
    .demo-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }
    .demo-card h3 {
      margin: 0 0 1.5rem;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <h2>Floating Label Input</h2>

  <!-- Default -->
  <div class="demo-card">
    <h3>Default</h3>

    <div class="ease-floating-input">
      <input type="text" placeholder=" " id="name" />
      <label for="name">Full Name</label>
    </div>

    <div class="ease-floating-input">
      <input type="email" placeholder=" " id="email" />
      <label for="email">Email Address</label>
    </div>

    <div class="ease-floating-input">
      <input type="password" placeholder=" " id="password" />
      <label for="password">Password</label>
    </div>
  </div>

  <!-- Validation states -->
  <div class="demo-card">
    <h3>Validation States</h3>

    <div class="ease-floating-input ease-floating-input-success">
      <input type="email" placeholder=" " value="user@example.com" />
      <label>Email (Valid)</label>
      <p class="ease-floating-hint">Looks good!</p>
    </div>

    <div class="ease-floating-input ease-floating-input-error">
      <input type="password" placeholder=" " value="123" />
      <label>Password (Error)</label>
      <p class="ease-floating-hint">Password must be at least 8 characters.</p>
    </div>
  </div>

  <!-- Textarea -->
  <div class="demo-card">
    <h3>Textarea</h3>
    <div class="ease-floating-input">
      <textarea placeholder=" " rows="4" style="resize:vertical"></textarea>
      <label>Your Message</label>
    </div>
  </div>

</body>
</html>
