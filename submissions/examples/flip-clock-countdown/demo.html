<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flip Clock Countdown – EaseMotion CSS</title>
  <meta name="description" content="3D flip clock digits with CSS perspective and rotateX animation." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Flip Clock Countdown</h1>
  <p>Retro split-flap digit animation</p>

  <div class="clock" role="timer" aria-live="polite" aria-label="Countdown timer">
    <div class="digit-group">
      <div class="flip-card" id="minutes-tens"><span class="top">0</span><span class="bottom">0</span></div>
      <div class="flip-card" id="minutes-ones"><span class="top">5</span><span class="bottom">5</span></div>
    </div>
    <span class="colon">:</span>
    <div class="digit-group">
      <div class="flip-card" id="seconds-tens"><span class="top">0</span><span class="bottom">0</span></div>
      <div class="flip-card" id="seconds-ones"><span class="top">0</span><span class="bottom">0</span></div>
    </div>
  </div>

  <button class="reset-btn" id="resetBtn">Reset to 5:00</button>

  <script>
    const ids = ['minutes-tens','minutes-ones','seconds-tens','seconds-ones'];
    const cards = ids.map(id => document.getElementById(id));
    let total = 300;

    function pad(n) { return String(n).padStart(2, '0'); }

    function render() {
      const str = pad(Math.floor(total / 60)) + pad(total % 60);
      str.split('').forEach((d, i) => {
        const top = cards[i].querySelector('.top');
        const bottom = cards[i].querySelector('.bottom');
        if (top.textContent !== d) {
          cards[i].classList.add('flip');
          setTimeout(() => {
            top.textContent = bottom.textContent = d;
            cards[i].classList.remove('flip');
          }, 600);
        }
      });
    }

    setInterval(() => {
      if (total > 0) { total--; render(); }
    }, 1000);

    document.getElementById('resetBtn').addEventListener('click', () => {
      total = 300;
      ids.forEach((id, i) => {
        const d = pad(300).split('')[i] || '0';
        cards[i].querySelector('.top').textContent = d;
        cards[i].querySelector('.bottom').textContent = d;
      });
    });
  </script>
</body>
</html>
