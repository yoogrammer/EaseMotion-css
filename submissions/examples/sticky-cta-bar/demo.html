<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sticky CTA Bar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="content">
    <h1>Sticky CTA Bar</h1>
    <p>Scroll down to see the CTA bar appear at the bottom.</p>
    <div class="spacer"></div>
    <p>The bar sticks to the bottom once you scroll past the fold.</p>
    <div class="spacer"></div>
    <p>It stays visible until you scroll back to the top.</p>
    <div class="spacer"></div>
  </main>
  <div class="cta-bar" id="ctaBar">
    <span class="cta-text">Limited offer — 40% off</span>
    <button class="cta-btn">Get Started</button>
  </div>
  <script>
    const bar = document.getElementById("ctaBar");
    let shown = false;
    window.addEventListener("scroll", () => {
      if (window.scrollY > 400 && !shown) {
        bar.classList.add("visible");
        shown = true;
      } else if (window.scrollY <= 400 && shown) {
        bar.classList.remove("visible");
        shown = false;
      }
    }, { passive: true });
  </script>
</body>
</html>
