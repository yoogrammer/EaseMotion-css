<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible Tooltips Fix</title>
  <link rel="stylesheet" href="../../../core/base.css">
  <link rel="stylesheet" href="../../../core/utilities.css">
  <link rel="stylesheet" href="../../../components/tooltips.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-surface ease-text-primary" style="padding: 4rem; font-family: 'Inter', sans-serif;">
  <div style="max-width: 600px; margin: 0 auto;">
    <h1 style="color: #0f172a; margin-bottom: 1rem;">WCAG Accessible Tooltips</h1>
    <p style="color: #475569; margin-bottom: 3rem; line-height: 1.6;">
      This page demonstrates the <strong>JS Accessibility Patch</strong> for EaseMotion tooltips. 
      Without this script, screen readers cannot "see" the CSS-generated text. 
      <br><br>
      Try navigating to the badges below using your <strong>Tab</strong> key to see them receive focus!
    </p>

    <!-- Normal framework tooltips -->
    <div style="display: flex; gap: 2rem;">
      <span class="ease-tooltip" data-tooltip="This is now read by screen readers!" data-position="top" style="padding: 0.5rem 1rem; background: #e2e8f0; border-radius: 4px; font-weight: 600;">
        Hover Me (Top)
      </span>

      <span class="ease-tooltip" data-tooltip="Keyboard accessible via tabindex!" data-position="bottom" style="padding: 0.5rem 1rem; background: #e2e8f0; border-radius: 4px; font-weight: 600;">
        Hover Me (Bottom)
      </span>
    </div>
  </div>

  <!-- Include the accessibility patch script -->
  <script src="ease-tooltip-a11y.js"></script>
</body>
</html>
