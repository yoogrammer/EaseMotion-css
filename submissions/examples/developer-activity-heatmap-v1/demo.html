<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Developer Activity Heatmap – a GitHub-inspired contribution graph built with EaseMotion CSS.">
  <title>Developer Activity Heatmap | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-heatmap-wrapper">

  <main class="heatmap-preview">
    <div class="heatmap-card">

      <!-- Header -->
      <div class="heatmap-header">
        <h3 class="heatmap-title">Developer Activity</h3>
        <span class="heatmap-range">Last 30 Days</span>
      </div>

      <!-- Activity Grid (6 weeks × 7 days = 42 cells) -->
      <div class="heatmap-grid" role="img" aria-label="Activity heatmap showing contribution levels over 42 days">
        <!-- Week 1 -->
        <span class="cell level-0"></span>
        <span class="cell level-1"></span>
        <span class="cell level-0"></span>
        <span class="cell level-2"></span>
        <span class="cell level-1"></span>
        <span class="cell level-0"></span>
        <span class="cell level-0"></span>

        <!-- Week 2 -->
        <span class="cell level-1"></span>
        <span class="cell level-3"></span>
        <span class="cell level-2"></span>
        <span class="cell level-1"></span>
        <span class="cell level-4"></span>
        <span class="cell level-2"></span>
        <span class="cell level-0"></span>

        <!-- Week 3 -->
        <span class="cell level-0"></span>
        <span class="cell level-2"></span>
        <span class="cell level-4"></span>
        <span class="cell level-3"></span>
        <span class="cell level-2"></span>
        <span class="cell level-4"></span>
        <span class="cell level-1"></span>

        <!-- Week 4 -->
        <span class="cell level-1"></span>
        <span class="cell level-0"></span>
        <span class="cell level-3"></span>
        <span class="cell level-4"></span>
        <span class="cell level-3"></span>
        <span class="cell level-1"></span>
        <span class="cell level-0"></span>

        <!-- Week 5 -->
        <span class="cell level-2"></span>
        <span class="cell level-3"></span>
        <span class="cell level-1"></span>
        <span class="cell level-0"></span>
        <span class="cell level-2"></span>
        <span class="cell level-4"></span>
        <span class="cell level-3"></span>

        <!-- Week 6 -->
        <span class="cell level-0"></span>
        <span class="cell level-1"></span>
        <span class="cell level-3"></span>
        <span class="cell level-2"></span>
        <span class="cell level-0"></span>
        <span class="cell level-1"></span>
        <span class="cell level-0"></span>
      </div>

      <!-- Footer / Legend -->
      <div class="heatmap-footer">
        <span class="heatmap-label">Less</span>
        <div class="heatmap-legend" aria-label="Legend">
          <span class="cell level-0"></span>
          <span class="cell level-1"></span>
          <span class="cell level-2"></span>
          <span class="cell level-3"></span>
          <span class="cell level-4"></span>
        </div>
        <span class="heatmap-label">More</span>
      </div>

    </div>
  </main>

  </div>
</body>
</html>
