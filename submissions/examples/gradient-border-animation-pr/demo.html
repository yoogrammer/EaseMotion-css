<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gradient Border Animation Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
      padding: 2rem;
    }

    .gradient-border-card {
      width: 280px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .gradient-border-card h2 {
      margin: 0 0 0.5rem;
      font-size: 1.1rem;
      color: #333;
    }

    .gradient-border-card p {
      margin: 0;
      font-size: 0.85rem;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="gradient-border-card">
    <h2>Gradient Border</h2>
    <p>Animated glowing border effect.</p>
  </div>

</body>
</html>
