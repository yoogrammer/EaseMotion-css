<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Constellation Connect - Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <h1>Constellation Connect</h1>
  <p>Hover over the card to activate a futuristic star network.</p>
</div>

<div class="constellation-card">

  <!-- lines -->
  <span class="line l1"></span>
  <span class="line l2"></span>
  <span class="line l3"></span>
  <span class="line l4"></span>
  <span class="line l5"></span>

  <!-- stars -->
  <span class="star s1"></span>
  <span class="star s2"></span>
  <span class="star s3"></span>
  <span class="star s4"></span>
  <span class="star s5"></span>
  <span class="star s6"></span>

  <div class="content">
    <h2>AI Network</h2>
    <p>
      Hover to reveal a constellation-inspired neural connection system.
    </p>
  </div>

</div>

</body>
</html>
