<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-spider-crawl | CSS Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="web-line wl-1"></div>
    <div class="web-line wl-2"></div>
    <div class="web-line wl-3"></div>
    <div class="web-line wl-4"></div>
    <div class="web-line wl-5"></div>
    <div class="web-line wl-6"></div>
    <div class="spiral"></div>
    <div class="spiral spiral-2"></div>
    <div class="spiral spiral-3"></div>
    <div class="silk-line"></div>
    <div class="spider-body">
      <div class="spider-head">
        <div class="spider-eye spider-eye-l"></div>
        <div class="spider-eye spider-eye-r"></div>
      </div>
      <div class="leg-spider ls-1"></div>
      <div class="leg-spider ls-2"></div>
      <div class="leg-spider ls-3"></div>
      <div class="leg-spider ls-4"></div>
      <div class="leg-spider ls-5"></div>
      <div class="leg-spider ls-6"></div>
      <div class="leg-spider ls-7"></div>
      <div class="leg-spider ls-8"></div>
    </div>
  </div>
</body>
</html>
