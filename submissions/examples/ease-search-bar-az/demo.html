<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Bar Component Demo</title>

  <link rel="stylesheet" href="../../../core/variables.css" />
  <link rel="stylesheet" href="../../../core/base.css" />
  <link rel="stylesheet" href="../../../core/utilities.css" />
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      padding: var(--ease-space-8);
      background: var(--ease-color-surface);
      color: var(--ease-color-neutral-900);
      font-family: var(--ease-font-sans);
    }
    .demo-section {
      margin-bottom: var(--ease-space-8);
    }
    h1 { font-size: 1.75rem; margin-bottom: var(--ease-space-2); }
    h2 { font-size: 1.125rem; margin-bottom: var(--ease-space-3); margin-top: var(--ease-space-6); }
    .demo-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--ease-space-4);
      align-items: center;
    }
  </style>
</head>
<body>

  <h1>EaseMotion: <code class="ease-text-primary">ease-search-bar-az</code></h1>
  <p class="ease-text-muted ease-mb-8">An animated search bar with icon, clear button, focus glow, and size variants.</p>

  <div class="demo-section">
    <h2>Default</h2>
    <div class="demo-row">
      <div class="ease-search-bar-az">
        <span class="ease-search-bar-icon-az">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input class="ease-search-bar-input-az" type="search" placeholder="Search..." aria-label="Search">
        <button class="ease-search-bar-clear-az" aria-label="Clear search">&times;</button>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <h2>Rounded</h2>
    <div class="demo-row">
      <div class="ease-search-bar-az rounded">
        <span class="ease-search-bar-icon-az">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input class="ease-search-bar-input-az" type="search" placeholder="Search..." aria-label="Search">
        <button class="ease-search-bar-clear-az" aria-label="Clear search">&times;</button>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <h2>With Search Button</h2>
    <div class="demo-row">
      <div class="ease-search-bar-az with-button">
        <span class="ease-search-bar-icon-az">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input class="ease-search-bar-input-az" type="search" placeholder="Search..." aria-label="Search">
        <button class="ease-search-bar-clear-az" aria-label="Clear search">&times;</button>
        <button class="ease-search-bar-btn-az">Search</button>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <h2>Size Variants</h2>
    <div class="demo-row">
      <div class="ease-search-bar-az sm">
        <span class="ease-search-bar-icon-az">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input class="ease-search-bar-input-az" type="search" placeholder="Small..." aria-label="Small search">
        <button class="ease-search-bar-clear-az" aria-label="Clear search">&times;</button>
      </div>
      <div class="ease-search-bar-az">
        <span class="ease-search-bar-icon-az">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input class="ease-search-bar-input-az" type="search" placeholder="Default..." aria-label="Default search">
        <button class="ease-search-bar-clear-az" aria-label="Clear search">&times;</button>
      </div>
      <div class="ease-search-bar-az lg">
        <span class="ease-search-bar-icon-az">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input class="ease-search-bar-input-az" type="search" placeholder="Large..." aria-label="Large search">
        <button class="ease-search-bar-clear-az" aria-label="Clear search">&times;</button>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <h2>Expanded (full width)</h2>
    <div class="ease-search-bar-az expanded rounded">
      <span class="ease-search-bar-icon-az">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input class="ease-search-bar-input-az" type="search" placeholder="Full-width search bar..." aria-label="Full-width search">
      <button class="ease-search-bar-clear-az" aria-label="Clear search">&times;</button>
    </div>
  </div>

  <script>
    document.querySelectorAll('.ease-search-bar-clear-az').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = btn.closest('.ease-search-bar-az').querySelector('.ease-search-bar-input-az');
        input.value = '';
        input.focus();
      });
    });
  </script>

</body>
</html>
