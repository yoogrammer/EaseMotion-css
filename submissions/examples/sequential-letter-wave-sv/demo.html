<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sequential Letter Wave Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Sequential Letter Wave Animation</h1>

  <section>
    <h2>Default Wave</h2>

    <p class="wave-text">
      <span>H</span>
      <span>e</span>
      <span>l</span>
      <span>l</span>
      <span>o</span>
    </p>
  </section>

  <section>
    <h2>Fast Wave</h2>

    <p class="wave-text wave-text-fast">
      <span>L</span>
      <span>o</span>
      <span>a</span>
      <span>d</span>
      <span>i</span>
      <span>n</span>
      <span>g</span>
    </p>
  </section>

  <section>
    <h2>Slow Wave</h2>

    <p class="wave-text wave-text-slow">
      <span>W</span>
      <span>e</span>
      <span>l</span>
      <span>c</span>
      <span>o</span>
      <span>m</span>
      <span>e</span>
    </p>
  </section>

</body>
</html>
