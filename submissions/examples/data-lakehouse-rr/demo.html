<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Lakehouse Architecture</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Data Lakehouse Architecture</h1>

    <p class="subtitle">
        Unifying data lakes and data warehouses for analytics and AI workloads.
    </p>

    <div class="architecture">

        <div class="sources">

            <div class="node source">
                CRM System
            </div>

            <div class="node source">
                ERP Platform
            </div>

            <div class="node source">
                Web Applications
            </div>

        </div>

        <div class="connector"></div>

        <div class="node ingestion">
            Data Ingestion Layer
        </div>

        <div class="connector"></div>

        <div class="node lakehouse">
            Data Lakehouse Platform
        </div>

        <div class="connector"></div>

        <div class="outputs">

            <div class="node analytics">
                Analytics
            </div>

            <div class="node ml">
                Machine Learning
            </div>

            <div class="node bi">
                BI Dashboards
            </div>

        </div>

    </div>

</div>

</body>
</html>
