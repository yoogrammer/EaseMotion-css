<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-range-pr Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 4rem 2rem;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }
    
    .demo-section h2 {
      text-align: center;
      margin-bottom: 2rem;
      color: #1e293b;
    }
    
    .ranges-stack {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      width: 100%;
      max-width: 400px;
    }
  </style>
</head>
<body>

  <div class="demo-section">
    <h2>Volume Control</h2>
    <div class="ranges-stack">
      <div class="range-pr-wrapper">
        <div class="range-pr-header">
          <label class="range-pr-label" for="volume">Volume</label>
          <span class="range-pr-value" id="volumeValue">50%</span>
        </div>
        <input type="range" id="volume" class="range-pr" min="0" max="100" value="50" oninput="updateValue('volume', 'volumeValue', '%')">
        <div class="range-pr-footer">
          <span>0%</span>
          <span>100%</span>
        </div>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <h2>Brightness</h2>
    <div class="ranges-stack">
      <div class="range-pr-wrapper">
        <div class="range-pr-header">
          <label class="range-pr-label" for="brightness">Brightness</label>
          <span class="range-pr-value" id="brightnessValue">75%</span>
        </div>
        <input type="range" id="brightness" class="range-pr range-pr-warning" min="0" max="100" value="75" oninput="updateValue('brightness', 'brightnessValue', '%')">
        <div class="range-pr-footer">
          <span>Dim</span>
          <span>Bright</span>
        </div>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <h2>Price Range</h2>
    <div class="ranges-stack">
      <div class="range-pr-wrapper">
        <div class="range-pr-header">
          <label class="range-pr-label" for="price">Max Price</label>
          <span class="range-pr-value" id="priceValue">$500</span>
        </div>
        <input type="range" id="price" class="range-pr range-pr-success" min="0" max="1000" value="500" step="10" oninput="updateValue('price', 'priceValue', '$')">
        <div class="range-pr-footer">
          <span>$0</span>
          <span>$1000</span>
        </div>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <h2>Large Size</h2>
    <div class="ranges-stack">
      <div class="range-pr-wrapper">
        <div class="range-pr-header">
          <label class="range-pr-label" for="rating">Rating</label>
          <span class="range-pr-value" id="ratingValue">4.5</span>
        </div>
        <input type="range" id="rating" class="range-pr range-pr-lg range-pr-error" min="1" max="5" value="4.5" step="0.5" oninput="updateValue('rating', 'ratingValue', '')">
        <div class="range-pr-footer">
          <span>1</span>
          <span>5</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    function updateValue(inputId, valueId, prefix) {
      const input = document.getElementById(inputId);
      const value = document.getElementById(valueId);
      value.textContent = prefix + input.value;
    }
  </script>

</body>
</html>
