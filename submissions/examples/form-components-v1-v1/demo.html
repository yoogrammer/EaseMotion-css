<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Components — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Form Components</h1>
    <p class="subtitle">Text inputs, checkboxes, and toggle switches — pure CSS, animated, accessible.</p>

    <!-- ════════════ INPUTS ════════════ -->

    <h2 class="section-title">Text Inputs</h2>

    <div class="demo-card">
      <h3>Base Variants</h3>
      <div class="field-group">
        <div class="form-field">
          <label class="form-label" for="input-default">Default</label>
          <input class="input" id="input-default" type="text" placeholder="Placeholder text" />
        </div>
        <div class="form-field">
          <label class="form-label" for="input-outline">Outline</label>
          <input class="input input-outline" id="input-outline" type="text" placeholder="Outline style" />
        </div>
        <div class="form-field">
          <label class="form-label" for="input-filled">Filled</label>
          <input class="input input-filled" id="input-filled" type="text" placeholder="Filled style" />
        </div>
      </div>
    </div>

    <div class="demo-card">
      <h3>Validation States</h3>
      <div class="field-group">
        <div class="form-field">
          <label class="form-label" for="input-error">Error</label>
          <input class="input input-error" id="input-error" type="text" placeholder="Invalid value" value="bad input" />
          <span class="field-hint error">Please enter a valid value.</span>
        </div>
        <div class="form-field">
          <label class="form-label" for="input-success">Success</label>
          <input class="input input-success" id="input-success" type="text" placeholder="Valid value" value="good@example.com" />
          <span class="field-hint success">Looks good!</span>
        </div>
      </div>
    </div>

    <div class="demo-card">
      <h3>Floating Label</h3>
      <div class="field-row">
        <div class="float-field">
          <input class="input" id="float-name" type="text" placeholder=" " />
          <label class="float-label" for="float-name">Full Name</label>
        </div>
        <div class="float-field">
          <input class="input" id="float-email" type="email" placeholder=" " />
          <label class="float-label" for="float-email">Email Address</label>
        </div>
      </div>
    </div>

    <!-- ════════════ CHECKBOXES ════════════ -->

    <h2 class="section-title">Checkboxes</h2>

    <div class="demo-card">
      <h3>Color Variants</h3>
      <div class="field-group">
        <label class="check-group">
          <input type="checkbox" checked />
          <span class="check-box"></span>
          <span class="check-label">Primary (default)</span>
        </label>
        <label class="check-group">
          <input type="checkbox" checked />
          <span class="check-box check-success"></span>
          <span class="check-label">Success</span>
        </label>
        <label class="check-group">
          <input type="checkbox" checked />
          <span class="check-box check-danger"></span>
          <span class="check-label">Danger</span>
        </label>
        <label class="check-group">
          <input type="checkbox" />
          <span class="check-box"></span>
          <span class="check-label">Unchecked</span>
        </label>
      </div>
    </div>

    <!-- ════════════ TOGGLES ════════════ -->

    <h2 class="section-title">Toggle Switches</h2>

    <div class="demo-card">
      <h3>Color Variants</h3>
      <div class="field-group">
        <label class="toggle-group">
          <input type="checkbox" checked />
          <span class="toggle-track"></span>
          <span class="toggle-label">Primary (default)</span>
        </label>
        <label class="toggle-group toggle-success">
          <input type="checkbox" checked />
          <span class="toggle-track"></span>
          <span class="toggle-label">Success</span>
        </label>
        <label class="toggle-group toggle-danger">
          <input type="checkbox" checked />
          <span class="toggle-track"></span>
          <span class="toggle-label">Danger</span>
        </label>
        <label class="toggle-group">
          <input type="checkbox" />
          <span class="toggle-track"></span>
          <span class="toggle-label">Unchecked</span>
        </label>
      </div>
    </div>

  </div>
</body>
</html>
