<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Visual Animation Reference</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="gallery-header">
        <h1>✨ EaseMotion Animation Gallery</h1>
        <p>Preview and copy production-ready animation classes with one click.</p>
        
        <div class="controls">
            <input type="text" id="searchBar" placeholder="Search animations (e.g., fade, bounce)...">
            <div class="filter-buttons">
                <button class="filter-btn active" data-category="all">All</button>
                <button class="filter-btn" data-category="entrance">Entrance</button>
                <button class="filter-btn" data-category="exit">Exit</button>
                <button class="filter-btn" data-category="hover">Hover</button>
                <button class="filter-btn" data-category="attention">Attention</button>
            </div>
        </div>
    </header>

    <main class="gallery-grid" id="galleryGrid">
        <div class="card" data-category="entrance" data-name="fade-in">
            <div class="preview-area"><div class="box animate-fade-in">A</div></div>
            <div class="card-info">
                <h3>Fade In</h3>
                <code class="class-name">ease-fade-in</code>
            </div>
        </div>

        <div class="card" data-category="entrance" data-name="slide-up">
            <div class="preview-area"><div class="box animate-slide-up">B</div></div>
            <div class="card-info">
                <h3>Slide Up</h3>
                <code class="class-name">ease-slide-up</code>
            </div>
        </div>

        <div class="card" data-category="exit" data-name="fade-out">
            <div class="preview-area"><div class="box animate-fade-out">C</div></div>
            <div class="card-info">
                <h3>Fade Out</h3>
                <code class="class-name">ease-fade-out</code>
            </div>
        </div>

        <div class="card" data-category="hover" data-name="zoom-in">
            <div class="preview-area"><div class="box animate-zoom-in">D</div></div>
            <div class="card-info">
                <h3>Zoom In</h3>
                <code class="class-name">ease-zoom-in</code>
            </div>
        </div>

        <div class="card" data-category="attention" data-name="heartbeat">
            <div class="preview-area"><div class="box animate-heartbeat">E</div></div>
            <div class="card-info">
                <h3>Heartbeat</h3>
                <code class="class-name">ease-heartbeat</code>
            </div>
        </div>

        <div class="card" data-category="attention" data-name="bounce">
            <div class="preview-area"><div class="box animate-bounce">F</div></div>
            <div class="card-info">
                <h3>Bounce</h3>
                <code class="class-name">ease-bounce</code>
            </div>
        </div>
    </main>

    <script>
        const searchBar = document.getElementById('searchBar');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const cards = document.querySelectorAll('.card');

        // 1. Live Search & Category Filter Combo
        function filterGallery() {
            const searchText = searchBar.value.toLowerCase();
            const activeCategory = document.querySelector('.filter-btn.active').dataset.category;

            cards.forEach(card => {
                const matchesSearch = card.dataset.name.includes(searchText);
                const matchesCategory = activeCategory === 'all' || card.dataset.category === activeCategory;

                if (matchesSearch && matchesCategory) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        searchBar.addEventListener('input', filterGallery);

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.filter-btn.active').classList.remove('active');
                btn.classList.add('active');
                filterGallery();
            });
        });

        // 2. One-Click Copy functionality
        cards.forEach(card => {
            const codeEl = card.querySelector('.class-name');
            codeEl.addEventListener('click', () => {
                const classNameText = codeEl.textContent;
                navigator.clipboard.writeText(classNameText).then(() => {
                    const originalText = codeEl.textContent;
                    codeEl.textContent = "Copied! ✅";
                    codeEl.style.background = "#2e7d32";
                    setTimeout(() => {
                        codeEl.textContent = originalText;
                        codeEl.style.background = "#20232a";
                    }, 1200);
                });
            });
        });
    </script>
</body>
</html>
