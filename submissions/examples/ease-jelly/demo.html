<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-jelly | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      gap: 3rem;
      padding: 2rem;
    }

    h1 {
      color: #ffffff;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      opacity: 0.4;
      text-transform: uppercase;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2rem;
      align-items: center;
      justify-items: center;
    }

    /* --- CTA Buttons --- */
    .btn {
      padding: 0.8rem 1.8rem;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      color: white;
    }

    .btn-purple {
      background: linear-gradient(135deg, #7c6ef7, #a78bfa);
    }

    .btn-pink {
      background: linear-gradient(135deg, #ec4899, #f472b6);
    }

    .btn-green {
      background: linear-gradient(135deg, #22c55e, #4ade80);
    }

    .btn-orange {
      background: linear-gradient(135deg, #f97316, #fb923c);
    }

    /* --- Emoji Icons --- */
    .emoji-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      cursor: pointer;
    }

    .icon-purple { background: #1e1e3e; border: 2px solid #7c6ef7; }
    .icon-pink   { background: #2e1a2e; border: 2px solid #ec4899; }
    .icon-green  { background: #0f2e1a; border: 2px solid #22c55e; }
    .icon-orange { background: #2e1a0f; border: 2px solid #f97316; }

    /* --- Avatar Cards --- */
    .avatar-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      width: 130px;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
    }

    .avatar-name {
      color: #ffffff;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .avatar-role {
      color: #a0a0c0;
      font-size: 0.68rem;
    }

    /* --- Intensity Demo --- */
    .intensity-row {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    .intensity-btn {
      padding: 0.6rem 1.2rem;
      background: #1e1e2e;
      border: 2px solid #7c6ef7;
      border-radius: 8px;
      color: #a78bfa;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }

    .section-label {
      color: #ffffff20;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      align-self: flex-start;
      margin-bottom: -1.5rem;
    }

    .hint {
      color: #ffffff20;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

  <h1>ease-jelly — Hover anything</h1>

  <span class="section-label">Buttons</span>
  <div class="demo-grid">
    <button class="btn btn-purple jelly jelly-purple">✨ Get Started</button>
    <button class="btn btn-pink jelly jelly-pink">💖 Subscribe</button>
    <button class="btn btn-green jelly jelly-green">🚀 Launch</button>
    <button class="btn btn-orange jelly jelly-orange">🔥 Try Free</button>
  </div>

  <span class="section-label">Icons</span>
  <div class="demo-grid">
    <div class="emoji-icon icon-purple jelly jelly-purple">🔔</div>
    <div class="emoji-icon icon-pink   jelly jelly-pink">💌</div>
    <div class="emoji-icon icon-green  jelly jelly-green">🎯</div>
    <div class="emoji-icon icon-orange jelly jelly-orange">⚡</div>
  </div>

  <span class="section-label">Cards</span>
  <div class="demo-grid">
    <div class="avatar-card jelly jelly-purple">
      <div class="avatar" style="background:#1e1e3e">👩‍💻</div>
      <span class="avatar-name">Bhakti S.</span>
      <span class="avatar-role">Frontend Dev</span>
    </div>
    <div class="avatar-card jelly jelly-pink">
      <div class="avatar" style="background:#2e1a2e">🎨</div>
      <span class="avatar-name">Priya M.</span>
      <span class="avatar-role">UI Designer</span>
    </div>
    <div class="avatar-card jelly jelly-green">
      <div class="avatar" style="background:#0f2e1a">🧠</div>
      <span class="avatar-name">Arjun K.</span>
      <span class="avatar-role">ML Engineer</span>
    </div>
    <div class="avatar-card jelly jelly-orange">
      <div class="avatar" style="background:#2e1a0f">🚀</div>
      <span class="avatar-name">Rohan V.</span>
      <span class="avatar-role">DevOps</span>
    </div>
  </div>

  <span class="section-label">Intensity Variants</span>
  <div class="intensity-row">
    <button class="intensity-btn jelly jelly-soft jelly-purple">
      🌸 Soft
    </button>
    <button class="intensity-btn jelly jelly-medium jelly-purple">
      💜 Medium
    </button>
    <button class="intensity-btn jelly jelly-wild jelly-purple">
      🌀 Wild
    </button>
  </div>

  <p class="hint">↑ hover any element to trigger the jelly effect</p>

</body>
</html>
