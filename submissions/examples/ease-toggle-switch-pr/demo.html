<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pure CSS Animated Toggle Switch Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.25rem;
    }

    .demo-card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .demo-card h2 {
      margin: 0;
      font-size: 1.05rem;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="demo-card">
    <h2>Settings</h2>

    <label class="ease-toggle-wrapper">
      <input type="checkbox" class="ease-toggle-input" />
      <span class="ease-toggle-slider ease-bg-primary"></span>
      Enable Feature
    </label>

    <label class="ease-toggle-wrapper">
      <input type="checkbox" class="ease-toggle-input" checked />
      <span class="ease-toggle-slider ease-bg-primary"></span>
      Dark Mode
    </label>

    <label class="ease-toggle-wrapper">
      <input type="checkbox" class="ease-toggle-input" />
      <span class="ease-toggle-slider ease-bg-primary"></span>
      Email Notifications
    </label>
  </div>

</body>
</html>
