<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gradient-button-pr — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 3rem 1rem; max-width: 800px; margin: 0 auto; }
    .demo-section { margin-bottom: 3rem; }
    .demo-section h2 { margin-bottom: 1rem; color: #1e293b; }
    .button-group { display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; }
    .dark-bg { background: #1e293b; padding: 2rem; border-radius: 0.75rem; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1 class="ease-fade-in">gradient-button-pr Demo</h1>
  <p class="ease-slide-up ease-delay-100" style="color: #64748b; margin-bottom: 2rem;">Soft gradient buttons with smooth color shift on hover.</p>
  <section class="demo-section ease-slide-up ease-delay-200">
    <h2>Default States</h2>
    <div class="button-group">
      <button class="gradient-button-pr">Primary Gradient</button>
      <button class="gradient-button-pr" disabled>Disabled</button>
    </div>
  </section>
  <section class="demo-section ease-slide-up ease-delay-300">
    <h2>Sizes (with EaseMotion classes)</h2>
    <div class="button-group">
      <button class="gradient-button-pr ease-btn-sm">Small</button>
      <button class="gradient-button-pr">Default</button>
      <button class="gradient-button-pr ease-btn-lg">Large</button>
      <button class="gradient-button-pr ease-btn-lg ease-btn-pill">Pill Shape</button>
    </div>
  </section>
  <section class="demo-section ease-slide-up ease-delay-400">
    <h2>With Icons</h2>
    <div class="button-group">
      <button class="gradient-button-pr"><span>Get Started</span><span style="margin-left: 0.5rem;">→</span></button>
      <button class="gradient-button-pr"><span style="margin-right: 0.5rem;">✓</span><span>Confirm</span></button>
    </div>
  </section>
  <section class="demo-section ease-slide-up ease-delay-500">
    <h2>On Dark Background</h2>
    <div class="dark-bg">
      <div class="button-group">
        <button class="gradient-button-pr">Primary Gradient</button>
        <button class="gradient-button-pr" disabled>Disabled</button>
      </div>
    </div>
  </section>
  <section class="demo-section ease-slide-up ease-delay-600" style="background: #e0f2fe; padding: 1rem 1.5rem; border-radius: 0.75rem;">
    <p style="margin: 0; color: #0369a1; font-size: 0.875rem;"><strong>♿ Accessibility:</strong> Respects <code>prefers-reduced-motion</code>. Disabled state is clear. Focus ring for keyboard users.</p>
  </section>
</body>
</html>
