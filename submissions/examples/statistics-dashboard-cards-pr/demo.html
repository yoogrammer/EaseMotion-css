<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Statistics Dashboard Cards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

  <h1>Dashboard Overview</h1>

  <div class="stats-grid">


<div class="stat-card">
  <h3>Total Users</h3>
  <div class="value">12,540</div>
  <span class="positive">↑ 12% this month</span>
</div>

<div class="stat-card">
  <h3>Revenue</h3>
  <div class="value">$48,320</div>
  <span class="positive">↑ 8% this month</span>
</div>

<div class="stat-card">
  <h3>Projects</h3>
  <div class="value">156</div>
  <span class="positive">↑ 15 new projects</span>
</div>

<div class="stat-card">
  <h3>Conversion Rate</h3>
  <div class="value">4.8%</div>
  <span class="negative">↓ 0.3% this week</span>
</div>


  </div>

</section>

</body>
</html>
