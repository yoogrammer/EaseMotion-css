<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border Radius Utilities Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Border Radius Utilities</h1>
    <p>Utility classes for controlling corner radius.</p>

    <div class="grid">

        <div class="demo-card rounded-none">
            <h3>.rounded-none</h3>
        </div>

        <div class="demo-card rounded-sm">
            <h3>.rounded-sm</h3>
        </div>

        <div class="demo-card rounded">
            <h3>.rounded</h3>
        </div>

        <div class="demo-card rounded-lg">
            <h3>.rounded-lg</h3>
        </div>

        <div class="demo-card rounded-xl">
            <h3>.rounded-xl</h3>
        </div>

        <div class="demo-card rounded-full">
            <h3>.rounded-full</h3>
        </div>

    </div>

</div>

</body>
</html>
