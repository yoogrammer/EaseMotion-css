<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Step Progress Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Floating Step Progress Tracker</h1>

    <p class="subtitle">
        Hover over each step to reveal additional information.
    </p>

    <div class="tracker">

        <div class="step active">

            <div class="step-circle">1</div>

            <h3>Planning</h3>

            <div class="step-info">
                Define goals, requirements, and roadmap.
            </div>

        </div>

        <div class="step active">

            <div class="step-circle">2</div>

            <h3>Development</h3>

            <div class="step-info">
                Build core features and user experience.
            </div>

        </div>

        <div class="step">

            <div class="step-circle">3</div>

            <h3>Testing</h3>

            <div class="step-info">
                Verify functionality and fix issues.
            </div>

        </div>

        <div class="step">

            <div class="step-circle">4</div>

            <h3>Launch</h3>

            <div class="step-info">
                Deploy and monitor performance.
            </div>

        </div>

    </div>

</div>

</body>
</html>
