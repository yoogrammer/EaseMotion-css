<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corner Reveal Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Corner Reveal Animation Demo</h1>
<p>
  Lightweight CSS corner framing animation for cards, buttons and containers.
</p>

<div class="demo-grid">

  <div class="corner-reveal card">
    <h3>Feature Card</h3>
    <p>Animated corner framing effect.</p>
  </div>

  <button class="corner-reveal btn">
    Get Started
  </button>

  <div class="corner-reveal container-box">
    <h2>EaseMotion CSS</h2>
    <p>Animation-first CSS framework.</p>
  </div>

  <div class="corner-reveal corner-reveal-lg card">
    <h3>Large Corner Variant</h3>
    <p>Bigger reveal effect.</p>
  </div>

  <div class="corner-reveal corner-reveal-success card">
  <h3>Success Variant</h3>
  <p>Green corner reveal effect.</p>
</div>

</div>

</body>
</html>
