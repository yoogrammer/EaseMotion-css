<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing Card Toggle - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="pricing">
    <h1>Choose Your Plan</h1>
    <div class="pricing-toggle">
      <span class="pricing-toggle-label pricing-toggle-label--active" data-period="monthly">Monthly</span>
      <div class="pricing-switch" role="switch" tabindex="0" aria-checked="false">
        <div class="pricing-switch-knob"></div>
      </div>
      <span class="pricing-toggle-label" data-period="yearly">Yearly</span>
    </div>
    <div class="pricing-grid">
      <div class="pricing-card">
        <h2>Basic</h2>
        <div class="pricing-amount" data-monthly="9" data-yearly="90">$9</div>
        <p class="pricing-period">/month</p>
        <ul class="pricing-features">
          <li>1 Project</li>
          <li>Email Support</li>
          <li>Basic Analytics</li>
        </ul>
        <button class="pricing-btn">Get Started</button>
      </div>
      <div class="pricing-card pricing-card--featured">
        <div class="pricing-badge">Popular</div>
        <h2>Pro</h2>
        <div class="pricing-amount" data-monthly="19" data-yearly="190">$19</div>
        <p class="pricing-period">/month</p>
        <ul class="pricing-features">
          <li>10 Projects</li>
          <li>Priority Support</li>
          <li>Advanced Analytics</li>
        </ul>
        <button class="pricing-btn">Get Started</button>
      </div>
      <div class="pricing-card">
        <h2>Enterprise</h2>
        <div class="pricing-amount" data-monthly="49" data-yearly="490">$49</div>
        <p class="pricing-period">/month</p>
        <ul class="pricing-features">
          <li>Unlimited Projects</li>
          <li>24/7 Support</li>
          <li>Custom Reports</li>
        </ul>
        <button class="pricing-btn">Get Started</button>
      </div>
    </div>
  </div>
  <script>
    const toggle = document.querySelector('.pricing-switch');
    const labels = document.querySelectorAll('.pricing-toggle-label');
    const amounts = document.querySelectorAll('.pricing-amount');
    const period = document.querySelector('.pricing-period');
    let isYearly = false;
    toggle.addEventListener('click', () => {
      isYearly = !isYearly;
      toggle.setAttribute('aria-checked', isYearly);
      labels.forEach(l => l.classList.toggle('pricing-toggle-label--active', l.dataset.period === (isYearly ? 'yearly' : 'monthly')));
      amounts.forEach(a => {
        const val = isYearly ? a.dataset.yearly : a.dataset.monthly;
        a.textContent = '$' + val;
        a.classList.remove('pricing-amount--anim');
        void a.offsetWidth;
        a.classList.add('pricing-amount--anim');
      });
      period.textContent = isYearly ? '/year' : '/month';
    });
  </script>
</body>
</html>
