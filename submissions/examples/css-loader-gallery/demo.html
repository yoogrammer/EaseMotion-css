<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Loader Gallery — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>CSS Loader Gallery</h1>
  <p class="subtitle">A comprehensive gallery of pure CSS loaders and spinners.</p>
  <section class="demo"><h2>Spinners</h2><div class="grid"><div class="loader-card"><div class="spinner-border"></div><span>Border</span></div><div class="loader-card"><div class="spinner-dots"><span></span><span></span><span></span></div><span>Dots</span></div><div class="loader-card"><div class="spinner-ring"></div><span>Ring</span></div><div class="loader-card"><div class="spinner-ellipsis"><span></span><span></span><span></span><span></span></div><span>Ellipsis</span></div><div class="loader-card"><div class="spinner-hourglass"></div><span>Hourglass</span></div><div class="loader-card"><div class="spinner-pulse"></div><span>Pulse</span></div></div></section>
  <section class="demo"><h2>Progress Bars</h2><div class="grid"><div class="loader-card"><div class="bar-striped"></div><span>Striped</span></div><div class="loader-card"><div class="bar-indeterminate"></div><span>Indeterminate</span></div></div></section>
  <section class="docs"><h2>Usage</h2><pre><code>&lt;div class=&quot;spinner-border&quot;&gt;&lt;/div&gt;
&lt;div class=&quot;spinner-dots&quot;&gt;&lt;span&gt;&lt;/span&gt;...&lt;/div&gt;</code></pre></section>
</body>
</html>
