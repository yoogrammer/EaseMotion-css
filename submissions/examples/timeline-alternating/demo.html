<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alternating Timeline</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tl-wrap">
    <h2 class="tl-heading">Project Timeline</h2>
    <div class="tl-line"></div>
    <div class="tl-item tl-left">
      <div class="tl-dot"></div>
      <div class="tl-card">
        <span class="tl-date">Q1 2025</span>
        <h3 class="tl-title">Research & Ideation</h3>
        <p class="tl-desc">Market analysis, user interviews, and initial wireframes.</p>
      </div>
    </div>
    <div class="tl-item tl-right">
      <div class="tl-dot"></div>
      <div class="tl-card">
        <span class="tl-date">Q2 2025</span>
        <h3 class="tl-title">MVP Development</h3>
        <p class="tl-desc">Core features built, internal alpha testing.</p>
      </div>
    </div>
    <div class="tl-item tl-left">
      <div class="tl-dot"></div>
      <div class="tl-card">
        <span class="tl-date">Q3 2025</span>
        <h3 class="tl-title">Beta Launch</h3>
        <p class="tl-desc">Public beta with 500 invited users.</p>
      </div>
    </div>
    <div class="tl-item tl-right">
      <div class="tl-dot"></div>
      <div class="tl-card">
        <span class="tl-date">Q4 2025</span>
        <h3 class="tl-title">Full Release</h3>
        <p class="tl-desc">Version 1.0 available to all users.</p>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
