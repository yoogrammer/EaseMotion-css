<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Slide Button Entrance</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>Slide from Left & Right</h2>
    <button id="b1" class="btn slide-btn-left"
      style="background:#ede9ff; color:#6c63ff;">
      ← Slide from Left
    </button>
    <button id="b2" class="btn slide-btn-right"
      style="background:#ede9ff; color:#6c63ff;">
      Slide from Right →
    </button>
    <button class="replay-btn" onclick="replay(['b1','b2'],['slide-btn-left','slide-btn-right'])">
      ↺ Replay
    </button>
  </div>

  <div class="card">
    <h2>Slide from Top & Bottom</h2>
    <button id="b3" class="btn slide-btn-top"
      style="background:#e6faf3; color:#10b981;">
      ↑ Slide from Top
    </button>
    <button id="b4" class="btn slide-btn-bottom"
      style="background:#e6faf3; color:#10b981;">
      ↓ Slide from Bottom
    </button>
    <button class="replay-btn" style="background:#10b981;"
      onclick="replay(['b3','b4'],['slide-btn-top','slide-btn-bottom'])">
      ↺ Replay
    </button>
  </div>

  <script>
    function replay(ids, classes) {
      ids.forEach((id, i) => {
        const el = document.getElementById(id);
        el.classList.remove(classes[i]);
        void el.offsetWidth;
        el.classList.add(classes[i]);
      });
    }
  </script>

</body>
</html>
