<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-blur-in — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; }
    .row { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.5rem; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .card {
      width: 180px;
      height: 100px;
      border-radius: 12px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .reload {
      margin-top: 1rem;
      padding: 8px 20px;
      border-radius: 8px;
      border: 1px solid #333;
      background: transparent;
      color: #888;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .reload:hover { border-color: #666; color: #fff; }
  </style>
</head>
<body>

  <h1>ease-blur-in Demo</h1>

  <div class="section">
    <div class="label">Intensity variants</div>
    <div class="row">
      <div class="card ease-blur-in ease-blur-in-light">Light blur</div>
      <div class="card ease-blur-in">Default</div>
      <div class="card ease-blur-in ease-blur-in-heavy">Heavy blur</div>
    </div>
  </div>

  <div class="section">
    <div class="label">Speed variants</div>
    <div class="row">
      <div class="card ease-blur-in ease-blur-in-fast">Fast</div>
      <div class="card ease-blur-in">Default</div>
      <div class="card ease-blur-in ease-blur-in-slow">Slow</div>
    </div>
  </div>

  <div class="section">
    <div class="label">Staggered delay</div>
    <div class="row">
      <div class="card ease-blur-in ease-delay-100">100ms</div>
      <div class="card ease-blur-in ease-delay-200">200ms</div>
      <div class="card ease-blur-in ease-delay-300">300ms</div>
      <div class="card ease-blur-in ease-delay-500">500ms</div>
    </div>
  </div>

  <div class="section">
    <div class="label">Loop/pulse variant</div>
    <div class="row">
      <div class="card ease-blur-in-loop" style="color:#6366f1;">Pulsing</div>
    </div>
  </div>

  <button class="reload" onclick="location.reload()">↺ Replay animations</button>

</body>
</html>
