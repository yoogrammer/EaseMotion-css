<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-split-text</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1 class="split-title">
      <span class="char c1">S</span><span class="char c2">p</span><span class="char c3">l</span><span class="char c4">i</span><span class="char c5">t</span>
      <span class="space"></span>
      <span class="char c6">T</span><span class="char c7">e</span><span class="char c8">x</span><span class="char c9">t</span>
    </h1>
    <div class="split-lines">
      <p class="line l1">Each character</p>
      <p class="line l2">fades and slides</p>
      <p class="line l3">into view</p>
    </div>
  </div>
</body>
</html>
