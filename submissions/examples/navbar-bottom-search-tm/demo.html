<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Navbar Bottom and Search - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-spacer">
    <h1>Navbar — Bottom and Search</h1>
    <p class="description">
      Self-contained demo. The bottom variant is fixed to the
      viewport bottom; the search variant is at the top with a
      prominent input.
    </p>
  </div>

  <nav class="ease-navbar-glass ease-navbar-search">
    <span class="ease-navbar-brand">Brand</span>
    <input class="ease-input ease-navbar-search-input" placeholder="Search...">
    <div class="ease-navbar-menu">
      <a class="ease-navbar-item" href="#">Profile</a>
    </div>
  </nav>

  <nav class="ease-navbar-glass ease-navbar-bottom">
    <a class="ease-navbar-item" href="#">Home</a>
    <a class="ease-navbar-item" href="#">Search</a>
    <a class="ease-navbar-item" href="#">Profile</a>
  </nav>

</body>
</html>
