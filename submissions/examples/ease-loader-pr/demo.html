<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-loader-pr Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 4rem 2rem;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4rem;
    }
    
    .demo-section {
      text-align: center;
    }
    
    .demo-section h2 {
      margin-bottom: 1.5rem;
      color: #1e293b;
    }
    
    /* Standalone loader */
    .loader-standalone {
      --loader-color: #3b82f6;
    }
    
    /* Loader inside a button */
    .demo-button {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 2rem;
      background: #1e293b;
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
    }
    
    .demo-button .loader-pr .dot {
      width: 0.5rem;
      height: 0.5rem;
      background: white;
    }
    
    /* Custom color loader */
    .loader-custom {
      --loader-color: #f97316;
    }
  </style>
</head>
<body>

  <div class="demo-section">
    <h2>Standalone Loader</h2>
    <div class="loader-pr loader-standalone">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <div class="demo-section">
    <h2>Loader Inside Button</h2>
    <button class="demo-button">
      <span>Loading</span>
      <div class="loader-pr">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </button>
  </div>

  <div class="demo-section">
    <h2>Custom Color Loader</h2>
    <div class="loader-pr loader-custom">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

</body>
</html>
