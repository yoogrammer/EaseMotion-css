<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Behavior — Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,sans-serif;background:#f5f5f5;padding:2rem}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem;max-width:700px;margin:0 auto}
    .card{background:#fff;border-radius:12px;padding:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.08)}
    .card h3{font-size:.8rem;text-transform:uppercase;color:#888;margin-bottom:.75rem}
    .scroll-box{height:120px;overflow-y:scroll;border:1px solid #e0e0e0;border-radius:6px;padding:.5rem;margin-bottom:.5rem}
    .scroll-box p{line-height:1.6;font-size:.85rem;color:#333}
    .scroll-box p:not(:last-child){margin-bottom:.5rem}
    .tag{display:inline-block;margin-top:.5rem;font-family:monospace;font-size:.8rem;color:#666;background:#f0f0f0;padding:.25rem .5rem;border-radius:4px}
  </style>
</head>
<body>
  <div class="grid">
    <div class="card">
      <h3>Smooth</h3>
      <div class="scroll-box scroll-smooth">
        <p><a href="#smooth-bottom">Jump to bottom ↓</a></p>
        <p style="margin-top:400px" id="smooth-bottom"><a href="#">Jump to top ↑</a></p>
      </div>
      <span class="tag">.scroll-smooth</span>
    </div>
    <div class="card">
      <h3>Auto</h3>
      <div class="scroll-box scroll-auto">
        <p><a href="#auto-bottom">Jump to bottom ↓</a></p>
        <p style="margin-top:400px" id="auto-bottom"><a href="#">Jump to top ↑</a></p>
      </div>
      <span class="tag">.scroll-auto</span>
    </div>
  </div>
</body>
</html>
