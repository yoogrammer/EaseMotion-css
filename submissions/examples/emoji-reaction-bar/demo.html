<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Emoji Reaction Bar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo-container">
    <section class="card">
      <h1>Animated Emoji Reaction Bar</h1>
      <p>Hover over each reaction to see a smooth bounce animation and tooltip.</p>

      <div class="reaction-bar" aria-label="Emoji reaction bar">
        <button class="reaction" data-label="Like" aria-label="Like">👍</button>
        <button class="reaction" data-label="Love" aria-label="Love">❤️</button>
        <button class="reaction" data-label="Laugh" aria-label="Laugh">😂</button>
        <button class="reaction" data-label="Celebrate" aria-label="Celebrate">🎉</button>
        <button class="reaction" data-label="Wow" aria-label="Wow">😮</button>
      </div>
    </section>
  </main>
</body>
</html>
