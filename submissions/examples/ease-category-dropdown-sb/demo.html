<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Animated Category Dropdown - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dropdown-wrapper-sb">
    <label class="dropdown-label-sb">Filter Animations</label>
    
    <!-- CSS-only Custom Dropdown Using Native Select with Overridden Themes -->
    <div class="ease-dropdown-select-container-sb">
      <select class="ease-dropdown-select-sb" required>
        <option value="all" selected>✨ All Categories</option>
        <option value="fades">✨ Fade Transitions</option>
        <option value="slides">✨ Slide Animations</option>
        <option value="zooms">✨ Zoom Interactions</option>
        <option value="bounces">✨ Bounce Effects</option>
      </select>
      
      <!-- Custom Styled Dropdown Chevron Arrow -->
      <span class="dropdown-arrow-sb">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </span>
    </div>
  </div>

</body>
</html>
