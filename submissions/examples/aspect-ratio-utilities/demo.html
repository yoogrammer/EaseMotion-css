<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aspect Ratio Utilities Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo-page">
    <section class="demo-header">
      <h1>Aspect Ratio Utilities</h1>
      <p>
        Simple utility classes for common layout ratios using the native CSS
        <code>aspect-ratio</code> property.
      </p>
    </section>

    <section class="demo-grid" aria-label="Aspect ratio utility examples">
      <article class="demo-card">
        <div class="demo-box ease-aspect-square">
          <span>1:1</span>
        </div>
        <h2>Square</h2>
        <p><code>.ease-aspect-square</code></p>
      </article>

      <article class="demo-card">
        <div class="demo-box ease-aspect-video">
          <span>16:9</span>
        </div>
        <h2>Video</h2>
        <p><code>.ease-aspect-video</code></p>
      </article>

      <article class="demo-card">
        <div class="demo-box ease-aspect-portrait">
          <span>3:4</span>
        </div>
        <h2>Portrait</h2>
        <p><code>.ease-aspect-portrait</code></p>
      </article>
    </section>
  </main>
</body>
</html>
