<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Background Particles</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="particle-bg">
    <canvas id="particleCanvas"></canvas>
    <div class="ease-flex ease-center" style="min-height: 100vh; position: relative; z-index: 1;">
      <div style="text-align: center; color: #ffffff; padding: 2rem;">
        <h1 style="font-size: 1.8rem; margin: 0 0 0.5rem; font-weight: 600;">Particle Background</h1>
        <p style="font-size: 0.9rem; color: #cbd5e1; margin: 0;">Floating particles with mouse interaction</p>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
