<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Floating Label Input</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>Default — Click to see float</h2>

    <div class="floating-input">
      <input type="text" id="name" required />
      <label for="name">Name</label>
    </div>

    <div class="floating-input">
      <input type="email" id="email" required />
      <label for="email">Email Address</label>
    </div>

    <div class="floating-input">
      <input type="password" id="pwd" required />
      <label for="pwd">Password</label>
    </div>
  </div>

  <div class="card">
    <h2>Color Variants</h2>

    <div class="floating-input green">
      <input type="text" id="f1" required />
      <label for="f1">First Name</label>
    </div>

    <div class="floating-input orange">
      <input type="text" id="f2" required />
      <label for="f2">Company</label>
    </div>
  </div>

  <div class="card">
    <h2>States</h2>

    <div class="floating-input error">
      <input type="email" id="f3" value="invalid" required />
      <label for="f3">Email</label>
      <span class="error-msg">Please enter a valid email address</span>
    </div>

    <div class="floating-input success">
      <input type="text" id="f4" value="John Doe" required />
      <label for="f4">Full Name</label>
    </div>
  </div>

</body>
</html>
