<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shake Image Utility Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
    }

    .demo-box {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 280px;
    }

    .demo-box h3 { margin: 0 0 1rem; font-size: 1rem; color: #444; }

    .img-placeholder {
      width: 120px;
      height: 120px;
      border-radius: 12px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
    }

    p { color: #666; font-size: 0.85rem; margin-top: 0.5rem; }
  </style>
</head>
<body>

  <div class="demo-box">
    <h3>Click Trigger</h3>
    <div class="shake-image-click img-placeholder" style="background:#6366f1;">IMG</div>
    <p>Click the image to shake</p>
  </div>

  <div class="demo-box">
    <h3>Hover Trigger</h3>
    <div class="shake-image-hover img-placeholder" style="background:#10b981;">IMG</div>
    <p>Hover over image to shake</p>
  </div>

</body>
</html>
