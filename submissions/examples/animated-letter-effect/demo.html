<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swishy — Logo Reveal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="stage">
    <div id="word"></div>
    <span id="cursor">_</span>
  </div>

  <button id="replay" aria-label="Replay animation">↺ replay</button>

  <script>
    // ─────────────────────────────────────────────
    //  CONFIG — tweak everything here
    // ─────────────────────────────────────────────
    const CONFIG = {
      word: 'easeMotion-css',

      // Scramble characters — pulled from code / terminal symbol set
      glyphs: ';\\/:[]{}#~^=.|_><@$%&!?ā',

      // How many frames each char scrambles before locking (at 60fps equivalent)
      scrambleFrames: 14,       // ~233ms of scrambling per character

      // Delay between each character starting its scramble (ms)
      charStagger: 90,

      // Initial black hold before anything appears (ms)
      initialDelay: 280,

      // How fast each individual glyph swap happens (ms)
      swapInterval: 38,
    };

    // ─────────────────────────────────────────────
    //  DOM REFS
    // ─────────────────────────────────────────────
    const wordEl   = document.getElementById('word');
    const cursorEl = document.getElementById('cursor');
    const replayEl = document.getElementById('replay');

    // ─────────────────────────────────────────────
    //  HELPERS
    // ─────────────────────────────────────────────
    const randomGlyph = () =>
      CONFIG.glyphs[Math.floor(Math.random() * CONFIG.glyphs.length)];

    // ─────────────────────────────────────────────
    //  BUILD CHARACTER SPANS
    // ─────────────────────────────────────────────
    function buildWord() {
      wordEl.innerHTML = '';
      cursorEl.classList.remove('visible');
      replayEl.classList.remove('visible');

      [...CONFIG.word].forEach((letter, i) => {
        const span = document.createElement('span');
        span.classList.add('char');
        span.dataset.final = letter;
        span.textContent = letter;  // placeholder (hidden via opacity)
        span.id = `char-${i}`;
        wordEl.appendChild(span);
      });
    }

    // ─────────────────────────────────────────────
    //  SCRAMBLE ONE CHARACTER THEN LOCK IT
    // ─────────────────────────────────────────────
    function scrambleChar(span, finalChar) {
      return new Promise(resolve => {
        let frame = 0;
        const total = CONFIG.scrambleFrames;

        span.classList.add('scrambling');

        const tick = setInterval(() => {
          if (frame >= total) {
            clearInterval(tick);
            span.textContent = finalChar;
            span.classList.remove('scrambling');
            span.classList.add('locked');
            resolve();
          } else {
            span.textContent = randomGlyph();
            frame++;
          }
        }, CONFIG.swapInterval);
      });
    }

    // ─────────────────────────────────────────────
    //  RUN THE FULL REVEAL SEQUENCE
    // ─────────────────────────────────────────────
    function runReveal() {
      buildWord();

      const chars = [...wordEl.querySelectorAll('.char')];

      // Stagger each character's scramble start
      chars.forEach((span, i) => {
        const delay = CONFIG.initialDelay + i * CONFIG.charStagger;
        setTimeout(() => {
          scrambleChar(span, span.dataset.final);
        }, delay);
      });

      // Show cursor after last character locks
      const lastCharDelay =
        CONFIG.initialDelay +
        (chars.length - 1) * CONFIG.charStagger +
        CONFIG.scrambleFrames * CONFIG.swapInterval +
        80;

      setTimeout(() => {
        cursorEl.classList.add('visible');

        // Show replay button shortly after
        setTimeout(() => {
          replayEl.classList.add('visible');
        }, 600);

      }, lastCharDelay);
    }

    // ─────────────────────────────────────────────
    //  REPLAY
    // ─────────────────────────────────────────────
    replayEl.addEventListener('click', () => {
      replayEl.classList.remove('visible');
      runReveal();
    });

    // ─────────────────────────────────────────────
    //  KICK OFF
    // ─────────────────────────────────────────────
    runReveal();
  </script>

</body>
</html>
