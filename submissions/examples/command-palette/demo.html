<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Palette</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Command Palette</h1>

    <p class="subtitle">
        A VS Code inspired command palette component.
    </p>

    <div class="palette">

        <div class="search-bar">
            🔍 Search commands...
        </div>

        <div class="command-list">

            <div class="command-item">
                <span>Open File</span>
                <kbd>⌘P</kbd>
            </div>

            <div class="command-item">
                <span>Settings</span>
                <kbd>⌘,</kbd>
            </div>

            <div class="command-item">
                <span>Extensions</span>
                <kbd>⌘⇧X</kbd>
            </div>

            <div class="command-item">
                <span>Terminal</span>
                <kbd>⌃`</kbd>
            </div>

            <div class="command-item">
                <span>Git History</span>
                <kbd>⌘H</kbd>
            </div>

        </div>

    </div>

</div>

</body>
</html>
