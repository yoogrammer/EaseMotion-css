<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Agent Collaboration Architecture</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Multi-Agent Collaboration Architecture</h1>

    <p class="subtitle">
        Visualizing collaboration between specialized AI agents.
    </p>

    <div class="workflow">

        <div class="node user">
            👤 User Request
        </div>

        <div class="connector"></div>

        <div class="node orchestrator">
            🎯 Orchestrator Agent
        </div>

        <div class="connector"></div>

        <div class="agents">

            <div class="node planner">
                📝 Planner Agent
            </div>

            <div class="node research">
                🔍 Research Agent
            </div>

            <div class="node coder">
                💻 Coding Agent
            </div>

        </div>

        <div class="connector"></div>

        <div class="node reviewer">
            ✅ Reviewer Agent
        </div>

        <div class="connector"></div>

        <div class="node output">
            🚀 Final Output
        </div>

    </div>

</div>

</body>
</html>
