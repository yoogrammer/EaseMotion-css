<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flip Button Exit — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Flip Button Exit</h1>
    <p class="subtitle">
      Click any button to trigger a 3D flip-away exit animation —<br />
      rotates on the Y-axis with perspective depth.
    </p>

    <div class="button-grid">
      <button class="flip-btn" data-btn="primary">
        Submit &rarr;
      </button>
      <button class="flip-btn btn-success" data-btn="success">
        Approve &checkmark;
      </button>
      <button class="flip-btn btn-danger" data-btn="danger">
        Delete &times;
      </button>
      <button class="flip-btn btn-amber" data-btn="amber">
        Cancel &olarr;
      </button>
    </div>

    <button id="resetAll" class="reset-btn hidden">Reset All &crarr;</button>
  </div>

  <script>
    const btns = document.querySelectorAll('.flip-btn');
    const resetBtn = document.getElementById('resetAll');

    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        btn.classList.add('exit-active');
        setTimeout(() => {
          resetBtn.classList.remove('hidden');
        }, 350);
      });
    });

    resetBtn.addEventListener('click', () => {
      btns.forEach(btn => btn.classList.remove('exit-active'));
      resetBtn.classList.add('hidden');
    });
  </script>
</body>
</html>
