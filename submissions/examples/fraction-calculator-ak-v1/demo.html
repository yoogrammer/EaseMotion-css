<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fraction Calculator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator-wrapper">
    <h1>Fraction Calculator</h1>
    <div class="input-section">
      <div class="fraction-inputs">
        <div class="fraction-group">
          <div class="fraction-label">Fraction 1</div>
          <div class="fraction">
            <input type="number" id="num1" class="input fraction-input" value="3" min="-9999" step="1">
            <span class="fraction-bar"></span>
            <input type="number" id="den1" class="input fraction-input" value="4" min="1" step="1">
          </div>
        </div>
        <div class="operation-selector">
          <button class="op-btn active" data-op="add">+</button>
          <button class="op-btn" data-op="sub">−</button>
          <button class="op-btn" data-op="mul">×</button>
          <button class="op-btn" data-op="div">÷</button>
        </div>
        <div class="fraction-group">
          <div class="fraction-label">Fraction 2</div>
          <div class="fraction">
            <input type="number" id="num2" class="input fraction-input" value="1" min="-9999" step="1">
            <span class="fraction-bar"></span>
            <input type="number" id="den2" class="input fraction-input" value="2" min="1" step="1">
          </div>
        </div>
      </div>
    </div>
    <div class="results">
      <div class="result-row">
        <span>Result (Fraction)</span>
        <span id="resultFraction">¾</span>
      </div>
      <div class="result-row">
        <span>Result (Decimal)</span>
        <span id="resultDecimal">0.75</span>
      </div>
      <div class="result-row">
        <span>Mixed Number</span>
        <span id="resultMixed">¾</span>
      </div>
    </div>
    <div class="steps-section" id="stepsSection">
      <div class="comparison-header">Step-by-Step</div>
      <div id="stepsContent" class="steps-content"></div>
    </div>
  </div>
  <script>
    const num1 = document.getElementById('num1');
    const den1 = document.getElementById('den1');
    const num2 = document.getElementById('num2');
    const den2 = document.getElementById('den2');
    const resultFraction = document.getElementById('resultFraction');
    const resultDecimal = document.getElementById('resultDecimal');
    const resultMixed = document.getElementById('resultMixed');
    const stepsContent = document.getElementById('stepsContent');
    const opBtns = document.querySelectorAll('.op-btn');
    let operation = 'add';

    opBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        opBtns.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        operation = this.dataset.op;
        calculate();
      });
    });

    function gcd(a, b) {
      a = Math.abs(a);
      b = Math.abs(b);
      while (b) { const t = b; b = a % b; a = t; }
      return a;
    }

    function simplify(n, d) {
      if (d === 0) return { n: 0, d: 1 };
      if (n === 0) return { n: 0, d: 1 };
      const g = gcd(n, d);
      return { n: n / g, d: d / g };
    }

    function fmtMixed(n, d) {
      if (d === 0) return 'undefined';
      if (n === 0) return '0';
      const whole = Math.floor(Math.abs(n) / d);
      const rem = Math.abs(n) % d;
      const sign = n < 0 ? '-' : '';
      if (rem === 0) return sign + whole;
      const s = simplify(rem, d);
      if (whole === 0) return sign + s.n + '/' + s.d;
      return sign + whole + ' ' + s.n + '/' + s.d;
    }

    function fmtFrac(n, d) {
      if (d === 0) return 'undefined';
      if (n === 0) return '0';
      const s = simplify(n, d);
      return s.n + '/' + s.d;
    }

    function calculate() {
      const a = parseInt(num1.value) || 0;
      const b = parseInt(den1.value) || 1;
      const c = parseInt(num2.value) || 0;
      const d = parseInt(den2.value) || 1;

      let rn, rd, steps = [];

      steps.push('Step 1: Fractions: ' + a + '/' + b + ' and ' + c + '/' + d);

      if (operation === 'add') {
        rn = a * d + c * b;
        rd = b * d;
        steps.push('Step 2: Cross-multiply and add: (' + a + ' × ' + d + ') + (' + c + ' × ' + b + ') / (' + b + ' × ' + d + ')');
        steps.push('Step 3: = ' + (a*d + c*b) + '/' + (b*d));
      } else if (operation === 'sub') {
        rn = a * d - c * b;
        rd = b * d;
        steps.push('Step 2: Cross-multiply and subtract: (' + a + ' × ' + d + ') − (' + c + ' × ' + b + ') / (' + b + ' × ' + d + ')');
        steps.push('Step 3: = ' + (a*d - c*b) + '/' + (b*d));
      } else if (operation === 'mul') {
        rn = a * c;
        rd = b * d;
        steps.push('Step 2: Multiply numerators and denominators: (' + a + ' × ' + c + ') / (' + b + ' × ' + d + ')');
        steps.push('Step 3: = ' + (a*c) + '/' + (b*d));
      } else {
        rn = a * d;
        rd = b * c;
        steps.push('Step 2: Invert second fraction and multiply: (' + a + ' × ' + d + ') / (' + b + ' × ' + c + ')');
        steps.push('Step 3: = ' + (a*d) + '/' + (b*c));
      }

      const simplified = simplify(rn, rd);
      steps.push('Step 4: Simplify: GCD = ' + gcd(Math.abs(rn), Math.abs(rd)) + ', Result = ' + simplified.n + '/' + simplified.d);

      resultFraction.textContent = fmtFrac(rn, rd);
      resultDecimal.textContent = rd !== 0 ? (rn / rd).toFixed(6) : 'undefined';
      resultMixed.textContent = fmtMixed(rn, rd);

      stepsContent.innerHTML = steps.map(s => '<div class="step-line">' + s + '</div>').join('');
    }

    num1.addEventListener('input', calculate);
    den1.addEventListener('input', calculate);
    num2.addEventListener('input', calculate);
    den2.addEventListener('input', calculate);
    calculate();
  </script>
</body>
</html>
