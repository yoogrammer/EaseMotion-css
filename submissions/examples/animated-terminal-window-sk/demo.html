<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Terminal Window</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="terminal">
  <div class="title-bar">
    <div class="dots"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>
    <span class="title-text">bash — ./setup.sh</span>
  </div>
  <div class="terminal-body">
    <div class="line"><span class="prompt">$ </span><span class="cmd">npm run dev</span></div>
    <div class="line"><span class="output">> project@1.0.0 dev</span></div>
    <div class="line"><span class="output">> vite --port 3000</span></div>
    <div class="line"><span class="prompt">$ </span><span class="cmd">git status</span></div>
    <div class="line"><span class="output">On branch main — clean working tree</span></div>
    <div class="line"><span class="prompt">$ </span><span class="cmd">npm run build</span><span class="cursor"></span></div>
  </div>
</div>
</body>
</html>
