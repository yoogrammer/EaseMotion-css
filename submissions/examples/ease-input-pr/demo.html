<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-input-pr Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 4rem 2rem;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }
    
    .demo-section {
      width: 100%;
      max-width: 400px;
    }
    
    .demo-section h2 {
      margin-bottom: 1.5rem;
      color: #1e293b;
      text-align: center;
    }
    
    .input-group {
      margin-bottom: 1.5rem;
    }
    
    .input-group-label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: #475569;
    }
  </style>
</head>
<body>

  <div class="demo-section">
    <h2>Default Input</h2>
    <div class="input-group">
      <label class="input-group-label">Email Address</label>
      <input type="email" class="input-pr" placeholder="you@example.com">
    </div>
  </div>

  <div class="demo-section">
    <h2>Floating Label Input</h2>
    <label class="input-pr-wrapper has-label">
      <input type="text" class="input-pr" placeholder=" ">
      <span class="input-pr-label">Full Name</span>
    </label>
  </div>

  <div class="demo-section">
    <h2>Error State</h2>
    <div class="input-group">
      <label class="input-group-label">Password</label>
      <input type="password" class="input-pr input-pr-error" value="short" placeholder="Enter password">
      <span class="input-pr-error-message">Password must be at least 8 characters</span>
    </div>
  </div>

  <div class="demo-section">
    <h2>Disabled Input</h2>
    <div class="input-group">
      <label class="input-group-label">Username</label>
      <input type="text" class="input-pr" value="johndoe" disabled>
    </div>
  </div>

</body>
</html>
