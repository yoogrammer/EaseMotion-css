<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist Heart - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Wishlist Heart</h1>

    <div class="heart-card">
      <div class="heart-icon" id="heartIcon">
        <div class="heart-shape"></div>
      </div>
      <span class="heart-label">Add to Wishlist</span>
      <button class="heart-btn" id="heartBtn">♥ Wishlist</button>
    </div>

    <div class="variant-row">
      <div class="heart-card sm">
        <div class="heart-icon liked" id="heartIcon2">
          <div class="heart-shape filled"></div>
        </div>
        <span class="heart-label">Wishlisted</span>
      </div>
    </div>

    <p class="description">The heart outline fills with color and pops with a scale pulse when clicked. A smooth SVG-like heart built with CSS pseudo-elements.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
