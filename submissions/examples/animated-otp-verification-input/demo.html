<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Animated OTP Verification Input</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <h1 class="title">Enter the code</h1>
      <p class="subtitle">A modern OTP input with animated focus states.</p>

      <div class="otp-container" aria-label="One-time password">
        <input class="otp-input" type="text" inputmode="numeric" pattern="\\d*" maxlength="1" autocomplete="one-time-code" aria-label="Digit 1" />
        <input class="otp-input" type="text" inputmode="numeric" pattern="\\d*" maxlength="1" autocomplete="one-time-code" aria-label="Digit 2" />
        <input class="otp-input" type="text" inputmode="numeric" pattern="\\d*" maxlength="1" autocomplete="one-time-code" aria-label="Digit 3" />
        <input class="otp-input" type="text" inputmode="numeric" pattern="\\d*" maxlength="1" autocomplete="one-time-code" aria-label="Digit 4" />
        <input class="otp-input" type="text" inputmode="numeric" pattern="\\d*" maxlength="1" autocomplete="one-time-code" aria-label="Digit 5" />
        <input class="otp-input" type="text" inputmode="numeric" pattern="\\d*" maxlength="1" autocomplete="one-time-code" aria-label="Digit 6" />
      </div>

      <div class="hint" role="note">
        Tip: use <kbd>Tab</kbd> to move between boxes.
      </div>
    </section>
  </main>
</body>
</html>
