<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-text-fill-none — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; letter-spacing: 0.05em; }
    .row { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; align-items: center; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .demo-text {
      font-size: 2.5rem;
      font-weight: 800;
      line-height: 1.2;
    }
  </style>
</head>
<body>
  <h1>ease-text-fill-none</h1>
  <div class="section">
    <div class="label">Outlined text with text-stroke + fill-none</div>
    <div class="demo-text ease-text-stroke-2 ease-text-fill-none" style="-webkit-text-stroke-color:#6366f1;">Outlined Text</div>
  </div>
  <div class="section">
    <div class="label">With different stroke widths</div>
    <div class="row">
      <div class="demo-text ease-text-stroke-1 ease-text-fill-none" style="-webkit-text-stroke-color:#fff;font-size:1.8rem;">Thin</div>
      <div class="demo-text ease-text-stroke-2 ease-text-fill-none" style="-webkit-text-stroke-color:#ec4899;font-size:1.8rem;">Medium</div>
    </div>
  </div>
</body>
</html>
