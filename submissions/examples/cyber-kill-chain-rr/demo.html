<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Kill Chain Visualization</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Cyber Kill Chain</h1>

    <p class="subtitle">
        Understanding the stages of a cyber attack lifecycle.
    </p>

    <div class="timeline">

        <div class="stage recon">
            🔍 Reconnaissance
        </div>

        <div class="connector"></div>

        <div class="stage weapon">
            ⚔️ Weaponization
        </div>

        <div class="connector"></div>

        <div class="stage delivery">
            📨 Delivery
        </div>

        <div class="connector"></div>

        <div class="stage exploit">
            💥 Exploitation
        </div>

        <div class="connector"></div>

        <div class="stage install">
            💾 Installation
        </div>

        <div class="connector"></div>

        <div class="stage control">
            🎮 Command & Control
        </div>

        <div class="connector"></div>

        <div class="stage objective">
            🎯 Actions on Objectives
        </div>

    </div>

</div>

</body>
</html>
