<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stopwatch Timer | EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="st-container">
    <h1>Stopwatch</h1>
    <p class="st-subtitle">Millisecond precision with flip animations</p>
    <div class="st-display" id="display">
      <div class="st-digit-group">
        <div class="st-digit" id="minTens"><span>0</span></div>
        <div class="st-digit" id="minOnes"><span>0</span></div>
      </div>
      <span class="st-sep">:</span>
      <div class="st-digit-group">
        <div class="st-digit" id="secTens"><span>0</span></div>
        <div class="st-digit" id="secOnes"><span>0</span></div>
      </div>
      <span class="st-sep">:</span>
      <div class="st-digit-group">
        <div class="st-digit" id="msTens"><span>0</span></div>
        <div class="st-digit" id="msOnes"><span>0</span></div>
      </div>
    </div>
    <div class="st-controls">
      <button id="startBtn" class="st-btn st-start">Start</button>
      <button id="lapBtn" class="st-btn" disabled>Lap</button>
      <button id="resetBtn" class="st-btn st-stop">Reset</button>
    </div>
    <div class="st-laps" id="lapList"></div>
  </div>
  <script>
    let running = false;
    let startTime = 0;
    let elapsed = 0;
    let raf = null;
    let lapCount = 0;

    const display = document.getElementById('display');
    const startBtn = document.getElementById('startBtn');
    const lapBtn = document.getElementById('lapBtn');
    const resetBtn = document.getElementById('resetBtn');
    const lapList = document.getElementById('lapList');

    const digitEls = {
      minTens: document.getElementById('minTens'),
      minOnes: document.getElementById('minOnes'),
      secTens: document.getElementById('secTens'),
      secOnes: document.getElementById('secOnes'),
      msTens: document.getElementById('msTens'),
      msOnes: document.getElementById('msOnes'),
    };

    function pad(n) { return n.toString().padStart(2, '0'); }

    function formatTime(ms) {
      const totalMs = Math.floor(ms);
      const mins = Math.floor(totalMs / 60000);
      const secs = Math.floor((totalMs % 60000) / 1000);
      const centis = Math.floor((totalMs % 1000) / 10);
      return { mins: pad(mins), secs: pad(secs), ms: pad(centis) };
    }

    function updateDigit(el, value) {
      const span = el.querySelector('span');
      const old = span.textContent;
      if (old !== value) {
        el.classList.remove('st-flip');
        void el.offsetWidth;
        el.classList.add('st-flip');
        span.textContent = value;
      }
    }

    function updateDisplay(ms) {
      const t = formatTime(ms);
      updateDigit(digitEls.minTens, t.mins[0]);
      updateDigit(digitEls.minOnes, t.mins[1]);
      updateDigit(digitEls.secTens, t.secs[0]);
      updateDigit(digitEls.secOnes, t.secs[1]);
      updateDigit(digitEls.msTens, t.ms[0]);
      updateDigit(digitEls.msOnes, t.ms[1]);
    }

    function tick() {
      const now = performance.now();
      elapsed = startTime ? now - startTime : elapsed;
      updateDisplay(elapsed);
      raf = requestAnimationFrame(tick);
    }

    function start() {
      if (running) return;
      running = true;
      startTime = performance.now() - elapsed;
      startBtn.textContent = 'Stop';
      startBtn.classList.remove('st-start');
      startBtn.classList.add('st-stop');
      lapBtn.disabled = false;
      if (!raf) raf = requestAnimationFrame(tick);
    }

    function stop() {
      if (!running) return;
      running = false;
      startTime = 0;
      if (raf) { cancelAnimationFrame(raf); raf = null; }
      startBtn.textContent = 'Start';
      startBtn.classList.remove('st-stop');
      startBtn.classList.add('st-start');
    }

    function reset() {
      stop();
      elapsed = 0;
      updateDisplay(0);
      lapCount = 0;
      lapList.innerHTML = '';
      lapBtn.disabled = true;
    }

    function addLap() {
      lapCount++;
      const t = formatTime(elapsed);
      const item = document.createElement('div');
      item.className = 'st-lap-item';
      item.innerHTML = `<span>Lap ${lapCount}</span><span>${t.mins}:${t.secs}.${t.ms}</span>`;
      lapList.prepend(item);
      requestAnimationFrame(() => item.classList.add('st-lap-enter'));
    }

    startBtn.addEventListener('click', () => running ? stop() : start());
    lapBtn.addEventListener('click', addLap);
    resetBtn.addEventListener('click', reset);
  </script>
</body>
</html>
