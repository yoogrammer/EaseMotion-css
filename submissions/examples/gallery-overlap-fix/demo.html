<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Stable Mesh Gallery Grid</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 480px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">WebKit Grid Track Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem;">Test on iOS or macOS Safari viewports. Explicit row bounds paired with <code>object-fit: cover</code> preserve layout grid cell geometry across all sizes.</p>
  </header>

  <div class="alm-mesh-gallery-stage">
    <div class="alm-stabilized-grid">
      
      <div class="alm-grid-item alm-span-column-2">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600&auto=format&fit=crop&q=60" alt="Landscape Canvas">
      </div>
      
      <div class="alm-grid-item alm-span-row-2">
        <img src="https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?w=600&auto=format&fit=crop&q=60" alt="Portrait Canvas">
      </div>
      
      <div class="alm-grid-item">
        <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=600&auto=format&fit=crop&q=60" alt="Square Canvas">
      </div>
      
      <div class="alm-grid-item">
        <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=600&auto=format&fit=crop&q=60" alt="Model Portrait">
      </div>
      
      <div class="alm-grid-item alm-span-column-2">
        <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=600&auto=format&fit=crop&q=60" alt="Mountain View">
      </div>

    </div>
  </div>

</body>
</html>
