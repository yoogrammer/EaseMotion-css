<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backup Freshness Meter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="freshness">
    <section class="summary">
      <p>Recovery Readiness</p>
      <h1>Backup Freshness Meter</h1>
      <span>Newest restore point: 14 min ago</span>
    </section>

    <section class="meters" aria-label="Backup freshness meters">
      <article>
        <strong>Primary DB</strong>
        <div class="bar"><i class="good"></i></div>
        <p>Replica snapshot is current.</p>
      </article>
      <article>
        <strong>Object Store</strong>
        <div class="bar"><i class="watch"></i></div>
        <p>Archive job is running behind schedule.</p>
      </article>
      <article>
        <strong>Search Index</strong>
        <div class="bar"><i class="stale"></i></div>
        <p>Restore copy needs a fresh export.</p>
      </article>
    </section>
  </main>
</body>
</html>
