<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ease-float Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
      background: #f0f4ff;
    }
    .card {
      padding: 2rem 3rem;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      text-align: center;
      font-size: 1.2rem;
    }
    .icon { font-size: 3rem; }
  </style>
</head>
<body>

  <div class="icon ease-float">🚀</div>

  <div class="card ease-float">
    Hero Illustration — floating smoothly
  </div>

  <button class="ease-float" style="padding: 1rem 2rem; font-size: 1rem; border-radius: 8px; border: none; background: #6c63ff; color: white; cursor: pointer;">
    CTA Button
  </button>

</body>
</html>
