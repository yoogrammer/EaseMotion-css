<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Hover Card Stack</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card-stack">
    <div class="stack-card" style="--index: 0; --bg: linear-gradient(135deg, #667eea, #764ba2);">
      <h3>Design</h3>
      <p>Creative and modern UI/UX design patterns</p>
    </div>
    <div class="stack-card" style="--index: 1; --bg: linear-gradient(135deg, #f093fb, #f5576c);">
      <h3>Develop</h3>
      <p>Clean code with cutting-edge technologies</p>
    </div>
    <div class="stack-card" style="--index: 2; --bg: linear-gradient(135deg, #4facfe, #00f2fe);">
      <h3>Deploy</h3>
      <p>Scale your applications with confidence</p>
    </div>
    <div class="stack-card" style="--index: 3; --bg: linear-gradient(135deg, #43e97b, #38f9d7);">
      <h3>Deliver</h3>
      <p>Ship fast and iterate continuously</p>
    </div>
  </div>
</body>
</html>
