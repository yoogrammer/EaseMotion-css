<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS light-dark() Theme</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h1>light-dark()</h1>
    <p class="sub">Native CSS theme colors — no JS, no custom properties per mode.</p>

    <div class="palette">
      <div class="swatch" style="background:light-dark(#6c63ff,#a09af8)">Primary</div>
      <div class="swatch" style="background:light-dark(#22c55e,#86efac)">Success</div>
      <div class="swatch" style="background:light-dark(#ef4444,#fca5a5)">Danger</div>
      <div class="swatch" style="background:light-dark(#f59e0b,#fcd34d)">Warning</div>
    </div>

    <button id="toggle">Toggle color-scheme</button>

    <p class="foot">Open your browser's DevTools → Rendering → Emulate CSS prefers-color-scheme, or click the button above to switch between light and dark.</p>
  </div>

  <script>
    var toggle = document.getElementById('toggle');
    var isDark = false;
    toggle.addEventListener('click', function() {
      isDark = !isDark;
      document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
      toggle.textContent = isDark ? '☀️ Switch to Light' : '🌙 Switch to Dark';
    });
  </script>
</body>
</html>
