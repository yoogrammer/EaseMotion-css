<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- ✅ Fix 1: Hint browser to use dark color scheme before paint -->
  <meta name="color-scheme" content="dark light">
  <title>Dark Mode FOUC Fix - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">

  <!--
    ✅ Fix 2: Synchronous inline script — runs BEFORE first paint.
    Reads localStorage and applies the theme class instantly,
    preventing the white flash (FOUC) on dark-mode-preferring users.
    Also adds .no-transition to suppress transition during initial setup.
  -->
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);

      // Suppress transition on initial load to avoid FOUC
      document.documentElement.classList.add('no-transition');
      window.addEventListener('load', function () {
        // Re-enable transitions after first paint
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            document.documentElement.classList.remove('no-transition');
          });
        });
      });
    })();
  </script>
</head>
<body>
  <div class="demo-wrapper">
    <div class="theme-card">
      <h2>Dark Mode — No Flash</h2>
      <p>
        Reload the page — no white flash, even in dark mode.
        Theme is read from <code>localStorage</code> before first paint
        via an inline synchronous script.
      </p>

      <button
        class="theme-toggle"
        type="button"
        id="theme-toggle-btn"
        aria-label="Toggle colour theme"
      >
        <span class="icon" aria-hidden="true">🌙</span>
        <span id="theme-label">Dark Mode</span>
      </button>

      <span class="fouc-badge">✅ FOUC Eliminated</span>
    </div>
  </div>

  <script>
    var btn = document.getElementById('theme-toggle-btn');
    var label = document.getElementById('theme-label');
    var icon = btn.querySelector('.icon');

    function updateButton(theme) {
      if (theme === 'dark') {
        icon.textContent = '🌙';
        label.textContent = 'Dark Mode';
      } else {
        icon.textContent = '☀️';
        label.textContent = 'Light Mode';
      }
    }

    updateButton(document.documentElement.getAttribute('data-theme'));

    btn.addEventListener('click', function () {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateButton(next);
    });
  </script>
</body>
</html>
