<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neumorphic Music Player</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="player-container">
    <div class="music-player">
      <div class="top-nav">
        <button class="nav-btn"><span class="icon-back">‹</span></button>
        <span class="now-playing">NOW PLAYING</span>
        <button class="nav-btn"><span class="icon-menu">☰</span></button>
      </div>
      <div class="album-art">
        <div class="inner-art">
          <svg viewBox="0 0 24 24" class="music-note-svg">
            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
          </svg>
        </div>
      </div>
      <div class="song-details">
        <h2 class="song-title">Ambient Ocean</h2>
        <p class="artist-name">Synthesized Soundscapes</p>
      </div>
      <div class="progress-section">
        <div class="time-stamps">
          <span>1:24</span>
          <span>4:02</span>
        </div>
        <div class="slider-outer">
          <div class="slider-inner" style="width: 35%;"></div>
        </div>
      </div>
      <div class="controls">
        <button class="control-btn"><span class="icon">⏮</span></button>
        <button class="control-btn play-btn"><span class="icon">▶</span></button>
        <button class="control-btn"><span class="icon">⏭</span></button>
      </div>
    </div>
  </div>
</body>
</html>
