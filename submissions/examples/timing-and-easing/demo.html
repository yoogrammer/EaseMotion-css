<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timing and Easing Reference</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../../css/easemotion.css"> 
</head>
<body>
  <div class="container">
    <h1>Timing & Easing Visual Reference</h1>
    <p>Hover over the containers below to trigger the animations and compare the CSS classes.</p>

    <section class="demo-section">
      <h2>Durations (`ease-duration-*`)</h2>
      <div class="track-container hover-trigger">
        <div class="track">
          <span class="label">fast</span>
          <div class="bar ease-duration-fast"></div>
        </div>
        <div class="track">
          <span class="label">medium</span>
          <div class="bar ease-duration-medium"></div>
        </div>
        <div class="track">
          <span class="label">slow</span>
          <div class="bar ease-duration-slow"></div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h2>Delays (`ease-delay-*`)</h2>
      <div class="track-container hover-trigger">
        <div class="track">
          <span class="label">75ms</span>
          <div class="bar ease-delay-75"></div>
        </div>
        <div class="track">
          <span class="label">100ms</span>
          <div class="bar ease-delay-100"></div>
        </div>
        <div class="track">
          <span class="label">150ms</span>
          <div class="bar ease-delay-150"></div>
        </div>
        <div class="track">
          <span class="label">200ms</span>
          <div class="bar ease-delay-200"></div>
        </div>
        <div class="track">
          <span class="label">300ms</span>
          <div class="bar ease-delay-300"></div>
        </div>
        <div class="track">
          <span class="label">500ms</span>
          <div class="bar ease-delay-500"></div>
        </div>
        <div class="track">
          <span class="label">700ms</span>
          <div class="bar ease-delay-700"></div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
