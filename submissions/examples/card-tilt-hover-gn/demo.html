<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Card Tilt Hover – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2.5rem;
      background: #f0f4f8;
      padding: 2rem;
    }
    h3 { color: #555; margin-bottom: 0.25rem; text-align: center; }
    .card-inner h2 { margin: 0 0 0.5rem; font-size: 1.1rem; color: #333; }
    .card-inner p { margin: 0; font-size: 0.9rem; color: #777; }
    .hint { font-size: 0.8rem; color: #aaa; }
  </style>
</head>
<body>

  <h1 style="color:#333;">Card Tilt Hover Effects</h1>
  <p class="hint">Hover over each card to see the tilt effect</p>

  <div>
    <h3>Default Tilt</h3>
    <div class="tilt-card">
      <div class="card-inner">
        <h2>Default Tilt</h2>
        <p>Hover me to see the 3D tilt effect.</p>
      </div>
    </div>
  </div>

  <div>
    <h3>Gentle Tilt</h3>
    <div class="tilt-card-gentle">
      <div class="card-inner">
        <h2>Gentle Tilt</h2>
        <p>Subtle and smooth tilt on hover.</p>
      </div>
    </div>
  </div>

  <div>
    <h3>Tilt Left</h3>
    <div class="tilt-card-left">
      <div class="card-inner">
        <h2>Tilt Left</h2>
        <p>Tilts to the left on hover.</p>
      </div>
    </div>
  </div>

  <div>
    <h3>Tilt Right</h3>
    <div class="tilt-card-right">
      <div class="card-inner">
        <h2>Tilt Right</h2>
        <p>Tilts to the right on hover.</p>
      </div>
    </div>
  </div>

</body>
</html>
