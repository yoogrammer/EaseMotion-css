<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ease-fullscreen-icon-morph</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Fullscreen Icon Morph</h1>

    <div class="player-card">

        <div class="screen">
            <span>Video Player Area</span>
        </div>

        <button class="fullscreen-btn">

            <span class="corner tl"></span>
            <span class="corner tr"></span>
            <span class="corner bl"></span>
            <span class="corner br"></span>

        </button>

    </div>

    <div class="player-card collapse-state">

        <div class="screen">
            <span>Fullscreen Active</span>
        </div>

        <button class="fullscreen-btn collapse">

            <span class="corner tl"></span>
            <span class="corner tr"></span>
            <span class="corner bl"></span>
            <span class="corner br"></span>

        </button>

    </div>

</div>

</body>
</html>
