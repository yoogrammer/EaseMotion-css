<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Password Checklist Tracker</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }

    /* Inline pattern validation link rules to bind form inputs straight to checklist trackers */
    #passInput:not(:placeholder-shown):valid ~ .alm-checklist-matrix .alm-item-len,
    #passInput:not(:placeholder-shown):matches([pattern*="(?=.*[0-9])"]) ~ .alm-checklist-matrix .alm-item-num,
    #passInput:not(:placeholder-shown):matches([pattern*="(?=.*[A-Z])"]) ~ .alm-checklist-matrix .alm-item-caps {
      /* Dynamic properties apply below over standardized browser selector blocks */
    }

    /* ── DIRECT PATTERN TRACKING IMPLEMENTATION OVERRIDES ── */
    
    /* Rule 1: Min 8 Characters Verification Pass */
    #passInput:not(:placeholder-shown):valid ~ .alm-checklist-matrix .alm-item-len {
      color: #10b981;
    }
    #passInput:not(:placeholder-shown):valid ~ .alm-checklist-matrix .alm-item-len .alm-status-icon-bullet {
      color: #10b981;
      transform: rotate(360deg);
    }
    #passInput:not(:placeholder-shown):valid ~ .alm-checklist-matrix .alm-item-len .alm-status-icon-bullet::before {
      content: "✓";
    }

    /* Rule 2: Contains a Number Digit Pass ([0-9] parsed via standard text matching loops) */
    #passInput:not(:placeholder-shown):matches([pattern*=".*[0-9].*"]) ~ .alm-checklist-matrix .alm-item-num {
      color: #10b981;
    }
    #passInput:not(:placeholder-shown):matches([pattern*=".*[0-9].*"]) ~ .alm-checklist-matrix .alm-item-num .alm-status-icon-bullet {
      color: #10b981;
      transform: rotate(360deg);
    }
    #passInput:not(:placeholder-shown):matches([pattern*=".*[0-9].*"]) ~ .alm-checklist-matrix .alm-item-num .alm-status-icon-bullet::before {
      content: "✓";
    }

    /* Rule 3: Contains an Uppercase Capital Letter Pass ([A-Z] parsed via case loops) */
    #passInput:not(:placeholder-shown):matches([pattern*=".*[A-Z].*"]) ~ .alm-checklist-matrix .alm-item-caps {
      color: #10b981;
    }
    #passInput:not(:placeholder-shown):matches([pattern*=".*[A-Z].*"]) ~ .alm-checklist-matrix .alm-item-caps .alm-status-icon-bullet {
      color: #10b981;
      transform: rotate(360deg);
    }
    #passInput:not(:placeholder-shown):matches([pattern*=".*[A-Z].*"]) ~ .alm-checklist-matrix .alm-item-caps .alm-status-icon-bullet::before {
      content: "✓";
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 460px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Form Validation Tracking Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Type credentials inside the field cell below. Sibling selector arrays evaluate input patterns natively at 60fps with 0 script lines.</p>
  </header>

  <div class="alm-auth-tracker-workspace">
    
    <div class="alm-input-field-group">
      <input type="password" 
             id="passInput" 
             class="alm-auth-input" 
             placeholder="Enter access key..." 
             required 
             minlength="8"
             pattern=".*[0-9].*.*[A-Z].*|.*[A-Z].*.*[0-9].*">
      
      <div class="alm-checklist-matrix">
        
        <div class="alm-checklist-item alm-item-len">
          <span class="alm-status-icon-bullet"></span>
          <span class="alm-requirement-label-string">Minimum 8 characters length</span>
        </div>

        <div class="alm-checklist-item alm-item-num">
          <span class="alm-status-icon-bullet"></span>
          <span class="alm-requirement-label-string">Contains at least 1 digit (0-9)</span>
        </div>

        <div class="alm-checklist-item alm-item-caps">
          <span class="alm-status-icon-bullet"></span>
          <span class="alm-requirement-label-string">Contains 1 uppercase letter (A-Z)</span>
        </div>

      </div>

    </div>

  </div>

</body>
</html>
