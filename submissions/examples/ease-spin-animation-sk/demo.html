<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-spin Animation Demo | EaseMotion CSS</title>
  <!-- Link to Core EaseMotion CSS -->
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container">
    <h1 style="font-size: var(--ease-text-3xl); margin-bottom: 1rem;">ease-spin Utility</h1>
    
    <div style="text-align: center; max-width: 600px; color: var(--ease-color-muted);">
      <p>Demonstrating the proposed <code>.ease-spin</code> class. This adds a standard continuous rotation animation for loaders, icons, and interactive elements.</p>
    </div>

    <!-- Spinner Examples -->
    <div class="demo-row">
      <!-- Standard CSS border spinner -->
      <div style="text-align: center;">
        <div class="spinner-ring ease-spin" style="margin: 0 auto 1rem;"></div>
        <code style="font-size: var(--ease-text-xs); color: var(--ease-color-muted);">Border Spinner</code>
      </div>

      <!-- Icon spinner -->
      <div style="text-align: center;">
        <div class="spinner-icon ease-spin" style="margin: 0 auto 1rem;">⚙️</div>
        <code style="font-size: var(--ease-text-xs); color: var(--ease-color-muted);">Emoji / Icon</code>
      </div>

      <!-- SVG spinner -->
      <div style="text-align: center;">
        <div class="ease-spin" style="margin: 0 auto 1rem; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--ease-color-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="2" x2="12" y2="6"></line>
            <line x1="12" y1="18" x2="12" y2="22"></line>
            <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line>
            <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line>
            <line x1="2" y1="12" x2="6" y2="12"></line>
            <line x1="18" y1="12" x2="22" y2="12"></line>
            <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line>
            <line x1="16.24" y1="4.93" x2="19.07" y2="7.76"></line>
          </svg>
        </div>
        <code style="font-size: var(--ease-text-xs); color: var(--ease-color-muted);">SVG Stroke</code>
      </div>
    </div>

    <!-- Inside a button -->
    <h2 style="font-size: var(--ease-text-xl); margin-top: 3rem;">Inside Buttons</h2>
    <div style="display: flex; gap: 1rem; margin-top: 1rem;">
      <button class="ease-btn ease-btn-primary" disabled style="opacity: 0.8; cursor: not-allowed;">
        <svg class="ease-spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
        </svg>
        Loading...
      </button>
    </div>
  </div>
</body>
</html>
