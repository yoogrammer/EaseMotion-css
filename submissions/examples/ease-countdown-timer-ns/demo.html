<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h2 class="demo-title">Launch Countdown</h2>
    <p class="demo-subtitle">Product drops in</p>

    <div class="countdown">

      <div class="countdown-segment">
        <div class="countdown-digits">
          <div class="countdown-digit" id="hours-tens">
            <span class="digit-top"></span>
            <span class="digit-bottom"></span>
          </div>
          <div class="countdown-digit" id="hours-ones">
            <span class="digit-top"></span>
            <span class="digit-bottom"></span>
          </div>
        </div>
        <div class="countdown-label">Hours</div>
      </div>

      <div class="countdown-colon">:</div>

      <div class="countdown-segment">
        <div class="countdown-digits">
          <div class="countdown-digit" id="mins-tens">
            <span class="digit-top"></span>
            <span class="digit-bottom"></span>
          </div>
          <div class="countdown-digit" id="mins-ones">
            <span class="digit-top"></span>
            <span class="digit-bottom"></span>
          </div>
        </div>
        <div class="countdown-label">Minutes</div>
      </div>

      <div class="countdown-colon">:</div>

      <div class="countdown-segment">
        <div class="countdown-digits">
          <div class="countdown-digit" id="secs-tens">
            <span class="digit-top"></span>
            <span class="digit-bottom"></span>
          </div>
          <div class="countdown-digit" id="secs-ones">
            <span class="digit-top"></span>
            <span class="digit-bottom"></span>
          </div>
        </div>
        <div class="countdown-label">Seconds</div>
      </div>

    </div>

    <p class="demo-expired" id="expired-msg" style="display:none;">
      🎉 Time's up!
    </p>
  </div>

  <script>
    // Set your target duration here (in seconds)
    let totalSeconds = 2 * 60 * 60 + 45 * 60 + 30; // 2h 45m 30s

    function setDigit(id, value) {
      const el = document.getElementById(id);
      const top = el.querySelector('.digit-top');
      const bottom = el.querySelector('.digit-bottom');
      const current = top.textContent;
      const next = String(value);

      if (current === next) return;

      // Trigger flip animation
      top.textContent = current;
      bottom.textContent = next;

      el.classList.remove('flip');
      void el.offsetWidth; // reflow to restart animation
      el.classList.add('flip');

      setTimeout(() => {
        top.textContent = next;
        el.classList.remove('flip');
      }, 500);
    }

    function updateDisplay(seconds) {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;

      setDigit('hours-tens', Math.floor(h / 10));
      setDigit('hours-ones', h % 10);
      setDigit('mins-tens',  Math.floor(m / 10));
      setDigit('mins-ones',  m % 10);
      setDigit('secs-tens',  Math.floor(s / 10));
      setDigit('secs-ones',  s % 10);
    }

    // Initialize display immediately
    updateDisplay(totalSeconds);

    const interval = setInterval(() => {
      totalSeconds--;
      if (totalSeconds < 0) {
        clearInterval(interval);
        document.querySelector('.countdown').style.display = 'none';
        document.getElementById('expired-msg').style.display = 'block';
        return;
      }
      updateDisplay(totalSeconds);
    }, 1000);
  </script>

</body>
</html>
