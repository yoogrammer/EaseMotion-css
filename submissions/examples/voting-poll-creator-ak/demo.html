<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voting Poll Creator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="poll-wrapper">
    <h1>Poll Creator</h1>
    <div class="poll-setup" id="pollSetup">
      <div class="field">
        <label for="pollQuestion">Poll Question</label>
        <input type="text" id="pollQuestion" class="input" value="What's your favorite programming language?">
      </div>
      <div class="field">
        <label>Options</label>
        <div id="optionsList" class="options-list"></div>
        <button id="addOption" class="add-btn">+ Add Option</button>
      </div>
      <button id="startPoll" class="start-btn">Start Poll</button>
    </div>
    <div class="poll-live" id="pollLive" style="display:none">
      <h2 id="liveQuestion"></h2>
      <div id="pollOptions" class="poll-options"></div>
      <div class="poll-stats">
        <span>Total Votes: <strong id="totalVotes">0</strong></span>
      </div>
      <div id="pollResults" class="poll-results"></div>
      <button id="resetPoll" class="reset-btn">Create New Poll</button>
    </div>
  </div>
  <script>
    const pollSetup = document.getElementById('pollSetup');
    const pollLive = document.getElementById('pollLive');
    const pollQuestion = document.getElementById('pollQuestion');
    const optionsList = document.getElementById('optionsList');
    const addOption = document.getElementById('addOption');
    const startPoll = document.getElementById('startPoll');
    const liveQuestion = document.getElementById('liveQuestion');
    const pollOptions = document.getElementById('pollOptions');
    const pollResults = document.getElementById('pollResults');
    const totalVotes = document.getElementById('totalVotes');
    const resetPoll = document.getElementById('resetPoll');

    let options = ['JavaScript', 'Python', 'TypeScript', 'Rust'];
    let votes = [];
    let total = 0;

    function renderOptions() {
      optionsList.innerHTML = '';
      options.forEach((opt, i) => {
        const row = document.createElement('div');
        row.className = 'option-row';
        row.innerHTML = `<input type="text" class="input opt-input" value="${opt}" data-i="${i}"><button class="remove-opt" data-i="${i}">×</button>`;
        optionsList.appendChild(row);
      });
      document.querySelectorAll('.opt-input').forEach(inp => {
        inp.addEventListener('input', (e) => {
          options[parseInt(e.target.dataset.i)] = e.target.value;
        });
      });
      document.querySelectorAll('.remove-opt').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const i = parseInt(e.target.dataset.i);
          if (options.length > 2) {
            options.splice(i, 1);
            renderOptions();
          }
        });
      });
    }

    addOption.addEventListener('click', () => {
      options.push('');
      renderOptions();
      const inputs = document.querySelectorAll('.opt-input');
      inputs[inputs.length - 1].focus();
    });

    startPoll.addEventListener('click', () => {
      const q = pollQuestion.value.trim();
      if (!q || options.length < 2) return;
      const validOptions = options.filter(o => o.trim());
      if (validOptions.length < 2) return;
      votes = validOptions.map(() => 0);
      total = 0;
      liveQuestion.textContent = q;
      renderLive(validOptions);
      pollSetup.style.display = 'none';
      pollLive.style.display = 'block';
    });

    function renderLive(opts) {
      pollOptions.innerHTML = '';
      opts.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'vote-btn';
        btn.textContent = opt;
        btn.addEventListener('click', () => {
          votes[i]++;
          total++;
          renderResults(opts);
        });
        pollOptions.appendChild(btn);
      });
      renderResults(opts);
    }

    function renderResults(opts) {
      totalVotes.textContent = total;
      const maxVotes = Math.max(...votes, 1);
      pollResults.innerHTML = '';
      opts.forEach((opt, i) => {
        const pct = total > 0 ? (votes[i] / total) * 100 : 0;
        const isLeader = total > 0 && votes[i] === Math.max(...votes) && votes[i] > 0;
        const row = document.createElement('div');
        row.className = 'result-row';
        if (isLeader) row.classList.add('leader');
        row.innerHTML = `
          <div class="result-label"><span>${opt}</span><span class="result-count">${votes[i]} (${pct.toFixed(1)}%)</span></div>
          <div class="result-bar"><div class="result-fill" style="width:${pct}%"></div></div>
        `;
        pollResults.appendChild(row);
      });
    }

    resetPoll.addEventListener('click', () => {
      pollSetup.style.display = 'block';
      pollLive.style.display = 'none';
    });

    renderOptions();
  </script>
</body>
</html>
