<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Running Pace Calculator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator-wrapper">
    <h1>Running Pace Calculator</h1>
    <div class="mode-selector">
      <button class="mode-btn active" data-mode="pace-to-time">Pace+D→Time</button>
      <button class="mode-btn" data-mode="dist-to-pace">Dist+Time→Pace</button>
      <button class="mode-btn" data-mode="pace-to-dist">Pace+Time→Dist</button>
    </div>
    <div class="inputs-container" id="inputsContainer">
      <div class="field">
        <label for="distance">Distance (km)</label>
        <input type="number" id="distance" class="input" value="10" min="0" step="0.1">
      </div>
      <div class="field">
        <label for="paceMin">Pace (min per km)</label>
        <input type="number" id="paceMin" class="input" value="5" min="0" max="60">
      </div>
      <div class="field">
        <label for="paceSec">Pace (sec per km)</label>
        <input type="number" id="paceSec" class="input" value="30" min="0" max="59">
      </div>
      <div class="field">
        <label for="timeHours">Time (hours)</label>
        <input type="number" id="timeHours" class="input" value="0" min="0">
      </div>
      <div class="field">
        <label for="timeMinutes">Time (minutes)</label>
        <input type="number" id="timeMinutes" class="input" value="55" min="0">
      </div>
    </div>
    <div class="results-grid">
      <div class="result-card">
        <span class="result-label">min/km</span>
        <span class="result-value" id="minPerKm">--</span>
      </div>
      <div class="result-card">
        <span class="result-label">min/mile</span>
        <span class="result-value" id="minPerMile">--</span>
      </div>
      <div class="result-card">
        <span class="result-label">km/h</span>
        <span class="result-value" id="kmh">--</span>
      </div>
      <div class="result-card">
        <span class="result-label">mph</span>
        <span class="result-value" id="mph">--</span>
      </div>
    </div>
    <div class="chart-section">
      <h3>Pace Comparison</h3>
      <div class="pace-chart" id="paceChart"></div>
    </div>
  </div>
  <script>
    let currentMode = 'pace-to-time';

    const distance = document.getElementById('distance');
    const paceMin = document.getElementById('paceMin');
    const paceSec = document.getElementById('paceSec');
    const timeHours = document.getElementById('timeHours');
    const timeMinutes = document.getElementById('timeMinutes');
    const minPerKm = document.getElementById('minPerKm');
    const minPerMile = document.getElementById('minPerMile');
    const kmh = document.getElementById('kmh');
    const mph = document.getElementById('mph');
    const paceChart = document.getElementById('paceChart');

    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = btn.dataset.mode;
        updateVisibility();
        calculate();
      });
    });

    function updateVisibility() {
      document.querySelectorAll('.field').forEach(el => el.style.display = 'none');
      if (currentMode === 'pace-to-time') {
        distance.closest('.field').style.display = '';
        paceMin.closest('.field').style.display = '';
        paceSec.closest('.field').style.display = '';
      } else if (currentMode === 'dist-to-pace') {
        distance.closest('.field').style.display = '';
        timeHours.closest('.field').style.display = '';
        timeMinutes.closest('.field').style.display = '';
      } else {
        paceMin.closest('.field').style.display = '';
        paceSec.closest('.field').style.display = '';
        timeHours.closest('.field').style.display = '';
        timeMinutes.closest('.field').style.display = '';
      }
    }

    function fmtPace(min) {
      const m = Math.floor(min);
      const s = Math.round((min - m) * 60);
      return m + ':' + String(s).padStart(2, '0');
    }

    function calculate() {
      let dist, pace, time;

      if (currentMode === 'pace-to-time') {
        dist = parseFloat(distance.value) || 0;
        pace = (parseFloat(paceMin.value) || 0) + (parseFloat(paceSec.value) || 0) / 60;
        time = dist * pace;
      } else if (currentMode === 'dist-to-pace') {
        dist = parseFloat(distance.value) || 0;
        time = (parseFloat(timeHours.value) || 0) * 60 + (parseFloat(timeMinutes.value) || 0);
        pace = dist > 0 ? time / dist : 0;
      } else {
        pace = (parseFloat(paceMin.value) || 0) + (parseFloat(paceSec.value) || 0) / 60;
        time = (parseFloat(timeHours.value) || 0) * 60 + (parseFloat(timeMinutes.value) || 0);
        dist = pace > 0 ? time / pace : 0;
      }

      if (pace > 0) {
        minPerKm.textContent = fmtPace(pace);
        minPerMile.textContent = fmtPace(pace * 1.60934);
        kmh.textContent = (60 / pace).toFixed(2);
        mph.textContent = (60 / (pace * 1.60934)).toFixed(2);
      } else {
        minPerKm.textContent = '--';
        minPerMile.textContent = '--';
        kmh.textContent = '--';
        mph.textContent = '--';
      }

      renderPaceChart(pace);
    }

    function renderPaceChart(currentPace) {
      paceChart.innerHTML = '';
      const paces = [4, 4.5, 5, 5.5, 6, 6.5, 7, 7.5, 8];
      const maxPace = Math.max(...paces, currentPace || 5);
      paces.forEach(p => {
        const bar = document.createElement('div');
        bar.className = 'pace-bar' + (Math.abs(p - (currentPace || 5)) < 0.01 ? ' current' : '');
        const fill = document.createElement('div');
        fill.className = 'pace-fill';
        const speed = 60 / p;
        const pct = (speed / 20) * 100;
        fill.style.height = Math.min(pct, 100) + '%';
        bar.appendChild(fill);
        const label = document.createElement('span');
        label.className = 'pace-label';
        label.textContent = fmtPace(p);
        bar.appendChild(label);
        paceChart.appendChild(bar);
      });
    }

    [distance, paceMin, paceSec, timeHours, timeMinutes].forEach(el => {
      el.addEventListener('input', calculate);
    });

    updateVisibility();
    calculate();
  </script>
</body>
</html>
