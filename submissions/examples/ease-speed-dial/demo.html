<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speed Dial - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="demo-header">
    <h1>Speed Dial</h1>
    <p>An expandable floating action button with multiple quick actions.</p>
  </header>

  <main class="demo-content">
    <h2>Click the + button in the corner</h2>
    <p>
      The speed dial expands into a set of smaller action buttons
      with a smooth stagger animation. Click outside or press Escape to close.
    </p>
  </main>

  <!-- Speed Dial (bottom-right, default direction: up) -->
  <div class="ease-speed-dial ease-speed-dial--br ease-speed-dial--up" id="speedDial">
    <div class="ease-speed-dial__backdrop" id="speedDialBackdrop"></div>

    <div class="ease-speed-dial__actions" id="speedDialActions">
      <button class="ease-speed-dial__action" data-action="edit">
        ✏️
        <span class="ease-speed-dial__tooltip">Edit</span>
      </button>
      <button class="ease-speed-dial__action" data-action="share">
        🔗
        <span class="ease-speed-dial__tooltip">Share</span>
      </button>
      <button class="ease-speed-dial__action" data-action="notifications">
        🔔
        <span class="ease-speed-dial__tooltip">Notify</span>
      </button>
      <button class="ease-speed-dial__action" data-action="download">
        ⬇️
        <span class="ease-speed-dial__tooltip">Download</span>
      </button>
    </div>

    <button class="ease-speed-dial__btn" id="speedDialBtn" aria-label="Open actions">
      +
    </button>
  </div>

  <script>
    const dial = document.getElementById('speedDial');
    const btn = document.getElementById('speedDialBtn');
    const backdrop = document.getElementById('speedDialBackdrop');
    const actions = document.querySelectorAll('.ease-speed-dial__action');

    function openDial() {
      dial.classList.add('ease-speed-dial--open');
    }

    function closeDial() {
      dial.classList.remove('ease-speed-dial--open');
    }

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (dial.classList.contains('ease-speed-dial--open')) {
        closeDial();
      } else {
        openDial();
      }
    });

    backdrop.addEventListener('click', closeDial);

    actions.forEach((action) => {
      action.addEventListener('click', (e) => {
        e.stopPropagation();
        console.log('Action:', action.dataset.action);
        closeDial();
      });
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeDial();
    });
  </script>

</body>
</html>
