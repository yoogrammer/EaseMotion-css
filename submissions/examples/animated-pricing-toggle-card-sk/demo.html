<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Pricing Toggle Card</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="pricing">
  <div class="pricing__card">
    <h2 class="pricing__plan">Basic</h2>
    <p class="pricing__price"><span class="pricing__currency">$</span>9<span class="pricing__period">/mo</span></p>
    <ul class="pricing__features">
      <li>5 projects</li>
      <li>10 GB storage</li>
      <li>Community support</li>
      <li>Basic analytics</li>
    </ul>
    <a href="#" class="pricing__cta">Get started</a>
  </div>
  <div class="pricing__card pricing__card--popular">
    <span class="pricing__badge">Popular</span>
    <h2 class="pricing__plan">Pro</h2>
    <p class="pricing__price"><span class="pricing__currency">$</span>29<span class="pricing__period">/mo</span></p>
    <ul class="pricing__features">
      <li>Unlimited projects</li>
      <li>100 GB storage</li>
      <li>Priority support</li>
      <li>Advanced analytics</li>
      <li>Team collaboration</li>
    </ul>
    <a href="#" class="pricing__cta">Get started</a>
  </div>
</div>
</body>
</html>
