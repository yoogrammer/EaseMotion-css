<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-jelly — EaseMotion CSS Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f14;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px;
      gap: 48px;
    }

    header { text-align: center; }

    header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    header p {
      color: #9ca3af;
      font-size: 1rem;
      max-width: 480px;
      line-height: 1.6;
    }

    section { width: 100%; max-width: 800px; }

    section h2 {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 20px;
      padding-bottom: 8px;
      border-bottom: 1px solid #1f2937;
    }

    .demo-row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
      justify-content: center;
    }

    .demo-btn {
      padding: 14px 32px;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.35);
    }

    .demo-icon-btn {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      background: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .demo-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f472b6, #fb923c);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      cursor: pointer;
    }

    .demo-card {
      padding: 20px 28px;
      border-radius: 16px;
      background: #1a1a2e;
      border: 1px solid #2d2d44;
      font-size: 0.95rem;
      color: #d1d5db;
      cursor: pointer;
      min-width: 180px;
      text-align: center;
    }

    .demo-badge {
      padding: 6px 16px;
      border-radius: 999px;
      background: #065f46;
      color: #6ee7b7;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <header>
    <h1>ease-jelly 🍮</h1>
    <p>Hover or click any element below to feel the jelly!</p>
  </header>

  <section>
    <h2>Basic — hover or click any element</h2>
    <div class="demo-row">
      <button class="demo-btn jelly">Click Me</button>
      <button class="demo-icon-btn jelly">🐸</button>
      <button class="demo-icon-btn jelly">🎯</button>
      <div class="demo-avatar jelly">🐱</div>
      <span class="demo-badge jelly">NEW</span>
    </div>
  </section>

  <section>
    <h2>Cards</h2>
    <div class="demo-row">
      <div class="demo-card jelly">🎉 Event Card</div>
      <div class="demo-card jelly">🏆 Hackathon</div>
      <div class="demo-card jelly">📌 Bookmark</div>
    </div>
  </section>

  <section>
    <h2>Speed variants</h2>
    <div class="demo-row">
      <button class="demo-btn jelly jelly-slow">Slow 🐢</button>
      <button class="demo-btn jelly">Default ⚡</button>
      <button class="demo-btn jelly jelly-fast">Fast 🚀</button>
    </div>
  </section>

  <section>
    <h2>Intensity variants</h2>
    <div class="demo-row">
      <button class="demo-btn jelly jelly-subtle">Subtle</button>
      <button class="demo-btn jelly">Default</button>
      <button class="demo-btn jelly jelly-strong">Strong 💥</button>
    </div>
  </section>

  <section>
    <h2>Custom via CSS variables</h2>
    <div class="demo-row">
      <button class="demo-btn jelly" style="--jelly-duration: 0.8s; --jelly-intensity: 1.4;">
        Custom 🎨
      </button>
    </div>
  </section>

</body>
</html>
