<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Floating Diagonal Speed Dial Menu</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 460px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Speed-Dial Vector Axis Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Click the primary action button in the bottom corner. General sibling combinators drive multi-axis transitions and staggered delays at 60fps with 0 scripts.</p>
  </header>

  <div class="alm-speed-dial-viewport">
    
    <div style="padding: 1.25rem; color: #64748b; font-size: 0.75rem; line-height: 1.5;">
      <h3 style="color: white; margin: 0 0 4px 0; font-size: 0.875rem;">System Controller Cockpit</h3>
      Use the floating selector below to dispatch pipeline actions.
    </div>

    <input type="checkbox" id="dial-toggle-gate" class="alm-dial-toggle-input">
    
    <label for="dial-toggle-gate" class="alm-speed-dial-trigger-btn" title="Toggle Shortcut Panel">
      <span class="alm-trigger-icon-vector">+</span>
    </label>
    
    <a href="#terminal" class="alm-speed-dial-node alm-dial-node-1" title="Launch Terminal Console" onclick="alert('Action 1: Opening Terminal Stream')">⌨</a>
    
    <a href="#secure" class="alm-speed-dial-node alm-dial-node-2" title="Secure Port Configurations" onclick="alert('Action 2: Mapping Cryptographic Sockets')">🔒</a>
    
    <a href="#database" class="alm-speed-dial-node alm-dial-node-3" title="Query Database Cluster" onclick="alert('Action 3: Synchronizing Storage Logs')">💾</a>

  </div>

</body>
</html>
