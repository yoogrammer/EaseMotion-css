<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scale Stagger Children | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <button onclick="toggleAnimate()">Toggle Animate</button>
    <div class="parent" style="--animate: 0">
      <div class="child" style="--i: 1">1</div>
      <div class="child" style="--i: 2">2</div>
      <div class="child" style="--i: 3">3</div>
      <div class="child" style="--i: 4">4</div>
      <div class="child" style="--i: 5">5</div>
    </div>
  </div>
  <script>
    function toggleAnimate() {
      const parent = document.querySelector('.parent');
      const current = parent.style.getPropertyValue('--animate');
      parent.style.setProperty('--animate', current === '1' ? '0' : '1');
    }
  </script>
</body>
</html>
