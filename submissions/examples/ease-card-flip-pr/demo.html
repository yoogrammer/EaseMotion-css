<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ease Card Flip Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background:#f3f4f6; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">
    <div class="ease-card-container">
        <div class="ease-card-flip-pr">
            <div class="ease-card-front" style="background:#3b82f6; color:white;">
                <h2>Front Side</h2>
                <p>Hover to flip me</p>
            </div>
            <div class="ease-card-back" style="background:#10b981; color:white;">
                <h2>Back Side</h2>
                <p>Secret content revealed!</p>
            </div>
        </div>
    </div>
</body>
</html>
