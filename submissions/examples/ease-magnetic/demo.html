<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ease Magnetic</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <button class="ease-magnetic-btn">
    Hover Me
  </button>

  <script>
    const btn = document.querySelector(".ease-magnetic-btn");

    btn.addEventListener("mousemove", (e) => {
      const rect = btn.getBoundingClientRect();
      btn.style.setProperty("--ease-mx", e.clientX - rect.left - rect.width / 2);
      btn.style.setProperty("--ease-my", e.clientY - rect.top - rect.height / 2);
    });

    btn.addEventListener("mouseleave", () => {
      btn.style.setProperty("--ease-mx", 0);
      btn.style.setProperty("--ease-my", 0);
    });
  </script>

</body>
</html>
