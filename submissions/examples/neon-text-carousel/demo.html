<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Neon Text Carousel</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, sans-serif;
            min-height: 100vh;
            background: #0d0d14;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 2rem;
        }
        .container {
            text-align: center;
            max-width: 900px;
        }
        h1 {
            font-size: 2rem;
            color: white;
            margin-bottom: 1rem;
        }
        .preview {
            background: #1a1a2e;
            border-radius: 2rem;
            padding: 3rem;
            margin: 2rem 0;
        }
        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
        }
        button {
            background: #2a2a3e;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #6c63ff;
        }
        .note {
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            color: #a1a1aa;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>✨ Neon Text Carousel</h1>
    
    <div class="preview">
        <div class="ease-neon-carousel">
            <div class="ease-carousel-track">
                <span class="ease-carousel-word">Creative</span>
                <span class="ease-carousel-word">Innovative</span>
                <span class="ease-carousel-word">Beautiful</span>
                <span class="ease-carousel-word">Powerful</span>
                <span class="ease-carousel-word">Elegant</span>
            </div>
        </div>
        <p style="color: #a1a1aa; margin-top: 1rem;">Design is <span class="ease-carousel-static">✨</span></p>
    </div>

    <div class="controls">
        <button id="pauseCarousel">⏸ Pause</button>
        <button id="playCarousel">▶ Play</button>
        <button id="speedSlow">🐢 Slow</button>
        <button id="speedFast">⚡ Fast</button>
    </div>

    <div class="note">
        💡 Words rotate automatically with fade animation. Each word has its own neon color!
    </div>
</div>

<script>
    const track = document.querySelector('.ease-carousel-track');
    let isPaused = false;
    
    document.getElementById('pauseCarousel').addEventListener('click', () => {
        track.style.animationPlayState = 'paused';
        isPaused = true;
    });
    
    document.getElementById('playCarousel').addEventListener('click', () => {
        track.style.animationPlayState = 'running';
        isPaused = false;
    });
    
    document.getElementById('speedSlow').addEventListener('click', () => {
        track.style.animation = 'ease-carousel-slide 12s ease-in-out infinite';
        if (isPaused) track.style.animationPlayState = 'paused';
    });
    
    document.getElementById('speedFast').addEventListener('click', () => {
        track.style.animation = 'ease-carousel-slide 4s ease-in-out infinite';
        if (isPaused) track.style.animationPlayState = 'paused';
    });
</script>
</body>
</html>
