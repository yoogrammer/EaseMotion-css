<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Progress Ring Demo</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1>Ease Progress Ring Demo</h1>
    <p class="subtitle">
      Circular progress indicators for dashboards, analytics, and profile completion.
    </p>

    <div class="grid">

      <div class="card">
        <div class="progress-ring progress-75">
          <span>75%</span>
        </div>
        <h3>Profile Completion</h3>
      </div>

      <div class="card">
        <div class="progress-ring progress-60 success">
          <span>60%</span>
        </div>
        <h3>Course Progress</h3>
      </div>

      <div class="card">
        <div class="progress-ring progress-90 danger">
          <span>90%</span>
        </div>
        <h3>Sales Target</h3>
      </div>

      <div class="card">
        <div class="progress-ring progress-45 small">
          <span>45%</span>
        </div>
        <h3>Tasks Done</h3>
      </div>

      <div class="card">
        <div class="progress-ring progress-80 large">
          <span>80%</span>
        </div>
        <h3>Project Status</h3>
      </div>

      <div class="card">
        <div class="progress-ring progress-100 success large">
          <span>100%</span>
        </div>
        <h3>Completed</h3>
      </div>

    </div>
  </div>

</body>

</html>
