<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skeleton Loading Components – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2.5rem;
      background: #f5f5f5;
      padding: 2rem;
    }
    h3 { color: #555; margin-bottom: 0.5rem; text-align: center; }
    .hint { font-size: 0.8rem; color: #aaa; }
  </style>
</head>
<body>

  <h1 style="color:#333;">Skeleton Loading Components</h1>
  <p class="hint">Animated shimmer placeholders for loading states</p>

  <div>
    <h3>Card Skeleton</h3>
    <div class="skeleton-card">
      <div class="skeleton-image"></div>
      <div class="skeleton-card-header" style="margin-top:1rem;">
        <div class="skeleton-avatar"></div>
        <div style="flex:1;">
          <div class="skeleton-title"></div>
          <div class="skeleton-text-short" style="margin-top:6px;"></div>
        </div>
      </div>
      <div class="skeleton-card-body">
        <div class="skeleton-text"></div>
        <div class="skeleton-text"></div>
        <div class="skeleton-text-short"></div>
      </div>
    </div>
  </div>

  <div>
    <h3>Text Lines Skeleton</h3>
    <div style="width:280px; display:flex; flex-direction:column; gap:0.4rem;">
      <div class="skeleton-title"></div>
      <div class="skeleton-text"></div>
      <div class="skeleton-text"></div>
      <div class="skeleton-text-short"></div>
    </div>
  </div>

  <div>
    <h3>Avatar + Text Skeleton</h3>
    <div style="display:flex; align-items:center; gap:0.75rem; width:280px;">
      <div class="skeleton-avatar"></div>
      <div style="flex:1; display:flex; flex-direction:column; gap:0.4rem;">
        <div class="skeleton-title"></div>
        <div class="skeleton-text-short"></div>
      </div>
    </div>
  </div>

</body>
</html>
