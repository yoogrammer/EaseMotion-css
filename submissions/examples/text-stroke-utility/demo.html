<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-text-stroke — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 2.5rem;
      padding: 2rem;
    }
    h1 { color: #fff; margin: 0; }
    .demo-text {
      font-size: 4rem;
      font-weight: 900;
      margin: 0;
      letter-spacing: 0.02em;
    }
    .demo-text-sm {
      font-size: 2.5rem;
      font-weight: 800;
      margin: 0;
    }
    .label { font-size: 0.75rem; color: #555; text-align: center; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .row { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; align-items: center; }
    .card {
      padding: 1.5rem 2rem; border-radius: 10px;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      text-align: center;
    }
    .card p { margin: 0.5rem 0 0; color: #888; font-size: 0.8rem; }
    .bg-image {
      width: 100%; max-width: 700px; height: 200px;
      border-radius: 12px;
      background: linear-gradient(135deg, #6366f1, #a78bfa, #ec4899);
      display: flex; align-items: center; justify-content: center;
    }
    .bg-image .demo-text {
      font-size: 3rem;
    }
  </style>
</head>
<body>
  <h1>ease-text-stroke</h1>
  <div class="section">
    <div class="label">Stroke widths</div>
    <div class="row">
      <div class="card">
        <p class="demo-text-sm ease-text-stroke-1" style="color:#fff;">Thin</p>
        <p>1px stroke</p>
      </div>
      <div class="card">
        <p class="demo-text-sm ease-text-stroke-2" style="color:#fff;">Medium</p>
        <p>2px stroke</p>
      </div>
      <div class="card">
        <p class="demo-text-sm ease-text-stroke-3" style="color:#fff;">Thick</p>
        <p>3px stroke</p>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="label">Stroke colors</div>
    <div class="row">
      <p class="demo-text-sm ease-text-stroke-2 ease-text-stroke-white">White</p>
      <p class="demo-text-sm ease-text-stroke-2 ease-text-stroke-primary">Primary</p>
      <p class="demo-text-sm ease-text-stroke-2" style="-webkit-text-stroke-color: #22c55e; color: transparent;">Custom</p>
    </div>
  </div>
  <div class="section">
    <div class="label">On gradient background</div>
    <div class="bg-image">
      <p class="demo-text ease-text-stroke-2" style="-webkit-text-stroke-color: #fff; color: transparent;">OUTLINE</p>
    </div>
  </div>
  <div class="section">
    <div class="label">Fill color override</div>
    <div class="card">
      <p class="demo-text-sm ease-text-stroke-1" style="-webkit-text-fill-color: #6366f1; color: #6366f1;">Filled stroke</p>
      <p>Omit text-fill-none for colored fill</p>
    </div>
  </div>
</body>
</html>
