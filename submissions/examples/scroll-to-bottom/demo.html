<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll to Bottom Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div style="padding: 20px; font-family: sans-serif;">
        <h1>Scroll to Bottom Feature Demo</h1>
        <p>Scroll down to see the button, or click it to instantly jump to the bottom layout.</p>
        <!-- Creating artificial long content page -->
        <div style="height: 2000px; background: linear-gradient(#1a1a2e, #16213e); margin: 20px 0; border-radius: 8px;"></div>
    </div>

    <!-- Scroll-to-bottom button structure -->
    <button id="scrollBottomBtn" class="scroll-btn-bottom" aria-label="Scroll to bottom" title="Go to bottom">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <polyline points="6 9 12 15 18 9" />
        </svg>
    </button>

    <script>
        (() => {
            const bottomBtn = document.getElementById("scrollBottomBtn");
            if (!bottomBtn) return;

            window.addEventListener("scroll", () => {
                const scrolled = window.scrollY;
                const total = document.body.scrollHeight - window.innerHeight;
                // Show button unless user is near the absolute bottom
                if (scrolled < (total - 300)) {
                    bottomBtn.style.opacity = "1";
                    bottomBtn.style.pointerEvents = "auto";
                } else {
                    bottomBtn.style.opacity = "0";
                    bottomBtn.style.pointerEvents = "none";
                }
            }, { passive: true });

            bottomBtn.addEventListener("click", () => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
            });
        })();
    </script>
</body>
</html>
