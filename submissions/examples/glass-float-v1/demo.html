<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glassmorphic Floating Emphasis — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Glassmorphic Float</h1>
    <p class="subtitle">
      Hover any card to see the glass float effect — 3D lift with<br />
      backdrop blur, translucent layers, and subtle border glow.
    </p>

    <div class="card-grid">
      <div class="glass-card glass-accent-purple" tabindex="0">
        <span class="card-icon">&#10024;</span>
        <div class="card-title">Premium</div>
        <div class="card-desc">Elevated glass surface with depth</div>
      </div>

      <div class="glass-card glass-accent-cyan" tabindex="0">
        <span class="card-icon">&#9729;</span>
        <div class="card-title">Cloud</div>
        <div class="card-desc">Floating interface layer</div>
      </div>

      <div class="glass-card glass-accent-emerald" tabindex="0">
        <span class="card-icon">&#9851;</span>
        <div class="card-title">Eco</div>
        <div class="card-desc">Smooth organic elevation</div>
      </div>

      <div class="glass-card glass-accent-rose" tabindex="0">
        <span class="card-icon">&hearts;</span>
        <div class="card-title">Vibrant</div>
        <div class="card-desc">Bold glass with rich glow</div>
      </div>
    </div>
  </div>
</body>
</html>
