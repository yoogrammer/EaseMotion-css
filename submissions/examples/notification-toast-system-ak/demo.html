<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast Notification System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="toast-container" id="toastContainer"></div>
  <div class="controls">
    <h1>Toast Notifications</h1>
    <p>Click a button to trigger a notification.</p>
    <div class="btn-group">
      <button class="btn success" data-type="success">Success</button>
      <button class="btn error" data-type="error">Error</button>
      <button class="btn info" data-type="info">Info</button>
      <button class="btn warning" data-type="warning">Warning</button>
    </div>
  </div>
  <script>
    const container = document.getElementById('toastContainer');
    const icons = { success: '&#10003;', error: '&#10007;', info: '&#8505;', warning: '&#9888;' };
    const messages = {
      success: 'Operation completed successfully!',
      error: 'Something went wrong. Please try again.',
      info: 'Here is some useful information.',
      warning: 'Warning: Please check your input.'
    };

    function showToast(type) {
      const toast = document.createElement('div');
      toast.className = 'toast toast-' + type;
      toast.innerHTML = '<span class="toast-icon">' + icons[type] + '</span><span class="toast-msg">' + messages[type] + '</span><div class="toast-progress"></div>';
      container.appendChild(toast);
      setTimeout(() => { toast.classList.add('fade'); setTimeout(() => toast.remove(), 300); }, 3000);
    }

    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', () => showToast(btn.dataset.type));
    });
  </script>
</body>
</html>
