<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MacOS Style Window Container | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- The window container -->
  <div class="macos-window">
    
    <!-- The title bar automatically generates the 3 buttons -->
    <div class="macos-titlebar">
      Terminal — bash
    </div>
    
    <!-- Your content goes here -->
    <div class="macos-content">
      <p>System perfectly initialized.</p>
      <p>Ready for developer inputs...</p>
    </div>
    
  </div>

</body>
</html>
