<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-shake — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; letter-spacing: 0.05em; }
    .row { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .card {
      padding: 1.5rem 2rem; border-radius: 12px;
      background: #1a1a1a; border: 1px solid #ef4444;
      color: #ef4444; font-weight: 500; text-align: center;
    }
    .reload {
      margin-top: 2rem; padding: 8px 20px; border-radius: 8px;
      border: 1px solid #333; background: transparent;
      color: #888; cursor: pointer; font-size: 0.8rem;
    }
    .reload:hover { border-color: #666; color: #fff; }
  </style>
</head>
<body>
  <h1>ease-shake</h1>
  <div class="section">
    <div class="label">Error shake animation (plays on load)</div>
    <div class="row">
      <div class="card ease-shake">⚠ Invalid input</div>
    </div>
  </div>
  <button class="reload" onclick="location.reload()">↺ Replay</button>
</body>
</html>
