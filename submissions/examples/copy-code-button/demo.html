<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Copy Button Demo</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>




  <script>
    const copyIconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';

    document.querySelectorAll(".docs-code").forEach(block => {

      const btn = document.createElement("button");

      btn.className = "copy-btn";
      btn.innerHTML = copyIconSvg;

      block.appendChild(btn);

      btn.addEventListener("click", async () => {

        try {

          const code = block.querySelector("pre code").innerText;

          await navigator.clipboard.writeText(code);

          btn.textContent = "Copied!";
          btn.classList.add("copied");

          setTimeout(() => {
            btn.innerHTML = copyIconSvg;
            btn.classList.remove("copied");
          }, 2000);

        } catch (err) {
          console.error("Copy failed", err);
        }

      });

    });
  </script>

</body>
</html>
