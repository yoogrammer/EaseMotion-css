<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Animated Timeline - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Scroll Animated Timeline</h1>
    <div class="timeline">
      <div class="timeline-item">
        <div class="timeline-dot"></div>
        <div class="timeline-content"><h3>2023</h3><p>Project started</p></div>
      </div>
      <div class="timeline-item">
        <div class="timeline-dot"></div>
        <div class="timeline-content"><h3>2024</h3><p>First release</p></div>
      </div>
      <div class="timeline-item">
        <div class="timeline-dot"></div>
        <div class="timeline-content"><h3>2025</h3><p>Major update</p></div>
      </div>
      <div class="timeline-item">
        <div class="timeline-dot"></div>
        <div class="timeline-content"><h3>2026</h3><p>Global reach</p></div>
      </div>
    </div>
    <p class="description">Timeline entries fade and slide in as you scroll down the page.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
