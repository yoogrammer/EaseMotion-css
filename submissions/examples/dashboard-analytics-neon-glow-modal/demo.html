<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Analytics Neon Glow Modal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h1>Analytics Dashboard</h1>

<p>
Monitor your business performance with real-time insights.
</p>

<a href="#analyticsModal" class="open-btn">
View Report
</a>

</section>

<div id="analyticsModal" class="overlay">

<div class="modal" tabindex="0">

<a href="#" class="close-btn" aria-label="Close">&times;</a>

<h2>Monthly Analytics</h2>

<div class="stats">

<div class="card">
<h3>24.5K</h3>
<span>Visitors</span>
</div>

<div class="card">
<h3>92%</h3>
<span>Growth</span>
</div>

<div class="card">
<h3>$18K</h3>
<span>Revenue</span>
</div>

</div>

<button>
Open Dashboard
</button>

</div>

</div>

</body>
</html>
