<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Team Leaderboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <h1>Leaderboard</h1>
    <p class="subtitle">Top teams this season</p>

    <div class="podium">
      <div class="podium-item podium--silver">
        <span class="podium-rank">2</span>
        <div class="podium-avatar">T</div>
        <span class="podium-name">Team Alpha</span>
        <span class="podium-score">2,450 pts</span>
        <div class="podium-bar" style="--height: 80%"></div>
      </div>
      <div class="podium-item podium--gold">
        <span class="podium-rank">1</span>
        <div class="podium-avatar">S</div>
        <span class="podium-name">Star Squad</span>
        <span class="podium-score">3,200 pts</span>
        <div class="podium-bar" style="--height: 100%"></div>
      </div>
      <div class="podium-item podium--bronze">
        <span class="podium-rank">3</span>
        <div class="podium-avatar">N</div>
        <span class="podium-name">Nova Crew</span>
        <span class="podium-score">2,180 pts</span>
        <div class="podium-bar" style="--height: 68%"></div>
      </div>
    </div>

    <div class="leaderboard">
      <div class="rank-row rank--gold">
        <span class="rank-number">1</span>
        <div class="rank-avatar">S</div>
        <span class="rank-name">Star Squad</span>
        <span class="rank-score">3,200</span>
        <div class="rank-bar-track">
          <div class="rank-bar" style="--width: 100%"></div>
        </div>
      </div>
      <div class="rank-row rank--silver">
        <span class="rank-number">2</span>
        <div class="rank-avatar">T</div>
        <span class="rank-name">Team Alpha</span>
        <span class="rank-score">2,450</span>
        <div class="rank-bar-track">
          <div class="rank-bar" style="--width: 77%"></div>
        </div>
      </div>
      <div class="rank-row rank--bronze">
        <span class="rank-number">3</span>
        <div class="rank-avatar">N</div>
        <span class="rank-name">Nova Crew</span>
        <span class="rank-score">2,180</span>
        <div class="rank-bar-track">
          <div class="rank-bar" style="--width: 68%"></div>
        </div>
      </div>
      <div class="rank-row">
        <span class="rank-number">4</span>
        <div class="rank-avatar">P</div>
        <span class="rank-name">Phoenix Rising</span>
        <span class="rank-score">1,950</span>
        <div class="rank-bar-track">
          <div class="rank-bar" style="--width: 61%"></div>
        </div>
      </div>
      <div class="rank-row">
        <span class="rank-number">5</span>
        <div class="rank-avatar">E</div>
        <span class="rank-name">Eagle Eyes</span>
        <span class="rank-score">1,720</span>
        <div class="rank-bar-track">
          <div class="rank-bar" style="--width: 54%"></div>
        </div>
      </div>
      <div class="rank-row">
        <span class="rank-number">6</span>
        <div class="rank-avatar">T</div>
        <span class="rank-name">Thunder Bots</span>
        <span class="rank-score">1,480</span>
        <div class="rank-bar-track">
          <div class="rank-bar" style="--width: 46%"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
