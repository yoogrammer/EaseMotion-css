<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compound Interest Calculator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator-wrapper">
    <h1>Compound Interest Calculator</h1>
    <div class="input-section">
      <div class="field">
        <label for="principal">Principal ($)</label>
        <input type="number" id="principal" class="input" value="10000" min="0" step="100">
      </div>
      <div class="field">
        <label for="monthlyAdd">Monthly Addition ($)</label>
        <input type="number" id="monthlyAdd" class="input" value="500" min="0" step="50">
      </div>
      <div class="field">
        <label for="rate">Annual Interest Rate (%)</label>
        <input type="number" id="rate" class="input" value="7" min="0" max="100" step="0.1">
      </div>
      <div class="field">
        <label for="years">Time (Years)</label>
        <input type="number" id="years" class="input" value="10" min="1" max="50">
      </div>
      <div class="field">
        <label for="compound">Compound Frequency</label>
        <select id="compound" class="input">
          <option value="1">Annually</option>
          <option value="2">Semi-Annually</option>
          <option value="4">Quarterly</option>
          <option value="12">Monthly</option>
          <option value="365" selected>Daily</option>
        </select>
      </div>
    </div>
    <div class="results">
      <div class="result-item">
        <span class="result-label">Final Amount</span>
        <span class="result-value" id="finalAmount">$0.00</span>
      </div>
      <div class="result-item">
        <span class="result-label">Total Contributions</span>
        <span class="result-value" id="totalContributions">$0.00</span>
      </div>
      <div class="result-item">
        <span class="result-label">Total Interest</span>
        <span class="result-value accent" id="totalInterest">$0.00</span>
      </div>
    </div>
    <div class="chart">
      <h3>Principal vs Earnings</h3>
      <div class="chart-bars">
        <div class="chart-bar-group">
          <div class="chart-bar" id="principalBar" style="height:50%"></div>
          <span class="chart-label">Principal</span>
        </div>
        <div class="chart-bar-group">
          <div class="chart-bar earnings-bar" id="earningsBar" style="height:50%"></div>
          <span class="chart-label">Earnings</span>
        </div>
      </div>
    </div>
  </div>
  <script>
    const principal = document.getElementById('principal');
    const monthlyAdd = document.getElementById('monthlyAdd');
    const rate = document.getElementById('rate');
    const years = document.getElementById('years');
    const compound = document.getElementById('compound');
    const finalAmount = document.getElementById('finalAmount');
    const totalContributions = document.getElementById('totalContributions');
    const totalInterest = document.getElementById('totalInterest');
    const principalBar = document.getElementById('principalBar');
    const earningsBar = document.getElementById('earningsBar');

    function fmt(n) {
      return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function calculate() {
      const P = parseFloat(principal.value) || 0;
      const M = parseFloat(monthlyAdd.value) || 0;
      const r = (parseFloat(rate.value) || 0) / 100;
      const t = parseFloat(years.value) || 1;
      const n = parseInt(compound.value);

      let futureValue = P * Math.pow(1 + r / n, n * t);
      if (M > 0) {
        if (r === 0) {
          futureValue += M * n * t;
        } else {
          futureValue += M * (Math.pow(1 + r / n, n * t) - 1) / (r / n);
        }
      }

      const totalContrib = P + M * 12 * t;
      const interest = futureValue - totalContrib;

      finalAmount.textContent = fmt(futureValue);
      totalContributions.textContent = fmt(totalContrib);
      totalInterest.textContent = fmt(Math.max(0, interest));

      const maxVal = Math.max(futureValue, 1);
      const principalPct = (totalContrib / maxVal) * 100;
      const interestPct = (Math.max(0, interest) / maxVal) * 100;

      principalBar.style.height = Math.max(principalPct, 2) + '%';
      earningsBar.style.height = Math.max(interestPct, 2) + '%';
    }

    principal.addEventListener('input', calculate);
    monthlyAdd.addEventListener('input', calculate);
    rate.addEventListener('input', calculate);
    years.addEventListener('input', calculate);
    compound.addEventListener('change', calculate);
    calculate();
  </script>
</body>
</html>
