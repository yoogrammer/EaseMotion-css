<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Body Fallbacks Demo</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="demo">
        <h2>Body Fallbacks</h2>
        <p>This uses CSS custom properties with fallback values. The body inherits colors and fonts from <code>:root</code>, with hardcoded fallbacks for older browsers.</p>
        <p class="note">If custom properties are unsupported, fallback values apply.</p>
    </div>
</body>
</html>
