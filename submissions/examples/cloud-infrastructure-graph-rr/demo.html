<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Infrastructure Graph</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Cloud Infrastructure Graph</h1>
        <p>Visualize relationships between cloud services and infrastructure components.</p>
    </div>

    <div class="architecture">

        <div class="tier">
            <div class="node">👤 Users</div>
        </div>

        <div class="connector"></div>

        <div class="tier">
            <div class="node">⚖️ Load Balancer</div>
        </div>

        <div class="connector"></div>

        <div class="tier">
            <div class="node">🚪 API Gateway</div>
        </div>

        <div class="connector"></div>

        <div class="tier">
            <div class="node">🖥️ App Server 1</div>
            <div class="node">🖥️ App Server 2</div>
            <div class="node">🖥️ App Server 3</div>
        </div>

        <div class="connector"></div>

        <div class="bottom-tier">

            <div class="node database">
                🗄️ Database
            </div>

            <div class="node cache">
                ⚡ Cache
            </div>

            <div class="node storage">
                📦 Storage
            </div>

        </div>

    </div>

</div>

</body>
</html>
