<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Masonry Reverse - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Masonry — Reverse</h1>
    <p class="description">
      Self-contained demo. Items flow right-to-left in the
      reverse variants.
    </p>

    <h2>2 columns (default)</h2>
    <div class="ease-masonry-2">
      <div class="tile">A</div>
      <div class="tile">B</div>
      <div class="tile">C</div>
      <div class="tile">D</div>
    </div>

    <h2>2 columns (reverse)</h2>
    <div class="ease-masonry-2-reverse">
      <div class="tile">A</div>
      <div class="tile">B</div>
      <div class="tile">C</div>
      <div class="tile">D</div>
    </div>

  </div>

</body>
</html>
