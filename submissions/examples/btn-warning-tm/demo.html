<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Button Warning - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Button — Warning</h1>
    <p class="description">
      Self-contained demo of the proposed
      <code>.ease-btn-warning</code> color variant.
    </p>

    <div class="btn-row">
      <button class="ease-btn ease-btn-primary">Primary</button>
      <button class="ease-btn ease-btn-success">Success</button>
      <button class="ease-btn ease-btn-danger">Danger</button>
      <button class="ease-btn ease-btn-warning">Warning</button>
    </div>

  </div>

</body>
</html>
