<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bug Fix: Tooltip RTL Positioning</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="main-content">
    <h1>Bug Fix: Tooltip RTL Layout</h1>

    <section>
      <h2>LTR (default) — tooltip-right appears on RIGHT ✅</h2>
      <div class="demo-row" dir="ltr">
        <div class="tip-wrap">
          <button class="tip-btn" aria-describedby="tip-ltr">Hover me</button>
          <span class="tooltip tooltip-right" id="tip-ltr" role="tooltip">Right tooltip</span>
        </div>
      </div>
    </section>

    <section>
      <h2>RTL — tooltip-right now correctly appears on RIGHT ✅ (was appearing on LEFT ❌)</h2>
      <div class="demo-row" dir="rtl">
        <div class="tip-wrap">
          <button class="tip-btn" aria-describedby="tip-rtl">مرفق</button>
          <span class="tooltip tooltip-right" id="tip-rtl" role="tooltip">تلميح على اليمين</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
