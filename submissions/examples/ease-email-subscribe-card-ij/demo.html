<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Subscribe Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Email Subscribe Card</h1>

    <div class="card">
      <div class="card__content">
        <h2 class="card__title">Stay in the loop</h2>
        <p class="card__desc">Get the latest updates delivered to your inbox.</p>

        <form class="card__form" id="subscribeForm">
          <div class="card__input-wrap">
            <input
              type="email"
              class="card__input"
              id="emailInput"
              placeholder="you@example.com"
              required
            />
            <span class="card__focus-line"></span>
          </div>
          <button class="card__btn" type="submit" id="submitBtn">
            <span class="card__btn-text">Subscribe</span>
            <span class="card__spinner"></span>
            <span class="card__checkmark">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </span>
          </button>
        </form>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById('subscribeForm');
    const btn = document.getElementById('submitBtn');
    const btnText = btn.querySelector('.card__btn-text');
    const spinner = btn.querySelector('.card__spinner');
    const checkmark = btn.querySelector('.card__checkmark');
    const input = document.getElementById('emailInput');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!input.value) return;

      btn.classList.add('loading');
      btnText.textContent = 'Sending';

      await new Promise(r => setTimeout(r, 1800));

      btn.classList.remove('loading');
      btn.classList.add('success');
      btnText.textContent = 'Subscribed';
      input.value = '';

      setTimeout(() => {
        btn.classList.remove('success');
        btnText.textContent = 'Subscribe';
      }, 3000);
    });
  </script>
</body>
</html>
