<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-badge-pr Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 4rem 2rem;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }
    
    .demo-section h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #1e293b;
    }
    
    .badges-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
    }
    
    .badge-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    
    .badge-group-label {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="demo-section">
    <h2>Badges with Dot Indicator</h2>
    <div class="badges-row">
      <div class="badge-group">
        <span class="badge-group-label">Success</span>
        <span class="badge-pr badge-pr-success">
          <span class="badge-pr-dot"></span>
          Active
        </span>
      </div>
      <div class="badge-group">
        <span class="badge-group-label">Warning</span>
        <span class="badge-pr badge-pr-warning">
          <span class="badge-pr-dot"></span>
          Pending
        </span>
      </div>
      <div class="badge-group">
        <span class="badge-group-label">Error</span>
        <span class="badge-pr badge-pr-error">
          <span class="badge-pr-dot"></span>
          Failed
        </span>
      </div>
      <div class="badge-group">
        <span class="badge-group-label">Info</span>
        <span class="badge-pr badge-pr-info">
          <span class="badge-pr-dot"></span>
          New
        </span>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <h2>Badges without Dot</h2>
    <div class="badges-row">
      <span class="badge-pr badge-pr-success">Shipped</span>
      <span class="badge-pr badge-pr-warning">Processing</span>
      <span class="badge-pr badge-pr-error">Cancelled</span>
      <span class="badge-pr badge-pr-info">Beta</span>
    </div>
  </div>

</body>
</html>
