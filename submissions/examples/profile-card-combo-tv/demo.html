<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neumorphic Glass Profile Card</title>

  <link rel="stylesheet" href="./style.css">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;

      background-color: #0b1121;
      background-image:
        radial-gradient(at 10% 20%, rgba(108,99,255,0.15) 0px, transparent 45%),
        radial-gradient(at 90% 80%, rgba(244,63,94,0.12) 0px, transparent 45%),
        linear-gradient(180deg, #070c18 0%, #0b1121 100%);
      background-attachment: fixed;
    }
  </style>
</head>
<body>

  <header style="margin-bottom:2rem;text-align:center;max-width:500px;">
    <h1 style="color:white;margin:0;">
      Neumorphic Glass Profile Card
    </h1>

    <p style="color:#94a3b8;">
      A modern profile card combining glassmorphism and neumorphism.
    </p>
  </header>

  <div class="alm-hybrid-card">

    <div class="alm-avatar-ring">
      <img
        src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=300&q=80"
        alt="Profile Avatar">

      <span class="alm-status"></span>
    </div>

    <div class="alm-profile-details">

      <h2 class="alm-profile-name">Adya Priyam</h2>

      <div class="alm-profile-title">
        Core Systems Engineer
      </div>

      <p class="alm-profile-bio">
        Engineering modular design systems and building scalable UI experiences with performance-focused CSS architecture.
      </p>

      <div class="alm-skills">
        <span>HTML</span>
        <span>CSS</span>
        <span>JavaScript</span>
      </div>

      <div class="alm-socials">
        <a href="https://github.com" target="_blank">GitHub</a>
        <a href="https://linkedin.com" target="_blank">LinkedIn</a>
      </div>

      <a
        href="https://github.com"
        target="_blank"
        class="alm-profile-action-btn">
        View Profile
      </a>

    </div>
  </div>

</body>
</html>
