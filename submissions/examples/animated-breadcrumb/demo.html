<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animated Breadcrumb Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: Inter, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      min-height: 100vh;
      background: #f8fafc;
      padding: 2rem;
    }
    h2 { color: #7c3aed; }
    .demo-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 1.5rem 2rem;
      width: 100%;
      max-width: 560px;
    }
    .demo-card label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 0.75rem;
    }
  </style>
</head>
<body>

  <h2>Animated Breadcrumb</h2>

  <!-- Default slash separator -->
  <div class="demo-card">
    <label>Default ( / )</label>
    <nav aria-label="Breadcrumb">
      <ol class="ease-breadcrumb ease-breadcrumb-slash">
        <li class="ease-breadcrumb-item">
          <a class="ease-breadcrumb-link" href="#">Home</a>
          <span class="ease-breadcrumb-separator"></span>
        </li>
        <li class="ease-breadcrumb-item">
          <a class="ease-breadcrumb-link" href="#">Components</a>
          <span class="ease-breadcrumb-separator"></span>
        </li>
        <li class="ease-breadcrumb-item">
          <a class="ease-breadcrumb-link" href="#">Navigation</a>
          <span class="ease-breadcrumb-separator"></span>
        </li>
        <li class="ease-breadcrumb-item">
          <span class="ease-breadcrumb-current" aria-current="page">Breadcrumb</span>
        </li>
      </ol>
    </nav>
  </div>

  <!-- Arrow separator -->
  <div class="demo-card">
    <label>Arrow ( → )</label>
    <nav aria-label="Breadcrumb">
      <ol class="ease-breadcrumb ease-breadcrumb-arrow">
        <li class="ease-breadcrumb-item">
          <a class="ease-breadcrumb-link" href="#">Dashboard</a>
          <span class="ease-breadcrumb-separator"></span>
        </li>
        <li class="ease-breadcrumb-item">
          <a class="ease-breadcrumb-link" href="#">Settings</a>
          <span class="ease-breadcrumb-separator"></span>
        </li>
        <li class="ease-breadcrumb-item">
          <span class="ease-breadcrumb-current" aria-current="page">Profile</span>
        </li>
      </ol>
    </nav>
  </div>

  <!-- Chevron separator -->
  <div class="demo-card">
    <label>Chevron ( › )</label>
    <nav aria-label="Breadcrumb">
      <ol class="ease-breadcrumb ease-breadcrumb-chevron">
        <li class="ease-breadcrumb-item">
          <a class="ease-breadcrumb-link" href="#">Shop</a>
          <span class="ease-breadcrumb-separator"></span>
        </li>
        <li class="ease-breadcrumb-item">
          <a class="ease-breadcrumb-link" href="#">Electronics</a>
          <span class="ease-breadcrumb-separator"></span>
        </li>
        <li class="ease-breadcrumb-item">
          <a class="ease-breadcrumb-link" href="#">Laptops</a>
          <span class="ease-breadcrumb-separator"></span>
        </li>
        <li class="ease-breadcrumb-item">
          <span class="ease-breadcrumb-current" aria-current="page">MacBook Pro</span>
        </li>
      </ol>
    </nav>
  </div>

</body>
</html>
