<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-pulse — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; letter-spacing: 0.05em; }
    .row { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; align-items: center; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .dot {
      width: 16px; height: 16px; border-radius: 50%;
      background: #ef4444; display: inline-block;
    }
    .card {
      padding: 1rem 2rem; border-radius: 12px;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      color: #fff; font-weight: 500;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1rem; border-radius: 20px;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      color: #aaa; font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <h1>ease-pulse</h1>
  <div class="section">
    <div class="label">Speed variants</div>
    <div class="row">
      <div class="badge"><span class="dot ease-pulse-fast"></span> Live</div>
      <div class="badge"><span class="dot ease-pulse"></span> Recording</div>
      <div class="badge"><span class="dot ease-pulse-slow"></span> Idle</div>
    </div>
  </div>
</body>
</html>
