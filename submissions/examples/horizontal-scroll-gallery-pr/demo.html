<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Horizontal Scrollable Card Gallery Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
      padding: 2rem 0;
    }

    h2 {
      color: #555;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0 0 0.5rem 1rem;
    }

    .card-thumb {
      width: 100%;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      color: white;
    }

    .card-body {
      padding: 1rem;
    }

    .card-body h3 {
      margin: 0 0 0.4rem;
      font-size: 1rem;
      color: #333;
    }

    .card-body p {
      margin: 0;
      font-size: 0.85rem;
      color: #666;
    }
  </style>
</head>
<body>

  <h2>Scroll to explore →</h2>

  <div class="ease-scroll-gallery">

    <div class="ease-scroll-item">
      <div class="card-thumb" style="background:#6366f1;">🎨</div>
      <div class="card-body">
        <h3>Card One</h3>
        <p>Smooth scroll snap on mobile and desktop.</p>
      </div>
    </div>

    <div class="ease-scroll-item">
      <div class="card-thumb" style="background:#10b981;">🌿</div>
      <div class="card-body">
        <h3>Card Two</h3>
        <p>No JavaScript needed. Pure CSS snap.</p>
      </div>
    </div>

    <div class="ease-scroll-item">
      <div class="card-thumb" style="background:#f59e0b;">⚡</div>
      <div class="card-body">
        <h3>Card Three</h3>
        <p>Hover lift effect with smooth transition.</p>
      </div>
    </div>

    <div class="ease-scroll-item">
      <div class="card-thumb" style="background:#ef4444;">🔥</div>
      <div class="card-body">
        <h3>Card Four</h3>
        <p>Hidden scrollbar for a clean look.</p>
      </div>
    </div>

    <div class="ease-scroll-item">
      <div class="card-thumb" style="background:#3b82f6;">🚀</div>
      <div class="card-body">
        <h3>Card Five</h3>
        <p>Works great for carousels and showcases.</p>
      </div>
    </div>

  </div>

</body>
</html>
