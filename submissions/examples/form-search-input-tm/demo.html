<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Form Search Input - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Form — Search Input</h1>
    <p class="description">
      Self-contained demo of the proposed
      <code>.ease-input-search</code> class.
    </p>

    <div class="ease-field">
      <label class="ease-field-label" for="search">Search</label>
      <input
        type="search"
        class="ease-input ease-input-search"
        id="search"
        placeholder="Type to search..."
      >
    </div>

  </div>

</body>
</html>
