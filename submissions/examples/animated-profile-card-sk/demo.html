<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="profile-card">
    <div class="profile-avatar">
      <div class="avatar-circle"></div>
    </div>
    <h2 class="profile-name">Sarah Chen</h2>
    <p class="profile-title">Senior UX Designer</p>
    <div class="profile-stats">
      <div class="stat">
        <span class="stat-num" data-target="1280">0</span>
        <span class="stat-label">Followers</span>
      </div>
      <div class="stat">
        <span class="stat-num" data-target="342">0</span>
        <span class="stat-label">Posts</span>
      </div>
      <div class="stat">
        <span class="stat-num" data-target="8900">0</span>
        <span class="stat-label">Likes</span>
      </div>
    </div>
    <div class="profile-social">
      <span class="social-icon">T</span>
      <span class="social-icon">L</span>
      <span class="social-icon">G</span>
      <span class="social-icon">D</span>
    </div>
  </div>
</body>
</html>
