<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-only Animated Vinyl Record</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-vinyl-container">
    <div class="ease-record-player">
      <!-- Player Base -->
      <div class="ease-player-base">
        <!-- Turntable Platter -->
        <div class="ease-platter">
          <!-- Vinyl Record -->
          <div class="ease-vinyl-record">
            <div class="ease-record-grooves"></div>
            <div class="ease-record-grooves-2"></div>
            <div class="ease-record-label">
              <div class="ease-record-hole"></div>
            </div>
          </div>
        </div>
        
        <!-- Tonearm Assembly -->
        <div class="ease-tonearm-base">
          <div class="ease-tonearm">
            <div class="ease-tonearm-headshell"></div>
          </div>
        </div>

        <!-- Controls -->
        <div class="ease-controls">
          <div class="ease-knob"></div>
          <div class="ease-knob"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
