<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Jitter Lock Fix Demo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="page-content">
    <a href="#modal" class="open-btn">Open Dialog</a>
    
    <div id="modal" class="overlay">
      <div class="modal-box">
        <h3>Fixed Alignment Jitter</h3>
        <p>Observe the background layout stays stable when modal is loaded.</p>
        <a href="#" class="close-btn">Dismiss</a>
      </div>
    </div>
  </div>

  <script>
    const overlay = document.querySelector('#modal');
    window.addEventListener('hashchange', () => {
      const body = document.body;
      if (window.location.hash === '#modal') {
        const scrollbarWidth = window.innerWidth - document.documentElement.clientWidth;
        body.style.overflow = 'hidden';
        body.style.paddingRight = ${scrollbarWidth}px;
      } else {
        body.style.overflow = '';
        body.style.paddingRight = '';
      }
    });
  </script>
</body>
</html>
