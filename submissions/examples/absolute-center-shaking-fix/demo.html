<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Absolute Center Shaking Fix</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 460px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Sub-Pixel Jitter Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Click the text field inside the dialog box below and type quickly. Centering over a flat parent <code>place-items: center</code> grid blocks text caret shaking bugs with 0 scripts.</p>
  </header>

  <div class="alm-center-grid-stage">
    
    <div class="alm-stabilized-dialog-card">
      
      <h3 class="alm-dialog-header-title">Console Authentication</h3>
      
      <div class="alm-dialog-input-group">
        <label class="alm-dialog-field-label">Node Access Token</label>
        <input type="text" 
               class="alm-dialog-text-input" 
               value="aryan_raj_dev" 
               placeholder="Enter cluster pass..."
               autofocus>
      </div>

      <button class="alm-dialog-submit-btn" type="button">Connect Node</button>

    </div>

  </div>

</body>
</html>
