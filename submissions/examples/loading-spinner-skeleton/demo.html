<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Spinner & Skeleton Loader</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Loading States Demo</h1>
<h2>Loading Card Example</h2>

<div class="ease-skeleton-card">
  <div class="ease-skeleton ease-skeleton-avatar"></div>
  <div class="ease-skeleton ease-skeleton-text"></div>
  <div class="ease-skeleton ease-skeleton-text" style="width:60%"></div>
</div>

<div class="section">
  <h2>Spinner Sizes</h2>

  <div class="demo-row">
    <div class="ease-spinner ease-spinner-sm"></div>
    <div class="ease-spinner"></div>
    <div class="ease-spinner ease-spinner-lg"></div>
  </div>
</div>

<div class="section">
  <h2>Spinner Colors</h2>

  <div class="demo-row">
    <div class="ease-spinner ease-spinner-primary"></div>
    <div class="ease-spinner ease-spinner-success"></div>
    <div class="ease-spinner ease-spinner-danger"></div>
  </div>
</div>

<div class="section">
  <h2>Skeleton Text</h2>

  <div class="ease-skeleton ease-skeleton-text"></div>
  <div class="ease-skeleton ease-skeleton-text" style="width: 70%;"></div>
  <div class="ease-skeleton ease-skeleton-text" style="width: 50%;"></div>
</div>

<div
  class="ease-spinner ease-spinner-primary"
  role="status"
  aria-label="Loading"
></div>

<div class="section">
  <h2>Skeleton Avatar</h2>

  <div class="ease-skeleton ease-skeleton-avatar"></div>
</div>

<div class="section">
  <h2>Skeleton Card</h2>

  <div class="ease-skeleton-card">
    <div class="ease-skeleton ease-skeleton-avatar"></div>

    <div class="ease-skeleton ease-skeleton-text"></div>

    <div
      class="ease-skeleton ease-skeleton-text"
      style="width: 70%;"
    ></div>
  </div>
</div>

</body>
</html>
