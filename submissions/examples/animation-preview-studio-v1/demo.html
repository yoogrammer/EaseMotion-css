<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Preview Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <header>
    <h1>Animation Preview Studio</h1>
    <p>Explore and test EaseMotion CSS animations in real time.</p>
  </header>

  <div class="studio">

    <section class="controls">

      <h2>Controls</h2>

      <label>Animation</label>
      <select id="animationSelect"></select>

      <label>Duration</label>
      <input type="number" id="duration" value="1" step="0.1">

      <label>Delay</label>
      <input type="number" id="delay" value="0" step="0.1">

      <label>Iterations</label>
      <input type="number" id="iterations" value="1" min="1">

      <div class="buttons">
        <button id="playBtn">Play</button>
        <button id="pauseBtn">Pause</button>
        <button id="resetBtn">Reset</button>
        <button id="copyBtn">Copy Class</button>
      </div>

    </section>

    <section class="preview-section">

      <div id="previewBox" class="preview-box">
        Animate Me
      </div>

      <div class="status" id="status">
        Ready
      </div>

    </section>

  </div>

  <section class="info">

    <h2>Animation Details</h2>

    <h3 id="animationName">Fade In</h3>

    <p id="animationDescription">
      Gradually increases opacity from 0 to 1.
    </p>

  </section>

</div>

<script src="script.js"></script>

</body>
</html>
