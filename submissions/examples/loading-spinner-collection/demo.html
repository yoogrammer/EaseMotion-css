<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Spinner Collection</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Loading Spinner Collection</h1>
    <p class="subtitle">8 CSS-only loading animations</p>

    <div class="grid">
      <div class="card">
        <span class="label">Rotating Ring</span>
        <div class="spinner" data-type="ring" role="status">
          <span class="sr-only">Loading...</span>
        </div>
      </div>

      <div class="card">
        <span class="label">Bouncing Dots</span>
        <div class="spinner" data-type="dots" role="status">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="sr-only">Loading...</span>
        </div>
      </div>

      <div class="card">
        <span class="label">Pulsing Circle</span>
        <div class="spinner" data-type="pulse" role="status">
          <span class="sr-only">Loading...</span>
        </div>
      </div>

      <div class="card">
        <span class="label">Rotating Fan</span>
        <div class="spinner" data-type="fan" role="status">
          <span class="blade"></span>
          <span class="blade"></span>
          <span class="blade"></span>
          <span class="blade"></span>
          <span class="blade"></span>
          <span class="blade"></span>
          <span class="sr-only">Loading...</span>
        </div>
      </div>

      <div class="card">
        <span class="label">Wave Bars</span>
        <div class="spinner" data-type="wave" role="status">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="sr-only">Loading...</span>
        </div>
      </div>

      <div class="card">
        <span class="label">Hourglass</span>
        <div class="spinner" data-type="hourglass" role="status">
          <span class="sr-only">Loading...</span>
        </div>
      </div>

      <div class="card">
        <span class="label">Flipping Squares</span>
        <div class="spinner" data-type="squares" role="status">
          <span class="sq"></span>
          <span class="sq"></span>
          <span class="sq"></span>
          <span class="sq"></span>
          <span class="sr-only">Loading...</span>
        </div>
      </div>

      <div class="card">
        <span class="label">Orbit Ring</span>
        <div class="spinner" data-type="orbit" role="status">
          <div class="orbit-ring">
            <span class="orbit-dot"></span>
          </div>
          <span class="sr-only">Loading...</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
