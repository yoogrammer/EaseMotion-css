<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Strength Meter Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Password Strength Meter</h1>
        <p class="subtitle">Bars animate with color grading</p>

        <!-- PASSWORD STRENGTH METER COMPONENT -->
        <div class="meter-container">
            <div class="meter-wrapper" id="meterWrapper">
                <div class="meter-header">
                    <label for="passwordInput" class="meter-label">Enter Password</label>
                    <span class="meter-score" id="scoreDisplay">0/4</span>
                </div>
                <div class="meter-input-wrapper">
                    <div class="meter-input-group">
                        <input 
                            type="password" 
                            id="passwordInput" 
                            class="meter-input" 
                            placeholder="Type your password..."
                            autocomplete="new-password"
                        />
                        <button class="meter-toggle" id="toggleVisibility" type="button" aria-label="Toggle password visibility">
                            <svg class="meter-eye" viewBox="0 0 24 24" width="20" height="20">
                                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" fill="currentColor"/>
                            </svg>
                            <svg class="meter-eye-off" viewBox="0 0 24 24" width="20" height="20" style="display:none;">
                                <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" fill="currentColor"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Strength Bars -->
                <div class="meter-bars" id="meterBars">
                    <div class="meter-bar" id="bar1">
                        <div class="meter-bar-fill" id="fill1"></div>
                    </div>
                    <div class="meter-bar" id="bar2">
                        <div class="meter-bar-fill" id="fill2"></div>
                    </div>
                    <div class="meter-bar" id="bar3">
                        <div class="meter-bar-fill" id="fill3"></div>
                    </div>
                    <div class="meter-bar" id="bar4">
                        <div class="meter-bar-fill" id="fill4"></div>
                    </div>
                </div>

                <!-- Footer -->
                <div class="meter-footer">
                    <span class="meter-status" id="meterStatus">Enter a password</span>
                    <span class="meter-requirements" id="requirements">8+ chars • Letters • Numbers • Symbols</span>
                </div>

                <!-- Detailed Requirements -->
                <div class="meter-requirements-list" id="requirementsList">
                    <div class="requirement" id="reqLength">
                        <span class="req-icon">○</span>
                        <span class="req-text">At least 8 characters</span>
                    </div>
                    <div class="requirement" id="reqLower">
                        <span class="req-icon">○</span>
                        <span class="req-text">Contains lowercase letter</span>
                    </div>
                    <div class="requirement" id="reqUpper">
                        <span class="req-icon">○</span>
                        <span class="req-text">Contains uppercase letter</span>
                    </div>
                    <div class="requirement" id="reqNumber">
                        <span class="req-icon">○</span>
                        <span class="req-text">Contains number</span>
                    </div>
                    <div class="requirement" id="reqSymbol">
                        <span class="req-icon">○</span>
                        <span class="req-text">Contains special character</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Demo Controls -->
        <div class="demo-controls">
            <button class="demo-btn" id="generateBtn">Generate Password</button>
            <button class="demo-btn" id="clearBtn">Clear</button>
        </div>

        <!-- Status Display -->
        <div class="status-display">
            <span class="status-label">Strength:</span>
            <span class="status-value" id="strengthValue">None</span>
            <span class="status-label">Score:</span>
            <span class="status-value" id="scoreValue">0/4</span>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const passwordInput = document.getElementById('passwordInput');
            const toggleBtn = document.getElementById('toggleVisibility');
            const eyeIcon = document.querySelector('.meter-eye');
            const eyeOffIcon = document.querySelector('.meter-eye-off');
            const fill1 = document.getElementById('fill1');
            const fill2 = document.getElementById('fill2');
            const fill3 = document.getElementById('fill3');
            const fill4 = document.getElementById('fill4');
            const bars = [fill1, fill2, fill3, fill4];
            const meterStatus = document.getElementById('meterStatus');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const strengthValue = document.getElementById('strengthValue');
            const scoreValue = document.getElementById('scoreValue');
            const requirements = document.getElementById('requirements');
            const meterWrapper = document.getElementById('meterWrapper');
            const generateBtn = document.getElementById('generateBtn');
            const clearBtn = document.getElementById('clearBtn');

            // Requirement elements
            const reqLength = document.getElementById('reqLength');
            const reqLower = document.getElementById('reqLower');
            const reqUpper = document.getElementById('reqUpper');
            const reqNumber = document.getElementById('reqNumber');
            const reqSymbol = document.getElementById('reqSymbol');
            const requirementMap = {
                length: reqLength,
                lower: reqLower,
                upper: reqUpper,
                number: reqNumber,
                symbol: reqSymbol
            };

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                minLength: 8,
                colors: {
                    none: '#d1d5db',
                    weak: '#ff3b30',
                    fair: '#f59e0b',
                    good: '#4facfe',
                    strong: '#34c759'
                },
                labels: {
                    none: 'Enter a password',
                    weak: 'Weak',
                    fair: 'Fair',
                    good: 'Good',
                    strong: 'Strong'
                },
                descriptions: {
                    none: 'Enter a password to check strength',
                    weak: 'Too weak - add more variety',
                    fair: 'Getting better - add more characters',
                    good: 'Good - almost there!',
                    strong: 'Strong password!'
                },
                onUpdate: function(score, strength) {
                    console.log(`📊 Score: ${score}/4 - ${strength}`);
                }
            };

            // ============================================
            // PASSWORD STRENGTH CHECKER
            // ============================================
            function checkPasswordStrength(password) {
                if (!password) {
                    return { score: 0, strength: 'none', checks: {} };
                }

                const checks = {
                    length: password.length >= CONFIG.minLength,
                    lower: /[a-z]/.test(password),
                    upper: /[A-Z]/.test(password),
                    number: /[0-9]/.test(password),
                    symbol: /[^a-zA-Z0-9]/.test(password)
                };

                let score = 0;
                if (checks.length) score++;
                if (checks.lower) score++;
                if (checks.upper) score++;
                if (checks.number) score++;
                if (checks.symbol) score++;

                // Bonus for length > 12
                if (password.length >= 12) {
                    // If all checks pass, bonus
                    if (score >= 4) score = 4;
                }

                // Cap at 4
                score = Math.min(score, 4);

                let strength;
                if (score === 0) strength = 'none';
                else if (score === 1) strength = 'weak';
                else if (score === 2) strength = 'fair';
                else if (score === 3) strength = 'good';
                else strength = 'strong';

                return { score, strength, checks };
            }

            // ============================================
            // UI UPDATE FUNCTIONS
            // ============================================
            function updateMeter(password) {
                const result = checkPasswordStrength(password);
                const { score, strength, checks } = result;
                const color = CONFIG.colors[strength];
                const label = CONFIG.labels[strength];
                const description = CONFIG.descriptions[strength];

                // Update bars
                bars.forEach((bar, index) => {
                    const isActive = index < score;
                    bar.style.width = isActive ? '100%' : '0%';
                    bar.style.background = isActive ? color : CONFIG.colors.none;
                    bar.style.transition = 'width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s ease';
                });

                // Update status
                meterStatus.textContent = label;
                meterStatus.style.color = color;

                // Update score display
                scoreDisplay.textContent = `${score}/4`;
                scoreDisplay.style.color = color;

                // Update status display
                strengthValue.textContent = label;
                strengthValue.style.color = color;
                scoreValue.textContent = `${score}/4`;

                // Update wrapper class
                meterWrapper.className = 'meter-wrapper';
                if (password && score > 0) {
                    meterWrapper.classList.add(strength);
                }

                // Update requirements
                updateRequirements(checks);

                // Update toggle button state
                if (password) {
                    toggleBtn.style.opacity = '1';
                    toggleBtn.style.pointerEvents = 'auto';
                } else {
                    toggleBtn.style.opacity = '0.5';
                    toggleBtn.style.pointerEvents = 'none';
                }

                // Trigger callback
                CONFIG.onUpdate(score, strength);
            }

            function updateRequirements(checks) {
                const icons = {
                    length: checks.length ? '✓' : '○',
                    lower: checks.lower ? '✓' : '○',
                    upper: checks.upper ? '✓' : '○',
                    number: checks.number ? '✓' : '○',
                    symbol: checks.symbol ? '✓' : '○'
                };

                const colors = {
                    length: checks.length ? CONFIG.colors.strong : '#d1d5db',
                    lower: checks.lower ? CONFIG.colors.strong : '#d1d5db',
                    upper: checks.upper ? CONFIG.colors.strong : '#d1d5db',
                    number: checks.number ? CONFIG.colors.strong : '#d1d5db',
                    symbol: checks.symbol ? CONFIG.colors.strong : '#d1d5db'
                };

                Object.keys(requirementMap).forEach(key => {
                    const el = requirementMap[key];
                    const icon = el.querySelector('.req-icon');
                    const text = el.querySelector('.req-text');
                    const isMet = checks[key] || false;

                    icon.textContent = isMet ? '✓' : '○';
                    icon.style.color = isMet ? CONFIG.colors.strong : '#d1d5db';
                    text.style.color = isMet ? CONFIG.colors.strong : '#6b7280';
                    el.classList.toggle('met', isMet);
                });
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            // Real-time input
            passwordInput.addEventListener('input', function() {
                updateMeter(this.value);
            });

            // Toggle password visibility
            toggleBtn.addEventListener('click', function() {
                const isPassword = passwordInput.type === 'password';
                passwordInput.type = isPassword ? 'text' : 'password';
                eyeIcon.style.display = isPassword ? 'none' : 'block';
                eyeOffIcon.style.display = isPassword ? 'block' : 'none';
                this.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
            });

            // Focus highlight
            passwordInput.addEventListener('focus', function() {
                this.parentElement.parentElement.classList.add('focused');
            });

            passwordInput.addEventListener('blur', function() {
                this.parentElement.parentElement.classList.remove('focused');
            });

            // ============================================
            // DEMO CONTROLS
            // ============================================
            function generatePassword(length = 12) {
                const lower = 'abcdefghijklmnopqrstuvwxyz';
                const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                const numbers = '0123456789';
                const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';
                const all = lower + upper + numbers + symbols;

                let password = '';
                // Ensure at least one of each type
                password += lower[Math.floor(Math.random() * lower.length)];
                password += upper[Math.floor(Math.random() * upper.length)];
                password += numbers[Math.floor(Math.random() * numbers.length)];
                password += symbols[Math.floor(Math.random() * symbols.length)];

                // Fill remaining
                for (let i = password.length; i < length; i++) {
                    password += all[Math.floor(Math.random() * all.length)];
                }

                // Shuffle
                password = password.split('').sort(() => Math.random() - 0.5).join('');
                return password;
            }

            generateBtn.addEventListener('click', function() {
                const password = generatePassword(14);
                passwordInput.value = password;
                updateMeter(password);
                // Show as text briefly
                const wasPassword = passwordInput.type === 'password';
                if (wasPassword) {
                    passwordInput.type = 'text';
                    eyeIcon.style.display = 'none';
                    eyeOffIcon.style.display = 'block';
                    setTimeout(() => {
                        passwordInput.type = 'password';
                        eyeIcon.style.display = 'block';
                        eyeOffIcon.style.display = 'none';
                    }, 3000);
                }
            });

            clearBtn.addEventListener('click', function() {
                passwordInput.value = '';
                updateMeter('');
                passwordInput.focus();
            });

            // ============================================
            // KEYBOARD ACCESSIBILITY
            // ============================================
            passwordInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const strength = checkPasswordStrength(this.value).strength;
                    if (strength === 'strong') {
                        showFeedback('✅ Strong password! You\'re good to go!', 'success');
                    } else if (strength === 'good') {
                        showFeedback('⚠️ Good password, but you can make it stronger!', 'warning');
                    } else if (strength === 'weak' || strength === 'fair') {
                        showFeedback('❌ Password too weak! Please add more variety.', 'error');
                    }
                }
            });

            // ============================================
            // FEEDBACK
            // ============================================
            function showFeedback(message, type) {
                const feedback = document.getElementById('actionFeedback') || (() => {
                    const el = document.createElement('div');
                    el.id = 'actionFeedback';
                    el.className = 'action-feedback';
                    document.querySelector('.demo-wrapper').appendChild(el);
                    return el;
                })();
                feedback.textContent = message;
                feedback.className = 'action-feedback ' + type;
                feedback.style.display = 'block';
                clearTimeout(feedback._hideTimeout);
                feedback._hideTimeout = setTimeout(() => {
                    feedback.style.display = 'none';
                    feedback.className = 'action-feedback';
                }, 3000);
            }

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.PasswordMeter = {
                check: (password) => checkPasswordStrength(password),
                setPassword: (password) => {
                    passwordInput.value = password;
                    updateMeter(password);
                },
                getScore: () => checkPasswordStrength(passwordInput.value).score,
                getStrength: () => checkPasswordStrength(passwordInput.value).strength,
                reset: () => {
                    passwordInput.value = '';
                    updateMeter('');
                },
                generate: generatePassword,
                configure: (config) => {
                    Object.assign(CONFIG, config);
                    updateMeter(passwordInput.value);
                },
                toggleVisibility: () => toggleBtn.click()
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            updateMeter('');
            console.log('✅ Password Strength Meter initialized!');
            console.log('📖 API: window.PasswordMeter');
            console.log('📖 Usage:');
            console.log('  - Type a password to see strength meter');
            console.log('  - Bars animate with color grading');
            console.log('  - Click 👁️ to toggle visibility');

        })();
    </script>
</body>
</html>
