<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Ripple Button – EaseMotion CSS</title>
  <meta name="description" content="Material-style water ripple effect on button click using CSS animations." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Water Ripple Button</h1>
  <p>Click anywhere on the buttons to see the ripple</p>

  <div class="btn-row">
    <button class="ripple-btn ripple-btn--primary">
      <span class="ripple-surface"></span>
      Primary Action
    </button>
    <button class="ripple-btn ripple-btn--outline">
      <span class="ripple-surface"></span>
      Secondary
    </button>
    <button class="ripple-btn ripple-btn--circle" aria-label="Add item">
      <span class="ripple-surface"></span>
      +
    </button>
  </div>

  <script>
    document.querySelectorAll('.ripple-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const surface = btn.querySelector('.ripple-surface');
        const rect = btn.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height) * 2;
        const x = e.clientX - rect.left - size / 2;
        const y = e.clientY - rect.top - size / 2;

        const ripple = document.createElement('span');
        ripple.className = 'ripple-wave';
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';
        surface.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove());
      });
    });
  </script>
</body>
</html>
