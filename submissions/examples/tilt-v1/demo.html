<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-tilt — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f0f4ff;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #333; }
    .row { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
    .label { font-size: 0.75rem; color: #888; text-align: center; margin-bottom: 0.75rem; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .card {
      width: 160px;
      height: 100px;
      border-radius: 12px;
      background: white;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      color: #374151;
    }
    .card-color {
      width: 160px;
      height: 100px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      color: #fff;
    }
    .sublabel { font-size: 0.7rem; color: #aaa; text-align: center; margin-top: 0.5rem; }
  </style>
</head>
<body>

  <h1>ease-tilt Demo</h1>

  <div class="section">
    <div class="label">Direction variants (hover each)</div>
    <div class="row">
      <div style="text-align:center;">
        <div class="ease-tilt-container">
          <div class="card ease-tilt ease-tilt-left">Tilt Left</div>
        </div>
        <div class="sublabel">Left</div>
      </div>
      <div style="text-align:center;">
        <div class="ease-tilt-container">
          <div class="card ease-tilt ease-tilt-right">Tilt Right</div>
        </div>
        <div class="sublabel">Right</div>
      </div>
      <div style="text-align:center;">
        <div class="ease-tilt-container">
          <div class="card ease-tilt ease-tilt-up">Tilt Up</div>
        </div>
        <div class="sublabel">Up</div>
      </div>
      <div style="text-align:center;">
        <div class="ease-tilt-container">
          <div class="card ease-tilt ease-tilt-down">Tilt Down</div>
        </div>
        <div class="sublabel">Down</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="label">Intensity variants</div>
    <div class="row">
      <div style="text-align:center;">
        <div class="ease-tilt-container">
          <div class="card ease-tilt ease-tilt-subtle">Subtle</div>
        </div>
        <div class="sublabel">Subtle (6°)</div>
      </div>
      <div style="text-align:center;">
        <div class="ease-tilt-container">
          <div class="card ease-tilt">Default</div>
        </div>
        <div class="sublabel">Default (12°)</div>
      </div>
      <div style="text-align:center;">
        <div class="ease-tilt-container">
          <div class="card ease-tilt ease-tilt-hard">Hard</div>
        </div>
        <div class="sublabel">Hard (20°)</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="label">Tilt + scale variant</div>
    <div class="row">
      <div style="text-align:center;">
        <div class="ease-tilt-container">
          <div class="card-color ease-tilt ease-tilt-scale" style="background:#6366f1;">Tilt + Scale</div>
        </div>
        <div class="sublabel">Lifts on hover</div>
      </div>
      <div style="text-align:center;">
        <div class="ease-tilt-container">
          <div class="card-color ease-tilt ease-tilt-right ease-tilt-scale ease-tilt-subtle" style="background:#ec4899;">Right + Scale</div>
        </div>
        <div class="sublabel">Right + subtle</div>
      </div>
      <div style="text-align:center;">
        <div class="ease-tilt-container">
          <div class="card-color ease-tilt ease-tilt-up ease-tilt-scale ease-tilt-hard" style="background:#22c55e;">Up + Scale</div>
        </div>
        <div class="sublabel">Up + hard</div>
      </div>
    </div>
  </div>

</body>
</html>
