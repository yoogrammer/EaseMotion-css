<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Animated Number Counter</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            background: #0d0d14;
            color: #e4e4e7;
        }
        .demo-header { text-align: center; margin-bottom: 3rem; }
        .demo-header h1 { font-size: 2.5rem; background: linear-gradient(135deg, #6c63ff, #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .demo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; margin: 2rem 0; text-align: center; }
        .counter-card { background: #1a1a2e; border-radius: 1rem; padding: 2rem; }
        .counter-card h3 { color: #c4b5fd; margin-top: 0; }
        .note { background: #1a1a2e; padding: 1rem; border-radius: 12px; border-left: 3px solid #6c63ff; margin: 2rem 0; font-size: 0.875rem; text-align: center; }
        code { background: #1e1e2e; padding: 0.2rem 0.4rem; border-radius: 6px; }
        .spacer { height: 200px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="demo-header">
    <h1>Animated Number Counter</h1>
    <p>Numbers count up when they come into view</p>
</div>

<div class="spacer">
    <div class="note">Scroll down to see counters animate!</div>
</div>

<div class="demo-grid">
    <div class="counter-card">
        <h3>Users</h3>
        <div class="ease-counter" data-target="10000">0</div>
    </div>
    <div class="counter-card">
        <h3>Downloads</h3>
        <div class="ease-counter ease-counter-fast" data-target="50000">0</div>
    </div>
    <div class="counter-card">
        <h3>Countries</h3>
        <div class="ease-counter ease-counter-slow" data-target="150">0</div>
    </div>
    <div class="counter-card">
        <h3>⭐ Reviews</h3>
        <div class="ease-counter ease-counter-glow" data-target="5000">0</div>
    </div>
</div>

<div class="demo-grid">
    <div class="counter-card">
        <h3>Projects</h3>
        <div class="ease-counter ease-counter-large" data-target="250">0</div>
    </div>
    <div class="counter-card">
        <h3>Contributors</h3>
        <div class="ease-counter ease-counter-bold" data-target="42">0</div>
    </div>
    <div class="counter-card">
        <h3>Commits</h3>
        <div class="ease-counter ease-counter-purple" data-target="15000">0</div>
    </div>
    <div class="counter-card">
        <h3>⭐ Stars</h3>
        <div class="ease-counter ease-counter-pink" data-target="8000">0</div>
    </div>
</div>

<div class="note">
    💡 Numbers animate when scrolled into view. Uses Intersection Observer.
</div>

<script>
    function animateCounter(element, target, duration) {
        let start = 0;
        let increment = target / (duration / 16);
        let current = 0;
        function update() {
            current += increment;
            if (current < target) {
                element.textContent = Math.floor(current);
                requestAnimationFrame(update);
            } else {
                element.textContent = target;
            }
        }
        update();
    }
    let observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                let el = entry.target;
                let target = parseInt(el.getAttribute('data-target'));
                let duration = 2000;
                if (el.classList.contains('ease-counter-fast')) duration = 1000;
                if (el.classList.contains('ease-counter-slow')) duration = 3000;
                animateCounter(el, target, duration);
                observer.unobserve(el);
            }
        });
    }, { threshold: 0.5 });
    document.querySelectorAll('.ease-counter').forEach(el => observer.observe(el));
</script>

</body>
</html>
