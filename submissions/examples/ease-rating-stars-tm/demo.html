<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-rating-stars Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: Inter, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      min-height: 100vh;
      background: #f8fafc;
      padding: 2rem;
    }
    h2 { color: #7c3aed; }
    .demo-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 1.75rem 2rem;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .demo-card h3 {
      margin: 0;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .row span {
      font-size: 0.85rem;
      color: #64748b;
      min-width: 60px;
    }
  </style>
</head>
<body>

  <h2>ease-rating-stars</h2>

  <!-- Interactive -->
  <div class="demo-card">
    <h3>Interactive</h3>

    <div class="row">
      <span>Default</span>
      <div class="ease-rating">
        <input type="radio" name="r1" id="r1-5"><label for="r1-5"></label>
        <input type="radio" name="r1" id="r1-4"><label for="r1-4"></label>
        <input type="radio" name="r1" id="r1-3" checked><label for="r1-3"></label>
        <input type="radio" name="r1" id="r1-2"><label for="r1-2"></label>
        <input type="radio" name="r1" id="r1-1"><label for="r1-1"></label>
      </div>
    </div>

    <div class="row">
      <span>Small</span>
      <div class="ease-rating ease-rating-sm">
        <input type="radio" name="r2" id="r2-5"><label for="r2-5"></label>
        <input type="radio" name="r2" id="r2-4" checked><label for="r2-4"></label>
        <input type="radio" name="r2" id="r2-3"><label for="r2-3"></label>
        <input type="radio" name="r2" id="r2-2"><label for="r2-2"></label>
        <input type="radio" name="r2" id="r2-1"><label for="r2-1"></label>
      </div>
    </div>

    <div class="row">
      <span>Large</span>
      <div class="ease-rating ease-rating-lg">
        <input type="radio" name="r3" id="r3-5" checked><label for="r3-5"></label>
        <input type="radio" name="r3" id="r3-4"><label for="r3-4"></label>
        <input type="radio" name="r3" id="r3-3"><label for="r3-3"></label>
        <input type="radio" name="r3" id="r3-2"><label for="r3-2"></label>
        <input type="radio" name="r3" id="r3-1"><label for="r3-1"></label>
      </div>
    </div>
  </div>

  <!-- Read-only display -->
  <div class="demo-card">
    <h3>Read-only Display</h3>

    <div class="row">
      <span>5 / 5</span>
      <div class="ease-rating-display">
        <span class="ease-star-filled">★</span>
        <span class="ease-star-filled">★</span>
        <span class="ease-star-filled">★</span>
        <span class="ease-star-filled">★</span>
        <span class="ease-star-filled">★</span>
      </div>
    </div>

    <div class="row">
      <span>3.5 / 5</span>
      <div class="ease-rating-display">
        <span class="ease-star-filled">★</span>
        <span class="ease-star-filled">★</span>
        <span class="ease-star-filled">★</span>
        <span class="ease-star-half"></span>
        <span>★</span>
      </div>
    </div>

    <div class="row">
      <span>2 / 5</span>
      <div class="ease-rating-display">
        <span class="ease-star-filled">★</span>
        <span class="ease-star-filled">★</span>
        <span>★</span>
        <span>★</span>
        <span>★</span>
      </div>
    </div>
  </div>

</body>
</html>
