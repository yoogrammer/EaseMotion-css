<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-float — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; letter-spacing: 0.05em; }
    .row { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; align-items: center; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .card {
      padding: 1.5rem 2rem; border-radius: 16px;
      background: #6366f1; color: #fff; font-weight: 600;
      width: 160px; text-align: center;
    }
    .icon { font-size: 3rem; display: inline-block; }
  </style>
</head>
<body>
  <h1>ease-float</h1>
  <div class="section">
    <div class="label">Float speed variants</div>
    <div class="row">
      <div class="card ease-float-fast">Fast</div>
      <div class="card ease-float">Default</div>
      <div class="card ease-float-slow">Slow</div>
    </div>
  </div>
</body>
</html>
