<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backdrop Blur Gallery - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Backdrop Blur Gallery</h1>
    <div class="blur-grid">
      <div class="blur-card" style="--blur: 2px">
        <div class="blur-content"><span>2px</span></div>
      </div>
      <div class="blur-card" style="--blur: 6px">
        <div class="blur-content"><span>6px</span></div>
      </div>
      <div class="blur-card" style="--blur: 12px">
        <div class="blur-content"><span>12px</span></div>
      </div>
      <div class="blur-card" style="--blur: 20px">
        <div class="blur-content"><span>20px</span></div>
      </div>
    </div>
    <p class="description">Cards with varying backdrop-blur levels over a gradient background.</p>
  </div>
</body>
</html>
