<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>:placeholder-shown Animation</title><link rel="stylesheet" href="style.css"/></head>
<body>
<h1>:placeholder-shown</h1>
<p class="subtitle">Animate labels and inputs based on whether the placeholder is visible.</p>
<section class="demo">
  <div class="ps-form">
    <div class="ps-field">
      <input type="text" class="ps-input" placeholder=" "/>
      <label class="ps-label">Full Name</label>
    </div>
    <div class="ps-field">
      <input type="email" class="ps-input" placeholder=" "/>
      <label class="ps-label">Email Address</label>
    </div>
    <div class="ps-field">
      <input type="password" class="ps-input" placeholder=" "/>
      <label class="ps-label">Password</label>
    </div>
  </div>
  <p class="note">When the input is empty (<code>:placeholder-shown</code>), the label sits inside the input. When you type, the label floats up with an animation.</p>
</section>
</body>
</html>
