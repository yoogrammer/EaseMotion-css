<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Glow Card Emphasis</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="section">
    <h2>Hover over each card</h2>
    <div style="display:flex; gap:20px; flex-wrap:wrap; justify-content:center;">

      <div class="glow-card glow-purple">
        <div class="icon">⚡</div>
        <div class="title" style="color:#6c63ff;">Purple Glow</div>
        <div class="subtitle">glow-purple</div>
      </div>

      <div class="glow-card glow-green">
        <div class="icon">🌿</div>
        <div class="title" style="color:#10b981;">Green Glow</div>
        <div class="subtitle">glow-green</div>
      </div>

      <div class="glow-card glow-orange">
        <div class="icon">🔥</div>
        <div class="title" style="color:#f97316;">Orange Glow</div>
        <div class="subtitle">glow-orange</div>
      </div>

      <div class="glow-card glow-pink">
        <div class="icon">✨</div>
        <div class="title" style="color:#ec4899;">Pink Glow</div>
        <div class="subtitle">glow-pink</div>
      </div>

    </div>
  </div>

</body>
</html>
