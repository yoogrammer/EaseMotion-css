<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-focus-ring – EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      background: #1e1e2e;
      color: #f5f5f5;
      padding: 3rem 2rem;
    }
    h1 { font-size: 1.3rem; margin: 0; }
    p { color: #aaa; font-size: 0.85rem; max-width: 480px; text-align: center; margin: 0; }
    .row { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .col { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
    h3 { font-size: 0.75rem; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin: 0; }
  </style>
</head>
<body>

  <h1>ease-focus-ring — Accessible Animated Focus Indicator</h1>
  <p>Use Tab to navigate between elements and see the animated focus ring (mouse clicks won't trigger it, thanks to <code>:focus-visible</code>).</p>

  <div class="row">
    <div class="col">
      <h3>Default (outset, primary)</h3>
      <button class="ease-btn ease-btn-primary ease-focus-ring">Tab to me</button>
    </div>

    <div class="col">
      <h3>Inset</h3>
      <button class="ease-btn ease-btn-outline ease-focus-ring ease-focus-ring-inset" style="color:#fff; border-color:rgba(255,255,255,0.3);">Tab to me</button>
    </div>

    <div class="col">
      <h3>Danger</h3>
      <button class="ease-btn ease-btn-danger ease-focus-ring ease-focus-ring-danger">Tab to me</button>
    </div>

    <div class="col">
      <h3>Success</h3>
      <button class="ease-btn ease-btn-success ease-focus-ring ease-focus-ring-success">Tab to me</button>
    </div>
  </div>

  <div class="row">
    <div class="col">
      <h3>Input field</h3>
      <input type="text" placeholder="Tab to focus" class="ease-focus-ring ease-focus-ring-success" style="padding: 0.5rem 0.75rem; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: #fff;" />
    </div>

    <div class="col">
      <h3>Inset + Danger</h3>
      <a href="#" class="ease-focus-ring ease-focus-ring-inset ease-focus-ring-danger" style="color:#fff; padding: 0.5rem 1rem; display:inline-block; border-radius:6px; border:1px solid rgba(255,255,255,0.2);">Tab to me</a>
    </div>
  </div>

</body>
</html>
