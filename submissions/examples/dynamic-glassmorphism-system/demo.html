<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Glassmorphism Component System</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Injected moving colored canvas backgrounds to emphasize background blur effects */
    .bg-glow-sphere {
      position: absolute;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      filter: blur(80px);
      z-index: -1;
      opacity: 0.45;
      animation: driftCanvas 10s ease-in-out infinite alternate;
    }
    @keyframes driftCanvas {
      0% { transform: translate(-10%, -10%) scale(1); }
      100% { transform: translate(15%, 15%) scale(1.15); }
    }
  </style>
</head>
<body>

  <div class="bg-glow-sphere"></div>

  <div class="glass-card">
    <div class="glass-header">
      <span class="glass-badge">v1.2.0</span>
    </div>
    <h3 class="glass-title">Vibe Compiler Layout</h3>
    <p class="glass-body">
      This adaptive interface card utilizes hardware-accelerated CSS filters and modular tokens to automatically recalculate contextual opacity weights and blur depth metrics across system themes.
    </p>
    <button class="glass-action-btn" type="button">Initialize Environment</button>
  </div>

</body>
</html>
