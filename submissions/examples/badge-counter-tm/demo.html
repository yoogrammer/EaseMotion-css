<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Badge Counter - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Badge — Counter</h1>
    <p class="description">
      Self-contained demo of the proposed
      <code>.ease-badge-counter</code> class with various counts.
    </p>

    <div class="counter-row">
      <div class="counter">
        <span class="ease-badge ease-badge-counter" data-count="0">0</span>
        <code>data-count="0"</code>
      </div>
      <div class="counter">
        <span class="ease-badge ease-badge-counter" data-count="42">42</span>
        <code>data-count="42"</code>
      </div>
      <div class="counter">
        <span class="ease-badge ease-badge-counter" data-count="999">999</span>
        <code>data-count="999"</code>
      </div>
      <div class="counter">
        <span class="ease-badge ease-badge-counter" data-count="1500">1500</span>
        <code>data-count="1500"</code>
      </div>
      <div class="counter">
        <span class="ease-badge ease-badge-counter" data-count="12500">12500</span>
        <code>data-count="12500"</code>
      </div>
    </div>

  </div>

</body>
</html>
