<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Animated Weather Card</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0d0d14, #1a1a2e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 2rem;
        }
        .container {
            text-align: center;
            max-width: 1000px;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #6c63ff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 2rem;
        }
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0;
            flex-wrap: wrap;
        }
        button {
            background: #2a2a3e;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
        }
        button.active {
            background: #6c63ff;
        }
        .note {
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            color: #a1a1aa;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🌤️ Animated Weather Cards</h1>
    
    <div class="demo-grid" id="weatherGrid">
        <div class="ease-weather-card ease-weather-sunny">
            <div class="ease-weather-icon">☀️</div>
            <div class="ease-weather-temp">72°F</div>
            <div class="ease-weather-condition">Sunny</div>
        </div>

        <div class="ease-weather-card ease-weather-rainy">
            <div class="ease-weather-icon">🌧️</div>
            <div class="ease-weather-temp">65°F</div>
            <div class="ease-weather-condition">Rainy</div>
        </div>

        <div class="ease-weather-card ease-weather-cloudy">
            <div class="ease-weather-icon">☁️</div>
            <div class="ease-weather-temp">68°F</div>
            <div class="ease-weather-condition">Cloudy</div>
        </div>

        <div class="ease-weather-card ease-weather-storm">
            <div class="ease-weather-icon">⛈️</div>
            <div class="ease-weather-temp">60°F</div>
            <div class="ease-weather-condition">Stormy</div>
        </div>

        <div class="ease-weather-card ease-weather-snow">
            <div class="ease-weather-icon">❄️</div>
            <div class="ease-weather-temp">28°F</div>
            <div class="ease-weather-condition">Snowy</div>
        </div>

        <div class="ease-weather-card ease-weather-night">
            <div class="ease-weather-icon">🌙</div>
            <div class="ease-weather-temp">58°F</div>
            <div class="ease-weather-condition">Night</div>
        </div>
    </div>

    <div class="controls">
        <button class="weather-control active" data-type="sunny">☀️ Sunny</button>
        <button class="weather-control" data-type="rainy">🌧️ Rainy</button>
        <button class="weather-control" data-type="cloudy">☁️ Cloudy</button>
        <button class="weather-control" data-type="storm">⛈️ Storm</button>
        <button class="weather-control" data-type="snow">❄️ Snow</button>
        <button class="weather-control" data-type="night">🌙 Night</button>
    </div>

    <div class="note">
        💡 Each weather type has unique animations - sunny has pulsing rays, rainy has falling drops!
    </div>
</div>

<script>
    const weatherCard = document.querySelector('.ease-weather-card');
    const controls = document.querySelectorAll('.weather-control');
    
    controls.forEach(control => {
        control.addEventListener('click', () => {
            controls.forEach(c => c.classList.remove('active'));
            control.classList.add('active');
            
            const type = control.getAttribute('data-type');
            const card = document.querySelector('.ease-weather-card');
            card.className = `ease-weather-card ease-weather-${type}`;
        });
    });
</script>
</body>
</html>
