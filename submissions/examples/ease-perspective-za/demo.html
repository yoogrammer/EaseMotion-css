<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-perspective-za</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      [data-ease-demo-za] {
        font-family: system-ui, sans-serif;
        max-width: 600px;
        margin: 2rem auto;
        padding: 1.5rem;
      }
      [data-ease-demo-za] .box {
        width: 80px;
        height: 80px;
        background: #6c63ff;
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin: 0.5rem;
        border-radius: 8px;
        transform: rotateY(20deg);
        font-size: 0.75rem;
      }
      [data-ease-demo-za] h2 {
        font-size: 0.9rem;
        color: #64748b;
        margin: 1rem 0 0.5rem;
      }
    </style>
  </head>
  <body>
    <div data-ease-demo-za>
      <h1>ease-perspective-za</h1>
      <p>Perspective values for 3D transforms.</p>
      <h2>ease-perspective-250-za</h2>
      <div class="ease-perspective-250-za"><div class="box">250px</div></div>
      <h2>ease-perspective-1000-za</h2>
      <div class="ease-perspective-1000-za"><div class="box">1000px</div></div>
    </div>
  </body>
</html>
