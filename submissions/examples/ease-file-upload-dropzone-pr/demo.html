<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease File Upload Dropzone</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">
    <h1>Ease File Upload Dropzone</h1>

    <div class="demo-section">
      <h2>Default Dropzone</h2>

      <div class="upload-dropzone">
        <div class="upload-icon">📁</div>
        <h3>Drop files here</h3>
        <p>or click to browse</p>
      </div>
    </div>

    <div class="demo-section">
      <h2>Uploading State</h2>

      <div class="upload-dropzone uploading">
        <div class="upload-icon">⏳</div>
        <h3>Uploading...</h3>

        <div class="progress-track">
          <div class="progress-bar"></div>
        </div>
      </div>
    </div>

    <div class="demo-section">
      <h2>Success State</h2>

      <div class="upload-dropzone success">
        <div class="upload-icon">✅</div>
        <h3>Upload Complete</h3>
        <p>Your file was uploaded successfully</p>
      </div>
    </div>

    <div class="demo-section">
      <h2>Size Variants</h2>

      <div class="upload-dropzone upload-sm">
        <div class="upload-icon">📄</div>
        <p>Small</p>
      </div>

      <div class="upload-dropzone upload-md">
        <div class="upload-icon">📄</div>
        <p>Medium</p>
      </div>

      <div class="upload-dropzone upload-lg">
        <div class="upload-icon">📄</div>
        <p>Large</p>
      </div>
    </div>
  </div>

</body>

</html>
