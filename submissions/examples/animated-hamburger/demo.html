<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion - Animated Hamburger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

  <label class="ease-hamburger-menu">
    <input type="checkbox" class="ease-hamburger-toggle" />
    <div class="ease-hamburger-lines">
      <span class="ease-line ease-line-top"></span>
      <span class="ease-line ease-line-mid"></span>
      <span class="ease-line ease-line-bot"></span>
    </div>
  </label>

</body>
</html>
