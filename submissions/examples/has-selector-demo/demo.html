<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Has Selector Demo - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>:has() Selector Demo</h1>
    <div class="has-gallery">
      <div class="has-card">
        <label><input type="checkbox"> Check me</label>
        <div class="has-reveal">Hidden content revealed!</div>
      </div>
      <div class="has-card">
        <label><input type="radio" name="has-radio"> Select me</label>
        <div class="has-reveal">Radio selected content!</div>
      </div>
      <div class="has-card">
        <label><input type="text" placeholder="Type something"></label>
        <div class="has-reveal">Input has value!</div>
      </div>
    </div>
    <p class="description">CSS :has() selector animates sibling elements when inputs are checked/filled.</p>
  </div>
</body>
</html>
