<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Team Member Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="team-section">
    <h1>Meet Our Team</h1>

    <div class="team-grid">

        <div class="team-card ease-fade-in">
            <img src="https://via.placeholder.com/150" alt="Sarah Johnson">
            <h3>Sarah Johnson</h3>
            <p>Frontend Developer</p>
            <div class="social-links">
                <a href="#">LinkedIn</a>
                <a href="#">GitHub</a>
            </div>
        </div>

        <div class="team-card ease-slide-up">
            <img src="https://via.placeholder.com/150" alt="David Smith">
            <h3>David Smith</h3>
            <p>UI/UX Designer</p>
            <div class="social-links">
                <a href="#">LinkedIn</a>
                <a href="#">Dribbble</a>
            </div>
        </div>

        <div class="team-card ease-fade-in">
            <img src="https://via.placeholder.com/150" alt="Emily Brown">
            <h3>Emily Brown</h3>
            <p>Backend Engineer</p>
            <div class="social-links">
                <a href="#">LinkedIn</a>
                <a href="#">GitHub</a>
            </div>
        </div>

    </div>
</section>

</body>
</html>
