<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EaseMotion Live Class Playground</title>
    <link rel="stylesheet" href="../../../easemotion.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="playground-shell">
      <section class="playground-hero" aria-labelledby="playground-title">
        <p class="eyebrow">EaseMotion CSS submission</p>
        <h1 id="playground-title">Live Class Playground</h1>
        <p class="intro">
          Compose EaseMotion animation, hover, and utility classes, tune timing,
          and copy the generated HTML when the preview feels right.
        </p>
      </section>

      <section class="playground-grid" aria-label="Interactive EaseMotion playground">
        <form class="control-panel" id="playground-form">
          <div class="control-group">
            <label for="class-search">Search classes</label>
            <input
              id="class-search"
              type="search"
              placeholder="Try fade, glow, rounded..."
              autocomplete="off"
            />
          </div>

          <div class="control-group">
            <label for="animation-class">Animation class</label>
            <select id="animation-class">
              <option value="ease-fade-in">ease-fade-in</option>
              <option value="ease-slide-up">ease-slide-up</option>
              <option value="ease-slide-down">ease-slide-down</option>
              <option value="ease-slide-in-left">ease-slide-in-left</option>
              <option value="ease-slide-in-right">ease-slide-in-right</option>
              <option value="ease-zoom-in">ease-zoom-in</option>
              <option value="ease-flip">ease-flip</option>
              <option value="ease-bounce">ease-bounce</option>
              <option value="ease-rotate">ease-rotate</option>
              <option value="ease-pulse">ease-pulse</option>
              <option value="ease-ping">ease-ping</option>
              <option value="ease-shake">ease-shake</option>
            </select>
          </div>

          <fieldset class="control-group">
            <legend>Hover utilities</legend>
            <label class="check-row">
              <input type="checkbox" value="ease-hover-grow" data-class-toggle />
              <span>ease-hover-grow</span>
            </label>
            <label class="check-row">
              <input type="checkbox" value="ease-hover-glow" data-class-toggle checked />
              <span>ease-hover-glow</span>
            </label>
            <label class="check-row">
              <input type="checkbox" value="ease-hover-lift" data-class-toggle />
              <span>ease-hover-lift</span>
            </label>
            <label class="check-row">
              <input type="checkbox" value="ease-hover-shimmer" data-class-toggle />
              <span>ease-hover-shimmer</span>
            </label>
          </fieldset>

          <fieldset class="control-group">
            <legend>Visual utilities</legend>
            <label class="check-row">
              <input type="checkbox" value="ease-rounded-lg" data-class-toggle checked />
              <span>ease-rounded-lg</span>
            </label>
            <label class="check-row">
              <input type="checkbox" value="ease-shadow-lg" data-class-toggle checked />
              <span>ease-shadow-lg</span>
            </label>
            <label class="check-row">
              <input type="checkbox" value="ease-border-primary" data-class-toggle />
              <span>ease-border-primary</span>
            </label>
            <label class="check-row">
              <input type="checkbox" value="ease-text-center" data-class-toggle checked />
              <span>ease-text-center</span>
            </label>
          </fieldset>

          <div class="slider-row">
            <label for="duration-range">Duration <output id="duration-output">600ms</output></label>
            <input id="duration-range" type="range" min="150" max="2000" step="50" value="600" />
          </div>

          <div class="slider-row">
            <label for="delay-range">Delay <output id="delay-output">0ms</output></label>
            <input id="delay-range" type="range" min="0" max="1000" step="50" value="0" />
          </div>

          <div class="button-row">
            <button class="control-button primary" id="replay-button" type="button">Replay</button>
            <button class="control-button" id="reset-button" type="reset">Reset</button>
          </div>
        </form>

        <section class="preview-panel" aria-label="Preview and generated code">
          <div class="preview-stage">
            <div id="demo-element" class="demo-element" tabindex="0">
              <span class="demo-kicker">Preview</span>
              <strong>Demo Element</strong>
              <span class="demo-hint">Hover or focus to test interactive classes.</span>
            </div>
          </div>

          <div class="code-panel">
            <div class="code-header">
              <span>Generated HTML</span>
              <button class="copy-button" id="copy-button" type="button">Copy</button>
            </div>
            <pre><code id="generated-code"></code></pre>
          </div>
        </section>
      </section>
    </main>

    <script>
      const form = document.querySelector("#playground-form");
      const classSearch = document.querySelector("#class-search");
      const animationClass = document.querySelector("#animation-class");
      const demoElement = document.querySelector("#demo-element");
      const generatedCode = document.querySelector("#generated-code");
      const copyButton = document.querySelector("#copy-button");
      const replayButton = document.querySelector("#replay-button");
      const durationRange = document.querySelector("#duration-range");
      const delayRange = document.querySelector("#delay-range");
      const durationOutput = document.querySelector("#duration-output");
      const delayOutput = document.querySelector("#delay-output");
      const classToggles = Array.from(document.querySelectorAll("[data-class-toggle]"));
      const optionList = Array.from(animationClass.options).map((option) => option.value);

      function getSelectedClasses() {
        return [
          animationClass.value,
          ...classToggles
            .filter((toggle) => toggle.checked)
            .map((toggle) => toggle.value),
        ];
      }

      function buildSnippet(classes, duration, delay) {
        return `<div class="${classes.join(" ")}" style="animation-duration: ${duration}ms; animation-delay: ${delay}ms;">\n  Demo Element\n</div>`;
      }

      function replayPreview() {
        demoElement.style.animation = "none";
        demoElement.offsetHeight;
        demoElement.style.animation = "";
      }

      function updatePreview() {
        const duration = durationRange.value;
        const delay = delayRange.value;
        const classes = getSelectedClasses();

        demoElement.className = `demo-element ${classes.join(" ")}`;
        demoElement.style.animationDuration = `${duration}ms`;
        demoElement.style.animationDelay = `${delay}ms`;
        durationOutput.value = `${duration}ms`;
        delayOutput.value = `${delay}ms`;
        generatedCode.textContent = buildSnippet(classes, duration, delay);
      }

      classSearch.addEventListener("input", () => {
        const term = classSearch.value.trim().toLowerCase();
        const matches = optionList.filter((className) => className.includes(term));

        animationClass.innerHTML = "";
        (matches.length ? matches : optionList).forEach((className) => {
          const option = document.createElement("option");
          option.value = className;
          option.textContent = className;
          animationClass.append(option);
        });
        updatePreview();
        replayPreview();
      });

      form.addEventListener("input", () => {
        updatePreview();
      });

      form.addEventListener("reset", () => {
        window.setTimeout(() => {
          classSearch.value = "";
          animationClass.innerHTML = "";
          optionList.forEach((className) => {
            const option = document.createElement("option");
            option.value = className;
            option.textContent = className;
            animationClass.append(option);
          });
          updatePreview();
          replayPreview();
        }, 0);
      });

      replayButton.addEventListener("click", replayPreview);

      copyButton.addEventListener("click", async () => {
        await navigator.clipboard.writeText(generatedCode.textContent);
        copyButton.textContent = "Copied";
        window.setTimeout(() => {
          copyButton.textContent = "Copy";
        }, 1400);
      });

      updatePreview();
    </script>
  </body>
</html>
