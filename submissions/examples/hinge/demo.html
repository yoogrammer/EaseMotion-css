<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-hinge — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
      overflow: hidden;
    }
    h1 { color: #fff; font-size: 1rem; opacity: 0.5; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.75rem; }
    .row { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
    .card {
      width: 160px;
      height: 180px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      color: white;
      text-align: center;
      padding: 1rem;
    }
    .btn {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      background: #6366f1;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .btn:hover { background: #4f46e5; }
  </style>
</head>
<body>

  <h1>ease-hinge Demo</h1>

  <div>
    <div class="label">Default hinge drop (top-left pivot)</div>
    <div class="row">
      <div class="card ease-hinge" style="background:#6366f1;">
        Falls like a hinge
      </div>
    </div>
  </div>

  <div>
    <div class="label">Top-right pivot</div>
    <div class="row">
      <div class="card ease-hinge ease-hinge-right" style="background:#ec4899;">
        Right pivot hinge
      </div>
    </div>
  </div>

  <div>
    <div class="label">Speed variants</div>
    <div class="row">
      <div>
        <div class="label">Fast (1s)</div>
        <div class="card ease-hinge ease-hinge-fast" style="background:#f97316;">
          Fast hinge
        </div>
      </div>
      <div>
        <div class="label">Slow (3.5s)</div>
        <div class="card ease-hinge ease-hinge-slow" style="background:#22c55e;">
          Slow hinge
        </div>
      </div>
    </div>
  </div>

  <div>
    <div class="label">Staggered delays</div>
    <div class="row">
      <div class="card ease-hinge ease-delay-100" style="background:#6366f1; width:80px; height:80px;">100ms</div>
      <div class="card ease-hinge ease-delay-200" style="background:#ec4899; width:80px; height:80px;">200ms</div>
      <div class="card ease-hinge ease-delay-300" style="background:#f97316; width:80px; height:80px;">300ms</div>
      <div class="card ease-hinge ease-delay-500" style="background:#22c55e; width:80px; height:80px;">500ms</div>
    </div>
  </div>

</body>
</html>
