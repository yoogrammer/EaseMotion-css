<!DOCTYPE html>

<html lang="en">
<head>

</div>

<div class="team-card">

    <span>LinkedIn</span>
    <span>Dribbble</span>
  </div>
</div>

<div class="team-card">
  <div class="avatar">C</div>
  <h3>Clara Wilson</h3>

  <div class="social-links">
    <span>LinkedIn</span>

  </div>

  </div>

</section>

</body>
</html>
