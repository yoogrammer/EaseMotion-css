<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Glowing Radio Buttons</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Neon Glowing Radio Buttons</h1>

    <div class="radio-panel">

        <label class="radio-option cyan">

            <input type="radio" name="plan" checked>

            <span class="radio-circle"></span>

            <span class="label-text">
                Starter Plan
            </span>

        </label>

        <label class="radio-option purple">

            <input type="radio" name="plan">

            <span class="radio-circle"></span>

            <span class="label-text">
                Professional Plan
            </span>

        </label>

        <label class="radio-option pink">

            <input type="radio" name="plan">

            <span class="radio-circle"></span>

            <span class="label-text">
                Business Plan
            </span>

        </label>

        <label class="radio-option green">

            <input type="radio" name="plan">

            <span class="radio-circle"></span>

            <span class="label-text">
                Enterprise Plan
            </span>

        </label>

    </div>

</div>

</body>
</html>
