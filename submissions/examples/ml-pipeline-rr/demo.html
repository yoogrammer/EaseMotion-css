<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machine Learning Pipeline</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Machine Learning Pipeline</h1>
    <p class="subtitle">
        End-to-end machine learning workflow visualization
    </p>

    <div class="pipeline">

        <div class="stage dataset">
            <span>📊</span>
            <h3>Dataset</h3>
            <p>Raw Data Collection</p>
        </div>

        <div class="connector"></div>

        <div class="stage preprocessing">
            <span>🧹</span>
            <h3>Preprocessing</h3>
            <p>Cleaning & Transformation</p>
        </div>

        <div class="connector"></div>

        <div class="stage training">
            <span>🧠</span>
            <h3>Training</h3>
            <p>Model Learning</p>
        </div>

        <div class="connector"></div>

        <div class="stage evaluation">
            <span>📈</span>
            <h3>Evaluation</h3>
            <p>Performance Testing</p>
        </div>

        <div class="connector"></div>

        <div class="stage deployment">
            <span>🚀</span>
            <h3>Deployment</h3>
            <p>Production Serving</p>
        </div>

        <div class="connector"></div>

        <div class="stage monitoring">
            <span>👀</span>
            <h3>Monitoring</h3>
            <p>Continuous Tracking</p>
        </div>

    </div>

</div>

</body>
</html>
