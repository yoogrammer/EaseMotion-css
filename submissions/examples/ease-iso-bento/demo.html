<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isometric Bento-Box Accordion Grid - Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bento-header">
    <h1>Isometric Bento Accordion</h1>
    <p>Hover individual tiles to see fluid grid-share expansion on a 3D plane layout.</p>
  </div>

  <div class="ease-iso-stage">
    
    <div class="ease-iso-bento-grid">
      
      <section class="ease-bento-tile tile-1 tile-tall">
        <div class="bento-content">
          <h3>Core Engine</h3>
          <p>Distributed vector grids running layout animations smoothly on compositor tracks.</p>
        </div>
      </section>

      <section class="ease-bento-tile tile-2">
        <div class="bento-content">
          <h3>Analytics</h3>
          <p>Real-time cluster statistics updates.</p>
        </div>
      </section>

      <section class="ease-bento-tile tile-3">
        <div class="bento-content">
          <h3>Security</h3>
          <p>Cryptographic identity access.</p>
        </div>
      </section>

    </div>
  </div>

</body>
</html>
