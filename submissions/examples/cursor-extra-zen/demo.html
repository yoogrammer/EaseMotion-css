<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursor Extra Utilities</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 500px;
        margin: 2rem auto;
        padding: 1rem;
        background: #f8fafc;
        color: #1e293b;
      }
      h1 { font-size: 1.5rem; }
      p { color: #64748b; margin-bottom: 1.5rem; }
      .demo-grid { display: flex; gap: 1rem; flex-wrap: wrap; }
      .demo-card {
        flex: 1;
        min-width: 140px;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 1.5rem;
        text-align: center;
      }
      .demo-card code {
        display: block;
        margin-top: 0.5rem;
        font-size: 0.75rem;
        color: #6c63ff;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <h1>Cursor Extra Utilities</h1>
    <p>Hover each card to see the cursor change.</p>
    <div class="demo-grid">
      <div class="demo-card cursor-grab"><strong>Grab</strong><code>.cursor-grab</code></div>
      <div class="demo-card cursor-grabbing"><strong>Grabbing</strong><code>.cursor-grabbing</code></div>
      <div class="demo-card cursor-wait"><strong>Wait</strong><code>.cursor-wait</code></div>
      <div class="demo-card cursor-text"><strong>Text</strong><code>.cursor-text</code></div>
    </div>
  </body>
</html>
