<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS-only Command Palette - EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../easemotion.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Container for presentation purposes -->
    <div class="presentation-wrapper">
      <h1>CSS-Only Command Palette</h1>
      <p>
        A pure CSS implementation of a modern command palette interface.
        Features dark/light mode and keyboard hints.
      </p>

      <!-- Command Palette Container -->
      <div class="command-palette-wrapper">
        <div class="command-palette">
          <!-- Search Area -->
          <div class="palette-header">
            <svg
              class="search-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input
              type="text"
              class="palette-search"
              placeholder="Search for commands, files, or actions..."
            />
            <kbd class="shortcut-hint-main">ESC</kbd>
          </div>

          <!-- Commands List -->
          <div class="palette-body">
            <!-- Group 1 -->
            <div class="palette-group">
              <h3 class="palette-group-title">Suggestions</h3>

              <a href="#" class="palette-item active">
                <svg
                  class="item-icon"
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                  ></path>
                  <polyline points="14 2 14 8 20 8"></polyline>
                  <line x1="16" y1="13" x2="8" y2="13"></line>
                  <line x1="16" y1="17" x2="8" y2="17"></line>
                  <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <span class="item-label">Create new file</span>
                <div class="item-shortcuts">
                  <kbd>⌘</kbd>
                  <kbd>N</kbd>
                </div>
              </a>

              <a href="#" class="palette-item">
                <svg
                  class="item-icon"
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="17 8 12 3 7 8"></polyline>
                  <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <span class="item-label">Commit and Push</span>
                <div class="item-shortcuts">
                  <kbd>⌘</kbd>
                  <kbd>⇧</kbd>
                  <kbd>P</kbd>
                </div>
              </a>
            </div>

            <!-- Group 2 -->
            <div class="palette-group">
              <h3 class="palette-group-title">Navigation</h3>

              <a href="#" class="palette-item">
                <svg
                  class="item-icon"
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="12" cy="12" r="10"></circle>
                  <polyline points="12 16 16 12 12 8"></polyline>
                  <line x1="8" y1="12" x2="16" y2="12"></line>
                </svg>
                <span class="item-label">Go to Settings</span>
                <div class="item-shortcuts">
                  <kbd>⌘</kbd>
                  <kbd>,</kbd>
                </div>
              </a>
            </div>
          </div>

          <div class="palette-footer">
            <div class="footer-hint">
              <span><kbd>↑</kbd> <kbd>↓</kbd> to navigate</span>
              <span><kbd>↵</kbd> to select</span>
            </div>
          </div>
        </div>

        <!-- Empty State Demo (commented out or visible below) -->
        <div class="command-palette empty-state-demo">
          <div class="palette-header">
            <svg
              class="search-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" class="palette-search" value="qwerty" />
            <kbd class="shortcut-hint-main">ESC</kbd>
          </div>
          <div class="palette-body empty">
            <div class="empty-state">
              <svg
                class="empty-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
              <p>No commands found for "qwerty"</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
