<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Pad - AK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <div class="header">
                <h1>✍️ Signature Pad</h1>
                <p class="subtitle">Draw your signature below</p>
            </div>

            <div class="canvas-box">
                <canvas id="sigCanvas"></canvas>
                <span class="placeholder">Sign here...</span>
            </div>

            <div class="controls">
                <label class="color-picker">
                    Color:
                    <input type="color" id="penColor" value="#000000">
                </label>
                <label class="size-picker">
                    Size:
                    <input type="range" id="penSize" min="1" max="20" value="3">
                </label>
            </div>

            <div class="buttons">
                <button id="undoBtn" class="btn secondary">↶ Undo</button>
                <button id="clearBtn" class="btn danger">🗑 Clear</button>
                <button id="saveBtn" class="btn primary">💾 Save PNG</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('sigCanvas');
        const ctx = canvas.getContext('2d');
        const placeholder = document.querySelector('.placeholder');
        const penColor = document.getElementById('penColor');
        const penSize = document.getElementById('penSize');
        const history = [];
        let drawing = false;

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            const img = canvas.toDataURL();
            canvas.width = rect.width;
            canvas.height = rect.height;
            const image = new Image();
            image.onload = () => ctx.drawImage(image, 0, 0);
            image.src = img;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
        }

        function startDraw(e) {
            e.preventDefault();
            drawing = true;
            history.push(canvas.toDataURL());
            const { x, y } = getPos(e);
            ctx.beginPath();
            ctx.moveTo(x, y);
            placeholder.style.display = 'none';
        }

        function draw(e) {
            if (!drawing) return;
            e.preventDefault();
            const { x, y } = getPos(e);
            ctx.lineWidth = penSize.value;
            ctx.lineCap = 'round';
            ctx.strokeStyle = penColor.value;
            ctx.lineTo(x, y);
            ctx.stroke();
        }

        function endDraw() { drawing = false; }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mouseout', endDraw);
        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', endDraw);

        document.getElementById('clearBtn').onclick = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            history.length = 0;
            placeholder.style.display = 'block';
        };

        document.getElementById('undoBtn').onclick = () => {
            if (history.length === 0) return;
            const img = new Image();
            img.src = history.pop();
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
            };
            if (history.length === 0) placeholder.style.display = 'block';
        };

        document.getElementById('saveBtn').onclick = () => {
            const link = document.createElement('a');
            link.download = `signature-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        };
    </script>
</body>
</html>
