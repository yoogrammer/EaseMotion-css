<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Hover Chip</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Magnetic Hover Chip</h1>

    <p class="subtitle">
        Interactive chips with magnetic hover movement and glow effects.
    </p>

    <div class="chip-group">

        <span class="magnetic-chip">
            🚀 Launch Ready
        </span>

        <span class="magnetic-chip success">
            ✅ Active
        </span>

        <span class="magnetic-chip warning">
            ⚡ Premium
        </span>

        <span class="magnetic-chip danger">
            🔥 Trending
        </span>

        <span class="magnetic-chip info">
            💎 Featured
        </span>

    </div>

</div>

</body>
</html>
