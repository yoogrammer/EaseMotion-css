<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnetic Hover Button – EaseMotion CSS</title>
  <meta name="description" content="Button that magnetically follows the cursor with smooth CSS transform transitions." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Magnetic Hover Button</h1>
  <p>Move your cursor near the button — it pulls toward you</p>

  <div class="magnetic-zone" id="magneticZone">
    <button class="magnetic-btn" id="magneticBtn">
      <span class="btn-bg"></span>
      <span class="btn-label">Get Started</span>
    </button>
  </div>

  <script>
    const zone = document.getElementById('magneticZone');
    const btn = document.getElementById('magneticBtn');
    const strength = 0.35;
    const maxDist = 120;

    zone.addEventListener('mousemove', (e) => {
      const rect = btn.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      const dist = Math.hypot(dx, dy);
      const factor = Math.min(dist, maxDist) / maxDist;
      const tx = dx * strength * factor;
      const ty = dy * strength * factor;
      btn.style.transform = `translate(${tx}px, ${ty}px)`;
    });

    zone.addEventListener('mouseleave', () => {
      btn.style.transform = 'translate(0, 0)';
    });
  </script>
</body>
</html>
