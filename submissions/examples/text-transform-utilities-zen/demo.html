<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Transform Utilities — Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
      max-width: 960px;
      width: 100%;
    }
    .demo-card {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      text-align: center;
    }
    .demo-card h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 0.75rem;
    }
    .demo-text {
      font-size: 1.4rem;
      font-weight: 600;
      padding: 1rem 0;
      color: #333;
    }
    .demo-hint {
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 0.5rem;
    }
    .class-name {
      display: inline-block;
      margin-top: 0.5rem;
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 0.8rem;
      color: #666;
      background: #f0f0f0;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="demo-grid">
    <div class="demo-card">
      <h3>Uppercase</h3>
      <p class="demo-hint">"hello world" →</p>
      <div class="demo-text text-uppercase">hello world</div>
      <span class="class-name">.text-uppercase</span>
    </div>
    <div class="demo-card">
      <h3>Lowercase</h3>
      <p class="demo-hint">"HELLO WORLD" →</p>
      <div class="demo-text text-lowercase">HELLO WORLD</div>
      <span class="class-name">.text-lowercase</span>
    </div>
    <div class="demo-card">
      <h3>Capitalize</h3>
      <p class="demo-hint">"hello world" →</p>
      <div class="demo-text text-capitalize">hello world</div>
      <span class="class-name">.text-capitalize</span>
    </div>
    <div class="demo-card">
      <h3>Normal</h3>
      <p class="demo-hint">"HeLLo WoRLD" →</p>
      <div class="demo-text text-normal-case">HeLLo WoRLD</div>
      <span class="class-name">.text-normal-case</span>
    </div>
  </div>
</body>
</html>
