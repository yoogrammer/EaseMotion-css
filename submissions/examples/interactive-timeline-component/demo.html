<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Timeline Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="timeline">

    <div class="timeline-item">
      <div class="timeline-dot"></div>

      <div class="timeline-content">
        <div class="timeline-date">2024</div>
        <h3>Project Started</h3>
        <p>Initial planning and roadmap preparation phase.</p>
      </div>
    </div>

    <div class="timeline-item">
      <div class="timeline-dot"></div>

      <div class="timeline-content">
        <div class="timeline-date">2025</div>
        <h3>Development Phase</h3>
        <p>Core features and animations were implemented.</p>
      </div>
    </div>

    <div class="timeline-item">
      <div class="timeline-dot"></div>

      <div class="timeline-content">
        <div class="timeline-date">2026</div>
        <h3>Launch & Growth</h3>
        <p>Public release with responsive and interactive UI support.</p>
      </div>
    </div>

  </div>

</body>
</html>
