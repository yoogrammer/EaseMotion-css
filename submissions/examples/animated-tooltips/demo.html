<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EaseMotion - Animated Tooltips Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ease-page">
    <h1>💬 Animated Tooltips</h1>
    <p>Hover over any element below to see the tooltip in action.</p>

    <!-- ===== Positions ===== -->
    <section class="ease-section">
      <h2>📍 Positions</h2>
      <div class="ease-demo-grid">
        <button class="ease-btn ease-tooltip-wrap">
          Top
          <span class="ease-tooltip ease-tooltip-top ease-tooltip-fade">Top tooltip</span>
        </button>

        <button class="ease-btn ease-tooltip-wrap">
          Bottom
          <span class="ease-tooltip ease-tooltip-bottom ease-tooltip-fade">Bottom tooltip</span>
        </button>

        <button class="ease-btn ease-tooltip-wrap">
          Left
          <span class="ease-tooltip ease-tooltip-left ease-tooltip-fade">Left tooltip</span>
        </button>

        <button class="ease-btn ease-tooltip-wrap">
          Right
          <span class="ease-tooltip ease-tooltip-right ease-tooltip-fade">Right tooltip</span>
        </button>
      </div>
    </section>

    <!-- ===== Animations ===== -->
    <section class="ease-section">
      <h2>🎬 Animations</h2>
      <div class="ease-demo-grid">
        <button class="ease-btn ease-tooltip-wrap">
          Fade
          <span class="ease-tooltip ease-tooltip-top ease-tooltip-fade">Fade animation</span>
        </button>

        <button class="ease-btn ease-tooltip-wrap">
          Slide
          <span class="ease-tooltip ease-tooltip-top ease-tooltip-slide">Slide animation</span>
        </button>

        <button class="ease-btn ease-tooltip-wrap">
          Pop
          <span class="ease-tooltip ease-tooltip-top ease-tooltip-pop">Pop animation</span>
        </button>

        <button class="ease-btn ease-tooltip-wrap">
          Scale
          <span class="ease-tooltip ease-tooltip-top ease-tooltip-scale">Scale animation</span>
        </button>
      </div>
    </section>

    <!-- ===== Themes ===== -->
    <section class="ease-section">
      <h2>🎨 Themes</h2>
      <div class="ease-demo-grid">
        <button class="ease-btn ease-tooltip-wrap">
          Dark
          <span class="ease-tooltip ease-tooltip-top ease-tooltip-fade ease-tooltip-dark">Default dark theme</span>
        </button>

        <button class="ease-btn ease-tooltip-wrap">
          Light
          <span class="ease-tooltip ease-tooltip-top ease-tooltip-fade ease-tooltip-light">Light theme</span>
        </button>

        <button class="ease-btn ease-tooltip-wrap">
          Primary
          <span class="ease-tooltip ease-tooltip-top ease-tooltip-fade ease-tooltip-primary">Primary theme</span>
        </button>

        <button class="ease-btn ease-tooltip-wrap">
          Success
          <span class="ease-tooltip ease-tooltip-top ease-tooltip-fade ease-tooltip-success">Success theme</span>
        </button>

        <button class="ease-btn ease-tooltip-wrap">
          Error
          <span class="ease-tooltip ease-tooltip-top ease-tooltip-fade ease-tooltip-error">Error theme</span>
        </button>
      </div>
    </section>

    <!-- ===== Real World Examples ===== -->
    <section class="ease-section">
      <h2>🌍 Real-World Examples</h2>
      <div class="ease-demo-grid">
        <span class="ease-icon-btn ease-tooltip-wrap">
          ⚙️
          <span class="ease-tooltip ease-tooltip-bottom ease-tooltip-slide">Settings</span>
        </span>

        <span class="ease-icon-btn ease-tooltip-wrap">
          🔔
          <span class="ease-tooltip ease-tooltip-bottom ease-tooltip-pop ease-tooltip-primary">3 new notifications</span>
        </span>

        <span class="ease-icon-btn ease-tooltip-wrap">
          ❤️
          <span class="ease-tooltip ease-tooltip-top ease-tooltip-scale ease-tooltip-error">Add to favorites</span>
        </span>

        <span class="ease-icon-btn ease-tooltip-wrap">
          ✅
          <span class="ease-tooltip ease-tooltip-top ease-tooltip-fade ease-tooltip-success">Verified user</span>
        </span>

        <span class="ease-icon-btn ease-tooltip-wrap">
          ℹ️
          <span class="ease-tooltip ease-tooltip-right ease-tooltip-slide ease-tooltip-light">Click for more info</span>
        </span>
      </div>
    </section>
  </div>
</body>
</html>
