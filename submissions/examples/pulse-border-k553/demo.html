<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pulse Border Demo</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f4f4f7;
      display: flex;
      gap: 2rem;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      flex-wrap: wrap;
      padding: 2rem;
    }

    .pulse-border-btn {
      padding: 0.9rem 1.8rem;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      background: #007bff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .demo-card {
      width: 220px;
      padding: 1.2rem;
      border-radius: 12px;
      background: white;
      text-align: center;
      font-weight: 600;
      color: #333;
    }
  </style>
</head>
<body>

  <button class="pulse-border-btn">Get Started</button>

  <div class="demo-card pulse-border-btn">Notification card</div>

</body>
</html>
