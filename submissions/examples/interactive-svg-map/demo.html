<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Interactive SVG Map Node Tooltips</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 480px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Vector Coordinate Interface Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Hover over individual server cluster nodes. Adjacent element selector sequences fade and scale text tooltips instantly with 0 script files.</p>
  </header>

  <div class="alm-map-blueprint-wrapper">
    
    <svg class="alm-interactive-svg-canvas" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
      
      <g opacity="0.1" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="4,4">
        <line x1="0" y1="50" x2="400" y2="50" />
        <line x1="0" y1="100" x2="400" y2="100" />
        <line x1="0" y1="150" x2="400" y2="150" />
        <line x1="100" y1="0" x2="100" y2="200" />
        <line x1="200" y1="0" x2="200" y2="200" />
        <line x1="300" y1="0" x2="300" y2="200" />
      </g>

      <g id="node-group-1">
        <rect class="alm-interactive-node" x="60" y="70" width="80" height="60" rx="6" />
        
        <g class="alm-map-tooltip" data-origin="100px 70px">
          <rect class="alm-tooltip-bg" x="30" y="15" width="140" height="42" rx="4" />
          <text class="alm-tooltip-header" x="40" y="32">Cluster Node Alpha</text>
          <text class="alm-tooltip-metric" x="40" y="46">Load Delta: 42.1% [OK]</text>
        </g>
      </g>

      <g id="node-group-2">
        <rect class="alm-interactive-node" x="260" y="70" width="80" height="60" rx="6" />
        
        <g class="alm-map-tooltip" data-origin="300px 70px">
          <rect class="alm-tooltip-bg" x="230" y="15" width="140" height="42" rx="4" />
          <text class="alm-tooltip-header" x="240" y="32">Cluster Node Beta</text>
          <text class="alm-tooltip-metric" x="240" y="46" style="fill: #ef4444;">Load Delta: 94.8% [CRIT]</text>
        </g>
      </g>

    </svg>
    
  </div>

</body>
</html>
