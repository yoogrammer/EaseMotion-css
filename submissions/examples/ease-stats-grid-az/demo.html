<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stats Grid — EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css@1.4.5/dist/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="display:flex;flex-direction:column;align-items:center;gap:var(--ease-space-8,32px);padding:var(--ease-space-6,24px);font-family:var(--ease-font-sans,system-ui,sans-serif);background:var(--ease-color-neutral-50,#f9fafb);margin:0;">

  <h1 style="font-size:1.5rem;font-weight:700;color:var(--ease-color-neutral-900,#111827);margin:0;">
    Stats Grid
  </h1>

  <!-- Default grid -->
  <div class="ease-stats-grid-az" style="width:100%;max-width:800px;">
    <div class="ease-stat-card-az">
      <span class="ease-stat-icon-az">&#x1f465;</span>
      <span class="ease-stat-value-az">12,400+</span>
      <p class="ease-stat-label-az">Active Users</p>
    </div>
    <div class="ease-stat-card-az">
      <span class="ease-stat-icon-az">&#x1f4c8;</span>
      <span class="ease-stat-value-az">99.9%</span>
      <p class="ease-stat-label-az">Uptime</p>
    </div>
    <div class="ease-stat-card-az">
      <span class="ease-stat-icon-az">&#x1f310;</span>
      <span class="ease-stat-value-az">85</span>
      <p class="ease-stat-label-az">Countries Served</p>
    </div>
    <div class="ease-stat-card-az">
      <span class="ease-stat-icon-az">&#x1f4ac;</span>
      <span class="ease-stat-value-az">50k+</span>
      <p class="ease-stat-label-az">Support Tickets</p>
    </div>
  </div>

  <!-- Accent colors + bordered top -->
  <div class="ease-stats-grid-az --cols-4" style="width:100%;max-width:800px;">
    <div class="ease-stat-card-az --accent-primary --bordered-top">
      <span class="ease-stat-icon-az">&#x1f4e6;</span>
      <span class="ease-stat-value-az">2,847</span>
      <p class="ease-stat-label-az">Projects Delivered</p>
    </div>
    <div class="ease-stat-card-az --accent-success --bordered-top">
      <span class="ease-stat-icon-az">&#x1f91d;</span>
      <span class="ease-stat-value-az">1,200+</span>
      <p class="ease-stat-label-az">Team Members</p>
    </div>
    <div class="ease-stat-card-az --accent-warning --bordered-top">
      <span class="ease-stat-icon-az">&#x1f3c6;</span>
      <span class="ease-stat-value-az">48</span>
      <p class="ease-stat-label-az">Awards Won</p>
    </div>
    <div class="ease-stat-card-az --accent-danger --bordered-top">
      <span class="ease-stat-icon-az">&#x2764;&#xfe0f;</span>
      <span class="ease-stat-value-az">100%</span>
      <p class="ease-stat-label-az">Client Satisfaction</p>
    </div>
  </div>

  <!-- Inverted variant -->
  <div class="ease-stats-grid-az --inverted --cols-2" style="width:100%;max-width:400px;">
    <div class="ease-stat-card-az">
      <span class="ease-stat-icon-az">&#x1f4bb;</span>
      <span class="ease-stat-value-az">15yr+</span>
      <p class="ease-stat-label-az">Industry Experience</p>
    </div>
    <div class="ease-stat-card-az">
      <span class="ease-stat-icon-az">&#x1f504;</span>
      <span class="ease-stat-value-az">500+</span>
      <p class="ease-stat-label-az">Products Launched</p>
    </div>
  </div>

</body>
</html>
