<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gravity Collapse Grid Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    h2 {
      color: #555;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0 0 1rem;
    }

    .gravity-card {
      color: white;
      font-weight: bold;
      font-size: 1rem;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <h2>Hover any card to see gravity effect</h2>

  <div class="gravity-grid">

    <div class="gravity-card" style="background:#6366f1;">Card 1</div>
    <div class="gravity-card" style="background:#8b5cf6;">Card 2</div>
    <div class="gravity-card" style="background:#10b981;">Card 3</div>
    <div class="gravity-card" style="background:#f59e0b;">Card 4</div>
    <div class="gravity-card" style="background:#ef4444;">Card 5</div>
    <div class="gravity-card" style="background:#3b82f6;">Card 6</div>
    <div class="gravity-card" style="background:#ec4899;">Card 7</div>
    <div class="gravity-card" style="background:#14b8a6;">Card 8</div>
    <div class="gravity-card" style="background:#f97316;">Card 9</div>

  </div>

</body>
</html>
