<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Canvas Waveform Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #0d0d14;
            font-family: system-ui, sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #6c63ff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #a1a1aa;
            margin-bottom: 2rem;
        }
        .visualizer-container {
            background: #1a1a2e;
            border-radius: 1rem;
            padding: 1rem;
            margin: 2rem auto;
            max-width: 900px;
        }
        canvas {
            width: 100%;
            height: 300px;
            border-radius: 0.5rem;
            display: block;
        }
        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin: 2rem 0;
        }
        button {
            background: #6c63ff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
            background: #7c6cff;
        }
        .mode-buttons {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .mode-btn {
            background: #2a2a3e;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }
        .mode-btn.active {
            background: #6c63ff;
        }
        .note {
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 12px;
            border-left: 3px solid #6c63ff;
            margin: 2rem 0;
            font-size: 0.875rem;
            color: #a1a1aa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Canvas Waveform Visualizer</h1>
        <p class="subtitle">Audio-reactive waveform animation | Click to generate synthetic audio</p>

        <div class="visualizer-container">
            <canvas id="waveformCanvas" width="1200" height="300"></canvas>
        </div>

        <div class="controls">
            <button id="playBtn">▶ Generate Wave</button>
            <button id="stopBtn">⏹ Stop</button>
        </div>

        <div class="mode-buttons">
            <button class="mode-btn active" data-mode="sine">Sine Wave</button>
            <button class="mode-btn" data-mode="square">Square Wave</button>
            <button class="mode-btn" data-mode="sawtooth">Sawtooth</button>
            <button class="mode-btn" data-mode="triangle">Triangle</button>
            <button class="mode-btn" data-mode="noise">White Noise</button>
            <button class="mode-btn" data-mode="bass">Bass Drop</button>
        </div>

        <div class="note">
            💡 This visualizer generates synthetic audio and displays real-time waveform. Click different wave types to see how they look!
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
