<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-typewriter — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #0f172a; gap: 3rem; padding: 2rem; }
    h1 { color: #fff; font-family: sans-serif; font-size: 1.5rem; }
    .section { display: flex; flex-direction: column; align-items: flex-start; gap: 1.5rem; width: 100%; max-width: 600px; }
    .label { font-size: 0.72rem; color: #475569; text-transform: uppercase; letter-spacing: 0.1em; font-family: sans-serif; }
    .line { font-size: 1.4rem; font-weight: 600; color: #f1f5f9; min-height: 2rem; }
    .line-green { color: #22c55e; }
    .line-purple { color: #a78bfa; }
    h2 { color: #64748b; font-family: sans-serif; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid #1e293b; padding-bottom: 0.5rem; width: 100%; max-width: 600px; }
  </style>
</head>
<body>
  <h1>ease-typewriter Demo</h1>

  <h2>One-shot variants</h2>
  <div class="section">
    <div><div class="label">Default</div><div class="line"><span class="ease-typewriter" style="--ease-typewriter-steps:13;">Hello, World!</span></div></div>
    <div><div class="label">Fast</div><div class="line line-green"><span class="ease-typewriter ease-typewriter-fast" style="--ease-typewriter-steps:16;">Fast typewriter!</span></div></div>
    <div><div class="label">Slow</div><div class="line line-purple"><span class="ease-typewriter ease-typewriter-slow" style="--ease-typewriter-steps:18;">Slow and steady...</span></div></div>
    <div><div class="label">No cursor</div><div class="line"><span class="ease-typewriter-no-cursor" style="--ease-typewriter-steps:20;">No blinking cursor.</span></div></div>
  </div>

  <h2>Loop variant</h2>
  <div class="section">
    <div><div class="label">Types and deletes infinitely</div><div class="line line-green"><span class="ease-typewriter-loop ease-typewriter-cursor-green" style="--ease-typewriter-steps:15;">Looping text...</span></div></div>
  </div>

  <h2>Staggered delay group</h2>
  <div class="section">
    <div class="line"><span class="ease-typewriter ease-delay-100" style="--ease-typewriter-steps:8;">Line one</span></div>
    <div class="line"><span class="ease-typewriter ease-delay-300" style="--ease-typewriter-steps:8;">Line two</span></div>
    <div class="line"><span class="ease-typewriter ease-delay-500" style="--ease-typewriter-steps:10;">Line three!</span></div>
  </div>
</body>
</html>
