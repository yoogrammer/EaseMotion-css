<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkbox & Radio Styling – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div>
    <h1 class="page-title">Checkbox &amp; Radio Styling</h1>
  </div>

  <div class="section">
    <h2 class="section-title">Checkbox Variants</h2>
    <div class="grid-2">
      <div class="card variant-blue">
        <h3 class="card-title">Blue</h3>
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" checked> Option A
          </label>
          <label class="checkbox-label">
            <input type="checkbox"> Option B
          </label>
          <label class="checkbox-label">
            <input type="checkbox" disabled> Disabled
          </label>
          <label class="checkbox-label">
            <input type="checkbox" disabled checked> Disabled checked
          </label>
        </div>
      </div>
      <div class="card variant-green">
        <h3 class="card-title">Green</h3>
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" checked> Option A
          </label>
          <label class="checkbox-label">
            <input type="checkbox"> Option B
          </label>
          <label class="checkbox-label">
            <input type="checkbox" disabled> Disabled
          </label>
          <label class="checkbox-label">
            <input type="checkbox" disabled checked> Disabled checked
          </label>
        </div>
      </div>
      <div class="card variant-purple">
        <h3 class="card-title">Purple</h3>
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" checked> Option A
          </label>
          <label class="checkbox-label">
            <input type="checkbox"> Option B
          </label>
          <label class="checkbox-label">
            <input type="checkbox" disabled> Disabled
          </label>
          <label class="checkbox-label">
            <input type="checkbox" disabled checked> Disabled checked
          </label>
        </div>
      </div>
      <div class="card variant-red">
        <h3 class="card-title">Red</h3>
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" checked> Option A
          </label>
          <label class="checkbox-label">
            <input type="checkbox"> Option B
          </label>
          <label class="checkbox-label">
            <input type="checkbox" disabled> Disabled
          </label>
          <label class="checkbox-label">
            <input type="checkbox" disabled checked> Disabled checked
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2 class="section-title">Radio Variants</h2>
    <div class="grid-2">
      <div class="card variant-blue">
        <h3 class="card-title">Blue</h3>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="radio1" checked> Choice 1
          </label>
          <label class="radio-label">
            <input type="radio" name="radio1"> Choice 2
          </label>
          <label class="radio-label">
            <input type="radio" name="radio1"> Choice 3
          </label>
        </div>
      </div>
      <div class="card variant-green">
        <h3 class="card-title">Green</h3>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="radio2" checked> Choice 1
          </label>
          <label class="radio-label">
            <input type="radio" name="radio2"> Choice 2
          </label>
          <label class="radio-label">
            <input type="radio" name="radio2"> Choice 3
          </label>
        </div>
      </div>
      <div class="card variant-purple">
        <h3 class="card-title">Purple</h3>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="radio3" checked> Choice 1
          </label>
          <label class="radio-label">
            <input type="radio" name="radio3"> Choice 2
          </label>
          <label class="radio-label">
            <input type="radio" name="radio3"> Choice 3
          </label>
        </div>
      </div>
      <div class="card variant-red">
        <h3 class="card-title">Red</h3>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="radio4" checked> Choice 1
          </label>
          <label class="radio-label">
            <input type="radio" name="radio4"> Choice 2
          </label>
          <label class="radio-label">
            <input type="radio" name="radio4"> Choice 3
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2 class="section-title">Focus &amp; Disabled States</h2>
    <div class="card">
      <p class="section-subtitle">Focus visible ring appears on keyboard navigation. Disabled inputs are dimmed.</p>
      <div style="display:flex;gap:32px;flex-wrap:wrap">
        <label class="checkbox-label">
          <input type="checkbox" class="focus-test"> Focus me
        </label>
        <label class="checkbox-label">
          <input type="checkbox" disabled> Can't touch
        </label>
        <label class="radio-label">
          <input type="radio" name="focus-radio" class="focus-test"> Focus me
        </label>
        <label class="radio-label">
          <input type="radio" name="focus-radio" disabled> Can't touch
        </label>
      </div>
    </div>
  </div>

</body>
</html>
