<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ease Radio Component</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>Default Radio Group</h2>
    <div class="ease-radio-group">
      <label class="ease-radio">
        <input type="radio" name="plan" checked />
        <span class="radio-circle"></span>
        Free Plan
      </label>
      <label class="ease-radio">
        <input type="radio" name="plan" />
        <span class="radio-circle"></span>
        Pro Plan
      </label>
      <label class="ease-radio">
        <input type="radio" name="plan" />
        <span class="radio-circle"></span>
        Enterprise Plan
      </label>
    </div>
  </div>

  <div class="card">
    <h2>Color Variants</h2>
    <div class="ease-radio-group">
      <label class="ease-radio">
        <input type="radio" name="color" checked />
        <span class="radio-circle"></span>
        Purple (default)
      </label>
      <label class="ease-radio green">
        <input type="radio" name="color" />
        <span class="radio-circle"></span>
        Green
      </label>
      <label class="ease-radio orange">
        <input type="radio" name="color" />
        <span class="radio-circle"></span>
        Orange
      </label>
      <label class="ease-radio pink">
        <input type="radio" name="color" />
        <span class="radio-circle"></span>
        Pink
      </label>
    </div>
  </div>

  <div class="card">
    <h2>Card Radio Variant</h2>
    <div class="ease-radio-group horizontal">
      <label class="ease-radio card-radio">
        <input type="radio" name="size" checked />
        <span class="radio-circle"></span>
        Small
      </label>
      <label class="ease-radio card-radio">
        <input type="radio" name="size" />
        <span class="radio-circle"></span>
        Medium
      </label>
      <label class="ease-radio card-radio">
        <input type="radio" name="size" />
        <span class="radio-circle"></span>
        Large
      </label>
    </div>
  </div>

</body>
</html>
