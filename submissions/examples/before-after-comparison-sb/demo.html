<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Before-and-After Comparison - EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../easemotion.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="presentation-wrapper">
      <h1>Before & After Image Comparison</h1>
      <p>A pure CSS implementation for image comparisons.</p>

      <h2>1. Overlay Comparison (Range-slider style via CSS Resize)</h2>
      <p>
        Drag the bottom-right corner of the left image to reveal the right
        image.
      </p>
      <div class="demo-container">
        <div class="ba-overlay-container">
          <!-- After Image (Background) -->
          <div class="ba-layer ba-after">
            <!-- Using placeholder images for demo -->
            <img
              src="https://images.unsplash.com/photo-1621084556062-c2d810ba4cbf?auto=format&fit=crop&q=80&w=800&h=450"
              alt="After"
            />
            <span class="ba-label label-after">After</span>
          </div>

          <!-- Before Image (Foreground, Resizable) -->
          <div class="ba-layer ba-before">
            <img
              src="https://images.unsplash.com/photo-1621084556062-c2d810ba4cbf?auto=format&fit=crop&q=10&w=800&h=450&blur=20"
              alt="Before"
            />
            <span class="ba-label label-before">Before</span>
            <div class="ba-drag-indicator">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </div>
          </div>
        </div>
      </div>

      <h2>2. Side-by-Side Comparison</h2>
      <div class="demo-container">
        <div class="ba-side-by-side">
          <div class="ba-card">
            <img
              src="https://images.unsplash.com/photo-1621084556062-c2d810ba4cbf?auto=format&fit=crop&q=10&w=400&h=300&blur=20"
              alt="Before"
            />
            <span class="ba-label">Before</span>
          </div>
          <div class="ba-card">
            <img
              src="https://images.unsplash.com/photo-1621084556062-c2d810ba4cbf?auto=format&fit=crop&q=80&w=400&h=300"
              alt="After"
            />
            <span class="ba-label">After</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
