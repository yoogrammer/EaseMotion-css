<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Comparison Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Animation Comparison Gallery</h1>

<div class="gallery">

  <div class="card">
    <h3>Fade In</h3>

    <div class="preview fade-animation">
      Preview
    </div>

    <button onclick="replay(this)">Replay</button>

    <pre>.fade-animation {
  animation: fadeIn 1s ease;
}</pre>
  </div>

  <div class="card">
    <h3>Slide Up</h3>

    <div class="preview slide-animation">
      Preview
    </div>

    <button onclick="replay(this)">Replay</button>

    <pre>.slide-animation {
  animation: slideUp 1s ease;
}</pre>
  </div>

  <div class="card">
    <h3>Bounce</h3>

    <div class="preview bounce-animation">
      Preview
    </div>

    <button onclick="replay(this)">Replay</button>

    <pre>.bounce-animation {
  animation: bounce 1s ease;
}</pre>
  </div>

</div>

<script>
function replay(button) {
  const preview =
    button.parentElement.querySelector(".preview");

  preview.style.animation = "none";

  void preview.offsetWidth;

  preview.style.animation = "";
}
</script>

</body>
</html>
