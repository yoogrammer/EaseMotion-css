<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Patient Vital Signs & ECG Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="monitor-container">
        <header class="monitor-header">
            <div class="patient-info">
                <h2>PATIENT: #2026-BIOMED</h2>
                <p>Status: Post-Op Recovery (ICU Bed 04)</p>
            </div>
            <div class="live-indicator-block">
                <span class="pulse-glow-dot"></span>
                <span class="live-text">● LIVE FEED</span>
            </div>
        </header>

        <section class="vitals-grid">
            <div class="vital-card heart-rate-card">
                <div class="card-meta">
                    <span class="label">Heart Rate</span>
                    <span class="icon">❤️</span>
                </div>
                <div class="metrics-display">
                    <span class="value ease-pulse-text">72</span>
                    <span class="unit">BPM</span>
                </div>
                <div class="card-footer-status">Stable Rhythm</div>
            </div>

            <div class="vital-card oxygen-card">
                <div class="card-meta">
                    <span class="label">SpO2 Level</span>
                    <span class="icon">🩺</span>
                </div>
                <div class="metrics-display">
                    <span class="value">98</span>
                    <span class="unit">%</span>
                </div>
                <div class="card-footer-status text-emerald">Optimal</div>
            </div>

            <div class="vital-card bp-card">
                <div class="card-meta">
                    <span class="label">Blood Pressure</span>
                    <span class="icon">📊</span>
                </div>
                <div class="metrics-display">
                    <span class="value">120/80</span>
                    <span class="unit">mmHg</span>
                </div>
                <div class="card-footer-status">Normal Range</div>
            </div>
        </section>

        <section class="ecg-monitor-box">
            <div class="ecg-title">Electrocardiogram (ECG) Channel 1</div>
            <div class="ecg-viewport">
                <div class="ecg-scroll-track"></div>
            </div>
        </section>
    </div>

</body>
</html>
