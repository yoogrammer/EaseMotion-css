<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-gradient-text-animated — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; letter-spacing: 0.05em; }
    .row { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .demo-heading {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1.2;
      text-align: center;
    }
    .card {
      width: 200px; height: 80px; border-radius: 12px;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>ease-gradient-text-animated</h1>
  <div class="section">
    <div class="label">Animated gradient text</div>
    <div class="demo-heading ease-gradient-text-animated">Animated Gradient</div>
  </div>
  <div class="section">
    <div class="label">On cards</div>
    <div class="row">
      <div class="card ease-gradient-text-animated">Flowing</div>
      <div class="card ease-gradient-text-animated">Colors</div>
    </div>
  </div>
</body>
</html>
