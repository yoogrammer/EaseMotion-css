<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Glow Animation Demo</title>
  <!-- Load EaseMotion CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css@latest/dist/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f8fafc;
      margin: 0;
    }
    .container {
      text-align: center;
      background: white;
      padding: 3rem 4rem;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
    .button {
      padding: 1rem 2rem;
      border: none;
      border-radius: 8px;
      background: #6c63ff;
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
    }
    .badge-container {
      margin-top: 3rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
    }
    .badge {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #6c63ff;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>EaseMotion Pulse Glow</h2>
    <p style="color: #64748b; margin-bottom: 2rem;">Perfect for primary actions and notification badges.</p>
    
    <button class="button ease-pulse-glow">Primary Action</button>

    <div class="badge-container">
      <div class="badge ease-pulse-glow"></div>
      <span style="font-weight: 500; color: #333;">New Notification</span>
    </div>
  </div>

</body>
</html>
