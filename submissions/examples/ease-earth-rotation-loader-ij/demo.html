<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ease Earth Rotation Loader</title>
<link rel="stylesheet" href="style.css">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f172a;
    padding: 80px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 60px;
    min-height: 100vh;
    margin: 0;
  }
  h2 { color: #e2e8f0; margin: 0 0 20px; font-weight: 500; font-size: 18px; }
  .demo-card {
    background: #1e293b;
    border-radius: 12px;
    padding: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .demo-row {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }
</style>
</head>
<body>

  <div class="demo-row">
    <div class="demo-card">
      <h2>Default</h2>
      <div class="ease-earth-loader">
        <div class="ease-earth-loader__globe">
          <div class="ease-earth-loader__highlight"></div>
          <div class="ease-earth-loader__land ease-earth-loader__land--1"></div>
          <div class="ease-earth-loader__land ease-earth-loader__land--2"></div>
          <div class="ease-earth-loader__land ease-earth-loader__land--3"></div>
          <div class="ease-earth-loader__land ease-earth-loader__land--4"></div>
          <div class="ease-earth-loader__land ease-earth-loader__land--5"></div>
        </div>
        <div class="ease-earth-loader__shadow"></div>
        <div class="ease-earth-loader__label">LOADING</div>
      </div>
    </div>

    <div class="demo-card">
      <h2>Small / Fast</h2>
      <div class="ease-earth-loader ease-earth-loader--sm ease-earth-loader--fast" style="--globe-color: #2d3748; --land-color: #6366f1;">
        <div class="ease-earth-loader__globe">
          <div class="ease-earth-loader__highlight"></div>
          <div class="ease-earth-loader__land ease-earth-loader__land--1"></div>
          <div class="ease-earth-loader__land ease-earth-loader__land--2"></div>
          <div class="ease-earth-loader__land ease-earth-loader__land--3"></div>
          <div class="ease-earth-loader__land ease-earth-loader__land--4"></div>
          <div class="ease-earth-loader__land ease-earth-loader__land--5"></div>
        </div>
        <div class="ease-earth-loader__shadow"></div>
        <div class="ease-earth-loader__label">LOADING</div>
      </div>
    </div>

    <div class="demo-card">
      <h2>Large / Slow</h2>
      <div class="ease-earth-loader ease-earth-loader--lg ease-earth-loader--slow" style="--globe-color: #1e3a5f; --land-color: #22c55e;">
        <div class="ease-earth-loader__globe">
          <div class="ease-earth-loader__highlight"></div>
          <div class="ease-earth-loader__land ease-earth-loader__land--1"></div>
          <div class="ease-earth-loader__land ease-earth-loader__land--2"></div>
          <div class="ease-earth-loader__land ease-earth-loader__land--3"></div>
          <div class="ease-earth-loader__land ease-earth-loader__land--4"></div>
          <div class="ease-earth-loader__land ease-earth-loader__land--5"></div>
        </div>
        <div class="ease-earth-loader__shadow"></div>
        <div class="ease-earth-loader__label">LOADING</div>
      </div>
    </div>
  </div>

</body>
</html>
