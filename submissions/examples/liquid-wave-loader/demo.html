<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Wave Loader - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load premium Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="demo-wrapper">
        <h1 class="demo-title">Liquid Wave Loader</h1>
        <p class="description">
            A premium, pure CSS circular progress loader with dual-sloshing wave layers moving at staggered speeds to simulate fluid physical dynamics.
        </p>

        <!-- The Liquid Wave Loader Component -->
        <div class="loader-container">
            <div class="liquid-loader">
                <!-- Dual wave sloshing layers -->
                <div class="wave-layer wave-back"></div>
                <div class="wave-layer wave-front"></div>
                
                <!-- Center glassmorphic label -->
                <div class="loader-inner">
                    <span class="percentage-text">68%</span>
                    <span class="status-text">Synchronizing</span>
                </div>
            </div>
        </div>

        <div class="controls-info">
            <span>Hover to speed up wave frequency</span>
        </div>
    </div>
</body>
</html>
