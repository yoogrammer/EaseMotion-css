<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>:disabled State Animation</title><link rel="stylesheet" href="style.css"/></head>
<body>
<h1>:disabled Animation</h1>
<p class="subtitle">Visual feedback for disabled form elements — animated, not just grayed out.</p>
<section class="demo">
  <div class="disabled-grid">
    <div><button class="ds-btn" id="toggle-disabled">Toggle Disabled</button></div>
    <div class="field-d"><label>Name</label><input class="ds-input" value="Jane Doe"/></div>
    <div class="field-d"><label>Email</label><input class="ds-input" value="jane@example.com"/></div>
    <div class="field-d"><label>Role</label><select class="ds-select"><option>Admin</option><option>Editor</option></select></div>
    <div><label class="ds-check"><input type="checkbox" checked/>Notifications</label></div>
    <div><button class="ds-btn ds-submit">Save Changes</button></div>
  </div>
  <p class="note">Click "Toggle Disabled" — disabled elements get a pulsing border, reduced opacity, and a "no-entry" cursor. The animation is more engaging than a static gray.</p>
</section>
<script>
  var disabled = false;
  document.getElementById('toggle-disabled').addEventListener('click', function() {
    disabled = !disabled;
    document.querySelectorAll('.ds-input, .ds-select, .ds-check input, .ds-submit').forEach(function(el) {
      el.disabled = disabled;
    });
    document.querySelectorAll('.field-d, .ds-check, .ds-submit').forEach(function(el) {
      el.classList.toggle('is-disabled', disabled);
    });
    this.textContent = disabled ? 'Enable All' : 'Toggle Disabled';
  });
</script>
</body>
</html>
