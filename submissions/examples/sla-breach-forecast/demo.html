<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLA Breach Forecast</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="forecast">
    <section class="summary">
      <p>Reliability Forecast</p>
      <h1>SLA Breach Forecast</h1>
      <strong>74 minutes until breach risk</strong>
    </section>

    <section class="cards" aria-label="SLA breach forecast metrics">
      <article>
        <span>Availability</span>
        <strong>99.91%</strong>
        <div class="bar"><i class="wide"></i></div>
      </article>
      <article>
        <span>Error budget</span>
        <strong>18%</strong>
        <div class="bar"><i class="short"></i></div>
      </article>
      <article>
        <span>Ticket pressure</span>
        <strong>Medium</strong>
        <div class="bar"><i class="mid"></i></div>
      </article>
      <article>
        <span>Mitigation pace</span>
        <strong>Fast</strong>
        <div class="bar"><i class="wide"></i></div>
      </article>
    </section>
  </main>
</body>
</html>
