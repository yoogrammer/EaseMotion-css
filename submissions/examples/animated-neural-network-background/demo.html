<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neural Network Background — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ═══════════════════════════════════════════
       NEURAL NETWORK BACKGROUND
       EaseMotion CSS — Animated Component
  ══════════════════════════════════════════════ -->
  <section class="nn-scene" aria-label="Neural network hero background">

    <!-- ── Ambient background blobs ─────────────── -->
    <div class="nn-blobs" aria-hidden="true">
      <div class="nn-blob nn-blob--1"></div>
      <div class="nn-blob nn-blob--2"></div>
      <div class="nn-blob nn-blob--3"></div>
      <div class="nn-blob nn-blob--4"></div>
    </div>

    <!-- ── Connection lines grid ─────────────────── -->
    <div class="nn-connections" aria-hidden="true">
      <!-- Horizontal layer -->
      <div class="nn-line nn-line--h1"></div>
      <div class="nn-line nn-line--h2"></div>
      <div class="nn-line nn-line--h3"></div>
      <div class="nn-line nn-line--h4"></div>
      <div class="nn-line nn-line--h5"></div>

      <!-- Diagonal layer -->
      <div class="nn-line nn-line--d1"></div>
      <div class="nn-line nn-line--d2"></div>
      <div class="nn-line nn-line--d3"></div>
      <div class="nn-line nn-line--d4"></div>
      <div class="nn-line nn-line--d5"></div>
      <div class="nn-line nn-line--d6"></div>
      <div class="nn-line nn-line--d7"></div>
      <div class="nn-line nn-line--d8"></div>

      <!-- Vertical layer -->
      <div class="nn-line nn-line--v1"></div>
      <div class="nn-line nn-line--v2"></div>
      <div class="nn-line nn-line--v3"></div>
      <div class="nn-line nn-line--v4"></div>
      <div class="nn-line nn-line--v5"></div>
      <div class="nn-line nn-line--v6"></div>

      <!-- Arc-like diagonals (shallow) -->
      <div class="nn-line nn-line--a1"></div>
      <div class="nn-line nn-line--a2"></div>
      <div class="nn-line nn-line--a3"></div>
      <div class="nn-line nn-line--a4"></div>
    </div>

    <!-- ── Nodes ──────────────────────────────────── -->
    <div class="nn-nodes" aria-hidden="true">

      <!-- Top-left cluster -->
      <div class="nn-node nn-node--sm"  style="top:4%;  left:3%;"></div>
      <div class="nn-node nn-node--md"  style="top:10%; left:11%;"></div>
      <div class="nn-node nn-node--lg"  style="top:7%;  left:22%;"></div>
      <div class="nn-node nn-node--sm"  style="top:18%; left:6%;"></div>
      <div class="nn-node nn-node--md"  style="top:22%; left:18%;"></div>

      <!-- Top-right cluster -->
      <div class="nn-node nn-node--sm"  style="top:5%;  left:75%;"></div>
      <div class="nn-node nn-node--lg"  style="top:9%;  left:85%;"></div>
      <div class="nn-node nn-node--md"  style="top:16%; left:78%;"></div>
      <div class="nn-node nn-node--sm"  style="top:3%;  left:92%;"></div>
      <div class="nn-node nn-node--md"  style="top:21%; left:94%;"></div>

      <!-- Mid-left cluster -->
      <div class="nn-node nn-node--lg"  style="top:35%; left:4%;"></div>
      <div class="nn-node nn-node--sm"  style="top:42%; left:13%;"></div>
      <div class="nn-node nn-node--md"  style="top:52%; left:5%;"></div>
      <div class="nn-node nn-node--sm"  style="top:60%; left:17%;"></div>

      <!-- Mid-right cluster -->
      <div class="nn-node nn-node--md"  style="top:37%; left:88%;"></div>
      <div class="nn-node nn-node--lg"  style="top:48%; left:95%;"></div>
      <div class="nn-node nn-node--sm"  style="top:57%; left:84%;"></div>
      <div class="nn-node nn-node--md"  style="top:63%; left:92%;"></div>

      <!-- Top center (sparse, avoids hero text) -->
      <div class="nn-node nn-node--sm"  style="top:8%;  left:38%;"></div>
      <div class="nn-node nn-node--md"  style="top:14%; left:55%;"></div>
      <div class="nn-node nn-node--sm"  style="top:6%;  left:63%;"></div>

      <!-- Bottom-left cluster -->
      <div class="nn-node nn-node--md"  style="top:72%; left:7%;"></div>
      <div class="nn-node nn-node--sm"  style="top:80%; left:18%;"></div>
      <div class="nn-node nn-node--lg"  style="top:88%; left:9%;"></div>
      <div class="nn-node nn-node--sm"  style="top:94%; left:22%;"></div>

      <!-- Bottom-right cluster -->
      <div class="nn-node nn-node--lg"  style="top:76%; left:80%;"></div>
      <div class="nn-node nn-node--sm"  style="top:84%; left:91%;"></div>
      <div class="nn-node nn-node--md"  style="top:91%; left:75%;"></div>
      <div class="nn-node nn-node--sm"  style="top:96%; left:87%;"></div>

      <!-- Bottom center -->
      <div class="nn-node nn-node--sm"  style="top:82%; left:38%;"></div>
      <div class="nn-node nn-node--md"  style="top:90%; left:52%;"></div>
      <div class="nn-node nn-node--lg"  style="top:78%; left:62%;"></div>
      <div class="nn-node nn-node--sm"  style="top:97%; left:44%;"></div>

      <!-- Scattered midfield -->
      <div class="nn-node nn-node--sm"  style="top:32%; left:32%;"></div>
      <div class="nn-node nn-node--md"  style="top:68%; left:43%;"></div>
      <div class="nn-node nn-node--sm"  style="top:74%; left:57%;"></div>
      <div class="nn-node nn-node--lg"  style="top:30%; left:68%;"></div>

    </div>

    <!-- ── Foreground vignette ────────────────────── -->
    <div class="nn-vignette" aria-hidden="true"></div>

    <!-- ── Hero Content ───────────────────────────── -->
    <div class="nn-hero">

      <div class="nn-hero__badge">
        <span class="nn-hero__badge-dot" aria-hidden="true"></span>
        ✦ AI Powered
      </div>

      <h1 class="nn-hero__heading">
        The Future<br />is <span class="nn-hero__heading-accent">Connected</span>
      </h1>

      <p class="nn-hero__description">
        Build intelligent interfaces powered by elegant animations<br class="nn-hero__br" />
        and modern design systems.
      </p>

      <div class="nn-hero__actions">
        <a href="#" class="nn-btn nn-btn--primary">
          <span>Get Started</span>
          <svg class="nn-btn__icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <a href="#" class="nn-btn nn-btn--ghost">
          Explore
        </a>
      </div>

    </div>

  </section>

</body>
</html>
