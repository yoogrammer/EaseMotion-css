<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS 4-Way Box Flip Demo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="grid-container">
      <div class="flip-container">
        <div class="flip-box flip-left-right">Left → Right</div>
      </div>

      <div class="flip-container">
        <div class="flip-box flip-right-left">Right → Left</div>
      </div>

      <div class="flip-container">
        <div class="flip-box flip-top-bottom">Top ↓ Bottom</div>
      </div>

      <div class="flip-container">
        <div class="flip-box flip-bottom-top">Bottom ↑ Top</div>
      </div>
    </div>
  </body>
</html>
