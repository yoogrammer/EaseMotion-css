<!DOCTYPE html>
<html>
<head>
  <title>Modal Focus Fix Demo</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="modal-patched.js" defer></script>
</head>
<body>
  <div style="padding: 2rem;">
    <h1>WCAG 2.1 Modal Focus Fix</h1>
    <p>This demo uses a patched version of modal.js that correctly saves and restores focus.</p>
    <a href="#demo-modal" class="ease-btn">Open Modal (Press Enter)</a>
  </div>

  <div id="demo-modal" class="ease-modal-overlay">
    <div class="ease-modal">
      <h2>Modal Title</h2>
      <p>Press Escape or click the overlay to close.</p>
      <p>Notice how focus returns to the "Open Modal" button, complying with WCAG Focus Order guidelines.</p>
    </div>
  </div>
</body>
</html>
