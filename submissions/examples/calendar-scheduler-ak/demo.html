<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar Scheduler</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="cal-header">
      <button class="cal-nav" id="prevMonth">&larr;</button>
      <h2 class="cal-title" id="calTitle">June 2026</h2>
      <button class="cal-nav" id="nextMonth">&rarr;</button>
    </div>
    <div class="cal-grid">
      <div class="cal-weekday">Sun</div>
      <div class="cal-weekday">Mon</div>
      <div class="cal-weekday">Tue</div>
      <div class="cal-weekday">Wed</div>
      <div class="cal-weekday">Thu</div>
      <div class="cal-weekday">Fri</div>
      <div class="cal-weekday">Sat</div>
      <div id="calDays"></div>
    </div>
    <div class="events-panel" id="eventsPanel">
      <h3>Events for <span id="selectedDate">Select a day</span></h3>
      <ul class="events-list" id="eventsList">
        <li class="empty-events">No events scheduled.</li>
      </ul>
      <div class="add-event">
        <input type="text" class="event-input" id="eventInput" placeholder="Add event..." maxlength="40">
        <button class="event-add-btn" id="addEventBtn">Add</button>
      </div>
    </div>
  </div>
  <script>
    const date = new Date();
    let currentMonth = date.getMonth();
    let currentYear = date.getFullYear();
    let selectedDay = date.getDate();

    const calTitle = document.getElementById('calTitle');
    const calDays = document.getElementById('calDays');
    const eventsList = document.getElementById('eventsList');
    const selectedDate = document.getElementById('selectedDate');
    const eventInput = document.getElementById('eventInput');
    const addEventBtn = document.getElementById('addEventBtn');
    const prevMonth = document.getElementById('prevMonth');
    const nextMonth = document.getElementById('nextMonth');

    let events = JSON.parse(localStorage.getItem('cal-events-ak') || '{}');

    function saveEvents() {
      localStorage.setItem('cal-events-ak', JSON.stringify(events));
    }

    function renderCalendar() {
      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      calTitle.textContent = monthNames[currentMonth] + ' ' + currentYear;

      calDays.innerHTML = '';
      for (let i = 0; i < firstDay; i++) {
        calDays.innerHTML += '<div class="cal-day empty"></div>';
      }
      for (let d = 1; d <= daysInMonth; d++) {
        const key = currentYear + '-' + currentMonth + '-' + d;
        const hasEvents = events[key] && events[key].length > 0;
        const isToday = d === new Date().getDate() && currentMonth === new Date().getMonth() && currentYear === new Date().getFullYear();
        const isSelected = d === selectedDay;
        calDays.innerHTML += `<div class="cal-day${isToday ? ' today' : ''}${isSelected ? ' selected' : ''}" data-day="${d}">${d}${hasEvents ? '<span class="dot"></span>' : ''}</div>`;
      }

      document.querySelectorAll('.cal-day:not(.empty)').forEach(el => {
        el.addEventListener('click', () => {
          document.querySelectorAll('.cal-day').forEach(d => d.classList.remove('selected'));
          el.classList.add('selected');
          selectedDay = parseInt(el.dataset.day);
          renderEvents();
        });
      });
      renderEvents();
    }

    function renderEvents() {
      const key = currentYear + '-' + currentMonth + '-' + selectedDay;
      const dayEvents = events[key] || [];
      selectedDate.textContent = new Date(currentYear, currentMonth, selectedDay).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      if (dayEvents.length === 0) {
        eventsList.innerHTML = '<li class="empty-events">No events scheduled.</li>';
      } else {
        eventsList.innerHTML = dayEvents.map((ev, i) => `<li class="event-item"><span>${ev}</span><button class="event-del" data-key="${key}" data-idx="${i}">&times;</button></li>`).join('');
        document.querySelectorAll('.event-del').forEach(btn => {
          btn.addEventListener('click', () => {
            const k = btn.dataset.key;
            const idx = parseInt(btn.dataset.idx);
            events[k].splice(idx, 1);
            if (events[k].length === 0) delete events[k];
            saveEvents();
            renderCalendar();
          });
        });
      }
    }

    function addEvent() {
      const text = eventInput.value.trim();
      if (!text) return;
      const key = currentYear + '-' + currentMonth + '-' + selectedDay;
      if (!events[key]) events[key] = [];
      events[key].push(text);
      saveEvents();
      eventInput.value = '';
      renderCalendar();
    }

    prevMonth.addEventListener('click', () => { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } selectedDay = 1; renderCalendar(); });
    nextMonth.addEventListener('click', () => { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } selectedDay = 1; renderCalendar(); });
    addEventBtn.addEventListener('click', addEvent);
    eventInput.addEventListener('keydown', e => { if (e.key === 'Enter') addEvent(); });

    renderCalendar();
  </script>
</body>
</html>
