<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Request Lifecycle</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>API Request Lifecycle</h1>
    <p class="subtitle">
        Visualizing the journey of a request through system layers.
    </p>

    <div class="lifecycle">

        <div class="step client">
            <span>🌐</span>
            <h3>Client</h3>
        </div>

        <div class="connector"></div>

        <div class="step lb">
            <span>⚖️</span>
            <h3>Load Balancer</h3>
        </div>

        <div class="connector"></div>

        <div class="step gateway">
            <span>🚪</span>
            <h3>API Gateway</h3>
        </div>

        <div class="connector"></div>

        <div class="step auth">
            <span>🔐</span>
            <h3>Authentication</h3>
        </div>

        <div class="connector"></div>

        <div class="step service">
            <span>⚙️</span>
            <h3>Business Logic</h3>
        </div>

        <div class="connector"></div>

        <div class="step db">
            <span>🗄️</span>
            <h3>Database</h3>
        </div>

        <div class="connector response"></div>

        <div class="step success">
            <span>✅</span>
            <h3>Response</h3>
        </div>

    </div>

</div>

</body>
</html>
