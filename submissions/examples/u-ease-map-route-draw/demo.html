<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Route Draw Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="map-container">

    <svg viewBox="0 0 500 300" class="route-map">

        <circle cx="60" cy="220" r="10" class="marker" />
        <circle cx="430" cy="80" r="10" class="marker" />

        <path
            class="route-path"
            d="M60 220
               C120 120,
               200 250,
               280 140
               S380 60,
               430 80" />
    </svg>

</div>

</body>
</html>
