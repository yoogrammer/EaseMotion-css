<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS color-mix() – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1 class="title">CSS <code>color-mix()</code></h1>
  <p class="subtitle">Blending <span class="swatch-dot" style="background:#3b82f6"></span> blue and <span class="swatch-dot" style="background:#f59e0b"></span> amber in different color spaces.</p>

  <div class="mix-grid">
    <div class="mix-card">
      <div class="mix-header">srgb</div>
      <div class="mix-row"><span class="mix-label">25%</span><span class="mix-swatch" style="background:color-mix(in srgb, #3b82f6 25%, #f59e0b)"></span></div>
      <div class="mix-row"><span class="mix-label">50%</span><span class="mix-swatch" style="background:color-mix(in srgb, #3b82f6 50%, #f59e0b)"></span></div>
      <div class="mix-row"><span class="mix-label">75%</span><span class="mix-swatch" style="background:color-mix(in srgb, #3b82f6 75%, #f59e0b)"></span></div>
    </div>
    <div class="mix-card">
      <div class="mix-header">oklch</div>
      <div class="mix-row"><span class="mix-label">25%</span><span class="mix-swatch" style="background:color-mix(in oklch, #3b82f6 25%, #f59e0b)"></span></div>
      <div class="mix-row"><span class="mix-label">50%</span><span class="mix-swatch" style="background:color-mix(in oklch, #3b82f6 50%, #f59e0b)"></span></div>
      <div class="mix-row"><span class="mix-label">75%</span><span class="mix-swatch" style="background:color-mix(in oklch, #3b82f6 75%, #f59e0b)"></span></div>
    </div>
    <div class="mix-card">
      <div class="mix-header">hsl</div>
      <div class="mix-row"><span class="mix-label">25%</span><span class="mix-swatch" style="background:color-mix(in hsl, #3b82f6 25%, #f59e0b)"></span></div>
      <div class="mix-row"><span class="mix-label">50%</span><span class="mix-swatch" style="background:color-mix(in hsl, #3b82f6 50%, #f59e0b)"></span></div>
      <div class="mix-row"><span class="mix-label">75%</span><span class="mix-swatch" style="background:color-mix(in hsl, #3b82f6 75%, #f59e0b)"></span></div>
    </div>
  </div>
</div>

</body>
</html>
