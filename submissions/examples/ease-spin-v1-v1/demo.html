<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Spin Animation Demo</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="demo-wrapper">
    <!-- Regular Standard Spin Icon -->
    <div class="demo-box">
      <h3>Standard (Clockwise)</h3>
      <div class="spinner ease-spin"></div>
    </div>

    <!-- Reverse Variant Counter-Rotation Icon -->
    <div class="demo-box">
      <h3>Reverse (Counter-Clockwise)</h3>
      <div class="spinner ease-spin-reverse"></div>
    </div>
  </div>
  <div class="code-section">
    <h2>Usage</h2>
    <pre>&lt;!-- Basic Spinner Ease spin V1 --&gt;
&lt;!-- Clockwise Spinner --!&gt;
&lt;div class="spinner ease-spin"&gt;&lt;/div&gt;
&lt;!-- Counter-Clockwise Spinner --!&gt;
&lt;div class="spinner ease-spin-reverse"&gt;&lt;/div&gt;</pre>
  </div>
</body>

</html>
