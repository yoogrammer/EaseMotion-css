<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Neon Button Component</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>
            Animated Neon Button Collection
        </h1>

        <p>
            Futuristic glowing buttons with smooth hover effects,
            pulse animations, and vibrant color themes.
        </p>


        <div class="button-group">

            <!-- Blue Neon -->
            <button class="neon-btn blue">
                Start Game
            </button>


            <!-- Pink Neon -->
            <button class="neon-btn pink">
                Explore
            </button>


            <!-- Green Neon -->
            <button class="neon-btn green">
                Download
            </button>


            <!-- Purple Neon -->
            <button class="neon-btn purple">
                Get Started
            </button>

        </div>

    </div>

</body>
</html>
