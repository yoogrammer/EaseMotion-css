<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stagger Animation Grid - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Stagger Animation Grid</h1>
    <div class="stagger-grid">
      <div class="stagger-item" style="--i:0">1</div>
      <div class="stagger-item" style="--i:1">2</div>
      <div class="stagger-item" style="--i:2">3</div>
      <div class="stagger-item" style="--i:3">4</div>
      <div class="stagger-item" style="--i:4">5</div>
      <div class="stagger-item" style="--i:5">6</div>
      <div class="stagger-item" style="--i:6">7</div>
      <div class="stagger-item" style="--i:7">8</div>
      <div class="stagger-item" style="--i:8">9</div>
      <div class="stagger-item" style="--i:9">10</div>
      <div class="stagger-item" style="--i:10">11</div>
      <div class="stagger-item" style="--i:11">12</div>
    </div>
    <button class="stagger-replay" id="replayBtn">Replay Animation</button>
    <p class="description">Grid items animate in with staggered delays, creating a wave effect.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
