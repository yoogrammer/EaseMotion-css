<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion-css | Glassmorphic Modal Showcase</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
  </style>
</head>
<body>

  <!-- Label elements act as semantic trigger bindings to the hidden checkbox input -->
  <label for="modal-demo" class="ease-modal-trigger-label">Open Glass Modal</label>

  <!-- The Structural Core Component Stack -->
  <input type="checkbox" id="modal-demo" class="ease-modal-toggle">
  
  <div class="ease-modal-overlay">
    <div class="ease-modal-card">
      <div class="ease-modal-header">
        <h2>Glassmorphic Micro-Modal</h2>
        <label for="modal-demo" class="ease-modal-close-btn">&times;</label>
      </div>
      <div class="ease-modal-body">
        <p>This overlay component features an elastic entry scaling motion curve while using backdrop blurring filters to isolate content smoothly without JavaScript layout updates.</p>
      </div>
      <div class="ease-modal-actions">
        <label for="modal-demo" class="ease-btn ease-btn-secondary">Decline</label>
        <label for="modal-demo" class="ease-btn ease-btn-primary">Accept Terms</label>
      </div>
    </div>
  </div>

</body>
</html>
