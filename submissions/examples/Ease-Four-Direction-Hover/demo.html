<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Four Direction Popovers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Four Direction Popovers</h1>

<div class="demo-grid">

    <!-- Top -->
    <div class="popover-wrapper">
        <button class="btn">Top Popover</button>

        <div class="popover popover-top">
            Appears above the button
        </div>
    </div>

    <!-- Bottom -->
    <div class="popover-wrapper">
        <button class="btn">Bottom Popover</button>

        <div class="popover popover-bottom">
            Appears below the button
        </div>
    </div>

    <!-- Left -->
    <div class="popover-wrapper">
        <button class="btn">Left Popover</button>

        <div class="popover popover-left">
            Appears on the left
        </div>
    </div>

    <!-- Right -->
    <div class="popover-wrapper">
        <button class="btn">Right Popover</button>

        <div class="popover popover-right">
            Appears on the right
        </div>
    </div>

</div>

</body>
</html>
