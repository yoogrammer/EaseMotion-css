<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shake Image Utility</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">
    <h1>Shake Image Utility</h1>
    <p class="description">
      Hover over the image below to see the shake animation in action.<br />
      This utility can be used to add a playful shake effect to images on hover.
     </p> 

    <div class="card">
      <img
        class="shake-img"
        src="https://picsum.photos/seed/shake/400/300"
        alt="Demo image with shake effect"
        width="400"
        height="300"
      />
      <p class="caption">Hover to shake</p>
    </div>

    
  </main>

</body>
</html>
