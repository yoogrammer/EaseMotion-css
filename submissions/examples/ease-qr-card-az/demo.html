<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Card — EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css@1.4.5/dist/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="display:flex;flex-direction:column;align-items:center;gap:var(--ease-space-8,32px);padding:var(--ease-space-6,24px);font-family:var(--ease-font-sans,system-ui,sans-serif);background:var(--ease-color-neutral-50,#f9fafb);margin:0;">

  <h1 style="font-size:1.5rem;font-weight:700;color:var(--ease-color-neutral-900,#111827);margin:0;">
    QR Code Card
  </h1>

  <!-- Default -->
  <div class="ease-qr-card-az">
    <div class="ease-qr-code-placeholder-az">&#x1f4f1;</div>
    <div class="ease-qr-body-az">
      <h3 class="ease-qr-title-az">Scan to visit</h3>
      <p class="ease-qr-desc-az">Open our website on your mobile device.</p>
    </div>
    <div class="ease-qr-footer-az --centered">
      <span class="ease-qr-footer-icon-az">&#x1f50a;</span>
      Point your camera at the QR code
    </div>
  </div>

  <!-- Compact horizontal -->
  <div class="ease-qr-card-az --compact">
    <div class="ease-qr-code-placeholder-az">&#x1f4f1;</div>
    <div>
      <div class="ease-qr-body-az">
        <h3 class="ease-qr-title-az">Download our app</h3>
        <p class="ease-qr-desc-az">Scan with your phone camera to get the app on iOS and Android.</p>
      </div>
      <div class="ease-qr-footer-az" style="margin-top:var(--ease-space-2,8px);">
        <span class="ease-qr-footer-icon-az">&#x1f512;</span>
        Secure download
      </div>
    </div>
  </div>

  <!-- With actual QR image -->
  <div class="ease-qr-card-az">
    <img class="ease-qr-code-az" src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=https://easemotion.dev" alt="QR Code" />
    <div class="ease-qr-body-az">
      <h3 class="ease-qr-title-az">EaseMotion Docs</h3>
      <p class="ease-qr-desc-az">Scan to browse the documentation.</p>
    </div>
    <div class="ease-qr-footer-az --centered">
      <span class="ease-qr-footer-icon-az">&#x1f517;</span>
      https://easemotion.dev
    </div>
  </div>

</body>
</html>
