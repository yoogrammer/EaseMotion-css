<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avatar Stack · Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Avatar Stack</h1>
  <p class="subtitle">Overlapping avatars with ring borders. Hover to expand.</p>

  <section>
    <h2>Small (sm)</h2>
    <div class="avatar-stack avatar-stack-sm">
      <div class="avatar" style="background:#3b82f6;">JD</div>
      <div class="avatar" style="background:#10b981;">AL</div>
      <div class="avatar" style="background:#f59e0b;">MK</div>
      <div class="avatar" style="background:#ef4444;">TR</div>
      <div class="avatar avatar-count">+3</div>
    </div>
  </section>

  <section>
    <h2>Medium (md)</h2>
    <div class="avatar-stack avatar-stack-md">
      <div class="avatar" style="background:#3b82f6;">JD</div>
      <div class="avatar" style="background:#10b981;">AL</div>
      <div class="avatar" style="background:#f59e0b;">MK</div>
      <div class="avatar" style="background:#8b5cf6;">SK</div>
      <div class="avatar" style="background:#ec4899;">CP</div>
      <div class="avatar avatar-count">+5</div>
    </div>
  </section>

  <section>
    <h2>Large (lg)</h2>
    <div class="avatar-stack avatar-stack-lg">
      <div class="avatar" style="background:#3b82f6;">JD</div>
      <div class="avatar" style="background:#10b981;">AL</div>
      <div class="avatar" style="background:#f59e0b;">MK</div>
      <div class="avatar avatar-count">+2</div>
    </div>
  </section>

  <section>
    <h2>Hover to Expand</h2>
    <p class="hint">Move your cursor over any stack above.</p>
  </section>

  <footer>
    <p>Built with <a href="https://github.com/anomalyco/EaseMotion-css">EaseMotion CSS</a></p>
  </footer>
</body>
</html>
