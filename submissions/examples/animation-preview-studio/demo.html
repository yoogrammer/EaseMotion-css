<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Preview Studio - EaseMotion-css</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div style="text-align: center; margin-bottom: 32px;">
    <h1 style="color: #38bdf8; margin: 0 0 8px 0;">Animation Preview Studio</h1>
    <p style="color: #94a3b8; margin: 0; font-size: 15px;">Configure, customize, and evaluate hardware-accelerated motion components in real time.</p>
  </div>

  <div class="studio-container">
    <div class="preview-stage">
      <div id="previewTarget" class="preview-target em-fade-in">EaseMotion</div>
    </div>

    <div class="control-panel">
      <div class="panel-section">
        <label for="animSelector">Select Motion Target</label>
        <select id="animSelector">
          <option value="em-fade-in">fade-in</option>
          <option value="em-slide-up">slide-up</option>
          <option value="em-bounce">bounce</option>
          <option value="em-pulse">pulse</option>
        </select>
      </div>

      <div class="panel-section">
        <label for="durationSlider">Duration <span id="durationVal" class="value-display">1.0s</span></label>
        <input type="range" id="durationSlider" min="0.1" max="4" step="0.1" value="1">
      </div>

      <div class="panel-section">
        <label for="delaySlider">Delay <span id="delayVal" class="value-display">0.0s</span></label>
        <input type="range" id="delaySlider" min="0" max="3" step="0.1" value="0">
      </div>

      <div class="panel-section">
        <label for="iterationSelector">Iteration Count</label>
        <select id="iterationSelector">
          <option value="1">1 Time</option>
          <option value="2">2 Times</option>
          <option value="3">3 Times</option>
          <option value="infinite">Infinite Loop</option>
        </select>
      </div>

      <div class="action-grid">
        <button id="triggerBtn" class="btn-primary" type="button">Play</button>
        <button id="resetBtn" class="btn-secondary" type="button">Reset</button>
      </div>

      <div class="panel-section" style="margin-top: 12px;">
        <button id="copyBtn" class="btn-secondary" style="border-color: var(--accent-color); color: var(--accent-color);" type="button">
          Copy Animation Class
        </button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const target = document.getElementById('previewTarget');
      const animSelector = document.getElementById('animSelector');
      const durationSlider = document.getElementById('durationSlider');
      const delaySlider = document.getElementById('delaySlider');
      const iterationSelector = document.getElementById('iterationSelector');
      const triggerBtn = document.getElementById('triggerBtn');
      const resetBtn = document.getElementById('resetBtn');
      const copyBtn = document.getElementById('copyBtn');

      const durationVal = document.getElementById('durationVal');
      const delayVal = document.getElementById('delayVal');

      function updateAnimationPipeline() {
        // Drop all existing animation keys from target class list tracking
        target.className = 'preview-target';
        
        // Force layout repaint checklist to refresh the render tree state context safely
        void target.offsetWidth;

        // Extract custom configuration configurations
        const currentAnimation = animSelector.value;
        target.style.animationDuration = `${durationSlider.value}s`;
        target.style.animationDelay = `${delaySlider.value}s`;
        target.style.animationIterationCount = iterationSelector.value;

        // Apply updated layout identity handles
        target.classList.add(currentAnimation);
      }

      // Sliders Live Update Loops
      durationSlider.addEventListener('input', () => {
        durationVal.textContent = `${durationSlider.value}s`;
        updateAnimationPipeline();
      });

      delaySlider.addEventListener('input', () => {
        delayVal.textContent = `${delaySlider.value}s`;
        updateAnimationPipeline();
      });

      animSelector.addEventListener('change', updateAnimationPipeline);
      iterationSelector.addEventListener('change', updateAnimationPipeline);
      triggerBtn.addEventListener('click', updateAnimationPipeline);

      resetBtn.addEventListener('click', () => {
        animSelector.value = 'em-fade-in';
        durationSlider.value = '1';
        delaySlider.value = '0';
        iterationSelector.value = '1';
        durationVal.textContent = '1.0s';
        delayVal.textContent = '0.0s';
        updateAnimationPipeline();
      });

      // Async Copy to Clipboard Trigger Integration
      copyBtn.addEventListener('click', async () => {
        const structuralClassValue = `class="${animSelector.value}" style="animation-duration: ${durationSlider.value}s; animation-delay: ${delaySlider.value}s; animation-iteration-count: ${iterationSelector.value};"`;
        try {
          await navigator.clipboard.writeText(structuralClassValue);
          const initialText = copyBtn.textContent;
          copyBtn.textContent = 'Copied Code snippet!';
          setTimeout(() => copyBtn.textContent = initialText, 2000);
        } catch (err) {
          console.error('Failed to export code snippet bounds: ', err);
        }
      });
    });
  </script>
</body>
</html>
