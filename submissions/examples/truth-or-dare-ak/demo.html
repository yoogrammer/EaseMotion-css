<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truth or Dare - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-wrapper">
    <h1>Truth or Dare</h1>
    <div class="game-info">
      <span>Player: <strong id="playerTurn">1</strong></span>
      <button id="shuffleBtn" class="shuffle-btn">Shuffle Questions</button>
    </div>
    <div class="cards">
      <div class="card" id="truthCard">
        <div class="card-inner">
          <div class="card-front truth-front">Truth</div>
          <div class="card-back" id="truthBack">Click for Truth</div>
        </div>
      </div>
      <div class="card" id="dareCard">
        <div class="card-inner">
          <div class="card-front dare-front">Dare</div>
          <div class="card-back" id="dareBack">Click for Dare</div>
        </div>
      </div>
    </div>
    <div class="question-display" id="questionDisplay">
      <span class="category-badge" id="categoryBadge">Truth</span>
      <p id="questionText">Click a card to reveal a question!</p>
    </div>
    <button id="nextBtn" class="next-btn">Next Player</button>
  </div>
  <script>
    const truthQuestions = [
      "What's the most embarrassing thing you've ever done?",
      "What's your biggest fear in a relationship?",
      "Have you ever lied to your best friend?",
      "What's the worst date you've ever been on?",
      "What's a secret you've never told anyone?",
      "Who was your first crush?",
      "What's the most trouble you've ever been in?",
      "Have you ever cheated on a test?",
      "What's the weirdest food combination you like?",
      "What's your guilty pleasure TV show?",
      "Have you ever stalked someone on social media?",
      "What's the most childish thing you still do?",
      "What's your biggest insecurity?",
      "Have you ever broken something and blamed someone else?",
      "What's the worst gift you've ever received?",
      "What's a nickname you hate?",
      "Have you ever read someone's text messages?",
      "What's the most expensive thing you've broken?",
      "What's your hidden talent?",
      "Have you ever pretended to like a gift?",
      "What's the most awkward moment you've experienced?",
      "What's a bad habit you can't break?"
    ];

    const dareQuestions = [
      "Do your best impression of a celebrity for 30 seconds",
      "Sing the chorus of your favorite song at the top of your voice",
      "Talk in an accent for the next 3 rounds",
      "Let someone post anything on your social media",
      "Do 20 push-ups right now",
      "Speak in rhymes for the next 2 minutes",
      "Wear your shirt backwards for the rest of the game",
      "Call a friend and tell them you love them",
      "Do a dramatic reading of the last text you sent",
      "Act like a chicken for 30 seconds",
      "Let someone draw on your face with a pen",
      "Do your best dance move for 10 seconds",
      "Speak without closing your mouth for 1 minute",
      "Hold a plank position until your next turn",
      "Imitate the person to your left",
      "Say tongue twisters 3 times fast",
      "Do a robot dance for 15 seconds",
      "Tell a joke in a serious voice",
      "Act out your favorite movie scene",
      "Let the group choose your phone wallpaper",
      "Do a dramatic slow-motion walk across the room",
      "Make up a short rap about the person on your right"
    ];

    const truthCard = document.getElementById('truthCard');
    const dareCard = document.getElementById('dareCard');
    const truthBack = document.getElementById('truthBack');
    const dareBack = document.getElementById('dareBack');
    const questionDisplay = document.getElementById('questionDisplay');
    const categoryBadge = document.getElementById('categoryBadge');
    const questionText = document.getElementById('questionText');
    const playerTurn = document.getElementById('playerTurn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const nextBtn = document.getElementById('nextBtn');

    let currentPlayer = 1;
    let shuffledTruth = [...truthQuestions];
    let shuffledDare = [...dareQuestions];
    let truthIndex = 0;
    let dareIndex = 0;

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function resetQuestions() {
      shuffledTruth = shuffle([...truthQuestions]);
      shuffledDare = shuffle([...dareQuestions]);
      truthIndex = 0;
      dareIndex = 0;
    }

    function showQuestion(category) {
      if (category === 'truth') {
        if (truthIndex >= shuffledTruth.length) resetQuestions();
        const q = shuffledTruth[truthIndex++];
        categoryBadge.textContent = 'Truth';
        categoryBadge.className = 'category-badge truth-badge';
        questionText.textContent = q;
      } else {
        if (dareIndex >= shuffledDare.length) resetQuestions();
        const q = shuffledDare[dareIndex++];
        categoryBadge.textContent = 'Dare';
        categoryBadge.className = 'category-badge dare-badge';
        questionText.textContent = q;
      }
    }

    truthCard.addEventListener('click', () => {
      truthCard.classList.toggle('flipped');
      if (truthCard.classList.contains('flipped')) {
        dareCard.classList.remove('flipped');
        showQuestion('truth');
      }
    });

    dareCard.addEventListener('click', () => {
      dareCard.classList.toggle('flipped');
      if (dareCard.classList.contains('flipped')) {
        truthCard.classList.remove('flipped');
        showQuestion('dare');
      }
    });

    shuffleBtn.addEventListener('click', () => {
      resetQuestions();
      truthCard.classList.remove('flipped');
      dareCard.classList.remove('flipped');
      questionText.textContent = 'Questions shuffled!';
      categoryBadge.textContent = '✓';
      categoryBadge.className = 'category-badge';
    });

    nextBtn.addEventListener('click', () => {
      currentPlayer++;
      playerTurn.textContent = currentPlayer;
      truthCard.classList.remove('flipped');
      dareCard.classList.remove('flipped');
      questionText.textContent = 'Click a card to reveal a question!';
      categoryBadge.textContent = '?';
      categoryBadge.className = 'category-badge';
    });

    resetQuestions();
  </script>
</body>
</html>
