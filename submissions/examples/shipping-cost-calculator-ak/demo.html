<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shipping Cost Calculator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator-wrapper">
    <h1>Shipping Cost Calculator</h1>
    <div class="input-section">
      <div class="field">
        <label for="weight">Package Weight</label>
        <input type="number" id="weight" class="input" value="5" min="0" step="0.1">
      </div>
      <div class="field">
        <label for="weightUnit">Weight Unit</label>
        <select id="weightUnit" class="input">
          <option value="kg">Kilograms (kg)</option>
          <option value="lbs">Pounds (lbs)</option>
        </select>
      </div>
      <div class="field">
        <label for="zone">Shipping Zone</label>
        <select id="zone" class="input">
          <option value="local">Local</option>
          <option value="national">National</option>
          <option value="international">International</option>
        </select>
      </div>
      <div class="field">
        <label for="carrier">Carrier</label>
        <select id="carrier" class="input">
          <option value="standard">Standard</option>
          <option value="express">Express</option>
          <option value="overnight">Overnight</option>
        </select>
      </div>
    </div>
    <div class="results" id="results">
      <div class="result-row">
        <span>Shipping Rate</span>
        <span id="rateDisplay">$0.00</span>
      </div>
      <div class="result-row">
        <span>Estimated Delivery</span>
        <span id="deliveryDisplay">—</span>
      </div>
      <div class="result-row">
        <span>Total Cost</span>
        <span id="totalCost">$0.00</span>
      </div>
    </div>
    <div class="comparison-section">
      <div class="comparison-header">Carrier Price Comparison</div>
      <div class="carrier-row" id="carrierStandard">
        <span>Standard</span>
        <span class="carrier-price" id="priceStandard">$0.00</span>
      </div>
      <div class="carrier-row" id="carrierExpress">
        <span>Express</span>
        <span class="carrier-price" id="priceExpress">$0.00</span>
      </div>
      <div class="carrier-row" id="carrierOvernight">
        <span>Overnight</span>
        <span class="carrier-price" id="priceOvernight">$0.00</span>
      </div>
    </div>
  </div>
  <script>
    const weight = document.getElementById('weight');
    const weightUnit = document.getElementById('weightUnit');
    const zone = document.getElementById('zone');
    const carrier = document.getElementById('carrier');
    const rateDisplay = document.getElementById('rateDisplay');
    const deliveryDisplay = document.getElementById('deliveryDisplay');
    const totalCost = document.getElementById('totalCost');
    const priceStandard = document.getElementById('priceStandard');
    const priceExpress = document.getElementById('priceExpress');
    const priceOvernight = document.getElementById('priceOvernight');

    const zoneMultipliers = { local: 1, national: 1.8, international: 4.5 };
    const carrierMultipliers = { standard: 1, express: 1.6, overnight: 2.8 };
    const deliveryTimes = {
      local: { standard: '1-2 days', express: 'Same day', overnight: 'Next morning' },
      national: { standard: '3-5 days', express: '1-2 days', overnight: 'Next day' },
      international: { standard: '7-14 days', express: '3-5 days', overnight: '1-2 days' }
    };
    const baseRates = { local: 5, national: 12, international: 35 };

    function fmt(n) {
      return '$' + n.toFixed(2);
    }

    function calculate() {
      const w = parseFloat(weight.value) || 0;
      const unit = weightUnit.value;
      const zn = zone.value;
      const car = carrier.value;

      const wKg = unit === 'lbs' ? w * 0.453592 : w;
      const zoneMul = zoneMultipliers[zn];
      const carrierMul = carrierMultipliers[car];
      const base = baseRates[zn];
      const weightCharge = wKg * 2.5 * zoneMul;
      const rate = base * zoneMul + weightCharge;
      const total = rate * carrierMul;

      rateDisplay.textContent = fmt(rate);
      totalCost.textContent = fmt(total);
      deliveryDisplay.textContent = deliveryTimes[zn][car] || '—';

      const sRate = base * zoneMul + wKg * 2.5 * zoneMul;
      priceStandard.textContent = fmt(sRate * carrierMultipliers.standard);
      priceExpress.textContent = fmt(sRate * carrierMultipliers.express);
      priceOvernight.textContent = fmt(sRate * carrierMultipliers.overnight);

      document.querySelectorAll('.carrier-row').forEach(el => el.classList.remove('best'));
      const prices = [
        { el: document.getElementById('carrierStandard'), p: sRate * 1 },
        { el: document.getElementById('carrierExpress'), p: sRate * 1.6 },
        { el: document.getElementById('carrierOvernight'), p: sRate * 2.8 }
      ];
      const minPrice = Math.min(...prices.map(p => p.p));
      prices.find(p => p.p === minPrice).el.classList.add('best');
    }

    weight.addEventListener('input', calculate);
    weightUnit.addEventListener('change', calculate);
    zone.addEventListener('change', calculate);
    carrier.addEventListener('change', calculate);
    calculate();
  </script>
</body>
</html>
