<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>ease-grid-flow Demo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Inter, sans-serif;
        padding: 2rem;
        background: #f8fafc;
      }
      h2 {
        color: #6366f1;
      }
      .demo-grid {
        display: grid;
        grid-template-columns: repeat(3, 60px);
        grid-template-rows: repeat(2, 40px);
        gap: 4px;
        border: 1px dashed #cbd5e1;
        border-radius: 6px;
        padding: 0.5rem;
        margin-top: 0.5rem;
      }
      .demo-grid > * {
        background: #e0e7ff;
        border-radius: 4px;
        padding: 0.25rem;
        text-align: center;
        font-size: 0.75rem;
      }
      .box {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      code {
        background: #f1f5f9;
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
        font-size: 0.85rem;
      }
      .wide {
        grid-column: span 2;
      }
    </style>
  </head>
  <body>
    <h2>grid-auto-flow Utilities</h2>

    <div class="box">
      <h3><code>ease-grid-flow-row</code> (default)</h3>
      <div class="demo-grid ease-grid-flow-row">
        <span>1</span><span class="wide">2 (wide)</span><span>3</span
        ><span>4</span><span>5</span>
      </div>
    </div>

    <div class="box">
      <h3><code>ease-grid-flow-col</code></h3>
      <div
        class="demo-grid ease-grid-flow-col"
        style="grid-template-rows: repeat(3, 40px)"
      >
        <span>1</span><span class="wide">2</span><span>3</span><span>4</span
        ><span>5</span>
      </div>
    </div>

    <div class="box">
      <h3><code>ease-grid-flow-dense</code></h3>
      <div class="demo-grid ease-grid-flow-dense">
        <span>1</span><span class="wide">2 (wide)</span><span>3</span
        ><span>4</span><span>5</span>
      </div>
    </div>

    <div class="box">
      <h3><code>ease-grid-flow-row-dense</code></h3>
      <div class="demo-grid ease-grid-flow-row-dense">
        <span>1</span><span class="wide">2</span><span>3</span><span>4</span
        ><span>5</span>
      </div>
    </div>

    <div class="box">
      <h3><code>ease-grid-flow-col-dense</code></h3>
      <div
        class="demo-grid ease-grid-flow-col-dense"
        style="grid-template-rows: repeat(3, 40px)"
      >
        <span>1</span><span class="wide">2</span><span>3</span><span>4</span
        ><span>5</span>
      </div>
    </div>
  </body>
</html>
