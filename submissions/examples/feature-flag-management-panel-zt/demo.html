<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Feature Flag Management Panel — EaseMotion</title>
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="em-bg-muted em-text-base">
  <main class="em-container em-p-6 flags-panel" role="main">
    <header class="em-mb-6">
      <h1 class="em-h3">Feature Flags</h1>
      <p class="em-text-muted">Manage feature toggles across environments (visual-only demo, no JavaScript).</p>
    </header>

    <section class="flags-grid" aria-label="Feature flags list">

      <article class="flag-card" tabindex="0">
        <div class="flag-row">
          <div class="flag-meta">
            <div class="flag-name">New Dashboard</div>
            <div class="flag-envs">
              <span class="env badge prod">Production</span>
            </div>
          </div>
          <div class="flag-controls">
            <label class="switch" aria-hidden="true">
              <input type="checkbox" checked disabled>
              <span class="slider"></span>
            </label>
            <div class="rollout" aria-hidden="true">
              <div class="rollout-fill" style="width:100%"></div>
            </div>
            <div class="rollout-label">100%</div>
          </div>
        </div>
      </article>

      <article class="flag-card" tabindex="0">
        <div class="flag-row">
          <div class="flag-meta">
            <div class="flag-name">AI Assistant</div>
            <div class="flag-envs">
              <span class="env badge staging">Staging</span>
            </div>
          </div>
          <div class="flag-controls">
            <label class="switch" aria-hidden="true">
              <input type="checkbox" checked disabled>
              <span class="slider"></span>
            </label>
            <div class="rollout" aria-hidden="true">
              <div class="rollout-fill" style="width:50%"></div>
            </div>
            <div class="rollout-label">50%</div>
          </div>
        </div>
      </article>

      <article class="flag-card" tabindex="0">
        <div class="flag-row">
          <div class="flag-meta">
            <div class="flag-name">Beta Search</div>
            <div class="flag-envs">
              <span class="env badge dev">Development</span>
            </div>
          </div>
          <div class="flag-controls">
            <label class="switch" aria-hidden="true">
              <input type="checkbox" disabled>
              <span class="slider"></span>
            </label>
            <div class="rollout" aria-hidden="true">
              <div class="rollout-fill" style="width:0%"></div>
            </div>
            <div class="rollout-label">0%</div>
          </div>
        </div>
      </article>

    </section>

    <footer class="em-mt-6 em-text-xs em-text-muted">This component is visual-only. Integrate with your backend to make toggles interactive.</footer>
  </main>
</body>
</html>
