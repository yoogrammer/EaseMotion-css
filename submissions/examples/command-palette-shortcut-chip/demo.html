<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Palette Shortcut Chip</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Command Palette Shortcut Chip</h1>

    <p class="subtitle">
        Keyboard shortcut chips for command palettes, docs, and productivity apps.
    </p>

    <div class="chip-grid">

        <div class="shortcut-chip">
            <span class="label">Search</span>
            <div class="keys">
                <kbd>⌘</kbd>
                <kbd>K</kbd>
            </div>
        </div>

        <div class="shortcut-chip">
            <span class="label">Open File</span>
            <div class="keys">
                <kbd>Ctrl</kbd>
                <kbd>P</kbd>
            </div>
        </div>

        <div class="shortcut-chip">
            <span class="label">Quick Actions</span>
            <div class="keys">
                <kbd>⌘</kbd>
                <kbd>⇧</kbd>
                <kbd>P</kbd>
            </div>
        </div>

        <div class="shortcut-chip premium">
            <span class="label">AI Assistant</span>
            <div class="keys">
                <kbd>Alt</kbd>
                <kbd>A</kbd>
            </div>
        </div>

    </div>

</div>

</body>
</html>
