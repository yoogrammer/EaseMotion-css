<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>ease-underline-offset Demo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Inter, sans-serif;
        padding: 2rem;
        background: #f8fafc;
        max-width: 500px;
        margin: 0 auto;
      }
      h2 {
        color: #6366f1;
      }
      .demo {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 0.75rem 1rem;
        margin-bottom: 0.75rem;
        font-size: 1.15rem;
      }
    </style>
  </head>
  <body>
    <h2>text-underline-offset Utilities</h2>
    <div class="demo ease-decoration-underline">Default underline</div>
    <div class="demo ease-decoration-underline ease-underline-offset-auto">
      Offset: auto
    </div>
    <div class="demo ease-decoration-underline ease-underline-offset-1">
      Offset: 1 (2px)
    </div>
    <div class="demo ease-decoration-underline ease-underline-offset-2">
      Offset: 2 (4px)
    </div>
    <div class="demo ease-decoration-underline ease-underline-offset-4">
      Offset: 4 (6px)
    </div>
  </body>
</html>
