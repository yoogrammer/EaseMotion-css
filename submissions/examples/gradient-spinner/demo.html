<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradient Spinner Loader</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="demo-container">

    <h1>Gradient Spinner Loader</h1>

    <p>
      CSS-only rotating gradient loaders built for modern interfaces.
    </p>

    <div class="loader-grid">

      <div class="loader-card">
        <div class="ease-gradient-loader"></div>
        <span>Default</span>
      </div>

      <div class="loader-card">
        <div class="ease-gradient-loader loader-purple"></div>
        <span>Purple</span>
      </div>

      <div class="loader-card">
        <div class="ease-gradient-loader loader-success"></div>
        <span>Success</span>
      </div>

      <div class="loader-card">
        <div class="ease-gradient-loader loader-large"></div>
        <span>Large</span>
      </div>

    </div>

    <section class="showcase">

      <h2>Inline Usage Example</h2>

      <div class="inline-loader">
        <div class="ease-gradient-loader loader-small"></div>
        <span>Loading content...</span>
      </div>

    </section>

  </main>

</body>
</html>
