<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Breadcrumbs - EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container fade-in-up">
    <h1>Navigation Breadcrumbs</h1>
    <p>A responsive, accessible breadcrumb pattern with animated hover states and separators.</p>
    
    <div class="card pulse-hover">
      <nav aria-label="Breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a href="#" class="breadcrumb-link slide-hover">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="home-icon"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              Home
            </a>
          </li>
          <li class="breadcrumb-item">
            <a href="#" class="breadcrumb-link slide-hover">Products</a>
          </li>
          <li class="breadcrumb-item">
            <a href="#" class="breadcrumb-link slide-hover">Laptops</a>
          </li>
          <li class="breadcrumb-item active" aria-current="page">
            <span class="breadcrumb-current">Gaming Laptop</span>
          </li>
        </ol>
      </nav>
    </div>
  </main>
</body>
</html>
