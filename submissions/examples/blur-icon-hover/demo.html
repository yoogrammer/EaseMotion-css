<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blur Icon Hover — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <span class="badge">EaseMotion CSS · Issue #65</span>

  <h2>Animation: <span>Blur Icon Hover</span></h2>

  <p>Hover over any icon to see the animation</p>

  <div class="demo-area">

    <div class="demo-card">
      <div class="ease-blur-icon-hover">
        <div class="icon-square"></div>
      </div>
      <span class="label">Square</span>
    </div>

    <div class="demo-card">
      <div class="ease-blur-icon-hover">
        <div class="icon-circle"></div>
      </div>
      <span class="label">Circle</span>
    </div>

    <div class="demo-card">
      <div class="ease-blur-icon-hover">
        <div class="icon-rounded"></div>
      </div>
      <span class="label">Rounded</span>
    </div>

  </div>

  <div class="code-block">
    <span class="tag">&lt;div</span>
    <span class="attr"> class</span>=<span class="val">"ease-blur-icon-hover"</span><span class="tag">&gt;</span><br/>
    &nbsp;&nbsp;<span class="tag">&lt;img</span>
    <span class="attr"> src</span>=<span class="val">"icon.svg"</span>
    <span class="attr"> alt</span>=<span class="val">"icon"</span>
    <span class="tag">/&gt;</span><br/>
    <span class="tag">&lt;/div&gt;</span>
  </div>

</body>
</html>
