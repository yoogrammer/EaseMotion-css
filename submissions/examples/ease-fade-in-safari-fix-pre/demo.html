<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fade-in Safari Fix</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <span class="label red">❌ Broken — flickers on Safari</span>
    <h2>Without Fix</h2>
    <div id="box1" class="box ease-fade-in-broken"
      style="background:#fff0f0; color:#ef4444; border:1px solid #fca5a5;">
      Flickers on Safari!
    </div>
    <button class="replay-btn" style="background:#ef4444;"
      onclick="replay('box1','ease-fade-in-broken')">↺ Replay</button>
  </div>

  <div class="card">
    <span class="label green">✅ Fixed — smooth on all browsers</span>
    <h2>With Safari Fix</h2>
    <div id="box2" class="box ease-fade-in-fixed"
      style="background:#e6faf3; color:#10b981; border:1px solid #6ee7b7;">
      Smooth on Safari! ✓
    </div>
    <button class="replay-btn" style="background:#10b981;"
      onclick="replay('box2','ease-fade-in-fixed')">↺ Replay</button>
  </div>

  <div class="card">
    <span class="label green">✅ Fade Up — Safari Fixed</span>
    <h2>Fade In Up Variant</h2>
    <div id="box3" class="box ease-fade-in-up-fixed"
      style="background:#ede9ff; color:#6c63ff; border:1px solid #c4c0ff;">
      Fade up smoothly! ✓
    </div>
    <button class="replay-btn"
      onclick="replay('box3','ease-fade-in-up-fixed')">↺ Replay</button>
  </div>

  <script>
    function replay(id, cls) {
      const el = document.getElementById(id);
      el.classList.remove(cls);
      void el.offsetWidth;
      el.classList.add(cls);
    }
  </script>

</body>
</html>
