<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Cloud Deployment Architecture</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Multi-Cloud Deployment Architecture</h1>

    <p class="subtitle">
        Visualizing application deployment across multiple cloud providers.
    </p>

    <div class="architecture">

        <div class="traffic-manager">
            🌍 Global Traffic Manager
        </div>

        <div class="connector"></div>

        <div class="clouds">

            <div class="cloud">
                <div class="provider aws">
                    ☁️ AWS
                </div>

                <div class="service">
                    Application Cluster
                </div>
            </div>

            <div class="cloud">
                <div class="provider azure">
                    ☁️ Azure
                </div>

                <div class="service">
                    Application Cluster
                </div>
            </div>

            <div class="cloud">
                <div class="provider gcp">
                    ☁️ Google Cloud
                </div>

                <div class="service">
                    Application Cluster
                </div>
            </div>

        </div>

        <div class="status">
            🔄 High Availability • Load Distribution • Disaster Recovery
        </div>

    </div>

</div>

</body>
</html>
