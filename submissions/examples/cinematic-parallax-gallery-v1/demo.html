<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinematic Parallax Gallery - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Cinematic Parallax Gallery</h1>
    <div class="parallax-grid">
      <div class="parallax-card">
        <div class="parallax-image" style="background-image: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></div>
        <div class="parallax-label">Mountain View</div>
      </div>
      <div class="parallax-card">
        <div class="parallax-image" style="background-image: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);"></div>
        <div class="parallax-label">Ocean Sunset</div>
      </div>
      <div class="parallax-card">
        <div class="parallax-image" style="background-image: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);"></div>
        <div class="parallax-label">Forest Trail</div>
      </div>
      <div class="parallax-card">
        <div class="parallax-image" style="background-image: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);"></div>
        <div class="parallax-label">City Lights</div>
      </div>
      <div class="parallax-card">
        <div class="parallax-image" style="background-image: linear-gradient(135deg, #fa709a 0%, #fee140 100%);"></div>
        <div class="parallax-label">Desert Dunes</div>
      </div>
      <div class="parallax-card">
        <div class="parallax-image" style="background-image: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);"></div>
        <div class="parallax-label">Northern Lights</div>
      </div>
    </div>
    <p class="description">Gallery cards with a parallax depth effect on hover — the image layer shifts while the label stays. Supports light and dark mode.</p>
  </div>
</body>
</html>
