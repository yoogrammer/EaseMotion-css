<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chip – Missing :active state</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Bug: missing <code>:active</code> state</h1>
  <p>Click and hold a chip — no press feedback (no <code>:active</code> style).</p>

  <div class="ease-chip-group">
    <input type="checkbox" id="ch1" />
    <label for="ch1" class="ease-chip">React</label>
    <input type="checkbox" id="ch2" />
    <label for="ch2" class="ease-chip">Vue</label>
    <input type="checkbox" id="ch3" />
    <label for="ch3" class="ease-chip">Svelte</label>
  </div>

  <hr />
  <h2>Fix</h2>
  <pre>
.ease-chip:active {
  transform: translateY(0);
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}
  </pre>
</body>
</html>
