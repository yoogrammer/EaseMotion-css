<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-gradient-text — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 2rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-size: 1rem; opacity: 0.5; }
    .demo-heading {
      font-size: 3rem;
      font-weight: 800;
      margin: 0;
    }
    .demo-sub {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0;
    }
    .label {
      font-size: 0.75rem;
      color: #666;
      text-align: center;
    }
    .row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }
  </style>
</head>
<body>

  <h1>ease-gradient-text Demo</h1>

  <div class="row">
    <div class="label">Default (Purple → Cyan)</div>
    <p class="demo-heading ease-gradient-text">Hello World</p>
  </div>

  <div class="row">
    <div class="label">Sunset theme</div>
    <p class="demo-heading ease-gradient-text ease-gradient-sunset">Sunset Vibes</p>
  </div>

  <div class="row">
    <div class="label">Ocean theme</div>
    <p class="demo-heading ease-gradient-text ease-gradient-ocean">Ocean Breeze</p>
  </div>

  <div class="row">
    <div class="label">Forest theme</div>
    <p class="demo-heading ease-gradient-text ease-gradient-forest">Forest Walk</p>
  </div>

  <div class="row">
    <div class="label">Fast speed</div>
    <p class="demo-sub ease-gradient-text ease-gradient-fast">Fast Flow</p>
  </div>

  <div class="row">
    <div class="label">Slow speed</div>
    <p class="demo-sub ease-gradient-text ease-gradient-slow">Slow Drift</p>
  </div>

  <div class="row">
    <div class="label">Pause on hover</div>
    <p class="demo-sub ease-gradient-text ease-gradient-pause">Hover to Pause</p>
  </div>

</body>
</html>
