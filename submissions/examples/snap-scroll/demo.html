<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-snap-scroll — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif; display: flex; flex-direction: column;
      align-items: center; justify-content: center; min-height: 100vh;
      background: #0f0f0f; gap: 2.5rem; padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; }
    .label { font-size:0.75rem; color:#555; text-align:center; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.75rem; }
    .section { display:flex; flex-direction:column; align-items:center; }
    .row { display:flex; gap:2rem; flex-wrap:wrap; justify-content:center; }
    .snap-demo {
      width:100%; max-width:600px; height:300px; display:flex; gap:0;
      overflow-x:auto; border-radius:12px; border:1px solid #2a2a2a;
    }
    .snap-demo.horizontal { scroll-snap-type:x mandatory; }
    .snap-demo > * {
      flex:0 0 100%; height:100%; scroll-snap-align:start;
      display:flex; align-items:center; justify-content:center;
      font-size:2rem; font-weight:700; color:#fff;
    }
    .snap-demo > :nth-child(1) { background:#6366f1; }
    .snap-demo > :nth-child(2) { background:#22c55e; }
    .snap-demo > :nth-child(3) { background:#ef4444; }
    .snap-demo > :nth-child(4) { background:#f59e0b; }
    .snap-demo > :nth-child(5) { background:#a78bfa; }
    .snap-y-demo {
      width:100%; max-width:250px; height:350px; overflow-y:auto;
      border-radius:12px; border:1px solid #2a2a2a; scroll-snap-type:y mandatory;
    }
    .snap-y-demo > * {
      height:100%; scroll-snap-align:center;
      display:flex; align-items:center; justify-content:center;
      font-size:1.5rem; font-weight:700; color:#fff;
    }
    .snap-y-demo > :nth-child(1) { background:#6366f1; }
    .snap-y-demo > :nth-child(2) { background:#22c55e; }
    .snap-y-demo > :nth-child(3) { background:#ef4444; }
    .hint { color:#555; font-size:0.8rem; max-width:500px; text-align:center; }
  </style>
</head>
<body>
  <h1>ease-snap-scroll</h1>
  <p class="hint">Use scrollbar to swipe through snap points — each panel snaps cleanly into view</p>
  <div class="section">
    <div class="label">Horizontal snap (x mandatory)</div>
    <div class="snap-demo horizontal">
      <div>1</div>
      <div>2</div>
      <div>3</div>
      <div>4</div>
      <div>5</div>
    </div>
  </div>
  <div class="row">
    <div class="section">
      <div class="label">Vertical snap (y mandatory)</div>
      <div class="snap-y-demo">
        <div>A</div>
        <div>B</div>
        <div>C</div>
      </div>
    </div>
    <div class="section">
      <div class="label">Snap align variants</div>
      <div style="display:flex;gap:0.5rem;flex-direction:column;">
        <div style="padding:0.75rem 1.5rem;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;color:#ccc;text-align:center;">
          <code>ease-snap-start</code>
        </div>
        <div style="padding:0.75rem 1.5rem;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;color:#ccc;text-align:center;">
          <code>ease-snap-center</code>
        </div>
        <div style="padding:0.75rem 1.5rem;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;color:#ccc;text-align:center;">
          <code>ease-snap-end</code>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
