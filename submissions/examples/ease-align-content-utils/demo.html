<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>ease-content-* Utilities Demo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Inter, sans-serif;
        padding: 2rem;
        background: #f8fafc;
        max-width: 600px;
        margin: 0 auto;
      }
      h2 {
        color: #6366f1;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1rem;
        margin-bottom: 1rem;
      }
      .box {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        height: 200px;
        background: #fff;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        padding: 4px;
      }
      .box div {
        width: 60px;
        height: 30px;
        background: #6366f1;
        color: #fff;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
      }
      .label {
        margin-top: 0.25rem;
        font-size: 0.8rem;
        text-align: center;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <h2>align-content Utilities</h2>
    <div class="grid">
      <div>
        <div class="box ease-content-start">
          <div>1</div>
          <div>2</div>
          <div>3</div>
          <div>4</div>
          <div>5</div>
        </div>
        <div class="label">content-start</div>
      </div>
      <div>
        <div class="box ease-content-center">
          <div>1</div>
          <div>2</div>
          <div>3</div>
          <div>4</div>
          <div>5</div>
        </div>
        <div class="label">content-center</div>
      </div>
      <div>
        <div class="box ease-content-end">
          <div>1</div>
          <div>2</div>
          <div>3</div>
          <div>4</div>
          <div>5</div>
        </div>
        <div class="label">content-end</div>
      </div>
      <div>
        <div class="box ease-content-between">
          <div>1</div>
          <div>2</div>
          <div>3</div>
          <div>4</div>
          <div>5</div>
        </div>
        <div class="label">content-between</div>
      </div>
      <div>
        <div class="box ease-content-around">
          <div>1</div>
          <div>2</div>
          <div>3</div>
          <div>4</div>
          <div>5</div>
        </div>
        <div class="label">content-around</div>
      </div>
      <div>
        <div class="box ease-content-evenly">
          <div>1</div>
          <div>2</div>
          <div>3</div>
          <div>4</div>
          <div>5</div>
        </div>
        <div class="label">content-evenly</div>
      </div>
    </div>
  </body>
</html>
