<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-loader-dots — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; letter-spacing: 0.05em; }
    .row { display: flex; gap: 3rem; flex-wrap: wrap; justify-content: center; align-items: center; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .card {
      padding: 2rem 3rem;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 12px;
      display: flex; flex-direction: column; align-items: center;
    }
    .card .label { margin-bottom: 0.75rem; color: #666; }
  </style>
</head>
<body>
  <h1>ease-loader-dots</h1>
  <div class="row">
    <div class="card">
      <div class="label">Default</div>
      <div class="ease-loader-dots">
        <span class="ease-loader-dot"></span>
        <span class="ease-loader-dot"></span>
        <span class="ease-loader-dot"></span>
      </div>
    </div>
    <div class="card">
      <div class="label">Small</div>
      <div class="ease-loader-dots ease-loader-dots-sm">
        <span class="ease-loader-dot"></span>
        <span class="ease-loader-dot"></span>
        <span class="ease-loader-dot"></span>
      </div>
    </div>
    <div class="card">
      <div class="label">Large</div>
      <div class="ease-loader-dots ease-loader-dots-lg">
        <span class="ease-loader-dot"></span>
        <span class="ease-loader-dot"></span>
        <span class="ease-loader-dot"></span>
      </div>
    </div>
  </div>
</body>
</html>
