<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-skeleton | EaseMotion CSS</title>
  
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background: var(--ease-color-bg, #f8fafc);
      padding: 4rem 2rem;
      font-family: var(--ease-font-sans, system-ui, sans-serif);
      color: var(--ease-color-text, #1e293b);
    }

    .demo-header {
      text-align: center;
      margin-bottom: 4rem;
    }

    .demo-header h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--ease-color-primary, #6c63ff), var(--ease-color-secondary, #8b5cf6));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 3rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    .example-section {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .example-section h2 {
      font-size: 1.25rem;
      font-weight: 700;
      border-left: 4px solid var(--ease-color-primary);
      padding-left: 1rem;
    }
  </style>
</head>
<body>

  <header class="demo-header">
    <h1>ease-skeleton</h1>
    <p>Pure CSS skeleton loaders for smooth content transitions.</p>
  </header>

  <div class="demo-grid">

    <!-- Card Skeleton -->
    <div class="example-section">
      <h2>Card Profile Layout</h2>
      <div class="skeleton-container">
        <div class="skeleton-header">
          <div class="ease-skeleton ease-skeleton--avatar"></div>
          <div class="skeleton-body" style="flex: 1;">
            <div class="ease-skeleton ease-skeleton--text" style="width: 60%;"></div>
            <div class="ease-skeleton ease-skeleton--text" style="width: 40%;"></div>
          </div>
        </div>
        <div class="ease-skeleton ease-skeleton--card"></div>
        <div class="skeleton-body">
          <div class="ease-skeleton ease-skeleton--text"></div>
          <div class="ease-skeleton ease-skeleton--text"></div>
          <div class="ease-skeleton ease-skeleton--text"></div>
        </div>
      </div>
    </div>

    <!-- List Skeleton -->
    <div class="example-section">
      <h2>List Item Variants</h2>
      
      <div class="skeleton-container" style="gap: 1rem;">
        <div class="skeleton-header">
          <div class="ease-skeleton ease-skeleton--avatar" style="width: 40px; height: 40px;"></div>
          <div class="ease-skeleton ease-skeleton--text" style="flex: 1; height: 1.5rem; margin-bottom: 0;"></div>
        </div>
        <div class="skeleton-header">
          <div class="ease-skeleton ease-skeleton--avatar" style="width: 40px; height: 40px;"></div>
          <div class="ease-skeleton ease-skeleton--text" style="flex: 1; height: 1.5rem; margin-bottom: 0;"></div>
        </div>
        <div class="skeleton-header">
          <div class="ease-skeleton ease-skeleton--avatar" style="width: 40px; height: 40px;"></div>
          <div class="ease-skeleton ease-skeleton--text" style="flex: 1; height: 1.5rem; margin-bottom: 0;"></div>
        </div>
      </div>

      <h2>Paragraph Blocks</h2>
      <div class="skeleton-container">
        <div class="skeleton-body">
          <div class="ease-skeleton ease-skeleton--text" style="height: 0.75rem;"></div>
          <div class="ease-skeleton ease-skeleton--text" style="height: 0.75rem;"></div>
          <div class="ease-skeleton ease-skeleton--text" style="height: 0.75rem;"></div>
          <div class="ease-skeleton ease-skeleton--text" style="height: 0.75rem;"></div>
          <div class="ease-skeleton ease-skeleton--text" style="height: 0.75rem; width: 50%;"></div>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
