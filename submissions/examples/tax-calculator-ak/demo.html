<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tax Calculator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator-wrapper">
    <h1>Income Tax Calculator</h1>
    <div class="input-section">
      <div class="field">
        <label for="income">Annual Income ($)</label>
        <input type="number" id="income" class="input" value="85000" min="0" max="999999999" step="1000">
      </div>
      <div class="field">
        <label for="deduction">Standard Deduction ($)</label>
        <input type="number" id="deduction" class="input" value="14600" min="0" max="100000">
      </div>
    </div>
    <div class="bracket-visual" id="bracketVisual"></div>
    <div class="results">
      <div class="result-row">
        <span>Taxable Income</span>
        <span id="taxableIncome">$70,400.00</span>
      </div>
      <div class="result-row">
        <span>Total Tax Owed</span>
        <span id="totalTax">$0.00</span>
      </div>
      <div class="result-row">
        <span>Effective Tax Rate</span>
        <span id="effRate">0%</span>
      </div>
      <div class="result-row">
        <span>Take-Home Pay</span>
        <span id="takeHome">$0.00</span>
      </div>
      <div class="result-row">
        <span>Take-Home %</span>
        <span id="takeHomePct">0%</span>
      </div>
    </div>
    <div class="bracket-detail" id="bracketDetail"></div>
  </div>
  <script>
    const income = document.getElementById('income');
    const deduction = document.getElementById('deduction');
    const taxableIncome = document.getElementById('taxableIncome');
    const totalTax = document.getElementById('totalTax');
    const effRate = document.getElementById('effRate');
    const takeHome = document.getElementById('takeHome');
    const takeHomePct = document.getElementById('takeHomePct');
    const bracketVisual = document.getElementById('bracketVisual');
    const bracketDetail = document.getElementById('bracketDetail');

    const brackets = [
      { min: 0, max: 11600, rate: 0.10, label: '10% Bracket', color: '#22c55e' },
      { min: 11600, max: 47150, rate: 0.12, label: '12% Bracket', color: '#3b82f6' },
      { min: 47150, max: 100525, rate: 0.22, label: '22% Bracket', color: '#f59e0b' },
      { min: 100525, max: 191950, rate: 0.24, label: '24% Bracket', color: '#f97316' },
      { min: 191950, max: 243725, rate: 0.32, label: '32% Bracket', color: '#ef4444' },
      { min: 243725, max: 609350, rate: 0.35, label: '35% Bracket', color: '#dc2626' },
      { min: 609350, max: Infinity, rate: 0.37, label: '37% Bracket', color: '#991b1b' }
    ];

    function fmt(n) {
      return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function calculate() {
      const inc = parseFloat(income.value) || 0;
      const ded = parseFloat(deduction.value) || 0;
      const taxable = Math.max(0, inc - ded);

      taxableIncome.textContent = fmt(taxable);

      let total = 0;
      let remaining = taxable;
      const bracketDetails = [];

      brackets.forEach(b => {
        if (remaining <= 0) return;
        const taxed = Math.min(remaining, b.max - b.min);
        const taxAmt = taxed * b.rate;
        if (taxed > 0) {
          total += taxAmt;
          bracketDetails.push({ label: b.label, amount: taxed, tax: taxAmt, rate: b.rate, color: b.color });
        }
        remaining -= taxed;
      });

      totalTax.textContent = fmt(total);

      const eff = inc > 0 ? (total / inc) * 100 : 0;
      effRate.textContent = eff.toFixed(1) + '%';

      const takeHomeVal = inc - total;
      takeHome.textContent = fmt(takeHomeVal);

      const thPct = inc > 0 ? (takeHomeVal / inc) * 100 : 0;
      takeHomePct.textContent = thPct.toFixed(1) + '%';

      bracketVisual.innerHTML = '';
      if (taxable > 0) {
        bracketDetails.forEach(b => {
          const pct = (b.amount / taxable) * 100;
          const seg = document.createElement('div');
          seg.className = 'bracket-seg';
          seg.style.width = Math.max(pct, 1) + '%';
          seg.style.background = b.color;
          seg.title = `${b.label}: ${fmt(b.amount)} taxed at ${(b.rate*100).toFixed(0)}%`;
          bracketVisual.appendChild(seg);
        });
      }

      bracketDetail.innerHTML = '';
      bracketDetails.forEach(b => {
        const row = document.createElement('div');
        row.className = 'detail-row';
        row.innerHTML = `
          <span class="detail-label"><span class="detail-dot" style="background:${b.color}"></span>${b.label}</span>
          <span>${fmt(b.amount)} × ${(b.rate*100).toFixed(0)}%</span>
          <span class="detail-tax">${fmt(b.tax)}</span>
        `;
        bracketDetail.appendChild(row);
      });
    }

    income.addEventListener('input', calculate);
    deduction.addEventListener('input', calculate);
    calculate();
  </script>
</body>
</html>
