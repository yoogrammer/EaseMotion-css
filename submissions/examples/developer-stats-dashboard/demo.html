<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Developer Stats Dashboard — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: #0f0e17;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 3rem 2rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { font-size: 2rem; margin-bottom: 0.25rem; text-align: center; }
    .subtitle { color: rgba(255,255,255,0.5); margin-bottom: 3rem; text-align: center; }
  </style>
</head>
<body>
  <h1>Developer Stats Dashboard</h1>
  <p class="subtitle">Project and contribution metrics widget — Issue #1163</p>

  <div class="ease-dev-stats">

    <div class="ease-stat-card ease-stat-card-primary">
      <span class="ease-stat-value">128</span>
      <span class="ease-stat-label">Commits</span>
    </div>

    <div class="ease-stat-card ease-stat-card-success">
      <span class="ease-stat-value">42</span>
      <span class="ease-stat-label">Pull Requests</span>
    </div>

    <div class="ease-stat-card ease-stat-card-info">
      <span class="ease-stat-value">18</span>
      <span class="ease-stat-label">Repositories</span>
    </div>

    <div class="ease-stat-card ease-stat-card-warning">
      <span class="ease-stat-value">356</span>
      <span class="ease-stat-label">Stars</span>
    </div>

    <div class="ease-stat-card ease-stat-card-primary">
      <span class="ease-stat-value">7</span>
      <span class="ease-stat-label">Open Issues</span>
    </div>

    <div class="ease-stat-card ease-stat-card-success">
      <span class="ease-stat-value">94</span>
      <span class="ease-stat-label">Issues Resolved</span>
    </div>

    <div class="ease-stat-card ease-stat-card-info">
      <span class="ease-stat-value">12</span>
      <span class="ease-stat-label">Releases</span>
    </div>

    <div class="ease-stat-card ease-stat-card-warning">
      <span class="ease-stat-value">3</span>
      <span class="ease-stat-label">Deployments</span>
    </div>

  </div>
</body>
</html>
