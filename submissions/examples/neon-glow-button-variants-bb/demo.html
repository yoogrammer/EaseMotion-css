<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Glow Button Variants</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="demo-bg">
      <h1 class="demo-heading">Neon Glow Buttons</h1>
      <p class="demo-sub">Hover to activate the glow effect</p>

      <section class="btn-showcase" aria-label="Button variants">
        <!-- Solid variants -->
        <div class="btn-row">
          <button class="neon-btn neon-purple" type="button">⚡ Purple Neon</button>
          <button class="neon-btn neon-cyan" type="button">💠 Cyan Neon</button>
          <button class="neon-btn neon-green" type="button">🟢 Green Neon</button>
          <button class="neon-btn neon-pink" type="button">🌸 Pink Neon</button>
          <button class="neon-btn neon-orange" type="button">🔥 Orange Neon</button>
        </div>

        <!-- Outline variants -->
        <div class="btn-row">
          <button class="neon-btn neon-outline neon-purple" type="button">◇ Outline Purple</button>
          <button class="neon-btn neon-outline neon-cyan" type="button">◇ Outline Cyan</button>
          <button class="neon-btn neon-outline neon-green" type="button">◇ Outline Green</button>
          <button class="neon-btn neon-outline neon-pink" type="button">◇ Outline Pink</button>
        </div>

        <!-- Pulse variants -->
        <div class="btn-row">
          <button class="neon-btn neon-purple neon-pulse" type="button">🔴 Pulse Alert</button>
          <button class="neon-btn neon-green neon-pulse" type="button">✅ Pulse Active</button>
          <button class="neon-btn neon-cyan neon-ripple" type="button" id="ripple-btn">💫 Ripple Effect</button>
        </div>

        <!-- Icon + text buttons -->
        <div class="btn-row">
          <button class="neon-btn neon-purple neon-icon-btn" type="button">
            <span class="neon-icon" aria-hidden="true">🚀</span>
            Launch
          </button>
          <button class="neon-btn neon-cyan neon-icon-btn" type="button">
            <span class="neon-icon" aria-hidden="true">📤</span>
            Export
          </button>
          <button class="neon-btn neon-icon-btn neon-outline neon-green" type="button">
            <span class="neon-icon" aria-hidden="true">⬇️</span>
            Download
          </button>
        </div>
      </section>
    </div>

    <script>
      /* Ripple effect on click */
      document.querySelectorAll('.neon-ripple').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const rect = btn.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const ripple = document.createElement('span');
          ripple.className = 'ripple-circle';
          ripple.style.left = `${x}px`;
          ripple.style.top = `${y}px`;
          btn.appendChild(ripple);
          ripple.addEventListener('animationend', () => ripple.remove());
        });
      });
    </script>
  </body>
</html>
