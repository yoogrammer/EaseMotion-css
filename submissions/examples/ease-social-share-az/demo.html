<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Share Buttons — EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css@1.4.5/dist/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:var(--ease-space-8,32px);padding:var(--ease-space-6,24px);font-family:var(--ease-font-sans,system-ui,sans-serif);background:var(--ease-color-neutral-50,#f9fafb);">

  <h1 style="font-size:1.5rem;font-weight:700;color:var(--ease-color-neutral-900,#111827);margin:0;">
    Share this page
  </h1>

  <div class="ease-social-share-az">
    <span class="ease-share-label-az">Share via</span>
    <button class="ease-share-btn-az --facebook">
      <span class="share-icon-az">&#x1f4ac;</span>
      Facebook
      <span class="share-count-az">1.2k</span>
    </button>
    <button class="ease-share-btn-az --twitter">
      <span class="share-icon-az">&#x1d54f;</span>
      Twitter/X
      <span class="share-count-az">843</span>
    </button>
    <button class="ease-share-btn-az --linkedin">
      <span class="share-icon-az">&#x1f4e1;</span>
      LinkedIn
      <span class="share-count-az">567</span>
    </button>
    <button class="ease-share-btn-az --whatsapp">
      <span class="share-icon-az">&#x1f4f1;</span>
      WhatsApp
    </button>
    <button class="ease-share-btn-az --email">
      <span class="share-icon-az">&#x2709;</span>
      Email
    </button>
    <button class="ease-share-btn-az --copy">
      <span class="share-icon-az">&#x1f4cb;</span>
      Copy link
    </button>
  </div>

  <div style="width:100%;max-width:480px;border-top:1px solid var(--ease-color-neutral-200,#e5e7eb);padding-top:var(--ease-space-6,24px);">
    <h2 style="font-size:1rem;font-weight:600;color:var(--ease-color-neutral-700,#374151);margin:0 0 var(--ease-space-3,12px);">
      Compact variant
    </h2>
    <div class="ease-social-share-az compact">
      <button class="ease-share-btn-az --facebook">
        <span class="share-icon-az">&#x1f4ac;</span>
        Facebook
      </button>
      <button class="ease-share-btn-az --twitter">
        <span class="share-icon-az">&#x1d54f;</span>
        Twitter/X
      </button>
      <button class="ease-share-btn-az --linkedin">
        <span class="share-icon-az">&#x1f4e1;</span>
        LinkedIn
      </button>
      <button class="ease-share-btn-az --whatsapp">
        <span class="share-icon-az">&#x1f4f1;</span>
        WhatsApp
      </button>
    </div>
  </div>

  <div style="width:100%;max-width:480px;border-top:1px solid var(--ease-color-neutral-200,#e5e7eb);padding-top:var(--ease-space-6,24px);">
    <h2 style="font-size:1rem;font-weight:600;color:var(--ease-color-neutral-700,#374151);margin:0 0 var(--ease-space-3,12px);">
      Outline variant
    </h2>
    <div class="ease-social-share-az">
      <button class="ease-share-btn-az --outline">
        <span class="share-icon-az">&#x1f4ac;</span>
        Facebook
      </button>
      <button class="ease-share-btn-az --outline">
        <span class="share-icon-az">&#x1d54f;</span>
        Twitter/X
      </button>
      <button class="ease-share-btn-az --outline">
        <span class="share-icon-az">&#x1f4e1;</span>
        LinkedIn
      </button>
      <button class="ease-share-btn-az --outline">
        <span class="share-icon-az">&#x1f4f1;</span>
        WhatsApp
      </button>
    </div>
  </div>

</body>
</html>
