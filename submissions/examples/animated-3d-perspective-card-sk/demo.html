<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated 3D Perspective Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="perspective-wrap">
    <div class="perspective-card">
      <div class="card-shine"></div>
      <div class="card-badge">NEW</div>
      <h2>3D Tilt Card</h2>
      <p>Hover to see the depth effect in action using pure CSS perspective transforms.</p>
      <div class="card-stats">
        <span>⭐ 4.9</span>
        <span>🎯 2.3k</span>
        <span>⚡ 50ms</span>
      </div>
    </div>
  </div>
</body>
</html>
