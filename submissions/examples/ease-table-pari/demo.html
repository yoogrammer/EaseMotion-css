<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ease Table Component</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>Default + Striped + Hover</h2>
    <div class="ease-table-responsive">
      <table class="ease-table ease-table-striped ease-table-hover">
        <thead>
         <tr>
  <td>1</td>
  <td>Alex Morgan</td>
  <td>ease-accordion</td>
  <td>12</td>
  <td><span class="badge badge-green">Merged</span></td>
</tr>
<tr>
  <td>2</td>
  <td>Priya Sharma</td>
  <td>ease-avatar</td>
  <td>8</td>
  <td><span class="badge badge-orange">Review</span></td>
</tr>
<tr>
  <td>3</td>
  <td>Riku Tanaka</td>
  <td>ease-spinner</td>
  <td>5</td>
  <td><span class="badge badge-purple">Open</span></td>
</tr>
<tr>
  <td>4</td>
  <td>Sofia Reyes</td>
  <td>ease-radio</td>
  <td>3</td>
  <td><span class="badge badge-red">Pending</span></td>
</tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <h2>Green Variant</h2>
    <div class="ease-table-responsive">
      <table class="ease-table green ease-table-hover">
        <thead>
          <tr>
            <th>Month</th>
            <th>Issues</th>
            <th>PRs Merged</th>
            <th>Contributors</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>April</td>
            <td>42</td>
            <td>28</td>
            <td>15</td>
          </tr>
          <tr>
            <td>May</td>
            <td>67</td>
            <td>51</td>
            <td>23</td>
          </tr>
          <tr>
            <td>June</td>
            <td>89</td>
            <td>74</td>
            <td>31</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</body>
</html>
