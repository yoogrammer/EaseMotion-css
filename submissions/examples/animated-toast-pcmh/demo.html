<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Toast — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="ease-center">
    <h1 class="demo-title ease-fade-in">🍞 Animated Toast</h1>
    <p class="demo-subtitle ease-slide-up ease-delay-100">Click any button to trigger a toast notification</p>
  </div>

  <div class="demo-controls ease-slide-up ease-delay-200">
    <button class="ease-btn ease-btn-success ease-btn-pill" onclick="showToast('success')">
      ✓ Success
    </button>
    <button class="ease-btn ease-btn-danger ease-btn-pill" onclick="showToast('error')">
      ✗ Error
    </button>
    <button class="ease-btn ease-btn-outline ease-btn-pill" onclick="showToast('warning')">
      ⚠ Warning
    </button>
    <button class="ease-btn ease-btn-primary ease-btn-pill" onclick="showToast('info')">
      ℹ Info
    </button>
    <button class="ease-btn ease-btn-ghost ease-btn-pill" onclick="clearAll()">
      ✕ Clear All
    </button>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    const container = document.getElementById('toastContainer');

    const toastConfig = {
      success: { icon: '✓', title: 'Success', message: 'Operation completed successfully.' },
      error:   { icon: '✗', title: 'Error', message: 'Something went wrong. Please try again.' },
      warning: { icon: '⚠', title: 'Warning', message: 'This action may have consequences.' },
      info:    { icon: 'ℹ', title: 'Info', message: 'Here is some useful information.' },
    };

    let counter = 0;

    function showToast(type) {
      counter++;
      const config = toastConfig[type] || toastConfig.info;
      const duration = 4000;
      const id = 'toast-' + Date.now() + '-' + counter;

      const toast = document.createElement('div');
      toast.className = 'toast toast-' + type;
      toast.id = id;
      toast.setAttribute('role', 'alert');
      toast.setAttribute('aria-live', 'assertive');

      toast.innerHTML = `
        <span class="toast-icon">${config.icon}</span>
        <div class="toast-content">
          <div class="toast-title">${config.title}</div>
          <div class="toast-message">${config.message} (#${counter})</div>
        </div>
        <button class="toast-close" onclick="dismissToast('${id}')" aria-label="Close">&times;</button>
        <div class="toast-progress" style="animation-duration: ${duration}ms"></div>
      `;

      container.appendChild(toast);

      setTimeout(() => dismissToast(id), duration);
    }

    function dismissToast(id) {
      const toast = document.getElementById(id);
      if (!toast) return;
      toast.classList.add('dismissing');
      setTimeout(() => {
        if (toast.parentNode) toast.remove();
      }, 300);
    }

    function clearAll() {
      document.querySelectorAll('.toast').forEach(t => dismissToast(t.id));
    }
  </script>

</body>
</html>
