<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Bento Grid</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bento-grid">
    <div class="bento-box box1">
      <span class="bento-icon i-diamond"></span>
      <h3>Design</h3>
      <p>Creative direction & branding</p>
    </div>
    <div class="bento-box box2">
      <span class="bento-icon i-code"></span>
      <h3>Development</h3>
      <p>Full-stack engineering</p>
    </div>
    <div class="bento-box box3">
      <span class="bento-icon i-chart"></span>
      <h3>Analytics</h3>
      <p>Data-driven insights</p>
    </div>
    <div class="bento-box box4">
      <span class="bento-icon i-rocket"></span>
      <h3>Deploy</h3>
      <p>CI/CD & infrastructure</p>
    </div>
    <div class="bento-box box5">
      <span class="bento-icon i-users"></span>
      <h3>Team</h3>
      <p>Remote collaboration</p>
    </div>
    <div class="bento-box box6">
      <span class="bento-icon i-shield"></span>
      <h3>Security</h3>
      <p>Audit & compliance</p>
    </div>
  </div>
</body>
</html>
