<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Landing Hero Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hero-wrapper">

  <div class="grid-bg"></div>

  <div class="particle particle-1"></div>
  <div class="particle particle-2"></div>
  <div class="particle particle-3"></div>
  <div class="particle particle-4"></div>
  <div class="particle particle-5"></div>

  <section class="hero">

    <span class="badge">
      ✨ EaseMotion CSS Showcase
    </span>

    <h1 class="hero-title">
      Build Stunning
      <span>Animated Interfaces</span>
      Without Complexity
    </h1>

    <p class="hero-description">
      Create modern experiences with reusable animations,
      elegant hover effects, responsive layouts, and
      interaction-first design patterns.
    </p>

    <div class="hero-actions">

      <a href="#" class="btn btn-primary">
        Get Started
      </a>

      <a href="#" class="btn btn-secondary">
        View Components
      </a>

    </div>

    <div class="hero-stats">

      <div class="stat">
        <h3>120+</h3>
        <span>Animations</span>
      </div>

      <div class="stat">
        <h3>50+</h3>
        <span>Components</span>
      </div>

      <div class="stat">
        <h3>100%</h3>
        <span>CSS Driven</span>
      </div>

    </div>

  </section>

</div>

</body>
</html>
