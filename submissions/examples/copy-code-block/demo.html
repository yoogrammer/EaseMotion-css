<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copy Code Block Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Interactive Copy-to-Clipboard Code Block</h1>
        <p>Hover over any code block and click the copy button.</p>

        <div class="code-block">
            <button class="copy-btn">📋</button>
            <pre><code>npm install easemotion-css</code></pre>
        </div>

        <div class="code-block">
            <button class="copy-btn">📋</button>
            <pre><code>&lt;div class="fade-card"&gt;
    Hello EaseMotion CSS
&lt;/div&gt;</code></pre>
        </div>

        <div class="code-block">
            <button class="copy-btn">📋</button>
            <pre><code>.fade-card {
    opacity: 0;
    transition: opacity .4s ease;
}

.fade-card:hover {
    opacity: 1;
}</code></pre>
        </div>
    </div>

<script>
document.querySelectorAll(".copy-btn").forEach(button => {
    button.addEventListener("click", () => {
        const code =
            button.parentElement.querySelector("code").innerText;

        navigator.clipboard.writeText(code);

        const original = button.innerText;

        button.innerText = "✓";
        button.classList.add("copied");

        setTimeout(() => {
            button.innerText = original;
            button.classList.remove("copied");
        }, 1500);
    });
});
</script>

</body>
</html>
