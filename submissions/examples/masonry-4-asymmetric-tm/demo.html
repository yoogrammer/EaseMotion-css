<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Masonry 4 and Asymmetric - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Masonry — 4 Column and Asymmetric</h1>
    <p class="description">
      Self-contained demo of the proposed
      <code>.ease-masonry-4</code> and
      <code>.ease-masonry-asymmetric</code> layout variants.
    </p>

    <h2>4 columns</h2>
    <div class="ease-masonry-4">
      <div class="tile h-1">Tile 1</div>
      <div class="tile h-2">Tile 2</div>
      <div class="tile h-1">Tile 3</div>
      <div class="tile h-3">Tile 4</div>
      <div class="tile h-1">Tile 5</div>
      <div class="tile h-2">Tile 6</div>
      <div class="tile h-1">Tile 7</div>
      <div class="tile h-1">Tile 8</div>
    </div>

    <h2>Asymmetric</h2>
    <div class="ease-masonry-asymmetric">
      <div class="tile feature">Featured (spans 2 columns)</div>
      <div class="tile">Item 1</div>
      <div class="tile">Item 2</div>
      <div class="tile">Item 3</div>
    </div>

  </div>

</body>
</html>
