<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shockwave Propagation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>Button Group — Hover to see wave</h2>
    <div class="ease-shockwave-group">
      <button class="ease-shockwave-item shockwave-btn">One</button>
      <button class="ease-shockwave-item shockwave-btn">Two</button>
      <button class="ease-shockwave-item shockwave-btn">Three</button>
      <button class="ease-shockwave-item shockwave-btn">Four</button>
      <button class="ease-shockwave-item shockwave-btn">Five</button>
    </div>
  </div>

  <div class="card">
    <h2>Icon Group — Hover to propagate</h2>
    <div class="ease-shockwave-group">
      <div class="ease-shockwave-item shockwave-icon">🚀</div>
      <div class="ease-shockwave-item shockwave-icon">⭐</div>
      <div class="ease-shockwave-item shockwave-icon">🔥</div>
      <div class="ease-shockwave-item shockwave-icon">💡</div>
      <div class="ease-shockwave-item shockwave-icon">🎉</div>
      <div class="ease-shockwave-item shockwave-icon">⚡</div>
    </div>
  </div>

  <div class="card">
    <h2>Card Grid — Shockwave effect</h2>
    <div class="ease-shockwave-group">
      <div class="ease-shockwave-item shockwave-card">
        <div class="card-icon">🎨</div>
        <div class="card-label">Design</div>
      </div>
      <div class="ease-shockwave-item shockwave-card">
        <div class="card-icon">💻</div>
        <div class="card-label">Code</div>
      </div>
      <div class="ease-shockwave-item shockwave-card">
        <div class="card-icon">📊</div>
        <div class="card-label">Data</div>
      </div>
      <div class="ease-shockwave-item shockwave-card">
        <div class="card-icon">🚀</div>
        <div class="card-label">Deploy</div>
      </div>
    </div>
  </div>

</body>
</html>
