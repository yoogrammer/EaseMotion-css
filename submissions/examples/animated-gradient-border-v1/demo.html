<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Gradient Border</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #0f172a; gap: 2rem;">
    <div class="gb-card gb-border">
      <h3 class="gb-title">Gradient Border</h3>
      <p class="gb-text">A spinning gradient border effect using conic gradients and a pseudo-element mask.</p>
    </div>
    <div class="gb-card gb-border gb-border-reverse">
      <h3 class="gb-title">Reverse Spin</h3>
      <p class="gb-text">Same effect with the animation running in reverse.</p>
    </div>
  </div>
</body>
</html>
