<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ease-img-circle Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { margin: 0; font-family: sans-serif; padding: 2rem; }
    .avatar { width: 100px; height: 100px; }
    .avatar-lg { width: 200px; height: 200px; }
  </style>
</head>
<body>
  <h2>ease-img-circle</h2>
  <p>Circular image cropping for avatars and profile pictures.</p>

  <h3>Small Avatar</h3>
  <img
    class="ease-img-circle avatar"
    src="https://picsum.photos/100/100"
    alt="Small avatar"
  />

  <h3>Large Avatar</h3>
  <img
    class="ease-img-circle avatar-lg"
    src="https://picsum.photos/200/200"
    alt="Large avatar"
  />
</body>
</html>
