<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Fill Mode — EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--ease-color-bg, #f8fafc);
            margin: 0;
            padding: 4rem 1.5rem;
            font-family: var(--ease-font-sans, system-ui, sans-serif);
        }
        .header {
            text-align: center;
            margin-bottom: 4rem;
        }
        .controls {
            text-align: center;
            margin-bottom: 3rem;
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>Animation Fill Mode</h1>
        <p style="color: var(--ease-color-muted);">Control how elements behave before and after animations.</p>
    </header>

    <div class="controls">
        <button class="ease-btn ease-btn-primary" onclick="restartAnimations()">Restart Animations</button>
    </div>

    <div class="demo-container" id="demo-grid">
        <!-- None -->
        <div class="demo-item">
            <div class="demo-box ease-slide-up ease-fill-none">None</div>
            <span class="demo-label">Snaps Back</span>
            <span class="demo-code">.ease-fill-none</span>
        </div>

        <!-- Forwards -->
        <div class="demo-item">
            <div class="demo-box ease-slide-up ease-fill-forwards">Forwards</div>
            <span class="demo-label">Stays Up</span>
            <span class="demo-code">.ease-fill-forwards</span>
        </div>

        <!-- Backwards -->
        <div class="demo-item">
            <div class="demo-box ease-fade-in ease-fill-backwards" style="animation-delay: 1s;">Backwards</div>
            <span class="demo-label">Hidden in Delay</span>
            <span class="demo-code">.ease-fill-backwards</span>
        </div>

        <!-- Both -->
        <div class="demo-item">
            <div class="demo-box ease-slide-up ease-fill-both" style="animation-delay: 1s;">Both</div>
            <span class="demo-label">Delay + Stays</span>
            <span class="demo-code">.ease-fill-both</span>
        </div>
    </div>

    <script>
        function restartAnimations() {
            const grid = document.getElementById('demo-grid');
            const html = grid.innerHTML;
            grid.innerHTML = '';
            // Trigger reflow
            void grid.offsetWidth;
            grid.innerHTML = html;
        }
    </script>
</body>
</html>
