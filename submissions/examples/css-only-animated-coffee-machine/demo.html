<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-only Animated Coffee Machine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-coffee-container">
    <div class="ease-coffee-machine">
      <!-- Top Section: Bean Hopper -->
      <div class="ease-machine-top">
        <div class="ease-coffee-beans"></div>
      </div>
      
      <!-- Control Panel -->
      <div class="ease-machine-panel">
        <div class="ease-indicator"></div>
        <div class="ease-button"></div>
        <div class="ease-button"></div>
      </div>

      <!-- Main Body -->
      <div class="ease-machine-body">
        <!-- Spout and Pouring Liquid -->
        <div class="ease-spout-container">
          <div class="ease-spout"></div>
          <div class="ease-liquid"></div>
        </div>
      </div>

      <!-- Base and Tray -->
      <div class="ease-machine-base">
        <!-- Cup Assembly -->
        <div class="ease-cup-container">
          <div class="ease-cup-wrapper">
            <div class="ease-cup-handle"></div>
            <div class="ease-cup">
              <div class="ease-coffee-fill"></div>
            </div>
          </div>
          
          <!-- Steam Elements -->
          <div class="ease-steam ease-steam-1"></div>
          <div class="ease-steam ease-steam-2"></div>
          <div class="ease-steam ease-steam-3"></div>
        </div>
      </div>
    </div>
    
    <div class="ease-instruction">Hover to brew coffee</div>
  </div>
</body>
</html>
