<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash Card Study Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Flash Card Study Tool</h1>

  <div class="flash-card-container">
    <div class="flash-card" id="flashCard">
      <div class="flash-card-inner">
        <div class="flash-card-front">
          <p class="card-label">Question</p>
          <p class="card-text" id="questionText">What is CSS?</p>
        </div>
        <div class="flash-card-back">
          <p class="card-label">Answer</p>
          <p class="card-text" id="answerText">Cascading Style Sheets — a language for styling HTML documents.</p>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button id="prevBtn" class="ctrl-btn">Previous</button>
    <span class="card-counter" id="cardCounter">1 / 5</span>
    <button id="nextBtn" class="ctrl-btn">Next</button>
  </div>

  <script>
    const cards = [
      { question: 'What is CSS?', answer: 'Cascading Style Sheets — a language for styling HTML documents.' },
      { question: 'What does "flexbox" do?', answer: 'A CSS layout model that distributes space and aligns items in a container.' },
      { question: 'What is a CSS custom property?', answer: 'A variable defined with --prefix, accessed via var(), for reusable values.' },
      { question: 'What is the box model?', answer: 'The layout structure: content, padding, border, and margin around every element.' },
      { question: 'What does "position: absolute" do?', answer: 'Removes an element from normal flow and positions it relative to its nearest positioned ancestor.' }
    ];

    let current = 0;
    const cardEl = document.getElementById('flashCard');
    const questionEl = document.getElementById('questionText');
    const answerEl = document.getElementById('answerText');
    const counterEl = document.getElementById('cardCounter');

    function showCard(index) {
      const data = cards[index];
      questionEl.textContent = data.question;
      answerEl.textContent = data.answer;
      counterEl.textContent = `${index + 1} / ${cards.length}`;
      cardEl.classList.remove('flipped');
    }

    cardEl.addEventListener('click', () => {
      cardEl.classList.toggle('flipped');
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (current > 0) {
        current--;
        showCard(current);
      }
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      if (current < cards.length - 1) {
        current++;
        showCard(current);
      }
    });
  </script>
</body>
</html>
