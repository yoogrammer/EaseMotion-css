<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Shimmer Overlay and Pop - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Animation — Shimmer Overlay and Pop</h1>
    <p class="description">
      Self-contained demo of the proposed
      <code>.ease-shimmer-overlay</code> and
      <code>.ease-pop</code> animation utilities.
    </p>

    <section class="demo-section">
      <h2>Shimmer overlay</h2>
      <div class="demo-card ease-shimmer-overlay">
        <h3>Card title</h3>
        <p>Loading content...</p>
      </div>
    </section>

    <section class="demo-section">
      <h2>Pop</h2>
      <div class="demo-row">
        <span class="ease-badge ease-pop">NEW</span>
        <span class="ease-badge ease-badge-success ease-pop">5</span>
        <span class="ease-badge ease-badge-danger ease-pop">!</span>
      </div>
    </section>

  </div>

</body>
</html>
