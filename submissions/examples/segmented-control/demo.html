<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Segmented Control Demo — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="demo-page">

    <header class="demo-header">
      <p class="demo-label">EaseMotion CSS — UI Control</p>
      <h1>Segmented Control</h1>
      <p class="demo-description">
        Mutually exclusive toggle buttons driven entirely by CSS — no JavaScript.
        Uses hidden radio inputs and the <code>:checked + label</code> selector.
      </p>
    </header>

    <div class="demo-grid">

      <!-- ── Example 1: View mode switcher ── -->
      <section class="demo-card">
        <h2 class="demo-card-title">View Mode</h2>

        <fieldset class="em-segmented" role="group" aria-label="View mode">
          <input type="radio" name="view" id="view-list" value="list" checked />
          <label for="view-list">List</label>

          <input type="radio" name="view" id="view-grid" value="grid" />
          <label for="view-grid">Grid</label>

          <input type="radio" name="view" id="view-map" value="map" />
          <label for="view-map">Map</label>
        </fieldset>
      </section>

      <!-- ── Example 2: Time range picker ── -->
      <section class="demo-card">
        <h2 class="demo-card-title">Time Range</h2>

        <fieldset class="em-segmented" role="group" aria-label="Time range">
          <input type="radio" name="range" id="range-day" value="day" checked />
          <label for="range-day">Day</label>

          <input type="radio" name="range" id="range-week" value="week" />
          <label for="range-week">Week</label>

          <input type="radio" name="range" id="range-month" value="month" />
          <label for="range-month">Month</label>

          <input type="radio" name="range" id="range-year" value="year" />
          <label for="range-year">Year</label>
        </fieldset>
      </section>

      <!-- ── Example 3: Size picker ── -->
      <section class="demo-card">
        <h2 class="demo-card-title">Size</h2>

        <fieldset class="em-segmented" role="group" aria-label="Size">
          <input type="radio" name="size" id="size-sm" value="sm" checked />
          <label for="size-sm">S</label>

          <input type="radio" name="size" id="size-md" value="md" />
          <label for="size-md">M</label>

          <input type="radio" name="size" id="size-lg" value="lg" />
          <label for="size-lg">L</label>

          <input type="radio" name="size" id="size-xl" value="xl" />
          <label for="size-xl">XL</label>
        </fieldset>
      </section>

      <!-- ── Example 4: Theme switcher ── -->
      <section class="demo-card">
        <h2 class="demo-card-title">Theme</h2>

        <fieldset class="em-segmented em-segmented--pill" role="group" aria-label="Theme">
          <input type="radio" name="theme" id="theme-light" value="light" checked />
          <label for="theme-light">Light</label>

          <input type="radio" name="theme" id="theme-dark" value="dark" />
          <label for="theme-dark">Dark</label>

          <input type="radio" name="theme" id="theme-system" value="system" />
          <label for="theme-system">System</label>
        </fieldset>
      </section>

    </div>
  </main>

</body>
</html>
