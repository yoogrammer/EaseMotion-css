<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Radius Token Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Card Radius Token Demo</h1>

  <p>
    Change <code>--ease-card-radius</code> to update all cards globally.
  </p>

  <div class="demo-container">
    <div class="ease-card">
      <h3>Card One</h3>
      <p>Uses the shared radius token.</p>
    </div>

    <div class="ease-card">
      <h3>Card Two</h3>
      <p>Updates automatically when the variable changes.</p>
    </div>
  </div>

</body>
</html>
