<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Skeleton Loader</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Animated Skeleton Loader</h1>

<h2>Card Loader</h2>

<div class="card skeleton">
    <div class="image"></div>
    <div class="line long"></div>
    <div class="line"></div>
    <div class="line short"></div>
</div>

<h2>List Loader</h2>

<div class="list">

<div class="item skeleton">
    <div class="avatar"></div>
    <div class="content">
        <div class="line"></div>
        <div class="line short"></div>
    </div>
</div>

<div class="item skeleton">
    <div class="avatar"></div>
    <div class="content">
        <div class="line"></div>
        <div class="line short"></div>
    </div>
</div>

</div>

<h2>Profile Loader</h2>

<div class="profile skeleton">
    <div class="avatar large"></div>
    <div class="content">
        <div class="line long"></div>
        <div class="line"></div>
        <div class="line short"></div>
    </div>
</div>

</div>

</body>
</html>
