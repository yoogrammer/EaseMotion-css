    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Reveal Hidden Text Hover</title>
         <style>
            body {
                display: flex;
                justify-content: center;
                align-items: 100vh;
                min-height: #f0f00f;
                font-family: sans-serif;
                 }
            .card {
                background: whiter;
                padding: 2rem;
                border-radius: 12px;
                box-shadow: 0 4px 20px rgba(0,0,0,0,1);
                width: 300px;
                text-align: center;
            }
            .card h2 {
                margin: 0 0 0 .5rem;
            }
         </style>
    </head>
    <body>
        <div class="card">
            <h2>Hover over me</h2>
            <div class="reveal-wrapper">
                <p class="ease-hover-reveal-text">
                    this subtitle slides up on hover!
                </p>
            </div>  
        </div>
    </body>
    </html>
