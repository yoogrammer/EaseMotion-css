<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-pulse — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #333; }
    .row { display: flex; gap: 2.5rem; flex-wrap: wrap; justify-content: center; align-items: center; }
    .label { font-size: 0.75rem; color: #888; text-align: center; margin-bottom: 0.75rem; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
    }
    .btn {
      padding: 12px 28px;
      border-radius: 8px;
      border: none;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      color: #fff;
    }
    .badge {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
    }
    .sublabel { font-size: 0.7rem; color: #aaa; text-align: center; margin-top: 0.5rem; }
  </style>
</head>
<body>

  <h1>ease-pulse Demo</h1>

  <div class="section">
    <div class="label">Color variants</div>
    <div class="row">
      <div style="text-align:center;">
        <div class="dot ease-pulse ease-pulse-ring ease-pulse-primary" style="background:#6366f1;"></div>
        <div class="sublabel">Primary</div>
      </div>
      <div style="text-align:center;">
        <div class="dot ease-pulse ease-pulse-ring ease-pulse-danger" style="background:#ef4444;"></div>
        <div class="sublabel">Danger</div>
      </div>
      <div style="text-align:center;">
        <div class="dot ease-pulse ease-pulse-ring ease-pulse-success" style="background:#22c55e;"></div>
        <div class="sublabel">Success</div>
      </div>
      <div style="text-align:center;">
        <div class="dot ease-pulse ease-pulse-ring ease-pulse-warning" style="background:#f59e0b;"></div>
        <div class="sublabel">Warning</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="label">Pulsing CTA buttons</div>
    <div class="row">
      <button class="btn ease-pulse ease-pulse-primary" style="background:#6366f1;">Live Demo</button>
      <button class="btn ease-pulse ease-pulse-danger" style="background:#ef4444;">🔴 Recording</button>
      <button class="btn ease-pulse ease-pulse-success" style="background:#22c55e;">● Online</button>
    </div>
  </div>

  <div class="section">
    <div class="label">Speed variants</div>
    <div class="row">
      <div style="text-align:center;">
        <div class="badge ease-pulse ease-pulse-fast" style="background:#6366f1;">⚡</div>
        <div class="sublabel">Fast (0.8s)</div>
      </div>
      <div style="text-align:center;">
        <div class="badge ease-pulse" style="background:#8b5cf6;">●</div>
        <div class="sublabel">Default (2s)</div>
      </div>
      <div style="text-align:center;">
        <div class="badge ease-pulse ease-pulse-slow" style="background:#14b8a6;">🐢</div>
        <div class="sublabel">Slow (3.5s)</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="label">Pause on hover</div>
    <div class="row">
      <div style="text-align:center;">
        <div class="badge ease-pulse ease-pulse-pause ease-pulse-primary" style="background:#6366f1;">⏸</div>
        <div class="sublabel">Hover to pause</div>
      </div>
    </div>
  </div>

</body>
</html>
