<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underline Gradient Utility</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🎨 Underline Gradient Utility Demo</h1>

        <p>
            Hover or focus the examples below to see the animated gradient underline effect.
        </p>

        <section class="demo-section">
            <h2 class="underline-gradient">
                Animated Heading Underline
            </h2>
        </section>

        <section class="demo-section">
            <a href="#" class="underline-gradient">
                Gradient Underline Link
            </a>
        </section>

        <section class="demo-section">
            <button class="underline-gradient cta-btn">
                Call To Action
            </button>
        </section>

        <section class="demo-section">
            <p>
                This utility also works inside normal text:
                <span class="underline-gradient inline-text">
                    Hover this inline phrase
                </span>
            </p>
        </section>

    </div>

</body>
</html>
