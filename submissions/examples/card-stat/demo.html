<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-card-stat — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 2rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; }
    .label { font-size: 0.75rem; color: #555; text-align: center; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; }
    .section { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 900px; }
    .flex-row { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; width: 100%; }
    .ease-card-stat { flex: 1; min-width: 180px; }
  </style>
</head>
<body>
  <h1>ease-card-stat</h1>
  <div class="section">
    <div class="label">Basic stat cards</div>
    <div class="flex-row">
      <div class="ease-card ease-card-stat">
        <div class="ease-stat-value">12,847</div>
        <div class="ease-stat-label">Total Users</div>
      </div>
      <div class="ease-card ease-card-stat">
        <div class="ease-stat-value">$84.2K</div>
        <div class="ease-stat-label">Revenue</div>
      </div>
      <div class="ease-card ease-card-stat">
        <div class="ease-stat-value">99.7%</div>
        <div class="ease-stat-label">Uptime</div>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="label">With trend indicators</div>
    <div class="flex-row">
      <div class="ease-card ease-card-stat ease-stat-trend-up">
        <div class="ease-stat-value">2,431</div>
        <div class="ease-stat-label">New Signups</div>
      </div>
      <div class="ease-card ease-card-stat ease-stat-trend-up">
        <div class="ease-stat-value">18.2%</div>
        <div class="ease-stat-label">Conversion Rate</div>
      </div>
      <div class="ease-card ease-card-stat ease-stat-trend-down">
        <div class="ease-stat-value">3.1%</div>
        <div class="ease-stat-label">Bounce Rate</div>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="label">Dark mode dashboard example</div>
    <div class="flex-row">
      <div class="ease-card ease-card-shadow ease-card-stat">
        <div class="ease-stat-value" style="color: var(--ease-color-success);">156</div>
        <div class="ease-stat-label">Active Projects</div>
      </div>
      <div class="ease-card ease-card-shadow ease-card-stat">
        <div class="ease-stat-value" style="color: var(--ease-color-primary);">47</div>
        <div class="ease-stat-label">Pending Tasks</div>
      </div>
      <div class="ease-card ease-card-shadow ease-card-stat">
        <div class="ease-stat-value" style="color: var(--ease-color-warning);">12</div>
        <div class="ease-stat-label">Notifications</div>
      </div>
    </div>
  </div>
</body>
</html>
