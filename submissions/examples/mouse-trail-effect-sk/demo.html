<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mouse Trail Effect - EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Container for DOM-based trails (optional fallback, but we'll use canvas for high-perf) -->
  <canvas id="trail-canvas" aria-hidden="true"></canvas>

  <main class="content-wrapper fade-in-up">
    <div class="interactive-card pulse-hover">
      <h1>Interactive Mouse Trail</h1>
      <p>Move your cursor around to see the dynamic glow and particle trail effect.</p>
      <button class="action-btn">Hover Me</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
