<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>ease-place-content Demo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Inter, sans-serif;
        padding: 2rem;
        background: #f8fafc;
      }
      h2 {
        color: #6366f1;
      }
      .demo-grid {
        display: grid;
        grid-template-columns: repeat(3, 50px);
        grid-template-rows: repeat(2, 40px);
        gap: 4px;
        border: 1px dashed #cbd5e1;
        border-radius: 6px;
        padding: 0.5rem;
        margin-top: 0.5rem;
        height: 120px;
      }
      .demo-grid > * {
        background: #e0e7ff;
        border-radius: 4px;
        padding: 0.25rem;
        text-align: center;
        font-size: 0.75rem;
      }
      .box {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      code {
        background: #f1f5f9;
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <h2>place-content Utilities</h2>

    <div class="box">
      <h3><code>ease-place-content-start</code></h3>
      <div class="demo-grid ease-place-content-start">
        <span>A</span><span>B</span><span>C</span><span>D</span>
      </div>
    </div>

    <div class="box">
      <h3><code>ease-place-content-center</code></h3>
      <div class="demo-grid ease-place-content-center">
        <span>A</span><span>B</span><span>C</span><span>D</span>
      </div>
    </div>

    <div class="box">
      <h3><code>ease-place-content-end</code></h3>
      <div class="demo-grid ease-place-content-end">
        <span>A</span><span>B</span><span>C</span><span>D</span>
      </div>
    </div>

    <div class="box">
      <h3><code>ease-place-content-between</code></h3>
      <div class="demo-grid ease-place-content-between">
        <span>A</span><span>B</span><span>C</span><span>D</span>
      </div>
    </div>

    <div class="box">
      <h3><code>ease-place-content-around</code></h3>
      <div class="demo-grid ease-place-content-around">
        <span>A</span><span>B</span><span>C</span><span>D</span>
      </div>
    </div>

    <div class="box">
      <h3><code>ease-place-content-evenly</code></h3>
      <div class="demo-grid ease-place-content-evenly">
        <span>A</span><span>B</span><span>C</span><span>D</span>
      </div>
    </div>

    <div class="box">
      <h3><code>ease-place-content-stretch</code></h3>
      <div class="demo-grid ease-place-content-stretch">
        <span>A</span><span>B</span><span>C</span><span>D</span>
      </div>
    </div>
  </body>
</html>
