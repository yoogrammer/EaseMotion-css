<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Flip Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="flip-card">
    <div class="flip-card-inner">
      <div class="flip-card-front">
        <h2>Front Side</h2>
        <p>Hover to flip</p>
      </div>
      <div class="flip-card-back">
        <h2>Back Side</h2>
        <p>This content is revealed on flip.</p>
      </div>
    </div>
  </div>
  <div class="flip-card flip-vertical">
    <div class="flip-card-inner">
      <div class="flip-card-front">
        <h2>Vertical Flip</h2>
        <p>Flips on X axis</p>
      </div>
      <div class="flip-card-back">
        <h2>Back Side</h2>
        <p>RotateX variant.</p>
      </div>
    </div>
  </div>
</body>
</html>
