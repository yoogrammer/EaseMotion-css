<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Button Variant Showcase</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="submission-shell">
    <section class="panel">
      <p class="eyebrow">EaseMotion submission</p>
      <h1>Button Variant Showcase</h1>
      <p class="lead">A simple demo for new button styles that add more visual options while keeping the interface readable and easy to use.</p>

      <div class="button-grid">
        <button class="demo-btn demo-btn-secondary">Secondary</button>
        <button class="demo-btn demo-btn-warning">Warning</button>
        <button class="demo-btn demo-btn-info">Info</button>
        <button class="demo-btn demo-btn-gradient">Gradient</button>
        <button class="demo-btn demo-btn-soft">Soft</button>
      </div>

      <p class="note">These examples are raw submission styles and are intended for review and standardization by the maintainer.</p>
    </section>
  </main>
</body>
</html>
