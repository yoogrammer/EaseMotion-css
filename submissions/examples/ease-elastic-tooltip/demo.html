<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion-css | Tooltip Component Showcase</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #f4f6f9;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      text-align: center;
      max-width: 500px;
    }
    h1 { color: #1e1e24; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 32px; font-size: 15px; }
    .btn-container {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    .btn {
      background-color: #4f46e5;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
      cursor: pointer;
    }
    .btn:hover { background-color: #4338ca; }
    .btn-alt { background-color: #10b981; }
    .btn-alt:hover { background-color: #059669; }
  </style>
</head>
<body>

  <div class="card">
    <h1>EaseMotion Tooltip</h1>
    <p>Hover over the buttons below or use the "Tab" key to trigger the zero-dependency, elastic scaling micro-interactions.</p>
    
    <div class="btn-container">
      <button class="btn" data-tooltip="Action cannot be undone!">Delete Account</button>
      <button class="btn btn-alt" data-tooltip="Saves progress to cloud storage ☁️">Save Draft</button>
    </div>
  </div>

</body>
</html>
