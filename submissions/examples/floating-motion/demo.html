<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Motion Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Floating Motion Animation</h1>

    <div class="cards-container">

        <!-- Float -->
        <div class="animation-card">

            <button
                class="copy-btn"
                data-copy="ease-float">
                Copy
            </button>

            <div
                class="preview-box"
                id="floatPreview"
                onclick="playAnimation('floatPreview','float')">

                Preview
            </div>

            <h3>ease-float</h3>

        </div>

        <!-- Float Slow -->
        <div class="animation-card">

            <button
                class="copy-btn"
                data-copy="ease-float-slow">
                Copy
            </button>

            <div
                class="preview-box"
                id="floatSlowPreview"
                onclick="playAnimation('floatSlowPreview','float-slow')">

                Preview
            </div>

            <h3>ease-float-slow</h3>

        </div>

        <!-- Float Fast -->
        <div class="animation-card">

            <button
                class="copy-btn"
                data-copy="ease-float-fast">
                Copy
            </button>

            <div
                class="preview-box"
                id="floatFastPreview"
                onclick="playAnimation('floatFastPreview','float-fast')">

                Preview
            </div>

            <h3>ease-float-fast</h3>

        </div>

    </div>

    <script>

        function playAnimation(id, cls){

            const el =
                document.getElementById(id);

            el.classList.remove(cls);

            void el.offsetWidth;

            el.classList.add(cls);
        }

        document
            .querySelectorAll(".copy-btn")
            .forEach(btn => {

                btn.addEventListener("click", () => {

                    navigator.clipboard.writeText(
                        btn.dataset.copy
                    );

                    const original =
                        btn.textContent;

                    btn.textContent =
                        "Copied!";

                    btn.disabled = true;

                    setTimeout(() => {

                        btn.textContent =
                            original;

                        btn.disabled = false;

                    },1500);

                });

            });

    </script>

</body>
</html>
