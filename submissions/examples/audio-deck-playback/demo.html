<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Audio Playback Deck Selector</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 440px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">GPU Composite Playback Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Click the play button indicator below. Hidden checkbox input toggles fire asynchronous sibling vertical equalization lines at 60fps with 0 scripts.</p>
  </header>

  <div class="alm-audio-player-deck">
    
    <input type="checkbox" id="deckPlaybackState" class="alm-playback-checkbox">
    
    <div class="alm-deck-interface-row">
      
      <label for="deckPlaybackState" class="alm-playback-trigger-btn" title="Toggle Playback State"></label>
      
      <div class="alm-deck-track-meta">
        <h3 class="alm-deck-track-title">Neural Flux Stream Engine</h3>
        <p class="alm-deck-track-author">Vector Synthesizer Pipeline Delta</p>
      </div>

      <div class="alm-equalizer-wave-wrap">
        <div class="alm-wave-bar alm-wave-bar-1"></div>
        <div class="alm-wave-bar alm-wave-bar-2"></div>
        <div class="alm-wave-bar alm-wave-bar-3"></div>
        <div class="alm-wave-bar alm-wave-bar-4"></div>
      </div>

    </div>
  </div>

</body>
</html>
