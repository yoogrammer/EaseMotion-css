<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ease Breadcrumb – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body {
      font-family: sans-serif;
      padding: 40px;
      background: #f9f9f9;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    h3 { color: #444; margin-bottom: 4px; }
  </style>
</head>
<body>

  <h3>Default Separator ( / )</h3>
  <ol class="ease-breadcrumb">
    <li class="ease-breadcrumb-item"><a href="#">Home</a></li>
    <li class="ease-breadcrumb-item"><a href="#">Products</a></li>
    <li class="ease-breadcrumb-item active">Laptop</li>
  </ol>

  <h3>Arrow Separator ( › )</h3>
  <ol class="ease-breadcrumb sep-arrow">
    <li class="ease-breadcrumb-item"><a href="#">Home</a></li>
    <li class="ease-breadcrumb-item"><a href="#">Blog</a></li>
    <li class="ease-breadcrumb-item active">Article</li>
  </ol>

  <h3>Dot Separator ( • )</h3>
  <ol class="ease-breadcrumb sep-dot">
    <li class="ease-breadcrumb-item"><a href="#">Home</a></li>
    <li class="ease-breadcrumb-item"><a href="#">Settings</a></li>
    <li class="ease-breadcrumb-item active">Profile</li>
  </ol>

  <h3>Custom Separator via CSS Variable</h3>
  <ol class="ease-breadcrumb" style="--ease-breadcrumb-sep: '»'">
    <li class="ease-breadcrumb-item"><a href="#">Home</a></li>
    <li class="ease-breadcrumb-item"><a href="#">Shop</a></li>
    <li class="ease-breadcrumb-item active">Cart</li>
  </ol>

</body>
</html>
