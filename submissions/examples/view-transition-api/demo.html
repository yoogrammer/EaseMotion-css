<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Transition API - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>View Transition API</h1>
    <div class="transition-stage">
      <div class="transition-box" id="box1">A</div>

      <div class="transition-box" id="box2">B</div>

    <p class="description">Click Swap to see the View Transition API animate element position changes.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
