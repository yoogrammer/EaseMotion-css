<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EaseMotion CSS - Loaders Collection Showcase</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="showcase-header">
      <h1>EaseMotion CSS: Loaders Collection</h1>
      <p>Lightweight, pure CSS loading animations for modern web interfaces.</p>
    </header>

    <main class="showcase-grid">
      <div class="card">
        <h3>Spinner Loader</h3>
        <div class="loader-container">
          <div
            class="em-loader-spinner"
            role="status"
            aria-label="Loading"
          ></div>
        </div>
      </div>

      <div class="card">
        <h3>Pulse Loader</h3>
        <div class="loader-container">
          <div class="em-loader-pulse" role="status" aria-label="Loading"></div>
        </div>
      </div>

      <div class="card">
        <h3>Bouncing Dots Loader</h3>
        <div class="loader-container">
          <div class="em-loader-dots" role="status" aria-label="Loading">
            <div></div>
            <div></div>
            <div></div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>Ripple Loader</h3>
        <div class="loader-container">
          <div class="em-loader-ripple" role="status" aria-label="Loading">
            <div></div>
            <div></div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>Wave Loader</h3>
        <div class="loader-container">
          <div class="em-loader-wave" role="status" aria-label="Loading">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>Dual Ring Loader</h3>
        <div class="loader-container">
          <div
            class="em-loader-dual-ring"
            role="status"
            aria-label="Loading"
          ></div>
        </div>
      </div>

      <div class="card">
        <h3>Orbit Loader</h3>
        <div class="loader-container">
          <div class="em-loader-orbit" role="status" aria-label="Loading">
            <div class="orbit-track"></div>
            <div class="orbit-satellite"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>Skeleton Loading Effect</h3>
        <div class="loader-container al-stretch">
          <div
            class="em-skeleton-card"
            role="status"
            aria-label="Loading content placeholder"
          >
            <div class="em-skeleton em-skeleton-circle"></div>
            <div class="em-skeleton-body">
              <div class="em-skeleton em-skeleton-text line-title"></div>
              <div class="em-skeleton em-skeleton-text line-body"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
