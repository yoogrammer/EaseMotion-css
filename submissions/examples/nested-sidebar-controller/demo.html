<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Expandable Nested Sidebar Controller</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 460px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Nested Disclosure Sizing Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Click separate category row headers below. Native <code>grid-template-rows</code> transitions unfold sub-menus at 60fps with 0 script lines.</p>
  </header>

  <div class="alm-nested-sidebar-frame">
    
    <div class="alm-sidebar-group-block">
      <input type="checkbox" id="menuGate1" class="alm-sidebar-gate-input" checked>
      
      <label for="menuGate1" class="alm-parent-node-label">
        <span class="alm-parent-label-title">📊 Analytics Engines</span>
        <span class="alm-parent-node-chevron">▶</span>
      </label>
      
      <div class="alm-nested-sub-menu">
        <div class="alm-sub-menu-inner" style="padding-top: 6px; padding-bottom: 6px;">
          <a href="#console" class="alm-nested-sub-link">Telemetry Console</a>
          <a href="#pipeline" class="alm-nested-sub-link">Delta Pipeline Stream</a>
          <a href="#quotas" class="alm-nested-sub-link">Quota Allocations</a>
        </div>
      </div>
    </div>

    <div class="alm-sidebar-group-block">
      <input type="checkbox" id="menuGate2" class="alm-sidebar-gate-input">
      
      <label for="menuGate2" class="alm-parent-node-label">
        <span class="alm-parent-label-title">🔒 Security Protocols</span>
        <span class="alm-parent-node-chevron">▶</span>
      </label>
      
      <div class="alm-nested-sub-menu">
        <div class="alm-sub-menu-inner" style="padding-top: 6px; padding-bottom: 6px;">
          <a href="#auth" class="alm-nested-sub-link">Authorization Sockets</a>
          <a href="#keys" class="alm-nested-sub-link">Secure Key Registry</a>
        </div>
      </div>
    </div>

    <div class="alm-sidebar-group-block">
      <input type="checkbox" id="menuGate3" class="alm-sidebar-gate-input">
      
      <label for="menuGate3" class="alm-parent-node-label">
        <span class="alm-parent-label-title">⚙️ System Options</span>
        <span class="alm-parent-node-chevron">▶</span>
      </label>
      
      <div class="alm-nested-sub-menu">
        <div class="alm-sub-menu-inner" style="padding-top: 6px; padding-bottom: 6px;">
          <a href="#cluster" class="alm-nested-sub-link">Cluster Properties</a>
          <a href="#logs" class="alm-nested-sub-link">Exception Logs</a>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
