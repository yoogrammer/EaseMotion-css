<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Stepper - EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container fade-in-up">
    <h1>Multi-Step Form Stepper</h1>
    <p>A reusable, responsive stepper component with animated progress connectors.</p>

    <div class="card">
      
      <!-- Horizontal Stepper -->
      <div class="stepper-wrapper">
        <div class="stepper">
          
          <!-- Step 1: Completed -->
          <div class="step is-completed">
            <div class="step-indicator pulse-hover">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <div class="step-label">Account</div>
          </div>
          
          <!-- Connector -->
          <div class="step-connector is-completed"></div>

          <!-- Step 2: Active -->
          <div class="step is-active">
            <div class="step-indicator">2</div>
            <div class="step-label">Profile</div>
          </div>

          <!-- Connector -->
          <div class="step-connector is-partial"></div>

          <!-- Step 3: Pending -->
          <div class="step">
            <div class="step-indicator">3</div>
            <div class="step-label">Payment</div>
          </div>

        </div>
      </div>

      <!-- Content Area -->
      <div class="form-content">
        <h3>Step 2: Profile Details</h3>
        <p>Please enter your personal information to continue.</p>
        <button class="ease-btn ease-btn-primary pulse-hover">Next Step</button>
      </div>

    </div>
  </main>
</body>
</html>
