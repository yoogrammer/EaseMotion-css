<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-btn-link — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif; display: flex; flex-direction: column;
      align-items: center; justify-content: center; min-height: 100vh;
      background: #0f0f0f; gap: 2.5rem; padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; }
    .label { font-size:0.75rem; color:#555; text-align:center; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.75rem; }
    .section { display:flex; flex-direction:column; align-items:center; }
    .row { display:flex; gap:2rem; flex-wrap:wrap; justify-content:center; align-items:center; }
    .card {
      padding:1.5rem 2rem; border-radius:10px;
      background:#1a1a1a; border:1px solid #2a2a2a;
      text-align:center;
    }
    .card p { margin:0.5rem 0 0; color:#888; font-size:0.8rem; }
  </style>
</head>
<body>
  <h1>ease-btn-link</h1>
  <div class="section">
    <div class="label">Link button usage</div>
    <div class="row">
      <button class="ease-btn ease-btn-link">Learn more</button>
      <button class="ease-btn ease-btn-link ease-btn-link-icon">Get started</button>
      <a href="#" class="ease-btn ease-btn-link">Anchor as link</a>
    </div>
  </div>
  <div class="section">
    <div class="label">In card context</div>
    <div class="row">
      <div class="card" style="text-align:left;max-width:320px;">
        <h3 style="color:#fff;margin:0 0 0.5rem;">Card Title</h3>
        <p style="color:#888;font-size:0.9rem;margin-bottom:1rem;">Description text that introduces the feature or product.</p>
        <button class="ease-btn ease-btn-link" style="padding-left:0;">Read more →</button>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="label">Color customization</div>
    <div class="row">
      <button class="ease-btn ease-btn-link" style="color:var(--ease-color-success);">Success link</button>
      <button class="ease-btn ease-btn-link" style="color:var(--ease-color-danger);">Danger link</button>
      <button class="ease-btn ease-btn-link" style="color:var(--ease-color-warning);">Warning link</button>
    </div>
  </div>
</body>
</html>
