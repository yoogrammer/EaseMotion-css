<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>clip-path Morph Animation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>clip-path Morph</h1>
  <p class="subtitle">Smoothly morph between geometric shapes using clip-path animation.</p>

  <section class="demo">
    <div class="morph-stage">
      <div class="morph-box" id="morph-box"></div>
    </div>
    <p class="note"><code>clip-path</code> morphs between circle → polygon → inset → path shapes continuously.</p>
  </section>

  <section class="demo">
    <h2>Image Reveal (clip-path wipe)</h2>
    <div class="reveal-stage">
      <div class="reveal-content">✦ Morph</div>
    </div>
    <p class="note">Animated <code>clip-path: inset()</code> reveals content from left to right — a smooth wipe transition.</p>
  </section>
</body>
</html>
