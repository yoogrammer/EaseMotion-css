<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EaseMotion - Progress Bars Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ease-page">
    <h1>📊 Animated Progress Bars</h1>
    <p>A complete collection of progress indicators with smooth animations.</p>

    <!-- ===== Linear (Sizes) ===== -->
    <section class="ease-section">
      <h2>📏 Linear Progress — Sizes</h2>

      <label>Small</label>
      <div class="ease-progress-linear ease-progress-sm">
        <div class="ease-progress-fill" style="width: 40%"></div>
      </div>

      <label>Medium</label>
      <div class="ease-progress-linear ease-progress-md">
        <div class="ease-progress-fill" style="width: 60%"></div>
      </div>

      <label>Large</label>
      <div class="ease-progress-linear ease-progress-lg">
        <div class="ease-progress-fill" style="width: 80%"></div>
      </div>
    </section>

    <!-- ===== Themes ===== -->
    <section class="ease-section">
      <h2>🎨 Themes</h2>

      <label>Primary</label>
      <div class="ease-progress-linear ease-progress-md ease-progress-primary">
        <div class="ease-progress-fill" style="width: 55%"></div>
      </div>

      <label>Success</label>
      <div class="ease-progress-linear ease-progress-md ease-progress-success">
        <div class="ease-progress-fill" style="width: 75%"></div>
      </div>

      <label>Warning</label>
      <div class="ease-progress-linear ease-progress-md ease-progress-warning">
        <div class="ease-progress-fill" style="width: 45%"></div>
      </div>

      <label>Error</label>
      <div class="ease-progress-linear ease-progress-md ease-progress-error">
        <div class="ease-progress-fill" style="width: 30%"></div>
      </div>
    </section>

    <!-- ===== Striped & Animated ===== -->
    <section class="ease-section">
      <h2>🎬 Striped & Animated</h2>

      <label>Striped (static)</label>
      <div class="ease-progress-linear ease-progress-md ease-progress-striped ease-progress-success">
        <div class="ease-progress-fill" style="width: 65%"></div>
      </div>

      <label>Striped (animated)</label>
      <div class="ease-progress-linear ease-progress-md ease-progress-striped ease-progress-animated ease-progress-primary">
        <div class="ease-progress-fill" style="width: 70%"></div>
      </div>
    </section>

    <!-- ===== Indeterminate ===== -->
    <section class="ease-section">
      <h2>⏳ Indeterminate (Loading)</h2>
      <label>Unknown duration</label>
      <div class="ease-progress-linear ease-progress-md ease-progress-indeterminate ease-progress-primary">
        <div class="ease-progress-fill"></div>
      </div>
    </section>

    <!-- ===== With Label ===== -->
    <section class="ease-section">
      <h2>🏷️ With Label</h2>

      <label>Upload progress</label>
      <div class="ease-progress-linear ease-progress-lg ease-progress-primary">
        <div class="ease-progress-fill" style="width: 68%">
          <span class="ease-progress-label">68%</span>
        </div>
      </div>

      <label>Disk usage</label>
      <div class="ease-progress-linear ease-progress-lg ease-progress-warning">
        <div class="ease-progress-fill" style="width: 85%">
          <span class="ease-progress-label">85%</span>
        </div>
      </div>
    </section>

    <!-- ===== Circular ===== -->
    <section class="ease-section">
      <h2>⭕ Circular Progress</h2>
      <div class="ease-circle-grid">
        <div class="ease-progress-circular" style="--ease-progress: 25">
          <svg viewBox="0 0 100 100">
            <circle class="ease-circle-bg" cx="50" cy="50" r="42"></circle>
            <circle class="ease-circle-fill" cx="50" cy="50" r="42"></circle>
          </svg>
          <span class="ease-circle-text">25%</span>
        </div>

        <div class="ease-progress-circular ease-progress-success" style="--ease-progress: 60">
          <svg viewBox="0 0 100 100">
            <circle class="ease-circle-bg" cx="50" cy="50" r="42"></circle>
            <circle class="ease-circle-fill" cx="50" cy="50" r="42"></circle>
          </svg>
          <span class="ease-circle-text">60%</span>
        </div>

        <div class="ease-progress-circular ease-progress-warning" style="--ease-progress: 80">
          <svg viewBox="0 0 100 100">
            <circle class="ease-circle-bg" cx="50" cy="50" r="42"></circle>
            <circle class="ease-circle-fill" cx="50" cy="50" r="42"></circle>
          </svg>
          <span class="ease-circle-text">80%</span>
        </div>

        <div class="ease-progress-circular ease-progress-error" style="--ease-progress: 95">
          <svg viewBox="0 0 100 100">
            <circle class="ease-circle-bg" cx="50" cy="50" r="42"></circle>
            <circle class="ease-circle-fill" cx="50" cy="50" r="42"></circle>
          </svg>
          <span class="ease-circle-text">95%</span>
        </div>
      </div>
    </section>

    <!-- ===== Stepped ===== -->
    <section class="ease-section">
      <h2>🪜 Stepped Progress</h2>

      <label>Checkout — Step 2 of 4</label>
      <div class="ease-progress-stepped" data-steps="4" data-active="2">
        <div class="ease-step ease-step-done">
          <div class="ease-step-circle">✓</div>
          <span>Cart</span>
        </div>
        <div class="ease-step-line ease-step-done"></div>
        <div class="ease-step ease-step-active">
          <div class="ease-step-circle">2</div>
          <span>Shipping</span>
        </div>
        <div class="ease-step-line"></div>
        <div class="ease-step">
          <div class="ease-step-circle">3</div>
          <span>Payment</span>
        </div>
        <div class="ease-step-line"></div>
        <div class="ease-step">
          <div class="ease-step-circle">4</div>
          <span>Done</span>
        </div>
      </div>
    </section>
  </div>

  <script>
    // Demo: simulate live progress on a button click (optional)
    // You can extend this with real upload/download data
  </script>
</body>
</html>
