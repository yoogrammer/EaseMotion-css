<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip Pool Calculator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator-wrapper">
    <h1>Tip Pool Calculator</h1>
    <p class="subtitle">Hours-Based Proportional Distribution</p>
    <div class="input-section">
      <div class="field">
        <label for="totalPool">Total Tips Pool ($)</label>
        <input type="number" id="totalPool" class="input" value="800" min="0" step="1">
      </div>
      <div class="staff-section">
        <div class="comparison-header">Staff Hours</div>
        <div id="staffList"></div>
        <button id="addStaffBtn" class="add-btn">+ Add Staff</button>
      </div>
    </div>
    <div class="results">
      <div class="result-row">
        <span>Total Tips</span>
        <span id="displayPool">$800.00</span>
      </div>
      <div class="result-row">
        <span>Total Hours</span>
        <span id="displayHours">0</span>
      </div>
    </div>
    <div class="payout-section" id="payoutSection">
      <div class="comparison-header">Per-Person Breakdown</div>
      <div id="payoutList"></div>
    </div>
  </div>
  <script>
    const totalPool = document.getElementById('totalPool');
    const staffList = document.getElementById('staffList');
    const payoutList = document.getElementById('payoutList');
    const addStaffBtn = document.getElementById('addStaffBtn');
    const displayPool = document.getElementById('displayPool');
    const displayHours = document.getElementById('displayHours');

    const defaultStaff = [
      { name: 'Alice', hours: 8 },
      { name: 'Bob', hours: 6 },
      { name: 'Carol', hours: 5 },
      { name: 'Dave', hours: 4 }
    ];

    let staff = [];

    function fmt(n) {
      return '$' + n.toFixed(2);
    }

    function renderStaff() {
      staffList.innerHTML = '';
      staff.forEach((s, i) => {
        const row = document.createElement('div');
        row.className = 'staff-row';
        row.innerHTML = `
          <input type="text" class="staff-name input" value="${s.name}" data-idx="${i}" placeholder="Name">
          <div class="hours-wrapper">
            <input type="number" class="staff-hours input" value="${s.hours}" min="0" step="0.5" data-idx="${i}">
            <span class="hours-label">hrs</span>
          </div>
          <button class="remove-btn" data-idx="${i}">✕</button>
        `;
        staffList.appendChild(row);
      });

      document.querySelectorAll('.staff-name').forEach(inp => {
        inp.addEventListener('input', function() { staff[this.dataset.idx].name = this.value; calculate(); });
      });
      document.querySelectorAll('.staff-hours').forEach(inp => {
        inp.addEventListener('input', function() { staff[this.dataset.idx].hours = parseFloat(this.value) || 0; calculate(); });
      });
      document.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', function() { staff.splice(parseInt(this.dataset.idx), 1); renderStaff(); calculate(); });
      });
    }

    function calculate() {
      const pool = parseFloat(totalPool.value) || 0;
      displayPool.textContent = fmt(pool);

      const totalHrs = staff.reduce((sum, s) => sum + s.hours, 0);
      displayHours.textContent = totalHrs.toFixed(1);

      if (totalHrs <= 0 || staff.length === 0) {
        payoutList.innerHTML = '<div class="step-line">Add staff with hours to distribute tips.</div>';
        return;
      }

      payoutList.innerHTML = '';
      staff.forEach(s => {
        const share = s.hours / totalHrs;
        const earnings = pool * share;
        const hourlyRate = s.hours > 0 ? earnings / s.hours : 0;
        const pct = share * 100;

        const row = document.createElement('div');
        row.className = 'payout-row';
        row.innerHTML = `
          <div class="payout-info">
            <span class="payout-name">${s.name}</span>
            <span class="payout-detail">${s.hours.toFixed(1)} hrs · $${hourlyRate.toFixed(2)}/hr · ${pct.toFixed(1)}%</span>
          </div>
          <span class="payout-amount">${fmt(earnings)}</span>
        `;
        payoutList.appendChild(row);
      });
    }

    addStaffBtn.addEventListener('click', function() {
      staff.push({ name: 'New Staff', hours: 0 });
      renderStaff();
      calculate();
    });

    staff = defaultStaff.map(s => ({ ...s }));
    renderStaff();
    totalPool.addEventListener('input', calculate);
    calculate();
  </script>
</body>
</html>
