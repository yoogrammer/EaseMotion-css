<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-hover-morph-card — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 2.5rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; }
    .label { font-size: 0.75rem; color: #555; text-align: center; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .row { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
    .card {
      width: 180px; height: 180px;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 1px solid #2a2a4a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      cursor: pointer;
      text-align: center;
      color: #ccc;
    }
    .card h3 { color: #fff; margin: 0 0 0.5rem; font-size: 1rem; }
    .card p { margin: 0; font-size: 0.8rem; color: #888; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 0.75rem; }
    .hint { color: #555; font-size: 0.8rem; text-align: center; }
  </style>
</head>
<body>
  <h1>ease-hover-morph-card</h1>
  <p class="hint">Hover over the cards to see the morph effect</p>
  <div class="section">
    <div class="label">Default morph</div>
    <div class="row">
      <div class="card ease-card ease-hover-morph-card">
        <h3>Morph</h3>
        <p>Square → Circle</p>
      </div>
      <div class="card ease-card ease-hover-morph-card ease-morph-slow">
        <h3>Slow</h3>
        <p>0.8s transition</p>
      </div>
      <div class="card ease-card ease-hover-morph-card ease-morph-fast">
        <h3>Fast</h3>
        <p>0.15s transition</p>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="label">Scale variants</div>
    <div class="row">
      <div class="card ease-card ease-hover-morph-card">
        <h3>Scale 1.08</h3>
        <p>Default zoom</p>
      </div>
      <div class="card ease-card ease-hover-morph-card ease-morph-scale-lg">
        <h3>Scale 1.15</h3>
        <p>Extra zoom</p>
      </div>
    </div>
  </div>
</body>
</html>
