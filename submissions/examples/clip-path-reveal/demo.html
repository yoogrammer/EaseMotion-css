<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clip-Path Reveal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Clip-Path Reveal</h1>
    <p>Hover over each image to see a different clip-path reveal animation</p>
  </header>

  <main class="gallery">
    <figure class="reveal-card" data-reveal="circle">
      <div class="reveal-container">
        <img src="https://picsum.photos/seed/mountain/600/400" alt="Mountain landscape" loading="lazy" width="600" height="400">
        <div class="reveal-overlay"></div>
      </div>
      <figcaption>Circle Reveal</figcaption>
    </figure>

    <figure class="reveal-card" data-reveal="polygon">
      <div class="reveal-container">
        <img src="https://picsum.photos/seed/forest/600/400" alt="Forest path" loading="lazy" width="600" height="400">
        <div class="reveal-overlay"></div>
      </div>
      <figcaption>Polygon Reveal</figcaption>
    </figure>

    <figure class="reveal-card" data-reveal="inset">
      <div class="reveal-container">
        <img src="https://picsum.photos/seed/ocean/600/400" alt="Ocean waves" loading="lazy" width="600" height="400">
        <div class="reveal-overlay"></div>
      </div>
      <figcaption>Inset Reveal</figcaption>
    </figure>

    <figure class="reveal-card" data-reveal="path">
      <div class="reveal-container">
        <img src="https://picsum.photos/seed/city/600/400" alt="City skyline" loading="lazy" width="600" height="400">
        <div class="reveal-overlay"></div>
      </div>
      <figcaption>Path Reveal</figcaption>
    </figure>
  </main>
</body>
</html>
