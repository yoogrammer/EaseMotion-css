<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-tada — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-size: 1rem; opacity: 0.5; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.75rem; }
    .row { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; align-items: center; }
    .btn {
      padding: 12px 28px;
      border-radius: 10px;
      border: none;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      color: white;
    }
    .emoji { font-size: 3rem; }
    .badge {
      padding: 8px 20px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.9rem;
      color: white;
    }
  </style>
</head>
<body>

  <h1>ease-tada Demo</h1>

  <div>
    <div class="label">Default tada (plays once)</div>
    <div class="row">
      <span class="emoji ease-tada">🎉</span>
      <button class="btn ease-tada" style="background:#6366f1;">Submit</button>
    </div>
  </div>

  <div>
    <div class="label">Hover trigger</div>
    <div class="row">
      <span class="emoji ease-tada-hover">🏆</span>
      <button class="btn ease-tada-hover" style="background:#22c55e;">Hover me</button>
    </div>
  </div>

  <div>
    <div class="label">Loop variant</div>
    <div class="row">
      <span class="emoji ease-tada-loop">⭐</span>
      <div class="badge ease-tada-loop" style="background:#f97316;">New!</div>
    </div>
  </div>

  <div>
    <div class="label">Speed variants</div>
    <div class="row">
      <div>
        <div class="label">Fast (500ms)</div>
        <span class="emoji ease-tada ease-tada-fast">⚡</span>
      </div>
      <div>
        <div class="label">Default (1s)</div>
        <span class="emoji ease-tada">🎊</span>
      </div>
      <div>
        <div class="label">Slow (2s)</div>
        <span class="emoji ease-tada ease-tada-slow">🐢</span>
      </div>
    </div>
  </div>

  <div>
    <div class="label">Staggered delays</div>
    <div class="row">
      <span class="emoji ease-tada ease-delay-100">🥇</span>
      <span class="emoji ease-tada ease-delay-200">🥈</span>
      <span class="emoji ease-tada ease-delay-300">🥉</span>
      <span class="emoji ease-tada ease-delay-500">🎖️</span>
    </div>
  </div>

</body>
</html>
