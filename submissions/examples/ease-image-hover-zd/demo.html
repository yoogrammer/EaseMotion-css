<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Hover Effects — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #0b0f1a; color: #e8edf5; padding: 2.5rem 1.5rem; display: flex; flex-direction: column; align-items: center; }
    .wrap { width: 100%; max-width: 820px; }
    h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
    .sub { font-size: 0.82rem; color: #8892a8; margin-bottom: 28px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Image Hover Effects</h1>
    <p class="sub">Hover over each card to see different effects</p>
    <div class="ih-grid">
      <div class="ih-item ih-zoom">
        <span class="ih-label">Zoom</span>
        <img class="ih-img" src="https://picsum.photos/400/300?random=1" alt="Mountain landscape" loading="lazy">
      </div>
      <div class="ih-item ih-grayscale">
        <span class="ih-label">Grayscale</span>
        <img class="ih-img" src="https://picsum.photos/400/300?random=2" alt="City skyline" loading="lazy">
      </div>
      <div class="ih-item">
        <span class="ih-label">Overlay</span>
        <img class="ih-img" src="https://picsum.photos/400/300?random=3" alt="Forest trail" loading="lazy">
        <div class="ih-overlay">
          <div class="ih-overlay-title">Forest Trail</div>
          <div class="ih-overlay-desc">Explore nature's beauty</div>
        </div>
      </div>
      <div class="ih-item ih-border-draw">
        <span class="ih-label">Border</span>
        <img class="ih-img" src="https://picsum.photos/400/300?random=4" alt="Ocean sunset" loading="lazy">
      </div>
    </div>
  </div>
</body>
</html>
