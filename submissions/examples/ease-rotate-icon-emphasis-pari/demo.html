<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rotate Icon Emphasis</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>Hover over each icon</h2>

    <button class="icon-btn rotate-emphasis"
      style="background:#ede9ff; color:#6c63ff;"
      title="Rotate 360">
      ⚙️
    </button>

    <button class="icon-btn rotate-wiggle"
      style="background:#fff3e8; color:#f97316;"
      title="Wiggle">
      🔔
    </button>

    <button class="icon-btn rotate-flip"
      style="background:#e6faf3; color:#10b981;"
      title="Flip 180">
      🔄
    </button>

    <button class="icon-btn rotate-bounce"
      style="background:#fce7f3; color:#ec4899;"
      title="Bounce rotate">
      ⭐
    </button>
  </div>

  <div class="card">
    <h2>What each does</h2>
    <table style="width:100%; font-size:13px; border-collapse:collapse; text-align:left;">
      <tr style="border-bottom:1px solid #f0f0f0;">
        <td style="padding:8px; font-size:20px;">⚙️</td>
        <td style="padding:8px; color:#6c63ff; font-weight:600;">rotate-emphasis</td>
        <td style="padding:8px; color:#888;">Full 360° spin</td>
      </tr>
      <tr style="border-bottom:1px solid #f0f0f0;">
        <td style="padding:8px; font-size:20px;">🔔</td>
        <td style="padding:8px; color:#f97316; font-weight:600;">rotate-wiggle</td>
        <td style="padding:8px; color:#888;">Back & forth wiggle</td>
      </tr>
      <tr style="border-bottom:1px solid #f0f0f0;">
        <td style="padding:8px; font-size:20px;">🔄</td>
        <td style="padding:8px; color:#10b981; font-weight:600;">rotate-flip</td>
        <td style="padding:8px; color:#888;">180° flip with scale</td>
      </tr>
      <tr>
        <td style="padding:8px; font-size:20px;">⭐</td>
        <td style="padding:8px; color:#ec4899; font-weight:600;">rotate-bounce</td>
        <td style="padding:8px; color:#888;">180° with overshoot</td>
      </tr>
    </table>
  </div>

</body>
</html>
