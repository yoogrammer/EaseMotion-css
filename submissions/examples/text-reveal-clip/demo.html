<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Reveal Clip</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="reveal-wrapper">
    <h1 class="reveal-text reveal-from-left">Slide from Left</h1>
    <h1 class="reveal-text reveal-from-right">Slide from Right</h1>
    <h1 class="reveal-text reveal-from-top">Slide from Top</h1>
    <h1 class="reveal-text reveal-from-bottom">Slide from Bottom</h1>
  </div>
</body>
</html>
