<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="toast-container">
      <div class="ease-notification-toast ease-toast-success">
        <span class="toast-icon">✓</span>

        <div class="toast-content">
          <h4>Success</h4>
          <p>Your changes have been saved.</p>
        </div>
      </div>

      <div class="ease-notification-toast ease-toast-error">
        <span class="toast-icon">✕</span>

        <div class="toast-content">
          <h4>Error</h4>
          <p>Unable to process your request.</p>
        </div>
      </div>

      <div class="ease-notification-toast ease-toast-warning">
        <span class="toast-icon">⚠</span>

        <div class="toast-content">
          <h4>Warning</h4>
          <p>Please review your inputs.</p>
        </div>
      </div>

      <div class="ease-notification-toast ease-toast-info">
        <span class="toast-icon">ℹ</span>

        <div class="toast-content">
          <h4>Information</h4>
          <p>New updates are available.</p>
        </div>
      </div>
    </div>
    <div class="toast-container">
      <div class="ease-notification-toast ease-toast-success">
        <span class="toast-icon">✓</span>

        <div class="toast-content">
          <h4>Success</h4>
          <p>Your changes have been saved.</p>
        </div>

        <button class="toast-close">&times;</button>
      </div>
    </div>
    <script>
      document.querySelectorAll(".toast-close").forEach((btn) => {
        btn.addEventListener("click", () => {
          const toast = btn.closest(".ease-notification-toast");

          toast.classList.add("closing");

          toast.addEventListener("animationend", () => toast.remove(), {
            once: true,
          });
        });
      });
    </script>
  </body>
</html>
