<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>ease-border-style Utilities Demo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Inter, sans-serif;
        display: flex;
        flex-wrap: wrap;
        gap: 2rem;
        padding: 2rem;
        background: #f8fafc;
        justify-content: center;
      }
      h2 {
        width: 100%;
        color: #6366f1;
        text-align: center;
        margin: 0;
      }
      .box {
        width: 180px;
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-width: 4px;
        border-color: #6366f1;
        border-radius: 8px;
        background: #fff;
        font-weight: 600;
        color: #334155;
      }
    </style>
  </head>
  <body>
    <h2>border-style Utilities</h2>
    <div class="box ease-border-solid">solid</div>
    <div class="box ease-border-dashed">dashed</div>
    <div class="box ease-border-dotted">dotted</div>
    <div class="box ease-border-double">double</div>
  </body>
</html>
