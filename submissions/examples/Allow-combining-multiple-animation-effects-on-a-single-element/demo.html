<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EaseMotion - Combined Animations Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header fade-slide-down">
    <h1>EaseMotion Combined Animations</h1>
    <p>Fade + Slide, Zoom + Fade, Rotate + Fade</p>
  </header>

  <main class="container">

    <div class="card fade-slide-up">
      <h2>Fade + Slide</h2>
      <p>This card fades in while sliding up smoothly.</p>
    </div>

    <div class="card fade-zoom-in">
      <h2>Zoom + Fade</h2>
      <p>This card scales in while fading.</p>
    </div>

    <div class="card fade-rotate-in">
      <h2>Rotate + Fade</h2>
      <p>This card rotates while fading in.</p>
    </div>

    <button class="btn fade-zoom-in">
      Click Me
    </button>

  </main>

</body>
</html>
