<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Field Dark Mode Contrast Demo</title>
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../components/forms.css">
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      padding: 3rem;
      background-color: #f8fafc;
      color: #0f172a;
      transition: background-color 0.3s, color 0.3s;
      max-width: 600px;
      margin: 0 auto;
    }
    body.dark-mode-preview {
      background-color: #0f172a;
      color: #f8fafc;
    }
    .demo-content {
      margin: 2rem 0;
    }
    .toggle-theme-btn {
      padding: 0.5rem 1rem;
      cursor: pointer;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
      color: black;
      margin-bottom: 2rem;
    }
    .dark-mode-preview .toggle-theme-btn {
      background: #334155;
      color: white;
      border-color: #475569;
    }
  </style>
</head>
<body>
  <h1>Form Field Dark Mode Contrast Demo</h1>
  <p>Toggle the dark mode preview button below. In dark mode, both the label and the entered text inside the inputs should turn white/light-gray to remain readable against the dark inputs.</p>
  
  <button id="themeToggle" class="toggle-theme-btn">Toggle Dark Mode Simulation</button>

  <div class="demo-content">
    <div class="ease-field">
      <label for="nameInput" class="ease-field-label">Full Name</label>
      <input type="text" id="nameInput" class="ease-input" placeholder="Enter your name..." value="John Doe">
    </div>

    <div class="ease-field">
      <label for="msgInput" class="ease-field-label">Message</label>
      <textarea id="msgInput" class="ease-textarea" placeholder="Enter comment...">This is a test comment that should be readable in dark mode.</textarea>
    </div>
  </div>

  <script>
    const toggleBtn = document.getElementById('themeToggle');
    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode-preview');
    });

    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.body.classList.add('dark-mode-preview');
    }
  </script>
</body>
</html>
