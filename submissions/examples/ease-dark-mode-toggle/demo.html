<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS Dark Mode Toggle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <input type="checkbox" id="theme-switch" class="theme-state-gate">

    <main class="viewport-wrapper">
        <header class="navigation-shell">
            <span class="logo-mark">EaseMotion CSS</span>
            
            <label for="theme-switch" class="theme-toggle-pill" id="theme-toggle">
                <span class="label-light">☀️ Light Mode</span>
                <span class="label-dark">🌙 Dark Mode</span>
            </label>
        </header>

        <section class="main-content-area">
            <div class="card">
                <h2>Component Interface Canvas</h2>
                <p>Click the toggle switch in the navbar layout. The custom theme properties update instantly across the body scope using sibling layout selectors.</p>
            </div>
        </section>
    </main>

</body>
</html>
