<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-blend-isolate — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif; display: flex; flex-direction: column;
      align-items: center; justify-content: center; min-height: 100vh;
      background: #0f0f0f; gap: 2rem; padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; }
    .label { font-size:0.75rem; color:#555; text-align:center; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.75rem; }
    .section { display:flex; flex-direction:column; align-items:center; width:100%; max-width:900px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:1rem; width:100%; }
    .blend-box {
      aspect-ratio:1; display:flex; align-items:center; justify-content:center;
      font-weight:700; font-size:0.85rem; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,0.5);
      border-radius:10px; overflow:hidden; position:relative;
      background: linear-gradient(135deg, #6366f1 0%, #ec4899 50%, #f59e0b 100%);
    }
    .blend-box::after {
      content:""; position:absolute; inset:0;
      background: repeating-linear-gradient(45deg, rgba(255,255,255,0.3) 0px, rgba(255,255,255,0.3) 10px, transparent 10px, transparent 20px);
    }
    .blend-label { position:relative; z-index:1; }
    .row { display:flex; gap:1rem; flex-wrap:wrap; justify-content:center; }
    .note { color:#555; font-size:0.8rem; max-width:600px; text-align:center; }
  </style>
</head>
<body>
  <h1>ease-blend-isolate</h1>
  <p class="note">Each box has the same gradient background + pattern overlay. Only the blend mode changes.</p>
  <div class="section">
    <div class="label">Mix blend modes</div>
    <div class="grid">
      <div class="blend-box"><span class="blend-label ease-blend-normal">normal</span></div>
      <div class="blend-box"><span class="blend-label ease-blend-multiply">multiply</span></div>
      <div class="blend-box"><span class="blend-label ease-blend-screen">screen</span></div>
      <div class="blend-box"><span class="blend-label ease-blend-overlay">overlay</span></div>
      <div class="blend-box"><span class="blend-label ease-blend-difference">difference</span></div>
      <div class="blend-box"><span class="blend-label ease-blend-exclusion">exclusion</span></div>
    </div>
  </div>
  <div class="section">
    <div class="label">Isolation example</div>
    <div class="row">
      <div class="blend-box" style="width:200px;height:200px;">
        <div class="ease-isolate" style="position:relative;z-index:1;padding:0.5rem;">
          <span class="blend-label">isolated</span>
          <div style="position:absolute;inset:0;background:repeating-linear-gradient(45deg,rgba(255,255,255,0.3) 0px,rgba(255,255,255,0.3) 10px,transparent 10px,transparent 20px);"></div>
        </div>
      </div>
      <div class="blend-box" style="width:200px;height:200px;">
        <div style="position:relative;z-index:1;padding:0.5rem;">
          <span class="blend-label">not isolated</span>
          <div style="position:absolute;inset:0;background:repeating-linear-gradient(45deg,rgba(255,255,255,0.3) 0px,rgba(255,255,255,0.3) 10px,transparent 10px,transparent 20px);mix-blend-mode:difference;"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
