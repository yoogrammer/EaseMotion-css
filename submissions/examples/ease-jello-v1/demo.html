<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-jello -- EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background: #0f172a;
      gap: 3rem;
      padding: 3rem 1.5rem;
      color: #e2e8f0;
    }
    h1 { font-size: 1rem; color: #475569; letter-spacing: 0.1em; text-transform: uppercase; }
    .section { display: flex; flex-direction: column; align-items: center; gap: 1rem; width: 100%; max-width: 600px; }
    .label { font-size: 0.7rem; color: #475569; text-align: center; }
    .row { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; align-items: center; }
    .btn {
      padding: 0.65rem 1.5rem;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: #4f46e5; border-color: #4f46e5; color: #fff; }
    .btn-green   { background: #16a34a; border-color: #16a34a; color: #fff; }
    .btn-red     { background: #dc2626; border-color: #dc2626; color: #fff; }
    .icon { font-size: 2.5rem; display: inline-block; cursor: pointer; }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      background: #4f46e5;
      color: #fff;
      font-size: 0.78rem;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <h1>ease-jello Demo</h1>

  <!-- Hover trigger -->
  <div class="section">
    <div class="label">Hover trigger — intensity variants</div>
    <div class="row">
      <button class="btn ease-jello-subtle">Subtle</button>
      <button class="btn btn-primary ease-jello">Default</button>
      <button class="btn ease-jello-hard">Hard</button>
    </div>
  </div>

  <!-- Loop variant -->
  <div class="section">
    <div class="label">Loop variant — always animating</div>
    <div class="row">
      <span class="icon ease-jello-loop">🧃</span>
      <span class="icon ease-jello-loop ease-delay-200">🎯</span>
      <span class="icon ease-jello-loop ease-delay-400">💥</span>
      <span class="badge ease-jello-loop">New!</span>
      <span class="badge ease-jello-loop ease-delay-300" style="background:#dc2626;">Live</span>
    </div>
  </div>

  <!-- Click trigger -->
  <div class="section">
    <div class="label">Click trigger</div>
    <div class="row">
      <button class="btn ease-jello-click">Click to jello</button>
      <button class="btn btn-red ease-jello-click">Click me</button>
      <span class="icon ease-jello-click">🔔</span>
    </div>
  </div>

  <!-- Speed variants -->
  <div class="section">
    <div class="label">Speed variants — hover to compare</div>
    <div class="row">
      <button class="btn ease-jello ease-jello-fast">Fast (0.4s)</button>
      <button class="btn btn-primary ease-jello">Default (0.8s)</button>
      <button class="btn ease-jello ease-jello-slow">Slow (1.4s)</button>
    </div>
  </div>

  <!-- On various elements -->
  <div class="section">
    <div class="label">Works on any element</div>
    <div class="row">
      <button class="btn btn-green ease-jello">Button</button>
      <span class="badge ease-jello">Badge</span>
      <span class="icon ease-jello">🥤</span>
      <span style="font-size:1.5rem;font-weight:800;color:#4f46e5;" class="ease-jello">Logo</span>
    </div>
  </div>

</body>
</html>
