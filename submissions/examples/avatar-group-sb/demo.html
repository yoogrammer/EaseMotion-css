<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS-only Avatar Component - EaseMotion CSS</title>
    <!-- Link to EaseMotion CSS core -->
    <link rel="stylesheet" href="../../../core/animations.css" />
    <!-- Link to your CSS file - do not change this path -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-wrapper">
      <h1>CSS-only Avatar & Avatar Group Component</h1>

      <section class="demo-section">
        <h2>Basic Image Avatars & Sizes</h2>
        <div class="avatar-demo-row">
          <div class="avatar avatar-sm">
            <img
              src="https://i.pravatar.cc/100?img=1"
              alt="User Avatar Small"
            />
          </div>
          <div class="avatar avatar-md">
            <img
              src="https://i.pravatar.cc/100?img=2"
              alt="User Avatar Medium"
            />
          </div>
          <div class="avatar avatar-lg">
            <img
              src="https://i.pravatar.cc/100?img=3"
              alt="User Avatar Large"
            />
          </div>
        </div>
      </section>

      <section class="demo-section">
        <h2>Initials / Fallback Avatars</h2>
        <div class="avatar-demo-row">
          <div class="avatar avatar-sm avatar-initials" aria-label="John Doe">
            JD
          </div>
          <div
            class="avatar avatar-md avatar-initials"
            aria-label="Alice Smith"
          >
            AS
          </div>
          <div class="avatar avatar-lg avatar-initials" aria-label="Bob Martin">
            BM
          </div>
        </div>
      </section>

      <section class="demo-section">
        <h2>Shape Variants (Rounded Square)</h2>
        <div class="avatar-demo-row">
          <div class="avatar avatar-md avatar-square">
            <img src="https://i.pravatar.cc/100?img=4" alt="Square Avatar 1" />
          </div>
          <div
            class="avatar avatar-md avatar-square avatar-initials"
            aria-label="Square Initials"
          >
            SQ
          </div>
        </div>
      </section>

      <section class="demo-section">
        <h2>Status Indicators</h2>
        <div class="avatar-demo-row">
          <div class="avatar avatar-md">
            <img src="https://i.pravatar.cc/100?img=5" alt="Online User" />
            <span
              class="avatar-status status-online"
              aria-label="Online"
            ></span>
          </div>
          <div class="avatar avatar-md">
            <img src="https://i.pravatar.cc/100?img=6" alt="Busy User" />
            <span class="avatar-status status-busy" aria-label="Busy"></span>
          </div>
          <div class="avatar avatar-md">
            <img src="https://i.pravatar.cc/100?img=7" alt="Offline User" />
            <span
              class="avatar-status status-offline"
              aria-label="Offline"
            ></span>
          </div>
        </div>
      </section>

      <section class="demo-section">
        <h2>Avatar Group with Hover Effect</h2>
        <div class="avatar-group">
          <div class="avatar avatar-md avatar-group-item">
            <img src="https://i.pravatar.cc/100?img=8" alt="Group User 1" />
          </div>
          <div class="avatar avatar-md avatar-group-item">
            <img src="https://i.pravatar.cc/100?img=9" alt="Group User 2" />
          </div>
          <div class="avatar avatar-md avatar-group-item">
            <img src="https://i.pravatar.cc/100?img=10" alt="Group User 3" />
          </div>
          <div class="avatar avatar-md avatar-group-item">
            <img src="https://i.pravatar.cc/100?img=11" alt="Group User 4" />
          </div>
        </div>
      </section>

      <section class="demo-section">
        <h2>Avatar Group with Overflow Count</h2>
        <div class="avatar-group">
          <div class="avatar avatar-md avatar-group-item">
            <img src="https://i.pravatar.cc/100?img=12" alt="Group User 5" />
          </div>
          <div class="avatar avatar-md avatar-group-item">
            <img src="https://i.pravatar.cc/100?img=13" alt="Group User 6" />
          </div>
          <div
            class="avatar avatar-md avatar-group-item avatar-initials"
            aria-label="Extra Users"
          >
            +5
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
