<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CI Pipeline Fix Container - EaseMotion CSS</title>
  <style>
    body { background-color: #070b12; color: #f1f5f9; font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .patch-card { padding: 32px; background: #0e131f; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; text-align: center; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    h1 { font-size: 20px; color: #10b981; margin-top: 0; }
    p { font-size: 14px; color: #94a3b8; line-height: 1.5; }
    .badge { inline-block; padding: 4px 10px; background: rgba(16, 185, 129, 0.1); color: #10b981; border-radius: 6px; font-size: 12px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="patch-card">
    <span class="badge">CI/CD Patch #2571</span>
    <h1>Pipeline Release Job Pruned</h1>
    <p>This directory holds the self-contained container patch to remove the broken release-validation job from ci.yml, leaving only the stable HTMLHint and Stylelint workflows.</p>
  </div>
</body>
</html>
