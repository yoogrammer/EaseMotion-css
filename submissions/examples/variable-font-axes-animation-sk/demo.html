<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable Font All-Axes Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Variable Font Axes Animation</h1>

    <div class="demo-block">
        <div class="label">All axes (wght + wdth + opsz)</div>
        <div class="ease-vf-kinetic">EaseMotion</div>
    </div>

    <div class="demo-block">
        <div class="label">wght only — weight breathe</div>
        <div class="ease-vf-weight">Weight</div>
    </div>

    <div class="demo-block">
        <div class="label">wdth only — width stretch</div>
        <div class="ease-vf-width">Width</div>
    </div>

    <div class="demo-block">
        <div class="label">opsz only — optical size shift</div>
        <div class="ease-vf-opsz">OptSize</div>
    </div>

</body>
</html>
