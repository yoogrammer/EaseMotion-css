<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-only Latency Distribution Bars</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="metric-card" aria-labelledby="demo-title">
      <div class="card-header">
        <div>
          <p class="eyebrow">API performance</p>
          <h1 id="demo-title">Latency distribution</h1>
        </div>
        <span class="live-pill">Live sample</span>
      </div>

      <div class="latency-chart" aria-label="Response time percentile chart">
        <div class="latency-row" style="--value: 32%; --delay: 0ms">
          <span class="bucket">p50</span>
          <div class="latency-track"><span class="latency-fill"></span></div>
          <strong>42ms</strong>
        </div>

        <div class="latency-row" style="--value: 48%; --delay: 90ms">
          <span class="bucket">p75</span>
          <div class="latency-track"><span class="latency-fill"></span></div>
          <strong>78ms</strong>
        </div>

        <div class="latency-row is-watch" style="--value: 72%; --delay: 180ms">
          <span class="bucket">p95</span>
          <div class="latency-track"><span class="latency-fill"></span></div>
          <strong>184ms</strong>
        </div>

        <div class="latency-row is-hot" style="--value: 91%; --delay: 270ms">
          <span class="bucket">p99</span>
          <div class="latency-track"><span class="latency-fill"></span></div>
          <strong>326ms</strong>
        </div>
      </div>

      <footer class="thresholds" aria-label="Latency thresholds">
        <span><i class="good"></i>Under target</span>
        <span><i class="warn"></i>Watch</span>
        <span><i class="hot"></i>Needs attention</span>
      </footer>
    </section>
  </main>
</body>
</html>
