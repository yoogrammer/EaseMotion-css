<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Persistent Dark Mode Toggle - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <!-- ⚡ Inline script to prevent FOUC (Flash of Unstyled Content) -->
  <script>
    (function() {
      const theme = localStorage.getItem('theme') || 'light';
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body>
  <nav class="em-header">
    <div class="em-header-content">
      <span class="em-logo">EaseMotion Portal</span>
      <button id="theme-toggle" class="em-theme-btn" aria-label="Toggle dark mode">
        <span class="sun-icon">☀️</span>
        <span class="moon-icon">🌙</span>
      </button>
    </div>
  </nav>

  <main class="demo-shell">
    <section class="preview-panel">
      <h1 id="demo-title">Persistent Dark Mode</h1>
      <p class="intro">
        A visually polished theme toggle with local storage persistence and CSS variable mapping.
      </p>

      <div class="theme-card">
        <h2>Dashboard Preview</h2>
        <p>
          Toggling the theme updates the <code>.dark</code> class on the root element. 
          The state is saved to <code>localStorage</code> to persist across reloads.
        </p>
        
        <div class="palette-grid">
          <div class="swatch-group">
            <span class="color-swatch page-bg"></span>
            <label>Background</label>
          </div>
          <div class="swatch-group">
            <span class="color-swatch surface-bg"></span>
            <label>Surface</label>
          </div>
          <div class="swatch-group">
            <span class="color-swatch text-primary"></span>
            <label>Text</label>
          </div>
          <div class="swatch-group">
            <span class="color-swatch accent-color"></span>
            <label>Accent</label>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    
    themeToggle.addEventListener('click', () => {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
  </script>
</body>
</html>
