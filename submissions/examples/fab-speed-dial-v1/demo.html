<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAB Speed Dial - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="speeddial-page">
    <h1>Speed Dial</h1>
    <p class="speeddial-hint">Hover the FAB to expand actions</p>
    <div class="speeddial">
      <input type="checkbox" id="speeddial-toggle" class="speeddial-checkbox">
      <label for="speeddial-toggle" class="speeddial-fab" aria-label="Open actions">
        <span class="speeddial-icon">+</span>
      </label>
      <div class="speeddial-actions">
        <a href="#" class="speeddial-item" style="--i: 1; --item-color: #6366f1;" aria-label="Edit">
          <span class="speeddial-item-icon">&#9998;</span>
          <span class="speeddial-item-label">Edit</span>
        </a>
        <a href="#" class="speeddial-item" style="--i: 2; --item-color: #10b981;" aria-label="Share">
          <span class="speeddial-item-icon">&#10149;</span>
          <span class="speeddial-item-label">Share</span>
        </a>
        <a href="#" class="speeddial-item" style="--i: 3; --item-color: #f59e0b;" aria-label="Star">
          <span class="speeddial-item-icon">&#9733;</span>
          <span class="speeddial-item-label">Star</span>
        </a>
        <a href="#" class="speeddial-item" style="--i: 4; --item-color: #ec4899;" aria-label="Delete">
          <span class="speeddial-item-icon">&#10005;</span>
          <span class="speeddial-item-label">Delete</span>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
