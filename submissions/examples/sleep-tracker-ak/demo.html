<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleep Tracker - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tracker-wrapper">
    <h1>Sleep Tracker</h1>
    <div class="log-section">
      <div class="field">
        <label for="bedtime">Bedtime</label>
        <input type="time" id="bedtime" class="input" value="23:00">
      </div>
      <div class="field">
        <label for="waketime">Wake Time</label>
        <input type="time" id="waketime" class="input" value="07:00">
      </div>
      <div class="field">
        <label>Sleep Quality</label>
        <div class="star-rating" id="starRating">
          <span class="star" data-val="1">★</span>
          <span class="star" data-val="2">★</span>
          <span class="star" data-val="3">★</span>
          <span class="star" data-val="4">★</span>
          <span class="star" data-val="5">★</span>
        </div>
      </div>
      <button class="log-btn" id="logBtn">Log Tonight's Sleep</button>
    </div>
    <div class="stats-section">
      <div class="stat-card">
        <span class="stat-value" id="lastDuration">--</span>
        <span class="stat-label">Last Duration</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="avgDuration">--</span>
        <span class="stat-label">Weekly Avg</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="avgQuality">--</span>
        <span class="stat-label">Avg Quality</span>
      </div>
    </div>
    <div class="schedule-section">
      <h3>Sleep Schedule</h3>
      <div class="schedule-chart" id="scheduleChart"></div>
    </div>
  </div>
  <script>
    const bedtime = document.getElementById('bedtime');
    const waketime = document.getElementById('waketime');
    const starRating = document.getElementById('starRating');
    const logBtn = document.getElementById('logBtn');
    const lastDuration = document.getElementById('lastDuration');
    const avgDuration = document.getElementById('avgDuration');
    const avgQuality = document.getElementById('avgQuality');
    const scheduleChart = document.getElementById('scheduleChart');

    let quality = 3;
    let entries = [];

    starRating.querySelectorAll('.star').forEach(star => {
      star.addEventListener('click', () => {
        quality = parseInt(star.dataset.val);
        starRating.querySelectorAll('.star').forEach(s => {
          s.classList.toggle('active', parseInt(s.dataset.val) <= quality);
        });
      });
      if (parseInt(star.dataset.val) <= quality) star.classList.add('active');
    });

    function calcDuration(bed, wake) {
      let [bh, bm] = bed.split(':').map(Number);
      let [wh, wm] = wake.split(':').map(Number);
      let start = bh * 60 + bm;
      let end = wh * 60 + wm;
      if (end <= start) end += 1440;
      return end - start;
    }

    function fmtDuration(min) {
      const h = Math.floor(min / 60);
      const m = min % 60;
      return h + 'h ' + m + 'm';
    }

    function logSleep() {
      const dur = calcDuration(bedtime.value, waketime.value);
      entries.push({ date: new Date(), bedtime: bedtime.value, waketime: waketime.value, duration: dur, quality });
      if (entries.length > 7) entries.shift();
      updateStats();
      renderSchedule();
    }

    function updateStats() {
      if (entries.length === 0) {
        lastDuration.textContent = '--';
        avgDuration.textContent = '--';
        avgQuality.textContent = '--';
        return;
      }
      const last = entries[entries.length - 1];
      lastDuration.textContent = fmtDuration(last.duration);
      const avgDur = Math.round(entries.reduce((s, e) => s + e.duration, 0) / entries.length);
      avgDuration.textContent = fmtDuration(avgDur);
      const avgQual = (entries.reduce((s, e) => s + e.quality, 0) / entries.length).toFixed(1);
      avgQuality.textContent = avgQual + '/5';
    }

    function renderSchedule() {
      scheduleChart.innerHTML = '';
      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      const now = new Date();
      for (let i = 6; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i);
        const entry = entries.find(e => e.date.toDateString() === d.toDateString());
        const bar = document.createElement('div');
        bar.className = 'schedule-bar';
        if (entry) {
          const durMin = entry.duration;
          const pct = Math.min(100, (durMin / 600) * 100);
          const fill = document.createElement('div');
          fill.className = 'schedule-fill';
          fill.style.height = pct + '%';
          fill.title = fmtDuration(durMin);
          const starDisplay = '★'.repeat(entry.quality) + '☆'.repeat(5 - entry.quality);
          fill.innerHTML = `<span class="schedule-tooltip">${fmtDuration(durMin)} (${entry.quality}/5)</span>`;
          bar.appendChild(fill);
        }
        const label = document.createElement('span');
        label.className = 'schedule-label';
        label.textContent = days[d.getDay()];
        bar.appendChild(label);
        scheduleChart.appendChild(bar);
      }
    }

    logBtn.addEventListener('click', logSleep);

    logSleep();
  </script>
</body>
</html>
