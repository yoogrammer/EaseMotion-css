<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Gradient Border Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card-grid">
    <div class="gradient-border-card card-1">
      <div class="card-content">
        <div class="card-icon">🚀</div>
        <h3>Fast Performance</h3>
        <p>Lightning-fast load times with optimized CSS animations that run at 60fps.</p>
      </div>
    </div>
    <div class="gradient-border-card card-2">
      <div class="card-content">
        <div class="card-icon">🎨</div>
        <h3>Beautiful Design</h3>
        <p>Gradient borders with smooth rotating animations for modern UI components.</p>
      </div>
    </div>
    <div class="gradient-border-card card-3">
      <div class="card-content">
        <div class="card-icon">⚡</div>
        <h3>Zero Dependencies</h3>
        <p>Pure CSS implementation — no JavaScript, no external libraries required.</p>
      </div>
    </div>
  </div>
</body>
</html>
