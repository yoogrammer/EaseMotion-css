<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button 3D Depth Click Interaction — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>tactile 3D Button Click</h1>
      <p class="subtitle">Highly responsive 3D buttons that press physically into the viewport on click, shifting shadows accordingly.</p>
    </header>

    <div class="section-title">Tactile Presets</div>
    <div class="demo-grid">
      <!-- Sm Depth -->
      <div class="demo-card">
        <button class="depth-btn depth-sm">Small Press</button>
        <p>Tactile button with a 2px offset depth press.</p>
      </div>

      <!-- Md Depth -->
      <div class="demo-card">
        <button class="depth-btn depth-md">Medium Press</button>
        <p>Tactile button with a 4px offset depth press.</p>
      </div>

      <!-- Lg Depth -->
      <div class="demo-card">
        <button class="depth-btn depth-lg">Deep Press</button>
        <p>Tactile button with a 6px offset depth press.</p>
      </div>
    </div>
  </div>
</body>
</html>
