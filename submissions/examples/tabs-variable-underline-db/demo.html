<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Variable Underline Tabs Demo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="tabs-box" style="--tab-count: 4;">
    <input type="radio" name="nav-tabs" id="t-1" class="t-input" checked onclick="document.querySelector('.tabs-box').style.setProperty('--active-idx', 0)">
    <input type="radio" name="nav-tabs" id="t-2" class="t-input" onclick="document.querySelector('.tabs-box').style.setProperty('--active-idx', 1)">
    <input type="radio" name="nav-tabs" id="t-3" class="t-input" onclick="document.querySelector('.tabs-box').style.setProperty('--active-idx', 2)">
    <input type="radio" name="nav-tabs" id="t-4" class="t-input" onclick="document.querySelector('.tabs-box').style.setProperty('--active-idx', 3)">

    <div class="tabs-navigation">
      <label for="t-1" class="t-label">Tab 1</label>
      <label for="t-2" class="t-label">Tab 2</label>
      <label for="t-3" class="t-label">Tab 3</label>
      <label for="t-4" class="t-label">Tab 4</label>
      <div class="t-indicator"></div>
    </div>
  </div>
</body>
</html>
