<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Stack of Photos Showcase</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #f3f4f6;
            color: #1f2937;
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }
        .section-title {
            margin-top: 40px;
            font-size: 1.2rem;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
    </style>
</head>
<body>

    <h1>Animated 3D Photo Stacks</h1>
    <p style="color: #6b7280; max-width: 600px; margin: 0 auto 30px auto;">
        Hover over any photo collection deck to view modular elastic card translation transitions.
    </p>

    <div class="ease-photo-stack-container">
        
        <div>
            <div class="section-title">Fan-Out Animation</div>
            <div class="ease-photo-stack stack-fan" style="margin-top: 20px;">
                <div class="ease-photo"><img src="https://picsum.photos" alt="Photo 1"></div>
                <div class="ease-photo"><img src="https://picsum.photos" alt="Photo 2"></div>
                <div class="ease-photo"><img src="https://picsum.photos" alt="Photo 3"></div>
            </div>
        </div>

        <div>
            <div class="section-title">Spread Animation</div>
            <div class="ease-photo-stack stack-spread" style="margin-top: 20px;">
                <div class="ease-photo"><img src="https://picsum.photos" alt="Photo 4"></div>
                <div class="ease-photo"><img src="https://picsum.photos" alt="Photo 5"></div>
                <div class="ease-photo"><img src="https://picsum.photos" alt="Photo 6"></div>
            </div>
        </div>

        <div>
            <div class="section-title">Raise Animation</div>
            <div class="ease-photo-stack stack-raise" style="margin-top: 20px;">
                <div class="ease-photo"><img src="https://picsum.photos" alt="Photo 7"></div>
                <div class="ease-photo"><img src="https://picsum.photos" alt="Photo 8"></div>
                <div class="ease-photo"><img src="https://picsum.photos" alt="Photo 9"></div>
            </div>
        </div>

    </div>

</body>
</html>
