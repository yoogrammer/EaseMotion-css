<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resource Allocation Planner</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="planner">

  <header class="hero">
    <h1>Resource Allocation Planner</h1>
    <p>Track team capacity, project assignments, and workload utilization.</p>
  </header>

  <section class="overview">

    <div class="metric-card">
      <h3>Total Resources</h3>
      <span>24</span>
    </div>

    <div class="metric-card">
      <h3>Active Projects</h3>
      <span>8</span>
    </div>

    <div class="metric-card">
      <h3>Utilization</h3>
      <span>76%</span>
    </div>

  </section>

  <section class="allocations">

    <h2>Team Allocation</h2>

    <div class="member-card">
      <div>
        <h3>Sarah Johnson</h3>
        <p>Frontend Project</p>
      </div>

      <div class="progress">
        <div class="fill fill-80"></div>
      </div>

      <span>80%</span>
    </div>

    <div class="member-card">
      <div>
        <h3>Alex Carter</h3>
        <p>Dashboard Development</p>
      </div>

      <div class="progress">
        <div class="fill fill-65"></div>
      </div>

      <span>65%</span>
    </div>

    <div class="member-card">
      <div>
        <h3>Emma Wilson</h3>
        <p>QA & Testing</p>
      </div>

      <div class="progress">
        <div class="fill fill-45"></div>
      </div>

      <span>45%</span>
    </div>

  </section>

</div>

</body>
</html>
