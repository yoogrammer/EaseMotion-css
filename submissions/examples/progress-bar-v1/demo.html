<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-progress — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      gap: 2rem;
      padding: 2rem;
    }
    h1 { color: #333; }
    .section {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .label { font-size: 0.75rem; color: #888; margin-bottom: 0.25rem; }
    .sublabel { font-size: 0.7rem; color: #aaa; }
    .row { display: flex; align-items: center; gap: 1rem; }
    .row span { font-size: 0.8rem; color: #555; width: 32px; text-align: right; flex-shrink: 0; }
    h2 { font-size: 1rem; font-weight: 700; color: #333; margin: 0; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.5rem; }
    button {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      background: #6366f1;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      align-self: flex-start;
    }
    button:hover { background: #4f46e5; }
  </style>
</head>
<body>

  <h1>ease-progress Demo</h1>

  <div class="section">
    <h2>Color variants</h2>
    <div class="label">Default (indigo)</div>
    <div class="row">
      <div class="ease-progress" style="flex:1;">
        <div class="ease-progress-fill" style="--ease-progress-value: 70%;"></div>
      </div>
      <span>70%</span>
    </div>

    <div class="label">Success</div>
    <div class="row">
      <div class="ease-progress ease-progress-success" style="flex:1;">
        <div class="ease-progress-fill" style="--ease-progress-value: 85%;"></div>
      </div>
      <span>85%</span>
    </div>

    <div class="label">Danger</div>
    <div class="row">
      <div class="ease-progress ease-progress-danger" style="flex:1;">
        <div class="ease-progress-fill" style="--ease-progress-value: 30%;"></div>
      </div>
      <span>30%</span>
    </div>

    <div class="label">Warning</div>
    <div class="row">
      <div class="ease-progress ease-progress-warning" style="flex:1;">
        <div class="ease-progress-fill" style="--ease-progress-value: 55%;"></div>
      </div>
      <span>55%</span>
    </div>

    <div class="label">Info</div>
    <div class="row">
      <div class="ease-progress ease-progress-info" style="flex:1;">
        <div class="ease-progress-fill" style="--ease-progress-value: 90%;"></div>
      </div>
      <span>90%</span>
    </div>
  </div>

  <div class="section">
    <h2>Size variants</h2>
    <div class="label">Small</div>
    <div class="ease-progress ease-progress-sm">
      <div class="ease-progress-fill" style="--ease-progress-value: 60%;"></div>
    </div>
    <div class="label">Default</div>
    <div class="ease-progress">
      <div class="ease-progress-fill" style="--ease-progress-value: 60%;"></div>
    </div>
    <div class="label">Large</div>
    <div class="ease-progress ease-progress-lg">
      <div class="ease-progress-fill" style="--ease-progress-value: 60%;"></div>
    </div>
    <div class="label">XL</div>
    <div class="ease-progress ease-progress-xl">
      <div class="ease-progress-fill" style="--ease-progress-value: 60%;"></div>
    </div>
  </div>

  <div class="section">
    <h2>Striped variant</h2>
    <div class="ease-progress ease-progress-success">
      <div class="ease-progress-fill ease-progress-striped" style="--ease-progress-value: 75%;"></div>
    </div>
    <div class="ease-progress ease-progress-info">
      <div class="ease-progress-fill ease-progress-striped" style="--ease-progress-value: 50%;"></div>
    </div>
  </div>

  <div class="section">
    <h2>Labeled variant</h2>
    <div class="ease-progress ease-progress-labeled ease-progress-success">
      <div class="ease-progress-fill" style="--ease-progress-value: 80%;">
        <span class="ease-progress-label">80%</span>
      </div>
    </div>
    <div class="ease-progress ease-progress-labeled ease-progress-warning">
      <div class="ease-progress-fill" style="--ease-progress-value: 45%;">
        <span class="ease-progress-label">45%</span>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Indeterminate (loading)</h2>
    <div class="ease-progress ease-progress-indeterminate ease-progress-info">
      <div class="ease-progress-fill"></div>
    </div>
  </div>

  <button onclick="location.reload()">↺ Replay animations</button>

</body>
</html>
