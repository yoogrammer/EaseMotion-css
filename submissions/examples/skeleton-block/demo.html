<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-skeleton-block — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; letter-spacing: 0.05em; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .section { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 400px; }
    .skeleton-card {
      width: 100%; padding: 1.5rem;
      background: #1a1a1a; border-radius: 12px;
      border: 1px solid #2a2a2a;
    }
  </style>
</head>
<body>
  <h1>ease-skeleton-block</h1>
  <div class="section">
    <div class="label">Skeleton card layout</div>
    <div class="skeleton-card">
      <div class="ease-skeleton-block" style="width:48px;height:48px;border-radius:50%;margin-bottom:1rem;"></div>
      <div class="ease-skeleton-block" style="width:100%;height:14px;margin-bottom:0.5rem;"></div>
      <div class="ease-skeleton-block" style="width:75%;height:14px;margin-bottom:0.5rem;"></div>
      <div class="ease-skeleton-block" style="width:50%;height:14px;"></div>
    </div>
  </div>
</body>
</html>
