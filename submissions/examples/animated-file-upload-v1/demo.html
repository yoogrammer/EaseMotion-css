<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated File Upload</title>
  
  <!-- Modern Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="upload-container">
    
    <!-- Hidden native file input (Makes it actually functional without JS) -->
    <input type="file" id="file-upload" class="file-input" multiple aria-hidden="true">
    
    <!-- Label wraps the box, making the entire area clickable -->
    <label for="file-upload" class="upload-box">
      
      <div class="upload-icon-wrapper">
        <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
      </div>

      <h2 class="upload-title">Upload Your Files</h2>
      
      <p class="upload-text">
        Drag & drop files here or <span class="highlight">click to browse</span>.
        <span class="file-types">Supports: JPG, PNG, PDF, ZIP (Max 10MB)</span>
      </p>

      <span class="upload-btn">Choose Files</span>
      
    </label>
  </div>

</body>
</html>
