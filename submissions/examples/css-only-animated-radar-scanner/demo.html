<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-only Animated Radar Scanner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-radar-container">
    <div class="ease-radar-body">
      <div class="ease-radar">
        <!-- Radar Grid and Concentric Circles -->
        <div class="ease-radar-grid"></div>
        
        <!-- Rotating Scanning Beam -->
        <div class="ease-radar-beam"></div>
        
        <!-- Detected Targets (Blips) -->
        <!-- Synchronized with the beam using animation-delay -->
        <div class="ease-blip ease-blip-1"></div>
        <div class="ease-blip ease-blip-2"></div>
        <div class="ease-blip ease-blip-3"></div>
        <div class="ease-blip ease-blip-4"></div>
        
        <!-- Radar Center Crosshair Dot -->
        <div class="ease-radar-center"></div>
      </div>
    </div>
  </div>
</body>
</html>
