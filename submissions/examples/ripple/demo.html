<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-ripple — EaseMotion CSS</title>

  <!-- Only local styles needed for submission -->
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      gap: 2rem;
      padding: 2rem;
    }

    h1 {
      color: #333;
    }

    .row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .label {
      font-size: 0.75rem;
      color: #888;
      text-align: center;
    }

    .section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>ease-ripple Demo</h1>

  <!-- Color Variants -->
  <div class="section">
    <div class="label">Color variants (click to ripple)</div>

    <div class="row">
      <button class="ease-ripple" style="background:#e5e7eb; color:#374151;">
        Default
      </button>

      <button class="ease-ripple ease-ripple-white"
        style="background:#3b82f6; color:#fff;">
        White ripple
      </button>

      <button class="ease-ripple ease-ripple-dark"
        style="background:#f3f4f6; color:#111;">
        Dark ripple
      </button>

      <button class="ease-ripple ease-ripple-primary"
        style="background:#fff; color:#3b82f6; border:2px solid #3b82f6;">
        Primary
      </button>

      <button class="ease-ripple ease-ripple-success"
        style="background:#fff; color:#22c55e; border:2px solid #22c55e;">
        Success
      </button>

      <button class="ease-ripple ease-ripple-danger"
        style="background:#fff; color:#ef4444; border:2px solid #ef4444;">
        Danger
      </button>
    </div>
  </div>

  <!-- Speed Variants -->
  <div class="section">
    <div class="label">Speed variants</div>

    <div class="row">
      <button class="ease-ripple ease-ripple-white ease-ripple-fast"
        style="background:#6366f1; color:#fff;">
        Fast
      </button>

      <button class="ease-ripple ease-ripple-white"
        style="background:#6366f1; color:#fff;">
        Default
      </button>

      <button class="ease-ripple ease-ripple-white ease-ripple-slow"
        style="background:#6366f1; color:#fff;">
        Slow
      </button>
    </div>
  </div>

</body>
</html>
