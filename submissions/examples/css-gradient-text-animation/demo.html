<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Gradient Text – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">
  <h1 class="title">CSS Gradient Text Animation</h1>
  <p class="subtitle"><code>background-clip: text</code> with animated background positions.</p>

  <div class="demo-grid">
    <div class="demo-card">
      <h2 class="gradient-text rainbow">Rainbow Sweep</h2>
      <p class="desc">Animated linear gradient sweeping horizontally.</p>
    </div>
    <div class="demo-card">
      <h2 class="gradient-text shimmer">Shimmer Wave</h2>
      <p class="desc">Metallic shimmer effect with diagonal gradient.</p>
    </div>
    <div class="demo-card">
      <h2 class="gradient-text neon">Neon Pulse</h2>
      <p class="desc">Pulsing neon glow gradient with vertical movement.</p>
    </div>
  </div>
</div>

</body>
</html>
