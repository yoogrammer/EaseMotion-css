<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Parallax Tilt Effect</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="section">
    <h2>Hover over each card</h2>

    <div style="display:flex; gap:20px; flex-wrap:wrap; justify-content:center;">

      <div class="tilt-card tilt-left">
        <div class="card-icon">🚀</div>
        <div class="card-title" style="color:#6c63ff;">Tilt Left</div>
        <div class="card-label">tilt-left</div>
      </div>

      <div class="tilt-card tilt-right">
        <div class="card-icon">🔥</div>
        <div class="card-title" style="color:#f97316;">Tilt Right</div>
        <div class="card-label">tilt-right</div>
      </div>

      <div class="tilt-card tilt-up">
        <div class="card-icon">🌿</div>
        <div class="card-title" style="color:#10b981;">Tilt Up</div>
        <div class="card-label">tilt-up</div>
      </div>

      <div class="tilt-card tilt-down">
        <div class="card-icon">✨</div>
        <div class="card-title" style="color:#ec4899;">Tilt Down</div>
        <div class="card-label">tilt-down</div>
      </div>

    </div>
  </div>

</body>
</html>
