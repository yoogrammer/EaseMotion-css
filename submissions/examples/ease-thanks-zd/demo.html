<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmation — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #0b0f1a; color: #e8edf5; padding: 2.5rem 1.5rem; display: flex; flex-direction: column; align-items: center; }
    .wrap { width: 100%; max-width: 500px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="tk-card">
      <div class="tk-check-wrap" aria-hidden="true">
        <svg viewBox="0 0 100 100" width="72" height="72">
          <circle class="tk-check-circle" cx="50" cy="50" r="45"/>
          <polyline class="tk-check-path" points="30,50 45,66 72,36"/>
        </svg>
      </div>
      <div class="tk-title">Payment Confirmed!</div>
      <div class="tk-desc">Thank you for your purchase. We've sent a receipt to your email.</div>
      <div class="tk-details">
        <div class="tk-row">
          <span class="tk-row-label">Plan</span>
          <span class="tk-row-value">Pro Annual</span>
        </div>
        <div class="tk-row">
          <span class="tk-row-label">Billing</span>
          <span class="tk-row-value">Yearly</span>
        </div>
        <div class="tk-row">
          <span class="tk-row-label">Amount</span>
          <span class="tk-row-value">$299.00</span>
        </div>
        <hr class="tk-divider">
        <div class="tk-row tk-total">
          <span class="tk-row-label">Total Paid</span>
          <span class="tk-row-value">$299.00</span>
        </div>
      </div>
      <div class="tk-actions">
        <a class="tk-btn tk-btn-primary" href="#">Go to Dashboard</a>
        <a class="tk-btn tk-btn-secondary" href="#">View Receipt</a>
      </div>
      <div class="tk-order-num">Order #ORD-2024-8F3A</div>
    </div>
  </div>
</body>
</html>
