<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Scroll-Driven Lens Focus - EaseMotion CSS</title>

    <!-- Link to EaseMotion CSS core -->
    <link rel="stylesheet" href="../../../core/animations.css" />
    <!-- Link to your CSS file -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Branding header -->
    <header class="demo-header">
      <span class="demo-logo">EaseMotion CSS</span>
      <span class="demo-badge">Scroll-Driven Lens Focus</span>
    </header>

    <!-- The scroll tracking container (drives the scroll height) -->
    <div class="scroll-track">
      <!-- Sticky viewport that keeps components centered while scrolling -->
      <div class="sticky-viewport">
        <!-- Tech Grid background layer -->
        <div class="grid-bg"></div>

        <!-- Radial ambient light orb -->
        <div class="ambient-glow"></div>

        <!-- Stylized lens/camera ring in center -->
        <div class="lens-scope">
          <div class="lens-marker marker-tl"></div>
          <div class="lens-marker marker-tr"></div>
          <div class="lens-marker marker-bl"></div>
          <div class="lens-marker marker-br"></div>
        </div>

        <!-- Centered typographic content -->
        <main class="lens-text-container">
          <h1 class="lens-title">Refraction</h1>
          <p class="lens-subtitle">Pure CSS Scroll-Driven Lens Focus</p>
        </main>

        <!-- Scroll instruction indicator -->
        <div class="scroll-indicator">
          <span>Scroll Down</span>
          <div class="mouse-icon"></div>
        </div>

        <!-- Warning fallback notice if scroll timelines are not supported -->
        <div class="support-warning">
          Please use Chrome 115+, Edge 115+, or Safari 17+ to experience the
          pure CSS scroll-driven reveal animation.
        </div>
      </div>
    </div>
  </body>
</html>
