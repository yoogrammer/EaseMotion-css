<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Documentation Search - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo">EaseMotion CSS</div>
      <nav>
        <button id="searchTrigger" class="search-trigger-btn">
          <span>Search documentation...</span>
          <kbd>Ctrl K</kbd>
        </button>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h1>Explore EaseMotion CSS</h1>
        <p>
          Press <kbd>Ctrl</kbd> + <kbd>K</kbd> to open the global command
          palette.
        </p>
      </section>
    </main>

    <div id="searchModal" class="modal-overlay" aria-hidden="true">
      <div class="modal-container">
        <div class="modal-header">
          <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18">
            <path
              fill="currentColor"
              d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
            />
          </svg>
          <input
            type="text"
            id="modalSearchInput"
            placeholder="Search animations, utilities, components..."
            autocomplete="off"
          />
          <button
            id="closeModalBtn"
            class="close-btn"
            aria-label="Close search"
          >
            Esc
          </button>
        </div>

        <div class="modal-body">
          <div id="searchResultsList" class="results-list"></div>
          <div id="noResultsMessage" class="no-results hidden">
            No results found for "<span id="searchQueryText"></span>"
          </div>
        </div>

        <div class="modal-footer">
          <span class="footer-item"><kbd>↑↓</kbd> to navigate</span>
          <span class="footer-item"><kbd>↵</kbd> to select</span>
          <span class="footer-item"><kbd>esc</kbd> to close</span>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
