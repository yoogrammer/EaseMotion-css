<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Squish Background Entrance Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
    }

    .demo-box {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 300px;
    }

    .demo-box h3 { margin: 0 0 1rem; font-size: 1rem; color: #444; }

    .bg-block {
      width: 100%;
      height: 100px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
    }

    p { color: #666; font-size: 0.85rem; margin-top: 0.75rem; }
  </style>
</head>
<body>

  <div class="demo-box">
    <h3>On Load</h3>
    <div class="squish-bg-entrance bg-block" style="background:#6366f1;">
      Background
    </div>
    <p>Squishes into view on page load</p>
  </div>

  <div class="demo-box">
    <h3>On Hover</h3>
    <div class="squish-bg-entrance-hover bg-block" style="background:#10b981;">
      Hover Me
    </div>
    <p>Hover to trigger squish entrance</p>
  </div>

</body>
</html>
