<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Shapes Background – EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="fs-bg" id="fsBg"></div>

  <div class="content">
    <h1>Floating Shapes Background</h1>
    <p>Geometric shapes drift upward with varying speed for a parallax depth effect.</p>

    <div class="controls">
      <button id="toggleShapes">Toggle Shapes</button>
      <button id="regenerateShapes">Regenerate</button>
    </div>
  </div>

  <script>
    const SHAPES = ['circle', 'square', 'triangle'];
    const COLORS = [
      'var(--fs-shape-color-1)',
      'var(--fs-shape-color-2)',
      'var(--fs-shape-color-3)',
    ];

    const bg = document.getElementById('fsBg');
    let enabled = true;

    function getRandom(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createShape() {
      const el = document.createElement('div');
      const shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
      const size = getRandom(
        parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--fs-size-min')) || 20,
        parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--fs-size-max')) || 60
      );

      el.className = `fs-shape fs-shape--${shape}`;
      el.style.width = `${size}px`;
      el.style.height = `${size}px`;
      el.style.left = `${getRandom(0, 100)}%`;
      el.style.bottom = `${getRandom(-10, 110)}%`;
      el.style.background = COLORS[Math.floor(Math.random() * COLORS.length)];
      el.style.animationDuration = `${getRandom(8, 20)}s`;
      el.style.animationDelay = `${getRandom(0, 10)}s`;
      el.style.opacity = getRandom(0.15, 0.5);

      if (shape === 'triangle') {
        el.style.background = 'transparent';
        el.style.width = '0';
        el.style.height = '0';
        el.style.borderLeft = `${size / 2}px solid transparent`;
        el.style.borderRight = `${size / 2}px solid transparent`;
        el.style.borderBottom = `${size}px solid ${COLORS[Math.floor(Math.random() * COLORS.length)]}`;
        el.style.background = 'none';
      }

      return el;
    }

    function populate(count = 18) {
      bg.innerHTML = '';
      for (let i = 0; i < count; i++) {
        bg.appendChild(createShape());
      }
    }

    function setEnabled(state) {
      enabled = state;
      bg.classList.toggle('fs-bg--paused', !enabled);
    }

    populate();

    document.getElementById('toggleShapes').addEventListener('click', () => {
      setEnabled(!enabled);
    });

    document.getElementById('regenerateShapes').addEventListener('click', () => {
      populate();
      setEnabled(true);
    });

    setEnabled(true);
  </script>
</body>
</html>
