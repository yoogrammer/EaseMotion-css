<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Flexbox Truncation Ellipsis Patch</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }

    /* Testing frame to stress test dynamic viewport scaling widths */
    .stress-test-container {
      width: 100%;
      max-width: 380px;
      transition: max-width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 440px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Flexbox Container Sizing Anchor</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Resize the panel envelope width using the control toggles. Declaring <code>min-width: 0</code> allows truncation layers to process without viewport blowout.</p>
  </header>

  <div style="margin-bottom: 2rem; display: flex; gap: 0.5rem;">
    <button onclick="resizeCanvas('280px')" style="background: #1e293b; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: 600;">Compact Mobile Bounds (280px)</button>
    <button onclick="resizeCanvas('380px')" style="background: #6c63ff; border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: 600;">Standard Width Bounds (380px)</button>
  </div>

  <div class="stress-test-container" id="testBoxWrapper">
    
    <div class="alm-profile-card">
      <div class="alm-avatar-block">🔑</div>
      
      <div class="alm-meta-content-item">
        <h3 class="alm-item-name">Cluster Access Vector Key</h3>
        <code class="alm-truncated-token">
          usr_live_pk_8392015a9f23e810cb924157d2301f7c83ba9e1b2046faec72e91b
        </code>
      </div>
    </div>

  </div>

  <script>
    function resizeCanvas(targetSize) {
      document.getElementById('testBoxWrapper').style.maxWidth = targetSize;
    }
  </script>
</body>
</html>
