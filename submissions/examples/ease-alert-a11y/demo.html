<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-alert-a11y — EaseMotion CSS</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
      line-height: 1.6;
    }

    h1 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
    }

    .intro {
      max-width: 42rem;
      color: #94a3b8;
      margin-bottom: 1.5rem;
    }

    .ease-sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
    }

    .controls {
      margin-bottom: 1.5rem;
    }

    .reset-btn {
      padding: 0.6rem 1rem;
      border: none;
      border-radius: 6px;
      background: #6366f1;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }

    .reset-btn:hover {
      background: #4f46e5;
    }

    .reset-btn:focus-visible {
      outline: 2px solid #a5b4fc;
      outline-offset: 2px;
    }

    .alert-stack {
      max-width: 520px;
    }

    .ease-alert p {
      flex: 1;
      margin: 0;
    }
  </style>
</head>
<body>
  <div id="alert-announcer" class="ease-sr-only" aria-live="polite"></div>

  <h1>ease-alert-a11y</h1>
  <p class="intro">
    Accessible alerts with correct ARIA roles, dismissal announcements, and focus management.
  </p>

  <div class="controls">
    <button type="button" class="reset-btn" id="resetBtn">Reset Alerts</button>
  </div>

  <div class="alert-stack" id="alertStack">
    <div class="ease-alert ease-alert-info" role="status" aria-live="polite">
      <span aria-hidden="true">ℹ</span>
      <p>Your profile has been updated.</p>
      <button type="button" class="ease-alert-dismiss" aria-label="Dismiss info alert">✕</button>
    </div>

    <div class="ease-alert ease-alert-success" role="status" aria-live="polite">
      <span aria-hidden="true">✓</span>
      <p>Payment processed successfully.</p>
      <button type="button" class="ease-alert-dismiss" aria-label="Dismiss success alert">✕</button>
    </div>

    <div class="ease-alert ease-alert-warning" role="alert" aria-live="assertive">
      <span aria-hidden="true">⚠</span>
      <p>Your session will expire in 5 minutes.</p>
      <button type="button" class="ease-alert-dismiss" aria-label="Dismiss warning alert">✕</button>
    </div>

    <div class="ease-alert ease-alert-error" role="alert" aria-live="assertive">
      <span aria-hidden="true">✕</span>
      <p>Unable to save changes. Please try again.</p>
      <button type="button" class="ease-alert-dismiss" aria-label="Dismiss error alert">✕</button>
    </div>
  </div>

  <script>
  (function () {
    var announcer = document.getElementById('alert-announcer');
    var alertStack = document.getElementById('alertStack');
    var resetBtn = document.getElementById('resetBtn');

    var alertsTemplate =
      '<div class="ease-alert ease-alert-info" role="status" aria-live="polite">' +
        '<span aria-hidden="true">ℹ</span>' +
        '<p>Your profile has been updated.</p>' +
        '<button type="button" class="ease-alert-dismiss" aria-label="Dismiss info alert">✕</button>' +
      '</div>' +
      '<div class="ease-alert ease-alert-success" role="status" aria-live="polite">' +
        '<span aria-hidden="true">✓</span>' +
        '<p>Payment processed successfully.</p>' +
        '<button type="button" class="ease-alert-dismiss" aria-label="Dismiss success alert">✕</button>' +
      '</div>' +
      '<div class="ease-alert ease-alert-warning" role="alert" aria-live="assertive">' +
        '<span aria-hidden="true">⚠</span>' +
        '<p>Your session will expire in 5 minutes.</p>' +
        '<button type="button" class="ease-alert-dismiss" aria-label="Dismiss warning alert">✕</button>' +
      '</div>' +
      '<div class="ease-alert ease-alert-error" role="alert" aria-live="assertive">' +
        '<span aria-hidden="true">✕</span>' +
        '<p>Unable to save changes. Please try again.</p>' +
        '<button type="button" class="ease-alert-dismiss" aria-label="Dismiss error alert">✕</button>' +
      '</div>';

    function bindDismissButtons() {
      var buttons = alertStack.querySelectorAll('.ease-alert-dismiss');
      buttons.forEach(function (btn) {
        btn.addEventListener('click', function () {
          var alert = btn.closest('.ease-alert');
          if (!alert) return;

          alert.classList.add('ease-alert-exiting');

          function onEnd(event) {
            if (event.animationName !== 'alert-exit' && event.animationName !== '') return;
            alert.removeEventListener('animationend', onEnd);
            announcer.textContent = 'Alert dismissed';
            alert.remove();
            resetBtn.focus();
          }

          alert.addEventListener('animationend', onEnd);

          if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            announcer.textContent = 'Alert dismissed';
            alert.remove();
            resetBtn.focus();
          }
        });
      });
    }

    resetBtn.addEventListener('click', function () {
      alertStack.innerHTML = alertsTemplate;
      bindDismissButtons();
      resetBtn.focus();
    });

    bindDismissButtons();
  })();
  </script>
</body>
</html>
