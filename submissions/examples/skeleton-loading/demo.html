<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skeleton Loading Demo — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="demo-page">

    <header class="demo-header">
      <p class="demo-label">EaseMotion CSS — Loading State</p>
      <h1>Skeleton Loading</h1>
      <p class="demo-description">
        Pure CSS placeholder animations while content loads.
        Two variants: shimmer (moving highlight) and pulse (fade in/out).
      </p>
    </header>

    <div class="demo-grid">

      <!-- ── Shimmer variant ── -->
      <section class="demo-card" aria-label="Shimmer skeleton example">
        <h2 class="demo-card-title">Shimmer</h2>

        <div class="skeleton-card">
          <!-- Image placeholder -->
          <div class="skeleton skeleton-image skeleton-shimmer"></div>

          <div class="skeleton-body">
            <!-- Avatar + name row -->
            <div class="skeleton-row">
              <div class="skeleton skeleton-avatar skeleton-shimmer"></div>
              <div class="skeleton-lines">
                <div class="skeleton skeleton-line skeleton-line--wide skeleton-shimmer"></div>
                <div class="skeleton skeleton-line skeleton-line--narrow skeleton-shimmer"></div>
              </div>
            </div>

            <!-- Text block -->
            <div class="skeleton skeleton-line skeleton-line--full skeleton-shimmer" style="margin-top: 16px;"></div>
            <div class="skeleton skeleton-line skeleton-line--wide skeleton-shimmer"></div>
            <div class="skeleton skeleton-line skeleton-line--medium skeleton-shimmer"></div>
          </div>
        </div>
      </section>

      <!-- ── Pulse variant ── -->
      <section class="demo-card" aria-label="Pulse skeleton example">
        <h2 class="demo-card-title">Pulse</h2>

        <div class="skeleton-card">
          <div class="skeleton skeleton-image skeleton-pulse"></div>

          <div class="skeleton-body">
            <div class="skeleton-row">
              <div class="skeleton skeleton-avatar skeleton-pulse"></div>
              <div class="skeleton-lines">
                <div class="skeleton skeleton-line skeleton-line--wide skeleton-pulse"></div>
                <div class="skeleton skeleton-line skeleton-line--narrow skeleton-pulse"></div>
              </div>
            </div>

            <div class="skeleton skeleton-line skeleton-line--full skeleton-pulse" style="margin-top: 16px;"></div>
            <div class="skeleton skeleton-line skeleton-line--wide skeleton-pulse"></div>
            <div class="skeleton skeleton-line skeleton-line--medium skeleton-pulse"></div>
          </div>
        </div>
      </section>

      <!-- ── List skeleton ── -->
      <section class="demo-card demo-card--wide" aria-label="List skeleton example">
        <h2 class="demo-card-title">List — Shimmer</h2>

        <ul class="skeleton-list" aria-label="Loading list items">
          <li class="skeleton-list-item">
            <div class="skeleton skeleton-avatar skeleton-shimmer"></div>
            <div class="skeleton-lines">
              <div class="skeleton skeleton-line skeleton-line--wide skeleton-shimmer"></div>
              <div class="skeleton skeleton-line skeleton-line--medium skeleton-shimmer"></div>
            </div>
          </li>
          <li class="skeleton-list-item">
            <div class="skeleton skeleton-avatar skeleton-shimmer"></div>
            <div class="skeleton-lines">
              <div class="skeleton skeleton-line skeleton-line--full skeleton-shimmer"></div>
              <div class="skeleton skeleton-line skeleton-line--narrow skeleton-shimmer"></div>
            </div>
          </li>
          <li class="skeleton-list-item">
            <div class="skeleton skeleton-avatar skeleton-shimmer"></div>
            <div class="skeleton-lines">
              <div class="skeleton skeleton-line skeleton-line--medium skeleton-shimmer"></div>
              <div class="skeleton skeleton-line skeleton-line--wide skeleton-shimmer"></div>
            </div>
          </li>
        </ul>
      </section>

    </div>
  </main>

</body>
</html>
