<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Kanban Task Board</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="board">

  <div class="column">
    <h2>📋 To Do</h2>

    <div class="task">
      Design landing page
    </div>

    <div class="task">
      Create onboarding flow
    </div>

    <div class="task">
      Write documentation
    </div>

  </div>

  <div class="column">
    <h2>⚙️ In Progress</h2>

    <div class="task active">
      Build dashboard UI
    </div>

    <div class="task active">
      API integration
    </div>

  </div>

  <div class="column">
    <h2>✅ Done</h2>

    <div class="task done">
      Project setup
    </div>

    <div class="task done">
      Repository configuration
    </div>

  </div>

</div>

</body>
</html>
