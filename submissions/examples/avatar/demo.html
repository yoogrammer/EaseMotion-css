<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avatar — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div style="display: flex; flex-direction: column; align-items: center; gap: 2rem; padding: 2rem;">

    <!-- Size variants -->
    <div style="display: flex; align-items: center; gap: 1rem;">
      <span class="ease-avatar ease-avatar-xs">JD</span>
      <span class="ease-avatar ease-avatar-sm">JD</span>
      <span class="ease-avatar">JD</span>
      <span class="ease-avatar ease-avatar-lg">JD</span>
      <span class="ease-avatar ease-avatar-xl">JD</span>
    </div>

    <!-- With images -->
    <div style="display: flex; align-items: center; gap: 1rem;">
      <span class="ease-avatar ease-avatar-xs">
        <img src="https://i.pravatar.cc/24?img=1" alt="User" />
      </span>
      <span class="ease-avatar ease-avatar-sm">
        <img src="https://i.pravatar.cc/32?img=2" alt="User" />
      </span>
      <span class="ease-avatar">
        <img src="https://i.pravatar.cc/40?img=3" alt="User" />
      </span>
      <span class="ease-avatar ease-avatar-lg">
        <img src="https://i.pravatar.cc/56?img=4" alt="User" />
      </span>
      <span class="ease-avatar ease-avatar-xl">
        <img src="https://i.pravatar.cc/80?img=5" alt="User" />
      </span>
    </div>

    <!-- Status indicators -->
    <div style="display: flex; align-items: center; gap: 1rem;">
      <span class="ease-avatar ease-avatar-online ease-avatar-lg">
        <img src="https://i.pravatar.cc/56?img=6" alt="Online" />
      </span>
      <span class="ease-avatar ease-avatar-offline ease-avatar-lg">
        <img src="https://i.pravatar.cc/56?img=7" alt="Offline" />
      </span>
      <span class="ease-avatar ease-avatar-away ease-avatar-lg">
        <img src="https://i.pravatar.cc/56?img=8" alt="Away" />
      </span>
      <span class="ease-avatar ease-avatar-busy ease-avatar-lg">
        <img src="https://i.pravatar.cc/56?img=9" alt="Busy" />
      </span>
    </div>

    <!-- Avatar group (overlapping) -->
    <div style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
      <span style="color: rgba(255,255,255,0.5); font-size: 0.75rem;">Team members</span>
      <div class="ease-avatar-group">
        <span class="ease-avatar">
          <img src="https://i.pravatar.cc/40?img=10" alt="User" />
        </span>
        <span class="ease-avatar">
          <img src="https://i.pravatar.cc/40?img=11" alt="User" />
        </span>
        <span class="ease-avatar">
          <img src="https://i.pravatar.cc/40?img=12" alt="User" />
        </span>
        <span class="ease-avatar">+3</span>
      </div>
    </div>

  </div>

</body>
</html>
