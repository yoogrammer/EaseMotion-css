<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Neomorphic Particles - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="neomorphic-bg-viewport">
    <div class="neo-particle size-sm position-1 animate-slow"></div>
    <div class="neo-particle size-md position-2 animate-mid"></div>
    <div class="neo-particle size-lg position-3 animate-fast"></div>
    <div class="neo-particle size-sm position-4 animate-mid"></div>
    <div class="neo-particle size-md position-5 animate-slow"></div>
    <div class="neo-particle size-lg position-6 animate-mid"></div>
  </div>

  <main class="presentation-overlay">
    <div class="neo-panel">
      <h1>Ambient Motion-Floating Neomorphic Particles</h1>
      <p>A pure CSS neomorphic backdrop featuring parallax canvas drifting nodes running smoothly at 60fps.</p>
      <div class="neo-divider"></div>
      <span class="badge-status">Status: Active</span>
    </div>
  </main>

</body>
</html>
