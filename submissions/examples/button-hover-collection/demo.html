<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Hover Collection</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Button Hover Collection</h1>
    <p class="subtitle">8 unique CSS-only hover effects</p>

    <div class="grid">
      <div class="card">
        <span class="label">Slide Background</span>
        <button class="btn" data-effect="slide-bg"><span>Hover Me</span></button>
      </div>

      <div class="card">
        <span class="label">Fill from Center</span>
        <button class="btn" data-effect="fill-center"><span>Hover Me</span></button>
      </div>

      <div class="card">
        <span class="label">Border Draw</span>
        <button class="btn" data-effect="border-draw">Hover Me</button>
      </div>

      <div class="card">
        <span class="label">Glow</span>
        <button class="btn" data-effect="glow">Hover Me</button>
      </div>

      <div class="card">
        <span class="label">Underline</span>
        <button class="btn" data-effect="underline">Hover Me</button>
      </div>

      <div class="card">
        <span class="label">Scale</span>
        <button class="btn" data-effect="scale">Hover Me</button>
      </div>

      <div class="card">
        <span class="label">Shadow Lift</span>
        <button class="btn" data-effect="shadow-lift">Hover Me</button>
      </div>

      <div class="card">
        <span class="label">Ripple</span>
        <button class="btn" data-effect="ripple">Hover Me</button>
      </div>
    </div>
  </div>
</body>
</html>
