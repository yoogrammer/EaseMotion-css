<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification Badge - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Notification Badge</h1>
    <p class="desc">Badge with animated count and pulse indicator</p>
    <div class="badge-demo">
      <div class="badge-item">
        <button class="badge-btn" id="bellBtn" style="--badge-count: 3;">
          <span class="bell-icon">🔔</span>
          <span class="badge-num">3</span>
          <span class="badge-dot"></span>
        </button>
        <span class="badge-label">Notifications</span>
      </div>
      <div class="badge-controls">
        <button id="incBtn">+1</button>
        <button id="decBtn">-1</button>
      </div>
    </div>
  </div>
  <script>
    const btn = document.getElementById('bellBtn');
    const badgeNum = btn.querySelector('.badge-num');
    const inc = document.getElementById('incBtn');
    const dec = document.getElementById('decBtn');

    inc.addEventListener('click', () => {
      let count = parseInt(btn.style.getPropertyValue('--badge-count')) || 0;
      count = Math.min(99, count + 1);
      btn.style.setProperty('--badge-count', count);
      badgeNum.textContent = count;
    });

    dec.addEventListener('click', () => {
      let count = parseInt(btn.style.getPropertyValue('--badge-count')) || 0;
      count = Math.max(0, count - 1);
      btn.style.setProperty('--badge-count', count);
      badgeNum.textContent = count > 0 ? count : '';
    });
  </script>
</body>
</html>
