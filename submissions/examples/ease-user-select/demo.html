<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-user-select Demo — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding: 2rem; background: #0f0f0f; font-family: sans-serif; color: white; display: flex; flex-direction: column; gap: 1.5rem; }
    .box { padding: 1rem 1.5rem; border-radius: 8px; background: #1a1a1a; border: 1px solid #2a2a2a; }
    label { font-size: 0.75rem; color: #6b7280; display: block; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
  </style>
</head>
<body>

  <h2>ease-user-select Utilities</h2>

  <div class="box ease-select-none">
    <label>ease-select-none — try to select this text</label>
    This text cannot be selected by the user.
  </div>

  <div class="box ease-select-all">
    <label>ease-select-all — click once to select all</label>
    Click anywhere on this text to select it all at once.
  </div>

  <div class="box ease-select-text">
    <label>ease-select-text — normal selection</label>
    This text behaves with normal browser selection behavior.
  </div>

  <div class="box ease-select-auto">
    <label>ease-select-auto — browser default</label>
    This text uses the browser's default selection behavior.
  </div>

</body>
</html>
