<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Ease Flash Demo</title>

<link
rel="stylesheet"
href="style.css"
>

</head>

<body>

<h1>⚡ Ease Flash Demo</h1>

<p>
Rapid opacity flashing utility for alerts,
notifications, and warning UI.
</p>

<div class="container">

<div class="card">

<h3>Warning Alert</h3>

<div class="alert ease-flash">
SYSTEM WARNING
</div>

</div>

<div class="card">

<h3>Notification Badge</h3>

<div class="badge ease-flash">
NEW MESSAGE
</div>

</div>

<div class="card">

<h3>Status Dot</h3>

<div
class="dot ease-flash-infinite"
aria-label="Flashing status indicator"
role="img">
🟢
</div>

</div>

<div class="card">

<h3>Emergency Button</h3>

<button
class="button ease-flash"
aria-label="Emergency flashing alert button"
>
SOS ALERT
</button>

</div>

</div>

</body>
</html>
