<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Command Palette (CMD+K)</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }
        .content {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            margin-top: 2rem;
            text-align: center;
        }
        h1 {
            margin-bottom: 0.5rem;
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }
        .shortcut-hint {
            margin-top: 1rem;
            color: #64748b;
            font-size: 0.875rem;
        }
        kbd {
            background: #f1f5f9;
            padding: 0.2rem 0.5rem;
            border-radius: 0.25rem;
            font-family: monospace;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <!-- Command Palette Overlay -->
    <div class="ease-command-palette" id="commandPalette">
        <div class="ease-command-overlay" onclick="closePalette()"></div>
        <div class="ease-command-container">
            <div class="ease-command-header">
                <span class="ease-command-icon">⌘</span>
                <input type="text" 
                       class="ease-command-input" 
                       id="commandInput" 
                       placeholder="Search commands..." 
                       autocomplete="off">
                <button class="ease-command-close" onclick="closePalette()">✕</button>
            </div>
            <div class="ease-command-list" id="commandList">
                <div class="ease-command-item" data-command="new-file">
                    <span class="command-icon">📄</span>
                    <span class="command-name">New File</span>
                    <span class="command-shortcut">⌘N</span>
                </div>
                <div class="ease-command-item" data-command="open-file">
                    <span class="command-icon">📂</span>
                    <span class="command-name">Open File</span>
                    <span class="command-shortcut">⌘O</span>
                </div>
                <div class="ease-command-item" data-command="save">
                    <span class="command-icon">💾</span>
                    <span class="command-name">Save</span>
                    <span class="command-shortcut">⌘S</span>
                </div>
                <div class="ease-command-item" data-command="save-as">
                    <span class="command-icon">📋</span>
                    <span class="command-name">Save As</span>
                    <span class="command-shortcut">⌘⇧S</span>
                </div>
                <div class="ease-command-item" data-command="find">
                    <span class="command-icon">🔍</span>
                    <span class="command-name">Find</span>
                    <span class="command-shortcut">⌘F</span>
                </div>
                <div class="ease-command-item" data-command="replace">
                    <span class="command-icon">🔄</span>
                    <span class="command-name">Replace</span>
                    <span class="command-shortcut">⌘H</span>
                </div>
                <div class="ease-command-item" data-command="preferences">
                    <span class="command-icon">⚙️</span>
                    <span class="command-name">Preferences</span>
                    <span class="command-shortcut">⌘,</span>
                </div>
                <div class="ease-command-item" data-command="help">
                    <span class="command-icon">❓</span>
                    <span class="command-name">Help</span>
                    <span class="command-shortcut">F1</span>
                </div>
            </div>
            <div class="ease-command-footer">
                <span>↑ ↓ to navigate</span>
                <span>↵ to select</span>
                <span>⎋ to close</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="content">
        <h1>🎯 EaseMotion Command Palette</h1>
        <p style="margin: 1rem 0;">Press <kbd>⌘</kbd> + <kbd>K</kbd> or <kbd>Ctrl</kbd> + <kbd>K</kbd> to open the command palette</p>
        <button onclick="openPalette()">Open Command Palette</button>
        <div class="shortcut-hint">
            <p>Try searching: "file", "save", "find", "help"</p>
        </div>
    </div>

    <script>
        // Get elements
        const palette = document.getElementById('commandPalette');
        const input = document.getElementById('commandInput');
        const items = document.querySelectorAll('.ease-command-item');
        let selectedIndex = -1;

        // Open palette
        function openPalette() {
            palette.classList.add('active');
            input.value = '';
            filterCommands('');
            input.focus();
            selectedIndex = -1;
            updateSelected();
        }

        // Close palette
        function closePalette() {
            palette.classList.remove('active');
        }

        // Filter commands based on search
        function filterCommands(searchText) {
            const searchLower = searchText.toLowerCase();
            let visibleCount = 0;
            
            items.forEach(item => {
                const commandName = item.querySelector('.command-name').textContent.toLowerCase();
                if (searchText === '' || commandName.includes(searchLower)) {
                    item.style.display = 'flex';
                    visibleCount++;
                } else {
                    item.style.display = 'none';
                }
            });
            
            return visibleCount;
        }

        // Update selected item highlight
        function updateSelected() {
            const visibleItems = Array.from(items).filter(item => item.style.display !== 'none');
            
            visibleItems.forEach((item, index) => {
                if (index === selectedIndex) {
                    item.classList.add('selected');
                } else {
                    item.classList.remove('selected');
                }
            });
        }

        // Execute selected command
        function executeSelected() {
            const visibleItems = Array.from(items).filter(item => item.style.display !== 'none');
            if (selectedIndex >= 0 && selectedIndex < visibleItems.length) {
                const selectedItem = visibleItems[selectedIndex];
                const commandName = selectedItem.querySelector('.command-name').textContent;
                alert(`Executing: ${commandName}`);
                closePalette();
            }
        }

        // Keyboard navigation
        input.addEventListener('keydown', (e) => {
            const visibleItems = Array.from(items).filter(item => item.style.display !== 'none');
            
            switch(e.key) {
                case 'ArrowDown':
                    e.preventDefault();
                    if (selectedIndex < visibleItems.length - 1) {
                        selectedIndex++;
                        updateSelected();
                    }
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    if (selectedIndex > 0) {
                        selectedIndex--;
                        updateSelected();
                    } else if (selectedIndex === -1 && visibleItems.length > 0) {
                        selectedIndex = visibleItems.length - 1;
                        updateSelected();
                    }
                    break;
                case 'Enter':
                    e.preventDefault();
                    executeSelected();
                    break;
                case 'Escape':
                    e.preventDefault();
                    closePalette();
                    break;
            }
        });

        // Search filter
        input.addEventListener('input', (e) => {
            const visibleCount = filterCommands(e.target.value);
            selectedIndex = -1;
            updateSelected();
        });

        // Click on command item
        items.forEach(item => {
            item.addEventListener('click', () => {
                const commandName = item.querySelector('.command-name').textContent;
                alert(`Executing: ${commandName}`);
                closePalette();
            });
        });

        // Keyboard shortcut to open (Cmd+K or Ctrl+K)
        document.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                openPalette();
            }
        });

        // Close on overlay click
        function closePalette() {
            palette.classList.remove('active');
        }
    </script>
</body>
</html>
