<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Status Indicator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ease-status-wrapper">
    <h1>Animated Status Indicator</h1>

    <div class="ease-status-container">
        <div class="ease-status-user">
            <div class="ease-status-avatar">
                <span class="ease-status-indicator ease-status-online"></span>
            </div>
            <p>Online</p>
        </div>

        <div class="ease-status-user">
            <div class="ease-status-avatar">
                <span class="ease-status-indicator ease-status-away"></span>
            </div>
            <p>Away</p>
        </div>

        <div class="ease-status-user">
            <div class="ease-status-avatar">
                <span class="ease-status-indicator ease-status-busy"></span>
            </div>
            <p>Busy</p>
        </div>

        <div class="ease-status-user">
            <div class="ease-status-avatar">
                <span class="ease-status-indicator ease-status-offline"></span>
            </div>
            <p>Offline</p>
        </div>
    </div>
</div>

</body>
</html>
