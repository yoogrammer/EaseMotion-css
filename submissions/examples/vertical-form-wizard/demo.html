<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Vertical Accordion Form Wizard</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 460px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Vertical Accordion Sizing Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Click separate step headers below. Native <code>grid-template-rows</code> transitions expand and collapse sections at 60fps with 0 script lines.</p>
  </header>

  <div class="alm-vertical-wizard-stage">
    
    <input type="radio" id="v-step-1" name="wizardAccordion" class="alm-accordion-radio" checked>
    <input type="radio" id="v-step-2" name="wizardAccordion" class="alm-accordion-radio">
    <input type="radio" id="v-step-3" name="wizardAccordion" class="alm-accordion-radio">

    <div class="alm-accordion-section" id="v-sec-1">
      <label for="v-step-1" class="alm-accordion-header-label">
        <span class="alm-step-indicator-dot">01</span>
        <span class="alm-step-title-text">Profile Registration</span>
      </label>
      
      <div class="alm-accordion-body">
        <div class="alm-accordion-content-inner">
          <div class="alm-form-inner-pad">
            <input type="text" class="alm-wizard-field-input" value="Aryan Raj" readonly style="opacity: 0.5;">
          </div>
        </div>
      </div>
    </div>

    <div class="alm-accordion-section" id="v-sec-2">
      <label for="v-step-2" class="alm-accordion-header-label">
        <span class="alm-step-indicator-dot">02</span>
        <span class="alm-step-title-text">Cluster Routing Configuration</span>
      </label>
      
      <div class="alm-accordion-body">
        <div class="alm-accordion-content-inner">
          <div class="alm-form-inner-pad">
            <input type="text" class="alm-wizard-field-input" value="node_sync_pipeline_delta" readonly style="opacity: 0.5; font-family: monospace;">
          </div>
        </div>
      </div>
    </div>

    <div class="alm-accordion-section" id="v-sec-3">
      <label for="v-step-3" class="alm-accordion-header-label">
        <span class="alm-step-indicator-dot">03</span>
        <span class="alm-step-title-text">Secure Access Tokens</span>
      </label>
      
      <div class="alm-accordion-body">
        <div class="alm-accordion-content-inner">
          <div class="alm-form-inner-pad">
            <div style="background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); padding: 0.75rem; border-radius: 0.5rem; text-align: center; color: #10b981; font-size: 0.75rem; font-weight: 700; font-family: monospace;">
              ✓ DEPLOYMENT_SECURE_READY
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
