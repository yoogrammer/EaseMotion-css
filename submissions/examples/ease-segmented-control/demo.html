<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Segmented Control - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="demo-header">
    <h1>Segmented Control</h1>
    <p>A horizontally connected button group where one option is always selected.</p>
  </header>

  <!-- Default size -->
  <section class="demo-section">
    <h2>Default</h2>
    <div class="ease-segmented-control" role="radiogroup" aria-label="View options">
      <button class="ease-segmented-control__option ease-segmented-control__option--active" role="radio" aria-checked="true">Day</button>
      <button class="ease-segmented-control__option" role="radio" aria-checked="false">Week</button>
      <button class="ease-segmented-control__option" role="radio" aria-checked="false">Month</button>
    </div>
  </section>

  <!-- Small size -->
  <section class="demo-section">
    <h2>Small</h2>
    <div class="ease-segmented-control ease-segmented-control--sm" role="radiogroup" aria-label="Sort options">
      <button class="ease-segmented-control__option ease-segmented-control__option--active" role="radio" aria-checked="true">Popular</button>
      <button class="ease-segmented-control__option" role="radio" aria-checked="false">Recent</button>
      <button class="ease-segmented-control__option" role="radio" aria-checked="false">Trending</button>
    </div>
  </section>

  <!-- Large size -->
  <section class="demo-section">
    <h2>Large</h2>
    <div class="ease-segmented-control ease-segmented-control--lg" role="radiogroup" aria-label="Display options">
      <button class="ease-segmented-control__option ease-segmented-control__option--active" role="radio" aria-checked="true">Grid</button>
      <button class="ease-segmented-control__option" role="radio" aria-checked="false">List</button>
      <button class="ease-segmented-control__option" role="radio" aria-checked="false">Compact</button>
    </div>
  </section>

  <!-- Pill variant -->
  <section class="demo-section">
    <h2>Pills</h2>
    <div class="ease-segmented-control ease-segmented-control--pills" role="radiogroup" aria-label="Alignment options">
      <button class="ease-segmented-control__option ease-segmented-control__option--active" role="radio" aria-checked="true">Left</button>
      <button class="ease-segmented-control__option" role="radio" aria-checked="false">Center</button>
      <button class="ease-segmented-control__option" role="radio" aria-checked="false">Right</button>
    </div>
  </section>

  <!-- Outline variant -->
  <section class="demo-section">
    <h2>Outline</h2>
    <div class="ease-segmented-control ease-segmented-control--outline" role="radiogroup" aria-label="Status options">
      <button class="ease-segmented-control__option ease-segmented-control__option--active" role="radio" aria-checked="true">Active</button>
      <button class="ease-segmented-control__option" role="radio" aria-checked="false">Pending</button>
      <button class="ease-segmented-control__option" role="radio" aria-checked="false">Archived</button>
    </div>
  </section>

  <!-- Auto width -->
  <section class="demo-section">
    <h2>Auto Width</h2>
    <div class="ease-segmented-control ease-segmented-control--auto" role="radiogroup" aria-label="Export options">
      <button class="ease-segmented-control__option ease-segmented-control__option--active" role="radio" aria-checked="true">Export as PNG</button>
      <button class="ease-segmented-control__option" role="radio" aria-checked="false">Export as SVG</button>
      <button class="ease-segmented-control__option" role="radio" aria-checked="false">Export as PDF</button>
    </div>
  </section>

  <!-- With disabled option -->
  <section class="demo-section">
    <h2>With Disabled Option</h2>
    <div class="ease-segmented-control" role="radiogroup" aria-label="Plan options">
      <button class="ease-segmented-control__option ease-segmented-control__option--active" role="radio" aria-checked="true">Free</button>
      <button class="ease-segmented-control__option ease-segmented-control__option--disabled" role="radio" aria-checked="false" disabled>Pro</button>
      <button class="ease-segmented-control__option" role="radio" aria-checked="false">Enterprise</button>
    </div>
  </section>

  <!-- Two options -->
  <section class="demo-section">
    <h2>Two Options</h2>
    <div class="ease-segmented-control" role="radiogroup" aria-label="Toggle options">
      <button class="ease-segmented-control__option ease-segmented-control__option--active" role="radio" aria-checked="true">On</button>
      <button class="ease-segmented-control__option" role="radio" aria-checked="false">Off</button>
    </div>
  </section>

</body>
</html>
