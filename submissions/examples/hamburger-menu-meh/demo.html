<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animated Hamburger Menu</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LIGHT VARIANT -->

<nav class="hamburger-light">

    <div class="logo">
        EaseMotion
    </div>

    <input type="checkbox" id="menu-light">

    <label for="menu-light" class="hamburger-btn">
        <span></span>
        <span></span>
        <span></span>
    </label>

    <div class="menu">

        <a href="#" class="active">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Blog</a>

        <a href="#" class="cta-btn">
            Get Started
        </a>

    </div>

</nav>

<section class="hero">

    <h1>Animated Hamburger Menu</h1>

    <p>
        Pure CSS responsive hamburger menu with
        smooth slide animation.
    </p>

</section>

<!-- DARK VARIANT -->

<div class="demo-label">
    Dark Variant
</div>

<nav class="hamburger-dark">

    <div class="logo">
        EaseMotion
    </div>

    <input type="checkbox" id="menu-dark">

    <label for="menu-dark" class="hamburger-btn">
        <span></span>
        <span></span>
        <span></span>
    </label>

    <div class="menu">

        <a href="#" class="active">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Blog</a>

        <a href="#" class="cta-btn">
            Get Started
        </a>

    </div>

</nav>

</body>
</html>
