<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Text Rendering Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f8fafc; padding: 40px; margin: 0;">

  <div class="typography-reset-canvas">
    <h4>Default Engine Typographic Recovery</h4>
    
    <div class="ease-text-render-auto" style="color: #334155; font-size: 1rem; line-height: 1.6;">
      <p style="margin: 0;">Applying the <code>.ease-text-render-auto</code> configuration token commands the user agent engine to take full control over font drawing. The browser dynamically weighs the performance costs against letter forms to strike a stable painting equilibrium automatically.</p>
    </div>
  </div>

</body>
</html>
