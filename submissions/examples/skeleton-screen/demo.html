<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-skeleton — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      gap: 2rem;
      padding: 2rem;
    }
    h1 { color: #333; }
    .label { font-size: 0.75rem; color: #888; margin-bottom: 0.5rem; text-align: center; }
    .row { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      width: 280px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .card-dark {
      background: #1f2937;
    }
    .flex-row { display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem; }
  </style>
</head>
<body>

  <h1>ease-skeleton Demo</h1>

  <div class="row">

    <div>
      <div class="label">Light card skeleton</div>
      <div class="card">
        <span class="ease-skeleton ease-skeleton-thumb"></span>
        <div class="flex-row" style="margin-top:1rem;">
          <span class="ease-skeleton ease-skeleton-avatar"></span>
          <div style="flex:1;">
            <span class="ease-skeleton ease-skeleton-title"></span>
            <span class="ease-skeleton ease-skeleton-text"></span>
          </div>
        </div>
        <span class="ease-skeleton ease-skeleton-text"></span>
        <span class="ease-skeleton ease-skeleton-text" style="width:70%;"></span>
        <span class="ease-skeleton ease-skeleton-btn" style="margin-top:0.5rem;"></span>
      </div>
    </div>

    <div>
      <div class="label">Dark card skeleton</div>
      <div class="card card-dark">
        <span class="ease-skeleton ease-skeleton-dark ease-skeleton-thumb"></span>
        <div class="flex-row" style="margin-top:1rem;">
          <span class="ease-skeleton ease-skeleton-dark ease-skeleton-avatar"></span>
          <div style="flex:1;">
            <span class="ease-skeleton ease-skeleton-dark ease-skeleton-title"></span>
            <span class="ease-skeleton ease-skeleton-dark ease-skeleton-text"></span>
          </div>
        </div>
        <span class="ease-skeleton ease-skeleton-dark ease-skeleton-text"></span>
        <span class="ease-skeleton ease-skeleton-dark ease-skeleton-text" style="width:70%;"></span>
        <span class="ease-skeleton ease-skeleton-dark ease-skeleton-btn" style="margin-top:0.5rem;"></span>
      </div>
    </div>

  </div>

  <div class="label">Shape variants</div>
  <div class="row" style="align-items:center;">
    <span class="ease-skeleton ease-skeleton-circle" style="width:60px;height:60px;"></span>
    <span class="ease-skeleton ease-skeleton-rect" style="width:120px;height:40px;"></span>
    <span class="ease-skeleton ease-skeleton-rounded" style="width:120px;height:40px;"></span>
  </div>

  <div class="label">Speed variants</div>
  <div class="card" style="width:280px;">
    <span class="ease-skeleton ease-skeleton-text ease-skeleton-fast"></span>
    <span class="ease-skeleton ease-skeleton-text"></span>
    <span class="ease-skeleton ease-skeleton-text ease-skeleton-slow"></span>
  </div>

</body>
</html>
