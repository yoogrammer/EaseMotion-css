<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2FA Verification UI Showcase</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">
  <div class="card">

    <div class="lock-icon">🔐</div>

    <h1>Two-Factor Authentication</h1>

    <p class="subtitle">
      Enter the 6-digit code sent to your registered device.
    </p>

    <div class="device-info">
      Verifying device: <strong>Chrome on Windows</strong>
    </div>

    <div class="otp-wrapper">
      <input type="text" maxlength="1" value="1">
      <input type="text" maxlength="1" value="2">
      <input type="text" maxlength="1" value="3">
      <input type="text" maxlength="1" value="4">
      <input type="text" maxlength="1" value="5">
      <input type="text" maxlength="1" value="6">
    </div>

    <button class="verify-btn">
      Verify Code
    </button>

    <div class="success-box">
      ✓ Verification Successful
    </div>

    <div class="countdown">
      Resend code in <span>00:27</span>
    </div>

    <div class="recovery">
      Recovery codes available if you lose access to your device.
    </div>

  </div>
</div>

</body>
</html>
