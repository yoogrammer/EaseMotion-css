<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS-only Pagination Component - EaseMotion CSS</title>
    <!-- Link to EaseMotion CSS core -->
    <link rel="stylesheet" href="../../../core/animations.css" />
    <!-- Link to your CSS file - do not change this path -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-wrapper">
      <h1>CSS-only Pagination Component</h1>

      <section class="demo-section">
        <h2>Basic Pagination</h2>
        <nav aria-label="Pagination Navigation" class="pagination-nav">
          <ul class="pagination-list">
            <li>
              <a href="#" class="pagination-link pagination-prev">Previous</a>
            </li>
            <li><a href="#" class="pagination-link">1</a></li>
            <li>
              <a
                href="#"
                class="pagination-link pagination-active"
                aria-current="page"
                >2</a
              >
            </li>
            <li><a href="#" class="pagination-link">3</a></li>
            <li>
              <a href="#" class="pagination-link pagination-next">Next</a>
            </li>
          </ul>
        </nav>
      </section>

      <section class="demo-section">
        <h2>Pagination with Disabled State</h2>
        <nav aria-label="Pagination Navigation" class="pagination-nav">
          <ul class="pagination-list">
            <li>
              <span
                class="pagination-link pagination-prev pagination-disabled"
                aria-disabled="true"
                >Previous</span
              >
            </li>
            <li>
              <a
                href="#"
                class="pagination-link pagination-active"
                aria-current="page"
                >1</a
              >
            </li>
            <li><a href="#" class="pagination-link">2</a></li>
            <li><a href="#" class="pagination-link">3</a></li>
            <li>
              <a href="#" class="pagination-link pagination-next">Next</a>
            </li>
          </ul>
        </nav>
      </section>

      <section class="demo-section">
        <h2>Pagination with Ellipsis</h2>
        <nav aria-label="Pagination Navigation" class="pagination-nav">
          <ul class="pagination-list">
            <li>
              <a href="#" class="pagination-link pagination-prev">Prev</a>
            </li>
            <li><a href="#" class="pagination-link">1</a></li>
            <li><span class="pagination-ellipsis">&hellip;</span></li>
            <li><a href="#" class="pagination-link">4</a></li>
            <li>
              <a
                href="#"
                class="pagination-link pagination-active"
                aria-current="page"
                >5</a
              >
            </li>
            <li><a href="#" class="pagination-link">6</a></li>
            <li><span class="pagination-ellipsis">&hellip;</span></li>
            <li><a href="#" class="pagination-link">12</a></li>
            <li>
              <a href="#" class="pagination-link pagination-next">Next</a>
            </li>
          </ul>
        </nav>
      </section>

      <section class="demo-section">
        <h2>Compact Pagination</h2>
        <nav
          aria-label="Pagination Navigation"
          class="pagination-nav pagination-compact"
        >
          <ul class="pagination-list">
            <li>
              <a
                href="#"
                class="pagination-link pagination-prev"
                aria-label="Previous"
                >&larr;</a
              >
            </li>
            <li><span class="pagination-info">Page 5 of 12</span></li>
            <li>
              <a
                href="#"
                class="pagination-link pagination-next"
                aria-label="Next"
                >&rarr;</a
              >
            </li>
          </ul>
        </nav>
      </section>
    </div>
  </body>
</html>
