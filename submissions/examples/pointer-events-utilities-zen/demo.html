<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pointer Events Utilities — Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .demo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; padding: 2rem; max-width: 600px; width: 100%; }
    .card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
    .card h3 { font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; color: #888; margin-bottom: 1rem; }
    .btn { display: inline-block; padding: .6rem 1.2rem; border: none; border-radius: 6px; font-size: .9rem; cursor: pointer; background: #6c63ff; color: #fff; }
    .btn:disabled { opacity: .5; }
    .note { font-size: .8rem; color: #888; margin-top: .75rem; }
    .tag { display: inline-block; margin-top: .75rem; font-family: monospace; font-size: .8rem; color: #666; background: #f0f0f0; padding: .25rem .5rem; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="demo-grid">
    <div class="card">
      <h3>Pointer Events Auto</h3>
      <button class="btn pointer-events-auto" onclick="alert('Clicked!')">Click Me</button>
      <p class="note">Button responds to clicks normally.</p>
      <span class="tag">.pointer-events-auto</span>
    </div>
    <div class="card">
      <h3>Pointer Events None</h3>
      <button class="btn pointer-events-none" onclick="alert('Clicked!')">Can't Click</button>
      <p class="note">Clicks pass through — button does not respond.</p>
      <span class="tag">.pointer-events-none</span>
    </div>
  </div>
</body>
</html>
