<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-btn-outline — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; letter-spacing: 0.05em; }
    .row { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; align-items: center; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .ease-btn { padding: 10px 24px; border-radius: 8px; font-size: 0.95rem; }
  </style>
</head>
<body>
  <h1>ease-btn-outline</h1>
  <div class="section">
    <div class="label">Outline color variants</div>
    <div class="row">
      <button class="ease-btn ease-btn-outline">Primary</button>
      <button class="ease-btn ease-btn-outline-success">Success</button>
      <button class="ease-btn ease-btn-outline-danger">Danger</button>
    </div>
  </div>
  <div class="section">
    <div class="label">Comparison with other variants</div>
    <div class="row">
      <button class="ease-btn ease-btn-primary">Primary</button>
      <button class="ease-btn ease-btn-outline">Outline</button>
      <button class="ease-btn ease-btn-ghost">Ghost</button>
    </div>
  </div>
</body>
</html>
