<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Numeric Stepper Input</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Numeric Stepper</h1>
    <p class="subtitle">Increment / decrement input with smooth animations</p>
    <div class="stepper">
      <button class="stepper-btn" id="decr" aria-label="Decrease">&minus;</button>
      <input class="stepper-input" id="value" type="number" value="0" min="-10" max="10" readonly />
      <button class="stepper-btn" id="incr" aria-label="Increase">+</button>
    </div>
  </div>
  <script>
    const input = document.getElementById("value");
    document.getElementById("decr").addEventListener("click", () => {
      let v = parseInt(input.value) - 1;
      if (v >= parseInt(input.min)) input.value = v;
    });
    document.getElementById("incr").addEventListener("click", () => {
      let v = parseInt(input.value) + 1;
      if (v <= parseInt(input.max)) input.value = v;
    });
  </script>
</body>
</html>
