<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-morph — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-size: 1rem; opacity: 0.5; }
    .row {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }
    .blob {
      width: 140px;
      height: 140px;
    }
    .blob-sm {
      width: 80px;
      height: 80px;
    }
    .label {
      font-size: 0.7rem;
      color: #666;
      text-align: center;
      margin-top: 0.5rem;
    }
    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>

  <h1>ease-morph Demo</h1>

  <div class="row">
    <div class="item">
      <div class="blob ease-morph ease-morph-purple"></div>
      <div class="label">Purple (default)</div>
    </div>
    <div class="item">
      <div class="blob ease-morph ease-morph-ocean"></div>
      <div class="label">Ocean</div>
    </div>
    <div class="item">
      <div class="blob ease-morph ease-morph-sunset"></div>
      <div class="label">Sunset</div>
    </div>
    <div class="item">
      <div class="blob ease-morph ease-morph-forest"></div>
      <div class="label">Forest</div>
    </div>
  </div>

  <div class="row">
    <div class="item">
      <div class="blob-sm ease-morph ease-morph-purple ease-morph-fast"></div>
      <div class="label">Fast (3s)</div>
    </div>
    <div class="item">
      <div class="blob-sm ease-morph ease-morph-ocean"></div>
      <div class="label">Default (6s)</div>
    </div>
    <div class="item">
      <div class="blob-sm ease-morph ease-morph-sunset ease-morph-slow"></div>
      <div class="label">Slow (12s)</div>
    </div>
    <div class="item">
      <div class="blob-sm ease-morph ease-morph-forest ease-morph-pause"></div>
      <div class="label">Hover to pause</div>
    </div>
  </div>

</body>
</html>
