<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Quadrant Image Zoom Deck</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 440px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Compositor Panning Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Move your cursor over separate sections of the showcase image. Sibling grid overlay hooks shift transformation origins at 60fps with 0 scripts.</p>
  </header>

  <div class="alm-zoom-showcase-card">
    
    <div class="alm-zoom-viewport-stage">
      
      <div class="alm-zoom-grid-overlay">
        <div class="alm-zoom-quadrant-trigger alm-zoom-trigger-tl" title="Zoom Top-Left"></div>
        <div class="alm-zoom-quadrant-trigger alm-zoom-trigger-tr" title="Zoom Top-Right"></div>
        <div class="alm-zoom-quadrant-trigger alm-zoom-trigger-bl" title="Zoom Bottom-Left"></div>
        <div class="alm-zoom-quadrant-trigger alm-zoom-trigger-br" title="Zoom Bottom-Right"></div>
        
        <img class="alm-zoom-target-image" 
             src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=600&q=80" 
             alt="Vector Synth Fluid Canvas Placeholder">
      </div>

    </div>

    <div class="alm-showcase-meta-block">
      <h3 class="alm-showcase-asset-title">Neural Mesh Geometry</h3>
      <p class="alm-showcase-asset-desc">Hover card quadrants to evaluate fluid multi-directional magnification transitions.</p>
    </div>

  </div>

</body>
</html>
