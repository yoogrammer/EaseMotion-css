<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animation Play State Utilities — Demo</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #0f172a; color: #e2e8f0; }
    h1   { margin-bottom: 0.5rem; }
    p    { color: #94a3b8; margin-bottom: 2rem; }
    .demo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; }
    .demo-card { background: #1e293b; border-radius: 1rem; padding: 2rem; text-align: center; }
    .demo-card h3 { margin: 0 0 0.5rem; font-size: 0.9rem; color: #7dd3fc; }
    .box {
      width: 60px; height: 60px; margin: 1rem auto;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <h1>⏯ Animation Play State Utilities</h1>
  <p>Control looping animation playback with a single class — no custom CSS needed.</p>

  <div class="demo-grid">
    <!-- Paused from the start -->
    <div class="demo-card">
      <h3>.pause-animation</h3>
      <div class="box ease-bounce pause-animation"></div>
      <small>Bounce starts paused</small>
    </div>

    <!-- Explicitly running -->
    <div class="demo-card">
      <h3>.resume-animation</h3>
      <div class="box ease-pulse resume-animation"></div>
      <small>Pulse is always running</small>
    </div>

    <!-- Pause on hover -->
    <div class="demo-card">
      <h3>.pause-on-hover</h3>
      <div class="box ease-rotate pause-on-hover"></div>
      <small>Hover to pause rotation</small>
    </div>
  </div>
</body>
</html>
