<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi Step Form Validation Summary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="summary-shell">
    <section class="summary-card" aria-labelledby="summary-title">
      <div class="summary-heading">
        <p class="eyebrow">Application form</p>
        <h1 id="summary-title">Review required fields</h1>
      </div>

      <nav class="validation-summary" aria-label="Form section validation">
        <a class="summary-step is-complete" href="#">
          <span class="step-number">1</span>
          <span><strong>Profile</strong><small>Complete</small></span>
        </a>
        <a class="summary-step has-warning" href="#">
          <span class="step-number">2</span>
          <span><strong>Billing</strong><small>Review tax ID</small></span>
        </a>
        <a class="summary-step has-error" href="#">
          <span class="step-number">3</span>
          <span><strong>Security</strong><small>2 fields missing</small></span>
        </a>
        <a class="summary-step is-current" href="#">
          <span class="step-number">4</span>
          <span><strong>Confirm</strong><small>Current step</small></span>
        </a>
      </nav>
    </section>
  </main>
</body>
</html>
