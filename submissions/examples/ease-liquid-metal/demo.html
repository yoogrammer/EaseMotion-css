<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ease-liquid-metal demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #1a1a1a; gap: 2rem; flex-wrap: wrap; }
    .badge {
      padding: 0.75rem 2rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="badge ease-liquid-metal">Silver</div>
  <div class="badge ease-liquid-metal ease-liquid-metal--gold" style="color:#4a3000">Gold</div>
  <div class="badge ease-liquid-metal ease-liquid-metal--copper" style="color:#3a1500">Copper</div>
</body>
</html>
