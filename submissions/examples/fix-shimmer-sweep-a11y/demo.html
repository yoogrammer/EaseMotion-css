<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fix Shimmer Sweep Accessibility</title>
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-neutral-900 ease-color-neutral-100" style="padding: 2rem; font-family: sans-serif;">
  <h1 class="ease-text-3xl ease-font-bold ease-mb-6">Fix for .ease-shimmer-sweep</h1>
  <p class="ease-mb-4">This demonstrates the fix for the infinite shimmer sweep animation that freezes browsers under prefers-reduced-motion: reduce.</p>
  
  <div class="ease-shimmer-sweep ease-p-8 ease-rounded-xl" style="border: 1px solid #333;">
    <h2 class="ease-text-xl ease-font-bold">Fixed Shimmer Element</h2>
    <p>If you enable prefers-reduced-motion, this animation will run once and stop, instead of spinning infinitely at 0.01ms.</p>
  </div>
</body>
</html>
