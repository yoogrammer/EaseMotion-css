<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms Design Tokens — EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--ease-color-bg, #f8fafc);
            margin: 0;
            padding: 4rem 1.5rem;
            font-family: var(--ease-font-sans, system-ui, sans-serif);
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .theme-switcher {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            background: #fff;
            padding: 1rem;
            border-radius: var(--ease-radius-md);
            box-shadow: var(--ease-shadow-sm);
        }
        .theme-btn {
            padding: 0.5rem 1rem;
            cursor: pointer;
            border: 1px solid var(--ease-color-neutral-300);
            border-radius: var(--ease-radius-sm);
            background: #fff;
        }
        .theme-btn.active {
            background: var(--ease-color-primary);
            color: #fff;
            border-color: var(--ease-color-primary);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Forms Design Tokens</h1>
        <p style="color: var(--ease-color-muted); margin-bottom: 3rem;">Testing token-based border-radius consistency across form controls.</p>

        <!-- Theme Switcher (Visual Demo) -->
        <div class="theme-switcher">
            <span style="font-weight: 600; align-self: center;">Override Radius:</span>
            <button class="theme-btn active" onclick="setRadius('0.5rem', this)">Default (0.5rem)</button>
            <button class="theme-btn" onclick="setRadius('0', this)">Sharp (0)</button>
            <button class="theme-btn" onclick="setRadius('1.5rem', this)">Round (1.5rem)</button>
        </div>

        <div class="demo-group">
            <span class="demo-title">Standard Inputs</span>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <input type="text" class="ease-input" placeholder="Standard input">
                <input type="text" class="ease-input ease-input-pill" placeholder="Pill variant">
            </div>
        </div>

        <div class="demo-group">
            <span class="demo-title">Size Variants</span>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <input type="text" class="ease-input ease-input-sm" placeholder="Small input">
                <input type="text" class="ease-input ease-input-lg" placeholder="Large input">
            </div>
        </div>

        <div class="demo-group">
            <span class="demo-title">Other Controls</span>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <textarea class="ease-textarea" placeholder="Textarea..."></textarea>
                <select class="ease-select">
                    <option>Select Option</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        function setRadius(val, btn) {
            document.documentElement.style.setProperty('--ease-radius-md', val);
            document.documentElement.style.setProperty('--ease-radius-sm', 'calc(' + val + ' / 2)');
            document.documentElement.style.setProperty('--ease-radius-lg', 'calc(' + val + ' * 2)');
            
            // UI state
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
