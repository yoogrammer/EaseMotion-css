<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-fade-icon-exit — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; letter-spacing: 0.05em; }
    .row { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; align-items: center; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .icon {
      font-size: 3rem;
      display: inline-block;
    }
    .icon-container {
      display: flex; flex-direction: column; align-items: center;
      gap: 0.5rem;
    }
    .icon-label { font-size: 0.75rem; color: #666; }
    .reload {
      margin-top: 2rem; padding: 8px 20px; border-radius: 8px;
      border: 1px solid #333; background: transparent;
      color: #888; cursor: pointer; font-size: 0.8rem;
    }
    .reload:hover { border-color: #666; color: #fff; }
  </style>
</head>
<body>
  <h1>ease-fade-icon-exit</h1>
  <div class="section">
    <div class="label">Exit animation (plays on load)</div>
    <div class="row">
      <div class="icon-container">
        <span class="icon ease-fade-icon-exit">🔔</span>
        <span class="icon-label">Bell</span>
      </div>
      <div class="icon-container">
        <span class="icon ease-fade-icon-exit">⭐</span>
        <span class="icon-label">Star</span>
      </div>
      <div class="icon-container">
        <span class="icon ease-fade-icon-exit">❤️</span>
        <span class="icon-label">Heart</span>
      </div>
    </div>
  </div>
  <button class="reload" onclick="location.reload()">↺ Replay</button>
</body>
</html>
