<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Counter Tool</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Word Counter Tool</h1>
    <p>Type or paste your text below to see real-time statistics.</p>
    <textarea id="text-input" placeholder="Start typing or paste your text here..." rows="10"></textarea>
    <div class="stats">
      <div class="stat"><span class="stat-value" id="word-count">0</span><span class="stat-label">Words</span></div>
      <div class="stat"><span class="stat-value" id="char-count">0</span><span class="stat-label">Characters</span></div>
      <div class="stat"><span class="stat-value" id="sentence-count">0</span><span class="stat-label">Sentences</span></div>
      <div class="stat"><span class="stat-value" id="para-count">0</span><span class="stat-label">Paragraphs</span></div>
    </div>
  </div>
  <script>
    const input = document.getElementById("text-input");
    const wordEl = document.getElementById("word-count");
    const charEl = document.getElementById("char-count");
    const sentenceEl = document.getElementById("sentence-count");
    const paraEl = document.getElementById("para-count");

    input.addEventListener("input", function() {
      const text = input.value;
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      const chars = text.length;
      const sentences = text.trim() ? text.split(/[.!?]+/).filter(s => s.trim()).length : 0;
      const paras = text.trim() ? text.split(/\n\s*\n/).filter(p => p.trim()).length : 0;
      wordEl.textContent = words;
      charEl.textContent = chars;
      sentenceEl.textContent = sentences;
      paraEl.textContent = paras;
    });
  </script>
</body>
</html>
