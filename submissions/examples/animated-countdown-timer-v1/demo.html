<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Countdown Timer</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f1f5f9; flex-direction: column;">
    <div class="ct-card">
      <div class="ct-display" id="ctDisplay">10</div>
      <div class="ct-controls">
        <button class="ct-btn" id="ctStart">Start</button>
        <button class="ct-btn" id="ctReset">Reset</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
