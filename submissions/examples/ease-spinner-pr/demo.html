<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-spinner-pr Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 4rem 2rem;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }
    
    .demo-section h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #1e293b;
    }
    
    .spinners-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      align-items: center;
    }
    
    .spinner-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    
    .spinner-label {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .dark-bg {
      background: #1e293b;
      padding: 2rem;
      border-radius: 0.75rem;
    }
  </style>
</head>
<body>

  <div class="demo-section">
    <h2>Size Variants</h2>
    <div class="spinners-grid">
      <div class="spinner-group">
        <span class="spinner-label">Small</span>
        <span class="spinner-pr spinner-pr-sm"></span>
      </div>
      <div class="spinner-group">
        <span class="spinner-label">Medium</span>
        <span class="spinner-pr spinner-pr-md"></span>
      </div>
      <div class="spinner-group">
        <span class="spinner-label">Default</span>
        <span class="spinner-pr"></span>
      </div>
      <div class="spinner-group">
        <span class="spinner-label">Large</span>
        <span class="spinner-pr spinner-pr-lg"></span>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <h2>Color Variants</h2>
    <div class="spinners-grid">
      <div class="spinner-group">
        <span class="spinner-label">Primary</span>
        <span class="spinner-pr spinner-pr-md"></span>
      </div>
      <div class="spinner-group">
        <span class="spinner-label">Success</span>
        <span class="spinner-pr spinner-pr-md spinner-pr-success"></span>
      </div>
      <div class="spinner-group">
        <span class="spinner-label">Warning</span>
        <span class="spinner-pr spinner-pr-md spinner-pr-warning"></span>
      </div>
      <div class="spinner-group">
        <span class="spinner-label">Error</span>
        <span class="spinner-pr spinner-pr-md spinner-pr-error"></span>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <h2>With Percentage Label</h2>
    <div class="spinners-grid">
      <div class="spinner-group">
        <span class="spinner-label">Loading</span>
        <div class="spinner-pr-wrapper">
          <span class="spinner-pr spinner-pr-lg"></span>
          <span class="spinner-pr-label">75%</span>
        </div>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <h2>Light Variant (Dark Background)</h2>
    <div class="dark-bg">
      <div class="spinners-grid">
        <div class="spinner-group">
          <span class="spinner-label" style="color: #94a3b8;">Light</span>
          <span class="spinner-pr spinner-pr-md spinner-pr-light"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <h2>Inline with Text</h2>
    <div class="spinner-pr-inline">
      <span class="spinner-pr spinner-pr-sm"></span>
      <span class="spinner-pr-inline-text">Loading your data...</span>
    </div>
  </div>

</body>
</html>
