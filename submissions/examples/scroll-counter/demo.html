<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Counter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="hero">
    <h1>Scroll Down</h1>
    <p>
      Counter animations activate when statistics enter the viewport.
    </p>
  </section>

  <section class="counter-section">

    <h2>Trusted By Teams Worldwide</h2>

    <div class="counter-grid">

      <article
        class="ease-counter ease-counter--slow"
        data-target="250"
        data-suffix="K"
      >
        <div class="counter-value">250K</div>
        <p>Monthly Users</p>
      </article>

      <article
        class="ease-counter ease-counter--normal"
        data-target="98"
        data-suffix="%"
      >
        <div class="counter-value">98%</div>
        <p>Customer Satisfaction</p>
      </article>

      <article
        class="ease-counter ease-counter--fast"
        data-target="12"
        data-suffix="M"
      >
        <div class="counter-value">12M</div>
        <p>API Requests</p>
      </article>

      <article
        class="ease-counter ease-counter--normal"
        data-target="450"
        data-prefix="$"
        data-suffix="K"
      >
        <div class="counter-value">$450K</div>
        <p>Revenue Generated</p>
      </article>

    </div>

  </section>

  <script>
    const counters =
      document.querySelectorAll(".ease-counter");

    const reducedMotion =
      window.matchMedia(
        "(prefers-reduced-motion: reduce)"
      ).matches;

    function animateCounter(counter) {

      const value =
        counter.querySelector(".counter-value");

      const target =
        Number(counter.dataset.target);

      const prefix =
        counter.dataset.prefix || "";

      const suffix =
        counter.dataset.suffix || "";

      let duration = 2000;

      if (
        counter.classList.contains(
          "ease-counter--slow"
        )
      ) duration = 3000;

      if (
        counter.classList.contains(
          "ease-counter--fast"
        )
      ) duration = 1200;

      if (reducedMotion) {
        value.textContent =
          prefix + target + suffix;
        return;
      }

      let start = 0;

      const startTime = performance.now();

      function update(now) {

        const progress =
          Math.min(
            (now - startTime) / duration,
            1
          );

        const eased =
          1 - Math.pow(1 - progress, 3);

        const current =
          Math.floor(target * eased);

        value.textContent =
          prefix + current + suffix;

        if (progress < 1) {
          requestAnimationFrame(update);
        }
      }

      requestAnimationFrame(update);
    }

    const observer =
      new IntersectionObserver(
        entries => {

          entries.forEach(entry => {

            if (entry.isIntersecting) {

              entry.target.classList.add(
                "is-visible"
              );

              animateCounter(
                entry.target
              );

              observer.unobserve(
                entry.target
              );
            }

          });

        },
        {
          threshold: 0.4
        }
      );

    counters.forEach(counter => {
      observer.observe(counter);
    });
  </script>

</body>
</html>
