<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parallax Tilt Showcase – EaseMotion CSS</title>
  <meta name="description" content="3D perspective tilt card with parallax layers on mouse move." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Parallax Tilt Showcase</h1>
  <p>Move your cursor over the card</p>

  <div class="tilt-scene" id="tiltScene">
    <div class="tilt-card" id="tiltCard">
      <div class="tilt-layer tilt-layer--bg" data-depth="0.02"></div>
      <div class="tilt-layer tilt-layer--glow" data-depth="0.04"></div>
      <div class="tilt-content" data-depth="0.06">
        <span class="tag">Featured</span>
        <h2>EaseMotion</h2>
        <p>Animation-first CSS utilities for the modern web.</p>
      </div>
      <div class="tilt-shine" id="tiltShine"></div>
    </div>
  </div>

  <script>
    const scene = document.getElementById('tiltScene');
    const card = document.getElementById('tiltCard');
    const shine = document.getElementById('tiltShine');

    scene.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;
      card.style.transform = `rotateY(${x * 20}deg) rotateX(${-y * 20}deg)`;
      shine.style.background = `radial-gradient(circle at ${(x + 0.5) * 100}% ${(y + 0.5) * 100}%, rgba(255,255,255,0.25), transparent 60%)`;
      card.querySelectorAll('[data-depth]').forEach(el => {
        const d = parseFloat(el.dataset.depth);
        el.style.transform = `translateZ(${d * 100}px) translate(${x * d * 80}px, ${y * d * 80}px)`;
      });
    });

    scene.addEventListener('mouseleave', () => {
      card.style.transform = '';
      shine.style.background = '';
      card.querySelectorAll('[data-depth]').forEach(el => { el.style.transform = ''; });
    });
  </script>
</body>
</html>
