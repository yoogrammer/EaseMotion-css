<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Magnetic Button Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: Inter, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      min-height: 100vh;
      background: #f8fafc;
      padding: 2rem;
    }
    h2 { color: #7c3aed; }
    .row {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>

  <h2>Magnetic Button</h2>
  <p style="color:#64748b">Hover over buttons to see the magnetic effect</p>

  <div class="row">
    <button class="ease-magnetic-btn">Hover Me</button>
    <button class="ease-magnetic-btn ease-magnetic-btn-outline">Outline</button>
    <button class="ease-magnetic-btn ease-magnetic-btn-pill">Pill Shape</button>
  </div>

  <script>
    document.querySelectorAll('.ease-magnetic-btn').forEach(btn => {
      btn.addEventListener('mousemove', (e) => {
        const rect = btn.getBoundingClientRect();
        const x = e.clientX - rect.left - rect.width / 2;
        const y = e.clientY - rect.top - rect.height / 2;
        btn.style.transform =
          `translate(${x * 0.3}px, ${y * 0.3}px)`;
      });

      btn.addEventListener('mouseleave', () => {
        btn.style.transform = 'translate(0, 0)';
      });
    });
  </script>

</body>
</html>
