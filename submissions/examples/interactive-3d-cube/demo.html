<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive 3D Cube - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Interactive 3D Cube</h1>
    <div class="cube-scene">
      <div class="cube" id="cube">
        <div class="cube-face front">Front</div>
        <div class="cube-face back">Back</div>
        <div class="cube-face right">Right</div>
        <div class="cube-face left">Left</div>
        <div class="cube-face top">Top</div>
        <div class="cube-face bottom">Bottom</div>
      </div>
    </div>
    <p class="description">A CSS 3D cube that rotates based on mouse position. Move your mouse to control it.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
