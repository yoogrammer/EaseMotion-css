<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinetic Cinema Anamorphic Marquee - Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="marquee-header">
    <h1>Kinetic Cinema Anamorphic Marquee</h1>
    <p>A pure CSS horizontal ticker wrapped smoothly into a pseudo-3D cylindrical projection field.</p>
  </div>

  <div class="ease-marquee-viewport">
    <div class="ease-marquee-track">
      
      <span class="ease-marquee-item">EASEMOTION CSS</span>
      <span class="ease-marquee-dot"></span>
      <span class="ease-marquee-item">ANIMATION FOR HUMANS</span>
      <span class="ease-marquee-dot"></span>
      <span class="ease-marquee-item">COMPOSITOR DRIVEN</span>
      <span class="ease-marquee-dot"></span>
      <span class="ease-marquee-item">ZERO JAVASCRIPT</span>
      <span class="ease-marquee-dot"></span>

      <span class="ease-marquee-item">EASEMOTION CSS</span>
      <span class="ease-marquee-dot"></span>
      <span class="ease-marquee-item">ANIMATION FOR HUMANS</span>
      <span class="ease-marquee-dot"></span>
      <span class="ease-marquee-item">COMPOSITOR DRIVEN</span>
      <span class="ease-marquee-dot"></span>
      <span class="ease-marquee-item">ZERO JAVASCRIPT</span>
      <span class="ease-marquee-dot"></span>

    </div>
  </div>

</body>
</html>
