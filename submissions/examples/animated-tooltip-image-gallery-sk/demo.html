<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Tooltip Image Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="gallery">
    <div class="gallery-item" style="--hue: 0;">
      <div class="gallery-img" style="background: linear-gradient(135deg, #ff6b6b, #ee5a24);"></div>
      <div class="tooltip">Sunset Vibes</div>
    </div>
    <div class="gallery-item" style="--hue: 120;">
      <div class="gallery-img" style="background: linear-gradient(135deg, #26de81, #20bf6b);"></div>
      <div class="tooltip">Forest Walk</div>
    </div>
    <div class="gallery-item" style="--hue: 240;">
      <div class="gallery-img" style="background: linear-gradient(135deg, #45aaf2, #2d98da);"></div>
      <div class="tooltip">Ocean Depth</div>
    </div>
    <div class="gallery-item" style="--hue: 300;">
      <div class="gallery-img" style="background: linear-gradient(135deg, #a55eea, #8854d0);"></div>
      <div class="tooltip">Night Sky</div>
    </div>
  </div>
</body>
</html>
