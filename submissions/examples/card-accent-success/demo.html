<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-card-accent-success — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; letter-spacing: 0.05em; }
    .row { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .ease-card {
      width: 240px; padding: 1.25rem;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
    }
    .ease-card h3 { margin: 0 0 0.25rem; font-size: 1rem; }
    .ease-card p { margin: 0; color: #888; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>ease-card-accent-success</h1>
  <div class="section">
    <div class="label">Semantic accent card variants</div>
    <div class="row">
      <div class="ease-card ease-card-accent-success">
        <h3>✓ Success</h3>
        <p>Operation completed successfully</p>
      </div>
      <div class="ease-card ease-card-accent-danger">
        <h3>✗ Error</h3>
        <p>Something went wrong</p>
      </div>
      <div class="ease-card ease-card-accent-warning">
        <h3>⚠ Warning</h3>
        <p>Please review before proceeding</p>
      </div>
    </div>
  </div>
</body>
</html>
