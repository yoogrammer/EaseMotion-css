<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Toggle Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Ease Toggle Component</h1>

    <div class="demo-section">

        <h3>Default</h3>
        <input type="checkbox" id="toggle-default" class="ease-toggle">
        <label for="toggle-default"></label>

        <h3>Success</h3>
        <input type="checkbox" id="toggle-success" class="ease-toggle success">
        <label for="toggle-success"></label>

        <h3>Danger</h3>
        <input type="checkbox" id="toggle-danger" class="ease-toggle danger">
        <label for="toggle-danger"></label>

        <h3>Warning</h3>
        <input type="checkbox" id="toggle-warning" class="ease-toggle warning">
        <label for="toggle-warning"></label>

    </div>

</body>
</html>
