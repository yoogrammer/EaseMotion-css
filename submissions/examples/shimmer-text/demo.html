<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-shimmer-text — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { margin: 0; }
    .demo-heading { font-size: 3rem; font-weight: 800; margin: 0; }
    .demo-sub { font-size: 1.5rem; font-weight: 600; margin: 0; }
    .demo-body { font-size: 1.1rem; max-width: 600px; text-align: center; line-height: 1.6; color: #ccc; }
    .row { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .card {
      width: 220px; padding: 1.5rem; border-radius: 12px;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      text-align: center;
    }
    .card h3 { margin: 0 0 0.5rem; font-size: 1.4rem; }
    .card p { margin: 0; color: #888; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="section">
    <div class="label">Hero heading</div>
    <h1 class="demo-heading ease-shimmer-text">Premium Collection</h1>
    <p class="demo-sub ease-shimmer-text ease-shimmer-text-slow" style="color:transparent;">Limited Edition 2026</p>
  </div>
  <div class="section">
    <div class="label">Speed &amp; color variants</div>
    <div class="row">
      <div class="card">
        <h3 class="ease-shimmer-text ease-shimmer-text-fast" style="color:transparent;">Fast</h3>
        <p>1.5s animation cycle</p>
      </div>
      <div class="card">
        <h3 class="ease-shimmer-text" style="color:transparent;">Normal</h3>
        <p>3s animation cycle</p>
      </div>
      <div class="card">
        <h3 class="ease-shimmer-text ease-shimmer-text-slow" style="color:transparent;">Slow</h3>
        <p>6s animation cycle</p>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="label">Color schemes</div>
    <div class="row">
      <div class="card">
        <h3 class="ease-shimmer-text" style="color:transparent;">Default</h3>
      </div>
      <div class="card">
        <h3 class="ease-shimmer-text-primary" style="color:transparent;">Primary</h3>
      </div>
      <div class="card">
        <h3 class="ease-shimmer-text-success" style="color:transparent;">Success</h3>
      </div>
    </div>
  </div>
</body>
</html>
