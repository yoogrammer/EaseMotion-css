<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animated Skill Bars Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: Inter, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      min-height: 100vh;
      background: #f8fafc;
      padding: 2rem;
    }
    h2 { color: #7c3aed; }
    .demo-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 1.75rem 2rem;
      width: 100%;
      max-width: 480px;
    }
    .demo-card h3 {
      margin: 0 0 1.25rem;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <h2>Animated Skill Bars</h2>

  <!-- Default -->
  <div class="demo-card">
    <h3>Default</h3>

    <div class="ease-skill">
      <div class="ease-skill-header">
        <span class="ease-skill-label">HTML & CSS</span>
        <span class="ease-skill-percent">95%</span>
      </div>
      <div class="ease-skill-track">
        <div class="ease-skill-bar" style="--skill-width:95%; animation-name:ease-skill-fill; width:95%"></div>
      </div>
    </div>

    <div class="ease-skill">
      <div class="ease-skill-header">
        <span class="ease-skill-label">JavaScript</span>
        <span class="ease-skill-percent">85%</span>
      </div>
      <div class="ease-skill-track">
        <div class="ease-skill-bar" style="--skill-color:#06b6d4; width:85%"></div>
      </div>
    </div>

    <div class="ease-skill">
      <div class="ease-skill-header">
        <span class="ease-skill-label">React</span>
        <span class="ease-skill-percent">78%</span>
      </div>
      <div class="ease-skill-track">
        <div class="ease-skill-bar" style="--skill-color:#10b981; width:78%"></div>
      </div>
    </div>

    <div class="ease-skill">
      <div class="ease-skill-header">
        <span class="ease-skill-label">Node.js</span>
        <span class="ease-skill-percent">70%</span>
      </div>
      <div class="ease-skill-track">
        <div class="ease-skill-bar" style="--skill-color:#f97316; width:70%"></div>
      </div>
    </div>

    <div class="ease-skill">
      <div class="ease-skill-header">
        <span class="ease-skill-label">Python</span>
        <span class="ease-skill-percent">60%</span>
      </div>
      <div class="ease-skill-track">
        <div class="ease-skill-bar" style="--skill-color:#ef4444; width:60%"></div>
      </div>
    </div>
  </div>

  <!-- Striped -->
  <div class="demo-card ease-skill-striped">
    <h3>Striped Variant</h3>
    <div class="ease-skill">
      <div class="ease-skill-header">
        <span class="ease-skill-label">Figma</span>
        <span class="ease-skill-percent">90%</span>
      </div>
      <div class="ease-skill-track">
        <div class="ease-skill-bar" style="width:90%"></div>
      </div>
    </div>
    <div class="ease-skill">
      <div class="ease-skill-header">
        <span class="ease-skill-label">Tailwind CSS</span>
        <span class="ease-skill-percent">82%</span>
      </div>
      <div class="ease-skill-track">
        <div class="ease-skill-bar" style="--skill-color:#06b6d4; width:82%"></div>
      </div>
    </div>
  </div>

</body>
</html>
