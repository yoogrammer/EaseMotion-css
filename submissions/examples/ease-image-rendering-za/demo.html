<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-image-rendering-za</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      [data-ease-demo-za] {
        font-family: system-ui, sans-serif;
        max-width: 500px;
        margin: 2rem auto;
        padding: 1.5rem;
      }
      img {
        width: 200px;
        height: 200px;
        margin: 0.5rem;
        border: 1px solid #e2e8f0;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div data-ease-demo-za>
      <h1>ease-image-rendering-za</h1>
      <p><strong>auto:</strong> smooth scaling (default)</p>
      <img
        src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='2' height='2' fill='%236c63ff'/%3E%3Crect x='2' y='2' width='2' height='2' fill='%23f59e0b'/%3E%3Crect x='4' y='4' width='2' height='2' fill='%2310b981'/%3E%3Crect x='6' y='6' width='2' height='2' fill='%23ef4444'/%3E%3C/svg%3E"
        alt=""
        class="ease-image-rendering-auto-za"
      />
      <p><strong>pixelated:</strong> nearest-neighbor scaling</p>
      <img
        src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='2' height='2' fill='%236c63ff'/%3E%3Crect x='2' y='2' width='2' height='2' fill='%23f59e0b'/%3E%3Crect x='4' y='4' width='2' height='2' fill='%2310b981'/%3E%3Crect x='6' y='6' width='2' height='2' fill='%23ef4444'/%3E%3C/svg%3E"
        alt=""
        class="ease-image-rendering-pixelated-za"
      />
    </div>
  </body>
</html>
