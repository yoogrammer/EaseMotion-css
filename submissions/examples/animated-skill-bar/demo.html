<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Animated Skill Bars</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0d0d14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 2rem;
        }
        .container {
            text-align: center;
            max-width: 700px;
            width: 100%;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #6c63ff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 2rem;
        }
        .demo-section {
            background: #1a1a2e;
            border-radius: 1rem;
            padding: 2rem;
            margin: 2rem 0;
        }
        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }
        button {
            background: #6c63ff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
        }
        .note {
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            color: #a1a1aa;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 Animated Skill Bars</h1>
    
    <div class="demo-section">
        <div class="ease-skill-bar">
            <div class="ease-skill-label">HTML/CSS</div>
            <div class="ease-skill-track">
                <div class="ease-skill-fill" data-width="90">90%</div>
            </div>
        </div>

        <div class="ease-skill-bar">
            <div class="ease-skill-label">JavaScript</div>
            <div class="ease-skill-track">
                <div class="ease-skill-fill" data-width="85">85%</div>
            </div>
        </div>

        <div class="ease-skill-bar">
            <div class="ease-skill-label">React</div>
            <div class="ease-skill-track">
                <div class="ease-skill-fill" data-width="80">80%</div>
            </div>
        </div>

        <div class="ease-skill-bar ease-skill-fast">
            <div class="ease-skill-label">Fast Animation</div>
            <div class="ease-skill-track">
                <div class="ease-skill-fill" data-width="75">75%</div>
            </div>
        </div>

        <div class="ease-skill-bar ease-skill-slow">
            <div class="ease-skill-label">Slow Animation</div>
            <div class="ease-skill-track">
                <div class="ease-skill-fill" data-width="70">70%</div>
            </div>
        </div>

        <div class="ease-skill-bar ease-skill-gradient">
            <div class="ease-skill-label">Gradient Fill</div>
            <div class="ease-skill-track">
                <div class="ease-skill-fill" data-width="95">95%</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="resetBars">Reset Animation</button>
    </div>

    <div class="note">
        💡 Skill bars animate to their percentage when page loads. Click Reset to replay!
    </div>
</div>

<script>
    function animateAllBars() {
        const fills = document.querySelectorAll('.ease-skill-fill');
        fills.forEach(fill => {
            const width = fill.getAttribute('data-width');
            fill.style.width = '0%';
            fill.offsetHeight;
            fill.style.width = width + '%';
        });
    }

    document.getElementById('resetBars').addEventListener('click', () => {
        animateAllBars();
    });

    window.addEventListener('load', () => {
        setTimeout(animateAllBars, 100);
    });
</script>
</body>
</html>
