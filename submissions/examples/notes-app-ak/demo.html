<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Notes</h1>
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="Search notes...">
    </div>
    <div class="editor">
      <input type="text" id="noteTitle" placeholder="Note title...">
      <textarea id="noteBody" placeholder="Write your note..."></textarea>
      <button id="saveBtn">Save Note</button>
    </div>
    <div class="notes" id="notesList"></div>
  </div>

  <script>
    let notes = JSON.parse(localStorage.getItem('notes')) || [];
    let editingId = null;

    const noteTitle = document.getElementById('noteTitle');
    const noteBody = document.getElementById('noteBody');
    const saveBtn = document.getElementById('saveBtn');
    const searchInput = document.getElementById('searchInput');
    const notesList = document.getElementById('notesList');

    function saveToLS() {
      localStorage.setItem('notes', JSON.stringify(notes));
    }

    function render() {
      const q = searchInput.value.toLowerCase();
      const filtered = notes.filter(n => n.title.toLowerCase().includes(q) || n.body.toLowerCase().includes(q));
      notesList.innerHTML = filtered.map(n => `
        <div class="note">
          <div class="note-title">${n.title || 'Untitled'}</div>
          <div class="note-body">${n.body}</div>
          <div class="note-actions">
            <button onclick="editNote('${n.id}')">Edit</button>
            <button class="delete" onclick="deleteNote('${n.id}')">Delete</button>
          </div>
        </div>
      `).join('');
    }

    function resetForm() {
      editingId = null;
      noteTitle.value = '';
      noteBody.value = '';
      saveBtn.textContent = 'Save Note';
    }

    saveBtn.addEventListener('click', () => {
      const title = noteTitle.value.trim();
      const body = noteBody.value.trim();
      if (!title && !body) return;

      if (editingId) {
        const note = notes.find(n => n.id === editingId);
        if (note) { note.title = title; note.body = body; }
      } else {
        notes.push({ id: Date.now().toString(), title, body });
      }

      saveToLS();
      resetForm();
      render();
    });

    function editNote(id) {
      const note = notes.find(n => n.id === id);
      if (!note) return;
      editingId = id;
      noteTitle.value = note.title;
      noteBody.value = note.body;
      saveBtn.textContent = 'Update Note';
    }

    function deleteNote(id) {
      notes = notes.filter(n => n.id !== id);
      saveToLS();
      if (editingId === id) resetForm();
      render();
    }

    searchInput.addEventListener('input', render);
    render();
  </script>
</body>
</html>
