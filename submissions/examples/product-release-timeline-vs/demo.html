<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Release Timeline Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .demo-card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 360px;
    }

    .demo-card h2 {
      margin: 0 0 1.5rem;
      font-size: 1.1rem;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="demo-card">
    <h2>Release Timeline</h2>

    <div class="ease-release-timeline">

      <div class="ease-release-milestone">
        <span class="ease-release-stage stable">Stable</span>
        <h3 class="ease-release-version">v1.0</h3>
        <p class="ease-release-desc">Initial public release with core utilities.</p>
      </div>

      <div class="ease-release-milestone">
        <span class="ease-release-stage stable">Stable</span>
        <h3 class="ease-release-version">v1.5</h3>
        <p class="ease-release-desc">Added accessibility and reduced-motion support.</p>
      </div>

      <div class="ease-release-milestone is-latest">
        <span class="ease-release-stage beta">Beta</span>
        <h3 class="ease-release-version">v2.0</h3>
        <p class="ease-release-desc">New animation components and gradient utilities.</p>
      </div>

      <div class="ease-release-milestone">
        <span class="ease-release-stage planned">Planned</span>
        <h3 class="ease-release-version">v3.0</h3>
        <p class="ease-release-desc">Form components and theming system.</p>
      </div>

    </div>
  </div>

</body>
</html>
