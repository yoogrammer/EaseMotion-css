<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-badge — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      gap: 2rem;
      padding: 2rem;
    }
    h1 { color: #333; }
    .section { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
    .label { font-size: 0.75rem; color: #888; }
    .row { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>

  <h1>ease-badge Demo</h1>

  <div class="section">
    <div class="label">Color variants</div>
    <div class="row">
      <span class="ease-badge">Default</span>
      <span class="ease-badge ease-badge-primary">Primary</span>
      <span class="ease-badge ease-badge-success">Success</span>
      <span class="ease-badge ease-badge-danger">Danger</span>
      <span class="ease-badge ease-badge-warning">Warning</span>
      <span class="ease-badge ease-badge-info">Info</span>
      <span class="ease-badge ease-badge-dark">Dark</span>
    </div>
  </div>

  <div class="section">
    <div class="label">Dot indicator</div>
    <div class="row">
      <span class="ease-badge ease-badge-success ease-badge-dot">Online</span>
      <span class="ease-badge ease-badge-danger ease-badge-dot">Offline</span>
      <span class="ease-badge ease-badge-warning ease-badge-dot">Away</span>
    </div>
  </div>

  <div class="section">
    <div class="label">Pulse (live indicator)</div>
    <div class="row">
      <span class="ease-badge ease-badge-danger ease-badge-pulse">Live</span>
      <span class="ease-badge ease-badge-success ease-badge-pulse">Active</span>
    </div>
  </div>

  <div class="section">
    <div class="label">Count badges</div>
    <div class="row">
      <span class="ease-badge ease-badge-primary ease-badge-count">3</span>
      <span class="ease-badge ease-badge-danger ease-badge-count">99+</span>
      <span class="ease-badge ease-badge-dark ease-badge-count">12</span>
    </div>
  </div>

  <div class="section">
    <div class="label">Outline variant</div>
    <div class="row">
      <span class="ease-badge ease-badge-primary ease-badge-outline">Primary</span>
      <span class="ease-badge ease-badge-success ease-badge-outline">Success</span>
      <span class="ease-badge ease-badge-danger ease-badge-outline">Danger</span>
    </div>
  </div>

  <div class="section">
    <div class="label">Size variants</div>
    <div class="row">
      <span class="ease-badge ease-badge-primary ease-badge-sm">Small</span>
      <span class="ease-badge ease-badge-primary">Default</span>
      <span class="ease-badge ease-badge-primary ease-badge-lg">Large</span>
    </div>
  </div>

</body>
</html>
