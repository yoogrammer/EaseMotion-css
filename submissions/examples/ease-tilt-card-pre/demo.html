<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tilt Card — 3D Perspective</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="section">
    <h2>Move your mouse across the cards</h2>
    <div class="cards-grid">

      <div class="tilt-card purple" data-tilt>
        <div class="card-inner">
          <span class="card-icon">⚡</span>
          <h3 class="card-title">EaseMotion</h3>
          <p class="card-text">
            Animation-first CSS framework. Zero dependencies.
          </p>
        </div>
      </div>

      <div class="tilt-card green" data-tilt>
        <div class="card-inner">
          <span class="card-icon">🚀</span>
          <h3 class="card-title">Open Source</h3>
          <p class="card-text">
            Built by the community. Free forever.
          </p>
        </div>
      </div>

      <div class="tilt-card dark" data-tilt>
        <div class="card-inner">
          <span class="card-icon">🎨</span>
          <h3 class="card-title">Curated</h3>
          <p class="card-text">
            Every class is maintainer-reviewed before release.
          </p>
        </div>
      </div>

    </div>
  </div>

  <!-- ~10 lines JS from issue -->
  <script>
    document.querySelectorAll('[data-tilt]').forEach(card => {
      card.addEventListener('mousemove', e => {
        const r = card.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width - 0.5;
        const y = (e.clientY - r.top) / r.height - 0.5;
        card.style.transform =
          `perspective(800px) rotateY(${x * 16}deg) rotateX(${-y * 16}deg)`;
      });
      card.addEventListener('mouseleave', () => {
        card.style.transform =
          'perspective(800px) rotateY(0deg) rotateX(0deg)';
      });
    });
  </script>

</body>
</html>
