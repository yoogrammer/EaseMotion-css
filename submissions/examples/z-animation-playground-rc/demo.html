<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Animation Playground</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Interactive Animation Playground</h1>

    <div class="controls">

        <label>
            Animation
            <select id="animation">
                <option value="fadeIn">Fade In</option>
                <option value="slideLeft">Slide Left</option>
                <option value="slideRight">Slide Right</option>
                <option value="zoomIn">Zoom In</option>
                <option value="rotateIn">Rotate In</option>
            </select>
        </label>

        <label>
            Duration
            <input type="range" id="duration" min="0.5" max="5" step="0.5" value="1">
        </label>

        <label>
            Delay
            <input type="range" id="delay" min="0" max="3" step="0.5" value="0">
        </label>

        <label>
            Iterations
            <input type="number" id="iterations" min="1" value="1">
        </label>

        <label>
            Easing
            <select id="easing">
                <option>ease</option>
                <option>linear</option>
                <option>ease-in</option>
                <option>ease-out</option>
                <option>ease-in-out</option>
            </select>
        </label>

        <button id="playBtn">Play Animation</button>

    </div>

    <div class="preview">
        <div id="box">Animate Me</div>
    </div>

</div>

<script>
const box = document.getElementById("box");

document.getElementById("playBtn").addEventListener("click", () => {

    const animation = document.getElementById("animation").value;
    const duration = document.getElementById("duration").value;
    const delay = document.getElementById("delay").value;
    const iterations = document.getElementById("iterations").value;
    const easing = document.getElementById("easing").value;

    box.style.animation = "none";
    void box.offsetWidth;

    box.style.animation =
        `${animation} ${duration}s ${easing} ${delay}s ${iterations}`;
});
</script>

</body>
</html>
