<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Animated Gradient Orb</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: system-ui, sans-serif;
        }
        #info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 12px 24px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            pointer-events: none;
        }
        #info h1 {
            margin: 0;
            font-size: 1rem;
        }
        #info p {
            margin: 5px 0 0;
            font-size: 0.7rem;
            opacity: 0.7;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }
        button {
            background: rgba(108,99,255,0.8);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(5px);
            font-size: 12px;
        }
        button:hover {
            background: rgba(108,99,255,1);
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>🌀 Animated Gradient Orb</h1>
        <p>3D sphere with shifting gradient colors | Mouse drag to rotate</p>
    </div>
    <div class="controls">
        <button id="speedSlow">Slow</button>
        <button id="speedNormal">Normal</button>
        <button id="speedFast">Fast</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    <script src="script.js" type="module"></script>
</body>
</html>
