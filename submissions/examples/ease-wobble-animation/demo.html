<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wobble Animation Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css@latest/dist/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f0fdfa;
      margin: 0;
    }
    .container {
      text-align: center;
      background: white;
      padding: 3rem 4rem;
      border-radius: 16px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
    .jelly-box {
      font-size: 2rem;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #14b8a6 0%, #0f766e 100%);
      padding: 2rem 3rem;
      border-radius: 24px;
      margin: 2rem auto;
      display: inline-block;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(20, 184, 166, 0.5);
    }
    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 6px;
      background: #0f766e;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #115e59;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>EaseMotion Wobble Animation</h2>
    
    <div id="target" class="jelly-box">
      I'm Squishy!
    </div>
    
    <div class="controls">
      <button onclick="triggerAnimation()">Poke It (Wobble)</button>
    </div>
  </div>

  <script>
    function triggerAnimation() {
      const target = document.getElementById('target');
      
      // Remove class
      target.classList.remove('ease-wobble');
      
      // Force reflow
      void target.offsetWidth;
      
      // Re-add class to restart animation
      target.classList.add('ease-wobble');
    }
  </script>
</body>
</html>
