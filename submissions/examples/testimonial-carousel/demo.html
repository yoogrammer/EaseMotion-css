<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimonial Carousel</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc; flex-direction: column;">
    <div class="tc-carousel" id="carousel">
      <div class="tc-slide active">
        <p class="tc-quote">"This framework made our UI animations so much easier to implement."</p>
        <p class="tc-author">— Sarah Chen, Lead Designer</p>
      </div>
      <div class="tc-slide">
        <p class="tc-quote">"The speed and quality of the components exceeded our expectations."</p>
        <p class="tc-author">— Marcus Rivera, Frontend Engineer</p>
      </div>
      <div class="tc-slide">
        <p class="tc-quote">"A fantastic open-source resource for any modern web project."</p>
        <p class="tc-author">— Aisha Patel, Product Manager</p>
      </div>
    </div>
    <div class="tc-dots" id="dots"></div>
    <div class="tc-arrows">
      <button class="tc-arrow" id="prevArrow">←</button>
      <button class="tc-arrow" id="nextArrow">→</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
