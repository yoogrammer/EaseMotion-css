<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Difficulty & Use-Case Tags</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Animation Difficulty & Use-Case Tags</h1>

    <p>
        Discover animations by difficulty level and practical use cases.
    </p>

    <button id="themeToggle">
        🌙 Dark Mode
    </button>
</header>

<div class="controls">

    <input
        type="text"
        id="searchBox"
        placeholder="Search animations..."
    >

    <select id="difficultyFilter">
        <option value="all">All Difficulties</option>
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="advanced">Advanced</option>
    </select>

    <select id="useCaseFilter">
        <option value="all">All Use Cases</option>
        <option value="hero">Hero Section</option>
        <option value="buttons">Buttons</option>
        <option value="navigation">Navigation</option>
        <option value="cards">Cards</option>
        <option value="cta">CTA</option>
        <option value="alerts">Alerts</option>
    </select>

</div>

<div class="cards">

    <div class="card"
        data-name="fade in"
        data-difficulty="beginner"
        data-usecase="hero">

        <h2>Fade In</h2>

        <div class="tags">
            <span class="tag beginner">Beginner</span>
            <span class="tag usecase">Hero Section</span>
        </div>

        <div class="demo-box fade"></div>

    </div>

    <div class="card"
        data-name="bounce"
        data-difficulty="intermediate"
        data-usecase="buttons">

        <h2>Bounce</h2>

        <div class="tags">
            <span class="tag intermediate">Intermediate</span>
            <span class="tag usecase">Buttons</span>
        </div>

        <div class="demo-box bounce"></div>

    </div>

    <div class="card"
        data-name="rotate"
        data-difficulty="advanced"
        data-usecase="navigation">

        <h2>Rotate</h2>

        <div class="tags">
            <span class="tag advanced">Advanced</span>
            <span class="tag usecase">Navigation</span>
        </div>

        <div class="demo-box rotate"></div>

    </div>

    <div class="card"
        data-name="slide up"
        data-difficulty="beginner"
        data-usecase="cards">

        <h2>Slide Up</h2>

        <div class="tags">
            <span class="tag beginner">Beginner</span>
            <span class="tag usecase">Cards</span>
        </div>

        <div class="demo-box slide"></div>

    </div>

    <div class="card"
        data-name="pulse"
        data-difficulty="intermediate"
        data-usecase="cta">

        <h2>Pulse</h2>

        <div class="tags">
            <span class="tag intermediate">Intermediate</span>
            <span class="tag usecase">CTA</span>
        </div>

        <div class="demo-box pulse"></div>

    </div>

    <div class="card"
        data-name="shake"
        data-difficulty="advanced"
        data-usecase="alerts">

        <h2>Shake</h2>

        <div class="tags">
            <span class="tag advanced">Advanced</span>
            <span class="tag usecase">Alerts</span>
        </div>

        <div class="demo-box shake"></div>

    </div>

</div>

<script>

const themeToggle =
document.getElementById("themeToggle");

themeToggle.addEventListener("click", () => {

    document.body.classList.toggle("dark");

    if(document.body.classList.contains("dark")){
        themeToggle.innerHTML = "☀️ Light Mode";
    }
    else{
        themeToggle.innerHTML = "🌙 Dark Mode";
    }

});

const searchBox =
document.getElementById("searchBox");

const difficultyFilter =
document.getElementById("difficultyFilter");

const useCaseFilter =
document.getElementById("useCaseFilter");

const cards =
document.querySelectorAll(".card");

function filterCards(){

    const searchText =
    searchBox.value.toLowerCase();

    const difficulty =
    difficultyFilter.value;

    const useCase =
    useCaseFilter.value;

    cards.forEach(card => {

        const cardName =
        card.dataset.name;

        const cardDifficulty =
        card.dataset.difficulty;

        const cardUseCase =
        card.dataset.usecase;

        const searchMatch =
        cardName.includes(searchText);

        const difficultyMatch =
        difficulty === "all" ||
        difficulty === cardDifficulty;

        const useCaseMatch =
        useCase === "all" ||
        useCase === cardUseCase;

        if(
            searchMatch &&
            difficultyMatch &&
            useCaseMatch
        ){
            card.style.display = "block";
        }
        else{
            card.style.display = "none";
        }

    });

}

searchBox.addEventListener(
    "input",
    filterCards
);

difficultyFilter.addEventListener(
    "change",
    filterCards
);

useCaseFilter.addEventListener(
    "change",
    filterCards
);

filterCards();

</script>

</body>
</html>
