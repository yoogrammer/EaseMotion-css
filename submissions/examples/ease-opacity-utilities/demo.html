<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opacity Utilities Demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Opacity Utilities Demo</h1>

    <div class="card">
        <h2>Opacity 0</h2>
        <div class="demo-box opacity-0">Invisible Element</div>
    </div>

    <div class="card">
        <h2>Opacity 25%</h2>
        <div class="demo-box opacity-25">Opacity 0.25</div>
    </div>

    <div class="card">
        <h2>Opacity 50%</h2>
        <div class="demo-box opacity-50">Opacity 0.5</div>
    </div>

    <div class="card">
        <h2>Opacity 75%</h2>
        <div class="demo-box opacity-75">Opacity 0.75</div>
    </div>

    <div class="card">
        <h2>Opacity 100%</h2>
        <div class="demo-box opacity-100">Opacity 1</div>
    </div>

</body>

</html>
