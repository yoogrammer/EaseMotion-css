<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-scroll-snap-type-za</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      [data-ease-demo-za] {
        font-family: system-ui, sans-serif;
        max-width: 600px;
        margin: 2rem auto;
        padding: 1.5rem;
      }
      .snap-container {
        display: flex;
        overflow-x: auto;
        gap: 1rem;
        padding: 1rem 0;
        scrollbar-width: thin;
      }
      .snap-container > div {
        min-width: 250px;
        height: 150px;
        background: #6c63ff;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        font-weight: 600;
        font-size: 1.2rem;
      }
    </style>
  </head>
  <body>
    <div data-ease-demo-za>
      <h1>ease-scroll-snap-type-za</h1>
      <p>
        Horizontal scroll with snap — scroll to see each item snap into place.
      </p>
      <div class="snap-container ease-scroll-snap-x-za">
        <div class="ease-snap-start-za" style="background: #6c63ff">1</div>
        <div style="background: #f59e0b">2</div>
        <div style="background: #10b981">3</div>
        <div style="background: #ef4444">4</div>
        <div style="background: #8b5cf6">5</div>
      </div>
    </div>
  </body>
</html>
