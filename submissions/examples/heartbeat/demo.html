<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-heartbeat Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f9f9f9;
      gap: 40px;
    }
    .card {
      background: white;
      padding: 30px 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }
    .label {
      font-size: 13px;
      color: #888;
      margin-top: 10px;
    }
    .heart {
      font-size: 48px;
    }
    button {
      padding: 12px 28px;
      font-size: 16px;
      border: none;
      background: #ff4d6d;
      color: white;
      border-radius: 50px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Example 1: Heart Icon -->
  <div class="card">
    <div class="heart ease-heartbeat">❤️</div>
    <p class="label">Basic heartbeat</p>
  </div>

  <!-- Example 2: Like Button -->
  <div class="card">
    <button class="ease-heartbeat">❤️ Like</button>
    <p class="label">Like button</p>
  </div>

  <!-- Example 3: Slow -->
  <div class="card">
    <div class="heart ease-heartbeat ease-heartbeat-slow">🩷</div>
    <p class="label">ease-heartbeat-slow</p>
  </div>

  <!-- Example 4: Fast -->
  <div class="card">
    <div class="heart ease-heartbeat ease-heartbeat-fast">❤️</div>
    <p class="label">ease-heartbeat-fast</p>
  </div>

  <!-- Example 5: Live Badge -->
  <div class="card">
    <div class="ease-heartbeat" style="
      width:14px; height:14px;
      background:red;
      border-radius:50%;
      display:inline-block;">
    </div>
    <p class="label">Live indicator badge</p>
  </div>

</body>
</html>
