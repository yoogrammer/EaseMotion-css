<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress Circle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="progress-circle" style="--progress: 25">
    <svg viewBox="0 0 120 120">
      <circle class="progress-track" cx="60" cy="60" r="52" />
      <circle class="progress-fill" cx="60" cy="60" r="52" />
    </svg>
    <span class="progress-label">25%</span>
  </div>
  <div class="progress-circle" style="--progress: 50; --color: #22c55e">
    <svg viewBox="0 0 120 120">
      <circle class="progress-track" cx="60" cy="60" r="52" />
      <circle class="progress-fill" cx="60" cy="60" r="52" />
    </svg>
    <span class="progress-label">50%</span>
  </div>
  <div class="progress-circle" style="--progress: 80; --color: #f59e0b">
    <svg viewBox="0 0 120 120">
      <circle class="progress-track" cx="60" cy="60" r="52" />
      <circle class="progress-fill" cx="60" cy="60" r="52" />
    </svg>
    <span class="progress-label">80%</span>
  </div>
  <div class="progress-circle" style="--progress: 100; --color: #ef4444">
    <svg viewBox="0 0 120 120">
      <circle class="progress-track" cx="60" cy="60" r="52" />
      <circle class="progress-fill" cx="60" cy="60" r="52" />
    </svg>
    <span class="progress-label">100%</span>
  </div>
</body>
</html>
