<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-input — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: #0f0e17;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 3rem 2rem;
      min-height: 100vh;
    }
    h1 { font-size: 2rem; margin-bottom: 0.25rem; }
    .subtitle { color: rgba(255,255,255,0.5); margin-bottom: 2.5rem; }
    .section { margin-bottom: 2.5rem; }
    label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 0.4rem; }
    code {
      font-size: 12px;
      background: rgba(108,99,255,0.15);
      color: #a78bfa;
      border: 1px solid rgba(108,99,255,0.3);
      padding: 0.15em 0.6em;
      border-radius: 999px;
    }
    .row { display: flex; flex-direction: column; gap: 1rem; max-width: 420px; }
    svg { width: 16px; height: 16px; }
    /* demo overrides for dark bg */
    .ease-input {
      background: #1a1929;
      color: #fff;
      border-color: rgba(255,255,255,0.15);
    }
    .ease-input::placeholder { color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <h1>ease-input</h1>
  <p class="subtitle">Form input component — Issue #262</p>

  <div class="section">
    <p><code>ease-input</code> — base class</p>
    <div class="row">
      <div>
        <label>Default</label>
        <input class="ease-input" type="text" placeholder="Enter your name" />
      </div>

      <div>
        <label><code>ease-input-focus</code> — click to see focus animation</label>
        <input class="ease-input ease-input-focus" type="email" placeholder="your@email.com" />
      </div>

      <div>
        <label><code>ease-input-error</code> — error state</label>
        <input class="ease-input ease-input-error" type="text" value="invalid value" />
      </div>

      <div>
        <label><code>ease-input-success</code> — success state</label>
        <input class="ease-input ease-input-success" type="text" value="valid@email.com" />
      </div>

      <div>
        <label><code>ease-input-group</code> — icon + input</label>
        <div class="ease-input-group">
          <span class="ease-input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 111 11a6 6 0 0116 0z"/>
            </svg>
          </span>
          <input class="ease-input" type="search" placeholder="Search..." />
        </div>
      </div>
    </div>
  </div>
</body>
</html>
