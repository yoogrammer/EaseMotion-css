<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perspective Scroll - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Perspective Scroll</h1>
    <div class="perspective-stage">
      <div class="perspective-card" data-speed="1">Fast</div>
      <div class="perspective-card" data-speed="0.5">Medium</div>
      <div class="perspective-card" data-speed="0.2">Slow</div>
    </div>
    <p class="description">Cards tilt and move at different speeds as you scroll, creating a 3D parallax feel.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
