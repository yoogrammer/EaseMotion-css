<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Checkbox Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Animated Checkbox</h1>
        <p class="subtitle">Checkmark draws itself, box bounces on toggle</p>

        <!-- ANIMATED CHECKBOX COMPONENT -->
        <div class="checkbox-container">
            <label class="checkbox-wrapper" id="checkboxWrapper">
                <input type="checkbox" class="checkbox-input" id="checkboxInput" />
                <span class="checkbox-custom" id="checkboxCustom">
                    <svg class="checkbox-checkmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                </span>
                <span class="checkbox-label" id="checkboxLabel">Accept terms and conditions</span>
            </label>
        </div>

        <!-- Status Display -->
        <div class="status-display">
            <span class="status-label">State:</span>
            <span class="status-value" id="statusValue">Unchecked</span>
        </div>

        <!-- Demo Controls -->
        <div class="demo-controls">
            <button class="demo-btn" id="toggleBtn">Toggle</button>
            <button class="demo-btn" id="checkBtn">Check</button>
            <button class="demo-btn" id="uncheckBtn">Uncheck</button>
            <button class="demo-btn" id="resetBtn">Reset Animation</button>
        </div>

        <!-- Variants -->
        <div class="variants-section">
            <h3>Variants</h3>
            <div class="variants-grid">
                <label class="checkbox-wrapper variant-primary">
                    <input type="checkbox" class="checkbox-input" />
                    <span class="checkbox-custom">
                        <svg class="checkbox-checkmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12" />
                        </svg>
                    </span>
                    <span class="checkbox-label">Primary</span>
                </label>

                <label class="checkbox-wrapper variant-success">
                    <input type="checkbox" class="checkbox-input" />
                    <span class="checkbox-custom">
                        <svg class="checkbox-checkmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12" />
                        </svg>
                    </span>
                    <span class="checkbox-label">Success</span>
                </label>

                <label class="checkbox-wrapper variant-danger">
                    <input type="checkbox" class="checkbox-input" />
                    <span class="checkbox-custom">
                        <svg class="checkbox-checkmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12" />
                        </svg>
                    </span>
                    <span class="checkbox-label">Danger</span>
                </label>

                <label class="checkbox-wrapper variant-warning">
                    <input type="checkbox" class="checkbox-input" />
                    <span class="checkbox-custom">
                        <svg class="checkbox-checkmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12" />
                        </svg>
                    </span>
                    <span class="checkbox-label">Warning</span>
                </label>

                <label class="checkbox-wrapper variant-dark">
                    <input type="checkbox" class="checkbox-input" />
                    <span class="checkbox-custom">
                        <svg class="checkbox-checkmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12" />
                        </svg>
                    </span>
                    <span class="checkbox-label">Dark</span>
                </label>
            </div>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const checkbox = document.getElementById('checkboxInput');
            const customCheckbox = document.getElementById('checkboxCustom');
            const wrapper = document.getElementById('checkboxWrapper');
            const statusValue = document.getElementById('statusValue');
            const toggleBtn = document.getElementById('toggleBtn');
            const checkBtn = document.getElementById('checkBtn');
            const uncheckBtn = document.getElementById('uncheckBtn');
            const resetBtn = document.getElementById('resetBtn');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                onCheck: function() {
                    console.log('✅ Checkbox checked');
                    showStatus('Checked');
                },
                onUncheck: function() {
                    console.log('❌ Checkbox unchecked');
                    showStatus('Unchecked');
                },
                onToggle: function(checked) {
                    console.log(`🔄 Checkbox toggled to: ${checked}`);
                }
            };

            // ============================================
            // HELPERS
            // ============================================
            function showStatus(text) {
                statusValue.textContent = text;
                // Add color based on state
                if (text === 'Checked') {
                    statusValue.style.color = '#34c759';
                } else if (text === 'Unchecked') {
                    statusValue.style.color = '#6b7280';
                }
            }

            function triggerCheckAnimation() {
                // Remove and re-add the checked class to trigger animation
                customCheckbox.classList.remove('checked');
                // Force reflow
                void customCheckbox.offsetWidth;
                customCheckbox.classList.add('checked');
            }

            // ============================================
            // CHECKBOX STATE MANAGEMENT
            // ============================================
            function setChecked(checked, triggerAnimation = true) {
                if (checkbox.checked === checked) return;

                checkbox.checked = checked;

                if (checked) {
                    if (triggerAnimation) {
                        triggerCheckAnimation();
                    } else {
                        customCheckbox.classList.add('checked');
                    }
                    CONFIG.onCheck();
                } else {
                    customCheckbox.classList.remove('checked');
                    CONFIG.onUncheck();
                }

                CONFIG.onToggle(checked);
                showStatus(checked ? 'Checked' : 'Unchecked');
            }

            function toggle() {
                setChecked(!checkbox.checked);
            }

            function resetAnimation() {
                // Remove and re-add the checked class to replay animation
                customCheckbox.classList.remove('checked');
                // Force reflow
                void customCheckbox.offsetWidth;

                if (checkbox.checked) {
                    customCheckbox.classList.add('checked');
                }
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            // Native change event
            checkbox.addEventListener('change', function(e) {
                const checked = this.checked;
                if (checked) {
                    triggerCheckAnimation();
                    CONFIG.onCheck();
                } else {
                    customCheckbox.classList.remove('checked');
                    CONFIG.onUncheck();
                }
                CONFIG.onToggle(checked);
                showStatus(checked ? 'Checked' : 'Unchecked');
            });

            // Keyboard support for the custom checkbox
            customCheckbox.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    toggle();
                }
            });

            // Click on custom checkbox triggers toggle
            customCheckbox.addEventListener('click', function(e) {
                // Prevent double triggering
                e.stopPropagation();
                toggle();
            });

            // Click on wrapper also triggers toggle
            wrapper.addEventListener('click', function(e) {
                // If the click is on the custom checkbox or input, it's already handled
                if (e.target === customCheckbox || e.target === checkbox) return;
                toggle();
            });

            // ============================================
            // DEMO CONTROLS
            // ============================================
            toggleBtn.addEventListener('click', toggle);

            checkBtn.addEventListener('click', function() {
                setChecked(true);
            });

            uncheckBtn.addEventListener('click', function() {
                setChecked(false);
            });

            resetBtn.addEventListener('click', resetAnimation);

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.AnimatedCheckbox = {
                check: () => setChecked(true),
                uncheck: () => setChecked(false),
                toggle: toggle,
                isChecked: () => checkbox.checked,
                resetAnimation: resetAnimation,
                configure: (config) => {
                    Object.assign(CONFIG, config);
                },
                // Batch operations
                checkAll: (selectors) => {
                    document.querySelectorAll(selectors).forEach(el => {
                        const cb = el.querySelector('.checkbox-input');
                        if (cb) cb.checked = true;
                        const custom = el.querySelector('.checkbox-custom');
                        if (custom) custom.classList.add('checked');
                    });
                },
                uncheckAll: (selectors) => {
                    document.querySelectorAll(selectors).forEach(el => {
                        const cb = el.querySelector('.checkbox-input');
                        if (cb) cb.checked = false;
                        const custom = el.querySelector('.checkbox-custom');
                        if (custom) custom.classList.remove('checked');
                    });
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            showStatus('Unchecked');
            console.log('✅ Animated Checkbox initialized!');
            console.log('📖 API: window.AnimatedCheckbox');
            console.log('📖 Usage:');
            console.log('  - Click the checkbox to see animation');
            console.log('  - Use demo controls to test different states');
            console.log('  - Variants show different color themes');

        })();
    </script>
</body>
</html>
