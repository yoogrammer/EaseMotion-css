<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Distributed System Communication Map</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Distributed System Communication Map</h1>
    <p class="subtitle">
        Visualizing service-to-service communication in a distributed architecture.
    </p>

    <div class="diagram">

        <div class="node frontend">
            Frontend
        </div>

        <div class="line vertical"></div>

        <div class="node gateway">
            API Gateway
        </div>

        <div class="services">

            <div class="service-column">

                <div class="node service">
                    Auth Service
                </div>

                <div class="node infra">
                    Redis Cache
                </div>

            </div>

            <div class="service-column">

                <div class="node service">
                    User Service
                </div>

                <div class="node infra">
                    Message Queue
                </div>

            </div>

            <div class="service-column">

                <div class="node service">
                    Billing Service
                </div>

                <div class="node infra">
                    Analytics
                </div>

            </div>

        </div>

        <div class="line vertical"></div>

        <div class="node database">
            Shared Database
        </div>

    </div>

</div>

</body>
</html>
