<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Animation Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Hover Animation Showcase</h1>

        ```
        <h2>Button Hover</h2>
        <button class="hover-btn">Hover Me</button>

        <h2>Card Hover</h2>
        <div class="hover-card">
            <h3>Animated Card</h3>
            <p>Hover over this card to see the effect.</p>
        </div>

        <h2>Image Hover</h2>
        <img src="https://picsum.photos/300/200" alt="Sample Image" class="hover-img" />
        ```

    </div>

</body>

</html>
