<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platform Reliability Control Tower</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

  <h1>Platform Reliability Control Tower</h1>

  <div class="metrics-grid">

    <div class="card uptime">
      <h3>Platform Uptime</h3>
      <p>99.98%</p>
    </div>

    <div class="card services">
      <h3>Active Services</h3>
      <p>42</p>
    </div>

    <div class="card sla">
      <h3>SLA Compliance</h3>
      <p>99.7%</p>
    </div>

    <div class="card incidents">
      <h3>Critical Incidents</h3>
      <p>1</p>
    </div>

  </div>

  <div class="service-section">

    <h2>Service Health Overview</h2>

    <div class="service-grid">

      <div class="service healthy">
        API Gateway
        <span>Healthy</span>
      </div>

      <div class="service healthy">
        Authentication
        <span>Healthy</span>
      </div>

      <div class="service warning">
        Analytics Engine
        <span>Degraded</span>
      </div>

      <div class="service healthy">
        Billing Service
        <span>Healthy</span>
      </div>

    </div>

  </div>

</div>

</body>
</html>
