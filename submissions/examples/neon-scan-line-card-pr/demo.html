<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neon Scan Line Card Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #020617;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
      padding: 2rem;
    }

    .ease-scan-card {
      width: 280px;
    }

    .ease-scan-card h2 {
      margin: 0 0 0.5rem;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
    }

    .ease-scan-card p {
      margin: 0;
      font-size: 0.85rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <div class="ease-scan-card">
    <h2>System Online</h2>
    <p>Scanning active...</p>
  </div>

  <div class="ease-scan-card ease-scan-card-magenta">
    <h2>Security Module</h2>
    <p>Scanning active...</p>
  </div>

  <div class="ease-scan-card ease-scan-card-green">
    <h2>Network Status</h2>
    <p>Scanning active...</p>
  </div>

</body>
</html>
