<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motion Curve Gallery - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Motion Curve Gallery</h1>
    <p class="subtitle">Hover each box to see the easing curve in motion</p>
    <div class="curve-grid">
      <div class="curve-card">
        <div class="curve-box ease-linear"></div>
        <span class="curve-label">linear</span>
      </div>
      <div class="curve-card">
        <div class="curve-box ease-in"></div>
        <span class="curve-label">ease-in</span>
      </div>
      <div class="curve-card">
        <div class="curve-box ease-out"></div>
        <span class="curve-label">ease-out</span>
      </div>
      <div class="curve-card">
        <div class="curve-box ease-in-out"></div>
        <span class="curve-label">ease-in-out</span>
      </div>
      <div class="curve-card">
        <div class="curve-box ease-bounce" style="transition-timing-function: cubic-bezier(0.68, -0.55, 0.27, 1.55);"></div>
        <span class="curve-label">bounce</span>
      </div>
      <div class="curve-card">
        <div class="curve-box ease-elastic" style="transition-timing-function: cubic-bezier(0.25, 0.46, 0.45, 0.94);"></div>
        <span class="curve-label">elastic</span>
      </div>
    </div>
    <p class="description">Each box slides from left to right on hover using a different CSS easing curve. Hover to compare the motion feel of each timing function. Supports light and dark mode.</p>
  </div>
</body>
</html>
