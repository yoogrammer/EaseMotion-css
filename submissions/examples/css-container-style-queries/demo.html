<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Container Style Queries – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1 class="title"><code>@container style()</code> Queries</h1>
  <p class="subtitle">Cards respond to a <code>--theme</code> custom property on their parent container.</p>

  <div class="demo-grid">
    <div class="style-container" style="--theme: light">
      <h2 class="container-label">Light</h2>
      <div class="style-card">
        <div class="card-icon">☀️</div>
        <div class="card-title">Sunny Day</div>
        <div class="card-desc">Warm and bright design</div>
      </div>
    </div>
    <div class="style-container" style="--theme: dark">
      <h2 class="container-label">Dark</h2>
      <div class="style-card">
        <div class="card-icon">🌙</div>
        <div class="card-title">Night Mode</div>
        <div class="card-desc">Deep and calm aesthetic</div>
      </div>
    </div>
    <div class="style-container" style="--theme: sunset">
      <h2 class="container-label">Sunset</h2>
      <div class="style-card">
        <div class="card-icon">🌅</div>
        <div class="card-title">Golden Hour</div>
        <div class="card-desc">Rich orange and purple tones</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
