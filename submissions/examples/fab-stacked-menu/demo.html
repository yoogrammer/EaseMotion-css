<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Floating Action Menu Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>Click the main button to expand the stacked menu</h2>

  <div class="ease-fab-container">
    <div class="ease-fab-stack">
      <button class="ease-fab-item" title="Edit">✏️</button>
      <button class="ease-fab-item" title="Share">🔗</button>
      <button class="ease-fab-item" title="Delete">🗑️</button>
    </div>
    <button class="ease-fab-main" id="fabToggle">+</button>
  </div>

  <script>
    const fab = document.querySelector('.ease-fab-container');
    const toggle = document.getElementById('fabToggle');
    toggle.addEventListener('click', () => {
      fab.classList.toggle('ease-fab-open');
    });
  </script>

</body>
</html>
