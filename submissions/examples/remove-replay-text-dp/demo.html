<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clean Click-to-Replay Animations — EaseMotion CSS</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-wrapper">
      <h1>Clean Preview Interaction</h1>
      <p class="description">
        Click anywhere inside a preview card to replay its animation. The
        redundant "Replay" text buttons have been removed for a premium,
        minimalist feel.
      </p>

      <div class="grid">
        <div
          class="preview-card"
          onclick="replayAnimation(this, 'animate-fade-in')"
        >
          <div class="preview-box animate-fade-in">Preview</div>
          <div class="card-title">ease-fade-in</div>
        </div>

        <div
          class="preview-card"
          onclick="replayAnimation(this, 'animate-slide-up')"
        >
          <div class="preview-box animate-slide-up">Preview</div>
          <div class="card-title">ease-slide-up</div>
        </div>
      </div>
    </div>

    <script>
      function replayAnimation(card, animationClass) {
        const box = card.querySelector(".preview-box");
        box.classList.remove(animationClass);
        // Force a reflow
        void box.offsetWidth;
        box.classList.add(animationClass);
      }
    </script>
  </body>
</html>
