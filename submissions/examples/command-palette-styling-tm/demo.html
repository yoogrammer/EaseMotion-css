<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Palette Styling - EaseMotion-css</title>
    <!-- Link to core variables for consistency -->
    <link rel="stylesheet" href="../../../core/variables.css">
    <link rel="stylesheet" href="../../../core/animations.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--ease-color-bg);
            color: var(--ease-color-text);
            font-family: var(--ease-font-sans);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: var(--ease-space-4);
            text-align: center;
        }

        .demo-controls {
            margin-bottom: var(--ease-space-8);
        }

        .btn-trigger {
            background: var(--ease-color-primary);
            color: white;
            border: none;
            padding: var(--ease-space-3) var(--ease-space-6);
            border-radius: var(--ease-radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--ease-speed-fast) var(--ease-ease);
            box-shadow: var(--ease-shadow-md);
        }

        .btn-trigger:hover {
            transform: translateY(-2px);
            box-shadow: var(--ease-shadow-lg);
            background: var(--ease-color-primary-dark);
        }

        .kbd-hint {
            margin-top: var(--ease-space-4);
            color: var(--ease-color-muted);
            font-size: var(--ease-text-sm);
        }

        kbd {
            background: var(--ease-color-neutral-200);
            border-radius: var(--ease-radius-sm);
            padding: 2px 6px;
            font-family: var(--ease-font-mono);
            font-size: 0.8em;
            box-shadow: inset 0 -1px 0 rgba(0,0,0,0.2);
        }

        [data-theme="dark"] kbd {
            background: var(--ease-color-neutral-700);
            color: var(--ease-color-neutral-200);
        }
    </style>
</head>
<body>

    <div class="demo-controls">
        <h1>Command Palette</h1>
        <p>A modern, keyboard-friendly command interface.</p>
        <button class="btn-trigger" onclick="togglePalette()">Open Palette</button>
        <div class="kbd-hint">Press <kbd>Ctrl</kbd> + <kbd>K</kbd> to open</div>
    </div>

    <!-- Command Palette Component -->
    <div id="commandPaletteOverlay" class="ease-cmd-overlay" onclick="closePalette(event)">
        <div class="ease-cmd-palette ease-kf-fade-in" onclick="event.stopPropagation()">
            <div class="ease-cmd-header">
                <svg class="ease-cmd-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" placeholder="Search for commands..." id="cmdSearchInput">
                <kbd class="ease-cmd-esc">ESC</kbd>
            </div>
            
            <div class="ease-cmd-body">
                <div class="ease-cmd-group">
                    <h3 class="ease-cmd-group-title">Suggestions</h3>
                    <button class="ease-cmd-item">
                        <span class="ease-cmd-item-main">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                            <span class="ease-cmd-item-label">Go to Dashboard</span>
                        </span>
                        <kbd class="ease-cmd-shortcut">G D</kbd>
                    </button>
                    <button class="ease-cmd-item">
                        <span class="ease-cmd-item-main">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            <span class="ease-cmd-item-label">View Profile</span>
                        </span>
                        <kbd class="ease-cmd-shortcut">⌘P</kbd>
                    </button>
                </div>

                <div class="ease-cmd-group">
                    <h3 class="ease-cmd-group-title">Settings</h3>
                    <button class="ease-cmd-item">
                        <span class="ease-cmd-item-main">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                            <span class="ease-cmd-item-label">Account Settings</span>
                        </span>
                        <kbd class="ease-cmd-shortcut">⌘,</kbd>
                    </button>
                    <button class="ease-cmd-item">
                        <span class="ease-cmd-item-main">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                            <span class="ease-cmd-item-label">Toggle Dark Mode</span>
                        </span>
                        <kbd class="ease-cmd-shortcut">⌘⇧L</kbd>
                    </button>
                </div>

                <div class="ease-cmd-group">
                    <h3 class="ease-cmd-group-title">Help</h3>
                    <button class="ease-cmd-item">
                        <span class="ease-cmd-item-main">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                            <span class="ease-cmd-item-label">Documentation</span>
                        </span>
                        <kbd class="ease-cmd-shortcut">F1</kbd>
                    </button>
                </div>
            </div>

            <div class="ease-cmd-footer">
                <span class="ease-cmd-footer-text">
                    <kbd>↑</kbd> <kbd>↓</kbd> to navigate
                </span>
                <span class="ease-cmd-footer-text">
                    <kbd>↵</kbd> to select
                </span>
            </div>
        </div>
    </div>

    <script>
        function togglePalette() {
            const overlay = document.getElementById('commandPaletteOverlay');
            overlay.classList.toggle('active');
            if (overlay.classList.contains('active')) {
                document.getElementById('cmdSearchInput').focus();
            }
        }

        function closePalette(e) {
            const overlay = document.getElementById('commandPaletteOverlay');
            overlay.classList.remove('active');
        }

        // Shortcut listener
        window.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                togglePalette();
            }
            if (e.key === 'Escape') {
                closePalette();
            }
        });
    </script>
</body>
</html>
