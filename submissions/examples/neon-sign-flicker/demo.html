<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Sign Flicker – EaseMotion CSS</title>
  <meta name="description" content="Retro neon sign with realistic flicker, glow pulse, and buzz animation using pure CSS." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Neon Sign Flicker</h1>
  <p>Hover the sign to stabilize the glow</p>

  <div class="neon-wall">
    <div class="neon-sign" tabindex="0" role="img" aria-label="Open neon sign">
      <span class="neon-text" data-text="OPEN">OPEN</span>
      <span class="neon-sub">24 / 7</span>
    </div>
  </div>

  <div class="controls">
    <button class="toggle-btn" id="powerBtn" aria-pressed="true">Toggle Power</button>
  </div>

  <script>
    const sign = document.querySelector('.neon-sign');
    const btn = document.getElementById('powerBtn');

    btn.addEventListener('click', () => {
      const off = sign.classList.toggle('is-off');
      btn.setAttribute('aria-pressed', !off);
      btn.textContent = off ? 'Turn On' : 'Toggle Power';
    });
  </script>
</body>
</html>
