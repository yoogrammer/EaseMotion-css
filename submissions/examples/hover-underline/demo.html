<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-hover-underline — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-weight: 300; letter-spacing: 0.05em; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .section { display: flex; flex-direction: column; align-items: center; }
    nav { display: flex; gap: 2rem; }
    nav a {
      color: #aaa; text-decoration: none; font-size: 1.1rem;
      cursor: pointer;
    }
    p { color: #aaa; font-size: 1rem; line-height: 1.8; max-width: 500px; text-align: center; }
    p a { color: #6366f1; text-decoration: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>ease-hover-underline</h1>
  <div class="section">
    <div class="label">Navigation links</div>
    <nav>
      <a class="ease-hover-underline">Home</a>
      <a class="ease-hover-underline">About</a>
      <a class="ease-hover-underline">Services</a>
      <a class="ease-hover-underline">Contact</a>
    </nav>
  </div>
  <div class="section">
    <div class="label">Inline text</div>
    <p>This is a paragraph with a <a class="ease-hover-underline">hover underline</a> effect on the link.</p>
  </div>
</body>
</html>
