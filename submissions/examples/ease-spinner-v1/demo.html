<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ease-spinner — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: #0f172a;
      font-family: sans-serif;
      color: #e2e8f0;
      padding: 2rem;
    }
    h2 {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
    }
    .demo-row {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      margin: 1rem 0 2rem;
      align-items: center;
    }
    .demo-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }
    label {
      font-size: 0.68rem;
      color: #475569;
      text-align: center;
      font-family: monospace;
    }
    .controls {
      display: flex;
      gap: 0.75rem;
      margin: 1.5rem 0;
      flex-wrap: wrap;
    }
    button {
      padding: 6px 14px;
      cursor: pointer;
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #334155;
      border-radius: 6px;
      font-size: 0.8rem;
    }
    button:hover { background: #334155; }
    .dark-patch {
      background: #f1f5f9;
      padding: 1rem;
      border-radius: 8px;
      display: inline-flex;
      gap: 1rem;
      align-items: center;
    }
  </style>
</head>
<body>

<h1>⏳ ease-spinner</h1>
<p>Animated loading spinners — zero JavaScript, pure CSS border + rotate.</p>

<!-- SIZE VARIANTS -->
<h2>Size Variants</h2>
<div class="demo-row">
  <div class="demo-cell">
    <span class="ease-spinner ease-spinner--xs ease-spinner--primary"></span>
    <label>.ease-spinner--xs</label>
  </div>
  <div class="demo-cell">
    <span class="ease-spinner ease-spinner--sm ease-spinner--primary"></span>
    <label>.ease-spinner--sm</label>
  </div>
  <div class="demo-cell">
    <span class="ease-spinner ease-spinner--primary"></span>
    <label>.ease-spinner (default)</label>
  </div>
  <div class="demo-cell">
    <span class="ease-spinner ease-spinner--lg ease-spinner--primary"></span>
    <label>.ease-spinner--lg</label>
  </div>
  <div class="demo-cell">
    <span class="ease-spinner ease-spinner--xl ease-spinner--primary"></span>
    <label>.ease-spinner--xl</label>
  </div>
</div>

<!-- COLOR VARIANTS -->
<h2>Color Variants</h2>
<div class="demo-row">
  <div class="demo-cell">
    <span class="ease-spinner ease-spinner--primary"></span>
    <label>--primary</label>
  </div>
  <div class="demo-cell">
    <span class="ease-spinner ease-spinner--accent"></span>
    <label>--accent</label>
  </div>
  <div class="demo-cell">
    <span class="ease-spinner ease-spinner--success"></span>
    <label>--success</label>
  </div>
  <div class="demo-cell">
    <span class="ease-spinner ease-spinner--danger"></span>
    <label>--danger</label>
  </div>
  <div class="demo-cell dark-patch">
    <span class="ease-spinner ease-spinner--dark"></span>
    <label style="color:#94a3b8">--dark</label>
  </div>
  <div class="demo-cell">
    <span class="ease-spinner ease-spinner--white"></span>
    <label>--white</label>
  </div>
</div>

<!-- DUAL RING -->
<h2>Dual-Ring Variant</h2>
<div class="demo-row">
  <div class="demo-cell">
    <span class="ease-spinner ease-spinner--dual ease-spinner--lg"></span>
    <label>.ease-spinner--dual</label>
  </div>
  <div class="demo-cell">
    <span class="ease-spinner ease-spinner--dual ease-spinner--xl"></span>
    <label>.ease-spinner--dual.ease-spinner--xl</label>
  </div>
</div>

<!-- SPEED VARIANTS -->
<h2>Speed Variants</h2>
<div class="demo-row">
  <div class="demo-cell">
    <span class="ease-spinner ease-spinner--primary ease-spinner--fast"></span>
    <label>--fast</label>
  </div>
  <div class="demo-cell">
    <span class="ease-spinner ease-spinner--primary"></span>
    <label>default</label>
  </div>
  <div class="demo-cell">
    <span class="ease-spinner ease-spinner--primary ease-spinner--slow"></span>
    <label>--slow</label>
  </div>
</div>

<!-- THEMES -->
<h2>Themes</h2>
<div class="controls">
  <button onclick="setTheme('')">Default</button>
  <button onclick="setTheme('neon')">Neon</button>
  <button onclick="setTheme('dracula')">Dracula</button>
  <button onclick="setTheme('dark')">Dark</button>
</div>
<div id="theme-demo">
  <div class="demo-row">
    <span class="ease-spinner ease-spinner--lg"></span>
    <span class="ease-spinner ease-spinner--dual ease-spinner--lg"></span>
  </div>
</div>

<script>
  function setTheme(t) {
    document.getElementById('theme-demo').dataset.theme = t;
  }
</script>

</body>
</html>
