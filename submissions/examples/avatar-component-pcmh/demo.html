<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Component — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Avatar Component</h1>
    <p class="subtitle">Image avatars, initials fallback, status indicators, size variants</p>

    <div class="section">
      <h2>Size Variants</h2>
      <div class="row">
        <div class="ease-avatar ease-avatar-sm">JS</div>
        <div class="ease-avatar">JD</div>
        <div class="ease-avatar ease-avatar-lg">AK</div>
        <div class="ease-avatar ease-avatar-xl">PM</div>
      </div>
    </div>

    <div class="section">
      <h2>With Images</h2>
      <div class="row">
        <div class="ease-avatar ease-avatar-hover">
          <img src="https://i.pravatar.cc/96?img=1" alt="User avatar">
        </div>
        <div class="ease-avatar ease-avatar-hover">
          <img src="https://i.pravatar.cc/96?img=5" alt="User avatar">
        </div>
        <div class="ease-avatar ease-avatar-hover">
          <img src="https://i.pravatar.cc/96?img=8" alt="User avatar">
        </div>
        <div class="ease-avatar ease-avatar-lg ease-avatar-hover">
          <img src="https://i.pravatar.cc/128?img=12" alt="User avatar">
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Status Indicators</h2>
      <div class="row">
        <div class="ease-avatar ease-avatar-hover">
          <img src="https://i.pravatar.cc/96?img=3" alt="User avatar">
          <span class="ease-avatar-status online"></span>
        </div>
        <div class="ease-avatar ease-avatar-hover">
          <img src="https://i.pravatar.cc/96?img=7" alt="User avatar">
          <span class="ease-avatar-status away"></span>
        </div>
        <div class="ease-avatar ease-avatar-hover">
          <span class="ease-avatar-status busy"></span>
          RB
        </div>
        <div class="ease-avatar ease-avatar-hover">
          <span class="ease-avatar-status offline"></span>
          SK
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Rounded Square</h2>
      <div class="row">
        <div class="ease-avatar ease-avatar-rounded ease-avatar-hover">
          <img src="https://i.pravatar.cc/96?img=10" alt="User avatar">
        </div>
        <div class="ease-avatar ease-avatar-rounded ease-avatar-hover">
          <img src="https://i.pravatar.cc/96?img=15" alt="User avatar">
        </div>
        <div class="ease-avatar ease-avatar-rounded ease-avatar-lg ease-avatar-hover">
          <span class="ease-avatar-status online"></span>
          AC
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Avatar Group (Stacked)</h2>
      <div class="avatar-group">
        <div class="ease-avatar ease-avatar-sm ease-avatar-hover">
          <img src="https://i.pravatar.cc/64?img=2" alt="User avatar">
        </div>
        <div class="ease-avatar ease-avatar-sm ease-avatar-hover">
          <img src="https://i.pravatar.cc/64?img=4" alt="User avatar">
        </div>
        <div class="ease-avatar ease-avatar-sm ease-avatar-hover">
          <img src="https://i.pravatar.cc/64?img=6" alt="User avatar">
        </div>
        <div class="ease-avatar ease-avatar-sm">+3</div>
      </div>
    </div>
  </div>
</body>
</html>
