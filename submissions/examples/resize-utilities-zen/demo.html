<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resize Utilities Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 600px;
        margin: 2rem auto;
        padding: 1rem;
        background: #f8fafc;
        color: #1e293b;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }
      p {
        color: #64748b;
        margin-bottom: 1.5rem;
      }
      .demo-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      @media (max-width: 480px) {
        .demo-grid {
          grid-template-columns: 1fr;
        }
      }
      .demo-card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 1rem;
      }
      .demo-card h3 {
        font-size: 0.875rem;
        margin: 0 0 0.5rem;
        color: #334155;
      }
      .demo-card span {
        font-size: 0.75rem;
        color: #6c63ff;
        font-family: monospace;
      }
      textarea {
        width: 100%;
        min-height: 60px;
        padding: 0.5rem;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        font-family: inherit;
        font-size: 0.8125rem;
      }
      .resize-both {
        min-height: 80px;
      }
    </style>
  </head>
  <body>
    <h1>Resize Utilities</h1>
    <p>
      Control how textareas can be resized by the user. Try dragging the bottom-right corner of each.
    </p>
    <div class="demo-grid">
      <div class="demo-card">
        <h3>resize-none</h3>
        <span>.resize-none</span>
        <textarea class="resize-none">This textarea cannot be resized.</textarea>
      </div>
      <div class="demo-card">
        <h3>resize-both</h3>
        <span>.resize-both</span>
        <textarea class="resize-both">This textarea can be resized in both directions.</textarea>
      </div>
      <div class="demo-card">
        <h3>resize-vertical</h3>
        <span>.resize-vertical</span>
        <textarea class="resize-vertical">This textarea can only be resized vertically.</textarea>
      </div>
      <div class="demo-card">
        <h3>resize-horizontal</h3>
        <span>.resize-horizontal</span>
        <textarea class="resize-horizontal">This textarea can only be resized horizontally.</textarea>
      </div>
    </div>
  </body>
</html>
