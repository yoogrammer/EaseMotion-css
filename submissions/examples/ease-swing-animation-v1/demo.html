<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swing Animation Demo</title>
  <!-- Load EaseMotion CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css@latest/dist/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f8fafc;
      margin: 0;
    }
    .container {
      text-align: center;
      background: white;
      padding: 3rem 4rem;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
    .bell-icon {
      font-size: 4rem;
      margin: 2rem auto;
      display: inline-block;
      cursor: pointer;
    }
    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 6px;
      background: #f59e0b;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #d97706;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>EaseMotion Swing Animation</h2>
    
    <div id="target" class="bell-icon">
      🔔
    </div>

    <div class="controls">
      <button onclick="triggerAnimation()">Ring Bell (Swing)</button>
    </div>
  </div>

  <script>
    function triggerAnimation() {
      const target = document.getElementById('target');
      
      // Remove class
      target.classList.remove('ease-swing');
      
      // Force reflow
      void target.offsetWidth;
      
      // Re-add class to restart animation
      target.classList.add('ease-swing');
    }
  </script>
</body>
</html>
