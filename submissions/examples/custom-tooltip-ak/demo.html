<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Tooltip</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Custom Tooltip</h1>
    <p>Hover over the elements below to see tooltips in different positions.</p>
    <div class="toolbar">
      <button class="tt-btn" data-tip="Top tooltip" data-pos="top">Hover Top</button>
      <button class="tt-btn" data-tip="Bottom tooltip" data-pos="bottom">Hover Bottom</button>
      <button class="tt-btn" data-tip="Left tooltip" data-pos="left">Hover Left</button>
      <button class="tt-btn" data-tip="Right tooltip" data-pos="right">Hover Right</button>
    </div>
    <div class="card-row">
      <div class="card" data-tip="Card with a tooltip" data-pos="top">Card 1</div>
      <div class="card" data-tip="Another helpful hint" data-pos="bottom">Card 2</div>
      <div class="card" data-tip="Info on the side" data-pos="right">Card 3</div>
    </div>
  </div>
  <script>
    document.querySelectorAll("[data-tip]").forEach(el => {
      const tip = document.createElement("span");
      tip.className = "tooltip";
      tip.textContent = el.dataset.tip;
      const pos = el.dataset.pos || "top";
      tip.dataset.pos = pos;
      el.style.position = "relative";
      el.appendChild(tip);
    });
  </script>
</body>
</html>
