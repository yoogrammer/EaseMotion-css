<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Slide-in Panel</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            background: #0d0d14;
            color: #e4e4e7;
        }
        .demo-header { text-align: center; margin-bottom: 3rem; }
        .demo-header h1 { font-size: 2.5rem; background: linear-gradient(135deg, #6c63ff, #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .demo-section { background: #1a1a2e; border-radius: 1rem; padding: 2rem; margin-bottom: 2rem; text-align: center; }
        .demo-section h3 { color: #c4b5fd; margin-top: 0; }
        .note { background: #1a1a2e; padding: 1rem; border-radius: 12px; border-left: 3px solid #6c63ff; margin: 2rem 0; font-size: 0.875rem; text-align: center; }
        code { background: #1e1e2e; padding: 0.2rem 0.4rem; border-radius: 6px; }
        button { background: #6c63ff; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; color: white; cursor: pointer; margin: 0.5rem; }
    </style>
</head>
<body>

<div class="demo-header">
    <h1>Slide-in Panel</h1>
    <p>Off-canvas menu that slides in from edges</p>
</div>

<div class="demo-section">
    <h3>Right Panel (Default)</h3>
    <button onclick="openPanel('right')">Open Right Panel</button>
</div>

<div class="demo-section">
    <h3>Left Panel</h3>
    <button onclick="openPanel('left')">Open Left Panel</button>
</div>

<div class="demo-section">
    <h3>Top Panel</h3>
    <button onclick="openPanel('top')">Open Top Panel</button>
</div>

<div class="demo-section">
    <h3>Bottom Panel</h3>
    <button onclick="openPanel('bottom')">Open Bottom Panel</button>
</div>

<div id="slidePanel" class="ease-slide-panel">
    <div class="ease-slide-panel-content">
        <h3>Menu</h3>
        <ul>
            <li>Dashboard</li>
            <li>Profile</li>
            <li>Settings</li>
            <li>Logout</li>
        </ul>
        <button onclick="closePanel()" style="background:#f43f5e;">Close</button>
    </div>
</div>

<div class="note">
    💡 Click buttons to see panels slide in from different directions.
</div>

<script>
    function openPanel(direction) {
        var panel = document.getElementById('slidePanel');
        panel.className = 'ease-slide-panel ease-slide-panel-' + direction;
        panel.classList.add('ease-slide-panel-open');
    }
    function closePanel() {
        var panel = document.getElementById('slidePanel');
        panel.classList.remove('ease-slide-panel-open');
    }
</script>

</body>
</html>
