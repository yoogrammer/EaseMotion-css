<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoom Out Animation Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo-page">
    <section class="demo-panel">
      <p class="eyebrow">EaseMotion CSS Submission</p>
      <h1>Zoom Out Animation</h1>
      <p class="description">
        A self-contained zoom-out animation example for UI cards, modals, and feedback states.
      </p>

      <div class="preview-wrap">
        <div class="zoom-card">
          <span>Zoom Out</span>
        </div>
      </div>

      <button class="replay-button" onclick="document.querySelector('.zoom-card').classList.remove('zoom-out'); void document.querySelector('.zoom-card').offsetWidth; document.querySelector('.zoom-card').classList.add('zoom-out');">
        Replay Animation
      </button>
    </section>
  </main>

  <script>
    document.querySelector('.zoom-card').classList.add('zoom-out');
  </script>
</body>
</html>
