<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Segmented Pill Switch Selector</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 440px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Sliding Segmented Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Click the option switch buttons. General sibling combinators shift the background pill and modify the rate content fields smoothly with 0 script lines.</p>
  </header>

  <div class="alm-switch-stage">
    
    <div class="alm-segmented-switch">
      <input type="radio" id="switch-opt-1" name="billingCycle" class="alm-switch-radio" checked>
      <input type="radio" id="switch-opt-2" name="billingCycle" class="alm-switch-radio">
      
      <label for="switch-opt-1" class="alm-switch-label">Monthly Billing</label>
      <label for="switch-opt-2" class="alm-switch-label">Annual Cycle</label>
      
      <div class="alm-switch-slider"></div>
    </div>

    <div class="alm-pricing-card">
      <h3 style="color: rgba(255,255,255,0.4); font-size: 0.75rem; text-transform: uppercase; margin: 0; letter-spacing: 0.05em;">Vector Engine Node</h3>
      <div class="alm-price-display"></div>
      <span class="alm-price-period"></span>
    </div>

  </div>

</body>
</html>
