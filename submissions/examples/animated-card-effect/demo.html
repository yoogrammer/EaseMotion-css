<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Stat Cards — EaseMotion CSS Submission</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-wrapper">

    <header class="page-header">
      <span class="header-tag">// Stat Cards · Accent Cards</span>
      <p class="header-hint">scroll down to trigger count-up ↓</p>
    </header>

    <div class="stat-grid">

      <div class="stat-card" data-count="42" data-suffix="+">
        <div class="stat-bg-glow"></div>
        <div class="stat-track">
          <span class="stat-number" data-target="42" data-suffix="+">0+</span>
          <div class="stat-bar"></div>
        </div>
        <span class="stat-label">UTILITIES</span>
      </div>

      <div class="stat-card stat-card--accent" data-count="20" data-suffix="+">
        <div class="stat-bg-glow"></div>
        <div class="stat-track">
          <span class="stat-number" data-target="20" data-suffix="+">0+</span>
          <div class="stat-bar"></div>
        </div>
        <span class="stat-label">ANIMATIONS</span>
      </div>

      <div class="stat-card stat-card--zero" data-count="0">
        <div class="stat-bg-glow"></div>
        <div class="stat-track">
          <span class="stat-number" data-target="0">0</span>
          <div class="stat-bar stat-bar--zero"></div>
        </div>
        <span class="stat-label">DEPENDENCIES</span>
      </div>

      <div class="stat-card stat-card--warm" data-count="15" data-suffix="kB">
        <div class="stat-bg-glow"></div>
        <div class="stat-track">
          <span class="stat-number" data-target="15" data-suffix="kB">0kB</span>
          <div class="stat-bar"></div>
        </div>
        <span class="stat-label">BUNDLE SIZE</span>
      </div>

    </div>

  </div>

  <script>
    function easeOutExpo(t) {
      return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
    }

    function animateCount(el) {
      const target   = parseInt(el.dataset.target, 10);
      const suffix   = el.dataset.suffix || '';
      const duration = target === 0 ? 400 : 1800;
      const start    = performance.now();

      if (target === 0) {
        el.textContent = '0' + suffix;
        el.classList.add('stat-number--done');
        return;
      }

      function tick(now) {
        const elapsed  = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased    = easeOutExpo(progress);
        const current  = Math.round(eased * target);

        el.textContent = current + suffix;

        if (progress < 1) {
          requestAnimationFrame(tick);
        } else {
          el.textContent = target + suffix;
          el.classList.add('stat-number--done');
        }
      }

      requestAnimationFrame(tick);
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const card = entry.target;
          card.classList.add('stat-card--visible');

          const numEl = card.querySelector('.stat-number');
          if (numEl && !numEl.classList.contains('stat-number--done')) {
            setTimeout(() => animateCount(numEl), 200);
          }

          observer.unobserve(card);
        }
      });
    }, { threshold: 0.25 });

    document.querySelectorAll('.stat-card').forEach(card => observer.observe(card));
  </script>

</body>
</html>
