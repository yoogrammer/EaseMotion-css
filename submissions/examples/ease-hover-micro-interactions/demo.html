<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hover Micro-Interactions | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="hover-showcase-wrapper">
    <header class="showcase-header">
      <h1>Hover Micro-Interactions</h1>
      <p>A proposal for <code>core/utilities.css</code> to add simple, drop-in hover classes.</p>
    </header>

    <div class="demo-area">
      <div class="demo-grid">
        <!-- Lift -->
        <div class="hover-card em-hover-lift">
          <div class="icon">🚀</div>
          <h3>Lift</h3>
          <p>.em-hover-lift</p>
        </div>
        
        <!-- Scale -->
        <div class="hover-card em-hover-scale">
          <div class="icon">🔍</div>
          <h3>Scale</h3>
          <p>.em-hover-scale</p>
        </div>
        
        <!-- Glow -->
        <div class="hover-card em-hover-glow">
          <div class="icon">✨</div>
          <h3>Glow</h3>
          <p>.em-hover-glow</p>
        </div>
      </div>
    </div>
    
  </div>

</body>
</html>
