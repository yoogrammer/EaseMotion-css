<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tooltip Component — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 60px 24px;
    }

    h1 { margin-bottom: 4px; }
    p { color: #94a3b8; margin-bottom: 0; }

    .row {
      display: flex;
      gap: 32px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 10px 20px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    label {
      color: #94a3b8;
      font-size: 0.8rem;
      text-align: center;
      display: block;
      margin-top: 8px;
    }

    .item { text-align: center; }
  </style>
</head>
<body>

  <div>
    <h1>Tooltip Component</h1>
    <p>Hover over any button to see the tooltip.</p>
  </div>

  <div class="row">
    <div class="item">
      <button class="ease-tooltip" data-tip="Default tooltip (top)">Hover me</button>
      <label>ease-tooltip (top)</label>
    </div>

    <div class="item">
      <button class="ease-tooltip ease-tooltip-bottom" data-tip="Tooltip below">Hover me</button>
      <label>ease-tooltip-bottom</label>
    </div>

    <div class="item">
      <button class="ease-tooltip ease-tooltip-left" data-tip="Tooltip left">Hover me</button>
      <label>ease-tooltip-left</label>
    </div>

    <div class="item">
      <button class="ease-tooltip ease-tooltip-right" data-tip="Tooltip right">Hover me</button>
      <label>ease-tooltip-right</label>
    </div>
  </div>

</body>
</html>
