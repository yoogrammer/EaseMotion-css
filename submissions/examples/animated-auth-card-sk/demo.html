<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Auth Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-card">
    <div class="card-glow"></div>
    <h1 class="card-title">Welcome Back</h1>
    <p class="card-subtitle">Sign in to your account</p>
    <form class="auth-form">
      <div class="input-group">
        <input type="email" id="email" class="form-input" placeholder=" " autocomplete="email">
        <label for="email" class="floating-label">Email</label>
      </div>
      <div class="input-group">
        <input type="password" id="password" class="form-input" placeholder=" " autocomplete="current-password">
        <label for="password" class="floating-label">Password</label>
      </div>
      <button type="submit" class="submit-btn">Sign In</button>
      <a href="#" class="forgot-link">Forgot password?</a>
    </form>
  </div>
</body>
</html>
