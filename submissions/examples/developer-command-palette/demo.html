<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Developer Command Palette – a VS Code / Raycast-inspired command launcher built with EaseMotion CSS.">
  <title>Developer Command Palette | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="cp-preview">
    <div class="cp-wrapper" role="dialog" aria-label="Command Palette">

      <!-- Search header -->
      <div class="cp-header">
        <span class="cp-search-icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input
          type="text"
          class="cp-input"
          placeholder="Type a command..."
          aria-label="Command Search"
        >
      </div>

      <!-- Command list -->
      <div class="cp-list" role="listbox" aria-label="Commands">

        <button class="cp-item active" role="option" aria-selected="true">
          <span class="cp-left">
            <span class="cp-icon" aria-hidden="true">&#8984;</span>
            Open Dashboard
          </span>
          <kbd class="cp-kbd">&crarr;</kbd>
        </button>

        <button class="cp-item" role="option">
          <span class="cp-left">
            <span class="cp-icon" aria-hidden="true">&#9889;</span>
            Run Deployment
          </span>
          <kbd class="cp-kbd">&#8984;D</kbd>
        </button>

        <button class="cp-item" role="option">
          <span class="cp-left">
            <span class="cp-icon" aria-hidden="true">&#128193;</span>
            Open Project
          </span>
          <kbd class="cp-kbd">&#8984;P</kbd>
        </button>

        <button class="cp-item" role="option">
          <span class="cp-left">
            <span class="cp-icon" aria-hidden="true">&#128269;</span>
            Search Files
          </span>
          <kbd class="cp-kbd">&#8984;F</kbd>
        </button>

      </div>
    </div>
  </main>

</body>
</html>
