<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Comparison Slider</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Image Comparison Slider</h1>
    <p>Drag the handle left or right to compare before and after.</p>
    <div class="comparison" id="comparison">
      <div class="comparison-after"></div>
      <div class="comparison-before" id="before-layer"></div>
      <div class="comparison-handle" id="handle">
        <span class="handle-icon">&lt;</span>
        <span class="handle-icon">&gt;</span>
      </div>
    </div>
  </div>
  <script>
    const comp = document.getElementById("comparison");
    const before = document.getElementById("before-layer");
    const handle = document.getElementById("handle");
    let dragging = false;

    function move(x) {
      const rect = comp.getBoundingClientRect();
      let pct = ((x - rect.left) / rect.width) * 100;
      if (pct < 5) pct = 5;
      if (pct > 95) pct = 95;
      before.style.clipPath = "inset(0 " + (100 - pct) + "% 0 0)";
      handle.style.left = pct + "%";
    }

    comp.addEventListener("mousedown", function(e) { dragging = true; move(e.clientX); });
    document.addEventListener("mousemove", function(e) { if (dragging) move(e.clientX); });
    document.addEventListener("mouseup", function() { dragging = false; });
    comp.addEventListener("touchstart", function(e) { dragging = true; move(e.touches[0].clientX); });
    document.addEventListener("touchmove", function(e) { if (dragging) move(e.touches[0].clientX); });
    document.addEventListener("touchend", function() { dragging = false; });

    move(comp.getBoundingClientRect().left + comp.offsetWidth / 2);
  </script>
</body>
</html>
