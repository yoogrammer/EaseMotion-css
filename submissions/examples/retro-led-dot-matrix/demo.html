<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro LED Dot Matrix Display – EaseMotion CSS</title>
  <meta name="description" content="A scrolling LED dot matrix display built from CSS grid dots with animated text rendering." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>[ LED DOT MATRIX ]</h1>
  <p>Type your own message and watch it scroll across the board</p>

  <div class="led-panel" role="region" aria-label="LED dot matrix display">
    <div class="panel-header">
      <span class="panel-title">EaseMotion LED Board v1.0</span>
      <span class="panel-status"><span class="status-dot" aria-hidden="true"></span> SCROLLING</span>
    </div>
    <div class="dot-grid" id="dotGrid" role="img" aria-label="Scrolling LED display" aria-live="polite"></div>
  </div>

  <div class="controls">
    <div class="text-wrap">
      <input class="led-input" id="ledInput" type="text"
        maxlength="60" value="EASE MOTION CSS ★ " placeholder="Type message..."
        aria-label="Message to display on LED board" />
      <button class="btn-led" id="btnSet" aria-label="Set message">SET</button>
    </div>
    <div class="speed-wrap">
      <label for="speedSlider">SPEED</label>
      <input type="range" class="speed-slider" id="speedSlider"
        min="40" max="300" value="120" aria-label="Scroll speed" />
    </div>
    <button class="btn-led" id="btnPause">⏸ PAUSE</button>
    <button class="btn-led" id="btnClear">CLR</button>
  </div>

  <div class="controls">
    <button class="btn-led" data-preset="EASE MOTION CSS ★ " aria-label="Preset: EaseMotion">EaseMotion</button>
    <button class="btn-led" data-preset="HELLO WORLD! " aria-label="Preset: Hello World">Hello World</button>
    <button class="btn-led" data-preset="100% PURE CSS ► " aria-label="Preset: Pure CSS">Pure CSS</button>
    <button class="btn-led" data-preset="◄ OPEN SOURCE ► " aria-label="Preset: Open Source">Open Source</button>
  </div>

  <script>
    /* ---- LED FONT (5×7 bitmap, cols then rows) ---- */
    const FONT = {
      ' ':[0,0,0,0,0],
      'A':[0b01110,0b10001,0b10001,0b11111,0b10001,0b10001,0b10001],
      'B':[0b11110,0b10001,0b10001,0b11110,0b10001,0b10001,0b11110],
      'C':[0b01110,0b10001,0b10000,0b10000,0b10000,0b10001,0b01110],
      'D':[0b11100,0b10010,0b10001,0b10001,0b10001,0b10010,0b11100],
      'E':[0b11111,0b10000,0b10000,0b11110,0b10000,0b10000,0b11111],
      'F':[0b11111,0b10000,0b10000,0b11110,0b10000,0b10000,0b10000],
      'G':[0b01110,0b10001,0b10000,0b10111,0b10001,0b10001,0b01110],
      'H':[0b10001,0b10001,0b10001,0b11111,0b10001,0b10001,0b10001],
      'I':[0b11111,0b00100,0b00100,0b00100,0b00100,0b00100,0b11111],
      'J':[0b00111,0b00010,0b00010,0b00010,0b00010,0b10010,0b01100],
      'K':[0b10001,0b10010,0b10100,0b11000,0b10100,0b10010,0b10001],
      'L':[0b10000,0b10000,0b10000,0b10000,0b10000,0b10000,0b11111],
      'M':[0b10001,0b11011,0b10101,0b10101,0b10001,0b10001,0b10001],
      'N':[0b10001,0b11001,0b10101,0b10011,0b10001,0b10001,0b10001],
      'O':[0b01110,0b10001,0b10001,0b10001,0b10001,0b10001,0b01110],
      'P':[0b11110,0b10001,0b10001,0b11110,0b10000,0b10000,0b10000],
      'Q':[0b01110,0b10001,0b10001,0b10001,0b10101,0b10010,0b01101],
      'R':[0b11110,0b10001,0b10001,0b11110,0b10100,0b10010,0b10001],
      'S':[0b01111,0b10000,0b10000,0b01110,0b00001,0b00001,0b11110],
      'T':[0b11111,0b00100,0b00100,0b00100,0b00100,0b00100,0b00100],
      'U':[0b10001,0b10001,0b10001,0b10001,0b10001,0b10001,0b01110],
      'V':[0b10001,0b10001,0b10001,0b10001,0b01010,0b01010,0b00100],
      'W':[0b10001,0b10001,0b10001,0b10101,0b10101,0b11011,0b10001],
      'X':[0b10001,0b10001,0b01010,0b00100,0b01010,0b10001,0b10001],
      'Y':[0b10001,0b10001,0b01010,0b00100,0b00100,0b00100,0b00100],
      'Z':[0b11111,0b00001,0b00010,0b00100,0b01000,0b10000,0b11111],
      '0':[0b01110,0b10001,0b10011,0b10101,0b11001,0b10001,0b01110],
      '1':[0b00100,0b01100,0b00100,0b00100,0b00100,0b00100,0b11111],
      '2':[0b01110,0b10001,0b00001,0b00110,0b01000,0b10000,0b11111],
      '3':[0b11111,0b00010,0b00100,0b00110,0b00001,0b10001,0b01110],
      '4':[0b00010,0b00110,0b01010,0b10010,0b11111,0b00010,0b00010],
      '5':[0b11111,0b10000,0b11110,0b00001,0b00001,0b10001,0b01110],
      '6':[0b00110,0b01000,0b10000,0b11110,0b10001,0b10001,0b01110],
      '7':[0b11111,0b00001,0b00010,0b00100,0b01000,0b01000,0b01000],
      '8':[0b01110,0b10001,0b10001,0b01110,0b10001,0b10001,0b01110],
      '9':[0b01110,0b10001,0b10001,0b01111,0b00001,0b00010,0b01100],
      '!':[0b00100,0b00100,0b00100,0b00100,0b00100,0b00000,0b00100],
      '.':[0b00000,0b00000,0b00000,0b00000,0b00000,0b00000,0b00100],
      '-':[0b00000,0b00000,0b00000,0b11111,0b00000,0b00000,0b00000],
      '★':[0b00100,0b10101,0b01110,0b11111,0b01110,0b10101,0b00100],
      '►':[0b10000,0b11000,0b11100,0b11110,0b11100,0b11000,0b10000],
      '◄':[0b00001,0b00011,0b00111,0b01111,0b00111,0b00011,0b00001],
      '+':[0b00000,0b00100,0b00100,0b11111,0b00100,0b00100,0b00000],
      '%':[0b11000,0b11001,0b00010,0b00100,0b01000,0b10011,0b00011],
    };

    const ROWS = 7;
    const COLS = 42;  // visible columns
    const GAP_COLS = 1; // gap between chars

    const grid = document.getElementById('dotGrid');
    grid.style.gridTemplateColumns = `repeat(${COLS}, 10px)`;
    grid.style.gridTemplateRows    = `repeat(${ROWS}, 10px)`;

    // Create all dot cells
    const dots = [];
    for (let r = 0; r < ROWS; r++) {
      dots[r] = [];
      for (let c = 0; c < COLS; c++) {
        const d = document.createElement('div');
        d.className = 'dot';
        grid.appendChild(d);
        dots[r][c] = d;
      }
    }

    // Build a full pixel strip from text
    function textToStrip(text) {
      const strip = Array.from({length: ROWS}, () => []);
      for (const ch of text.toUpperCase()) {
        const glyph = FONT[ch] || FONT[' '];
        for (let r = 0; r < ROWS; r++) {
          const row = glyph[r] ?? 0;
          for (let b = 4; b >= 0; b--) {
            strip[r].push((row >> b) & 1);
          }
          // gap column
          for (let g = 0; g < GAP_COLS; g++) strip[r].push(0);
        }
      }
      return strip;
    }

    let text = document.getElementById('ledInput').value;
    let strip = textToStrip(text + '  ');
    let offset = 0;
    let paused = false;
    let speed = 120;
    let raf;

    function render() {
      const len = strip[0].length;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const idx = (offset + c) % len;
          const on = strip[r][idx] === 1;
          dots[r][c].className = on ? 'dot on' : 'dot';
        }
      }
    }

    let last = 0;
    function tick(ts) {
      if (!paused && ts - last > speed) {
        offset = (offset + 1) % strip[0].length;
        render();
        last = ts;
      }
      raf = requestAnimationFrame(tick);
    }

    render();
    raf = requestAnimationFrame(tick);

    // Controls
    const btnPause = document.getElementById('btnPause');
    btnPause.addEventListener('click', () => {
      paused = !paused;
      btnPause.textContent = paused ? '▶ PLAY' : '⏸ PAUSE';
      btnPause.classList.toggle('active', paused);
    });

    document.getElementById('speedSlider').addEventListener('input', e => {
      speed = 340 - parseInt(e.target.value); // invert
    });

    document.getElementById('btnSet').addEventListener('click', setMessage);
    document.getElementById('ledInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') setMessage();
    });

    function setMessage() {
      text = document.getElementById('ledInput').value || 'EASE MOTION CSS ★ ';
      strip = textToStrip(text + '  ');
      offset = 0;
    }

    document.getElementById('btnClear').addEventListener('click', () => {
      document.getElementById('ledInput').value = '';
      text = '   ';
      strip = textToStrip(text);
      offset = 0;
    });

    document.querySelectorAll('[data-preset]').forEach(btn => {
      btn.addEventListener('click', () => {
        const msg = btn.dataset.preset;
        document.getElementById('ledInput').value = msg;
        text = msg;
        strip = textToStrip(text + '  ');
        offset = 0;
      });
    });
  </script>
</body>
</html>
