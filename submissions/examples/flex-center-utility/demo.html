<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex-Center Demo - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --ease-space-1: 0.25rem;
            --ease-space-2: 0.5rem;
            --ease-space-4: 1rem;
            --ease-space-8: 2rem;
            --ease-space-16: 4rem;

            --ease-bp-sm: 640px;
            --ease-bp-md: 768px;
            --ease-bp-lg: 1024px;
            --ease-bp-xl: 1280px;
        }

        body {
            font-family: sans-serif;
            padding: 2rem;
            background: #f4f4f9;
        }

        .container {
            background: white;
            border: 2px dashed #ccc;
            min-height: 200px;
            margin-bottom: 2rem;
        }

        .box {
            background: #6366f1;
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: bold;
        }

        code {
            background: #eee;
            padding: 0.2rem 0.4rem;
        }

        /* Mocking existing gap utilities for the demo since they are in core/utilities.css */
        .ease-gap-2 {
            gap: var(--ease-space-2) !important;
        }

        .ease-gap-4 {
            gap: var(--ease-space-4) !important;
        }

        @media (min-width: 768px) {
            .ease-md-gap-8 {
                gap: var(--ease-space-8) !important;
            }
        }
    </style>
</head>

<body>

    <h1>EaseMotion Flex-Center Utility</h1>

    <section>
        <h3>1. Basic Centering (<code>ease-flex-center</code>)</h3>
        <div class="container ease-flex-center">
            <div class="box">Perfectly Centered</div>
        </div>
    </section>

    <section>
        <h3>2. Responsive Gap Control</h3>
        <p>Utilizes existing gap utilities: <code>0.5rem</code> gap on mobile, increasing to <code>2rem</code> on medium
            screens (768px+).</p>
        <div class="container ease-flex-center ease-gap-2 ease-md-gap-8">
            <div class="box">Item A</div>
            <div class="box">Item B</div>
            <div class="box">Item C</div>
        </div>
    </section>

</body>

</html>
