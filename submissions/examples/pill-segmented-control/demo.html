<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pill Segmented Control</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Pill Segmented Control</h1>
    <p class="subtitle">Smooth animated segment switcher with active indicator</p>

    <div class="segmented-control" role="group" aria-label="View options">
      <button class="segment active" data-value="day">Day</button>
      <button class="segment" data-value="week">Week</button>
      <button class="segment" data-value="month">Month</button>
      <button class="segment" data-value="year">Year</button>
    </div>

    <p class="hint">Click a segment to switch — active state slides smoothly</p>
  </div>

  <script>
    document.querySelectorAll(".segment").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".segment").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
      });
    });
  </script>
</body>
</html>
