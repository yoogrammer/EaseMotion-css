<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Mesh Architecture</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Service Mesh Architecture</h1>

    <p class="subtitle">
        Visualizing service-to-service communication through sidecar proxies and a centralized control plane.
    </p>

    <div class="mesh">

        <div class="control-plane">
            ☁️ Control Plane (Istio)
        </div>

        <div class="connector"></div>

        <div class="services">

            <div class="service-group">

                <div class="service">
                    Service A
                </div>

                <div class="sidecar">
                    Sidecar Proxy
                </div>

            </div>

            <div class="service-group">

                <div class="service">
                    Service B
                </div>

                <div class="sidecar">
                    Sidecar Proxy
                </div>

            </div>

            <div class="service-group">

                <div class="service">
                    Service C
                </div>

                <div class="sidecar">
                    Sidecar Proxy
                </div>

            </div>

        </div>

        <div class="traffic">
            ⇄ Secure Service Communication ⇄
        </div>

    </div>

</div>

</body>
</html>
