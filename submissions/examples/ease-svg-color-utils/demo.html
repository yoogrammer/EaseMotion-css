<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>ease-svg-color Utilities Demo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Inter, sans-serif;
        padding: 2rem;
        background: #f8fafc;
      }
      h2 {
        color: #6366f1;
      }
      .row {
        display: flex;
        gap: 2rem;
        flex-wrap: wrap;
        margin-bottom: 1.5rem;
      }
      .row > div {
        text-align: center;
      }
      svg {
        width: 48px;
        height: 48px;
      }
      label {
        display: block;
        margin-top: 0.5rem;
        font-size: 0.85rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <h2>SVG Color Utilities</h2>
    <div class="row">
      <div>
        <svg class="ease-fill-current ease-text-primary" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" /></svg
        ><label>fill-current + text-primary</label>
      </div>
      <div>
        <svg class="ease-fill-current ease-text-success" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" /></svg
        ><label>fill-current + text-success</label>
      </div>
      <div>
        <svg class="ease-fill-current ease-text-danger" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" /></svg
        ><label>fill-current + text-danger</label>
      </div>
    </div>
    <div class="row">
      <div>
        <svg
          class="ease-stroke-current ease-text-primary"
          viewBox="0 0 24 24"
          fill="none"
        >
          <circle cx="12" cy="12" r="10" stroke-width="2" /></svg
        ><label>stroke-current + text-primary</label>
      </div>
      <div>
        <svg
          class="ease-stroke-current ease-text-warning"
          viewBox="0 0 24 24"
          fill="none"
        >
          <circle cx="12" cy="12" r="10" stroke-width="2" /></svg
        ><label>stroke-current + text-warning</label>
      </div>
      <div>
        <svg
          class="ease-stroke-current ease-text-info"
          viewBox="0 0 24 24"
          fill="none"
        >
          <circle cx="12" cy="12" r="10" stroke-width="2" /></svg
        ><label>stroke-current + text-info</label>
      </div>
    </div>
  </body>
</html>
