<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntax Highlighted Code Block Component</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="component-showcase">
        <div class="code-block-card">
            <div class="code-block-header">
                <span class="language-badge">JAVASCRIPT</span>
                <button class="copy-action-btn" onclick="navigator.clipboard.writeText('const engine = () => {\n    console.log(\'Core Active\');\n};')">Copy</button>
            </div>
            
            <div class="code-content-wrapper">
                <div class="line-numbers-gutter">
                    <span>1</span>
                    <span>2</span>
                    <span>3</span>
                </div>
                <pre class="code-display"><code><span class="token-keyword">const</span> <span class="token-function">engine</span> <span class="token-operator">=</span> <span class="token-punctuation">()</span> <span class="token-operator">=></span> <span class="token-punctuation">{</span>
    <span class="token-domain">console</span><span class="token-punctuation">.</span><span class="token-function">log</span><span class="token-punctuation">(</span><span class="token-string">'Core Active'</span><span class="token-punctuation">)</span><span class="token-punctuation">;</span>
<span class="token-punctuation">}</span><span class="token-punctuation">;</span></code></pre>
            </div>
        </div>
    </main>

</body>
</html>
