<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Step Progress Indicator</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc; flex-direction: column; gap: 1.5rem;">
    <div class="stepper">
      <div class="stepper-step active" data-step="1"><div class="stepper-circle">1</div><span class="stepper-label">Cart</span></div>
      <div class="stepper-step" data-step="2"><div class="stepper-circle">2</div><span class="stepper-label">Shipping</span></div>
      <div class="stepper-step" data-step="3"><div class="stepper-circle">3</div><span class="stepper-label">Payment</span></div>
      <div class="stepper-step" data-step="4"><div class="stepper-circle">4</div><span class="stepper-label">Confirm</span></div>
    </div>
    <div class="stepper-actions">
      <button class="stepper-btn" id="stepPrev" disabled>Previous</button>
      <button class="stepper-btn" id="stepNext">Next</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
