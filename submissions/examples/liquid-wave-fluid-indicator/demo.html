<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Organic Liquid Wave Fluid Indicator — pure CSS progress indicator with rotating border-radius wave surfaces.">
  <title>Liquid Wave Fluid Indicator | EaseMotion CSS</title>
  <link rel="stylesheet" href="../easemotion.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--wave-bg);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
    }
    .demo-wrap {
      width: 100%;
      max-width: 700px;
      text-align: center;
    }
    .demo-wrap h1 {
      color: var(--wave-text);
      font-size: 1.4rem;
      margin: 0 0 0.25rem;
    }
    .demo-wrap > p {
      color: var(--wave-muted);
      font-size: 0.9rem;
      margin: 0 0 2.5rem;
    }
    .demo-grid {
      display: flex;
      gap: 2.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 2.5rem;
    }
    .demo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    .demo-item-label {
      font-size: 0.82rem;
      color: var(--wave-muted);
      font-weight: 600;
    }
    .demo-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      padding: 1.5rem;
      background: var(--wave-surface);
      border: 1px solid var(--wave-border);
      border-radius: 12px;
    }
    .demo-controls label {
      color: var(--wave-text);
      font-size: 0.9rem;
      font-weight: 600;
    }
    .demo-controls input[type="range"] {
      width: 200px;
      accent-color: var(--wave-primary);
    }
    .demo-controls .val {
      color: var(--wave-primary);
      font-weight: 700;
      font-size: 1.1rem;
      min-width: 40px;
    }
    .demo-btn {
      padding: 0.5rem 1.2rem;
      border: 1px solid var(--wave-border);
      border-radius: 8px;
      background: var(--wave-surface);
      color: var(--wave-text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .demo-btn:hover {
      border-color: var(--wave-primary);
      color: var(--wave-primary);
    }
    .demo-btn.active {
      background: var(--wave-primary);
      border-color: var(--wave-primary);
      color: #fff;
    }
    .demo-presets {
      display: flex;
      gap: 0.5rem;
    }
  </style>
</head>
<body>

  <div class="demo-wrap">
    <h1>Liquid Wave Fluid Indicator</h1>
    <p>Organic fill-level indicator using rotating border-radius layers with depth blending.</p>

    <div class="demo-grid">

      <!-- 25% -->
      <div class="demo-item">
        <div class="ease-wave-container" style="--fill-level: 22%;">
          <div class="ease-wave-liquid"></div>
          <div class="ease-wave-label">
            <span class="ease-wave-value">25</span>
            <span class="ease-wave-unit">Percent</span>
          </div>
        </div>
        <span class="demo-item-label">Low</span>
      </div>

      <!-- 50% -->
      <div class="demo-item">
        <div class="ease-wave-container" style="--fill-level: 48%;">
          <div class="ease-wave-liquid"></div>
          <div class="ease-wave-label">
            <span class="ease-wave-value">50</span>
            <span class="ease-wave-unit">Percent</span>
          </div>
        </div>
        <span class="demo-item-label">Medium</span>
      </div>

      <!-- 75% -->
      <div class="demo-item">
        <div class="ease-wave-container" style="--fill-level: 73%;">
          <div class="ease-wave-liquid"></div>
          <div class="ease-wave-label">
            <span class="ease-wave-value">75</span>
            <span class="ease-wave-unit">Percent</span>
          </div>
        </div>
        <span class="demo-item-label">High</span>
      </div>

      <!-- 90% -->
      <div class="demo-item">
        <div class="ease-wave-container" style="--fill-level: 88%;">
          <div class="ease-wave-liquid"></div>
          <div class="ease-wave-label">
            <span class="ease-wave-value">90</span>
            <span class="ease-wave-unit">Percent</span>
          </div>
        </div>
        <span class="demo-item-label">Almost Full</span>
      </div>

    </div>

    <!-- Interactive controls -->
    <div class="demo-controls">
      <label for="level-slider">Fill Level:</label>
      <input type="range" id="level-slider" min="5" max="95" value="50">
      <span class="val" id="level-value">50%</span>

      <div class="demo-presets">
        <button class="demo-btn" data-level="20">20%</button>
        <button class="demo-btn" data-level="40">40%</button>
        <button class="demo-btn active" data-level="50">50%</button>
        <button class="demo-btn" data-level="70">70%</button>
        <button class="demo-btn" data-level="90">90%</button>
      </div>
    </div>

  </div>

  <script>
    (function () {
      var container = document.querySelector('.ease-wave-container');
      var wave = container.querySelector('.ease-wave-liquid');
      var valueEl = container.querySelector('.ease-wave-value');
      var slider = document.getElementById('level-slider');
      var levelVal = document.getElementById('level-value');
      var btns = document.querySelectorAll('.demo-btn[data-level]');

      function setLevel(val) {
        var pct = parseInt(val, 10);
        container.style.setProperty('--fill-level', pct + '%');
        valueEl.textContent = pct;
        levelVal.textContent = pct + '%';
        slider.value = pct;

        btns.forEach(function (b) {
          b.classList.toggle('active', parseInt(b.getAttribute('data-level'), 10) === pct);
        });
      }

      slider.addEventListener('input', function () {
        setLevel(this.value);
      });

      btns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          setLevel(this.getAttribute('data-level'));
        });
      });
    })();
  </script>

</body>
</html>
