<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ease Spinner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>Circular Spinner — Sizes</h2>
    <div class="row">
      <div>
        <div class="ease-spinner ease-spinner-sm"></div>
        <p class="label">sm</p>
      </div>
      <div>
        <div class="ease-spinner"></div>
        <p class="label">default</p>
      </div>
      <div>
        <div class="ease-spinner ease-spinner-lg"></div>
        <p class="label">lg</p>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Color Variants</h2>
    <div class="row">
      <div class="ease-spinner"></div>
      <div class="ease-spinner green"></div>
      <div class="ease-spinner orange"></div>
      <div class="ease-spinner pink"></div>
      <div class="ease-spinner blue"></div>
      <div class="ease-spinner red"></div>
    </div>
  </div>

  <div class="card">
    <h2>Dots Variant</h2>
    <div style="display:flex; flex-direction:column; gap:20px; align-items:center;">
      <div class="ease-spinner-dots"></span>
        <span></span><span></span><span></span>
      </div>
      <div class="ease-spinner-dots green">
        <span></span><span></span><span></span>
      </div>
      <div class="ease-spinner-dots orange">
        <span></span><span></span><span></span>
      </div>
      <div class="ease-spinner-dots pink">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

</body>
</html>
