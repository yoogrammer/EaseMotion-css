<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tooltip Reduced Motion Alignment Fix</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-container">
    <h1>Tooltip Reduced Motion Layout Fix</h1>
    <p>Hover the items below with reduced motion active. They center correctly above and beside targets.</p>
    <div class="demo-box">
      <span class="tooltip tooltip-top-fixed" data-tooltip="Top Tooltip Content">Hover Top</span>
      <span class="tooltip tooltip-left-fixed" data-tooltip="Left Tooltip Content">Hover Left</span>
    </div>
  </main>
</body>
</html>
