<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usage Quota Ring and Threshold Meter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="quota-board" aria-labelledby="demo-title">
      <div class="board-header">
        <p class="eyebrow">Plan usage</p>
        <h1 id="demo-title">Usage quota meters</h1>
        <p>CSS-only quota cards for API limits, storage, and team seats.</p>
      </div>

      <div class="quota-grid">
        <article class="quota-card is-safe" style="--quota: 42%; --delay: 0ms">
          <div class="quota-ring" role="img" aria-label="42 percent of API quota used">
            <span>42%</span>
          </div>
          <h2>API requests</h2>
          <p>42,000 of 100,000 used</p>
        </article>

        <article class="quota-card is-watch" style="--quota: 76%; --delay: 120ms">
          <div class="quota-ring" role="img" aria-label="76 percent of storage quota used">
            <span>76%</span>
          </div>
          <h2>Storage</h2>
          <p>380 GB of 500 GB used</p>
        </article>

        <article class="quota-card is-danger" style="--quota: 91%; --delay: 240ms">
          <div class="quota-ring" role="img" aria-label="91 percent of seats quota used">
            <span>91%</span>
          </div>
          <h2>Team seats</h2>
          <p>91 of 100 seats assigned</p>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
