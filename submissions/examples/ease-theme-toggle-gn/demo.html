<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-theme-toggle-gn Demo</title>
  <link rel="stylesheet" href="./style.css"/>
</head>
<body>

  <!-- Hidden checkbox controls theme -->
  <input type="checkbox" id="theme-toggle"/>

  <div class="page">

    <!-- Toggle switch -->
    <label class="theme-toggle-label" for="theme-toggle">
      <span class="toggle-icon">☀️</span>
      <div class="toggle-track"></div>
      <span class="toggle-icon">🌙</span>
      <span class="toggle-label-text">Toggle Theme</span>
    </label>

    <!-- Demo card that reacts to theme -->
    <div class="demo-card">
      <h2 class="demo-card-title">Theme Toggle Works! 🎉</h2>
      <p class="demo-card-body">
        Click the toggle above to switch between light and dark mode.
        All colors update instantly using CSS custom properties — zero JavaScript required.
      </p>
      <button class="demo-btn">Get Started</button>
    </div>

  </div>

</body>
</html>
