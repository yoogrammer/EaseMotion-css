<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Text Scramble Effect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ease-scramble-wrapper">
    <h1 class="ease-scramble" data-text="Hello World">
      Hello World
    </h1>

    <p class="ease-scramble" data-text="EaseMotion CSS">
      EaseMotion CSS
    </p>

    <p class="ease-scramble" data-text="Text Scramble Decode Effect">
      Text Scramble Decode Effect
    </p>
  </div>

  <script>
    const chars =
      "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";

    function scramble(element) {
      const finalText = element.dataset.text;
      let iteration = 0;

      element.classList.add("ease-scrambling");

      const interval = setInterval(() => {
        element.textContent = finalText
          .split("")
          .map((char, index) => {
            if (index < iteration) {
              return finalText[index];
            }

            return chars[
              Math.floor(Math.random() * chars.length)
            ];
          })
          .join("");

        if (iteration >= finalText.length) {
          clearInterval(interval);
          element.classList.remove("ease-scrambling");
        }

        iteration += 1 / 3;
      }, 30);
    }

    document
      .querySelectorAll(".ease-scramble")
      .forEach((element) => {
        scramble(element);

        element.addEventListener("mouseenter", () => {
          scramble(element);
        });
      });
  </script>

</body>
</html>
