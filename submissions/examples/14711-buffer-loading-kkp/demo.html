<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buffer Loading Pulse</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="demo-card" aria-labelledby="buffer-title">
        <p class="eyebrow">Loading state</p>
        <h1 id="buffer-title">Buffer pulse</h1>
        <div class="buffer-loader" role="img" aria-label="Buffering">
          <span class="buffer-bar"></span>
          <span class="buffer-bar"></span>
          <span class="buffer-bar"></span>
          <span class="buffer-bar"></span>
        </div>
        <p class="demo-copy">
          Staggered bars rise and fade to signal a media buffer in progress.
        </p>
      </section>
    </main>
  </body>
</html>
