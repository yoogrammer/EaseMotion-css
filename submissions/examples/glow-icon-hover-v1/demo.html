<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glow Icon Hover</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
      background: #0f172a;
      font-family: system-ui, sans-serif;
      color: #94a3b8;
    }
    p { font-size: 0.85rem; letter-spacing: 0.05em; }
    .icon-row {
      display: flex;
      gap: 2.5rem;
      align-items: center;
    }
    .icon-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

  <p>Hover over any icon</p>

  <div class="icon-row">

    <div class="icon-wrap" style="color: #facc15;">
      <!-- Star -->
      <svg class="ease-glow-icon-hover" xmlns="http://www.w3.org/2000/svg"
        width="40" height="40" viewBox="0 0 24 24"
        fill="currentColor" aria-label="Star">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
      </svg>
      <span>Star</span>
    </div>

    <div class="icon-wrap" style="color: #38bdf8;">
      <!-- Lightning bolt -->
      <svg class="ease-glow-icon-hover" xmlns="http://www.w3.org/2000/svg"
        width="40" height="40" viewBox="0 0 24 24"
        fill="currentColor" aria-label="Lightning">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
      <span>Bolt</span>
    </div>

    <div class="icon-wrap" style="color: #f472b6;">
      <!-- Heart -->
      <svg class="ease-glow-icon-hover" xmlns="http://www.w3.org/2000/svg"
        width="40" height="40" viewBox="0 0 24 24"
        fill="currentColor" aria-label="Heart">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span>Heart</span>
    </div>

    <div class="icon-wrap" style="color: #4ade80;">
      <!-- Checkmark circle -->
      <svg class="ease-glow-icon-hover" xmlns="http://www.w3.org/2000/svg"
        width="40" height="40" viewBox="0 0 24 24"
        fill="currentColor" aria-label="Check">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>Check</span>
    </div>

  </div>

</body>
</html>
