<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ease Pagination Component</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>Default Pagination</h2>
    <ul class="ease-pagination">
      <li class="ease-page-item ease-page-disabled">
        <a class="ease-page-link">← Prev</a>
      </li>
      <li class="ease-page-item">
        <a class="ease-page-link">1</a>
      </li>
      <li class="ease-page-item ease-page-active">
        <a class="ease-page-link">2</a>
      </li>
      <li class="ease-page-item">
        <a class="ease-page-link">3</a>
      </li>
      <li class="ease-page-item">
        <a class="ease-page-link">4</a>
      </li>
      <li class="ease-page-item">
        <a class="ease-page-link">5</a>
      </li>
      <li class="ease-page-item">
        <a class="ease-page-link">Next →</a>
      </li>
    </ul>
  </div>

  <div class="card">
    <h2>Rounded Variant</h2>
    <ul class="ease-pagination rounded">
      <li class="ease-page-item ease-page-disabled">
        <a class="ease-page-link">‹</a>
      </li>
      <li class="ease-page-item">
        <a class="ease-page-link">1</a>
      </li>
      <li class="ease-page-item ease-page-active">
        <a class="ease-page-link">2</a>
      </li>
      <li class="ease-page-item">
        <a class="ease-page-link">3</a>
      </li>
      <li class="ease-page-item">
        <a class="ease-page-link">4</a>
      </li>
      <li class="ease-page-item ease-page-disabled">
        <a class="ease-page-link">›</a>
      </li>
    </ul>
  </div>

  <div class="card">
    <h2>Green & Orange Variants</h2>
    <ul class="ease-pagination green" style="margin-bottom: 16px;">
      <li class="ease-page-item">
        <a class="ease-page-link">1</a>
      </li>
      <li class="ease-page-item ease-page-active">
        <a class="ease-page-link">2</a>
      </li>
      <li class="ease-page-item">
        <a class="ease-page-link">3</a>
      </li>
    </ul>
    <br/>
    <ul class="ease-pagination orange">
      <li class="ease-page-item">
        <a class="ease-page-link">1</a>
      </li>
      <li class="ease-page-item ease-page-active">
        <a class="ease-page-link">2</a>
      </li>
      <li class="ease-page-item">
        <a class="ease-page-link">3</a>
      </li>
    </ul>
  </div>

</body>
</html>
