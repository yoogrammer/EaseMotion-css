<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-spotlight — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 2rem;
      padding: 2rem;
    }
    h1 { color: #fff; }
    .row { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.5rem; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .card {
      width: 200px;
      height: 120px;
      border-radius: 12px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <h1>ease-spotlight Demo</h1>

  <div class="section">
    <div class="label">Color variants (hover each card)</div>
    <div class="row">
      <div class="card ease-spotlight">Default</div>
      <div class="card ease-spotlight ease-spotlight-blue">Blue</div>
      <div class="card ease-spotlight ease-spotlight-purple">Purple</div>
      <div class="card ease-spotlight ease-spotlight-warm">Warm</div>
      <div class="card ease-spotlight ease-spotlight-green">Green</div>
    </div>
  </div>

  <div class="section">
    <div class="label">Size variants</div>
    <div class="row">
      <div class="card ease-spotlight ease-spotlight-sm ease-spotlight-blue">Small</div>
      <div class="card ease-spotlight ease-spotlight-blue">Default</div>
      <div class="card ease-spotlight ease-spotlight-lg ease-spotlight-blue">Large</div>
    </div>
  </div>

</body>
</html>
