<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Decoration Utilities</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body { font-family: system-ui, sans-serif; max-width: 500px; margin: 2rem auto; padding: 1rem; background: #f8fafc; color: #1e293b; }
      h1 { font-size: 1.5rem; }
      p { color: #64748b; margin-bottom: 1.5rem; }
      .demo-grid { display: flex; gap: 1rem; flex-wrap: wrap; }
      .demo-card { flex: 1; min-width: 140px; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 1.5rem; text-align: center; font-size: 1.1rem; }
      .demo-card code { display: block; margin-top: 0.5rem; font-size: 0.75rem; color: #6c63ff; font-family: monospace; }
    </style>
  </head>
  <body>
    <h1>Text Decoration Utilities</h1>
    <p>Decorate text with lines.</p>
    <div class="demo-grid">
      <div class="demo-card text-underline">Underline<code>.text-underline</code></div>
      <div class="demo-card text-line-through">Strikethrough<code>.text-line-through</code></div>
      <div class="demo-card text-overline">Overline<code>.text-overline</code></div>
      <div class="demo-card text-no-decoration">None<code>.text-no-decoration</code></div>
    </div>
  </body>
</html>
