<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS offset-path Motion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>CSS offset-path</h1>
  <p class="subtitle">Animate elements along custom paths — circles, polygons, and SVG curves.</p>

  <section class="demo">
    <h2>Circle Path</h2>
    <div class="track circle-track">
      <div class="mover circle-mover">●</div>
    </div>
  </section>

  <section class="demo">
    <h2>Polygon Path</h2>
    <div class="track polygon-track">
      <div class="mover polygon-mover">◆</div>
    </div>
  </section>

  <section class="demo">
    <h2>SVG Curve Path</h2>
    <div class="track curve-track">
      <div class="mover curve-mover">✦</div>
    </div>
  </section>

  <section class="demo">
    <h2>Heart Path</h2>
    <div class="track heart-track">
      <div class="mover heart-mover">♥</div>
    </div>
  </section>

  <p class="note">All paths use <code>offset-path</code> with <code>offset-rotate: auto</code> so the element rotates to follow the path direction. Works in Chrome & Edge.</p>
</body>
</html>
