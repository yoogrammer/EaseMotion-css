<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Flicker Animation Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="neon-lounge">
    <header class="lounge-header">
      <h1 class="lounge-title">Atmospheric Neon Display</h1>
      <p class="lounge-subtitle">A pure CSS modular text-shadow flicker built using rapid irregular keyframe sequences.</p>
    </header>

    <div class="display-container">
      <!-- Variant 1: Cyber Electric Blue Sign -->
      <h2 class="ease-neon-flicker" style="--ease-neon-color: #00f0ff;">
        OPEN NOW
      </h2>

      <!-- Variant 2: Classic Hot Pink Sign -->
      <h2 class="ease-neon-flicker" style="--ease-neon-color: #ff0055; animation-duration: 3s;">
        BOJUEE CAFE
      </h2>
    </div>
  </div>

</body>
</html>
