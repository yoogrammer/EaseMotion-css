<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Button Hover</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <h1>Magnetic Buttons</h1>
    <p class="subtitle">Buttons that subtly follow your cursor — pure CSS</p>

    <div class="buttons-demo">
      <button class="mag-btn mag-btn--primary">Primary</button>
      <button class="mag-btn mag-btn--secondary">Secondary</button>
      <button class="mag-btn mag-btn--accent">Accent</button>
    </div>

    <div class="buttons-demo">
      <button class="mag-btn mag-btn--outline">Outline</button>
      <button class="mag-btn mag-btn--ghost">Ghost</button>
      <button class="mag-btn mag-btn--pill">Pill</button>
    </div>

    <div class="buttons-demo">
      <button class="mag-btn mag-btn--primary" disabled>Disabled</button>
      <a href="#" class="mag-btn mag-btn--secondary">Link Button</a>
      <button class="mag-btn mag-btn--accent mag-btn--lg">Large</button>
    </div>
  </div>
</body>
</html>
