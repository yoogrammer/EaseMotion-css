<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submission - Ease Hover Color Wipe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo-shell">
    <section class="intro">
      <p class="eyebrow">Text hover motion</p>
      <h1>Ease Hover Color Wipe</h1>
      <p>
        A left-to-right text color sweep using background-clip and CSS variables,
        designed for links, headings, and call-to-action labels.
      </p>
    </section>

    <section class="wipe-stack" aria-label="Hover color wipe examples">
      <a class="wipe-line ease-hover-color-wipe" href="#" style="--ease-wipe-to: #14b8a6;">
        Documentation link
      </a>

      <button class="wipe-button ease-hover-color-wipe" style="--ease-wipe-from: #f8fafc; --ease-wipe-to: #f59e0b;">
        Button label wipe
      </button>

      <h2 class="wipe-heading ease-hover-color-wipe" style="--ease-wipe-from: #cbd5e1; --ease-wipe-to: #a3e635;">
        Gradient text reveal
      </h2>
    </section>
  </main>
</body>
</html>
