<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-no-select Demo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>ease-no-select Utility Demo</h1>

      <button class="ease-no-select btn">You Cannot Select This Text</button>

      <p class="ease-no-select text">
        Try dragging your mouse over this paragraph. The text selection is
        disabled.
      </p>

      <p class="normal-text">This is normal selectable text for comparison.</p>
    </div>
  </body>
</html>
