<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing Calculator</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f1f5f9;">
    <div class="pc-card">
      <h2 class="pc-h2">Plan Calculator</h2>
      <div class="pc-row">
        <label class="pc-label">Users</label>
        <input type="range" id="pcUsers" min="1" max="50" value="5" />
        <span class="pc-value" id="pcUsersVal">5</span>
      </div>
      <div class="pc-row">
        <label class="pc-label">Storage (GB)</label>
        <input type="range" id="pcStorage" min="5" max="500" value="50" step="5" />
        <span class="pc-value" id="pcStorageVal">50</span>
      </div>
      <div class="pc-row">
        <label class="pc-label">Support</label>
        <select id="pcSupport">
          <option value="0">Basic (Free)</option>
          <option value="20">Priority (+$20)</option>
          <option value="50">Dedicated (+$50)</option>
        </select>
      </div>
      <div class="pc-total">
        <span class="pc-total-label">Monthly Total</span>
        <span class="pc-total-amount" id="pcTotal">$45</span>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
