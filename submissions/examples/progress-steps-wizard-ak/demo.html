<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Steps Wizard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Wizard</h1>
    <div class="steps" id="steps"></div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="step-content" id="stepContent">Step 1 content</div>
    <div class="controls">
      <button id="prevBtn" disabled>Previous</button>
      <button id="nextBtn">Next</button>
    </div>
  </div>

  <script>
    const totalSteps = 4;
    let currentStep = 0;

    const stepsContent = [
      'Welcome! This is step 1 — provide your name.',
      'Step 2 — enter your email address.',
      'Step 3 — confirm your preferences.',
      'Step 4 — review and submit.',
    ];

    const stepsEl = document.getElementById('steps');
    const progressFill = document.getElementById('progressFill');
    const stepContent = document.getElementById('stepContent');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    function render() {
      stepsEl.innerHTML = '';
      for (let i = 0; i < totalSteps; i++) {
        const dot = document.createElement('div');
        dot.className = 'step-dot' + (i <= currentStep ? ' active' : '');
        dot.textContent = i + 1;
        stepsEl.appendChild(dot);
        if (i < totalSteps - 1) {
          const line = document.createElement('div');
          line.className = 'step-line' + (i < currentStep ? ' active' : '');
          stepsEl.appendChild(line);
        }
      }
      progressFill.style.width = (currentStep / (totalSteps - 1)) * 100 + '%';
      stepContent.textContent = stepsContent[currentStep];
      prevBtn.disabled = currentStep === 0;
      nextBtn.textContent = currentStep === totalSteps - 1 ? 'Finish' : 'Next';
    }

    prevBtn.addEventListener('click', () => {
      if (currentStep > 0) { currentStep--; render(); }
    });

    nextBtn.addEventListener('click', () => {
      if (currentStep < totalSteps - 1) { currentStep++; render(); }
    });

    render();
  </script>
</body>
</html>
