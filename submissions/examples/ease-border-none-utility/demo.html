<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-border-none Utility Demo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Inter, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
        min-height: 100vh;
        background: #f8fafc;
        padding: 2rem;
      }
      h2 {
        color: #6366f1;
      }
      .row {
        display: flex;
        gap: 2rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      .card {
        width: 200px;
        padding: 1.5rem;
        text-align: center;
        border-radius: 8px;
      }
      .card.with-border {
        border: 2px solid #6366f1;
        background: #fff;
      }
      .card.native-border {
        border: 2px solid #e2e8f0;
        background: #fff;
      }
      button {
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        border-radius: 8px;
        cursor: pointer;
      }
      .btn-bordered {
        border: 2px solid #6366f1;
        background: #fff;
        color: #6366f1;
      }
      .btn-bordered.ease-border-none {
        background: #6366f1;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <h2>ease-border-none Utility</h2>

    <div class="row">
      <div class="card with-border">With border</div>
      <div class="card with-border ease-border-none">ease-border-none</div>
    </div>

    <div class="row">
      <button class="btn-bordered">Bordered button</button>
      <button class="btn-bordered ease-border-none">Borderless button</button>
    </div>
  </body>
</html>
