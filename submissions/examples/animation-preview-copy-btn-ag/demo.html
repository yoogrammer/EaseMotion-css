<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Animation Preview Copy Button - EaseMotion CSS</title>

    <!-- Link to EaseMotion CSS core -->
    <link rel="stylesheet" href="../../../core/animations.css" />
    <!-- Link to your CSS file -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Theme Toggle Button -->
    <button
      id="theme-toggle-btn"
      class="theme-toggle"
      aria-label="Toggle light or dark theme"
    >
      ☀️ <span>Light Mode</span>
    </button>

    <div class="dashboard-card">
      <div class="header">
        <h1>Custom Styled Copy Button</h1>
        <p>
          Test the contrast, alignment, and hover/active states of the styled
          Copy button below
        </p>
      </div>

      <div class="preview-container">
        <div id="copy-target" class="code-badge">ease-fade-in</div>

        <!-- Styled Copy Button -->
        <button
          id="copy-btn"
          class="preview-copy-btn"
          title="Copy animation class"
        >
          Copy
        </button>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const copyBtn = document.getElementById("copy-btn");
        const copyTarget = document.getElementById("copy-target");
        const themeToggleBtn = document.getElementById("theme-toggle-btn");

        // Copy text utility and interactive state handler
        copyBtn.addEventListener("click", () => {
          const textToCopy = copyTarget.textContent.trim();

          navigator.clipboard
            .writeText(textToCopy)
            .then(() => {
              // Visual feedback on success
              copyBtn.textContent = "Copied!";
              copyBtn.style.pointerEvents = "none"; // prevent multiple clicks

              setTimeout(() => {
                copyBtn.textContent = "Copy";
                copyBtn.style.pointerEvents = "auto";
              }, 1500);
            })
            .catch((err) => {
              console.error("Failed to copy text: ", err);
            });
        });

        // Theme toggle listener (sets data-theme on root <html> tag)
        themeToggleBtn.addEventListener("click", () => {
          const currentTheme =
            document.documentElement.getAttribute("data-theme");
          const newTheme = currentTheme === "dark" ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", newTheme);

          if (newTheme === "dark") {
            themeToggleBtn.innerHTML = "☀️ <span>Light Mode</span>";
          } else {
            themeToggleBtn.innerHTML = "🌙 <span>Dark Mode</span>";
          }
        });
      });
    </script>
  </body>
</html>
