<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emoji Reaction Picker Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      font-family: sans-serif;
      background: #f4f5f7;
      padding: 4rem 2rem;
    }

    h3 {
      margin: 0 0 1rem;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
    }

    section {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .post-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      max-width: 360px;
      width: 100%;
    }

    .post-text {
      font-size: 0.95rem;
      color: #374151;
      margin: 0 0 1rem;
      line-height: 1.5;
    }

    .post-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid #f3f4f6;
    }
  </style>
</head>
<body>

  <!-- Standalone bar -->
  <section>
    <h3>Reaction Bar — hover each emoji</h3>
    <div class="reaction-bar">
      <div class="reaction-btn">
        <span class="reaction-emoji">👍</span>
        <span class="reaction-label">Like</span>
        <span class="reaction-count">24</span>
      </div>
      <div class="reaction-btn">
        <span class="reaction-emoji">❤️</span>
        <span class="reaction-label">Love</span>
        <span class="reaction-count">12</span>
      </div>
      <div class="reaction-btn">
        <span class="reaction-emoji">😂</span>
        <span class="reaction-label">Haha</span>
        <span class="reaction-count">8</span>
      </div>
      <div class="reaction-btn">
        <span class="reaction-emoji">😮</span>
        <span class="reaction-label">Wow</span>
        <span class="reaction-count">3</span>
      </div>
      <div class="reaction-btn">
        <span class="reaction-emoji">😢</span>
        <span class="reaction-label">Sad</span>
        <span class="reaction-count">1</span>
      </div>
      <div class="reaction-btn">
        <span class="reaction-emoji">😡</span>
        <span class="reaction-label">Angry</span>
        <span class="reaction-count">2</span>
      </div>
    </div>
  </section>

  <!-- Triggered from a button on a post card -->
  <section>
    <h3>Hover trigger on a post card</h3>
    <div class="post-card">
      <p class="post-text">Just shipped the new animation framework — zero dependencies, pure CSS! 🎉</p>
      <div class="post-actions">
        <div class="reaction-wrapper">
          <div class="reaction-bar">
            <div class="reaction-btn">
              <span class="reaction-emoji">👍</span>
              <span class="reaction-label">Like</span>
            </div>
            <div class="reaction-btn">
              <span class="reaction-emoji">❤️</span>
              <span class="reaction-label">Love</span>
            </div>
            <div class="reaction-btn">
              <span class="reaction-emoji">😂</span>
              <span class="reaction-label">Haha</span>
            </div>
            <div class="reaction-btn">
              <span class="reaction-emoji">😮</span>
              <span class="reaction-label">Wow</span>
            </div>
            <div class="reaction-btn">
              <span class="reaction-emoji">😢</span>
              <span class="reaction-label">Sad</span>
            </div>
          </div>
          <button class="reaction-trigger">👍 Like</button>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
