<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Pagination Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f8fafc; margin: 0; padding: 2rem;">
  <div style="max-width: 800px; margin: 0 auto;">
    <h1 style="font-family: system-ui, -apple-system, sans-serif;">Pagination Component</h1>
    <p style="color: #64748b; font-family: system-ui, -apple-system, sans-serif; margin-bottom: 2rem;">
      A clean, accessible pagination component with hover states and disabled link support.
    </p>

    <!-- Standard Pagination -->
    <nav aria-label="Pagination" class="ease-pagination-container">
      <ul class="ease-pagination-list">
        <li>
          <a href="#" class="ease-page-link ease-page-disabled" aria-disabled="true" tabindex="-1">Previous</a>
        </li>
        <li>
          <a href="#" class="ease-page-link ease-page-active" aria-current="page">1</a>
        </li>
        <li>
          <a href="#" class="ease-page-link">2</a>
        </li>
        <li>
          <a href="#" class="ease-page-link">3</a>
        </li>
        <li>
          <span style="display: flex; align-items: center; justify-content: center; width: 2.5rem; height: 2.5rem; color: #64748b; font-family: system-ui, -apple-system, sans-serif;">...</span>
        </li>
        <li>
          <a href="#" class="ease-page-link">10</a>
        </li>
        <li>
          <a href="#" class="ease-page-link">Next</a>
        </li>
      </ul>
    </nav>
  </div>
</body>
</html>
