<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Component Playground</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Interactive Component Playground</h1>
</header>

<div class="toolbar">

  <select id="templateSelect">
    <option value="button">Button Template</option>
    <option value="card">Card Template</option>
    <option value="alert">Alert Template</option>
  </select>

  <button id="themeToggle">🌙 Dark Mode</button>

</div>

<div class="playground">

  <section class="editor">

    <h2>HTML</h2>
    <textarea id="htmlEditor"></textarea>

    <h2>CSS</h2>
    <textarea id="cssEditor"></textarea>

  </section>

  <section class="preview">

    <h2>Preview</h2>
    <iframe id="previewFrame"></iframe>

  </section>

</div>

<div class="controls">
  <button id="runBtn">Run</button>
  <button id="resetBtn">Reset</button>
  <button id="copyBtn">Copy HTML</button>
  <button id="downloadBtn">Download HTML</button>
</div>

<script src="script.js"></script>

</body>
</html>
