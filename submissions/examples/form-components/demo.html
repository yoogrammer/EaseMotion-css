<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EaseMotion - Form Components Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ease-form-container">
    <h1>Form Components Demo</h1>

    <!-- Animated Input -->
    <div class="ease-input-group">
      <input type="text" class="ease-input-soft ease-focus-glow" id="name" required />
      <label for="name" class="ease-label-float">Your Name</label>
    </div>

    <!-- Email Input -->
    <div class="ease-input-group">
      <input type="email" class="ease-input-soft ease-focus-glow" id="email" required />
      <label for="email" class="ease-label-float">Email Address</label>
    </div>

    <!-- Textarea -->
    <div class="ease-input-group">
      <textarea class="ease-textarea-smooth" id="msg" rows="4" required></textarea>
      <label for="msg" class="ease-label-float">Your Message</label>
    </div>

    <!-- Checkbox -->
    <label class="ease-checkbox-wrap">
      <input type="checkbox" class="ease-checkbox-bounce" />
      <span>Subscribe to newsletter</span>
    </label>

    <button class="ease-btn-primary">Submit</button>
  </div>
</body>
</html>
