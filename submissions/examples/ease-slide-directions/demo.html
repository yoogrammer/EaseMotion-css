<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Slide Directions - EaseMotion CSS</title>

    <!-- EaseMotion CSS (for existing classes: ease-slide-up, ease-slide-down, ease-fade-in, etc.) -->
    <link rel="stylesheet" href="../../../easemotion.css">

    <!-- Submission styles (new slide-left / slide-right + demo page layout) -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Animated glow backgrounds -->
    <div class="glow-bg glow-1"></div>
    <div class="glow-bg glow-2"></div>

    <div class="demo-wrapper">
        <header class="header ease-slide-down">
            <h1>Slide Directions</h1>
            <p class="ease-fade-in ease-delay-150">Completing the horizontal motion set.</p>
        </header>

        <div class="grid">
            <!-- Slide Left card — enters from the left -->
            <div class="card ease-slide-left ease-delay-300">
                <div class="card-icon-wrapper">
                    <div class="icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                    </div>
                </div>
                <h3>Slide Left</h3>
                <div class="code-block"><code>.ease-slide-left</code></div>
            </div>

            <!-- Slide Up card — existing reference animation -->
            <div class="card ease-slide-up ease-delay-500 highlight">
                <div class="card-icon-wrapper">
                    <div class="icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
                    </div>
                </div>
                <h3>Slide Up (Ref)</h3>
                <div class="code-block"><code>.ease-slide-up</code></div>
            </div>

            <!-- Slide Right card — enters from the right -->
            <div class="card ease-slide-right ease-delay-700">
                <div class="card-icon-wrapper">
                    <div class="icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                    </div>
                </div>
                <h3>Slide Right</h3>
                <div class="code-block"><code>.ease-slide-right</code></div>
            </div>
        </div>

    </div>
</body>

</html>
