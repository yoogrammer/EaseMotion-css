<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Skill Bars - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="skillbars">
    <h1>Skills</h1>
    <div class="skillbar">
      <div class="skillbar-header">
        <span class="skillbar-label">HTML &amp; CSS</span>
        <span class="skillbar-pct">90%</span>
      </div>
      <div class="skillbar-track">
        <div class="skillbar-fill" style="width: 90%; --fill-color: #6366f1;"></div>
      </div>
    </div>
    <div class="skillbar">
      <div class="skillbar-header">
        <span class="skillbar-label">JavaScript</span>
        <span class="skillbar-pct">80%</span>
      </div>
      <div class="skillbar-track">
        <div class="skillbar-fill" style="width: 80%; --fill-color: #f59e0b;"></div>
      </div>
    </div>
    <div class="skillbar">
      <div class="skillbar-header">
        <span class="skillbar-label">React</span>
        <span class="skillbar-pct">75%</span>
      </div>
      <div class="skillbar-track">
        <div class="skillbar-fill" style="width: 75%; --fill-color: #10b981;"></div>
      </div>
    </div>
    <div class="skillbar">
      <div class="skillbar-header">
        <span class="skillbar-label">TypeScript</span>
        <span class="skillbar-pct">70%</span>
      </div>
      <div class="skillbar-track">
        <div class="skillbar-fill" style="width: 70%; --fill-color: #8b5cf6;"></div>
      </div>
    </div>
    <div class="skillbar">
      <div class="skillbar-header">
        <span class="skillbar-label">Node.js</span>
        <span class="skillbar-pct">65%</span>
      </div>
      <div class="skillbar-track">
        <div class="skillbar-fill" style="width: 65%; --fill-color: #ec4899;"></div>
      </div>
    </div>
  </div>
</body>
</html>
