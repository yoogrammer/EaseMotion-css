<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter Utilities Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
      .placeholder {
        width: 300px;
        height: 200px;
        display: block;
        background: linear-gradient(135deg, #6366f1 0%, #f59e0b 40%, #10b981 70%, #ef4444 100%);
        border-radius: 6px;
      }
    </style>
</head>
<body>

    <h1>CSS Filter Utilities Demo</h1>

    <div class="container">

        <div class="card">
            <span class="placeholder ease-blur-sm" role="img" aria-label="Blur Small"></span>
            <p>.ease-blur-sm</p>
        </div>

        <div class="card">
            <span class="placeholder ease-blur" role="img" aria-label="Blur"></span>
            <p>.ease-blur</p>
        </div>

        <div class="card">
            <span class="placeholder ease-blur-lg" role="img" aria-label="Blur Large"></span>
            <p>.ease-blur-lg</p>
        </div>

        <div class="card">
            <span class="placeholder ease-brightness-50" role="img" aria-label="Brightness 50"></span>
            <p>.ease-brightness-50</p>
        </div>

        <div class="card">
            <span class="placeholder ease-brightness-150" role="img" aria-label="Brightness 150"></span>
            <p>.ease-brightness-150</p>
        </div>

        <div class="card">
            <span class="placeholder ease-grayscale" role="img" aria-label="Grayscale"></span>
            <p>.ease-grayscale</p>
        </div>

        <div class="card">
            <span class="placeholder ease-sepia" role="img" aria-label="Sepia"></span>
            <p>.ease-sepia</p>
        </div>

    </div>

</body>
</html>
