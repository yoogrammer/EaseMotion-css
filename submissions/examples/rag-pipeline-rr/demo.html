<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Pipeline Visualization</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>RAG Pipeline Visualization</h1>

    <p class="subtitle">
        Retrieval-Augmented Generation workflow from query to AI response.
    </p>

    <div class="pipeline">

        <div class="stage query">
            🔎 User Query
        </div>

        <div class="connector"></div>

        <div class="stage embedding">
            🧠 Embedding Model
        </div>

        <div class="connector"></div>

        <div class="stage vector">
            🗂️ Vector Database
        </div>

        <div class="connector"></div>

        <div class="stage retrieval">
            📚 Retriever
        </div>

        <div class="connector"></div>

        <div class="stage llm">
            🤖 Large Language Model
        </div>

        <div class="connector"></div>

        <div class="stage response">
            🚀 AI Response
        </div>

    </div>

</div>

</body>
</html>
