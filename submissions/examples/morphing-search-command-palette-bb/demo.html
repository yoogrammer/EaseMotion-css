<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morphing Search Command Palette</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="demo-bg">
      <p class="trigger-hint">Press <kbd>⌘</kbd><kbd>K</kbd> or click the search bar</p>

      <!-- Collapsed search trigger -->
      <button class="search-trigger" id="search-trigger" aria-label="Open command palette" aria-expanded="false" aria-controls="command-palette">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <span class="search-placeholder">Search commands…</span>
        <kbd class="search-shortcut">⌘K</kbd>
      </button>

      <!-- Command Palette Modal -->
      <div class="palette-overlay" id="palette-overlay" aria-hidden="true" role="presentation">
        <div class="palette-modal"
             id="command-palette"
             role="dialog"
             aria-modal="true"
             aria-label="Command palette">
          <!-- Search Input -->
          <div class="palette-search-row">
            <span class="palette-search-icon" aria-hidden="true">🔍</span>
            <input
              type="text"
              class="palette-input"
              id="palette-input"
              placeholder="Type a command or search…"
              autocomplete="off"
              spellcheck="false"
              aria-autocomplete="list"
              aria-controls="palette-results"
            />
            <kbd class="palette-esc-hint" aria-label="Press Escape to close">Esc</kbd>
          </div>

          <!-- Results -->
          <div class="palette-results" id="palette-results" role="listbox" aria-label="Command results">
            <div class="palette-group">
              <p class="palette-group-label" aria-hidden="true">Navigation</p>
              <button class="palette-item" role="option" aria-selected="true" data-cmd="go-home">
                <span class="palette-item-icon" aria-hidden="true">🏠</span>
                <span class="palette-item-text">Go to Home</span>
                <kbd class="palette-item-shortcut" aria-label="Shortcut: G then H">G H</kbd>
              </button>
              <button class="palette-item" role="option" data-cmd="go-dashboard">
                <span class="palette-item-icon" aria-hidden="true">📊</span>
                <span class="palette-item-text">Go to Dashboard</span>
                <kbd class="palette-item-shortcut" aria-label="Shortcut: G then D">G D</kbd>
              </button>
              <button class="palette-item" role="option" data-cmd="go-settings">
                <span class="palette-item-icon" aria-hidden="true">⚙️</span>
                <span class="palette-item-text">Open Settings</span>
                <kbd class="palette-item-shortcut" aria-label="Shortcut: Comma">⌘,</kbd>
              </button>
            </div>

            <div class="palette-group">
              <p class="palette-group-label" aria-hidden="true">Actions</p>
              <button class="palette-item" role="option" data-cmd="new-file">
                <span class="palette-item-icon" aria-hidden="true">📄</span>
                <span class="palette-item-text">New File</span>
                <kbd class="palette-item-shortcut" aria-label="Shortcut: Command N">⌘N</kbd>
              </button>
              <button class="palette-item" role="option" data-cmd="toggle-theme">
                <span class="palette-item-icon" aria-hidden="true">🌙</span>
                <span class="palette-item-text">Toggle Dark Mode</span>
                <kbd class="palette-item-shortcut" aria-label="Shortcut: Command T">⌘T</kbd>
              </button>
              <button class="palette-item" role="option" data-cmd="export">
                <span class="palette-item-icon" aria-hidden="true">📤</span>
                <span class="palette-item-text">Export Data</span>
                <kbd class="palette-item-shortcut" aria-label="Shortcut: Command E">⌘E</kbd>
              </button>
            </div>

            <div class="palette-group">
              <p class="palette-group-label" aria-hidden="true">Recent</p>
              <button class="palette-item" role="option" data-cmd="recent-1">
                <span class="palette-item-icon" aria-hidden="true">🕐</span>
                <span class="palette-item-text">easemotion-demo.html</span>
              </button>
              <button class="palette-item" role="option" data-cmd="recent-2">
                <span class="palette-item-icon" aria-hidden="true">🕐</span>
                <span class="palette-item-text">style.css</span>
              </button>
            </div>
          </div>

          <!-- Footer -->
          <div class="palette-footer" aria-hidden="true">
            <span><kbd>↑↓</kbd> Navigate</span>
            <span><kbd>↵</kbd> Select</span>
            <span><kbd>Esc</kbd> Close</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      const trigger = document.getElementById('search-trigger');
      const overlay = document.getElementById('palette-overlay');
      const palette = document.getElementById('command-palette');
      const input = document.getElementById('palette-input');
      const items = document.querySelectorAll('.palette-item');
      let currentIndex = 0;

      function openPalette() {
        overlay.setAttribute('aria-hidden', 'false');
        trigger.setAttribute('aria-expanded', 'true');
        overlay.classList.add('is-open');
        setTimeout(() => input.focus(), 50);
        currentIndex = 0;
        updateSelection();
      }

      function closePalette() {
        overlay.classList.remove('is-open');
        setTimeout(() => {
          overlay.setAttribute('aria-hidden', 'true');
          trigger.setAttribute('aria-expanded', 'false');
          trigger.focus();
        }, 250);
      }

      function updateSelection() {
        items.forEach((item, i) => {
          item.setAttribute('aria-selected', i === currentIndex ? 'true' : 'false');
          item.classList.toggle('is-active', i === currentIndex);
        });
      }

      trigger.addEventListener('click', openPalette);

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closePalette();
      });

      document.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
          e.preventDefault();
          overlay.classList.contains('is-open') ? closePalette() : openPalette();
        }
        if (!overlay.classList.contains('is-open')) return;
        if (e.key === 'Escape') closePalette();
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          currentIndex = (currentIndex + 1) % items.length;
          updateSelection();
        }
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          currentIndex = (currentIndex - 1 + items.length) % items.length;
          updateSelection();
        }
        if (e.key === 'Enter') {
          e.preventDefault();
          items[currentIndex].click();
          closePalette();
        }
      });

      items.forEach((item, i) => {
        item.addEventListener('mouseenter', () => {
          currentIndex = i;
          updateSelection();
        });
        item.addEventListener('click', () => {
          closePalette();
        });
      });

      /* Filter items on input */
      input.addEventListener('input', () => {
        const q = input.value.toLowerCase().trim();
        items.forEach(item => {
          const text = item.querySelector('.palette-item-text').textContent.toLowerCase();
          const visible = !q || text.includes(q);
          item.style.display = visible ? '' : 'none';
        });
        /* Update groups visibility */
        document.querySelectorAll('.palette-group').forEach(group => {
          const anyVisible = [...group.querySelectorAll('.palette-item')].some(i => i.style.display !== 'none');
          group.style.display = anyVisible ? '' : 'none';
        });
      });
    </script>
  </body>
</html>
