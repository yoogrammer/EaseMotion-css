<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Corner Border Button</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Animated Corner Border Button</h1>

  <div class="button-grid">

    <button class="corner-btn">
      Default Button
    </button>

    <button class="corner-btn neon">
      Neon Button
    </button>

    <button class="corner-btn gradient">
      Gradient Button
    </button>

    <button class="corner-btn glass">
      Glass Button
    </button>

  </div>

</div>

</body>
</html>
