<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate Glitch Collection - EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 40px;
      height: 100vh;
      margin: 0;
      background: #050505;
      color: #ffffff;
      overflow: hidden;
    }
    
    /* CRT TV Scanline Overlay */
    body::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15),
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 100;
    }

    .demo-header {
      font-family: 'Share Tech Mono', monospace;
      color: #888;
      font-size: 14px;
      letter-spacing: 4px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .glitch-demo-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .label {
      font-family: 'Share Tech Mono', monospace;
      color: #555;
      font-size: 12px;
      letter-spacing: 2px;
    }

  </style>
</head>
<body>
  
  <div class="demo-header">HOVER TO INITIALIZE CORRUPTION</div>

  <!-- Variant 1: Cyberpunk -->
  <div class="glitch-demo-row">
    <div class="label">V1: CYBERPUNK SLICE</div>
    <div class="glitch-wrapper glitch-cyberpunk" data-text="NIGHT CITY">NIGHT CITY</div>
  </div>

  <!-- Variant 2: TikTok -->
  <div class="glitch-demo-row">
    <div class="label">V2: RGB JITTER</div>
    <div class="glitch-wrapper glitch-tiktok" data-text="VIRAL TREND">VIRAL TREND</div>
  </div>

  <!-- Variant 3: VHS Tracking -->
  <div class="glitch-demo-row">
    <div class="label">V3: VHS TRACKING</div>
    <div class="glitch-wrapper glitch-vhs" data-text="PLAY TAPE">PLAY TAPE</div>
  </div>

  <!-- Variant 4: Matrix -->
  <div class="glitch-demo-row">
    <div class="label">V4: SYSTEM FAILURE</div>
    <div class="glitch-wrapper glitch-matrix" data-text="WAKE UP NEO" data-scramble="10110010101">WAKE UP NEO</div>
  </div>

</body>
</html>
