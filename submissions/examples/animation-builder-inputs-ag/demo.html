<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Animation Builder Inputs - EaseMotion CSS</title>

    <!-- Link to EaseMotion CSS core -->
    <link rel="stylesheet" href="../../../core/animations.css" />
    <!-- Link to your CSS file -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Theme Toggle Button -->
    <button
      id="theme-toggle-btn"
      class="theme-toggle"
      aria-label="Toggle light or dark theme"
    >
      ☀️ <span>Light Mode</span>
    </button>

    <div class="builder-card">
      <div class="builder-header">
        <h1>Animation Builder Controls</h1>
        <p>Fine-tune and preview your animations using styled inputs</p>
      </div>

      <!-- ===================================================
         EASEMOTION CSS - REQUIRED HTML CONTROLS SNIPPET
         =================================================== -->
      <div class="builder-controls">
        <div class="input-group">
          <label for="search-anim">Search</label>
          <input
            type="text"
            id="search-anim"
            class="ease-input"
            placeholder="Search animations..."
          />
        </div>

        <div class="input-group">
          <label for="duration-anim">Duration (ms)</label>
          <input
            type="number"
            id="duration-anim"
            class="ease-input"
            placeholder="400"
            value="400"
          />
        </div>

        <div class="input-group">
          <label for="delay-anim">Delay (ms)</label>
          <input
            type="number"
            id="delay-anim"
            class="ease-input"
            placeholder="0"
            value="0"
          />
        </div>
      </div>
      <!-- =================================================== -->

      <!-- Interactive Live Preview Section -->
      <div class="demo-workspace">
        <!-- Left Panel: Animation Presets -->
        <div class="presets-panel">
          <h2 class="presets-title">Select Preset</h2>
          <div class="presets-grid">
            <button class="preset-btn active" data-anim="fadeIn">
              <span>Fade In</span>
              <span>💨</span>
            </button>
            <button class="preset-btn" data-anim="slideUp">
              <span>Slide Up</span>
              <span>⬆️</span>
            </button>
            <button class="preset-btn" data-anim="scaleDown">
              <span>Scale Down</span>
              <span>⬇️</span>
            </button>
            <button class="preset-btn" data-anim="bounce">
              <span>Bounce</span>
              <span>🏀</span>
            </button>
          </div>
        </div>

        <!-- Right Panel: Preview Area -->
        <div class="preview-panel">
          <div id="preview-box" class="preview-box">EaseMotion</div>
          <div class="play-controls">
            <button id="play-btn" class="action-btn">Replay Animation</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Interactive Demo Logic -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const searchInput = document.getElementById("search-anim");
        const durationInput = document.getElementById("duration-anim");
        const delayInput = document.getElementById("delay-anim");
        const previewBox = document.getElementById("preview-box");
        const playBtn = document.getElementById("play-btn");
        const presetBtns = document.querySelectorAll(".preset-btn");
        const themeToggleBtn = document.getElementById("theme-toggle-btn");

        let activePreset = "fadeIn";

        // Function to trigger/replay the animation on the preview box
        function playAnimation() {
          // Clear active styles/animation
          previewBox.style.animation = "none";

          // Force layout reflow to register the animation reset
          void previewBox.offsetHeight;

          // Fetch values or fall back to defaults
          const duration = parseInt(durationInput.value) || 400;
          const delay = parseInt(delayInput.value) || 0;

          // Apply inline styles to showcase custom values in action
          previewBox.style.animationName = activePreset;
          previewBox.style.animationDuration = `${duration}ms`;
          previewBox.style.animationDelay = `${delay}ms`;
          previewBox.style.animationTimingFunction =
            "cubic-bezier(0.4, 0, 0.2, 1)";
          previewBox.style.animationFillMode = "both";
        }

        // Handle Preset buttons selection
        presetBtns.forEach((btn) => {
          btn.addEventListener("click", () => {
            presetBtns.forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            activePreset = btn.dataset.anim;
            playAnimation();
          });
        });

        // Filter animation presets via the Search Input field
        searchInput.addEventListener("input", () => {
          const query = searchInput.value.toLowerCase().trim();
          presetBtns.forEach((btn) => {
            const btnText = btn.querySelector("span").textContent.toLowerCase();
            if (btnText.includes(query)) {
              btn.classList.remove("hidden");
            } else {
              btn.classList.add("hidden");
            }
          });
        });

        // Replay button listener
        playBtn.addEventListener("click", playAnimation);

        // Replay animation automatically when duration/delay inputs are changed
        durationInput.addEventListener("input", playAnimation);
        delayInput.addEventListener("input", playAnimation);

        // Theme toggle listener (sets data-theme on root <html> tag)
        themeToggleBtn.addEventListener("click", () => {
          const currentTheme =
            document.documentElement.getAttribute("data-theme");
          const newTheme = currentTheme === "dark" ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", newTheme);

          if (newTheme === "dark") {
            themeToggleBtn.innerHTML = "☀️ <span>Light Mode</span>";
          } else {
            themeToggleBtn.innerHTML = "🌙 <span>Dark Mode</span>";
          }
        });

        // Initial execution
        playAnimation();
      });
    </script>
  </body>
</html>
