<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Animated Notification Badge</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0d0d14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 2rem;
        }
        .container {
            text-align: center;
            max-width: 1000px;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #6c63ff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 2rem;
        }
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
            justify-items: center;
        }
        .badge-container {
            position: relative;
            display: inline-block;
        }
        .icon {
            font-size: 3rem;
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 50%;
            display: inline-block;
        }
        .note {
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            color: #a1a1aa;
            margin-top: 2rem;
        }
        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0;
        }
        button {
            background: #6c63ff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔔 Animated Notification Badges</h1>
    
    <div class="demo-grid">
        <div class="badge-container">
            <div class="icon">💬</div>
            <div class="ease-notification-badge">3</div>
        </div>

        <div class="badge-container">
            <div class="icon">❤️</div>
            <div class="ease-notification-badge ease-badge-bounce">99+</div>
        </div>

        <div class="badge-container">
            <div class="icon">🔔</div>
            <div class="ease-notification-badge ease-badge-pulse">5</div>
        </div>

        <div class="badge-container">
            <div class="icon">📧</div>
            <div class="ease-notification-badge ease-badge-shake">12</div>
        </div>

        <div class="badge-container">
            <div class="icon">⭐</div>
            <div class="ease-notification-badge ease-badge-glow">7</div>
        </div>

        <div class="badge-container">
            <div class="icon">🎉</div>
            <div class="ease-notification-badge ease-badge-pop">NEW</div>
        </div>
    </div>

    <div class="controls">
        <button id="updateBadge">Update First Badge +1</button>
        <button id="resetBadges">Reset All</button>
    </div>

    <div class="note">
        💡 Animated notification badges with bounce, pulse, shake, and pop effects!
    </div>
</div>

<script>
    let count = 3;
    const badge = document.querySelector('.badge-container:first-child .ease-notification-badge');
    
    document.getElementById('updateBadge').addEventListener('click', () => {
        count++;
        badge.textContent = count;
        badge.classList.add('ease-badge-bounce');
        setTimeout(() => {
            badge.classList.remove('ease-badge-bounce');
        }, 500);
    });
    
    document.getElementById('resetBadges').addEventListener('click', () => {
        count = 3;
        badge.textContent = count;
        document.querySelectorAll('.ease-notification-badge').forEach(b => {
            b.classList.add('ease-badge-bounce');
            setTimeout(() => b.classList.remove('ease-badge-bounce'), 500);
        });
    });
</script>
</body>
</html>
