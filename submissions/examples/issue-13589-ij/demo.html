<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CTA Banner - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="cta-banner">
      <div class="cta-content">
        <div class="cta-badge">New Release</div>
        <h2 class="cta-title">Build Faster with <span>EaseMotion</span></h2>
        <p class="cta-subtitle">The modern CSS component library for building beautiful, animated interfaces with zero JavaScript overhead.</p>
        <button class="cta-btn">
          Get Started Free
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
        <div class="cta-stats">
          <div class="cta-stat">
            <div class="cta-stat-value">10K+</div>
            <div class="cta-stat-label">Stars</div>
          </div>
          <div class="cta-stat">
            <div class="cta-stat-value">500+</div>
            <div class="cta-stat-label">Components</div>
          </div>
          <div class="cta-stat">
            <div class="cta-stat-value">99%</div>
            <div class="cta-stat-label">Satisfaction</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
