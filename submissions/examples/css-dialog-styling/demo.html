<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Dialog Styling with Animation Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div style="padding: 40px; text-align: center;">
        <h1>CSS Native Dialog Example</h1>
        <p>Scroll down to see content behind the backdrop overlay.</p>
        <button class="dialog-btn dialog-btn-primary" id="openModal">Open Animated Dialog</button>
        <div style="height: 150vh; padding-top: 50px; color: #888;">(Background page content mock scroll area)</div>
    </div>

    <!-- Native Dialog Modal -->
    <dialog id="favDialog" class="ease-dialog">
        <form method="dialog">
            <h3>Animated Modal Dialog</h3>
            <p>This demo implements native dialog features along with a smooth open/close fade sequence and backdrop styling.</p>
            <div style="text-align: right; margin-top: 20px;">
                <button class="dialog-btn" id="closeModal" type="submit">Close</button>
            </div>
        </form>
    </dialog>

    <script>
        const openButton = document.getElementById('openModal');
        const favDialog = document.getElementById('favDialog');
        const bodyEl = document.body;

        openButton.addEventListener('click', () => {
            favDialog.showModal();
            bodyEl.classList.add('ease-scroll-locked');
        });

        favDialog.addEventListener('close', () => {
            bodyEl.classList.remove('ease-scroll-locked');
        });
    </script>
</body>
</html>
