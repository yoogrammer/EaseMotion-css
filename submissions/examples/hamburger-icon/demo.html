<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animated Hamburger Icon — EaseMotion</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body {
      margin: 0; min-height: 100vh;
      background: #0f0f0f; font-family: sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 48px;
    }
    p { color: #555; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin: 0; }

    /* White bars on dark bg */
    .demo-dark { color: #ffffff; }
    /* Dark bars on light card */
    .demo-light {
      color: #1a1a1a;
      background: #f5f5f5;
      border-radius: 12px;
      padding: 16px;
    }
  </style>
</head>
<body>

  <p>Click to toggle</p>

  <input type="checkbox" id="nav-toggle-1" class="hamburger-input"/>
  <label for="nav-toggle-1" class="hamburger demo-dark" aria-label="Toggle menu">
    <span class="hamburger-bar"></span>
    <span class="hamburger-bar"></span>
    <span class="hamburger-bar"></span>
  </label>

  <input type="checkbox" id="nav-toggle-2" class="hamburger-input"/>
  <label for="nav-toggle-2" class="hamburger demo-light" aria-label="Toggle menu">
    <span class="hamburger-bar"></span>
    <span class="hamburger-bar"></span>
    <span class="hamburger-bar"></span>
  </label>

</body>
</html>
