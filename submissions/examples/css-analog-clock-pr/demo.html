<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSS Analog Clock Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 0.5rem;
    }
  </style>
</head>
<body>

  <div class="clock" id="clock">

    <!-- Tick marks (12 positions, i = 0..11) -->
    <div class="tick tick-hour" style="--i:0"></div>
    <div class="tick tick-hour" style="--i:1"></div>
    <div class="tick tick-hour" style="--i:2"></div>
    <div class="tick tick-hour" style="--i:3"></div>
    <div class="tick tick-hour" style="--i:4"></div>
    <div class="tick tick-hour" style="--i:5"></div>
    <div class="tick tick-hour" style="--i:6"></div>
    <div class="tick tick-hour" style="--i:7"></div>
    <div class="tick tick-hour" style="--i:8"></div>
    <div class="tick tick-hour" style="--i:9"></div>
    <div class="tick tick-hour" style="--i:10"></div>
    <div class="tick tick-hour" style="--i:11"></div>

    <!-- Hour numbers (n = 1..12, 12 placed at top via n=0/12) -->
    <div class="clock-number" style="--n:0">12</div>
    <div class="clock-number" style="--n:1">1</div>
    <div class="clock-number" style="--n:2">2</div>
    <div class="clock-number" style="--n:3">3</div>
    <div class="clock-number" style="--n:4">4</div>
    <div class="clock-number" style="--n:5">5</div>
    <div class="clock-number" style="--n:6">6</div>
    <div class="clock-number" style="--n:7">7</div>
    <div class="clock-number" style="--n:8">8</div>
    <div class="clock-number" style="--n:9">9</div>
    <div class="clock-number" style="--n:10">10</div>
    <div class="clock-number" style="--n:11">11</div>

    <!-- Hands -->
    <div class="clock-hand clock-hand--hour" id="hourHand"></div>
    <div class="clock-hand clock-hand--minute" id="minuteHand"></div>
    <div class="clock-hand clock-hand--second" id="secondHand"></div>

    <div class="clock-center"></div>
  </div>

  <div class="clock-digital" id="digitalReadout">00:00:00</div>

  <script>
    const hourHand = document.getElementById('hourHand');
    const minuteHand = document.getElementById('minuteHand');
    const secondHand = document.getElementById('secondHand');
    const digital = document.getElementById('digitalReadout');

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function updateClock() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMinutes();
      const s = now.getSeconds();
      const ms = now.getMilliseconds();

      const secondDeg = ((s + ms / 1000) / 60) * 360;
      const minuteDeg = ((m + s / 60) / 60) * 360;
      const hourDeg = (((h % 12) + m / 60) / 12) * 360;

      hourHand.style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
      minuteHand.style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
      secondHand.style.transform = `translateX(-50%) rotate(${secondDeg}deg)`;

      digital.textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;

      requestAnimationFrame(updateClock);
    }

    requestAnimationFrame(updateClock);
  </script>

</body>
</html>
