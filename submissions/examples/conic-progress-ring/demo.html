<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conic Progress Ring - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Conic Progress Ring</h1>
    <div class="rings-grid">
      <div class="ring-card">
        <div class="progress-ring" style="background: conic-gradient(#6366f1 0% 25%, light-dark(#e0e0e0, #2a2a2a) 25% 100%);">
          <span class="ring-value">25%</span>
        </div>
        <span class="ring-label">Storage</span>
      </div>
      <div class="ring-card">
        <div class="progress-ring" style="background: conic-gradient(#ec4899 0% 50%, light-dark(#e0e0e0, #2a2a2a) 50% 100%);">
          <span class="ring-value">50%</span>
        </div>
        <span class="ring-label">Memory</span>
      </div>
      <div class="ring-card">
        <div class="progress-ring" style="background: conic-gradient(#14b8a6 0% 75%, light-dark(#e0e0e0, #2a2a2a) 75% 100%);">
          <span class="ring-value">75%</span>
        </div>
        <span class="ring-label">Bandwidth</span>
      </div>
      <div class="ring-card">
        <div class="progress-ring" style="background: conic-gradient(#f59e0b 0% 90%, light-dark(#e0e0e0, #2a2a2a) 90% 100%);">
          <span class="ring-value">90%</span>
        </div>
        <span class="ring-label">CPU</span>
      </div>
    </div>
    <p class="description">Circular progress indicators built with conic-gradient. Each ring displays a different percentage. The ring has a subtle scale animation on hover. Supports light and dark mode.</p>
  </div>
</body>
</html>
