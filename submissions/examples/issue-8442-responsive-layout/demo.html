  <title>Responsive Layout Fix Demo</title>
  <link rel="stylesheet" href="../../../easemotion.css" />

<body class="mobile-layout-fix ease-bg-surface ease-text-primary ease-padding-4">

        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </div>
    </nav>
    <div class="ease-flex-row ease-gap-4">
      <div class="ease-card ease-bg-white ease-padding-6 ease-border ease-rounded-lg">
        <h3>Card 1</h3>
        <p>This is a card that will stack on mobile.</p>
      </div>
      <div class="ease-card ease-bg-white ease-padding-6 ease-border ease-rounded-lg">
