<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nth Child Patterns - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>:nth-child() Patterns</h1>
    <div class="pattern-showcase">
      <div class="pattern-section">
        <h3>Every 3rd item</h3>
        <div class="pattern-grid pattern-3n">
          <div class="pat-item">1</div><div class="pat-item">2</div><div class="pat-item">3</div>
          <div class="pat-item">4</div><div class="pat-item">5</div><div class="pat-item">6</div>
          <div class="pat-item">7</div><div class="pat-item">8</div><div class="pat-item">9</div>
        </div>
      </div>
      <div class="pattern-section">
        <h3>Every even item</h3>
        <div class="pattern-grid pattern-even">
          <div class="pat-item">1</div><div class="pat-item">2</div><div class="pat-item">3</div>
          <div class="pat-item">4</div><div class="pat-item">5</div><div class="pat-item">6</div>
        </div>
      </div>
      <div class="pattern-section">
        <h3>Staggered 1-2-3</h3>
        <div class="pattern-grid pattern-stagger">
          <div class="pat-item">1</div><div class="pat-item">2</div><div class="pat-item">3</div>
          <div class="pat-item">4</div><div class="pat-item">5</div><div class="pat-item">6</div>
          <div class="pat-item">7</div><div class="pat-item">8</div><div class="pat-item">9</div>
        </div>
      </div>
    </div>
    <p class="description">Visual patterns created with CSS :nth-child() selectors and staggered animations.</p>
  </div>
</body>
</html>
