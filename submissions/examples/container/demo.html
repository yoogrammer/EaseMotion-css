<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-container — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      background: #0f0f0f;
      gap: 2rem;
      padding: 2rem 0;
    }
    h1 { color: #fff; font-weight: 300; letter-spacing: 0.05em; }
    .label { font-size: 0.75rem; color: #555; text-align: center; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .section { display: flex; flex-direction: column; align-items: center; width: 100%; }
    .demo-content {
      background: #1a1a1a; border: 1px dashed #333;
      border-radius: 12px; padding: 2rem; text-align: center;
      color: #888; font-size: 0.9rem;
    }
    .demo-content span {
      display: block; margin-top: 0.5rem;
      color: #555; font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <h1>ease-container</h1>
  <div class="section">
    <div class="label">Container size variants (resize browser)</div>
  </div>
  <div class="ease-container">
    <div class="demo-content">
      ease-container (default: 1200px)
      <span>Has responsive padding</span>
    </div>
  </div>
  <div class="ease-container ease-container-sm">
    <div class="demo-content">
      ease-container-sm (720px)
    </div>
  </div>
  <div class="ease-container ease-container-lg">
    <div class="demo-content">
      ease-container-lg (1400px)
    </div>
  </div>
</body>
</html>
