<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Loader - Bars and Progress Bar - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Loader — Bars and Progress Bar</h1>
    <p class="description">
      Self-contained demo of the proposed
      <code>.ease-loader-bars</code> and
      <code>.ease-loader-progress-bar</code> variants.
    </p>

    <section class="loader-section">
      <h2>Bars</h2>
      <div role="status" aria-busy="true" aria-label="Loading">
        <span class="ease-loader ease-loader-bars">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </span>
      </div>
      <code>.ease-loader.ease-loader-bars</code>
    </section>

    <section class="loader-section">
      <h2>Progress bar</h2>
      <div role="status" aria-busy="true" aria-label="Loading">
        <span class="ease-loader ease-loader-progress-bar"></span>
      </div>
      <code>.ease-loader.ease-loader-progress-bar</code>
    </section>

  </div>

</body>
</html>
