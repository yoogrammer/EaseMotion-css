<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-comparison-slider Demo — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: sans-serif;
      gap: 1rem;
    }
    h2 { color: white; }
    p  { color: #9ca3af; font-size: 14px; }
  </style>
</head>
<body>
  <h2>ease-comparison-slider</h2>
  <p>Drag the slider to compare before and after</p>

  <div class="ease-comparison" id="comp">
    <!-- Using solid color divs as placeholder images -->
    <div class="ease-comparison-before" style="background: linear-gradient(135deg, #1a1a2e, #16213e); display:flex; align-items:center; justify-content:center; color:#6366f1; font-size:1.5rem; font-weight:bold;">Before</div>
    <div class="ease-comparison-after" style="background: linear-gradient(135deg, #6366f1, #8b5cf6); display:flex; align-items:center; justify-content:center; color:white; font-size:1.5rem; font-weight:bold;">After</div>
    <div class="ease-comparison-divider" id="divider"></div>
    <span class="ease-comparison-label-before">Before</span>
    <span class="ease-comparison-label-after">After</span>
    <input type="range" class="ease-comparison-range" min="0" max="100" value="50" id="slider">
  </div>

  <script>
    const slider = document.getElementById('slider');
    const comp   = document.getElementById('comp');
    const divider = document.getElementById('divider');

    slider.addEventListener('input', () => {
      const val = slider.value + '%';
      comp.style.setProperty('--ease-comparison-value', val);
      divider.style.left = val;
    });
  </script>
</body>
</html>
