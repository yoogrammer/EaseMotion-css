<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Water Intake Tracker - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tracker-wrapper">
    <h1>Water Intake Tracker</h1>
    <div class="goal-setter">
      <label for="dailyGoal">Daily Goal (glasses)</label>
      <input type="number" id="dailyGoal" class="input" value="8" min="1" max="20">
    </div>
    <div class="glasses-grid" id="glassesGrid"></div>
    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="filledCount">0</span>
        <span class="stat-label">Drunk</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="progressPct">0%</span>
        <span class="stat-label">Progress</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="remainingCount">8</span>
        <span class="stat-label">Remaining</span>
      </div>
    </div>
    <div class="weekly-chart-section">
      <h3>This Week</h3>
      <div class="weekly-chart" id="weeklyChart"></div>
    </div>
  </div>
  <script>
    const dailyGoal = document.getElementById('dailyGoal');
    const glassesGrid = document.getElementById('glassesGrid');
    const filledCount = document.getElementById('filledCount');
    const progressPct = document.getElementById('progressPct');
    const remainingCount = document.getElementById('remainingCount');
    const weeklyChart = document.getElementById('weeklyChart');

    let filled = [false, false, false, false, false, false, false, false];

    function renderGlasses() {
      const goal = parseInt(dailyGoal.value) || 8;
      while (filled.length < goal) filled.push(false);
      while (filled.length > goal) filled.pop();
      glassesGrid.innerHTML = '';
      filled.forEach((f, i) => {
        const glass = document.createElement('div');
        glass.className = 'glass' + (f ? ' filled' : '');
        glass.innerHTML = `<svg viewBox="0 0 40 50" class="glass-svg"><path d="M12 5h16l-3 38H15L12 5z" class="glass-shape" fill="${f ? '#6366f1' : 'none'}" stroke="#333" stroke-width="2"/><path d="M12 5h16l-3 38H15L12 5z" class="glass-water" fill="${f ? '#6366f1' : 'none'}" opacity="${f ? 0.6 : 0}"/></svg>`;
        glass.addEventListener('click', () => {
          filled[i] = !filled[i];
          renderGlasses();
          updateStats();
        });
        glassesGrid.appendChild(glass);
      });
    }

    function updateStats() {
      const goal = parseInt(dailyGoal.value) || 8;
      const filledTotal = filled.filter(f => f).length;
      filledCount.textContent = filledTotal;
      const pct = goal > 0 ? Math.round((filledTotal / goal) * 100) : 0;
      progressPct.textContent = pct + '%';
      remainingCount.textContent = Math.max(0, goal - filledTotal);
    }

    function updateWeekly() {
      const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      weeklyChart.innerHTML = '';
      days.forEach((d, i) => {
        const val = Math.floor(Math.random() * 8) + 2;
        const maxVal = 10;
        const bar = document.createElement('div');
        bar.className = 'weekly-bar';
        const fill = document.createElement('div');
        fill.className = 'weekly-fill';
        fill.style.height = Math.min(100, (val / maxVal) * 100) + '%';
        bar.appendChild(fill);
        const label = document.createElement('span');
        label.className = 'weekly-label';
        label.textContent = d;
        bar.appendChild(label);
        const count = document.createElement('span');
        count.className = 'weekly-count';
        count.textContent = val;
        bar.appendChild(count);
        weeklyChart.appendChild(bar);
      });
    }

    dailyGoal.addEventListener('input', () => {
      renderGlasses();
      updateStats();
    });

    renderGlasses();
    updateStats();
    updateWeekly();
  </script>
</body>
</html>
