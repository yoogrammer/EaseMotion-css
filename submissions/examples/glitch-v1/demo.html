<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-glitch — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0a0a0a;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-family: sans-serif; }
    .section { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
    .label { font-size: 0.75rem; color: #444; text-align: center; font-family: sans-serif; }
    .row { display: flex; gap: 3rem; flex-wrap: wrap; justify-content: center; align-items: center; }
    h2 {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 4px;
      color: #fff;
      margin: 0;
      text-transform: uppercase;
      cursor: pointer;
    }
    h3 {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 3px;
      color: #fff;
      margin: 0;
      text-transform: uppercase;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>ease-glitch Demo</h1>

  <div class="section">
    <div class="label">Hover to glitch</div>
    <div class="row">
      <h2 class="ease-glitch" data-text="GLITCH">GLITCH</h2>
      <h2 class="ease-glitch" data-text="CYBER">CYBER</h2>
    </div>
  </div>

  <div class="section">
    <div class="label">Loop variant (always animating)</div>
    <div class="row">
      <h2 class="ease-glitch ease-glitch-loop" data-text="LOOP">LOOP</h2>
    </div>
  </div>

  <div class="section">
    <div class="label">Intensity variants (hover each)</div>
    <div class="row">
      <h3 class="ease-glitch ease-glitch-subtle" data-text="SUBTLE">SUBTLE</h3>
      <h3 class="ease-glitch" data-text="DEFAULT">DEFAULT</h3>
      <h3 class="ease-glitch ease-glitch-hard" data-text="HARD">HARD</h3>
    </div>
  </div>

  <div class="section">
    <div class="label">Color variants (hover each)</div>
    <div class="row">
      <h3 class="ease-glitch ease-glitch-cyan" data-text="CYAN">CYAN</h3>
      <h3 class="ease-glitch ease-glitch-red" data-text="RED">RED</h3>
    </div>
  </div>

</body>
</html>
