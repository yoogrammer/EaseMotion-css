<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Word Split Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Kinetic Word Split</h1>

    <div>
        <div class="label">Wave — rotateX + translateY</div>
        <h2 class="ease-wave-text" id="wave">
            <span style="--i:0">E</span><span style="--i:1">a</span><span style="--i:2">s</span><span style="--i:3">e</span><span style="--i:4">M</span><span style="--i:5">o</span><span style="--i:6">t</span><span style="--i:7">i</span><span style="--i:8">o</span><span style="--i:9">n</span>
        </h2>
    </div>

    <div>
        <div class="label">Elastic — scale from 0 with spring</div>
        <h2 class="ease-elastic-text" id="elastic">
            <span style="--i:0">E</span><span style="--i:1">a</span><span style="--i:2">s</span><span style="--i:3">e</span><span style="--i:4">M</span><span style="--i:5">o</span><span style="--i:6">t</span><span style="--i:7">i</span><span style="--i:8">o</span><span style="--i:9">n</span>
        </h2>
    </div>

    <div>
        <div class="label">Blur — filter: blur() fade-in</div>
        <h2 class="ease-blur-text" id="blurtext">
            <span style="--i:0">E</span><span style="--i:1">a</span><span style="--i:2">s</span><span style="--i:3">e</span><span style="--i:4">M</span><span style="--i:5">o</span><span style="--i:6">t</span><span style="--i:7">i</span><span style="--i:8">o</span><span style="--i:9">n</span>
        </h2>
    </div>

    <div>
        <div class="label">Redact reveal — background-clip text</div>
        <h2 class="ease-redact-text" id="redact">
            <span style="--i:0">E</span><span style="--i:1">a</span><span style="--i:2">s</span><span style="--i:3">e</span><span style="--i:4">M</span><span style="--i:5">o</span><span style="--i:6">t</span><span style="--i:7">i</span><span style="--i:8">o</span><span style="--i:9">n</span>
        </h2>
    </div>

    <button onclick="replay()" style="padding:0.5rem 1.2rem;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:#ccc;cursor:pointer;font-size:0.85rem">
        Replay All
    </button>

    <script>
        function replay() {
            ['wave','elastic','blurtext','redact'].forEach(id => {
                const el = document.getElementById(id);
                el.querySelectorAll('span').forEach(s => {
                    s.style.animation = 'none';
                    void s.offsetWidth;
                    s.style.animation = '';
                });
            });
        }
    </script>

</body>
</html>
