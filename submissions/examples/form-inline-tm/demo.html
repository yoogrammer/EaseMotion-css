<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Form Inline - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Form — Inline</h1>
    <p class="description">
      Self-contained demo. The label, input, and hint sit on
      one row on desktop and stack on mobile.
    </p>

    <div class="ease-field ease-form-inline">
      <label class="ease-field-label" for="email">Email</label>
      <input class="ease-input" id="email" type="email" placeholder="you@example.com">
      <small class="hint">We never share your email.</small>
    </div>

  </div>

</body>
</html>
