<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Gradient Border Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="gradient-border-card">
    <div class="card-content">
      <h2>Gradient Border</h2>
      <p>This card has an animated gradient border that rotates continuously.</p>
    </div>
  </div>

  <div class="gradient-border-card variant-green">
    <div class="card-content">
      <h2>Green Theme</h2>
      <p>The gradient colors are customizable via modifier classes.</p>
    </div>
  </div>
</body>
</html>
