<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Animated Login Card • Floating Labels</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="alm-root">
    <section class="alm-card" aria-label="Login">
      <header class="alm-header">
        <div class="alm-eyebrow">EaseMotion • UI Demo</div>
        <h1 class="alm-title">Sign in</h1>
        <p class="alm-subtitle">Floating labels + smooth motion, no external libraries.</p>
      </header>

      <form class="alm-form" onsubmit="event.preventDefault();">
        <div class="alm-field" data-field>
          <input
            class="alm-input"
            id="alm-username"
            name="username"
            type="text"
            autocomplete="username"
            placeholder=" "
            required
          />
          <label class="alm-label" for="alm-username">Username</label>
        </div>

        <div class="alm-field" data-field>
          <input
            class="alm-input"
            id="alm-password"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder=" "
            required
          />
          <label class="alm-label" for="alm-password">Password</label>
        </div>

        <div class="alm-actions">
          <button class="alm-btn" type="submit">
            <span class="alm-btn__text">Login</span>
            <span class="alm-btn__shine" aria-hidden="true"></span>
          </button>
        </div>

        <div class="alm-hint" role="note">
          Tip: Try typing—labels stay floated after the field has content.
        </div>
      </form>
    </section>
  </main>
</body>
</html>
