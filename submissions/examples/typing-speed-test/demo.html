<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Speed Test</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f1f5f9;">
    <div class="ts-card">
      <h2 class="ts-h2">Typing Speed Test</h2>
      <p class="ts-prompt" id="tsPrompt">The quick brown fox jumps over the lazy dog.</p>
      <textarea class="ts-area" id="tsArea" placeholder="Start typing here..." disabled></textarea>
      <div class="ts-stats">
        <span class="ts-stat">Time: <strong id="tsTime">0</strong>s</span>
        <span class="ts-stat">WPM: <strong id="tsWpm">0</strong></span>
        <span class="ts-stat">Accuracy: <strong id="tsAcc">100</strong>%</span>
      </div>
      <div class="ts-controls">
        <button class="ts-btn" id="tsStart">Start Test</button>
        <button class="ts-btn ts-reset" id="tsReset">Reset</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
