<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orbit Ring Loader Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 3rem;
      padding: 2rem;
    }

    .demo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    h3 { margin: 0; font-size: 0.9rem; color: #94a3b8; }
  </style>
</head>
<body>

  <div class="demo-section">
    <h3>Default Orbit Loader</h3>
    <div class="orbit-loader">
      <div class="core"></div>
      <div class="ring ring-inner"></div>
      <div class="ring ring-mid"></div>
      <div class="ring ring-outer"></div>
    </div>
  </div>

  <div class="demo-section">
    <h3>Fast Orbit Loader</h3>
    <div class="orbit-loader orbit-loader-fast">
      <div class="core"></div>
      <div class="ring ring-inner"></div>
      <div class="ring ring-mid"></div>
      <div class="ring ring-outer"></div>
    </div>
  </div>

  <div class="demo-section">
    <h3>Neon Orbit Loader</h3>
    <div class="orbit-loader orbit-loader-neon">
      <div class="core"></div>
      <div class="ring ring-inner"></div>
      <div class="ring ring-mid"></div>
      <div class="ring ring-outer"></div>
    </div>
  </div>

</body>
</html>
