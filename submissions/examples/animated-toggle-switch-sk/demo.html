<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Toggle Switch</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="toggles">

  <h1>Toggle Switches</h1>

  <label class="toggle" style="--toggle-hue: 260">
    <input type="checkbox" checked>
    <span class="toggle-track">
      <span class="toggle-thumb"></span>
      <span class="toggle-label toggle-label--on">ON</span>
      <span class="toggle-label toggle-label--off">OFF</span>
    </span>
    Wi-Fi
  </label>

  <label class="toggle" style="--toggle-hue: 180">
    <input type="checkbox">
    <span class="toggle-track">
      <span class="toggle-thumb"></span>
      <span class="toggle-label toggle-label--on">ON</span>
      <span class="toggle-label toggle-label--off">OFF</span>
    </span>
    Bluetooth
  </label>

  <label class="toggle" style="--toggle-hue: 340">
    <input type="checkbox" checked>
    <span class="toggle-track">
      <span class="toggle-thumb"></span>
      <span class="toggle-label toggle-label--on">ON</span>
      <span class="toggle-label toggle-label--off">OFF</span>
    </span>
    Dark Mode
  </label>

  <label class="toggle" style="--toggle-hue: 80">
    <input type="checkbox">
    <span class="toggle-track">
      <span class="toggle-thumb"></span>
      <span class="toggle-label toggle-label--on">ON</span>
      <span class="toggle-label toggle-label--off">OFF</span>
    </span>
    Notifications
  </label>

  <label class="toggle" style="--toggle-hue: 40">
    <input type="checkbox" checked>
    <span class="toggle-track">
      <span class="toggle-thumb"></span>
      <span class="toggle-label toggle-label--on">ON</span>
      <span class="toggle-label toggle-label--off">OFF</span>
    </span>
    Auto-Lock
  </label>

</div>

</body>
</html>
