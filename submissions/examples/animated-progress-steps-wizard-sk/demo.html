<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Progress Steps Wizard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wizard">
    <div class="steps">
      <div class="step active">
        <div class="step-circle">1</div>
        <span class="step-label">Plan</span>
      </div>
      <div class="step-bar active"></div>
      <div class="step">
        <div class="step-circle">2</div>
        <span class="step-label">Build</span>
      </div>
      <div class="step-bar"></div>
      <div class="step">
        <div class="step-circle">3</div>
        <span class="step-label">Test</span>
      </div>
      <div class="step-bar"></div>
      <div class="step">
        <div class="step-circle">4</div>
        <span class="step-label">Launch</span>
      </div>
    </div>
    <div class="wizard-content">
      <h2>Planning Phase</h2>
      <p>Define your project scope, milestones, and resource allocation.</p>
    </div>
    <div class="wizard-nav">
      <button class="nav-btn" disabled>Previous</button>
      <button class="nav-btn primary">Next Step</button>
    </div>
  </div>
</body>
</html>
