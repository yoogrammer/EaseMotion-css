<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Toggle/Switch Component</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-container">
        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-content">
                <h1 class="hero-title">Ease Toggle</h1>
                <p class="hero-subtitle">CSS-only toggle switch component</p>
                <p class="hero-description">Smooth animations, multiple variants, and full accessibility. No JavaScript required.</p>
            </div>
        </section>

        <!-- Default Toggle -->
        <section class="demo-section">
            <h2 class="section-title">Default Toggle</h2>
            <div class="demo-grid demo-grid--2col">
                <div class="demo-card">
                    <label class="demo-label">Default State</label>
                    <div class="demo-item">
                        <input type="checkbox" id="toggle-default" class="ease-toggle">
                        <label for="toggle-default" class="ease-toggle-label">Toggle</label>
                    </div>
                </div>
                <div class="demo-card">
                    <label class="demo-label">Checked State</label>
                    <div class="demo-item">
                        <input type="checkbox" id="toggle-checked" class="ease-toggle" checked>
                        <label for="toggle-checked" class="ease-toggle-label">Toggle</label>
                    </div>
                </div>
            </div>
        </section>

        <!-- Color Variants -->
        <section class="demo-section">
            <h2 class="section-title">Color Variants</h2>
            <div class="demo-grid demo-grid--3col">
                <div class="demo-card">
                    <label class="demo-label">Primary</label>
                    <div class="demo-item">
                        <input type="checkbox" id="color-primary" class="ease-toggle ease-toggle--primary" checked>
                        <label for="color-primary" class="ease-toggle-label"></label>
                    </div>
                </div>
                <div class="demo-card">
                    <label class="demo-label">Success</label>
                    <div class="demo-item">
                        <input type="checkbox" id="color-success" class="ease-toggle ease-toggle--success" checked>
                        <label for="color-success" class="ease-toggle-label"></label>
                    </div>
                </div>
                <div class="demo-card">
                    <label class="demo-label">Danger</label>
                    <div class="demo-item">
                        <input type="checkbox" id="color-danger" class="ease-toggle ease-toggle--danger" checked>
                        <label for="color-danger" class="ease-toggle-label"></label>
                    </div>
                </div>
                <div class="demo-card">
                    <label class="demo-label">Warning</label>
                    <div class="demo-item">
                        <input type="checkbox" id="color-warning" class="ease-toggle ease-toggle--warning" checked>
                        <label for="color-warning" class="ease-toggle-label"></label>
                    </div>
                </div>
                <div class="demo-card">
                    <label class="demo-label">Purple</label>
                    <div class="demo-item">
                        <input type="checkbox" id="color-purple" class="ease-toggle ease-toggle--purple" checked>
                        <label for="color-purple" class="ease-toggle-label"></label>
                    </div>
                </div>
                <div class="demo-card">
                    <label class="demo-label">Dark</label>
                    <div class="demo-item">
                        <input type="checkbox" id="color-dark" class="ease-toggle ease-toggle--dark" checked>
                        <label for="color-dark" class="ease-toggle-label"></label>
                    </div>
                </div>
            </div>
        </section>

        <!-- Size Variants -->
        <section class="demo-section">
            <h2 class="section-title">Size Variants</h2>
            <div class="demo-grid demo-grid--3col">
                <div class="demo-card">
                    <label class="demo-label">Small</label>
                    <div class="demo-item demo-item--center">
                        <input type="checkbox" id="size-small" class="ease-toggle ease-toggle--sm ease-toggle--primary" checked>
                        <label for="size-small" class="ease-toggle-label"></label>
                    </div>
                </div>
                <div class="demo-card">
                    <label class="demo-label">Medium</label>
                    <div class="demo-item demo-item--center">
                        <input type="checkbox" id="size-medium" class="ease-toggle ease-toggle--md ease-toggle--primary" checked>
                        <label for="size-medium" class="ease-toggle-label"></label>
                    </div>
                </div>
                <div class="demo-card">
                    <label class="demo-label">Large</label>
                    <div class="demo-item demo-item--center">
                        <input type="checkbox" id="size-large" class="ease-toggle ease-toggle--lg ease-toggle--primary" checked>
                        <label for="size-large" class="ease-toggle-label"></label>
                    </div>
                </div>
            </div>
        </section>

        <!-- Disabled States -->
        <section class="demo-section">
            <h2 class="section-title">Disabled States</h2>
            <div class="demo-grid demo-grid--2col">
                <div class="demo-card">
                    <label class="demo-label">Disabled (Off)</label>
                    <div class="demo-item">
                        <input type="checkbox" id="disabled-off" class="ease-toggle ease-toggle--primary" disabled>
                        <label for="disabled-off" class="ease-toggle-label"></label>
                    </div>
                </div>
                <div class="demo-card">
                    <label class="demo-label">Disabled (On)</label>
                    <div class="demo-item">
                        <input type="checkbox" id="disabled-on" class="ease-toggle ease-toggle--success" checked disabled>
                        <label for="disabled-on" class="ease-toggle-label"></label>
                    </div>
                </div>
            </div>
        </section>

        <!-- Theme Toggle - Premium Feature -->
        <section class="demo-section">
            <h2 class="section-title">Theme Toggle</h2>
            <p class="section-description">Premium animated icon switching with smooth fade transition</p>
            <div class="demo-grid demo-grid--2col">
                <div class="demo-card demo-card--highlight">
                    <label class="demo-label">Light/Dark Mode</label>
                    <div class="demo-item demo-item--center">
                        <input type="checkbox" id="theme-toggle" class="ease-toggle ease-toggle--lg ease-toggle--theme">
                        <label for="theme-toggle" class="ease-toggle-label ease-toggle-label--icon">
                            <span class="icon icon--sun">☀️</span>
                            <span class="icon icon--moon">🌙</span>
                        </label>
                    </div>
                </div>
                <div class="demo-card demo-card--highlight">
                    <label class="demo-label">Yes / No</label>
                    <div class="demo-item demo-item--center">
                        <input type="checkbox" id="yes-no-toggle" class="ease-toggle ease-toggle--lg ease-toggle--success">
                        <label for="yes-no-toggle" class="ease-toggle-label ease-toggle-label--icon">
                            <span class="icon icon--off">✖</span>
                            <span class="icon icon--on">✔</span>
                        </label>
                    </div>
                </div>
            </div>
        </section>

</body>
</html>
