<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-dropdown-gn — Demo</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- Example 1: Navigation dropdown -->
  <div class="dropdown-wrapper">
    <button class="dropdown-toggle">Navigation</button>
    <ul class="dropdown-menu">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Services</a></li>
      <li class="divider"></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </div>

  <!-- Example 2: Account dropdown -->
  <div class="dropdown-wrapper">
    <button class="dropdown-toggle">My Account</button>
    <ul class="dropdown-menu">
      <li><a href="#">Profile</a></li>
      <li><a href="#">Settings</a></li>
      <li class="divider"></li>
      <li><a href="#">Sign Out</a></li>
    </ul>
  </div>

  <!-- Example 3: Actions dropdown -->
  <div class="dropdown-wrapper">
    <button class="dropdown-toggle">Actions</button>
    <ul class="dropdown-menu">
      <li><a href="#">Edit</a></li>
      <li><a href="#">Duplicate</a></li>
      <li><a href="#">Archive</a></li>
      <li class="divider"></li>
      <li><a href="#">Delete</a></li>
    </ul>
  </div>

</body>
</html>
