<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS Discord Community</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="ease-center" style="min-height: 100vh; background: #0f172a; color: white; font-family: sans-serif;">

    <div class="ease-card ease-card-glass ease-fade-in" style="max-width: 500px; text-align: center; padding: 2rem;">
        <h1 class="ease-slide-up">Join the Community! 🚀</h1>
        <p class="ease-slide-up ease-delay-100" style="color: #94a3b8; margin: 1rem 0;">
            Connect with other developers, showcase your designs, and help build the future of EaseMotion CSS.
        </p>
        <a href="https://discord.gg/hWSdGrccBU" target="_blank" class="ease-btn ease-btn-primary ease-btn-pill ease-hover-grow ease-delay-200" style="text-decoration: none; display: inline-block;">
            Open Discord Invite →
        </a>
    </div>

</body>
</html>
