<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulsing Status Indicator Dot Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        background-color: #0f0e17;
        color: #fffffe;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .demo-container {
        text-align: center;
        padding: 2.5rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        background-color: rgba(255, 255, 255, 0.02);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        max-width: 400px;
        width: 100%;
      }
      h1 {
        font-size: 1.8rem;
        margin-bottom: 1rem;
        background: linear-gradient(135deg, #6c63ff, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      p {
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 2rem;
      }
      .status-list {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        align-items: flex-start;
        width: max-content;
        margin: 0 auto;
      }
      .status-item {
        display: flex;
        align-items: center;
        gap: 1rem;
        font-size: 1rem;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.85);
      }
    </style>
  </head>
  <body>
    <div class="demo-container">
      <h1>Pulsing Status Dots</h1>
      <p>Real-time status indicators with a pulsing glow ring:</p>
      <div class="status-list">
        <div class="status-item">
          <span class="status-dot-container">
            <span class="status-dot"></span>
          </span>
          <span>System Online (Success)</span>
        </div>
        <div class="status-item">
          <span class="status-dot-container">
            <span class="status-dot danger"></span>
          </span>
          <span>Live Recording (Danger)</span>
        </div>
        <div class="status-item">
          <span class="status-dot-container">
            <span class="status-dot warning"></span>
          </span>
          <span>Away / Idle (Warning)</span>
        </div>
        <div class="status-item">
          <span class="status-dot-container">
            <span class="status-dot primary"></span>
          </span>
          <span>Connecting (Primary)</span>
        </div>
      </div>
    </div>
  </body>
</html>
