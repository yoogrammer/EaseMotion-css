<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ease-neon-trace demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0f0f1a; gap: 2.5rem; }
    .card {
      padding: 1.5rem 2.5rem;
      background: #1a1a2e;
      border-radius: 12px;
      color: #c4b5fd;
      font-size: 1rem;
      cursor: default;
    }
  </style>
</head>
<body>
  <div class="card ease-neon-trace">
    Hover to trace
    <svg class="neon-border" viewBox="0 0 100 100" preserveAspectRatio="none">
      <rect x="1" y="1" width="98" height="98" rx="10"/>
    </svg>
  </div>
</body>
</html>
