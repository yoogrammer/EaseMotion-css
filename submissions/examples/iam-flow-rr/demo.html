<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Identity & Access Management Flow</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Identity & Access Management Flow</h1>

    <p class="subtitle">
        Visualizing secure authentication and authorization workflows.
    </p>

    <div class="flow">

        <div class="stage user">
            👤 User Login
        </div>

        <div class="connector"></div>

        <div class="stage sso">
            🔑 Single Sign-On (SSO)
        </div>

        <div class="connector"></div>

        <div class="stage mfa">
            📱 Multi-Factor Authentication
        </div>

        <div class="connector"></div>

        <div class="stage token">
            🎟️ Access Token (JWT)
        </div>

        <div class="connector"></div>

        <div class="stage app">
            🖥️ Protected Application
        </div>

    </div>

</div>

</body>
</html>
