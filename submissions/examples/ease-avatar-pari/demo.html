<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ease Avatar Component</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>Base & Sizes</h2>
    <div style="display:flex; align-items:center; justify-content:center; gap:16px;">
      <div class="ease-avatar ease-avatar-sm">S</div>
      <div class="ease-avatar">M</div>
      <div class="ease-avatar ease-avatar-lg">L</div>
    </div>
  </div>

  <div class="card">
    <h2>Circle Variant & Colors</h2>
    <div style="display:flex; align-items:center; justify-content:center; gap:12px;">
      <div class="ease-avatar ease-avatar-circle">AB</div>
      <div class="ease-avatar ease-avatar-circle green">CD</div>
      <div class="ease-avatar ease-avatar-circle orange">EF</div>
      <div class="ease-avatar ease-avatar-circle pink">GH</div>
      <div class="ease-avatar ease-avatar-circle blue">IJ</div>
    </div>
  </div>

  <div class="card">
    <h2>Avatar Group — Stacked</h2>
    <div class="ease-avatar-group">
      <div class="ease-avatar ease-avatar-circle">AB</div>
      <div class="ease-avatar ease-avatar-circle green">CD</div>
      <div class="ease-avatar ease-avatar-circle orange">EF</div>
      <div class="ease-avatar ease-avatar-circle pink">GH</div>
      <div class="ease-avatar ease-avatar-circle count">+5</div>
    </div>
    <p style="font-size:12px; color:#aaa; margin-top:12px;">
      Hover to expand
    </p>
  </div>

  <div class="card">
    <h2>Mixed Sizes in Group</h2>
    <div style="display:flex; align-items:center; justify-content:center; gap:12px;">
      <div class="ease-avatar ease-avatar-sm ease-avatar-circle blue">A</div>
      <div class="ease-avatar ease-avatar-circle">BC</div>
      <div class="ease-avatar ease-avatar-lg ease-avatar-circle green">DE</div>
    </div>
  </div>

</body>
</html>
