<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pure CSS 3D Mechanical Keyboard Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">
    <div class="header">
      <h1>Pure CSS 60% Mechanical Keyboard</h1>
      <p>A mathematically precise 3D rendering engine built completely without JavaScript.</p>
    </div>

    <!-- The 3D Keyboard Wrapper -->
    <div class="ease-mechanical-keyboard">
      
      <!-- Row 1: Function & Numbers -->
      <div class="keyboard-row">
        <button class="key-3d key-esc color-accent">
          <div class="key-cap">Esc</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">1 !</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">2 @</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">3 #</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">4 $</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">5 %</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">6 ^</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">7 &</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">8 *</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">9 (</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">0 )</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">- _</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">= +</div>
        </button>
        <button class="key-3d key-backspace color-mod">
          <div class="key-cap">Backspace</div>
        </button>
      </div>

      <!-- Row 2: QWERTY -->
      <div class="keyboard-row">
        <button class="key-3d key-tab color-mod">
          <div class="key-cap">Tab</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">Q</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">W</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">E</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">R</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">T</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">Y</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">U</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">I</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">O</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">P</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">[ {</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">] }</div>
        </button>
        <button class="key-3d key-backslash color-mod">
          <div class="key-cap">\ |</div>
        </button>
      </div>

      <!-- Row 3: ASDF -->
      <div class="keyboard-row">
        <button class="key-3d key-capslock color-mod">
          <div class="key-cap">Caps Lock</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">A</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">S</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">D</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">F</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">G</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">H</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">J</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">K</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">L</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">; :</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">' "</div>
        </button>
        <button class="key-3d key-enter color-accent">
          <div class="key-cap">Enter</div>
        </button>
      </div>

      <!-- Row 4: ZXCV -->
      <div class="keyboard-row">
        <button class="key-3d key-shift-l color-mod">
          <div class="key-cap">Shift</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">Z</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">X</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">C</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">V</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">B</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">N</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">M</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">, <</div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">. ></div>
        </button>
        <button class="key-3d key-standard">
          <div class="key-cap">/ ?</div>
        </button>
        <button class="key-3d key-shift-r color-mod">
          <div class="key-cap">Shift</div>
        </button>
      </div>

      <!-- Row 5: Modifiers & Space -->
      <div class="keyboard-row">
        <button class="key-3d key-ctrl color-mod">
          <div class="key-cap">Ctrl</div>
        </button>
        <button class="key-3d key-win color-mod">
          <div class="key-cap">Win</div>
        </button>
        <button class="key-3d key-alt color-mod">
          <div class="key-cap">Alt</div>
        </button>
        <button class="key-3d key-space color-standard">
          <div class="key-cap"></div>
        </button>
        <button class="key-3d key-alt color-mod">
          <div class="key-cap">Alt</div>
        </button>
        <button class="key-3d key-fn color-mod">
          <div class="key-cap">Fn</div>
        </button>
        <button class="key-3d key-menu color-mod">
          <div class="key-cap">Ctx</div>
        </button>
        <button class="key-3d key-ctrl color-mod">
          <div class="key-cap">Ctrl</div>
        </button>
      </div>
      
    </div>
  </div>

</body>
</html>
