<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notification Bell</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bell-wrapper">
    <button class="bell-btn" aria-label="Notifications">
      <svg class="bell-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="bell-dot"></span>
    </button>
  </div>
  <div class="bell-wrapper">
    <button class="bell-btn bell-interval" aria-label="Notifications">
      <svg class="bell-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="bell-dot"></span>
    </button>
    <p class="bell-label">Auto-ring (interval)</p>
  </div>
</body>
</html>
