<body class="ease-bg-neutral-900 ease-color-neutral-100" style="padding: 2rem; font-family: sans-serif;">
  <h1 class="ease-text-3xl ease-font-bold ease-mb-6">Fix for modal.js Focus Trap</h1>
  <p class="ease-mb-4">Demonstrates fix for issue #8399 where focus trap breaks on visually hidden elements.</p>
  
  <a href="#test-modal" class="ease-btn">Open Modal</a>

  <div id="test-modal" class="ease-modal">
    <div class="ease-modal-content">
      <h2 class="ease-text-xl ease-font-bold ease-mb-4">Modal with hidden element</h2>
      <a href="#" class="ease-modal-close">&times;</a>
      <p class="ease-mb-4">Pressing Tab will no longer focus the hidden link below, or get trapped.</p>
      
      <!-- Visually hidden link that breaks the original modal.js -->
      <a href="#" style="display: none;">Hidden Link</a>
      
      <button class="ease-btn ease-btn-primary">Focusable Button</button>
    </div>
  </div>

</html>
