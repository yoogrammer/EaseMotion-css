<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-neon — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0a0a0a;
      gap: 3rem;
      padding: 2rem;
    }
    h1 { color: #fff; }
    .row { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; align-items: center; }
    .label { font-size: 0.75rem; color: #444; text-align: center; margin-bottom: 0.75rem; }
    .section { display: flex; flex-direction: column; align-items: center; }
    h2 { font-size: 2rem; font-weight: 800; letter-spacing: 2px; margin: 0; }
    .box {
      padding: 16px 32px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <h1 style="color:#fff;">ease-neon Demo</h1>

  <div class="section">
    <div class="label">Text glow — color variants</div>
    <div class="row">
      <h2 class="ease-neon ease-neon-pink">PINK</h2>
      <h2 class="ease-neon ease-neon-blue">BLUE</h2>
      <h2 class="ease-neon ease-neon-green">GREEN</h2>
      <h2 class="ease-neon ease-neon-purple">PURPLE</h2>
    </div>
  </div>

  <div class="section">
    <div class="label">Border glow variants</div>
    <div class="row">
      <div class="box ease-neon-border ease-neon-pink" style="color:#f72585;">Pink Box</div>
      <div class="box ease-neon-border ease-neon-blue" style="color:#4cc9f0;">Blue Box</div>
      <div class="box ease-neon-border ease-neon-green" style="color:#00f5a0;">Green Box</div>
    </div>
  </div>

  <div class="section">
    <div class="label">Speed variants</div>
    <div class="row">
      <h2 class="ease-neon ease-neon-pink ease-neon-fast">FAST</h2>
      <h2 class="ease-neon ease-neon-blue">DEFAULT</h2>
      <h2 class="ease-neon ease-neon-green ease-neon-slow">SLOW</h2>
    </div>
  </div>

  <div class="section">
    <div class="label">Static (no pulse)</div>
    <div class="row">
      <h2 class="ease-neon ease-neon-purple ease-neon-static">STATIC</h2>
    </div>
  </div>

</body>
</html>
