<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Back to Top — EaseMotion CSS Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; max-width: 700px; margin: auto; }
    section { margin-bottom: 4rem; }
  </style>
</head>
<body>
  <h1 id="top">Back to Top Demo</h1>
  <section><p>Scroll down to see the button appear...</p></section>
  <section><p>Keep scrolling...</p></section>
  <section><p>Almost there...</p></section>
  <section><p>Now the button should be visible. Click it!</p></section>

  <button
    class="back-to-top"
    id="backToTop"
    aria-label="Back to top"
    onclick="window.scrollTo({ top: 0, behavior: 'smooth' })"
  >↑</button>

  <script>
    const btn = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      btn.classList.toggle('visible', window.scrollY > 200);
    });
  </script>
</body>
</html>
