<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Package Lock Reference Container - EaseMotion CSS</title>
  <style>
    body { background-color: #070b12; color: #f1f5f9; font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .lock-card { padding: 32px; background: #0e131f; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; text-align: center; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    h1 { font-size: 20px; color: #3b82f6; margin-top: 0; }
    p { font-size: 14px; color: #94a3b8; line-height: 1.5; }
    .chip { inline-block; padding: 4px 10px; background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-radius: 6px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="lock-card">
    <span class="chip">Tooling Patch #2573</span>
    <h1>Lockfile Integration Patch</h1>
    <p>This directory holds the self-contained container documentation patch to map out the deterministic package dependency locking requirements for automated npm workflows.</p>
  </div>
</body>
</html>
