<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Spin Animation Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <!-- Regular Standard Spin Icon -->
    <div class="demo-box">
      <h3>Standard (Clockwise)</h3>
      <div class="spinner ease-spin"></div>
    </div>

    <!-- Reverse Variant Counter-Rotation Icon -->
    <div class="demo-box">
      <h3>Reverse (Counter-Clockwise)</h3>
      <div class="spinner ease-spin-reverse"></div>
    </div>
  </div>
</body>
</html>
