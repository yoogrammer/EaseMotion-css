<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tooltip Multiline - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Tooltip — Multiline</h1>
    <p class="description">
      Self-contained demo. Hover the button to see the multi-line
      tooltip with embedded line breaks.
    </p>

    <span class="ease-tooltip ease-tooltip-multiline demo-btn"
          data-tooltip="Keyboard shortcut:&#10;Cmd + Shift + P&#10;&#10;Opens the command palette.">
      Hover me
    </span>

  </div>

</body>
</html>
