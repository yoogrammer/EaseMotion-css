<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluid Typography Scale - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Fluid Typography Scale</h1>
    <div class="type-scale">
      <p class="type-h1">Heading 1</p>
      <p class="type-h2">Heading 2</p>
      <p class="type-h3">Heading 3</p>
      <p class="type-body">Body text that scales fluidly with viewport using clamp().</p>
      <p class="type-small">Small text</p>
    </div>
    <p class="description">Resize the browser to see fluid typography scaling with clamp().</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
