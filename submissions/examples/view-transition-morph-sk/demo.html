<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Transition Named Morph</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>View Transitions — Named Element Morph</h1>

    <div id="card-grid">

        <div class="vt-card" onclick="openDetail(0)">
            <svg class="vt-card-img" viewBox="0 0 160 110" xmlns="http://www.w3.org/2000/svg" style="view-transition-name:vt-image">
                <rect width="160" height="110" fill="oklch(42% 0.18 260)"/>
                <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" fill="white" font-size="14" font-family="sans-serif">Image A</text>
            </svg>
            <div class="vt-card-body">
                <div class="vt-card-title" style="view-transition-name:vt-title">Aurora Series</div>
                <div class="vt-card-tag" style="view-transition-name:vt-tag">Photography</div>
            </div>
        </div>

        <div class="vt-card" onclick="openDetail(1)">
            <svg class="vt-card-img" viewBox="0 0 160 110" xmlns="http://www.w3.org/2000/svg">
                <rect width="160" height="110" fill="oklch(42% 0.18 160)"/>
                <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" fill="white" font-size="14" font-family="sans-serif">Image B</text>
            </svg>
            <div class="vt-card-body">
                <div class="vt-card-title">Forest Light</div>
                <div class="vt-card-tag">Nature</div>
            </div>
        </div>

        <div class="vt-card" onclick="openDetail(2)">
            <svg class="vt-card-img" viewBox="0 0 160 110" xmlns="http://www.w3.org/2000/svg">
                <rect width="160" height="110" fill="oklch(42% 0.18 40)"/>
                <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" fill="white" font-size="14" font-family="sans-serif">Image C</text>
            </svg>
            <div class="vt-card-body">
                <div class="vt-card-title">Desert Dusk</div>
                <div class="vt-card-tag">Landscape</div>
            </div>
        </div>

    </div>

    <div id="detail-view">
        <svg id="detail-img" class="vt-detail-img" viewBox="0 0 440 220" xmlns="http://www.w3.org/2000/svg" style="view-transition-name:vt-image">
            <rect width="440" height="220" fill="oklch(42% 0.18 260)"/>
        </svg>
        <div class="vt-detail-body">
            <div id="detail-title" class="vt-detail-title" style="view-transition-name:vt-title">Aurora Series</div>
            <div id="detail-tag" class="vt-detail-tag" style="view-transition-name:vt-tag">Photography</div>
            <p id="detail-desc" class="vt-detail-desc">Full detail view with morphed image and title. The CSS controls the animation; the JS only calls startViewTransition().</p>
            <button class="back-btn" onclick="goBack()">Back to grid</button>
        </div>
    </div>

    <script>
        const items = [
            { title: 'Aurora Series', tag: 'Photography', fill: 'oklch(42% 0.18 260)', desc: 'Long-exposure capture of the northern lights over Iceland.' },
            { title: 'Forest Light',  tag: 'Nature',      fill: 'oklch(42% 0.18 160)', desc: 'Morning rays filtering through ancient redwood canopy.' },
            { title: 'Desert Dusk',   tag: 'Landscape',   fill: 'oklch(42% 0.18 40)',  desc: 'Golden hour light across the Sahara sand dunes.' },
        ];

        function openDetail(i) {
            const d = items[i];
            if (!document.startViewTransition) {
                applyDetail(d); return;
            }
            document.startViewTransition(() => applyDetail(d));
        }

        function applyDetail(d) {
            document.getElementById('card-grid').style.display = 'none';
            const dv = document.getElementById('detail-view');
            dv.classList.add('active');
            document.getElementById('detail-title').textContent = d.title;
            document.getElementById('detail-tag').textContent = d.tag;
            document.getElementById('detail-desc').textContent = d.desc;
            const rect = document.getElementById('detail-img').querySelector('rect');
            if (rect) rect.setAttribute('fill', d.fill);
        }

        function goBack() {
            if (!document.startViewTransition) {
                revertToGrid(); return;
            }
            document.startViewTransition(() => revertToGrid());
        }

        function revertToGrid() {
            document.getElementById('detail-view').classList.remove('active');
            document.getElementById('card-grid').style.display = '';
        }
    </script>

</body>
</html>
