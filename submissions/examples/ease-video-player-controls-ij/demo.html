<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion — Video Player Controls</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Video Player Controls</h1>
    <p>Move mouse over the player to reveal controls</p>
  </header>

  <div class="vpc-player" id="player">
    <div class="vpc-video-area" id="videoArea">
      <span class="vpc-preview-text">Video Preview Area</span>
    </div>

    <div class="vpc-controls" id="controls">
      <div class="vpc-progress-wrap">
        <div class="vpc-progress-track" id="progressTrack">
          <div class="vpc-progress-fill" id="progressFill" style="width: 0%"></div>
          <div class="vpc-progress-thumb" id="progressThumb" style="left: 0%"></div>
        </div>
      </div>

      <div class="vpc-controls-row">
        <div class="vpc-left">
          <button class="vpc-btn" id="playBtn" title="Play / Pause">
            <span id="playIcon">&#9654;</span>
          </button>
          <span class="vpc-time" id="timeDisplay">0:00 / 0:00</span>
        </div>
        <div class="vpc-right">
          <button class="vpc-btn" id="volumeBtn" title="Mute / Unmute">
            <span id="volumeIcon">&#128266;</span>
          </button>
          <input type="range" class="vpc-slider" id="volumeSlider" min="0" max="1" step="0.05" value="0.8">
          <button class="vpc-btn" id="fullscreenBtn" title="Fullscreen">
            <span id="fullscreenIcon">&#9974;</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    var player = document.getElementById('player');
    var controls = document.getElementById('controls');
    var videoArea = document.getElementById('videoArea');
    var playBtn = document.getElementById('playBtn');
    var playIcon = document.getElementById('playIcon');
    var progressFill = document.getElementById('progressFill');
    var progressThumb = document.getElementById('progressThumb');
    var progressTrack = document.getElementById('progressTrack');
    var timeDisplay = document.getElementById('timeDisplay');
    var volumeSlider = document.getElementById('volumeSlider');
    var volumeIcon = document.getElementById('volumeIcon');
    var fullscreenBtn = document.getElementById('fullscreenBtn');
    var fullscreenIcon = document.getElementById('fullscreenIcon');
    var controlsTimer = null;
    var isPlaying = false;
    var isMuted = false;
    var progress = 0;

    function showControls() {
      controls.classList.add('vpc-controls-visible');
      clearTimeout(controlsTimer);
      controlsTimer = setTimeout(function () {
        if (isPlaying) {
          controls.classList.remove('vpc-controls-visible');
        }
      }, 2500);
    }

    player.addEventListener('mouseenter', showControls);
    player.addEventListener('mousemove', showControls);

    playBtn.addEventListener('click', function () {
      isPlaying = !isPlaying;
      playIcon.innerHTML = isPlaying ? '&#10074;&#10074;' : '&#9654;';
      if (isPlaying) {
        simulatePlayback();
      }
      showControls();
    });

    function simulatePlayback() {
      if (!isPlaying) return;
      var increment = 0.25 + Math.random() * 0.5;
      progress = Math.min(progress + increment, 100);
      updateProgress();
      timeDisplay.textContent = formatTime(progress) + ' / 3:45';
      if (progress < 100) {
        setTimeout(simulatePlayback, 300);
      } else {
        isPlaying = false;
        playIcon.innerHTML = '&#9654;';
        controls.classList.add('vpc-controls-visible');
      }
    }

    function updateProgress() {
      progressFill.style.width = progress + '%';
      progressThumb.style.left = progress + '%';
    }

    progressTrack.addEventListener('click', function (e) {
      var rect = progressTrack.getBoundingClientRect();
      progress = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
      updateProgress();
      timeDisplay.textContent = formatTime(progress) + ' / 3:45';
      showControls();
    });

    function formatTime(pct) {
      var totalSec = Math.floor((pct / 100) * 225);
      var m = Math.floor(totalSec / 60);
      var s = totalSec % 60;
      return m + ':' + (s < 10 ? '0' : '') + s;
    }

    volumeSlider.addEventListener('input', function () {
      var val = parseFloat(volumeSlider.value);
      isMuted = val === 0;
      volumeIcon.innerHTML = val === 0 ? '&#128263;' : val < 0.4 ? '&#128265;' : '&#128266;';
      showControls();
    });

    volumeSlider.addEventListener('click', function (e) {
      e.stopPropagation();
    });

    fullscreenBtn.addEventListener('click', function () {
      if (!document.fullscreenElement) {
        player.requestFullscreen().catch(function () {});
      } else {
        document.exitFullscreen().catch(function () {});
      }
    });

    document.addEventListener('fullscreenchange', function () {
      fullscreenIcon.innerHTML = document.fullscreenElement ? '&#10530;' : '&#9974;';
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === ' ' || e.key === 'k') {
        e.preventDefault();
        playBtn.click();
      }
      if (e.key === 'f') {
        fullscreenBtn.click();
      }
      if (e.key === 'm') {
        volumeSlider.value = isMuted ? '0.8' : '0';
        volumeSlider.dispatchEvent(new Event('input'));
      }
    });

    function formatTime(pct) {
      var totalSec = Math.floor((pct / 100) * 225);
      var m = Math.floor(totalSec / 60);
      var s = totalSec % 60;
      return m + ':' + (s < 10 ? '0' : '') + s;
    }

    timeDisplay.textContent = '0:00 / 3:45';
  </script>
</body>
</html>
