<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-wrapper">
    <h1>Rock Paper Scissors</h1>
    <div class="mode-select">
      <label>Best of:</label>
      <select id="bestOf" class="input select">
        <option value="1">Single Round</option>
        <option value="3" selected>First to 3</option>
        <option value="5">First to 5</option>
        <option value="7">First to 7</option>
      </select>
    </div>
    <div class="scoreboard">
      <div class="score-item">
        <span class="score-label">You</span>
        <span class="score-value" id="playerScore">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">Draws</span>
        <span class="score-value" id="drawScore">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">Computer</span>
        <span class="score-value" id="computerScore">0</span>
      </div>
    </div>
    <div class="result-area" id="resultArea">
      <div class="choice-display">
        <div class="choice-icon" id="playerChoiceIcon">✊</div>
        <span class="vs">VS</span>
        <div class="choice-icon" id="computerChoiceIcon">✊</div>
      </div>
      <div class="result-message" id="resultMessage">Choose your move!</div>
    </div>
    <div class="choices">
      <button class="choice-btn" data-choice="rock">✊<span>Rock</span></button>
      <button class="choice-btn" data-choice="paper">✋<span>Paper</span></button>
      <button class="choice-btn" data-choice="scissors">✌️<span>Scissors</span></button>
    </div>
    <button id="resetBtn" class="reset-btn">Reset Game</button>
  </div>
  <script>
    const icons = { rock: '✊', paper: '✋', scissors: '✌️' };
    const playerScoreEl = document.getElementById('playerScore');
    const computerScoreEl = document.getElementById('computerScore');
    const drawScoreEl = document.getElementById('drawScore');
    const playerChoiceIcon = document.getElementById('playerChoiceIcon');
    const computerChoiceIcon = document.getElementById('computerChoiceIcon');
    const resultMessage = document.getElementById('resultMessage');
    const resultArea = document.getElementById('resultArea');
    const bestOf = document.getElementById('bestOf');
    const resetBtn = document.getElementById('resetBtn');

    let playerScore = 0;
    let computerScore = 0;
    let draws = 0;
    let gameOver = false;

    function getComputerChoice() {
      const choices = ['rock', 'paper', 'scissors'];
      return choices[Math.floor(Math.random() * 3)];
    }

    function determineWinner(player, computer) {
      if (player === computer) return 'draw';
      if ((player === 'rock' && computer === 'scissors') ||
          (player === 'paper' && computer === 'rock') ||
          (player === 'scissors' && computer === 'paper')) return 'player';
      return 'computer';
    }

    function playRound(playerChoice) {
      if (gameOver) return;
      const computerChoice = getComputerChoice();
      const winner = determineWinner(playerChoice, computerChoice);

      playerChoiceIcon.textContent = icons[playerChoice];
      computerChoiceIcon.textContent = icons[computerChoice];
      resultArea.classList.remove('win', 'lose', 'draw');

      if (winner === 'player') {
        playerScore++;
        resultMessage.textContent = 'You Win! 🎉';
        resultArea.classList.add('win');
      } else if (winner === 'computer') {
        computerScore++;
        resultMessage.textContent = 'Computer Wins! 🤖';
        resultArea.classList.add('lose');
      } else {
        draws++;
        resultMessage.textContent = "It's a Draw! 🤝";
        resultArea.classList.add('draw');
      }

      playerScoreEl.textContent = playerScore;
      computerScoreEl.textContent = computerScore;
      drawScoreEl.textContent = draws;

      const target = parseInt(bestOf.value);
      if (target > 1) {
        if (playerScore >= target) {
          resultMessage.textContent = '🏆 You Win the Series! 🏆';
          gameOver = true;
        } else if (computerScore >= target) {
          resultMessage.textContent = '💻 Computer Wins the Series! 💻';
          gameOver = true;
        }
      }
    }

    function resetGame() {
      playerScore = 0;
      computerScore = 0;
      draws = 0;
      gameOver = false;
      playerScoreEl.textContent = '0';
      computerScoreEl.textContent = '0';
      drawScoreEl.textContent = '0';
      playerChoiceIcon.textContent = '✊';
      computerChoiceIcon.textContent = '✊';
      resultMessage.textContent = 'Choose your move!';
      resultArea.classList.remove('win', 'lose', 'draw');
    }

    document.querySelectorAll('.choice-btn').forEach(btn => {
      btn.addEventListener('click', () => playRound(btn.dataset.choice));
    });

    resetBtn.addEventListener('click', resetGame);

    bestOf.addEventListener('change', resetGame);
  </script>
</body>
</html>
