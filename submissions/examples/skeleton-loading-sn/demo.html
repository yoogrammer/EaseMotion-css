<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeleton Loading — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div
  style="
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 20px;
    max-width: 400px;
    font-family: sans-serif;
  "
>
  <div class="skeleton-box" style="width: 100%; height: 160px"></div>
  <div class="skeleton-box" style="width: 70%; height: 20px"></div>
  <div class="skeleton-box" style="width: 90%; height: 20px"></div>
  <div class="skeleton-box" style="width: 50%; height: 20px"></div>
</div>

</body>
</html>
