<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savings Goal Tracker - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tracker-wrapper">
    <h1>Savings Goal Tracker</h1>
    <div class="form-grid">
      <div class="field">
        <label for="goalName">Goal Name</label>
        <input type="text" id="goalName" class="input" value="Emergency Fund">
      </div>
      <div class="field">
        <label for="targetAmount">Target Amount ($)</label>
        <input type="number" id="targetAmount" class="input" value="10000" min="1">
      </div>
      <div class="field">
        <label for="currentSavings">Current Savings ($)</label>
        <input type="number" id="currentSavings" class="input" value="3500" min="0">
      </div>
      <div class="field">
        <label for="monthlyContribution">Monthly Contribution ($)</label>
        <input type="number" id="monthlyContribution" class="input" value="500" min="0">
      </div>
      <div class="field">
        <label for="startDate">Start Date</label>
        <input type="date" id="startDate" class="input">
      </div>
    </div>
    <div class="progress-section">
      <div class="circle-progress">
        <svg viewBox="0 0 120 120" class="circle-svg">
          <circle cx="60" cy="60" r="54" class="circle-bg" />
          <circle cx="60" cy="60" r="54" class="circle-fill" id="circleFill" />
        </svg>
        <div class="circle-text">
          <span class="circle-pct" id="progressPct">35%</span>
          <span class="circle-label">Complete</span>
        </div>
      </div>
      <div class="milestones" id="milestones"></div>
      <div class="projected">
        <span class="projected-label">Projected Completion</span>
        <span class="projected-date" id="projectedDate">--</span>
      </div>
    </div>
  </div>
  <script>
    const goalName = document.getElementById('goalName');
    const targetAmount = document.getElementById('targetAmount');
    const currentSavings = document.getElementById('currentSavings');
    const monthlyContribution = document.getElementById('monthlyContribution');
    const startDate = document.getElementById('startDate');
    const circleFill = document.getElementById('circleFill');
    const progressPct = document.getElementById('progressPct');
    const projectedDate = document.getElementById('projectedDate');
    const milestones = document.getElementById('milestones');

    const today = new Date().toISOString().split('T')[0];
    startDate.value = startDate.value || today;

    function update() {
      const target = parseFloat(targetAmount.value) || 0;
      const current = parseFloat(currentSavings.value) || 0;
      const monthly = parseFloat(monthlyContribution.value) || 0;
      const start = new Date(startDate.value);
      const now = new Date();

      const pct = target > 0 ? Math.min(100, Math.max(0, (current / target) * 100)) : 0;
      progressPct.textContent = Math.round(pct) + '%';

      const circumference = 2 * Math.PI * 54;
      const offset = circumference - (pct / 100) * circumference;
      circleFill.style.strokeDasharray = circumference;
      circleFill.style.strokeDashoffset = offset;

      milestones.innerHTML = '';
      [25, 50, 75, 100].forEach(m => {
        const el = document.createElement('div');
        el.className = 'milestone' + (pct >= m ? ' reached' : '');
        el.textContent = m + '%';
        milestones.appendChild(el);
      });

      if (monthly > 0 && target > current) {
        const remaining = target - current;
        const monthsNeeded = Math.ceil(remaining / monthly);
        const projected = new Date(now);
        projected.setMonth(projected.getMonth() + monthsNeeded);
        projectedDate.textContent = projected.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      } else if (current >= target) {
        projectedDate.textContent = 'Goal Reached!';
      } else {
        projectedDate.textContent = 'Set monthly contribution';
      }
    }

    [goalName, targetAmount, currentSavings, monthlyContribution, startDate].forEach(el => {
      el.addEventListener('input', update);
    });
    update();
  </script>
</body>
</html>
