<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Terminal Prompt Login – a command-line inspired authentication form built with EaseMotion CSS.">
  <title>Terminal Prompt Login | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="lf-term-preview">
    <form class="lf-term" autocomplete="off">
      <!-- Terminal header bar -->
      <div class="lf-term-bar" role="presentation">
        <span class="lf-term-dot r" aria-hidden="true"></span>
        <span class="lf-term-dot y" aria-hidden="true"></span>
        <span class="lf-term-dot g" aria-hidden="true"></span>
        <span class="lf-term-title">~/login</span>
      </div>

      <!-- Terminal body -->
      <div class="lf-term-body">
        <div class="lf-term-line" aria-hidden="true">
          <span class="lf-term-prompt">$</span>
          auth login
        </div>

        <div class="lf-term-line">
          <label for="lf-email" class="lf-term-prompt">user:</label>
          <input id="lf-email" type="email" placeholder="you@example.com" required aria-label="Email address">
        </div>

        <div class="lf-term-line">
          <label for="lf-pass" class="lf-term-prompt">pass:</label>
          <input id="lf-pass" type="password" placeholder="••••••••" required aria-label="Password">
        </div>

        <button type="submit" class="lf-term-btn">
          $ run
          <span class="lf-term-caret" aria-hidden="true">_</span>
        </button>
      </div>
    </form>
  </main>

</body>
</html>
