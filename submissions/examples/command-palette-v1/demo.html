<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Palette</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <h1>Command Palette</h1>
    <p class="subtitle">Press <kbd>Ctrl+K</kbd> or click to open</p>
    <a href="#cmd-palette" class="btn">Open Palette</a>
  </div>

  <div id="cmd-palette" class="cmd-overlay">
    <div class="cmd-palette" role="dialog" aria-label="Command palette">
      <div class="cmd-header">
        <span class="cmd-search-icon">⌕</span>
        <input class="cmd-search" type="text" placeholder="Type a command..." autofocus>
        <kbd class="cmd-hint">Esc</kbd>
      </div>
      <div class="cmd-body">
        <div class="cmd-group">
          <span class="cmd-group-title">General</span>
          <a href="#" class="cmd-item">
            <span class="cmd-item-label">Dashboard</span>
            <span class="cmd-item-shortcut"><kbd>⌘D</kbd></span>
          </a>
          <a href="#" class="cmd-item">
            <span class="cmd-item-label">Profile Settings</span>
            <span class="cmd-item-shortcut"><kbd>⌘P</kbd></span>
          </a>
          <a href="#" class="cmd-item">
            <span class="cmd-item-label">Notifications</span>
            <span class="cmd-item-shortcut"><kbd>⌘N</kbd></span>
          </a>
        </div>
        <div class="cmd-group">
          <span class="cmd-group-title">Actions</span>
          <a href="#" class="cmd-item">
            <span class="cmd-item-label">New Project</span>
            <span class="cmd-item-shortcut"><kbd>⌘⇧N</kbd></span>
          </a>
          <a href="#" class="cmd-item">
            <span class="cmd-item-label">Save File</span>
            <span class="cmd-item-shortcut"><kbd>⌘S</kbd></span>
          </a>
          <a href="#" class="cmd-item">
            <span class="cmd-item-label">Run Build</span>
            <span class="cmd-item-shortcut"><kbd>⌘B</kbd></span>
          </a>
          <a href="#" class="cmd-item">
            <span class="cmd-item-label">Deploy</span>
            <span class="cmd-item-shortcut"><kbd>⌘⇧D</kbd></span>
          </a>
        </div>
        <div class="cmd-group">
          <span class="cmd-group-title">Pages</span>
          <a href="#" class="cmd-item">
            <span class="cmd-item-label">Team</span>
            <span class="cmd-item-shortcut"><kbd>G T</kbd></span>
          </a>
          <a href="#" class="cmd-item">
            <span class="cmd-item-label">Analytics</span>
            <span class="cmd-item-shortcut"><kbd>G A</kbd></span>
          </a>
          <a href="#" class="cmd-item cmd-item--disabled">
            <span class="cmd-item-label">Settings</span>
            <span class="cmd-item-shortcut"><kbd>G S</kbd></span>
          </a>
        </div>
      </div>
      <div class="cmd-footer">
        <span class="cmd-footer-text"><kbd>↑↓</kbd> Navigate</span>
        <span class="cmd-footer-text"><kbd>↵</kbd> Select</span>
        <span class="cmd-footer-text"><kbd>Esc</kbd> Close</span>
      </div>
    </div>
    <a href="#" class="cmd-backdrop"></a>
  </div>
</body>
</html>
