<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Matrix Rain Effect</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: #00ff88;
            background: rgba(0,0,0,0.7);
            padding: 12px 24px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            font-family: system-ui;
        }
        #info h1 {
            margin: 0;
            font-size: 1rem;
        }
        #info p {
            margin: 5px 0 0;
            font-size: 0.7rem;
            opacity: 0.7;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }
        button {
            background: rgba(0,255,136,0.2);
            border: 1px solid rgba(0,255,136,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            color: #00ff88;
            cursor: pointer;
            font-family: system-ui;
            font-size: 12px;
        }
        button:hover {
            background: rgba(0,255,136,0.4);
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>💚 Matrix Rain Effect</h1>
        <p>Falling characters with trailing fade | Pure Canvas</p>
    </div>
    <div class="controls">
        <button id="moreRain">More Rain</button>
        <button id="lessRain">Less Rain</button>
        <button id="resetRain">Reset</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
