<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vertical Align Utilities — Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
      max-width: 900px;
      width: 100%;
    }
    .demo-card {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      text-align: center;
    }
    .demo-card h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 1rem;
    }
    .demo-box {
      background: #f0f4ff;
      border: 1px solid #d0d8f0;
      border-radius: 8px;
      height: 100px;
      line-height: 100px;
      font-size: 1.5rem;
    }
    .demo-box span {
      font-size: 1rem;
      line-height: normal;
      display: inline-block;
    }
    .demo-box img {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      background: #6c63ff;
    }
    .class-name {
      display: block;
      margin-top: 0.75rem;
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 0.8rem;
      color: #666;
      background: #f0f0f0;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="demo-grid">
    <div class="demo-card">
      <h3>Baseline</h3>
      <div class="demo-box">
        Text <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%236c63ff' rx='4'/%3E%3C/svg%3E" class="align-baseline" alt="">
      </div>
      <span class="class-name">.align-baseline</span>
    </div>
    <div class="demo-card">
      <h3>Top</h3>
      <div class="demo-box">
        Text <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%236c63ff' rx='4'/%3E%3C/svg%3E" class="align-top" alt="">
      </div>
      <span class="class-name">.align-top</span>
    </div>
    <div class="demo-card">
      <h3>Middle</h3>
      <div class="demo-box">
        Text <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%236c63ff' rx='4'/%3E%3C/svg%3E" class="align-middle" alt="">
      </div>
      <span class="class-name">.align-middle</span>
    </div>
    <div class="demo-card">
      <h3>Bottom</h3>
      <div class="demo-box">
        Text <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%236c63ff' rx='4'/%3E%3C/svg%3E" class="align-bottom" alt="">
      </div>
      <span class="class-name">.align-bottom</span>
    </div>
  </div>
</body>
</html>
