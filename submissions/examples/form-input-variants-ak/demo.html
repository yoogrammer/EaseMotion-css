<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Input Variants Demo</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="demo">
        <h2>Input Variants</h2>
        <label>Outlined</label>
        <input class="input input--outlined" placeholder="Enter text" />
        <label>Filled</label>
        <input class="input input--filled" placeholder="Enter text" />
        <label>Underlined</label>
        <input class="input input--underlined" placeholder="Enter text" />
        <label>Disabled</label>
        <input class="input input--outlined" placeholder="Disabled input" disabled />
    </div>
</body>
</html>
