<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated User Profile Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="profile-card">

    <div class="profile-image">
      👨‍💻
    </div>

    <h2 class="profile-name">Alex Carter</h2>

    <div class="profile-role">
      Frontend Developer
    </div>

    <p class="profile-description">
      Passionate about creating interactive UI experiences,
      responsive layouts, and animation-driven web interfaces.
    </p>

    <div class="social-links">
      <a href="#" aria-label="Portfolio">🌐</a>
      <a href="#" aria-label="Twitter">🐦</a>
      <a href="#" aria-label="LinkedIn">💼</a>
    </div>

  </div>

</body>
</html>
