<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counter Increment Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1.5rem 0 0.25rem;
      }
      .note {
        background: #f1f5f9;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
      }
      .counter-section h3 {
        margin: 0.5rem 0;
      }
      .counter-item {
        list-style: none;
        padding: 0;
      }
      .counter-item li {
        margin: 0.25rem 0;
      }
    </style>
  </head>
  <body>
    <h1>Counter Increment</h1>
    <p class="note">Auto-numbers sections and lists using CSS counters.</p>

    <div class="label">Auto-numbered sections</div>
    <div class="counter-section">
      <h3>Introduction</h3>
      <h3>Getting Started</h3>
      <h3>Advanced Usage</h3>
      <h3>API Reference</h3>
    </div>

    <div class="label">Auto-numbered list</div>
    <ol class="counter-item">
      <li>Install the package</li>
      <li>Import the styles</li>
      <li>Add classes to elements</li>
      <li>Customize as needed</li>
    </ol>
  </body>
</html>
