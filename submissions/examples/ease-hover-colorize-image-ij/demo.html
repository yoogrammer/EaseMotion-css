<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion: hover-colorize-image</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card" id="card">
    <div class="image-wrapper">
      <img id="demoImg" src="https://picsum.photos/seed/ease/400/300" alt="Demo">
    </div>
    <h2>Colorize Image</h2>
    <p>Hover to reveal the full color. Adjust grayscale amount, speed, and overlay below.</p>
    <div class="controls">
      <label>Gray <input type="range" id="grayscale" min="0" max="100" value="100"></label>
      <label>Speed <input type="range" id="duration" min="0.1" max="3" step="0.1" value="0.6"></label>
      <label>Overlay <input type="color" id="overlay" value="#48dbfb"></label>
    </div>
  </div>
  <script>
    const card = document.getElementById('card');
    const img = document.getElementById('demoImg');

    document.getElementById('grayscale').addEventListener('input', e => {
      card.style.setProperty('--grayscale-amount', e.target.value + '%');
    });

    document.getElementById('duration').addEventListener('input', e => {
      card.style.setProperty('--colorize-duration', e.target.value + 's');
    });

    document.getElementById('overlay').addEventListener('input', e => {
      const c = e.target.value;
      card.style.setProperty('--overlay-color', c + '26');
    });
  </script>
</body>
</html>
