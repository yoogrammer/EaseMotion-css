<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neon Progress Ring — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>Neon Progress Ring</h1>
    <p>Pure CSS concentric glow rings with SVG dash-array animations</p>
  </header>

  <main class="rings-wrapper">

    <!-- Ring 1: 75% -->
    <div class="ring-card">
      <div class="ring-container">
        <svg class="progress-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
          <circle class="ring-track" cx="80" cy="80" r="70"/>
          <circle class="ring-fill ring-cyan" cx="80" cy="80" r="70"
            style="--dashoffset: 110;"/>
        </svg>
        <div class="ring-label">
          <span class="ring-percent">75%</span>
          <span class="ring-name">Storage</span>
        </div>
      </div>
    </div>

    <!-- Ring 2: 60% -->
    <div class="ring-card">
      <div class="ring-container">
        <svg class="progress-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
          <circle class="ring-track" cx="80" cy="80" r="70"/>
          <circle class="ring-fill ring-purple" cx="80" cy="80" r="70"
            style="--dashoffset: 176;"/>
        </svg>
        <div class="ring-label">
          <span class="ring-percent">60%</span>
          <span class="ring-name">CPU</span>
        </div>
      </div>
    </div>

    <!-- Ring 3: 90% -->
    <div class="ring-card">
      <div class="ring-container">
        <svg class="progress-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
          <circle class="ring-track" cx="80" cy="80" r="70"/>
          <circle class="ring-fill ring-green" cx="80" cy="80" r="70"
            style="--dashoffset: 44;"/>
        </svg>
        <div class="ring-label">
          <span class="ring-percent">90%</span>
          <span class="ring-name">Uptime</span>
        </div>
      </div>
    </div>

    <!-- Ring 4: 45% -->
    <div class="ring-card">
      <div class="ring-container">
        <svg class="progress-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
          <circle class="ring-track" cx="80" cy="80" r="70"/>
          <circle class="ring-fill ring-amber" cx="80" cy="80" r="70"
            style="--dashoffset: 242;"/>
        </svg>
        <div class="ring-label">
          <span class="ring-percent">45%</span>
          <span class="ring-name">Memory</span>
        </div>
      </div>
    </div>

  </main>

</body>
</html>
