<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-notification-bell-ring</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="nbr-container">
    <div class="nbr-bell" style="--bell-ring: 0">
      <svg class="nbr-bell-icon" viewBox="0 0 24 24" fill="none" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
      </svg>
      <span class="nbr-badge"></span>
    </div>
    <button class="nbr-btn" onclick="toggleBell()">Ring Bell</button>
  </div>
  <script>
    function toggleBell() {
      const bell = document.querySelector('.nbr-bell');
      const current = bell.style.getPropertyValue('--bell-ring').trim();
      bell.style.setProperty('--bell-ring', current === '1' ? '0' : '1');
    }
  </script>
</body>
</html>
