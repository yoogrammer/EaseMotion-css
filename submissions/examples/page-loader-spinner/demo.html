<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Loader Spinner</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loaderOverlay" class="loader-overlay">
    <div class="loader-ring"></div>
    <p class="loader-text">Loading...</p>
  </div>
  <main class="loader-content" id="mainContent">
    <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc; flex-direction: column;">
      <h1 style="font-size: 1.5rem; color: #1e293b; margin: 0 0 0.5rem;">Welcome</h1>
      <p style="color: #64748b; font-size: 0.9rem;">Page content loaded after simulated delay.</p>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
