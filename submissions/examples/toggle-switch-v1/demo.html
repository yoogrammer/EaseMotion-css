<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-Only Toggle Switch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <h1>Toggle Switch</h1>
    <p class="subtitle">Accessible, animated — no JavaScript</p>

    <div class="toggles">
      <div class="toggle-row">
        <span class="toggle-label">Wi-Fi</span>
        <label class="toggle">
          <input class="toggle-input" type="checkbox" checked>
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
        <span class="toggle-state">On</span>
      </div>

      <div class="toggle-row">
        <span class="toggle-label">Bluetooth</span>
        <label class="toggle">
          <input class="toggle-input" type="checkbox">
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
        <span class="toggle-state">Off</span>
      </div>

      <div class="toggle-row">
        <span class="toggle-label">Dark Mode</span>
        <label class="toggle">
          <input class="toggle-input" type="checkbox">
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
        <span class="toggle-state">Off</span>
      </div>

      <div class="toggle-row">
        <span class="toggle-label">Notifications</span>
        <label class="toggle">
          <input class="toggle-input" type="checkbox" checked>
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
        <span class="toggle-state">On</span>
      </div>

      <div class="toggle-row">
        <span class="toggle-label">Airplane Mode</span>
        <label class="toggle">
          <input class="toggle-input" type="checkbox">
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
        <span class="toggle-state">Off</span>
      </div>
    </div>

    <div class="size-demo">
      <h2>Sizes</h2>
      <div class="toggle-row">
        <span class="toggle-label">Small</span>
        <label class="toggle toggle--sm">
          <input class="toggle-input" type="checkbox">
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">Default</span>
        <label class="toggle">
          <input class="toggle-input" type="checkbox" checked>
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">Large</span>
        <label class="toggle toggle--lg">
          <input class="toggle-input" type="checkbox" checked>
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
      </div>
    </div>
  </div>
</body>
</html>
