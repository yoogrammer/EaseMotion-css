<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Skeleton Loading Cards</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc; gap: 1.5rem; flex-wrap: wrap; padding: 2rem;">
    <div class="skeleton-card">
      <div class="skeleton-img skeleton-pulse"></div>
      <div class="skeleton-line skeleton-pulse" style="width: 75%;"></div>
      <div class="skeleton-line skeleton-pulse" style="width: 55%;"></div>
      <div class="skeleton-line skeleton-pulse" style="width: 90%;"></div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton-img skeleton-pulse"></div>
      <div class="skeleton-line skeleton-pulse" style="width: 65%;"></div>
      <div class="skeleton-line skeleton-pulse" style="width: 80%;"></div>
      <div class="skeleton-line skeleton-pulse" style="width: 45%;"></div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton-img skeleton-pulse"></div>
      <div class="skeleton-line skeleton-pulse" style="width: 85%;"></div>
      <div class="skeleton-line skeleton-pulse" style="width: 60%;"></div>
      <div class="skeleton-line skeleton-pulse" style="width: 70%;"></div>
    </div>
  </div>
</body>
</html>
