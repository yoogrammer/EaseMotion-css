<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-combo-box-dropdown / Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #11111b;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 2rem;
    }
    .demo-wrapper {
      width: 100%;
      max-width: 360px;
    }
  </style>
</head>
<body>
  <div class="demo-wrapper">
    <div class="combo-box-dropdown" id="combo">
      <input class="combo-input" id="comboInput" type="text" placeholder="Select a framework…" readonly />
      <div class="dropdown-list" id="dropdownList">
        <div class="dropdown-item" data-value="react">React</div>
        <div class="dropdown-item" data-value="vue">Vue</div>
        <div class="dropdown-item" data-value="svelte">Svelte</div>
        <div class="dropdown-item" data-value="solid">Solid</div>
        <div class="dropdown-item" data-value="qwik">Qwik</div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const input = document.getElementById('comboInput');
      const list = document.getElementById('dropdownList');
      const items = list.querySelectorAll('.dropdown-item');
      let open = false;

      function toggle(e) {
        e.stopPropagation();
        open = !open;
        list.classList.toggle('open', open);
      }

      function select(item) {
        input.value = item.textContent;
        input.dataset.value = item.dataset.value;
        open = false;
        list.classList.remove('open');
      }

      input.addEventListener('click', toggle);

      items.forEach(item => {
        item.addEventListener('click', function() {
          select(this);
        });
      });

      document.addEventListener('click', function() {
        if (open) {
          open = false;
          list.classList.remove('open');
        }
      });
    })();
  </script>
</body>
</html>
