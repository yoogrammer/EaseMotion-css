<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Range Slider — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="font-family:system-ui,sans-serif;max-width:500px;margin:0 auto;padding:2rem 1rem;background:var(--bg,#fff);color:var(--text,#1a1a2e);">
  <h1>Range Slider</h1>
  <p style="color:#666;margin-bottom:2rem;">Styled range input with track fill — pure CSS.</p>
  <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;margin-bottom:2rem;"><input type="checkbox" id="darkModeToggle"> Dark mode</label>

  <section style="margin-bottom:3rem;">
    <h2>Default</h2>
    <label>Volume: <output id="val1">50</output></label>
    <input type="range" class="range" min="0" max="100" value="50" id="r1" oninput="document.getElementById('val1').textContent=this.value">
  </section>

  <section style="margin-bottom:3rem;">
    <h2>Colors</h2>
    <label>Primary (default)</label>
    <input type="range" class="range" min="0" max="100" value="60">
    <label>Success</label>
    <input type="range" class="range range-success" min="0" max="100" value="70">
    <label>Warning</label>
    <input type="range" class="range range-warning" min="0" max="100" value="40">
    <label>Danger</label>
    <input type="range" class="range range-danger" min="0" max="100" value="30">
  </section>

  <section style="margin-bottom:3rem;">
    <h2>Sizes</h2>
    <label>Small</label>
    <input type="range" class="range range-sm" min="0" max="100" value="50">
    <label>Default</label>
    <input type="range" class="range" min="0" max="100" value="50">
    <label>Large</label>
    <input type="range" class="range range-lg" min="0" max="100" value="50">
  </section>

  <section style="margin-bottom:3rem;">
    <h2>Disabled</h2>
    <input type="range" class="range" min="0" max="100" value="40" disabled>
  </section>

  <script>
    document.getElementById('darkModeToggle').addEventListener('change', function() {
      document.body.style.setProperty('--bg', this.checked ? '#1a1a2e' : '#fff');
      document.body.style.setProperty('--text', this.checked ? '#e0e0e0' : '#1a1a2e');
    });
  </script>
</body>
</html>
