<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drawer Component — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="font-family:system-ui,sans-serif;max-width:700px;margin:0 auto;padding:2rem 1rem;background:var(--bg,#fff);color:var(--text,#1a1a2e);">
  <h1>Drawer / Off-canvas</h1>
  <p style="color:#666;margin-bottom:2rem;">CSS-only slide-in panel using checkbox hack.</p>
  <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;margin-bottom:2rem;"><input type="checkbox" id="darkModeToggle"> Dark mode</label>

  <!-- Left drawer -->
  <section style="margin-bottom:3rem;">
    <h2>Left Drawer</h2>
    <label for="drawer-left" class="drawer-trigger">Open Left Drawer</label>
    <input type="checkbox" id="drawer-left" class="drawer-input">
    <div class="drawer drawer-left">
      <div class="drawer-header">
        <h3>Navigation</h3>
        <label for="drawer-left" class="drawer-close">&times;</label>
      </div>
      <div class="drawer-body">
        <a href="#" class="drawer-item">Dashboard</a>
        <a href="#" class="drawer-item">Profile</a>
        <a href="#" class="drawer-item">Settings</a>
        <a href="#" class="drawer-item">Help</a>
      </div>
    </div>
  </section>

  <!-- Right drawer -->
  <section style="margin-bottom:3rem;">
    <h2>Right Drawer</h2>
    <label for="drawer-right" class="drawer-trigger">Open Right Drawer (Cart)</label>
    <input type="checkbox" id="drawer-right" class="drawer-input">
    <div class="drawer drawer-right">
      <div class="drawer-header">
        <h3>Shopping Cart</h3>
        <label for="drawer-right" class="drawer-close">&times;</label>
      </div>
      <div class="drawer-body">
        <p>Your cart is empty.</p>
      </div>
    </div>
  </section>

  <!-- Overlay -->
  <div class="drawer-overlay" data-for="drawer-left"></div>
  <div class="drawer-overlay" data-for="drawer-right"></div>

  <style>
    .drawer-trigger {
      display:inline-block;padding:0.5rem 1rem;background:#6c63ff;color:#fff;
      border-radius:6px;cursor:pointer;font-size:0.9rem;
    }
    .drawer-trigger:hover { opacity:0.9; }
  </style>

  <script>
    document.getElementById('darkModeToggle').addEventListener('change', function() {
      document.body.style.setProperty('--bg', this.checked ? '#1a1a2e' : '#fff');
      document.body.style.setProperty('--text', this.checked ? '#e0e0e0' : '#1a1a2e');
    });
    // Close overlay on click
    document.querySelectorAll('.drawer-overlay').forEach(el => {
      el.addEventListener('click', () => {
        document.getElementById(el.dataset.for).checked = false;
      });
    });
  </script>
</body>
</html>
