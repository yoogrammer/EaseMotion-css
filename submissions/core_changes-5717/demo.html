<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo: Missing forms.css import in all.css (#5717)</title>
  <link rel="stylesheet" href="../../easemotion.min.css" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; padding: 2rem; background: var(--ease-color-bg); display: flex; flex-direction: column; align-items: center; }
    form { max-width: 400px; width: 100%; padding: 2rem; border-radius: var(--ease-radius-lg); background: var(--ease-color-surface); box-shadow: var(--ease-shadow-md); }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.25rem; color: var(--ease-color-text); font-weight: 500; }
    .note { margin-top: 2rem; color: var(--ease-color-muted); font-size: var(--ease-text-sm); text-align: center; max-width: 500px; }
  </style>
</head>
<body>
  <h1>Forms Component — Missing Import</h1>
  <form>
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" class="ease-input" placeholder="Enter name" />
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" class="ease-input" placeholder="Enter email" />
    </div>
    <button class="ease-btn ease-btn-primary">Submit</button>
  </form>
  <p class="note">
    <code>easemotion/all.css</code> imports all components except <code>forms.css</code>.
    Add <code>@import "../components/forms.css";</code> to <code>easemotion/all.css</code>.
  </p>
</body>
</html>
