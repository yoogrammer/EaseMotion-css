<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Dynamic Form Progress Tracker</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 460px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Form Validation Tracking Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Type values into fields below. Native <code>:valid</code> pseudo-classes combined with parent structural <code>:has()</code> selectors scale completion lines with 0 scripts.</p>
  </header>

  <div class="alm-form-progress-stage">
    <form class="alm-tracker-form-group" onsubmit="return false;">
      
      <div class="alm-progress-ribbon-bar">
        <div class="alm-progress-bar-fill"></div>
      </div>

      <div>
        <label style="color: #cbd5e1; font-size: 0.75rem; font-weight: 600; display: block; margin-bottom: 6px;">Cluster Node Handle</label>
        <input type="text" class="alm-form-input-field alm-input-1" required placeholder="e.g. node_delta_01">
      </div>

      <div>
        <label style="color: #cbd5e1; font-size: 0.75rem; font-weight: 600; display: block; margin-bottom: 6px;">Supervisor Communication Routing</label>
        <input type="email" class="alm-form-input-field alm-input-2" required placeholder="e.g. admin@network.io">
      </div>

      <div>
        <label style="color: #cbd5e1; font-size: 0.75rem; font-weight: 600; display: block; margin-bottom: 6px;">Secure Authorization Key Code (Min 6 Chars)</label>
        <input type="text" class="alm-form-input-field alm-input-3" required pattern=".{6,}" placeholder="e.g. 104928">
      </div>

    </form>
  </div>

</body>
</html>
