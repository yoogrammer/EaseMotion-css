<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Profile Card with Flip Animation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <!-- React and Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 60px 20px;
      background-color: #f3f4f6;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      min-height: 100vh;
    }
    .demo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    h2 {
      margin: 0;
      color: #374151;
      font-size: 1.25rem;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import UserProfileCard from "./UserProfileCard.jsx";

    function Demo() {
      return (
        <React.Fragment>
          <div className="demo-section">
            <h2>Hover to Flip</h2>
            <UserProfileCard 
              name="Alice Smith"
              role="UX Designer"
              avatar="https://i.pravatar.cc/150?img=5"
              bio="Creating seamless and intuitive user experiences. Passionate about accessibility and clean design."
              clickToFlip={false}
            />
          </div>

          <div className="demo-section">
            <h2>Click to Flip</h2>
            <UserProfileCard 
              name="Bob Johnson"
              role="Backend Engineer"
              avatar="https://i.pravatar.cc/150?img=11"
              bio="Building scalable and robust server-side architectures. Coffee enthusiast and open-source contributor."
              clickToFlip={true}
            />
          </div>
        </React.Fragment>
      );
    }
    
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
