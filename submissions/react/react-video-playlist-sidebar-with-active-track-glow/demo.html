<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Video Playlist Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
      padding: 2rem;
    }
    
    .layout-wrapper {
      display: flex;
      gap: 24px;
      width: 100%;
      max-width: 1200px;
      height: 600px;
    }
    
    .video-player-placeholder {
      flex: 1;
      background: #000;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #334155;
      font-size: 1.5rem;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      position: relative;
      overflow: hidden;
    }
    
    .video-player-placeholder img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.6;
    }
    
    .player-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    /* Simulate a play button */
    .play-btn-mock {
      width: 64px;
      height: 64px;
      background: rgba(59, 130, 246, 0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1rem;
      cursor: pointer;
    }
    .play-btn-mock svg {
      width: 32px;
      height: 32px;
      fill: white;
      margin-left: 4px;
    }
    
    @media (max-width: 800px) {
      .layout-wrapper {
        flex-direction: column;
        height: auto;
      }
      .video-player-placeholder {
        height: 300px;
        flex: none;
      }
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const PlaylistSidebar = ({ tracks = [], activeTrackId, onTrackSelect }) => {
      const sidebarRef = useRef(null);

      useEffect(() => {
        if (!sidebarRef.current || !activeTrackId) return;
        const activeEl = sidebarRef.current.querySelector('.is-active');
        if (activeEl) {
          activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      }, [activeTrackId]);

      return (
        <div className="ease-playlist-sidebar" ref={sidebarRef}>
          <div className="ease-playlist-header">
            <h3 className="ease-playlist-title">Up Next</h3>
            <span className="ease-playlist-count">{tracks.length} videos</span>
          </div>

          <div className="ease-playlist-tracks">
            {tracks.map((track) => {
              const isActive = track.id === activeTrackId;
              
              return (
                <button
                  key={track.id}
                  className={`ease-playlist-track ${isActive ? 'is-active' : ''}`}
                  onClick={() => onTrackSelect && onTrackSelect(track.id)}
                  aria-current={isActive ? 'true' : 'false'}
                >
                  <div className="ease-playlist-thumbnail-wrapper">
                    <img src={track.thumbnail} alt="" className="ease-playlist-thumbnail" loading="lazy" />
                    
                    {isActive && (
                      <div className="ease-playlist-playing-indicator">
                        <span className="ease-bar"></span>
                        <span className="ease-bar"></span>
                        <span className="ease-bar"></span>
                      </div>
                    )}
                    
                    {!isActive && <span className="ease-playlist-duration">{track.duration}</span>}
                  </div>

                  <div className="ease-playlist-meta">
                    <h4 className="ease-playlist-track-title">{track.title}</h4>
                    <p className="ease-playlist-track-author">{track.author}</p>
                  </div>
                  
                  {isActive && <div className="ease-playlist-glow-bg"></div>}
                </button>
              );
            })}
          </div>
        </div>
      );
    };

    const App = () => {
      // Mock data with placeholder images
      const tracks = [
        { id: 'v1', title: 'Building a React Component Library from Scratch', author: 'Frontend Masters', duration: '12:45', thumbnail: 'https://images.unsplash.com/photo-1633356122544-f134324a6cee?w=400&q=80' },
        { id: 'v2', title: 'Advanced CSS Animation Techniques (Spring Physics)', author: 'UI Engineering', duration: '08:22', thumbnail: 'https://images.unsplash.com/photo-1550439062-609e1531270e?w=400&q=80' },
        { id: 'v3', title: 'State Management in 2026: What you need to know', author: 'Web Dev Simplified', duration: '24:10', thumbnail: 'https://images.unsplash.com/photo-1555099962-4199c345e5dd?w=400&q=80' },
        { id: 'v4', title: 'The Future of Web Design: Glassmorphism', author: 'DesignCourse', duration: '15:30', thumbnail: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400&q=80' },
        { id: 'v5', title: 'Understanding CSS Grid Layouts properly', author: 'Kevin Powell', duration: '18:15', thumbnail: 'https://images.unsplash.com/photo-1507721999472-8ed4421c4af2?w=400&q=80' },
        { id: 'v6', title: 'Accessibility in Modern Web Applications', author: 'A11y Casts', duration: '09:55', thumbnail: 'https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=400&q=80' }
      ];

      const [activeId, setActiveId] = useState(tracks[1].id);
      
      const activeTrack = tracks.find(t => t.id === activeId);

      return (
        <div className="layout-wrapper">
          {/* Main Player Mockup */}
          <div className="video-player-placeholder">
            <img src={activeTrack.thumbnail.replace('w=400', 'w=1200')} alt="Video Player" />
            <div className="player-overlay">
              <h1 style={{color: 'white', margin: 0, textShadow: '0 2px 10px rgba(0,0,0,0.8)'}}>{activeTrack.title}</h1>
              <div className="play-btn-mock">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              </div>
            </div>
          </div>
          
          {/* The Sidebar Component */}
          <PlaylistSidebar 
            tracks={tracks}
            activeTrackId={activeId}
            onTrackSelect={(id) => setActiveId(id)}
          />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
