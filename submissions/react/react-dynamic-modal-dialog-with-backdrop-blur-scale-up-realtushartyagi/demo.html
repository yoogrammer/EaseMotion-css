<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dynamic Modal Dialog with Backdrop Blur & Scale-Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <!-- React and Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .trigger-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      transition: background 0.2s;
    }
    .trigger-btn:hover {
      background: #2563eb;
    }
    h2 {
      margin-top: 0;
    }
    p {
      color: #4b5563;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import DynamicModalDialog from "./DynamicModalDialog.jsx";

    function Demo() {
      const [isOpen, setIsOpen] = React.useState(false);

      return (
        <div>
          <button className="trigger-btn" onClick={() => setIsOpen(true)}>
            Open Modal
          </button>
          <DynamicModalDialog isOpen={isOpen} onClose={() => setIsOpen(false)}>
            <h2>Confirm Action</h2>
            <p>Are you sure you want to perform this action? This operation cannot be undone. Please confirm to proceed.</p>
            <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '12px', marginTop: '24px' }}>
              <button 
                style={{ background: 'transparent', border: '1px solid #d1d5db', padding: '8px 16px', borderRadius: '6px', cursor: 'pointer' }}
                onClick={() => setIsOpen(false)}
              >
                Cancel
              </button>
              <button 
                style={{ background: '#ef4444', color: 'white', border: 'none', padding: '8px 16px', borderRadius: '6px', cursor: 'pointer' }}
                onClick={() => setIsOpen(false)}
              >
                Delete
              </button>
            </div>
          </DynamicModalDialog>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
