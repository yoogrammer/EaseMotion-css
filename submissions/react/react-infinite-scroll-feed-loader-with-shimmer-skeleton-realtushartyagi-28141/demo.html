<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Infinite Scroll Feed Loader with Shimmer Skeleton</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; padding: 40px 20px;
      background: #f3f4f6; min-height: 100vh;
    }
    h2 { text-align: center; color: #111827; margin-bottom: 4px; }
    p.sub { text-align: center; color: #6b7280; margin-bottom: 32px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import InfiniteScrollFeed from "./InfiniteScrollFeed.jsx";

    const NAMES  = ["Alex Kim","Priya Mehta","Jordan Lee","Sara Osei","Carlos Ruiz","Mia Chen"];
    const TEXTS  = [
      "Just shipped a new feature! The team worked incredibly hard to get this across the line. 🚀",
      "Reading about CSS custom properties and they are genuinely life-changing for design systems.",
      "Hot take: infinite scroll done right is one of the most satisfying UX patterns.",
      "Pair programming session today was super productive. Two heads really are better than one.",
      "Reminder to drink water, take breaks, and commit your work. Not necessarily in that order.",
      "EaseMotion CSS makes animation feel effortless. Highly recommend for any React project.",
    ];

    let idCounter = 1;

    async function mockFetch(page) {
      if (page > 4) return [];
      await new Promise(r => setTimeout(r, 1200));
      return Array.from({ length: 5 }, () => {
        const idx = Math.floor(Math.random() * NAMES.length);
        return {
          id: idCounter++,
          author: NAMES[idx],
          avatar: `https://i.pravatar.cc/80?img=${(idCounter % 70) + 1}`,
          time: `${Math.floor(Math.random() * 59) + 1}m ago`,
          text: TEXTS[idx],
        };
      });
    }

    function App() {
      return (
        <div>
          <h2>Social Feed</h2>
          <p className="sub">Scroll down to load more — shimmer skeletons appear while fetching.</p>
          <InfiniteScrollFeed fetchItems={mockFetch} skeletonCount={3} endMessage="🎉 You've reached the end!" />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
