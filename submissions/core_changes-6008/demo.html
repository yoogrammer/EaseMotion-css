<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo: ease-neon text glow (#6008)</title>
  <link rel="stylesheet" href="../../easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; padding: 2rem; background: #0b1121; display: flex; flex-direction: column; align-items: center; gap: 2rem; }
    .grid { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
    .neon-card { width: 200px; padding: 2rem; border-radius: var(--ease-radius-lg); text-align: center; font-size: 1.5rem; font-weight: 700; background: rgba(255,255,255,0.04); }
    .neon-card.bordered { border: 2px solid currentColor; }
    .note { color: var(--ease-color-neutral-500); font-size: var(--ease-text-sm); text-align: center; max-width: 500px; }
  </style>
</head>
<body>
  <h1 style="color:#fff;">Neon Text Glow Effects</h1>
  <div class="grid">
    <div class="neon-card ease-neon ease-neon-pink ease-neon-border">Pink</div>
    <div class="neon-card ease-neon ease-neon-blue ease-neon-border">Blue</div>
    <div class="neon-card ease-neon ease-neon-green ease-neon-border">Green</div>
    <div class="neon-card ease-neon ease-neon-purple ease-neon-border">Purple</div>
  </div>
  <p class="note"><code>ease-neon</code> adds multi-layer text-shadow glow. Color variants set the text color. <code>ease-neon-border</code> adds a matching box-shadow.</p>
</body>
</html>
