<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo: ease-hover-dim/bright (#6013)</title>
  <link rel="stylesheet" href="../../easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; padding: 2rem; background: var(--ease-color-bg); display: flex; flex-direction: column; align-items: center; }
    .grid { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; margin: 2rem 0; }
    .card { width: 220px; padding: 2rem; border-radius: var(--ease-radius-lg); background: var(--ease-color-primary); color: #fff; text-align: center; }
    .card img { width: 100%; border-radius: var(--ease-radius-md); margin-bottom: 1rem; }
    .card-placeholder { height: 120px; background: var(--ease-color-secondary); border-radius: var(--ease-radius-md); margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; }
    .note { color: var(--ease-color-muted); font-size: var(--ease-text-sm); max-width: 500px; text-align: center; }
  </style>
</head>
<body>
  <h1>Hover Dim / Bright Effects</h1>
  <div class="grid">
    <div class="card ease-hover-dim"><div class="card-placeholder">Hover to dim</div><p>ease-hover-dim</p></div>
    <div class="card ease-hover-bright" style="background: var(--ease-color-neutral-700);"><div class="card-placeholder" style="background: var(--ease-color-neutral-500);">Hover to brighten</div><p>ease-hover-bright</p></div>
  </div>
  <p class="note"><code>ease-hover-dim</code> uses <code>brightness(0.7)</code> and <code>ease-hover-bright</code> uses <code>brightness(1.3)</code> on hover.</p>
</body>
</html>
