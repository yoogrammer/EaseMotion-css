<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toggle Component — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="font-family: system-ui, -apple-system, sans-serif; max-width: 500px; margin: 0 auto; padding: 2rem 1rem; background: var(--bg, #fff); color: var(--text, #1a1a2e);">

  <h1>Toggle / Switch Component</h1>
  <p style="color: #666; margin-bottom: 2rem;">CSS-only toggle switches using hidden checkboxes — no JavaScript.</p>

  <label style="display: flex; align-items: center; gap: .5rem; cursor: pointer; margin-bottom: 2rem;">
    <input type="checkbox" id="darkModeToggle"> Dark mode
  </label>

  <!-- Default -->
  <section style="margin-bottom: 3rem;">
    <h2>Default</h2>
    <div style="display: flex; flex-direction: column; gap: 1rem;">
      <label class="toggle">
        <input type="checkbox" checked>
        <span class="toggle-slider"></span>
        <span class="toggle-label">Notifications</span>
      </label>
      <label class="toggle">
        <input type="checkbox">
        <span class="toggle-slider"></span>
        <span class="toggle-label">Dark mode (OS)</span>
      </label>
    </div>
  </section>

  <!-- Colors -->
  <section style="margin-bottom: 3rem;">
    <h2>Color Variants</h2>
    <div style="display: flex; flex-direction: column; gap: 1rem;">
      <label class="toggle toggle-primary">
        <input type="checkbox" checked>
        <span class="toggle-slider"></span>
        <span class="toggle-label">Primary</span>
      </label>
      <label class="toggle toggle-success">
        <input type="checkbox" checked>
        <span class="toggle-slider"></span>
        <span class="toggle-label">Success</span>
      </label>
      <label class="toggle toggle-warning">
        <input type="checkbox" checked>
        <span class="toggle-slider"></span>
        <span class="toggle-label">Warning</span>
      </label>
      <label class="toggle toggle-danger">
        <input type="checkbox" checked>
        <span class="toggle-slider"></span>
        <span class="toggle-label">Danger</span>
      </label>
    </div>
  </section>

  <!-- Sizes -->
  <section style="margin-bottom: 3rem;">
    <h2>Size Variants</h2>
    <div style="display: flex; flex-direction: column; gap: 1rem;">
      <label class="toggle toggle-sm">
        <input type="checkbox" checked>
        <span class="toggle-slider"></span>
        <span class="toggle-label">Small</span>
      </label>
      <label class="toggle">
        <input type="checkbox" checked>
        <span class="toggle-slider"></span>
        <span class="toggle-label">Default</span>
      </label>
      <label class="toggle toggle-lg">
        <input type="checkbox" checked>
        <span class="toggle-slider"></span>
        <span class="toggle-label">Large</span>
      </label>
    </div>
  </section>

  <!-- Disabled -->
  <section style="margin-bottom: 3rem;">
    <h2>Disabled</h2>
    <div style="display: flex; flex-direction: column; gap: 1rem;">
      <label class="toggle">
        <input type="checkbox" checked disabled>
        <span class="toggle-slider"></span>
        <span class="toggle-label">Checked disabled</span>
      </label>
      <label class="toggle">
        <input type="checkbox" disabled>
        <span class="toggle-slider"></span>
        <span class="toggle-label">Unchecked disabled</span>
      </label>
    </div>
  </section>

  <!-- Without label -->
  <section style="margin-bottom: 3rem;">
    <h2>Without Label</h2>
    <label class="toggle">
      <input type="checkbox" checked>
      <span class="toggle-slider"></span>
    </label>
  </section>

  <script>
    document.getElementById('darkModeToggle').addEventListener('change', function() {
      document.body.style.setProperty('--bg', this.checked ? '#1a1a2e' : '#fff');
      document.body.style.setProperty('--text', this.checked ? '#e0e0e0' : '#1a1a2e');
    });
  </script>
</body>
</html>
