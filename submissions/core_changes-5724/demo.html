<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo: Typewriter cursor blink fix (#5724)</title>
  <link rel="stylesheet" href="../../easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; padding: 2rem; background: var(--ease-color-bg); display: flex; flex-direction: column; align-items: center; }
    .typewriter-wrap { max-width: 600px; width: 100%; padding: 2rem; border-radius: var(--ease-radius-lg); background: var(--ease-color-surface); box-shadow: var(--ease-shadow-md); }
    .ease-typewriter { overflow: hidden; white-space: nowrap; border-right: 2px solid currentColor; font-family: var(--ease-font-mono); font-size: var(--ease-text-xl); display: inline-block; }
    .note { margin-top: 2rem; color: var(--ease-color-muted); font-size: var(--ease-text-sm); text-align: center; max-width: 500px; }
  </style>
</head>
<body>
  <h1>Typewriter Cursor Blink Fix</h1>
  <div class="typewriter-wrap">
    <div class="ease-typewriter" style="--ease-typewriter-length: 28ch; --ease-typewriter-duration: 4s;">
      The cursor should blink in sync with typing.
    </div>
  </div>
  <p class="note"><code>easemotion/misc.css</code> keyframe is missing <code>border-right-color</code> transitions at all stops. <code>core/animations.css</code> has the correct version. The fix adds cursor visibility at 0%/40% and hides it at 50%/60%/100%.</p>
</body>
</html>
