<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Job Board Filter Chips Component</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div class="wrapper">
		<h3 class="title">Filter Positions</h3>
		<div class="chip-container">
			<!-- Active Filter Chip -->
			<div class="filter-chip active">
				<span class="chip-label">All Jobs</span>
				<span class="chip-count">42</span>
			</div>

			<!-- Standard Filter Chips -->
			<div class="filter-chip">
				<span class="chip-label">Development</span>
				<span class="chip-count">24</span>
			</div>

			<div class="filter-chip">
				<span class="chip-label">Design</span>
				<span class="chip-count">12</span>
			</div>

			<div class="filter-chip">
				<span class="chip-label">Marketing</span>
				<span class="chip-count">6</span>
			</div>
		</div>
	</div>
</body>
</html>
