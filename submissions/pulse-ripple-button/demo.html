<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Pulse Ripple Loading Button Component</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div class="container">
		<!-- Normal State Button -->
		<button class="ripple-btn">
			<span>Submit Order</span>
		</button>

		<!-- Loading State Button with Pulse Ripple Effect -->
		<button class="ripple-btn loading">
			<span>Processing...</span>
			<span class="ripple-wave"></span>
		</button>
	</div>
</body>
</html>
