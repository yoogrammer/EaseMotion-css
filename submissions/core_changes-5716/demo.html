<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo: Cheatsheet class audit (#5716)</title>
  <link rel="stylesheet" href="../../easemotion.min.css" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; padding: 2rem; background: var(--ease-color-bg); }
    h1 { color: var(--ease-color-text); }
    .summary { display: flex; gap: 1rem; margin: 1rem 0; }
    .stat { padding: 1rem; border-radius: var(--ease-radius-md); flex: 1; text-align: center; }
    .stat-exists { background: var(--ease-color-success-light); color: var(--ease-color-success-dark); }
    .stat-missing { background: var(--ease-color-danger-light); color: var(--ease-color-danger-dark); }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { padding: 0.5rem; text-align: left; border-bottom: 1px solid var(--ease-color-neutral-300); }
    .missing { color: var(--ease-color-danger); font-weight: bold; }
    .exists { color: var(--ease-color-success); }
  </style>
</head>
<body>
  <h1>Cheatsheet Class Audit — #5716</h1>
  <div class="summary">
    <div class="stat stat-exists"><strong>42</strong> classes exist</div>
    <div class="stat stat-missing"><strong>51</strong> classes missing</div>
  </div>
  <p>See <code>README.md</code> for the full list of missing classes and proposed fixes.</p>
  <table>
    <tr><th>Category</th><th>Total</th><th>Exists</th><th>Missing</th></tr>
    <tr><td>Layout</td><td>6</td><td>5</td><td>1 (ease-row)</td></tr>
    <tr><td>Entrance</td><td>10</td><td>8</td><td>2</td></tr>
    <tr><td>Hover</td><td>7</td><td>5</td><td>2</td></tr>
    <tr><td>Button</td><td>8</td><td>8</td><td>0</td></tr>
    <tr><td>Card</td><td>6</td><td>6</td><td>0</td></tr>
    <tr><td>Animation</td><td>35</td><td>10</td><td>25</td></tr>
    <tr><td>Utility</td><td>21</td><td>1</td><td>20</td></tr>
  </table>
</body>
</html>
