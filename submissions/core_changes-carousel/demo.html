<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="font-family:system-ui,sans-serif;max-width:700px;margin:0 auto;padding:2rem 1rem;background:var(--bg,#fff);color:var(--text,#1a1a2e);">
  <h1>Carousel / Slider</h1>
  <p style="color:#666;margin-bottom:2rem;">CSS-only carousel using scroll-snap — no JavaScript.</p>
  <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;margin-bottom:2rem;"><input type="checkbox" id="darkModeToggle"> Dark mode</label>

  <section style="margin-bottom:3rem;">
    <h2>Default</h2>
    <div class="carousel">
      <div class="carousel-track">
        <div class="carousel-slide" style="background:#6c63ff;color:#fff;">
          <h2>Slide 1</h2>
          <p>CSS scroll-snap based carousel.</p>
        </div>
        <div class="carousel-slide" style="background:#22c55e;color:#fff;">
          <h2>Slide 2</h2>
          <p>Scroll horizontally to navigate.</p>
        </div>
        <div class="carousel-slide" style="background:#f59e0b;color:#fff;">
          <h2>Slide 3</h2>
          <p>Pure CSS — no JavaScript needed.</p>
        </div>
      </div>
      <div class="carousel-dots">
        <a href="#s1" class="carousel-dot carousel-dot-active"></a>
        <a href="#s2" class="carousel-dot"></a>
        <a href="#s3" class="carousel-dot"></a>
      </div>
    </div>
  </section>

  <section style="margin-bottom:3rem;">
    <h2>With Captions</h2>
    <div class="carousel">
      <div class="carousel-track">
        <div class="carousel-slide">
          <img src="https://picsum.photos/seed/a/600/300" alt="Slide A" style="width:100%;display:block;">
          <div class="carousel-caption">Sunset view</div>
        </div>
        <div class="carousel-slide">
          <img src="https://picsum.photos/seed/b/600/300" alt="Slide B" style="width:100%;display:block;">
          <div class="carousel-caption">Mountain trail</div>
        </div>
        <div class="carousel-slide">
          <img src="https://picsum.photos/seed/c/600/300" alt="Slide C" style="width:100%;display:block;">
          <div class="carousel-caption">Ocean view</div>
        </div>
      </div>
    </div>
  </section>

  <script>
    document.getElementById('darkModeToggle').addEventListener('change', function() {
      document.body.style.setProperty('--bg', this.checked ? '#1a1a2e' : '#fff');
      document.body.style.setProperty('--text', this.checked ? '#e0e0e0' : '#1a1a2e');
    });
  </script>
</body>
</html>
