<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo: Missing overflow utility classes (#5722)</title>
  <link rel="stylesheet" href="../../easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; padding: 2rem; background: var(--ease-color-bg); }
    .grid { display: flex; flex-wrap: wrap; gap: 1.5rem; }
    .card { background: var(--ease-color-surface); border-radius: var(--ease-radius-md); padding: 1rem; box-shadow: var(--ease-shadow-sm); width: 250px; }
    .card h3 { margin: 0 0 0.5rem; }
    .box-wrap { width: 100%; height: 80px; border: 2px dashed var(--ease-color-neutral-400); border-radius: 4px; }
    .box-wrap > div { width: 300px; height: 120px; background: linear-gradient(135deg, var(--ease-color-primary), var(--ease-color-secondary)); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.8rem; }
    .exists { color: var(--ease-color-success); }
    .missing { color: var(--ease-color-danger); }
  </style>
</head>
<body>
  <h1>Missing Overflow Utility Classes</h1>
  <div class="grid">
    <div class="card"><h3 class="missing">ease-overflow-visible</h3><div class="box-wrap ease-overflow-visible"><div>visible</div></div></div>
    <div class="card"><h3 class="missing">ease-overflow-x-hidden</h3><div class="box-wrap ease-overflow-x-hidden"><div>x-hidden</div></div></div>
    <div class="card"><h3 class="missing">ease-overflow-y-hidden</h3><div class="box-wrap ease-overflow-y-hidden"><div>y-hidden</div></div></div>
    <div class="card"><h3 class="missing">ease-overflow-x-scroll</h3><div class="box-wrap ease-overflow-x-scroll"><div>x-scroll</div></div></div>
    <div class="card"><h3 class="missing">ease-overflow-y-scroll</h3><div class="box-wrap ease-overflow-y-scroll"><div>y-scroll</div></div></div>
    <div class="card"><h3 class="missing">ease-overflow-x-visible</h3><div class="box-wrap ease-overflow-x-visible"><div>x-visible</div></div></div>
    <div class="card"><h3 class="missing">ease-overflow-y-visible</h3><div class="box-wrap ease-overflow-y-visible"><div>y-visible</div></div></div>
  </div>
</body>
</html>
