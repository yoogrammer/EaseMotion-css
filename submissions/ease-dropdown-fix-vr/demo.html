<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Dropdown Fix</title>
    <style>
        /* Mocking docs.css theme variables for the self-contained demo */
        :root {
            --page-bg: #0f0e17;
            --page-text: #fffffe;
            --code-bg: rgba(255, 255, 255, 0.04);
            --border-color: rgba(255, 255, 255, 0.07);
            --ease-radius-sm: 4px;
            --ease-space-2: 0.5rem;
            --ease-space-3: 1rem;
        }

        [data-theme="light"] {
            --page-bg: #f8fafc;
            --page-text: #0f172a;
            --code-bg: #f1f5f9;
            --border-color: #e2e8f0;
        }

        body {
            background-color: var(--page-bg);
            color: var(--page-text);
            font-family: system-ui, -apple-system, sans-serif;
            padding: 3rem;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Original inline styles from animations-preview.html */
        .ease-input {
            padding: var(--ease-space-2) var(--ease-space-3);
            border: 1px solid var(--border-color);
            border-radius: var(--ease-radius-sm);
            background: var(--code-bg);
            color: var(--page-text);
            font-size: 1rem;
            min-width: 200px;
        }

        .demo-controls {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        button {
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: var(--ease-radius-sm);
            border: 1px solid var(--border-color);
            background: var(--code-bg);
            color: var(--page-text);
        }
    </style>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Dropdown Visibility Fix</h2>
    <p>Click the select box to verify the options are readable in both themes.</p>

    <div class="demo-controls">
        <select class="ease-input">
            <option value="all">All Categories</option>
            <option value="fade">Fade</option>
            <option value="slide">Slide</option>
            <option value="bounce">Bounce</option>
            <option value="rotate">Rotate</option>
        </select>

        <button onclick="toggleTheme()">Toggle Dark/Light Mode</button>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            html.setAttribute('data-theme', currentTheme === 'dark' ? 'light' : 'dark');
        }
    </script>

</body>
</html>
