<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Magnified Slider Deck</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 480px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Magnified Carousel Focus Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Click the adjacent dimmed preview cards below. General sibling combinators shift track offsets and scale focused cells at 60fps with 0 scripts.</p>
  </header>

  <div class="alm-slider-deck-stage">
    
    <input type="radio" id="slide-channel-1" name="sliderSystem" class="alm-slider-radio">
    <input type="radio" id="slide-channel-2" name="sliderSystem" class="alm-slider-radio" checked>
    <input type="radio" id="slide-channel-3" name="sliderSystem" class="alm-slider-radio">
    
    <div class="alm-slider-track-lane">
      
      <label for="slide-channel-1" class="alm-slide-card" id="card-deck-1">
        <div>
          <span class="alm-slide-pill-tag">Node_Alpha</span>
          <h3 class="alm-slide-header-title">Compute Pipeline</h3>
          <p class="alm-slide-body-desc">Manages real-time data streaming allocations across internal decentralized networks.</p>
        </div>
        <span style="font-size: 0.65rem; font-weight: 700; color: #cbd5e1; font-family: monospace;">PORT // 01A</span>
      </label>

      <label for="slide-channel-2" class="alm-slide-card" id="card-deck-2">
        <div>
          <span class="alm-slide-pill-tag">Node_Beta</span>
          <h3 class="alm-slide-header-title">Socket Metrics</h3>
          <p class="alm-slide-body-desc">Monitors traffic velocities and controls dashboard packet routing channels seamlessly.</p>
        </div>
        <span style="font-size: 0.65rem; font-weight: 700; color: #cbd5e1; font-family: monospace;">PORT // 02B</span>
      </label>

      <label for="slide-channel-3" class="alm-slide-card" id="card-deck-3">
        <div>
          <span class="alm-slide-pill-tag">Node_Gamma</span>
          <h3 class="alm-slide-header-title">Database Core</h3>
          <p class="alm-slide-body-desc">Secures authorization tokens and cluster parameters within frozen framework layers.</p>
        </div>
        <span style="font-size: 0.65rem; font-weight: 700; color: #cbd5e1; font-family: monospace;">PORT // 03C</span>
      </label>

    </div>

  </div>

</body>
</html>
