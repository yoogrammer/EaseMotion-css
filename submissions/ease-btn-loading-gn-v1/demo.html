<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-btn-loading Demo — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: var(--ease-font-sans, system-ui, sans-serif);
      background: var(--ease-color-bg, #f8fafc);
      color: var(--ease-color-text, #1e293b);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    p {
      color: var(--ease-color-muted, #475569);
      margin-bottom: 1rem;
      text-align: center;
    }

    .demo-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
    }

    .demo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    label {
      font-size: 0.75rem;
      color: var(--ease-color-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <h1>ease-btn-loading</h1>
  <p>Pure-CSS loading spinner state for buttons. Click any button to toggle.</p>

  <div class="demo-grid">

    <div class="demo-section">
      <label>Primary</label>
      <button class="ease-btn ease-btn-primary ease-btn-loading">
        Submit
      </button>
    </div>

    <div class="demo-section">
      <label>Success</label>
      <button class="ease-btn ease-btn-success ease-btn-loading">
        Saving...
      </button>
    </div>

    <div class="demo-section">
      <label>Danger</label>
      <button class="ease-btn ease-btn-danger ease-btn-loading">
        Deleting
      </button>
    </div>

    <div class="demo-section">
      <label>Outline</label>
      <button class="ease-btn ease-btn-outline ease-btn-loading">
        Loading
      </button>
    </div>

    <div class="demo-section">
      <label>Small</label>
      <button class="ease-btn ease-btn-primary ease-btn-sm ease-btn-loading">
        Load
      </button>
    </div>

    <div class="demo-section">
      <label>Large</label>
      <button class="ease-btn ease-btn-primary ease-btn-lg ease-btn-loading">
        Processing
      </button>
    </div>

    <div class="demo-section">
      <label>Pill</label>
      <button class="ease-btn ease-btn-primary ease-btn-pill ease-btn-loading">
        Please wait
      </button>
    </div>

  </div>

  <p style="margin-top:2rem; font-size:0.85rem;">
    Add <code>.ease-btn-loading</code> to any <code>.ease-btn</code> to show the spinner.
  </p>

</body>
</html>
