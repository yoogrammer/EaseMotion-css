<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Glassmorphic Tabs Component</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    /* Scoped document canvas reset for preview visualization purposes only */
    body {
      background-color: #0b1121; /* Matches the dark framework token core */
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
  </style>
</head>
<body>

  <nav class="alm-tabs-container" id="interactive-tabs">
    <div class="alm-tab-indicator" id="tab-sliding-pill"></div>
    
    <button class="alm-tab-item is-active" role="tab" aria-selected="true">Dashboard</button>
    <button class="alm-tab-item" role="tab" aria-selected="false">Analytics</button>
    <button class="alm-tab-item" role="tab" aria-selected="false">Security</button>
    <button class="alm-tab-item" role="tab" aria-selected="false">Settings</button>
  </nav>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const tabsContainer = document.getElementById('interactive-tabs');
      const tabItems = tabsContainer.querySelectorAll('.alm-tab-item');
      const indicator = document.getElementById('tab-sliding-pill');

      function recalculateIndicatorPosition(activeTab) {
        // Calculate the relative coordinate bounds offset from the parent container
        const targetWidth = activeTab.offsetWidth;
        const targetLeft = activeTab.offsetLeft;

        // Apply hardware-accelerated transform dimensions to sliding pill
        indicator.style.width = `${targetWidth}px`;
        indicator.style.transform = `translateX(${targetLeft - tabsContainer.offsetLeft}px)`;
      }

      // Initialize positioning layout baseline matrix for default selected item
      const initialActive = tabsContainer.querySelector('.alm-tab-item.is-active');
      if (initialActive) {
        // Timeout gate ensures browser calculates font geometry widths reliably before firing
        setTimeout(() => recalculateIndicatorPosition(initialActive), 50);
      }

      // Handle item state shifts via click events
      tabItems.forEach(tab => {
        tab.addEventListener('click', (e) => {
          tabItems.forEach(item => {
            item.classList.remove('is-active');
            item.setAttribute('aria-selected', 'false');
          });

          tab.classList.add('is-active');
          tab.setAttribute('aria-selected', 'true');
          recalculateIndicatorPosition(tab);
        });
      });

      // Recalculate metrics seamlessly during screen window resizing intervals
      window.addEventListener('resize', () => {
        const currentActive = tabsContainer.querySelector('.alm-tab-item.is-active');
        if (currentActive) recalculateIndicatorPosition(currentActive);
      });
    });
  </script>
</body>
</html>
