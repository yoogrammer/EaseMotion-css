<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo: ease-progress bar component (#6014)</title>
  <link rel="stylesheet" href="../../easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; padding: 2rem; background: var(--ease-color-bg); display: flex; flex-direction: column; align-items: center; gap: 2rem; }
    .card { width: 100%; max-width: 500px; padding: 2rem; border-radius: var(--ease-radius-lg); background: var(--ease-color-surface); box-shadow: var(--ease-shadow-md); }
    .row { margin-bottom: 1.5rem; }
    .row:last-child { margin-bottom: 0; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--ease-color-text); }
    .note { color: var(--ease-color-muted); font-size: var(--ease-text-sm); text-align: center; max-width: 500px; }
    button { margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Progress Bar Component</h1>
  <div class="card">
    <div class="row">
      <label>Default (50%)</label>
      <div class="ease-progress" style="--ease-progress-width: 50%;">
        <div class="ease-progress-fill"></div>
      </div>
    </div>
    <div class="row">
      <label>Striped (75%)</label>
      <div class="ease-progress ease-progress-striped" style="--ease-progress-width: 75%;">
        <div class="ease-progress-fill"></div>
      </div>
    </div>
    <div class="row">
      <label>Full (100%)</label>
      <div class="ease-progress" style="--ease-progress-width: 100%;">
        <div class="ease-progress-fill"></div>
      </div>
    </div>
    <button class="ease-btn ease-btn-primary" onclick="animateProgress()">Animate Progress</button>
  </div>
  <p class="note"><code>ease-progress</code> (container), <code>ease-progress-fill</code> (bar), <code>ease-progress-striped</code> (variant).<br>Set width via <code>--ease-progress-width</code> CSS variable.</p>
  <script>
    function animateProgress() {
      var bars = document.querySelectorAll('.ease-progress-fill');
      bars.forEach(function(bar) {
        var parent = bar.parentElement;
        var target = parent.style.getPropertyValue('--ease-progress-width') || '100%';
        parent.style.setProperty('--ease-progress-width', '0%');
        setTimeout(function() {
          parent.style.setProperty('--ease-progress-width', target);
        }, 50);
      });
    }
  </script>
</body>
</html>
